body:
  text: 尚史卷十五世家八鑲白旗漢軍李鍇撰鄭世家始宣王二十二年終安王二十五年凡三百二十年傳二十一世桓公桓公名友周厲王少子宣王庶弟也年表作母弟宣王二十二年桓公初封于鄭史記索隱鄭縣名屬京兆紀年宣王二十二年王錫王子多父命居洛晉文侯二年同王子多父伐鄭克之乃居鄭父之邱名之曰鄭是曰桓公八年王錫司徒鄭伯多父命系本桓公居棫林徙拾宋忠云棫林拾皆舊地名封桓公乃名為鄭封三十三年桓公為司徒甚得周衆與東土之人問于史伯曰王室多故余懼及焉其何所可以逃死史伯對曰其濟洛河潁之間乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險是皆有驕侈怠惰之心而加之以貪冒君若以周難之故寄孥與賄焉不敢不許周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克二邑鄢蔽補丹依㽥歷莘君之土也若前莘後河右洛左濟主芣騩山名而食溱洧修典刑以守之唯是可以少固公説乃東寄孥與賄虢鄶受之十邑皆有寄地國語韓非子鄭襲鄶取之紀年晉文侯十四年鄭人滅虢十六年鄭遷于溱洧三十六年犬戎殺幽王酈山下并殺桓公史記在位三十六年諡曰桓武公莊公二十二年入春秋武公名突滑譙周古史考史記作掘突索隱非也昭公名忽厲公名突豈有子孫同名乎蓋舊史雜記昭厲之名誤以為武公字桓公之子也犬戎殺幽王桓公死之鄭人共立突滑是為武公韓非子武公欲伐胡先以其女妻胡君以娛其意因問羣臣曰吾欲用兵誰可伐者大夫關其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以為親已遂不備鄭鄭襲胡取之武公十年娶申侯女為夫人曰武薑生太子寤生後生少子假二十七年公疾夫人請立假公弗聼公薨在位二十七年諡曰武寤生立是為莊公莊公元年封弟假于京號大叔史記二十二年隱元年大叔將襲鄭夫人將啓之公命公子吕帥車二百乘以伐京京叛大叔假假入于鄢公伐諸鄢大叔出奔共假子公孫滑出奔衛衛人為之伐我取廪延我以王師虢師伐衛南鄙請師于邾及邾人魯公子豫盟于翼二十三年隱二年伐衛討公孫滑之亂也初武公及公並為平王卿士王二于虢公怨王王曰無之故周鄭交質王子狐為質于鄭鄭公子忽為質于周二十四年隱三年平王崩桓王立周人將畀虢公政公使祭仲帥師取溫之麥秋又取成周之禾周鄭交惡冬公及齊侯盟于石門宋殤公之即位也公子馮來奔我欲納之及衛州吁立將修先君之怨于我使告于宋曰伐鄭以除君害君為主敝邑以賦與陳蔡從二十五年隱四年宋陳蔡衛伐我圍我東門五日而還秋諸侯復伐我敗我徒兵取其禾而還二十六年隱五年侵衛牧收衛邑衛以燕師伐我公子曼伯子元以制人敗燕師于北制邾人來告曰請君釋憾于宋敝邑為道秋我以王師會之伐宋入其郛冬宋伐我圍長葛二十七年隱六年我如魯渝平和而不盟曰平始與魯和也夏五月公侵陳大獲秋宋人取長葛冬公如周始朝桓王王不禮焉二十八年隱七年及宋平盟于宿冬及陳平陳五父來及公盟良佐大夫如陳及陳侯盟陳請妻公子忽公許之二十九年隱八年公請釋泰山之祀而祀周公以泰山之祊易魯許田三月使宛大夫如魯歸祊不祀泰山也按成王賜周公許田以為魯朝宿之邑後世因立周公别廟鄭桓公有助祭泰山湯沐之邑在祊鄭以天子不能復巡狩故欲以祊易許田各從本國所近之宜恐魯以周公别廟為疑故云以廢泰山之祀而祀周公秋公以齊人朝王三十年隱九年宋不王公為王左卿士以王命討之伐宋秋以王命如魯告伐宋冬北戎侵我公禦之大敗戎師三十一年隱十年公會魯侯齊侯于中邱盟于鄧為師期夏會伐宋六月公會魯侯齊侯于老桃我師入郜入防歸于魯秋我師入郊猶在郊宋衛入我蔡從之伐戴八月公圍戴克之取三師九月公入宋冬及齊人入郕三十二年隱十一年公會魯侯于時來秋會齊魯伐許入之齊以許讓魯魯弗受乃與我公使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞于許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口于四方其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒于地天其以禮悔禍于許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而况能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置于許我死乃亟去之吾先君新邑于此王室而既卑矣周之子孫曰失其序夫許大嶽之胤也天而既厭周德矣吾其能與許爭乎王取塢劉蒍𨝍鄭四邑于我而與我蘇忿生之田溫原絺樊隰郕攢茅向盟州陘隤懷十二邑皆蘇忿生之田周于是始失鄭鄭息有違言息侯伐我公與戰于竟息師大敗而還冬公以虢師伐宋大敗宋師三十三年桓元年公會魯侯于垂以璧假許田卒易祊田也夏四月及魯侯盟于越結祊成也盟曰渝盟無享國傳此下有鄭伯拜盟事杜注鄭伯自來則經不書若遣使則當言鄭人不得稱鄭伯疑誤今闕之三十四年桓二年宋華督弒殤公三月公會諸侯齊魯陳于稷以成宋亂秋公會蔡侯于鄧始懼楚三十七年桓五年公及齊侯朝于紀欲以襲之桓王奪公政公不朝秋王以諸侯伐我公禦之戰于繻葛王卒大敗祝𥅆射王中肩祝𥅆請從之公曰君子不欲多上人况敢陵天子乎茍自救也社稷無隕多矣夜使祭仲勞王且問左右三十八年桓六年北戎伐齊我救齊大敗戎師三十九年桓七年盟向二邑見隱十一年求成于我既而背之秋我及齊衛伐盟向王遷盟向之民于郟四十二年桓十年冬公及齊衛與魯戰于郎四十三年桓十一年我及齊衛盟于惡曹夏五月公薨左傳在位四十三年諡曰莊昭公厲公子亹附子儀昭公名忽厲公名突忽莊公之世子突其庶子也初祭仲有寵于莊公為公娶鄧曼生忽宋雍氏女于莊公曰雍姞生突莊公四十三年桓十一年公薨祭仲立忽雍氏宗有寵于宋故誘祭仲而執之曰不立突將死亦執突而求賂焉祭仲以突歸而立之是為厲公初北戎伐齊在桓六年齊乞師于我世子忽帥師救齊大敗戎師獲其二帥大良少良甲首三百以獻于齊于是諸侯之大夫戍齊齊饋之餼使魯為其班後鄭忽以其有功也怒故有郎之師郎師在十年魯之未昏于齊也齊侯欲以文薑妻忽忽辭人問其故忽曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為及其敗戎師也齊侯又請妻之固辭人問其故忽曰無事于齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸莊公祭仲曰必取之君多內寵子無大援將不立三公子謂子突子亹子儀皆君也弗從及厲公立忽奔衛宋以立厲公故多責賂于鄭鄭不堪命厲公元年桓十二年魯侯欲平宋鄭宋辭平冬魯侯會公盟于武父遂及我師伐宋戰于宋二年桓十三年公會魯侯紀侯及齊宋衛燕戰齊宋燕衛敗績既而公使魯請修好三年桓十四年公會魯侯于曹夏五月公使弟語如魯盟冬宋人以齊蔡衛陳伐我焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽大宫鄭祖廟盧門宋城門四年桓十五年春三月桓王崩莊王立祭仲専公使其壻雍糾殺之祭仲殺雍糾公出奔蔡夏五月世子忽入是為昭公秋厲公因櫟人殺檀伯鄭守櫟大夫而遂居櫟冬魯宋衛陳會于袲伐我謀納厲公弗克而還昭公元年桓十六年魯宋衛陳蔡伐我二年桓十七年冬十月高渠彌弒公而立公子亹子亹昭公之弟也秋齊侯師于首止子亹會之齊人殺子亹轘髙渠彌祭仲逆子儀于陳而立之子儀亦昭公之弟也子儀三年莊三年魯侯將會公謀紀紀有齊難故公辭以難厲公在櫟故四年莊四年公及齊侯陳侯遇于垂十二年莊十二年莊王崩僖王立十四年莊十四年厲公自櫟侵鄭獲傅瑕與之盟夏六月傅瑕弒公及其二子而納厲公初內蛇與外蛇鬭于鄭南門中內蛇死六年而厲公入厲公入遂殺傅瑕厲公後元年莊十五年公會諸侯齊宋陳衛于鄄齊始霸秋我侵宋二年莊十六年宋齊衛伐我秋荆伐我及櫟冬諸侯齊魯宋陳衛鄭許滑滕同盟于幽我成故三年莊十七年僖王崩惠王立我不朝齊齊人執我鄭詹詹自齊逃來四年莊十八年公使周原莊公逆王后于陳六年莊二十年王子頽作亂公和王室不克執燕仲父南燕伯子頽黨遂以王歸處于櫟秋王及公入于塢遂入成周取其寶器而還冬王子頽享五大夫樂及遍舞公聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司冦行戮君為之不舉而况敢樂禍乎姦王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也七年莊二十一年春鄭虢胥命于弭弭鄭地夏同伐王城公將王自圉門入虢叔自北門入殺王子頽及五大夫公享王于闕西辟樂備惠王復辟亦備六代之樂王與之武公之略自虎牢以東周原莊公曰鄭伯效尤其亦將有咎五月公薨八月葬厲公公之為公子也北戎侵我莊公禦之患戎師曰彼徒我車懼其侵軼我也公曰使勇而無剛者嘗寇而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之大敗戎師左傳昭公亡四年復入入二年髙渠彌弒之諡曰昭子亹立一年齊殺之子儀立十四年傅瑕弒之無諡按傳例篡立者諸侯既與之會則不得復討臣子弒之與弒君同子儀之立與篡有别且在位十四年垂之遇經已書鄭伯及其遇弒諸侯不加封國人不議諡非禮也厲公立四年出亡亡十四年復入又七年薨前後在位十一年諡曰厲文公文公名捷厲公之子也厲公薨文公立文公六年莊二十七年公會諸侯齊魯宋陳同盟于幽七年莊二十八年荆伐我諸侯齊魯宋救我楚師夜遁國人將奔桐邱諜人告曰楚幕有烏乃止八年莊二十九年我侵許十三年閔二年公惡髙克大夫使帥師次于河上久而弗召師潰而歸髙克奔陳十四年僖元年楚伐我荆始改號曰楚公會諸侯齊魯宋曹邾盟于柳謀救我十五年僖二年楚侵我囚𥅆伯十六年僖三年楚伐我公欲成孔叔大夫不可十七年僖四年公會諸侯齊魯宋陳衛許曹侵蔡蔡潰遂伐楚次于陘楚屈完及諸侯盟于召陵王以惠后故將廢世子鄭而立王子帶十八年僖五年公會諸侯齊魯宋陳衛許曹會王世子于首止秋八月諸侯盟王使周公召公曰吾撫女以從楚輔之以晉可以少安公喜于王命而懼其不朝于齊故逃歸不盟孔叔止之弗聼十九年僖六年諸侯齊宋鄭魯衛曹伐我圍新城楚圍許以救我諸侯乃還二十年僖七年齊伐我孔叔請下齊公曰姑少待夏我殺申侯大夫以説于齊秋諸侯盟于寧母公使世子華聼命于會華言于齊侯曰泄氏孔氏子人氏三族實違君命請去之齊侯辭冬公使請盟于齊閏月惠王崩襄王惡王子帶之難懼不發喪二十一年僖八年諸侯會王人于洮謀王室公乞盟請服也二十二年僖九年公會宰周公及諸侯齊魯宋衛許曹于葵邱二十四年僖十一年王子帶召戎伐京師入王城明年王討王子帶子帶奔齊二十六年僖十三年公會諸侯齊魯宋陳衛許曹于鹹淮夷病把且謀王室也秋為戎難故諸侯戍周明年諸侯城緣陵而遷杞二十八年僖十五年楚伐徐公會諸侯前諸侯盟于牡邱遂次于匡諸侯之大夫救徐二十九年僖十六年冬殺世子華十二月公會諸侯齊魯宋陳衛許邢曹于淮三十一年僖十八年公朝楚三十二年僖十九年我及陳蔡楚盟于齊三十三年僖二十年滑叛我而服于衛我入滑三十四年僖二十一年公及諸侯宋楚陳蔡許曹會于盂楚執宋公以伐宋冬諸侯盟于薄釋宋公三十五年僖二十二年諸侯宋衛許滕伐我楚伐宋以救我戰于泓宋師敗績夫人芈氏薑氏勞楚子于柯澤楚子入享享畢夜出文芈送于軍取我二姬以歸三十六年僖二十三年晉公子重耳過我公不禮焉叔詹大夫諫弗聼我之入滑也滑人聼命在僖二十年師還又即衛三十七年僖二十四年我伐滑王使伯服遊孫伯二子周大夫請滑初子頽之難厲公及虢公納惠王王巡虢守虢公為王宫于玤王與之酒泉厲公之享王也王以后之鞶鑑豫之虢公請器王豫之爵公怨惠王不與厲公爵又怨襄王之與衛滑也故不聼王命而執二子王怒以狄伐我取櫟既而王子帶以狄師攻王王出適鄭處于泛秋八月宋公如楚還入于鄭公享宋公有加禮冬公與孔將鉏石甲父侯宣多並鄭大夫省視官具于泛而後聼其私政謂省官司具器用得事天王之禮明年晉納王殺王子帶四十年僖二十七年冬楚子會公及諸侯陳蔡許圍宋四十一年僖二十八年晉侯侵曹伐衛以救宋夏四月晉侯齊師宋師秦師及楚人戰于城濮楚師敗績鄉役之三月城濮役之前三月公如楚致其師楚既敗而懼使子人九行成于晉晉欒枝入盟公五月晉侯及公盟于衡雍晉獻楚俘于王駟介百乘徒兵千公傅王用平禮用平王享晉文侯之禮冬公會諸侯晉魯齊宋蔡陳莒邾秦于溫天王狩于河陽四十二年僖二十九年周王子虎會諸侯之大夫晉魯宋陳秦蔡盟于翟泉謀伐我四十三年僖三十年晉侵我秋晉人秦人圍我以我無禮于晉且二于楚也晉軍函陵秦軍汜南公使燭之武大夫説秦伯秦伯説與我盟使戍之乃還晉亦去之四十四年僖三十一年公子瑕出奔楚四十五年僖三十二年夏四月公薨左傳在位四十五年諡曰文穆公穆公名蘭文公之子也母燕姞文公之賤妾文公之殺世子華也在僖十六年逐羣公子公子蘭奔晉文公四十三年僖三十年蘭從晉侯伐鄭請無與圍鄭許之使待命于東石癸侯宣多逆以為大子以求成于晉晉許之四十五年僖三十二年文公薨蘭即位是為穆公穆公元年僖三十三年秦師襲我滅滑而還晉敗秦師于殽冬我及晉陳伐許討其二于楚也楚侵陳蔡遂伐我納公子瑕僖三十一年瑕奔楚我殺瑕三年文二年公會諸侯宋陳及諸侯之大夫晉魯盟于垂隴冬公子歸生及諸侯之大夫晉宋陳伐秦取汪及彭衙而還四年文三年我會諸侯之師伐沈沈潰八年文九年公會諸侯魯齊宋衛陳許曹晉大夫盟于扈九年文八年秋八月襄王崩頃王立十年文九年楚伐我我及楚平諸侯之大夫晉魯宋衛許救我不及楚師十一年文十年公及陳侯會楚子于息遂及蔡侯次于厥貉將以伐宋宋逆楚子遂道以田孟諸宋公為右盂公為左盂盂田獵陳名十四年文十三年魯侯朝晉還公會魯侯于棐請平于晉魯侯成之十五年文十四年春頃王崩匡王立夏公會諸侯魯宋陳衛許曹晉大夫同盟于新城陳鄭宋服故且謀納邾捷災十六年文十五年公會諸侯盟于扈謀伐齊齊賂晉侯不克而還十八年文十七年宋弒昭公石楚及諸侯之大夫晉衛陳伐宋曰何故弒君宋賂晉猶立文公而還夏晉會諸侯于扈晉侯不見公以為二于楚也公子歸生以書告晉趙盾晉使鞏朔行成于我以趙穿公壻池為質我以大子夷石楚為質公以晉受齊宋之賂也曰晉不足與也遂受盟于楚陳以楚之不禮共公也受盟于晉二十年宣元年楚及我侵陳遂侵宋晉救陳宋會于棐林以伐我楚救我遇于北林晉人還冬晉宋伐我二十一年宣二年公子歸生受命于楚伐宋戰于大棘宋師敗績獲華元樂吕夏晉宋衛陳侵我楚救我晉師去之冬十月匡王崩定王立二十二年宣三年晉伐我及郔我及晉平夏楚侵我冬公薨初燕姞夢天與已蘭以為子文公與之蘭而御之生公故名公曰蘭及公有疾曰蘭死吾其死乎刈蘭而卒墨子鄭穆公當晝日中處乎廟有神入門而左鳥身素服三絶而狀正方公懼神曰帝享女明德使子錫女夀十年有九使若國家蕃昌子孫茂毋失鄭公再拜稽首曰敢問神曰豫為句芒十月葬穆公左傳在位二十二年諡曰穆靈公襄公靈公名夷穆公大子也穆公薨靈公即位靈公元年宣四年夏六月公子歸生弒公立庶子去疾去疾辭乃立其兄堅是為襄公是年冬楚伐我鄭未服故襄公元年宣五年楚伐我陳及楚平晉救我伐陳二年宣六年楚伐我取成于厲既成公逃歸三年宣七年及晉平公會諸侯晉宋衛曹盟于黑壤周王叔桓公臨之以謀不睦五年宣九年公及諸侯晉宋衛曹會于扈陳不會晉以諸侯之師伐陳冬楚為厲之役故伐我晉救我敗楚師于栁棼六年宣十年我及楚平夏諸侯晉宋衛曹之師伐我取成而還冬楚伐我晉救我逐楚師于頴北諸侯之師戍我七年宣十一年楚伐我公及楚子陳侯盟于辰陵既盟又徼事于晉八年宣十二年楚圍我旬有七日我卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師國人修城進復圍我三月克我入自皇門至於逵路公肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聼其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷于九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦楚子曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫楚大夫入盟公子去疾鄭伯弟出質夏晉救我及楚師戰于邲晉師敗績公及許男如楚十年宣十四年晉伐我為邲故告于諸侯搜焉而還我懼使公孫張即子張穆公孫代去疾于楚公如楚謀晉十六年成二年冬楚及我師侵衛十一月公子去疾及楚公子嬰齊魯侯蔡侯許男及諸侯之大夫秦宋陳衛齊曹邾薛鄫盟于蜀十七年成三年晉會諸侯魯宋衛曹伐我我敗晉師于邱輿皇戍如楚獻捷夏公子去疾伐許冬復伐許十八年成四年春三月公薨夏四月葬襄公左傳在位十八年諡曰襄靈公初諡幽襄公六年宣十年改葬之諡曰靈悼公悼公名費襄公子或弟未詳襄公十八年成四年薨悼公即位是年冬公孫申疆許田許敗諸展陂公伐許取鉏任冷敦之田悼公元年成五年許訴我于楚公如楚訟不勝楚執皇戍公子發穆公子公歸使請成于晉秋公及晉趙同盟于垂棘冬十一月定王崩簡王立十二月公會諸侯晉魯齊宋衛曹邾杞同盟于蟲牢鄭服故二年成六年公如晉拜成夏六月公薨左傳在位二年諡曰悼成公成公名睔悼公之弟也悼公二年成六年薨成公即位是年秋楚伐我我從晉故晉救我楚師還成公元年成七年公如晉見且拜師秋楚伐我諸侯晉魯齊宋衛曹莒邾杞救我我軍楚師軍攻也囚鄖公鍾儀獻諸晉秋八月同盟于馬陵二年成八年晉侵蔡及楚公會晉師門于許東門大獲焉三年成九年公會諸侯晉魯齊宋衛曹莒杞同盟于蒲楚以重賂求我公會楚公子成于鄧秋公如晉晉討其二于楚也執諸銅鞮而伐我我使伯蠲行成晉人殺之楚侵陳以救我公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君冬我圍許示晉不急君也四年成十年春衛侵我三月公子班聞公孫申之謀立公子繻國人殺繻立大子髠頑公子班出奔許晉欒書曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成夏五月晉會諸侯魯齊宋衛曹伐我我使公子然盟于修澤公歸自晉公討立君者殺公孫申及其弟叔禽六年成十二年晉楚成盟于宋公如晉聼成七年成十三年公會諸侯晉魯齊宋衛曹邾滕伐秦戰于麻隧秦師敗績夏六月公子班自訾入殺公子印公子羽皆穆公子及軍于市公子騑即子駟亦穆公子盡焚之殺班及其弟駹八年成十四年我伐許敗焉公復伐許入其郛許人平以公孫申之封按魯成四年公孫申疆許田許敗之不能定其封今許以是所封田求和九年成十五年公會諸侯晉魯衛曹宋齊邾同盟于戚晉侯執曹伯曹成公殺宣公太子而自立歸之于京師夏楚侵我及暴隧我侵楚取新石冬公子鰌及諸侯之大夫晉魯齊宋衛邾會吳于鍾離十年成十六年楚以汝隂之田求成于我我叛晉公子騑及楚子盟于武城夏我侵宋宋敗我于汋陂我覆之敗諸汋陵衛伐我至于鳴鴈晉伐我我使告于楚楚子救我六月晉楚戰于鄢陵楚師敗績秋晉會周尹子及諸侯魯齊衛宋邾伐我次于鄭西遷于制田晉以諸侯之師侵陳遂侵蔡未反諸侯遷于潁上公子喜宵軍之宋齊衛皆失軍十一年成十七年我侵晉虛滑衛救晉侵我夏五月大子髠頑侯獳為質于楚楚戌我晉會周尹子單子及諸侯宋衛曹齊邾伐我自戲童至于曲洧楚救我諸侯還冬諸侯復伐我十一月圍我楚救之師于汝上諸侯還十二年成十八年我侵宋遂會楚子伐宋取朝郟侵城郜取幽邱同伐彭城納宋魚石向為人鱗朱向􅙮魚府以三百乘戍之而還十三年襄元年晉伐我入郛敗我徒兵于洧上楚救我侵宋我侵宋取犬邱秋九月簡王崩靈王立十四年襄二年我侵宋公疾公子騑請息肩于晉公曰楚君以鄭故親集矢于其目非異人任寡人也若背之是棄力與言其誰昵我免寡人唯二三子秋七月公薨經書六月誤傳左在位十四年諡曰成僖公僖公名髠頑成公之大子也成公十四年襄二年薨僖公即位于是公子喜當國攝君事公子騑為政為正卿公子發為司馬晉師侵我諸大夫欲從晉公子騑曰官命未改秋七月諸侯之大夫晉魯宋衛曹邾會于戚謀城虎牢以逼我冬復會于戚遂城虎牢我成僖公元年襄三年公朝晉夏六月公會周單子及諸侯晉魯宋衛莒邾齊同盟于雞澤三年襄五年公使公子發聘于魯秋公會諸侯晉魯宋陳衛曹莒邾滕薛齊吳鄫于戚會吳且戍陳冬楚伐陳公會諸侯晉魯宋衛曹齊會于城棣以救陳五年襄七年楚伐陳諸侯會于鄬以救之公如會及鄵公子騑使賊夜弒公而以瘧疾赴于諸侯明年夏葬僖公左傳在位五年諡曰僖簡公簡公名喜僖公大子也公子騑弒僖公大子生五嵗奉而立之簡公元年襄八年羣公子以僖公之死也謀公子騑騑先之辟殺羣公子夏四月我侵蔡獲蔡公子燮五月晉侯會諸侯之大夫魯齊宋衛邾于邢公獻捷于會冬楚伐我公子騑公子發公孫輒欲從楚公子嘉公孫躉公孫舍之欲待晉騑曰姑從楚晉師至吾又從之乃及楚平使王子伯駢大夫告于晉曰君命敝邑修而車服警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢邱今楚來討曰女何故稱兵于蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受命于楚孤也與其二三臣不能禁止不敢不告晉使行人對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之二年襄九年晉會諸侯魯宋衛曹莒邾滕薛杞小邾齊伐我我恐乃行成冬十一月同盟于戲將盟六卿及其大夫門子皆從公晉士弱為載書曰自今日既盟之後鄭國而不唯晉命是聼而或有異志者有如此盟公子騑趨進曰自今日既盟之後鄭國而不唯有禮與疆可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也乃盟而還晉人不得志于我十二月以諸侯復伐我次于隂口而還楚伐我公子騑將及楚平公子嘉公孫躉曰與大國盟口血未乾而背之可乎騑曰吾盟固云唯疆是從今楚師至晉不我救則楚疆矣且要盟無質背之可也乃及楚平同盟于中分三年襄十年我及楚伐宋衛救宋師于襄牛我使皇耳侵衛衛獲皇耳于犬邱秋我及楚侵魯西鄙還圍蕭克之九月侵宋北鄙晉會諸侯魯宋衛曹莒邾齊滕薛杞小邾伐我師于牛首冬盜殺公子騑公子發公孫輒尉止司臣侯晉堵女父子師僕五人皆士也故書盜諸侯之師城虎牢而戍之晉師城梧及制鄭舊地戍之我及晉平楚救我晉與楚夾潁而軍公孫躉曰諸侯既有成行必不戰矣從之亦退不從亦退退楚必圍我不如從楚亦以退之宵涉潁與楚人盟晉師還侵我北鄙而歸楚人亦還四年襄十一年我患晉楚之故公孫舍之曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉于是使疆場之司惡于宋宋侵我大獲夏舍之侵宋四月晉會諸侯前諸侯伐我六月圍我我懼乃行成秋七月同盟于亳楚伐我公逆之伐宋九月諸侯悉師復伐我我使良霄大宰石㲋如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于我東門我使王子伯駢行成晉趙武入盟公冬十月公孫舍之出盟晉侯十二月會于蕭魚六年襄十三年楚歸良霄石㲋七年襄十四年公孫躉及諸侯之大夫晉魯齊宋衛曹莒邾滕薛杞小邾會吳于向夏四月公孫躉會諸侯之大夫前諸侯伐秦冬公孫躉會諸侯之大夫晉魯宋衛莒邾于戚衛孫林父逐獻公立殤公故會戚以定之八年襄十五年晉悼公卒公孫夏如晉奔喪公孫蠆送葬九年襄十六年公會諸侯晉魯宋衛曹莒邾薛杞小邾于溴梁大夫盟夏公會諸侯之大夫晉魯衛宋伐許許請遷也十一年襄十八年公會諸侯前諸侯同圍齊公子嘉欲去諸大夫將叛晉而起楚師以去之夏楚伐我十二年襄十九年諸侯盟于祝柯圍齊之諸侯秋殺公子嘉然丹子良出奔楚公孫舍之當國公孫夏聼政立公孫僑為卿十三年襄二十年公會諸侯前諸侯同盟于澶淵十四年襄二十一年公會諸侯晉魯齊宋衛曹莒邾于商任晉欒盈叛會以錮之十五年襄二十二年公及諸侯晉魯齊宋衛曹莒邾薛杞小邾會于沙隨復錮欒氏也十七年襄二十四年公如晉朝且請伐陳秋公會諸侯晉魯宋衛曹莒邾滕薛杞小邾于夷儀將以伐齊水不克冬楚伐我以救齊諸侯還救我十八年襄二十五年公會諸侯前諸侯于夷儀伐齊夏公孫舍之伐陳入之秋諸侯前諸侯同盟于重邱齊成也公孫僑獻陳捷于晉受之冬公如晉拜陳之功公孫夏復伐陳陳及我平十九年襄二十六年楚秦侵我敗我師囚皇頡印堇父而獻于秦秦歸我印堇父夏良霄會魯侯及諸侯之大夫晉宋曹于澶淵討衛疆戚田取懿氏六十以與孫林父而執衛侯獻公秋公及齊侯如晉請衛侯許之既歸使公孫夏如晉聘冬楚伐我二十年襄二十七年宋向戍欲弭諸侯之兵夏良霄會諸侯之大夫晉楚魯宋齊秦陳衛邾滕蔡許曹于宋秋七月盟于宋既盟公享晉趙武于垂隴二十一年襄二十八年蔡侯朝晉歸過我公享之公使遊吉如楚及漢楚人還之嫌鄭伯不親朝秋公如楚冬十一月靈王崩景王立十二月楚子卒二十二年襄二十九年葬楚子公送葬于西門之外五月葬靈王公孫舍之使印假如周我飢公孫舍之卒罕虎為政六月公孫假會諸侯之大夫晉魯齊宋衛曹莒滕薛小邾城杞吳公子札來聘冬良霄強使公孫黑如楚黑怒將攻霄大夫和之十二月大夫盟二十三年襄三十年公如晉夏公及其大夫盟六月公孫僑如陳涖盟秋良霄又將使黑如楚黑以駟氏之甲伐而焚之霄奔許公及其大夫盟于大宫盟國人于師之梁城門名之外良霄入伐舊北門駟帶率國人伐之霄死冬罕虎及諸侯之大夫晉魯齊宋衛曹莒邾滕薛杞小邾會于澶淵宋災故二十四年襄三十一年公如晉罕虎使印假如楚以適晉告二十五年昭元年楚公子圍來聘且娶于公孫假氏罕虎會諸侯之大夫晉楚魯齊宋衛陳蔡許曹于虢晉趙武魯叔孫豹曹大夫過我公享之夏遊楚穆公孫及公孫黑爭妻放楚于吳六月公及大夫盟于公孫假氏秋公孫僑如晉聘且問晉侯疾二十六年昭二年殺公孫黑黑將作亂殺遊氏而代之晉少薑卒冬印假如晉弔二十七年昭三年公如晉晉再納齊女秋罕虎如晉賀夫人冬公如楚楚子及公田江南之夢二十八年昭四年許男如楚楚止之遂止公復田江南夏公及諸侯楚蔡陳許徐滕頓胡沈小邾宋會于申秋公先歸使大夫從楚子伐吳克朱方遂伐賴滅之九月公孫僑作邱賦丘十六井當出馬一匹牛三頭今子産欲别其田及家財各為一賦二十九年昭五年晉韓起如楚罕虎遊吉勞諸索氏三十年昭六年鑄刑書鑄刑書于鼎以為國之常法夏楚公子棄疾如晉過我公勞諸柤三十一年昭七年魯侯如楚公勞于師之梁夏公孫僑如晉聘三十二年昭八年晉成虒祁宫名公如晉賀三十三年昭九年遊吉及諸侯之大夫魯宋衛會楚子于陳三十四年昭十年晉平公卒公如晉及河晉人辭遊吉遂如晉秋罕虎如晉會葬晉平公三十五年昭十一年楚圍蔡罕虎會諸侯之大夫晉魯齊宋衛曹邾于厥憗謀救蔡三十六年昭十二年春三月公薨夏六月葬簡公左傳在位三十六年諡曰簡定公定公名寧簡公之子也簡公三十六年昭十二年薨公即位夏公如晉晉侯享公公辭于享請免喪而後聼命簡公未葬故定公元年昭十三年公會周劉子諸侯晉魯齊衛宋曹莒邾滕薛杞小邾于平邱罕虎卒四年昭十六年晉韓起來聘八年昭二十年公孫僑卒十年昭二十二年景王崩悼王立冬悼王崩敬王立王子朝作亂王居于狄泉十二年昭二十四年公如晉十三年昭二十五年遊吉會諸侯之大夫晉魯宋衛曹邾滕薛小邾于黃父晉令輸王粟具戍人曰明年將納王十四年昭二十六年王入于成周王子朝出奔楚十六年昭二十八年夏四月公薨六月葬定公左傳在位十六年諡曰定獻公獻公名蠆定公之子也史記定公薨公即位元年魯昭之二十九年也二年昭三十年晉頃公卒遊吉如晉弔且送葬四年昭三十二年國參會諸侯之大夫晉魯齊宋衛曹莒薛杞小邾于狄泉城成周八年定四年公會周劉子諸侯晉魯宋蔡衛陳許曹莒邾頓胡滕薛杞小邾齊于召陵侵楚十年定六年遊速滅許以許男歸周儋翩王子朝餘黨因我以作亂于周我伐馮滑胥靡負黍狐人闕外周六邑二月魯侵我為晉討我伐胥靡也冬王處于姑蕕十一年定七年公及齊侯盟于鹹冬王入于王城十二年定八年晉會周成桓公侵我圍蟲牢報伊闕也冬公及衛侯盟于曲濮遊吉卒十三年定九年夏四月公薨六月葬獻公左傳在位十三年諡曰獻聲公聲公名勝獻公之子也獻公薨公即位元年定十年遊速會齊侯衛侯于安甫二年定十一年及魯平魯叔還來涖盟六年定十五年罕逹伐宋敗宋師于老邱晉荀寅士吉射叛八年哀二年齊人輸吉射粟罕逹送之晉趙鞅禦之戰于鐵我師敗績十三年哀七年宋侵我我叛晉故秋宋圍曹冬我救曹侵宋十五年哀九年我圍宋雍邱宋皇瑗圍我師罕達救之敗績宋取我師于雍邱夏宋伐我十六年哀十年宋伐我初宋平元之族自蕭來奔平族公子地昭二十年奔鄭元族公子辰定十四年奔鄭我為之城嵒戈錫三邑鄭宋之間隙地十八年哀十二年宋向巢伐我取錫遂圍嵒罕達救嵒圍宋師十九年哀十三年取宋師于嵒二十一年哀十五年公伐宋冬晉伐我二十二年哀十六年孔子卒二十四年哀十八年敬王崩元王立二十六年哀二十年諸侯會于廪邱為我故謀伐晉我辭諸侯三十三年哀二十七年晉荀瑶伐我我請救于齊齊救我晉師還三十七年悼四年荀瑶圍我左傳是年公薨年表作三十八年史記在位三十七年諡曰聲哀公共公幽公繻公鄭君哀公名易聲公之子也哀公八年國人弒公立聲公弟丑是為共公共公三十年薨子幽公已即位幽公元年韓武子伐我殺幽公國人立幽公弟駘是為繻公繻公十五年韓景侯伐我取雍邱我城京十六年我伐韓敗韓兵于負黍二十三年我圍韓陽翟二十五年公殺相子陽二十七年子陽之黨弒公而立幽公弟乙為君是為鄭君鄭君乙二年負黍反復歸韓十一年韓伐我取陽城二十一年韓哀侯滅我并其國史記贊曰鄭周出也莊公裁為桓公孫于周為近乃取麥取禾馴至射肩春秋無王顧自鄭始鄭之罪可勝誅哉鄭索虢鄶寄地也而介乎大國初釁楚于鄧卒息肩于晉勢在必爭也是故當春秋之際鄭所以啓諸侯之兵者齊桓之盟召陵圍新城晉文之五盟悼公之三駕是也宋所以合諸侯之成者華元之盟西門向戍之盟蒙門是也尚史卷十五
