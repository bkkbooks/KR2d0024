body:
  text: 尚史卷九十五志三鑲白旗漢軍李鍇撰五行志夫天人者一於氣交者也聖人在上仁生義殺合徳天地則雷動風化火蒸水潤陽無凌陰陰無冒陽萬物以孶而四氣順焉謂之至治其或逞欲縱慝紊蔑綱紀鬰折否塞坌涌旁達則淫沴之氣作而為妖星辰錯行毛羽生孽洪範所謂狂而恒雨僣而恒暘豫而恒燠急而恒寒捷於景響也然人作於下天變於上皆已事之徴非前事之罰乎劉向曰妖孽應行而自見非見而為害也歆曰經書災而不記其故葢吉凶亡常隨行而成禍福也然則髙明之家擿事應以實之梓慎禆諶顧或爽焉夫大札緩報庶眚隠符不亦難言已乎要之天變修徳地變修刑敬威與怒克其在已而已紀其變削其兆述五行志惟十有三祀王訪于箕子王迺言曰烏嘑箕子惟天陰隲下民相協厥居我不知其彛倫攸叙箕子迺言曰我聞在昔鯀陻洪水汩陳其五行帝乃震怒弗畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天迺錫禹洪範九疇彛倫攸叙初一曰五行次二曰羞用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極漢書此六十五字皆雒書本文劉向洪範傳次第之數禹加之龜文總三十八字劉歆洪範傳敬用等亦禹所第叙龜文唯二十字初一曰五行五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡傳曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺大子以妾為妻則火不炎上治宫室飾臺榭内滛亂犯親戚侮父兄則稼穡不成好戰攻輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下伏勝五行傳次二曰羞用五事五事一曰貌二曰言三曰視四曰聴五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖休徴曰肅時雨若乂時𤾉若哲時燠若謀時寒若聖時風若咎徴曰狂恒雨若僣恒𤾉若舒恒燠若急恒寒若蒙恒風若𫝊曰貌之不恭是謂不肅厥咎狂厥罰恒雨厥極惡時則有服妖時則有龜孽時則有雞旤時則有下體生上之痾時則有青眚青祥惟金沴木言之不從是謂不乂厥咎僣厥罰恒𤾉厥極憂時則有詩妖時則有介蟲之孽時則有犬旤時則有口舌之痾時則有白眚白祥惟木沴金視之不明是謂不哲厥咎舒厥罰恒燠厥極疾時則有草妖時則蠃蟲之孽時則有羊旤時則有目痾時則有赤眚赤祥惟水沴火聴之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼔妖時則有魚孽時則有豕旤時則有耳痾時則有黒眚黒祥惟火沴水思心之不睿是謂不聖厥咎䝉厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛旤時則有心腹之痾時則有黄眚黄祥時則有金木水火沴土伏勝五行傳次五曰建用皇極尚書傳曰皇之不極是謂不建厥咎眊厥罰恒陰厥極弱時則有射妖時則有龍蛇之孽時則有馬旤時則有下人伐上之痾時則有日月亂行星辰逆行伏勝五行志水不潤下魯桓公元年秋大水十三年夏大水莊公七年秋大水亡麥苗十一年秋宋大水二十四年大水宣公十年秋大水饑成公五年秋大水襄公二十四年秋大水趙惠文王二十七年河水出大潦顓事有知誅罰絶理厥災水其水也雨殺人以隕霜大風天黄饑而不損兹謂泰厥災水水殺人辟遏有徳茲謂狂厥災水水流殺人已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰解舍也王者于大敗誅首惡赦其衆不則皆函陰氣厥水流入國邑隕霜殺穀京房易傳火不炎上魯桓公十四年八月壬申御廪災劉向洪範傳夫人八妾所舂米之臧以奉宗廟者劉歆洪範傳公所親耕藉田以奉粢盛者莊公二十年夏齊大災僖公二十年五月己巳西宫災左傳公宫也穀梁愍公宫董舒仲繁露小寢夫人之宫宣公十六年夏成周宣榭火榭者所以藏樂器宣其名也左傳人火曰火榭者講武之坐屋成公三年二月甲子新宫災穀梁宣宫襄公九年春宋災三十年五月甲午宋災昭公六年六月丙戌鄭災九年夏四月陳災十八年五月壬午宋衛陳鄭災定公二年五月雉門及兩觀災哀公三年五月辛卯桓僖宫災四年六月辛丑亳社災君不思道厥妖火燒宫京房易傳稼穡不成魯莊公七年秋大水亡麥苗二十八年冬大亡麥禾襄公二十四年大饑趙幽繆王六年大饑秦始皇帝三年歲大饑十九年大饑水旱當書不書水旱而曰大亡麥禾者土氣不養稼穡不成者也劉向洪範傳金不從革魯昭公八年春石言于晉秦獻公十八年雨金于櫟陽晉平公問于師曠對曰石不能言神或馮焉作事不時怨讟動于民則有非言之物而言今宫室崇侈民力雕盡怨讟並興莫信其性石之言不亦宜乎左傳金石同類是為金不從革失其性也劉歆洪範傳木不曲直魯成公十六年正月雨木氷氷者陰之盛而水滯者也木者少陽貴臣卿大夫之象也此人將有害則陰氣脅木木先寒故得雨而氷也劉向洪範傳恒雨以下貌不恭之咎魯隠公九年三月癸酉大雨震電庚辰大雨雪僖公二十九年大雨雹昭公三年大雨雹服妖魯閔公二年晉獻公使太子申生帥師公衣之偏衣佩之金玦後四年申生以讒自殺鄭子臧好聚鷸冠鄭文公惡之使盗殺之近服妖也劉向洪範傳行不順厥咎人奴冠天下亂辟無適妾子拜又曰君不正臣欲簒厥妖狗冠出朝門京房易傳雞旤周景王時大夫賔起見雄雞自㫁其尾近雞旤也劉向洪範傳有始無終厥妖雄雞自齧㫁其尾又曰賢者居明夷之世知時而傷或衆在位厥妖雞生角雞生角時主獨又曰婦人顓政國不静牝雞雄鳴主不榮京房易傳青眚青祥魯宣公七年正月鼷鼠食郊牛角改卜牛又食其角定公十五年鼷鼠食郊牛牛死哀公元年正月鼷鼠食郊牛近青祥亦牛旤也不敬而備霿之所致也劉向洪範傳祭天不慎厥妖鼷鼠齧郊牛角又曰子不子鼠食其郊牛又曰誅不原情厥妖鼠舞門臣私禄罔辟厥妖鼠巢京房易傳鼷鼠食郊牛養牲不謹也董仲舒繁露金沴木魯文公十三年太室屋壞上下咸誖厥妖城門壞京房易傳恒𤾉以下言不從之咎魯莊公三十一年冬不雨僖公二年冬十月不雨三年春正月不雨夏四月不雨六月雨二十一年夏大旱文公二年自十有二月不雨至于秋七月十年自正月不雨至于秋七月十三年自正月不雨至于秋七月宣公七年秋大旱襄公五年秋大雩八年九月大雩二十八年八月大雩昭公三年八月大雩六年九月大雩十六年九月大雩二十四年八月大雩二十五年七月上辛大雩季辛又雩旱甚也定公十年九月大雩秦始皇帝十二年天下大旱六月至八月乃雨大旱也其夏旱雩祀謂之大雩不傷二穀謂之不雨劉向洪範傳欲徳不用茲謂張厥災荒荒旱也其旱陰雲不雨變而赤因而除師出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上縁求妃兹謂僣其旱三月大温亡雲居髙臺府兹謂犯陰侵陽其旱萬物根死數有火災庶位踰節兹謂僣其旱澤物枯為火所傷京房易傳詩妖宣王時童女謡曰檿弧箕服實亡周國有夫婦賣是器者宣王聞之使執而戮之逃于道見妖子哀而收之是為褒姒後申侯殺幽王驪山下擄褒姒晉獻公時童謡曰丙之辰龍尾伏辰袀服振振取虢之旗鶉之賁賁天䇿焞焞火中成軍虢公其犇冬十二月丙子朔晉滅虢虢公醜犇周晉惠公時童謠曰恭大子更葬兮後十四年晉亦不昌昌迺在兄公後為秦所獲立十四年而死晉人更立其兄重耳文成之世童謡曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴裳與𥜗鸜鵒之巢逺哉揺揺禂父喪勞宋父以驕鸜鵒鸜鵒往歌來哭至昭公時鸜鵒來巢公攻季氏敗出奔乾侯八年死于外昭公名禂公子宋立是為定公毛蟲之孽魯莊公十七年冬多麋麋色青近青祥麋之為言迷也葢牝獸之滛者劉向洪範傳毛蟲之孽為災劉歆洪範傳廢正作淫大不明國多麋又曰震遂泥厥咎國多麋京房易傳犬旤魯襄公十七年十一月甲午宋國人逐狾狗狾狗入于華臣氏國人從之臣懼遂犇陳先是臣兄閲為宋卿閲卒臣使賊殺閲家宰遂就其妻宋平公欲逐之左師向戌曰不如葢之乃止臣内不自安故犬旤至執政失下將害之厥妖狗生角君子茍免小人陷之厥妖狗生角夫婦不嚴厥妖狗與豕交兹謂反徳國有兵革京房易傳白眚白祥敬王二年十月癸酉王子朝以成周之寶圭沈于河㡬以獲神助津人得之河上陰不佞取將賣之則為石後二年子朝犇楚而死秦始皇帝三十六年鄭客從闗東來至華陰望見素車白馬從華山上下知其非人道住止而待之遂至持璧與客曰為我遺鎬池君今年祖龍死忽不見璧即始皇帝二十八年過江所沈璧也泰山之石顛而下聖人受命人君虜又曰石立如人庶士為天下雄立于山同姓平地異姓立于水聖人于澤小人前樂後憂厥妖雨羽又曰邪人進賢人逃天雨毛京房易傳木沴金威烈王二十三年九鼎震恒燠以下視不明之咎魯桓公十五年春亡氷成公元年二月亡氷襄公二十八年春亡氷禄不遂行兹謂欺厥咎奥雨雪四至而温臣安禄樂逸茲謂亂奥而生蟲知罪不誅茲謂舒其奥夏則暑殺人冬則物華實重過不誅茲謂亡徴其咎當寒而奥六日也京房易傳草妖殷太戊時亳有祥桑穀共生于朝一暮大拱二木合生不恭之罰孔安國傳桑猶喪也穀猶生也殺生之秉失而在下近草妖也劉向洪範傳魯僖公三十三年冬十二月隕霜不殺草李梅實秦獻公十六年桃冬花周十二月今十月也十月隕霜而不能殺草此君誅不行舒緩之應也李梅當剥落反華實近草妖也劉向洪範傳李梅實臣下彊也董仲舒繁露枯楊生梯枯木復生人君亡子王徳衰下人將起則有木生為人狀棄正作淫厥妖木㫁自属妃后有顓木仆反立㫁枯復生天辟惡之君吝于禄信衰賢去厥妖天雨草京房易傳羽蟲之孽殷髙宗時祭成湯有蜚雉登鼎耳而雊魯昭公二十五年夏有鸜鵒來巢哀公時有隼集于陳廷而死楛矢貫之石砮長尺有咫秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媦常在地中食死人腦即欲殺之拍捶其首媦亦語曰二童子名陳寶得雄者王得雌者霸陳倉人逐二童子化為雉雌止陳倉北坂為石秦祠之鸜鵒白羽旱之祥也穴居而好水黒色為主急之應也隼近黒祥貪暴類也矢貫之近射妖也死于廷國亡表也劉向洪範傳鸜鵒羽蟲之孽其色黒又黒祥也視不明聴不聰之罰也劉歆洪範傳逆親親厥妖白黒烏鬭于國専征刼殺厥妖烏鵲鬭辟退有徳厥咎狂厥妖水鳥集于國中人君暴虐鳥焚其舍賊臣在國厥咎燕生爵諸侯銷一曰生非其類子不嗣世京房易傳隼入射妖今入羽蟲之孽羊旤魯定公時季桓子穿井得土缶中得蟲若羊赤眚赤祥魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姫之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之時則火災赤眚之明應也劉向洪範傳尊卑不别厥妖女生赤毛又曰歸獄不解兹謂追非厥咎天兩血茲謂不親民有怨心不出三年無有宗人又曰佞人禄功臣僇天雨血京房易傳恒寒以下聴不聰之咎魯桓公八年冬十月雨雪僖公十年冬十月大雨雪昭四年正月大雨雪定公元年十月隕霜殺菽趙成侯二年六月雨雪秦始皇帝九年四月寒凍有死者二十一年大雨雪深二尺五寸雨雪雨雹隕霜殺菽皆常寒之罰劉向洪範傳夏雨雪戒臣為亂又曰有徳遭險兹謂逆命厥異寒誅過深當奥而寒盡六日亦為雹害正不誅兹謂飬賊寒七十二日殺蜚禽道人始去兹謂傷其寒物無霜而死涌水出戰不量敵兹謂辱命其寒雖雨物不茂聞善不予厥咎聾又曰興兵妄兹謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨迺隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土隙間不教而誅兹謂虐其霜反在草下京房易傳鼓妖魯僖公三十二年十二月己夘晉文公卒庚辰將殯于曲沃出綘柩有聲如牛近鼓妖也喪凶事聲如牛怒象也劉向洪範傳秦始皇帝五年冬雷秦二世元年天無雲而雷令不修本下不安金母故自動若有音京房易傳魚孽秦始皇帝八年河魚大上衆逆同志厥妖河魚逆流上又曰海數見巨魚邪人進賢人疎京房易傳介蟲之孽魯桓公五年秋螽僖公十五年八月螽文公三年秋雨螽于宋八年十月螽宣公六年八月螽十五年秋螽襄公七年八月螽哀公十二年十二月螽十三年九月螽十二月螽宣公十五年冬蝝生貪虐取民則螽介蟲之孽與魚同占蝝螕之有翼者食榖為災黒眚也劉歆洪範傳蝝螟始生也嬴蟲之孽劉向洪範傳豕旤魯莊公八年齊襄公田于貝邱從者曰公子彭生也公怒射之豕人立而嗁公懼墜車傷足喪屨衆心不安君政厥妖豕入居室京房易傳火沴水靈王二十二年穀洛水鬭將毁王宫王擁之秦武王三年渭水赤三日秦昭王三十四年渭水赤三日近火沴水也劉向洪範傳天子弱諸侯力政厥異水鬭君湎于酒淫于色賢人潛國家危厥異流水赤京房易傳恒風以下思心不睿之咎成王二年秋大熟未獲雨大雷電以風禾盡偃大木斯拔魯僖公十六年正月六鶂退蜚過宋都左氏傳曰風也經以見者為文故記退蜚傳以實應著言風常風之罰也劉歆洪範傳距諌自彊兹謂郤行厥異鶂退飛適當黜則鶂退飛又曰潛龍勿用衆逆同心至徳迺潛厥異風其風也行不解物不長兩小而傷政悖徳隠兹謂亂厥風先風也雨大風暴起發屋折木守義不進茲謂耄厥風與雲俱起折五穀莖臣易上政茲謂不順厥風大焱發屋賦歛不理茲謂禍厥風絶經緯止即温温即蟲侯専封茲謂不統厥風疾而樹不揺穀不成辟不思道利茲謂無澤厥風不揺木旱無雲傷禾公常于利茲謂亂厥風㣲而温生蟲蝗害五穀棄正作滛茲謂惑厥風温螟蟲起害有益人之物侯不朝茲謂叛厥風無恒地變赤而殺人京房易傳脂夜之妖魯桓公十五年九月己夘晦震夷伯之廟晦暝也震雷也晦暝雷擊其廟所謂夜妖也劉向洪範傳春秋及朔言朔及晦言晦月晦也劉歆洪範傳蠃蟲之孽魯隠公五年秋螟八月九月螟莊公六年秋螟十八年秋有蜮二十九年有蜚臣安禄茲謂貪厥災蟲蟲食根徳無常茲謂煩蟲食葉不絀無徳蟲食本與東作争茲謂不時蟲食節蔽惡生孽蟲食心又曰忠臣進善君不試厥咎國生蜮京房易傳蜮生南越越男女同川淫女為主亂氣所生在水旁能射人近射妖死亡之象也蜚色青近青眚也非中國所有南越盛暑男女同川澤淫風所生劉向洪範傳蜮盛暑所生非自越來蜚負蠜也性不食穀食穀為災劉歆洪範傳牛旤魯宣公三年郊牛之口傷改卜牛牛死秦文公時雍南山有梓樹使人被髪以朱絲繞樹伐樹㫁中有青牛出走入豐水中秦孝文王五年斿朐衍有獻五足牛者興徭役奪民時厥妖牛生五足京房易傳心腹之痾景王鑄無射鐘冷州鳩曰王其以心疾死乎明年以心疾崩黄眚黄祥春秋無其應聞善不與茲謂不知厥異黄厥咎聾厥災不嗣黄者日上黄光不散如火然有黄濁氣四塞京房易傳金木水火沴土夏末伊雒竭商末河竭幽王二年周三川皆震是歲三川竭岐山崩魯文公九年九月癸酉地震襄公十六年五月甲子地震昭公十九年五月己夘地震敬王元年八月丁酉南宫極震己未魯地震哀公二年四月甲午地震僖公十四年秋八月辛夘沙鹿崩晉地山名河上邑成公五年夏梁山崩癰河三日不流晉君帥羣臣而哭之迺流趙幽繆王五年代地大動自樂以西北至平陰屋太半壞地坼東西百三十步秦始皇帝十五年地震十七年地震伯陽甫曰陽伏而不能出陰迫而不能升于是地震陽失其所而填陰也陽失而在陰原必寒塞必竭川竭必山崩山崩川竭亡之徴也史記陽失在陰謂火氣來煎枯水故川竭也山川連體下竭上崩事勢然也以為金木水火沴土者也劉向洪範傳君臣相背厥異名水絶又曰臣事雖正専必震其震于水則波于木則揺于屋則瓦落大經在辟而易臣茲謂陰動厥震揺政宫大經揺政茲謂不陰厥震揺山山出涌水嗣子無徳専禄茲謂不順厥震動邱陵涌水出又曰小人剥廬厥妖山崩茲謂陰乗陽弱勝彊京房易傳常陰以下皇極不建之咎春秋亡其應有蜺䝉霧霧上下合也蒙如塵雲蜺日旁氣也后妃有専蜺再重赤而専至衝旱妻不壹順黒蜺四背又白蜺雙出日中妻以貴髙夫茲謂擅陽蜺四方日光不揚解而温内取茲謂禽蜺如禽在日旁以尊降妃茲謂薄嗣蜺直而塞六辰迺除夜星見而赤女不變始茲謂乗夫蜺白在日側黒蜺果之氣正直妻不順正茲謂擅陽蜺中窺貫而外専夫妻不嚴茲謂媟蜺與日㑹婦人擅國茲謂頃蜺白貫日中赤蜺四背適不答茲謂不次蜺直在左蜺交在右取于不専茲謂危嗣蜺抱日兩未及君淫外茲謂亡蜺氣左日交于外取不達茲謂不知蜺日奪明而大温温而雨尊卑不别茲謂媟蜺三出三已三辰除除則日出且雨臣私禄及親茲謂罔辟厥異䝉其蒙先大温已䝉起日不見行善不請于上茲謂作福䝉一日五起五解辟不下謀臣辟異道茲謂不見上蒙下霧風三變而俱解立嗣子疑茲謂動欲䝉赤日不明徳不序茲謂不聰䝉日不明温而民病徳不試空言禄茲謂主窳臣天蒙起而白君樂逸人茲謂放䝉日青黒雲夾日左右前後行過日公不任職茲謂怙禄䝉三日又大風五日蒙不解利邪以食茲謂閉上䝉大起白雲如山行蔽日公懼不言道茲謂蔽下䝉大起日不見若雨不雨至十二日解而有大雲蔽日禄生于下茲謂誣君蒙㣲而小雨已乃大雨下相攘善茲謂盗明䝉黄濁下陳功求于上茲謂不知䝉㣲而赤風鳴條解復蒙下専刑茲謂分威䝉而日不得明大臣厭小臣茲謂蔽蒙㣲日不明若解不解大風發赤雲起而蔽日衆不惡惡茲謂蔽蒙尊卦用事三日而起日不見漏言亡喜茲謂下厝用䝉㣲日無光有雨雲雨不降廢忠惑佞茲謂亡䝉天先清而暴蒙㣲而日不明有逸民茲謂不明䝉濁奪日光公不任職茲謂不絀䝉白三辰止則日青青而寒寒必雨忠臣進善君不試茲謂遏䝉先小雨雨已䝉起㣲而日不明衆惑在位茲謂覆國蒙㣲而日不明一温一寒風揚塵知佞厚之茲謂痺䝉甚而温君臣故弼茲謂悖厥災風雨霧風抜木亂五穀已而大霧庶正蔽惡茲謂生孽災厥異霧此皆陰雲之類云京房易傳射妖宣王殺杜伯而無罪王㑹諸侯田于圃中日中杜伯起于道左射王中心而死志無之今入射妖龍蛇之孽夏后氏之衰有二龍止于夏廷而言予褒之二君也夏帝卜殺之去之止之莫吉卜請其漦而藏之乃吉于是布幣策而告之龍亡而漦在乃匵去之夏亡傳匵殷周三代莫發至厲王末發之漦流于廷不可除王使婦人嬴而譟之漦化為𤣥黿入後宫處妾遇之而孕生子懼而棄之後有夫婦鬻檿弧萁服之器者見處妾所棄妖子聞其夜號哀而收之遂亡奔褒褒人有罪入妖子以贖是為褒姒魯昭公十九年龍鬭于鄭時門之外洧淵衆心不安厥妖龍鬭有徳遭害厥妖龍見井中行刑暴惡黒龍從井出京房易傳魯莊公八年有内蛇與外蛇鬭于鄭南門中内蛇死文公十六年夏有蛇自泉宫出入于國如先君之數立嗣子疑厥妖蛇居國門鬭京房易傳泉宫在囿中蛇從宫出象宫將不居近蛇孽也劉向洪範傳馬旤魯定公十年宋公子地有白馬駟公嬖向魋取而朱其尾鬛以予之公子地公弟辰入于蕭以叛秦孝公二十一年有馬生人秦昭王二十年牡馬生子而死皆馬旤也諸畜生非其類子孫必有非其姓者劉向洪範傳方伯分威厥妖牡馬生子亡天下諸侯相伐厥妖馬生人臣易上政不順厥妖馬生角茲謂賢士不足又曰天子親伐馬生角京房易傳下人伐上之痾魯文公十一年敗狄于鹹長狄兄弟三人一者之魯一者之齊一者之晉皆殺之身横九畮㫁其首而載之眉見于軾秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見于臨洮君暴亂疾有道厥妖長狄入國又曰豐其屋下獨苦長狄生世主擄京房易傳魯宣公八年晉人獲秦諜殺諸絳市六日而蘇魏襄王十三年有女子化為丈夫人變属黄祥属羸蟲之孽一曰天地之性人為貴人變皆属皇極下人伐上之痾劉歆洪範傳幹父之蠱有子考亡咎子三年不考父道思慕不皇亦重見先人之非不則為私厥妖人死復生一曰至陰為陽下人為上睽孤見豕負塗厥妖人生兩頭下相攘善妖亦同人若六蓄首目在下茲謂亡上正將變更凡妖之作以譴失正各象其類二首下不一也足多所任邪也足少下不勝任或不任下也凡下體生于上不敬也上體生于下媟瀆也生非其類淫亂也人生而大上速成也生而能言好虗也羣妖推此類不改乃成凶也又曰冡宰専政厥妖人生角妖言動衆路將亡人司馬死京房易傳魯莊公三十二年秋七月有神降于莘神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎國將興聽于民將亡聽于神僖公十年秋狐突適下國遇大子大子使登僕而告之曰夷吾無禮余得請于帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝于韓志無之今入人變日月亂行夏仲康五年九月朔日有食之周幽王六年十月辛夘朔日有食之魯隠公三年二月己巳日有食之桓公三年七月壬辰朔日有食之既十七年十月朔日有食之莊公十八年三月日有食之二十五年六月辛未朔日有食之二十六年十二月癸亥朔日有食之三十年九月庚午朔日有食之僖公五年九月戊申朔日有食之十二年三月庚午朔日有食之十五年五月日有食之文公元年二月癸亥日有食之十五年六月辛丑朔日有食之宣公八年七月甲子日有食之十年四月丙辰日有食之十七年六月癸夘日有食之成公十六年六月丙寅朔日有食之十七年十二月丁巳朔日有食之襄公十四年二月乙未朔日有食之十五年八月丁巳日有食之二十年十月丙辰朔日有食之二十一年九月庚戌朔日有食之十月庚辰朔日有食之二十三年二月癸酉朔日有食之二十四年七月甲子朔日有食之既八月癸巳朔日有食之二十七年十二月乙亥朔日有食之昭公七年四月甲辰朔日有食之十五年六月丁巳朔日有食之十七年六月甲戌朔日有食之二十一年七月壬午朔日有食之二十二年十二月癸酉朔日有食之二十四年五月乙未朔日有食之三十一年十二月辛亥朔日有食之定公五年三月辛亥朔日有食之十二年十一月丙寅朔日有食之十五年八月庚辰朔日有食之哀公十四年五月庚申朔日有食之秦昭襄王六年日食晝晦秦莊襄王三年四月日食凡日食不以晦朔者曰薄人君誅將不以理或賊臣將暴起日月雖不同宿陰氣盛薄日光也又曰亡師茲謂不御厥異日食其食也既並食不一處誅衆失理茲謂生叛厥食既光散縱畔茲謂不明厥食先大雨三日雨除而寒寒即食専禄不封茲謂不安厥食既先日出而黒光反燭君臣不通茲謂亡厥食三既同姓上侵茲謂誣君厥食四方有雲中央無雲其日大寒公欲弱主位茲謂不知厥食中白青四方赤食已地震諸侯相侵茲謂不承厥食三毁三復君疾善下謀上茲謂亂厥食既先雨雹殺走獸殺君獲位茲謂逆厥食既先雨風折水日赤内臣外鄉茲謂背厥食食且雨地中鳴冡宰専政茲謂因厥食先大風食時日居雲中四方亡雲伯正越職茲謂分威厥食日中分諸侯争美于上茲謂泰厥食日傷月食半天營而鳴賦不得茲謂竭厥食星隨而下受命之臣専征云試厥食雖侵光猶明若文王臣獨誅紂矣小人順受命者征其君云殺厥食五色至大寒隕霜若紂臣順武王而誅紂矣諸侯更制茲謂叛厥食三復三食食已而風地動適讓庶茲謂生欲厥食日失位光晻晻月形見酒亡節茲謂荒厥食乍青乍黒乍赤明日大雨發霧而寒凡食二十占其形二十有四改之輒除不改三年三年不改六年六年不改九年又曰美不上人茲謂上弱厥異日白七日不温順亡所制茲謂弱日白六十日物亡霜而死天子親伐茲謂不知日白體動而寒弱而有任茲謂不亡日白不温明不動辟諐公行茲謂不伸厥異日黒大風起天無雲日光晻不難上政茲謂見過日黒居仄大如彈丸辟不聞道茲謂亡厥異日赤祭天不順茲謂逆厥異日赤其中黒聞善不予茲謂失知厥異日黄色不虗改形不虗毁觀日之五變足以監矣又曰君弱婦彊為陰所乘則月並出晦而月見西方謂之朓朔而月見東方謂之仄慝則侯王其肅朓則侯王其舒京房易傳朓者疾也君舒緩則臣驕慢故日行遲月行疾也仄慝者不進之意君肅急則臣恐懼故日行疾月行遲也不舒不急以正失之者食朔日劉向洪範傳舒者侯王展意顓事臣下促急月行疾肅者侯王縮朒不任事臣下㢮縱月行遲當春秋時侯王縮朒不任事故食二日仄慝者十八食晦舊朓者一此其效也此皆謂日月亂行者也劉歆洪範傳星辰逆行魯文公十四年七月有星孛入于北斗魯昭公十七年冬有星孛于大辰齊景公三十二年十二月彗星見魯哀公十三年冬十一月有星孛于東方魯哀公十四年有星孛魯莊公七年四月辛夘夜恒星不見夜中星隕如雨魯僖公十六年正月朔隕石于宋五是月六鶂退飛過宋都魏惠王十二年彗星見星墜有聲秦昭襄王二年彗星見四年彗星見十一年彗星見始皇帝七年彗星先出東方見北方五月見西方已而彗星復見西方十六日九年彗星見或竟天又見西方又見北方從斗以南八十日十三年正月彗星見東方三十三年明星出西方三十六年有墜星下東郡至地為石或刻其石曰始皇帝死而地分孛者惡氣所生孛孛有所妨蔽闇亂不明之貌北斗大國象大辰心也心為明堂天子之象常星二十八宿人君之象衆星萬民之類也列星不見象諸侯㣲也衆星隕墜民失其所也董仲舒繁露君不任賢厥妖天雨星又曰距諌自彊茲謂郤行厥異鶂退飛適當黜則鶂退飛京房易傳君臣亂于朝政令虧于外則上濁三光之精五星贏縮變色逆行甚則為孛又曰石陰類五陽數自上而隕陰而陽行欲髙反下也石金同類色白近白祥也鶂水鳥六陰數退飛欲進反退也色青青祥也劉向洪範傳斗天之三辰綱紀星也彗所以除舊布新也大辰房心尾也晝象中國夜象夷狄夜明故常見之星不見象中國㣲也明雨與星隕兩變相成也劉歆洪範傳按戾徳致災禍敗應慝致之之繇不一應之之端亦不一也今削其應而著其繇葢欲先事而樹防焉故故附諸傳于羣類之末三代迄秦事亦隨類而增益之尚史卷九十五
