body:
  text: 尚史卷四十四列傳二十二鑲白旗漢軍李鍇撰晉諸臣傳韓萬韓簡韓厥獻子韓無忌公族穆子韓起宣子韓不信簡子韓湏子羽叔禽附韓襄叔椒韓萬者莊伯之弟曲沃武公之叔父也哀侯九年桓三年曲沃武公伐翼次于陘庭萬御戎梁𢎞為右逐翼侯于汾隰驂絓而止夜獲之遂并翼萬是為韓氏祖萬之孫韓簡簡為大夫恵公六年僖十五年秦伐我公逆秦師使簡視師復曰師少于我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎遂使請戰簡退曰吾幸而得囚及戰于韓原梁由靡御簡虢射為右輅秦伯將止之㑹公戎馬還濘而止慶鄭以救公誤之遂失秦伯秦反獲公以歸簡及諸大夫反首拔舎從之反首亂髪下垂拔舎拔草舎止秦伯使辭焉曰二三子何其慼也寡人之從君而西也亦晉之妖夢是踐狐突不寐而與神言故謂之妖夢豈敢以至諸大夫三拜稽首曰君履厚土而戴皇天皇天后土實聞君之言羣臣敢在下風初獻公筮嫁伯姬即穆姬于秦遇歸妺兌下震上歸妹之暌兌下離上暌史蘇占之曰不吉為雷為火為嬴敗姬及公在秦曰先君若從史蘇之占吾不及此夫簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗徳及可數乎言先君當致喪敗之徳及今可一二數之乎詩曰下民之孽匪降自天僔沓背憎職競由人左傳厥者萬之𤣥孫子輿之子韋昭注作子鎮是為韓獻子也少為趙盾所待養及長言于靈公以為司馬景公三年宣十二年楚圍鄭荀林父救之及河聞鄭及楚平林父欲還先縠即彘子不可以中軍佐濟厥謂林父曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎師遂濟楚敗我師于邲九年成二年齊伐魯敗衛郤克救魯衛與齊師戰于鞌齊師敗績厥夢子輿謂己曰且辟左右故中御而從齊侯自非元帥御者皆居中将在右厥辟左右故居中邴夏曰射其御者君子也齊侯曰謂之君子而射之非禮也射其左越于車下射其右斃于車中綦母張晉大夫喪車從厥曰請寓乘從左右綦母張既喪其車欲從厥左右而載皆肘之使立于後厥俛定其右右被射仆車中故俯安隠之逢丑父與齊侯易位將及華泉驂絓于木而止厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隠且懼奔辟而忝两君臣辱戎士敢告不敏攝官承乏丑父使齊侯下如華泉取飲齊侯以免明年賞鞌之功作六軍以厥為卿為新中軍将齊侯來朝公享之齊侯視厥厥曰君知厥也乎齊侯曰服改矣戎朝異服言服改明識其人厥登舉爵曰臣之不敢愛死為两君之在此堂也十五年成六年晉人謀去故絳晉復命新田為絳故謂此故絳諸大夫皆曰必居郇瑕氏之地沃饒而近監國利君樂不可失也時厥將新中軍且為僕大夫即大僕公揖而入厥從公立于寢庭謂厥曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘羸困也于是乎有沈溺重膇之疾沈溺濕疾重膇足腫不如新田土厚水深居之不疾有汾澮二水名以流其惡且民從教十世之利也夫山澤林盬國之寶也國饒則民驕佚近寶公室乃貧不可謂樂公説從之遷于新田趙莊姬成公女趙朔妻譖趙同趙括並趙衰子于公十七年成八年殺趙同趙括以其田與祁奚厥言于公曰成季即趙衰之勲宣孟即趙盾之忠而無後為善者懼矣三代之令王皆數百年保天之禄夫豈無辟王頼前哲以免也周書曰不敢侮鰥寡所以明徳也乃立趙武而反其田景公薨事厲公厲公三年成十三年欒書為帥厥將下軍敗秦師于麻隧獲秦成差及不更女父皆秦大夫不更秦爵五年成十五年楚侵鄭衛欒書欲報楚厥曰無庸使重其罪民將叛之無民孰戰六年成十六年我伐鄭楚救之厥將下軍從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下諜輕兵也使諜距鄭伯車前而自後登其車以執之郤至曰傷國君有刑亦止七年成十七年欒書中行偃執厲公召厥厥辭曰昔吾畜于趙氏孟姬即趙荘姬之讒吾能違兵言晉討趙氏厥去其兵示不與黨古人有言曰殺老牛莫之敢尸而況君乎二三子不能事君焉用厥也國語欒書中行偃圍公于匠麗氏召韓獻子獻子辭曰殺君以求威非吾所能為也威行為不仁事廢為不知享一利亦得一惡非所務也中行偃欲伐之欒書曰不可其身果而辭順順無不行果無不徹犯順不祥伐果不克夫以果戾順行民不犯也吾雖欲攻之其能乎乃止明年悼公即位厥將中軍為政㑹楚伐宋宋來告急厥曰欲求得人必先勤之成霸安疆自宋始矣公救宋楚師還悼公元年襄元年厥帥諸侯之師伐鄭入其郛敗其徒兵于洧上于是東諸侯之師齊魯曹邾杞次于鄫以待我師我師自鄭以鄫之師侵楚焦夷及鄭公及衛侯次于戚以為之援七年襄七年厥老子起嗣左傳厥卒諡曰獻子二無忌起起者厥之子宣子也起兄無忌是為公族穆子無忌為厥長子性鎮静而有廢疾悼公即位使為公族大夫使訓卿之子弟共儉孝弟國語無忌鎮静鎮静者修之則壹悼公七年襄七年厥告老將立無忌辭曰詩曰豈不夙夜畏行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘇晉賢人游而曰好仁詩曰靖共爾位好是正直神之聴之介爾景福恤民為徳正直為正正曲為直參和為仁如是則神聴之介福降之立之不亦可乎公謂無忌仁使掌公族大夫國語韓獻子老使公族穆子受事于朝辭曰厲公之亂無忌備公族不能死臣聞之曰無功庸者不敢居髙位今無忌知不能匡君使至于難仁不能救勇不能死敢辱君朝以忝韓宗請退也固辭不立起遂嗣為卿九年襄九年公㑹諸侯伐鄭起為上軍佐佐荀偃門于師之梁鄭城門鄭成乃盟于戲而還十三年襄十三年公蒐于緜上以治兵使起將上軍辭以趙武從之起如故悼公薨事平公平公三年襄十八年公圍齊起佐趙武以上軍圍盧弗克十二月伐雍門齊城門之荻侵濰及沂而還十年襄二十十五起如齊蒞盟十一年襄二十六年起聘于周王使請事對曰晉士起將歸時事于宰旅禮諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士無他事矣王聞之曰韓氏其昌阜于晉乎辭不失舊十二年襄二十七年宋向戍善于趙武又善于楚屈建欲弭諸侯之兵以為名來告趙武武謀諸諸大夫起曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣乃許之楚及齊秦皆許之夏六月盟于宋十七年昭元年趙武卒起将中軍為政明年使起如魯聘觀書于大史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也魯昭公享之季孫宿賦緜之卒章起賦角弓宿拜曰敢拜子之彌縫敝邑寡君有望矣宿賦節之卒章既享宴于季氏有嘉樹焉起譽之宿曰宿敢不封殖此樹以無忘角弓遂賦甘棠起曰起不堪也無以及召公遂如齊納幣聘少姜見公孫竈公孫蠆竈蠆見其二子旗與彊起曰皆非保家之主也不臣又聘于衛衛侯享之北宫佗賦淇澳起賦木瓜十九年昭三年少姜既卒齊侯使晏嬰請繼室于我曰君若不忘先君之好惠顧齊國則猶有先君之適及遺姑姊妹若而人言如常人君若不棄敝邑而辱使董振擇之董正振整也以備嬪嬙寡人之願也起使羊舌肹對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中制夫人之服葬訖君臣乃釋服是以未敢請君有辱命恵莫大焉若恵顧敝邑撫有晉國賜之内主豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之夏五月起如齊逆女公孫蠆為少姜之有寵也以其子更公女而嫁公子公子即公女變文也人謂起曰子尾即公孫蠆欺晉晉胡受之起曰我欲得齊而逺其寵寵將來乎二十一年昭五年起如楚送女楚子厚為之禮起反鄭伯勞諸圉鄭地辭不敢見禮也奉使君命未反故二十三年昭七年鄭國僑來聘㑹公寢疾夢黄熊起私問僑僑以鯀對起祀夏郊公有間國僑為豐施歸州田于起起受之以告公公以與起起初與趙武争州田見昭三年病有之以易原縣于宋樂大心宋大夫平公薨事昭公昭公元年昭十一年起㑹周單成公于戚六年昭十六年起如鄭聘鄭六卿餞起于郊起曰二三君子請皆賦起亦以知鄭志嬰齊賦野有蔓草起曰孺子善哉吾有望矣國僑賦鄭之羔裘起曰起不堪也游吉賦褰裳起曰起在此敢勤子至于他人乎游吉拜起曰子之言是不有是事其能終乎駟偃賦風雨豐施賦有女同車印癸賦蘀兮起喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣起皆獻馬焉而賦我將國僑拜使五卿皆拜曰吾子靖亂敢不拜徳起有環其一在鄭商起謁諸鄭伯國僑弗與買諸賈人僑又不可至是起私覲于僑以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜昭公薨事頃公頃公八年昭二十四年子朝亂周起徴會于諸侯明年㑹于黄父以定王室十二年昭二十八年秋起卒諡曰宣子韓非子韓宣子曰吾馬菽粟多矣甚臞何故寡人患之周市對曰使騶盡粟以食雖無肥不可得也名與多與之其實少雖無臞亦不可得也主不審其情實坐而患之馬猶不肥也子四須叔禽叔椒子羽叔禽以下名未詳須起之門子也周禮公卿之子入王端之左教之以六藝謂之門子又曰其正室皆謂之門子為公族大夫事平公平公十八年昭二年須如齊逆少姜叔禽以下事不載起卒而不信嗣卿盖湏前卒也無忌子襄平公時亦為公族大夫左傳不信字伯音起之孫簡子也事定公定公二年昭三十二年王使來請城成周魏舒使不信對曰天子有命敢不奉承以奔告于諸侯遲速衰序于是焉在冬十一月魏舒及不信如京師合諸侯之大夫于狄泉尋盟且令城成周不信與荀寅相惡十五年定十三年荀寅士吉射逐趙鞅不信卒諡曰簡左傳不信子庚是為莊子庚子虎是為康子見韓世家世本韓萬生賕伯賕伯生定伯簡簡生輿輿生獻子厥厥生宣子起起生平子頃史記韓之先與周同姓其後苗裔事晉得封于韓原曰韓武子武子後三世有韓厥從封姓為韓氏號為獻子獻子子宣子宣子徙居州宣子子貞子貞子徙居平陽貞子子簡子簡子子莊子莊子子康子康子子武子武二子景侯論曰厲公作慝書偃逃死晉之舊姓多不免者韓厥踦􅛤中立難矣崔杼且舍晏子中行氏又惡敢攻厥哉新田之遷艾安十餘葉詩曰逺猶辰告逺于羣議也夫韓氏大夫也卒正南面雖韓叔厚基予且慕公族穆子之仁也畢萬魏犫武子魏錡厨武子魏相吕宣子魏顆魏頡令狐文子魏絳莊子魏舒獻子魏戊孟丙賈辛樂霄司馬烏僚安附司馬彌年魏蔓多㐮子畢萬者畢公髙之子孫也仕于晉事獻公獻公十六年閔元年作二軍公將上軍大子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏三國皆姬姓賜畢萬魏以為大夫魏氏由是始萬之孫犫是為魏武子也初從文公出亡文公入即位四年僖二十七年公蒐于被廬作三軍以犫為右明年圍曹入之令無入僖負羈曹大夫之宫而免其族報施也初公過曹僖負羈饋盤飱置璧犫及顛頡怒曰勞之不圖報于何有爇僖負羈氏犫傷于胸公欲殺之而愛其材使問且視之病將殺之犫束胸見使者曰以君之靈不有寧也距躍三百曲踊三百距躍超越也曲踊跳踊也百猶勱也盖距地向前超躍越物者三勉勱而為之也乃舍之殺顛頡以徇左傳犫卒諡曰武子三錡顆絳錡者犫之子食邑于吕謂之吕錡又曰厨武子事景公景公三年宣十二年邲之役錡求公族未得而怒欲敗我師請致師弗許請使許之遂徃請戰而還楚潘黨逐之及熒澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給于鮮敢獻于從者潘黨去之㑹趙旃往楚子逐之遂乘我師我師敗績楚囚荀罃錡御荀首即知莊子荀罃之父射連尹襄老與公子榖臣以歸景公薨事厲公厲公六年成十六年鄢陵之役錡夢射月中之退入于泥占之曰姬姓日也異姓月也必楚王也射而中之退入于泥亦必死矣及戰射共王中目王召養由基使射錡中項伏弢而死謚曰武錡子相是為吕宣子厲公三年成十三年公使相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以昏姻天禍晉國文公如齊恵公入秦無禄獻公即世穆公不忘舊徳俾我恵公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊徳矣鄭人怒君之疆塲我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏静諸侯秦師克還無害則是我有大造于西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聴而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩搖我邊疆我是以有令狐之役康猶不悛入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不恵稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊陲我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車秦桓公子來命我景公曰吾與女同好棄惡復修舊徳以追念前勲言誓未就景公即世我寡君是以有令孤之會君又不祥背棄盟誓白狄及君同州君之仇讎而我之昏姻也君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心于狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聴命唯好是求君若恵顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大恵寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之左傳及悼公即位使相佐下軍曰邲之役吕錡佐知莊子于下軍獲楚公子榖臣與連尹襄老以免子羽即知罃鄢之役親射楚王而敗楚師以定晉國而無後其子孫不可不崇也國語已而卒謚曰宣顆者亦犫之子也事景公景公六年定十五年我滅赤狄而秦伐我次于輔氏公别遣顆距秦師公治兵于稷以略狄土立黎侯而還及雒顆敗秦師于輔氏獲杜囘秦之力人也初魏犫有嬖妾無子犫疾命顆必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜囘杜囘躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報左傳顆子頡是為令狐文子悼公即位使頡佐新軍曰昔克潞之役秦來圖敗晉功魏顆以其身郤退秦師于輔氏親止杜囘其勲盟于晉鐘至于今不育其子不可不興也國語頡卒諡曰文絳者犫之子莊子也悼公即位知絳勇而不亂使為司馬國語悼公三年襄三年公㑹諸侯同盟于雞澤公之弟揚干亂行于曲梁晉地絳戮其僕公怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無二志事君不辟難有罪不逃刑其將來辭何辱命焉言終絳至授僕人書將伏劒士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至于用鉞臣之罪重敢有不從以怒君心請歸死于司冦公跣而出曰寡人之言親愛也吾子之計軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請公以絳為能以刑佐民矣反役與之禮食使佐新軍四年襄四年無終子嘉父無終戎山國名使孟樂來因絳納虎豹之皮以請和諸戎公曰戎狄無親而貪不如伐之絳曰諸侯新服陳新來和將觀于我我徳則睦否則携貳勞師于戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠厖圉四子皆羿賢臣而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之寒棄之句夷羿之姓信而使之以為己相浞行媚于内而施賄于外愚弄其民而虞羿于田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆殺而烹之以食其子其子不忍食請死于窮門靡靡靡伯夏遺臣奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不徳于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼滅豷于戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官箴王闕于虞人之箴曰芒芒禹跡畫為九州經啟九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冐于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞箴如是可不懲乎于是公好田故絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄薦居貴貨易土土可賈焉一也邊鄙不聳懼也民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懐三也以徳綏戎師徳不勤甲兵不頓四也鑒于后羿而用徳度逺至邇安五也君其圖之公説使絳盟諸戎修民事田以時九年襄九年冬㑹諸侯伐鄭趙武及絳斬行栗表道樹也師于汜鄭恐乃行成冬十一月同盟于戲而還十二月復伐之門其三門濟于陰阪鄭外邑次于陰口鄭地而還公歸謀所以息民絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更以幣易牲賓以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭三駕三興師謂魯襄十年師于牛首十一年師于向其秋觀兵于鄭東門十年襄十年諸侯之師城虎牢而戍之我師城梧及制梧制皆鄭舊地士魴及絳戍之以偪鄭鄭及我平十一年襄十一年夏四月諸侯伐鄭秋九月復伐鄭觀兵于鄭東門鄭成賂公以師悝師觸師蠲皆樂師名廣車軘車淳十五乘廣車軘車皆兵車淳耦也相耦凡十五乘甲兵備凡兵車百乘歌鐘二肆肆列也縣鐘十六為一肆二肆三十二枚及其鎛磬女樂二八公以樂之半賜絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福禄攸同便蕃左右亦是帥從夫樂以安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福禄來逺人所謂樂也書曰居安思危逸書思則有備有備無患敢以此規公曰子之教敢不承命抑㣲子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之絳于是始有金石之樂十三年襄十三年士魴卒使絳佐下軍明年伐秦公待于竟使六卿帥諸侯之師以進荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶下軍帥曰晉國之命未是有也余馬首欲東乃歸下軍從之左史晉大夫謂絳曰不待中行伯乎絳曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也平公時欒黶卒絳為下軍帥黶子盈佐之平公二年襄公七年公㑹諸侯圍齊絳及欒盈以下軍克邿我師焚其雍門及四郭東侵及濰南及沂左傳絳卒諡曰莊子舒舒絳之子獻子也事平公初晉逐欒盈平公七年襄二十二年盈夜入曲沃帥曲沃之甲以晝入絳盈初佐魏絳于下軍舒私焉故因之士匄懼奉公以如固宫使子鞅逆舒則成列既乘將逆欒氏矣鞅趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子遂超乘命驅之士匄逆諸階執其手賂之以曲沃遂殺盈滅欒氏衛孫林父逐其君獻公獻公出奔齊十年襄二十五年公使舒及宛没逆衛獻公將使衛與之夷儀十七年昭元年荀呉伐無終及羣狄于太原崇卒也崇聚也將戰舒曰彼徒我車所遇又阨以什共車必克更增十人以當一車之用困諸阨又克請皆卒去馬為步卒自我始乃毁車以為行五乘為三伍乘車者車三人五乘十五人今去車更以五人為伍分三為伍荀呉之嬖人不肯即卒斬以徇為五陳以相離两于前伍于後專為右角參為左角偏為前距以誘之翟人笑之未陳而薄之大敗之平公薨事昭公昭公薨事頃公頃公十二年昭二十八年韓起卒舒為政是年滅祁氏羊舌氏分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為鄔大夫賈辛為祁大夫司馬烏即司馬督為平陵大夫魏戊舒庶子為梗陽大夫知徐吾知盈孫為塗水大夫韓固韓起孫為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝趙勝曽孫為平陽大夫僚安為楊氏大夫周子朝之亂賈辛司馬烏帥師納敬王事見魯昭二十二年至是舒謂其有力于王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者謂司馬彌牟孟丙樂霄僚安也皆受縣而後見于舒以賢舉也賈辛將適其縣見于舒舒曰辛來昔叔向適鄭鬷蔑惡貎醜也欲觀叔向從使之收器者而往立于堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不颺子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力于王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞舒之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後于晉國乎頃公薨事定公定公二年昭三十二年王使來請城成周舒及韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周明年舒涖政屬役于韓不信及原壽過周大夫而田于大陸焚焉還卒于甯左傳諡曰獻孫曼多嗣曼多卒諡曰襄子駒見魏世家世本畢萬生芒季芒季生武仲州武仲生莊子絳莊子生獻子荼獻子生簡子取取生襄子多襄子生桓子駒桓子生文侯斯史記晉文公令魏武子襲魏氏之後封列為大夫治于魏生悼子魏悼子徙治霍生魏絳徙治安邑魏絳卒謚為昭子生魏嬴嬴生魏獻子魏獻子生魏侈魏侈之孫曰魏桓子桓子之孫曰文侯都按史與左氏世本皆不同論曰吾聞善侑食者甘而後薦魏莊子之虞箴戒田逸書申備非善侑食者乎戮揚干以剛和戎以柔抑其次也書曰紹聞衣徳言舒衣絳徳是用能世尚史卷四十四
