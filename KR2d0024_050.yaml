body:
  text: 尚史卷五十列傳二十八鑲白旗漢軍李鍇撰宋諸臣傳夫人傳桓夫人桓夫人衛戴公之女弟也公子頑蒸于宣姜而生衛戴公及桓夫人左傳襄夫人襄夫人襄王之姊也昭公立夫人昭公祖母不禮焉夫人殺孔叔公叔鍾離大司馬公子卬皆昭公之黨也公子鮑昭公庶弟文公也美而艷夫人欲通之不可乃助之施昭公無道夫人使公田孟諸未至使帥甸攻而殺之鮑即位是為文公左傳襄公别有夫人前死襄公葬之醯醢百甕曾子曰既曰明器矣而又實之記檀弓共姬共公夫人共姬魯成公姊妹伯姬也為共公夫人共公六年成八年華元如魯聘共姬公孫夀如魯納幣七年成九年共姬歸于我夏魯季孫行父來致女平公三十三年襄二十年宋災共姬薨待姆也左傳棄平公妾元公母棄芮司徒女芮司徒宋大夫赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕夕見其母共姬共姬與之食公見棄也而視之尤姬納諸御嬖生佐及伊戾構大子痤大子縊而死佐為大子左師向戍見棄之步馬者步馬習馬也問之對曰君夫人氏也戍曰誰為君夫人余胡弗知圉人歸以告棄使饋之錦與馬先之以玉曰君之妾棄使某獻左師戍改命曰君夫人而後再拜稽首受之左傳元夫人元夫人字景曹小邾夫人女也夫人生女妻魯季孫意如見昭二十五年景公四十五年哀二十三年夫人薨季孫肥肥意如子夫人其外祖母使冉求弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也彌逺也有不腆先人之産馬使薦諸夫人之宰其可以稱旌繁乎左傳惠牆伊戾寺人伊戾姓惠牆為大子痤內師而無寵乎公嬖妾棄生佐惡而婉大子痤美而狼左師向戍亦畏而惡之平公二十九年襄二十六年楚客聘于晉過宋大子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內言內師不行恐內侍廢闕臣請往也遣之至則歇用牲加書徴之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何欲對曰欲速公使視之則信有焉問諸佐母棄與向戍則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣戍聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾左傳寺人栁寺人栁有寵于平公大子佐惡之右師華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族謂華臣也襄十七年奔衛既盟于北郭矣公使視之有焉于是華亥合比弟欲代右師乃與栁比從為之徴曰聞之久矣公逐合比使亥代之及平公薨大子佐立栁熾炭于位公將至則去之比葬又有寵左傳論曰語云木必腐乃生蠧嗟乎閹豎蝕國固不俟其腐也為間言疑事批骨肉而携之險𠂻柔外中隱而微是以能濟其欲也君子事君不有格之乃從而比之抑又何耶華亥之比栁也向戍責之曰宗子維城母俾城壞母獨斯畏女其畏哉嗟乎已墮城而不畏而遑人畏耶詩曰我躬不閲遑恤我後向戍之謂乎子寧從之僅以身免逆臣傳華督華督是為華父督戴公孫也為殤公大宰督見孔父之妻于路目逆而送之曰美而艷莊公元年桓二年督攻孔氏殺孔父而取其妻公怒督懼遂弒公殤公立十年十一戰民不堪命孔父為司馬督固因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召公子馮于鄭而立之以親鄭魯齊陳鄭皆有賂故遂相莊公莊公薨事閔公閔公十年莊十五年宋萬弒閔公遇督于東宫之西殺之左傳宋萬南宫牛猛獲附宋萬即南宫長萬也為宋大夫多力閔公十年莊十二年萬殺公于蒙澤遇仇牧亦宋大夫于門批而殺之遇大宰督又殺之立公子游羣公子奔蕭公子御說奔亳萬子南宫牛及猛獲帥師圍亳蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公即御說猛獲奔衛萬奔陳以乘車輦其母一日而至駕人曰輦宋去陳二百六十里我請猛獲于衛衛人歸之亦請萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之左傳叛臣傳魚石向為人鱗朱向􅙮魚府魚石目夷曽孫鱗朱矔之孫向為人向􅙮魚府皆桓族也共公十三年成十五年公薨于是魚石為左師向為人為大司冦鱗朱為少司冦向􅙮為大宰魚府為少宰華元為右師華喜為司徒公孫師為司城蕩山為司馬山弱公室殺公子肥文公子華元曰我為右司君臣之訓師所司也今公室卑而不能正吾罪大矣乃出奔晉魚石將止華元魚府曰右師反必討是無桓氏也石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀于宋也右師討猶有戍在桓氏雖亡必偏偏不盡也魚石自止華元于河上元請討許之乃反使華喜公孫師帥國人攻蕩氏殺山魚石向為人鱗朱向􅙮魚府出舍于睢上華元使止之不可元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登邱而望之則馳騁而從之則决睢澨閉門登陴矣五大夫遂奔楚平公三年成十八年鄭㑹楚伐宋納五大夫于彭城以三百乘戍之而還秋七月老佐華喜圍彭城華元如晉告急冬諸侯㑹于虛朾謀救宋四年襄元年諸侯圍彭城彭城降晉晉以五大夫歸置諸瓠邱左傳華亥向寧華定華費遂華貙華多僚華登華牼附華姓華豹華亥者右師華合比之弟也亥欲代合比為右師乃與寺人栁譖合比曰將納亡人華臣臣于襄十七年奔衛平公逐合比使代之亥見向戍戍曰女夫也必亡平公四十三年昭九年亥㑹諸侯之大夫㑹楚子于陳向寧者左師戍之子也元公八年昭十八年邾入鄅鄅夫人向戍之女也故寧請師九年昭十九年公伐邾取蟲書歸鄅浮華定者華椒孫司馬華弱之弟也為司徒平公三十二年襄二十九年定會諸侯之大夫城杞四十四年昭十年定如晉㑹葬元公二年昭十二年定如魯聘魯侯享之為賦蓼蕭弗知又不答賦魯叔孫婼曰必亡元公無信多私而惡華向元公十年昭二十年華亥華定與向寧謀曰亡愈于死先諸亥僞有疾以誘羣公子公子問之則執之又六月殺羣公子公如華氏請焉弗許遂劫公取大子欒母弟辰公子地以為質公亦取亥之子無戚寧之子羅定之子啓與華氏盟以為質亥與妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸亥患之欲歸公子寧曰唯不信故質其子若又歸之死無日矣公請于華費遂將攻華氏華費遂者亦華氏族為大司馬華貙華多僚華登並其子也費遂對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之華向奔陳華登奔吳登華向黨向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司冦華牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所華牼者亥庶兄也十一年昭二十二年華多僚與華貙相惡乃譖諸公曰貙將納亡人謂華亥等亟言之公曰司馬以吾故亡其良子謂華登死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何逺之有公懼使寺人召費遂之侍人宜僚飲之酒而使告費遂費遂歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之將行貙臣張丐殺多僚劫費遂以叛而召亡人華亥華定向寧自陳入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏宋師及齊師齊師適戍宋敗吳師于鴻口華登帥其餘以敗宋師宋師復攻之華氏北遂敗華氏于新里翟僂新者公臣也居于新里既戰說甲于公而歸華姓者亦華氏族也居于公里亦如之言新居新里而歸公姓居公里而歸華氏十一月公子城平公子昭二十年奔晉以諸侯之師救宋與華氏戰于赭邱公子城遇吕封人華豹豹亦華氏黨為吕邑封人城還豹曰城也城怒而反之射豹殪之大敗華氏圍諸南里亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋不幸而後亡使華登如楚乞師貙以車十五乘徒七十人犯師而出食于睢上哭而送之乃復入十二年昭二十二年楚請華氏諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之二月華亥華定向寧華貙華登出奔楚左傳華氏遂絶華貙字子皮嘗為少司馬華多僚為御史張丐别有傳按傳張丐劫司馬以叛而出亡不書華費遂蓋費遂由是而卒也傳無明文姑闕之公子地仲他石彄公子地景公母弟公子辰之兄也按傳于昭二十年書母弟辰于定十年又書母弟辰昭二十年當宋元公時定十年當宋景公時故杜預于昭二十年注曰辰地並元公弟于定十年注曰地景公弟辰之兄前後抵牾緣傳誤也今考經定公十年定公之弟辰及仲他石彄出奔陳斷其為景公弟元公十年昭二十年華向之亂華氏取景公及辰地以為質華向奔陳使華牼以歸景公十七年定十年公子地嬖蘧富獵十一分其室而以其五與之地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒扶魋而奪之魋懼將走公閉門而泣之目盡腫公子辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮下過出竟君必止子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處冬辰暨仲他石彄出奔陳仲他仲幾子石彄褚師假子皆宋卿也十八年定十一年辰暨仲他石彄公子地自陳于入蕭以叛大為宋患二十一年定十四年辰自蕭奔魯左傳樂大心樂大心樂溷之族父也嘗為右師居于桐門謂之桐門右師元公十一年昭二十一年華亥向寧自陳入于宋大心及豐愆華牼禦諸橫橫地名十二年昭二十二年華向出奔楚公使大心為右師十五年昭二十五年魯叔孫婼來聘大心見之語卑宋大夫而賤司城氏司城氏即樂祁犂婼告人曰右師其亡乎卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡夏大心㑹諸侯之大夫于黃父晉令輸王粟具戍人將納敬王大心曰我不輸粟我于周為客若之何使客晉士彌牟曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉命以㑹而背盟無乃不可乎大心不敢對受牒而退彌牟曰右師必亡欲背盟以干盟主無不祥大焉元公薨事景公樂祁犂卒于大行晉止其尸于州景公十六年定九年公使大心盟于晉且逆祁犂之尸辭僞有疾祁犂子溷曰右師將作亂不然無疾明年公逐大心大心出奔曺十八年定十一年公嬖向魋母弟辰公子地入于蕭以叛大心自曺入于蕭以從之左傳向巢向魋向巢向戍之曾孫也為左師事景公魋巢之弟也食邑于鞍為景公嬖大夫樂祁犂使晉卒晉止其尸于州景公十六年定九年使巢如晉盟且逆祁犂之尸二十八年哀六年巢帥師伐曺宋鄭之間有隙地曰彌作頃邱王暢嵒戈錫凡六邑鄭國僑與我為成曰勿有是及平元之族謂公子城母弟辰公子地自蕭奔鄭鄭人為之城嵒戈錫三十四年哀十二年巢伐鄭取錫殺元公之孫遂圍嵒鄭救嵒圍我師明年魋救其師鄭使徇曰得桓魋者有賞魋逃歸鄭取我師子嵒獲成歡郜延二子宋大夫以六邑為虛魋有寵而害于公公使夫人驟請享焉而將討之未及魋先謀公請以鞍易薄公曰不可薄宗邑也乃益鞍七邑而請享公焉以日中為期家備盡往公知之告皇野曰余長魋也今將禍余請即救司馬皇野曰不得左師不可請召之巢至公告之故拜不能起皇野曰君與之言公曰所難子者上有天下有先君對曰魋之不共宋之禍也敢不唯命是聽遂攻之詳皇野傳子頎子車皆魋弟也子頎騁而告魋欲入攻公子車止之曰不能事君而又伐國民不與也祗取死焉魋遂入于曺以叛公使巢伐之不能克欲質大夫以入焉不能亦入于曺取質魋曰不可既不能事君又得罪于民將若之何乃舍之曺民叛魋魋奔衛巢奔魯魋出于衛地衛公文氏攻之求夏后氏之璜焉與之他玉而奔齊陳恆使為次卿初衛大叔齊奔宋臣于魋納美珠焉與之城鉏公求珠魋不與由是得罪左傳論曰在小雅沔水之詩曰嗟我兄弟邦人諸友莫肯念亂誰無父母大雅蕩之詩則曰不明爾德時無背無側爾德不明以無陪無卿夫宋之華向魚樂出自戴桓皆所謂兄弟諸友也所謂背側陪卿也自共厯景所更四君而叛亂相屬敗德于上興亂于下君臣胥失何以為國夫宋固微子之國也恪慎克孝用能嗣殷不鑒于啓而鑒于受惑亦甚矣家臣傳張丐鄭翩干犫宜僚附張丐鄭翩並華貙臣干犫華豹之御也元公十一年昭二十一年華多僚貙弟譛華貙公使司馬華費遂貙父之侍人宜僚告費遂謀逐貙將使田孟諸而遣之飲之酒厚酬之賜及從者費遂亦如之張丐尤之曰必有故使貙承宜僚以劒而訊之宜僚盡以告丐欲殺多僚貙曰司馬老矣登之謂甚登亦貙弟華向之亂登奔吳在昭二十年吾又重之不如亡也夏五月貙將見費遂而行則遇多僚御費遂而朝張丐不勝其怒遂與貙白任鄭翩殺多僚劫司馬以叛而召亡人遂殺多僚召華向華向入以南里叛華登以吳師救華氏宋師敗之㑹公子城平公之子以諸侯師至救宋戰于赭邱鄭翩願為鸛其御願為鵝鸛鵝皆陳名干犫御華豹張丐為右向宜向戍子御公子城莊堇莊朝子為右相遇城還豹曰城也城怒而反之將注注傅矢豹則關矣城曰平公之靈尚輔相余豹射出其間將注則又關矣城曰不狎鄙狎更射也豹抽矢城射之殪張丐抽殳而下城射之折股扶伏而擊城扶伏與匍匐同折軫城又射之死干犫請一矢城曰余言女于君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏左傳陳寅陳寅樂祁犂之宰也景公十三年定六年祁犂言于公曰諸侯唯我事晉今不往晉其憾矣祁犂告寅寅曰必使子往他日公使之往寅曰子立後而行吾室亦不亡唯君亦以我唯知難而行也見溷祁犂子而行晉趙鞅逆而飲之酒獻楊楯六十于鞅寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志于宋晉果執樂祁犂十五年定八年將歸祁犂士鞅私謂之曰寡君懼不得事宋君是以止子子姑使溷代子祁犂告寅寅曰宋將叛晉是棄溷也不如待之祁犂歸卒于大行左傳尚史卷五十
