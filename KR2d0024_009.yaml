body:
  text: 尚史卷九世家二鑲白旗漢軍李鍇撰魯世家下成公成公名黑肱宣公子元年春正月公即位二月葬宣公三月作邱甲周禮十六井為邱出戎馬一匹牛三頭四邱為甸出長轂一乘戎馬四匹牛十一頭甲士三人步卒七十二人今使邱出甸賦夏臧孫許及晉侯盟于赤棘齊將出楚師秋王師敗績于茅戎來告敗二年春齊侯伐我北鄙取龍遂侵巢邱夏六月季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉衛曺及齊侯戰于鞍齊師敗績秋七月及齊國佐盟于袁婁公會晉師于上鄍賜三帥郤克士燮欒書也先路三命之服司馬司空輿帥侯正亞旅皆受一命之服八月取汶陽田晉使齊歸我初宣公求好于楚莊王卒宣公薨不克作好公即位受盟于晉會晉伐齊故楚救齊冬楚師侵衛遂侵我師于蜀使臧孫許往辭曰楚固將退矣楚侵及陽橋仲孫蔑請往賂之以執斫執針織紝皆百人公衡成公子為質以請盟楚人許平冬十一月公會楚公子嬰齊于蜀丙申公及諸侯之大夫楚秦宋陳衛鄭齊曺邾薛鄫盟于蜀楚師及宋公衡逃歸三年春正月公會諸侯晉宋衛曺伐鄭二月新宫災宣公廟三日哭夏公如晉拜汶陽之田秋叔孫僑如帥師圍棘汶陽田之邑棘不服故冬十一月晉侯使荀庚來聘衛侯使孫良夫來聘并尋宣七年盟丙午及荀庚盟丁未及孫良夫盟四年春宋公使華元來聘宋共公立通嗣君也三月杞伯來朝夏四月臧孫許卒公如晉晉侯見公不敬秋公至自晉欲求成于楚而叛晉季孫行父諫乃止冬城鄆五年春正月杞叔姬來歸仲孫蔑如宋報華元也夏叔孫僑如會晉荀首于榖冬十一月定王崩子簡王立十二月公會諸侯晉齊宋衛鄭曺邾杞同盟于蟲牢鄭服也六年春二月立武宫以鞍之功取鄟附庸國夏六月邾子來朝公孫嬰齊如晉秋仲孫蔑叔孫僑如帥師侵宋晉命也冬季孫行父如晉賀遷新田七年夏五月曺伯來朝秋楚伐鄭公會諸侯晉齊宋衛曺莒邾杞救鄭八月同盟于馬陵尋蟲牢盟且莒服故八年春晉侯使韓穿來言汶陽之田歸之于齊公孫嬰齊如莒宋公使華元來聘聘共姬夏宋公使公孫夀求納幣秋七月天王使召伯來賜公命諸侯即位天子賜以命圭與之合瑞冬十月杞叔姬卒晉侯使士燮來聘言伐郯也叔孫僑如會晉齊邾伐郯衛人伐媵媵宋共姬九年春正月杞伯來逆叔姬之喪以歸公會諸侯晉齊宋衛鄭曺莒杞同盟于蒲歸齊汶陽之田諸侯二故二月伯姬歸于宋夏季孫行父如宋致女晉人來媵冬十一月城中城十年夏五月公會諸侯晉齊宋衛曺伐鄭晉執鄭伯鄭立大子髠頑故伐鄭以歸其君晉景公卒秋公如晉晉人止公使送葬十一年春三月晉侯使郤犨來聘及郤犨盟晉人以公二于楚故止公公請受盟而後使歸故來聘且涖盟夏季孫行父如晉秋叔孫僑如如齊十二年夏公會諸侯晉衛于瑣澤宋合晉楚之成故十三年春晉侯使郤錡來乞師將伐秦也三月公如京師夏五月公自京師遂會諸侯晉齊宋衛鄭曺邾滕伐秦十四年秋叔孫僑如如齊逆女九月僑如以夫人婦薑氏至自齊十五年春三月仲嬰齊卒公會諸侯晉衛鄭曺宋齊邾同盟于戚討曺成公冬十一月叔孫僑如會諸侯之大夫晉齊宋衛鄭邾會吳于鍾離始通吳十六年夏晉伐鄭使欒黶來乞師鄭聞之使告于楚楚救鄭六月戰于鄢陵楚鄭敗績戰之日公出于壞隤會叔孫僑如通于穆薑成公母欲去季孫行父仲孫蔑而取其室將行穆薑送公使逐行父蔑公待于壞隤申宫警備設守而後行是以後僑如賂晉郤犨訴公于晉秋公會諸侯晉齊衛宋邾于沙隨謀伐鄭也晉侯不見公七月公會周尹子及諸侯晉齊邾伐鄭將行穆薑又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭請逆于晉師師至諸侯遷于制田又遷于潁上鄭宵軍之宋齊衛皆失軍叔孫僑如又譖季孟于郤犨九月晉人執季孫行父舍之于苕邱公還待于鄆使公孫嬰齊請行父于晉晉許魯平赦行父冬十月叔孫僑如出奔齊十二月季孫行父及晉郤犨盟于扈歸刺公子偃偃公庶弟與謀故魯殺大夫皆言刺義取周禮三刺之法十七年夏公會周尹子單子及諸侯晉齊宋衛曺邾伐鄭六月同盟于柯陵尋戚盟楚救鄭諸侯還九月晉侯使荀罃來乞師復伐鄭冬公會周單子及諸侯前諸侯伐鄭十月圍鄭楚救鄭諸侯還十八年春公如晉朝嗣君悼公晉侯使士丐來聘秋杞伯來朝八月邾子來朝築鹿囿公薨于路寢冬十二月葬成公左傳在位十八年諡曰成襄公襄公名午成公子成公十八年薨公即位年四嵗是年夏楚鄭侵宋納宋魚石入于彭城冬晉侯使士魴來乞師十二月仲孫蔑會諸侯晉宋衛邾齊同盟于虛朾謀救宋襄公元年春仲孫蔑會諸侯之大夫晉宋衛曺莒邾滕薛圍宋彭城夏晉伐鄭蔑會齊曺邾莒次于鄫以待晉師晉以鄫之師侵楚焦夷及陳秋九月簡王崩子靈王立邾子來朝冬衛公孫剽晉荀罃來聘二年夏五月齊薑薨襄公適毋秋七月仲孫蔑會諸侯之大夫晉宋衛曺邾于戚鄭叛晉故己丑葬齊薑齊侯使諸薑宗婦來送葬叔孫豹如宋冬仲孫蔑會諸侯之大夫晉齊宋衛曺邾滕薛小邾于戚遂城虎牢鄭人乃成三年春公如晉夏公及晉侯盟于長樗六月公會周單子及諸侯晉宋衛鄭莒邾齊同盟于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟四年夏叔孫豹如晉報荀罃聘秋七月定姒薨襄公母八月葬定姒冬公如晉請屬鄫許之邾人莒人伐鄫臧孫紇救鄫侵邾敗于狐駘五月夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉以成屬鄫也仲孫蔑衛孫林父會吳于善道秋九月公會諸侯晉宋陳衛鄭曺莒邾滕薛齊吳鄫于戚會吳也冬戍陳十一月楚伐陳公會諸侯晉宋衛鄭曺齊救陳季孫行父卒六年秋滕子來朝冬叔孫豹如邾聘莒滅鄫晉人來討季孫宿如晉見且聽命七年春郯子來朝夏四月小邾子來朝季氏城費季氏始強秋季孫宿如衛報公孫剽之聘冬十月衛使孫林父來聘壬戌及孫林父盟楚圍陳十二月公會諸侯晉宋陳衛曺莒邾于鄬以救陳八年夏五月季孫宿會諸侯及諸侯之大夫晉侯鄭伯齊宋衛邾于邢邱莒人伐我東鄙疆鄫田也冬晉侯使士丐來聘告將伐鄭九月夏季孫宿如晉報聘也五月穆薑薨于東宫成公母穆薑淫僑如故徙居東宫事在成十六年秋八月葬穆薑冬十月公會諸侯晉宋衛曺莒邾滕薛杞小邾齊伐鄭十二月同盟于戲公送晉侯晉侯宴公于河上問公年季孫宿對曰會于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也嵗星十二嵗一周天國君十五嵗而生子冠而生子禮也大夫盍為冠具宿對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也十年春公會諸侯晉宋衛曺莒邾滕薛杞小邾齊會吳于柤夏五月遂滅逼陽妘姓國秋七月楚鄭侵我西鄙還克蕭宋邑莒人伐我東鄙公會諸侯前諸侯伐鄭諸侯之師城虎牢而戍之會楚救鄭諸侯之師還鄭而南至陽陵侵鄭北鄙而歸十一年春正月季孫宿作三軍三分公室而各有其一夏四月公會諸侯前諸侯伐鄭鄭成秋七月同盟于亳城北楚鄭伐宋九月公會諸侯前諸侯復伐鄭鄭成冬十二月會于蕭魚十二年春莒人伐我東鄙圍台季孫宿救台遂入鄆夏晉士魴來聘且拜師冬公如晉朝且拜聘十三年夏取邿小國邿亂分為三遂取之冬城防十四年春正月季孫宿叔老會諸侯之大夫晉齊宋衛鄭曺莒邾滕薛杞小邾會吳于向為吳謀楚也夏四月叔孫豹會諸侯之大夫晉齊宋衛鄭曺莒邾滕薛杞小邾伐秦衛孫林父出其君獻公立公孫剽公使厚孫瘠弔于衛衛侯在萊臧孫紇如齊唁冬季孫宿會諸侯之大夫晉宋衛鄭莒邾于戚謀定位也十五年春宋向戍來聘二月及向戌盟于劉夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹城成郛秋邾人伐我南鄙十六年春三月公會諸侯晉宋衛鄭曺莒邾薛杞􅘁邾于溴梁戊寅大夫盟齊侯伐我北鄙夏五月叔老會鄭伯及晉衛宋伐許秋齊侯伐我北鄙圍郕冬叔孫豹如晉聘且言齊故十七年秋齊侯伐我北鄙圍桃髙厚伐我北鄙圍防冬邾人伐我南鄙為齊故十八年春白狄來秋齊師伐我北鄙冬十月公會諸侯晉宋衛鄭曺莒邾滕薛杞小邾同圍齊平隂齊師遁十一月入平隂遂東侵及濰南及沂十九年春正月諸侯前諸侯盟于祝柯晉人執邾子以其伐我故遂次泗上疆我田取邾田自漷水歸之于我晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉侯奄皆受一命之服賄荀偃束錦加璧乘馬先吳夀夢之鼎季孫宿如晉拜師宿作林鐘銘魯功秋八月仲孫蔑卒冬城西郛叔孫豹會晉士丐于柯城武城懼齊也二十年春正月仲孫速會莒人盟于向及莒平夏六月公會諸侯晉齊宋衛鄭曺莒邾滕薛杞小邾盟于澶淵秋仲孫速伐邾叔老如齊冬季孫宿如宋報十五年向戍之聘二十一年春正月公如晉拜師及取洙田邾庶其以漆閭邱來奔冬十月曺伯來朝公會諸侯晉齊宋衛鄭曺莒邾于商任欒盈亂晉出奔會商任錮欒氏也二十二年春臧孫紇如晉秋七月叔老卒冬公會諸侯晉齊宋衛鄭曺莒邾薛杞小邾于沙隨復錮欒氐二十三年夏邾畀我庶其之黨來奔秋八月叔孫豹救晉次于雍榆欒盈復入故仲孫速卒冬十月臧孫紇出奔邾紇為季孫宿立少子紇而廢長子彌仲孫速之卒也彌詭立速之少子羯而出孺子秩與羯搆臧孫紇于季孫季孫怒攻臧氏二十四年春叔孫豹如晉仲孫羯侵齊為晉報齊秋公會諸侯晉宋衛鄭曺莒邾滕薛杞小邾于夷儀將伐齊水不克冬叔孫豹如京師齊人城郟豹聘且賀城大飢二十五年春齊崔杼伐我北鄙報羯之侵夏五月公會諸侯前諸侯于夷儀伐齊齊弒莊公請成許之秋七月諸侯同盟于重邱二十六年夏晉荀吳來聘將討衛六月公會諸侯之大夫晉宋鄭曺于澶淵衛孫林父逐獻公立殤公剽寧喜弒剽林父以戚叛晉討衛疆戚田執寧喜又執獻公二十七年春齊慶封來聘夏叔孫豹會諸侯之大夫晉楚蔡衛陳鄭許曺于宋宋向戍請于晉楚弭諸侯之兵秋七月豹及諸侯之大夫盟于宋二十八年夏邾子來朝秋八月仲孫羯如晉告將朝楚冬齊慶封來奔齊人來讓封奔吳十一月公如楚靈王崩經書十二月甲寅從告也子景王立二十九年公在楚適楚子卒楚人使公親禭公患之叔孫豹曰祓殯而禭則布幣也禮君臨臣喪乃祓殯乃使巫以桃茢先祓殯楚人弗禁既而悔之檀弓同夏六月仲孫羯會諸侯之大夫晉齊宋衛鄭曺莒滕薛小邾城把晉士鞅來聘拜城把杞子來盟吳子札來聘冬仲孫羯如晉報士鞅也三十年春正月楚薳罷來聘夏五月宋災共姬卒秋七月叔弓如宋葬宋共姬為宋災故諸侯之大夫謀歸宋財冬十月叔孫豹會諸侯之大夫晉齊宋衛鄭曺莒邾滕薛杞小邾于澶淵既而無歸于宋三十一年公自楚歸作楚宫夏六月公薨于楚宫左傳在位三十一年諡曰襄昭公昭公名禱襄公之庶子也襄公三十一年薨立胡女敬歸之子子野次于季氏是年秋九月卒毁瘠滅性立敬歸之娣齊歸之子稠是為昭公叔孫豹不欲曰年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂季孫宿不聽卒立之于是公十九年矣猶有童心比葬三易衰衰祍如故衰冬十月滕子來會葬癸酉葬襄公昭公元年春叔孫豹會諸侯之大夫晉楚齊宋衛陳蔡鄭許曺于虢尋宋盟也三月季孫宿伐莒取鄆莒人告于會楚請戮豹晉趙武請之乃免秋叔弓帥師疆鄆田二年春晉韓起來聘夏叔弓如晉報韓起也冬晉少薑晉平公妾卒公如晉晉辭曰非伉儷也公至河乃復季孫宿致服焉三年夏叔弓如滕葬滕成公秋小邾子來朝四年秋九月取鄫莒亂不撫鄫鄫叛而來冬十二月叔孫豹卒五年春正月舍中軍襄十一年作三軍今毁之初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟以父兄歸公孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公公如晉夏莒牟夷以牟婁及防兹來奔莒人訴于晉晉人欲止公士鞅不可乃歸公秋七月莒人來討叔弓敗諸蚡泉六年夏季孫宿如晉冬叔弓如楚聘且弔為吳所敗七年楚子成章華之臺願與諸侯落之大宰薳啓疆來召公春三月公如楚鄭伯勞于師之梁楚子享公于新臺好以大屈弓名既而悔之薳啓疆見公賀曰齊與晉越欲此久矣君其備禦三鄰公懼反之叔孫婼如齊涖盟夏四月晉人來治杞田恨公如楚故季孫宿以成與之冬十一月季孫宿卒八年夏四月叔弓如晉賀成虒祁宫秋搜于紅九年春叔弓及宋鄭衛會楚子于陳楚滅陳故秋仲孫貜如齊殷聘殷盛也冬築郎囿十年夏齊欒施來奔秋七月季孫意如叔弓仲孫貜伐莒取郠獻俘始用人于亳社九月叔孫婼如晉葬晉平公十一年春二月叔弓如宋葬宋平公夏五月齊歸薨昭公母大搜于比蒲仲孫貜會邾子盟于祲祥秋季孫意如會諸侯之大夫晉齊宋衛鄭曺把于厥憖楚圍蔡謀救之九月葬齊歸公不戚十二年夏宋華定來聘公如晉取郠之役莒人訴于晉晉辭公至河乃復公子憖遂如晉公子憖與南蒯謀季氏憖從公如晉南蒯以費叛冬十月憖出奔齊十三年春叔弓圍費弗克秋公會周劉子及諸侯晉齊宋衛鄭曺莒邾滕薛杞小邾于平邱邾莒訴于晉晉侯不見公使來辭八月同盟于平邱公不與盟晉執季孫意如以歸冬十月公如晉晉辭公至河乃復十四年春意如至自晉南蒯奔齊司徒老祁慮癸來歸費十五年春二月有事于武宫籥入叔弓卒去樂卒事冬公如晉平邱之會故晉人止公十六年夏公至自晉冬十月季孫意如如晉葬晉昭公十七年春小邾子來朝秋郯子來朝二十一年夏晉士鞅來聘秋八月叔輒卒冬公如晉晉將伐鮮虞辭公至河乃復二十二年春大搜于昌間夏四月景王崩立王子猛六月叔鞅如京師葬景王王子朝攻王猛王室亂冬十月王子猛卒是為悼王猛弟敬王丐立二十三年春正月取邾師于離姑邾訴于晉晉人來討叔孫婼如晉晉人執之癸丑叔鞅卒秋七月莒子庚輿來奔天王居于狄泉尹氏周世卿立王子朝敬王謂之東王子朝謂之西王冬公如晉為叔孫婼故及河有疾而復二十四年春二月仲孫貜卒婼至自晉二十五年春叔孫婼如宋聘且為季孫意如逆宋元夫人女季氏強故夏叔詣會諸侯之大夫晉宋衛鄭曺邾滕薛小邾于黃父謀王室也有鸜鵒來巢秋九月公居于長府伐季氏入之意如登臺而請弗許仲孫何忌伐公徒公孫于齊次于陽州左傳齊侯唁公于野井曰奈何君去魯之社稷公曰喪人不佞失守魯國之社稷執事以羞再拜顙慶見子家駒曰慶子免君于大難矣子家駒曰臣不佞陷君于大難君不忍加之以鈇鑕賜之以死再拜顙髙張執簞食與四脡脯國夏執壺漿曰吾寡君聞君在外餕饔未就敢致糗于從者公曰君不忘先君延及喪人錫之以大禮再拜稽首以袵受髙張曰有夫不祥君無所辱大禮公蓋祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰敢固以請公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰請以饗乎從者公曰喪人其何稱景公曰孰君而無稱公于是噭然而哭諸大夫皆哭既哭以人為災以幦為席以鞍為几以遇禮相見孔子曰其禮與其辭足觀矣公羊康成注災周埒垣所以别內外衛威儀也幦車覆笭即式也晏子昭公棄國走齊齊公曰君何年之少而棄國之蚤乎公曰人愛我者吾不能親人諫我者吾不能用輔拂無一人諂諛者甚衆譬猶秋蓬也孤其根而美枝葉秋風一至根且拔矣景公以語晏子曰使是人反國豈不為賢君乎對曰不然夫愚者多悔不肖者自賢溺者不問墜迷者不問路溺而後問墜迷而後問路譬猶臨難而鑄兵噎而掘井雖速亦無及矣二十六年春三月公至自齊居于鄆夏齊侯將納公使公子鉏帥師從公圍成師及齊師戰于炊鼻秋公會諸侯齊莒邾杞盟于鄟陵謀納公也七月晉知躒趙鞅帥師納王公至自會居于鄆冬十月天王入于成周王子朝奔楚二十七年春公如齊公至自齊居于鄆秋諸侯之大夫晉宋衛曺邾滕會于扈令戍周且謀納公宋衛皆利納公固請之晉士鞅取貨于季孫辭以難仲孫何忌陽虎伐鄆謀奪公公徒敗于且知冬公如齊公至自齊居于鄆二十八年春公如晉次于乾侯齊卑公故二十九年春公至自乾侯居于鄆齊侯使髙張來唁公稱主君大夫稱主君比公于大夫也公如乾侯夏四月叔詣卒公以公衍為大子三十年春正月公在乾侯三十一年春正月公在乾侯晉侯將以師納公召季孫意如意如會晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君意如伏而對曰從君而歸固臣之願也敢有異心夏四月意如從荀躒如乾侯躒以晉侯之命唁公且曰意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難子家羈説公以一乘入魯師公欲從之衆從者脅公不得歸冬邾黑肱以濫來奔三十二年春正月公在乾侯取闞冬十一月仲孫何忌會諸侯之大夫晉齊宋衛鄭曺莒薛杞小邾于狄泉尋盟且令城成周十二月公薨于乾侯季孫意如問于榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃諡曰昭左傳在位二十四年在外八年前後三十二年定公定公名宋襄公之子昭公之弟也元年夏六月癸亥昭公之喪至自乾侯戊辰公即位秋七月葬昭公季孫使役如闞公墓將溝焉不使與先君同榮駕鵝説之乃止而葬公于墓道南孔子為司冦溝而合之昭公出故季孫意如禱于煬公九月立煬宫煬公伯禽子其廟已毁禱于煬公而昭公死于外故立其宫二年夏五月雉門及兩觀災冬十月新作雉門及兩觀三年春正月公如晉至河乃復冬仲孫何忌及邾子盟于拔四年春三月公會周劉子及諸侯晉宋蔡衛陳鄭許曺莒邾頓胡滕薛杞小邾齊于召陵侵楚夏五月公及諸侯盟于皋鼬五年夏歸粟于蔡為楚圍故六月季孫意如卒秋七月叔孫不敢卒九月陽虎囚季孫斯意如子及公父歜而逐仲梁懷殺公何藐季氏族盟斯于稷門之內逐公父歜及秦遄皆奔齊六年春二月公侵鄭取匡夏季孫斯如晉獻鄭俘陽虎強使仲孫何忌往報夫人之幣陽虎又盟公及桓公于周社盟國人于亳社詛于五父之衢冬城中城季孫斯仲孫何忌圍鄆鄲二于齊故儋翩率王子朝之徒因鄭人以作亂十二月天王處于姑蕕七年春二月儋翩入于儀栗以叛齊人歸鄆陽關陽虎居之以為政秋大雩齊國夏伐我西鄙九月大雩冬十一月王入于王城八年春正月公侵齊二月公侵齊夏齊國夏伐我西鄙晉救我公會晉師于瓦秋九月季孫斯仲孫何忌侵衛陽虎欲去三桓冬十月順祀先公而祈焉正閔公僖公之位次欲以取媚辛巳禘于僖公壬辰將享季孫斯于蒲圃而殺之斯奔仲孫何忌殺陽越陽虎弟陽虎劫公與叔孫州仇伐孟氏陽氏敗虎如公宫取寶玉大弓入歡陽關以叛九年夏陽虎歸寶玉大弓六月伐陽關陽虎奔齊齊囚之奔宋遂奔晉十年春三月及齊平夏公會齊侯于夾谷齊人來歸鄆歡龜隂田叔孫州仇仲孫何忌圍郈郈馬正侯犯叛故秋及齊師復圍郈侯犯奔齊齊人致郈冬叔孫州仇如齊謝致郈十一年冬及鄭平始叛晉叔還如鄭涖盟十二年仲由為季氏宰將墮三都夏叔孫州仇墮郈季孫斯將墮費公山不狃費宰叔孫輒帥費人以襲魯公入于季氏之宫登武子之臺費人攻之弗克入及公側申句須樂頎下伐之費人北遂墮費將墮成公斂陽成宰不墮冬十二月公圍成弗克十三年夏築蛇淵囿大搜于比蒲十四年春衛公叔戍來奔戍富又夫人南子訴之夏衛北宫結來奔戌黨也晉荀寅士吉射叛晉晉圍朝歌五月公會齊侯衛侯于牽謀救范中行氏秋王使石尚來歸賑宋公之弟辰自蕭來奔大搜于北蒲邾子來會公城莒父及霄公助范氏故懼而城二邑十五年春正月邾子來朝夏五月郊壬申公薨于髙寢左傳在位十五年諡曰定哀公哀公名蔣定公之子定公十五年薨邾子來奔喪秋七月定姒薨九月滕子來會葬丁巳葬定公雨不克葬戊午日下昃乃克葬辛巳葬定姒冬城漆哀公元年春正月公即位夏四月郊冬仲孫何忌伐邾二年春二月季孫斯叔孫州仇仲孫何忌伐邾取漷東田及沂西田叔孫州仇仲孫何忌及邾子盟于句繹夏四月滕子來朝三年夏五月桓宫僖宫災季孫斯叔孫州仇城啓陽秋七月季孫斯卒冬十月叔孫州仇仲孫何忌圍邾四年夏城西郛六月亳社災五年春城毗冬叔還如齊閏月葬齊景公六年春城邾瑕城西郛毗邾瑕皆備晉也夏齊國夏及髙張來奔陳乞鮑牧攻之也叔還會吳于柤秋八月齊邴意兹來奔髙國黨冬仲孫何忌伐邾七年夏公會吳于鄫吳徵百牢與之秋公伐邾八月入邾邾衆保于繹師宵掠以邾子益來獻于亳社囚諸負瑕八年春三月吳伐我邾大夫茅夷鴻訴于吳故克武城東陽遂次于泗上吳人行成與盟而還夏五月齊伐我取歡及闡齊逆季姬季姬通于季魴侯我弗敢與故六月齊使入吳請師伐我乃歸邾子益于邾秋及齊平九月臧賔如如齊涖盟齊閭邱明來涖盟且逆季姬以歸冬十二月齊人歸歡及闡九年冬吳來警師伐齊齊與魯平辭師于吳吳反與魯謀伐齊十年春二月邾子益來奔公會吳子邾子郯子伐齊齊弒悼公乃還秋吳來復警師十一年春齊國書伐我師及齊師戰于郊左師入齊軍右師奔夏五月公會吳伐齊戰于艾陵齊師敗績獲齊國書公使大史固歸國書之元元首也置之新篋褽之以玄纁加組帶焉置書于其上曰天若不識不衷何以使下國秋修守備備齊也十二年春用田賦邱賦之法因其田財通出馬一匹牛三頭今以邱賦為不足又以田賦之田賦之者家一人也夏五月昭夫人孟子卒公會吳于槖皋吳請尋盟公辭秋公會衛侯宋皇瑗于鄖與衛宋盟而卒辭吳盟十三年夏公會周單子晉侯及吳子于黃池吳人將以公見晉侯子服何説之乃止既而悔之囚何以還及户牖乃歸何十四年春西狩獲麟小邾射大夫以句繹來奔夏四月叔還卒秋八月仲孫何忌卒十五年春正月成叛于齊成宰公孫宿叛仲孫彘伐成不克遂城輸冬及齊平十六年春正月衛侯輒來奔夏四月孔子卒十七年冬十二月公會齊侯盟于蒙齊侯稽首公拜齊人怒十九年冬敬王崩子元王立叔青如京師二十年夏會齊于廩邱為鄭故謀伐晉鄭辭秋師還二十一年夏五月越人始來秋八月公及齊侯邾子盟于顧齊人責稽首十七年蒙之盟因歌之曰魯人之皋數年不覺使我髙蹈唯其儒書以為二國憂言魯人皋緩據周禮不肯答稽首使齊邾髙蹈至此二十三年秋八月叔青如越越諸鞅來聘二十四年夏四月晉將伐齊來乞師臧石帥師會之取廩邱公子荆之母嬖立為夫人以荆為大子閏月公如越得大子適郢與大子相將也將妻公而多與之地季孫肥納賂焉乃止二十五年夏六月公至自越宴季孫肥仲孫彘于五梧飲酒不樂公與大夫始有惡二十六年夏五月叔孫舒會越人宋人納衛侯輒禇師比等逐之弗克入衛立悼公黚元王崩定王立二十七年春越后庸來聘且言邾田封于駘上使魯還邾田封竟至駘上二月盟于平陽夏四月季孫肥卒公弔焉降禮禮不備也公患三桓之侈也欲以越伐魯去三桓秋八月公如公孫有山氏因孫于邾乃遂如越國人施公孫有山氏施施罪也左傳國人迎公復歸薨于有山氏史記在位二十七年帝王世紀哀公元甲辰終庚午諡曰哀悼公元公穆公共公康公景公平公湣公傾公悼公名寧哀公子哀公薨年表作二十八年在定王二年悼公即位悼公之時三桓勝魯如小侯卑于三桓之家悼公十三年三晉滅知伯分其地有之年表作十四年在定王十六年二十七年定王崩考王立三十七年悼公薨年表作三十八年在考王十二年帝王世紀悼公四十年元辛未終庚戌徐廣注一作三十年又自悼公以下盡與劉歆厯譜合而反違年表其故未詳子嘉即位是為元公元公五年考王崩威烈王立元公二十一年薨年表亦作二十一年在威烈王十八年帝王世紀元辛亥終辛未子顯即位是為穆公系本顯作不衍穆公八年威烈王崩安王立穆公三十三年薨年表作三十一年在安王二十五年帝王世紀元壬申終甲辰子奮即位是為共公史記世家共王元年安王崩烈王立公及衛宋鄭君朝魏惠王惠王觴諸侯于范臺酒酣請公舉觴公興避席擇言曰昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂疏儀狄絶旨酒曰後世必有以酒忘其國者齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食之而飽至旦不覺曰後世必有以味忘其國者晉文公得南之威三日不聽朝遂推南之威而逺之曰後世必有以色亡其國者楚王登強臺而望崩山左江而右湖以臨倣徨其樂忘死遂盟強臺而弗登曰後世必有以髙臺陂池亡其國者今君之尊儀狄之酒也君之味易牙之調也左白台而右閭須並美人名南威之美也前夾林而後蘭臺強臺之樂也有一于此足以亡國今君兼此四者可無戒與惠王稱善相屬國䇿共公八年烈王崩顯王立共公二十二年薨年表作二十五年在顯王十七年帝王世紀元乙巳終丙寅子屯即位是為康公史記世家楚將伐齊魯親之齊王患之張丐齊人曰臣請令魯中立乃為齊見康公公曰齊王懼乎曰非臣所知也臣來弔足下君不與勝者而與不勝者何故也公曰子以齊楚為孰勝哉曰鬼且不知也然則何以弔寡人曰齊楚之權敵也不用有魯與無魯足下豈如全衆而合二國之後哉楚大勝齊其良士選卒必殪其餘兵足以待天下齊勝楚其良士選卒亦殪而君以魯衆合戰勝後此其為德也亦大矣其見德也亦大矣公以為然乃退師齊䇿康公九年薨年表作八年在顯王二十五年家王世紀元丁卯終乙亥子匽即位是為景公景公二十三年顯王崩慎靚王立景公二十九年薨年表亦作二十九年在慎靚王六年帝王世紀元丙子終甲辰子叔即位是為平公系夲叔作旅是年慎靚王崩赧王立是時六國皆稱王平公十二年秦惠王卒年表在赧王四年平公四年平公二十二年薨年表作十九年亦在赧王十九年帝王世紀元乙巳終甲子子賈即位是為湣公史記作文按前有文公不應同諡湣公七年楚懷王死于秦年表在赧王十九年湣公立之前一年湣公二十三年薨年表同帝王世紀元乙丑終丁亥子讐即位是為傾公年表作頃公傾公二年秦拔楚之郢楚頃襄王東徙于陳年表湣十八年秦拔郢楚走陳在赧王三十七年十七年赧王崩周亡十九年楚伐我取徐州年表傾公十八年取魯魯君封于莒二十四年楚考烈王伐滅魯傾公亡遷于卞邑為家人魯絶祀傾公卒于柯魯起周公至傾公凡三十四世史世家贊曰韓宣子觀魯春秋曰周禮盡在魯吳公子札觀周樂有觀止之歎魯國禮樂之國也然自伯御毁防桓逆莊淫閔僖以下弒君奪適踵相接蕩君臣之檢墮男女之倫無惑乎昭哀旅食民若固然由來久矣若乃丹楹刻桷卜郊逆祀築垣自踰莫魯為甚而區區稽首守而弗失魯人之皋所以來齊人之誚也尚史卷九
