body:
  text: 尚史卷三本紀二鑲白旗漢軍李鍇撰夏本紀禹伯禹夏后氏姒姓也父鯀顓頊五世孫漢書顓頊五世而生鯀大戴禮記顓頊産鯀鯀産文命是為禹史記夏禹名文命禹父曰鯀鯀父曰顓頊二説非是今從漢書書曰文命敷于四海其曰名文命者亦非是鯀娶有辛氏女謂之女志是生高密高密者即伯禹也世本大戴禮記同吳越春秋鯀娶有莘氏女曰女嬉年壯未孳嬉于砥山得薏苡吞之意若為人所感因而妊孕剖脅而産高密家于西羌地方石紐隨巢子禹産于崑石帝王世紀伯禹父鯀妻修已見流星貫昴夢接意感又吞神珠薏苡胸拆而生禹于石􅀈虎鼻大口兩耳參漏首戴鈎鈴胸有玉斗足文履已故名文命字高密身長九尺二寸長于西羌宋書符瑞志同淮南子禹耳參漏是謂大通論衡禹母吞薏苡而生禹故夏姓曰姒當帝堯之時鴻水滔天浩浩懷山襄陵下民其憂堯求能治水者四嶽曰鯀可于是堯聽嶽用鯀九年功用不成及舜登用攝天子之政巡狩行視鯀之治水無狀乃殛鯀于羽山以死舜舉禹使續鯀之業禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度稱以出亹亹穆穆為綱為紀禹傷先人父鯀功之不成受誅乃勞身焦思居外八年史記曰十三年吳越春秋曰七年尸子曰十年過家門不敢入陸行乘車水行乘船泥行乘撬撬形如船兩頭微起人曲一腳泥上擲進用拾泥上之物山行乘檋檋車似鐵如錐頭施之履下以上山不蹉跌左準繩右規矩載四時以開九州通九道陂九澤度九山禹乃行相地宜所有以貢及山川之便利自冀州始史記帝王世紀禹其父既放降在匹庶而舜進之堯堯以為司空繼鯀治水乃勞身涉勤不重徑尺之璧而愛日之寸隂手足胼胝故世傳禹病偏枯足不相過今巫傳禹步是也法言姒氏治水土而巫步多禹尚書大傳禹其跳其跳者踦也鹽鐡論禹蹙洪水身親其勞澤行路宿過門不入當此之時簮墮不掇冠挂不顧吳越春秋禹傷父功不成循江泝河盡濟淮乃勞身焦思以行七年聞樂不聽過門不入冠挂不顧履遺不躡尸子古者龍門未開吕梁未鑿河出于孟門之上大溢逆流禹於是疏河決江十年不窺其家手不爪脛不生毛偏枯之病步不相過人曰禹步禹敷土隨山刋木奠高山大川冀州既載壺口經始治之謂之載治梁及岐既修太原至于嶽陽覃懷底績至于衡漳厥土惟白壤厥賦惟上上錯厥田惟中中恆衛既從大陸既作島夷皮服夾右碣石入于河濟河惟兖州九河既道雷夏既澤灉沮會同桑土既蠶是降邱宅土厥土黑墳厥草惟繇厥木惟條厥田惟中下厥賦貞貞正也兖賦最薄言君天下者以薄賦為正也作十有三載乃同兖當河下流之衝被害尤劇水患雖平而卑濕沮洳未必盡去必作治十有三載然後賦法同于他州此為田賦而言先儒以為禹治水所歷之年且謂此州治水最是後畢州為第九成功因謂賦亦第九與州正為相當其説非是厥貢漆絲厥篚織文浮于濟漯達于河海岱惟青州嵎夷既略濰淄其道厥土白墳海濵廣斥厥田惟上下厥賦中上厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧厥篚檿絲浮于汶達于濟海岱及淮惟徐州淮沂其乂蒙羽其藝大野既豬東原底平厥土赤埴墳草木漸包厥田惟上中厥賦中中厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚元纎縞浮于淮泗達于河淮海惟揚州彭蠡既豬陽鳥攸居三江既入震澤底定篠簜既敷厥草惟夭厥木惟喬厥土惟塗泥厥田惟下下厥賦下上上錯厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢沿于江海達于淮泗荆及衡陽惟荆州江漢朝宗于海九江孔殷沱潛既道雲土夢作乂厥土惟塗泥厥田惟下中厥賦上下厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛三邦底貢厥名包匭菁茅厥篚元纁璣組九江納錫大龜浮于江沱潛漢逾于洛至于南河荆河惟豫州伊洛瀍澗既入于河滎波既豬導荷澤被孟豬厥土惟壤下土墳壚厥田惟中上厥賦錯上中厥貢漆枲絺紵厥篚纎纊錫貢磬錯浮于洛達于河華陽黑水惟梁州岷嶓既藝沱潛既道蔡蒙旅平和夷底績厥土青黎厥田惟下上厥賦下中三錯厥貢璆鐵銀鏤砮磬熊羆狐狸織皮西傾因桓是來浮于潛逾于沔入于渭亂于河黑水西河惟雍州弱水既西涇屬渭汭漆沮既從灃水攸同荆岐既旅終南惇物至于鳥鼠原隰底績至于豬野三危既宅三苗丕敘厥土惟黃壤厥田惟上上厥賦中下厥貢惟球琳琅玕織皮崑崙析支渠搜西戎即敘浮于積石至于龍門西河會于渭汭以上定九州導岍及岐至于荆山逾于河壺口雷首至于太嶽底柱析城至于王屋太行恆山至于碣石入于海西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾導嶓冡至于荆山內方至于大别岷山之陽至于衡山過九江至于敷淺原以上隨山導弱水至于合黎餘波入于流沙導黑水至于三危入于南海導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海岷山導江東别為沱又東至于澧澧音禮與前後澧水異過九江至于東陵東迤北會為滙東為中江入于海導沇水東流為濟入于河溢為滎東出于陶邱北又東至于荷又東北會于汶又北東入于海導淮自桐柏東滙于泗沂東入于海導渭自鳥鼠同穴東會于灃又東會于涇又東過漆沮入于河導洛自熊耳東北會于澗瀍又東會于伊又東北入于河以上濬川九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同六府孔修庶土交正底慎財賦咸則三壤成賦中邦錫土姓祇台台音怡我也德先不距朕行五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米五百里侯服百里采二百里男邦三百里諸侯五百里綏服三百里揆文教二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南暨聲教訖于四海禹錫元圭告厥成功尚書書序禹别九州隨山濬川任土作貢吕氏春秋禹東至搏木之地日出九津青羌之野攢樹之所捪天之山鳥谷青邱之鄉黑齒之國南至交址孫朴續樠之國丹粟漆樹沸水漂漂九陽之山羽人祼民之處不死之鄉西至三危之國巫山之下飲露吸氣之民積金之山共肱一臂三面之鄉北至人正之國夏海之窮衡山之上犬戎之國夸父之野禺疆之所積石之山不憂懈墮憂其黔首以求賢人欲盡地利得陶化益真窺橫革之交五人佐禹故功績銘乎金石著于盤盂又曰禹入祼國祼入衣出因也又曰禹通三江五湖決伊闕溝回陸注之東海因水之力也墨子禹治天下西為西河漁竇以泄渠孫皇之水北為防原𣲖注后之邸呼池之竇灑為底柱鑿為龍門以利燕代胡貉與西河之民東為漏之陸防蓋諸之澤灑為九澮以楗東土之水以利冀州之民南為江漢淮汝東流之注五湖之處以利荆楚越與南夷之民淮南子舜之時共工振滔洪水以薄空桑龍門未開吕梁未發江淮通流四海溟涬民皆上邱陵赴樹木舜乃使禹疏江湖闢伊闕道瀍澗平流溝陸流注東海鴻水漏九州乾萬民皆寧其性又曰禹沐霪雨櫛扶風決江疏河鑿龍門闢伊闕修彭蠡之防乘四載隨山刊木平治水土定千八百國又曰禹之時天下大水禹身執虆垂以為民先剔河而道九岐鑿江而通九路辟五湖而定東海當此之時燒不暇撌濡不給扢死陵者葬陵死澤者葬澤故節財薄葬簡服生焉新書大禹曰民無食也則我弗能使也功成而不利于民我弗能勸也故環河而導之九牧鑿江而導之九路登五湖而定東海民勞矣而弗苦者功成而利于民也遂刻石書名山之巔衡山記其辭曰承帝曰嗟􅀈輔佐卿洲渚與登鳥嘼之門參身宏流而明發爾興久旅忘家宿嶽麓庭智營形析心罔弗辰往來平定華嶽太衡宗疏事裒勞餘仲禋鬱塞昏徙南瀆衍亨衣制食備萬國其寧竄舞永奔岣嶁碑吳越春秋九山東南天柱號曰委宛赤帝闕其巖之巔其書金簡青玉為字禹登衡嶽血白馬以祭不幸所求夢見繡衣男子自稱元夷蒼水使者謂禹曰欲得我書齋于黃帝巖嶽之下禹齋三月庚子登委宛山發金簡之書得通水之理乘四載以行遂巡行四瀆與益夔共謀山川脈理金玉所有鳥獸昆蟲之類及八方之民俗殊國異域土地里數使益疏而記之名之曰山海經使太章步東西豎亥度南北暢八極之廣旋天地之數于是東造絶迹西延積石南踰赤岸北過寒谷徊昆侖察六扈脈地理名金石寫流沙于西隅決弱水于北漢青泉赤淵分入洞穴通江東流至于碣石疏九河于潛淵開五水于東北鑿龍門闢伊闕平易相土觀地分州殊方各進有所納貢民去崎嶇歸于中國委宛一名玉笥山在會稽按禹至會稽非治水時惟越絶書云禹兩至會稽不足信也湘中記衡山有玉牒禹按其文治水遙望衡山如陳雲沿湘千里九向九背乃不復見荆州記禹登南嶽而祭之獲金簡玉字之書古嶽瀆經禹治水三至桐柏山驚風迅雷石號木鳴禹怒召集百靈授命夔龍桐柏千君長稽首請命禹因囚鴻冡氏商章氏兜氏盧氏犂婁氏乃獲淮渦水神名巫支祈善應對言語辨江淮之淺深原隰之逺近形若獮猴縮鼻高額青軀白首金目雪牙頸伸百尺力逾九象搏擊騰踔疾奔輕利倐忽間視不可久禹授之童律不能制授之烏木田不能制授之庚辰能制鴟脾桓胡水魅山靈木妖石怪奔號藂繞以幾千數庚辰持戟逐去頸鎖大索鼻穿金鈴徙之淮陽龜山足下淮永安流楚辭注禹治水時有神龍以尾畫導水徑所當決者因而治之拾遺記禹導川夷嶽黃龍曳尾于前元龜負青泥于後龜頷下有印文禹所穿鑿以青泥封記使龜印其上帝王世紀禹治水畢天賜元圭西戎渠搜國獻珍裘宋書符瑞志飛菟者神馬之名日行三萬里趹蹄者后土之獸自能言語禹治水勤勞天應其德而至十洲記禹治水既畢乃乘蹻車度弱水而到鐘山祠上帝于北阿歸大功于九天禹治水時羣説神怪略識一二不具録于是貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休左傳漢書禹貢九牧之金鑄如鼎象九州皆嘗鬺享上帝鬼神其空足曰鬲以象三德饗承天祐拾遺記禹鑄九鼎五以應陽法四以象隂數使工師以雌金為隂鼎雄金為陽鼎鼎中常滿以占氣象之休否夏桀之世鼎水忽沸及周將沒九鼎皆震墨子夏后開使蜚亷析金于山而陶鑄之于昆吾是使翁難雉乙卜于白若之龜曰鼎成三足而方不炊而自烹不舉而自藏不遷而自行以祭于昆吾之墟上乙又言兆之繇曰饗矣逢逢白雲一南一北一西一東九鼎既成遷于三國按啓鑄九鼎不知所本前編因之恐誤帝舜朝禹伯益臯陶相與語帝前史記禹曰后克艱厥后臣克艱厥臣政乃乂黎民敏德帝曰俞允若茲嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君禹曰惠迪吉從逆凶惟影響益曰吁戒哉警戒無虞罔失法度罔逰于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王禹曰於帝念哉德惟善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞帝曰俞地平天成六府三事允治萬世永賴時乃功帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功帝曰臯陶惟兹臣庶罔或干豫正汝作士明于五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司帝曰俾豫從欲以治四方風動惟乃之休帝曰來禹洚水警豫成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功豫懋乃德嘉乃丕績天之厯數在汝躬汝終陟元后人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽勿詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰毋惟汝諧正月朔旦受命于神宗堯廟也率百官若帝之初帝曰咨禹惟時有苗弗率汝徂征禹乃會羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆豫以爾衆士奉辭伐罪爾尚一乃心力其克有勳三旬苗民逆命益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道帝初于厯山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊栗瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格尚書韓詩外傳當舜之時有苗不服其不服者衡山在南岐山在北右洞庭之陂左彭蠡之水由此險也以其不服禹請伐之舜不許曰吾喻教猶未竭也久喻教而有苗氏請服吕氏春秋三苗不服禹請攻之舜曰以德可也行德三年而三苗服孔子聞之曰通乎德之情則孟門太行不為險矣隨巢子三苗大亂天命殛之夏后受命于元宫大神人面鳥身降而輔之司祿益食而民不飢司金益富而國家實司命益年而民不夭禹乃克三苗而神民不違墨子三苗大亂天命殛之日妖賔出雨血三朝龍生廟犬哭市夏氷地坼五榖變化民乃大振高陽乃命元宫禹親把天之瑞令以征有苗四電誘祗有神人面鳥身若瑾以侍扼矢有苗之祥苗師大亂后乃遂幾禹既已克有三苗焉磨為山川别物上下卿制大極而神民不違天下乃靜於是天下皆宗禹之明度數禮樂史記禹興九韶之樂為山川神主帝薦禹于天為嗣十七年而帝崩三年喪畢禹辭辟舜之子商均于陽城天下諸侯皆去商均而朝禹禹遂即天子位南面朝天下國號曰夏后史記吳越春秋舜崩禪位命禹禹服三年形體枯稿面目黎黑讓位商均退處陽山之南隂河之北萬民不附商均就禹之所晝歌夜吟登高號呼曰禹棄我如何所戴禹三年服畢哀民不得已即天子之位符子舜禪夏禹于洞庭之野宋書符瑞志夏道將興青龍止于郊祝融之神降于崇山乃受舜禪其社用松祀户葬牆置翣其樂夏籥九成六佾六列六英其服尚青淮南子吕氏春秋禹之時天先見草木秋冬不殺禹曰木氣勝木氣勝故其色尚青其事則木禹立舉臯陶薦之臯陶卒舉益任之七年史記作十年禹東巡狩至于會稽而崩史記年百歲帝王世紀皇覽禹冡在山隂縣會稽山上山本名苗山去縣南七里越絶書禹憂民救水到大越上茅山大會計爵有德封有功更名茅山曰會稽及其王也巡狩大越見耆老納詩書審銓衡平斗斛因病亡死葬會稽葦棺桐槨穿壙七尺上無漏泄下無即水壇高三尺土階三等延袤一畝尚以為居之者樂為之者苦無以報民功教民鳥田一盛一衰當禹之時舜死蒼梧象為民田也禹至此者亦有因矣亦覆釡也覆釡者州土也填德也禹美而告至焉禹知時晏歲暮年加申酉求書其下祠白馬禹井井者法也以為禹葬以法度不煩人衆水經注會稽山上有禹廟大禹東巡崩于會稽因葬其地鳥為之耘春拔草根秋啄其穢東有井深不見底即禹穴也墨子禹東教乎九夷道死葬會稽之山衣衾三領桐棺三寸葛以緘之絞之不合道之不塪土地之深下毋及泉上毋通臭既葬收餘壤其上壟若參耕之畝吕氏春秋禹葬會稽不變人徒淮南子禹葬會稽之山農不易其畝禹之治天下也以五聲聽縣鐘鼓鐸磬而置鞀為銘于簨虡曰教寡人以道者擊鼓教寡人以義者擊鐘教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀是以禹嘗一饋七十起日中不暇食曰吾猶恐四海之士留于道路鬻子鬻子禹子得臯陶杜子業既子施子黯季子寧然子湛輕子玉七大夫以佐其身以治天下而天下治帝王世紀禹納禮賢人一沐三握髮一食三起新書諸侯會則問于諸侯曰以寡人為驕乎士朝則問于士曰以寡人為汰乎其聞寡人之驕之汰而不以語寡人者此教寡人之殘道也滅天下之教也荀子禹見耕者耦立而式過十室之邑必下説苑禹出見罪人下車問而泣之左右曰人不順道故使然焉何為痛之禹曰堯舜之人以堯舜為心今寡人為君百姓各自以其心為心是以痛之吳越春秋南到計于蒼梧而見縳人禹拊其背而哭益曰何也禹曰天下有道民不罹辜吾為帝統治水土使得其所今罹法如斯此吾德薄不能化民故哭之悲也禹三載考功五年政定周行天下歸還大越登茅山即會稽以朝四方羣臣以示中國諸侯防風後至斬以示衆示天下悉屬禹也吳越春秋國語禹致羣神于會稽之山防風氏後至禹殺而戮之又曰防風汪芒氏之君守封隅之山者也為漆姓紀年八年春會諸侯于會稽秋八月帝陟于會稽博物志禹會諸侯會稽之野防風氏後到殺之夏德之盛二龍降之禹使范成光御之行域外至南海經防風防風之二臣以塗山之戮怒而射禹使迅風雷雨二龍升去二臣恐以刃自貫其心禹哀之療以不死之草為穿胸民淮南子禹南省方濟于江黃龍負舟舟中之人五色無主禹乃熙然而稱曰我受命于天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘蜓龍乃弭耳棹尾而逃又曰昔鯀作三仞之城諸侯背之海外有狡心禹乃壞城平池散財物焚甲兵施之以德海外賔服四夷納職合諸侯于塗山執玉帛者萬國抱朴子禹乘二龍郭支為馭世本禹作宫室古今注伺風鳥夏禹所作漢書雜家有大􅀢三十七篇傳言禹所作師古曰􅀢古禹字啓太康仲康相少康杼槐芒泄不降扃厪孔甲臯發履癸啓其母塗山氏之女也吳越春秋禹年三十未娶行到塗山恐時之暮失其度制乃辭曰吾娶也必有應矣乃有白狐九尾造于禹禹曰白者吾之服也九尾者王之證也塗山之歌曰綏綏白狐九尾痝痝我家嘉夷來賔為王成家成室我造彼昌天人之際於兹則行明矣哉因娶塗山謂之女嬌吕氏春秋禹行功見塗山之女禹未之遇而巡省南土塗山氏之女乃令其妾待禹於塗山之陽女乃作歌歌曰候人兮猗實始作為南音初禹以天下授益三年之喪畢益讓帝禹之子而辭居箕山之陽禹子啓賢天下屬意焉禹雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君之子也于是啓遂即天子之位是為帝啓史記治國於夏遵禹貢之美悉九州之土以種五榖吳越春秋紀年元年癸亥大饗諸侯于均臺諸侯從帝歸于冀都大饗諸侯于璿臺費侯伯益出就國有扈氏不服帝伐之史記大戰于甘乃召六卿王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正天用勦絶其命今豫惟恭行天之罰左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命用命賞于祖不用命戮于社豫則孥戮汝尚書淮南子有扈氏為義而亡楚辭注有扈氏本牧豎之人耳因何逢遇而得為諸侯乎啓攻有扈之時親于其牀上擊而殺之吕氏春秋夏后相與有扈戰于甘澤而不勝六卿請復之相曰不可戰而不勝是吾德薄而教不善也於是乎處不重席食不二味琴瑟不張鐘鼓不修子女不飾親親長長尊賢使能期年而有扈氏服啓崩子太康立帝王世紀帝啓元年甲辰十年癸丑崩紀年十一年放王季武觀于西河十五年武觀以西河叛彭伯夀帥師征西河武觀來歸十六年陟通鑑前編后啓九歲崩刀劍録后啓以庚戌八年鑄一銅劍長三尺九寸後藏之秦望山腹上刻二十八宿文有背面面文為星辰背記山川日月按紀年曰元年癸亥世紀曰元年甲辰如世紀則庚戌鑄劍當是七年太康尸位以逸豫滅厥德黎民咸二乃盤逰無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河尚書紀年元年癸未帝即位居斟鄩畋于洛表羿入居斟鄩楚辭注太康不遵禹啓之樂更作淫聲放縱情欲以自娛樂不顧患難不謀後世卒以失國兄弟五人皆居于閭巷太康崩弟仲康立史記紀年四年帝陟路史太康在位十九歲失政又十歲而死通鑑前編因之帝太康之年不一其説今並闕之羲和湎淫廢時亂日命胤往征之作胤征書序惟仲康肇位四海胤侯命掌六師羲和廢厥職酒荒于厥邑胤侯承王命徂征告于衆曰嗟豫有衆聖有謨訓明徵定保先王克謹天戒臣人克有常憲百官修輔厥后惟明明每歲孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑惟時羲和顛覆厥德沈亂子酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦今豫以爾有衆奉將天罰爾衆士同力王室尚弼豫欽承天子威命火炎崑岡玉石俱焚天吏逸德烈于猛火殱厥渠魁脅從罔治舊染汚俗咸與惟新嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉尚書紀年元年己丑仲康即位居斟鄩五年秋九月庚戌朔日有食之命胤侯帥師征羲和六年錫昆吾命作伯按經仲康肇位四海胤侯承王命徂征而紀年以胤征在五年五年不得云肇位也竹書雖古率多荒謬闕疑可也仲康崩子相立史記紀年七年陟通鑑前編仲康十三歲崩相即位夏衰后羿自鋤遷于窮石因夏民以代夏政相徙于商邱依同姓諸侯斟鄩氏帝王世紀紀年元年戊戌帝相即位居商邱古琴疏帝相元年條谷貢桐芍藥帝命羿植桐于雲和命武羅伯植芍藥于後苑武羅伯諫帝不從于是作誼諫羿伐桐為琴以進帝善之名曰條谷帝移于音樂不聽事為羿所逐居于商邱援琴作源水歌歌曰涓涓源水不雍不塞轂既破碎庸大其輻事以敗矣乃重太息乃征畎夷七年然後來賔後漢書紀年元年征畎夷二年征風夷黃夷七年于夷來賔羿不修民事淫于原獸而用寒浞浞殺而亨之因羿室生澆及豷使澆用師滅斟灌及斟尋氏處澆于過處豷于戈遂滅相后緡方娠逃出自竇歸于有仍生少康為仍牧正惎澆能戒之澆使椒澆臣求之逃奔有虞為之庖正虞思有虞之君於是妻之以二姚而邑諸綸虞邑有田一成有衆一旅能布其德而兆其謀以收夏衆撫其官職使女艾少康臣諜澆使季杼即子杼誘豷遂滅過戈復禹之績左傳紀年帝相八年寒浞殺羿九年相居于斟灌二十六年浞使其子澆帥師滅斟灌二十七年澆伐斟鄩大戰于濰覆其舟滅之二十八年浞弒帝后緡歸有仍伯靡出奔有鬲丙寅年夏少康生乙酉年少康自有仍奔虞甲辰年伯靡自鬲帥斟鄩斟灌之師以伐浞少康使女艾伐過殺澆乙巳年伯子杼滅戈伯靡殺寒浞少康自綸歸于夏邑自太康失德夷人始畔及少康已後世服王化遂賔于王門獻其舞樂後漢書少康恐禹祭之絶祀乃封其庶子于越號曰無余吳越春秋紀年元年丙午帝少康即位諸侯來朝賔虞公二年方夷來賔十八年遷于原世本少康作秫酒作箕帚少康崩紀年二十一年陟子杼立紀年元年己巳帝杼即位居原五年自原遷于老邱八年征于東海及三夀得一狐九尾國語杼能帥禹者也故夏后氏報焉杼史作豫或作伯杼或作帝寧世本季佇作甲杼崩紀年十七年陟子槐立紀年槐作芬元年戊子帝芬即位三年九夷來御三十六年作圜土槐崩紀年四十四年陟通鑑前編二十六歲崩子芒立紀年元年壬申帝芒即位以元圭賔于河十三年東狩于海獲大魚芒崩紀年五十八年陟子泄立紀年元年辛未帝泄即位二十一年命畎夷白夷赤夷元夷風夷黃夷後漢書始加爵命由是服從泄崩紀年二十五年陟通鑑前編十六歲崩子不降立紀年元年己亥帝不降即位六年伐九苑五十九年遜位于帝扃不降崩紀年帝扃十年陟弟扃立紀年元年戊戌帝扃即位扃崩紀年十八年陟通鑑前編二十一歲崩子厪立紀年元年乙未帝厪即位居西河厪崩紀年八年天有妖孽十日並出其年陟通鑑前編二十一歲崩立不降之子孔甲孔甲立好方鬼神事淫亂夏后氏德衰諸侯畔之吕氏春秋孔甲田于東陽萯山天大風晦盲孔甲迷惑入于民室主人方乳或曰后來見良日也之子必大吉或曰不勝也子必有殃后乃取其子以歸曰以為余子誰敢殃之子長幕動拆撩斧斫斬其足遂為守門者孔甲曰鳴呼有疾命矣夫乃作破斧之歌實始為東音刀劍録孔甲九年嵗次甲辰採牛首山鐵鑄劍銘曰夾古文篆書長四尺一寸孔甲崩子臯立紀年臯作昊臯崩子發立紀年后發即位元年諸侯賔于王門諸夷入舞發崩子履癸立是為桀自孔甲以來諸侯多畔夏桀不務德而武傷百姓百姓弗堪史記桀自謂天父新書淫虐有才力手能搏虎帝王丗紀淮南子桀之力制觡伸鈎索鐵歙金椎金稚移大犧水殺黿鼉陸捕熊羆桀伐有施有施人以妹喜女焉妹喜有寵國語楚辭注夏桀伐蒙山之國而得妹喜紀年后桀命扁伐岷山岷山女于桀二人曰琬曰琰后愛二女斫其名苕華之玉苕是琬華是琰而棄其元妃於洛曰妹喜氏以與伊尹交遂以亡夏按此桀寵琬琰非妹喜獨異諸説妹喜好聞裂繒之聲為發繒裂之以順適其意以人駕車為肉山脯林酒池一鼓而牛飲者三千人又以虎入市而視其驚帝王丗紀管子桀女樂三萬人端謲晨樂聞于三衢是無不服文繡衣裳者桀冬不為杠夏不束柎以觀凍溺弛牝虎充市以觀其驚駭新序桀作瑶臺為酒池糟隄縱靡靡之樂一鼓而牛飲者三千人羣臣相持而歌曰江水沛沛兮舟楫敗兮我王廢兮趣歸薄兮薄亦大兮又曰樂兮樂兮四牡矯兮六轡沃兮去不善而從善何不樂兮尚書大傳夏人飲酒醉者持不醉者相和而歌曰盍歸于薄盍歸于薄薄亦大矣伊尹間居深聽樂聲更曰覺兮覺兮吾大命格兮去不善而就善何樂兮為長夜宫于深谷中男女雜處十旬不出又為石室瑶臺關龍逢諫桀以為妖言而殺之博物志博物志桀作瓦屋纒子桀為天下酒濁而殺厨人太公金匱桀以十月發民鑿山穿陵通于河民諫曰孟冬鑿山穿陵泄天氣發地之藏天子失道後必有敗桀殺之期年岑山崩為大澤隨巢子夏桀德衰岱淵沸紀年瞿山崩耹墜災帝王世紀兩日鬬蝕鬼呼于國桀醉不寤墨子逮至夏桀天有􅀈命日月不時寒暑雜至五榖焦死鬼呼國鶴鳴十夕餘桀無道臯諫者湯使人哭之桀囚湯于夏臺而後釋之諸侯由是咸叛桀歸湯同日供職者五百國史記乃召湯而囚之夏臺已而釋之湯修德諸侯皆歸湯楚辭注桀拘湯于重泉而後出之尚書大傳桀無道囚湯後釋之諸侯八譯來朝者六國太公金匱桀怒湯以諛臣趙梁計召而囚之均臺置之種泉嫌于死湯行賂桀釋之而賞之贊茅湯來伐桀以乙卯日戰于鳴條之野桀未戰而敗績乃與妹喜及諸嬖妾同舟浮海奔于南巢之山而死帝王世紀桀謂人曰吾悔不遂殺湯于夏臺使至此史記淮南子桀囚于焦門不能自非其所行而悔不殺湯于夏臺贊曰禹之德大矣然太康以不德幾失位少康微矣以能布其德遂復舊物周書有之民不繄物惟德繄物信善哉桀迄亡乃悔不殺湯湯死桀庸有既乎尚史卷三
