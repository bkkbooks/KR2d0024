body:
  text: 尚史卷四十九列傳二十七鑲白旗漢軍李鍇撰宋諸臣傳孔父孔父即孔父嘉孔子六世祖為大司馬事穆公穆公疾召孔父而屬殤公焉曰子奉之以主社稷孔父曰羣臣願奉馮也馮穆公子莊公公曰不可使馮出居于鄭公薨殤公立莊公元年桓二年大宰華督殺孔父遂弑殤公左傳督詳華傳皇父充石皇氏皇鄖皇瑗皇麇皇緩酁般附皇野皇非我皇懐附皇父充石戴公子事武公為司徒武公之世鄋瞞狄國名伐我充石帥師禦之耏班御充石公子榖甥為右司冦牛父駟乗四人共為一乘以敗狄于長邱獲長狄縁斯充石與二子死焉公以門賞耏班使食其征門闗門征税也謂之耏門充石之後有皇鄖鄖事平公平公十二年襄九年宋災樂喜為司城以為政使鄖命校正出馬工正出車備甲兵庀武守以所職論之鄖當是司馬冬十月諸侯伐鄭鄖從晉荀瑩門于鄟門左傳瑗系未詳為右師事景公景公二十九年哀七年瑗帥師侵鄭三十一年哀九年鄭圍我雍邱瑗圍鄭師毎日遷舍作壘塹成輙徙舍合其圍壘合鄭師哭鄭罕達救之大敗取鄭師于雍邱使有能者無死以郲張與鄭羅歸三十四年哀十二年瑗㑹魯侯衛侯于鄖及魯衛盟三十九年哀十七年瑗之子麇有友曰田丙而奪其兄酁般邑以與之酁般愠而行告向魋之臣子儀克克告夫人曰麇將納桓氏桓氏即向魋哀十四年魋出奔衛公執麇瑗奔晉召之明年殺瑗已而公聞其情復皇氏之族使皇緩為右師皇緩者瑗之從子也初事景公景公薨六卿共攻大尹立昭公事見樂茷傳左傳野字子仲為景公司馬景公三十六年哀十四年向魋謀亂公知之告野曰余長魋也今將禍余請即救司馬野曰有臣不順神之所惡也而况人乎敢不承命不得左師不可請以君命召之左師者向魋之兄向巢也向巢毎食擊鐘聞鐘聲公曰夫子将食既食又奏公曰可矣以乗車往曰迹人主迹禽獸者来告曰逢澤有介麇焉公曰雖魋未来得左師吾與之田若何君憚告子野曰嘗私焉君欲速故以乗車逆子與之乗至公告之拜不能起野曰君與之言公曰所難子者上有天下有先君對曰魋之不共宋之禍也敢不唯命是聽野請瑞符節以命其徒攻桓氏其父兄故臣曰不可其新臣曰從吾君之命遂攻之向魋入于曹以叛向巢伐之不克向魋奔衛向巢奔魯向魋之臣子儀克愬皇瑗之子麇曰將納桓氏即向魋公問諸野初野將以杞姒之子非我為子麇曰必立伯也非我兄是良材野怒弗從故對曰右師謂皇瑗則老矣不識麇也公遂執麇野卒子非我亦事景公為大司馬景公無子取公孫周元公孫之子得與啟畜諸公宫未有立焉有大尹者近官而有寵四十八年哀二十六年公薨大尹立啟非我因樂茷皇懐靈不緩謀使國人施于大尹奉啟奔楚乃立得是為昭公左傳傳詳樂筏皇懐為司徒非我從昆弟也論曰皇野因左師謀向魋其權足與也既而挟私傾麇施及右師嗟夫右師何罪麗此罰也景公過聽殺人情實既白而于野無誅焉雨無正之詩曰舍彼有罪既伏其辜若此無罪淪胥以鋪華御事華氏華元華閲華臣華臯比華合比華耦華御事者華父督之孫督戴公之孫也督弑殤公見逆臣傳御事為司冦事成公成公十七年文七年薨昭公將去羣公子穆㐮之族攻公御事和公室昭公三年文十年楚蔡㑹于厥貉將以伐我御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸御事子元元初事昭公代公子成荘公子為右師昭公遇弑事文公文公四年宣二年鄭公子歸生受命于楚伐我元及樂吕禦之戰于大棘羊斟字叔牂御元將戰元殺羊食士斟不與及戰斟曰疇昔之羊子為政今日之事我為政輿入鄭師鄭囚元獲吕我師敗績我以兵車百乘文馬百駟以贖元于鄭半入元逃歸立于門外告而入宋城元為植植將主也廵功城者謳曰睅其目皤其腹棄甲而復于思于思多鬚貌棄甲復来元使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何元曰去之夫其口衆我寡十六年宣十四年楚使申無畏聘于齊曰無假道于宋及宋宋人止之元曰過我而無假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之秋九月楚圍我明年夏五月楚師不去我懼使元夜入楚師登公子側之牀起之曰寡君使元以病告曰敝邑易子而食析骸而炊雖然城下之盟有以國斃不能從也去我三十里唯命是聽公子側懼與之盟而告王退三十里我及楚平元為質盟曰我無爾詐爾無我虞二十二年成二年文公薨共公立冬十一月元㑹諸侯之大夫及楚盟于蜀共公二年成四年元如魯聘六年成八年元如魯聘共姬元善楚公子嬰齊又善晉欒書九年成十一年元如楚又如晉合晉楚之成十年成十二年晉楚盟于宋西門之外十三年成十五年共公薨平公立蕩澤司馬弱公室殺公子肥文公子元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉魚石自止元于河上元請討許之乃反使攻蕩氏殺之魚石左師向為人大司冦鱗朱少司冦向􅙮大宰魚府少宰出奔楚冬十一月元㑹諸侯之大夫㑹吳于鍾離平公元年成十六年元㑹諸侯于沙隨謀伐鄭三年成十八年楚約魚石入彭城我圍彭城楚救之伐我元如晉告急晉救我楚師還四年襄元年元㑹諸侯之大夫圍彭城彭城降晉五年襄二年元㑹諸侯之大夫于戚謀鄭冬復㑹于戚遂城虎牢鄭成左傳元卒子二閲臣閲臣並元之子閲代元為右師弟臣為司徒事平公平公十二年襄九年宋災樂喜為政使閲討右官官庀其司庀具也使具其官屬使臣具正徒正徒役徒也十七年襄十四年春閲㑹諸侯之大夫㑹呉于向夏四月閲㑹伐秦左傳㑹向伐秦經不書惰也冬閲㑹諸侯之大夫于戚定衛殤公也二十年襄十七年閲卒閲子曰臯比臣弱臯比之室使賊殺其宰華吴公將逐臣向戍曰不如葢之乃舍之冬十一月國人逐瘈狗瘈狗入于華臣氏國人從之臣懼遂奔陳華合比者葢亦閲子也亦為右師傳不載按宋嘗世其官故知為閲子事平公平公四十年昭六年大子佐惡寺人栁合比曰我殺之栁乃坎用牲埋書而告公曰合比將納亡人即華臣之族公使視之有焉遂逐合比合比奔衛督曽孫曰華耦耦字子伯為昭公司馬昭公二年文九年楚伐鄭耦㑹諸侯之大夫救鄭八年文十五年耦如魯盟魯侯與之宴辭曰君之先臣督得罪于宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命于亞旅上大夫也魯人以為敏九年文十六年耦卒左傳論曰謀始之戒君子之事也宋楚不敵國人皆知之而鄙我伐我其亡有間元攖楚怒用快厥心食子炊骸誰實使之羊斟為政不烈于是矣蕩澤弱公室華臣弱其家所以致亡也合比疾讒而又佐鬬焉亦以自亡也樂豫樂氏樂吕樂喜樂轡樂輓樂舍鉏附樂朱樂祁犂樂溷樂茷樂得附樂豫者戴公𤣥孫事成公為司馬成公薨昭公將去羣公子豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以徳皆股肱也誰敢携貳若之何去之不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫豫和公室舍司馬以讓公子卬昭公弟樂吕是為樂舉亦戴族也杜預注吕戴公曽孫不按吕事文公戴公至文公已厯七世則吕得為戴之曽孫矣吕事昭公昭公弑事文公文公二年文十八年昭公子將奉母弟須以作亂公殺須及昭公子使吕為司冦四年宣二年鄭伐我華元及吕禦之戰于大棘我師敗績獲元及吕二十二年成二年文公薨始厚𦵏君子謂華元樂吕于是乎不臣左傳喜字子罕系未詳按杜注司城樂氏之大宗也其先當是戴公之長庻子事平公為司城平公九年襄六年樂轡以弓梏華弱于朝公見之逐華弱喜曰同罪異罰非刑也専戮于朝罪孰大焉亦逐樂轡轡射喜之門曰㡬日而不我從喜善之如初轡字子蕩亦戴族也十二年襄九年宋災喜為政使伯氏大夫司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗廵丈城繕守備表火道使華臣司徒具正徒令隧正官名納郊保奔火所使華閲右師討右官官庀其司向戍左師討左亦如之使樂遄司冦庀刑器亦如之使皇鄖司馬命校正出馬工正出車備甲兵庀武守使西鉏吾大宰庀府守令司宫巷伯儆宫二師即左師右師令四卿正敬享祝宗用馬于四墉祀盤庚于西門之外二十年襄十七年皇國父為太宰為公築臺妨于農功喜請俟農功之畢公弗許築者謳曰澤門之晳國父白晳居近澤門實興我役邑中之黔樂喜黑色而居邑中實慰我心喜聞之親執朴以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故喜曰宋國區區而有詛有祝禍之本也三十年襄二十七年向戍弭諸侯之兵㑹晉楚于宋既盟向戍請賞公與之邑六十以示喜喜曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之向戍辭邑向氏欲攻喜戍曰我將亡夫子存我徳莫大焉又可攻乎宋人或得玉獻諸喜喜弗受獻玉者曰以示玉人玉人以為寳也故敢獻之喜曰我以不貪為寳爾以玉為寳若以與我皆喪寳也不若人有其寳稽首而告曰小人懐璧不可以越鄉納此以請死也喜寘諸其里使玉人為之攻之富而後使復其所左傳陽門之介夫死喜入而哭之哀晉人之覘宋者反報于晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也禮記檀弓喜孫三舍輓祁犂舎為大夫黨元公華向之亂出奔鄭輓亦事元公華向自南里出奔楚公使輓為大司冦左傳輓之子朱鉏亦為大司冦事景公見樂茷傳吕氏春秋士池尹為荆使于宋司城子罕觴之南家之墻犨于前而不直西家之潦徑其宫而不止士池尹問其故子罕曰南家為輓者也吾將徙之其父曰吾恃為輓以食三世矣今徙之是宋國之求輓者不知吾處也吾將不食願相國之憂吾不食也故吾弗徙西家髙吾宫痺潦之經吾宫也利故弗禁也士池尹歸荆荆適興兵攻宋士池尹諌曰宋不可攻也其主賢其相仁賢者能得民仁者能用人荆故釋宋而攻鄭説苑司城子罕之貴子韋也入與共食出與同衾子罕亡子韋不從子罕来復召而貴之左右曰君之善子韋也君亡不從来又貴之君獨不愧君之忠臣乎子罕曰吾惟不能用子韋故亡今之得復也尚子韋之餘教也故貴之且我之亡也吾臣之削迹㧞樹以從者奚益于吾亡哉韓詩外傳司城子罕相宋謂宋君曰爵禄賞賜人之所好也君自行之殺戮刑罰民之所惡也臣請當之君曰善國人知殺戮之在子罕也大臣親之百姓畏之不期年子罕遂去宋君而専其政子罕之亡與去君専政皆未聞祁犂字子梁喜之孫也元公十二年昭二十二年華亥向寕出奔楚公使祁犂為司城以靖國人十五年昭二十五年魯叔孫婼来聘公享之賦新宫逸詩婼賦車轄明日宴飲酒樂公使婼右坐語相泣也祁犂佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂䰟魄䰟魄去之何以能久季公亥之姊為公夫人生子以妻季孫意如婼来聘且逆之公亥從謂夫人曰勿與魯將逐之夫人告公公告祁犂祁犂曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣宣成襄昭無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂魯君果出冬十一月元公薨景公即位景公二年昭二十七年祁犂及諸侯之大夫㑹于扈謀戍周且謀納魯侯祁犂及衛北宫喜固請于晉晉趙鞅辭不果納十三年定六年祁犂言于公曰諸侯唯我事晉今使不往晉其憾矣公使祁犂如晉晉趙鞅逆而飲之酒于緜上獻楊楯六十于鞅士鞅言于晉侯曰未致使而私飲酒不敬二君不可不討乃執祁犂十五年定八年趙鞅言于晉侯曰諸侯唯宋事晉今執其使是絶諸侯也將歸祁犂士鞅曰三年止之無故而歸之宋必叛晉祁犂歸卒于大行士鞅曰宋必叛不如止其尸以求成焉乃止諸州祁犂子溷溷字子明祁犂之使晉也見溷而行及卒于大行公使樂大心逆其尸大心辭偽有疾乃使向巢逆祁犂尸溷謂大心出逐使出門曰吾猶衰絰而子擊鐘何也大心曰喪不在此故也既而告人曰已衰絰而生子余何故舍鐘溷聞之怒言于公曰大心將不利戴氏不肯適晉將作亂也不然無疾乃逐大心溷之子茷茷字子潞事景公為司城景公四十八年哀二十六年茷㑹魯師越師納衛侯輙不果入景公無子取公孫周之子得與啟畜諸公宫未有立焉于是茷為司城皇緩為右師皇非我為大司馬皇懐為司徒靈不緩為左師樂朱鉏為大司冦六卿三族降聴政降和同也因大尹以達大尹者近官而有寵者也大尹常不告而以其欲稱君命以令國人惡之茷欲去大尹靈不緩曰縱之使盈其罪重而無基能無敝乎冬十月公㳺于空澤薨于連中館名大尹興空澤之士千甲奉公自空桐入如沃宫使召六子曰聞下有師君請六子書六子至以甲刼之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啟奉殯于大宫三日而後國人知之茷使宣言于國曰大尹惑蠱其君而専其利今君無疾而死死又匿之是無他矣大尹之罪也大尹謀曰我不在盟無乃逐我復盟之乎使祝為載書六子在唐盂地名將盟之祝襄以載書告皇非我非我因茷及門尹樂得靈不緩謀曰民與我逐之乎皆歸授甲使徇于國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹徇曰戴氏即樂氏皇氏将不利公室與我者無憂不富衆曰無别惡其與君無别戴氏皇氏欲伐啟樂得曰不可彼以陵公有罪我伐公則甚焉使國人施于大尹施施罪也大尹奉啟以奔楚乃立得史記世家得作特即昭公茷為上卿盟曰三族共政無相害也左傳樂大心别有傳樂得葢亦戴族也論曰殷道尚鬼及其末也巫覡専之當平公之初伊戾殺痤既用鬼道矣而豎栁挫元寕無後憂是故詛祝禍本之言喜懐葢亦逺矣祁犂測魯若責左劵然飲酒獻楯謀不及身其用智也譬諸火外明爥物而中則闔虚宜其有大行之止也公子成仲氏公孫固公孫師仲江仲㡬公子成者莊公子也按杜注成為莊公子而逮事昭公昭上距莊九十餘年疑成非莊公子或成為莊公末年所生然至昭公時已八十餘歳矣初事成公成公十二年文二年成及晉師陳師鄭師伐秦取汪及彭衙而還十七年文十年公薨昭公將去羣公子穆襄之族率國人攻公殺公孫固公孫鄭于公宫于是成為右師和公室昭公乃立公孫固者莊公孫也初為大司馬事襄公襄公十三年僖二十二年我伐鄭楚伐我以救鄭公將戰固諫曰天之棄商久矣君將興之弗可赦也已弗聴戰于泓我師敗績公傷股明年公薨成公即位成公四年僖二十七年楚圍我固如晉告急明年晉敗楚師于城濮六年僖二十九年固㑹周王子虎魯侯及諸侯之大夫盟扵翟泉左傳公孫師亦莊公孫文公弑昭公而自立二年文十八年昭公子將奉公母弟須以作亂公殺須及昭公子使師為司城代母弟須文公薨事共公共公十三年成十五年薨蕩子山即蕩澤為少宰弱公室殺公子肥文公子華元使師及華喜帥國人攻蕩氏殺子山魚石等出奔楚魚蕩並桓氏族師子仲江江事平公江之孫㡬㡬事元公元公十一年昭二十一年華亥向寕以南里叛明年華向出奔楚公使㡬為左師十五年昭二十五年公為魯侯故季孫意如逐昭公如晉夢大子欒即位于廟已與平公服而相之旦召六卿曰寡人不佞不能事父兄謂華兄以為二三子憂寡人之罪也若以羣子之靈獲保首領以殁唯是楄柎所以藉幹者楄柎棺中笭林幹骸骨也請無及先君㡬對曰君若以社稷之故私降昵宴羣臣弗敢知若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祗辱公薨景公即位景公七年昭三十二年㡬㑹諸侯之大夫盟于狄泉將城成周明年㑹城成周㡬不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國于周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命㡬曰踐土固然薛舊為宋役固曰従舊薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯㡬曰三代各異物薛焉得有舊為宋役亦其職也晉士彌牟曰晉之從政者新子姑受功歸吾視諸故府㡬曰從子忘之山川鬼神其忘之乎彌牟怒謂韓不信曰薛徴于人宋徴于鬼宋罪大矣必以仲㡬為戮乃執㡬以歸三月歸諸京師㡬子佗為宋卿見叛臣傳左傳論曰公孫固之見殺也春秋不書名左氏翼經以非罪例之是殆不然穆襄之族未聞不逞藉曰除偪必有首惡徇君欲而覆公族若犄羣鹿然寕無罪乎葛藟庇本根有味乎樂豫之言已向戍向氏向宜向鄭向戍者桓公曽孫食邑于合謂之合左師共公十三年成十五年公薨蕩子山殺公子肥文公子魚石向為人鱗朱向􅙮魚府五大夫出奔楚華元使戍代魚石為左師平公十一年襄八年戍㑹晉侯鄭伯及諸侯之大夫于邢邱十二年襄九年宋災戍討左官官庀其司討治左官庀具其官屬十三年襄十年諸侯㑹吳于柤晉請伐偪陽妘姓國而封戍以宋常事晉而戍賢故欲封之為附庸五月滅之以與戍戍辭曰君若猶辱鎮撫宋國而以偪陽光啟寡君羣臣安矣其何貺如之若惠賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予公十四年襄十一年戍侵鄭大獲鄭侵我夏四月諸侯伐鄭戍先至于鄭門于東門其莫諸侯師至圍鄭鄭懼乃行成秋九月諸侯復伐鄭鄭成十八年襄十五年公使戍如魯聘二月戍及魯盟于劉十九年襄十六年公㑹諸侯于溴梁齊髙厚逃歸戍及諸侯之大夫盟曰同討不庭二十年襄十七年華閱卒其子臯比弱華臣臣閲之弟為司徒使賊殺其宰華吳賊六人以鈹殺諸盧門戍之後戍懼曰老夫無罪賊曰臯比私有討于吳公聞之將逐華臣戍曰臣也亦卿也大臣不順國之恥也不如葢之乃舍之戍為已短䇿茍過華臣之門必騁二十九年襄二十六年魯侯㑹諸侯之大夫于澶淵戍後㑹期戍惡大子痤㑹寺人伊戾構大子曰大子將為亂公問戍戍曰固聞之公囚大子大子縊而死戍善于晉趙武又善于楚屈建欲弭諸侯之兵以為名三十年襄二十七年戍如晉晉許之如楚齊秦皆許之皆告于小國為㑹于宋秋七月盟于宋西門之外既盟戍請賞曰請免死之邑公與之邑六十樂喜不可削而投之戍辭邑三十一年襄二十八年公及魯陳鄭許如楚及漢楚康王卒魯侯欲反叔仲帶曰我楚國之為豈為一人行也魯侯遂行戍曰我一人之為非楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備公遂反三十三年襄三十年宋災戍㑹諸侯之大夫于澶淵謀歸宋財既而無歸三十五年昭元年戍㑹諸侯之大夫于虢尋宋之盟也三十八年昭四年楚子㑹諸侯于申問禮于戍及鄭國僑戍曰小國習之大國用之敢不薦聞獻公合諸侯之禮六鄭僑曰小國共職敢不薦守獻伯子男㑹公之禮六君子謂戍善守先代僑善相小國楚子示諸侯侈椒舉諌不聴僑見戍曰吾不患楚矣汰而愎諌不過十年戍曰然不十年侈其惡不逺逺惡而後棄善亦如之徳逺而後興華合比為右師其弟華亥欲代之乃與寺人栁比從為之徵曰合比將納亡人華臣魯襄十七年華臣出奔陳公逐合比使亥代之見于戍戍曰女夫也必亡女喪而宗室于人何有人亦于女何有詩曰宗子維城母俾城壞母獨斯畏女其畏哉戍子三寕宜鄭寕見叛臣傳宜字子禄宜鄭皆事元公元公十年昭二十年華亥向寕之亂宜鄭及公子城皆出奔鄭明年公子城以晉師至宜御公子城與華氏戰于赭邱大敗華氏左傳戍曽孫巢魋並見叛臣傳魋弟司馬牛見仲尼弟子傳公子目夷魚氏公孫友目夷字子魚桓公之子襄公庻兄也桓公三十年僖八年公族大子兹父即襄公固請曰目夷長且仁君其立之公命目夷目夷辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退明年公薨襄公立以目魚為仁使為左師以聼政于是宋治故魚氏世為左師目夷後復為司馬襄公十年僖十九年公盟于曺南執滕子鄫子㑹盟于邾公使邾子用鄫子于次睢之社用者殺之以祭欲以屬東夷目夷曰古者六畜不相為用謂若祭馬先不用馬小事不用大牲謂若釁廟用羊釁門及夹室用雞之類而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國魯衛邢以屬諸侯義士猶曰薄徳今一㑹而虐二國之君又用諸滛昬之鬼將以求霸不亦難乎得死為幸秋我圍曺討不服也目夷言于公曰文王聞崇徳亂而伐之軍三旬而不降退修教而復伐之因壘而降詩云刑于寡妻至于兄弟以御于家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動十二年僖二十一年我為鹿上之盟以求諸侯于楚楚人許之目夷曰小國争盟禍也宋其亡乎幸而後敗秋公㑹諸侯于盂目夷曰禍其在此乎君欲已甚其何以堪之于是楚執公以伐我冬㑹于薄以釋公目夷曰禍猶未也未足以懲君公羊宋公與楚子期以乗車之㑹公子目夷諫曰楚夷國也彊而無義請以兵車之㑹往宋公不可楚執宋公以伐宋宋公謂目夷曰子歸守國矣國子之國也目夷復曰國固臣之國也于是歸設守械而守國楚人謂宋人曰不與我國吾將殺子君宋人應之曰賴社稷之神靈國已有君矣于是釋宋公宋公走之衛目夷復曰國為君守之君曷為不入然後逆襄公歸十三年僖二十二年公㑹諸侯伐鄭目夷曰所謂禍在此矣冬楚伐我以救鄭公及楚人戰于泓我既成列楚人未既濟目夷公羊作有司穀梁作司馬子反曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之我師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列目夷曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有于二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也目夷卒子友嗣為左師事成公昭公文公左傳友孫魚石暨魚府並見叛臣五大夫傳鱗矔鱗氏鱗矔桓公孫為司徒事成公成公薨昭公將去羣公子穆襄之族攻公矔和公室昭公乃立昭公遇弑事文公左傳子朱為少司冦見叛臣傳公子蕩蕩氏公孫夀蕩意諸蕩虺蕩山公子蕩桓公之子成公時為司城以武公名廢司空為司城成公薨事昭公蕩之子公孫夀夀子蕩意諸蕩卒昭公無道公孫夀辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族襄夫人公之適祖母公不禮焉昭公元年文八年夫人殺襄公之孫孔叔公孫鍾離及大司馬公子卬意諸奔魯效節于府人而出魯侯以其官逆之四年文十一年魯公子遂來聘言意諸而復之九年文十六年將使公田孟諸而殺之公知之盡以寳行意諸曰盍適諸侯公不可盡以其寳賜左右而使行夫人使謂意諸去公對曰臣之而逃其難若後君何冬十一月夫人殺公意諸死之文公即位使母弟須代意諸為司城使意諸弟蕩虺為司馬夀晩事文公文公薨事共公共公六年成八年公聘魯伯姬使夀如魯納幣意諸子曰山又名蕩澤字子山為共公司馬共公十三年成十八年公薨山弱公室殺公子肥華元使華喜公孫師帥國人攻蕩氏殺山詳五大夫傳左傳論曰宋襄之虐比徳楚靈子魚崎嶇暴君危國之際不難于讓君而難于事君矣語有之猛虎罣索果于决蹯嗟乎傷哉亡子不亡族夀亦以决蹯也或咎夀曰中立罪也和順兩宫濟其君亦濟其子不猶愈乎雖然難言之矣使鄭荘無悔而考叔請羮夫亦無濟矣夫公子游公子游宋公子也某公子未詳閔公十年莊十二年宋萬弑閔公立子游羣公子奔蕭公子御説即桓公奔亳蕭叔大心蕭大夫及戴武宣穆莊之族殺子游于宋立桓公左傳公子卬孔叔鍾離附公孫公子須公子卬昭公弟成公十七年文七年公薨穆襄之族攻昭公六卿和公樂豫舍司馬以讓卬昭公即位不禮襄夫人公嫡祖母夫人因戴氏之族殺襄公孫孔叔公孫鍾離及卬卬握節以死公子須文公同母弟也昭公既弑文公即位使須為司城文公二年文十八年武氏之族道昭公子將奉須以作亂公殺須及昭公子使戴莊桓之族攻武氏遂出武穆之族左傳公子圍龜靈不緩公子肥公子圍龜字子靈文公子也宋楚平圍龜為質于楚共公三年成五年圍龜自楚歸華元享之請鼓譟以出鼓譟以復入曰習攻華氏公殺之其後有靈不緩為景公左師景公薨不緩及樂茷殺大尹立昭公詳樂茷傳公子肥亦文公子為蕩山所殺左傳褚師叚褚師子肥褚師叚字子石共公之子平公二十三年襄二十年魯季孫宿来聘叚逆之以受享賦棠棣之七章以卒叚子石彄為宋卿事景公見叛臣傳其後有褚師子肥為大夫亦事景公景公三十年哀八年公伐曺將還子肥殿曺人詬之殿兵不行曹師待之公聞之怒命反之遂滅曹褚師市官葢以官為氏也左傳大子痤大子痤平公大子美而狠寺人惠牆伊戾為大子内師而無寵平公二十九年襄二十六年伊戾告公曰大子將為亂與楚客盟公囚大子大子縊而死詳寺人傳左傳公子城羣公子司馬彊公孫忌附邉卬公孫周公子城亦平公子元公十年昭二十年公惡華向華向二氏華亥偽有疾誘羣公子殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行于其廪城及公孫忌樂舍司馬彊向宜向鄭楚建郳甲出奔鄭其徒與華氏戰于鬼閻敗城城適晉冬公攻華向華向奔陳十一年昭二十一年華貙叛召亡人華向入居盧門以南里叛華登以吳師救華氏宋敗之于新里冬十一月城以諸侯師至救宋與華氏戰于赭邱城射殺華豹大敗華氏圍諸南里明年華向出奔楚公使公孫忌代華費遂為大司馬邉卬代華定為大司徒左傳羣公子暨公孫忌所出未詳邉印平公曾孫也向勝向行向宜向鄭並桓族樂舍見樂氏傳楚建平王之亡子郳甲即小邾穆公也司馬彊所出亦未詳又有公孫周字子髙元公孫景公無子取周之子得與啟畜諸公宫景公薨大尹立啟六卿殺大尹立得是為昭公蕭叔髙哀蕭叔又曰蕭叔大心蕭宋附庸國叔其大夫也閔公十年荘十二年宋萬弑閔公立子游羣公子奔蕭公子御説奔亳南宫牛宋萬子猛獲髙黨圍亳叔及戴武宣穆荘之族以曹師伐之殺南宫牛于亳殺子游于宋立桓公桓公十一年荘二十三年叔朝魯侯于榖昭公時有髙哀者字子哀為蕭封人昭公以為卿哀不義昭公而出奔魯左傳西鉏吾西鉏吾為大宰事平公平公三年成十八年楚納魚石彭城我患之西鉏吾曰何也若楚人與吾同惡以徳于我吾固事之也不敢貳矣大國無厭鄙我猶憾言已事之以我為鄙邑猶恨不足此吾患也不然而收吾憎使賛其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚夷庚吳晉往来之道楚封魚石彭城欲以絶之逞姦而擕服毒諸侯而懼呉晉吾庸多矣非吾憂也且事晉何為晉必恤之十二年襄九年宋災樂喜為政使西鉏吾庀府守庀具也府六官之典令司宫巷伯儆宫左傳厨人濮厨人濮者宋厨邑大夫也元公十一年昭二十一年華驅叛召華向華向入以南里叛冬華登以吳師救華氏齊師時成宋濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之敗吳師于鴻口獲其二帥華登帥其餘復敗我師公欲出濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者徽幟也公徒也衆從之公自楊門見之下而巡之曰國亡君死二三子之恥也豈専孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之濮以裳裹首而荷以走曰得華登矣遂敗華氏于新里左傳師筏師慧師筏師慧並樂師鄭尉氏司氏作亂堵女父司臣尉翩司齊来奔事在襄十年平公十八年襄十五年鄭人以公孫夏良霄公孫僑之故納賂于我以馬四十乘與筏慧三月公孫黑為質焉司城樂喜以堵女父尉翩司齊與之良司臣而逸之託諸魯季孫宿宿寘諸卞鄭人醢之三人也慧過朝將私焉私小便其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易滛樂之朦必無人焉故也樂喜聞之固請而歸之左傳司星子韋司星子韋宋之司星也景公之時熒惑在心公懼召子韋而問焉子韋曰熒惑者天罰也心者宋之分野也禍當于君雖然可移于相公曰相所與治國家也而移死焉不祥曰可移于民公曰民死寡人將誰為君曰可移于嵗公曰嵗害則民饑民饑必死為人君而殺其民以自活其誰以我為君寡人之命固盡巳子無復言子韋還去北面再拜曰臣敢賀君有至徳之言三天必三賞君今夕熒惑其徙三舍君延年二十一嵗公曰何以知之對曰熒惑有三徙舍舍行七星三七二十一也是夕熒惑果徙三舍吕氏春秋漢書隂陽家有宋司星子韋三篇拾遺記宋景公之世有善星文者許以上大夫之位處于延閣之上設以珍食施以寳衣有野人被草負笈而進曰君愛隂陽之術請見景公延之崇堂語未来之兆已往之事夜觀星畫執算景公謝曰今國喪亂微君何以輔之曰徳之不鈞亂將及矣修徳以来人則天應之祥人羙其化景公曰善賜姓子氏名之曰韋論曰蕭叔厨人濮皆以外大夫而戡亂斃賊可藉死而不能送亡語尤斬然至若鉏吾之論師慧之諷析薪以移誰能拒之雖然受馬而後言慧有未盡也昭公蔑祖携親子哀之來固春秋之所貴也尚史卷四十九
