body:
  text: 尚史卷八十六繫六鑲白旗漢軍李鍇撰諸子傳鬻子鬻熊帝顓頊之後季連之苗裔史記年九十見文王王曰老矣鬻子曰使臣捕獸逐麋已老矣使臣坐策國事尚少也文王師之鬻子邱韓詩外傳作楚先生見孟嘗君武王崩成王即位享國親以其身見于鬻子之家而問焉鬻子告以上世之政賈誼新書録文多不具所著鬻子二十二篇蓋多闕略云老子關尹子附老子者楚苦縣厲鄉曲仁里人也李氏名耳字伯陽諡曰聃朱韜玉禮一名重耳外字聃葛𤣥云李氏女所生因母姓也又云生而指李樹因以為姓許慎云聃耳漫也故名耳字𥅆索隱老子號伯陽父周守藏室之史也張湯傳柱下史孔子適周將問禮于老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益于子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為罔游者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍耶老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣彊為我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知其所終髙士傳老子陳人也生於殷時為周柱下史好養精氣貴接而不施轉為守藏史仲尼至周見老子知其聖人乃師之後周德衰乃乘青牛車去入大秦過西關關令尹喜望氣先知焉乃物色遮候之已而老子果至乃彊使著道德經五千餘言髙士傳商容有疾老子往問焉曰先生疾甚矣無遺教可以語弟子者乎商容曰過故鄉而下車子知之乎老子曰非謂其不忘故耶商容曰過喬木而趨子知之乎老子曰非謂敬老耶張其口而示曰吾舌存乎老子曰然吾齒存乎老子曰亡商容曰子知之乎老子曰舌存非以其柔耶齒亡非以其剛耶商容曰盡矣無以復語子哉世說注商容老子師說苑作常摐博物志老子入胡作樗蒲或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時云此下云老子百六十餘嵗或言二百嵗說近誕故刪之高士傳老萊子者楚人也耕于蒙山之陽或言於楚王王駕至萊子之門萊子方織畚王曰守國之政孤願煩先生萊子曰諾王去其妻樵還曰許之乎曰然妻曰妾聞之可食以酒肉者可隨而鞭棰可擬以官祿者可隨而鈇鉞妾不能為人所制投其畚而去萊子亦隨其妻至於江南曰鳥獸之毛可績而衣其遺粒足食也人莫知其所終孔叢子子思見老萊子萊子聞穆公將相子思曰若子事君將何以為乎子思曰順吾性情以道輔之無死亡焉萊子曰不可子性剛而傲不肖又且無死亡非人臣也子思曰不肖固人之所傲也夫事君道行言聽則何所死亡道不行言不聽則亦不能事君所謂無死亡也萊子曰齒堅易敝舌柔常存子思曰吾不能為舌故不能事君列女傳老萊子老養二親行年七十著五采斒斕衣上堂跌仆因卧地為小兒啼或弄雛鳥于親側自孔子死之後百二十九年而史記周大史儋見秦獻公曰始秦與周合而離離五百嵗而復合合七十嵗而霸王者出焉或曰儋即老子或曰非也世莫知其然否太史公疑老萊子太史儋與老子為一人非是今以二人附老子傳亦猶巢由附夷齊云老子之子名宗宗為魏將封于假干宗子注注子宫世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是耶李耳無為自化清靜自正史記關尹子名嘉列子師之多所請問莊子稱為博大真人劉向别録列子關尹喜曰在已無居形物其著其動若水其靜若鑑其應若響故其道若物者也物自違道道不違物善若道者亦不用耳亦不用目亦不用力亦不用心欲若道而用視聽刑智以求之弗當矣瞻之在前忽焉在後用之彌滿六虛廢之莫知其所亦非有心者所能得逺亦非無心者所能得近唯默而得之而性成之者得之知而忘情能而不為真知真能也發無知何能情發不能何能為聚塊也積塵也雖無為而非理也列子關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也故曰慎爾言將有和之慎爾身將有隨之是以聖人見出以知入觀往以知來此其所以先知之理也度在身稽在人稽度皆明而不道也譬之出不由門行不從徑也觀之神農之德稽之虞夏商周之書度諸法士賢人之言所以存亡廢興而非由此道者未之有也又曰列子學射中矣請于關尹子尹子曰子知子之所以中者乎對曰弗知也尹子曰未可退而習之三年又以報尹子尹子曰子知子之所以中乎曰知之矣尹子曰可矣守而勿失也非獨射也國與身皆如之道家老萊子十五篇關尹子九篇漢書文子文子姓辛名鈃葵邱灘上人號曰計然范蠡師事之本受業於老子漢書老子弟子與孔子並時録其遺文為十二篇魏李暹注按考馬總意林别有計然十三卷並隂陽厯數則文子非計然也道家有文子九篇漢書墨子腹䵍附墨翟蓋宋之大夫善守禦為節用史記公輸盤為楚造雲梯之械將以攻宋墨子聞之十日十夜而至郢見公輸盤曰北方有侮臣願藉子殺之公輸盤曰吾義固不殺人墨子起再拜曰聞子為雲梯將以攻宋宋何罪之有荆有餘于地而不足于民殺所不足而爭所有餘不智宋無罪而攻之不仁知而不爭不忠爭而不得不彊義不殺少而殺衆不知類公輸盤服墨子曰然乎不已乎公輸盤曰不可吾既已言之王矣墨子曰胡不見我於王曰諾墨子見王曰今有人於此舍其文軒鄰有敗輿而欲竊之舍其錦繡鄰有䄈褐而欲竊之舍其粱肉鄰有糟糠而欲竊之此為何若人也王曰必為有竊疾矣墨子曰荆之地方五千里宋方五百里此猶文軒之與敝輿也荆有雲夢犀兒麋鹿盈之江漢魚鱉黿鼉為天下饒宋所謂無雉兔狐狸此猶粱肉之與糟糠也荆有長松文梓楩楠豫章宋無長木此猶錦繡之與䄈褐也臣以三事之攻宋為與此同也王曰善哉雖然公輸盤為我為雲梯必攻宋于是見公輸盤墨子解帶為城以牒為械公輸盤九設攻城之機墨子九距之公輸盤之攻械盡墨子之守圉有餘公輸盤詘而曰吾知所以距子矣吾不言墨子亦曰吾知子之所以距我吾不言楚王問其故墨子曰公輸子之意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守圉之器在宋城上而待楚矣楚王曰善哉請無攻宋墨子歸過宋天雨庇其閭中守閭者不內也國策吕氏春秋並同公輸子削竹木以為鵲成而飛之三日不下公輸子以為至巧墨子曰子之為鵲也不如翟之為車轄須臾留三寸之木而任五十石之重故所為巧利于人謂之巧不利於人謂之拙韓非子墨子為木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰不如為車輗者巧也用咫尺之木不費一朝之事而引三十石之重致逺力多久于嵗數惠子聞之曰大巧巧為輗拙為鳶巫馬子謂墨子曰我與子異我不能兼愛我愛鄒人于越人愛魯人於鄒人愛我鄉人於魯人愛我家人於鄉人愛我親於我家人愛我身於吾親以為近我也擊我則疾擊彼則不疾于我我何故疾者之不拂而不疾者之拂故有我有殺彼以我無殺我以利墨子曰然則一人說子一人欲殺子以利已十人說子十人欲殺子以利己天下說子天下欲殺子以利己一人不說子一人欲殺子十人不說子十人欲殺子天下不說子天下欲殺子說子亦欲殺子不說子亦欲殺子是所謂經者口也殺常之身者也墨子墨子學儒者之業受孔子之術以為其禮煩擾而不說厚葬靡財而貧民服傷生而害事故背周道而用夏政淮南子淮南子墨子服役者八十人皆可使赴火蹈刃死不還踵化之所致也吕氏春秋墨子見荆王錦衣吹笙因也尸子繞梁之鳴許史鼓之非不樂也墨子以為傷義是不聽也鄒陽書邑號朝歌而墨子回車新語墨子皇皇席不暇暖墨家墨子七十一篇漢書吕氏春秋墨者巨子腹䵍居秦其子殺人秦惠王曰先生之年長矣非有他子也寡人已令吏弗誅矣先生以此聽寡人也腹䵍對曰墨者之法曰殺人者死傷人者刑此所以禁殺傷人也夫禁殺傷人者天下之大義也王雖為之賜令吏弗誅腹䵍不可不行墨者之法不許惠王而遂殺之尸子尸子名校魯人秦相商君師之鞅死佼逃入蜀所著雜家尸子二十篇漢書引書亡今見雜諸書楊子楊朱或曰姓陽名戎字子居莊子釋文楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能藝言治天下如運諸掌何也對曰君見牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不游枝流鴻鵠高飛不集汚池何則其極逺也黃鍾大吕不可從煩奏之舞何則其音踈也將治大者不治細成大功者不成小此之謂矣楊朱曰伯成子髙不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之曰有斷若一節得一國子為之乎禽子默然孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能答子然以子之言問老𥅆關尹則子言當以吾言問大禹墨翟則吾言當楊朱過宋逆旅一有妾二人其一人美一人惡惡者貴而美者賤楊子問其故逆旅小子曰其美者自美吾不知其美也惡者自惡吾不知其惡也楊朱曰弟子記之行賢而去自賢之行奚往而不愛哉楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠之楊布怒將朴之楊朱曰子無撲矣子亦猶是也嚮者使汝狗白而往黑而來豈能無怪哉列子獨楊子書亡僅見于列子今采其行偏尚數端餘不具載列子列子名御冦鄭人也與鄭繆公同時當是繻公見按列子有楊朱梁王之文威烈王二十三年而後有梁是已當鄭幽公時矣蓋有道者也其學本於黃帝老子號曰道家劉向别録史疾為韓使楚楚王問曰客何方所循曰治列子御冦之言曰何貴曰貴正王曰正亦可為國乎曰可王曰楚國多盜正可以圉盜乎曰可頃間有鵲止於屋上者曰請問楚人謂之何王曰謂之鵲謂之烏可乎曰不可曰今王之國有柱國令尹司馬典令其令官置吏必曰亷潔勝任今盜賊公行而弗能禁也此烏不為烏鵲不為鵲也國策道家列子八篇漢書莊子莊子者䝉人也名周周嘗為䝉漆園吏與梁惠王齊宣王同時其學無所不窺然其要本歸於老子之言故其著書十萬餘言大抵率寓言也作漁父盜跖胠篋以詆訾孔子之徒以明老子之術畏纍虛亢桑子之屬皆空語無事實然善屬書離辭指事類情用剽剝儒墨雖當世宿學不能自解免也其言洸洋自恣以適已故自王公大人不能器之楚威王聞莊周賢使使厚幣迎之許以為相莊周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數嵗衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無汚我我寧游戲汚瀆之中自快無為有國者所羈終身不仕以快吾志焉史記使古今樂録莊周齊人也隱于山嶽湣王遣齎金百鎰聘以相位周謝使者引聲而歌歌辭淺鄙不足録莊子病劇弟子對之泣應曰我今死則誰先更百年生則誰後必不得免何貪于須臾桓談新論鳶較莊子本文上為烏食下為螻蟻食語尤精練鬼谷子鬼谷子楚人周世隱于鬼谷蘇秦所記以為周時已豪士隱者居鬼谷自號鬼谷先生皇甫謐注蘇秦張儀從橫習之鬼谷子掘地為坑曰下說令我泣出則耐分人主之地蘇秦下說鬼谷子泣下沾襟論衡鬼谷子曰蘇秦張儀一體也然其矯尾厲角含吐縱橫儀不如秦是能分人主之地也鬼谷子風俗通鬼谷子六國時縱橫家真隱傳鬼谷先生不知何許人隱居韜志居鬼谷山因以為稱蘇秦張儀師之遂立功名先生遺書責之曰若二君豈不見河邊之樹乎僕御折其枝波浪蕩其根上無徑尺之隂下被數十之痕此木豈與天地有仇怨哉所居然也子不見嵩岱之松柏華霍之檀桐乎上枝干青雲下根通三泉千秋萬嵗不受斧斤之患此木豈與天地有骨肉哉所居然也拾遺記張儀蘇秦嘗息大樹之下假息而寐有一先生言二子何勤苦也儀秦問之子何國人曰吾生于歸谷亦云鬼谷乃謂其術教以干世出俗之辨即探胸得二卷說書言輔時之事說苑鬼谷子人之不善而能矯之者難矣說之不行言之不從者辨之不明也明而不行者持之不固也固而不行者未中其心之所善也辨之明之持之固之又中其人之所善其言神而珍白而分能入於人之心如此而說不行者天下未聞也此之謂善說申子申不害者京人也故鄭之賤臣學術以干韓昭侯史記魏之圍邯鄲也申不害始合于昭侯然未知昭侯之所欲恐言而未必中也昭侯問不害曰吾誰與而可對曰此安危之要國家之大事也臣請深惟而苦思之乃微謂趙卓韓鼂曰子皆國之辨士也夫為人臣者言可必用盡忠而已矣二人因進議於昭侯不害微視昭侯之所說以言於昭侯昭侯大說國策韓韓非子作趙紹水餘略同用為相內修政教外應諸侯十五年終不害之身國治兵彊無侵韓者史記論衡韓用申不害行其三符兵不侵境蓋十五年其後不能用又不察其書兵挫軍破國并于秦不害請仕其從兄官昭侯不許也不害有怨色昭侯曰所謂學於子者也聽子之謁而廢子之道乎又亡其行子之術而廢子之請乎子嘗教寡人循功勞視次第今有所求此我將奚聽乎不害乃避舍請罪曰君真其人也國策韓非子昭侯謂申子曰法度甚易行也申子曰法者見功而與賞因能而授官今君設法度而聽左右之請此所以難行也昭侯曰吾自今以來知行法矣寡人奚聽矣又曰申子曰上明見人偹之其不明見人惑之其知見人飾之不知見人匿之其無欲見人司之其有欲見人餌之故曰無所從知之惟無為可以規之一曰中子曰愼而言也人且知女慎而行也人且隨女而有知見也人且匿女而無知見也人且意女女有知也人且臧女女無知也人且行女故曰惟無為可以規之吕氏春秋韓昭釐侯視祠廟之牲其豕小令更之官以是豕來也昭釐侯曰是非鄉者之豕邪命罪之從者曰王何以知之曰吾以其耳也申不害聞之曰何以知其聾以其耳之聰也何以知其盲以其目之明也何以知其狂以其言之當也故曰去聽則聰去視則明去智則公去三者不任則治十里之間而耳不能聞帷牆之外而目不能見三畝之宫而心不能知其以東至開梧南撫多鸚西服夀靡北懷儋耳若之何哉故至智棄智至仁忘仁至德不德無言無思靜以待時時至而應心暇者勝古之王者其所為少所因多因者君術也為者臣道也為則擾矣因則靜矣因冬為寒因夏為暑君奚事哉不害之學本于黃老而主刑名著書二篇號曰申子史記法家有申子六篇漢書淮南子申子者韓昭釐之佐韓晉别國也地墽民險而介于大國之間晉之故禮未滅韓之新法重出先君之令未收後君之令又下新故相反前後相繆百官背亂不知所用故刑名之書生焉申子天道無私是為恆正天道恆正是以清明申子地道不作是以常靜帝以是正方舉事為之乃有恆常之道符信受令必行也申子君子之所以尊者令令不行是無君也故明君愼令申子一言正天下定一言倚天下靡申子君必有明法正義若懸權衡以稱輕重所以一羣臣也申子四海之內六合之間誰貴曰貴土土食之本也申子昔七十九代之君法制不一號令不同然而俱王天下何也曰必當國富而粟多也申子堯之治也善明法察令而已聖君任法而不任智任數而不任說黃帝之治天下置法而不變使民安泰申子妬妻不難破家亂臣不難破國一妻擅夫衆妻皆亂一臣専君衆臣皆蔽申子智均不相使力均不相勝鼓不預五音而為五音主申子書已亡間采數言尉繚子尉繚子當梁惠王時惠王問黃帝刑德于尉繚子尉繚子兵刑勢有尉繚三十一篇漢書騶衍騶奭騶衍齊人也衍覩有國者益淫侈不能尚德若大雅整之于身施及黎庶矣乃深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至于無垠元序今以上至黃帝學者所共術大並世盛衰因載其禨祥度制推而逺之至天地未生窈冥不可考而原也先列中國名山大川通谷禽獸水土所植物類所珍因而推之及海外人之所不能睹稱引天地剖判以來五德轉移治各有宜而符應若兹以為儒者所謂中國者于天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州內自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也于是有禆海環之人民禽獸莫能相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施始也濫耳王公大人初見其術懼然顧化其後不能行之是以鄒衍重于齊適梁惠王郊迎執賔主之禮適趙平原君側行襒席襒拂也如燕昭王擁彗先驅請列弟子之座而受業築碣石宫身親往師之作主運其游諸侯見尊禮如此自鄒衍與齊之稷下先生如淳于髠慎到環淵接子田駢騶奭之徒各著書言治亂之事以干世主豈可勝道哉騶奭者齊諸騶子亦頗采騶衍之術以紀文于是齊王嘉之自如淳于髠以下皆命曰列大夫為開第康莊之衢高門大屋尊寵之覽天下諸侯賔客言齊能致天下賢士也史記說淳于髠見客傳慎到田駢接子環淵慎到趙人田駢接子齊人環淵楚人皆學黃老道德之術因發明序其指意故慎到著十二論環淵著上下篇漢書蜎子老子弟子而田駢接子皆有所論焉史記田駢遊稷下號天口駢漢書駢以道術說齊齊王應之曰寡人所有者齊國也願聞齊國之政駢對曰臣之言無政而可以得政譬之林木無材而可以得材願王自取齊國之政也駢猶淺言之也博言之豈獨齊國之政哉變化應來而皆有章因性任物而莫不宜當彭祖以夀三代以昌五帝以昭神農以鴻吕氏春秋淮南子田駢以道術說齊王王曰道術難以險患願聞齊國之政駢曰已雖無除其患害天地之間六合之內可陶冶而變化也齊國之政何足問哉老聃之所謂無狀之狀無物之象者也若王之所問者齊也田駢所稱者材也材不及林林不及雨雨不及隂陽隂陽不及和和不及道齊人見田駢曰聞先生髙議設為不宦而願為役田駢曰子何聞之對曰臣聞之鄰人之女駢曰何謂也對曰臣鄰人之女設為不嫁行年三十而有七子不嫁則不嫁然嫁過畢矣今先生設為不宦訾養千鍾徒百人不宦則然矣而富過畢矣田子辭國策吕氏春秋客有見田駢者被服中法進退中度趨翔間雅辭令遜敏田駢聽畢而辭之客出田駢送之以目弟子謂駢曰客士歟曰殆乎非士也今者客所弇斂士所術施也士所弇斂客所術施也客殆乎非士也故火燭一隅則室偏無光骨節蚤成空竅哭厯身必不長衆無謀方乞謹視見多故不良志必不公不能立功好得惡與國雖大不為王禍災日至故君子之容純乎若鍾山之玉桔乎若陵上之木淳淳乎慎謹畏化而不肯自足乾乾乎取舍不說而心甚素朴慎子有四十二篇今五篇僅存威德民雜德立三篇及諸家所引逸文道家蜎子十三篇捷子二篇田子二十五篇漢書鹽鐵論湣王矜功不休百姓不堪慎到捷子亡去田駢如薛孫卿適楚按孫卿襄王時乃適楚說誤尹文子老成子附尹文子齊宣王時人老成子學幻于尹文子三年而不告老成子請其過而求退尹文子揖而進之于室曰昔老聃之徂西也顧而告豫曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移昜者謂之化謂之幻造物者其巧妙其功深故難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉老成子歸用尹文子之言深思三月遂能存亡自在幡校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳焉列子說苑齊宣王謂尹文曰人君之事何如尹文對曰人君之事無為而能容下夫事寡易從法省易因故民不以政獲罪也大道容衆大德容下聖人寡為而天下理矣書曰睿作聖詩人曰岐有夷之行子孫其保之宣王曰善吕氏春秋尹文見齊湣王王曰寡人甚好士尹文曰有人于此事親孝事君忠交友信居鄉悌有此四行者可謂士乎王曰此真所謂士已尹文曰王得若人以為臣乎曰所願也曰使若人于廟朝中深見侮而不鬭王將以為臣乎王曰見侮而不鬭是辱也寡人弗以為臣矣尹文曰雖見侮而不鬭未失其四行也未失其所以為士矣未失其所以為士一而王以為臣失其所以為士一而王不以為臣則嚮所謂士者乃士乎王無以應尹文曰有人于此將治其國民有非非之無非非之有罪罰之無罪罰之而惡民之難治可乎王曰不可尹文曰竊觀下吏之治齊也方若此王曰使寡人治信若此則民雖不治寡人弗怨也意者未至然乎尹文曰王之令曰殺人者死傷人者刑民有畏王之令深見侮而不鬭是全王令也而王曰見侮而不鬭是辱也夫謂之辱者非此之謂也以為臣不以為臣者罪之也此無罪而王罰之也王無以應名家尹文子一篇說齊宣王道家老成子十八篇漢書鶡冠子鶡冠子或曰楚人隱居幽山衣被屢空以鶡為冠莫測其名因號成號著書言道家龎諼常師事之後顯于趙鶡冠子懼其薦已也乃與諼絶真隱傳道家鶡冠子一篇漢書荀卿荀卿趙人漢書名况趙人為齊稷下祭酒年五十始來逰學于齊騶衍之術迂大而閎辨奭也文具難施淳于髠久與處時有得善言故齊人頌曰談天衍雕龍奭炙轂過髠田駢之屬皆已死齊襄王時而荀卿三為祭酒焉齊人或讒荀卿荀卿乃適楚而春申君以為蘭陵令史記客說春申君曰湯以亳武王以鎬皆不過百里以有天下今荀子天下賢人也君藉之以百里之勢臣竊以為不便春申君曰善于是使人謝荀子荀子去之趙趙以為上卿客又說春申君曰昔伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊國未嘗不榮也今荀子天下賢人也君何辭之春申君又曰善于是使人請荀子荀子為書謝曰癘人憐王此不恭之語也雖然不可不審察也此為劫弒死亡之主言也夫人主事少而矜材無法術以知姧則大臣主斷國私以禁誅於已也故殺賢長而立幼弱廢正適而立不義春秋戒之曰楚王子圍聘于鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔杼帥其君黨而攻莊公莊公請與分國崔杼不許欲自刃于廟崔杼不許莊公走出踰于外牆射中其股遂殺之而立其弟景公近代所見李兑用趙餓主父于沙邱百日而殺之淖齒用齊擢閔王之筋懸于其廟梁宿昔而死夫癘雖癰腫胞疾上比前世未至絞纓射股下比近代未至擢筋而餓死也夫劫弒死亡之主也心之憂勞形之困苦必甚于癘矣由此觀之癘雖憐王可也因為賦曰寶珍隋珠不知佩兮禕衣與絲不知異兮閭妹子奢莫知媒兮嫫母求之又甚喜之兮以瞽為明以聾為聰以是為非以吉為凶嗚呼上天曷為其同詩曰上天甚神無自瘵也國策荀卿疾濁世之政亡國亂君相屬不遂大道而營于巫祝信禨祥鄙儒小拘如莊周等又滑稽亂俗于是推儒墨道德之行事興壞序列著數萬言而卒葬蘭陵史記史記春申君死荀卿廢因家蘭陵卒亦葬焉按國策荀卿去楚之趙豈後復歸于蘭陵邪人嘗論秦曰力術止義術行曷謂也曰秦之謂也威彊乎湯武廣大乎舜禹然而憂患不可勝校也諰諰然恐天下之一合而軋已也此所謂力術止也曷謂威彊乎湯武湯武能使說已者使耳今楚父死焉國舉焉負三王之廟而辟于陳蔡之間視可司間安欲剡其脛而蹈秦人之腹然而秦使左案左使右案右是使讐人役也曷為廣大乎舜禹曰古者百王之一天下未有過封內千里者也今秦南有沙羡與俱北與胡貊為鄰西有巴戎東有楚者乃界于齊在韓者踰常山乃在臨慮在魏者乃在圉津即去大梁百二十里在趙者剡然有苓而據松柏之塞負西海而固常山是地遍天下也威動海內彊殆中國然而憂患不可勝校也諰諰然常恐天下之一合而軋已也然則奈何曰節威反文案用夫端誠信全之君子與之參國政正是非治曲直聽咸陽順者錯之不順者而後誅之則兵不出于塞外而令行于天下矣若是雖築明堂于塞外而朝諸侯殆可矣假今之世益地不如益信之務也應侯問曰入秦何見荀卿曰其固塞險形勢便山林川谷美天材之利多是形勝也入境其百姓朴其聲樂不流汙其服不挑甚畏有司而順古之民也及都邑官府其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也入其國其士大夫入于公門歸于其家無有私事不比周不朋黨倜然莫不明通而公古之士大夫也觀其朝廷聽决百事不留恬然如無治者古之朝也故四世有勝非幸也數也是所見也雖然則甚有其諰也縣之以王者之功名則倜倜然其不及逺矣何也則其殆無儒邪故曰粹而王駮而霸無一焉而亡此亦秦之短也大略似過秦論而荀卿先及之臨武君與荀卿議兵于趙孝成王前王曰請問兵要臨武君對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要也荀卿曰不然臣聞古之道凡用兵之本在于一民弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者勢利也所行者變詐也善用兵者感忽悠暗莫知其所從出孫吳用之無敵于天下豈必待附民哉荀卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢利也所行攻奪變詐者諸侯之事也仁人之兵不可詐可詐者怠慢者也路亶者也君臣上下之間滑然有離德也故以桀詐桀猶巧拙有幸焉以桀詐堯若赴水火入焉焦沒耳故仁人上下百將一心三軍同力詐而襲之與先驚而後擊之一也且仁人之用十里之國則將有百里之聽用百里之國則將有千里之聽用千里之國則將有四海之聽必將聽明警戒和傳而一且夫暴國之君將誰與至哉其民之親我歡若父母反顧其上則若灼黥若仇讐豈肯為其所惡賊其所好者哉是使人之子孫自賊其父母也彼將來告又何可詐也孝成王臨武君曰善請問王者之兵設何道而可荀卿曰凡在大王將率末事也臣請遂道王者諸侯疆弱存亡之效齊人隆技擊其技也得一首者賜贖錙金無本賞矣是事小敵毳則偷可用也事大敵堅則渙焉離耳是亡國之兵也兵莫弱是矣魏氏之武卒以度取之衣三屬之甲操十二石之弩負服矢五十箇置戈其上冠䩜帶劍嬴三日之糧日中而趨百里中試則復其户利其田宅是數年而衰而未可奪也改造則不易周也是故地雖大其稅必寡是危國之兵也秦人其生民也狹隘其使民也酷烈劫之以勢隱之以厄忸之以慶賞鰌之以刑罰使天下之民所以要利於上者非鬭無由也五甲首而𨽻五家是最為衆疆長久多地以正故四世有勝非幸也數也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉故以詐遇詐猶有巧拙焉以詐遇齊譬以錐刀墮泰山也故齊之田單楚之莊蹻秦之衛鞅燕之繆蟣椅契司詐權謀傾覆未免盜民也齊桓晉文楚莊吳闔閭越句踐是皆和齊之兵也然而未有本統也故可以霸不可以王是疆弱之效也孝成王臨武君曰善請問為將荀卿曰知莫大乎無過事莫大乎無悔至無悔而止矣成不可必也故制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵决戰必道吾所明無道吾所疑夫是之謂六術無欲將而惡廢無急勝而亡敗無威內而輕外無見其利而不顧其害凡慮事欲熟而用財欲泰夫是之謂五權所以不受命于主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡受命于主而行三軍三軍既定百官得序羣物皆正則主不能喜敵不能怒夫是之謂至臣慮必先事而申之以敬慎終如始終始如一夫是之謂大吉敬謀無壙敬事無壙敬吏無壙敬衆無壙敬敵無壙夫是之謂五無壙慎行此六術五權三至而處之以恭敬無壙夫是之謂天下之將通於神明矣臨武君曰善請問王者之軍制荀卿曰將死鼓馭死轡百吏死職士大夫死行列不殺老弱不獵禾稼服者不禽格者不赦奔命者不獲凡誅非誅百姓也誅亂百姓者也微子開封於宋曹觸龍斷于軍殷之服民所以養生之者無異周人四海之內若一家通達之屬莫不從服夫是之謂仁師臨武君曰善荀子鼎録荀况在嵩溪作一鼎大如五石甕表裏皆紀兵法荀卿賦十篇儒家孫卿子三十三篇漢書韓非子韓非者韓之諸公子也喜刑名法術之學而其歸本于黃老非為人口吃不能道說而善著書與李斯俱事荀卿斯自以為不如非非見韓之削弱數以書諫韓王韓王不能用于是韓非疾治國不務修明其法制執勢以御其臣下富國疆兵而以求人任賢反舉浮淫之蠧加于功實之上以為儒者用文亂法而俠者以武犯禁寬則寵名譽之人急則用介胄之士今者所養非所用所用非所養悲廉直不容于邪枉之臣觀往者得失之變故作孤憤五蠧內外儲說林說難十餘萬言人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之游死不恨矣李斯曰此韓非之所著書也秦因急攻韓韓王始不用非及急乃遣非使秦秦王悅之未信用史記㑹四國為一將以攻秦秦王召羣臣問曰為之奈何羣臣莫對姚賈魏人對曰賈願出使四國必絶其謀而案其兵姚賈辭行絶其謀止其兵與之為交以報秦秦王大說封千户以為上卿韓非知之曰賈以珍珠重寶南使荆齊北使燕代三年四國之交未必合而珍珠重寶盡于內是賈以王之權外自交于諸侯願王察之且梁監門子嘗盜于梁臣于趙而逐而與同知社稷之計非所以厲羣臣也王召姚賈而問曰吾聞子以寡人財交于諸侯有諸對曰有曰有何面目見寡人對曰曾參孝其親天下願以為子子胥忠于君天下願以為臣使賈不忠于君四國之王尚焉用賈之身桀聽讒而誅其良將紂聽讒而殺其忠臣今王聽讒則無忠臣矣王曰子監門子梁之大盜趙之逐臣姚賈曰太公望齊之逐夫婦逐之也不經見朝歌之廢屠子良之逐臣事亦未詳棘津之讐不庸後志琅琊西海太公所出又釣于棘讐讐售同文王用之而王管仲齊鄙人之賈人也魯之免囚南陽之敝幽仲頴上人嘗以貧困隱修武南陽桓公用之而霸百里奚虞之乞人傳賣以五羊之皮穆公相之而朝西戎文公用中山盜而勝于城濮中山盜未詳此四士者皆有詬醜大誹天下明主用之知其可與立功也使若卞隨務光申屠狄人主豈得其用哉秦王曰然乃復使姚賈國策非常欲存韓上書秦王曰韓事秦三十餘年出則為扞蔽入則為席薦秦特出鋭師取韓地而隨之怨懸于天下功歸于疆秦且夫韓入貢職與郡縣無異也今臣竊聞貴臣之計舉兵將伐韓夫趙氏聚士卒養從徒欲贅天下之兵明秦不弱則諸侯必滅宗廟必西面行其意非一日之計也今釋趙之患而攘內臣之韓則天下明趙氏之計矣夫韓小國也而以應天下四擊主辱臣苦上下相與同憂久矣修守偹戒彊敵存蓄積築城池以固守今伐韓未可一年而滅拔一城而退則權輕于天下天下摧我兵矣韓叛則魏應之趙據齊以為原如此則以韓魏資趙假齊以固其從而以與爭彊趙之福而秦之禍也夫進而擊趙不能取退而攻韓弗能拔則陷鋭之卒勤于野戰負任之旅罷于內攻則合羣苦弱以敵而共二萬乘非所以亡趙之心也均如貴臣之計則秦必為天下兵質矣陛下雖以金石相弊則兼天下之日未也今賤臣之愚計使人使荆重幣用事之臣明趙之所以欺秦者與魏質以安其心從韓而伐趙趙雖與齊為一不足患也二國事畢則轉可以移書定也是我一舉二國有亡形則荆魏又必自服矣故曰兵者凶器也不可不審用也以秦與趙敵衡加以齊今又背韓而未有以堅荆魏之心夫一戰而不勝則禍構矣計者所以定事也不可不察也韓秦彊弱在今年耳且趙與諸侯隂謀久矣夫一動而弱于諸侯危事也為計而使諸侯有意我之心至殆也見二疏非所以彊于諸侯也臣竊願陛下之幸熟圖之夫攻伐而使從者間焉不可悔也詔以韓客之所上書言韓之未可舉下臣斯臣斯甚以為不然秦之有韓若人之有腹心之病也虛處則㤥然若居濕地者而不去以極走則發矣夫韓雖臣于秦未嘗不為秦病今若有卒報之事韓不可信也秦與趙為難荆蘇使齊未知何如以臣觀之則齊趙之交未必以荆蘇絶也若不絶是悉趙而應二萬乘也夫韓不服秦之義而服于彊也今専于齊趙則韓必為腹心之病而發矣韓與荆有謀諸侯應之則秦必復見崤塞之患非之來也未必以其能存韓也為重于韓也辨說屬辭飾非詐謀以鈞利于秦而以韓利窺陛下夫秦韓之交親則非重矣此自便之計也臣觀非之言文其淫說靡辨才甚臣恐陛下淫非之辨而聽其盜心因不詳察事情今以臣愚議秦發兵而未名所伐則韓之用事者以事秦為計矣臣斯請往見韓王使來入見大王見因內其身而勿遣稍召其社稷之臣以與韓人為市則韓可深割也因令䝉武發東郡之卒窺兵于境上而未名所之則齊人懼而從蘇之計是我兵未出而徑韓以威擒彊齊以義從矣聞于諸侯也趙氏破膽荆人狐疑必有忠計荆人不動魏不足患也則諸侯可蠶食而盡趙氏可得與敵矣願陛下幸審愚臣之計無忽秦遂遣斯使韓韓非子于是李斯姚賈害韓非毁之曰韓非韓之諸公子也今王欲并諸侯非終為韓不為秦此人之情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使自殺韓非欲自陳不得見秦王後悔之使人赦之非已死矣史記法家韓子五十五篇漢書論曰周末羣說蜂起厥流濫觴有道家老子列子莊子老成子鶡冠子環田接慎諸子是也有儒家荀子是也有名家尹文子是也有法家申韓是也有兵家尉繚子是也有墨家墨子是也爝火爥夜爭光一隅待孟子揭仲尼之說以正之夫然後昭昭乎賔朝日而斂羣隂矣尚史卷八十六
