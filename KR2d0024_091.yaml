body:
  text: 尚史卷九十二表六鑲白旗漢軍李鍇撰戰國年表夫漓王風而作偽者霸也破霸而以詐力重者戰國之變也戰國變而天紀絶人心危傾詖不嫌于誣恫疑不嫌于喝當是時衡固益強縱將餌弱六國委肉餓秦必無幸矣使韓魏之主疏知抉隱塞利守信結反覆之舌開仁義之門寄政于內協鄰于外夫如是則守封不亡韓魏不亡秦不得帝舊防無用制水有餘此之謂夫秦紀與六國世家事年多舛今參用之始皇用紀魯宋後亡衛訖二世别釐出之作戰國年表尚史卷九十二
  hash: sha256:b5fbc814f0fda4ae4a0cfb5b2cb081cc9f347f3782179bc0f74fac73417cc591
