body:
  text: 尚史卷二十世家十三鑲白旗漢軍李鍇撰燕世家始武王十三年終秦始皇二十五年凡九百一年傳四十三世惠侯僖侯頃侯哀侯鄭侯燕之先召公奭與周同姓武王滅紂封于北燕自召公以下九世至惠侯索隱燕四十二代有二惠侯二僖侯二宣侯二桓侯二文侯蓋國史微失本諡當厲王奔彘共和之時惠侯薨子僖侯即位是嵗宣王初立三十六年僖侯薨子頃侯即位頃侯九年宣王崩幽王立二十年幽王淫亂為犬戎所弒平王立周東遷二十四年頃侯薨子哀侯即位哀侯二年薨子鄭侯即位索隱諡法無鄭鄭或是名鄭侯三十六年薨史記世家穆侯七年入春秋宣侯桓侯莊公襄公桓公宣公昭公武公文公懿公穆侯鄭侯之子穆侯七年魯隱公元年也十八年桓元年穆侯薨子宣侯即位宣侯十三年桓十四年薨子桓侯即位系本桓侯徙臨易古史考系本自宣侯已上皆父子相傳桓侯以下並不言屬以其難明故也桓侯元年桓王崩莊王立桓侯七年莊三年薨子莊公即位莊公九年莊十二年莊王崩僖王立十四年莊十七年僖王崩惠王立十六年莊十九年王子頽伐周不克出奔溫冬衛師南燕師伐周立子頽十七年莊二十年鄭執南燕伯仲父以惠王歸處于櫟十八年莊二十一年鄭伯納王殺子頽史記燕與宋衛共伐周惠王出奔溫十七年鄭執燕仲父而納惠王按伐周乃南燕伯仲父非燕莊公奔溫乃王子頽非惠王又納王在十八年非十七年也史並誤二十七年莊三十年山戎侵我冬齊人伐山戎左傳公送齊侯出境齊侯因割公所至地豫我使我共貢天子如成周時職使復修召公之法史記世家三十三年僖二年公薨子襄公即位襄公六年僖八年惠王崩襄王立三十九年文八年襄王崩頃王立襄公四十年文九年薨桓公即位古史考系本襄伯生宣伯無桓桓公五年文十四年頃王崩匡王立十一年宣二年匡王崩定王立桓公十六年宣七年薨宣公即位宣公十五年成四年薨昭公即位昭公元年成五年定王崩簡王立昭公十三年成十七年薨武公即位武公二年襄元年簡王崩靈王立武公十九年襄十八年薨文公即位文公六年襄二十四年薨懿公即位懿公三年襄二十七年諸侯盟于宋四年襄二十八年公朝于晉公薨是年靈王崩景王立左傳惠公悼公共公平公簡公獻公十四年春秋終孝公成公湣公僖公桓公惠公名欵春秋昭三年書北燕伯欵出奔齊六年書齊侯伐北燕而傳曰將納簡公是簡公名欵也按史簡公後惠公四代姑從史懿公之子也元年襄二十九年齊髙止來奔公多寵姬公欲去諸大夫而立寵姬宋六年昭三年大夫共誅姬宋索隱宋名或作宗劉氏曰其父兄為執政故大夫共滅之公懼奔齊我立悼公悼公三年昭六年齊侯如晉請伐我晉許之齊遂伐我將納惠公四年昭七年齊侯次于虢燕寬我行成曰敝邑知罪敢不聽命先君之敝器請以謝罪春二月盟于濡上我歸燕姬賂以瑤甕玉櫝斚耳齊不克納惠公而還九年昭十二年齊髙偃納惠公于陽公羊伯于陽者公子陽生也蓋以公訛伯子訛于陽下脫生字此説誤公子陽生奔魯不奔燕納北燕公子陽亦無此書法也緣燕齊俱當悼公時故誤又史記六年惠公奔齊四年齊髙偃如晉請伐燕入其君晉與齊伐燕入惠公惠公至燕而死燕立悼公此説亦誤蓋以齊侯如晉誤為髙偃以納惠公于陽誤為至燕而死又上書六年下書四年是脫悼公二字十年昭十三年公薨史作七年蓋上縮惠公出已三年也共公即位共公五年昭十八年薨平公即位平公四年昭二十二年景王崩敬王立平公十九年定五年薨簡公即位簡公十二年哀二年薨獻公即位紀年簡公後次孝公無獻公獻公十三年哀十五年齊髙無丕來奔十四年哀十六年孔子卒十六年哀十八年敬王崩元王立二十四年元王崩定王立二十八年公薨左傳孝公即位孝公十五年薨成公即位成公九年定王崩考王立成公十六年薨湣公即位湣公八年考王崩威烈王立湣公三十一年薨僖公即位年表作釐侯莊索隱莊衍字是年三晉列為諸侯紀年文公二十四年卒簡公立簡公十三年三晉命邑為諸侯威烈王崩安王立二十七年安王崩烈王立三十年伐齊敗于林營公薨桓公即位桓公四年烈王崩顯王立桓公十一年薨史記世家文公易王王噲昭王惠王武成王孝王王喜文公系本作閔公桓公薨文公即位是嵗秦獻公卒秦益強二十八年蘇秦始來見説公公豫車馬金帛以至趙趙用之因約六國為從長秦惠王以其女為太子婦二十九年公薨太子即位是為易王齊宣王因我喪伐我取十城蘇秦説齊使復歸我十城十年燕君為王蘇秦與文公夫人私通懼誅乃説王使齊為反間欲以亂齊十二年易王薨子王噲即位史記世家或獻書于王噲曰燕王而不能自恃不惡卑名以事強事強可以令國安長久萬世之善計也以事強而不可以為萬世則不如合弱合弱將奈何合弱而不能如一此臣所以為山東苦也比目之魚不相得則不能行故古人稱之以其合兩而如一也今山東合弱而不能如一是山東之智不如魚也又如車士之引車也三人不能行索二人五人而車因行矣今山東三國弱而不能敵秦索二國因能勝秦矣然而山東不知相索者智故不如車士矣胡與越人言語不相知志意不相通同舟而凌波至其相救助如一也今山東之相與也如同舟而濟秦兵至不能相救助如一智又不如胡越之人矣三物者人之所能為也山東主不悟此臣之所為山東苦也願大王之熟慮之也山東相合之主不惡卑名之國者可長存之卒者之猶其也卒猝同出士以戍韓梁之西邊此燕之上計也不急為此國必危矣王必大憂今韓梁趙三國已合矣秦見三晉之堅也必南伐楚趙見秦之伐楚也必攻燕物固有勢異而患同者秦之伐韓故中山亡秦不暇救故趙亡之今秦之伐楚燕必亡趙亡之臣竊為王計不如以兵南合三晉約戍韓梁之西邊山東不能堅為此此必皆亡燕果以兵南合三晉國䇿是年顯王崩慎靚王立與三晉攻秦不勝而還子之相燕貴重主斷王噲屬國于子之子之南面行王事而噲老不聽政願為臣六年慎靚王崩赧王立子之任政三年國大亂百姓恫恐將軍市被與太子平謀將攻子之齊王令人謂太子平曰寡人聞太子之義將廢私而立公飭君臣之義明父子之位寡人之國小不足以為先後雖然唯太子所以令之太子因要黨聚衆將軍市被圍公宫攻子之不克市被及百姓反攻太子平市被死以徇按子之亂燕百姓恫恐太子平內順國人外倚強齊舉事必克何為百姓反攻太子至齊師伐燕而後士卒不戰城門不閉乎一子之爾于太子則拒之于齊師則迎之燕民顧若是憒憒哉史遷本于國䇿恐誤國搆難數月死者數萬衆燕人恫恐百姓離志齊王伐燕士卒不戰城門不閉王噲死子之亡齊大勝燕年表君噲及太子相之子皆死紀年子之殺公子平齊破燕擒子之而醢其身又二年而國人共立昭王國䇿以昭王即為太子平按年表紀年一云平死于亂一云為子之所殺夫平外倚齊援內除國難卒得噲死身立是齊與有力不應懷破燕之恥成報齊之功且平幾先舉事不克而不死國滅二年而復立理殊不然是太子平與昭王非一人明矣昭王于破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始况賢于隗者豈逺千里哉于是王為隗改築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趨燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰于是以樂毅為上將軍與秦楚三晉合謀以伐齊齊兵敗湣王出亡我兵獨追北入至臨淄盡取齊寶燒其宫室宗廟齊城不下者唯莒即墨其餘皆屬燕三十三年昭王薨子惠王即位惠王為太子時與樂毅有隙及即位疑毅使騎劫代將樂毅亡走趙齊田單擊敗我軍悉復得其故城七年惠王薨趙世家惠文王二十八年燕相成安君公孫操弒其王樂資以為即惠王也武成王即位韓魏楚共伐我武成王七年齊田單伐我拔中陽十四年武成王薨子孝王即位孝王三年薨子王喜即位王喜四年王命相栗腹約歡趙還報王曰趙可伐也于是栗腹將而攻鄗卿秦攻代趙使亷頗擊破栗腹于鄗破卿秦于代國䇿亷頗以二十萬遇栗腹于鄗樂乘以五萬遇慶秦于代燕人大敗而史樂毅傳謂亷頗破卿秦樂乘于代亷頗逐之五百餘里圍我國我請和乃解圍去六年秦滅東西周十二年趙李牧攻我拔武遂方城我使劇辛將擊趙趙擊取我軍二萬殺劇辛二十三年太子丹質于秦亡歸二十七年我見秦王且滅六國秦兵臨易水禍且至燕太子丹隂養壯士二十人使荆軻獻督亢地圖于秦因襲刺秦王秦王覺殺軻使將軍王翦擊我二十九年秦攻拔我薊王喜亡徙居遼東斬丹以獻秦三十年秦拔遼東虜王喜卒滅燕贊曰燕周同姓國又君奭之後乃亡宗周之義不與中國會盟邾滕恥為屬國而楚秦醜于自夷燕顧何心夷然自外耶昭王末奮若將嗣伯似續不副厥成天也語有之虎皮蒙羊餧肉于狼君噲子之乃為堯舜禪也尚史卷二十
