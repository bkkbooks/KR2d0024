body:
  text: 尚史卷七十列傳四十八鑲白旗漢軍李鍇撰趙諸臣傳虞卿虞卿者游說之士也躡蹻擔簦說趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿秦趙戰于長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死寡人求束甲而趨之何如樓昌曰無益也不如發重使為媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聼臣發使出重寶以附楚魏楚魏欲得王之重寶必內吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聼與平陽君為媾發鄭朱入秦秦內之趙王召虞卿曰寡人使平陽君為媾于秦秦已內鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦既解邯鄲圍而趙王入朝使趙郝約事于秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能盡此彈丸之地弗豫令秦來年復攻王王得無割其內而媾乎王曰請聼子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交于秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻于秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾來年秦復攻王王得無割其內而媾乎令媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之于天下而取償于秦也吾國尚利孰與坐而割地自弱以彊秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王嵗以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰彊者善攻弱者不能守今坐而聼秦秦兵不弊而多得地是彊秦而弱趙也以益彊之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無己以有盡之地而給無己之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰豫秦地何如母豫孰吉緩辭讓曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕于魯病死女子為自殺于房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐于魯而是人不隨也今死而婦人為之自殺者二人若是者必其于長者薄而于婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿豫則非計也言豫之恐王以臣為為秦也故不敢對使臣得為大王計不如豫之王曰諾虞卿聞之入見王曰此飾說也王眘勿豫樓緩聞之往見王王又以虞卿之言告樓緩樓緩對曰不然虞卿得其一不得其二夫秦趙搆難而天下皆說何也曰吾且因彊而乘弱矣今趙兵困于秦天下之賀戰勝者則必盡在于秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之彊怒乘趙之弊瓜分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此决之勿復計也虞卿聞之往見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿豫者非固勿豫而已也秦索六城于王而王以六城賂齊齊秦之深讐也得王之六城并力西擊秦齊之聼王不待辭之畢也則是王失之于齊而取償于秦也而齊趙之深讐可以報矣而示天下有能為也王以此發聲兵未窺于境臣見秦之重賂至趙而反媾于王也從秦為媾韓魏聞之必盡重王重王必出重寶以先于王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去國策作樓緩無樓昌趙郝趙于是封虞卿以一城居頃之而魏請為從趙孝成王召虞卿謀過平原君平原君曰願卿之論從也虞卿入見王王曰魏請為從對曰魏過王曰寡人固未之許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則從終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過竊以為從便王曰善乃合魏為從虞卿既以魏齊之故不重萬户侯卿相之印與魏齊間行卒去趙困于梁魏齊已死不得意乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋史記儒家虞氏春秋十五篇漢書孔叢子虞卿著書名春秋魏齊曰子無然也春秋孔聖所以名經也今子之書談說而已亦以為名何曰經者取其事常也可常則為經矣且不為孔子其無經乎公孫龍孔穿子順附公孫龍趙人列子為平原君客空雄之遇秦趙相約曰自今以來秦所欲為趙助之趙所欲為秦助之無何秦攻魏趙欲救之秦使讓趙曰秦欲攻魏而趙助之非約平原君以告龍龍曰亦可發使讓秦曰趙欲救之秦獨不助趙非約趙惠王謂龍曰寡人事偃兵十餘年矣而不成兵不可偃乎龍曰偃兵之意兼愛天下之心也不可以虛名必有其實今藺離石入秦而王縞素出總東攻齊得城而王加膳置酒秦得地而王出總齊亡地而王加膳所非兼愛之心也此偃兵之所以不成也今有人無禮慢易而求敬阿黨不公而求令煩號數變而求靜暴戾貪得而求定雖黃帝猶若困龍又說燕昭王以偃兵昭王曰甚善願客計之龍曰竊意大王之弗為也王曰何故曰日者大王欲破齊諸天下之士欲破齊者大王盡養之知齊之險阻要害君臣之際者大王盡養之雖知而弗欲破齊者大王猶若弗養其卒果破齊以為功今大王曰我其偃兵諸侯之士在大王之朝者盡善用兵者也臣是以知大王之弗為也吕氏春秋淮南子公孫龍在趙之時謂弟子曰人而無能者吾不與遊有客衣褐帶索而見曰臣能呼龍顧謂弟子曰門下故有能呼者乎對曰無龍曰與之弟子之籍後數日往說燕至河上而航在一汜使善呼者呼之一呼而航來龍疾名實之散亂為守白之論謂白馬非馬公孫龍子有孔穿者字子髙仲尼之後或謂穿曰此小人辨而毁大道子盍往正諸穿適趙衣長裾振褎袖方屐粗翣見平原君君曰子亦儒服乎穿曰此布衣之服非儒服也儒服非一也平原君曰請子言之曰夫儒者居位行道則有衮冕之服統御師族則有介胄之服從容徒步則有若穿之服平原君曰儒之為名何取爾曰取包衆美兼六藝動靜不失中道穿與龍㑹平原君家謂之曰僕居魯遂聞下風而髙先生之行然所不取于先生以白馬為非白馬誠去非白馬之學穿請為弟子龍曰先生之言悖也龍之學正以白馬非白馬也去之則龍無以教矣且夫學于龍者以智與學不逮也今教龍去白馬非白馬是先教也而後師之不可也先王之所教龍者似齊王之問尹文也齊王曰寡人甚好士而齊無士尹文曰今有人事君忠事親孝交友信處鄉順可謂士乎王曰是真所謂士也曰王得此人以為臣乎曰所願也尹文曰使此人見侮而不敢鬬王將以為臣乎王曰見侮不鬬是辱則寡人不以為臣矣曰雖見侮不鬬是未失所以為士也然而王不以為臣則鄉所謂士者乃非士乎夫王之令殺人者死傷人者刑民有畏令見侮終不敢鬬是全王之法也而王不以為臣是罰之也且王以不鬬為辱必以敢鬬為榮是王之所賞吏之所罰也賞罰曲謬雖十黃帝不能治也齊王無以應且白馬非白馬者乃子先君仲尼之所取也龍聞楚王喪其弓左右請求之王曰楚人遺弓楚人得之又何求乎仲尼聞之曰亦曰人得之而已矣何必楚若是者仲尼異楚人于所謂人也夫是仲尼之異楚人于所謂人而非龍之異白馬于謂馬悖也穿莫之應退而告人曰言非而博巧而不理此固吾所不答也異日平原君㑹衆賔而延穿平原君曰先生欲去夫公孫子白馬之學是非未分而先生翻然欲髙逝可乎穿曰理之至精者自明之豈任穿之退哉平原君曰至精之說可得聞乎曰春秋記六鷁退飛覩之則六察之則鷁鷁猶馬也六猶白也覩之得見其白察之則知其馬色以名别內由外顯謂之白馬名實當矣若以絲麻加之女工為緇素青黃色名雖殊其實則一􅀈牛𤣥武此類甚衆先舉其色後名其質萬物之所同聖賢之所常也若尹文之折齊王之所言與其法錯故也楚王之言楚人亡弓楚人得之先君探其本意欲以示廣其實狹之故曰不如亦曰人得之而已也是異楚王之所謂楚非異楚王之所謂人也凡言人者總謂人也亦猶言馬者總謂馬也楚自國也白自色也欲廣其人宜在去楚欲正名色不宜去白忱察此理則公孫之辨破矣平原君顧謂衆賔曰公孫子能答此乎燕客史由曰辭則有焉理則否矣龍又與穿記論于平原君所辨理至于臧三耳龍言臧之三耳甚辨析穿弗應明日復見平原君曰疇昔公孫之言信辨也先生以為何如曰然幾能臧三耳矣雖然實難僕願問君今為臧三耳甚難而實非也謂臧兩耳甚易而實是也君將從易而是者乎亦從難而非者乎平原君弗能應明日謂龍曰公無與孔子髙辨其人理勝于辭公辭勝于理辭勝于理終必絀吕氏春秋作臧三牙史記平原君厚待公孫龍龍善為堅白之辨及鄒衍過趙言至道乃絀龍劉向别録鄒衍過趙平原君見公孫龍及其徒綦母子之屬論白馬非白馬之辨以問鄒子鄒子曰不可彼天下之辨有五勝三至而辭正為下辨者别殊類使不相害序異端使不相亂抒意通指明其所謂使人與知焉不務相迷也故勝者不失其所守不勝者得其所求故辨可為也及至煩文以相假飾辭以相悖巧譬以相移引人聲使不得及其意如此害大道夫繳紛爭言而競後息不能無害君子坐皆稱善平原君嘗與孔穿飲强穿酒曰遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也吾子何辭焉穿曰以穿所聞聖賢以道德兼人未聞以飲食也平原君曰如先生言則此言何生曰生于嗜酒者蓋其勸厲奬戲之辭非實然也平原君欣然曰吾不戲子無所聞此雅言也孔叢子公孫龍嘗爭論白馬非馬人不能詘後乘白馬無符傳欲出關關吏不聼新論名家公孫龍子十四篇漢書孔穿子子順穿以為平原君霸世之士惜其不遇時子順以為衰世之好事公子無伯相之才也魏王聘子順為相子順改嬖寵之官以事賢才奪無任之祿以賜有功諸喪職秩者乃造謗言文咨以告子順曰民不可與慮始久矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君相魯三月而後謗止今吾為政日新庸知謗止無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君初相魯魯人謗誦曰麛裘而芾投之無戾芾之麛裘投之無郵及三年政成民又作誦曰衮衣章甫實獲我所章甫衮衣惠我無私魏王使修好鄰國遂連和于趙趙王燕問子順曰寡人欲求北狄不知其所以然答曰誘之以所利而與之通市王曰寡人欲弱之若與交市分我貨與狄是疆之也可乎曰與之市者以我無用之貨取其有用之物是所以弱之之術也衣服之物珠玉五綵飲食之物酒醪五熟此我之所有而彼之所利者也牛馬旃裘弓矢之器是其所饒而輕以與人者也以吾所有易彼所饒狄將糜于衣食矣殆可舉棰而驅豈徒弱之魏王謂子順曰吾欲致天下之士奈何對曰昔周穆王問祭公謀父曰吾欲得天下賢才對曰去其帝王之色則得矣臣亦請君去其尊貴之色而已子順相魏九月陳大計輒不用乃退而以病致事人謂子順曰子其行乎曰吾行之山東則山東之國將并于秦秦為不義義所不入遂寢于家孔叢子孔叢子新垣固謂子順曰子相魏未聞異政而即自退何也曰以無異政所以退也且死病無良醫今秦有吞食天下之心山東之國弊而不振三晉割地以求安二周折節而入秦燕齊宋楚已屈服不出二十年天下盡為秦乎史記子髙生子慎年五十七嘗為魏相諒毅趙使附諒毅者蓋亦趙人也孝成王九年秦攻魏取寧邑諸侯皆賀王亦使賀三反不得通王憂之曰往賀而不得通此必加兵于我為之奈何左右曰使者三往不得通必所使者非其人也曰諒毅者辨士也大王可試使之毅親受命而往至秦獻書秦王曰大王廣地寧邑諸侯皆賀敝邑寡君亦竊嘉之不敢寧居使下臣奉其幣物三至王廷而使不得通使若無罪願大王無絶其歡若使者有罪願得請之秦王使使者報曰吾所使趙國者小大皆聼則受書幣不從則使者歸矣毅對曰下臣之來固承大國之意也豈敢有難大王令之請奉而行之無所敢疑于是秦王乃見使者曰趙豹平原君數欺弄寡人趙能殺之則可不能請率諸侯受命邯鄲城下毅曰趙豹平原君親寡君之母弟也猶大王之有華陽涇陽君也大王以孝治聞于天下衣服之便于體膳啖之嗛于口未嘗不分于華陽涇陽君華陽涇陽之車馬衣服無非大王之服御者臣聞之覆巢毁卵而鳳凰不翔刳胎焚夭而麒麟不至今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷華陽涇陽之心乎秦王曰諾勿使從政毅曰敝邑之君有母弟不能教誨以惡大國請黜之勿使與政事以稱大國秦王乃喜受幣而厚遇之國策韓詩外傳趙王使人于楚鼓瑟而遣之曰慎無失吾言使者受命伏而不起曰大王鼓瑟未嘗若今日之悲也王曰調使者曰調則可記其柱王曰不可天有燥濕絃有緩急柱有推移不可記也使者曰楚之去趙也千有餘里有吉凶之變凶則弔吉則賀猶柱之有推移不可記也縮髙縮髙者趙之安陵人事安陵君魏攻管而不下髙之子為管守信陵君使人謂安陵君曰君其遣縮髙吾將仕之以五大夫使為持節尉安陵君曰安陵小國也不能必使其民使者自往請道使者至髙之所復信陵君之命髙曰君之幸髙也將使髙攻管也夫以父攻子守人大笑也見臣而下是背主也父教子背亦非君之所善也敢再拜辭使者以報信陵君大怒遣使之安陵曰安陵之地亦猶魏也今吾攻管而不下則秦兵及我社稷必危矣願君生束縮髙而致之弗致將發十萬之師以告安陵之城安陵君曰吾先君成侯受詔襄子以守此地也手受大府之憲憲之上篇曰子弒父臣弒君有常刑不赦國雖有赦降城亡子不得與焉今縮髙謹辭大位以全父子之義而君曰必生致之是使我負襄子詔而廢大府之憲也雖死不敢行髙聞之曰信陵君為人悍而自用此辭反必為國禍吾已全矣無違人臣之義矣豈可使吾君有魏患也乃之使者之舍刎頸而死信陵君聞之服縞素避舍使使謝安陵君曰無忌小人也困于思慮失言于君敢再拜釋罪國䇿論曰知氏善養士故多令臣或挽于前或推于後然而大車以敗不救其亡愎以濟貪必無幸矣既死無後而猶使豫讓兩報故主嗟乎呼天擊衣豈唯三晉之士為之涕泣哉縮髙不教子二有晉之遺風焉蕩之什曰雖無老成人尚有典型此豫于家臣而有述焉者也趙諸公子傳公子朝公子勝公子緤公子章公子朝武公子也武公薨趙武立列侯太子章趙武未詳其人是為敬侯敬侯元年公子朝作亂不克出奔魏敬侯薨子成侯即位成侯元年公子勝與成侯爭立為亂勝某公子未詳成侯薨公子緤與太子肅侯爭立緤亦未詳緤敗亡奔韓武靈王時則有公子章章武靈王長子也武靈王二十一年攻中山趙祒為右軍許鈞為左軍章為中軍王并將之取鄗石邑封龍東垣中山獻四邑和二十七年立子何為王是為惠文王王自號為主父封章為代安陽君章素侈心不服其弟所立主父又使田不禮相章四年朝羣臣章亦來朝主父令王聼朝而自從旁觀窺羣臣宗室之禮見章傫然也反北面為臣詘于其弟心憐之于是乃欲分趙而王章于代計未决而輟主父及王游沙邱異宫章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之公子成與李兑入距難殺章及田不禮滅其黨賊因圍主父主父餓死沙邱宫史記世家趙豹平陽君趙豹者惠文王之母弟也惠文王二十七年封豹為平陽君史記世家豹武靈王初立有陽文君趙為相别是一人惠文王薨孝成王即位秦軍臨韓韓恐請效上黨之地上黨守馮亭隂使人請于王曰韓不能守上黨且以與秦其民皆不欲為秦而願為趙今有城市之邑七十願拜納之于王惟王才之王喜召豹告之曰韓不能守上黨且以與秦其吏民不欲為秦而皆願為趙今馮亭令使者以與寡人何如豹對曰臣聞聖人甚禍無故之利王曰人懷吾義何謂無故乎對曰秦蠶食韓氏之地中絶不令相通故自以為坐受上黨也且夫韓所以內趙者欲嫁其禍也秦被其勞而趙受其利雖强大不能得之于小弱而小弱顧能得之强大乎今王取之可謂有故乎且秦以牛田水通糧其死士皆列于上地令嚴政行不可與戰王自圖之王大怒曰夫用百萬之衆攻戰踰年未見一城今不用兵而得城七十何故不為豹出王召趙勝趙禹而告之曰韓不能守上黨今其守以與寡人有城市之邑七十二人對曰用兵踰年未見一城今坐而得城七十此大利也乃使趙勝往受地嚴尤三將叙平原君勸孝成王受馮亭王曰受之秦兵必至武安君必將誰能當之對曰澠池之㑹臣察武安君頭小而面鋭瞳子黑白分明視瞻不轉可與持久難與爭鋒亷頗勇鷙而愛士知難而忍耻與之野戰則不如持久足以當之王從其計秦王怒以兵遇趙于長平趙軍戰不勝都尉係死王使豹與秦講發鄭朱入秦秦內鄭朱而趙卒不得講攻趙于長平大破之國䇿國策平原君謂平陽君曰公子牟遊于秦且東而辭應侯應侯曰公子將行矣獨無以教之乎曰且微君之命命之也固且有效于君夫貴不與富期而富至富不與梁肉期而梁肉至梁肉不與驕奢期而驕奢至驕奢不與死亡期而死亡至纍世以前坐此者多矣應侯曰公子所以教之者厚矣僕得聞此不忘于心願君之亦勿忘也平陽君敬諾韓非子趙王遊于囿左右以莵與虎而輟觀之肹然環其眼王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目若此則必死矣明日平陽君殺言者而王不誅也趙勝平原君毛遂附李談廬陵君長安君趙勝者武靈王之子惠文王之母弟也諸子中勝最賢喜賔客賔客蓋至者數千人勝相惠文王及孝成王三去相三復位封于東武城號平原君平原君家樓臨民家民家有躄者槃散行汲平原君美人居樓上臨見大笑之明日躄者至平原君門請曰臣聞君之喜士士不逺千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宫臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原君笑曰觀此豎子乃欲以一笑之故殺我美人不亦甚乎終不殺居嵗餘賔客門下舍人稍稍引去者過半平原君怪之曰勝所以待諸君者未嘗敢失禮而去者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳于是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來是時齊有孟嘗魏有信陵楚有春申故爭相傾以待士秦之圍邯鄲趙使平原君求救合從于楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則歃血于華屋之下必得定從而還士不外索取于食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊于平原君曰遂聞君將合從于楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下幾年于此矣毛遂曰三年于此矣平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年于此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃頴脫而出非特其末見而已平原君竟與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚合從言其利害日出而言之日中不决十九人謂毛遂曰先生上毛遂按劍厯階而上謂平原君曰從之利害兩言而决耳今日出而言從日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂按劍而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命懸于遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈在士卒衆多乎誠能據其勢而奮其威今楚地方五千里持㦸百萬此霸王之資也以楚之彊天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從次者吾君次者遂遂定從于殿上毛遂左手持盤血而右手招十九人曰公相與歃此血于堂下公等碌碌所謂因人成事者也平原君已定從而歸歸至于趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃于毛先生而失之也毛先生一至楚而使趙重于九鼎大吕毛先生以三寸之舌彊于百萬之師勝不敢復相士遂以為上客平原君既返趙楚使春申君將兵赴救趙魏信陵君亦矯奪晉鄙軍往救趙皆未至秦急圍邯鄲邯鄲急且降平原君甚患之邯鄲傳舍吏子李談說平原君曰君不憂趙亡邪平原君曰趙亡則勝為虜何為不憂乎李談曰邯鄲之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘梁肉而民褐衣不完糟糠不厭民困兵盡或􅗄木為矛矢而君器物鍾磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編于士卒之間分功而作家之所有盡散以饗士士方其危苦之時易德耳于是平原君從之得敢死之士三千人李談遂與三千人赴秦軍秦軍為之却三十里亦㑹楚魏救至秦兵遂罷邯鄲復存李談戰死封其父為李侯虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君曰龍聞虞卿欲以信陵君之存邯鄲為君請封有之乎平原君曰然龍曰此甚不可且王舉君而相趙者非以君之智能為趙國無有也割東武城而封君者非以君為有功也而以國人無勳乃以君為親戚故也君受相印不辭無能割地不言無功者亦自以為親戚故也今信陵君存邯鄲而請封是親戚受城而國人計功也此甚不可且虞卿操其兩權事成操右劵以責事不成以虛名德君君必勿聼也平原君遂不聼虞卿平原君以趙孝成王十五年卒子孫代後竟與趙俱亡史記又有廬陵君長安君並孝成王母弟孝成王為燕逐廬陵君而長安君為趙質于齊國䇿論曰趙襄子有云非德不當雍正與聖人禍無故之利同上黨之入執塗人而問之無有可者乃平原賢者而阿匼焉謂之知不逮豹愚竊惑之平原喜客其著聞者唯遂然近者遺李談逺者遺毛薛是故數千人無論已彼所謂十九人者亦終碌碌而已矣士之難邪好士之難邪趙嬖臣傳建信君郭開附韓倉建信君名族未詳事孝成王貴于趙或謂建信君曰君之所以事王者色也蓇之所以事王者知也蓇趙人名色老而衰智老而多以日多之智而逐衰惡之色君必困矣建信君曰奈何曰並驥而走者五里而罷乘驥而御之不倦而取道多君令蓇乘獨斷之車御獨斷之勢以居邯鄲令之內治國事外刺諸侯則蓇之事有不言者矣君因言王而重責之蓇之軸折矣建信君再拜受命未期年蓇亡走魏謂建信君曰人有置係蹄者而得虎虎怒决蹯而去虎之情非不愛其蹯也然而不以環寸之蹯害七尺之軀者權也今有國非直七尺之軀也而君之身于王非環寸之蹯也願君熟圖之公子魏牟過趙王迎之顧反至坐前有尺帛且令工人以為冠工見客來因避王曰公子乃驅後車幸以臨寡人願聞所以為天下魏牟曰重國若此尺帛則王之國大治矣王不說曰先王不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無怒請為王說之曰王有此尺帛何不令前郎中以為冠王曰郎中不知為冠牟曰為冠而敗奚虧于國而王必待工今為天下之工或非也社稷為虛戾先王不血食而王不以豫工乃與幼艾且王之先帝駕犀首驂馬服以與秦角逐秦避其鋒今王憧憧乃輦建信以與强秦角逐臣恐秦折王之輢也客見王曰臣聞王買馬有之乎曰有之何故不遣曰未得買馬之工也曰何不遣建信君曰建信君有國事又不知相馬曰何不遣紀姬曰紀姬婦人也不知相馬曰買馬而善何補于國買馬而惡何危于國而王必將待工今治天下舉錯非也國家為虛戾而社稷不血食而王不待工而與建信君何也燕郭之法有所謂桑雍者桑中有蠧外磈磈如癰王知之乎所謂桑雍者便辟左右之人及夫人優愛孺子也此皆能乘王之醉昏而求所欲于王者也是能得之于內則大臣為之枉法于外矣國䇿國䇿苦成常謂建信君曰天下公從而獨以趙惡秦何也魏殺吕遼天下交之今收河間與殺吕遼何以異君唯飾虛僞侯文信猶且知之也從而有功乎何患不得收河間從而無功收河間何益也國䇿希寫見建信君建信君曰文信侯之于僕也甚無禮秦人來仕僕官之丞相爵五大夫文信侯之于僕也甚無禮也希寫曰臣以為今用事者不如商賈建信君悖然曰足下卑用事者乎曰不然夫良賈不與人爭買賣之賈而謹司時時賤而買雖貴已賤矣時貴而賣雖賤已貴矣昔者文王拘于牖里而武王羇于玉門卒斬紂頭懸于太白是武王之功也今君不能與文信侯相抗以權而責文信侯少禮臣竊為君不取也按此建信君蓋主從而不附秦所以收河間不以封文信侯也王遷時嬖郭開韓倉二人者惡亷頗李牧卒放殺之以亡趙國論曰建信君史不載蓋如龍陽安陵而主斷國事者非其媕婀固寵無以取之而乘驥係虎且濟惡焉詩曰憂心悄悄慍于羣小小人比周靡有孤立而不羣從者也王遷時國已垂焚乃郭開韓倉方且交扇左右誅放大臣先笑後號亦終旅于秦而已趙夫人傳惠后惠后者名娃嬴是為孟姚吳廣之女也初簡子疾三日而寤夢之帝所甚樂帝曰余思虞舜之勳適余將以其胄女孟姚配而七世之孫至武靈王即位初娶韓女為夫人十六年王遊大陵他日王夢見處女鼓瑟而歌詩曰美人熒熒兮顔若苕之榮命乎曾無我嬴異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而內其女娃嬴孟姚也孟姚甚有寵于王是為惠后惠后生王子何二十五年惠后卒史記世家惠文后惠文后者是為威后惠文王之夫人也生孝成王及長安君惠文王薨孝成王少威后用事齊王嘗使使者問威后書未發威后問使者曰嵗亦無恙邪民亦無恙邪王亦無恙邪使者不說曰臣奉使使威后今不問王而先問嵗與民豈先賤而後尊貴者乎威后曰不然茍無嵗何有民茍無民何有君故有問舍本而問末者邪乃進而問之曰齊有處士曰鍾離子無恙邪是其為人也有糧者亦食無糧者亦食有衣者亦衣無衣者亦衣是助王養其民者也何以至今不業也業陽子無恙乎是其為人哀鰥寡恤孤獨振困窮補不足是助王息其民者也何以至今不業也北宫之女嬰兒子無恙邪徹其環瑱至老不嫁以養父母是皆率民而出于孝情者也胡為至今不朝也此二士弗業一女不朝何以王齊國子萬民乎於陵子仲尚存乎是其為人也上不臣于王下不治其家中不索交諸侯此率民而出于無用者何為至今不殺乎國䇿孝成王二年惠文后卒史記世家尚史卷七十
