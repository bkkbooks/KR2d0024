body:
  text: 尚史卷三十四列傳十二鑲白旗漢軍李鍇撰叛臣傳豎牛南蒯豎牛者庚宗婦人之子也初叔孫穆子去叔孫氏以辟僑如之難也及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶于國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及僑如奔齊魯人召叔孫歸既立所宿庚宗之婦人獻以雉問其姓女生曰姓謂子也對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛則曰唯皆召其徒使視之遂使為豎有寵長使為政齊公孫明知叔孫于齊叔孫歸未逆國姜孟仲母明取之故怒其子長而後使逆之昭公四年叔孫田于邱蕕遇疾豎牛欲亂其室而有之强與孟丙盟不可叔孫為孟丙鐘為孟丙鑄鐘曰爾未際未與諸大夫相接見饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客北婦人即國姜客謂公孫明叔孫怒将往牛止之賔出使拘而殺諸外牛又强與仲壬盟不可仲壬與公御菜書觀于公私遊觀于公宫公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊叔孫疾急命召仲壬牛許而不召豎牛曰夫子疾病不欲見人使寘饋于个个東西廂而退牛弗進則置虚命徹叔孫絶食三日卒牛立昭子叔孫婼而相之公使杜洩叔孫氏宰葬叔孫牛賂叔仲昭子叔仲帶與南遺使惡杜洩于季孫而去之仲壬至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛攻諸大庫之庭司宫射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庻又披其邑将以赦罪罪莫大焉必速殺之豎牛懼奔齊孟丙仲壬之子殺諸塞闗之外投其首于寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之南遺者季氏費邑宰襄公七年季氏城費南遺之請也其子南蒯亦為費邑宰季平子立不禮于南蒯南蒯謂公子憗曰吾出季氏而歸其室于公子更其位我以費為公臣公子憗許之南蒯語叔仲小且告之故故叔仲小南蒯公子憖謀季氏昭公十二年憖告公遂從公如晉南蒯懼不克以費叛如齊憗還及衞聞亂亦奔齊十三年叔弓圍費弗克敗焉季平子怒令見費人執之以為囚俘冶區夫魯大夫曰非也若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民将叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之南蒯之將叛也其鄉人或知之過之而歎且言曰恤恤乎湫乎攸乎恤恤憂患湫愁隘攸懸危之貎深思而淺謀邇身而遠志家臣而君圖有人矣哉將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎己乎己乎非吾黨之士乎其將叛也盟費人司徒老祁慮癸二人南蒯家臣偽廢疾使請于南蒯曰臣願受盟而疾興若以君靈不死請待間而盟許之十四年二子因民之欲叛也請朝衆而盟遂刼南蒯曰羣臣不忘其君君謂季氏畏子以及今三年聽命矣子若弗圖費人不忍其君將不能畏子矣子何所不逞欲請送之南蒯請期五日遂奔齊司徒老祁慮癸來歸費南蒯侍飲酒于景公公曰叛夫對曰臣欲張公室也子韓晢齊大夫曰家臣而欲張公室罪莫大焉左傳陽虎仲梁懐林楚附陽虎季氏家臣季平子逐昭公公處于鄆昭公二十七年孟懿子陽虎伐鄆欲奪公敗公徒于且知定公五年季平子行東野還卒于房陽虎將以璵璠斂仲梁懐弗與曰改步改玉昭公之出季孫珮璵璠祭宗廟今定公立復臣位改步亦改玉也仲梁懐者亦季氏之家臣也陽虎欲逐之秋九月陽虎囚季桓子及公父文伯即公父歜而逐仲梁懐冬十月丁亥殺公何藐季氏族己丑盟桓子于稷門之内庚寅大詛逐公父文伯及秦遄皆奔齊遄平子姑婿六年公侵鄭往不假道于衛及還陽虎欲怒衛使季孟自南門入出自東門舍于豚澤衛侯怒使追之公叔發曰天將多陽虎之罪以斃之君姑待之乃止夏季桓子如晉獻鄭俘陽虎强使孟懿子往報夫人之幣晉人兼享之孟孫立于房外謂范獻子士鞅曰陽虎若不能居魯而息肩于晉所不以為中軍司馬者有如先君范獻子曰魯人患陽虎矣秋八月陽虎又盟公及三桓于周社盟國人于亳社詛于五父之衢七年齊人歸鄆及陽闗陽虎居之以為政秋齊伐我陽虎将宵軍齊師齊師墮伏而待之墮毁其軍以誘敵而設伏兵公斂陽孟氏臣苫夷季氏臣力争之虎懼乃還季寤季桓子弟公鉏極公彌曾孫公山不狃費宰皆不得志於季氏叔孫輒叔孫氏庻子無寵于叔孫氏叔仲志叔仲帶之孫不得志于魯故五人因陽虎虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏八年冬十月順祀先公而祈焉辛卯禘于僖公壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至孟氏聞之選圉人之壯者三百人偽為公期孟氏支子築室于門外以備之及期陽虎前驅林楚御桓子虞人以鈹盾夾之虎從弟陽越殿將如蒲圃桓子覺之咋謂林楚曰咋暫也而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益于主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎刼公與武叔叔孫州仇以伐孟氏公斂陽帥成人與陽氏戰陽氏敗陽虎説甲如公宫取寶玉大弓以出公羊寶者璋判白弓繡質龜青純穀梁寶玉者封圭大弓者武王之戎弓舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜于徵死何暇追余徒者曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽虎入於讙陽闗以叛公羊陽虎専季氏季氏専魯國陽虎拘季孫孟氏與叔孫氏迭而食之睋而鋟其板曰某月某日将殺我於蒲圃力能救我則于是至乎日若時而出臨南者陽虎之出也御之于其乗焉季孫謂臨南曰以季氏之世世有子子可以不免我死乎臨南曰有力不足臣何敢不勉陽越者陽虎之從弟也為右諸陽之從者車數十乘至于孟衢臨南投䇿而墜之陽越下取策臨南駷馬而由乎孟氏陽虎從而射之矢著于荘門然而甲起于琴如弑不成却反舍于郊皆説然息或曰弑千乘之主而不克舍此可乎陽虎曰夫孺子得國而已如丈夫何睋而曰彼哉彼哉趣駕既駕公斂處父帥師而至慬然後得免自是走之晉淮南子陽虎為亂魯君令人閉門捕之得者有重賞失者又重罪圍三卒陽虎將舉劍而伯頤門者止之曰天下探之不窮我將出子陽虎因揚劍提戈而走門者出之顧反取其出之者以戈推之攘袪薄腋出之者怨之曰我非故與子反也為之䝉死被罪而乃反傷我宜矣其有此難也魯君聞陽虎失大怒問所出之門使有司拘之傷者受大賞而不傷者被重罪九年夏陽虎歸寶玉大弓六月伐陽闗陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子即鮑國齊大夫諫齊侯執陽虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之刻其軸以麻約縛之使易毁折以絶追者載葱靈輜車名盖車之有障蔽者寢于其中而逃追而得之囚于齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎及趙鞅納衛太子于戚宵迷陽虎曰右河而南必至焉是時河北流過元城界戚在河外晉軍已渡河故欲出河右而南荀罃士吉射作亂伐晉侯不克出奔朝歌齊人輸范氏粟鄭罕達駟𢎞送之趙鞅禦之遇于戚陽虎曰吾車少以兵車之斾斾先驅車也與罕駟兵車先陳罕駟自後隨而從之彼見吾貌必有懼心於是乎㑹之必大敗之從之鄭師大敗獲齊粟千車左傳韓非子陽虎議曰主賢明則悉心以事之不肖則飾姦而試之逐於魯疑于齊走而之趙趙簡主迎而相之左右曰虎善竊國政何故相也簡主曰虎務取之我務守之遂執術而御之虎不敢為非善事簡主興主之强㡬至于霸公山不狃侯犯駟赤附公孫宿公山不狃字子洩季氏費邑宰定公五年季平子卒陽虎将以璵璠斂仲梁懐亦季氏臣弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬季桓子行東野及費不狃逆勞于郊季桓子敬之勞仲梁懐仲梁懐弗敬不狃怒謂陽虎子行之乎行逐也秋九月陽虎囚季桓子而逐仲梁懐十二年墮三都季氏将墮費公山不狃叔仲輒帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎二子魯大夫下伐之費人北國人追之敗諸姑蔑不狃及輒奔齊哀公八年吳為邾故将伐魯問于叔孫輒輒對曰魯有名而無情伐之必得志焉退而告公山不狃不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隠且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我輒病之吳子問于不狃對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我不狃率故道險從武城初武城人或有因于吳竟而田焉者拘鄫人之漚菅者曰何故使吾水滋滋濁也及吳師至拘者道之以伐武城克之不狃遂卒於齊侯犯者叔孫氏之郈馬正初叔孫成子即叔孫不敢欲立武叔即叔孫州仇公若藐叔孫氏之族固諫曰不可成子立之而卒公南亦叔孫家臣使賊射藐不能殺使藐為郈宰使侯犯殺藐又弗能武叔之圉人曰吾以劍過朝藐必曰誰之劍也吾稱子以告必觀之吾偽固而授之末偽為固陋不知禮者以劍鋒末授之則可殺也使如之藐曰爾欲吳王我乎遂殺藐侯犯以不能殺藐也以郈叛定公十年武叔及懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂犯曰居齊魯之際而無事必不可矣子盍求事于齊以臨民不然將叛犯從之齊使至駟赤與郈人為之宣言于郈中曰侯犯將以郈易於齊齊人將遷郈民衆兇懼駟赤謂犯曰衆言異矣子不如易于齊與其死也猶是郈也而得紓焉何必此齊人欲以此偪魯必倍與子地且盍多舍甲于子之門以備不虞犯曰諾乃多舍甲而請易于齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤偽將射之犯止之曰謀免我于是犯請行郈人許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物物識也言有識别也吾未敢以出犯曰子止而與之數駟赤止而納魯人犯奔齊亦卒于齊公孫宿者即公孫成為孟氏成邑宰初孟孺子洩即孟武伯將圉馬于成宿不受曰孟孫為成之病不圉馬焉孺子怒襲成從者不得入乃反成有司使孺子鞭之及孟懿子卒成人奔喪弗内袒免哭于衢聽共弗許懼不歸請聴命共使弗許不敢歸成哀公十五年成叛于齊武伯伐成不克遂城輸以偪成冬及齊平子服景伯如齊子贛為介見公孫宿曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎子周公之孫也多饗大利猶思不義利不可得而喪宗國將焉用之宿曰善哉吾不早聞命子贛又説陳成子即陳恒成子歸成公孫宿以其兵甲入於嬴左傳孔叢子孟氏之臣叛武伯問孔子曰如之何曰臣人而叛天下所不容其狀自反子姑待之三旬果自歸武伯將執之訪于夫子夫子曰無也子之于臣禮意不至是以去子今其自反罪以反除又何執焉子修禮以待之則臣去子將安往武伯乃止論曰吾聞薰蕕不同器同為家臣而有林楚駟赤二子之臭與蕕别矣昭子誅牛見褒君子不然寧風之棘若林如庚宗之豎何逆臣傳公子翬公子翬字羽父魯大夫隠公四年秋諸侯從州吁之請伐鄭宋公使來乞師公辭之翬請以師㑹之公弗許固請而行敗鄭徒兵而還十年夏五月翬不待公命先㑹齊人鄭人伐宋十一年翬請殺桓公將以求大宰公曰為其少故也吾將授之矣使營莵裘吾將老焉翬懼反譛公于桓公而請弑之十一月公祭鍾巫鍾巫之神齊于社圃館于寪氏魯大夫翬使賊弑公于寪氏立桓公而討寪氏有死者桓公三年翬如齊逆女左傳後事不載莫知其卒年公子慶父公子慶父即共仲桓公子莊公庶兄莊公二年慶父帥師伐于餘邱八年師及齊師圍郕郕降于齊慶父請伐齊師公曰不可我實不徳齊師何罪罪我之由姑務脩徳以待時乎三十二年莊公薨子般即位子般者孟氏之子也雩講于梁氏女公子觀之女公子子般妺圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投葢于稷門至是慶父使圉人犖弑子般公羊傳莊公存之時鄧扈樂曾淫于宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弑之矣使弑之般然後誅鄧扈樂而歸獄焉慶父懼如齊齊人立閔公閔公哀姜之娣叔姜之子也慶父通于哀姜哀姜欲立之閔公二年八月慶父使卜齮弑閔公公子友以僖公適邾慶父既殺般又殺閔公國人不與出奔莒公子友乃入立僖公以賂求慶父于莒莒人歸之及密使公子魚請貸不許哭而往慶父曰奚斯即公子魚之聲也乃縊左傳公羊傳慶父走而之莒莒人逐之將由乎齊齊不納却反舍于汶水之上使公子奚斯入請季子不可于是抗輈經而死公子遂公孫歸父仲嬰齊附公子遂是為襄仲居東門故曰東門氏公孫敖之從父昆弟也為魯卿僖公二十六年遂及臧孫辰如楚乞師以伐齊宋以其不臣也二十七年遂帥師入杞二十八年遂如齊聘三十年遂如京師因如晉三十一年晉分曹田以賜我遂如晉拜三十三年公伐邾取訾婁秋遂帥師復伐邾文公二年十二月遂如齊納幣聘出姜也六年遂如晉葬晉襄公初公孫敖為遂聘莒女七年敖如莒涖盟且為遂逆見女美自娶之遂請攻敖叔仲彭生平之使遂舍之敖反之復為兄弟如初及敖卒喪至自齊遂欲勿哭彭生復説之遂乃帥兄弟以哭之八年遂㑹晉趙盾盟于衡雍㑹伊雒之戎將伐我遂因㑹之盟於暴九年楚伐鄭遂㑹諸侯之大夫救鄭十一年遂聘于宋且言司城蕩意諸而復之八年意諸來奔十二年秦使西乞術來聘且言将伐晉遂辭玉術不可三辭卒致之遂曰不有君子其能國乎國無陋矣厚賂之子叔姬者魯女也妃齊昭公生子舍昭公卒舍即位齊公子商人弑舍而自立遂使告于王請以王寵求昭姬即子叔姬于齊曰殺其子焉用其母請受而罪之十四年冬單伯如齊請齊人執之又執子叔姬既而歸之十六年公有疾使遂及齊侯盟于郪邱十七年齊侯伐我北鄙遂請盟六月盟于穀冬十月遂如齊拜榖之盟復曰臣聞齊人将食魯之麥言齊将伐魯以臣觀之将不能齊君之語偷臧文仲有言曰民主偷必死十八年二月文公薨子惡即位時齊惠公立遂及叔孫得臣如齊賀且拜葬初文公二妃敬嬴生子倭敬嬴嬖而私事遂倭長而屬諸遂遂欲立之叔仲彭生不可遂見于齊侯而請之齊侯新立而欲親魯許之冬十月遂弑惡及其母弟視及叔仲彭生而立倭是為宣公宣公元年遂如齊逆女三月以夫人婦姜至自齊夏公㑹齊侯于平州遂如齊拜成八年遂如齊至黄疾作而復卒于垂謚曰襄仲子二公孫歸父仲嬰齊公孫歸父字子家宣公十年歸父如齊葬齊惠公秋歸父帥師伐邾取繹冬如齊伐邾故十一年歸父㑹齊人伐莒十四年㑹齊侯于穀十五年㑹楚子于宋十八年歸父以其父遂之立宣公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬宣公薨季孫行父言于朝曰使我殺適立庻以失大援者仲也夫遂逐東門氏歸父還及笙壇惟復命于介介副使也既復命袒括髪袒衣以麻約髪從初喪之服即位哭三踊而出遂奔齊公羊叔仲惠伯傅子赤者也文公死子幼公子遂謂叔仲惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弑子赤而立宣公宣公死成公幼臧宣公者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯子事孰為之諸大夫皆雜然曰仲氏也其然乎于是遣歸父子家然後哭君歸父使乎晉還自晉至檉聞君薨家遣墠惟哭君成踊反㑹于介自是走之齊魯人徐傷歸父之無後也于是使嬰齊後之注臧宣公即臧孫許魯使其弟嬰齊紹其後為仲氏成公十五年仲嬰齊卒左傳論曰傳曰有無君之心而後動于惡羽父之謂乎州吁請伐鄭以除宋惡羽父固請而㑹之隂助逆焉兆無君矣息姑姑息釋将不誅伐宋猶肆專而寪氏遂肆逆吁隠實縱之羽父何誅焉叔牙飲酖僅以存後慶父賊二君顧不斬孟氏之祀下刑上服上刑下服失輕重與魯夫人傳孟子聲子隠母仲子惠公夫人桓母文姜桓公夫人莊母孟子惠公元妃子姓宋女也先惠公薨聲子葢孟子之姪娣惠公次妃隠公母隠公三年薨諡曰聲仲子亦惠公夫人宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨隠公立而奉之隠公二年薨左傳文姜桓公夫人齊僖公之女莊公之母也桓公三年文姜至自齊六年子同生同莊公名以大子生之禮舉之接以大牢卜士負之士妻食之禮世子生三日卜士負之射人以桑弧蓬矢射天地四方卜士妻為乳母公與文姜宗婦命之十八年公㑹齊侯于濼遂及文姜如齊齊襄公通焉公謫之以告夏四月享公使公子彭生乘公公薨于車魯人責文姜莊公元年三月文姜孫于齊尋復還魯二年文姜㑹齊侯于禚四年享齊侯于祝邱五年文姜如齊師六年齊人來歸衛寶文姜請之也十年文姜㑹齊侯于防冬又㑹于穀十五年文姜如齊十九年文姜如莒二十一年七月薨左傳諡曰文哀姜莊夫人叔姜閔母孟任子般母成風僖母哀姜莊公夫人齊女莊公二十四年公如齊逆女八月夫人姜氏入公使大夫宗婦覿用幣非禮也禮小君至大夫執贄以見宗婦不同贄也孟任黨氏女也初公築臺臨黨氏見孟任從之閟不從公公以夫人言許之割臂盟公生子般焉三十二年公薨子般立慶父賊子般閔公啟方立閔公哀姜之娣叔姜之子也故齊人立之立二年慶父又弑之慶父通于哀姜哀姜欲立之閔公之死也哀姜與知之哀姜懼討孫于邾齊人取而殺之于夷以其屍歸僖公請而葬之成風風氏須句之女僖公之母也公子友之生也桓公使卜之曰男也其名曰友在公之右為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所成風聞友之繇乃事之而屬僖公焉閔公遇弑友立僖公僖公二十一年邾滅須句須句子來奔成風為之言于公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皥濟而脩祀紓禍也須句司大皥與有濟之祀明年公伐邾取須句而反其君文公四年薨左傳諡曰成聲姜僖夫人文公母出姜文夫人子惡母敬嬴宣公母聲姜公羊作聖姜僖公夫人文公之母也僖公十一年公及聲姜㑹齊侯于陽穀十七年我滅項齊人以為討而止公秋聲姜以公故㑹齊侯于卞文公十六年有蛇自泉宫出入于國如先君之數秋八月聲姜薨毁泉臺左傳諡曰聲出姜文公夫人文公四年逆姜氏于齊九年春出姜如齊歸寧也出姜生子惡及視惡立為大子文公二妃敬嬴者公穀並作熊氏謚曰頃熊生宣公敬嬴嬖而私事公子遂宣公長又屬諸遂遂欲立之十八年文公薨大子惡立冬十月遂弑惡及視而立宣公出姜歸于齊大歸也将行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜宣公八年嬴氏薨左傳諡曰敬穆姜宣夫人穆姜宣公夫人宣公元年公子遂如齊逆女三月穆姜至自齊十八年公薨子成公立成公九年伯姬歸于宋穆姜女季孫行父如宋致女復命公享之行父賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤賦緑衣之卒章而入叔孫僑如通于穆姜欲去季孟而取其室十六年秋諸侯㑹于沙隨謀伐鄭公将行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也七月公㑹伐鄭将行姜又命公如初僑如又譛季孟于晉晉遂不見公執季孫行父于苕邱冬十月晉赦行父許魯平僑如奔齊于是穆姜徙居東宫襄公九年薨于東官穆姜始往而筮之也遇艮之八史曰是謂艮之隨葢五爻皆變惟二不變是謂隨也隨其出也君謂穆姜必速出姜曰亡猶無也是于周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與于亂固在下位而有不仁婦人卑于丈夫故曰下位不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫也不可為貞有四徳者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣左傳齊姜成夫人定姒襄公母敬歸襄公妾子野母齊歸昭公母齊姜成公夫人成公十四年叔孫僑如如齊逆女九月齊姜至自齊襄公二年薨謚曰齊定姒者成公妾襄公之母姒氏杞女也襄公四年薨謚曰定左傳曰公羊作弋氏葬我小君定弋注定弋莒女敬歸襄公妾齊歸敬歸之娣歸姓胡女也敬歸生子野齊歸生子裯襄公三十一年公薨立子野過毁而卒立子裯是爲昭公昭公十一年齊歸薨謚曰齊左傳孟子昭夫人定姒定夫人公子荆母哀公妾悼公母哀公妾孟子昭公夫人吳女諱同姓故曰子若宋女然哀公十二年薨左傳定姒定公夫人哀公母姒氏杞女定公十五年薨左傳公子荆母哀公之妾也荆母嬖哀公二十四年將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶于薛惠孝娶于商自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為大子國人惡之左傳悼公母哀公之妾也死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我記檀弓列女傳施氏婦施氏婦者齊管于奚之女也母叔肹妻叔肹妻不聘無媒禮穆姜曰吾不以妾為姒生公孫嬰齊而出之嫁于管于奚生二子而寡以歸嬰齊嬰齊以其外弟為大夫嫁其外妹于施孝叔惠公五世孫晉郤犫來聘求婦于嬰齊嬰齊奪施氏婦以與之婦曰鳥獸猶不失儷子將若何曰吾不能死亡婦遂行生二子于郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之将何以終遂誓施氏左傳敬姜敬姜公父穆伯妻文伯歜之母也公父歜飲南宫説孟懿子弟酒以露睹父魯大夫為客羞鼈焉小睹父怒相延食鼈辭曰将使鼈長而後食之遂出敬姜聞之怒曰吾聞之先子曰祭養尸饗養上賔鼈于何有而使夫人怒也逐之五日大夫辭而復之列女傳敬姜博達知禮穆伯先死文伯出學而歸敬姜見其友降階而郤行奉劍而正履若事父兄敬姜召而数之曰昔者武王罷朝而􅙋絶左右顧無可使結之者俯而自申之故能王桓公坐友三人諫臣五人日舉過者三十人故能霸周公一食三吐哺一沐三握髪所執贄而見于窮閭隘巷者七十餘人故能存周室彼二聖一賢者下人如此其所與遊皆過已者也是以日益而不自知也今子年少而位卑所與遊者皆為服役子之不益明矣文伯謝罪擇嚴師友而事之所與遊者皆黄耄倪齒文伯引袵攘捲而親饋之敬姜曰子成人矣文伯相魯敬姜曰吾語汝治國之要盡在經矣夫輻者所以正曲枉也不可不彊故輻可以為将畫者所以均不均服不服也故畫可以為正物者所以治蕪與莫也故物可以為都大夫持交而不失出入而不絶者梱也梱可以為大行人推而往引而來者綜也綜可以為關内之侯主多少之數者均也均可以為内史服重任行達道正直而固者軸也軸可以為相舒而無窮者摘也摘可以為三公文伯再拜受教歜嘗退朝朝敬姜敬姜方績歜曰以歜之家而主猶績大夫稱主妻亦如之懼干季孫季康子之怒也其以歜為不能事主乎敬姜歎曰魯其亡乎使僮子備官而未之聞邪居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也是故天子大采韋昭注大采五采少采三采也朝日與三公九卿祖識地徳日中考政與百官之政事師尹惟旅牧相宣序民事少采夕月與太史司載糾䖍天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝脩天子之業命晝考其國職夕省其典刑夜儆百工使無惂淫而後即安卿大夫朝考其職晝講其庻政夕序其業夜庀其家事而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庻人以下明而動晦而休無日以怠王后親織𤣥紞紞所以縣瑱公侯之夫人加之以紘綖紘纓之無緌者綖冕上之覆也卿之内子為大帶命婦成祭服列士之妻加之以朝服自庻士以下皆衣其夫社而賦事烝而獻功男女効績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕脩我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰季氏之婦不淫矣季康子肥敬姜之從孫敬姜如季氏肥在其朝與之言弗應從之及寢門弗應而入肥辭于朝而入見曰肥也不得聞命無乃罪乎曰子弗聞乎天子及諸侯合民事于外朝合神事于内朝自卿以下合官職于外朝合家事于内朝寢門之内婦人治其業焉上下同之夫外朝子將業君之官職焉内朝子將庀季氏之政焉皆非吾所敢言也及肥如敬姜䦱門與之言䦱闢也皆不踰閾敬姜祭悼子穆伯父季孫紇肥與焉酢不受徹俎不宴宗不具不繹不受不親受不繹不與繹也繹不盡飫則退仲尼聞之以為别于男女之禮矣季康子肥嘗問曰主亦有以語肥也對曰吾能老而已何以語子肥曰雖然肥願有聞于主曰吾聞之先姑曰君子能勞後世有繼子夏聞之曰善哉商聞之曰古之嫁者不及于舅姑謂之不幸夫婦學于舅姑者也其欲室歜也饗其宗老而為賦緑衣之三章老請守龜卜室之族師亥魯樂師聞之曰善哉男人之饗不及宗臣宗室之謀不過宗人謀而不犯㣲而昭矣詩所以合意歌所以詠詩也今詩以合室歌以詠之度于法矣國語歜卒敬姜據其牀而不哭曰昔吾有斯子也吾将以為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠于禮也夫記檀弓檀弓又曰帷殯非古也自敬姜之哭穆伯始也國語歜卒敬姜戒其妾曰吾聞之好内女死之好外士死之今吾子夭死吾惡其以好内聞也二三婦之辱共先祀者請無瘠色無洵涕無惂膺無憂容有降服無加服從禮而静是昭吾子也仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知也夫欲明其子之令徳也孔叢子公父文伯死室人有從死者其母怒而不哭相室諫之其母曰孔子天下之賢人也不用于魯退而去是子素宗之而不能隨今死而内人從死者二人焉若此于長者薄于婦人厚也韓詩外傳畧同于是朝哭穆伯而莫哭歜仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章國語季孫肥之母死陳䙝衣敬姜曰婦人不飾不敢見舅姑将有四方之賔來䙝衣何為陳于斯命撤之記檀弓漆室女漆室女過時未適人當穆公時君老太子幼女倚柱而嘯其鄰婦曰何嘯之悲也子欲嫁邪女曰吾憂君老太子幼鄰婦笑曰此大夫之憂婦人何與焉女曰非子所知也昔晉客舍吾家繫馬園中馬佚踐吾葵使我終歲不食葵鄰人女奔隨人亡其家倩吾兄行追之溺流而死令吾終身無兄吾聞河潤九里漸洳三百步今君老悖太子少愚魯國有患禍及衆庻婦人獨安所避乎三年魯果亂齊楚攻之男子戰鬭婦人轉輸不得休息列女傳韓詩外傳魯監門女嬰績中夜而泣其偶曰何泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷為泣之嬰曰昔宋之桓司馬得罪于宋君出于魯其馬佚而𩥇吾園葵是嵗吾園人亡利之半越王攻吳魯往獻女吾娣與焉兄往視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相及也今衛世子不肖好兵吾畏弟三人能無憂乎尚史卷三十四
