body:
  text: 尚史卷七十八列傳五十六鑲白旗漢軍李鍇撰説客傳蘇秦下代乃北見燕王噲曰臣東周之鄙人也竊聞王義甚髙甚順鄙人不敏竊釋耕耨而干大王至于邯鄲所聞于邯鄲者又髙于聞東周臣竊負其志乃至燕廷觀王之羣臣下吏大王天下之明主也王曰子所謂天下之明主者何如對曰臣聞明主者務聞其過不欲聞其善臣請謁王之過夫齊趙者王之仇讐也楚魏者王之援國也今王奉仇讐以伐援國非所以利燕也主自慮此則計過無以諫者非忠臣也王曰寡人之于齊趙也非所敢欲伐也曰夫無謀人之心而令人疑之殆有謀人之心而令人知之拙謀未發而聞于外則危今臣聞王居處不安食飲不甘思念報齊身自削甲札妻自組甲絣有之乎王曰子聞之寡人不敢隱夫齊者我讐國也故寡人之所欲報也直患國敝力不足矣子能以燕執齊寡人奉國而委之於子對曰凡天下戰國七而燕處弱焉獨戰則不能有所附則無不重南附楚楚重西附秦秦重中附韓魏韓魏重且茍所附之國重此必使王重矣今夫齊王長主而自用也南攻楚五年稸積散西困秦三年民憔悴士罷敝北與燕戰覆三軍獲二將而又以其餘兵南面舉五千乘之徑宋而包十二諸侯此其君之欲得也其民力竭安猶取哉且臣聞之數戰則民勞久師則兵敝王曰吾聞齊有清濟濁河可以為固長城巨防足以為塞對曰天時不與雖有清濟濁河何足以為固民力窮敝雖有長城巨防何足以為塞且異日也濟西不役所以備趙也河北不師所以備燕也今濟西河北盡以役矣封內敝矣夫驕主必不好計而亡國之臣貪于財王誠能母愛寵子母弟以為質寶珠玉帛以事其左右彼且德燕而輕亡宋則齊可亡已王曰吾終以子受命于天矣曰內冦不與外敵不可拒王自治其外臣自敝其內此乃亡之之勢也乃命王之弟為質于齊史記燕使一子質于齊國䇿陳翠合齊燕令燕王之弟為質于齊太后大怒陳翠説之太后乃命束車制衣為行具蘇厲因燕質子而求見齊王齊王怨蘇秦欲囚厲燕質子為謝乃已遂委質為臣燕相子之與蘇代婚而欲得燕權乃使蘇代侍質子于齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣于是燕王専任子之已而讓位燕大亂齊伐燕殺王噲子之燕立昭王而蘇代厲遂不敢入燕皆終歸齊齊善待之國䇿蘇代為燕説齊未見齊王先説淳于髠曰人有賣駿馬者比三旦立市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立于市人莫與言子還而視之去而顧之臣請獻一朝之費伯樂乃還而視之去而顧之一旦而馬價十倍今臣欲以駿馬見于王莫為臣先後者足下有意為臣伯樂乎臣請獻白璧一雙黃金千鎰以為馬食淳于髠入言之王而見之齊王大説蘇子蘇代説齊閔王曰臣聞用兵而喜先天下者憂約結而喜主怨者孤夫後起者藉也逺怨者時也是以聖人從事必藉于權而務興于時夫權藉者萬物之率也而時勢者百事之長也故無權藉時勢而能事成者寡矣今雖干將莫邪非得人力則不能割劌矣堅箭利金不得弦機則不能逺殺矣何則權藉不在焉何以知其然也昔趙氏襲衛車舍人主車者不休傳衛國城割平言割城求平衛八門土而二門墮矣此亡國之形也衛君跣行告訴于魏魏王身被甲底劍挑趙索戰邯鄲之中騖河山之間亂衛得是藉也亦收餘甲而北殘剛平墮中牟之郭衛非強于趙也譬之衛矢而魏弦機也藉力魏而有河東之地趙氏懼楚人救趙而伐魏戰于州西出梁門軍舍林中馬飲于大河趙得是藉也亦襲魏之河北燒棘蒲墮黃城故剛平之殘也中牟之墮也黃城之墜也棘蒲之燒也此皆非趙魏之欲也然二國勸行之者何也衛明于時權之藉也今世之為國者不然兵弱而好敵強國罷而好衆怨事敗而好鞠之兵弱而憎下人地狹而好敵大事敗而好長詐行此六者而求霸則逺矣臣聞善為國者順民之意而料兵之能然後從于天下故約不為人主怨伐不為人挫強如此則兵不費權不輕地可廣欲可成也昔者齊與韓魏伐楚也戰非甚疾也分地又非多韓魏也然而天下獨咎齊者以其為韓魏主怨也且天下遍用兵矣齊燕戰而趙氏兼中山秦楚戰韓不休而宋越専用其兵此十國者皆以相敵為意而獨舉心于齊者約而好主怨伐而好挫強也且夫強大之禍常以王人為意也弱小之殃常以謀人為利也是以大國危小國滅也大國之計莫若後起而重伐不義夫後起之藉與多而兵徑是以衆強敵罷寡也事不塞天下之心則利必附矣大國行此名號不攘而至霸王不為而立矣小國之情莫如謹靜而寡信諸侯謹靜則四鄰不反寡信諸侯則天下不賣外不賣內不反則稸積朽腐而不用幣帛矯蠧小國道此則不祠而福不貸而見足矣故曰祖仁者王立義者霸用兵窮者亡何以知其然也昔吳王夫差以強大為天下先襲郢而棲越身從諸侯之君而卒身死國亡為天下戮者此平居而謀王強大而喜先天下之禍也昔者萊莒好謀陳蔡好詐莒恃越而滅蔡恃晉而亡此內長詐外信諸侯之殃也由此觀之則強弱大小之禍可見于前事矣語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋力骨徑非賢于騏驥孟賁也後起之藉也今天下之相與也不並滅有能案兵而後起寄怨而誅不直微用兵而寄于義則霸天下可局足而須也明于諸侯之故察于地形之理者不約親不相質而固不趨而疾衆事而不反交割而不相憎俱強而加以親何則形同憂而兵趨利也何以知其然也昔者燕齊戰于桓之曲勝不勝十萬之衆盡胡人襲燕樓煩數縣取其牛馬夫胡之與齊非素親也而用兵又非約質而謀燕也然而甚于相趣者形同憂而兵趣利也由此觀之約于同形則利長後起則諸侯可趨役故明主察相誠欲以霸王為志則戰攻非所先戰者國之殘也而都縣之費也殘費已先而能從諸侯者寡矣彼戰者之為殘也士聞戰則輸私財而富軍市輸飲食而待死士令折轅而炊之殺牛而觴士則是路君之道也路疑作露暴露意又疑作路窘謂窘于道路中人禱祀君翳釀言釀于中以待飲至通都小縣置社不用命者有市之邑莫不正事而奉王則此虛中之計也夫戰之明日尸死扶傷雖若有功也軍出費中哭泣則傷主心矣死者破家而葬夷傷者空財而共藥完者內酺而華樂故其費與死傷者鈞故民之所費也十年之田不償也軍之所出矛戟折鐶弦絶傷弩破車罷馬亡矢之大半甲兵之具宫之所私出也宫如父子異宫之宫古者寓兵于農故私家出之士大夫之所匿厮養士之所竊十年之田不償也天下有此再費而能從諸侯者寡矣攻城之費百姓理襜蔽舉衝櫓家雜總全家併作身窟穴中謂地道罷于刀金而士困于土功將不釋甲期數而能拔城者為亟耳上倦于教士斷于兵故三下城而能勝敵者寡矣故曰彼戰攻者非所先也何以知其然也昔智伯瑤攻范中行氏殺其君滅其國又西圍晉陽吞併二國而憂一主此用兵之盛也然而智伯卒身死國亡為天下笑者兵先戰攻而滅二子之患也昔者中山悉起而迎燕趙南戰于長子敗趙氏北戰于中山克燕軍殺其將夫中山千乘之國也而攻萬乘之國二再戰比勝此用兵之上節也然而國亡遂臣于齊者不嗇于戰攻之患也由此觀之則戰攻之敗可見于前事矣今世之善用兵者終戰比勝而守不可拔天下稱為善一國得而保之非國之利也臣聞戰大勝者其士多死而兵益弱守而不可拔者其百姓罷而城郭露夫士死于外民殘于內而城郭露于境非王之樂也今夫鵠的非咎罪于人也便弓引弩而射之中者則善不中則愧少長貴賤同心于貫之者何也惡其示人以難也今窮戰比勝而守必不拔是非徒示人以難又且害人者也然則天下仇之必矣夫罷士露國而多與天下為仇則明君不居也素用強兵而弱之則察相不事彼明君察相者則五兵不動而諸侯從辭讓而重賂至矣故明君之攻戰也甲兵不出于軍而敵國勝衝櫓不施而邊城降士民不知而王業至矣彼明君之從事也用財少曠日逺而利長故曰兵後起則諸侯可趨役也臣之所聞攻戰之道非師者雖有百萬之軍比之堂上雖有闔閭吳起之將禽之戶內千丈之城拔之樽俎之間百尺之衝折之衽席之上故鐘鼓竽瑟之音不絶地可廣而欲可成和樂倡優侏儒之笑不乏諸侯可同日而致也故名配天地不為尊利制海內不為厚故夫善為王業者在勞天下而自逸亂天下而自安諸侯無成謀則其國無宿憂也何以知其然也佚治在我勞亂在天下王之道也鋭兵來則拒之患至則趨之使諸侯無成謀則其國無宿憂矣何以知其然也昔者魏王擁土千里帶甲三十六萬恃其強而拔邯鄲西圍定陽又從十二諸侯朝天子以西謀秦秦王恐寢不安席食不甘味令于境內盡堞中為戰具競為守備為死士置將以待魏士衛鞅謀于秦王曰夫魏氏功大而令行于天下有十二諸侯而朝天子其與必衆以一秦而敵大魏恐不如王何不使臣見魏王則臣必北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行于天下矣今大王之所從十二諸侯非宋衛則鄒魯陳蔡此固大王之鞭箠使也不足以王天下大王不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚心而從天下之志則王業見矣大王不如先行王服王者服飾然後圖齊楚魏王説于衛鞅之言也故廣公宫制丹衣柱建九斿從七星之旟此天子之位也而魏王處之于是齊楚怒諸侯奔齊齊人伐魏殺其太子覆十萬之軍魏王大怒跣行按兵于國而東次于齊然後天下舍之當是時秦王垂拱而受西河之外而不以德魏王故衛鞅之計也謀納不下席言于樽俎之間而魏將已禽于齊矣衝櫓未施而西河之外已入于秦矣此臣所謂比之堂上禽將戶內拔城于尊俎之間折衝席上者也蘇代過魏魏為燕執代齊使人謂魏王曰齊請以宋封涇陽君秦不受秦非不利有齊而得宋地也不信齊王與蘇子也今齊魏不和如此其甚則齊不欺秦秦信齊齊秦合涇陽有宋地非魏之利也故王不如東蘇子秦必疑而不信蘇子矣齊秦不合天下無變伐齊之形成矣于是出蘇代代之宋宋善待之秦攻趙蘇子謂秦王曰臣聞明王之于其民也博論而技藝之是故官無乏事而力不困于其言也多聽而時用之是故事無敗業而惡不章臣願王察臣之所謁而效一時之用也臣聞之百倍之國者民不樂後也功業髙世者人主不再行也力盡之民仁者不用也求得而反靜聖人之制也功大而息民用兵之道也今用兵終身不休力盡不罷怒趙必于其已邑欲服屬使為己邑趙僅存哉然而四輪之國也雖得邯鄲非國之長利也意者地廣而不耕民羸而不休又嚴之以刑罰則雖從而不止矣語曰戰勝而國危者物不斷也功大而權輕者地不入也故過任之事父不得于子無己之求君不得于臣故識乎微之為著者強察乎息民之為用者霸明乎輕之為重者王秦王曰寡人案兵息民則天下必為從將以逆秦蘇子曰臣有以知天下不能為從以逆秦也臣以田單如耳為大過也豈獨田單如耳大過天下之主亦盡過矣夫慮收亡齊罷楚敝魏與不可知之趙欲以窮秦折韓臣以為至愚也夫齊威宣者世之賢王也德博而地廣國富而民用將武而兵強宣王用之破韓威魏南伐楚西攻秦秦為齊兵困于殽函之上十年攘地秦人逺迹不服而齊為虛戾地為民為戾也夫齊兵之所以破韓魏之所以僅存者何也是伐楚攻秦而後受其殃也今富非有齊宣威之餘也精兵非有富韓徑魏之庫也將非有田單司馬之慮也收破齊罷楚敝魏不可知之趙欲以窮秦折韓臣以為至誤臣以為從一不可成也昔者秦人下兵攻懷服其人三國從之趙奢鮑佞將楚有四人起而從之臨懷而不救秦人去而不從不識三國之憎秦而愛懷邪亡其憎懷而愛秦邪夫攻而不救去而不從是以知三國之兵困而趙奢鮑佞之能也故裂地以敗于齊田單將齊之良以兵橫行于中十四年終身不敢設兵以攻秦折韓而馳于封內不識從之一成惡存也于是秦王解兵不出于境按史記有諸侯休天下安二十九年不相攻之文䇿士詡辭非實也國䇿秦召魏相信安君信安君不欲往蘇代為説秦王曰臣聞之忠不必黨黨不必忠今臣願為大王陳臣之愚意恐不忠于下吏自使有要領之罪願大王察之今大王令人執事于魏以完其交臣恐魏交之益疑也將以塞趙也臣又恐趙之益徑也夫魏王之愛習魏信也甚矣其智能而任用之也厚矣其畏惡嚴尊秦也明矣今王使人入魏而不用入魏無益也若用魏必舍所愛習而用所畏惡此魏王之所不安也夫舍萬乘之事而退此魏信之所難行也夫令人之君處所不安令人之相行所不能以此為親則難久矣臣故恐魏交之益疑也且魏信舍事則魏之謀者必曰舍于秦秦必令其所愛信者用趙是趙存而我亡趙安而我危也則上有野戰之氣下有堅守之心臣故恐趙之益徑也大王欲完魏之交而使趙小心乎不如用魏信而尊之以名魏信事王國安而名尊離王國危而權輕然則魏信之事王也上所以為其主者忠矣下所以自為者厚矣彼其事王必完矣趙之用事者必曰魏之名族不髙于我土地不厚于我魏信以魏事秦秦甚善之國安身尊今我搆難于秦兵為招質國處削危之形非得計也結怨于外生患于中身處死亡之地非完事也彼將傷其前事而悔過其行冀其利必多割地以深下王則是大王垂拱多割地以為利重堯舜之所求而不能得也臣願大王察之五國伐秦無功罷于成臯趙欲講于秦楚與韓魏將應之齊弗欲蘇代謂齊閔王曰臣已為足下見奉陽君矣奉陽君前已卒此蓋襲其號者臣謂奉陽君曰天下散而爭秦秦必據宋魏冉必妒君之有陰也秦貪魏冉妒則陰不可得矣君無講齊必攻宋齊攻宋則楚必攻宋魏必攻宋燕趙助之五國據宋不至一二月陰必得矣得陰而講秦雖有變君無患矣若不得已而必講則願五國復堅約謂先伐後講則不示弱五國願得趙足下雄飛與魏氏大吏東勉齊王必無名禁珉也齊常使韓珉處趙有秦私也今五國約講秦勉齊同之諸國必無辭止珉使無私秦使臣守約若與國秦本非與國今講使之如與也有倍約者以四國攻之無倍約者而秦侵約五國復堅而儐之今韓魏與齊相疑也若復不堅約而講臣恐與國之大亂也齊秦非復合也必有觭重者矣後合與觭重皆非趙之利也且天下散而事秦是秦制天下也秦制天下將何以天下為臣願君之早計也天下爭秦有六舉皆不利趙矣天下爭秦秦受負海之國合負親之交缺國而求利于三晉是秦之一舉也秦行是計不利于趙而君終不得陰一矣天下爭秦秦內韓珉于齊內成陽君于韓相魏懷于魏復合衍公孫衍時相魏雅不善秦今相懷因使合之交兩王秦魏王賁韓他之曹皆起而行事是秦之一舉也秦行是計不利于趙而君不得陰二矣天下爭秦秦王受齊受趙三強三親以據魏而求安邑是秦之一舉也秦行是計齊趙應之魏不待伐抱安邑而倍秦秦得安邑之饒魏為上交韓必入朝秦過趙已安邑矣言秦止得安邑已勝趙矣過猶勝也秦行是計不利于趙而君不得陰三矣天下爭秦秦堅燕趙之交以伐齊收楚與韓珉而攻魏不至一二月魏必破矣秦舉安邑而塞女戟韓之太原絶下軹道南陽而伐魏絶韓包二周即趙自消鑠矣國燥于秦兵分于齊非趙之利也而君不得陰四矣天下爭秦秦堅三晉之交攻齊國破財屈而兵東分于齊三晉破屈也秦安兵攻魏取安邑君按救魏是以攻齊之已敝救之而與秦爭戰君不救也韓魏焉免西合而君不得陰五矣天下爭秦秦按為義存亡繼絶固危扶弱定無罪之君必起中山與勝焉而趙宋同命何暇言陰六矣故曰君必無講則陰必得矣奉陽君曰善乃絶和于秦而收齊魏以成取陰趙收天下且以伐齊蘇厲為齊上書説趙王曰足下功力非數痛加于秦而怨毒積惡非曽深陵于韓也臣竊外聞大臣及下吏之議皆言王以秦為愛趙而憎韓臣竊觀之秦豈得愛趙而憎韓哉欲亡韓吞兩周之地故以韓為餌先出聲于天下欲鄰國聞而觀之也恐其事不成故出兵以佯示趙魏恐天下之驚覺故微伐韓以二之恐天下疑已故出質以為信聲德于與國而實伐空韓臣竊觀其圖之也必出于是且夫説士之計皆曰韓亡三川魏滅晉國是韓未窮而禍及于趙且物固有勢異而患同者又有勢同而患異者昔者楚人之伐而中山亡今燕盡韓之河南距沙邱而至巨鹿之界三百里距于扞關至于榆中千五百里秦盡韓魏之上黨則地與國都邦屬而壤挈者七百里秦以三軍強弩坐羊腸之上即地去邯鄲二十里且秦攻上黨而危其北則句注之西非王之有也踰句注禁常山而守三百里通于唐曲遇此代馬胡駒不東而崑山之玉不出也今從強秦與之伐齊臣恐其禍出于是矣五國之主嘗合橫而謀伐趙三分趙國壤地著之盤盂屬之讐柞與酬酢同五國之兵有日矣齊乃西師以禁秦使秦發令素服而聽反溫軹髙平于魏反三公什清于趙此王之明知也夫齊事趙宜為上交今乃以邸罪取伐臣恐其後事王不敢自必也今王收齊天下必以王為得齊齊危社稷以事王天下必重王然則齊義王以天下就之下至齊慕王以天下收之是一世之命制于王已臣願大王深與左右羣臣卒計而熟圖之齊伐宋宋急蘇代遺燕昭王書曰夫列在萬乘而寄質于齊名卑而權輕秦齊財之伐宋民勞而實費夫破宋殘楚淮北肥大齊讐強而國弱也此三者皆國之大敗也而足下行之將以取信于齊也齊未加信于王而忌燕也愈甚矣以宋加淮北強萬乘之國也而齊并之是益一齊北夷方七百里加之以魯衛強萬乘之國也而齊并之是益二齊也夫一齊之強而燕猶不支今以三齊臨燕其禍必大矣雖然智者舉事轉禍為福因敗成功今王莫如遙霸齊而厚尊之使之盟于周室焚秦符約曰上計破秦其次長賔秦秦挾賓以待破國䇿作長賓客秦秦挾賓客以待破鮑彪注言挾賓客并天下而反見破秦必患之秦五世結諸侯今為齊下秦王之志茍得窮齊不憚以一國都為功然而王何不使人以窮齊之説説秦王曰燕趙破宋肥齊尊齊而為之下者燕趙非利之也以不信秦也今王何不使可以信者接收燕趙令涇陽君若髙陵君先于燕趙秦有變因以為質則燕趙信秦矣秦為西帝趙為中帝燕為北帝立三帝而令諸侯韓魏不聽則秦伐之齊不聽則燕趙伐之天下孰敢不聽天下服聽因驅韓魏以攻齊曰必反宋地歸楚淮北夫反宋地歸楚淮北燕趙之所同利也並立三帝燕趙之所同願也夫實得所利名得所願則燕趙棄齊猶脫屣矣今王不收燕趙則齊霸必成諸侯戴齊而王獨弗從是國伐也從之是名卑也不收燕趙名卑而國危收燕趙名尊而國寧夫去尊寧而就卑危智者不為也秦王聞若説也必如刺心然則王何不使智士以此言説秦秦伐齊必矣夫取秦上交也伐齊正利也尊上交務正利聖王之事也燕昭王善其書曰先人嘗有德蘇氏子之之亂而蘇氏去燕燕欲報讐于齊非蘇氏莫可乃召蘇氏復善待之與謀伐齊竟破齊閔王出走按此下有忠信得罪之説與前蘇秦䇿同又曰燕王謂蘇代曰寡人甚不喜訑者言也蘇代曰周地賤媒謂其兩譽之也之男家曰女美之女家曰男美然而周之俗不自為取妻且夫處女無媒老且不嫁舍媒自衒敝而不售順而無敗售而不敝者唯媒而已矣且事非權不立非勢不成夫使人坐受成事者唯訑者耳又曰客謂燕王曰齊伐燕雖五燕弗能當王何不陰出使散遊士頓齊兵敝其衆使世世無患燕王説秦蘇子車十五乘南使于齊謂齊湣王曰臣聞當世之舉王必誅暴正亂舉無道攻不義今宋王射天笞地鑄諸侯之象使侍屏匽展其臂彈其鼻此天下之無道不義而王不伐王名終不成且夫宋中國膏腴之地鄰民之所處也與其得百里于燕不如得十里于宋伐之名利實義齊王曰善遂伐宋宋遂舉燕王聞之絶交于齊率天下之兵以伐齊大戰一小戰再頓齊國成其名又曰蘇代謂奉陽君説燕于趙以伐齊奉陽君不聽代乃入齊惡趙令齊絶趙齊已絶趙因之燕説昭王語類范睢説秦王又多不解又曰齊魏爭燕齊謂燕王曰吾得趙矣魏謂燕王曰吾得趙矣蘇代謂燕相使燕合于魏齊遂北又曰蘇代自齊使人謂燕昭王曰臣聞離齊趙齊趙已孤矣王何不出兵以攻齊臣請為王弱之燕伐齊令人謂閔王令蘇子將蘇子將而與燕人戰于晉下齊軍敗燕得甲首二萬人燕攻陽城及狸閔王復使蘇子應之蘇子將與燕戰于陽城燕人大勝得首三萬因使樂毅大起兵伐齊破之又曰蘇代自齊獻書燕王臣之行也固知將有口事故獻御書而行曰臣貴于齊燕大夫將不信臣臣賤將輕臣臣將多望于臣齊有不善將歸罪于臣天下不攻齊將曰善為齊謀天下攻齊將與齊兼貿臣臣之所重處重留也王謂臣曰吾必不聽衆口吾信汝猶列眉也去燕之齊期于成事而已臣受令任齊五年齊數出兵未嘗謀燕齊趙之交一合一離齊之信燕至于虛北地行其兵今王信田代與參去疾之言且攻齊使齊犬馬而不言燕今王又使慶令臣曰吾欲用所善王欲用之則臣請事之王欲醳臣専任所善則臣請歸醳事六䇿皆蘇代為燕謀齊事節録之備覽云秦召燕王燕王欲往蘇代約燕王曰楚得枳而國亡齊得宋而國亡齊楚不得以有枳宋而事秦者何也則有功者秦之深讐也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲輕舟浮于汶乘夏水而下江五日而至郢漢中之甲輕舟出于巴乘夏水而下漢四日而至五渚寡人積甲宛東下隨智者不及謀勇者不及怒寡人如射隼矣王乃待天下之攻函谷不亦逺乎楚王為是故十七年事秦秦正告韓曰我起乎少曲一日而斷太行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女戟韓氏太原卷下軹道道南陽封冀包兩周乘夏水浮輕舟強弩在前銛戟在後決滎口魏無大梁決白馬之口魏無濟陽決宿胥之口魏無虗頓邱陸攻則擊河內水攻則滅大梁魏氏以為然故事秦秦欲攻安邑恐齊據之則以宋委于齊曰宋王無道為木人以象寡人射其面寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女戟因以破宋為齊罪秦欲攻韓恐天下救之則以齊委于天下曰齊王四與寡人約四欺寡人必率天下以攻寡人者三有齊無秦無齊有秦必伐之必亡之已得宜陽少曲致藺離石因以破齊為天下罪秦欲攻魏重楚則以南陽委于楚曰寡人固與韓且絶矣殘均陵塞黽隘茍利于楚寡人如自有之魏棄與國而合于秦因以塞黽隘為楚罪兵困于林中重燕趙以膠東委于燕以濟西委于趙已得講于魏質公子延因犀首而攻趙兵傷于離石遇敗于馬陵史記作陽馬而重魏則以葉蔡委于魏已得講于趙則劫魏魏不為割困則使太后穰侯為和贏則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞黽厄適齊者曰以宋必令其言如循環用兵如刺蜚母不能知舅不能約龍賈之戰岸門之戰封陵之戰髙商之戰趙莊之戰秦所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大而燕趙之秦者皆以爭事秦説其主此臣之所大患也燕昭惠不行蘇代復重于燕燕反約諸侯從親如蘇秦時或從或否而天下由此宗蘇氏之從約代厲皆以壽死名顯諸侯國䇿國策趙且伐燕蘇代為燕謂惠王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而箝其啄鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁者得而並擒之今趙且伐燕燕趙久相支以敝大衆臣恐強秦之為漁父也願王熟計之惠王曰善乃止論曰蘇秦説秦不用變而合諸侯從反覆取尊于身初不為天下計也然是時秦已布翅張海內從果合秦不得帝亦不可謂非計也蘇代之説齊閔王曰聖人藉權而興時順民之意而料兵之能又曰大國後起而重伐不義小國謹節而寡信諸侯此從説之精者區區時主語焉而惛溺其國以為秦資信乎連雞不可以並棲而適足以要秦烹也尚史卷七十八
