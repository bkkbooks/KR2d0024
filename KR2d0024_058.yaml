body:
  text: 尚史卷五十八列傳三十六鑲白旗漢軍李鍇撰楚諸臣傳鬻拳石奢鬻拳事文王嘗强諫王王弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯文王十五年莊十九年巴人叛王禦之大敗于津楚地還鬻拳弗納遂伐黃敗黃師于踖陵黃地還及湫薨鬻拳葬諸夕室亦自殺也而葬于經皇左傳石奢者昭王相也堅直廉正無所阿避行縣道有殺人者相追之乃其父也縱其父而還自繫焉使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪子其治事矣奢曰不私其父非孝子也不奉主法非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死史記韓詩外傳作石奢為昭王理吕覽作石渚鍾儀枝如子躬鍾儀為鄖公共王七年成七年我伐鄭鄭軍我師囚儀獻諸晉晉人以儀歸囚諸軍府九年成九年晉侯觀于軍府見儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰泠人也樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也不知其他公語士燮燮曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱大子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也君盍歸之使合晉楚之成公重為之禮使歸求成王使公子辰如晉報儀之使平王時有枝如子躬為大夫平王新立使子躬聘于鄭且致犨櫟之田本鄭邑楚取之今還以賂鄭事畢弗致知鄭自服不須賂鄭人請曰聞諸道路將命寡君以犨櫟敢請命對曰臣未聞命既復王問犨櫟降服而對曰臣過失命未之致也王執其手曰子毋勤姑歸不榖有事其告子也左傳穿封戌穿封戌楚大夫康王十三年襄二十六年我侵吳遂侵鄭至于城麇鄭皇頡戍之出與我師戰師敗戌囚皇頡公子圍爭之正于伯州犂伯州犂曰請問于囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉頡解其意言為王子所得戌怒抽戈逐王子圍弗及康王薨王子圍弒郟敖自立是為靈王靈王七年昭八年王滅陳使戌為陳公曰城麇之役不諂侍飲酒于王王曰城麋之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚言蚤知靈王篡弒必為郟敖致死殺君以寧楚左傳郤宛子惡郤宛字子惡為左尹昭王元年昭二十七年吳因我喪使公子掩餘燭庸伐我圍潜宛及工尹夀帥師救潜吳師不能退吳光弒王僚掩餘燭庸出奔我師聞吳亂而還宛直而和國人說之費無極與鄢將師比而惡之無極謂令尹囊瓦曰子惡欲飲子酒又謂宛令尹欲飲酒于子氏宛曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂囊瓦曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎囊瓦使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之宛聞之遂自殺國人弗爇令曰不爇郤氏與之同罪或取一編管焉或取一秉秆焉國人投之遂弗爇也囊瓦炮之盡滅郤氏之族黨于是國言未已進胙者莫不謗囊瓦明年瓦殺費無極鄢將師亦盡滅其族以說于國謗言乃止左傳論曰鬻拳兵諫左氏以為愛君而范寧以為譏郤宛無罪而杜預以近讒為之罪嗟夫悠悠之論將安適從兵諫以自刑信非中道矣若郤宛者罪不奸上德及國人令尹惑讒而果于爇之罪不在瓦而宛是求春秋之㫖寧如是乎夫殺大夫有罪例書名左氏之論也然余竊疑之以其不中厥中也靈王暴虐淫刑以逞顧休休于穿封戌申無宇異哉廬戢黎叔麇窗附子揚左司馬眅廬戢黎為廬大夫莊王即位鬭克公子燮作亂以王出將如商密戢黎及叔麇誘之遂殺鬭克公子燮三年文十六年庸叛我戢黎侵庸及庸方城庸人逐之囚子揚窗既而王來㑹師遂滅庸叔麇者戢黎之佐子揚窗其官屬也昭王時有左司馬眅昭王二十五年哀四年夷虎叛蠻夷我克之乃謀北方眅及申公夀餘葉公諸梁致蔡于負函致方城之外於繒關曰吳將沂江入郢將奔命焉為一昔之期襲梁及霍僞辭當備吳夜結期襲梁霍一昔一夜也單浮餘大夫圍蠻氏蠻氏潰蠻子赤奔晉隂地昄起豐析與狄戎發二邑人及戎狄以臨上雒左師軍于莬和右師軍于倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通于少習武關道以聽命晉執蠻子與其五大夫以畀我師于三戶眅致邑立宗焉以誘其遺民而盡俘以歸左傳樂伯許伯攝叔樂伯許伯攝叔並楚大夫邲之役許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還靡旌驅疾摩壘近敵也樂伯曰吾聞致師者左射以菆左車左菆矢之善者代御執轡御下兩馬掉鞅而還兩飾也掉正也使御下車飾馬正鞅以示閒暇也攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜龜麋背隆髙當心者晉鮑癸當其後使攝叔奉麇獻焉曰以歲之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也遂免左傳養由基叔山冉附工尹商陽巢牛臣風湖子薛燭附養由基即養叔以善射名莊王十七年宣十二年邲之役王為乘廣三十乘分為左右廣雞鳴而駕日中而說說舍也左則受之日入而說許偃御右廣由基為右彭名御左廣屈蕩為右王乘左廣敗晉師于邲共王十六年成十六年鄢陵之役彭名御王潘黨為右黨與由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂于戰王怒曰大辱國詰朝爾射死藝賤其以射自多必以藝死及戰晉吕錡射王中目王召由基與之兩矢使射吕錡中項伏韜以一矢復命我師薄于險叔山冉謂由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中軍折軾晉師乃止共王薨康王即位吳侵我由基奔命公子午以師繼之由基曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之公子午從之戰于庸浦大敗吳師獲公子黨康王以公子午為令尹由基為宫廄尹左傳吕氏春秋荆王有白猿王自射之則搏樹而嬉使養由基射之始調弓矯矢未發猿擁樹而號矣尸子王命養由基射蜻蛉王曰吾欲得之養由基援弓而射之拂左翼王大喜又有工尹商陽商陽與陳棄疾追吳師及之陳棄疾謂商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉記檀弓按𫝊公子棄疾為蔡公經曰陳棄疾是嘗為陳公也又有巢牛臣巢人也康王十二年襄二十五年吳子諸樊伐我門于巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱于短牆以射之卒左傳風湖子楚人能相劍薛燭越之能相劍者也吳越春秋吳王有女滕玉因謀伐楚與夫人及女㑹蒸魚王前嘗半而與女女怒曰王食魚辱我乃自殺闔廬痛之葬于閶門外鑿池積土文石為槨題湊為中金鼎玉杯銀樽珠襦之寶皆以送女乃舞白鶴于市令萬民隨而觀之還使男女與鶴俱入羡門發機掩之湛盧之劍惡闔廬之無道也去而出水行如楚楚昭王卧而寤得劍于牀乃召風湖子而問白寡人卧覺而得寶劍不知其名是何劍也風湖子曰臣聞吳王得越所獻劍三一曰魚腸二曰磐郢三曰湛盧魚腸已用殺王僚磐郢以送其死女今湛盧入楚也曰湛盧所以去者何也風胡子曰臣聞越王元常使歐冶子造劍五以示薛燭燭曰魚腸逆理不順不可服也臣以殺君子以殺父故闔廬以殺王僚磐郢亦曰豪曹不法之物無益于人故以送死湛盧五金之英太陽之精寄氣託靈出之有神服之有威可以折衝拒敵然人君有逆理之謀其劍即出今吳王無道殺君謀楚故湛盧入楚昭王曰其直幾何風湖子曰臣聞此劍在越之時客有酬其直者有市之鄉三十駿馬千萬戶之都二薛燭對曰赤堇之山已令無雲若邪之溪深而莫測羣臣上天歐冶死矣雖傾城量金珠玉盈河猶不能得此寶而况有市之鄉駿馬千匹萬户之都何足言昭王大說遂以為寶越絶書越王句踐有寶劍五客有能相劍者名薛燭王召而問之曰吾有寶劍五請以示之使取毫曹燭曰非寶劍也寶劍五色並見莫能相勝毫曹擅名矣非寶劍也王曰取巨闕燭曰非寶劍也寶劍者金錫和銅而不離巨闕已離矣非寶劍也王曰然巨闕初成之時吾坐露壇之上宫人有四駕白鹿而過者車奔鹿驚吾引劍而指之四駕上飛揚不知其絶也穿銅釡絶鐵䥶胥中决如粢米故曰巨闕王取純鉤燭聞之忽如敗有頃懼簡衣而坐望之手拂揚其華捽如芙蓉始出觀其鈲爛如列星之行其光渾渾如水之溢于塘其斷巖巖如瑣石其才煥煥如氷釋此所謂純鈎邪王曰是也客有直之者有市之鄉二駿馬千匹千戶之都二可乎燭曰不可當造此劍之時赤堇之山破而出錫若邪之溪涸而出銅雨師灑掃雷公擊槖蛟龍捧爐天帝裝炭太一下觀天精下之歐冶乃因天之精神悉其伎巧造為大刑三小刑二一曰湛盧二曰純鈎三曰勝邪四曰魚腸五曰巨闕吳王闔廬之時得其勝邪魚腸湛盧闔廬無道子女死殺生以送之湛盧之劍去之如水行秦過楚楚王卧而寤得湛盧之劍將首魁漂而存焉秦王聞而求不得興師擊楚王不與闔廬又以魚腸之劍刺吳王僚此其小試于敵邦未大用于天下也今赤堇之山已合若邪溪深不測羣神不下歐冶子即死雖傾城量金珠玉竭河猶不能得此一物也楚王召風湖子而問曰寡人聞吳有干將越有歐冶子此二子甲世而生精誠上通願齎重寶奉子因吳王請二人作劍可乎風湖子曰善于是乃令風湖子之吳見歐冶子干將歐冶子干將鑿茨山泄其溪取鐵英作劍三畢成風湖子奏之楚王王問之曰三劍何物所象其名為何風湖子曰一曰龍淵二曰泰阿三曰工布王曰何為龍淵泰阿工布風湖子曰龍淵狀如登髙山臨深淵泰阿鈲巍巍翼翼如流水之波工布鈲從文起至脊而止如珠不可袵文若流水不絶晉鄭王聞而求之不得興師圍楚城三年不解楚王聞之引泰阿之劍登城而麾之三軍破敗士卒迷惑楚王大說曰此劍威邪寡人力邪風湖子曰劍之威也因大王之神軒轅神農赫胥之時以石為兵斷樹木為宫室死而龍藏至黃帝之時以玉為兵以伐樹木為宫室死而龍藏禹穴之時以銅為兵以鑿伊闕通龍門決江導河東注于東海天下通平治為宫室豈非聖主之力哉當此之時作鐵兵威服三軍此亦鐵兵之神大王有聖德楚王曰寡人聞命矣二說荒漫而其文甚竒世艷傳之故附養叔之末論曰易有之師出以律否臧凶之數子者雖不中律而出竒應卒以克彊禦侮亦一日之雋也死藝之戒豈唯養叔能者警諸伯州犁伯州犁晉伯宗之子也共王十五年成十五年晉殺伯宗州犁奔楚為楚大宰明年晉伐鄭王救之遇于鄢陵王登巢車車上為櫓以望晉軍公子嬰齊使州犁侍于王後王曰騁而左右何也曰召軍吏也皆聚于中軍矣曰合謀也張幕矣曰䖍卜于先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也及戰王中目我師宵遁康王十四年襄二十七年晉楚成將盟于宋西門之外國人衷甲州犁曰合諸侯之師以為不信無乃不可乎夫諸侯望信于楚是以來服若不信是棄其所以服諸侯也固請釋甲令尹屈建曰晉楚無信久矣事利而已茍得志焉焉用有信州犁退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三郟敖四年昭元年公子圍聘于鄭娶于公孫假氏既聘將以衆逆鄭患之辭曰請墠聽命欲于城外除地為墠公子圍命州犁對曰君辱貺寡大夫圍謂圍將使豐氏公孫假姓豐氏撫有而室圍布几筵告于共莊之廟而來若野賜之是委君貺于草莾也是寡大夫不得列于諸卿也不寧唯是又使圍䝉其先君將不得為寡君老其蔑以復矣唯大夫圖之圍知鄭有備請垂櫜而入遂逆而出秋圍使州犁城犨櫟郟冬圍弒郟敖殺州犁于郟州犁之孫曰嚭楚殺郤宛伯氏之族出奔吳嚭遂仕吳亦為大宰左傳然丹針尹宜咎附然丹字子革鄭穆公孫公子然之子也鄭殺公子嘉丹奔楚為右尹靈王三年昭四年吳伐我使丹城州來針尹宜咎城鍾離八年昭九年我遷許于城父使丹遷城父人于陳以夷濮西田益之十一年昭十二年王狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜五子並楚大夫帥師圍徐以懼吳王次于乾溪以為之援雨雪王皮冠秦復陶秦所遺羽衣翠被豹舄執鞭以出僕析父從楚大夫子晳丹夕夕莫見也王見之去冠被舍鞭與之語曰昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無有今吾使人于周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路柴車籃縷以處草莾跋涉山林以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者専足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲敢請命鏚斧也柲柄也王命破圭玉飾斧柄請其制度也王入視之僕析父謂丹吾子楚國之望也今與玉言如響國其若之何丹曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九邱對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲沒于祇宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克明年公子比入自立為王丹請出奔王不可乃棄王而歸平王元年昭十四年王使丹簡上國之兵于宗邱楚地且撫其民分貧振窮長孤幼養老疾收介特救灾患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勳合親任良物官息民五年而後用師三年昭十六年使丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子針尹宜咎者本陳大夫陳針子八世孫針宜咎也宜咎黨慶虎慶寅慶氏叛陳陳討之宜咎奔楚為針尹左傳論曰州犁然丹羇旅異國而各著厥聞亡鳥擇木奮迅以鳴誰能遏之祈招之誦謀父再作惜乎靈不逮穆感深而迷亦深矣然而乾溪之潰違故即新方之申亥鬭辛曽不及之何哉州犂比靈而誅于靈抑又何也諸公子傳公子元武王子王孫啓附公子元文王之弟也為成王令尹成王六年莊二十八年子元欲蠱文夫人為館于其宫側而振萬焉振動萬舞也夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讐而于未亡人之側不亦異乎御人以告子元曰婦人不忘襲讐我反忘之以車六百乘伐鄭入于桔柣之門衆車入自純門及逵市鄭縣門不發縣門施于內城門者不發不閉也楚言而出子元曰鄭有人焉㑹諸侯救鄭我師夜遁八年莊三十年子元歸自伐鄭而處王宫欲遂蠱文夫人申公鬭班殺子元左傳子元之子啓或譛啓于成王啓奔晉公子職公子職成王庶子成王既立商臣為大子又欲立職商臣遂弒成王左傳公子朱公子茷公子朱公子茷並楚公子所出未詳子朱為息公穆王二年文三年子朱圍江晉告于周王叔桓公晉陽處父伐我以救江門于方城遇子朱而還八年文九年子朱自東夷伐陳陳人敗之獲子茷陳懼及我平鄢陵之役子茷為晉所獲欒書怨郤至使子茷告晉厲公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君厲公信之殺三郤左傳公子嬰齊穆王子子重公子嬰齊字子重莊王之弟也為左尹莊王十六年宣十一年嬰齊侵宋王待諸郔王孫子莊王攻宋厨有臭肉樽有敗酒子重諌曰君厨肉臭不可食敗酒不可飲而三軍有饑色欲以勝敵不亦難乎王曰請有酒投之士有食饋之賢十七年宣十二年邲之役沈尹將中軍嬰齊將左公子側將右敗晉師于邲共王即位嬰齊為令尹公子側為司馬共王二年成二年魯㑹諸侯伐齊嬰齊救齊將起師嬰齊曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文主以寧夫文王猶用衆況吾儕乎且先君莊王屬之曰無德而及逺方莫如惠恤其民而善用之乃大戶閲民户口已責逮鰥救乏赦罪悉師王卒盡行侵衛遂侵魯師于蜀及陽橋魯賂以執斫執針織紝皆百人公衡為質冬及魯侯諸侯之大夫盟于蜀六年成六年嬰齊伐鄭鄭從晉故七年成七年嬰齊伐鄭師于汜諸侯救鄭軍我師軍攻也囚鄖公鍾儀初屈巫即巫臣之奔晉也嬰齊及公子側殺其族而分其室屈巫遺二子書曰余必使爾罷于奔命而死乃通吳于晉吳始伐楚伐巢伐徐嬰齊奔命秋吳入州來嬰齊自鄭奔命嬰齊側于是乎一嵗七奔命九年成九年晉伐鄭嬰齊侵陳以救鄭冬嬰齊自陳伐莒圍渠邱莒邑入之莒人囚公子平國人曰勿殺吾歸而俘莒人殺之我師圍莒莒潰遂入鄆十六年成十六年晉伐鄭我救之公子側將中軍嬰齊將左公子壬夫將右遇于鄢陵晉射王中目我師宵遁我殺公子側十七年成十七年晉㑹諸侯伐鄭嬰齊救鄭師于首止諸侯還十八年成十八年宋魚石叛宋圍彭城嬰齊救之伐宋晉救宋遇我師于靡角之谷我師還二十一年襄三年嬰齊伐吳為簡之師選練也克鳩兹吳邑至于衡山使鄧廖帥組甲三百被練三千組甲漆甲成組文被練練袍以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已嬰齊歸飲至三日吳人伐我取駕駕良邑也鄧廖亦楚之良也君子謂嬰齊于是役也所獲不如所亡國人咎嬰齊嬰齊病之遂遇心疾而卒左傳公子側子反公子側字子反所出未詳初事莊王莊王十九年宣十四年側從王圍宋明年宋華元夜入我師登側之牀起之曰寡君使元以病告雖然城下之盟有以國斃不能從也去我三十里唯命是聽側懼與之盟而告王退三十里宋及我平莊王薨事共王為司馬共王四年成四年鄭疆許田許人敗諸展陂鄭伐許晉救許以伐鄭側救鄭鄭伯與許男訟焉皇戌攝鄭伯之辭側不能决也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成十二年成十二年我及晉成盟于宋晉郤至來聘且涖盟王享之側相為地室而縣焉郤至將登金奏作于下驚而走出側曰日云莫矣寡君須矣吾子其入也賔曰君貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢側曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂言兩君戰乃相見無用此樂寡君須矣吾子其入也賔曰若讓之以一矢禍之大者其何福之為十五年成十五年我將侵鄭衛公子貞曰新與晉盟而背之無乃不可乎側曰敵利則進何盟之有遂侵鄭侵衛十六年成十六年鄭叛晉從我晉伐鄭我救之側將中軍夏六月晉楚遇于鄢陵及戰晉射王中目獲我公子茷鄭伯奔其右唐茍死之旦而戰見星未巳側命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聼晉人患之苖賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召側謀榖陽豎側內豎獻飲于側側醉而不能見王曰天敗楚也夫余不可以待乃宵遁師還及瑕王使謂側曰先大夫之覆師徒者君不在子無以為過不榖之罪也側再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也公子嬰齊與側相惡及是嬰齊謂側曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒左傳韓非子子反嗜酒而醉戰既罷共王召子反子反辭以疾共王自往入其幄聞酒臭而還于是還師而斬子反公子丙公子平公子丙公子平並楚羣公子也丙事莊王莊王之伐蕭也蕭人囚熊相宜僚及丙王曰勿殺吾退蕭人殺之王怒圍蕭蕭潰遂滅蕭平事共王公子嬰齊之伐莒入渠邱也莒人囚平楚人曰勿殺吾歸而俘莒人殺之我師圍莒莒潰遂入鄆左傳公子壬夫公子何忌附公子壬夫字子辛所出未詳初為右尹事共王共王十六年成十六年鄢陵之役壬夫將右及戰我師敗績十八年成十八年宋魚石五大夫叛壬夫及鄭師侵城郜取幽邱並宋邑同伐彭城納五夫夫以三百人戍之而還十九年襄元年諸侯伐鄭壬夫救之侵宋吕留二十一年襄三年公子嬰齊卒以壬夫為令尹壬夫侵欲于小國陳遂叛使公子何忌侵陳二十三年襄五年討陳叛故殺壬夫左傳何忌為司馬亦羣公子公子槖師公子罷戎公子槖師公子罷戎並事共王為大夫共王之敗于鄢陵也舒庸人道吳圍巢伐駕圍釐虺巢駕釐虺楚四邑遂恃吳而不設備共王十七年成十七年槖師襲舒庸滅之二十七年襄九年王伐鄭鄭及我平使罷戎入盟同盟于中分共王薨康王即位以槖師為右司馬以罷戎為右尹左傳公子格王子勝公子格公子勝並羣公子格事康王勝事平王為左尹康王三年襄十六年許請遷于晉許大夫不可晉將伐許鄭伯從夏晉伐許遂伐我格帥師及晉師戰于湛阪我師敗績晉遂侵方城之外復伐許而還平王五年昭十八年王子勝言于王曰許于鄭仇敵也而居楚地以不禮于鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不専于楚不専心事楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城之外蔽也土不可易國不可小許不可俘讐不可啓君其圖之王說使勝遷許于析左傳公子魴公子齮公子魴字子魚亦羣公子平王時陽丐為令尹魴為司馬四年昭十七年吳伐我陽丐卜戰不吉魴曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸魴先死我師繼之大敗吳師獲其乘舟餘皇吳取餘皇復大敗我師康王時薳子馮為令尹公子齮為司馬齮亦羣公子也左傳公子申公子成公子寅公子罷公子辰公子申公子成並事共王公子申為右司馬共王六年成六年我伐鄭晉救之遂侵蔡申及成以申息之師救蔡禦諸桑隧晉師還九年成九年我以重賂求鄭鄭伯㑹公子成于鄧十五年成十五年許畏逼于鄭請遷于我公子申遷許于葉十六年成十六年王自武城使公子成以汝隂之田求成于鄭鄭叛晉及王盟于武城十七年成十七年使公子成公子寅戍鄭諸侯圍鄭使公子申救鄭師于汝上諸侯還公子申為右司馬多受小國之賂以逼公子嬰齊二十年襄二年國人殺之康王即位以公子成為左司馬公子寅亦羣公子又有公子罷公子辰我殺屈巫罷分子蕩屈巫族之室共王時晉楚成郤至來聘罷如晉報聘及晉侯盟于赤棘公子辰字子商為共王大宰晉歸我鍾儀王使辰如晉報鍾儀之使請修好結成左傳論曰令尹司馬並以宗支便蕃左右顧乃臘肉淫人食而遇毒五北之繇卒階入郢一嵗七奔猶為幸夫仲尼曰臨事而懼好謀而成敗而醉戰而喪其良其于勇也後矣尚史卷五十八
