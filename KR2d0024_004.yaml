body:
  text: 尚史卷四本紀三鑲白旗漢軍李鍇撰商本紀湯湯契之裔也契封於商賜姓子氏禮緯以元鳥生子也契别有本傳見唐虞諸臣契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子㝠立韋昭國語注相土四傳至㝠㝠契後六世孫根圉之子也是根圉即曹圉而其上史遺二世㝠卒子振立振卒子㣲立史記㣲以甲日生故字上甲商家生子以日名自㣲始帝王世紀紀年殷王子亥賔于有易而滛焉有易之君綿臣殺而放之是故上甲㣲假師於河伯以伐有易滅之遂殺其君綿臣山海經王亥託于有易河伯僕牛有易殺王亥取僕牛河念有易有易潛出為國於獸方食之名曰揺民國語上甲㣲能帥契者也商人報焉孔叢子書曰維髙宗報上甲㣲定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有徳而不及宗故于每嵗之大嘗而報祭焉所以昭其功徳也㣲卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立史記主癸之妃曰扶都見白氣貫月意感以乙日生湯故名履字天乙是為成湯豐下鋭上晳而有髯倨身而揚聲長九尺臂四肘帝王世紀洛書黑帝子湯長八尺一寸珠庭白虎通湯臂三肘是謂柳翼尚書大傳湯半體枯金樓子成湯母感狼星之精又感黑龍而成自契至湯八遷湯始居亳從先王居作帝告釐沃湯征諸侯葛伯不祀湯始征之作湯征書序按帝告釐沃湯征三篇並亡史記載湯征之辭曰湯曰予有言人視水見形視民知治不伊尹曰明哉言能聽道乃進君國子民為善者皆在王官勉哉勉哉湯曰汝不能敬命予大罸殛之無有攸赦越絶書湯行仁義敬鬼神天下歸之當是時荆伯未從湯乃飾犧牛以事荆伯荆伯媿然曰失事聖人禮乃委其誠心有伊尹者耕于有莘之野樂堯舜之道湯三使往聘故就湯而説之孟子帝王世紀湯夢人負鼎抗俎對已而笑寤而占曰鼎為和味俎者割截豈有為我宰者哉伊摯耕于有莘之野湯聞以幣聘之有莘之君留而不進湯乃求婚於有莘之君遂以摯為媵臣至亳乃負鼎抱俎見湯也楚辭注伊尹始仕因縁烹鵠鳥之羮修飾玉鼎以事湯又曰湯出觀風俗乃憂下民博選于衆而逢伊尹舉以為相墨子湯將徃見伊尹彭氏之子御半道而問曰君將何之湯曰徃見伊尹曰伊尹天下之賤人也亦召問焉彼受賜矣湯曰有藥于此食之耳加聰目加眀吾必説而强食之今夫伊尹良醫善藥也子不欲我見是不欲我善也下彭氏之子不使御湯舉任以國政伊尹去湯適夏既醜有夏復歸于亳湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及禽獸新序漢南諸侯聞之曰湯徳及禽獸矣四十國歸之墨子湯封于亳方地百里與其百姓兼相愛交相利率百姓以尊天事鬼是以天鬼富之諸侯與之百姓親之賢士歸之淮南子夙興夜寐以致聰明輕賦薄歛以寛民氓布徳施恵以振困窮弔死問疾以養孤孀百姓親附政令流行桀廼召湯而囚之夏臺已而釋之湯修徳諸侯皆歸湯帝王世紀桀無道臯諫者湯使人哭之桀囚湯于夏臺而後釋之諸侯咸叛桀附湯同日供職者五百國當是時夏桀為虐政滛荒而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀史記升自陑遂與桀戰于鳴條之野作湯誓書序湯曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之今爾有衆汝曰我后不恤我衆舎我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷䘮予及汝偕亡夏徳若兹今朕必徃爾尚輔予一人致天之罪予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦尚書桀敗於有娀之虚犇於鳴條夏師敗績湯遂伐三㚇俘厥寳玉誼伯仲伯湯二臣作典寳吕氏春秋湯良車七十乘必死六千人以戊子戰于郕遂禽移大犧登自鳴條乃入巢門遂有夏周書夏多罪湯將放之徴前事以戒後王也作殷祝湯將放桀于中野士民聞湯在野皆委貨扶老擕㓜奔國中虛桀謂湯曰國所以為國者以有家家所以為家者以有人今國無家無人矣君有人請致國君之有也湯曰否昔大帝作道明教士民今君王滅道殘政士民惑矣吾為王明之士民復致于桀曰以薄之居濟民之賤何必君更桀與其屬五百人南徙千里止于不齊民徃奔湯於中野桀復請湯言君之有也湯曰否我為君王明之士民復重請之桀與其屬五百人徙于魯魯士民復奔湯桀又曰國君之有也湯曰此君王之士也君王之民也委之何湯不能止桀湯曰欲從者從君桀與其屬五百人去湯放桀而復薄三千諸侯大㑹湯退再拜從諸侯之位湯曰此天子位有道者可以處之湯讓三千諸侯莫敢即位然後湯即天子位與諸侯誓曰隂勝陽謂之變而天弗施雌勝雄謂之亂而人弗行故諸侯之治政在諸侯之大夫治於從湯既勝夏欲遷其社不可作夏社孔安國注欲變置社稷而後世無及句龍者故不可而止伊尹報于是諸侯畢服湯乃踐天子位平定海内史記湯歸自夏至于大坰仲虺作誥誥見仲虺傳書序帝王世紀湯遷九鼎至于大坰而有慙徳湯至於亳作湯誥誕告萬方王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降衷于下民若有恒性克綏厥猷惟后夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪肆台小子將天命明威不敢赦敢用元牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖俾予一人輯寧爾邦家兹朕未知獲戾於上下慄慄危懼若將隕于深淵凡我造邦無從匪彛無即慆滛各守爾典以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方嗚呼尚克時忱乃亦有終尚書史記湯歸至泰卷陶中􅣂作誥既詘夏命還亳作湯誥維三月王自至于東郊告諸侯羣后毋不有功于民勤力迺事予乃大罰殛汝毋予怨曰古禹臯陶久勞于外其有功乎民民乃有安東為江北為濟西為河南為淮四瀆以修萬民乃有居后稷降播農殖百穀三公咸有功于民故后有立昔蚩尤與其大夫作亂百姓帝乃弗予有狀先王言不可不勉曰不道毋之在國女毋我怨以令諸侯乃改正朔易服色上白朝會以畫史記吕氏春秋湯之時天先見金刃生于水湯曰金氣勝金氣勝故其色尚白其事則金越絶書湯用伊尹行至聖之心見桀無道虐行故伐夏放桀而王道興躍革亂補弊移風易俗改制作新海内畢貢天下承風湯以文聖此之謂也帝王世紀湯令未命之為士者車不得朱軒及有飛軫不得乗飾車駢馬衣文繡命然後得以順其徳淮南子湯之初作囿也以奉宗廟鮮犞之具簡士卒習射御以戒不虞其社用石祀門𦵏樹松其樂大濩晨露淮南子湯崩皇覽湯冡在濟隂亳縣北東郭去州三里冡四方方各十歩髙七尺上平處平地立太丁之弟外丙史記湯之時大旱七年雒圻川竭煎沙爛石于是使人持三足鼎祝山川教之祝曰政不節邪使人疾邪苞苴行邪讒夫昌邪宫室崇邪女謁盛邪何不雨之極邪言未已而天大雨説苑荀子同帝王世紀湯自伐桀後大旱七年殷史上曰當以人禱湯曰吾所為請雨者民也若以人禱請自當遂齋戒翦髮㫁爪以已為牲禱于桑林之社而大雨方數千里淮南子湯之時七年旱以身禱于桑林之際而四海之雲凑千里之雨至尸子湯之救旱也乘素車白馬著布衣嬰白茅以身為牲禱干桑林之野當此時也絃歌鼓舞者禁之吕氏春秋湯克夏大旱五年湯乃以身禱于桑林曰余一人有罪無及萬夫萬夫有罪在余一人無以一人之不敏使上帝鬼神傷民之命於是翦髮􅀈手以身為牲用祈福於上帝民乃甚説雨乃大至又曰湯與伊尹盟以示必滅夏商涸旱湯猶發師以信伊尹之盟前編因之以大旱自伐桀年起新書湯曰學聖王之道者譬其如日静思而獨居譬其若火夫舎學聖之道而静思獨居譬若去日而就火也可以小見不可以大知是故明君貴學道而賤獨思也君得賢而舉之與之譬其若登山得不肖而舉之與之譬其若下淵故登山而望其何不臨而何不見陵遲而入淵其孰不䧟溺是以眀君慎其舉而君子慎於得舉然後細福可必細菑可去矣又曰藥食嘗于卑然後至于貴藥言獻于貴然後聞于卑藥食嘗于卑然後至于貴者教也藥言獻于貴然後至于卑者道也故使人味食然後食者其得味也多使人味言然後聞者其得言也少故上之于言也必自聽之自擇之自聚之自藏之自行之故道以數取之為明以數行之為章以教施之萬姓為藏是故求道者不以目而以心取道者不以手而以耳致道者以言入道者以忠積道者以信樹道者以人故治安不可以虚誠也顯榮不可以虚得也故明君敬士察吏愛民以參其極非此者則四美不附矣殷人之王也立帛牢服牛馬以為民利而天下化之管子其治天下也得慶誧伊尹湟里且東門虛南門蝡西門疵北門側得七大夫以治天下而天下治二十七世積嵗五百七十六至紂鬻子漢書小説家天乙三篇其言依託外丙中壬太甲太宗沃丁太庚小甲雍已太甲者太丁之子湯之適長孫也湯崩太子太丁未立而卒乃立太丁之弟外丙外丙即位三年崩立外丙之弟中壬中壬即位四年崩伊尹乃立太甲史記紀年外丙名勝二年陟中壬名庸四年陟太甲名至元年辛巳即位居亳按書序成湯既没太甲元年無外丙中壬邵子經世亦無二君之年程子湯崩時外丙二嵗中壬四嵗太甲差長故立之然當從史記為是惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冡宰伊尹乃明言烈祖之成徳以訓于王曰嗚呼古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳惟我商王布昭聖武代虐以寛兆民允懐今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海嗚呼先王肇修人紀從諌弗咈先民時若居上克明為下克忠與人不求偹檢身若不及以至于有萬邦兹惟艱哉敷求哲人俾輔于爾後嗣制官刑儆于有位曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒於逰畋時謂滛風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰帷上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗惟嗣王不恵于阿衡商官名亦曰保衡或曰伊尹之號伊尹作書曰先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅天監厥徳用集大命撫綏萬方惟尹躬克左右厥辟宅師嗣肆王丕承基緒惟尹躬先見于西邑夏自周有終周忠信也國語忠信為周相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖王惟庸罔念聞伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啟迪後人無越厥命以自覆慎乃儉徳惟懐永圖若虞機張徃省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭王未克變伊尹曰兹乃不義習與性成予弗狎于弗順營于桐宫密邇先王其訓無俾世迷王徂桐宫居憂克終允徳史記太甲既立不明暴虐伊尹放之于桐宫伊尹攝行政當國以朝諸侯太甲居桐宫三年悔過自責反善伊尹迺迎太甲而授之政紀年太甲元年伊尹放太甲于桐乃自立七年太甲潛出自桐殺伊尹乃立其子伊陟伊奮復其田宅而中分之沈約曰葢誤以攝政為眞杜預曰此當時雜記未足以取審也惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷祐有商俾嗣王克終厥徳實萬世無疆之休王拜手稽首曰予小子不明于徳自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既徃背師保之訓弗克于厥初尚頼匡救之徳圖惟厥終伊尹拜手稽首曰修厥身允徳協于下惟眀后先王子恵困窮民服厥命罔有不悦並其有邦厥鄰乃曰徯我后后來無罰王懋乃徳視乃烈祖無時豫怠奉先思孝接下思恭視逺惟明聽徳惟聰朕承王之休無斁伊尹申告于王曰嗚呼惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠天位艱哉徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后先王惟時懋敬厥徳克配上帝今王嗣有令緒尚監兹哉若升髙必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始有言逆于汝心必求諸道有言遜于汝志必求諸非道嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休伊尹既復政厥辟將告歸乃陳戒于徳曰嗚呼天難諶命靡常常厥徳保厥位厥徳靡常九有以亡夏王弗克庸徳慢神虐民皇天弗保監于萬方啟迪有命眷求一徳俾作神主惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師爰革夏正非天私我有商惟天祐于一徳非商求于下民惟民歸于一徳徳惟一動罔不吉徳二三動罔不凶惟吉凶不僭在人惟天降災祥在徳今嗣王新服厥命惟新厥徳終始惟一時乃日新任官惟賢才左右惟其人臣為上為徳為下為民其難其慎惟和惟一徳無常師主善為師善無常主協于克一俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生嗚呼七世之廟可以觀徳萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功尚書太甲修徳諸侯咸歸殷百姓以寧伊尹嘉之作太甲訓三篇褒太甲稱太宗太甲崩子沃丁立紀年沃丁名絢元年命卿士咎單八年祠保衡沃丁之時伊尹薨既塟伊尹于亳咎單為湯司空遂訓伊尹事作沃丁沃丁崩弟太庚立紀年作小庚小庚名辨五年陟太庚崩子小甲立世表帝小甲太庚弟紀年小甲名髙元年丁巳十七年陟小甲崩弟雍已立紀年雍已名伷十七年陟殷道衰諸侯咸不至史記太戊中宗中丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲太戊雍已之弟也孔氏注小甲之弟太庚之子紀年太戊名密元年丙戌通鑑前編元年甲辰雍已崩太戊立伊陟伊尹之子為相亳有祥桑榖共生于朝一暮大拱孔安國注二木合生不恭之罰康成注兩手搤之曰拱太戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕與王其修徳太戊從之而祥桑枯死帝王世紀桑穀生于朝太戊退而占之曰桑穀野木不合生于朝意者朝亡乎太戊懼修先王之政明養老之禮三年而逺方重譯至者七十六國伊陟贊言于巫咸臣名巫咸治王家有成作咸乂作太戊太戊贊伊陟于廟言弗臣伊陟讓作元命書序作咸乂四篇作伊陟原命篇俱亡殷復興諸侯歸之故稱中宗太戊崩子仲丁立仲丁遷于隞史記紀年仲丁名莊九年陟書序仲丁遷于囂作仲丁篇亡仲丁之世藍夷作冦自是或服或叛三百有餘年後漢書仲丁崩弟外壬立紀年外壬名發元年邳人侁人服十年陟外壬崩弟河亶甲立河亶甲居相書序河亶甲居相作河亶甲篇亡紀年河亶甲名整三年彭伯克邳四年伯代征藍夷五年彭伯韋班方侁人来賓九年陟河亶甲時殷復衰河亶甲崩子祖乙立殷復興巫賢任職巫賢巫咸之子佐帝祖乙史作巫咸誤祖乙遷于邢音耿書序祖乙圯于耿作祖乙篇亡紀年祖乙名滕元年己巳自相遷耿二年圮于耿自耿遷庇十九年陟祖乙崩子祖辛立紀年祖辛名旦十四年陟祖辛崩弟沃甲立紀年作開甲開甲名踰五年陟沃甲崩立沃甲兄祖辛之子祖丁紀年祖丁名新九年陟祖丁崩立沃甲之子南庚紀年南庚名更三年遷于奄六年陟南庚崩立祖丁之子陽甲紀年陽甲名和四年陟陽甲之時殷衰自中丁以來廢適而更立諸弟子弟子或爭相代立比九世亂於是諸侯莫朝史記盤庚小辛小乙盤庚陽甲弟也陽甲崩盤庚立盤庚時殷五遷無定處史記孔安國注湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚為五遷蔡沈注盤庚之前當自有五遷按紀年祖乙遷耿圮于耿遷庇南庚遷奄并仲丁河亶甲適五遷或亦非鑿空之紀也耿在河北迫近山川自祖辛以來民皆奢侈帝王世紀康成云祖乙居耿以後奢侈踰禮土地迫近山川常圮焉至陽甲立盤庚為之臣乃謀徙居湯舊都民居耿乆奢滛成俗故不樂徙王肅云自祖乙五世至盤庚元兄陽甲宫室奢侈下民邑居墊隘水泉瀉鹵不可以行政化故徙都于殷盤庚將治亳殷民咨胥怨作盤庚三篇書序盤庚遷于殷民不適有居率籲衆慼出矢言曰我王來既爰宅于兹重我民無盡劉劉殺也不能胥匡以生卜稽曰其如台先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之㫁命矧曰其克從先王之烈若顛木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方盤庚斆于民由乃在位以常舊服正法度曰無或敢服小人之攸箴王命衆悉至於庭王若曰格汝衆予告汝訓汝猷黜乃心無傲從康古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚予弗知乃所訟非予自荒兹徳惟汝舎徳不惕予一人予若觀火予亦拙謀作乃逸若網在綱有條而不紊若農服田力穡乃亦有秋汝克黜乃心施實徳於民至于婚友丕乃敢大言汝有積徳乃不畏戎毒于逺邇惰農自安不昬作勞不服田畆越其罔有黍稷汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于箴言其發有逸口矧予制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非予有咎遲任有言曰人惟求舊器非求舊惟新古我先王暨乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非徳予告汝于難若射之有志汝無侮老成人無弱孤有㓜各長于厥居勉出乃力聽予一人之作猷無有逺邇用罪伐厥死用徳彰厥善邦之臧惟汝衆邦之不臧惟予一人有佚罰凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔盤庚作惟渉河以民遷乃話民之弗率誕告用亶其有衆咸造弗䙝在王庭盤庚乃登進厥民曰明聽朕言無荒失朕命嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時殷降大虐先王不懐厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰予若籲懐兹新邑亦惟汝故以丕從厥志今予將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上今予命汝一無起穢以自臭恐人倚乃身迂乃心予迓續乃命于天予豈汝威用奉畜汝衆予念我先神后之勞爾先予丕克羞爾用懐爾然失於政陳於兹高后丕乃崇降罪疾曰曷虐朕民汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕㓜孫有比故有爽徳自上其罰汝汝罔能迪古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃㫁棄汝不救乃死兹予有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中於乃心乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種於兹新邑徃哉生生今予將試以汝遷永建乃家盤庚既遷奠厥攸居乃正厥位綏爰有衆曰無戱怠懋建大命今予其敷心腹腎腸厯告爾百姓于朕志罔罪爾衆爾無共怒協比讒言予一人古我先王將多于前功適于山用降我凶徳嘉績于朕邦今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝将復我髙祖之徳亂越我家朕及篤敬恭承民命用永地于新邑肆予冲人非廢厥謀弔由靈各非敢違卜用宏兹賁賁大也嗚呼邦伯師長百執事之人尚皆隠哉予其懋簡相爾念敬我衆朕不肩好貨敢恭生生鞠人謀人之保居叙欽今我既羞告爾于朕志若否罔有弗欽無總于貨寳生生自庸式敷民徳永肩一心尚書史記盤庚渡河南殷民咨胥皆怨不欲徙盤庚乃告諭諸侯大臣曰昔髙后成湯與爾之先祖俱定天下法則可修舎而弗勉何以成徳乃遂陟河南治亳史記帝小辛立殷復衰百姓思盤庚迺作盤庚三篇説誤盤庚治亳行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之徳也盤庚崩弟小辛立紀年小辛名頌三年陟小辛立殷復衰小辛崩弟小乙立紀年小乙名歛十年陟前編二十八祀武丁髙宗祖庚祖甲亶辛庚丁武乙太丁帝乙武丁小乙之子也紀年武丁名昭元年丁未命卿士甘盤小乙崩武丁立甘盤為相皇極經世王宅憂亮隂三祀既免䘮其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令王庸作書以誥曰以台正於四方台恐徳弗類兹故弗言恭黙思道夢帝賚予良弼其代予言乃審厥象俾以形旁求於天下説築傳巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啟乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷惟暨乃僚罔不同心以匡乃辟俾率先王迪我高后以康兆民嗚呼欽予時命其惟有終説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命惟説命總百官乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢慮善以動動惟厥時有其善䘮厥善矜其能䘮厥功惟事事乃其有偹有偹無患無啟寵納侮無耻過作非惟厥攸居政事惟醇黷于祭祀時謂弗欽禮煩則亂事神則難王曰旨哉説乃言惟服乃不良於言予罔聞於行説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成徳惟説不言有厥咎王曰來汝説台小子舊學於甘盤既乃遯于荒野入宅於河自河徂亳暨厥終罔顯爾惟訓於朕志若作酒醴爾惟麴蘖若作和羮爾惟鹽梅爾交修予罔予棄予惟克邁乃訓説曰王人求多聞時惟建事學於古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懐于兹道積于厥躬惟斆學半念終始典於學厥徳修罔覺監於先王成憲其永無愆惟説式克欽承旁招俊乂列于庶位王曰嗚呼説四海之内咸仰朕徳時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧耻若撻于市一夫不獲則曰時予之辜佑我烈祖格于皇天爾尚明保予罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命尚書武丁祭成湯有飛雉升鼎耳而雊祖已訓諸王作高宗彤日肜祭明日又祭之名殷曰肜周曰繹高宗之訓書序亡後篇尚書大傳武丁祭成湯有雉飛升鼎耳而雊祖已曰雉者野鳥升于鼎者欲為用也無則逺方將有來朝者故武丁内反諸已以思先王之道三年編髮重譯來朝者六國孔子曰吾於高宗肜日見徳之有報之疾也按史記前載祖己之訓于武丁時又曰武丁崩祖庚立祖已嘉武丁以祥雉為徳立其廟為高宗作高宗彤日及訓三二行間矛盾乃爾通鑑前編㫁以高宗廟號遂因史記之言以為祭高宗蔡沈書注引祀豐于昵以為髙宗祭禰廟未詳孰是古今注高宗時有雊雉之祥服章多用翟羽武丁修政行徳天下咸驩殷道復興史記尚書大傳湯之後武丁之前王道不振桑榖俱生於朝七日而大拱武丁懼側身修行三年之後重譯而朝六國説苑成湯之後先王道缺桑穀生乎朝七日而大拱召其相而問焉其相曰吾雖知之吾弗得言也問諸祖已曰榖者野草也而生於朝意者國亡乎武丁恐駭飭身修行思先王之政三年之後蠻夷重譯而朝者七國按祥桑見太戊時説誤武丁代鬼方三年克之易經易乾鑿度殷道中衰王道陵遲至於高宗内理其國以得民心扶救衰㣲伐征逺方三年而惡消滅王道成詩殷武奮伐荆楚朱子疑即鬼方云武丁子曰祖庚祖庚弟曰祖甲武丁欲廢祖庚立祖甲甲以為不義逃于民間康成尚書注武丁崩祖庚立紀年祖庚名曜十一年陟祖已嘉武丁之以祥雉為徳立其廟為高宗祖庚崩弟祖甲立紀年祖甲名載元年丁巳三十三年陟書無逸其在祖甲不義惟王按史記祖甲立是為帝甲帝甲滛亂殷復衰國語亦曰帝甲亂之七世而隕通鑑前編遂以無逸之祖甲為太甲而主孔安國傳蔡沈書注則以祖甲為祖甲而主鄭注雖鄭註不知其所本要亦非臆説也且違傳而遵經于義為正祖甲崩子廪辛立紀年憑辛名先四年古今人物表帝王世紀俱作憑辛廪辛崩弟庚丁立紀年庚丁名囂八年陟庚丁崩子武乙立紀年武乙名瞿三十五年大雷震死殷復去亳徙河北帝武乙無道為偶人謂之天神與之博令人為行天神不勝乃僇辱之為革囊盛血仰而射之命曰射天武乙獵于河渭之間暴雷武乙震死子太丁立紀年文丁名託十三年陟按太丁太甲之父史疑誤當遵紀年太丁崩子帝乙立帝乙立殷益衰史記紀年帝乙名羨九年陟帝辛紂帝辛者帝乙之子帝乙長子曰㣲子啟啟母賤不得嗣少子辛辛母正后辛為嗣吕氏春秋紂同母三人長曰㣲子啟次曰仲衍次曰受徳受徳乃紂也甚少紂母生㣲子啟與仲衍也尚為妾已而為妻而後生紂紂父母欲置㣲子啟為太子太史據法而争之曰有妻之子不可置妾之子紂故為後康成亦謂同母帝乙崩子辛立天下謂之紂紂資辨㨗疾聞見甚敏材力過人手格猛獸論衡紂力能索鐵申鉤撫梁易柱帝王世紀紂倒曵九牛撫梁易柱荀子桀紂長巨姣美天下之傑筋力越勁百人之敵新書紂自謂天王知足以距諌言足以飾非矜人臣以能高天下以聲以為皆出己之下好酒滛樂嬖于婦人愛妲己紀年帝辛九祀伐有蘇獲妲己以歸妲己之言是從於是使師涓作新淫聲北里之舞靡靡之樂厚賦税以實鹿臺之錢而盈鉅橋之粟益收狗馬竒物充仭宫室益廣沙邱苑臺多取野獸蜚鳥置其中史記紀年自盤庚徙殷至紂更不徙都紂時稍大其邑南距朝歌北據邯鄲及沙邱皆為離宫别館新序紂為鹿臺七年而成其大三里高千尺臨望雲烟世本紂為玉牀造傾宫作瓊室飾以美玉七年乃成其大十里其高千丈多發美女以充傾宫之室帝王世紀紂沈湎于酒以糟為邱以酒為池車行酒騎行灸百二十日為一夜長夜之飲忘其甲子論衡百姓怨望而諸侯有畔者於是乃重刑辟有炮烙之法史記生燔人聞其臭剔孕婦見其化斮朝渉之足察其拇春秋繁露烈女傳膏銅柱加之炭令有罪者行其上輙墮炭中妲己乃笑帝王世紀紂欲重刑乃先作大熨斗以火熱之使人舉不能勝輙爛手淮南子紂為天子賦歛無度戮殺無止康梁沈湎宫中成市天下同心而苦之纒子紂煮熊蹯不熟而殺庖人太公金匱紂嘗以六月獵于西土發民逐禽民諫曰六月天務復施地務長養今盛夏逐禽而元元懸于野君踐一日之苗而民百日不食天子失道後必無福紂以為妖言而誅之帝王世紀紂剖比干妻以視其胎水經注老人晨將渡水而沈吟難濟紂問其故左右曰老者髓不實故晨寒也紂乃斮脛而視髓以西伯昌九侯一作鬼侯鄂侯為三公九侯有好女入之紂九侯女不熹滛紂怒殺之而醢九侯潛夫論昔紂好色九侯獻厥女紂大喜以為天下之麗莫若此妲己懼乃俯而泣曰君之年即耆邪何貌惡若此而謂之好也因白九侯之不道乃欲以此惑君王弗誅何以革後紂遂脯厥女而烹九侯自此之後天下有美女者皆重室晝閉唯恐紂之聞也春秋繁露紂殺梅伯以為醢刑鬼侯之女取其環鄂侯争之疆辨之疾并脯鄂侯西伯昌聞之竊嘆崇侯虎知之以告紂紂囚西伯羑里西伯之臣閎夭之徒求美女竒物善馬以獻紂紂乃赦西伯西伯出而獻洛西之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使得征伐為西伯淮南子散宜生以千金求得騶虞奚斯之乘元玉百工大貝百朋元豹黄熊青犴白虎文皮千合以獻于紂因費仲而通紂見而説之乃免其身殺牛而賜之文王歸乃為玉門築靈臺相女童擊鐘鼓以待紂之失也紂聞之曰西伯改道易行吾無憂矣乃為炮烙剖比干剔孕婦殺諫者文王乃遂其謀漢儒險論徃徃若此識之以表其謬而用費中為政費中善諛好利殷人弗親紂又用惡來惡來善毁讒諸侯以此益䟽史記史記西伯歸乃隂修徳行善諸候多叛紂而徃歸西伯西伯滋大紂由是稍失權重按此與前淮南之説皆後世權姦之術文王不爾也或以文王承暴君之虐不敢顯行善政隂布商恵于民説亦曲非史遷本意今削之王子比干諫弗聽商容賢者百姓愛之紂廢之史記此下序伐黎事以西伯為文王侯按前編黎者商畿内諸侯之國也西伯戡黎者武王也紂賜文王弓矢斧鉞使專征伐若崇若宻須率西諸侯也自闗河以東諸候非文王之所得討况畿内乎故諸儒皆以為武王也武王而謂之西伯何也傳曰武王伐紂曰西伯軍至洧水膠鬲曰西伯將安之然則武王之為西伯有自來矣蔡傳兩説並存今遵前編西伯既卒周武王伐黎紂臣祖伊聞之而咎周恐犇告紂誥見祖伊傳紂曰我生不有命在天乎祖伊反曰紂不可諫矣武王東伐至盟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐矣武王曰爾未知天命乃復歸紂愈滛亂不止㣲子數諌不聽遂去比干强諫紂紂怒曰吾聞聖人心有七竅剖比干觀其心箕子懼乃佯狂為奴紂又囚之楚辭注梅伯紂諸侯忠直而數諫紂紂怒殺之葅醢其身箕子見之被髪佯狂殷之太師少師乃持其祭樂器奔周周武王於是遂率諸侯伐紂紂亦發兵距之牧野甲子日紂兵敗紂走入登鹿臺衣其寳玉衣赴火而死周書紂取天智玉琰五環身以自焚周武王遂殺妲已釋箕子之囚封比干之墓表商容之閭封紂子武庚禄父以續殷祀令修行盤庚之政殷民大説於是周武王為天子而封殷後為諸侯屬周周武王崩武庚與管叔蔡叔作亂成王命周公誅之而立㣲子於宋以續殷後焉史記贊曰甚矣天道其若車輪乎紂踵桀轍而周乘殷軌以此始以此終也殷道中興粤有二宗然祥桑雊雉天若惕之使凶徳若獨夫受且不必告也尚史卷四
