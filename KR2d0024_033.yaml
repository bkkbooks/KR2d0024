body:
  text: 尚史卷三十三列傳十一鑲白旗漢軍李鍇撰魯諸臣傳下叔肹公孫嬰齊齊伯叔老子叔齊子叔弓子叔敬子叔輒叔鞅叔肹文公子宣公母弟也宣弒而非之與之財則曰我足矣織屨而食終身不食宣公之食穀梁宣公十七年卒子嬰齊為魯卿是為公孫嬰齊成公二年嬰齊及季孫行父臧孫許叔孫僑如會晉伐齊齊師敗于鞍六年嬰齊如晉晉命伐宋秋侵宋八年嬰齊如莒聘且自逆婦初嬰齊嫁其外妹于施孝叔惠公五世孫十一年晉郤犫來聘求婦于嬰齊嬰齊奪施氏婦以與之十六年公會諸侯伐鄭次于督揚不敢過鄭嬰齊使叔孫豹請逆于晉師為食于鄭郊師逆以至嬰齊四日不食以待之食使者而後食叔孫僑如譖季孫行父于晉晉人執行父于苕邱公還待于鄆使嬰齊請行父于晉郤犫曰茍去仲孫蔑而止季孫行父吾與子國親于公室對曰僑如之情于必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐亡而為讐治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求士燮謂欒書曰季孫于魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虗其請是棄善人也子其圗之乃許魯平赦行父僑如奔齊左傳嬰齊歸鮑國鮑文子也施孝叔臣謂之曰子何辭苦成叔即郤犫之邑欲信讓邪抑知其不可乎對曰吾聞之不厚其棟不能任重重莫如國棟莫如德夫苦成叔家欲任兩國而無大德其不存也亡無日矣譬之如疾余恐易焉苦成叔有三亡少德而多寵位下而欲上政無大功而欲大祿皆怨府也其君驕而多私勝敵而歸必立新家立新家不因民不能去舊因民非多怨民無所始為怨三府可謂多矣其身之不能定焉能豫人邑鮑國曰我信不若子若鮑氏有釁吾不圖矣今子圖逺以讓邑必常立矣國語十七年嬰齊卒于貍脈公羊嬰齊走之晉公會晉侯將執公嬰齊為公請公許之反為大夫歸於貍軫而卒無君命不敢卒大夫公至曰吾固許之反為大夫然後卒之初嬰齊夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒諡曰聲伯子叔老嗣為子叔氏是為子叔齊子襄公十六年叔老會伐許二十年叔老初聘于齊二十二年七月卒子叔弓嗣叔弓是為子叔敬子襄公三十年弓如宋葬宋共姬昭公元年季孫宿取鄆秋弓帥師疆鄆田二年弓聘于晉晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賔徹命于執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館羊舌肹曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有德夫子近德矣三年弓如滕葬滕成公五年夏莒牟夷以牟婁及防兹來奔秋七月莒人來討不設備弓敗諸蚡泉六年吳敗楚師弓如楚聘且弔敗八年晉虒祈宫成弓如晉賀九年公會楚子于陳十年弓及季孫意如仲孫貜帥師伐莒取郠十一年弓如宋葬宋平公南蒯季氏費邑宰以費叛十三年弓帥師圍費弗克敗十五年二月禘于武宫弓涖事籥入籥羽舞也而卒子二輒鞅輒字伯張昭公二十一年秋七月日有食之輒哭日食叔孫婼曰子叔將死非所哭也八月輒卒鞅嗣二十三年景王崩六月鞅如京師葬景王二十三年正月鞅卒左傳叔弓曽孫還還子青見氏族志公孫有山公孫有山是為有陘氏魯大夫哀公十三年公會晉侯及吳子于黃池吳申叔儀乞糧于公孫有山氏曰佩玉蕊兮余無所繫之旨酒一盛兮余與褐之父睨之對曰梁則無矣梁精美也粗則有之若登首山以呼曰庚癸乎則諾庚西方主榖癸北方主水也二十四年公如越得大子適郢與大子適郢相得也將妻公而多與之地公孫有山使告于季孫肥肥懼公因越討己使因大宰嚭而納賂焉乃止二十七年公欲以越伐魯而去三桓秋八月公如公孫有陘氏因孫於邾乃遂如越國人施公孫有山氏施施罪也左傳論曰易有之有夫婦然後有父子有父子然後有君臣然則夫婦者為人道之始乎始而亂之人禽溷矣是故日月貞明夫婦貞順聲伯外妹貞于施矣奪而移之郤其為溷也不亦甚乎夫嫁妹與辭邑順逆殊也辭順而效逆聲伯之戾也里革師存附里革魯大史克也文公十八年莒大子僕殺紀公以其寶來奔公以書命季孫行父曰夫莒大子不憚以吾故殺其君而以寶來其愛我甚矣為我與之邑今日必授無逆命矣里革遇之而更其書曰夫莒大子殺其君而竊其寶來不識窮固又求自邇為我流之于夷今日必通無逆命矣明日有司復命公詰之以里革對公執之曰違君命者女亦聞之乎對曰臣以死奮筆奚啻其聞之也臣聞之曰毁則者為賊掩賊者為臧竊寶者為軌用軌之財者為姦使君為臧姦者不可不去也臣違君命者亦不可不殺也公曰寡人實貪非子之罪也乃舍之公夏濫于泗淵濫漬也漬罟以取魚也里革斷其罟而棄之曰古者大寒降土蟄發水虞于是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也鳥獸孕水蟲成獸虞于是乎禁罝羅矠魚鱉以為夏稿助生阜也鳥獸成水蟲孕水虞于是乎禁罝䍡罝當作罜罜䍡小網也設穽鄂鄂作格所以誤獸者以實廟庖畜功用也且夫山不槎蘖澤不伐夭魚禁鯤鮞獸長麑䴠鳥翼鷇卵蟲舍蚳蝝蕃庶物也古之訓也今魚方别孕不教魚長又行網罟貪無蓻也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法使有司藏之使吾無忘諗師存樂師侍曰藏罟不如置里克于側之不忘也成公十八年晉人弒厲公邉人以告公曰臣殺其君誰之過也大夫莫對里革曰君之過也夫君人者其威大矣失威而至于殺其過多矣且夫君也者將牧民而正其邪者也若君縱私回而棄民事民旁有慝無由省之益邪多矣若以邪臨民陷而不振用善不肯専則不能使至于殄滅而莫之恤也將安用之桀奔南巢紂踣于京厲㳅古流字于彘幽滅于戲皆是術也夫君也者民之川澤也行而從之美惡皆君之由民何能為焉國語厚成叔瘠厚成叔名瘠魯孝公生惠伯革其後為厚氏世本瘠事襄公襄公十四年衛孫林父寧殖逐獻公公使瘠弔于衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私于執事曰有君不弔有臣不敏君不赦宥臣亦不師職增淫發泄其若之何衛人使大叔儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺瘠歸復命語臧孫紇曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎左傳其後有后木見氏族志閔馬父閔馬父字子馬魯大夫襄公二十三年季孫宿廢其子公彌而立悼子紇以公彌為馬正公彌愠閔馬父見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公彌然之昭公十八年秋葬曹平公魯使見周原伯魯周大夫與之語不説學歸以語閔馬父閔馬父曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可于是乎下陵上替能無亂乎夫學殖也不殖將落原氏其亡乎二十二年景王崩子朝謀立叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也左傳哀公八年齊閭邱明來盟子服何戒宰人曰陷而入于恭陷失過也如有失遏寧近于恭閔馬父笑而問之對曰笑吾子之大滿也昔正考父校商之名頌十二篇于周大師以那為首其輯之亂曰自古在昔先民有作溫恭朝夕執事有恪先聖王之傳恭猶不敢専稱曰自古古曰在昔昔曰先民今吾子之戒吏人曰陷而入于恭其滿之甚也周恭王能庇昭穆之闕而為恭楚恭王能知其過而為恭今吾子之教官僚曰陷而後恭道將何為國語榮駕鵝榮駕鵝名欒魯大夫聲伯之子韋昭注按公孫嬰齊諡曰聲伯其子曰叔老是為子叔齊子於襄公二十二年卒榮駕鵝亦曰聲伯子或是叔老兄弟或聲伯别是一人是為榮成伯襄公二十八年公如楚及漢楚康王卒公欲反叔仲帶叔孫豹皆以為不可榮駕鵝曰逺圖者忠也公遂行左傳二十九年公自楚反及方城季孫宿取卞使季冶魯大夫季氏族逆璽書以告曰卞人將叛臣討之既得之矣公未言榮駕鵝曰子股肱魯國社稷之事子實制之唯子所利何必卞卞有罪而子征之子之𨽻也又何謁焉公欲還出楚師以伐魯榮駕鵝曰不可君之于臣其威大矣不能令于國而恃諸侯諸侯其誰昵之若得楚師以伐魯魯既不違宿之取卞也必用命焉守必固矣若楚之克魯諸姫不獲窺焉而况君乎彼無亦置其同類以服東夷而大攘諸夏將天下是王而何德于君其豫君也若不克魯君以蠻夷伐之而又求入焉必不獲矣不如豫之宿之事君也不敢不悛醉而怒醒而喜庸何傷君其入也乃歸國語左傳公欲無入榮成伯賦式微乃歸定公元年昭公之喪至自乾侯季孫意如使役如闞公氏將溝焉公氏猶言公之墓宅欲溝絶其墓不使與先君同榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或耻之乃止意如又問于榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止左傳榮駕鵝卒諡曰成伯子家羈左師展附子家羈公羊羈作駒莊公之玄孫懿伯也臧昭伯郈昭伯及魯大夫多怨季孫意如公亥意如叔父與昭公子公為謀去之昭公以告臧孫臧孫以難告郈孫郈孫以可勸告子家羈羈曰讒人以君徼幸事若不克君受其命不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館于公公羊昭公將弒季氏告子家駒曰季氏為無道僭于公室久矣吾欲弒之何如子家駒曰諸侯僭于天子大夫僭于諸侯久矣昭公曰吾何僭矣哉子家駒曰設兩觀乘大路朱千玉戚以舞大夏八佾以舞大武此皆天子之禮也且夫牛馬維婁委己者也而柔焉季氏得民衆久矣君無多辱焉昭公不從其言終弒而敗焉注繫馬曰維繫牛曰婁季氏専賞罰已久民順從之猶牛馬之于委食己者也昭公二十五年九月公伐季氏入之意如登臺請以五乘亡弗許羈曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將蕰蕰積也將蓄積而生變也蕰蓄民將生心生心同求將合君必悔之弗聽已而叔孫氏孟氏救季氏伐公徒羈曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也遂行孫于齊齊侯唁公于野井齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜羈曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通外內以公命示羈羈曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通內外且欲去君二三子好亡而惡定焉可同也陷君于難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟叔孫婼從公于齊與公言羈命適公館者執之恐從者知叔孫謀公與婼言于幄內曰將安衆而納公公徒將殺婼伏諸道左師展魯大夫告公公使婼自鑄歸已而意如有異志公不果入左師展將以公乘馬而歸公徒執之二十七年仲孫蔑陽虎伐鄆鄆人將戰羈曰天命不惂久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼無為望也夫其死于此乎公使羈如晉公徒敗于且知冬公如齊齊侯請饗之羈曰朝夕立于其朝又何饗焉其飲酒也乃飲酒使宰獻而請安禮君不敵臣晏大夫使宰為主獻請安齊侯請自安不在坐比公于大夫也又公子憖之子曰重為齊侯夫人曰請使重見羈乃以君出二十八年公如晉將如乾侯羈曰有求於人而即其安人孰矜之其造于竟弗聽使請逆于晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安于甥舅其亦使逆君言自使齊逆君使公復于竟而後逆之二十九年公至自乾侯處于鄆齊使來唁公稱主君羈曰齊卑君矣君祗辱焉公如乾侯三十二年十二月公疾遍賜大夫大夫不受賜羈雙琥一環一璧輕服受之大夫皆受其賜公薨羈反賜于府人曰吾不敢逆君命也大夫皆反其賜定公元年叔孫不敢逆公之喪于乾侯意如曰子家子亟言于我未嘗不中吾志也吾欲與之從政子必止之且聽命焉羈不見不敢易幾而哭幾哭會也不欲見故哭不同會不敢請見羈羈辭曰羈未得見而從君以出君不命而薨羈不敢見不敢使告之曰公衍公為弟公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也冦而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤從公者皆自壞隤反左傳羈卒諡曰懿公儀休犁鉏公儀休魯博士也以髙第為魯相奉法循理無所變更百官自正使食祿者不得與下民爭利受大者不得取小客有遺休魚者休不受客曰聞君嗜魚遺君魚何故不受也休曰以嗜魚故不受也今為相能自給魚今受魚而免誰復給我魚者吾故不受也食茹而美拔其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農士女工安所讎其貨乎史記魯公薨左右請閉門休曰止池淵吾不稅蒙山吾不賦苛令吾不布吾已閉心矣何閉于門哉説苑韓非子作公孫儀孔叢子魯人有公儀僣者砥節礪行恬于榮利不事諸侯子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人參分魯國而與之一子思對曰如君言公儀子所以不至也君若飢渴待賢納用其謀雖蔬食水飲伋亦願在下風令徒以髙官厚祿釣餌君子無信用之意公儀子之智若魚鳥可也不然彼將終身不躡君之庭矣且臣不佞又不任為君􅋵竿下釣以蕩守節之士也準之孔叢子休蓋穆公相大史公不言也説苑楚成王使魯君為僕魯君曰我周之建國也今成王以我為僕可乎大夫皆不可公儀休曰不可不聽楚王身死國亡君之臣乃君之有也為民君也魯君遂為僕説誤成王不與穆公同時犁鉏者亦事穆公公使衆公子或官于晉蓋三晉也或官于荆犁鉏曰假人于越而救溺子越人雖善遊子必不生矣失火而取水于海海水雖多火必不滅矣逺不救近也今晉與荆雖強而齊近魯患其不救乎韓非子論曰大人事君義以直外仁以格內道也里革毅然改書斷罟不且具大人之量哉善乎師存之言藏罟不若側置革也昭公之難懿伯致愚綢繆匡救而卒不一納何邪君存志入殁則逃之懿之于昭可謂不二矣然微駕鵝襄公將先此而孫尾大之禍固不必自昭公始也卜楚邱卜楚邱者魯掌卜大夫公子友之將生也桓公使卜楚邱之父卜之曰男也其名曰友在公之右間于兩社周社亳社之間執政所在為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所乾君父離變為乾故曰同復于父及生有文在其手曰友遂以命之文公十八年齊侯將伐我戒師期而有疾公聞之卜曰尚無及期叔仲彭生令龜卜楚邱占之曰齊侯不及期非疾也君亦不聞令龜有咎二月公薨夏五月齊人弒懿公初叔孫豹之生也其父得臣以周易筮之遇明夷之謙以示卜楚邱曰是將行主先出奔而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為𨽻日入為僚哺時為僕日昳為臺自王已下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀得臣卿也豹當為卿故知為之祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗于人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終旦日正卿之位叔孫父子世為亞卿位不足以終盡卦體也左傳梓慎中須附梓慎魯大夫襄公二十八年春無氷梓慎曰今兹宋鄭其飢乎歲在星紀而淫于玄枵歲歲星也星紀在丑斗牛之次玄枵在子虗危之次此年歲當在星紀今已在玄枵淫行失次以有時災陰不堪陽蛇乘龍蛇玄武之宿虗危之星龍歲星木也歲失次出虗危下是為蛇乘龍龍宋鄭之星也歲星本位在東方東方房星為宋角亢為鄭故龍為宋鄭宋鄭必飢玄枵虗中也玄枵三宿虗星在其中枵耗名也土虗而民耗不飢何為明年宋鄭飢昭公七年公將如楚夢襄公祖祖祭道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服湫曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚十五年春將禘于武宫戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎三月癸酉禘叔弓涖事籥入而卒籥羽舞也十七年冬有星孛于大辰西及漢大辰房星尾也孛星出大辰之西光芒東及天漢申須魯大夫曰彗所以除舊布新也天事恆象今除于火火出必布焉今火尚伏火出乃布散為災諸侯其有火災乎梓慎曰往年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出于夏為三月于商為四月于周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虗也大展大火宋分野陳大皞之虗也大皞居陳大火所自出鄭祝融之虗也祝融髙辛氏之火正居鄭皆火房也星孛及漢漢水祥也衛顓頊之虗也故為帝邱其星為大水衛星營室營室水也水火之牡也水雄火雌其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月來年大火出見之月周五月也明年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫大庭氏古國名在魯城內魯于其處作庫以望之曰宋衛陳鄭也數日皆來告火二十年春二月己丑日南至梓慎望氛曰今兹宋有亂國幾亡三年而後弭蔡有大喪叔孫婼曰然則戴桓也戴族華氏桓族向氏汰侈無禮已甚亂所生也冬十月宋華亥向寧華定出奔陳十一月蔡侯卒二十一年秋七月壬午朔日有食之公問于梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水二十四年夏五月乙未朔日有食之梓慎曰將水叔孫婼曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫陽氣不克而莫然不同將積聚也秋八月大雩旱也左傳師已師已者亦魯大夫昭公二十五年有鸜鵒來巢師已曰異哉吾聞文武之世童謠有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與𥜗鸜鵒之巢逺哉遙遙稠父喪勞宋父以驕稠昭公名宋定公名鸜鵒鸜鵒往歌來哭童謠有是今鸜鵒來巢其將及乎左傳公為公果公賁公衍汪錡附公為公果公賁公衍皆昭公之子也公為是為務人禮記作禺人公為公衍之生也其母偕出將産出就外室公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為乃反為兄季公亥者季孫意如之庶叔父也公亥怨意如欲去季氏獻弓于公為與之出射于外而謀之公為告公果公賁果賁使侍人僚祖告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公亦不怒公為又使言公又執戈以懼之乃走又使言公曰非小人之所及也公果遂自言昭公二十五年九月公伐季氏不克孫于齊二十九年公在乾侯賜公衍羔裘使獻龍輔玉名于齊侯公衍遂以羔裘繼入之齊侯喜與之陽穀公私喜于得陽穀而思于魯乃曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為大子左傳哀公十一年齊師伐我戰于郎公為遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重重同童汪踦往皆死焉魯人欲勿殤重汪踦問于仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎記檀弓家臣傳匡句須匡句須者施孝叔惠公五世孫家臣齊鮑國去鮑氏而來為施孝叔臣施氏卜宰匡句須吉施氏之宰有百室之邑與匡句須邑使為宰匡句須以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉左傳杜泄杜泄者叔孫氏宰叔孫穆伯寵豎牛牛間其二子孟丙仲壬叔孫殺孟逐仲于齊及疾急命召仲牛許而不召且不食叔孫杜泄見告之飢渴授之戈對曰求之而至又何去焉杜預注言求食可得無為去牛設辭也愚謂求豎牛而至今何去乎憤辭也叔孫不食三日卒昭公使杜泄葬叔孫豎牛賂叔孫帶與南遺季氏家臣使惡杜泄于季孫而去之適季孫謀去中軍豎牛曰夫子固欲去之既毁以書使杜泄告于殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之杜泄將以路葬天子所賜路車且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿亞卿也以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命于朝而聘于王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬叔仲帶謂季孫曰帶受命于子叔孫曰葬鮮者自西門不以夀終者為鮮西門非魯朝正門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行左傳正常公肩假正常者季桓子之寵臣也季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可肥康子名季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告于君與大夫而立之今生矣男也敢告遂奔衛康子請退哀公使共劉魯大夫視之則或殺之矣乃討之召正常正常不反左傳又有公肩假者季康子之母死公輸若方小斂般請以機封之謂以機巧封之將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹碑形天子之制楹形諸侯之制般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎謂不得嘗巧于汝病乎噫弗果從記檀弓申豐公孫朝申豐者季氏屬大夫季武子無適子公彌長而愛悼子紇欲立之訪于申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止已而臧武仲為立之臧氏由是得罪昭公四年大雨雹季武子問于申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之春分之中奎星朝見東方其藏氷也深山窮谷固陰沍寒于是乎取之其出之也朝之祿位賔食喪祭于是乎用之其藏之也黑牡秬黍以享司寒黑牡黑牲秬黑黍司寒玄冥也其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉食肉之祿謂在朝治事就官食者大夫命婦喪浴用氷祭寒而藏之享司寒獻羔而啓之春分獻羔祭韭公始用之火出而畢賦自命夫命婦至于老疾無不受氷山人虞官取之縣人遂屬傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏陰春無凄風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺越散也雷不發而震雹之為災誰能禦之七月之卒章藏氷之道也二十三年我伐邾故晉人執叔孫昭子申豐以貨如晉叔孫不欲以貨免見之而不使出已而晉人歸叔孫季平子既逐昭公二十六年齊侯將納公命無受魯貨申豐從女賈亦季氏臣女音汝以貨適齊賂梁邱據據説止齊侯使公子鉏帥師從公伐魯公孫朝者孟氏成邑大夫謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告于齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩于齊齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆言恐使魯知成降齊偽伐之以壓衆心魯成備而後告曰不勝衆不能降也齊師遂無功公竟不得入左傳謝息公斂陽謝息者孟僖子家臣昭公七年僖子從公如楚晉人來治杞田季孫將以成與之成孟氏邑本杞田謝息為孟孫守不可曰人有言曰雖有挈瓶之知守不假器禮也夫子從君而守臣喪邑雖吾子亦有猜焉季孫曰君之在楚于晉罪也又不聽晉魯罪重矣晉師必至吾無以待之不如與之間晉而取諸杞吾與子桃成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞乃遷于桃晉人為杞取成又有公斂陽者字處父亦孟氏家臣為成宰定公七年齊國夏伐我陽虎御季桓子公斂陽御孟懿子將宵軍齊師齊師聞之墮伏而待之墮毁其軍而設伏公斂陽曰虎不圖禍而必死季氏臣苫夷曰虎陷二子于難不待有司余必殺女虎懼乃還不敗八年陽虎欲去三桓冬十月壬辰將享季氏于蒲圃而殺之戒都車都邑之兵車曰癸巳至公斂陽告孟孫曰季氏戒都車何故孟孫曰吾弗聞陽曰然則亂也必及于子先備諸與孟孫以壬辰為期及期事覺季桓子奔孟氏陽虎劫公與武叔叔孫州仇以伐孟氏陽帥成人自上東門入與陽氏戰于南門之內弗勝又戰于棘下陽氏敗陽請追之孟孫弗許陽虎入歡陽關以叛十二年仲由為季氏宰將墮三都于是叔孫氏墮郈季氏墮費將墮成陽謂孟孫曰墮成齊師必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克左傳論曰杜泄正常犯難守正有遺直之風焉詩曰剛亦不吐家臣之賤能禦剛矣而孺子之死正常適速之告而奔衛免身而已申豐徇主以私吠非其主者歟尚史卷三十三
