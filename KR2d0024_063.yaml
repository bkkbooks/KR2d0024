body:
  text: 尚史卷六十三列傳四十一鑲白旗漢軍李鍇撰吳諸臣傳屈狐庸屈狐庸楚巫臣之子也巫臣亡奔晉自晉使于吳置其子狐庸以為吳行人初事壽夢吳越春秋壽夢十七年以狐庸為相任以國政說誤壽夢薨厯事諸樊餘祭餘昧餘昧二年襄三十一年使狐庸聘于晉通吳晉之路趙武問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳即餘祭天似啓之何如對曰不立是二王之命也言諸樊餘祭天命當死非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立左傳伍員伍員字子胥楚大傅伍奢之少子也王僚五年昭二十年楚殺伍奢員遂亡聞大子建之在宋也往從之宋有華氏之亂乃與大子建俱奔鄭鄭人甚善之大子建適晉晉使大子建謀鄭鄭誅大子建員懼與建子勝俱奔吳到昭關昭關欲執之員與勝獨身步走幾不得脫韓非子子胥出走邊候得之子胥曰上索我者以我有美珠也今我已亡之我且曰子取吞之候因釋之追者在後至江江上有一漁父乘船知員急乃渡員員既渡解其劒曰此劒直百金以與父父曰楚國之法得伍員者賜粟五萬石爵執圭豈徒百金劒耶不受員未至吳而疾止中道乞食吕氏春秋伍員亡荆急求之登太行而望鄭曰蓋是國也地險而民多知其主俗主也不足與舉去鄭而之許見許公而問所之許公不應東南向而唾伍員載拜受賜曰知所之矣因如吳過于荆至江上見一丈人刺小船方將漁從而請丈人渡之絶江問其名族不肯告解其劍以與丈人曰此千金之劍也丈人不受曰荆國之法得伍員者爵執圭祿萬擔金千鎰昔者子胥過吾猶不取今何以子之千金劍為伍員過于吳使人求之不得每食必祝之曰江上丈人吳越春秋越絶書有漁父渡員自沈擊綿女子飯員投瀨之事說既謬悠文亦卑穢姑載吕說以廣異聞員至吳吳王僚方用事公子光為將乃因公子光以求見吳王史記吕氏春秋伍子胥欲見吳王而不得客有言之于王子光者見之而惡其貌辭之客請之王子光光曰其貌吾所甚惡也客以聞子胥子胥曰願令王子重帷而見其衣若手請因說之光許子胥說之半光舉帷搏其手而與之坐說畢光大說子胥以為有吳國者必光也退而耕于野吳越春秋員至吳被髮佯狂行乞于市吏善相者見之曰吾相人多矣未嘗見斯人也非異國之亡臣乎乃白王僚王僚見之怪其狀偉身長一丈腰十圍眉間一尺與語三日辭無復者王僚曰賢人也越絶書同而作闔廬誤員言伐楚之利于王僚公子光曰是宗為戮而欲反其讐不可從也員曰彼將有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕于鄙公子光遂因鱄設諸而弒王僚既即位以員為行人公羊伍子胥父誅乎楚挾弓而去以干闔廬闔廬曰士之甚勇之甚將為之興師而復讎于楚伍子胥復曰諸侯不為匹夫興師且臣聞之事君猶事父也虧君之義復父之讐臣不為也于是止楚伐蔡蔡請救于吳伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣于是興師而救蔡穀梁同吳越春秋楚平王卒員謂白公勝曰吾志不悉矣然楚國在吾何憂吳越春秋闔廬元年舉伍子胥為行人與謀國政子胥曰安君治民從近制逺者先立城郭設守備實倉廪治兵庫乃相土嘗水築大城陸門八象天八風水門八象地八聰築小城陸門三象天門地户龍角請干將鑄名劍二曰干將莫邪莫邪干將之妻也莫邪斷髮翦爪投于爐中金鐵刀濡遂以成劒陽曰干將隂曰莫邪陽作龜文隂作漫理干將匿其陽出其隂而獻之復命國中作鈎有殺其二子以血釁成二鉤獻于闔廬鉤師向鉤而呼二子之名曰吳鴻扈稽兩鉤俱飛著父胸越絶書吳王闔廬始得子胥以為上客曰聖人前知千嵗後覩萬世深問其國世得無衰極子胥曰難哉言乎邦其不長王其圗之臣始入邦伏見衰亡之證當霸吳厄㑹之際後王復空王曰何以言之子胥曰王食禽肉坐而待死佞諂之臣將至不久吳越為鄰同俗并土兩邦同城相亞門户憂在于斯必將為咎越有神山難與為鄰願王定之越絶書千里廬虛者闔廬以鑄干將劒闔廬三年昭三十年王問于員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚于是乎始病九年定四年吳伐楚五戰及郢遂入郢左傳韓非子闔廬攻郢戰三勝問子胥曰可以退乎子胥對曰溺人者一飲而止則無溺者以其不休也不如乘之以沈之說苑闔廬與荆人戰于柏舉大勝之至于郢郊五敗荆人闔廬之臣五人進諫曰深入逺報非王之利也王其返乎五人將鍥頭闔廬未之應頭墜于馬前闔廬懼召子胥而問焉子胥曰五臣者懼也夫五敗之人者其懼甚矣王姑少進遂入郢南至江北至方城方三千里皆入于吳壞宗廟徙陳器撻平王之墓穀梁傳淮南子五戰入郢燒高府之粟破九龍之鐘鞭平王之墓舍昭王之宫新書伍子胥曰父死而不死非父之子也死而非補則過計也與吾死而不一明不若舉天地以成名于是紆身而適闔閭治味以求親闔閭甚安之說其謀任吳國之政民保命而不失嵗時熟而不凶五官公而不私上下調而無尤天下服而御四境靜而無虞然後忿心發怒出凶言隂必死提邦以伐楚五戰而五勝伏尸數十萬郢之門執高兵傷五臟之實毁十龍之鐘撻平王之墓昭王失國而奔妻生虜而入吳按二說亦言鞭墓未嘗鞭尸也史記掘平王之墓出其尸鞭之三百吳越春秋出其尸鞭之三百左足踐腹右足抉其目誚之曰誰使汝用讒諛之口殺我父兄豈不寃哉員雖狠焉至是吳越春秋語乖而體卑不足信史遷亦誤明年秦救楚敗吳師于沂夫槩亡歸自立為王闔廬乃釋楚而歸吳越春秋漁父者子歌蘆中人還吳兵越絶書略同說僻陋不足載十九年定十四年吳伐越句踐禦之闔廬傷將指薨子夫差即位吳越春秋吳王為大子波聘齊女齊女死大子亦病死闔廬謀可立者夫差告伍胥曰欲立大子非我而誰計在君耳有頃謀立大子子胥曰臣聞祀廢于絶後興于有嗣王欲立大子莫大乎波之子夫差闔廬曰夫差愚而不仁子胥曰夫差信以愛人端于守節敦于禮義父死子代經有明文乃立夫差為大子史記子胥之死也仰天嘆曰我令若父霸自若未立時諸公子爭立我以死爭之于先王幾不得立若既得立欲分吳國子我即其事也然以夫差為太子波之子則為闔廬之孫特異諸說說苑吳王欲從民飲酒子胥諫曰不可昔白龍下清泠之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形對曰我下清泠之淵化為魚天帝曰魚固人之所射也豫且何罪夫龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣夫差二年哀元年伐越敗之于夫椒遂入越句踐以甲楯五千保于㑹稽使大夫種行成夫差將許之員曰不可臣聞之樹德莫若滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之惎毒也能戒備其毒害也澆使椒求之逃奔有虞為之庖正以除其害虞思于是妻之以二姚而邑諸綸有田一成有衆一旅方十里為成五百人為旅能布其德而兆其謀以收夏衆撫其官職使女艾諜澆少康臣使季杼誘豷李杼少康子豷澆弟也遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大于少康或將豐之不亦難乎句踐能親而務施施不失人親不棄勞與我同壤而世為仇讐于是乎克而弗取將又存之違天而長冦讐後雖悔之不可食已食消已止也姬之衰也日可俟也介在蠻夷而長冦讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎國語越使求成申胥諫曰不可許也夫越非實忠心好吳也又非懾畏吾甲兵之彊大夫種勇而善謀將還玩吳國于股掌之上以得其志夫固知君王之蓋威以好盛也故婉約其辭以從逸王志使淫樂于諸夏之國以自傷也使吾甲兵鈍弊民人離落而日以憔悴然後安受吾燼夫越王好信以愛民四方歸之年榖時熟日長炎及吾猶可以戰也為虺弗摧為蛇將若何王不聽許之成越絶書句踐與吳戰于浙江之上石買為將斬殺無罪士衆恐懼子胥變為奇謀或北或南夜舉火擊鼓晝陳詐兵越師潰墜還報其王王殺石買謝其師號聲聞吳吳王恐懼子胥私喜曰越軍敗矣胥聞之狐之將殺噆脣吸齒今越敗矣君王安意越易兼也使人入問之越請降子胥不聽越棲于㑹稽之山吳退而圍之越日行成于吳吳引兵而去句踐將降待詔入吳其入辭曰亡臣孤句踐故將士衆入為臣虜民可得使地可得有吳王許之子胥大怒目若夜光聲若哮虎曰越未戰而服天以賜吳其逆天乎臣唯君王急剬之吳王不聼越絶書吳王夢井贏溢子胥曰井者人所飲溢者食有餘越南火吳北水水制火王何疑乎越絶書吳伐越道逢大風車敗馬失騎士墜匹馬啼臯十二年哀十一年吳將伐齊句踐率其衆以朝焉王及列士皆有饋賂吳人皆喜唯員懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲于我夫其柔服求濟其欲也不如早從事焉得志于齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于兹邑是商所以興也今君易之將以求大不亦難乎弗聽國語吳王既許越成將伐齊申胥諫曰昔天以越賜吳而王弗受夫天命有反今越王句踐恐懼而改其謀舍其愆輕其征賦施民所善去民所惡身自約也裕其衆庶其民殷衆以多甲兵譬越之在吳也猶人之有腹心之疾也夫越王之不忘敗吳于其心也戚然服士以司吾間今王非越是圖而齊魯以為憂夫齊魯譬諸疾疥癬也豈能涉江淮而與我爭此地哉將必越實有吳土王盍亦鑑于人無鑑于水國語今王既變鯀禹之功而高高下下以罷民于姑蘇天奪吾食都鄙荐饑今王將狠天而伐齊夫吳民離矣體有所傾譬如羣獸然一個負矢將百羣皆奔王其無方收也越人必來襲我王雖悔之其猶有及乎王弗聽吳越春秋子胥諫王王怒暮歸舉衣出宫羣臣曰天無霖雨宫中無泥露相君舉衣行高何為子胥曰吾以越諫王王心迷不聽宫中生草棘霧露沾我衣羣臣聞之莫不悲傷今本無吕氏春秋越大饑請食于吳吳王將與之子胥進曰不可與也夫吳之于越仇讐敵戰之國也非吳喪越越必喪吳若燕秦齊晉豈能踰五湖九江越十七厄以有吳哉今輸之粟是長讎而養仇也不若勿與而攻之此先王之所以霸吳王曰吾聞之義不攻服仁者食饑服而攻之非義饑而不食非仁不仁不義雖得十越吾不為也遂與之食三年吳饑請食于越越王攻之夫差為擒越絶書越請糴于吳申胥諫曰不可越之請糴也將以此卜君王不省而救之是越之福也今狐雉之戲也狐體卑而雉懼之夫獸蟲尚以詐相就而况人乎吳王曰句踐有急寡人與之其德章而未靡句踐其敢反我乎申胥曰狼子野心仇讎之人不可親也夫鼠忘壁壁不忘鼠今越不忘吳矣使于齊屬其子于鮑氏為王孫氏反役王聞之賜之屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也左傳國語吳王還自伐齊乃訊于申胥曰大夫老不自安恬逸而處以念惡出則罪吾衆撓亂百度以妖孽吳國今天降衷于吳齊師受服孤豈敢自多先王之鐘鼓實式靈之敢告于大夫申胥釋劒而對曰昔吾先王世有輔弼之臣以能遂疑計惡以不陷于大難今王播棄黎老而孩童焉比謀曰余令而不違夫不違乃違也夫不違亡之之階也夫天之所棄必驟近其小喜而逺其大憂王若不得志于齊而以覺寤王心吳國猶世吾先君之得之也必有以取之其亡之也亦有以棄之用能援持盈以沒而驟救傾以時今王無以取之而天祿亟至是吳命之短也員不忍稱疾辟易以見王之親為越禽也員請先死將死曰懸吾目東門以見越之入也遂自殺王愠曰孤不使大夫見也乃取尸盛鴟夷而投之江史記子胥仰天嘆曰嗟乎讒臣嚭為亂矣王乃反誅我我令若父霸自若未立時諸公子爭立我以死爭之于先王若既得立欲分吳國半子我我顧不敢望也今若聽諛臣以殺長者越絶書太宰嚭之交逢同見吳王曰今日往見申胥申胥以被離坐而謀慙然類欲害王王殺之為乎可王興兵伐齊申胥必諫王無聽而伐齊必大克乃可圖之于是吳王伐齊請申胥謀對曰越在我猶心腹有積聚欲釋齊以越為憂王不聽興師伐齊大克還以申胥為不忠賜劍殺申胥髠被離申胥且死曰昔者桀殺關龍逢紂殺王子比干今吳殺臣參桀紂而顯吳邦之亡也越絶書吳王將殺子胥使逢同徵之胥見逢同知為吳王來也泄言曰王不親輔弼之臣而親衆豕之言是吾命短也高置吾頭必見越入吳也捐我深江則亦已矣王使捐于大江口乃有遺響發憤馳騰氣若奔馬威凌萬物論衡夫差殺子胥煮之于鑊乃以鴟夷囊投之于江子胥恚恨驅水為濤以溺殺人吳越春秋略同吳越春秋夫差帥羣臣出國東祀于胥江水濵曰昔不聽相國之言令逺投江海今本無按此似子胥因投于江與諸說異又曰抉吾眼懸吾東門以觀越之入滅吳也乃自剄死王聞之大怒乃取員尸盛以鴟夷革浮之江中吳人憐之為立祠于江上因命曰胥山史記越絶書由鍾窮隆山者古赤松子所取赤石脂也子胥死民思祭之雜家有伍子胥八篇兵技巧十篇漢書越絶書闔廬見子胥敢問船軍之備對曰船名大翼小翼突冒樓船橋船今船軍之教比陵軍之法乃可用之大翼者當陵軍之重車小翼者當陵軍之輕車突冒者當陵軍之衝車樓船者當陵軍之行樓車橋船者當陵軍之輕足驃騎北堂書鈔引今本無又越絶載子胥相氣取敵大數類風角書不具録鱄設諸要離附鱄設諸史記作専諸堂邑人也伍貟之亡楚而入吳也知鱄設諸之能吳越春秋伍員亡楚如吳遇專諸于塗專諸方與人鬬將就敵其怒有萬人之氣其妻一呼即還子胥怪而問其故專諸曰夫屈一人之下必伸萬人之上子胥相其貌碓顙深目虎膺熊背戾于從難知其勇士隂結之欲以為用員既見吳王僚知公子光將有內志乃進鱄設諸于公子光光既得鱄設諸善客待之史記楚平王死王僚欲因楚喪伐之使公子掩餘公子燭庸帥師圍潛使公子札聘于上國及楚師救潛吳師不能退公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之吳越春秋專諸曰欲殺人君必前求其所好王何好光曰好味曰何味曰嗜魚之炙專諸乃去從太湖學炙魚三月得其味鱄設諸曰王可弒也母老子弱是無若我何光曰我爾身也遂伏甲子堀室而享王王使甲坐于道及其門門階户席皆王親也夾之以鈹羞者獻體改服于門外執羞者坐行而入執鈹者夾承之及體以相授也光僞足疾入于堀室鱄設諸置劍于魚中以進抽劍刺王鈹交于胸遂弒王光以其子為卿左傳吳越春秋要離者不知何邑人闔廬既殺王僚憂其子慶忌之在鄰國謀于伍員貟曰臣之所厚其人者細人也願從于謀王曰敵有萬人之力豈細人之所能謀乎員曰其細人之謀事而有萬人之力也王曰為何誰曰名要離臣嘗見辱壯士椒邱欣也王曰奈何曰椒邱欣者東海上人為齊使于吳過淮津欲飲馬津吏曰水有神害馬君可勿飲也欣曰壯士所當何神敢干使從者飲馬神果取馬馬沒欣大怒袒裼持劍入水求神决戰連日乃出眇其一目遂之吳㑹于友人之喪欣恃其勇辭不遜有陵人之氣要離與之對坐乃挫欣曰吾聞勇士之鬬也與日戰不移表與神鬼戰不旋踵與人戰不達聲生往死還不受其辱今子與神鬬亡馬失御又受眇病形殘名勇勇士所恥而猶徽色于我哉椒邱欣怒暝往攻要離要離至舍誡其妻曰我辱壯士椒邱欣餘恨蔚恚暝必來慎無閉門至夜欣果往其門不閉堂不關室不守放髮僵卧欣乃手劍而捽要離曰子有當死之過三子知之乎辱我于大家之衆一歸不關閉二卧不守御三子有三死之過欲無得怨要離曰子有三不肖之愧子知之乎吾辱子于千人之衆子無敢報一入門不咳登堂無聲二拔劍捽頭乃敢大言三子有三不肖而威我豈不鄙哉于是椒邱欣投劍而歎曰吾之勇人莫敢眥占者離乃加吾之上臣聞要離若斯誠以聞矣王曰願承宴而待焉員乃見要離要離曰臣國東千里之人也臣無力迎風則僵負風則伏王有命敢不盡力王心非之良久不言要離進曰王患慶忌乎臣能殺之王曰慶忌骨騰肉飛拊膝數百里吾嘗追之于江駟馬不及射之暗接矢不可中子之力不如也要離曰王有意焉臣能殺之臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣矣要離乃詐得罪出奔吳王取其妻子焚棄于市要離遂如衛求見慶忌慶忌信之後三月揀士卒伐吳將渡江要離力微坐于上風因風勢以矛鈎其冠順風而刺慶忌忌顧而揮之三捽其頭于水中乃加于膝上嘻勇士也乃敢加兵于我左右欲殺之慶忌曰豈可一日殺天下勇士二人哉令還吳以旌其忠慶忌死要離渡江至江陵愍然不行曰殺妻子以事君非仁也為新君而殺故君子非義也貪生棄行非義也人有三惡何面目以視天下士遂投身于江未絶從者出之要離曰吾寧能不死乎乃自斷手足伏劍而死吕氏春秋韓詩外傳略同按吳有公子慶忌嘗驟諫夫差國人殺之蓋非王僚之子且闔閭謀弒時専諸曰王可殺也母老子弱是無要離殺慶忌之事矣太史公傳刺客而無要離有所見夫論曰員志報楚欲假手句吳以復父讎于是進專諸而成吳亂不得以臣主律之也嗟夫當其亡也飲恨泣血夙夜西鄉决于一逞所甘心也乃平卒昭立天去其疾非其狠志奮迅誰能入之洎乎末塗口舌殺身精誠不難于動天地而不能悟近主匹夫不難于覆萬乘而坐困于讒賊悲哉吳之嚭猶楚之費也泄庸申叔儀泄庸吳大夫也初楚為蔡使疆于江汝之間蔡不可請遷于吳夫差二年哀二年泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以說哭而遷墓蔡遂遷于州來申叔儀亦吳大夫也舊識魯公孫有山氏夫差十四年哀十三年黃池之㑹也叔儀乞糧于有山氏曰佩玉蕊兮余無所繫之㫖酒一盛兮余與褐之父睨之言服飾雖備獨無以繫酒雖在器寒賤之人但得視不得飲盛器也褐寒賤也明吳王不恤下也對曰粱則無矣粗則有之若登首山以呼曰庚癸乎則諾軍中不得公言故為私隱庚西方主榖癸北方主水也左傳叔孫輒公山不狃王犯附叔孫輒字子張公山不狃字子泄故皆魯人亡奔吳事夫差魯入邾囚邾子邾請救于我我將伐魯王問于叔孫輒輒對曰魯有名而無情伐之必得志焉退而告公山不狃不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我輒病之王問于不狃對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為夫差九年哀八年吳伐魯不狃率故道險從武城初武城人或有因于吳竟田焉拘鄫人之漚菅者曰何故使吾水滋滋濁也及吳師至拘者道之以伐武城克之王犯亦吳大夫嘗為武城宰魯淡臺子羽之父好焉故魯人懼及我盟而還左傳王孫雄王孫雄史記作公孫雄吳大夫也夫差㑹晉于黃池也越敗太子友襲吳吳晉爭長未成邊遽至遽傳也以越亂告王懼合大夫而謀無㑹而歸與㑹而先晉孰利王孫雄曰危事不齒雄敢先對二者莫利無㑹而歸越聞章矣民懼而走逺無正就齊宋徐夷曰吳既敗矣將夾溝而㢋我傍擊曰㢋我無生命矣㑹而先晉晉既執諸侯之柄以臨我將成其志以見天子吾須之不能去之不忍必㑹而先之王乃步就雄曰先之圗之將若何雄曰王其無疑吾道路悠逺必無有二命焉可以濟事雄進顧揖諸大夫曰危事不可以為安死事不可以為生則無為貴知矣民之畏死而欲富貴以長沒也與我同雖然彼近其國有遷我絶慮無遷言晉有轉退我道逺無二志也彼豈能與我行此危事也哉事君勇謀于此用之今夕必挑戰以廣民心請王厲士以奮其朋勢勸之以高位重畜備刑戮以辱其不厲者令各輕其死彼將不戰而先我我既執諸侯之柄以嵗之不獲也無有誅焉而先罷之諸侯必說既而皆入其地王安挺志挺寬也一日惕一日留惕疾留徐也以安步王志必設以此民也封于江淮之間乃能至于吳王許諾昏戒令秣馬食士夜中服兵擐甲為帶甲三萬以勢攻雞鳴乃定既陳去晉軍一里王親秉桴就鳴鼓三軍皆譁扣以振旅譁扣歡呼也晉師大駭不出令董褐請事約吳去王稱公吳許諾乃㑹先吳既㑹越聞愈章乃命雄先與勇獲大夫帥徒師以為過賔于宋遂得至吳又七年越圍吳王使雄行成于越曰昔者上天降禍于吳得罪于㑹稽今君王其圗不榖不榖請復㑹稽之和越王弗忍欲許之范蠡不可雄曰子范子先人有言曰無助天為虐助天為虐者不祥今吾稻蟹不遺種子將助天為虐不忌其不祥乎雄請反辭于王越遂滅吳國語王孫茍被離王孫茍吳大夫也為司馬吳再伐齊茍為左校敗齊師于艾陵吳越春秋既退于黃池使苟告勞于周曰昔者楚人為不道不承共王事以逺我一二兄弟之國吾先君闔廬不貰不忍被甲帶劒挺鈹搢鐸以與楚昭王毒逐于中原柏舉天舍其𠂻楚師敗績王去其國王謂昭王遂至于郢王總其百執事韋昭注王謂闔廬賈逵注王往也告天子不宜稱王以奉其社稷之祭其父子昆弟不相能夫槩王作亂是以復歸于吳今齊侯任不鑒于楚又不承共王命以逺我一二兄弟之國夫差不貰不忍被甲帶劒挺鈹搢鐸遵汶伐博䔲笠相望于艾陵天舍其衷齊師還夫差豈敢自多文武實舍其衷不稔于嵗言伐齊之明年不至榖執而復出師余沿江沂淮闕溝深水出于商魯之間以徹于兄弟之國夫差克有成事敢使茍告于下執事王答曰茍伯父命女來明紹享余一人若余嘉之昔周室逢天之降禍遭民之不祥余心豈忘憂恤不唯下土之不康靖今伯父曰戮力同德伯父若能然余一人兼受而介福伯父多厯年以沒元身伯父秉德已侈大哉國語被離者亦吳大夫也晉伯嚭之奔吳也闔廬以為大夫與謀國事被離承宴問伍員曰何見而信嚭貟曰吾之怨與嚭同被離曰君之言外也豈有內意以决疑乎吾觀嚭之為人鷹視虎步不可親也貟不然其言及伯嚭譖員于夫差夫差讓員員歸謂被離曰吾貫弓接矢于鄭楚之界越渡江淮自致于斯前王聽吾計破楚見凌之讐欲報前王之恩故至此吾非自惜禍將及女被離曰未諫不聽自殺何益何如亡乎員曰亡臣安往王聞之乃賜屬鏤之劒員死王謂被離嘗與員論寡人之短乃髠被離而刑之王孫茍聞之不朝王召問之茍曰臣恐耳王曰子以我殺子胥為重乎非聽宰嚭以殺子胥胥圗寡人也茍曰臣聞人君者必有敢諫之臣在上位者必有敢言之交夫子胥先王之老臣也不忠不信不得為前王臣王悷然悔欲殺宰嚭茍曰不可殺嚭是二子胥也吳越春秋同吳越春秋作王孫駱而無王孫雄春秋與雄又有公孫聖占夢事荒誕不經故不采入孫武孫武者齊人也以兵法見于吳王闔廬吳越春秋孫子名武吳人也善為兵法辟隱深居伍胥知之一旦與吳王論兵七薦孫子吳王召孫子問以兵法每陳一篇不知口之稱善闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可可試以婦人乎對曰可于是許之出宫中美女得百八十人武分為二隊以王之寵姬二人各為隊長皆令持㦸令之曰汝知而心與左右手背乎婦人曰知之武曰前則視心左視左手右視右手後即視背婦人曰諾約束既布乃設鈇鉞即三令五申之于是鼓之右婦人大笑武曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑武曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長王從臺上觀見且斬愛姬大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也武曰臣既已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長于是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲于是武使使報王曰兵既整齊王可試下觀之唯王所欲用之雖赴水火猶可也王曰將軍罷休就舍寡人不願下觀武曰王徒好其言不能用其實于是闔廬知武能用兵卒以為將西破強楚入郢北威齊晉顯名諸侯武與有力焉史記孫子兵法八十二篇圖九卷漢書越絶書吳縣巫門外大冡孫武冡也去縣十里論曰黃池之㑹火勢內熸墨色外見雄能消羣疑出臲卼龍卷蛇退匪智無以蓋匪勇無以濟語曰亂絲不可以手治斬之為貴也暨乎宰嚭內蝕雄無所明斬絲之利將中縮乎孫子挾術為兵家之先然敵楚敵秦匪異人任而詘信異形借曰善戰非無敵也吳諸公子傳公子札公子札是為季札王壽夢之少子也初封延陵曰延陵季子又封州來又曰延州來季子夀夢子四人札最少而賢夀夢欲立之史記夀夢薨諸樊既除喪將立札札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也札雖不材願附于子臧以無失節固立之舍其室而耕乃舍之左傳諸樊薨不立子而立弟餘祭欲以次及札史記吳越春秋諸樊驕恣輕慢鬼神仰天求死將死命弟餘祭曰必以國及札乃封札于延陵號曰延陵季子越絶書毗陵故為延陵季子所居餘祭四年襄二十九年使札聘于魯見叔孫豹說之謂豹曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀于周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺風乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不擕遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加于此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊說晏嬰謂之曰子速納邑與政無邑無政乃免于難齊國之政將有所歸未獲所歸難未歇也聘于鄭見國僑如舊相識與之縞帶僑獻紵衣焉謂僑曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛說蘧瑗史茍史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿于戚聞鐘聲焉曰異哉吾聞之也辨而不德辨猶爭也必加于戮夫子獲罪于君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君猶在殯而可以樂乎孫林父聞之終身不聽琴瑟適晉說趙武韓起魏舒曰晉國其萃于三族乎說羊舌肹將行謂肹曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免于難札未返閽弒餘祭弟餘昧即位餘昧十七年薨子僚即位王僚十二年昭二十七年使札聘于上國遂聘于晉以觀諸侯夏四月公子光弒王僚自立是為闔廬札至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待左傳公羊闔廬使専諸刺僚而致國乎季子季子不受曰爾殺吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國札初適齊其反也其長子死葬于嬴博之間孔子曰延陵季子吳之習于禮者也往而觀其葬焉其坎深不至于泉其斂以時服既葬而封廣輪掩坎其高可隱也既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之于禮也其合矣乎記檀弓韓詩外傳季子逰于齊見遺金呼牧者取之牧者曰子居之高視之下貌之君子而言之野也吾有君不君有反不友當暑衣裘君疑取金者乎季子請問姓字牧者曰子皮相之士何足語姓字哉遂去季子立而望之不見乃止說苑季子逰于晋入其境曰暴哉國乎入其都曰力屈哉國乎立其朝曰亂哉國乎從者曰夫子入晋未久也何其名之不疑也季子曰然吾入其境田荒而不修雜增崇髙是以知其國之暴也入其都新室惡而故室美新墻卑而故墻高是以知其民力之屈也立其朝君能視而不下問臣善伐而不上諫是以知其國之亂也新序季子將聘晋帶寶劍以過徐君徐君不言而色欲之季子為有工國之使未獻也然心許之矣致使于晋仄則徐君死于楚于是脫劍致之嗣君從者止之季子曰吾心許之矣今死而不進是欺心也愛劍僞心亷者不為也遂致嗣君嗣君曰先君無命孤不敢受劍于是季子以劍帶徐君墓樹而去徐人歌之曰延陵季子兮不忘故脫千金之劍兮帶邱墓越絶書昆陵上湖中冡者延陵季子冡故名延陵墟夫差十一年哀十年楚公子結伐陳延州來季子救陳謂結曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還左傳或謂夀夢于襄十二年卒至今七十七嵗夀夢卒季子已能讓國年當十五六至今蓋九十餘其說大謬古者六十不與戎政季子年九十而且帥師以從力役乎且衛獻公之殺寧喜也公子鱄託于木門不鄉衛國而坐盟其妻子曰有履衛地食衛粟者昧雉彼視夫殺其臣與弒君有間矣為季子者縱不能討亦當如公羊所云終身不入吳國安有越世而復為其子即戎以效唐且之游說哉此謂延州來季子者或是其子孫非公子札姑附識于此公子蹶由公子黨附公子蹶由系未詳或羣公子也按左傳昭五年楚子以驛至于羅汭吳子使其弟蹶由犒師當是時所謂吳子者即夷昧也夷昧之弟非季札之兄即其弟也諸樊欲兄弟相傳使蹶由為季札兄弟昧卒當立及蹶由僚不得立使為季札弟季札最少故曰季子季札不得又有弟或夷昧從弟耳餘昧七年昭五年楚靈王以諸侯伐我我敗薳啓疆于鵲岸靈王以馹至于羅汭餘昧使蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵于敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟于羅汭觀兵于坻箕之山無功而還以蹶由歸左傳韓非子作沮衛蹶融公子黨亦羣公子諸樊時戰于庸浦亦為楚所獲見世家公子掩餘公子燭庸公子掩餘公子燭庸並餘昧之子王僚母弟也王僚八年昭二十三年州來之役吳為三軍中軍從王闔廬帥右掩餘帥左敗楚師于雞父十二年昭二十七年吳伐楚使掩餘燭庸帥師圍潜闔廬曰此時也弗可失也遂弒王僚掩餘奔徐燭庸奔鍾吾闔廬三年昭三十年闔廬使徐人執掩餘使鍾吾人執燭庸掩餘燭庸奔楚楚昭王大封而定其徙使居養且城之取于城父與胡田以與之將以害吳也闔廬怒執鍾吾子滅徐左傳太子諸樊大子終纍子山附大子諸樊案吳子遏號諸樊不容王僚之子復名諸樊恐誤然周俗嘗取祖號以為氏此以為名或循故事也王僚之子也楚故大子建之母在郥召吳人而啓之王僚八年昭二十三年大子諸樊入郥取楚夫人與其寶器以歸大子終纍闔廬之子夫差之兄也闔廬十一年定六年大子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕左傳故終纍蓋前闔廬死夫差得嗣又有子山者亦闔廬之子也王子友王子地附王孫彌庸夀於姚大子友夫差之子也夫差十四年哀十三年夫差㑹晉黃池越句踐伐我為二隧疇無餘謳陽自南方先及郊大子友王子地王孫彌庸夀於姚三子並吳大夫自泓上觀之彌庸見姑蔑之旗曰吾父之旗也彌庸父為越所獲故姑蔑人得其旌旗姑蔑越也不可以見讎而弗殺也大子友曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之戰彌庸獲疇無餘地獲謳陽句踐至王子地守復戰大敗我師獲大子友王孫彌庸夀於姚遂入吳左傳吳越春秋吳王復伐齊令于國中曰敢諫者死大子友知子胥忠而不用宰嚭佞而專政欲切言之恐罹尤也乃懷丸持彈從後園來衣夾履濡王怪而問之大子以秋蜩螳蜋黃雀對語同國策莊辛文說苑作吳伐荆少孺子諫語亦同說苑石益謂孫伯曰吳將亡矣子亦知之乎孫伯曰吾何為不知石益曰然則子何以不諫孫伯曰昔桀罪諫者紂焚聖人袁氏之婦絡而失其紀其妾告之怒棄之夫亡者豈知其過哉公子慶忌公子慶忌亦羣公子也王僚之子亦曰慶忌蓋緣此而誤詳後傳夫差時驟諫曰不改必亡弗聽出居于艾吳邑遂適楚聞越將伐吳二十一年哀二十年冬請歸平越遂歸欲除不忠者以說于越國人殺之左傳論曰延州來季子賢公子也史遷引仲尼之言曰其仁心慕義無窮何其閎覽博物君子也蓋嘗深豫之矣雖然有疑衷焉王夀夢知季子賢欲傳國季子諸樊餘祭兄弟相次欲以及之可謂善承父志矣季子終已不立何邪大伯仲雍逃之荆蠻季歷不讓重大命也詩人咏之曰因心則友則友其兄是未嘗以攘兄而擠之為疑也季子有間于季厯乎且王僚不義盍訓以讓闔廬為逆宜正厥罪力有不勝告諸天王訴之伯主可也而先後無聞焉抑又何邪間關歷聘籌事若素父母宗國詒謀闕如將黯近而燭逺抑秦越視之邪雖然春秋二百四十二年之間父子兄弟篡弒攘奪者踵相接乃季子矯之雖達節有孫夫王季而曹臧之義良無後夫季子賢公子也蹶由執楚正言禦暴卑抗適中而無撓焉亦可尚也吳叛臣傳夫槩夫槩者闔廬之弟也闔廬九年定四年吳伐楚與楚夾漢楚令尹囊瓦濟漢而陳自小别至于大别三載囊瓦欲奔冬十一月二師陳于柏舉夫槩晨請于闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊囊瓦之卒囊瓦之卒奔楚師亂我師大敗之囊瓦奔鄭我從楚師及清發水名將擊之夫槩曰困獸猶鬬况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢遂入郢以班處宫以尊卑班次處楚之宮室子山處令尹之宫子山闔廬子夫槩欲攻之懼而去之夫槩入之明年秦救楚自稷㑹楚師大敗夫槩于沂稷沂並楚地秋九月夫槩歸自立為吳王與闔廬戰敗奔楚為堂溪氏左傳吳嬖臣傳伯嚭伯嚭字子餘晉伯州犂之孫也楚殺郤宛伯氏之族出伯嚭奔吳吳越春秋闔廬問子胥曰州犂何罪曰伯州犂楚之左尹號曰郤宛是以州犂郤宛為一人誤為吳大宰以謀楚越絶書嚭為人覽聞辨見目達耳通因其時自納于吳言伐楚之利楚自昭王即位無嵗不有吳師卒以破楚入郢及夫差即位嚭最有寵夫差二年哀元年王敗越于夫椒入越越使大夫種因飾美女八納之嚭嚭以行成伍員諫弗聽卒及越平八年哀七年嚭從王㑹魯侯于鄫徵百牢于魯九年哀八年邾子無道使嚭討之囚諸樓臺十三年哀十二年王㑹魯侯于槖皋使嚭請尋盟尋鄫盟魯辭乃不尋盟又徵㑹于衛初衛殺吳行人且姚及㑹于鄖吳人藩衛侯之舍將執衛侯魯以束錦賂嚭十端為束嚭乃舍衛侯十四年哀十三年王㑹盟于黃池謂魯不共執子服何何說嚭嚭言于王曰無損于魯而祗為名不如歸之乃歸何王欲伐宋嚭曰可勝也而弗能居也乃歸方黃池之㑹也越入吳及歸越及我平及越滅吳嚭遂事句踐後魯哀公如越得大子適郢與大子相得也將妻公而多與之地季孫肥懼使因嚭而納賂焉乃止左傳越絶書越滅吳殺宰嚭逢同與其妻子吳越春秋越葬吳王于秦餘杭山卑猶宰嚭亦葬卑猶旁吳越春秋三臺者嚭妻子死所也史記因之皆誤論曰脂韋挈楹緣柔善入貪人之常也若嚭者叛楚覆楚事吳亡吳怨既有酬德亦不報亡鳥顧舊林嚭實自有肺腸哉大雅曰釐爾女士從以孫子傷哉伯宗而有是裔也尚史卷六十三
