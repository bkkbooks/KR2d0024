body:
  text: 尚史卷六十九列傳四十七鑲白旗漢軍李鍇撰趙諸臣傳公仲連大戊午附觸讋公仲連者烈侯之相國也烈侯好音謂連曰寡人有愛可以貴之乎連曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝連曰諾不與居一月烈侯從代來問歌者田連曰求未有可者有頃烈侯復問連終不與乃稱疾不朝番吾君自代來謂連曰君實好善而未知所持今公仲相趙于今四年亦有進士乎連曰未也番吾君曰牛畜荀欣徐越皆可連乃進三人及朝烈侯復問歌者田何如連曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功德所與無不充君説烈侯使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜連衣二襲又有大戊午者成侯三年以為相成侯薨事肅侯肅侯十六年遊大陵出于鹿門大戊午扣馬諫曰耕事方急一日不作百日不食肅侯下車謝之史記世家觸讋史記作觸龍且曰觸龍言願見太后分一字為二誤趙之左師也孝成王元年秦伐我拔三城王新立太后用事惠文后也秦急攻之趙氏求救于齊齊曰必以長安君為質長安君惠文后少子兵乃出太后不肯大臣強諫太后明謂左右有復言令長安君為質者老婦必唾其面觸讋願見太后盛氣而揖之入而徐趨至而自謝曰老臣病足曽不能疾走不得見久矣竊自恕恐太后玉體之有所郤也故願望見太后曰老婦恃輦而行曰日食飲得無衰乎曰恃粥耳曰老臣今者殊不欲食乃自強步日三四里少益嗜食和于身曰老婦不能太后不和之色少解觸讋曰老臣賤息舒祺最少不肖而臣衰竊愛憐之願令補黑衣之數尸祝之服所謂袨服也以衛王宫沒死以聞太后曰敬諾年幾何矣對曰十五嵗矣雖少願及未填溝壑而託之太后曰丈夫亦愛憐其少子乎對曰甚于婦人太后曰婦人異甚對曰老臣竊以為媼之愛燕后太后女賢于長安君曰君過矣不若長安君之甚觸讋曰父母之愛子則為之計深逺媼之送燕后也持其踵為之泣念悲其逺也亦哀之矣已行非弗思也祭祀必祝之祝曰必勿使反豈非計久長有子孫相繼為王也哉太后曰然觸讋曰今三世以前至于趙之為趙趙王之子孫侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及身逺者及其子孫豈人主之子孫則必不善哉位尊而無功奉厚而無勞而挾重器多也今媼尊長安之位而封以膏腴之地多豫之重器而不及今令有功于國一旦山陵崩長安君何以自託于趙老臣以媼為長安君之計短也故以為其愛不若燕后太后曰諾恣君之所使之于是為長安君約車百乘質于齊齊兵乃出國䇿論曰書曰啓乃心沃朕心賢者自侍而歌者自詘沃之之善者也雖然有本焉君實好善之謂也不然申屠彭咸豈出公仲下哉觸讋説后順以適之緩入而疾徵焉能無得乎是故明主可以理奪而婦人可以情投也肥義公子成李兑趙文附趙造趙燕肥義者趙之貴臣公子成是為奉陽君國䇿作奉陽君史記作安平君肅侯之弟李兑趙之司冦也並事肅侯肅侯薨武靈王少及聼政先問肥義加其秩國三老年八十月致其禮史記世家武靈王十九年王平晝間居肥義侍坐曰王慮世事之變權甲兵之用念簡襄之迹計胡狄之利王曰嗣立不忘先德君之道也錯質務明主之長臣之論也今吾欲繼襄主之業啓胡翟之鄉而卒世不見也夫有髙世之功者必負遺俗之纍有獨知之慮者必被庶人之恐今吾將胡服騎射以教百姓而世必議寡人矣義曰臣聞之疑事無功疑行無名今王即定負遺俗之慮殆母顧天下之議矣夫論至德者不和于俗成大功者不謀于衆昔舜舞有苗禹袒入祼國非以養欲而樂志也欲以論德而要功也愚者暗于成事智者見于未萌王其遂行之王曰寡人非疑胡服也吾恐天下笑之狂夫之樂智者哀焉愚者之笑賢者戚焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山我必有之王遂胡服使王孫緤告公子成曰寡人胡服且將以朝亦欲叔之服之也家聼于親國聼于君古今之公行也子不反親臣不逆主先王之通誼也今寡人作教易服而叔不服吾恐天下議之也夫制國有常利民為本從政有經令行為上故明德在于論賤行政在于信貴今胡服之義非以養欲而樂志也事有所出功有所立事成功立然後德可見也今寡人恐叔逆從政之經以輔公叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故寡人願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也不佞寢疾不能趨走是以不先進王命之臣敢竭其愚忠臣聞之中國者聰明睿智之所居也萬物財貨之所聚也聖賢之所教也仁義之所施也詩書禮樂之所用也異敏技藝之所試也逺方之所觀赴也蠻夷之所義行也今王釋此而襲逺方之服變古之教易古之道逆人之心畔學者離中國臣願大王圖之使者報王王曰吾固聞叔之病也即之公叔成家自請之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順宜因事而制禮所以利民而厚國也被髮文身錯臂左衽甌越之民也黑齒雕題鯷冠秫縫大吳之國也禮服不同其便一也鄉異而用變事異而禮易是故聖人茍可以利其民不一其用果可以便其事不同其禮儒者一師而禮異中國同俗而教離况山谷之便乎故去就之變智者不能一逺近之服聖賢不能同窮鄉多異曲學多辨不知而不疑異于已而不非者公于求善也今叔之所言者俗也吾之所言者所以制俗也吾國東有河薄洛之水與齊中山同之而無舟楫之用自常山以至代上黨東有燕東胡之境西有樓煩秦韓之邊而無騎射之備故寡人且聚舟楫之用求水居之民以守河薄洛之水變服騎射以備燕參胡樓煩秦韓之邊且昔者簡主不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智之所明也先時中山負齊之強兵侵掠吾地係纍吾民引水圍鄗非社稷之神靈鄗幾不守先王忿之其怨未敢報也今騎射之服近可以備上黨之形逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名而忘國事之耻非寡人之所望也公子成再拜稽首曰臣愚不達于王之義敢道世俗之聞今欲繼簡襄之意以順先王之志臣敢不聼令再拜乃賜胡服趙文進諫曰農夫勞力而君子養焉政之經也愚者陳意而智者論焉教之道也臣無隱中君無蔽言國之祿也臣雖愚願竭其忠夫當世輔俗古之道也衣服有常禮之制也循法無愆民之職也三者先聖之所以教今君釋此而襲逺方之俗變古之教易古之道故臣願王圖之王曰三代不同服而王五霸不同教而政智者作教而愚者制焉賢者議禮不肖者拘焉夫制于服之民不足與論心拘于俗之衆不足與致意故勢與俗化而禮與變俱聖人之道也承教而動循法無私民之職也知學之人能與聞遷達禮之變能與時化故為己者不待人制今者不法古子其釋之趙造諫曰隱忠不竭姦之屬也以私誣國賤之類也有此兩者臣下之大罪也臣雖愚願盡其忠臣聞之聖人不易民而教智者不變俗而動因民而教者不勞而成功據俗而動者慮徑而易見也今王易初不循俗胡服不顧世非所以教民而成禮也且服竒者志淫俗僻者亂民襲竒僻之服近蠻夷之行非所以教民而成禮也且循法無過修禮無邪願王圖之王曰古今不同俗何古之法帝王不相襲何禮之循虙羲神農教而不誅黃帝堯舜誅而不怒及至三王觀時制法因事制禮法度制令各順其宜衣服器械各便其用故理世不一其道便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒而志淫是鄒魯無竒行也俗僻而民易是吳越無俊民也是以聖人利身之謂服便事之謂教進退之謂節衣服之謂制所以齊常民非所以論賢者也故聖與俗流賢與變俱諺曰以書為御者不盡馬之情以古制今者不達事之變故循法之功不足以髙世法古之學不足以制今子其勿反也趙燕後胡服王令讓之曰事主之行不逆上以自伐不立私以為君寡人胡服子獨弗服逆主莫大焉以從政為纍以逆主為髙行私莫大焉寡人恐親犯刑戮之罪以明有司之法趙燕再拜稽首曰臣失令過期更不用侵辱教言已宜服刑反不刑而教之更猶反侵辱刑也王之惠也臣敬循衣服以待令日國䇿遂攻中山攘地北至代西至雲中九原二十七年立子何為王是為惠文王肥義為相國傅武王靈王自號為主父惠文王三年封長子章為代安陽君使田不禮相章李兑謂肥義曰公子章強壯而志驕黨衆而欲大殆有私乎田不禮之為人也忍殺而驕二人相得必有謀隂賊起夫小人有欲輕慮淺謀徒見其利而不顧其害同類相推俱入禍門以吾觀之必不久矣子任重而勢大亂之所始禍之所集也子必先患子奚不稱疾母出傳政于公子成母為怨府母為禍梯義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以歿而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉變負之臣不容于刑且夫貞臣也難至而節見忠臣也纍至而行明子則有賜而忠我矣雖然吾不敢失也兑曰諾子勉之吾見子已今年耳涕泣而出兑數見公子成以備田不禮之事異日肥義謂信期即髙信信音申曰公子與田不禮甚可憂也其于義也聲善而實惡此為人也不子不臣吾聞之姦臣在朝國之殘也讒臣在中主之蠧也此人貪而欲大內得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國吾憂之夜而忘寐盜賊出入不可不備自今有召王者必見吾面我將以身當之信期曰善哉吾得聞此也四年安陽君章來朝主父及王遊沙邱異宫章與田不禮作亂詐以主父令召王義先入殺之信期即與章戰史記世家作與王戰誤當是與公子章戰也公子成與李兑自國至起四邑兵入距難殺章及田不禮滅其黨賊而定王室公子成為相號安平君李兑為司冦公子章之敗往走主父主父聞之成兑因圍主父宫公子章死成兑謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父三月餘主父死是時王少成兑專政史記世家十三年齊援趙以伐宋秦王怒屬怨于趙李兑約五國以攻秦無功留天下之兵于成臯而隂講于秦國策趙文趙造趙燕蓋皆趙之公族也周紹牛贊周紹史記作祒亦事武靈王武靈王立紹為傅曰寡人始行縣過畨吾當子為子之時踐石以上者踐石謂能騎乘者禮洗馬石注乘馬石也皆道子之孝故寡人問子以璧遺子以酒食而求見子子謁病而辭寡人以子之智慮為辨足以道人危足以持難忠可以寫意信可以逺期諺云服難以勇治亂以智事之計也立傅以行教少以學義之經也寡人欲子胡服以傅王子紹曰王失論矣非賤臣所敢任也王曰選子莫若父論臣莫若君君寡人也紹曰立傅之道六智慮不躁達于變身行寬惠達于禮威嚴不足易于位重利不足變其心恭于教而不快快謂縱逸和于下而不危六者傅之才而臣無一焉隱中不謁臣之罪也傅命僕官傅附同僕辱也以煩有司吏之耻也王請更論王曰知此六者所以使子寡人以王子為子任欲子厚愛之無所見醜御道之以行義勿令溺苦于學事君者順其意不逆其志事先者明其髙不倍其孤故有臣可命國之祿也子能行是所以事寡人者畢矣書云去邪勿疑任賢勿二寡人與子不用人矣遂賜紹胡服衣冠具帶黃金師比未詳淮南子武靈王具帶􅀈翿而朝注􅀈翿讀曰私鈚以傅王子國䇿世史記家在二十五年牛贊史記作翦趙人亦事武靈王王破原陽以為騎邑贊進諫曰國有固籍兵有常經變籍則亂失經則弱且習其兵者輕其敵便其用者易其難今民便用而王變之是損君而弱國也故利不百者不變俗功不什者不易器今王破卒散兵以奉騎射臣恐其攻獲之利不如所失之費也王曰古今易利逺近易用隂陽不同道四時不一宜故賢人觀時而不觀于時制兵而不制于兵子知官府之籍不知器械之利知甲兵之用不知隂陽之宜故兵不當于用何兵之不可易教不便于事何俗之不可變昔者先君襄主與代交地城境封之名曰無窮之門所以詔後而期逺也今重甲循兵不可以踰險仁義道德不可以來朝吾聞信不棄功智不遺時今子以官府之籍亂寡人之事非子所知贊再拜稽首曰臣敢不聼令王遂胡服率騎入胡出于遺遺之門踰九限之固絶五徑之險至胡中辟地千里國䇿二十一年攻中山使贊將車騎趙希并將胡代趙與之陘合軍曲陽攻取丹邱華陽鴟之塞史記世家論曰智者獨知明者先見武靈胡服以招騎射一變車乘之制駭俗反古宜來諸臣之爭也而肥義獨與武靈合卒建功蓋變法不變禮易器不易教緣地制宜因時達變亦權宜之計也乃廷議無間而私愛遂之子章之難綢繆無聞蹈節荀息何邪若夫惠文既壯不申桃園之討豈成兑前死抑有戍申之好與亷頗藺相如亷頗者趙之良將也惠文王十六年頗為趙將伐齊大破之取陽晉索隱陽晉衛地後屬齊一本作晉陽晉陽在太原非是史記世家作昔陽昔陽在并州樂平縣東亦非齊地也拜為上卿以勇氣聞于諸侯十九年秦王使使者告王欲與王為好會于西河外澠池王畏秦欲毋行頗與藺相如計曰王不行示趙弱且怯也王遂行相如從頗送至境與王訣曰王行度道里會遇之禮畢還不過三十日三十日不還則請立太子為王以絶秦望王許之遂與秦王會澠池而還是嵗頗東攻齊破其一軍二十年頗將攻齊史記二十三年秦攻趙藺離石祁拔之趙請內焦黎牛狐之城以易藺離石祁于秦既而背秦不豫秦王大怒令衛胡易伐趙攻閼與趙奢救之魏以鋭師居安邑以挾秦秦敗于閼與反攻魏幾頗救幾大敗秦師國䇿昌鮑彪注幾魏將史記世家二十三年樓將攻魏幾不能取十二月亷頗將攻幾取之本傳亷頗東攻齊破其一軍居三年復伐齊幾拔之徐廣曰齊世家及年表無伐齊幾拔之之事疑幾是邑名或屬齊或屬魏有按史記蓋緣國䇿誤為二説耳然後此六年乃敗秦閼與之事亦誤二十四年頗攻魏之防陵一作房子安陽拔之孝成王七年秦與趙距長平使頗將攻秦秦數敗趙軍頗免趙括代將秦殺括降卒四十餘萬皆坑之十五年燕用栗腹之謀曰趙壯者盡于長平其孤未壯舉兵擊趙趙使頗將大破燕軍于鄗殺栗腹遂圍燕燕割五城請和乃聼之趙以尉文封頗為信平君為假相國亷頗之免長平歸也失執之時故客盡去及復用為將客又復至頗曰客退矣客曰吁君何見之晚也夫天下以執道交君有執我則從君無執則去此固其理也有何怨乎十八年延陵鈞率師從頗助魏攻燕二十一年頗伐魏之繁陽拔之孝成王薨悼襄王即位使樂乘代頗頗怒攻樂乘乘走頗遂奔魏之大梁頗居魏久之魏不能信用趙數困于秦思復用頗頗亦思復用于趙王使使者視頗尚可用否頗之仇郭開多與使者金令毁之使者既見頗頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰亷將軍雖老尚善飯然與臣坐頃之三遺矢矣王以為老遂不召楚聞頗在魏隂使人迎之頗一為楚將無功曰我思用趙人頗卒死于夀春史記北墓在壽春縣四里藺相如者趙人也為趙宦者令繆賢舍人惠文王時得楚和氏璧秦昭王聞之使人遺王書願以十五城請易璧王與亷頗諸大臣謀欲豫秦秦城恐不可得徒見欺欲勿豫即患秦兵之來計未定求人可使報秦者未得繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王會境上燕王私握臣手曰願結交以此知之故欲往相如謂臣曰夫趙強而燕弱而君幸于趙王故燕王欲結于君今君乃亡趙走燕燕畏趙其執必不敢留君而束君歸趙矣君不如肉袒伏斧質請罪則幸得脫矣臣從其計大王亦幸赦臣竊以為其人勇士有智謀宜可使于是王召見問相如曰秦王以十五城請易寡人之璧可豫不相如曰秦強而趙弱不可不許王曰取吾璧不豫我城奈何相如曰秦以城求璧而趙不許曲在趙趙豫璧而秦不豫趙城曲在秦均之二策寧許以負秦曲王曰誰可使者相如曰王必無人臣願奉璧往使城入趙而璧留秦城不入臣請完璧歸趙王于是遂遣相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王秦王大喜傳以示美人及左右左右皆呼萬嵗相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髮上衝冠謂秦王曰大王欲得璧使人發書至趙王趙王悉召羣臣議皆曰秦貪負其強以空言求璧償城恐不可得議不欲豫秦璧臣以為布衣之交尚不相欺况大國乎且以一璧之故逆強秦之歡不可于是趙王乃齋戒五日使臣奉璧拜送書于庭何者嚴大國之威以修敬也今臣至大王見臣列觀禮節甚倨得璧傳之美人以戲弄臣臣觀大王無意償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎于柱矣相如持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖指從此以往十五都與趙相如度秦王特以詐佯為豫趙城實不可得乃謂秦王曰和氏璧天下所共傳寶也趙王恐不敢不獻趙王送璧時齋戒五日今大王亦宜齋戒五日設九賔于庭臣乃敢上璧秦王度之終不可強奪遂許齋五日舍相如廣成傳舍相如度秦王雖齋決負約不償城乃使其從者衣褐懷其璧從徑道亡歸璧于趙秦王齋五日後乃設九賔禮于廷引趙使者藺相如相如至謂秦王曰秦自繆公以來二十餘君未嘗有堅明約束者也臣誠恐見欺于王而負趙故令人持璧歸間至趙矣且秦強而趙弱大王遣一介之使至趙趙立奉璧來今以秦之強而先割十五都豫趙趙豈敢留璧而得罪于大王乎臣知欺大王之罪當誅臣請就湯钁唯大王與羣臣熟計議之秦王與羣臣相視而嘻左右或欲引相如去秦王因曰今殺相如終不能得璧也而絶秦趙之歡不如因而厚遇之使歸趙趙王豈以一璧之故欺秦耶卒廷見相如畢禮而歸之相如既歸趙王以為賢大夫使不辱于諸侯拜相如為上大夫秦亦不以城豫趙趙亦不終豫秦璧其後秦伐趙拔石城明年復攻趙殺二萬人秦王使使者告趙王欲與王為好會于西河外澠池趙王畏秦欲母行亷頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從遂與秦王會澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年月日秦王與趙王會飲令趙王鼓瑟藺相如前曰趙王竊聞秦王善為秦聲請奉盆缶秦王以相娛樂秦王怒不許于是相如前進缶因跪請秦王秦王不肯擊缶相如曰五步之內相如請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡于是秦王不懌為一擊缶相如顧召趙御史書曰某年月日秦王為趙王擊缶秦之羣臣曰請以趙十五城為秦王夀藺相如亦曰請以秦之咸陽為趙王夀秦王竟酒終不能加勝于趙趙亦盛設兵以待秦秦不敢動既罷歸國以相如功大拜為上卿位在亷頗之右亷頗曰我為趙將有攻城野戰之大功而藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與會相如每朝時常稱病不欲與亷頗爭列已而相如出望見亷頗相如引車避匿于是舍人相與諫曰臣所以去親戚而事君者徒慕君之髙義也今君與亷頗同列亷君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之况于將軍乎臣等不肖請辭去藺相如固止之曰公之視亷將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏亷將軍哉顧吾念之強秦之所以不敢加兵于趙者徒以吾兩人在也今兩虎共鬬其勢不俱生吾所以為此者以先國家之急而後私讐也亷頗聞之肉袒負荆因賔客至藺相如門謝罪曰鄙賤之人不知將軍寬之至此也卒相與歡為刎頸之交史記趙奢李牧奢子括許厯附趙奢者趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺平原君用事者九人平原君怒將殺奢奢因説曰君于趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國強國強則趙固而君為貴戚豈輕于天下耶平原君以為賢言之于王王用之治國賦國賦大平民富而府庫實秦伐韓軍于閼與王召亷頗而問曰可救否對曰道逺險狹難救又召樂乘而問焉樂乘對如亷頗言又召問趙奢奢對曰其道逺險狹譬之猶兩鼠鬬于穴中將勇者勝王乃令趙奢將救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓譟勒兵武安屋瓦盡振軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益增壘秦間來入趙奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許厯請以軍事諫趙奢曰內之許厯曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗趙奢曰請受令許厯曰請就鈇質之誅趙奢曰胥後令欲戰許厯復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦兵後至爭山不得上趙奢縱兵擊之大破秦軍秦軍解而走遂解閼與之圍而歸趙惠文王賜奢號為馬服君以許厯為國尉趙奢于是與亷頗藺相如同位史記燕封宋人榮蚠髙陽君使將而攻趙王割濟東三城合盧髙唐平原陵地城市邑五十七命以與齊以求安平君而將之安平君田單也又號平都君奢謂平原君曰國奚無人甚哉君致安平君而將之而割濟東三城合城市邑五十七以與齊此夫子與敵國戰覆軍殺將之所取割地于敵國者也今君以此與齊求安平君而將之國奚無人甚哉且君奚不將奢也奢嘗抵罪居燕燕以奢為上谷守燕之通谷要塞奢習知之百日之內天下之兵未聚奢已舉燕矣平原君曰僕己言之僕主僕主幸已聼僕也將軍無言已奢曰君所以求安平君者以齊之于燕也茹肝涉血之仇耶于奢也不然使安平君愚固不能當榮蚠使安平君智又不肯與燕人戰此兩者安平君必處一焉安平君以趙之強為趙強則齊不復霸矣今得強趙之兵以杜燕曠日持久令士大夫餘子之力盡于溝壘車甲羽毛裂敝府庫倉廩虛兩國交以習之乃引其兵而歸夫盡兩國之兵無明此者矣不聼軍懸釡而炊得燕三城城大無過百雉者果如奢之言三十年王相平都君田單單問奢曰吾非不説將軍之兵法也所不服者用衆用衆使民不得耕作糧食挽賃不可給也此坐而自破之道也單聞之帝王之兵用不過三萬而天下服矣今將軍必負十萬二十萬之衆乃用之此單之所不服也奢曰君非徒不達于兵又不明其時勢夫吳干之劒肉試斷牛馬金試截盤匜薄之柱而擊之則折為三質之石而擊之則碎為百今以三萬之衆應強國之兵是薄柱擊石之謂也且夫吳干之劒材難無脊之厚而鋒不入無脾之薄而刃不斷脾近刃處無鈎竿鐔蒙須之便鈎劒頭環竿柄也鐔珥鼻也蒙須疑為劒繩猶蒯緱也操其刃而刺則未入而手斷君無十餘二十萬之衆而為此鈎竿鐔蒙須之便而徒以三萬行于天下君焉能乎且古者四海之內分為萬國城無過三百丈人無過三千家而以集兵三萬距此奚難哉今取古之為萬國者分以為戰國七不能具數十萬之兵曠日持久數嵗此下有缺文即君之齊已齊以二十萬之衆攻荆五年乃罷趙以二十萬之衆攻中山五年乃歸今千丈之城萬家之邑相望也而索以三萬之衆圍城不存其一角而野戰不足用也君將以此何之田單喟然曰單不至也國䇿奢死孝成王七年秦與趙兵相距長平時藺相如病篤趙使亷頗將攻秦秦數敗趙軍趙軍固壁不戰秦數挑戰亷頗不肯趙王信秦之間秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代亷頗藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王不聼遂將之趙括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括即已若必將之破趙軍者必括也及括將行其母上書言于王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以豫軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金帛歸藏于家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣王曰母置之吾已決矣括母因曰王終遣之即有如不稱妾得無隨坐乎王許諾趙括既代亷頗悉更約束易置軍吏秦將白起聞之縱竒兵佯敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍餓趙括出鋭卒自搏戰秦軍射殺趙括括軍敗數十萬之衆遂降秦秦悉坑之趙前後所亡凡四十五萬明年秦兵遂圍邯鄲嵗餘幾不得脫賴楚魏諸侯來救乃得解邯鄲之圍趙王亦以括母先言竟不誅也史記李牧者趙之北邊良將也常居代雁門備胸奴以便宜署吏市租皆輸入幕府為士卒費日擊數牛饗士習射騎謹𤇺火多間諜厚遇戰士為約曰胸奴即入盜急入收保有敢捕虜者斬胸奴每入烽火謹輒入收保不敢戰如是數嵗亦不亡失然胸奴以李牧為怯雖趙邊兵亦以為吾將怯趙王讓李牧李牧如故趙王怒召之使他人代將嵗餘胸奴每來出戰出戰數不利失亡多邊不得田畜復請李牧牧杜門不出固稱疾趙王乃復強起使將兵牧曰王必用臣臣如前乃敢奉令王許之李牧至如故約胸奴數嵗無所得終不為怯邊士日得賞賜而不用皆願一戰于是乃具選車得千三百乘選騎得萬三千匹百金之士五萬人彀者十萬人悉勒習戰大縱畜牧人民滿野胸奴小入佯北不勝以數千人委之單于聞之大率衆來入李牧多為竒陳張左右翼擊之大破殺胸奴十餘萬騎滅襜襤破東胡降林胡單于奔走其後十餘嵗胸奴不敢近趙邊城趙悼襄王元年亷頗既亡入魏趙使李牧攻燕拔武遂方城史記世家在二年居二年龎暖破燕軍殺劇辛後七年秦破趙殺將扈輒于武遂城斬首十萬趙乃以李牧為大將軍擊秦軍于宜安大破秦軍走秦將桓齮封李牧為武安君居三年秦攻番吾李牧擊破秦軍南距韓魏趙王還七年秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙王寵臣郭開金為反間言李牧司馬尚欲反趙王乃使趙蔥及齊將顔聚代李牧李牧不受命趙使人微捕得李牧斬之廢司馬尚後三月王翦因急擊趙大破殺趙蔥虜趙王遷及其將顔聚遂滅趙史記國策幽王遷七年秦下甲而攻趙趙使李牧禦之有韓倉者以曲合于王韓倉惡李牧王令人代牧牧至使韓倉數之曰將軍戰勝王觴將軍將軍為夀于前而捍匕首當死牧曰繓病絇身大臂短不能及地起居不敬恐懼死罪于前故使工人為木材以接手上若不信請以出示出之袖以示韓倉狀如振梱纒之以布願公入明之韓倉曰受命于王賜將軍死不赦臣不敢言李牧北面再拜賜死縮劒將自誅乃曰人臣不得自殺宫中過司馬門趨甚疾出誃門右舉劒將自誅臂短不能及銜劒徵之于柱以自刺牧死五月趙亡按此與史記異牧死誠寃或未至此也論曰奔踶之馬致千里觀相如之為繆賢計與馬服責平原千里之勢也雖然微二子舍人田吏寧能自致哉當其時豈遂無其比倫乙乙無所見則亦已爾詩曰知子之好之雜佩以報之繆賢賢矣哉而報此好也頗牧良將善用兵功績著見而不免死亡之誅易曰開國承家小人勿用嗟乎郭開在中寧能免乎尚史卷六十九
