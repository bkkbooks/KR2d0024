body:
  text: 尚史卷十六世家九鑲白旗漢軍李鍇撰楚世家始成王元年終秦始皇二十四年凡八百九十三年傳四十一世鬻熊熊麗熊狂楚之先祖出自帝顓頊髙陽史記世家髙陽者黃帝之孫昌意之子詳帝紀髙陽生稱稱生卷章卷章生重黎重黎為帝嚳髙辛居火正甚有功能光融天下帝嚳命曰祝融共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳回為重黎後復居火正為祝融吳回生陸終陸終生子六人世家曰坼剖而産譙周古史考廢而不論殊是長曰昆吾二曰參胡三曰彭祖四曰會人五曰曹姓六曰季連芈姓楚其後也昆吾氏夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之末世滅彭祖氏季連生附沮附沮生穴熊其後中微或在中國或在蠻夷弗能紀其世鬻熊季連之苗裔也鬻熊事文王蚤卒見諸子傳其子曰熊麗熊麗生熊狂熊狂生熊繹史記世家熊繹熊艾熊䵣熊勝熊楊熊繹楚始封之君也當周成王之時舉文武勤勞之後嗣而封熊繹于楚蠻封以子男之田姓芉氏居丹陽楚子熊繹與魯公伯禽衛康叔子牟晉侯燮齊大公子吕伋俱事成王熊繹生熊艾熊艾生熊䵣熊䵣生熊勝熊勝以弟熊楊為後鄒誕本楊作錫又作煬熊楊生熊渠史記世家熊渠熊翔熊摯附熊延熊勇熊嚴熊霜仲雪附熊徇熊咢熊渠當周夷王之時王室微諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸楊越至于鄂熊渠生子三人熊渠曰我蠻夷也不與中國之號諡乃立其長子康為句亶王系本康作庸亶作袒中子紅為鄂王一本作褻紅褻音贄非是少子執疵為越章王系本無執字越作就皆在江上楚蠻之地及周厲王之時暴虐熊渠畏其伐楚亦去其王後為熊母康母康蚤死熊渠卒史記世家子熊翔即位卒長子摯有疾少子熊延即位古史考宋均樂緯注熊渠嫡嗣曰熊摯有惡疾不得為後别居于夔為楚附庸後王命曰夔子也按史記熊渠子三人又曰母康蚤死熊渠卒子熊摯紅立摯紅卒其弟弒而代立曰熊延所謂母康或即長子康摯紅或即中子紅而熊延者豈即少子執疵歟又曰弒而代立所弒為誰復不可知所敘不甚詳晰今姑從譙説熊延生熊勇熊勇六年而周人作亂攻厲王厲王出奔彘熊勇十年卒弟熊嚴為後熊嚴十年卒有子四人長子伯霜中子仲雪次子叔堪少子季徇熊嚴卒長子伯霜即位熊霜元年周宣王初立熊霜六年卒三弟爭立仲雪死叔堪亡避難于濮而少弟季徇即位是為熊徇熊徇二十二年卒子熊咢即位熊咢九年卒子熊儀即位史記世家熊儀若敖熊坎霄敖熊眴蚡冒熊儀是為若敖若敖元年周宣王三十八年也若敖二十年幽王為犬戎所弒周東徙二十七年若敖卒子熊坎即位是為霄敖霄敖六年卒子熊眴即位是為蚡冒蚡冒十七年卒其子即位史記世家武王十九年入春秋武王名熊通蚡冒之弟也蚡冒卒通弒其子而代立是為楚武王史記世家武王十九年魯隱公即位二十一年隱三年周平王崩桓王立三十五年桓六年我侵隨國名使薳章求成三十七年桓八年武王合諸侯于沈鹿黃隨不會黃亦國名使薳章讓黃王伐隨隨及我平乃盟而還左傳是年楚自立為武王始開濮地而有之史記世家世家楚伐隨曰我蠻夷也欲觀中國之政請王室尊吾號隨為之請王室不聽熊通怒曰吾先鬻熊文王之師也蚤終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王三十八年桓九年我圍鄧鄾鄧邑敗鄧師鄾潰四十年桓十一年我將盟二軫二國名鄖人將與隨絞州蓼絞州蓼三國名伐我師我敗諸蒲騷及二軫盟四十一年桓十二年伐絞大敗之為城下之盟而還伐絞之役羅熊姓國人欲伐我四十二年極十三年伐羅我師敗績屈瑕縊羣帥囚于冶父以聽刑王曰孤之罪也皆免之四十四年桓十五年周桓王崩莊王立五十一年莊四年王荆尸授師孑焉以伐隨荆亦楚號尸陳也更為楚陳兵之法揚雄方言孑者戟也然則楚始于此參用戟為陳春三月王薨于樠木之下令尹鬬祈莫敖屈重除道梁溠營軍臨隨隨懼行成屈重入盟且請為會于漢汭而還濟漢而後發喪左傳諡曰武在位五十一年文王文王名熊資武王之子也文王二年莊六年王伐申自申還伐鄧説苑文王伐鄧使王子革王子靈捃菜二子見老人載畚乞焉不與搏而奪之王聞之拘二子將殺之大夫辭曰殺之非其罪也言卒丈人造軍而言曰鄧無道故伐之今君公之子搏而奪吾畚無道甚于鄧君見之曰討有罪而橫奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外六年莊十年王伐息國名蔡救息我敗蔡師于莘以蔡侯獻舞歸八年莊十二年周莊王崩僖王立初蔡哀侯繩息媯以語王王如息以食入享遂滅息以息媯歸十年莊十四年楚子以息媯故伐蔡入之十二年莊十六年伐鄭及櫟十三年莊十七年周僖王崩惠王立十四年莊十八年閻敖之族為亂閻敖大夫先是文王弒之冬巴人因之以伐我巴國名十五年莊十九年王禦巴師大敗于津還鬻拳大夫弗納遂伐黃嬴姓國敗黃師于踖陵還及湫有疾夏六月薨葬夕室左傳諡曰文在位十五年史記世家十三年卒淮南子楚文王好服獬冠楚國效之又曰文王汚膺鮑申傴背以成楚國之治説苑荆文王得如黃之狗箘簬之矰畋于雲夢二月不反得舟之姬期年不聽朝保申諫曰先王卜以臣為保吉今王罪當笞匍伏將笞王王曰不榖託于諸侯矣願請無笞保申曰臣承先王之命無敢廢王不受笞是廢先王之命也王曰敬諾乃席王王伏束細箭五十跪而加之王背如此者再王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流王曰此不穀之過保何罪乃變行從保申殺如黃之狗折箘簬之矰逐舟之姬務治乎荆吕覽舟作丹堵敖成王堵敖楚始號君曰敖自此以下以未成君者曰敖名熊囏文王之子堵敖元年魯莊公之二十年也史記世家在十八年在位三年弟熊惲弒之而代立是為成王成王四年莊二十三年始聘于魯六年莊二十八年我伐鄭諸侯救鄭我師夜遁八年莊三十年殺令尹公子元十三年僖元年始改號曰楚秋伐鄭鄭即齊故十四年僖二年侵鄭十五年僖三年伐鄭十六年僖四年齊以諸侯之師侵蔡蔡潰遂伐我王使屈完如師屈完及諸侯盟于召陵十七年僖五年滅弦國名十八年僖六年諸侯伐鄭我圍許以救鄭諸侯救許乃還冬蔡侯將許男見王于武城許男面縛銜璧大夫衰絰士輿櫬王問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所王從之二十年僖八年周惠王崩襄王立二十三年僖十一年黃人不歸我貢我伐黃滅之二十七年僖十五年我伐徐諸侯伐厲楚與國以救徐冬我敗徐于婁林二十八年僖十六年齊伐厲明年伐英氏楚與國以報婁林之役三十年僖十八年鄭伯始來朝王賜之金既而悔之與之盟曰無以鑄兵故以鑄三鐘三十二年僖二十年隨以漢東諸侯叛我我伐隨取成而還三十三年僖二十一年及宋人齊人盟于鹿上秋王及諸侯宋陳蔡鄭許曹會于盂執宋公以伐宋冬會于薄以釋之三十四年僖二十二年宋伐鄭我伐宋以救鄭及宋師戰于泓宋師敗績鄭勞王于柯澤王取鄭二姬以歸三十五年僖二十三年伐陳取焦夷城頓四邑名而還三十六年僖二十四年我及宋平宋公來朝周王子帶以狄師伐周周襄王處于泛三十七年僖二十十五晉納襄王殺王子帶秋秦晉伐鄀小國名我以申息之師戍商密鄀别邑商密降秦秦囚鬬克屈禦冦二公子以歸三十八年僖二十六年魯公子遂來乞師道我伐齊宋秋我滅夔以夔子歸宋叛我即晉冬伐宋圍緡魯侯以我師伐齊取榖置桓公子雍于榖申公叔侯戍之三十九年僖二十七年王及諸侯陳蔡鄭許圍宋四十年僖二十八年晉伐曹衛以救宋王入居于申使申公叔侯去穀使成得臣去宋曰無從晉師得臣請戰王怒少與之師得臣及晉師戰于城濮我師敗績我殺得臣衛侯來奔四十四年僖三十二年晉楚平四十五年僖三十三年令尹鬬勃侵陳蔡陳蔡成遂伐鄭將納公子瑕晉侵蔡我救之不戰而歸王殺鬬勃四十六年文元年冬十月大子商臣以宫甲圍王王請食熊蹯而死弗聽丁未王縊諡之曰靈不瞑曰成乃瞑左傳在位四十六年穆王王名商臣成王之大子也成王既立商臣又欲立王子職商臣遂殺成王而自立是為穆王王二年文三年我圍江江國名晉伐我以救江冬晉告于周周及晉伐我門于方城而還三年文四年我滅江四年文五年滅六冬滅蓼六蓼並國名七年文八年周襄王崩頃王立八年文九年王師于狼淵以伐鄭鄭及我平夏侵陳克壺邱秋公子朱伐陳陳人敗之獲公子茷陳懼及我平冬使越椒如魯聘九年文十年鬬宜申與仲歸謀弒王王殺宜申及仲歸秋陳鄭會王于息遂及蔡侯次于厥貉將以伐宋宋逆王遂導以田孟諸十年文十一年伐麇十一年文十二年羣舒叛舒偃姓我執舒子平及宗子遂圍巢宗巢二國羣舒之屬十二年文十三年王薨左傳諡曰穆在位十二年莊王莊王名旅史記名侣穆王之子也元年文十四年春周頃王崩匡王立秋令尹成嘉大師潘崇將襲羣舒使公子燮與鬬克守燮克作亂城郢使賊殺成嘉不克而還秋八月燮克以王出將如商密廬戢黎守廬大夫誘之殺燮及克史記莊王即位三年不出號令日夜為樂令國中曰敢諫者死伍舉入王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隱曰有鳥在阜三年不蜚不鳴是何鳥也王曰三年不蜚蜚將沖天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益甚大夫蘇從入諫王曰若不聞令乎對曰殺身以明君臣之願也于是罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大説吳越春秋作伍舉説苑作蘇從吕氏春秋作成公賈韓非子作右司馬御新序作士慶三年文十六年庸人帥羣蠻以叛廬戢黎侵庸王乘馹會師于臨品秦人巴人從我師羣蠻從王盟遂滅庸六年宣元年王侵陳遂侵宋晉伐鄭我救鄭晉師還七年宣二年晉侵鄭我救之晉師去新序晉伐楚三舍不止大夫請擊之莊王曰先君之時晉不伐楚及孤之身而伐楚是孤之過也大夫曰先臣之時晉不伐楚今臣之身而伐楚此臣之罪也請擊之王俯而泣起而拜羣大夫晉人聞之曰君臣爭以過為在已且君下其臣不可伐也乃夜還師韓非子莊王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣愚患知之如目也能見百步之外而不能自見其睫王之兵敗于秦晉喪地數百里此兵之弱也莊蹊蹻為盜于境內而吏不能禁此政之亂也王之弱亂非越之下也欲伐越此知之如目也王乃止説苑莊王伐陽夏師久而不罷王獵于雲夢椒舉進諫曰王所以多得獸者馬也而王國亡王之馬豈可得哉王曰不榖知詘強國之可以長諸侯也知得地之可以為富也而忘吾民之不用也明日飲諸大夫酒以椒舉為上客罷陽夏之師又曰莊王欲伐晉使豚尹觀焉反曰不可伐也其憂在上其樂在下且賢臣在焉曰沈駒明年又使豚尹觀反曰可矣初之賢人死矣諂諛多在君之廬其君好樂而無禮其下危處以怨上伐之民必先反韓詩外傳莊王將伐晉孫叔敖以螳螂黃雀諫語同國語莊辛諸説皆無徵冬周匡王崩定王立八年宣三年王伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞王王問鼎之大小輕重焉對曰在德不在鼎周德雖衰夭命未改鼎之輕重未可問也鄭即晉夏我侵鄭九年宣四年令尹越椒殺蒍賈將攻王王以三王之子為質三王文成穆弗受王與若敖氏戰于臯滸滅之冬伐鄭十年宣五年伐鄭陳及我平晉救鄭伐陳十一年宣六年伐鄭取成而還既成鄭伯逃歸十三年宣八年滅舒蓼王疆之及滑汭盟吳越而還冬伐陳取成而還十四年宣九年伐鄭鄭伯逃歸故晉救鄭鄭敗我師于柳棼十五年宣十年鄭及我平諸侯伐鄭鄭又及諸侯平冬我伐鄭晉救之逐我師于潁北十六年宣十一年我伐鄭及櫟鄭成夏王及陳侯鄭伯盟于辰陵鄭又徼事于晉陳弒靈公冬伐陳遂入陳殺夏徴舒納公孫寧儀行父于陳説苑莊王伐陳使人視之使者曰不可伐也城髙溝深蓄積多其國寧也王曰陳小國也而蓄積多賦斂重矣城髙溝深民力罷矣伐陳遂取之又有莊王伐陳吳救之左史倚相敗吳師事按陳至弒君何謂國寧倚相亦不當莊王時説謬十七年宣十二年春王圍鄭克之鄭伯肉袒牽羊以逆左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平公羊莊王伐鄭鄭伯肉袒以逆莊王莊王親自手旌左右撝軍退舍七里將軍子重諫曰南郢之與鄭相去數千里諸大夫死者數人厮役扈養死者數百人今君勝鄭而不有無乃失民臣之力乎莊王曰古者杆不穿皮不蠧則不出于四方是以君子篤於禮而薄于利要其人而不要其主告從不赦不祥吾以不祥道民災及吾身何日之有潘尫入盟鄭公子去疾出質夏六月晉師救鄭濟河王北師次于郔將飲馬于河而歸聞晉師既濟王欲還嬖人伍參欲戰王改乘轅而北之次于管以待之公羊晉師救鄭者至請戰莊王許諾將軍子重諫曰晉大國也王師淹病矣君請勿許也莊王曰弱者吾威之強者吾辟之是使寡人無以立乎天下令之還師而逆晉冦晉師在敖鄗之間王使少宰如晉師且使求成于晉晉人許之盟有日矣我使樂伯致晉師既免晉使魏錡來請戰趙旃來召盟王乘左廣逐趙旃會晉使軘車逆之潘黨望其塵告曰晉師至矣我亦懼王之入晉軍也遂出陳疾進師車馳卒奔乘晉軍晉師右移上軍未動工尹齊將右拒卒以逐下軍王使唐狡與蔡鳩居並大夫告唐惠侯曰不榖不德而貪以遇大敵不穀之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨將遊闕四十乘從唐侯以為左拒以從上軍及昏我師軍于邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至于邲遂次于衡雍潘黨曰君盍築武軍而收晉師以為京觀臣聞克敵必示子孫以無忘武功王曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之又作武其卒章曰耆定爾功其三曰敷時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉能定功所違民欲猶多民何安焉無德而強爭諸侯何以和衆利人之幾而安人之亂以為已榮何以豐財武有七德我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮于是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又何以為京觀乎祀于河作先君宫告成事而還新書莊王伐鄭南與晉戰于兩棠大克晉人王歸過申侯之邑申侯進食日中而王不食申侯請罪王歎曰吾聞之君賢而有師者王中君而有師者霸下君而羣臣莫若者亡今我下君也而羣臣又莫若不榖不榖恐亡且世不絶賢天下有賢而我獨不得若吾生者何以食為吕氏春秋莊王獵于雲夢射隨兕中之申公子培劫而奪之王曰何暴而不敬也命吏誅之大夫諫曰子培賢者也此必有故願察之不出三月子培疾而死兩棠之戰大勝晉歸而賞功子培之弟請賞曰臣兄之有功也于車下王曰奚謂也對曰臣之兄嘗讀故記曰射隨兕者不出三月臣之兄懼而爭之故死王命發平府書而視之于故記有焉乃厚賞之説苑莊王好獵大夫諫曰晉敵國也楚不謀晉晉必謀楚今王無乃耽于樂乎王曰吾獵以求士也其榛叢刺虎豹者吾以知其勇其攫犀搏兕者吾以知其徑有力罷田而分所得吾以知其仁因是道也而得三士焉又曰莊王賜羣臣酒日暮酒酣燭滅有引婦人之衣者美人援絶其冠纓告王曰今者燭滅有引妾衣者妾援得其冠纓趣火來上視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命曰今日與寡人飲不絶纓者不歡羣臣皆絶其冠纓而上火卒盡歡而罷居二年晉與楚戰有一臣常在前五合五獲首却敵卒得勝之王怪而問曰寡人未嘗異子子何出死不疑對曰臣夜絶纓者也又曰莊王與晉戰勝之懼諸侯之畏已也乃築為五仭之臺而觴諸侯諸侯請約莊王曰我薄德之人也仰而曰將將之臺窅窅其謀我言而不當諸侯伐之于是逺者來朝近者入賓又曰莊王築層臺延石千重延壤百里諫者七十二人皆死諸御已諫遂解層臺而罷民淮南子令尹子佩請飲莊王莊王許諾子佩疏揖北面立于殿下曰昔者王許之今不果往意者臣有罪乎王曰吾聞子具于強臺強臺者南望料山以臨方皇左江而右淮其樂忘死吾薄德之人不可以當此樂也諸説荒誕吕覽尤妄鄭伯許男來冬伐蕭附庸國宋以蔡人救之遂滅蕭十八年宣十三年伐宋十九年宣十四年鄭伯來謀晉王使申舟聘于齊無假道于宋宋殺之秋九月王圍宋二十年宣十五年夏五月宋及我平二十三年宣十八年秋七月王薨左傳韓非子莊王有茅門之法曰羣臣入朝馬蹄踐霤者斬其輈而戮其御大子入朝馬蹄踐霤廷理斬其輈而戮其御大子入泣曰為我誅廷理王曰法者所以敬宗廟尊社稷夫犯法廢令不尊敬社稷是臣乘君下尚校也臣乘君則主失威下尚校則上位危社稷不守何以遺子孫大子乃還走避舍再拜請死説苑作少師慶尸子雨雪莊王被裘當戶曰我猶寒彼百姓賓客甚矣乃使巡國中求百姓賓客之無居宿絶糧者賑之國人大説説苑莊王見天不見妖地不出孽則禱于山川曰天其忘豫歟淮南子莊王好觟冠楚國倣之又曰莊王裾衣博袍令行乎天下遂霸諸侯諡曰莊在位二十三年共王共王名審莊王之子也王二年成二年王將伐魯使屈巫聘于齊告師期適魯會晉伐齊我侵魯及陽橋以救齊魯請盟許之冬十一月公子嬰齊及魯侯蔡侯許男諸侯之大夫秦宋陳衛鄭齊曹邾薛鄭盟于蜀三年成三年諸侯伐鄭鄭敗諸邱輿皇戍來獻捷我歸荀罃于晉四年成四年晉伐鄭我救之五年成五年許訴鄭于我我執鄭皇戍鄭叛我及晉平冬定王崩簡王立六年成六年伐鄭晉救之遇于繞角我師還晉師遂侵蔡我救蔡禦諸桑隧晉師還七年成七年伐鄭諸侯救鄭鄭軍我師囚鍾儀獻諸晉八年成八年晉侵蔡遂侵我獲申驪九年成九年我以重賂求鄭鄭伯會公子成于鄧秋晉執鄭伯伐鄭我侵陳以救鄭晉歸鍾儀于我以求成冬自陳伐莒莒潰遂入鄆十二月使公子辰如晉報鍾儀之使請修好結成十一年成十一年宋華元來遂如晉合晉楚之成十二年成十二年夏五月公子罷許偃會晉士燮盟于宋西門之外諸侯遂會于瑣澤晉郤至來聘且涖盟冬公子罷如晉聘且涖盟十二月及晉侯盟于赤棘十五年成十五年我侵鄭遂侵衛鄭侵我取新石冬遷許于葉十六年成十六年王使公子成以汝隂之田求成于鄭鄭叛魯及王盟于武城晉伐鄭王救之晉楚遇于鄢陵及戰射王中目王宵遁殺公子側以公子嬰齊為令尹淮南子恭王戰于隂陵潘尫養由基黃衰微公孫丙相與篡之王懼而失體黃衰微舉足蹴其體王乃覺怒其失禮奮體而起四大夫載而行十七年成十七年我戍鄭晉會諸侯伐鄭我救之諸侯還冬諸侯復伐鄭我救之諸侯還十八年成十八年鄭會王伐宋彭城納宋魚石向為人鱗朱向帶魚府以三百乘戍之而還宋圍彭城我救之伐宋宋告急于晉晉侯師于台谷以救宋遇我師于靡角之谷我師還十九年襄元年晉會諸侯伐鄭晉師自鄭侵我焦夷及陳秋我救鄭侵宋吕留周簡王崩靈王立二十年襄二年殺右司馬公子申二十一年襄三年公子嬰齊伐吳克鳩兹至于衡山使鄧廖侵吳吳獲鄧廖師歸吳伐我取駕嬰齊卒以公子壬夫為令尹陳叛我冬侵陳陳成公卒乃止二十二年襄四年侵陳二十三年襄五年討陳叛故殺公子壬夫以公子貞為令尹冬公子貞伐陳諸侯救陳二十五年襄七年貞圍陳諸侯會于鄬以救之陳使公子黃來哀公弟執之二十六年襄八年鄭侵蔡我伐鄭鄭成二十七年襄九年秦使來乞師將伐晉許之秋共王師于武城以為秦援冬諸侯伐鄭十二月復伐鄭鄭成我伐鄭鄭又及我平同盟于中分鄭城中里名二十八年襄十年我及鄭圍宋秋侵魯西鄙還圍蕭諸侯伐鄭城虎牢而戍之鄭及晉平公子貞救鄭鄭又與我盟諸侯之師還我師亦還二十九年襄十一年諸侯圍鄭鄭成同盟于亳公子貞乞旅于秦以代鄭鄭伯逆之伐宋秋諸侯悉師以復伐鄭鄭成冬鄭及諸侯會于蕭魚三十年襄十二年我及秦伐宋報晉取鄭故秦嬴歸于我秦景公妹為共王夫人我使公子午聘于秦三十一年襄十三年王疾告大夫曰不榖不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君于禰廟者請為靈若厲大夫擇焉莫對及五命乃許冬十二月王薨公子貞謀諡大夫曰君有命矣貞曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征四海以屬諸夏而知其過可不謂共乎請諡之大夫從之左傳在位三十一年康王康王名昭共王之子也共王三十一年襄十三年薨王即位是年吳侵我戰于庸浦大敗吳師王元年襄十四年公子貞伐吳師還弗警吳人自臯舟之隘要而擊之敗我師冬公子貞卒公子午為令尹三年襄十六年晉伐我我及晉師戰于湛阪我師敗績晉師遂侵方城之外五年襄十八年鄭公子嘉欲去諸大夫將叛晉而起我師以去之冬十二月使告公子午午不許王聞而讓午午曰諸侯方睦于晉臣請嘗之午治兵于汾鄭知之完守入保公子嘉不敢會我師我師伐鄭門于純門信于城下而還涉于魚齒之下甚雨及之我師多凍役徒幾盡八年襄二十一年公子午卒使薳子馮為令尹馮辭以疾使公子追舒為令尹九年襄二十二年殺公子追舒復使薳子馮為令尹十一年襄二十四年我為舟師伐吳不為軍政無功而還齊侯伐晉懼而欲見王王使薳啓疆如齊聘秋齊陳無宇來乞師諸侯將伐齊冬王伐鄭以救齊諸侯還救鄭王使薳啓疆送陳無宇十二年襄二十五年薳子馮卒屈建為令尹舒鳩人叛屈建伐之吳救之大敗吳師滅舒鳩冬十二月吳子伐我門于巢巢人牛臣射殺之十三年襄二十六年我及秦人侵吳遂侵鄭秋許男來請伐鄭遂卒于楚王曰不伐鄭何以求諸侯冬伐鄭涉于汜而歸十四年襄二十七年宋向戍欲弭諸侯之兵如晉告晉許之告于我我亦許之告于諸侯皆許之秋七月屈建及諸侯之大夫盟于宋蒙門之外晉荀盈來涖盟冬薳罷如晉涖盟十五年襄二十八年秋九月鄭伯來冬十一月魯侯宋公陳侯許男來十二月靈王崩景王立乙未王薨明年夏四月葬王諸侯送葬至于西門之外諸侯之大夫皆至于墓左傳諡曰康在位十五年郟敖郟敖名麇康王之子也郟敖元年襄二十九年屈建卒公子圍康王庶弟為令尹二年襄三十年使薳罷如魯聘秋公子圍殺大司馬蒍掩而取其室三年襄三十一年衛侯來四年昭元年公子圍聘于鄭且娶于公孫段氏遂及諸侯之大夫會于虢冬公子圍將聘于鄭未出竟聞王有疾而還十一月至入問王疾縊而殺之遂殺其二子幕及平夏殺大宰伯州犁于郟葬王于郟謂之郟敖左傳在位四年無諡靈王靈王初名圍共王之子康王之庶弟也初為令尹郟敖四年昭元年弒郟敖而自立改名虔是為靈王以薳罷為令尹是年鄭遊吉來葬郟敖且聘立君王二年昭三年鄭伯來與之田于江南之夢三年昭四年許男來王止之遂止鄭伯復田江南使椒舉如晉求諸侯且請昏晉許之夏六月王及諸侯蔡陳鄭許徐滕頓胡沈小邾宋淮夷會于申徐子吳出也以為二執于申秋七月王以諸侯伐吳圍朱方執齊慶封殺之遂滅賴遷賴于鄢欲遷許于賴伇鬬韋龜與公子去疾城之而還冬吳伐我入棘櫟麻東國水不可以城彭生楚大夫罷賴之師四年昭五年殺大夫屈申二于吳故以屈生屈建子為莫敖使與薳罷如晉逆女晉韓起來送女羊舌肹為介王欲以起為閽肹為司宫以辱晉薳啓疆進説乃厚為之禮冬十月王以諸侯蔡陳許頓沈徐越伐吳吳子使其弟蹶由來犒師執之將以釁鼓既而赦之及汝清吳不可入遂觀兵于坻箕之山無功而還王懼吳使沈尹射待命于巢薳啓疆待命于雩婁五年昭六年公子棄疾如晉秋徐儀楚徐大夫來聘王執之逃歸懼其叛也伐徐吳救之薳罷伐吳吳敗我師于房鍾六年昭七年王成章華之臺願與諸侯落之薳啓疆曰臣能得魯君遂如魯召魯侯魯侯來王享之于新臺好以大屈弓名既而悔之薳啓疆説魯侯使反之新書翟使至楚楚王誇以章華之臺臺甚髙三休乃至楚王曰翟亦有此臺乎使者曰否翟窶國惡見此臺也翟王之室也堂髙三尺壤陛三絫茆茨弗翦采椽弗刮猶以作者大苦居者大佚翟惡見此臺也七年昭八年陳殺其世子偃師哀公縊使行人干徴師來赴殺之秋公子去疾圍陳冬滅陳使穿封戍為陳公八年昭九年諸侯之大夫魯宋鄭衛會王于陳公子去疾遷許于夷然丹還城父人于陳遷方城外人于許夏四月陳災十年昭十一年王在申召蔡侯伏甲而饗之殺蔡侯刑其士七十人蔡侯弒父故公子棄疾圍蔡晉使請蔡弗許冬滅蔡用隱大子于岡山遂城陳蔡不羮使棄疾為蔡公十一年昭十二年殺大夫成熊令尹成得臣孫冬圍許以懼吳王次于乾溪以為之援十二年昭十三年春王在乾溪初王之殺郟敖也公子比出奔晉公子黑肱出奔鄭及是黑肱公子棄疾因四族薳氏許圍蔡洧蔓成然之徒以入楚殺大子祿及公子罷敵公子比為王黑肱為令尹棄疾為司馬先除王宫使觀從從帥于乾溪而告之師潰公羊靈王為無道作乾溪之臺三年不成楚公子棄疾脅比而立之然後令于乾溪之役曰比已立矣後歸者不得復其田里衆罷而去之王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣王曰余殺人子多矣能無及此乎然丹曰請待于郊以聽國人王曰衆怒不可犯也曰若入于大都而乞師于諸侯王曰皆叛矣曰若亡于諸侯以聽大國之圖君也王曰大福不再祗取辱焉王沿夏將欲入鄢史記靈王獨傍偟山中野人莫敢入王王行遇故鋗人謂曰為我求食我已不食三日矣鋗人曰新王下法有敢餉王從王者罪及三族且又無所得食王枕其股而卧鋗人以土自代逃去王覺而弗見遂飢弗能起申亥求王遇諸棘闈以歸夏五月王縊于申亥氏申亥以其二女殉而葬之平王時申亥以王柩告乃改葬之初王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸左傳墨子靈王好士細腰王之臣皆以一飯為節肱息然後帶扶墻然後起期年朝有黧黑之危春秋繁露靈王行強乎陳蔡意廣以武不顧其行慮所美內罷其衆乾溪有物女水盡則女見水滿則不見靈王舉發其國而役三年不罷楚國大怒繁露語頗未詳在位十二年諡曰靈平王公子比附平王名棄疾及公子比公子黑肱皆共王之子靈王之弟也棄疾初事靈王遷許滅陳皆有功及滅蔡遂為蔡公靈王十二年昭十三年王在乾溪觀從自蔡召比及黑肱入襲蔡蔡公將食見之而逃觀從徇于蔡曰蔡公召二子將納之衆乃奉蔡公召二子而盟于滕依陳蔡人以國遂入楚及郊陳蔡欲為名故請為武軍欲築壘壁示後人為復讐之名蔡人知之曰欲速言宜速入且役病矣請藩而已乃藩為軍蔡公使須務牟與史禆並大夫先入因正僕人殺大子祿及公子罷敵比自立為王黑肱為令尹次于魚陂蔡公為司馬先除王宫觀從謂比曰不殺棄疾雖得國猶受禍也比曰余不忍也觀從曰人將忍子夏五月靈王縊國人未及知國每夜駭曰王入矣乙卯夜蔡公使周走而呼走曰王至矣國人大驚使鬬成然走告比及黑肱曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣比黑肱皆自殺比字子千初為右尹黑肱别有傳丙辰棄疾即位改名曰熊居是為平王葬比于訾謂之訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使鬬成然為令尹平王封陳蔡復遷邑致羣賂施舍寬民宥罪舉職使枝如子躬聘于鄭初共王無冡適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇于五人者使主社稷乃遍以璧見于羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧于大室之庭使五人齊而長入拜從長幼以次拜康王跨之靈王肘加焉公子比公子黑肱皆逺之王弱抱而入再拜皆厭紐楚之滅蔡也靈王遷許胡沈三小國道房申皆故諸侯于荆焉王即位封陳蔡而皆復之隱大子之子廬歸于蔡悼大子之子吳歸于陳王元年昭十四年使然丹簡上國之兵于宗邱且撫其民使屈罷簡東國之兵于召陵好于邊疆息民五年而後用師秋九月殺鬬成然以陽丐為令尹三年昭十六年王誘戎蠻子嘉殺之取蠻氏既而復立其子五年昭十八年吳伐我戰于長岸大敗吳師獲其乘舟餘皇吳夜從之大敗我師取餘皇以歸冬遷許于白羽六年昭十九年遷陰于下陰城郟陰郟並楚邑王使費無極為大子建聘于秦無極勸王取之正月夫人嬴氏至自秦使大子建居城父使陽丐聘于秦拜夫人也冬歸吳蹶由吳王弟靈王所執七年昭十二年王殺大子傳伍奢使司馬奮揚殺大子建建奔宋宋華氏亂薳越帥師逆華氏九年昭二十一年宋華亥向寧來奔夏四月景王崩悼王立王子朝作亂冬悼王崩敬王立十年昭二十三年吳伐州來我及諸侯之師救之令尹陽丐卒于軍戰于雞父我師大奔以囊瓦為令尹城郢十一年昭二十四年王為舟師以略吳疆及圉陽而還吳踵我滅巢及鍾離而還十二年昭二十五年城州屈復茄人城邱皇遷訾人州屈邱皇並楚邑郭巢郭卷巢卷亦楚邑為之築郭十三年昭二十六年秋九月王薨左傳諡曰平在位十三年新語楚平王奢侈縱恣不能制下檢民以德增駕百馬而行欲令天下人餒財富利明不可及于是楚國通奢君臣無别昭王昭王名軫平王之大子也平王十三年昭二十六年薨王即位冬十一月周敬王入于成周王子朝來奔王元年昭二十七年吳伐我使公子掩餘公子燭庸圍潛我救潛一師遇于窮一師至于潛吳師不能退吳弒其王僚掩餘奔徐燭庸奔鍾吾我師還夏四月殺大夫郤宛秋九月殺費無極盡滅其族四年昭十三年吳公子掩餘燭庸來奔王使居養楚邑以害吳冬吳執鍾吾子遂滅徐我救徐弗及遂城夷夷城父也使徐子處之五年昭三十十年吳侵我伐夷侵潛六並楚邑我救潛吳師還吳圍弦我救弦及豫章吳師還八年定二年囊瓦伐吳師于豫章吳敗我師遂圍巢克之獲我公子繁十年定四年蔡滅沈我為沈故圍蔡冬蔡侯吳子唐侯伐我十二月陳于柏舉吳擊我師大敗之囊瓦奔鄭五戰及郢昭王取妹芊畀我平王女以出涉睢針尹固與同舟王使執燧象以奔吳師燒火燧繫象尾驚却吳師遂濟江入于雲中王寢盜攻之以戈王奔鄖鄖公辛與其弟巢以王奔隨吳人從之使出王王之兄公子結似王逃王而已為王曰以我與之隨人卜與之不吉乃辭吳人王割公子結之心以與隨人盟當心前割取血以盟申包胥如秦乞師十一年定五年夏六月申包胥以秦師救我大敗吳師于沂又敗之軍祥遂滅唐又敗吳師于公壻之溪沂軍祥公壻之溪並楚地冬十月王入郢榖梁昭王之軍敗而逃父老送之曰寡人不肖亡先君之邑父老反矣何憂無君寡人且用此入海矣父老曰有君如此其賢也以衆不如吳以不死不如楚相與擊之一夜而三敗吳人新書昭王與吳人戰軍敗昭王走而屨決失之行三十步復旋取屨及至于隨左右問曰王何惜一踦屨乎王曰楚雖貧豈愛一踦屨哉惡與偕出弗與偕反也自是楚俗無相棄者又曰昭王當房而立愀然有寒色曰寡人朝時酒二􅀈重裘而立猶憯然有寒氣奈我百姓何是日也出府之裘以衣寒者出倉之粟以賑飢者居二年闔廬襲郢昭王奔隨諸當王之賜者請還戰至死之冦闔廬一夕五徙不能賴楚曳師而去昭王乃復十二年定六年吳敗我舟師公子結又以陵師敗于繁陽我大惕懼亡遷郢于鄀而改紀其政二十年定十四年滅頓以頓子牂歸二十一年定十五年滅胡二十二年哀元年圍蔡使疆于江汝之間師還蔡請遷于吳二十五年哀四年我克夷虎蠻夷叛我者圍蠻氏蠻氏潰蠻子赤奔晉晉執之歸于我二十七年哀六年吳伐陳昭王曰吾先君與陳有盟不可以不救乃救陳秋七月師于城父卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讐亦不如死死一也其死讐乎命公子申為王不可命公子結亦不可命公子啓五辭而後許將戰王有疾庚寅王攻大𡨕薨于城父公子啓與公子申公子結謀潛師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤鳥夾日以飛三日王使問諸周大史説苑作大史州黎周大史曰其當王身乎若禜之可移于令尹司馬王曰除腹心之疾而置諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜及王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢章楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉左傳韓詩外傳作莊王誤在位二十七年諡曰昭惠王惠王名章昭王妾越女所生也昭王薨章即位于城父是為惠王元年魯哀公七年也三年哀九年我伐陳陳即吳故四年哀十年伐陳吳救陳不戰而還七年哀十三年伐陳九年哀十五年伐吳及桐汭秋齊陳瓘來十年哀十六年孔子卒六月晉伐鄭我救之白公勝作亂殺公子申公子結而劫惠王欲以公子啓為王啓不可殺之以王如髙府楚别府圉公陽大夫穴宫負王以如昭夫人之宫葉公沈諸梁攻勝勝縊國寧使公子申之子寧為令尹公子結之子寬為司馬十一年哀十七年滅陳史紀世家在十年十二年哀十八年巴人伐我圍鄾我敗之于鄾冬周敬王崩元王立十三年哀十九年越侵我我追越師至𡨕不及而還冥越地史記世家吳來伐楚無越事秋我伐東夷三夷男女及我師盟于敖敖東夷地左傳二十年哀二十六年周元王崩定王立四十二年悼二十一年滅蔡四十四年悼二十三年滅杞與秦平是時越已滅吳而不能正江淮北我東侵廣地至泗上四十八年悼二十七年周定王崩考王立五十七年悼三十六年王薨史記史家諡曰惠在位五十七年新序楚惠王食寒葅而得蛭因遂吞之腹有疾不能食令尹入問疾王曰我食寒葅而得蛭念譴之而不行其罪是法廢而威不立也譴而行其誅則庖宰食監法皆當死心又不忍也吾恐蛭之見也因遂吞之令尹再拜而賀曰臣聞天道無親惟德是輔君有仁德天之所奉也病不為傷是夕也惠王之後蛭出新書同簡王以下戰國聲王悼王肅王宣王威王簡王名中惠王之子也簡王元年北伐滅莒六年周考王崩威烈王立二十四年簡王薨子聲王當即位聲王六年盜殺聲王子悼王疑即位是年周威烈王崩安王立悼王二年三晉來伐我至乘邱而還四年我伐周九年伐韓取負黍十一年三晉伐我敗我大梁榆關我厚賂秦與之平二十一年悼王薨子肅王臧即位肅王四年蜀伐我取兹方于是為扞關以拒之五年周安王崩烈王立十年魏取我魯陽十一年肅王薨無子立其弟良夫是為宣王宣王立年周烈王崩顯王立六年周天子賀秦獻公秦始復強而三晉益大三十年秦封衛鞅于商南侵我是年宣王薨子威王商即位威王六年越王無強伐齊齊説之伐我越王從之我興師伐之大敗越人殺王無強盡取故吳地七年齊田嬰欺我我伐齊敗之于徐州十一年威王薨史記世家懷王頃襄王懷王名槐威王之子也威王十一年薨王即位魏聞楚喪伐楚取我陘山六年使柱國昭陽將兵攻魏破之于襄陵八邑秦使張儀與楚齊魏相會盟齧桑八年周顯王崩慎靚王立十四年慎靚王崩赧王立十一年蘇秦約從山東六國共攻秦王為從約長至函谷關秦出兵擊六國六國兵皆引而歸十六年秦欲伐齊而楚與齊從親秦患之乃使張儀南見王請楚絶齊西從儀取商於之地六百里王大悅乃置相璽于張儀日與置酒宣言吾復得吾商於之地羣臣皆賀而陳軫獨弔且曰地未可得而齊交先絶是楚孤也必見欺于張儀弗聽絶齊齊怒折楚符而合于秦張儀乃謂楚將曰子受地從某至某廣袤六里王大怒興師將伐秦陳軫曰伐秦非計也不如與之伐齊是我亡于秦取償于齊也王不聽發兵西攻秦秦亦發兵擊之十七年戰于丹陽大敗我軍斬甲士八萬虜屈丐遂取漢中郡王大怒悉國兵復襲秦戰于藍田大敗我軍韓魏聞楚之困乃南襲楚至于鄧楚乃引兵歸十八年秦使約復與楚親分漢中之半以和楚王曰願得張儀不願得地張儀使楚王囚張儀儀私與靳向靳向與夫人鄭袖言于王而出之儀因説王以叛從約而與秦合親約婚姻張儀去是年秦惠王卒二十年齊湣王欲為從長惡楚與秦合乃使使遺王書曰寡人患楚之不察于尊名也今秦惠王死武王立張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善乎韓而公孫衍善乎魏楚必事秦韓魏恐必因二人求合于秦則燕趙亦宜事秦四國爭事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以案兵息民令于天下莫敢不樂聽則王名成矣王率諸侯並伐則破秦必矣王取武關蜀漢之地私吳越之富而擅江漢之利韓魏割上黨西薄函谷則楚之強百萬也且王欺于張儀亡地漢中兵銼藍田天下莫不代王懷怒今乃欲先事秦願大王熟計之王見齊王書猶豫不決下其議羣臣羣臣或言和秦或曰聽齊昭睢曰王必取地于秦而後足以刷恥于諸侯王不如深善齊韓以重樗里疾如是則王得韓齊之重以求地樗里子必言秦復與楚之侵地矣于是王許之竟不合秦而合齊以善韓二十四年倍齊而合秦秦昭王初立乃厚賂于楚楚往迎婦二十五年王入與秦昭王盟于黃吉秦復與我上庸二十六年齊韓魏為楚負從親三國共伐楚楚使大子入質于秦請救秦遣將將兵救楚三國引兵去二十七年大子殺秦大夫而亡歸二十八年秦與齊韓魏共伐楚殺楚將唐昧取我重邱而去二十九年秦復攻楚大破楚楚軍死者二萬殺我將軍景缺王恐乃使大子為質于齊以求平三十年秦復伐楚取八城秦昭王遺王書曰始寡人與王約為兄弟盟于黃棘大子為質至歡也大子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邊今聞君王乃令大子質于齊以求平寡人與楚接境壤界故為婚姻所從相親久矣而今秦楚不歡則無以令諸侯寡人願與君王會武關面相約結盟而去寡人之願也敢以聞下執事王見秦王書患之欲往恐見欺無往恐秦怒昭睢曰王母行發兵自守耳懷王子子蘭勸王行曰奈何絶秦之歡心于是往會秦昭王昭王詐令一將軍伏兵武關號為秦王王至則閉武關遂與西至咸陽朝章臺如蕃臣不與亢禮王大怒悔不用昭睢言秦因留王要以割巫黔中之郡王欲盟秦欲先得地王怒曰秦詐我而又強要我以地不復與秦秦因留之楚大臣患之乃詐赴于齊齊歸大子大子橫至立為王是為頃襄王乃告于秦世家作齊誤今正之曰賴社稷神靈國有王矣頃襄王元年秦要懷王不可得地楚立王以應秦秦昭王怒發兵出武關攻楚大敗我軍斬首五萬取析十五城而去二年懷王亡逃歸秦覺之遮楚道懷王恐乃從間道走趙以求歸趙惠王不敢入懷王懷王欲走魏秦追至遂與秦使復之秦懷王遂發病三年懷王薨于秦秦歸其喪于楚楚人皆憐之如悲親戚諸侯由是不直秦秦楚絶新書楚懷王心矜好髙人鑄金以象諸侯令大國之君編而先馬梁王御宋王驂乘周召畢陳滕薛衛中山之君皆象使隨而趨諸侯聞之興師伐楚楚王徴役萬人且掘國人之墓國人振動晝旅而夜亂齊人襲楚師之潰懷王逃適秦免尹殺之西河按此獨與史記異六年秦敗韓于伊闕斬首二十四萬秦乃遺頃襄王書曰楚倍秦秦且率諸侯伐楚爭一旦之命願王之飭士卒樂得一戰王患之乃謀復與秦平七年楚迎婦于秦秦楚復平十四年王與秦昭王好惠于宛結和親十五年與秦三晉燕共伐齊取淮北十六年與秦昭王好會于鄢秋復會于穰十八年楚人有好以弱弓微繳加歸鴈之上者王聞召而與之語遂言曰先王為秦所欺而客死于外怨莫大焉今以匹夫有怨尚有報萬乘白公子胥是也今楚地方五千里帶甲百萬猶足以踊躍中野而坐受困臣竊為大王弗取也于是王遣使于諸侯復為從欲以伐秦秦聞之發兵來伐楚楚欲與齊韓連和伐秦因欲圖周周王赧使武公定王曽孫西周惠公之子説昭睢于是計輟不行十九年秦伐楚楚軍敗割上庸漢北地豫秦二十年秦拔我西陵二十一年秦白起拔我郢燒先王墓夷陵王兵散遂不復戰東北保于陳城二十二年秦復拔我巫黔中郡二十三年王收東地兵十餘萬復西取秦所拔我江旁十五邑以為郡距秦二十七年使三萬人助三晉伐燕復與秦平入大子為質于秦三十六年王病大子亡歸秋王薨諡曰頃襄史記世家淮南子頃襄好色不使風議而民多昏亂其積至昭竒之禍考烈王考烈王名元頃襄王之大子也頃襄王薨大子即位以左徒黃歇為令尹號春申君王元年納州于秦以平是時楚益弱六年秦圍邯鄲趙告急楚楚救趙七年至新中中當為市在巨鹿秦兵去十二年秦昭王卒使黃歇弔祠于秦十六年秦王政立二十二年與諸侯共伐秦不利而去東徙都壽春命曰郢二十五年王薨諡曰考烈史記世家幽王哀王王負芻幽王名悍考烈王之子李園女弟之所生也李園女弟幸于黃歇有身而後進之考烈王故太史公于幽王之前特書秦趙政立後書吕不韋卒蓋微辭也考烈王薨幽王即位李園殺黃歇幽王三年秦魏伐楚十年幽王薨同母弟猶代立是為哀王哀王立二月餘哀王庶兄負芻之徒襲殺哀王而立負芻為王負芻二年秦伐楚大破我軍亡十餘城四年秦將王翦破我軍于蘄殺將軍項燕五年王翦蒙武遂破楚國虜王負芻滅楚名為楚郡云史記世家始皇本紀始皇二十三年王翦擊荆虜荆王項燕立昌平君為荆王反秦于淮南二十四年王翦復破荆軍昌平君死項燕自殺按昌平君者楚人為始皇相國攻嫪毐者是也始皇二十一年將攻荆徙昌平君于郢本紀誤贊曰楚始蠻夷不與中國通自邲之捷遂枙天下權擠盟主而上之楚故祖祝融火烈象成也靈平之際焱焰愈熾然猛勢外灼而陰中暗虛微昭賢楚灰滅矣雖然東挫于句吳北衄于強秦天之所壞庸可支乎百昭且危懷襄何有尚史卷十六
