body:
  text: 尚史卷五十七列傳三十五鑲白旗漢軍李鍇撰觀丁父彭仲爽觀射父彭名觀起觀瞻觀從附彭生觀丁父者鄀俘也武王以為軍率克州蓼服隨唐大啓羣蠻彭仲爽者申俘也文王以為令尹縣申息朝陳蔡封畛于汝左傳觀丁父之後曰觀射父射父事昭王昭王問曰周書所謂重黎實使天地不通者何也若無然民將能登天乎對曰非此之謂也古者民神不雜民之精爽不􅠬二者而又能齊肅中正其知能上下比義其聖能光逺宣朗其明能光照之其聰能聽徹之如是則明神降之在男曰覡在女曰巫是使制神之處位次主而為之牲器時服而後使先聖之後之有光烈而能知山川之號髙祖之主宗廟之事昭穆之世齊敬之勤禮節之宜威儀之則容貌之崇忠信之質禋潔之服而敬恭明神者以為之祝使名姓之後能知四時之生犧牲之物玉帛之類采服之儀彛器之量彛六彛器俎豆次主之度次主疏數也屏攝之位周氏云屏者辨攝主人之位韋昭謂屏屏風攝形如要扇皆所以分别尊卑為祭祀之位壇場之所上下之神氏姓之出而心率舊典者為之宗于是乎有天地神民類物之官謂之五官各司其序不相亂也民是以能有忠信神是以能有明德民神異業敬而不瀆故神降之嘉生民以物享禍災不至求用不匱及少皞之衰也九離亂德民神雜糅不可方物夫人作享家為巫史無有要質民匱于祀而不知其福蒸享無度民神同位民瀆齊盟無有威嚴神狎民則不蠲其為嘉生不降無物以享禍災薦臻莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常無相侵瀆是謂絶地天通其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之以至于夏商故重黎氏世敘天地而别其分主者也其在周程伯休父其後也當宣王時失其官守而為司馬氏寵神其祖以取威于民曰重實上天黎實下地遭世之亂而莫之能禦也不然夫天地成而不變何比之有公子結祀平王祭以牛俎于王王問于射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饌天子舉以大牢祀以會大牢牛羊豕也會會三大牢也諸侯舉以特牛特一也祀以大牢卿舉以少牢少宰羊豕祀以特牛大夫舉以特牲特牲豕也祀以少牢士食魚炙祀以特牲庶人食菜祀以魚上下有序民則不慢王曰其小大何如對曰郊禘不過繭栗蒸嘗不過把握王曰何其小也對曰夫神以精明臨民者也故求備物不求豐大是以先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之一純二精七事見下文八種八音九祭九州助祭也百姓千品萬官億醜兆民經入畡數以奉之明德以招之和聲以聽之以告遍至則無不受休毛以示物血以告殺接誠拔取以獻具為齊敬也拔毛取血獻其備物也敬不可久民功不堪故齊肅以承之王曰芻豢幾何對曰逺不過三月近不過浹日逺謂三牲近謂雞鶩王曰祀不可以已乎對曰祀所以昭孝息民撫國家定百姓也不可以已夫民氣縱則底底著也底則滯滯久不震生乃不殖是用不從不從上令其生不殖不可以封不可封建是以古者先王日祭月享時類嵗祀諸侯舍日卿大夫舍月士庶人舍時天子遍祀羣神品物諸侯祀天地三辰及其土之山川卿大夫祀其禮謂五祀及祖所自出士庶人不過其祖日月會于龍􅔀􅔀龍尾也謂周十二月日月合辰于尾上也土氣含收天明昌作天氣盛起也百嘉備舍羣神頻行謂時物畢成羣神並行求食舍入室頻並也國于是乎蒸嘗家于是乎嘗祀上所以教民虔也下所以昭事上也民所以攝固者也若之何其舍之也王曰所謂一純二精七事者何也對曰聖王正端冕以其不違心帥其羣臣精物以臨監享祀無有苛慝于神者謂之一純玉帛謂二精天地民及四時之務為七事王曰三事者何也對曰天事武帝事文民事忠信王曰所謂百姓千品萬官億醜兆民經入畡數者何也對曰民之徹官百徹達也自以名達于上者百官王公之子弟之質能言能聽徹其官者而物賜之姓以監其官是為百姓姓有徹品十于王謂之千品一官之職其寮屬徹于王者十品百官故千品五物之官陪屬萬為萬官五物即前五官臣之臣為陪屬謂倍屬佐助復有十等千品故萬官官有十醜為億醜醜類也十醜承萬為十萬十萬曰億古數也天子之田九畡以食兆民九畡九州之內有畡數也王取經入焉以食萬官國語觀射父之後曰觀起起當康王時有寵于令尹公子追舒未益祿而有馬數十乘康王九年襄二十二年王殺追舒轘起于四竟轘車裂以徇也起之子觀從從字子玉靈王時召公子比為亂見亂臣傳惠王時起之後觀瞻為開卜大夫彭仲爽之後曰彭名名事莊王莊王十七年宣十二年邲之役名御左廣敗晉師于邲共王二年成二年晉伐齊我侵衛遂侵魯以救齊名御戎蔡侯為左許男為右及楊橋魯平乃盟于蜀十六年成十六年鄢陵之役名御王潘黨為右晉射王中目二十二年襄四年我伐陳聞陳侯卒乃止陳人不聽命名侵陳其後有彭生為大夫事靈王靈王三年昭四年王欲遷許于賴使鬬韋龜與公子棄疾城之冬東國水不可以城彭生罷賴之師左傳申叔時申叔跪土亹附申叔豫申叔展申叔時為大夫事莊王莊王十六年宣十一年王入陳殺夏徴舒遂縣陳申叔時使于齊反復命而退王使讓之曰夏徵舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳十九年宣十四年我使申無畏聘于齊宋殺之我圍宋凡九月將去宋時僕為王御曰築室反耕者宋必聽命從之宋懼及我平左傳王使士亹大夫傅大子審共王辭曰臣不材無能益焉王曰賴子之善善之也對曰夫善在大子大子欲善善人將至若不欲善善則不用故堯有丹朱舜有商均啓有五觀湯有大甲文王有管蔡是五王者皆元德也而有姦子夫豈不欲其善不能故也若民煩可教訓蠻夷戎狄其不賓也久矣中國所不能用也王卒使傅之問于時時曰教之春秋而為之聳善而抑惡焉以戒勸其心教之世而為之昭明德而廢幽昏焉以休懼其動教之詩而為之道廣顯德以耀明其志教之禮使知上下之則教之樂以疏其穢而鎮其浮教之令使訪物官教之語使明其德而知先王之務用明德于民也教之故志使知廢興者而戒懼焉教之訓典使之族類行比義焉若是而不從動而不悛則文詠物以行之求賢良以翼之悛而不攝則身勤之多訓典刑以納之務慎惇篤以固之攝而不徹則明施舍以道之忠明久長以道之信明度量以道之義明等級以道之禮明恭儉以道之孝明敬戒以道之事明慈愛以道之仁明昭利以道之文明除害以道之武明精意以道之罰明正德以道之賞明齊肅以耀之臨若是而不濟不可為也且夫誦詩以輔相之威儀以先後之體貌以左右之明行以宣翼之制節義以動行之恭敬以臨監之勤勉以勸之孝順以納之忠信以發之德音以揚之教備而不從者非人也其可興乎夫子踐位則退自退則敬不則赧國語莊王薨事共王共王及晉平既盟于宋十五年成十五年將侵鄭衛公子貞曰新與晉盟而背之無乃不可乎公子側曰敵利則進何盟之有時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎十六年成十六年晉伐鄭我救之公子側將中軍過申入見時曰師其何如對曰德刑詳詳祥也義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦龎和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言姦時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣戰于鄢陵我師敗績遂殺公子側時子曰跪共王之即位也將伐魯使屈巫即巫臣聘于齊且告師期屈巫盡室以行跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也屈巫果不反而以夏姬奔晉左傳申叔豫時之孫也康王八年襄二十一年使薳子馮為令尹子馮訪于豫豫曰國多寵而王弱國不可為也子馮以疾辭乃使公子追舒即子南為令尹觀起有寵于追舒未益祿而有馬數十乘王殺追舒轘觀起復使薳子馮為令尹有寵于子馮者八人皆無祿而多馬他日朝與豫言弗應而退從之入于人中又從之遂歸退朝見之曰子三困我于朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵于子南子南得罪觀起車裂何故不懼子馮自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之先是有申叔展亦為大夫事莊王與蕭大夫還無社善莊王十七年宣十二年我伐蕭蕭潰遂傅于蕭還無社與司馬卯言號展展曰有麥麴乎曰無有山鞠窮乎曰無麥麴鞠窮所以禦濕欲使無社逃泥水中無社不解故曰無河魚腹疾奈何言無禦濕具將病曰目于眢井而拯之無社意解欲入廢井若為茅絰哭井則已展教茅以表井哭則應以為信明日蕭潰展視其井則茅絰存焉號而出之司馬卯亦楚大夫論曰傅有九教學則不遺師有六器戰則不危娓娓乎申叔之辭也雖無老成人尚有典型舍是勿謀官多闕矣觀射父能作訓辭以行事于諸侯其重黎之對亦多聞之一也申無畏申犀申無畏是為文之無畏字子舟為大夫事穆王穆王九年文十年王將伐宋宋逆王勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂盂田獵陳名期思公復遂為右司馬公子朱及無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以徇或謂無畏曰國君不可戮也無畏曰當官而行何強之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟強也敢愛死以亂官乎穆王薨事莊王莊王十九年宣十四年使無畏聘于齊無假道于宋使公子馮聘于晉不假道于鄭無畏以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見其子犀而行及宋宋人殺之王聞之投袂而起屨及于窒皇寢門闕劍及于寢門之外車及于蒲胥之市秋九月圍宋明年夏五月將去宋申犀稽首于王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答乃築室反耕者宋懼請平左傳復遂者楚期思邑公公子馮羣公子公子朱别有傳申無宇申亥申無宇者芈尹也郟敖二年襄三十年公子圍為令尹殺大司馬蒍掩而取其室無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免公子圍弒郟敖自立是為靈王靈王三年昭四年王合諸侯于申秋以諸侯伐吳克朱方遂滅賴城賴以遷許無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也王之為令尹也為王旌以田無宇斷之曰一國兩君其誰堪之新序芉尹文者荆之驅鹿彘者也司馬子期獵于雲夢載旗之長拖地文拔劍齊諸軫而斷之二車抽弓于韔援矢于筒引而未發也子期伏軾而問曰吾有罪于夫子乎對曰臣以君旗拖地故也國君之旗齊軫大夫之旗齊軾今子荆國名大夫而滅三等文之斷也不亦可乎子期説載之王所以文之言告王王説使為江南令而大治此申無宇事而附會為二及即位六年昭七年為章華之宫納亡人以實之無宇之閽入焉有罪亡入無宇執之有司弗與曰執人于王宫其罪大矣執而謁諸王王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之內何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之賓莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人于王宫將焉執之周文王之法曰有亡荒閲荒大也閲搜也言有亡人則大搜也所以得天下也吾先君文王作僕區刑書之法曰盜所隱器與盜同罪所以封汝也啓封疆至汝水也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣盜指靈王王曰取而臣以往盜有寵未可得也盜靈王自指戲言也遂赦之十年昭十一年王滅蔡用隱大子于岡山無宇曰不祥五牲不相為用如祭馬先不用馬況用諸侯乎王必悔之王城陳蔡不羮使公子棄疾為蔡公問于無宇曰棄疾在蔡如何對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立鄭厲公因公子元殺櫟大夫檀伯以居櫟卒使昭公見殺齊桓公城穀而置管仲焉至于今賴之臣聞五大不在邊五細不在庭上古金木水火土謂之五官玄鳥氏丹鳥氏亦有五蓋立官之本也言五官之長專盛過節不可居邊細弱不勝任亦不可居朝廷親不在外羈不在內今棄疾在外鄭丹在內君其少戒王曰國有大城何如對曰鄭京櫟實殺伯曼即檀伯宋蕭亳實殺子遊南宫長萬立公子遊蕭叔大心殺之立桓公衛蒲戚實出獻公孫林父寧殖食邑戚蒲若由是觀之則害于國末大必折尾大不掉君所知也國語靈王使僕析父問無宇曰吾城三國賦皆千乘亦當晉矣又加之以楚諸侯其來乎對曰制城邑若體性焉有首領股肱至于手拇毛脈大能掉小故變而不勤地有髙下天有晦明民有君臣國有都鄙古之制也夫邊境者國之尾也譬之如牛馬處暑之既至虻䗽之既多而不能掉其尾臣亦懼之不然是三城也豈不使諸侯之心惕惕焉析父復命王曰是知天咫安知民則右尹然丹侍曰民天之生也知天必知民矣是其言可以懼哉無宇之子曰申亥十二年昭十三年王在乾溪公子比公子棄疾為亂王沿夏將欲入鄢亥曰吾父再姦王命謂斷旌執人于章華宫王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸王縊于申亥氏亥以其二女殉而葬之左傳申包胥申包胥楚大夫也與伍員友平王之殺伍奢也伍員出奔吳謂包胥曰我必復楚國包胥曰勉之子能復之我必能興之昭王十年定四年吳伐我入郢王奔隨包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始于楚寡君失守社禝越在草莽使下臣告急曰夷德無厭若鄰于君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依于庭墻而哭日夜不絶聲勺飲不入口七日秦伯為之賦無衣九頓首而坐秦師乃出史記吳入郢伍子胥掘平王墓出其尸鞭之三百申包胥亡于止中使人謂子胥曰子之報讐其以甚乎吾聞之人衆者勝天天定亦能破人今子故平王之臣親北面而事之今至于僇死人豈其無天道之極乎伍子胥曰為我謝甲包胥吾日暮途逺故倒行而逆施之于是申包胥走秦求救立于秦庭晝夜哭七日七夜秦哀公曰楚雖無道有臣若是可無存乎乃救楚吳越春秋申包胥之秦求救作踵跖劈裂裳裹膝鶴倚哭于秦庭秦桓公素沈湎不恤國事申包胥哭已歌曰吳為無道封豕長蛇以食上國欲有天下政從楚起寡君出在草野使來告急如此七日桓公大驚淮南子略同按吳入郢當秦哀公三十一年作桓公誤明年包胥以秦師至大敗吳師王入于郢王賞包胥包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸按子旗即蔓成然成然立平王而求無厭平王殺之遂逃賞左傳新序昭王復國而賞始于包胥包胥曰輔君安國非為身也救急除害非為名也功成受賞是賣勇也遂逃賞終身不見論曰兩君相見先以玉帛禮也且宋公者甫冔白馬天子客之而楚靈暴虐僕役諸侯無畏緘其忠諫若佐鬭焉使齊而死非宋之聾也無宇斷旌茹剛斯得方之抶僕則逺矣章華之對弱主所咈靈王赦之適足以葬異哉若乃伍申同心而覆復異趣卒使怨信德報各如厥志君子之和與潘尫潘黨潘尫字師叔為大夫事莊王莊王三年文十六年庸人帥羣蠻以叛我使廬戢黎廬大夫侵庸及庸方城庸人逐之囚子揚窗戢黎官屬三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進尫曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯禆鯈魚人庸三邑實逐之庸人曰楚不足與戰矣遂不設備王乘馹會師于臨品遂滅庸十七年宣十二年王圍鄭克之退二十里而許之平使尫入盟鄭公子去疾出質既而晉救鄭使魏錡來請戰尫之子黨逐之及熒澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給于鮮敢獻于從者黨命去之黨既逐魏錡趙旃復夜至王乘左廣以逐之晉師懼二使之怒我師也使軘車逆之黨望其塵使騁而告曰晉師至矣我懼王之入晉軍也遂出陳乘晉軍工尹齊將右拒卒以逐下軍使黨率遊闕遊車補闕者四十乘從唐侯以為左拒以從上軍遂敗晉師于邲黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功王曰非爾所知也莊王薨黨事共王共王十六年成十六年晉伐鄭我救之遇于鄢陵彭名御王黨為右及戰晉射王中目我師敗績黨字叔是為叔黨善射與養由基齊左傳尫之先有潘崇為大子商臣師弒成王見逆臣傳伍參伍舉伍鳴伍奢伍尚伍參者莊王之嬖人也莊王十七年宣十二年我伐鄭既及鄭平晉救之濟河王以北師次于郔鄭地將飲馬于河而歸聞晉師既濟王欲還參欲戰令尹蒍艾獵即孫叔敖曰昔嵗入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔敖為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾參言于王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者専行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社禝何王病之告令尹改乘轅而北之遂敗晉師于邲舉是為椒舉參之子也舉娶于王子牟康王十三年襄二十六年王子年為申公而亡國人曰伍舉實送之舉奔鄭遂將奔晉初伍參與蔡大師子朝友其子聲子與舉善聲子將如晉遇之于鄭郊及還如楚為言于屈建詳蔡朝傳建言諸王益其爵祿而復之聲子使伍鳴逆之鳴即椒鳴舉之子也伍舉于是復歸于楚郟敖四年昭元年令尹公子圍聘于鄭且娶于公孫段氏舉為介既聘將以衆逆女公孫僑辭曰敝邑褊小請墠聽命欲于城外除地為墠行昏禮舉知其有備也請垂櫜而入垂櫜示無弓逆而出遂會于虢冬公子圍又將聘于鄭舉為介未出竟聞王有疾圍還舉遂聘圍至遂弒郟敖使赴于鄭舉問應為後之辭對曰寡大夫圍舉更之曰共王之子圍為長圍立是為靈王靈王三年昭四年王使舉如晉求諸侯舉致命曰寡君使舉曰日君有惠賜盟于宋曰晉楚之從交相見也以嵗之不易寡人願結歡于二三君使舉請間君若茍無四方之虞則願假寵以請于諸侯晉許之舉遂請昏亦許之夏六月王合諸侯于申舉言于王曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮于向戍及公孫僑戍獻公合諸侯之禮六僑獻伯子男會公之禮六王使舉侍于後以規過卒事不規王問其故對曰禮吾未見者有六焉又何以規宋大子佐後至王田于武城久而弗見舉請辭焉王使往曰屬有宗祧之事于武城寡君將墮幣焉恨其後至故言將因諸侯會布幣乃相見敢謝後見王示諸侯侈舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緡叛之商紂為黎之搜東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽秋七月王以諸侯伐吳克朱方執齊慶封將戮之舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從于戮乎播于諸侯焉用之王弗聽負之斧鉞以徇于諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造于中軍王問諸舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之八年昭九年我遷許于夷取州來淮北之田以益之舉授許男田左傳初靈王為章華之臺與舉升焉曰臺美夫對曰臣聞國君服寵以為美安民以為樂聽德以為聰致逺以為明不聞其以土木之崇髙彤鏤為美而以金石匏竹之昌大囂庶為樂不聞其以觀大視侈淫色以為明而以察清濁為聰也先君莊王為匏居之臺髙不過望國氛大不過容宴豆大不妨守備用不煩官府民不廢時務官不易朝常問誰宴焉則宋公鄭伯問誰相禮則華元駟騑問誰贊事則陳侯蔡侯許男頓子其大夫侍之先君是以除亂克敵而無惡于諸侯今君為此臺也國民罷焉財用盡焉年穀敗焉百官煩焉舉國留之數年乃成願得諸侯與始升焉諸侯皆距無有至者而後使大宰強請于魯侯懼之以蜀之役而僅得一來使富都那豎贊焉富富容貌都間也那美也豎未冠者也而使長鬣之士相焉臣不知其美也夫美也者上下內外小大逺邇皆無害焉故曰美若于目觀則美縮于財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠矣君安得肥斂民利以成其私欲使民蒿焉忘其安樂而有逺心其為惡也甚矣安用目觀若君謂此臺美而為之正楚其殆矣國語舉子二鳴奢奢為連尹平王即位使奢為大子建師費無極為少師無寵平王六年昭十九年無極為建聘于秦勸王取之又言于王使建居城父明年無極譖于王曰建與伍奢將以方城之外叛王信之問于奢奢對曰君一過多矣謂納建妻何信于讒王執奢大子建奔宋奢之子尚尚弟員尚為棠君無極曰奢子材召之彼仁必來不然將為患王使召之曰來吾免而父尚謂員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可棄名不可廢爾其勉之相從為愈比之相從俱奔俱死為勝尚歸奢聞員不來曰楚君大夫其旰食乎遂皆殺之左傳伍員見吳傳論曰叔敖稱善謀邲之役則伍參主之兼聽斯聰擇善斯從在君而已椒舉習儀納君于禮然而郟敖之際與綢繆焉不正其始顧正其終所謂飲人狂藥責人正禮者非邪奢遭讒構之會父子寃死悲夫倚相倚相楚左史也初事靈王繼事平王昭王倚相廷見申公史老字子亹史老不出倚相謗之大夫舉伯以告史老怒而出曰女無亦謂我老髦而舍我而又謗我倚相曰唯子老髦故欲見以交警子若子方壯能經百事倚相將奔走承序于是不給而何暇得見昔衛武公年數九十有五矣猶針警于國曰自卿以下至于師長士茍在朝者無謂我老髦而舍我必恭恪于朝朝夕以交戒聞一二之言必誦志而納之以訓道我在輿有旅賁之規位寧有官師之典倚几有誦訓之諫居寢有􅉏御之針臨事有瞽史之道宴居有師工之誦史不失書矇不失誦以訓御之于是乎作懿戒以自警也及其沒也謂之睿聖武公子實不睿聖于倚相何害周書曰文王至于日中昃不遑暇食惠于小民唯政之恭文王猶不敢惰今子老楚國而欲自安也以禦數者王將何為若常如此楚其難哉史老曰老之過也乃驟見之公子結欲以其妾為內子適妻曰內子訪之倚相曰吾有妾而願欲笄之筓內子首服其可乎對曰昔先大夫子囊違王之命諡公子貞違王命而諡王曰共子夕嗜芰子木有羊饋而無芰薦屈建違父命以羊饋易芰薦君子曰違而道穀陽豎愛子反之勞也而獻飲焉以斃于鄢鄢陵之戰王召公子側側醉不能見王王遁側自殺芉令申亥從靈王之欲以隕于乾溪申亥求靈王以歸王縊申亥以二女殉而葬之君子曰從而逆君子之行欲其道也故進退周旋唯道之從夫子木能違若敖之欲以之道而去芰薦吾子經楚國而欲薦芰以干之其可乎公子結乃止國語韓非子荆伐陳吳救之軍間三十里雨十日夜星倚相謂子期曰雨十日甲緝而兵聚吳人必至不如備之乃為陳陳未成而吳人至見荆陳而反倚相曰吳反復六十里其君子必休小人必食我行三十里擊之必可敗也從之遂破吳軍白公子張白公子張名未詳楚大夫也靈王虐子張驟諫王患之謂史老即申公子亹曰吾欲已子張之諫若何對曰用之實難已之易矣若諫君則曰余左執鬼中右執殤宫中身也禮曰其中退然夭死曰殤宫殤之居也謂把其祿籍制服其身而知其居處也凡百針諫吾盡聞之矣寧聞它言子張又諫王如史老之言對曰昔殷武丁能聳其德至于神明以入于河自河徂亳于是乎三年默以思道卿士患之曰王言以出令也若不言是無所稟令也武丁于是作書曰以余正四方余恐德之不類兹故不言如是而又使以象夢求四方之賢聖得傅説以來升以為公而使朝夕規諫曰必交修余無余棄也今君或者未及武丁而惡規諫者不亦難乎齊桓晉文皆非嗣也還軫諸侯不敢淫逸心類德音以得有國近臣諫逺臣謗輿人誦以自誥也是以其入也四封不備一同而至于有畿田以屬諸侯至于今為令君君不度憂于二令君而欲自逆也無乃不可乎周詩有之曰弗躬弗親庶民弗信臣懼民之不信君也故不敢不言不然何急其以言取罪也王病之曰子復語不穀雖不能用吾憖置之于耳對曰賴君之用也故言不然巴浦之犀犛兕象其可盡乎其又以規為瑱也瑱所以塞耳言四獸之牙角為瑱難盡而又以規諫為瑱以塞耳乎遂趨而退歸杜門不出國語論曰宿善不祥語不用而置之耳猶之瑱也不且甚于宿乎倚相良史見褒虐主而規針無聞獻飲乎抑去芰乎尚史卷五十七
