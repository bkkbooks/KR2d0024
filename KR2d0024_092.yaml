司祿主官次司危主危亡次司非主愆過哭二星在虛南泣二星在哭星東並主悲泣天壘十三星在哭泣南主北夷胸奴敗臼四星在危南主政治如哭泣亡人賣釡甑出鄉宅離瑜三星在秦代東主王餱衣服危三星為蓋屋主宫室祭祀動而暗土功興日月蝕危中宫殿崩大臣逆木星守祀不敬别造宫室火守人多役死南方有兵久守東大兵飢土守土功起旱金守罷兵將軍喜水守臣下亂謀水日月五星入天下亂來年大飢彗孛犯兵起人五星在危北主百姓亡官有詐偽婦人凶亂杵臼在人旁杵臼不相當軍事飢臼仰嵗豐覆大飢車府七星在天津東主官車之府造父五星在傳舍南主御女鉤九星在造父西星移地動蓋屋二星在危南主宫室墳墓四星在危下主山陵暗失本位山陵毁虛梁四星在危南主寢廟天錢十星在虛梁南主錢庫營室二星為清廟主軍糧隱藏元命苞營室十星埏陶精類始立紀剛包物為室爾雅營室謂之定明國昌動搖兵起日蝕室中王自將月蝕飢上六星曰離宫主六宫鉤己環繞左右逆行妃后廢黜或主崩后黨誅木星守南東有喜北憂西米貴火守將凶久守鉤己主失官位臣隂謀旱經二十日至九十日臣弒篡土守起土功金守兵革散久守兵滿野水守水彗孛出天下亂國易政螣蛇二十三星在室北枕河主水蟲移南旱移北水雷電六星在室西南雲雨四星在雷電東霹靂五星在雲雨北主天威擊擘萬物土吏三星在室南主農事壘壁十二星羽林軍四十五星並在室南主翊衛明天下安暗兵盡失天官書虛危南有衆星為羽林天軍軍西為壘或曰鉞按羽林軍南别有三星出敗臼之間曰鉞史以壘壁為鉞誤北落師門一星在羽林軍西主侯兵明大而角軍安五星犯兵起火金水尤甚木土犯吉火守國殘天官書北落若微亡軍星動角益希及五星犯北落入軍軍起按舊説希當作布非是希當作軍言微則亡軍動而角則益軍也天綱二星在北落西主天繩八魁九星在北落東主獸五星守兵起金火尤甚東壁二星主文章圖書曰天術失色大小不同將封鄙土而失天下日蝕壁中國不用賢失文字月蝕壁中文臣死木守仕人用火守臣謀君旱兵起土守道術興天下熟火入中街君崩相薨土逆行入壁經九十日大兵起百姓有立王者金守急刑罰有兵大臣憂水客守水臣下賊王彗孛行犯兵起土公二星在壁南主營造鐵鑕三星在八魁西北主斬刈亂行移處兵起天廄十星在壁北主廄苑西宫白虎文耀鉤西宫白帝其精白虎天官書作西宫咸池咸池别是一星當作白虎是奎十六星曰封豕為溝瀆天之府庫西南大星曰天豕目明吉奎不欲圓圓兵起五星犯奎權臣擅命焰焰有光近臣謀上飢金星守邉陲之憂可以伐火守水憂連三年土守中國利外不利王良五星在奎北居河中奉車御官其四星為天駟旁一星曰王良動為䇿馬亦曰梁為天橋客星守橋不通道前一星曰䇿主天子之僕移在王良前或居馬後是謂王良䇿馬車騎滿野閣道六星在王良前神所乘也天子遊别宫之道傅路一星在閣道南婁三星為天獄主牧養犧牲以供郊祀動搖兵聚金火守兵起天將軍十二星在婁北主武兵中大星天大將也南一星曰軍南門主誰何出入天倉六星在婁南南四星曰天庾積粟所也胃三星為天倉主倉廪五穀之府明五穀豐稔天囷十三星在胃南主給御糧天廪四星在昴南主蓄黍稷共饗祀太陵八星在胃北亦曰積京主大喪積京中星衆諸侯有喪民多疾兵起陵中一星曰積尸明則死人如山北九星曰天船一曰舟星所以濟不通也中一星曰積水候水災昴七星為髦頭金星也主西方主獄事明牢獄平六星明與大星等大水七星皆黃兵大起一星亡為兵喪搖動大臣下獄有白衣會大而動若跳躍邉兵大起天苑十六星在昴南養獸之所胃南衆星曰廥積即芻藁六星主積藁草不見牛馬暴死火守災起昴西一星曰天河主察山林妖變卷舌六星在昴北主口語知佞讒曲吉直而動有口舌之害中一星曰天讒主巫醫畢八星曰罕車為邉兵主戈獵其大星曰天高畢八星之一與後天高别四裔之尉明天下安逺方入貢失色邉亂動兵起月宿則多雨其大星旁小星為附耳搖動有讒亂臣在側明邉寇警入畢國起兵昴畢間二星為天街主國界其隂隂國陽陽國孟康曰隂河山已北國陽河山已南國土金守邉兵入參旗九星在參西天旗也王者斬伐當則旗曲直順理明而稀邉寇動畢附耳南八星曰天節主使臣天節下九星曰九州殊口曉方俗之官通重譯者九斿九星在玉井西南兵旗也動搖則九州分散信命不通金火守之亂起五車五星三柱九星在畢東北天子五兵車舍也西北大星曰天庫主太白秦也東北曰天獄主辰燕趙也東曰天倉主嵗衛魯也東南曰司空主鎮楚也西南曰卿星主熒惑魏也五車均明柱皆見則倉庫實不見其國絶食兵起三柱入出一月米貴三倍期二年出三月貴十倍期一年火入旱金入兵水入水其中五星曰天潢月五星入兵起天潢南三星曰咸池魚囿也金犯守之兵起火守災五車南六星曰諸王察諸侯存亡南一星曰天關亦曰天門日月之所行主邉事關閉芒角有兵五星守貴人多死畢東四星曰天高主望氣天苑南十三星曰天園植果萊之所觜觹三小星隅置為虎首主葆旅事金木守國易主井鉞前四星曰司怪主侯變異司怪北九星曰坐旗君臣設位之表參為白虎三星直者是為衡石三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黃帝占參應七將中三小星曰伐都尉也主朝參曰參伐又曰大辰又曰天市主斬刈又主權衡又主邉城為九譯不欲明動七將皆明天下兵精王道缺則芒角張伐星明與參等大臣謀兵起參失色軍散敗動搖邉候急兵起左足入玉井中兵大起秦大水若有喪玉井四星在參左足下主水漿東南四星曰軍井行軍之井也西南二星曰屏天厠四星在屏東下一星曰天矢矢黃吉青白黑凶南宫朱鳥東井八星主水衡法令之所平也一大星黃道之所經為天之亭候井明而端列王者用法平其西曲星曰鉞主斬奢淫明與井齊或搖動天子用鉞于大臣月宿井有風雨南河三星北河三星分夾井南北置而為戒南戒一曰陽門亦為越門北戒一曰隂門亦為燕門兩戒間七政之常道南星不見南道不通北亦如之動搖及火守中國兵起闕邱二星在河南天子之雙闕諸侯之兩觀金火守兵戰闕下天官書兩河天闕間為關梁五諸侯五星在井北主刺舉又主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史明大潤澤天下治芒角禍在中五諸侯南三星曰天樽主給貧綏積水一星在北河北供酒食之正積薪一星在積水東供庖厨之正水位四星在積薪西主水衡客星若水火守犯之百川溢井西南四星曰水府主水井南四星曰四瀆江淮河濟之精也狼一星在井東南為野將主侵掠狼角變色多盜賊下有九星曰􅋃天弓也主備盜賊常向狼動移邉兵大起狼􅋃張害及內天下乖亂又曰天弓張天下盡兵老人一星在􅋃南一曰南極常以秋分之旦見于丙春分之夕見于丁見則治平主夀昌軍市十三星在參東南天軍貿易之市野雞一星在軍市中主變怪軍市西南二星曰丈人丈人東二星曰子子東二星曰孫輿鬼四星天目也主視明察姦謀東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨變占之中一星為積尸一名質主死喪祠祀一曰鈇鑕主誅斬鬼明穀成不明百姓散質欲不明明兵起大臣誅故德成衡觀成潢衡太微廷潢五帝車舍傷成鉞禍成井誅成質索隱德成衡言有德公平者先成形于衡觀成潢言王者遊觀先成形于潢傷成鉞言王者敗德先成形于鉞禍成井井主水事火入天子且以火敗誅成質熒惑入輿鬼天質大臣有誅狼北七星曰天狗主守財弧南六星為天社鬼西北四星曰爟烽大之爟也邉警候爟栁八星為鳥注爾雅鳥喙謂之栁主木草又為厨宰主尚食和滋味明吉金火守國兵大起軒轅右角南三星曰酒旗主饗宴五星守天下大酺栁南六星曰外厨厨南一星曰天記主禽獸之齒七星頸為員官主急事又為天都主衣裳文繡星明王道昌暗則賢良不處天下空金火守國兵大起軒轅東四星曰內平平罪之官酒旗南三星曰天相丞相之象也七星南五星曰稷農正也張六星張素為厨主觴客主珍寶宗廟服用明王者行五禮得天之中金火守國兵大起張南十四星曰天廟天子之祖廟也客守祠官憂權衡衡太微三光之廷主理法平辭監升授德列宿受符諸神考節南藩中二星間曰端門東曰左執法西曰右執法所以舉刺凶姦左執法之東左掖門右執法之西右掖門東藩四星南第一上相其北東太陽門第二次相其北中華東門第三次將其北東太隂門第四上將所謂四輔也西藩四星南第一上將其北西太陽門第二次將其北中華西門第三次相其北西太隂門第四上相亦曰四輔也東西藩芒動搖諸侯謀執法移刑罰急月五星順入軌道司其出所守天子所誅也宋均云司察日月五星所守列宿若請官屬不去十日者天子誅之其逆入若不軌道以所犯命之中坐成形謂犯帝坐也皆羣下從謀也金火尤甚黃帝坐在太微中舍樞紐之神四帝星挾黃帝坐東方蒼帝靈威仰之神南方赤帝赤熛怒之神西方白帝白招矩之神北方黑帝叶光紀之神天子動得天度止得地意則五帝坐明坐北一星曰太子太子北一星曰從官坐東北一星曰幸臣屏四星在端門內所以壅蔽帝庭也郎位十五星在帝坐東北曰依鳥郎府郎主守衛星不具后妃死幸臣誅明大及客星入大臣為亂郎將在郎位北主武備虎賁一星在西藩北下名南靜室旄頭之騎官常陳七星在帝坐北宿衛以設疆禦搖動天子自出明武兵用微兵弱三台六星兩兩而居起文昌列抵太微近文昌二星曰上台為司命主夀次二星曰中台為司中主宗室東二星曰下台為司祿主兵又曰三台為天階一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人君臣和集如其常度有變則占中台之北一星曰太尊貴戚也左執法北一星曰謁者東北三星曰三公三公北三星曰九卿九卿西五星曰內五諸侯辟雍之禮得則太微諸侯明其西南角外三星曰明堂布政之宫明堂西三星曰靈臺觀臺也少微四星在太微西一名處士亦天子副主或曰南第一星處士第二議士第三博士第四大夫明大而黃則賢士舉月五星犯之處士女主憂南四星曰長垣主界域熒惑入之邉境騷動太白入之九卿謀權軒轅軒轅黃龍體十七星前大星女主也次北一星夫人也次北一星妃也其次諸星皆次妃之屬女主南小星女御也左一星少民后宗也右一星太民太后宗也色欲黃小而明月五星守犯者如衡占軒轅舊為七星之屬今從權衡之説入太微翼二十二星為羽翮主逺客又天之樂府明大禮樂興四國賔星動外國使來離徙天子舉兵翼南五星曰東區蠻夷也軫四星為車主風又主宰輔有軍出入占于軫星動車駕用轄傳軫兩旁主王侯左轄同姓右轄異姓明兵大起逺軫凶又曰車無轄國有憂就聚兵大起長沙一星在軫中主夀命不欲明明與四星等若五星入軫中兵大起晉志長沙明主夀長子孫昌與史異軫南三十二星曰器府樂器之府青邱七星在軫東南實主外國青邱西四星曰土司空主界域司空北二星曰軍門主營侯彪尾威旗甘氏星經星經文缺不備今取天官書晉志雜成之列宿各有所屬星還歸本屬而次天市垣于心尾之上太微垣于張翼之間者明部分之所在也尚史卷九十三
