body:
  text: 尚史卷九十三志一鑲白旗漢軍李鍇撰天文志易有太極是生兩儀兩儀未分其氣渾沌逮其既分則清陽為天濁隂為地是故天為元氣之始萬物之祖浮懸于上有宗動之樞左旋不已而王者法之亦建其極有所或戾則示變于上昭應于下董子曰天有喜怒之氣哀樂之心與人相副以類合之天人一也是故堯命羲和欽若昊天舜在璿璣玉衡以齊七政良以氣機消息於赫不逺而躋敬合德顧諟維先乎顧天無質以氣為質天無象以星為象古者包羲環規合矩因方出圓用通其術乃諸家遂鑿空立數丈尺隂陽是猶約風而挈其短長踵響而度其高下也不亦謬乎積微斯昭積久斯著後來者密述天文志古言天者有三家一曰蓋天二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存考驗周髀者即蓋天之説也其言天似蓋笠地法覆槃天地各中高外下北極之下為天地之中其地最高而滂沱四隤三光隱映以為晝夜天中高于外衡冬至日之所在六萬里北極下地高于外衡下地亦六萬里外衡高于北極下地二萬里天地隆高相從日去地恆八萬里日麗天而平轉分冬夏之間日前行道為七衡六間每衡周徑里數各依算術用勾股重差推晷影極遊以為逺近之數皆得于表股者也故曰周髀又周髀家云天圓如張蓋地方如棋局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西譬蟻行磨上磨疾蟻遲故隨磨以左回焉天形南高而北下日出高故見日入下故不見天之居如倚蓋故極在人北是其證也極在天之中而今在人北所以知天形如倚蓋也日朝出陽中暮入隂中隂氣暗冥故暮不見夏陽氣多隂氣少陽氣光明與日同暉日出即見故日長冬隂氣多陽氣少隂氣暗冥掩日之光雖出猶隱故日短宣夜之書云天了無質仰而瞻之高逺無極眼瞀精絶故蒼蒼然也譬旁望逺道之黃山而皆青俯察千仭之深谷而窈黑青非真色而黑非有體也日月衆星自然浮生虛空之中其行其止皆須氣焉是以七曜或逝或往或順或逆伏見無常進退不同由乎無所根繫故各異也故辰極常居其所而北斗不與衆星西沒也攝提填星皆東行日行一度月行十三度遲疾任情其無所繫著可知矣若綴附天體不得爾也渾天儀云天如雞子地如雞中黃孤居于天內天大而地小天表裏有水天地各乘氣而立載水而行周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運也黃帝書云天在地外水在天外水浮天而載地者也晉志虞喜安天論天高窮于無窮地深測于不測天確乎在上有常安之形地隤焉在下有居靜之體當相冒方則俱方員則俱員無方員不同之義其光耀布列各自運行猶江海之潮汐萬品之有行藏也虞聳穹天論天形窮隆如雞子幕其際周接四海之表浮于元氣之上譬如覆奩以抑水而不沒者氣充其中故也日繞辰極沒西而還東不出入地中天之有極猶蓋之有斗也天北下于地三十度極之傾在地卯酉之北亦三十度人在卯酉之南十餘萬里故斗極之下不為地中當對天地卯酉之位耳日行黃道繞極極北去黃道百一十五度南去黃道六十七度二至之所舍以為長短也姚信昕天論人為靈蟲形最似天今人頤前多臨胸而頃不能覆背近取諸身故知天之體南低入地北則偏高又冬至極低而天運近南故日去人逺而斗去人近北天氣至故冰寒也夏至極起而天運近北斗去人逺日去人近南天氣至故蒸熱也極之起時日行地中淺故夜短天去地高故晝長極之低時日行地中深故夜長天去地淺故晝短也月令章句天有純陽積剛運轉無窮其體運行包地之外左旋出地上而西入地下而東其繞北極七十度常見不伏天者何天之為言鎮也居高理下為人鎮也地者易也言養萬物懷任交易變化也天道所以左旋地道右周何以為天地動而不别行而不離猶君臣隂陽相對之義也君舒臣疾卑者易勞天所以反常行何以為陽不動無以行其教隂不靜無以成其化雖終日乾乾亦不離其處也白虎通春為蒼天夏為昊天秋為旻天冬為上天爾雅吕氏春秋天有九野中央曰鈞天東方曰蒼天東北曰變天北方曰玄天西北曰幽天西方曰皓天西南曰朱天南方曰炎天東南曰陽天廣雅九天之際曰九垠九天之外曰九陔凡天去地二億一萬六千七百八十一里半度地之厚與天高等天南北相去二億三萬三千五十七里二十五步東西短減四步春秋元命苞天不足西北陽極于九故天周九九八十一萬里孝經援神契周天七衡六間者相去萬九千八百三十三里合十一萬九千里從內衡至中衡中衡至外衡各五萬九千五里按讖緯雜説有以為周天三百六十五度四分度之一一度千九百二十二里天地相去十七萬八千五百里有以為一度二千九百三十二里周天百七萬一千里説皆荒謬天行可以數測體不可以數稽也子午卯酉為二繩丑寅辰巳未申戍亥為四鉤東北為報德之維西南為背陽之維東南為常羊之維西北為號通之維日冬至則斗北中繩隂氣極陽氣蒙故曰冬至為德日夏至則斗南中繩陽氣極隂氣蒙故曰夏至為刑隂氣極則北至北極下至黃泉故曰德在室陽氣極則南至南極上至朱天故曰德在野日冬至則水從之日夏至則火從之故五月火正而水漏十一月水正而隂勝陽氣為火隂氣為水水勝故夏至濕火勝故冬至燥八月二月隂陽氣均日夜分平故曰刑德合門德用則生刑用則殺故曰二月會而萬物生八月會而草木死淮南子春秋繁露天道大數相反之物也不得俱出隂陽是也春出陽而入隂秋出隂而入陽夏右陽而左隂冬右隂而左陽隂出則陽入陽出則隂入隂右則陽左陽左則陽右是故春俱南秋俱北而不同道夏交于前冬交于後而不同理並行而不相亂澆滑而各持分此之謂天之意天之道初薄大冬隂陽各從一方來而移于後隂由東方來西陽由西方來東至于中冬之月相遇北方合而為一謂之曰至别而相去隂適右陽適左適左者其道順適右者其道逆逆氣左上順氣右下故下暖而上寒以此見天之冬右隂而左陽上所右而下所左也冬月盡而隂陽俱南還陽南還出于寅隂南還出于戍此隂陽所始出地入地之見處也至于中春之月陽在正東隂在正西謂之春分春分者隂陽相半也故晝夜均而寒暑平隂日損而隨陽陽日益而鴻故為燒熱初得大夏之月相遇南方合而為一謂之曰至别而相去陽適右隂適左適右由下適左由上上暑而下寒以此見天之夏右陽而左隂也上其所右下其所左夏月盡而隂陽俱北還陽北還而入于申隂北還而入于辰此隂陽所始出地入地之見處也至于中秋之月陽在正西隂在正東謂之秋分秋分者隂陽相半也故晝夜均而寒暑平陽日損而隨隂隂日益而鴻故至于季秋而始霜至于孟冬而始大寒下雪而物咸成大寒而物畢藏天地之功終矣中宫天極星其紐星天之樞也天運無窮而極星不移後句四星第一星主月太子也第二星主日帝也太乙之坐最赤明者也第三星主五星庶子也第四星后宫也中星不明主不用事右星不明太子憂天官書其一明者太一常居後句四星末大星正妃餘三星後宫之屬環之匡衛十五星藩臣皆曰紫宫右圖經左藩八星南第一星曰左樞次北上宰次北少宰次北上弼次北少弼次北上衛次北少衛最北少丞右藩七星南第一星曰右樞次北少尉次北上輔次北少輔次北上衛次北少衛最北上丞史記作十二星四輔四星抱北極樞星主禮儀輔弼佐理六甲六星在華蓋之下杠星之旁主分隂陽配節候出入鉤陳六星在五帝座下為後宫星暗人主凶天皇大帝一星在鉤陳中其神曰耀魄寶華蓋十六星在五帝座上正吉傾邪凶杠九星為華蓋之柄星明匡主天下不明亂期八年國無主五帝內座下覆帝座五帝同座也御女四星在鉤陳北主八十一御女天柱五星近東垣主建二十四氣女史一星在天柱下掌記禁中極東一星曰柱下史主記過門內東南維五星曰尚書主納言隂德二星在尚書西主周給賑財史記前列直斗口三星隨北端兑若見若不曰隂德大理二星在宫門內主刑獄門外六星曰天牀主寢舍燕休西南角外三星曰內厨主六宫飲食相一星在斗南總領百司明吉輔一星象近臣明大如斗則奪政近斗為臣脅主內階六星在文昌北文昌六星在斗魁前六星各有名一上將二次將三貴相四司命五司中六司法文昌與三公攝提軒轅共為一體通占三公三星在斗柄東和隂陽齊七政天棓五星在女牀東北不用明明兵起天槍三星在斗柄東主天鋒武備槍棓八星備非常也傳舍九星在華蓋奚仲北主賔客之館客星守之兵起天厨六星在宫東星芒客守之大飢天一一星在宫門外主戰鬭明吉暗凶乘斗後九十日兵大起太一一星在天一南主十六神占如太一天牢六星在斗魁下貴人牢占同貫索天理四星在斗杓中主貴人牢勢四星在太陽守西北主刑獄太陽守一星主大臣備不虞傳舍西八星曰八穀主八穀一星亡一穀不登北斗七星所謂旋璣玉衡以齊七政杓擕龍角衡殷南斗魁枕參首用昏建者杓杓自華以西南夜半建者衡衡殷中州河濟之間平旦建者魁魁海岱以東北也斗為帝車運于中央臨制四鄉分隂陽建四時均五行移節度定諸紀皆繫于斗一天樞為土星主陽德二曰璇主金刑隂三曰璣主木及禍四曰權主火為伐五曰衡主水為煞六曰闓陽主木及五榖七曰瑶光主金亦為應星王有德斗齊明國昌暗則災起按五緯各有行次而金水二星則附日而行不得與木火土三星比甘氏星經于北斗之下曰五星入斗中國易政于文昌之下曰金星守兵大起是欲移黃道以迫紫宫不自知其説之踈也東宫蒼龍角南左角曰天津列宿之長北右角為天門天官書左角李右角將元命包左角理物以起右角將率而動中為天關日月五星皆從天關行角南二度為陽道入陽道旱北二度為隂道入隂道水木星守有赦火星守忠臣誅兵起天官書火犯守角則有戰大環繞鉤已者國大飢土守內主喜國有忿爭金守兵大盛水守刑罰急有水災客彗孛入兵起大喪亦軍敗城陷客守四十五日旱蝗平道二星在角間主道路進賢一星在平道西明賢士用天門二星在左角南主天門天田二星在角北主畿內地周鼎三星在大角西主神鼎庫樓十星五柱十五星衡四星在角南一曰文陳兵車之府中繁兵起中無星臣逆謀兵盡出柱半不具天子自將木星守飢天官書天庫樓庫有五車車星角若益衆及不具無處車馬南門二星在庫樓南天之外門平星二星在庫樓北平法獄事亢為天府又為疏廟主疾疫明天下寧日月蝕亢國中有事木星守有赦年豐久守水木火同守人死如草木火守多雨兵起水守大水土守萬物不成金守道不通彗孛犯之兵起大臣作亂攝提六星在亢東北攝提者直斗杓所指以建時節故曰攝提格主九卿為甲兵火守更主大角一星為天棟在攝提中主帝座金星守兵起月蝕王者惡之帝席三星在大角北不欲明明則王公凶亢池六星在亢北折威七星在亢南主斬殺陽門二星在庫樓東主隘塞頓頑二星在折威東主治獄氐為天根主后妃主疫日月犯君惡之木星守后喜火守大臣相譖久守有赦火星入之賊臣為亂期一年逺二年金星守兵起水守大水水入貴臣憂土守立太子久守兵起彗孛入氐後宫有異兵動梗河三星在大角北主天子鋒又主邉兵為喪故變動應以兵喪招搖一星在梗河北為天矛玄戈一星在招搖北為天盾皆主兵芒角五星守邉兵起騎官二十七星在氐南主天子騎虎賁星衆天下安星少五星守之兵起