body:
  text: 尚史卷七十三列傳五十一鑲白旗漢軍李鍇撰秦諸臣傳公孫枝公孫枝字子桑秦大夫也事穆公穆公九年僖九年齊㑹我師納晉惠公夷吾公謂枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也十三年僖十三年晉荐饑使乞糴于秦公謂枝曰與諸乎對曰重施而報君將何求重施而不報其民必携携而討焉無衆必敗謂百里奚曰與諸乎對曰天災流行國家代有救災恤鄰道也行道有福于是輸粟于晉韓之戰也晉使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命公使枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命及獲晉侯舍諸靈臺公子縶曰不如殺之無聚慝焉枝曰歸之而質其大子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平左傳百里奚之未遇也亡虢而虜晉飯牛于秦傳鬻以五羊之皮枝得而說之獻諸公三日請屬事焉公曰買之五羊之皮而屬事焉無乃天下笑乎枝對曰信賢而任之君之明也讓賢而下之臣之忠也君為明君臣為忠臣境內將服敵國且畏夫誰暇笑哉公遂用之吕氏春秋吕氏春秋繆公相百里奚晉使叔虎齊使東郭蹇如秦公孫枝請見之公曰請見客子之事歟對曰非也相國使子乎對曰不也公曰然則子事非子之事也秦國僻陋事服其任人事其事猶懼為諸侯笑今子為非子之事退將論而罪枝出自敷于百里氏百里奚請之公曰此所聞于相國歟枝無罪奚請有罪奚請焉百里奚歸辭公孫枝枝自敷于街百里奚令吏行其罪百里奚蹇叔百里奚史記作傒初事虞公晉獻公滅虞虢虜虞公與其大夫百里奚左傳僖五年晉襲虞滅之執虞公及其大夫井伯以媵秦穆姬井伯蓋即百里奚耶孟子晉假道于虞宫之竒諫百里奚不諫知虞公之將亡而去之秦以為秦穆公夫人婘于秦奚亡秦走宛楚鄙人執之穆公聞奚賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里奚在焉請以五羖羊皮贖之楚人遂許與之當是時奚年已七十餘公釋其囚與語國事謝曰臣亡國之臣何足問公曰虞君不用子故亡非子罪也固問語三日公大說授之政號曰五羖大夫說苑穆公使賈人載鹽徴諸賈人賈人買百里奚以五羖羊之皮使將車之秦穆公觀鹽見奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也公知其君子也與坐大說異日與公孫支論政支曰君其得聖人乎公曰然吾說夫奚之言支歸取雁以賀明日乃致上卿以讓奚韓詩外傳禽息薦百里奚不見納穆公出當車以頭擊闎腦乃精出曰臣生無補于國不如死也公感悟而用奚論衡同後漢書注引今本無奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣常游困于齊而乞食䬹人蹇叔收臣臣因而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君難是以知其賢于是公使人厚幣迎蹇叔以為上大夫晉獻公卒公使奚將兵納惠公夷吾于晉惠公卒復納文公史記公與晉師圍鄭鄭人與公盟公使大夫杞子逢孫揚孫戍之而還三十二年僖三十二年杞子自鄭使告于我曰鄭人使我掌其北門之管若潛師以來國可得也公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召百里孟明視西乞術白乙丙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉吕氏春秋繆公襲鄭蹇叔諫曰不可臣聞之襲國邑以車不過百里以人不過三十里皆以其氣之趫與力之盛至是以犯敵能滅今行數千里又絶諸侯之地以襲國臣不知其可也不聽蹇叔送師而哭曰師乎見其出而不見其入也蹇叔有子曰申與視與師偕行蹇叔謂其子曰晉遏師必於殽女死不于南方之岸必於北方之岸為吾尸女之易也明年我師及滑鄭知之杞子奔齊逢孫揚孫奔宋晉果敗我師于殽獲三帥左傳百里視西乞術附白乙丙百里視字孟明國語作子明百里奚之子也穆公三十二年僖三十二年公使百里視西乞術白乙丙帥師東襲鄭明年及滑鄭商人弦髙以乘韋先牛十二犒師且使遽告于鄭視曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晉敗我師于殽獲視術丙以歸已而文嬴晉文公夫人請之晉舍之中悔復使陽處父追之及諸河則在舟中矣釋左驂以公命贈視矯命贈馬欲使還拜謝因而執之視稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜晉人既歸三帥大夫及左右皆言于公曰是敗也視之罪也必殺之公曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政三十五年文二年視帥師伐晉報殽之役及晉師戰于彭衙我師敗績晉人謂之拜賜之師公猶用視視增修國政重施于民明年伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎穆公薨西乞術復事康公康公六年文十二年公使術如魯聘且言將伐晉魯公子遂辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也三辭術答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之魯厚賄之左傳由余由余其先晉人也亡入戎能晉言戎王聞穆公賢使由余觀秦公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以責督于下下罷極則以仁義怨望于上上下交爭怨而相篡弒至于滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也于是公退而問內史廖曰聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠于政公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡察而後令內史廖以女樂二八遺戎王戎王受而說之終年不還于是乃歸由余由余數諫不聽公又數使人間要由余由余遂去降秦公以客禮禮之問伐戎之形益國十二開地千里遂霸西戎史記韓非子戎王使由余聘于秦穆公問曰願聞得國失國何以由余對曰嘗以儉得之以奢失之昔者堯有天下飯于土簋飲于土鉶南北東西莫不賓服舜有食器斬山木而財之削鋸修之迹流漆墨其上輸之于宫諸侯以為益侈國之不服者十三禹作祭器墨染其外朱畫其內縵帛為茵蔣席額緣觴酌有采而樽俎有飾此彌侈矣國之不服者三十三殷人作大路建九旒食器雕琢觴酌刻鏤四壁堊墀茵席雕文此彌侈矣國之不服者五十三君子皆知文章矣而服者彌少臣故曰儉其道也由余出公召內史廖而告之使廖以女樂二八遺戎王戎王說之終嵗不還牛馬半死由余歸諫戎王弗聽由余遂去之秦公迎而拜之上卿新書由余曰乾肉不腐則左右親苞苴時有筐篚時至則羣臣附官無蔚藏腌陳時發則戴其上上少投之則下以軀償矣古之蓄其下者其施報如此雜家有由余三篇漢書論曰書所以記帝王之言也列國無得與而以秦誓終之若夫穆公之悔過也孟明再辱國而以修政重施終之亦善于補過者也由余之言矯世之弊已爾其去戎之秦也未必移戎俗于秦而秦霸矣繞朝任妄繞朝任大夫也康公七年文十三年士㑹在秦晉患之使魏壽餘僞叛以誘士㑹壽餘請以私邑自歸于秦公許之公師于河西將受魏邑魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先公使士㑹㑹將行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也士㑹遂歸晉左傳又有任妄者亦事康公康公築臺三年荆人起兵將以攻秦任妄曰饑召兵疾召兵勞召兵亂召兵君築臺三年今荆人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊荆人輟行韓非子公孫鞅公孫鞅者衛之庶孽公子其祖本姬姓也鞅少好刑名之學事魏相公叔痤為中庶子公叔痤知其賢未及進㑹痤病魏惠王親往問病曰公叔病有如不可諱將奈社稷何痤曰痤之中庶子公孫鞅年雖少有竒才願王舉國而聽之王默然王且去痤屏人言曰王即不聽用鞅必殺之無令出境王諾諾而去痤召鞅謝曰今者王問可以為相者我言若王色不許我我方先君後臣因謂王即弗用鞅當殺之王許我汝可疾去矣且見禽鞅曰彼王不能用君之言任臣又安能用君之言殺臣乎卒不去惠王既去而謂左右曰公叔病甚悲乎欲令寡人以國聽公孫鞅也豈不悖哉公叔痤既死鞅聞秦孝公下令國中求賢者將修繆公之業東復侵地乃遂西入秦因孝公寵臣景監以求見說孝公以彊國之術孝公大說公既用鞅鞅欲變法恐天下議已鞅曰疑行無名疑事無功且夫有髙人之行者固見非于世有獨知之慮者必見敖于民愚者暗于成事知者見于未萌民不可與慮始而可與樂成論至德者不和于俗成大功者不謀于衆是以聖人茍可以彊國不法其故茍可以利民不循其禮公曰善甘龍曰孝公臣不然聖人不易民而教不變法而治因民而教不勞而成功緣法而治者吏習而民安之鞅曰龍之所言世俗之言也常人安于故俗學者溺于所聞以此居官守法可也非所論于法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰亦孝公臣利不百不變法功不十不易器法古無過循禮無邪鞅曰不然治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多公曰善商子孝公曰善吾聞窮巷多吝曲學多辨愚者笑之智者哀焉狂夫之樂賢者喪焉拘世以議寡人不之疑矣于是遂出墾草令以鞅為左庶長卒定變法之令令民為什伍而相收司連坐不告姦者腰斬告姦者與斬敵首者同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率同律受上爵為私鬬者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥言收録其妻子沒為官奴婢宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次謂家有班次不使僭侈有功者顯榮無功者雖富無所芬華令既具未布恐民不信已乃立三丈之木于國都市南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金以明不欺卒下令令行于民期年秦民言初令不便者以千數于是大子犯法鞅曰法之不行自上犯之大子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民大說道不拾遺山無盜賊家給人足民勇于公戰怯于私鬬鄉邑大治秦民初言令不便者有言令便者鞅曰此皆亂化之民也盡遷之邊其後民莫敢議令韓非子公孫鞅曰行刑重其輕者輕者不至重者不來是謂以刑去刑于是以鞅為大良造即太上造秦之第十六爵名將兵圍魏安邑降之居三年築冀闕宫庭于咸陽秦自雍徙都之而令民父子兄弟同室內息者為禁集小都鄉邑聚為縣置令丞凡三十一縣為田開阡陌封疆而賦稅平平斗桶權衡丈尺行之四年公子䖍復犯約劓之居五年秦人富彊天子致胙于孝公諸侯畢賀國策商君治秦法令至行公平無私罰不諱强大賞不私親近法及太子黥劓其傅朞年之後道不拾遺民不妄取兵革大强諸侯畏懼然刻深寡恩特以强服之耳韓非子商君教秦以連什伍設告坐之過燔詩書而明法令塞私門之請遂公家之勞禁游宦之民顯耕戰之士新書衛鞅內刻刀鋸之刑外深鈇鉞之誅步過六尺者有罰棄灰于道者被刑一日臨渭而論囚七百餘人渭水盡赤號哭之聲動于天地其明年齊敗魏于馬陵其明年鞅說孝公曰秦之與魏譬人有腹心疾非魏并秦秦即并魏何者魏居嶺􅀈之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破于齊諸侯畔之可因此時伐魏魏不支秦必東徙秦據河山之固東鄉以制諸侯此帝王之業也孝公以為然使鞅將而伐魏魏使公子卬將而擊之軍既相距鞅遺公子卬書曰吾始與公子歡今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏公子卬以為然㑹盟已飲而鞅伏甲士襲虜卬因攻其軍盡破之以歸秦惠王兵數破于齊秦國內空日以削恐乃使使者割河西之地獻于秦以和而魏遂去安邑徙都大梁惠王曰寡人恨不用公叔痤之言也鞅既破魏還秦封之于商十五邑號為商君紀年秦封衛鞅于塢改名曰商鞅相秦十年宗室貴戚多怨望者孝公薨大子立公子䖍之徒告鞅欲反發吏捕鞅鞅亡至關下欲舍客舍客舍人不知其是商君也曰商君之法舍人無驗者坐之鞅喟然嘆曰嗟乎為法之敝一至此哉去之魏魏人怨其欺公子卬而破魏師弗受鞅欲之他國魏人曰鞅秦之賊秦彊而賊入魏弗歸不可遂內秦鞅既復入秦走商邑與其徒屬發邑兵北出擊鄭秦發兵攻鞅殺之于鄭黽池車裂鞅以徇曰莫如商鞅反者遂滅鞅之家史記國䇿孝公疾且不起欲傳商君辭不受孝公死惠王涖政有頃商君告歸人說惠王曰大臣太重者國危左右太親者身危今秦婦人嬰貌皆言商君之法莫言大王之法是商君反為主大王更為臣也且夫商君固大王之仇讎也願大王圖之商君歸還惠王車裂之而秦人不憐法家商君二十九篇兵權謀公孫鞅二十七篇漢書論曰商鞅之于孝公也四說而後入若鞅者髙論以猾中爾烏足識帝王之道哉周道陵夷古法初未盡變至鞅乃蕩然無遺迄于今嗟乎古不可復誰之罪歟其所著商子有更法墾命農戰去强開塞兵守來民賞刑畫䇿諸篇而間厠後事于篇中蓋非鞅之本書已然墾草農戰不外前法至去詩書禮樂以漓舊俗開後非鞅罪不可逭矣司馬錯司馬錯秦人也事惠王張儀既相秦苴蜀相攻擊華陽國志蜀王封其弟于漢中號曰苴侯命之邑曰葭萌苴與巴好巴蜀為讐故蜀王怒伐苴各來告急于秦王欲伐蜀以道險難至而韓又來侵欲先伐韓恐不利先伐蜀恐韓襲秦之敝錯與張儀爭論于王前史記錯欲伐蜀儀曰不如伐韓王曰請聞其說儀曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周主之罪侵楚魏之地周自知不能救九鼎寶器必出據九鼎按圗籍挾天子以令于天下天下莫敢不聽此王業也今夫蜀西僻之國而戎翟之長也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者于朝爭利者于市今三川周室天下之市朝也而王不爭焉顧爭于戎翟去王業逺矣錯曰不然臣聞之欲富國者務廣其地欲彊兵者務富其名欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願從事于易夫蜀西僻之國也而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊取其地足以廣國得其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡四海而諸侯不以為貪是我一舉而名實兩附焉而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危臣請謁其故周天下之宗室也齊韓周之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能禁此臣所謂危不如伐蜀之完也王曰善請聽子卒起兵伐蜀十月取之遂定蜀貶蜀主更號為侯而使陳莊相蜀蜀既屬秦秦益彊富厚輕諸侯國䇿樗里疾甘茂向壽附甘羅樗里子名疾秦惠王弟也紀年作褚里疾與惠王異母母韓女也疾滑稽多智秦人號曰智囊秦惠王八年爵疾右更使將而伐曲沃盡出其人取其城地入秦二十五年使疾將伐趙虜趙將軍莊豹拔藺明年助魏章攻楚敗楚將屈丐取漢中地秦封疾號為嚴君史記張儀殘之重而使之楚重貴重之因令楚王為之請相于秦儀謂王曰重樗里疾而使之者將以為國交也今身在楚楚王因為請相于秦臣聞其言曰王欲窮儀于秦乎臣請助王楚王以為然故為請相也今王誠聽之彼必以國事楚王大怒疾出走國䇿按秦䇿又曰秦惠王死公孫衍欲窮張儀李讐謂衍曰不如召甘茂于魏召公孫顯于韓起樗里子于國三人者皆張儀之讐也是儀嘗逐疾史不載也惠王薨武王即位逐張儀魏章而以樗里疾甘茂為左右丞相使甘茂攻韓拔宜陽使疾以車百乘入周周以卒迎之意甚敬楚王怒讓周以其重秦客游騰為周說楚王曰智伯之伐仇猶遺之廣車因隨之以兵仇猶遂亡何則無備故也齊桓公伐蔡號曰誅楚其實襲蔡今秦虎狼之國使樗里子以車百乘入周周以仇猶蔡觀焉故使張㦸居前彊弩在後名曰衛疾而實囚之且夫周豈能無憂其社稷哉恐一旦亡國以憂大王楚王乃悅武王薨昭王即位疾又益尊重昭王元年疾將伐蒲紀年褚里疾圍蒲不克而秦惠王薨蒲守恐請胡衍胡衍為蒲謂疾曰公之攻蒲為秦乎為魏乎為魏則善矣為秦則不為賴矣夫衛之所以為衛者以蒲也今伐蒲入于魏衛必折而從之魏亡西河之外而無以取者兵弱也今并衛于魏魏必彊魏彊之日西河之外必危矣且秦王將觀公之事害秦而利魏王必罪公疾曰奈何胡衍曰公釋蒲勿攻臣試為公入言之以德衛君疾曰善胡衍入蒲謂其守曰樗里子知蒲之罪矣其言曰必拔蒲衍能令釋蒲勿攻蒲守恐因再拜曰願以請因效金三百斤曰秦兵茍退請必言子于衛君使子為南面故胡衍受金于蒲以自貴于衛于是遂解蒲而去史記疾及楚攻魏皮氏或為魏謂楚王曰秦楚勝魏魏恐亡必合于秦王何不背秦與魏魏喜必內太子秦恐失楚必效城地王復與之攻魏可也楚王曰善乃背秦而與魏魏內太子秦恐許楚城地欲與之復攻魏疾怒欲與魏攻楚恐魏以太子在楚不肯也或為疾謂楚王曰外臣疾使臣謁之曰敝邑之王欲效城地而為魏太子之尚在楚也王出魏質臣請效之而復固秦楚之交以疾攻魏楚王出魏太子秦因合魏以攻楚國䇿昭王七年疾卒葬于渭南章臺之東曰後百嵗當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙智則樗里樗里疾室在渭南隂鄉樗里故俗謂之樗里子甘茂者下蔡人也事下蔡史舉先生學百家之說因張儀樗里疾而見惠王王悅之使將而佐魏章略定漢中地惠王薨武王即位張儀魏章去東之魏蜀相壯反華陽國志秦滅蜀封公子通為蜀侯以陳壯為相壯反殺通秦誅壯封子暉為蜀侯史記云蜀侯暉相壯反誤使茂定蜀還以茂為左丞相史記張儀將相魏欲假秦兵以救魏左成謂茂曰不如豫之魏不反秦兵張子不反秦魏若反秦兵張子得志于魏不敢反于秦矣張子不去秦張子必髙子言儀無捨秦之心必重茂欲茂以秦資之也張儀又欲以漢中與楚請王曰有漢中蠧種樹不處者人必害之家有不宜之財則傷今漢中南邊為楚利此國纍也茂謂王曰地大者固多憂乎天下有變王割漢中與楚和楚必畔天下而與王王今以漢中與楚即天下有變王何以市楚也三年王謂茂曰寡人欲容車通三川以窺周室而寡人死不朽乎茂曰請之魏約以伐韓而令向壽輔行茂至謂壽曰子歸言之于王曰魏聽臣矣然願王勿伐事成盡以為子功向壽歸以告王王迎茂于息壤茂至王問其故對曰宜陽大縣也上黨南陽積之久矣名曰縣其實郡也今王倍數險行千里攻之難臣聞張儀西并巴蜀之地北取西河之外南取上庸天下不以多張儀而賢先王魏文侯令樂羊將攻中山三年而拔之樂羊反而語功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功主君之力也今臣羈旅之臣也樗里疾公孫衍二人者挾韓而議王必聽之是王欺魏而臣受公仲朋韓相之怨也昔者曾子處費費人有與曾子同名族者殺人人告其母曰曾參殺人母織自若也有頃人又曰曾參殺人母尚織自若也頃之一人又告之曰曾參殺人母懼投杼踰墻而走夫以曾參之賢與母之信也而三人疑之則慈母不能信也今臣之賢不及曾子而王之信臣又不如曾子之母也疑臣者不適三人臣恐王為臣之投杼也王曰寡人不聽也請與子盟于是與之盟于息壤果攻宜陽五月而不拔樗里疾公孫衍爭之王王將聽之召茂而告之茂曰息壤在彼王曰有之因悉起兵復使茂攻之茂攻宜陽三鼓而卒不上秦之右將有尉對曰公不論兵必大困茂曰我羈旅而得秦相者我以宜陽餌王令攻宜陽而不拔公孫衍樗里疾挫我于內而公仲以韓窮我于外是無伐之日已請明日鼓之而不可下因以宜陽之郭為墓于是出私金以益公賞明日鼓之而宜陽拔宜陽既拔楚畔秦而合于韓王懼茂曰楚雖合韓不為韓氏先戰韓亦恐戰而楚有變其後韓楚必相御也楚言與韓而不餘怨于秦臣是以知其御也言二國雖合猶相疑故自相制御也茂約秦魏而攻楚楚之相秦者屈蓋為楚合于秦秦啓關而聽楚使茂謂王曰訹于楚訹誘也而不使魏制和楚必曰秦鬻魏魏不說而合于楚楚魏為一國恐傷矣王不如使魏制和魏制和必說王不惡于魏則寄地必多矣國䇿韓既與秦平武王竟至周而薨于周弟昭王即位王母宣太后楚女也史記國䇿武王謂甘茂曰楚客來使者多健與寡人爭辭寡人數窮焉為之奈何對曰王勿患也其健者來使王勿聽其事其需弱者來使王必聽之然則需弱者用而健者不用矣王因而制之又曰甘茂相秦王愛公孫衍因自謂之曰寡人且相子茂之吏道而聞之以告茂茂因入見曰王得賢相敢再拜賀王曰寡人託國于子焉更得賢相對曰王且相犀首王曰子焉聞之對曰犀首告臣王怒犀首之泄也乃逐之楚圍韓雍氏韓使求救于秦冠蓋相望也太后楚人不肯救秦師不下殽韓又令尚靳使秦謂昭王曰韓之于秦也居為隱蔽出為雁行今韓已病矣秦師不下殽臣聞之唇揭者其齒寒願王熟計之韓又使張翠張翠稱病日行一縣翠至茂曰韓急矣先生病而來翠曰未急也急則折而入于楚矣臣安敢來茂曰先生毋復言入言于王曰公仲柄得秦師故敢捍楚今雍氏圍而秦師不下殽是無韓也公仲且抑首而不朝公叔且以國南合于楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣不識坐而待伐孰與伐人之利王曰善果下師于殽以救韓國䇿秦使向壽平宜陽而使樗里疾甘茂伐魏皮氏向壽者宣太后外族也與王少相長故任用向壽如楚楚聞秦之貴向壽而厚事向壽向壽為秦守宜陽將以伐韓史記韓為公仲謂向壽曰禽困覆車公破韓辱公仲公仲收國復事秦自以為必可以封今公與楚解解言解讐復好中封小令尹以桂陽中言使楚自封之國中桂陽荆州郡史記作公與楚解口地封小令尹以杜陽索隱注解口秦地名近韓杜陽秦地說誤秦楚合復攻韓韓必亡公仲躬率其私徒以鬬于秦願公熟計之向壽曰吾合秦楚非以當韓也子為我謁之公仲曰秦韓之交可合也對曰願有復于公諺曰貴其所以貴者貴王之愛習公也不如公孫郝其智能公也不如甘茂今二人者皆不得親于事而公獨與王至斷于國者彼有以失之也公孫郝黨于韓而甘茂黨于魏故王不信也今秦楚爭彊而公黨于楚是與公孫郝甘茂同道也公何以異之人皆言楚之多變也而公必亡之是自為貴也公不如與王謀其變也善韓以備之若此則無禍矣韓氏先以國從公孫郝而後委國于甘茂是韓公之讐也今公言韓以待楚是外舉不避讐也向壽曰吾甚欲韓合對曰甘茂許公仲以武遂反宜陽之民今公徒收之甚難向壽曰然則奈何武遂終不可得也對曰公何不以秦為韓求潁川于楚此韓之寄地也公求而得之是令行于楚而以其地德韓也公求而弗得是韓楚之怨不解而交走秦也秦楚爭彊而公過楚以攻韓此利于秦謂以攻韓為楚過也史記作過楚以收韓向壽曰奈何對曰此善事也甘茂欲以魏取齊公孫郝欲以韓取齊今公取宜陽以為功收楚韓以安之而誅齊魏之罪是公孫郝甘茂無事也甘茂竟言之王以武遂復歸之韓國䇿向壽公孫郝爭之不能得向壽公孫郝由此怨讒茂茂懼輟伐魏皮氏亡去樗里疾與魏講罷兵史記茂亡秦且之齊出關遇蘇代曰君聞夫江上之處女乎江上之處女有家貧無燭者處女相與語欲去之無燭者曰妾以無燭故常先至掃室布席何愛于餘明之照四壁者幸以賜妾處女相與語以為然而留之今臣不肖棄逐于秦願為足下掃室布席幸無我逐也蘇代曰善請重公于齊乃西說秦王曰甘茂賢人非恆士也其居秦纍世重矣自殽塞溪谷地形險易盡知之彼若以齊約韓魏反以謀秦是非秦之利也王曰然則奈何蘇代曰不如重其贄厚其祿以迎之彼來則置之槐谷史記作鬼谷終身勿出王曰善與之上卿以相迎之齊茂辭不往蘇代謂齊王曰甘茂賢人也今秦與之上卿以相迎之茂德王之賜故不往願為王臣王何以禮之以甘茂之賢得擅用彊秦之衆則難圖也齊王曰善賜之上卿命而處之秦因復茂之家以市于齊齊使茂于楚楚懷王新與秦合婚而歡而秦聞茂在楚使謂楚王曰願送甘茂于秦楚王問于范環史記作范蜎曰寡人欲置相于秦孰可對曰臣不足以知之楚王曰吾相甘茂可乎對曰不可夫史舉上蔡之監門也大不知事君小不知處室以苛亷聞于世苛小草甘茂事之順也故惠王之明武王之察張儀之好譖甘茂事之取十官而無罪茂誠賢者也然而不可相秦秦之有賢相非楚之利也且王嘗用召滑于越而納句章昧之難句章屬㑹稽昧唐昧楚將二十八年齊秦韓魏共攻楚殺昧史記作內行章義之難誤越亂故楚南察瀨湖而野江東計王之功所以能如此者越亂而楚治也今王用之于越而忘之于秦臣以為王巨速忘矣王若欲置相于秦若公孫郝者可史記作向壽夫公孫郝之于秦王親也少與之同衣長與之同車被王衣以聽事真大王之相已于是茂竟不得復入秦卒于魏茂有孫曰甘羅羅年十二事秦相文信侯吕不韋為庶子吕不韋欲攻趙以廣河間使蔡澤事燕三年而燕太子丹質于秦吕不韋因請張唐相燕張唐辭曰燕者必徑于趙趙人得唐者受百里之地吕不韋去而不快羅曰君侯何不快甚也吕不韋曰吾令蔡澤事燕三年而燕太子已入質矣今吾自請張卿相燕而不肯行羅曰臣行之吕不韋叱去曰我自行之而不肯汝安能行之羅曰夫項槖生七嵗而為孔子師今生十二嵗于兹矣君其試臣奚遽叱也羅見張唐曰卿之功孰與武安君唐曰武安君戰勝攻取不知其數攻城墮邑不知其數臣之功不如也羅曰應侯之用于秦也孰與文信侯專曰應侯不如文信侯専曰卿明知其不如與曰知之羅曰應侯欲伐趙武安君難之去咸陽七里絞而殺之今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣唐曰請因孺子而行行有日矣羅謂吕不韋曰借臣車五乘請為張唐先報趙見趙王趙王郊迎謂趙王曰聞燕太子丹之入秦與曰聞之聞張唐之相燕與曰聞之燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺則伐趙危矣燕秦不相欺者無異故欲攻趙而廣河間也今王齎臣五城以廣河間請歸燕太子與彊趙攻弱燕趙王立割五城以廣河間秦歸燕太子與趙攻燕得上谷三十六縣與秦十一羅還報秦封羅為上卿復以始甘茂田宅賜之國䇿論曰樗甘柄秦厠乎嚴察噂沓之間而順焉智則多已張儀宿號多智然伐蜀之形獨失之錯卒之宜陽力拔三川道通事故祖儀唯先後爾尚史卷七十三
