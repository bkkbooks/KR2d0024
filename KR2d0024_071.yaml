body:
  text: 尚史卷七十一列傳四十九鑲白旗漢軍李鍇撰田齊諸臣傳匡章章子匡章齊人也為得罪于父不得近出妻屏子終身不養焉孟子威王時秦假道韓魏以攻齊王使章將而應之與秦交和而舍軍門曰和使者數相往來章變其徽章以雜秦軍候者言章以齊入秦王不應頃間候者復言章以齊兵降秦王不應而此者三有司請曰言章之敗者異人而同辭王何不發將而擊之王曰此不叛寡人頃間言齊兵大勝左右曰何以知之曰章之母啟得罪其父其父殺之而埋馬棧之下吾使章將也勉之曰夫子全兵而還必更葬將軍之母對曰臣非不能更葬臣之母也臣之母得罪臣之父臣之父未教而死夫不得父之教而更葬母是欺死父也故不敢夫為人子而不欺死父豈為人臣欺生君哉齊策當湣襄時有章子齊令章子將而與韓魏攻荆荆令唐蔑拒之軍相當六月而不戰齊令周最趣章子急戰辭甚刻章子對曰殺之免之殘其家王能持此于臣不可以戰而戰可以戰而不戰王不能得此于臣與荆人夾泚水而軍章子令視水可絶者荆人射之不可得近有芻水旁者告齊候者曰荆人所盛守者其淺者所簡守其深者也候者載芻者見章子章子練卒夜奄荆人所盛守殺唐蔑吕氏春秋騶忌騶忌者成侯也忌初以鼔琴見威王王説而舍之右室須臾王鼓琴忌推户入曰善哉鼔琴王勃然不說去琴按劒曰夫子見容未察何以知其善也忌曰夫大弦濁以春温者君也小弦廉折以清者相也攫之深醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音忌曰何獨語音夫治國家而弭人民皆在其中王又勃然不說曰若夫語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間忌曰夫大弦濁以春温者君也小弦廉折以清者相也攫之深而醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民無若乎五音者王曰善忌見三月而受相印淳于髠見之曰善説哉髠有愚志願陳諸前忌曰謹受教髠曰得全全昌失全全亡忌曰謹受令請謹母離前髠曰豨膏棘軸所以為滑也然而不能運方穿忌曰謹受令請謹事左右言毎事須順從也髠曰弓膠昔幹所以為合也然而不能傅合疏罅昔久舊也考工作㭊言膠幹可以勢暫合而久亦不能常傅合于疎罅隙縫忌曰謹受令請謹自附于萬民髠曰狐裘雖弊不可補以黄狗之皮忌曰謹受令請謹擇君子母雜小人其間髠曰大車不較不能載其常任琴瑟不較不能成其五音忌曰謹受令請謹修法律而督姦吏髠說畢趨出至門而面其僕曰是人者吾語之微言五其應我若響之應聲是人必封不久矣居期年封以下邳號曰成侯史記世家新序齊稷下先生喜議政事騶忌既為齊相稷下先生淳于髠之屬七十二人皆輕忌以為設以微辭忌必不能及乃相與俱往見忌淳于髠之徒禮踞騶忌之禮卑淳于髠等稱辭忌知之如應響淳于髠等辭詘而去忌之禮踞淳于髠之禮卑忌長八尺有餘而形貌昳麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及君也城北徐公齊國之美麗者也忌不自信復問其妾曰吾孰與徐公美妾曰徐公何能及君也旦日客從外來與坐談問之曰吾與徐公孰美客曰徐公不若君之美也明日徐公來孰視之自以為不如窺鏡而自視又弗如逺甚暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也客之美我者欲有求于我也于是入朝見王曰臣誠知不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求于臣皆以為美于徐公今齊地方千里百二十城宫婦左右莫不私王朝廷之臣莫不畏王四境之内莫不有求于王由此觀之王之蔽甚矣王曰善乃下令羣臣吏民能面刺寡人之過者受上賞上書諫寡人者受中賞能謗議于市朝聞寡人之耳者受下賞説苑威王遊于瑤臺成侯卿來奏事從軍羅綺甚衆王曰國至貧也何出之盛也成侯卿至上謁王曰國至貧也何出之盛也成侯卿曰忌舉田忌子為西河而秦梁弱忌舉田解子為南城而楚人抱羅綺而朝忌舉黔涿子為㝠州而燕人給牲趙人給盛忌舉田種首子為即墨而于齊足究忌舉北郭刁勃子為大士而九族益親民益富舉此數良人王枕而卧耳何國之貧哉忌為相田忌為將不相説公孫閈曰公何不為王謀伐魏勝則是君之謀也可以有功不勝田忌不進戰而不死曲撓而誅忌以為然乃説王使田忌伐魏田忌三戰三勝忌以告公孫閈閈使人操十金往卜于市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉否卜者出因令人捕為人卜者驗其辭于王前田忌遂走史記世家田忌率其徒襲攻臨淄求成侯不勝而奔威王薨忌與晏首並事宣王忌仕人衆宣王不説晏首仕人寡宣王説之忌謂宣王曰忌聞以為有一子之孝不如有五子之孝今首之所進仕者以幾何人宣王因以晏首壅塞之而善忌國策公孫閈晏首皆齊人閈見後傳田忌田忌是為田臣思紀年謂之徐州子期齊族也事威王為將與相成侯騶忌不相説忌出走宣王即位召而復之宣王二年魏伐趙趙與韓共擊魏趙不利敗于南梁韓請救于齊王召大臣而謀曰早救之孰與晚救之便張丐對曰晩救之韓且折而入于魏不如早救之忌曰不可夫韓魏之兵未敝而我救之我代韓受魏之兵顧反聴命于韓也且夫魏有破韓之志韓見且亡必東愬于齊我因結韓之親而晚承魏之敝則國可重矣王曰善乃隂告韓使者而遣之韓自以有齊五戰五不勝東愬于齊齊因起兵擊魏大破之馬陵係太子申禽龎涓魏破韓弱韓魏之君因田嬰北面而朝王忌既破魏孫臏謂之曰將軍可以為大事乎忌曰奈何孫臏曰將軍無解兵而入齊使彼罷敝于先言齊軍雖勝亦罷使之當前弱守于主主地缺葢齊險隘主者循軼之途也軼轍同言不得方軌適相循也鎋擊摩車而相過使彼罷敝先弱守于主必一而當十十而當百百而當千然後背太山左濟右天唐軍重踵髙宛使輕車鋭騎衝雍門若是則齊君可正而成侯可走不然則將軍不得入矣忌不聴果不得入亡而之楚騶忌代之相恐忌欲以楚權復于齊杜赫曰臣請為留楚謂楚王曰騶忌所以不善楚者恐田忌以楚權復于齊也王不如封田忌于江南以示忌之不返齊也騶忌必以齊厚事楚田忌亡人也而得封必徳王若復于齊必以齊事楚此用二忌之道也楚果封忌于江南既而再復于齊事閔王復齊事策不載然閔王時復見田臣思知其再復也或疑是二人索隠注則以為田臣思即田忌閔王七年張儀以秦魏伐韓王曰韓吾與國也秦伐之吾將救之忌曰王之謀過矣不如聴之子噲與子之國百姓不戴諸侯弗與秦伐韓楚趙必救之是天以燕賜我也王曰善乃許韓使者而還之韓自以得交于齊遂與秦戰楚趙果救韓齊因起兵攻燕三十日而舉燕國國策史記世家作桓公五年誤論曰伯禹戒舜曰知人則哲惟帝其難之奸回害正以譽不以毁哲之所以為難也騶忌走田忌詘晏首二忌不相容惡見其戰勝于朝廷田嬰靖郭君田文孟嘗君田嬰者是為靖郭君諸田之子也史記齊威王少子而宣王庶弟誤嬰自威王時任職用事與騶忌及田忌將而救韓伐魏威王薨事宣王宣王七年嬰使于韓魏韓魏服于齊嬰與韓昭侯魏惠王㑹王東阿南盟而去復與魏惠王㑹甄紀年梁惠王之後元十一年㑹齊于平阿十三年㑹齊威公于甄九年嬰相齊史記十年楚敗齊師于徐州欲逐嬰于齊嬰恐張丑謂楚王曰王戰勝于徐州田肹不用也肹有功于國百姓為之用田嬰不善而用申縛申縛者大臣弗與百姓弗為也故王勝之也今嬰逐肹必用復整其士卒以與王遇必不便于王矣楚王因弗逐嬰相齊十一年宣王薨閔王即位三年封嬰于薛紀年梁惠王後元十三年四月齊威王封田嬰于薛十月齊城薛十四年薛子嬰來朝十五年齊威王薨嬰初封彭城嬰謂王曰五官之計曲禮司徒司空司馬司士司冦典司五衆計其事之凡也不可不日聽而數覽也王曰説吾而厭之言汝説我則不覽而自厭乃以委嬰國策初嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文于嬰嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與戸齊將不利其父母文曰人生受命于天乎將受命于戸邪嬰黙然文曰必受命于天君何憂焉必受命于戸則髙其戸耳誰能至者嬰曰子休矣久之文承間問其父曰子之子為何曰為孫孫之孫為何曰為𤣥孫𤣥孫之孫為何曰不能知也文曰君用事相齊至今三王矣齊不加廣而私家富累萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得短褐僕妾餘粱肉而士不厭糟糠今君又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之于是嬰乃禮文使主家待賓客賓客日進名聲聞于諸侯諸侯皆使人請嬰以文為太子嬰許之嬰卒諡為靖郭君而文果代立于薛是為孟嘗君史記孟嘗君在薛荆人攻之淳于髠為齊使于荆還反過薛文令人體貌而郊迎之謂淳于髠曰荆人攻薛夫子弗憂文無以復侍矣淳于髠曰敬聞命至于齊畢報王曰何見于荆對曰荆甚固而薛亦不量其力王曰何謂也對曰薛不量其力而為先王立清廟荆固而攻之清廟必危故曰薛不量其力而荆亦甚固齊王和其顔色曰譆先君之廟在焉疾興兵救之國策文在薛招致諸侯賔客及亡人有罪者皆歸文文舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等文待客坐語而屏風後常有侍史主記君所與客語問親戚居處客去文已使使存問獻遺其親戚文嘗待客夜食有一人蔽火光客怒以飯不等輟食辭去文起自持其飯比之客慙自剄士以此多歸文文客無所擇皆善遇之人人各自以為孟嘗君親已吕氏春秋唐子短陳餅子于齊威王威王欲殺之陳餅子亡奔薛孟嘗君以車迎之至而養以芻豢黍粱冬被裘罽夏服絺紵出乗牢車駕馬問之曰夫子何思于齊曰臣思夫唐子孟嘗君曰唐子非短子者邪何為思之曰自唐子之短臣也以身歸君食芻豢飯禾粢服輕暖乗牢良臣故思之按孟嘗君不當威王時説誤國䇿孟嘗君奉夏侯章以四馬百人之食遇之甚勤夏侯章每言未嘗不毁之或告孟嘗君孟嘗君曰文有以事夏侯公矣勿言董之繁菁問夏侯公夏侯公曰毁之以為之也君所以得為長者以吾毁之也吾以身為孟嘗君國策孟嘗君謂三先生曰願聞先生有以補文闕也一人曰訾天下之王有侵君者臣請以血湔其袵田瞀曰車軼之所至請掩足下之短誦足下之長千乗之君萬乗之長其欲有君也如使而弗及也勝臀曰臣願以足下之府庫財物收天下之士為君決疑應卒若魏文侯之有田子方段干木也國策孟嘗君舍人有與君之夫人相愛者或曰舍人亦甚不義矣請殺之君曰覩貌而相愛者人之情也錯之勿言居期年君召愛夫人者而謂之曰衛君與文布衣交請具車馬皮幣願君從衛君遊舍人遊于衛甚重衛君欲約天下之兵攻齊是人謂君曰孟嘗君不知臣不肖以臣欺君且臣聞齊衛先君刑馬壓羊盟曰齊衛相攻伐者如此今約天下之兵攻齊是背盟約而欺孟嘗君也君聽臣則可不聽臣輒以頸血湔足下衿衛君乃止齊人聞之曰孟嘗君善為事矣轉禍為功說支離韓詩外傳孟嘗君請學于閔子使車往迎閔子曰禮有來學無往教致師而學不能禮往教則不能化君也君所謂不能學臣所謂不能化者也孟嘗君曰敬聞命矣明日袪衣請受業秦昭王聞其賢乃先使涇陽君為質于齊以求見文文將入秦賓客莫欲其行諫不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生于土敗則歸土今天雨流子而行未知所止息也今秦虎狼之國也而君欲往如有不得還得無為土偶人所笑乎文乃止二十五年復卒使文入秦昭王即以文為秦相人或説昭王曰孟嘗君賢而又齊族也今相秦必先齊而後秦秦必危矣于是昭王囚文謀欲殺之文使人抵昭王幸姬求解幸姬曰妾願得狐白裘此時文有狐白裘直千金天下無雙入秦獻之昭王更無他裘文患之徧問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦王幸姬幸姬為言昭王昭王釋文文得出即馳去更封傳變名姓以出闗夜半至函谷闗昭王後悔出文求之已去即使人馳傳逐之文至關關法雞鳴而出客文恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出出如食頃秦追果至關已後文出乃還始文列此二人于賓客賓客盡羞之及文有秦難卒此二人拔之自是之後客皆服文過趙趙平原君客之趙人聞文賢出觀之皆笑曰始以薛公為魁然也今視之乃眇小丈夫耳文聞之怒客與俱者下斫擊殺數百人遂滅一縣以去閔王不自得以其遣文文至則以為齊相任政國策齊王夫人死為七孺子皆近田文欲知王所欲立乃獻七珥美其一明日視美珥所在勸王立為夫人韓非子齊王問于文曰治國何如對曰夫賞罰之為道利器也君固握之不可以示人若如臣者猶獸鹿也唯薦草而就文以齊為韓魏攻楚又與韓魏攻秦而藉兵食于西周韓慶國䇿作韓慶史記作蘇代為西周謂文曰君以齊為韓魏攻楚九年取宛葉以北以强韓魏今又攻秦以益之韓魏南無楚憂西無秦患則地廣而益重齊必輕矣夫本末更盛虚實有時竊為君危之君不如令敝邑隂合于秦而君無攻又無藉兵食君臨函谷而無攻令敝邑以君之情謂秦王曰薛公必不破秦以張韓魏所以進兵者欲王令楚割東國以與齊而秦出楚王以為和君令敝邑以此惠秦秦得無攻而以楚之東國自免也必欲之楚王得出必徳齊齊得東國而益强而薛世世無患秦不大弱而處之三晉之西三晉必重齊文曰善因令韓慶入秦使三國無攻秦而不藉兵食于西周居數年人或毁文于王曰孟嘗君將為亂及田甲刼王王意疑文文乃奔薛既而復召文文因謝病歸老于薛史記史記孟嘗君相齊其舍人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子及孟嘗君奔薛魏子所與粟賢者聞之乃上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君按此葢參馮煖與愛夫人者二事而成説也詳馮煖傳文既免吕禮相禮秦亡將或謂文曰周最于王厚也而逐之聽祝弗相吕禮者弗齊人史記作親弗欲取秦也秦齊合弗與禮重矣有齊秦必輕君君弗如急北兵趨趙以秦魏秦魏之上當有攻字收周最以為後行且反齊王之信言與趙攻秦魏收最用之可圖後舉又齊前與秦合今與趙攻之信反也又禁天下之率率猶從也謂從齊齊無秦天下果果猶決弗必走齊王誰與為其國言必重孟嘗君也文從其計乃為魏謂秦魏冉曰文聞齊王欲以吕禮收齊以濟天下君必輕矣齊秦相聚以臨三晉禮必并相之是君收齊以重吕禮也齊免于天下之兵其讐君必深君不如勸秦王令敝邑薛也卒攻齊之事齊破文請以所得封君齊破晉强晉謂魏秦王畏晉之强也必重君以取晉齊予晉敝邑而不能支秦薛雖文舊封而屬齊齊破畏魏且取薛予魏魏雖得薛而實弱不能當秦晉必重君以事秦是君破齊以為功操晉以為重也破齊定封而秦晉皆重君若齊不破吕禮復用子必大窮矣于是魏冉言于秦昭王伐齊而吕禮亡史記吕禮相齊欲困蘇代代説孟嘗君北兵趨趙以和秦魏孟嘗君從之而吕禮嫉害孟嘗君孟嘗君懼乃遺魏冉書使秦伐齊説與國策異而云和秦魏者亦非是後王滅宋益驕欲去文文恐乃如魏魏昭王以為相韓非子薛公之相魏昭侯也有欒子曰陽湖潘其于王甚重而不為薛公薛公患之召與之博予之人百金令之昆弟博俄又益之人二百金方博有間謁者言客張季之子在門公怫然怒撫兵授謁者曰殺之吾聞季之不為文也時季羽在側曰不然竊聞季為公甚顧其人隂未聞耳乃不殺客大禮之曰曩者聞季之不為文也故欲殺之今誠為文豈忘季哉告廩獻千石之粟告府獻五百金告騶私廐獻良馬固車二乗令奄將宫人之美妾二十人并遺季也欒子因相謂曰為公必利不為公必害吾曹何愛不為公因競勸而為之又曰昭王謂孟嘗君曰寡人欲與官事君曰王欲與官事何不試習讀法昭王讀法十餘簡而睡卧矣曰寡人不能讀此法秦將伐魏魏王聞之夜見文曰秦且攻魏奈何文曰有諸侯之救則可王曰寡人願子之行也為之約車百乗文之趙謂趙王曰願借兵以救魏趙王曰寡人不能文曰夫借兵者忠王也曰可得聞乎曰夫趙之兵非强于魏也然而趙之地不嵗危而民不嵗死魏之地嵗危而民嵗死者以其西為趙蔽也今趙不救魏魏歃盟于秦是趙與强秦為界也地亦且嵗危民亦且嵗死矣此文之所以忠于王也趙王許諾為起兵十萬車三百乗又北見燕王曰先日公子謂其父嬰嘗約兩主之交矣今秦攻魏願大王救之燕王曰吾嵗不熟二年矣今又行數千里而助魏奈何文曰夫行數千里而救人此國之利也今魏王出國門而望見軍雖欲行數千里而助人得乎燕王尚未許也文曰臣効便計于王王不用文請行矣恐天下將有大變也曰大變可得聞乎曰秦攻魏未能克之也而臺已燔游已奪矣燕不救魏魏以國之半與秦秦必去魏悉韓魏之兵又西借秦兵因趙之衆以四國攻燕王且何利利行數千里而助人乎利出燕南門而望見軍乎則道里近而輸易矣燕王曰子行矣寡人聽子為之起兵八萬車三百乗以從魏王大説秦恐割地請講于魏因歸燕趙之兵而封文國䇿國䇿趙王封孟嘗君以武城孟嘗君擇舍人為武城吏而遣之曰鄙語豈不曰借車者馳之借衣者被之哉曰有之君曰文甚不取也夫借車衣者非親友則兄弟也馳親友之車被兄弟之衣文以為不可今趙王不知文不肖而封之以武城願大夫之往也毋伐樹木毋發屋室訾然使王悟而知文謹使可全而歸之後文西合于秦趙與燕共伐破齊齊王亡在莒遂死焉襄王立而文中立為諸侯無所屬襄王新立畏文與連和復親文文卒諡為孟嘗君皇覽孟嘗君冡在魯國薛城向門東諸子争立而齊魏共滅薛文絶後無嗣也史記論曰展季之言曰伐國不問仁人伐國爾而仁人羞之况忍覆其宗國哉吳將伐魯問叔孫輒輒曰伐之必得志退而告公山不狃不狃曰非禮也君子之行也不以所惡廢鄉嗚呼孟嘗賢者乃廢鄉乎孟嘗雅好士馮煖市義于薛而不市義于齊毛薛之規迄無聞焉所好者士之何等邪且夫豢馬以羣而等驥于下籋雲搖舉然後愕眙焉然則好士者其聲也非真好士者也文死諸子争立薛由是亡嗚呼彼四十餘子而不與賤子争靖郭君之難也田單田需附田單者齊諸田疎屬也湣王時單為臨菑市掾不見知及燕使樂毅伐破齊齊湣王出奔已而保莒城燕使長驅平齊而田單走安平令其宗人盡斷其車軸末而傅鐵籠已而燕軍攻安平城壊齊人走争塗以轊折車敗為燕所虜唯田單宗人以鐵籠故得脱東保即墨燕既盡降齊城唯獨莒即墨不下燕軍聞齊王在莒并兵攻之淖齒既殺湣王于莒因堅守距燕軍數年不下燕引兵東圍即墨即墨大夫出與戰敗死城中相與推田單曰安平之戰田單宗人以鐵籠得全習兵立以為將軍以即墨距燕頃之燕昭王卒惠王立與樂毅有隙田單聞之乃縱反間于燕宣言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎劫代樂毅樂毅因歸趙燕人士卒忿而田單乃令城中人食必祭其先祖于庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來下教我乃令城中人曰當有神人為我師有一卒曰臣可以為師乎因反走田單乃起引還東鄉坐師事之卒曰臣欺君誠無能也田單曰子勿言也因師之每出約束必稱神師乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守唯恐見得單又縱反間曰吾懼燕人掘吾城外冢墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見皆涕泣其欲出戰怒自十倍田單知士卒之可用乃身操版插與士卒分功妻妾編于行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乗城遣使約降于燕燕軍皆呼萬嵗田單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單乃收城中得千餘牛為絳繒衣書以五采龍文束兵刃于其角而灌脂束葦于尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼔譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人遂夷殺其將騎劫燕軍擾亂奔夫齊人追亡逐北所過城邑皆畔燕而歸田單兵日益多乗勝燕日敗亡卒至河上而齊七十餘城皆復為齊乃迎襄王于莒入臨菑而聽政襄王封田單號曰安平君單又號平都君或徙或益封未詳史記齊之破燕也齊國之衆皆以田單為自立也及襄王立單相之過菑水有老人涉菑而寒出不能行坐于沙中單見其寒解裘衣之襄王惡之曰田單之施將欲取我國乎不早圖之恐後之左右顧無人巖下有貫珠者王呼而問之曰女聞吾言乎對曰聞之王曰女以為何若對曰王不如因以為己善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意單有是善而王嘉之善單之善亦王之善也王曰善乃賜單牛酒嘉其行後數日貫珠者復見王曰王至朝日宜召田單而揖之于庭口勞之乃布令求百姓之饑寒者收穀之乃使人聽于閭里聞丈夫之相與語曰田單之愛人嗟乃王之教澤也長平之役單説魏王曰王胡不為從王曰秦許吾以垣雍單曰臣以垣雍為空割也王曰何謂也單曰秦趙久相持于長平而無決天下合于秦則無趙合于趙則無秦秦恐王之變也故以垣雍餌王也秦戰勝趙王敢責垣雍之割乎秦戰不勝趙王能令韓出垣雍之割乎臣故曰垣雍空割也魏王曰善又有田需者宣王時管燕得罪宣王燕謂其左右曰孰與我赴諸侯者乎左右莫對燕連然流涕曰悲夫士何其易得而難用也田需對曰士三食不得饜而君鵞鶩有餘食下宫糅羅紈曳綺縠而士不得以為縁且財者君之所輕死者士之所重君不肯以所輕者與士而責士以所重事君非士易得而難用也國策策韓詩外傳作宋燕陳饒魏田需貴于哀王是需又嘗事魏也論曰田單以二邑復齊七十餘城俾襄王復國有鬲之烈不加于是火牛破燕不創自單楚子執象燧以破羣蠻已先之矣貫珠事未必然然君臣兩完亦足鑒諸顔斶王蠋平阿餘子成公趙附叔無孫顔斶者齊人也宣王見顔斶曰斶前斶亦曰王前王不説左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎對曰夫斶前為慕勢王前為趨士與使斶為慕勢不如使王為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳王者不貴王曰有説乎曰有昔者秦攻齊令有敢去栁下季壟五十步而樵採者死不赦令有能得齊王頭者封萬戸侯賜金千鎰由是觀之生王之頭曽不若死士之壟也王黙然不説左右曰斶來斶來大王據千乗之地建千石鐘萬石簴天下之士皆為役處辨智並進莫不來語萬物無不備具而百姓無不親附今夫士之髙者乃稱匹夫徒步而處農畆下則鄙野監門閭里士之賤也亦甚矣對曰不然斶聞古大禹之時諸侯萬國何則徳厚之道得貴士之力也及湯之時諸侯三千當今之世南面稱寡者乃二十四由此觀之非得失之䇿與稍稍誅滅滅亡無族之時欲為監門閭里安可得而有哉易傳不云乎居上位未得其實而喜其為名者必以驕奢為行据慢驕奢則凶必從之是故無實而喜其名者削無徳而望其福者約無功而受其禄者辱禍必握此皆幸樂其名而無其實徳者也是以堯有九佐九官也舜有七友雄陶方回續牙伯陽東不訾秦不虚靈補禹有五丞楚辭八師三后外有益稷臯陶垂益湯有三輔商書伊虺二相外有誼伯仲伯咎單自古及今而能虛成名于天下者無有故曰無形者形之君也無端者事之本也夫上見其原下通其流至聖明學上何不吉之有哉夫堯傳舜舜傳禹周成王任周公旦而世世稱曰明主是以明乎士之貴也王曰嗟乎君子焉可侮哉寡人自取病耳及聞君子之言乃聞細人之行願請受為弟子先生與寡人游食必大牢出必乗車妻子衣服麗都斶曰夫玉生于山制則破焉非弗寳貴矣然大璞不完士生乎鄙野推選則禄焉非不尊遂也然而形神不全斶願得歸晚食以當肉安步以當車無罪以當貴清浄貞正以自虞制言者王也盡忠直言者斶也言要道已備矣願得賜歸安行反臣之邑屋則再拜辭去君子曰斶知足矣歸真反璞則終身不辱國䇿湣王時有王蠋齊之畫邑人燕之初入齊聞蠋賢令軍中曰環畫邑三十里無入以王蠋之故已而使人謂蠋曰齊人多髙子之義吾以子為將封子萬家蠋固謝燕人曰子不聽吾引三軍而屠畫邑蠋曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕于野國既破亡吾不能存今又刼之以兵為君將是助桀為虐也與其生而不義固不如烹遂經其頸于樹自奮絶脰而死齊亡大夫聞之曰王蠋布衣也義不北面于燕况在位食禄者乎乃相聚如莒求諸子立為襄王史記吕氏春秋齊晉相與戰平阿之餘子亡㦸得矛不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸兵也矛亦兵也亡兵得兵何為不歸遇髙唐之孤叔無孫曰今戰亡㦸得矛可以歸乎叔無孫曰矛非㦸也㦸非矛也亡㦸得矛豈亢責也哉餘子曰嘻還反戰趨尚及之遂戰而死叔無孫曰吾聞之君子濟人于患必離其難疾驅而從之亦死説苑宋康公攻阿屠單父成公趙曰趙在阿而宋屠單父是趙無以自立也且往誅宋入宋三月不得見或曰何不因鄰國之使見之趙曰不可使後世之使不信符節之信不用曰何不因羣臣道徒處之士而刺之曰不可後世之忠臣不見信辨士不見顧吾聞士怒則思理危不忘義必將正行以求之期年宋康公病死趙曰廉士不辱名信士不惰行吾在阿宋屠單父是辱名也事誅宋王期年不得是惰行也生何面目見天下士遂立槁于彭山之上按宋無康公王偃諡康不以病死説誤王斗能意田過春居卭唐易子附匡倩閭邱子竒王斗者亦齊人也斗造門見宣王宣王使謁者延入斗曰斗趨見王為好勢王趨見斗為好士于王何如使者復還報王曰先生徐之寡人請從王因趨而迎之于門與入曰寡人奉先君之宗廟守社稷聞先生直言正諫不諱斗對曰王聞之過斗生于亂世事亂君焉敢直言正諫王忿然作色不説有間斗曰昔先君桓公所好者五九合諸侯一匡天下天子授籍立為太伯今王有四焉王説曰寡人愚陋守齊國唯恐夫抎之焉能有四焉斗曰先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而王不好士王曰當今之世無士寡人何好斗曰世無騏驎騄耳王之駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛嬙西施王宫已充矣王亦不好士也何患無士説苑作淳于髠王曰寡人憂國愛民固願得士以治之斗曰王之憂國愛民不若王愛尺縠也王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也王謝曰寡人有罪于是舉士五人治官齊國大治國䇿吕氏春秋能意見齊宣王宣王曰聞子好直有之乎對曰意惡能直意聞好直之士不處亂國不見汚君身今見王而家宅乎齊意惡能直宣王怒曰野士也將罪之能意曰臣少而好事長而行之王胡不能與野士乎將以彰其所好邪王乃舍之吕氏春秋宣王為太室大益百畆堂上三百戸以齊之大具之三年而未能成羣臣莫敢諫春居問于宣王曰荆王釋先王之禮樂而樂為輕敢問國為有主乎王曰為無主臣以千數而莫敢諫敢問國為有臣乎王曰為無臣今王為太室大益百畆堂上三百戸以齊之大具之三年而弗能成羣臣莫敢諌敢問王為有臣乎臣請辟矣趨而出王曰春子反寡人請今止之遽召掌書曰書之寡人不肖而好為太室春子止寡人韓非子宣王問弋于唐易子曰弋者奚貴唐易子曰在于謹廩王曰何為謹廩曰鳥數十目視人人以二目視鳥奈何不謹廩也王曰然則人主以二目視一國一國以萬目視人主將何以自為廩乎曰鄭長者有言曰夫虚静無為而自見也其可以為此廩乎韓非子宣王問匡倩曰儒者博乎曰不也博者貴梟勝者必殺梟是殺所貴也以為害義故不博曰儒者弋乎曰不也弋者從下害于上是從下傷君也以為不義故不弋又問儒者鼓瑟乎曰不也夫瑟以小絃為大聲以大絃為小聲是大小易序貴賤易位以為害義故不鼓也宣王曰善韓詩外傳宣王謂田過曰吾聞儒者親喪三年君與父孰重對曰殆不如父王忿然曰曷為士去親而事君對曰非君之土地無以處吾親非君之禄無以養吾親非君之爵無以尊吾親受之于君致之于親凡事君以為親也新序齊有閭邱卭年十八道遮宣王曰家貧親老願得小仕王曰子年尚稚未可對曰顓頊十二而治天下項槖七嵗為聖人師由此觀之卭不肖耳年不稚矣宣王曰未有咫角驂駒而能服重致逺者也士亦華髮墮顛而後可用耳對曰不然夫驊騮緑驥駿馬也試于釡竈之間其疾未能過貍鼬黄鵠白鶴一舉千里試于堂廡之下其便未能過燕服翼辟閭巨闕利器也使之決目出眯其便未能過菅槀由此觀之華髮墮顛與卭何以異哉宣王曰善子何見寡人之晚也對曰夫雞豚讙嗷奪鐘鼓之異雲霞充咽奪日月之光讒人在側是以見晚也宣王拊軾曰寡人有過載之歸而用焉新序子竒年十八齊君使治阿既行矣悔之使追之未到阿及之還之已到勿還也使者及之而不還君問其故對曰臣見所以共載者白首也夫以老者之智以少者決之必能治阿矣是以不還列精子髙狐援公玉丹列精子髙狐援並齊人也子髙聽行乎湣王善衣東布衣白縞冠顙推之履㑹朝雨袪步堂下謂侍者曰我何若侍者曰公姣且麗子髙步而窺井粲然惡丈夫也喟然歎曰侍者謂吾聽行于齊王也夫何阿哉萬乗之主人之阿之亦甚矣而無所鏡亡無日矣鏡唯士乎人説鏡之明已也而惡士之明已也不知類耳吕氏春秋巴新序作田對齊王子髙見齊王王問誰可臨淄宰稱管穆王曰穆陋民不敬曰見敬在徳王聞晏子趙文子乎晏子長不過三尺齊國莫不宗焉趙文子身不勝衣言如不出口其相晉國晉國以寧有徳故也臣常行臨淄市見屠商身修八尺鬚髯如㦸面正紅白市之男女未有敬之者王曰是所謂祖龍始者也誠如先生言乃以穆為臨淄宰齊王行車裂之刑羣臣諍之弗聽子髙曰車裂之刑無道之刑也而君行之竊以為下吏之過也王曰民多犯法為法之輕也子髙曰然此誠君之盛意也夫天下悠悠士無定處有徳則住無徳則去欲規霸王之業與大國為難而酷刑以懼逺近國内之民將叛四方之士不至此亡國之道下吏不具以聞心知不可將有非議則曰君意實然我諌必有龍比之禍是虚自居于忠正之地而闇推主使同于桀紂也且夫臣見主非而不諍以陷主于危亡罪之大者也主疾臣之弼已而資臣以箕子比干之忠惑之大者也王曰謹聞命遂除車裂之法孔叢子狐援説湣王曰殷之鼎陳于周之廷其社葢于周之屏其干戚之音在人之游亡國之音不得至于廟亡國之社不得見于天亡國之器陳于廷所以為戒王必勉之其無使齊之大吕陳之廷無使太公之社葢之屏無使齊音充人之游王不受援出而哭國三日其辭曰先出也衣絺紵後出也滿囹圄吾今見民之洋洋然東走而不知所處王問吏曰哭國之法若何吏曰斮王曰行法吏陳斧質于東閭不欲殺之而欲去之援聞而蹶往過之吏曰哭國之法斮先生老歟昬歟援曰有人自南方來鮒入而鯢居使人之朝為草而國為墟殷有比干吳有子胥齊有狐援已不用若言又斮之東閭國策齊負郭之民有孤狐咺者正義閔王斮之檀衢百姓不附齊孫室子陳舉直言殺之東閭宗室離心又有公玉丹者湣王亡居衛謂丹曰我何如主丹曰王賢主也臣聞古人有辭天下而無恨色者臣聞其聲于王見其實名稱東帝實辨天下去國居衛容貌充滿顔色發揚無重國之意王曰甚善丹知寡人寡人自去國居衛也帶益三副矣吕氏春秋新序閔王居衛謂公玉丹曰我亡矣而不知其故對曰王之亡以賢也天下之主皆不肖而惡王之賢因相與攻王此王之所以亡也閔王慨然太息曰賢固若是其苦邪餘文同漢書儒家公孫固一篇十八章齊閔王失國問之固為陳古今成敗按此公玉丹或即公孫固豈反辭以對如子革對靈王與尚史卷七十一
