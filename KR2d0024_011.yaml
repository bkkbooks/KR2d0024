body:
  text: 尚史卷十一世家四鑲白旗漢軍李鍇撰晉世家下景公景公名獳史作據成公子成公七年宣九年薨公即位是年冬十月楚伐鄭郤缺救鄭鄭敗楚師景公元年宣十年夏六月鄭及楚平我及諸侯之師宋衛曹伐鄭取成而還冬楚伐鄭士會救之諸侯之師戍鄭二年宣十一年秋公會狄于櫕函衆狄疾赤狄之役遂服于晉三年宣十二年春楚圍鄭克之鄭及楚平夏六月我師救鄭及河楚乘我軍敗我師于邲冬先縠及宋衛曹同盟于清邱四年宣十三年秋赤狄伐我及清先縠召之也冬討邲之敗與清之師殺先縠盡滅其族五年宣十四年夏公伐鄭告于諸侯搜焉而還楚圍宋六年宣十五年春宋告急于我公欲救之伯宗不可乃止使解揚如宋夏六月荀林父敗赤狄于曲梁滅潞殺鄷舒秋七月秦伐我次于輔氏公治兵于稷以略狄土立黎侯而還狄奪其地故復立之及雒魏顆敗秦師于輔氏公使趙同獻狄俘于周七年宣十六年春士會帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘公請于王命士會將中軍且為大傅先是周王子扎殺召伯毛伯在十五年夏王室復亂王孫蘇來奔我復之冬使士會平王室八年宣十七年春公使郤克徵會于齊齊頃公使婦人觀之婦人笑于房郤克怒夏公會諸侯魯衛曹邾同盟于斷道辭齊人執其使九年宣十八年春公及衛伐齊及齊頃公盟于繒齊公子強為質于我我師還十年成元年春使詹嘉平戎于王單襄公來拜成十一年成二年齊伐魯敗衛于新築魯衛皆來乞師夏六月公使郤克會魯衛曹之師及齊師戰于鞍齊師敗績我師入自邱輿擊馬陘齊頃公使國佐賂以紀甗玉磬與地許之平秋七月及國佐盟于爰婁使齊歸魯汶陽之田冬十一月公使鞏朔獻齊捷于周十二年成三年春公會諸侯魯宋衛曹伐鄭遂東侵鄭鄭敗我師于邱輿夏魯公來拜汶陽之田秋郤克及衛伐牆咎如冬十一月使荀庚如魯聘及魯盟十二月作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之功也齊侯來朝十三年成四年夏魯公來冬鄭伐許我救許伐鄭取汜祭十四年成五年春放趙嬰齊于齊通于趙朔妻莊姬故夏梁山崩秋八月趙同及鄭伯盟于赤棘冬十一月定王崩簡王立十二月公會諸侯魯齊宋衛鄭曹邾杞同盟于蟲牢鄭服也十五年成六年春鄭伯來拜成三月伯宗夏陽説及衛鄭侵宋蟲牢之盟諸侯謀復會宋公辭故夏四月遷于新田冬魯季孫行父來賀遷也楚伐鄭欒書救鄭遇于繞角楚師還我師遂侵蔡楚救蔡禦諸桑隧我師還侵沈獲沈子揖初十六年成七年春鄭伯來且拜師秋楚伐鄭公會諸侯魯齊宋衛曹莒邾杞救鄭八月同盟于馬陵尋蟲牢盟且莒服故冬衛孫林父以戚來奔衛定公來我反戚十七年成八年春使韓穿如魯言汶陽之田歸之于齊公羊鞍之戰齊師大敗齊侯歸弔死視疾七年不飲酒不食肉晉侯聞之曰嘻奈何使人之君七年不飲酒不食肉請皆反其侵地欒書侵蔡遂侵楚獲申驪楚大夫夏六月殺趙同趙括莊姬譛故以其田與祁奚韓厥諌乃立趙武而反其田冬士燮如魯聘會魯齊邾伐郯十八年成九年春正月公會諸侯魯齊宋衛鄭曹莒杞同盟于蒲歸汶陽之田諸侯二于晉晉懼會蒲以尋馬陵之盟二月鄭伯會楚公子成于鄧秋鄭伯來我執諸銅鞮欒書伐鄭鄭使伯蠲行人行成殺之楚侵陳以救鄭冬十一月秦人白狄伐我公釋楚鍾儀使歸求成十二月楚使公子辰來報鍾儀之使請修好結成十九年成十年使糴茷如楚夏四月公有疾五月立大子州蒲以為君而會諸侯魯齊宋衛曹伐鄭歸鄭伯以求成也六月公薨秋魯公來止之使送葬冬葬景公左傳諡曰景在位十九年厲公厲公名州蒲景公大子也厲公元年成十一年春使郤犨如魯聘及魯盟夏魯季孫行父來報聘且涖盟冬宋華元宋大夫來合晉楚之成秦晉為成會于令狐秦伯不肯涉河使史顆秦大夫盟公于河東郤犨盟秦伯于河西秦伯歸而背成二年成十二年春周周公來奔夏五月士燮會楚公子罷許偃並楚大夫盟于宋華元合成故公會魯公衛侯于瑣澤鄭伯亦來聽成狄侵我秋敗狄于交剛郤至如楚聘且涖盟冬楚公子罷來聘且涖盟十二月公及楚公子罷盟于赤棘三年成十三年春使郤乞如魯乞師將伐秦夏四月公使吕相魏錡子絶秦五月公會諸侯魯齊宋衛鄭曹邾滕伐秦戰于麻隧秦師敗績獲秦成差及不更女父成差女父並秦大夫不更爵名四年成十四年春衛定公來公強見孫林父定公不可夏定公歸公使郤犨送林父卒見定公而復之成七年衛定公惡孫林父林父奔晉五年成十五年春三月公會諸侯魯衛鄭曹同盟于戚執曹成公歸于京師曹宣公卒公子負芻殺其大子而自立故見討負芻即成公冬十月殺伯宗及欒弗忌晉賢大夫伯州犂奔楚十一月士燮會諸侯之大夫魯齊宋衛鄭邾會吳于鍾離六年成十六年鄭叛晉公將伐鄭使欒黶如魯郤犨如衛遂如齊皆乞師夏五月我師起楚救鄭六月晉楚戰于鄢陵楚子鄭師敗績秋公會諸侯魯齊衛宋邾于沙隨謀伐鄭鄭未服故七月公會周尹武公及諸侯伐鄭荀罃以諸侯之師侵陳遂侵蔡諸侯遷于潁上鄭宵軍之宋齊衛皆失軍曹人請于我我歸曹成公九月執魯季孫行父于苕邱既而許魯平赦行父冬十二月郤犨及行父盟于扈公使郤至獻楚捷于周七年成十七年春正月鄭侵我虛滑衛救我夏五月公會周尹武公單襄公及諸侯魯宋衛曹齊邾伐鄭六月同盟于柯陵楚救鄭諸侯還秋九月荀瑩如魯乞師冬公會諸侯伐鄭冬十月圍鄭楚救鄭諸侯還公侈多外嬖欲盡去羣大夫而立其左右胥童怨郤氏曰必先三郤族大多怨十二月殺郤錡郤犨郤至胥童以甲劫欒書中行偃于朝公辭曰大夫無辱其復職位公遊于匠麗氏欒書中行偃執公閏月殺胥童明年使程滑弒公葬之于翼東門之外以車一乘諸侯葬七乘言不以君禮葬也左傳諡曰厲在位八年悼公悼公名周其大父捷襄公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生公子周史記世家厲公八年成十八年春正月厲公被弒欒書中行偃使荀罃士訪逆公子周于京師而立之生十四年矣大夫逆于清原公子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽盟而入館于伯子同氏辛巳朝于武宫逐不臣者七人二月乙酉朔公即位始命百官施舍已責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時凡六官之長大國三卿晉置六卿為軍帥故曰六官皆民譽也舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言魯公來朝夏六月士丐如魯聘拜朝也杞桓公來朝初魚石宋大夫叛宋楚取宋彭城以封魚石宋圍彭城冬十一月楚救彭城伐宋宋來告急公救宋遇楚師于靡角之谷楚師還士魴如魯乞師十二月公會諸侯宋衛邾齊魯同盟于虛朾謀救宋宋辭諸侯請圍彭城元年襄元年春正月欒黶會諸侯之大夫圍彭城彭城降我齊不會彭城我以為討齊大子光為質于我夏五月韓厥荀偃帥諸侯之師伐鄭入其俘敗其徒兵于洧上魯齊曹邾杞次于鄫以待我師我師自鄭以鄫之師侵楚焦夷及陳公及衛獻公次于戚以為之援秋九月簡王崩靈王立冬荀罃如魯聘二年襄二年夏六月我師及宋師衛寧殖侵鄭秋七月荀瑩會諸侯之大夫魯宋衛曹邾于戚謀鄭冬復會于戚遂城虎牢以逼鄭鄭人乃成三年襄三年春魯公來朝夏四月公及魯公盟于長樗我將合諸侯使士丐如齊乞盟乃盟于耐外六月公會周單武子及諸侯魯宋衛鄭莒邾齊同盟于雞澤使荀會逆吳子于淮上吳子不至陳使袁僑如會求成公使和組父告于諸侯秋及陳袁僑盟冬荀罃伐許不會雞澤故四年襄四年夏魯叔孫豹來聘冬魯公來聽政受貢賦多少之政請屬鄫許之無終子山戎國名嘉父使因魏絳納虎豹之皮以請和諸戎公曰不如伐之魏絳曰和戎有五利焉事見絳傳公説使絳盟諸戎五年襄五年靈王使王叔陳生訴戎于我戎陵暴周室故我執陳生士魴如京師言陳生二于戎夏魯叔孫豹覿鄫世子巫于我吳子使夀越來請聽諸侯之好秋九月公會諸侯魯宋陳衛鄭曹莒邾滕薛齊吳鄫于戚會吳且命戍陳冬諸侯戍陳楚伐陳公會諸侯魯宋衛鄭曹齊于城棣以救之六年襄六年莒滅鄫以鄫故討魯魯季孫宿來見且聽命七年襄七年冬楚圍陳十二月公會諸侯魯宋陳衛曹莒邾于鄬謀救陳陳侯逃歸陳畏楚故八年襄八年春魯公來朝夏五月公會鄭伯及諸侯之大夫魯齊宋衛邾于邢邱以命朝聘之數冬士丐如魯聘九年襄九年夏魯季孫宿來聘秋飢秦侵我鄭及楚平冬十月公會諸侯魯宋衛曹莒邾滕薛杞小邾齊伐鄭鄭成十一月同盟于戲將盟晉為載書曰既盟之後鄭國不唯晉命是聽而有異志者有如此盟鄭曰既盟之後鄭國不唯有禮與強可以庇民者是從而有異志者亦如之我不得志于鄭以諸侯復伐之次于隂口而還公歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賓以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭三駕謂十年師于牛首十一年師于向其秋觀兵于鄭十年襄十年春公會諸侯魯宋衛曹莒邾滕薛杞小邾齊會吳于柤遂滅逼陽妘姓國通吳晉之道也以逼陽子歸獻于武宫謂之夷俘諱俘中國故謂之夷夏六月荀罃伐秦報前年侵也秋公會諸侯魯宋衛曹莒邾齊滕薛杞小邾伐鄭師于牛首城虎牢而戍之鄭及我平三駕之一楚救鄭諸侯之師還鄭而南至于陽陵楚師不退師遂進與楚師夾潁而軍鄭宵涉潁與楚人盟欒黶欲伐鄭荀罃不可諸侯之師還侵鄭北鄙而歸周王叔陳生與伯輿爭政公使士丐平王室王叔陳生來奔十一年襄十一年夏四月公會諸侯魯宋衛曹齊莒邾滕薛杞小邾伐鄭六月圍鄭觀兵于南門鄭懼乃行成秋七月同盟于亳盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家三駕之二楚秦伐鄭鄭逆之伐宋秋九月諸侯悉師復伐鄭觀兵于東門鄭行成趙武入盟鄭伯鄭子展出盟公冬十二月會于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠三駕之三秦伐我以救鄭士魴御之戰于櫟我師敗績十二年襄十二年夏士魴如魯聘且拜師冬魯公來朝十三年襄十三年搜于綿楚敗吳吳來告敗十四年襄十四年春正月士丐會諸侯之大夫魯齊宋衛鄭曹莒邾滕薛杞小邾會吳于向謀楚故夏諸侯之大夫從公伐秦公待于竟使六卿帥諸侯之師以進至于棫林而還師歸舍新軍周為六軍諸侯三軍可也公以新軍無帥故舍之衛出其君獻公立公孫剽冬士丐會諸侯之大夫魯宋衛鄭莒邾于戚謀定剽十五年襄十五年冬十一月公薨左傳諡曰悼在位十五年平公平公名彪悼公子悼公薨公即位元年襄十六年春正月葬悼公鄭子蟜來送葬既葬改服修官蒸于曲沃三月公會諸侯魯宋衛鄭曹莒邾薛杞小邾于溴梁先是莒邾伐魯魯來告以魯故執邾宣公莒犂比公且曰通齊楚之使公與諸侯宴于溫荀偃及諸侯之大夫盟夏五月荀偃會伐許許請遷大夫不可故次于函氏荀偃欒黶帥師伐楚戰于湛阪楚師敗績遂侵方城之外復伐許而還冬魯叔孫豹來聘三年襄十八年夏執衛行人石買于長子執孫蒯于純留衛取曹重邱曹告于我故齊伐魯冬十月公會諸侯魯宋衛鄭曹莒邾滕薛杞小邾于魯濟同伐齊十一月入平隂克京兹克邿圍盧弗克十二月遂圍齊東侵及濰南及沂四年襄十九年春諸侯還自沂上盟于督揚我執邾悼公伐魯故遂次于泗上取邾田自漷水歸之于魯二月欒魴從衛伐齊魯季孫宿來拜師夏五月士丐侵齊及穀聞齊侯卒乃還冬十一月及齊平盟于大隧魯叔孫豹會士丐于柯齊晉平魯懼故五年襄二十年夏六月公會諸侯魯齊宋衛鄭曹莒邾滕薛杞小邾盟于澶淵齊成故六年襄二十一年春魯公來拜師及取邾田秋欒盈出奔楚盈母欒祈與其老州賔通祈懼討訴諸士丐曰盈將為亂士丐遂之冬十月公會諸侯魯齊宋衛鄭曹莒邾于商任錮欒氏也七年襄二十二年冬公會諸侯魯齊宋衛鄭曹莒邾滕薛杞小邾于沙隨復錮欒氏也八年襄二十三年夏欒盈復入晉乘公門士丐禦之欒氏退奔曲沃我圍之秋齊伐我取朝歌為二隊入孟門登大行張武軍于熒庭戍郫邵封少水以報平隂之役八月魯叔孫豹救我次于雍榆冬十月克曲沃殺欒盈盡殺其族九年襄二十四年春魯叔孫豹來賀克欒氏夏五月秦晉成韓起如秦涖盟秦伯車來涖盟秋八月公會諸侯魯宋衛鄭曹莒邾滕薛杞小邾于夷儀將伐齊水不克冬楚伐鄭以救齊諸侯還救鄭楚子自棘澤還鄭公孫揮來聘十年襄二十五年夏五月公濟自泮會諸侯前諸侯于夷儀伐齊以報朝歌之役齊請成許之公使逆衛獻公獻公于襄十四年奔齊使衛與之夷儀秋七月同盟于重邱齊成故鄭伐陳八月鄭國僑來獻捷冬十月鄭伯來拜陳之功十一年襄二十六年春秦伯弟針來修成二月衛獻公復歸于衛衛孫林父以戚來奔衛侵戚殺我茅氏戍三百人夏荀吳如魯聘將討衛召公會六月趙武會魯公鄭良霄宋人曹人于澶淵討衛疆戚田執寧喜衛獻公來執而囚之秋七月齊侯鄭伯來為獻公故鄭伯歸使國夏來聘冬十二月衛歸衛姬于我乃釋獻公韓起聘于周十二年襄二十七年夏趙武會諸侯之大夫魯楚蔡衛陳鄭許曹于宋秋七月盟于宋九月楚薳罷來涖盟十三年襄二十八年夏諸侯齊陳蔡北燕杞胡沈白狄來朝宋之盟故秋八月魯仲孫羯來告如楚九月鄭遊吉來告朝楚冬十一月靈王崩景王立十四年襄二十九年夏六月荀盈會諸侯之大夫魯齊宋衛鄭曹莒滕薛小邾城把公杞出也故治杞士鞅如魯聘女叔齊如魯治杞田冬魯仲孫羯來報士鞅十五年襄三十年春鄭伯來夏五月王殺其弟佞夫王豫瑕來奔冬十月趙武會諸侯之大夫魯齊宋衛鄭曹莒邾滕薛杞小邾于澶淵宋災故以謀歸宋財既而無歸十六年襄三十一年夏六月鄭伯來冬十一月吳屈狐庸來聘通吳晉之路也十七年昭元年春正月趙武會諸侯之大夫魯楚齊宋衛陳蔡鄭許曹于虢尋宋之盟夏四月王使劉定公勞趙武于潁五月秦伯之弟針來奔六月荀吳敗狄于大鹵公有疾鄭公孫僑來聘冬十一月楚子麋被弒王子比來奔十八年昭二年春韓起如魯聘遂如齊納幣為公聘少薑自齊聘于衛夏四月韓須如齊逆女齊陳無宇送女致少薑謂無宇非卿執諸中都魯叔弓來聘報韓起也秋七月少薑卒魯公來及河公辭曰非伉儷也乃還冬十月齊陳無宇歸十九年昭三年春正月鄭遊吉來送葬齊請繼室于我許之夏四月鄭伯來五月韓起如齊逆女秋七月鄭罕虎來賀夫人二十年昭四年春正月楚椒舉來求會諸侯許之遂請昏亦許之二十一年昭五年春楚屈生薳罷來逆女公送女于邢邱鄭伯會公于邢邱魯公來韓起如楚送女夏莒牟夷以牟婁及防兹奔魯莒訴于我我欲止魯公士鞅諫乃歸魯公二十二年昭六年夏魯季孫宿來拜莒田謝受莒邑不見討六月楚公子棄疾來報韓起也冬十一月齊侯來請伐北燕許之二十三年昭七年春二月宋罕朔來奔夏四月如魯治杞田為杞取成成魯邑鄭國僑來聘秋八月衛襄公卒使士鞅如衛弔且反戚田二十四年昭八年春石言于魏榆晉地公問于師曠于是公方築虒祈之宫師曠對曰作事不時怨讟動于民則有非言之物而言今宫室崇侈怨讟並作石言不亦宜乎夏四月魯叔弓來賀虒祈鄭伯來亦賀虒祈二十五年昭九年春周甘人與閻嘉閻縣大夫爭閻田梁丙張躍並晉大夫率隂戎伐潁王使辭于我辭責讓也適王有姻喪乃使趙成如周弔且致閻田與襚反潁俘夏六月荀盈卒使荀躒盈之子佐下軍二十六年昭十年秋七月公薨左傳諡曰平在位二十六年昭公昭公名夷平公子平公二十六年昭十年薨公即位秋七月鄭伯來辭之遊吉來弔九月葬平公諸侯之大夫魯齊宋衛鄭許曹莒邾滕薛杞小邾來會葬欲因見新君昭公使羊舌肹辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何昭公元年昭十一年楚圍蔡秋韓起會諸侯之大夫魯齊宋衛鄭曹杞于厥憖謀救蔡使狐父晉大夫請蔡于楚弗許韓起會周單子于戚二年昭十二年夏齊侯衛侯鄭伯來朝魯取郠莒訴于我我以平公之喪故未之治至是魯公來辭之公子憗來夏六月荀吳假道于鮮虞遂入昔陽肥國都滅肥以肥子綿臯歸冬伐鮮虞三年昭十三年我成虒祁諸侯朝而歸者皆有二心為取郠故將以諸侯討魯乃徵會告于吳秋公將會吳子于良水道不可吳子還七月治兵于邾公會周劉子及諸侯魯齊宋衛鄭曹莒邾滕薛杞小邾于平邱以莒邾訴故辭魯公八月同盟于平邱魯公不與盟執魯季孫意如以歸荀吳侵鮮虞大獲而歸冬十月魯公來使士彌牟辭之于河歸魯季孫意如五年昭十五年秋荀吳伐鮮虞圍鼓克之以鼓子鳶鞮歸冬魯公來荀躒如周葬穆后六年昭十六年春三月韓起聘于鄭秋公薨左傳諡曰昭在位六年頃公頃公名去疾昭公子昭公六年昭十六年薨公即位冬十月葬昭公魯季孫意如來會葬頃公元年昭十七年秋九月荀吳帥師滅陸渾之戎陸渾子奔楚五年昭二十一年夏士鞅如魯聘宋華亥叛宋冬十一月荀吳會諸侯之大夫齊衛曹救宋魯公來及河鼓叛我故辭之六年昭二十二年夏四月景王崩悼王立六月荀吳襲鼓滅之以鼓子鳶鞮歸使涉他晉大夫守之周王子朝攻悼王王室亂冬十月籍談荀躒帥九州之戎及焦瑕溫原之師納王于王城十一月悼王崩敬王立十二月籍談荀躒賈辛司馬督帥師次于社閏月箕遺樂徵右行詭濟師取前城軍其東南王師伐京子朝所居毁其西南七年昭二十三年春正月我師及王師圍郊郊鄩潰我師在平隂王師在澤邑王使告間我師還魯取邾師邾訴于我我以為討魯叔孫婼來執之夏六月周尹氏立王子朝冬十月魯公來及河有疾而復八年昭二十四年春二月歸魯叔孫婼三月公使士彌牟涖問周故辭王子朝不納其使夏六月鄭伯來乃徵會于諸侯謀納王九年昭二十五年夏趙鞅會諸侯之大夫魯宋衛鄭曹邾滕薛小邾于黃父令輸王粟具戍人曰明年將納王十年昭二十六年夏四月周單子來告急秋七月王次于滑荀躒趙鞅帥師納王使女寬守闕塞冬十月王起師于滑十一月我師克鞏王子朝奔楚王入于成周使成公般晉大夫戍周而還十一年昭二十七年春吳公子札來聘秋士鞅及諸侯之大夫宋衛曹邾滕會于扈令戍周且謀納魯公魯昭公伐季氏不克出居鄲事見二十五年冬十二月籍秦致諸侯之戍于周十二年昭二十八年春魯公來請逆于我逆著于乾侯夏六月殺祁盈及楊食我秋韓起卒十三年昭二十九年冬趙鞅荀寅帥師城汝濱遂鑄刑鼎十四年昭三十年夏六月公薨左傳諡曰頃在位十四年定公定公名午頃公子頃公十四年昭三十年薨公即位秋八月葬頃公鄭遊吉來弔且送葬元年昭三十一年春正月公將以師納魯公召魯季孫意如既而不果納二年昭三十二年冬十一月魏舒韓不信如京師合諸侯之大夫魯齊宋衛鄭曹莒薛杞小邾于狄泉尋盟平邱之盟且令城成周三年定元年春城成周宋不受功執宋仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍五年定三年春正月魯定公來至河乃復秋九月鮮虞人敗我師于平中獲觀虎六年定四年春三月公會周劉子及諸侯魯宋蔡衛陳鄭許曹莒邾頓胡滕薛杞小邾齊于召陵侵楚夏五月諸侯盟于臯鼬秋七月士鞅及衛孔圉伐鮮虞七年定五年冬士鞅圍鮮虞周儋翩王子朝餘黨因鄭人以作亂鄭于是伐周胥靡八年定六年春二月魯侵鄭取匡夏季孫斯來獻鄭俘仲孫何忌來報夫人之幣六月閻沒戍周且城胥靡秋八月執宋行人樂祁犂與趙鞅私飲酒于綿上故冬十二月王辟儋翩之亂處于姑蕕九年定七年秋齊侯鄭伯盟于鹹鄭始叛我齊侯衛侯盟于沙衛始叛我冬十一月周單子劉子逆王籍秦送王入于王城十年定八年春歸宋樂祁犁卒于大行乃止其尸以求成夏齊伐魯士鞅趙鞅荀寅救魯魯公會我師于瓦我師將盟衛侯于鄟澤涉他成何辱衛侯怒其與齊盟故衛叛我我請改盟弗許秋士鞅會周成桓公侵鄭遂侵衛十一年定九年春宋向巢來盟且逆樂祁犂之尸夏魯陽虎自宋來奔適趙氏秋齊為衛故伐我夷儀我敗之于中牟獲齊車五百乘十二年定十年春魯及齊平魯始叛我夏趙鞅圍衛討衛叛故執涉他求成于衛衛不許遂殺涉他成何奔燕十五年定十三年春齊侯衛侯使師伐我河內趙鞅殺邯鄲午趙稷邯鄲午之子以邯鄲叛夏六月籍秦圍邯鄲秋七月荀寅士吉射伐趙鞅鞅奔晉陽晉人圍之冬十一月荀躒韓不信魏曼多奉公以伐荀寅士吉射荀寅士吉射奔朝歌十二月趙鞅歸十六年定十四年夏圍朝歌魯齊衛謀救范中行氏析成鮒小王桃甲二子晉大夫范中行氏之黨率狄師以襲我戰于絳中不克而還冬十二月敗范中行氏之師于潞又敗鄭師范氏之師于百泉十八年哀元年夏四月齊侯衛侯救邯鄲圍五鹿秋八月齊侯衛侯會于乾侯救范氏魯齊衛鮮虞伐我取棘蒲冬十月趙鞅伐朝歌十九年哀二年衛靈公卒夏六月趙鞅納衛大子蒯瞶于戚秋八月齊人輸范氏粟鄭人送之趙鞅禦之戰于鐵大敗鄭師獲齊粟千車二十年哀三年冬十月趙鞅圍朝歌荀寅奔邯鄲二十一年哀四年秋七月齊衛救范氏圍五鹿九月趙鞅圍邯鄲邯鄲降荀寅奔鮮虞趙稷奔臨齊弦施逆之遂墮臨國夏伐我取邢任欒鄗逆畤隂人盂壺口八邑並晉地會鮮虞納荀寅于柏人二十二年哀五年春圍柏人荀寅士吉射奔齊夏趙鞅伐衛助范氏故圍中牟二十三年哀六年春伐鮮虞治范氏之亂也二十四年哀七年春魏曼多帥師侵衛二十七年哀十年夏趙鞅帥師伐齊取犂及轅毁髙唐之郭侵及賴而還三十年哀十三年夏公會周單平公魯公及吳子于黃池秋七月盟吳先我三十一年哀十四年秋趙鞅帥師伐衛三十二年哀十五年秋趙鞅帥師伐衛冬公伐鄭三十四年哀十七年夏六月趙鞅圍衛齊救衛乃還冬十月復伐衛衛出莊公而與我平我立襄公之孫般師而還三十五年哀十八年冬敬王崩左傳在哀十九年元王立左傳三十七年哀二十年公薨史記諡曰定在位三十七年出公以下戰國哀公懿公幽公烈公孝公靜公出公名鑿定公子定公薨公即位出公三年哀二十三年夏六月荀瑤伐齊戰于犂邱齊師敗績四年哀二十四年夏四月公將伐齊如魯乞師魯臧石會之取廩邱六年哀二十六年元王崩定王立七年哀二十七年夏四月荀瑤伐鄭齊救鄭瑤還十一年悼四年荀瑤圍鄭左傳十七年荀瑤與趙韓魏共分范中行地以為邑公怒告齊魯欲以伐四卿四卿恐反攻公公奔齊道死紀年出公十一年晉河絶于扈十三年荀瑤城南梁出公在位十八年荀瑤立昭公曽孫忌為晉君是為哀公晉世家在悼十七年又云昭公少子雍生忌忌善知伯蚤死立忌子驕為君是為哀公年表出公十八年次哀公忌二年次懿公驕十七年紀年出公二十三年奔楚乃立昭公之孫是為敬公系本昭公生札桓公子雍雍生忌忌生懿公驕諸説不一按晉世家昭公曽孫驕是為哀公哀公十八年卒子幽公柳立是驕即哀公而無懿公趙世家又云驕是為懿公史説自抵牾今姑從年表哀公大父雍昭公少子也號為戴子世本作桓子雍注云戴子戴子孫哀公忌哀公二年薨諡曰哀荀瑤欲盡并晉未敢乃立哀公子驕為君是為懿公當是時晉國政皆決荀瑤懿公不得有所制荀瑤遂有范中行地最強懿公二年趙無恤韓虎魏駒共殺荀瑤盡并其地紀年在出公二十二年按年表出公十八年加哀公二年懿公二年適當出公二十二年十四年定王崩哀王立弟叔弒哀王自立是為思王王子嵬殺叔自立是為考王十七年公薨諡曰懿子幽公栁即位世本懿公生幽公栁紀年敬公卒子幽公立幽公之時晉畏畏懼也言衰弱也反朝韓趙魏之君獨有絳曲沃餘皆入三晉紀年幽公七年晉大旱地生鹽九年丹水出反相擊十二年考王崩威烈王立十五年魏文侯斯初立紀年在敬公十八年十八年幽公淫婦人夜竊出邑中盜殺幽公紀年夫人秦嬴賊公于髙寢之上諡曰幽魏斯以兵誅晉亂立幽公子止是為烈公系本幽公生烈成公止年表魏誅幽公立其弟止紀年烈公四年趙氏城平邑五年田公子居思伐趙鄙圍平邑十年田肹及邯鄲韓舉戰于平邑獲韓舉取平邑新城烈公十七年王賜趙籍韓虔魏斯皆命為諸侯晉世家在烈公十九年今在十七年者因前增哀公之二年故上縮二年十八年威烈王崩安王立二十七年公薨諡曰烈子孝公頎立系本孝公傾欣紀年以孝公為桓公韓子有晉桓侯孝公九年魏武侯初立襲邯鄲不勝而去十七年公薨諡曰孝紀年桓公二十年趙成侯韓共侯遷桓公于屯留子靜公俱酒立是年安王崩烈王立靜公二年魏武侯韓哀侯趙敬侯滅晉後而三分其地晉公遷為家人晉絶不祀史記贊曰宣王立魯戲卒自誅命不順故也曲沃奪宗僖王不誅而以賂成之周之衰自衰已吾聞之以尊履卑天之經也小不加大王之紀也茍反之不可以國晉既反之象之者何誅焉然則三家之分君子恕僖而威烈是責不亦後乎獻去桓莊文夷惠懷刻薄寡恩祇以成霸其量固不逺矣雖然文有踐土河陽之會悼有雞澤亳之盟定天位奬王室不有霸者周替久矣是故聖人出則霸者奴王迹息則桓文趨傷無援也尚史卷十一
