body:
  text: 尚史卷八十八表二鑲白旗漢軍李鍇撰周同姓諸侯年表上太史公一觀諸要譜十二諸侯闢馳説却厯人法至簡也今擬其體著之表繫統于周列國班焉首同姓次異姓同姓尚親異姓尚功始周始訖周終一以従之天之道也夫王者之道正乎天天之道正乎一仲尼法天尊王修春秋而春王之書要非魯史之舊所以標萬世之正乎夷孝以上無年世表之次多不合紀年僻不足徵參索以挈之作年表尚史卷八十八
