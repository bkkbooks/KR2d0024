body:
  text: 尚史卷四十三列傳二十一鑲白旗漢軍李鍇撰晉諸臣傳胥臣胥甲父胥克胥童胥臣一曰臼季字季子嘗為司空又曰司空季子初從公子重耳出亡及入秦秦伯歸女五人懷嬴與焉懷嬴故子圉妻公子欲辭胥臣曰同姓為兄弟黃帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為己姓青陽方雷氏之甥也方雷西陵氏之姓黃帝取于西陵氏之子曰纍祖實生青陽雷纍同夷鼓彤魚氏之甥也彤魚國名其同生而異姓者四母之子别為十二姓凡黃帝之子二十五宗其得姓者十四人為十二姓十四人二人為姬二人為巳故十二姓姬酉祁巳滕葴任荀僖姞儇依是也唯青陽與倉林氏同于黃帝故皆為姬姓同德之難也如是昔少典取于有蟜氏少典黃帝神農之先有蟜諸侯也或謂少典黃帝神農之父非是生黃帝炎帝黃帝以姬水成炎帝以姜水成成而異德故黃帝為姬炎帝為姜二帝用師以相濟也異德之故也異姓則異德異德則異類異類雖近男女相及以生民也同姓則同德同德則同心同心則同志同志雖逺男女不相及畏黷敬也黷則生怨怨亂育災災育滅姓是故取妻避其同姓畏亂災也故異德合姓同德合義義以道利利以阜姓姓利相更成而不遷乃能攝固保其土房今子于子圉道路之人也取其所棄以濟大事不亦可乎公子親筮之曰尚有晉國得貞屯悔豫皆八也內曰貞外曰悔震下坎上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩隂爻在貞在悔皆不動故曰皆八謂爻無為也筮史占之皆曰不吉閉而不通爻無為也震為動動遇坎坎為險阻閉塞不通無所為也胥臣曰吉是在易皆利建侯屯初九曰利建侯豫大象曰利建侯行師吉不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告我曰利建侯得國之務也吉孰大焉震車也坎水也坤土也屯厚也豫樂也車班外內順以訓之班外內者屯之內有震豫之外亦有震坤順也豫內為坤屯上與四亦為坤泉原以資之土厚而樂其實不有晉國何以當之震雷也車也坎勞也水也衆也主雷與車而尚水與衆車有震武也衆而順文也文武具厚之至也故曰屯其繇曰元亨利貞勿用有攸往利建侯利主震雷長也故曰元衆而順嘉也故曰亨內有震雷故利貞震以動之利也侯以正國貞也車上水下必伯車動而上威也水動而下順也有威而衆從故必伯小事不濟壅也故曰勿用有攸往小事小人之事震動而遇坎坎為險阻故曰壅一夫之行也易曰震一索而得男故曰一夫又曰震作足故為行也衆順而有武威故曰利建侯坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也居樂母在內也出威震在外也居樂故利建侯出威故利行師是二者得國之卦也公子果入是為文公文公六年僖二十八年公問元帥于趙衰對曰先軫有謀胥臣多聞皆可以為輔臣弗若也乃使先軫將中軍胥臣佐下軍國語夏四月楚圍宋我救之楚師次于城濮我師陳于莘北胥臣以下軍之佐當陳蔡蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰既而狐毛先軫夾攻楚左師左師亦潰楚師敗績襄公元年僖三十三年我敗狄于箕郤缺獲白狄子初胥臣舉郤缺及是公以再命命先茅之縣賞胥臣曰舉郤缺子之功也二年文元年胥臣及先且居伐衛取戚獲孫昭子傳失名六年文五年胥臣卒左傳文公嘗學讀書于胥臣三日曰吾不能行也咫咫尺間也聞則多矣對曰然而多聞以待能者不猶愈乎又問于胥臣曰吾欲使陽處父傅歡也歡襄公名而教誨之其能善之乎對曰是在歡也籧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇􅕓不可使視嚚瘖不可使言聾聵不可使聽僮昏不可使謀質將善而賢良贊之則濟可俟也若有違質教將不入其何善之為臣聞昔者太任娠文王不變不變動也少溲于豕牢而得文王少溲小便豕牢厠也不加病焉文王在母不憂在傅不勤處師弗煩事王不怒敬友二虢文王弟虢仲虢叔也而惠慈二蔡文王子管叔初亦為蔡刑于大姒比于諸弟詩云刑于寡妻至于兄弟以御于家邦于是乎用四方之賢良及其即位也詢于八虞而咨于二虢度于閎夭而謀于南宫諏于蔡原而訪于辛尹蔡公元公辛甲尹佚皆周大夫重之以周召畢榮億寧百神而柔和萬民故詩曰惠于宗公神罔時恫是則文王非専教誨之力也公曰然則教無益乎對曰胡為文益其質故人生而學非學不入公曰奈夫八疾何對曰官師之取材也戚施直鎛直主擊鎛鎛鍾也籧篨䝉璆䝉戴也璆玉磬侏儒扶盧扶緣也盧矛㦸之柲緣之以為戲矇􅕓修聲無目于音聲審聾聵司火耳無聞于視審僮昏嚚瘖僬僥官師匪不材也以實裔土夫教者因體能質而利之者也若川然有原以卬浦而後大國語說苑文公見咎季其廟傅于西牆公曰孰處而西對曰君之老臣也公曰西益而宅對曰臣之忠不如老臣之力其牆壞而不築公曰何不築對曰一日不稼百日不食公出而告之僕僕頓首于軫曰吕刑云一人有慶兆民賴之君之明羣臣之福也乃令于國曰毋淫宫室以妨人宅板築以時無奪農功胥臣子甲父胥甲父胥臣之子也事靈公靈公六年文十二年秦伐我取羈馬我禦之甲父佐下軍以從秦師于河曲及秦師將遁㬰駢請薄諸河甲父及趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人于險無勇也乃止秦師夜遁十三年宣元年討河曲之戰不用命者放甲父于衛而立其子克克有蠱疾郤缺為政廢克使趙朔佐下軍克子童又名胥之昧為大夫嬖于厲公童以克之廢也怨郤氏厲公七年成十七年公將去諸大夫童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然使童帥甲八百將攻郤氏㑹長魚矯襲殺三郤童以甲劫欒書中行偃于朝已而欒書中行偃執公遂殺童胥氏由是不嗣左傳胥梁帶胥梁帶為大夫事平公齊烏餘齊大夫以廩邱來奔襲衛羊角及魯髙魚皆取之又取邑于宋諸侯弗能治也及趙武為政乃言于公曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師公使往胥梁帶使諸喪邑者具車徒以受地必周周密也必密來勿以受地為名使烏餘具車徒以受封烏餘以其衆出使諸侯僞效烏餘之封者而遂執之盡獲之皆取其邑而歸諸侯左傳陽處父賈他附寧嬴陽處父為大夫初事文公使傅大子文公九年僖三十二年楚使請平于我處父報之晉楚始通冬文公薨襄公立處父為大傅襄公元年僖三十三年我獲秦三帥既而舍之先軫怒公使處父追之及諸河則在舟中矣釋左驂以公命贈百里視視覺之卒不反處父侵蔡楚鬭勃救之與我師夾泜而軍處父患之使謂鬬勃曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待鬭勃退舍處父宣言曰楚師遁矣遂歸楚師亦歸楚于是殺鬭勃三年文二年魯文公即位我以不朝討魯魯侯來朝使處父盟魯侯以耻之四年文三年楚圍江處父及周王叔桓公伐楚以救江門于方城遇息公子朱而還六年文五年處父聘于衛明年公搜于夷舍二軍先是晉作五軍今舍二軍復三軍之制使狐射姑將中軍趙盾佐之處父至自溫改搜于董易趙盾將中軍處父趙衰之屬也故黨于趙氏且謂趙盾能曰使能國之利也是以上之趙盾于是始為國政既成以授處父與賈他使行諸國以為常法秋八月襄公薨靈公少未立狐射姑怨處父之易其班也而知其無援于晉也使狐鞫居殺處父公羊君將使射姑將陽處父諫曰射姑民衆不說不可使將射姑入君謂射姑曰陽處父言曰射姑民衆不說不可使將射姑怒出刺陽處父于朝而走榖梁晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁襄公謂夜姑曰吾始使盾佐女今女佐盾矣襄公死處父主竟上事夜姑使人殺之寧有嬴氏者為逆旅大夫處父之聘于衛也反過寧晉邑寧嬴從之及溫而還其妻問之嬴曰以剛商書曰沉潛剛克髙明柔克夫子一之其不沒乎天為剛德猶不干時况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之左傳國語陽處父舍于逆旅寧嬴氏嬴謂其妻曰吾求君子久矣乃今得之舉而從之陽子道與之語及山而還其妻曰子得所求而不從之何其懷也曰吾見其貌而欲之聞其言而惡之夫貌情之華也言貌之機也身為情成于中言身之文也言文而發之合而後行離則有釁今陽子之貌濟其言匱非其實也若中不濟而外彊之其卒將復中外易矣若外內類而言反之瀆其信也夫言以昭信奉之如機厯時而發之胡可瀆也今陽子之情譿矣以濟蓋也且剛而主能不本而犯怨之所聚也吾懼未獲其利而及其難是故去之賈他初以公族從文公出亡後為晉太師杜預注箕鄭父箕鄭父為大夫事文公晉饑公問于鄭父曰救饑何以對曰信公曰安信對曰信于君心信于名信于令信于事公曰然則若何對曰信于君心則美惡不踰信于民則上下不干信于令則時無廢功信于事則民從事有業于是乎民知君心貧而不懼藏出如入何匱之有公使為箕大夫韓非子略同又曰文公出亡箕鄭挈壺餐而從迷而失道與公相失飢而寢不敢食及公反國攻原拔之公曰夫輕饑餒之患而必全壺餐是將不以原叛乃以為原令大夫渾軒聞而非之曰以不動壺餐信其不叛不亦無術乎文公八年僖三十一年搜于清原作五軍使鄭父佐新上軍國語七年文六年襄公薨明年秦送公子雍趙盾背雍而立靈公以禦秦師鄭父居守夷之搜也在文六年襄公將登鄭父將上軍先克沮之及靈公即位鄭父使賊殺先克晉殺鄭父左傳論曰處父之難先克之死與三郤同卒以射姑亡命箕鄭殺身而胥臣沈族君且從焉書曰怨不在大樹怨以崇禍誰能救之至若剛而干時犯而聚怨亦天之所厭與臾駢臾駢者趙盾屬大夫襄公七年文六年狐射姑即賈季使狐鞫居之殺陽處父也晉殺狐鞫居射姑懼討奔狄趙盾使駢送其帑射姑為中軍佐與盾同官夷之搜在今年春射姑戮駢駢之人欲盡殺賈氏以報焉駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮于賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益仇非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟靈公六年文十二年秦伐我取羈馬趙盾禦之駢佐上軍以從秦師于河曲駢曰秦不能久請深壘固軍以待之從之㑹秦軍掩我上軍趙穿趙夙庶孫追之不及怒軍吏曰將有待也穿曰我不知謀將獨出以其屬出乃皆出戰交綏退軍為綏秦行人夜戒我師曰兩軍之士皆未憗也憗缺也眀日請相見也駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之趙穿不可乃止秦師夜遁左傳解揚酅魁壘附解揚者為大夫事靈公靈公少趙盾為政靈公二年文八年公使揚歸匡戚之田于衛且復致公壻池晉君壻之封自申至于虎牢之竟十三年宣元年楚侵陳宋趙盾帥師救陳宋㑹于棐林以伐鄭楚救鄭遇于北林囚揚我師乃還景公六年宣十五年楚圍宋宋告急于我公欲救之伯宗晉大夫諫乃止使揚如宋揚反晉傳不載使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考考成也死又何求楚子舍之以歸又有酅魁壘者晉士也出公四年悼四年荀瑶圍鄭鄭人俘魁壘賂之以執政使反為鄭魁壘閉其口而死左傳苗賁皇苗賁皇者楚鬭椒之子國語賁作棼成公二年宣四年楚子滅若敖氏即鬬椒賁皇奔晉晉人與之苗晉邑是為苗賁皇為大夫成公薨事景公景公十一年成二年敗齊師于鞍明年齊侯來郤克獻之以得隕命之禮伐國獲君是謂隕命曰寡君使克也不腆敝邑之禮為君之辱敢歸諸下執政以憗御人憖願也御人婦人也言願以此報君婦人之笑己者賁皇曰郤子勇而不知禮言齊雖敗頃公不見得非隕命也矜其伐而耻國君其與幾何國語景公薨事厲公厲公六年成十六年公伐鄭楚救之遇于鄢陵楚子登巢車車上為櫓以望我軍伯州犂故晉伯宗子前年奔楚侍楚子後以公卒告楚子賁皇在公之側亦以楚子之卒告皆曰國士在國士謂伯州犂且厚不可當也賁皇言于公曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃于王卒必大敗矣左傳伯宗夏陽說附伯宗者榖梁作伯尊大夫孫伯糾之子也伯紏系未詳韋昭注景公六年宣十五年楚圍宋宋告急于我公欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之彊能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止潞子嬰兒之夫人公之姊也鄷舒潞之相為政而殺之又傷潞子之目公將伐之諸大夫皆曰不可鄷紓有三俊才不如待後之人伯宗曰必伐之狄有五罪俊才雖多何補焉不祀一也耆酒二也棄仲章潞賢人而奪黎民黎侯國地三也虐我伯姬四也傷其君目五也怙其俊才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣公從之滅潞夏陽說者亦晉大夫十五年成六年伯宗夏陽說及衛人鄭人侵宋師于針衛人不保不守備也說欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止厲公時三郤害伯宗譖而殺之伯宗子州犂奔楚韓厥曰郤氏其不免乎善人天地之紀也而驟絶也不亡何待左傳論曰解揚廷楚伯宗保衛皆所以成其信也說而入有風澤之象焉是以豚魚吉也駢不敵怨長者自居而非趙孟之心乎張老籍偃鐸遏冦張君臣附張老字孟籍偃字遊及鐸遏冦並為大夫厲公八年成十八年悼公即位知張老之知而不詐也使為元候即中軍候奄主斥候之官知鐸遏冦之恭敬而信彊也使為輿尉即上軍尉知籍偃之惇率舊職而共給也使為輿司馬即上軍司馬始合諸侯于虛朾宋地以救宋使張老延君譽于四方且觀道逆者觀察諸侯之道德與逆亂者二年襄三年公使張老為卿辭曰臣不如魏絳夫絳之知能治大官其仁可以利公室不忘其勇不疚于刑其學不廢其先人之職若在卿位外內必平且雞邱之㑹傳作雞澤衛地其官不犯戮楊干也而辭順不可不賞也公五命之固辭乃使為司馬使魏絳佐新軍士丐與和大夫爭田久而無成丐欲攻之問于張老張老曰老也以軍事承子非戎則非吾所知也問于籍偃籍偃曰偃以斧鉞從于張孟曰聽命焉若夫子之命也何二之有釋夫子而舉是反吾子也夫子謂張老吾子謂士丐趙武為室斫其椽而礱之張老夕焉而見之不謁而歸武聞之駕而往曰吾不善子亦告我何其速也對曰天子之室斫其椽而礱之加密石焉密理石謂砥也諸侯礱之無密石大夫斫之不礱士首之斫其首備其物義也從其等禮也今子貴而忘義富而忘禮吾懼不免何敢以告趙武歸令勿礱匠人請皆斫之曰止為後世之見之也其斫者仁者之為也其礱者不仁者之為也國語既成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌于斯哭于斯聚國族于斯趙武曰武也得歌于斯哭于斯聚國族于斯是全要領以從先大夫于九京也北面再拜稽首記檀弓張老子張君臣平公元年襄十六年代其父為中軍司馬籍偃籍季之子也其八世祖孫伯黶為晉正卿籍偃當士丐逐欒盈時被囚既而免之左傳籍偃子籍談鐸遏冦他事不具載籍談籍秦籍談字叔籍偃之子也事昭公昭公五年昭十五年荀躒即知文子如周葬穆后談為介既葬除喪以荀躒宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也荀躒揖談談對曰諸侯之封也皆受明器于王室以鎮撫其社稷故能薦彛器于王晉居深山戎狄之與鄰而逺于王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也密須姞姓國文王伐之得其鼓路以搜闕鞏之甲武所以克商也闕鞏國名唐叔受之以處參虛實沈之次晉之分野匡有戎狄其後襄之二路針鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彛器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉于是乎有董史女司典之後也何故忘之談不能對賓出王曰籍父其無後乎數典而忘其祖昭公薨事頃公頃公六年昭二十二年景王崩悼王立子朝作亂王次于皇談及荀躒帥九州之戎及焦瑕溫原之師納王于王城悼王崩敬王立談軍于隂荀躒軍于侯氏我師取前城明年圍郊郊鄩潰我師在平隂子朝敗王使告閒使告閒暇于晉乃還談子秦秦事頃公為上軍司馬頃公十一年昭二十七年士鞅㑹于扈令戍周冬十二月秦致諸侯之戍于周頃公薨事定公定公九年定七年王以儋翩之難處于姑蕕周地單武公劉桓公逆王秦送王入于王城十五年定十三年趙鞅殺邯鄲午午子稷以邯鄲叛秦圍之既而范中行氏即荀寅士吉射逐趙鞅韓魏韓不信魏曼多反逐范中行氏秦黨范氏從范氏出奔出奔事傳注俱不分明明年晉敗范中行氏之師于潞秦地獲秦籍氏遂不嗣左傳論曰張老讓魏絳以卿折士丐以正規趙武以不善知而不詐又多聞焉籍氏忘祖景王譏之然失禮樂憂又且來天下之口也女叔齊女寬閻明叔遊附司馬女叔齊是為司馬侯為大夫事悼公公與齊升臺而望曰樂夫對曰臨下之樂則樂矣德義之樂則未也公曰何謂德義對曰諸侯之為日在君側以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌肹習于春秋乃使肹傅太子彪平公名悼公薨事平公士丐與和大夫爭田欲攻之齊見曰聞吾子有和之怒吾以為不信諸侯皆有二心是之不憂而怒和大夫非子之任也國語平公十一年襄二十六年衛寧喜弒衛侯剽而納獻公趙武為㑹于澶淵以討衛執寧喜北宫遺使齊以先歸十四年襄二十九年使齊如魯治杞田平公母杞女故使魯歸前侵杞田弗盡歸也悼夫人愠曰齊也取貨先君若有知也不尚取之不尚齊之取貨公告齊齊曰虞虢焦滑霍揚韓魏皆姬姓也八國皆晉所滅晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦于晉以杞封魯猶可而何有焉魯之于晉也職貢不乏玩好時至公卿大夫相繼于朝史不絶書府無虛月如是可矣何必瘠魯以肥杞且先君而有知也母寧夫人而焉用老臣言先君母寧怪夫人之所為無用責我二十年昭四年楚子使椒舉來求諸侯欲専㑹諸侯公欲勿許齊曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸于德吾猶將事之况諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽岱華衡恆三塗大行轘轅崤黽陽城山名大室即嵩髙山荆山中南即終南山九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其彊土或無難以喪其國失其守宇若何虞難齊有仲孫即公孫無知之難而獲桓公至今賴之晉有里㔻之難而獲文公是以為盟主衛邢無難敵亦喪之閔二年狄滅衛僖二十五年衛滅邢故人之難不可虞也恃此三者而不修政德亡于不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使羊舌肹對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉二十一年昭五年魯昭公來見自郊勞至于贈賄無失禮公謂齊曰魯侯不亦善于禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國謂伐莒取鄆利人之難謂莒亂而取鄫不知其私公室四分民食于他謂三家也思莫在公不圖其終為國君難將及身不恤其所禮之本末將于此乎在而屑屑焉習儀以亟言善于禮不亦逺乎君子謂叔侯于是乎知禮左傳杜預注時平公亦失政齊以此諷諫齊子寬女寬字叔褒齊之子也為大夫事頃公頃公十年昭二十六年子朝之亂知躒趙鞅納王使寬守闕塞備子朝十二年昭二十八年魏舒舉魏戊舒庶子為梗陽大夫梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏舒將受之魏戊謂寬及閻沒曰主以不賄聞于諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待于庭饋入召之比置自始食至食盡三歎既食使坐魏舒曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置至食及半自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已魏舒辭梗陽人頃公薨事定公初周萇𢎞欲遷都成周定公三年定元年魏舒合諸侯之大夫城成周齊髙張後不從諸侯寬曰周萇𢎞齊髙張皆將不免萇𢎞違天髙子違人天之所壞不可支也衆之所為不可奸也閻沒者即閻明亦為晉大夫定公八年定六年子朝餘黨儋翩復作亂閻沒戍周且城胥靡又有司馬叔遊者亦齊之子杜預注叔遊司馬叔侯之子叔侯即女齊也韋昭注女寬女齊之子叔褒也叔褒叔遊或即是一人祁盈之家臣祁勝與塢臧通室盈將執之訪于叔遊叔遊曰鄭書古書名有之惡直醜正實蕃有徒無道立矣子懼不免詩曰民之多辟無自立辟姑已若何盈不聽祁氏遂亡左傳成鱄成鱄者晉大夫頃公十二年昭二十八年魏舒以魏戊為梗陽大夫舒謂鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人也逺不忘君近不逼同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人按武王兄弟封國者管蔡郕霍魯衛毛𣆀郜雍曹滕畢原豐郇凡十六人此言十五紀載不同姬姓之國者四十人皆舉親也夫舉無他唯善所在親疏一也詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之主之舉也近文德矣所及其逺哉左傳論曰心有恃敬則衰恃則侈之門也德音且不可恃而况險與馬哉湯之聖敬日躋文王之小心翼翼間其恃也女叔之論倫脊昭然宜其聽乎腹有厭心則無厭善乎叔褒之諷亦所以革其侈也陽畢陽畢者晉大夫事平公平公六年襄二十一年我逐欒盈箕遺及黃淵嘉父作亂不克而死韋昭注箕遺等皆晉大夫欒盈之黨士丐將逐欒盈箕遺等知之而作亂士丐殺其黨十人公謂畢曰自穆侯桓叔之父以至于今亂兵不輟民志無厭禍敗無已離民且速冦恐及吾身若之何對曰本根猶樹枝葉益長本根益茂是以難已也今若大其柯去其枝葉絶其本根可以少間公曰子實圖之畢曰圖在明訓眀訓在威權威權在君君掄賢人之後有常位于國者而立之亦掄逞志虧君以亂國者之後而去之是遂威而逺權民畏其威而懷其德莫能勿從若從則民心皆可畜畜其心而知其欲惡民孰偷生若不偷生則莫思亂矣且夫欒氏之誣晉國也久矣欒書實覆宗殺厲公以厚其家若滅欒氏則民威矣今吾若起瑕原韓魏之後而賞立之則民懷矣威與懷各當其所則國安矣君治而國安欲作亂者誰與公曰欒書立吾先君欒盈不獲罪如何畢曰夫正國者不可以昵于權行權不可以隱于私昵于權則民不道行權隱于私則政不行政不行何以道民民之不道亦無君矣則其為昵與隱也復産害矣且勤君身若愛欒盈則眀逐羣賊而以國倫數而遣之厚戒針國以待之彼若求逞志而報于君罪孰大焉滅之猶少彼若不敢而逺逃乃厚其外交而勉之以報其德不亦可乎公許諾盡逐羣賊而使畢及祁午適曲沃逐欒盈盈出奔楚遂令于國人曰自文公以來有力于先君而子孫不育者將授立之得之者賞國語郵無恤王良郵無恤字伯樂又名王良又曰郵良國語作郵無正為晉大夫定公十九年哀二年荀寅士吉射叛晉居朝歌齊人輸之粟鄭人送之趙鞅禦之遇于戚將戰郵無恤御鞅衛世子蒯聵為右登鐵上邱名望見鄭師衆世子懼自投于車下無恤授世子綏而乘之曰婦人也及戰鄭人擊鞅中肩斃踣也于車中獲其蜂旗世子救之以戈鄭師北世子復伐之大敗鄭師獲齊粟千車既戰鞅曰吾伏韜弓衣嘔血鼓音不衰今日我上也世子曰吾救主于車中退敵于下我右之上也無恤曰我兩靷將絶吾能止之我御之上也駕而乘材兩靷皆絶乘載也材橫木明細小也言駕而載細小之橫木兩靷同時皆絶左傳鞅使家臣尹鐸為晉陽曰必墮其壘培荀寅士吉射圍趙氏所作壘培尹鐸往而增之鞅怒曰必殺鐸也而後入大夫辭之不可曰是昭余讎也無恤進曰昔先主文子趙武也少釁于難從姬氏于公宫有孝德以出在公族有恭德以升在位有武德以羞為正卿有溫德以成其名譽失趙氏之典刑而去其師保基於其身以克復其所及景子趙成長于公宫未及教訓而嗣立矣亦能纂修其身以受先業無謗于國順德以學音效教也子擇言以教子擇師保以相子今吾子嗣位有文之典刑有景之教訓重之以師保加之以父兄子皆疏之以及此難夫尹鐸曰思樂而喜思難而懼人之道也委土可以為師保吾何為不增是以修之庶曰可以鑑而鳩趙宗乎若罰之是罰善也罰善必賞惡臣何望矣鞅說曰微子吾幾不為人矣以免難之賞賞尹鐸初無恤與尹鐸有怨以其賞如無恤曰子免吾死敢不歸祿辭曰吾為主圖非為子也怨之如初國語司馬寅司馬寅者亦晉大夫定公三十年哀十三年公及吳子盟于黃池時越已入吳獲大子友將歃吳晉爭先吳人曰于周室我為長晉人曰于姬姓我為伯趙鞅呼寅曰日旰矣大事未成二臣鞅與寅之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨氣色下也今吳王有墨國勝乎大子死乎且夷德輕不忍久請少待之乃先我左傳論曰欒氏之獄弒君不討而無罪見逐書幸盈殃威懷並失亂之所以不戢夫若夫增壘而賞亦能有懷也尚史卷四十三
