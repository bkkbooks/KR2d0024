body:
  text: 尚史卷七十四列傳五十二鑲白旗漢軍李鍇撰魏冉芉戎須賈附穰侯魏冉者秦昭王母宣太后弟也其先楚人昭王母故號為芉八子及昭王即位芉八子號為宣太后宣太后二弟其異父長弟曰穰侯姓魏氏名冉同父弟曰芉戎為華陽君而昭王同母弟曰髙陵君涇陽君而魏冉最賢自惠王武王時任職用事武王卒諸弟爭立唯魏冉力為能立昭王昭王即位以冉為將軍衛咸陽誅季君之亂而逐武王后出之魏昭王諸兄弟不善者皆滅之威振秦國昭王少宣太后自治任魏冉為政昭王七年樗里疾死而使涇陽君質于齊趙人樓緩來相秦趙不利史記使仇赫之秦請相魏冉宋突謂仇赫曰秦不聽樓緩必怨公公不若陰辭樓緩請毋急秦王秦王見趙請相魏冉之不急且不聽公言是事不成以德樓子事成魏冉故德公矣國䇿于是仇赫從之秦果免樓緩而魏冉相秦欲誅吕禮禮出奔齊十四年魏冉舉白起使代向壽將而攻韓魏敗之伊闕斬首二十四萬虜魏將公孫喜明年又取楚之宛葉魏冉謝病免相以客卿壽燭為相其明年燭免復相冉乃封魏冉於穰復益封陰即陶邑濟陰之定陶號曰穰侯冉封四嵗為秦將攻魏魏獻河東方四百里拔魏之河內取城大小六十餘昭王十九年秦稱西帝齊稱東帝月餘吕禮來而齊秦各復歸帝為王魏冉復相秦六嵗而免免二嵗復相秦四嵗而使白起拔楚之郢秦置南郡乃封白起為武安君白起者冉之所任舉也相善于是冉之富富于王室史記三十三年冉為相國將兵敗魏于華走芒卯而圍大梁須賈謂冉曰臣聞魏氏大臣父兄謂魏王曰昔惠王伐趙戰乎三梁拔邯鄲趙氏不割而邯鄲復歸齊人攻燕殺子之破故國燕不割而燕國復歸燕趙之所以國全兵徑而地不并于諸侯者以其能忍難而重出地也宋中山數伐數割而國隨以亡臣以為燕趙可法而宋中山可無為也夫秦貪利之國而毋親蠶食魏盡晉國戰勝睪子割八縣地未畢入而兵復出矣夫秦何厭之有哉今又走芒卯入北地此非但攻梁也且劫王以多割地王必勿聽也今王循楚趙而講楚趙怒而與王爭事秦秦必受之秦挾楚趙之兵以復攻則國救亡不可得已願王之必無講也王若欲講少割而有質不然必見欺此臣之所聞于魏也願君之以是慮事也周書曰惟命不于常此言幸之不可數也夫戰勝睪子割八縣此非兵力之精非計之工也天幸為多矣今又走芒卯入北地以攻大梁是以天幸自為常也智者不然臣聞魏氏悉其百縣勝兵以北戍大梁臣以為不下三十萬之衆守十仭之城臣以為湯武復生不易攻也夫輕信楚趙之兵陵十仭之城戰三十萬之衆而志必舉之臣以為自天地始分以至于今未嘗有者也攻而不拔秦兵必罷陰必亡則前功必棄矣今魏方疑可以少割收也願君逮楚趙之兵未至于梁亟于少割收魏魏方疑而得以少割為和必欲之則君得所欲矣楚趙怒于魏之先已講也必爭事秦從以此散而君後擇焉且君之取地豈必以兵哉夫兵不用而魏效絳安邑又為陰啓兩機盡故宋衛效尤憚秦兵以合而君制之自陰啓兩機以下或有舛誤鮑注不分明史多變文以就之何索而不得何為而不成願君熟慮之而無行危也冉曰善乃罷梁圍國策明年魏背秦與齊從親秦使穰侯伐魏斬首四萬走魏將暴鳶得魏三縣冉益封史記秦拔魏寧邑魏王令人謂秦王曰王歸寧邑吾請先天下講冉曰王無聽魏見天下之不足恃也故欲先講夫亡寧者宜割二邑以求講夫得寧者安能歸寧乎魏䇿明年冉與白起客卿胡陽復攻魏破芒卯于華陽斬首十萬取魏之卷蔡陽長社史記趙且與秦伐齊齊懼令田章以陽武合于趙而以順子齊公子為質趙乃案兵告于秦秦使公子他謂趙王曰齊與大國救魏而倍約大國不義以告敝邑而賜之二社之地以奉祭祀史記作取趙觀津又與之與按䇿是趙與秦地非秦取而復之也今又案兵而受其地非使臣之所知也請益甲四萬大國裁之于是蘇代為齊獻書于冉曰臣聞往來者言曰秦且益趙甲四萬以伐齊臣竊必之敝邑之王曰秦王明而熟于計穰侯智而習于事必不益趙甲四萬以伐齊是何也夫三晉相結秦之深讐也百背秦百欺秦不為不信不為無行今破齊以肥趙趙秦之深讐不利于秦一也秦之謀者必曰破齊敝晉楚而後制晉楚之勝夫齊罷國也以天下擊之如以千鈞之弩決潰癰也安能制晉楚哉二也秦少出兵則晉楚不信多出兵則晉楚為制于秦齊恐必不走秦且走晉楚三也齊割地以實晉楚則晉楚安齊舉兵而為之頓劍則秦反受兵四也是晉楚以秦伐齊以齊破秦何晉楚之智而秦齊之愚五也秦得安邑善齊以安之亦必無患矣秦有安邑韓氏必無上黨矣夫取三晉之腸胃與出兵而懼其不反也孰利臣故曰秦王明而熟于計穰侯智而習于事必不益趙甲四萬以伐齊矣于是冉不行引兵而歸三十六年客卿造謂冉曰秦封君以陶藉君天下數年矣攻齊之事成陶為萬乘長小國以朝天子天下必聽五霸之事也攻齊不成陶為鄰恤言近于憂而莫之據也故齊之于陶存亡之機也君何不使人謂燕相國曰聖人不能為時時至弗失舜不遇堯不得為天子湯武不當桀紂不王以舜湯武之賢不遭時不得帝王今攻齊此君之時也已因天下之力伐讐國之齊報惠王之恥成昭王之功除萬世之害此燕之長利君之大名也詩云樹德莫如滋除惡莫如盡吳不亡越越故亡吳齊不亡燕燕故亡齊此除疾不盡也非以此時成君之功除君之害秦卒有他事而從齊齊秦合其讐君必深矣挾君之讐以誅于燕後雖悔之不可得已君悉燕兵而疾攻之天下之從君也若報父子之仇誠能亡齊封君于河南為萬乘達途于中國南與陶為鄰世世無患願君之專志而無他慮也國䇿冉遂欲伐齊取剛壽以廣其陶邑于是魏人范睢自謂張祿先生譏冉之伐齊乃越三晉以攻齊也以此時姦説昭王昭王于是用范睢范睢言宣太后專制穰侯擅權于諸侯涇陽君髙陵君之屬太侈富於王室于是秦王悟乃免冉相國令涇陽之屬皆出關就封邑冉出關輜車千乘有餘冉卒于陶而因葬焉秦復收陶為郡史記芈戎宣太后同父弟號華陽君又號新城君宣太后時戎與冉並用事擊斷無諱段産秦人于是謂戎曰夫宵行者能無為姦而不能令狗無吠已今百處郎中能無議君于王而不能使人毋議臣于君願君察之也國䇿作白圭段千越人又謂戎曰王良之弟子駕云取千里馬遇造父之弟子造父之弟子曰馬不千里王良之弟子曰馬千里之馬也服千里之服也而不能取千里何也曰子纆牽長故纆牽于事萬分之一也而難千里之行今臣雖不肖于秦亦萬分之一也而相國戎未嘗相尊稱之不釋塞者言障之于王不解是纆牽長也戎初以罪去楚入東周及冉用事還入秦范睢進説乃逐戎于關外就封邑國䇿范睢蔡澤范睢者魏人也字叔遊説諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈須賈為魏昭王使于齊范睢從留數月未得報齊襄王聞睢辨口乃使人賜睢金十斤及牛酒睢辭謝不敢受須賈知之大怒以為睢持魏國陰事告齊故得此饋令睢受其牛酒還其金既歸心怒睢以告魏相魏相魏之諸公子曰魏齊魏齊大怒使舍人笞擊睢折脅摺齒睢佯死即卷以簀置厠中賓客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出棄簀中死人魏齊醉曰可矣睢得出後魏齊悔復召求之魏人鄭安平聞之乃遂操睢亡伏匿更名姓曰張祿當此時秦昭王使謁者王稽於魏鄭安平詐為卒侍王稽王稽問魏有賢人可與俱西遊者乎鄭安平曰臣里中有張祿先生欲見君言天下事其人有仇不敢晝見王稽曰夜與俱來鄭安平夜與張祿見王稽語未究王稽知睢賢謂曰先生待我于三亭之南與私約而去王稽辭魏去過載睢入秦至湖關望見車騎從西來睢曰彼來者為誰王稽曰秦相穰侯東行縣邑睢曰吾聞穰侯專秦權惡內諸侯客此恐辱我我寧且匿車中有頃穰侯果至勞王稽因立車語曰關東有何變曰無有又謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即别去睢曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之于是睢下車走曰此必悔之行十餘里果使騎還索車中無客乃已王稽遂與睢入咸陽已報使因言曰魏有張祿先生天下辨士也曰秦王之國危于纍卵得臣則安然不可以書傳也臣故載來秦王弗信使舍食草具待命嵗餘當是時昭王已立三十六年南拔楚之鄢郢楚懷王幽死于秦秦東破齊湣王常稱帝後去之數困三晉厭天下辨士無所信穰侯華陽君昭王母宣太后之弟也而涇陽君髙陵君皆昭王同母弟也穰侯相三人者更將有封邑以太后故私家富重於王室及穰侯為秦將且欲越韓魏而伐齊綱壽欲以廣其陶封睢乃上書曰臣聞明主立政有功者不得不賞有能者不得不官勞大者其祿厚功多者其爵尊能治衆者其官大故無能者不敢當職焉有能者亦不得蔽隱使以臣之言為可願行而益利其道以臣之言為不可久留臣無為也語曰庸主賞所愛而罰所惡明主則不然賞必加于有功而刑必斷于有罪今臣之胸不足以當椹質而要不足以待鈇鉞豈敢以疑事嘗試于王哉雖以臣為賤人而輕辱獨不重任臣者之無反復于王邪且臣聞周有砥砨宋有結緑梁有縣藜楚有和璞此四寶者土之所生良工之所失也而為天下名器然則聖王之所棄者獨不足以厚國家乎臣聞善厚家者取之于國善厚國者取之于諸侯天下有明主則諸侯不得擅厚者何也為其割榮也良醫知病人之死生而聖主明于成敗之事利則行之害則舍之疑則少嘗之雖舜禹復生弗能改已語之至者臣不敢載之于書其淺者又不足聽也意者臣愚而不概于王心邪亡其言臣者賤而不可用乎自非然者臣願得少賜遊觀之間望見顔色一語無效請伏斧質于是秦昭王大説乃謝王稽使以傳車召睢于是睢乃得見于離宫詳為不知永巷而入其中王來而宦者怒逐之曰王至睢繆為曰秦安得王秦獨有太后穰侯耳欲以感怒昭王昭王至聞其與宦者爭言遂延迎謝曰寡人宜以身受命久矣會義渠之事急寡人旦暮自請太后今義渠之事已寡人乃得受命竊閔然不敏敬執賓主之禮睢辭讓是日觀睢之見者羣臣莫不灑然變色易容者秦王屏左右宫中虛無人秦王跽而請曰先生何以幸教寡人睢曰唯唯有間秦王復跽而請曰先生何以幸教寡人睢曰唯唯若是者三秦王跽曰先生卒不幸教寡人邪睢曰非敢然也臣聞昔者吕尚之遇文王也身為漁父而釣于渭濱耳若是者交疏也已説而立為太師載與俱歸者其言深也故文王遂收功于吕尚而卒王天下鄉使文王疏吕尚而不與深言是周無天子之德而文武無與成其王業也今臣羈旅之臣也交疏于王而所願陳者皆匡君之事處人骨肉之間願效愚忠而未知王之心也此所以王三問而不敢對者也臣非有畏而不敢言也臣知今日言之于前而明日伏誅于後然臣不敢避也大王信行臣之言死不足以為臣患亡不足以為臣憂漆身為厲被髮為狂不足以為臣恥且以五帝之聖焉而死三王之仁焉而死五伯之賢焉而死烏獲任鄙之力焉而死成荆孟賁王慶忌夏育之勇焉而死死者人之所必不免也處必然之勢可以少有補于秦此臣之所大願也臣又何患哉伍子胥槖載而出昭關夜行晝伏至于陵水無以糊其口膝行蒲伏稽首肉袒鼓腹吹箎乞食于吳市卒興吳國闔閭為伯使臣得盡謀如伍子胥加之以幽囚終身不復見是臣之説行也臣又何憂箕子接輿漆身為厲被髮為狂無益于主假使臣得同行于箕子可以有補所賢之主是臣之大榮也臣有何恥臣之所恐者獨恐臣死之後天下見臣之盡忠而身死因是以杜口裹足莫肯鄉秦耳足下上畏太后之嚴下惑于姦臣之態居深宫之中不離阿保之手終身迷惑無與昭姦大者宗廟滅覆小者身以孤危此臣之所恐耳若夫窮辱之事死亡之患臣不敢畏也臣死而秦治是臣死賢于生秦王跽曰先生是何言也夫秦國辟逺寡人愚不肖先生乃幸辱至于此是天以寡人慁先生而存先王之宗廟也寡人得受命于先生是天所以幸先王而不棄其孤也先生奈何而言若是事無小大上及太后下至大臣願先生悉以教寡人無疑寡人也睢拜秦王亦拜睢曰大王之國四塞以為固北有甘泉谷口南帶涇渭右隴蜀左關阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地也民怯于私鬭而勇于公戰此王者之民也王并此二者而有之夫以秦卒之勇車騎之衆以治諸侯譬若馳韓盧而搏蹇兔也霸王之業可致也而羣臣莫當其位至今閉關十五年不敢窺兵于山東者是穰侯為秦謀不忠而大王之計有所失也秦王跽曰寡人願聞失計然左右多竊聽者睢恐未敢言內先言外事以觀秦王之俯仰因進曰夫穰侯越韓魏而攻齊綱壽非計也少出師則不足以傷齊多出師則害于秦臣意王之計欲少出師而悉韓魏之兵也則不義矣今見與國之不親也越人之國而攻可乎其於計疏矣且昔齊湣王南攻楚破軍殺將再辟地千里而齊尺寸之地無得焉者豈不欲得地哉形勢不能有也諸侯見齊之罷弊君臣之不和也興兵而伐齊大破之士辱兵頓皆咎其王曰誰為此計者乎王曰文子為之大臣作亂文子出走故齊所以大破者以其伐楚而肥韓魏也此所謂借賊兵齎盜糧者也王不如逺交而近攻得寸則王之寸也得尺亦王之尺也今釋此而逺攻不亦繆乎且昔者中山之國地方五百里趙獨吞之功成名立而利附焉天下莫之能害也今夫韓魏中國之處而天下之樞也王其欲霸必親中國以為天下樞以威楚趙楚強則附趙趙強則附楚楚趙皆附齊必懼矣齊懼必卑辭重幣以事秦齊附而韓魏因可虜焉昭王曰吾欲親魏久矣而魏多變之國也寡人不能親請問親魏奈何對曰王卑詞重幣以事之不可則割地而賂之不可因舉兵而伐之王曰寡人敬聞命矣乃拜睢為客卿謀兵事卒聽睢謀使五大夫綰伐魏拔懷後二嵗拔邢邱客卿睢復説昭王曰秦韓之地形相錯如繡秦之有韓也譬如木之有蠧也人之有心腹之病也天下無變則已天下有變其為秦患者孰大于韓乎王不如收韓昭王曰吾固欲收韓韓不聽為之奈何對曰韓安得無聽乎王下兵而攻滎陽則鞏成臯之道不通北斷太行之道則上黨之師不下王一興兵而攻咸陽則其國斷而為三夫韓見必亡安得不聽乎若韓聽而霸事因可慮矣王曰善且欲發使于韓睢日益親復説用數年矣因請間説曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽髙陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得從王出乎臣聞善治國者乃內固其威而外重其權穰侯使者操王之重決制于諸侯剖符于天下政適伐國莫敢不聽戰勝攻取則利歸于陶國弊御于諸侯戰敗則結怨于百姓而禍歸于社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋縣之于廟梁宿昔而死李兑管趙囚主父于沙邱百日而餓死今臣聞秦太后穰侯用事髙陵華陽涇陽佐之卒無秦王此亦淖齒李兑之類也且夫三代所以亡國者君専授政縱酒馳騁弋獵不聽政事其所授者妒賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立于朝臣竊為王恐萬世之後有秦國者非王子孫也國䇿應侯謂昭王曰亦聞恆思有神叢與恆思有悍少年請與叢博曰吾勝叢叢藉我神三日不勝叢叢困我乃左手為叢投右手自為投勝叢叢藉其神三日叢往求之遂弗歸五日而叢枯七日而叢亡今國者王之叢勢者王之神藉人以此得無危乎臣未嘗聞指大于臂臂大于股若有此則病必甚矣百人輿瓢而趨不如一人持而疾走百人誠輿瓢瓢必裂今秦國華陽用之穰侯用之太后用之王亦用之不稱瓢為器則已稱瓢為器國必裂矣臣聞之木實繁者枝必披枝之披者傷其心都大者危其國臣強者危其主其今邑中自斗食以上至尉內史及王左右有非相國之人者乎國無事則已國有事臣必見王獨立于庭也臣竊為王恐恐萬世之後有秦國者非王子孫也臣聞古之善為政者其威內扶其輔外布治政不亂不逆使者直道而行不敢為非今太后使者分裂諸侯而符布天下操大國之勢強徴兵伐諸侯戰勝攻取利盡歸于陶國之幣帛竭入太后之家境內之利分移華陽古之所謂危主滅國之道必從此起三貴竭國以自安然則令何得從王出權何得毋分是王果處三分之一也昭王聞之大懼曰善于是廢太后逐穰侯髙陵華陽涇陽君于關外秦王乃拜睢為相收穰侯之印使歸陶因使縣官給車牛以徙千乘有餘到關關閲其寶器寶器珍怪多于王室秦封睢以應號為應侯當是時秦昭王四十一年也睢既相秦秦號曰張祿而魏不知以為睢已死久矣魏聞秦且東伐韓魏魏使須賈于秦睢聞之為微行敝衣間步之邸見須賈須賈見之而驚曰范叔固無恙乎睢曰然須賈笑曰范叔有説于秦邪曰不也睢前日得過于魏相故亡逃至此安敢説乎須賈曰今叔何事睢曰臣為人庸賃須賈意哀之留與坐飲食曰范叔一寒如此哉乃取其一綈袍以賜之須賈因問曰秦相張君公知之乎吾聞幸于王天下之事皆決于相君今吾事之去留在張君孺子豈有客習于相君者哉睢曰主人翁習知之唯睢亦得謁睢請為君見于張君須賈曰吾馬病車軸折非大車駟馬吾不出睢曰願為君借大車駟馬于主人翁睢歸取大車駟馬為須賈御之入秦相府府中望見有識者皆避匿須賈怪之至相舍門謂須賈曰待我我為君先入通于相君須賈待門下持車良久問門下曰范叔不出何也門下曰無范叔須賈曰鄉者與我載而入者門下曰乃吾相張君也須賈大驚自知見賣乃肉袒膝行因門下人謝罪于是睢盛帷帳侍者甚衆見之須賈頓首言死罪曰賈不意君能自致于青雲之上賈不敢復讀天下之書不敢復與天下之事賈有湯鑊之罪請自屏于胡貉之地唯君死生之睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足睢曰汝罪有三耳昔者楚昭王時而申包胥為楚郤吳軍楚王封之以荆五千戶包胥辭不受為邱墓之寄于荆也今睢之先人邱墓亦在魏公前以睢為有外心于齊而惡睢于魏齊公之罪一也當魏齊辱我于厠中公不止罪二也更醉而溺我公其何忍乎罪三矣然公之所以得無死者以綈袍戀戀有故人之意故釋公乃謝罷入言之昭王罷歸須賈須賈辭于睢睢大供具盡請諸侯使與坐堂上食飲甚設而坐須賈于堂下置莝豆其前令兩黥徒夾而馬食之數曰為我告魏王急持魏齊頭來不然者我且屠大梁須賈歸以告魏齊魏齊恐亡走趙匿平原君所睢既相王稽謂睢曰事有不可知者三有不可奈何者亦三宫車一日晏駕是事之不可知者一也君卒然捐館舍是事之不可知二也使臣卒然填溝壑是事之不可知者三也宫車一日晏駕君雖恨于臣無可奈何君卒然捐館舍君雖恨于臣亦無可奈何使臣卒然填溝壑君雖恨于臣亦無可奈何睢不懌乃入言于王曰非王稽之忠莫能內臣于函谷關非大王之賢聖莫能貴臣今臣官至于相爵在列侯王稽之官尚止于謁者非其內臣之意也昭王召王稽拜為河東守三嵗不上計又任鄭安平昭王以為將軍睢于是散家財物盡以報所嘗困厄者一飯之德必償睚眥之怨必報睢相秦二年秦昭王之四十二年東伐韓少曲髙平拔之秦昭王聞魏齊在平原君所欲為睢必報其仇乃詳為好書遺平原君曰寡人聞君之髙義願與君為布衣之交君幸過寡人寡人願與君為十日之飲平原君畏秦且以為然而入秦見昭王昭王與平原君飲數日昭王謂平原君曰昔周文王得吕尚以為太公齊桓公得管夷吾以為仲父今范君亦寡人之叔父也范君之仇在君之家願使人歸取其頭來不然吾不出君于關平原君曰貴而為友者為賤也富而為交者為貧也夫魏齊者勝之友也在固不出也今又不在臣所昭王乃遺趙王書曰王之弟在秦范君之仇魏齊在平原君之家王使人疾持其頭來不然吾舉兵而伐趙又不出王之弟于關趙孝成王乃發卒圍平君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可説乃解其相印與魏齊亡間行念諸侯莫可以急抵者乃復走大梁欲因信陵君以走楚信陵君聞之畏秦猶豫未肯見曰虞卿何如人也時侯嬴在旁曰人固未易知知人亦未易也夫虞卿躡屩擔簦一見趙王賜白璧一雙黃金百鎰再見拜為上卿三見卒受相印封萬戶侯當此之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵祿之尊解相印捐萬戶侯而間行急士之窮而歸公子公子曰何如人人固不易知知人亦未易也信陵君大慙駕如野迎之魏齊聞信陵君之初難見之怒而自刎趙王聞之卒取其頭豫秦秦昭王乃出平原君歸趙國䇿應侯曰鄭人謂玉未理者璞周人謂鼠未臘者朴周人懷朴過鄭賈曰欲買朴乎鄭賈曰欲之出其朴乃鼠也因謝不取今平原君自以賢顯名于天下然降其主父沙邱而臣之天下之王尚猶尊之是天下之王不如鄭賈之智也四十三年秦攻韓汾陘拔之因城河上廣武後五年昭王用睢謀縱反間賣趙趙以其故令馬服子代亷頗將秦大破趙于長平遂圍邯鄲國䇿天下之士合縱相聚于趙而欲攻秦秦相應侯曰王勿憂也請令廢之秦于天下之士非有怨也相聚而攻秦者以已有富貴耳王見大王之狗卧者卧起者起行者行止者止毋相與鬭者投之一骨則輕起相牙者何則有爭意也于是使唐睢載音樂豫之五千金居武安髙會相與飲謂邯鄲人誰來取者于是其謀者固未可得豫也其可得豫者豫之昆弟矣公與秦計功者不問金之所之金盡者功多矣今令人復載五千金隨公唐睢行至武安散不能三千金而天下之士大相與鬬矣韓非子應侯謂秦王曰王得宛葉藍田陽夏斷河內困梁鄭所以未王者趙未服也弛上黨在一而已以臨東陽則邯鄲口中蝨也王拱而朝天下後者以兵中之然上黨之安樂其處甚劇臣恐弛之而不聽奈何王曰必弛易之矣已而與武安君白起有隙言而殺之任鄭安平使將擊趙鄭安平為趙所困急以兵二萬人降趙睢席藁請罪秦之法任人而所任不善者各以其罪罪之于是睢罪當收三族昭王恐傷睢意乃下令國中有敢言鄭安平事者以其罪罪之而加賜睢食物日益厚以順適其意史記秦使王稽攻邯鄲十七月不下秦人莊謂王稽曰君何不賜軍吏乎王稽曰吾與王也不用人言莊曰不然父之于子也令有必行者必不行者曰去貴妻賣愛妾此令必行者也因曰毋敢思也此令必不行者也守閭嫗曰某夕某孺子內某士貴妻已去愛妾已賣而心不有欲教之者人心固有今君雖幸于王不過父子之親軍吏雖賤不卑于守閭嫗且君擅主輕下之日久矣聞三人成虎十夫揉椎衆口所移毋翼而飛故曰不如賜軍吏而禮之王稽不聰軍吏窮果惡王稽杜摯以反秦王大怒而欲兼誅睢睢曰臣東鄙之賤人也開罪于魏遁逃來奔臣無諸侯之援親習之故王舉臣羈旅之中使執事天下皆聞臣之身與王之舉也今愚惑與罪人同心而王明誅之是王過舉顯于天下而為諸侯所議也臣願請藥賜死而恩以相葬臣王必不失臣之罪而無過舉之名王曰有之遂弗殺而善遇之睢失韓之汝南昭王曰君亡國其憂乎睢曰臣不憂梁人有東門吳者其子死而不憂其相室曰公之愛子死而不憂何也東門吳曰吾嘗無子無子之時不憂今子死與無子時同也臣奚憂臣亦嘗為子為子時不憂今亡汝南與為梁餘子時同也臣何為憂秦王以為不然以告蒙傲曰今也寡人一城圍食不甘味卧不便習今應侯亡地而言不憂此其情也蒙傲曰臣請得其情乃往見睢曰傲欲死睢曰何謂也曰王師君天下莫不聞而況秦國乎今傲勢得為王將將兵臣以韓之細也顯逆誅奪君地傲尚奚生不若死睢拜蒙傲曰願委之卿蒙傲以報于王自是之後睢每言韓事者王弗聽也以其為汝南虜也國䇿昭王臨朝歎息睢進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則勇士御倡優拙則思慮逺夫以逺思慮而御勇士吾恐楚之圗秦也夫物不素具不可以應卒今武安君既死而鄭安平等畔內無良將而外多敵國吾是以憂欲以激勵睢睢懼不知所出蔡澤聞之往入秦也史記韓非子秦大飢應侯請曰五苑之草著蔬菜橡果棗栗足以活民請發之昭襄王曰秦法民有功受賞有罪受誅今發五苑之蔬果是有功與無功俱賞也有功與無功俱賞此亂之道也夫發五苑而亂不如棄棗蔬而涓説苑應侯與賈午子坐聞其鼓琴之聲應侯曰琴一何悲也賈午子曰張急調下故悲耳急張者良材也調下者官卑也取夫良材而卑官之能無悲乎蔡澤者燕人也遊學干諸侯小大甚衆不遇而從唐舉相曰吾聞先生相李兑曰百日之內持國秉政有之乎曰有之曰若臣者何如唐舉熟視而笑曰先生曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者壽也願聞之唐舉曰先生之壽從今以往者四十三嵗蔡澤笑謝而去謂其御者曰吾持梁刺齒肥躍馬疾驅懷黃金之印結紫綬于要揖讓人主之前食肉富貴四十三年足矣去之趙見逐入韓魏遇奪釡鬲于塗聞范睢任鄭安平王稽皆負重罪于秦范睢內慙蔡澤乃西入秦將見昭王使人宣言以感怒范睢曰燕客蔡澤天下雄俊𢎞辨智士也彼一見秦王秦王必困君而奪君之位范睢聞曰五帝三代之事百家之説吾既知之衆口之辨吾皆摧之是惡能困我而奪我位乎使人召蔡澤蔡澤入則揖范睢睢固不快及見之又倨睢因讓之曰子嘗宣言欲代我相秦寧有之乎對曰然范睢曰請聞其説澤曰吁君何見之晚也夫四時之序成功者去夫人生百體堅強手足便利耳目聰明而心聖智豈非士之願與范睢曰然澤曰質仁秉義行道施德得志于天下天下懷樂敬愛而尊慕之皆願以為君王豈不辨智之期與范睢曰然澤復曰富貴顯榮成理萬物使各得其所性命壽長終其天年而不夭傷天下繼其統守其業傳之無窮名實純粹澤流千里世世稱之而無絶與天地終始豈非道德之符而聖人所謂吉祥善事者與范睢曰然蔡澤曰若夫秦之商君楚之吳起越之大夫種其卒然亦可願與范睢知蔡澤之欲困已以説復謬曰何為不可夫公孫鞅之事孝公也極身無二慮盡公而不顧私設刀鋸以禁姦邪信賞罰以致治披腹心示情素蒙怨咎欺舊友奪魏公子卬安秦社稷利百姓卒為秦禽將破敵攘地千里吳起之事悼王也使私不得害公讒不得蔽忠言不取茍合行不取茍容不為危易行行義不辟難然為霸主強國不辭禍凶大夫種之事越王也主雖困辱悉忠而不解主雖絶亡盡能而弗離成功而弗矜貴富而不驕怠若此三子者固義之至也忠之節也是故君子以義死難視死如歸生而辱不如死而榮士固有殺身以成名唯義之所在雖死無所恨何為不可哉蔡澤曰主聖臣賢天下之盛德也君明臣直國之福也父慈子孝夫信妻貞家之福也故比干忠而不能存殷子胥智而不能完吳申生孝而晉國亂是皆有忠臣孝子而國家滅亂者何也無明君賢父以聽之故天下以其君父為僇辱而憐其臣子今商君吳起大夫種之為人臣是也其君非也故世稱三子致功而不見德豈慕不遇世死乎夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也夫人之立功豈不期于成全邪身與名俱全者上也名可法而身死者其次也名在僇辱而身全者下也于是范睢稱善澤少得間因曰夫商君吳起大夫種其為人臣盡忠致功則可願矣閎夭事文王周公輔成王也豈不亦聖乎以君臣論之商君吳起大夫種其可願孰與閎夭周公哉范睢曰商君吳起大夫種弗若也澤曰然則君之主慈仁任忠惇厚舊故其賢智與有道之士為膠漆義不倍功臣孰與秦孝公楚悼王越王乎范睢曰未知何如也澤曰今主親忠臣不過秦孝公楚悼王越王君之設智能為主安危修政治亂強兵批患折難廣地殖榖富國足家強主尊社稷顯宗廟天下莫敢欺犯其主主之威蓋振海內功彰萬里之外聲名光輝傳於千世君孰與商君吳起大夫種范睢曰不若澤曰今主之親忠臣不忘舊故不若孝公悼王句踐而君之功績愛信親幸又不若商君吳起大夫種然而君之祿位貴盛私家之富過于三子而身不退者恐患之甚于三子竊為君危之語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也故國有道則仕國無道則隱聖人曰飛龍在天利見大人不義而富且貴于我如浮雲今君之怨已讐而德已報意欲至矣而無變計竊為君不取也且夫翠鵠犀象其處勢非不逺死也而所以死者惑于餌也蘇秦智伯之智非不足以辟辱逺死也而所以死者惑于貪利不止也是以聖人制禮節欲取于民有度使之以時用之有止故志不溢行不驕嘗與道俱而不失故天下承而不絶昔者齊桓公九合諸侯一匡天下至于葵邱之會有驕矜之志畔者九國吳王夫差兵無敵于天下勇強以輕諸侯陵齊晉故遂以殺身亡國夏育太史噭叱呼駭三軍然而身死于庸夫此皆乘至盛而不返道理不居卑退處儉約之患也夫商君為秦孝公明法令禁姦本尊爵必賞有罪必罰平權衡正度量調輕重決裂阡陌以靜生民之業而一其俗勸民耕農利土一室無二事力田稸積習戰陳之事是以兵動而地廣兵休而國富故秦無敵于天下立威諸侯成秦國之業功已成矣而遂以車裂楚地方數千里持戟百萬白起率數萬之師以與楚戰一戰舉鄢郢以燒夷陵再戰南并蜀漢又越韓魏而攻強趙北坑馬服誅屠四十餘萬之衆盡之于長平之下流血成川沸聲若靁遂入圍邯鄲使秦有帝業楚趙天下之強國而秦之仇敵也自是之後楚趙皆懾伏不敢攻秦者白起之勢也身所服者七十餘城功已成矣而遂賜劍死于杜郵吳起為楚悼王立法卑減大臣之威重罷無能廢無用損不急之官塞私門之請一楚國之俗禁遊客之民精耕戰之士南收揚越北并陳蔡破橫散從使馳説之士無所開其口禁朋黨以利百姓定楚國之政兵震天下威服諸侯功已成矣而卒枝解大夫種為越王深謀逺計免會稽之危以亡為存因辱為榮墾草入邑辟地殖榖率四方之士専上下之力輔句踐之賢報夫差之讐卒擒徑吳令越成霸功已彰而信矣句踐終負而殺之此四子者玏成不去禍至于此此所謂信而不能詘往而不能返者也范蠡知之超然辟世長為陶朱公君獨不觀夫博者乎或欲大投或欲分功此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利施三川以實宜陽決羊腸之險塞太行之道又斬范中行之塗六國不得合從棧道千里通于蜀漢使天下皆畏秦秦之欲得矣君之功極矣此亦秦之分功之時也如是而不退則商君白公吳起大夫種是也吾聞之鑒于水者見面之容鑒于人者知吉與凶書曰成功之下不可久處四子之禍君何居焉君何不以此時歸相印讓賢者而授之退而巖居川觀必有伯夷之亷長為應侯世世稱孤而有許由延陵季子之讓喬松之壽孰與以禍終哉即君何居焉忍不能自離疑不能自決必有四子之禍矣易曰亢龍有悔此言上而不能下信而不能詘往而不能自返者也願君熟計之范睢曰善吾聞欲而不知止失其所以欲有而不知足失其所以有先生幸教睢敬受命于是乃延入坐為上客後數日入朝言于秦昭王曰客新有從山東來者曰蔡澤其人辨士明于三王之事五伯之業世俗之變足以寄秦國之政臣之見人甚衆莫及臣不如也臣敢以聞秦昭王召見與語大悅之拜為客卿范睢因謝病請歸相印昭王強起范睢睢遂稱病篤范睢免相昭王新説蔡澤計畫遂拜為秦相東收周室蔡澤相秦數月人或惡之懼誅乃謝病歸相印號為綱成君居秦十餘年事昭王孝文王莊襄王卒事始皇帝為秦使于燕三年而燕使太子丹入質于秦史記論曰穰侯之于秦也立昭王逐武后及其相秦收魏河東河內遂圍大梁又走暴鳶破芒卯瘠韓弊趙功亦多矣及狡客乘隙起奪釜鬲于國而卒保陶以終其知亦足贍矣睢也初終攘讓異節然逺交近攻雖曰傾冉實資秦帝與吕不韋吕不韋者濮陽人賈于邯鄲史記往來販錢賣貴家纍千金見秦質子異人子楚初名孝文王子歸而謂父曰耕田之利幾倍曰十倍珠玉之贏幾倍曰百倍立國家之主贏幾倍曰無數曰今力田疾作不得暖衣餘食建國立君澤可以遺世願往事之秦子異人質于趙處于􅡍城史記秦昭王四十年太子死四十二年以次子安國君為太子安國君有子二十餘人安國君有所甚愛姬立以為正夫人號華陽夫人華陽夫人無子安國君中男名子楚子楚母曰夏姬母愛子楚為秦質子于趙秦數攻趙趙不甚禮子楚子楚秦諸庶孽孫質于諸侯車乘進用不饒居處困不得意吕不韋見而憐之曰此竒貨可居乃往見子楚説曰吾能大子之門子楚笑曰且自大君之門而乃大吾門吕不韋曰子不知也吾門待子門而大子楚心知所謂乃引與坐深語故往説之曰子傒異人異母兄有承國之業又有母在中今子無母于中母夏姬無寵與無母同外託于不可知之國一日倍約身為糞土今子聽吾計事求歸可以有秦國吾為子使秦必來請子乃説秦王后弟陽泉君曰君之罪至死君知之乎君之門下無不居髙尊位太子門下無貴者太子謂子傒君之府藏珍珠寶玉駿馬盈外廏美女充後庭王之春秋髙一日山陵崩太子用事君危于纍卵而不壽于朝生矣説有可以一切而使君富貴千萬嵗寧于泰山四維必無危亡之患者陽泉君避席請聞其説不韋曰王年髙矣王后無子子傒有承國之業士倉又輔之王一日山陵崩子傒立士倉用事王后之門必生蓬蒿矣今子異人賢材也棄在于趙無母于內引領西望願一得歸王后誠請而立之是子異人無國而有國王后無子而有子也陽泉君曰然入説王后王后乃請趙而歸之史記不韋以五百金與子楚為進用結賓客以五百金買竒物玩好而西遊秦求見華陽夫人姊以其物獻夫人夫人喜不韋因使其姊説夫人曰夫人無子以此時蚤自結于諸子中賢孝者舉以為適而子之夫在則尊重夫百嵗之後所子者為王終不失勢此所謂一言而萬世之利也夫人以為然承太子間從容言子楚乃因涕泣曰妾不幸無子願得子楚以為適嗣託妾身安國君許之乃與夫人剖玉符約以為適嗣安國君及夫人厚餽遺子楚而請吕不韋傅之按史吕不韋説秦時孝文王尚為太子而未為王又華陽夫人姊與陽泉君説亦異趙未之遣不韋説趙曰子異人秦之寵子也無母于中王后欲取而子之使秦而屠趙不顧一子以留計是抱空質也若使子異人歸而得立趙厚送遣之是不敢倍德畔施自為德講也不然秦王老矣一日晏駕雖有子異人不足以結秦趙乃遣之史記秦昭王五十年使王齮圍邯鄲急趙欲殺子楚子楚與吕不韋謀行金六百斤豫守者吏得脫亡赴秦軍遂得歸昭王薨太子安國君立為王華陽夫人為王后子楚為太子趙奉子楚夫人及子政歸史記説亦異不知何本異人至不韋使楚服而見王后説其狀曰吾楚人也乃自子之而變其名曰楚王使子誦子曰少棄捐在外嘗無師傅所教學不習于誦王罷之乃留止間曰陛下嘗軔車于趙矣趙之豪傑得知名者不少今大王反國皆西面而望大王無一介之使以存之臣恐其皆有怨心使邊境早閉晚開王以為然奇其計王后勸立之王乃召相令之曰寡人子莫若楚立以為太子子楚即位是為莊襄王以不韋為相號曰文信侯食藍田十二縣國䇿史記食河南雒陽十萬戶按是時兩周與韓俱未亡不韋采地安得有此莊襄王即位三年薨太子政即位為王尊吕不韋為相國號稱仲父不韋家僮萬人當是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賓客以相傾不韋以秦之強羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市門懸千金其上延諸侯遊士賓客有能增損一字者豫千金秦王九年嫪毐事覺事連相國欲誅不韋為其奉先王功大及賓客辨士為遊説者衆王不忍致法十年十月免相國不韋而出就國嵗餘諸侯賓客使者相望于道請文信侯秦王恐其為變乃賜不韋書曰君何功于秦秦封君十萬戶君何親于秦號稱仲父其與家屬徙處蜀十二年不韋自度稍侵恐誅乃飲鴆而死竊葬索隱不韋死其賓客數千人竊共葬于洛陽北芒山其舍人臨者晉人也逐出之秦人六百石以上奪爵遷五百石以下不臨遷勿奪爵自今以來操國事不道如嫪毐不韋者籍其門視此史記太嫪毒事詳帝后傳雜家吕氏春秋二十六篇漢書尚史卷七十四
