body:
  text: 尚史巻五十六列傳三十四鑲白旗漢軍李鍇撰楚諸臣傳薳章薳吕臣薳章又曰蔿章事武王為大夫武王三十五年桓六年王侵隨使章求成隨懼而修政我不敢伐三十七年桓八年王合諸侯于沈鹿楚地黄隨不會使章讓黄王伐隨三十八年桓九年王使大夫道朔将巴客以聘于鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人王使章讓于鄧鄧人弗受夏我圍鄾鄾潰章之後有薳吕臣吕臣字叔伯事成王為大夫鬭穀於莵以成得臣伐陳之功使為令尹吕臣曰子若國何對曰吾以靖國也及我師敗于城濮得臣死吕臣代之為令尹晉侯喜曰莫余毒也已蒍吕臣為令尹奉已而已不在民矣左傳蒍賈伯嬴蒍賈字伯嬴成王三十九年僖二十七年王将圍宋使鬬穀於莵治兵于暌終朝而畢不戮一人成得臣治兵于蒍終日而畢鞭七人貫三人耳國老皆賀鬭穀於莵鬭穀於莵飲之酒蒍賈尚幼後至不賀鬭穀於莵問之對曰不知所賀子之傳政于子玉以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國将何賀焉子玉剛而無禮不可以治民過三百乗其不能以入矣茍入而賀何後之有明年得臣敗我師于城濮莊王時賈為工正莊王三年文十六年楚大饑戎伐其西南至于阜山師于大林又伐其東南至于陽邱以侵訾枝並楚邑庸人帥羣蠻以叛楚麇人帥百濮聚于選楚地将伐楚于是申息之北門不啟國人謀徙于阪髙賈曰不可我能往冦亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居将各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往伐庸振廩同食發倉廩同食上下無異饌也次于句澨楚西界使廬戢黎侵庸王會師于臨品伐庸遂滅之六年宣元年我侵陳遂侵宋晉救之以伐鄭賈救鄭遇于北林囚晉解揚晉人乃還成得臣之死也薳吕臣為令尹薳吕臣卒鬭般為令尹鬭椒為司馬賈譖般殺之椒為令尹已為司馬椒又惡之九年宣四年鬭椒以若敖氏之族圄賈于轑陽而殺之左傳蒍艾獵孫叔敖蒍子馮蒍掩蒍艾獵蒍賈之子是為孫叔敖也又曰蒍敖新序孫叔敖兒時見兩頭蛇殺而埋之歸而泣其母問故對曰聞見兩頭蛇者死嚮者見之恐去母而死也母曰蛇安在曰恐他人又見之殺而埋之矣母曰吾聞有隂徳者天報以福汝不死也艾獵事莊王為令尹吕氏春秋孫叔敖沈尹莖相與友叔敖㳺于郢三年聲問不知修行不聞沈尹莖曰説義以聽方術信行能令人主上至王下至霸我不若子耦世接俗説義調均以適主心子不如我子歸我将為子㳺沈尹莖㳺于郢五年荆王欲以為令尹辭曰期思之鄙人有孫叔敖者聖人也王必用之臣不若也于是使人以王輿迎叔敖為令尹荀子孫叔敖期思之鄙人也突秃長左軒較三下而以霸楚淮南子孫叔敖決期思之水而灌雲婁之野莊王知其可以為令尹説苑令尹虞邱子復于莊王曰臣為令尹十年矣國不加治臣竊選下里之士曰孫叔敖秀嬴多能其性無欲君授之政則國可使治民可使附莊王從之賜虞邱子采地三百號曰國老以孫叔敖為令尹少焉虞邱子家干法叔敖執而戮之虞邱子憙入見王曰臣言孫叔敖果可使持國政不黨不骫可謂公乎史記孫叔敖楚之處士也虞邱相進之于王以自代莊王十六年宣十一年我侵宋艾獵城沂楚邑使封人慮事以授司徒量功命曰分財用平板幹稱畚築程土物議逺邇畧基趾具餱糧度有司事三旬而成不愆于素十七年宣十二年王圍鄭克之及鄭平晉救鄭濟河王以北師次于郔聞晉師既濟艾獵欲還南轅反斾嬖人伍參欲戰王告艾獵改乗轅而北之次于管晉趙旃來召盟席于軍門之外使其徒入之王怒逐趙旃我懼王之入晉軍也遂出陳艾獵曰進之寧我薄人無人薄我詩云元戎十乗以先啟行先人也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乗晉軍遂敗晉師于邲左傳艾獵為楚相施教導民上下和合秋冬勸民山採春夏以水各得其所便民皆樂其生莊王以為幣輕更以小為大百姓不便皆去其業市令言曰市亂民莫安其處次行不定曰如此幾何頃乎曰三月頃曰罷吾今令之復言之王曰市亂民莫安其處次行不定請令復如故王許之下令三日而市復如故楚俗好庳車王以為不便馬欲下令髙之艾獵曰令數下民不知所從王必欲髙車臣請閭里髙其梱乗車者皆君子君子不能數下車王許之居半嵗民悉自髙其車此不教民民從其化近者視而效之逺者望而法之故三得相而不喜三去相而不悔史記韓非子叔敖相楚棧車牝馬糲餅菜羮枯魚之膳冬裘夏葛衣面有饑色其儉偪下吕氏春秋莊王好逰獵盡傳其境内之勞與諸侯之憂于叔敖叔敖日夜不息不得以便生為故説苑叔敖相楚三年不知軛在衡後務大者固忘小繒邱之封人見艾獵曰吾聞官久者士妬之禄厚者民怨之位尊者君恨之今相有此三者而不得罪楚之士民何也艾獵曰吾三相楚而心愈卑每益禄而施愈博位滋尊而禮愈恭是以不得罪于楚之士民也荀子説苑孫叔敖為令尹一國皆來賀有一老父後來弔叔敖曰有説乎父曰有身貴而驕人者民去之位髙而擅權者君惡之禄厚而不知足者患處之叔敖再拜曰敬受命願聞餘教父曰位髙而意益下官大而心益小禄厚而慎不敢取三者足以治楚矣新序莊王問于叔敖曰寡人未得所以為國是也叔敖曰國之有是衆非之所惡也國君驕士曰士非我無逌富貴士驕君曰國非士無逌安强君或至失國而不悟士或至饑寒而不進君臣不合國是無逌定矣夏桀殷紂以合其取舎者為是不合者為非故致亡而不知艾獵疾將死戒其子曰王亟封我矣吾不受我死王封汝汝必無受利地楚越之間有寢邱者地不利而名惡楚人鬼而越人禨可長有此也艾獵死王以美地封其子子不受請寢邱與之至今不失列子韓非子莊公既勝狩于河雍歸而賞孫叔敖叔敖請漢間之地楚法禄臣再世而收地唯叔敖不收者瘠也故九世而祀不絶孫叔敖碑楚相孫君諱饒字叔敖本是縣人也君受純靈之精懷絶世之材有大賢次聖之質少見枝首虵對其母泣吾將死母問其故曰吾聞見枝首虵者死今日見之母曰若奈之何吾􅀢行數十步念獨吾死可空復令他人見之死為因埋掩其荆母曰若無憂焉其陰徳𤣥善遂為父母九族所異及其為相布政以道考象天之度敬授民時聚藏于山殖物于藪宣導川谷波障源湶溉灌􅀈澤堤防湖浦以為池沼鍾天地之美收九􅀢之利以慇潤國家家富人喜優噡樂業式序在朝野無螟豐年蕃庶人有曾閔貞孝之行四民美好從容中節髙梱改幣一朝而化其憂國忘私乗馬三年不别牝牡繼髙陽重黎五舉子文之統其忠信廉勇禮樂文章軌儀同制其富國充民明天時盡地利霆堅禹稷不能踰也専國權寵而不榮華一旦可得百金至于殁齒而無分銖之蓄破玉玦不以寶財遺子孫終始若失去不善如絶絃辟患害于無刑徹節髙義敦良奇介自曹臧孤竹吳札子罕之論不能驂也生于季末仕于靈王立溷濁而澄清處幽暗而昭明其遺武餘典恨不與戲皇帝代同世世為列姃國在朝廷其意常墨墨若冠章甫而坐塗炭也病其臨卒將無棺槨令其子曰優孟曾許千金貸吾孟故楚之樂長與相君相善雖言千金實不貸也卒後數年莊王置酒以為樂優孟乃言孫君相楚之功即慷慨髙歌曲曰貪吏而可為而不可為廉吏而可為而不可為貪吏而不可為者當時有汚名而可為者子孫以家成廉吏而可為者當時有清名而不可為者子孫困窮被褐而負薪貪吏常苦富廉吏常苦貧獨不見楚相孫叔敖廉潔不受錢涕泣數行若投首王王心感動覺悟問孟孟具列對即來其子而加封焉子辭父有命如楚不忘亡臣社禝圖而欲有賞必于潘國下濕墝埆人所不貪遂封潘鄉碑立于漢延熹三年具叔敖事頗備而特異者有四名饒事靈王封潘鄉與優孟之歌也具録之以證羣説蒍子馮艾獵從子也康王二年襄十五年以子馮為大司馬五年襄十八年冬十二月我伐鄭子馮及公子格率鋭師侵費滑胥靡獻于雍梁並鄭邑右囘梅山侵鄭東北至于蟲牢而反令尹公子午門于純門信于城下而還涉于魚齒山名之下甚雨及之我師多凍役徒幾盡八年襄二十一年公子午卒使子馮為令尹子馮以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢王使醫視之復曰瘠則甚矣而血氣未動乃使公子追舒為令尹明年殺追舒復使子馮為令尹十一年襄二十四年舒鳩人楚屬國叛我王師于荒浦舒鳩地使沈尹夀師祁犂讓之舒鳩子敬逆二大夫而告無之且請受盟二大夫復命王欲伐之子馮曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸乃還十二年襄二十五年子馮卒使屈建為令尹舒鳩人卒叛屈建滅之王賞屈建建辭曰先大夫蒍子之功也以與蒍掩掩子馮之子也是年掩為司馬屈建使掩庀賦數甲兵書土田度山林鳩藪澤辨京陵絶髙曰京大阜曰陵表淳鹵埆薄之地數疆潦疆界有流潦者規偃瀦下濕之地町原防廣平曰原防隄防牧隰皋井衍沃平美之地量入脩賦賦車周制六十四井為甸出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人籍馬籍其毛色歳齒賦車兵徒卒甲楯之數既成以授屈建康王薨事郟敖郟敖三年襄三十年公子圍殺掩而取其室左傳掩之族薳居見亂臣傳薳啟疆薳射沈尹射附沈尹赤薳啟疆蒍氏之族也所出未詳亦事康王康王十一年襄二十四年齊侯既伐晉而懼將欲見王王使啟疆如齊聘且請會期秋齊聞将有晉師使陳無宇從啟疆來辭會且乞師王使啟疆帥師送陳無宇康王薨事郟敖郟敖四年昭元年靈王弑郟敖以啟疆為大宰靈王三年昭四年吳伐我入棘櫟麻並楚東鄙邑沈尹射奔命于夏汭啟疆城巢四年昭五年我以東夷伐吳薳射以繁揚之師會于夏汭吳師出啟疆帥師從之遽不設備吳人敗諸鵲岸我師濟于羅汭沈尹赤會王次于萊山薳射帥繁揚之師先入南懷我師從之吳不可入王遂觀兵于坻箕之山無功而還王懼吳使沈尹射待命于巢啟疆待命于雲婁沈尹射沈尹赤並楚大夫薳射者亦蒍氏之族也六年昭七年王成章華之臺願與諸侯落之啟疆曰臣能得魯侯啟疆如魯召諸侯辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社禝以輯寧爾民嬰齊受命于蜀奉承以來弗敢失隕而致諸宗祧曰我先君共王引領北望日月以冀傳序相授于今四王矣嘉會未至唯襄公之辱臨我喪孤與其二三臣悼心失圖社禝之不遑況能懐思君徳今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉會是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期問魯見伐之期寡君將承質幣而見于蜀以請先君之貺魯侯來王享之于新臺使長鬛者相好以大屈弓名魯連子作大曲之弓不琢之璧既而悔之啟疆聞之見魯侯魯侯語之拜賀魯侯曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰慎守寶矣敢不賀乎魯侯懼乃反之薳射初事靈王靈王遇弑事平王平王十二年昭二十五年王使射城州屈復茄人城邱皇遷訾人昭王十年定四年吳入郢明年申包胥以秦師救楚大敗吳師于沂吳人獲射于柏舉射子帥奔徒以從公子申敗吳師于軍祥左傳薳罷子蕩薳洩薳罷字子蕩所出未詳康王十四年襄二十七年晉楚弭兵既盟于宋王使罷如晉涖盟晉侯享之将出賦既醉羊舌肹曰薳氏之有後于楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政其焉往郟敖即位王子圍為令尹二年襄三十年郟敖使罷如魯聘魯叔孫豹問王子之為政何如對曰吾儕小人食而聽事猶懼不給命而不免于戾焉與知政固問不告叔孫豹曰楚令尹将有大事子蕩将與焉助之匿其情矣四年昭元年王子圍弑郟敖圍即位是為靈王使罷為令尹靈王元年昭二年以屈生為莫敖使與罷如晉逆女大夫薳洩者亦蒍氏族六年昭七年王使薳洩伐徐吳人救之罷帥師伐吳師于豫章而次于乾谿吳人敗之于房鍾吳地罷歸罪于薳洩而殺之左傳薳越薳越為司馬事平王平王八年昭二十一年宋華亥向寧叛華登來乞師越帥師将逆華氏大宰犯氏族未詳諫曰諸侯唯宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我後既許之矣明年越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰君臣日戰君曰余必臣是助亦唯命君若恵保敝邑無亢不衷以奬亂人孤之望也唯君圖之國人患之會諸侯出華向華向來奔十年昭二十三年吳伐州來令尹陽匄病越帥師及諸侯之師奔命救州來吳人禦諸鍾離陽匄卒我師熸吳楚謂火滅為熸軍主卒楚軍無復氣勢也及戰于雞父諸侯之師奔我師大奔大子建之母在郥召吳人而啟之冬十月吳大子諸樊入郥杜注以諸樊為王僚大子案吳子遏號諸樊為王僚之伯父傳誤取楚夫人與其寶器以歸越追之不及将死衆曰請遂伐吳以徼之越曰再敗君師死且有罪亡君夫人不可以莫之死也乃縊于薳澨左傳薳固薳固為鍼尹鍼又曰箴是曰鍼尹固又曰工尹固事昭王昭王十年定四年吳入郢王取其妹季芊畀我以出涉雎固與王同舟王使執燧象以奔吳師燒火燧繫象尾也昭王薨事恵王恵王十年哀十六年白公勝作亂殺公子申公子結固帥其屬将與白公勝遇葉公髙招之乃從葉公以攻白公勝勝縊十二年哀十八年巴人伐我圍鄾將卜師王曰使公孫寧行寧請承承佐也王曰寝尹由于工尹固皆勤先君者也于是公孫寧鍼尹固寢尹由于敗巴師于鄾寢尹由于者是為王孫由于别有傳左傳論曰城濮之敗百濮之捷賈有逺圖若乃肆為貝錦殺般而身從之又何短知耶叔敖佐莊登蹟于霸方之狐趙規模隘矣鬭伯比鬭穀於莵子文鬭般鬭克黄鬬子良鬬棄疾鬬椒龜附鬬韋鬬伯比者若敖氏也若敖為楚八世祖因以為氏後若敖氏娶于䢵生鬭伯比伯比為大夫事武王武王三十五年桓六年王侵隨使薳章求成軍于瑕以待之隨人使少師董成董正也正二國之成也伯比言于王曰我不得志于漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比大夫曰季梁在隨賢臣何益伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追我師季梁諌乃止三十七年桓八年隨少師有寵伯比曰可矣讐有釁不可失也夏王合諸侯于沈鹿楚圯黄隨不會使薳章讓黄王伐隨季梁請下之弗許而後戰少師曰必速戰不然將失楚師戰于速杞隨地隨師敗績鬬丹獲其戎車與其戎右少師秋隨及我平王将不許伯比曰天去其疾矣獲隨少師故隨未可克也乃盟而還四十二年桓十三年屈瑕伐羅伯比送之還謂其御曰莫敖官名即屈瑕必敗舉趾髙心不固矣遂見王曰必濟師王辭焉屈瑕大敗于羅鬬丹亦為大夫葢其族也伯比子二穀於莵子良名未詳鬭穀於莵字子文初若敖氏卒伯比從其母畜于䢵淫于䢵子之女生穀於莵䢵夫人使棄諸夢中虎乳之䢵子田而見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於莵故命之曰鬬穀於莵以其女妻伯比穀於莵事成王成王八年莊三十年文王弟公子元為令尹處王宫欲蠱文夫人申公鬬班殺之穀於莵為令尹自毁其家以紓國難十七年僖五年穀於莵滅弦弦子奔黄三十二年僖二十年隨以漢東諸侯叛我穀於莵帥師伐隨取成而還三十五年僖二十三年成得臣伐陳取焦夷城頓而還穀於莵以為之功使為令尹薳吕臣曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾成得臣竟敗于城濮穀於莵卒説苑令尹子文之族有干法者廷理聞其令尹之族也釋之子文召廷理責之曰吾族犯法使廷理因縁吾心而釋之是吾不公之心明著于國也執一國之柄而以私聞吾生不以義不若吾死也致其族于廷理曰不是刑吾將死成王聞之不及履而至子文之室曰寡人幼少置理失人以違夫子之意于是黜廷理而尊子文潛夫論鬬文子三為令尹而有饑色妻子凍餒朝不及夕子鬬般為令尹般字子揚莊王九年宣四年子良之子鬭椒殺般又殺蒍賈遂將攻王王滅若敖氏般之子箴尹鬭克黄使于齊還聞亂其人曰不可以入矣克黄曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘于司敗王思鬭穀於莵之治楚國也曰子文無後何以勸善使復其所改命曰生左傳鬭椒見亂臣傳穀於莵之曾孫曰棄疾棄疾子韋龜韋龜子蔓成然成然亦見亂臣傳鬭廉鬬御彊鬬鬬梧耿之班附鬬祁鬬勃鬬且鬬廉字射師為大夫初事武王武王三十八年桓九年王使使将巴客聘于鄧鄧南鄙鄾人殺而奪之幣王使亷帥師及巴師圍鄾鄧救鄾廉衡陳其師于巴師之中以戰而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰四十年桓十一年屈瑕将盟貳軫二國名鄖人軍于蒲騷蒲騷鄖邑将與隨絞州蓼四國名伐我師屈瑕患之廉曰鄖人軍其郊必不戒且日虞四邑之至也君次于郊郢楚地以禦四邑我以鋭師宵加于鄖鄖有虞心而恃其城莫有鬬志若敗鄖師四邑必離屈瑕曰盍請濟師于王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉屈瑕曰卜之對曰卜以决疑不疑何卜遂敗鄖師于蒲騷卒盟而還武王薨厯事文王堵敖成王成王六年莊二十八年令尹公子元欲蠱文夫人夫人諷之伐鄭元及鬬御彊鬬梧耿之不比為斾時建斾以居前鬬班王孫㳺王孫喜殿入鄭純門鄭外郭門及逵市而還八年莊三十年公子元處王宫欲遂蠱文夫人廉諫子元執而梏之秋鬬班殺公子元左傳御彊梧耿之班並若敖氏族班為申公鬭祁鬭勃並若敖氏族也祁為令尹事武王武王五十一年莊四年王伐隨薨于樠木之下祁除道梁溠營軍臨隨隨成祁濟漢而後發喪鬭勃字子上為大夫事成王成王四十年僖二十八年晉楚遇于城濮令尹成得臣使勃請戰得臣将中軍鬭宜申将左勃将右及戰左右師潰我師敗績王殺成得臣以勃為令尹四十五年僖三十三年勃侵陳蔡陳蔡成遂伐鄭将納公子瑕門于桔柣之門瑕死初王将以商臣為大子訪諸勃勃曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽是年晉陽處父侵蔡勃救之與晉夾泜而軍陽處父曰子欲戰則吾退舎子濟而陳不然紓我勃退舎處父宣言曰楚師遁矣遂歸我師亦歸大子商臣譖勃曰受晉賂而辟之楚之恥也罪莫大焉王殺勃左傳鬭宜申見亂臣傳鬬且亦楚大夫且嘗廷見令尹囊瓦囊瓦與之語問蓄貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問蓄聚積實如餓豺狼焉殆必亡者也夫古者聚貨不妨民衣食之利聚馬不害民之財用國馬足以行軍國馬民馬十六井為邱有戎馬一匹牛三頭公馬足以稱賦公馬公之戎馬賦兵賦也不是過也公貨足以賔獻家貨足以共用不是過也夫貨馬郵則闕于民郵過也民多闕則有離叛之心将何以封矣昔鬬文子三舎令尹無一日之積恤民故也成王聞子文之朝不及夕也于是乎每朝設脯一束糗一筐以羞子文至于今令尹秩之成王每出子文之禄必逃王止而後復曰民多曠者而我取富焉死無日矣我逃死非逃富也故莊王之世滅若敖氏唯子文之後在至于今處鄖為楚良臣是不先恤民而後已之富乎今子常即囊瓦先大夫之後也而相楚君無令名于四方民之羸餧日日已甚是之不恤而蓄聚不厭其速怨于民多矣積貨滋多蓄怨滋厚不亡何待子常其能賢于成靈乎成不禮于穆願食熊蹯不獲而死靈王不顧于民一國棄之如遺跡焉子常為政而無禮不顧甚于成靈其獨何力以待之國語論曰若敖再世翊楚至毁家以紓國宜子文之有後也然不有奔命之臣若敖之鬼終亦餒而已矣鬬勃以危言誅臣不密則失身之謂也然而熊蹯待食其思子上乎成得臣子玉宛春附榮黄成大心孫伯成熊成嘉成得臣字子玉亦若敖氏之族也得臣事成王成王三十五年僖二十二年陳貳于宋得臣伐之取焦夷城頓而還焦夷陳邑頓國名遂代鬬穀於莵為令尹晉公子重耳來得臣請殺之王不可乃送諸秦三十七年僖二十五年秦晉伐鄀小國名我使戍商密鄀别邑商密降秦獲我鬬克屈禦冦得臣追之弗及遂圍陳納頓子于頓三十八年僖二十六年得臣滅䕫以䕫子歸冬得臣伐宋圍緡四十年僖二十八年王及諸侯圍宋晉伐曹衛以救之王入居于申使申叔侯去穀使得臣去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣初蒍賈謂得臣剛而無禮不可以治民過三百乗不能以入及是得臣使鬬椒請戰曰非敢必有功也願以執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之西廣右廣東宫大子宫甲若敖六卒子王宗人之兵六百人得臣使宛春告于晉請復曹衛臣亦釋宋晉執宛春私許復曹衛曹衛告絶于我得臣怒從晉師晉師退三舎楚衆欲止得臣不可夏四月次于城濮我師背酅而舎得臣使鬬勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之恵未之忘也是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乗敬爾君事詰朝将見明日得臣以若敖之六卒将中軍鬬宜申将左鬬勃将右曰今日必無晉矣晉胥臣以下軍之佐䝉馬以虎皮先犯陳蔡陳蔡奔我右師潰狐毛設二斾而退欒枝使輿曵柴而偽遁我師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻鬭宜申我左師潰我師敗績得臣收其卒而止故不敗初得臣自為瓊弁玉纓未之服也先戰夢河神謂已曰畀余余賜汝孟諸之麋弗致也得臣子大心與鬬宜申使榮黄諫弗聽榮黄曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師将何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何大心及鬭宜申曰得臣将死二臣止之曰君其将以為戮及連穀得臣縊王使止之曰毋死不及而死左傳宛春楚大夫榮黄字季亦楚人也大心字孫伯得臣之子也成王四十五年僖三十三年晉陽處父侵蔡令尹鬬勃救之與晉師夾泜而軍鬬勃欲涉大心曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舎大子商臣譖鬬勃王殺之以大心為令尹成王薨事穆王穆王四年文五年大心滅六國名十年文十一年王伐麇國名大心敗麇師于防渚麇地十一年文十二年大心卒淮南子吳與楚戰莫囂大心撫其御之手曰今日距彊敵犯白刃䝉矢石戰而身死卒勝民治全我社禝可以庶幾乎遂入不返決腹斷頭不旋踵運軌而死按敗楚師者囊瓦非大心大心去昭王世殊逺説誤大心子成熊公羊作成然熊字虎事靈王靈王十一年昭十二年或譖熊于王熊知之而不能行先是鬭椒作亂鬬成同出若敖王謂熊亦若敖之餘也遂殺之左傳案大心于文十二年卒成熊見于昭十二年相距八十六年則成熊或非大心之子嘉字子孔若敖之曾孫也穆王十一年文十二年嘉為令尹羣舒叛嘉執舒子平及宗子遂圍巢宗巢二國羣舒之屬莊王元年文十四年嘉及潘崇将襲羣舒使公子爕與鬬克守而伐舒蓼爕克作亂城郢使賊殺嘉不克而還遂殺爕及克嘉卒蒍艾獵代為令尹左傳論曰軍制曰多筭勝少算不勝怒齊秦絶曹衛執宛春晉有算矣子玉違成命帥憤師違命不祥憤師無功無算而敗實自敗也瓊玉畀神庸能免乎屈瑕屈重屈瑕屈氏之先楚之同姓也事武王為莫敖楚官名武王四十年桓十一年瑕将盟貳軫二國名鄖人軍于蒲騷将與隨絞州蓼四國名伐我師瑕敗鄖師于蒲騷卒盟而還四十一年桓十二年我伐絞軍其南門瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅我役徒于山中我坐其北門坐守也而復諸山下大敗之為城下之盟而還伐絞之役我師分涉于彭羅人欲伐之使伯嘉諜之三巡數之四十二年桓十三年瑕伐羅使徇于師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎南蠻兩軍之大敗之瑕縊于荒谷瑕死屈重繼瑕為莫敖五十一年莊四年武王伐隨薨于樠木之下重及令尹鬬祁除道梁溠營軍臨隨隨人懼行成重以王命入盟隨侯且請為會于漢汭而還濟漢而後發喪左傳屈完屈完事成王為大夫成王十六年僖四年齊侯以諸侯之師侵蔡蔡潰遂伐我以包茅不入王祭不共昭王南征不復來討使者對曰貢之不入寡君之罪也敢不共給昭王南征不復君其問諸水濱師進次于陘王使完如師請盟師退次于召陵齊侯陳諸侯之師與完乗而觀之曰豈不穀是為先君之好是繼與不穀同好如何對曰君恵徼福于敝邑之社禝辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以徳綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之完及諸侯盟左傳屈蕩屈到屈建屈生屈蕩附屈申屈蕩者屈建之祖父世本蕩事莊王莊王十七年宣十二年邲之役也王為乗廣三十乗分為左右許偃御右廣養由基為右彭名御左廣蕩為右晉趙旃來召盟夜至于我軍王乗左廣以逐趙旃旃棄車而走林蕩搏之得其甲裳我師遂乗晉軍晉軍奔王見右廣將從之乗蕩尸之曰君以此始亦必以終自是楚之乗廣先左蕩子到到字子夕事康王為莫敖到子建建字子木亦事康王康王九年襄二十二年使建為莫敖尹文子共王多寵子而世子之位不定屈建曰楚必多亂夫一兎走萬人追之一人得之萬人不復走今楚多寵子而嫡位無主亂自是生矣本絶則撓猶兔走也共王聞之立康王為大子慎子説苑並同按建父到己事康王為莫敖則康王由建言而立恐未必然十年襄二十三年陳慶虎慶寅叛建從陳侯圍陳納陳公子黄十二年襄二十五年建為令尹舒鳩人叛建伐之及離城吳人救之建遽以右師先子彊息桓子捷子駢子盂帥左師以退吳人居其間七日子彊曰久将墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我言簡閲精兵駐後為陳也我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師會之吳師大敗建遂滅舒鳩宋向戍善于晉趙武又善于建欲弭諸侯之兵如晉告晉許之來告于我我亦許之如齊秦齊秦亦許之皆告于小國為會于宋十四年襄二十七年夏六月公子黑肱先至成言于晉先遣黑肱就晉大夫成載盟之言向戍如陳從建成言于楚建請晉楚之從交相見也向戍復于趙武武曰晉楚齊秦匹也楚能使秦君辱于敝邑寡君敢不固請于齊建使驛謁諸王王曰釋齊秦他國請相見也辛巳盟于西門之外晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈専在晉乃先我宋公兼享晉楚之大夫趙武為客客一坐所尊建與之言弗能對使羊舌肹即叔向侍言焉建亦不能對也乙酉宋公及諸侯之大夫盟于䝉門之外建問于趙武曰范武子即士會之徳何如對曰夫子之家事治言于晉國無隠情其祝史陳信于鬼神無愧辭建歸以告王王曰尚矣哉能歆神人宜其光輔五君以為盟主也建又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭十五年襄二十八年建卒左傳屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老将薦芰建命去之宗老曰夫子屬之建曰不然夫子承楚國之政其法刑在民心而藏在王府上之可以比先王下之可以訓後世雖微楚國諸侯莫不譽其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用國語建子生生事靈王與屈到屈建同官者又别有屈蕩康王二年襄十五年以到為莫敖蕩為連尹十二年襄二十五年以建為令尹以蕩為莫敖楚官縣尹次莫敖莫敖次令尹知此屈蕩别是一人然與屈建同官而同其祖名𫝊或誤蕩子申申亦為莫敖事靈王靈王三年昭四年王伐吳使申圍朱方克之執齊慶封盡滅其族明年王以申為貳于吳殺之以屈生為莫敖左傳論曰邲之役屈蕩以左廣終始莊王楚廣由是先左然隨之役季梁曰楚人尚左是楚固先左也建之為令尹也崇徳比賢狎主齊盟以和諸侯三載而卒惜也若夫徹芰而祭引禮以違命又其通也屈原宋玉附唐勒景差屈原者名平離騷名予曰正則字予曰靈均是又名正則字靈均也為楚懷王左徒博聞彊識明于治亂嫺于辭令入則與王圖議國事以出號令出則接遇賓客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懷王使平造為憲令平屬草藁未定上官大夫見而欲奪之平不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功以為非我莫能為也王怒而疏平平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷新序屈原有博通之知清潔之行懷王用之東使于齊以結强黨秦國患之使張儀之楚貨楚貴臣上官大夫靳尚之屬及令尹子蘭司馬子椒夫人鄭袖共譖屈原平既絀其後秦欲伐齊齊與楚從親恵王患之乃令張儀佯去秦厚幣委質事楚曰秦甚憎齊齊與楚從親楚誠能絶齊秦願獻商於之地六百里懷王貪而信張儀遂絶齊使使如秦受地張儀詐之曰儀與王約六里不聞六百里楚使怒去歸告懷王懷王怒大興師伐秦秦發兵擊之大破楚師于丹浙斬首八萬虜楚将屈匄遂取楚之漢中地懷王乃悉發國中兵以深入擊秦戰于藍田魏聞之襲楚至鄧楚兵懼自秦歸而齊竟怒不救楚楚大困明年秦割漢中地與楚以和楚王曰不願得地願得張儀而甘心焉張儀聞乃曰以一儀而當漢中地臣請往如楚又因厚幣用事者臣靳尚而設詭辨于懷王之寵姬鄭袖懷王竟聽鄭袖復釋去張儀是時屈平既疏不復在位使于齊顧反諫懷王曰何不殺張儀懷王悔追張儀不及其後諸侯共擊楚大破之殺其将唐昩時秦昭王與楚婚欲與懷王會懷王欲行平曰秦虎狼之國不可信不如無行懷王稚子子蘭勸王行奈何絶秦歡懷王卒行入武闗秦伏兵絶其後因留懷王以求割地懷王怒不聽亡走趙趙不内復之秦竟死于秦而歸塟長子頃襄王立以其弟子蘭為令尹楚人既咎子蘭以勸懷王入秦而不反也平既嫉之雖放流睠顧楚國繫心懷王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反復之一篇之中三致意焉令尹子蘭聞之大怒卒使上官大夫短平于頃襄王頃襄王怒而遷之平至于江濱披髮行吟澤畔乃作懷沙之賦于是懷石遂自投汨羅以死水經注屈原有賢姊聞原放逐亦來歸喻令自寛全鄉人冀其見從因名曰秭歸即女嬃也又曰屈原放流忽然自歸鄉人喜説因名曰歸鄉異苑長沙羅縣有屈原自投之川民為立廟在汩潭之西岸側石盤馬跡尚存平既死之後楚有宋玉唐勒景差之徒皆好辭而以賦見稱然皆祖平之從容辭令終莫敢直諫史記宋王因其友見楚襄王襄王待之無以異乃讓其友友曰夫薑桂因地而生不因地而辛女因媒而嫁不因媒而親子之事王未耳何怨于我玉曰不然昔者齊有良兔曰東郭㕙一日而走五百里齊有良狗曰韓盧亦一旦而走五百里使之遥見指屬雖韓盧不及走兔之塵若攝迹而縱緤則雖東郭㕙亦不能離今子之屬臣也躡迹縱緤與遥見指屬與韓詩外傳新序同宋玉集宋玉事懷王言友人于王王以為小臣友人讓玉玉報友人書曰薑桂因地而生不因地而辛女因媒而嫁不因媒而親與前説異新序宋玉事襄王而不見察或謂曰先生何談説之不揚計晝之疑也宋玉曰不然不見夫元蝯乎當其居桂林之中超騰往來雖羿逢䝉不得正目視之及在枳棘之中危視而蹟行衆人皆得意焉此皮筋非加急而體益短也處勢不便故也夫處勢不便豈可以量功校能哉襄王問于宋玉曰先生其有遺行邪何士民衆庶不譽之甚也玉對曰唯然有之願大王寛其罪使得畢其辭客有歌于郢中者其始曰下里巴人國中屬而和者數千人其為陽阿薤露國中屬而和者數百人其為陽春白雪國中屬而和者不過數十人引商刻羽雜以流徵國中屬而和者不過數人而已是其曲彌髙其和彌寡故鳥有鳳而魚有鯤鳳凰上擊九千里絶雲霓負蒼天翱翔乎窈㝠之上夫蕃籬之鷃豈能與之料天地之髙哉鯤魚朝發崑崙之墟暴鬐于碣石暮宿于孟諸夫尺澤之鯢豈能與之量江海之大哉故非獨鳥有鳳而魚有鯤也士亦有之夫聖人瑰意琦行超然獨處世俗之民又安知臣之所為哉對楚王問屈原賦二十五篇宋玉賦十六篇唐勒賦四篇漢書論曰懷王将入秦屈原沮之子蘭勸之遂卒不反是己事有徴矣乃頃襄既立親蘭而放原意者戍甫戍申重平王之報與嗟夫原以孤忠支吾羣小使遇中主鮮能得志于懷襄乎何有懷沙悲怨不可卒讀雪涕漣洳不獨為屈原下也尚史巻五十六
