body:
  text: 尚史卷七十二列傳五十鑲白旗漢軍李鍇撰田齊諸臣傳魯仲連魯仲連者齊人也好竒偉俶儻之畫策魯連子齊辨士田巴服徂邱議稷下毁五帝罪三王服五伯離堅白合同異一日服千人有徐劫者其弟子曰魯仲連年十二號千里駒往請田巴曰臣聞堂上不奮郊草不藝白刃交前不救流矢急不暇緩也今楚軍南陽趙伐髙唐燕人十萬聊城不去國亡在旦夕先生奈之何若不能者先生之言有似梟鳴出城而人惡之願先生勿復言田巴曰謹聞命矣巴謂徐劫曰先生乃飛兔也豈直千里駒巴終身不談而不肯仕官任職好持髙節史記燕敗齊取七十餘城唯莒即墨未下田單以即墨破燕殺騎劫初燕將攻下聊城人或讒之燕燕將懼誅因保守聊城不敢歸田單攻聊城嵗餘士卒多死而聊城不下魯連乃為書約之矢以射城中遺燕將曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信于齊非勇也功廢名滅後世無稱非智也故智者不再計勇士不怯死今死生榮辱貴賤尊卑此其一時也願公之詳計而無與俗同也且楚攻南陽魏攻平陸齊無南面之心以為亡南陽之害不如得濟北之利故定計而堅守之今秦人下兵魏不敢東面橫秦之勢合則楚國之形危且棄南陽斷右壤存濟北計必為之今楚魏交退燕救不至齊無天下之規與聊城共據朞年之敝即臣見公之不能得也齊必決之于聊城公無再計彼燕國大亂君臣過計上下迷惑栗腹以十萬之衆五折于外萬乘之國被圍于趙壤削主困為天下戮公聞之乎今燕王方寒心獨立大臣不足恃國敝禍多民心無所歸今公又以聊城之民距全齊之兵朞年不解是墨翟之守也食人炊骨士無反北之心是孫臏吳起之兵也能已見于天下矣故為公計不如罷兵休士全車甲歸報燕王燕王必喜士民見公如見父母交游攘臂而議于世功業可明矣上輔孤主以制羣臣下養百姓以資說士矯國革俗于天下功名可立也意者亦捐燕棄世東游于齊乎請裂地定封富比陶衛世世稱寡與齊久存此亦一計也二者顯名厚實也願公熟計而審處一也且吾聞效小節者不能行大威惡小恥者不能立滎名昔管仲射桓公中鉤篡也遺公子糾而不能死怯也束縛桎梏辱身也此三行者鄉里不通也世主不臣也使管仲終窮抑幽囚而不出慙恥而不見窮年沒夀不免為辱人賤行矣然管子并三行之過據齊國之政一匡天下九合諸侯為五霸首名髙天下光照鄰國曹沫為魯君將三戰三北而喪地千里使曹子計不顧後出必死而不生則不免為敗軍禽將矣曹子以敗軍禽將非勇也功廢名滅後世無稱非智也故去三北之恥退而與魯君計齊桓公朝諸侯曹子以一劒之任劫桓公于壇位之上顔色不變辭氣不悖三戰之所喪一朝而反之天下震動威信吳楚傳名後世若二公者非不能行小節死小恥也以為殺身絶世功名不立非智也故去忿恚之心而成終身之名除感忿之恥而立纍世之功故業與三王爭流名與天壤相敝也公其圖之燕將曰敬聞命矣因罷兵到韣而去到同倒韣弓衣也史記燕將見書泣三日猶預不決欲歸燕已有隙恐誅欲降齊所殺虜于齊甚衆恐已降而後見辱喟然歎曰與人刃我寧自刃乃自殺國䇿聊城亂田單遂屠聊城歸而言魯連欲爵之魯連逃隱于海上曰吾與富貴而詘于人寧貧賤而輕世肆志焉魯連遊于趙趙孝成王時秦王使白起破趙長平之軍前後四十餘萬秦兵遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍魏安釐王使將軍晉鄙救趙畏秦止于蕩隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所為急圍趙者前與齊湣王爭彊為帝已而復歸帝今齊湣王已益弱方今唯秦雄天下此非必貪邯鄲其意欲復求為帝趙試發使尊秦昭王為帝秦必喜罷兵去平原君猶預未有所決此時魯仲連適游趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆于外今又內圍邯鄲而不能去魏王使客將軍新垣衍令趙帝秦今其人在是勝也何敢言事魯仲連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之于先生平原君遂見新垣衍曰東國有魯仲連先生者今其人在此勝請為紹介交之于將軍新垣衍曰吾聞魯仲連先生齊國之髙士也衍人臣也使事有職吾不願見魯仲連先生平原君曰勝既已泄之矣新垣衍許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中者皆有求于平原君者也今吾觀先生之玉貌非有求于平原君者也曷為久居此圍城之中而不去魯仲連曰世以鮑焦為無從頌而死者皆非也衆人不知則為一身彼秦者棄禮義而上首功之國也權使其士虜使其民彼即肆然而為帝過而為政于天下則連有蹈東海而死耳吾不忍為之民也所為見將軍者欲以助趙也新垣衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣新垣衍曰燕則吾請以從矣若乃梁者則吾乃梁人也先生惡能使梁助之魯連曰梁未睹秦稱帝之害故耳使梁睹秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害何如魯連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居嵗餘周烈王崩齊後往周怒赴于齊曰天崩地坼天子下席東藩之臣因齊後至則斫齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足怪新垣衍曰先生獨不見夫僕乎十人而從一人者寧力不勝而智不若邪畏之也魯仲連曰嗚呼梁之比于秦若僕邪新垣衍曰然魯仲連曰吾將使秦王烹醢梁王新垣衍怏然不悅曰噫嘻亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之于紂紂以為惡醢九侯鄂侯爭之彊辨之疾故脯鄂侯文王聞之喟然而歎故拘之羑里之庫百日欲令之死曷為與人俱稱王卒就脯醢之地齊湣王將之魯夷維子為孰策而從謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來吾君彼吾君者天子也天子巡狩諸侯辟舍納管籥攝衽抱機視膳于堂下天子已食乃退而聽朝也魯人投其籥不果納不得入于魯將之薛假途于鄒當是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯棺設北面于南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劒而死固不敢入于鄒鄒魯之臣生則不得事養死則不得賻襚然且欲行天子之禮于鄒魯鄒魯之臣不果納今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國各有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎于是新垣衍起再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也吾請出不敢復言帝秦秦將聞之為却軍五十里適㑹魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍遂引而去于是平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連夀魯連笑曰所謂貴于天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見史記破按田單復齊在慎靚王三十三年秦趙長平使新垣衍帝秦在赦王五十四年當趙孝成王之七年也國䇿以守聊城十齊時事則射書當在帝秦之前而史記以帝秦後二餘年燕將攻下聊城聊城人或讒之燕將懼誅不敢歸是非復齊時事矣故序射書于帝秦之後然書中序栗腹事按趙破燕將粟腹在孝成王十五年去復齊愈逺豈聊城射書信非復齊時事邪或疑書為後人傅㑹庸或然也初田單將攻狄往見魯連連曰將軍攻狄不能下也田單曰臣以五里之城七里之郭破亡餘卒破萬乘之燕復齊墟攻狄而不下何也上車勿謝而去遂攻狄三月而不克之齊兒謠曰大冠若箕修劍拄頤攻狄不能下壘枯邱田單乃懼問魯連曰先生謂單不能下狄請問其說連曰將軍之在即墨坐而織蕢立則杖插為士卒倡曰可往矣宗廟亡矣亡日尚矣歸于何黨矣當此之時將軍有死之心而士卒無生之氣聞若言莫不揮泣奮臂而欲戰此所以破燕也今將軍東有夜邑之奉西有菑上之虞黃金橫帶而馳乎淄澠之間有生之樂無死之心所以不勝也田單曰單有心先生志之矣明日厲氣循城立于矢石之所援枹鼓之狄人乃下齊策儒家魯連十四篇漢書國策孟嘗君有舍人而弗說欲逐之魯連謂孟嘗君曰獮猴錯木據水則不若魚鱉歷險乘危則騏驥不如狐狸曹沫奮三尺之劍一軍不能當使操銚耨居壟畝則不若農夫故物捨其所長用其所短堯亦有所不及矣今使人而不能則謂之不肖教人而不能則謂之拙拙則罷之不肖則棄之使人有棄逐不相與處而來害相報者豈非世之立教首也哉孟嘗君曰善乃弗逐連又謂孟嘗君曰君好士未也雍門子養椒亦陽得子養缺飲食衣裘與之同皆得其死今君之家富于二公而士未有為君盡游者也君曰文不得是二人故也使文得二人文豈獨不得盡對曰君之廄馬百乘無不被繡衣而食菽粟者豈有騏驎騄耳哉後宫十妃皆縞紵食粱肉豈有毛牆西施哉色與馬取于今之世士何必待古哉故曰君之好士未也孔叢子魏安釐王問天下之髙士子順曰世無其人也抑可以為次其魯仲連乎王曰魯仲連强作之非體自然也曰人皆作之作之不止乃成君子論曰顔斶守道王蠋守義知所守矣魯連以辨折新垣衍使不帝秦雖嚴正未臻亦足以振聾瞽激厲當世射書事庸有之而其書則非其舊已齊貌辨公孫閈齊貌辨者齊人也事靖郭君田嬰齊貌辨之為人也多疵門人弗說士尉齊人以證靖郭君證諫也靖郭君不聽士尉辭而去嬰子文又竊以諌靖郭君大怒曰剗而類破吾家茍可慊齊貌辨者吾無辭為之于是舍之上舍令長子御之旦暮進食數年宣王薨閔王即位靖郭君大不善于閔王辭而之薛與辨俱留無幾何辨辭而行請見閔王靖郭君曰王不說嬰甚公往必得死焉對曰固不求生也請必行行至齊閔王聞之藏怒以待之辨見閔王曰子靖郭君之所聽愛夫辨曰愛則有之聽則無有玉之方為太子之時辨為靖郭君曰太子相不仁過頤豕視若是者信反不若廢太子更立衛姬嬰兒郊師靖郭君泣而曰不可吾不忍也若聽辨而為之必無今日之患矣此為一至于薛昭陽請以數倍之地易薛辨又曰必聽之靖郭君曰受薛于先王雖惡于後王吾獨謂先王何且先王之廟在薛吾豈可以先王之廟與楚乎又不聽此為二閔王太息動于顔色曰靖郭君之于寡人一至此乎寡人少殊不知此客肯為寡人來靖郭君乎對曰敬諾靖郭君衣宣王之衣冠舞其劍閔王自迎靖郭君于郊望之而泣靖郭君至因請相之靖郭君辭不得已而受之七日謝病强辭不得三日而聽當是時靖郭君可謂能知人矣又有公孫閈者始齊將封靖郭君于薛楚王聞之大怒將伐齊齊王有輟志閈曰封之成與不非在齊又將在楚閈說楚王令其欲封公也又甚於齊靖郭君曰願委之于子閈為謂楚王曰魯宋事楚而齊不事者齊大而魯宋小王獨利魯宋之小不惡齊大何也夫齊之削地封田嬰是其所以弱也楚王曰善因不止又有齊客者靖郭君將城薛客多以諫靖郭君謂謁者無為客通齊人有請者曰臣請三言而已益一言請烹靖郭君因見之客趨而進曰海大魚因反走君曰客有于此言此外應復有言客曰鄙臣不敢以死為戲君曰亡更言之對曰君不聞大魚乎網不能止釣不能牽蕩而失水則螻蟻得意焉今夫齊亦君之水也君長齊奚以薛為失齊雖隆薛之城到于天猶之無益也君曰善乃輟城薛國䇿馮暖張祿附馮暖史記作歡並況袁切者齊人也貧乏不能自存使人屬孟嘗君願寄食門下孟嘗君曰客何好曰客無好也曰客何能曰客無能也孟嘗君笑而受之曰諾左右以君賤之也食以草具列士傳孟嘗君食客三千人上客食肉中客食魚下客食菜馮暖經年無袴面有饑色居有頃倚柱彈其劍歌曰長鋏歸來乎食無魚左右以告孟嘗君食之比門下之客居有頃復彈其鋏歌曰長鋏歸來乎出無車左右皆笑之以告孟嘗君曰為之駕比門下之車客于是乘其車揭其劍過其友曰孟嘗君客我後有頃復彈其鋏歌曰長鋏歸來乎無以為家左右皆惡之以為貪而不知足孟嘗君問馮公有親乎對曰有老母孟嘗君使人給其食用無使乏于是馮暖不復歌後孟嘗君出記問門下諸客誰習計㑹能為文收責于薛者乎暖署曰能孟嘗君怪之曰此誰也左右曰乃歌夫長鋏歸來者也孟嘗君笑曰客果有能也吾負之未嘗見也請而見之謝曰文倦于是憒于憂而性懧愚沉于國家之事開罪于先生先生不羞乃有意欲為文收責于薛乎暖曰願之于是約車治裝載劵契而行辭曰責畢收以何市而反孟嘗君曰視吾家所寡有者驅而之薛使吏召諸民當償者悉來合劵劵遍合赴矯命以責賜諸民因燒其劵民稱萬嵗長驅到齊晨而求見孟嘗君怪其疾也衣冠而見之曰責畢收乎來何疾也曰收畢矣以何市而反暖曰君云視吾家所寡有者臣竊計君宫中積珍寶狗馬實外廄美人充下陳君家所寡有者以義耳竊以為君市義孟嘗君曰市義奈何曰今君有區區之薛不拊愛子其民因而賈利之臣竊矯君命以責賜諸民因燒其劵民稱萬嵗乃臣所以為君市義也孟嘗君不說曰諾先生休矣後期年齊王謂孟嘗君曰寡人不敢以先王之臣為臣孟嘗君就國于薛未至百里民扶老攜幼迎君道中終日孟嘗君顧謂馮暖先生所為文市義者乃今日見之史記孟嘗君相齊舍人魏子為收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之孟嘗君怒而退魏子居數年或毁孟嘗君將為亂湣王意疑孟嘗君奔魏子所與粟賢者乃上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君湣王驚驗問果無反謀乃復召孟嘗君暖曰狡兔有三窟僅得免其死耳今有一窟未得髙枕而卧也請為君復鑿二窟孟嘗君與車五十乘金五百斤西遊于梁謂梁王曰齊放其大臣孟嘗君于諸侯先迎之者富而兵强于是梁王虛上位以故相為上將軍遣使者黃金千斤車百乘往聘孟嘗君暖先驅誡孟嘗君曰千金重幣也百乘顯使也齊其聞之矣梁使三反孟嘗君固辭不往也齊王聞之君臣恐懼遣太傅齎黃金千斤車二駟服劍一封書謝孟嘗君曰寡人不祥被于宗廟之祟沉于諂諛之臣開罪于君寡人不足為也願君顧先王之宗廟姑反國統萬人乎暖誡孟嘗君願請先王之祭器立宗廟于薛前靖郭君時已立廟今又請立蓋宗廟非一主也廟成還報孟嘗君曰三窟已就君始髙枕為樂矣國䇿自齊王毁廢孟嘗君諸客皆去後召而復之暖迎之未到孟嘗君太息歎曰文常好客遇客無所敢失食客三千餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客亦何面目復見文乎暖結轡下拜孟嘗君下車接之曰先生為客謝乎曰非為客謝也為君之言失夫物有必至事有固然君知之乎孟嘗君曰愚不知也曰生者必有死物之必至也富貴多士貧賤寡交事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過者掉臂而不顧非好朝而惡暮所期物亡其中今君失位賓客皆去不足以怨士而徒絶賓客之路願君遇客如故孟嘗君再拜曰敬從命史記國策作談拾子且曰孟嘗君取所怨五百牒削去之不敢以為言說苑張祿掌門見孟嘗君曰衣新而不舊倉庾盈而不虛為之有道君知之乎孟嘗君曰奈何張祿曰願君貴則舉賢富則振貧孟嘗君以為然明日奉黃金百斤文織百純進之張先生先生不受孟嘗君曰文竊說教故進之先生曷為不受張祿曰君將掘偶錢發庾粟以補士則衣弊履穿而不瞻耳何暇衣新而不舊倉庾盈而不虛乎孟嘗君曰奈何曰願君為書寄我與秦我往而遇固君之入也不遇雖人求間謀固不遇臣矣孟嘗君曰敬聞命因為書寄之秦而大遇謂秦王曰大王有一不得者王知之乎夫孟嘗君賢人天下無急則已有急則能收英乂之士與之合交者獨此耳大王胡不友之乎秦王曰敬受命奉千金以遺孟嘗君孟嘗君輟食而寤曰此張生所謂衣新而不舊倉庾盈而不虛者也公孫戍公孫宏雍門子周附公孫戍者孟嘗君之門人也孟嘗君出行國至楚楚獻象牀郢之登徒直使送之不欲行見戍曰臣郢之登徒也直送象牀象牀之直千金傷此若髮漂賣妻子不足償足下能使僕無行先人有寶劍願得獻之戍曰諾入見孟嘗君曰君豈受楚象牀哉孟嘗君曰然戍曰臣願君勿受孟嘗君曰何哉戍曰小國所以皆致相印于君者聞君能振達貧窮有存亡繼絶之義也小國英傑之士皆以國事纍君說君之義慕君之廉也今君到楚而受象牀所未至之國將何以待君臣戍願君勿受孟嘗君曰諾戍趨而去未出至中閨君召而反之曰子教文無受象牀甚善今何舉足之髙志之揚也戍曰臣有大喜三重之寶劒一君曰何謂也戍曰門下數百莫敢入諌臣獨諫臣一喜諫而得聽臣二喜諫而止君之過臣三喜輸象牀郢之登徒不欲行許戍以先人之寶劒孟嘗君曰善受之乎戍曰未敢曰急受之因書門版曰有能揚文之名止文之過私得寶于外者疾入諫又有公孫宏者亦事孟嘗君孟嘗君為從宏曰君不如使人先觀秦王意者秦王帝王之主也君恐不得為臣奚暇從以難之意者秦王不肖之主也君從以難之未晚孟嘗君曰善願因請公往矣宏以車十乘之秦昭王聞之而欲愧之以辭宏見昭王曰薛之地大小幾何對曰百里昭王笑曰寡人地數千里猶未敢以有難也孟嘗君地方百里而欲以難寡人可乎宏對曰孟嘗君好人昭王曰孟嘗君之好人也奚如對曰義不臣乎天子不友乎諸侯得志不慙為人主不得志不肯為人臣如此者三人治可為管商之師說義聽行能致其主霸王如此者五人萬乘之嚴主也辱其使者退而自刎必以其血汚其衣如臣者十人昭王笑而謝之曰客胡為若此寡人直與客論耳寡人善孟嘗君欲客之必諭寡人之志也宏曰敬諾國策說苑雍門子周以琴見孟嘗君君曰先生鼓琴亦能令文悲乎雍門子周曰臣何能令足下悲哉臣之能令悲者有先貴而後賤先富而後貧者也今若足下千乘之君也視天地曽不若一指忘死與生雖有善鼓琴者固未能令足下悲也然臣之為足下悲者事也夫聲敵帝而困秦者君也連五國之約南面而伐楚者又君也天下未嘗無事不從則橫從成則楚王橫成則秦帝楚王秦帝必報讐于薛矣夫以秦楚之强而報讐于薛譬之磨蕭斧而伐朝菌也必不留行矣天下有識之士無不為足下寒心千秋萬嵗之後廟堂必不血食髙臺既以壞曲池既以漸墳墓既以下而青廷矣嬰兒豎子樵採薪蕘者蹢躅其足而歌其上衆人見之無不愀焉為足下悲之曰夫以孟嘗君尊貴乃使若此乎于是引琴而鼓之動宫徵揮羽角切終而成曲孟嘗君涕浪汙增欷曰先生鼓琴令文若破國亡邑之人也貂勃張生附貂勃者齊人也常惡田單曰安平君小人也田單聞之故為酒而召勃曰單何以得罪于先生故常見譽于朝勃曰跖之狗吠堯非貴跖而賤堯狗固吠非其主也且今使公孫子賢而徐子不肖然而公孫子與徐子鬬徐子之狗猶將攫公孫子之腓而噬之也若乃得去不肖者而為賢者狗豈特攫其腓而噬之哉田單曰敬聞命明日任之于王王有所幸臣九人之屬欲傷田單相與語于王曰燕伐齊之時楚王使將軍將萬人而佐齊今國已定而社稷安何不使使者謝于楚王曰左右孰可曰貂勃可勃使楚楚王受而觴之數日不反九人之屬相與語于王曰夫一人之身而牽留萬乘者豈不以據勢也哉且安平君之與王也君臣無禮上下無别且內收百姓循撫其心振窮補不足布德于民外懷戎翟天下之賢士隂結諸侯之雄俊豪英其志欲有為也願王察之異日王曰召相單來田單免冠徒跣肉袒而進退而請死罪五日王曰子無罪子為子之臣禮吾為吾之王禮而已矣勃從楚來王賜諸前酒酣王曰召相單來勃避席稽首曰王惡得此亡國之言乎王上者孰與周文王王曰吾不若也勃曰下者孰與齊桓公王曰吾不若也然則周文王得吕望以為太公桓公得夷吾以為仲父今王得安平君而曰單且自天地之闢民人之治為人臣之功誰有厚于安平君者哉而王曰單單惡得此亡國之言乎且王不能守社稷燕人興師襲齊墟王走而之城陽之山中安平君以惴惴之即墨三里之城五里之郭敝卒七千禽其司馬而反千里之齊安平君之功也當是時闔城陽而王天下莫之能止然而計之于道歸之于義以為不可故為棧道木閣迎王與后于城陽山中王乃得反子臨百姓今國已定民已安矣王乃曰單單且嬰兒之計不為此王不亟殺此九子者以謝安平君國危矣王乃殺九子而逐其家益封田單以夜邑萬戶國䇿說苑楚使聘于齊齊王饗之梧宫使者曰大哉梧乎昔燕攻齊遵雒路渡濟橋焚雍門飲馬乎淄澠定獲乎琅邪王與太后奔于莒逃于城陽之間當此之時梧之大何如乎王曰陳先生對之陳子曰臣不如刁勃王曰刁先生應之勃曰昔者荆平王殺子胥父與其兄子胥乞食于吳闔閭以為將三年復讐乎楚戰勝乎柏舉引師入郢子胥親射宫門掘平王冢當此時梧可以為柎矣說苑齊將軍田瞶出將張生郊送曰堯讓許由以天下而不受將軍知之乎曰知之伯夷叔齊辭諸侯而不為將軍知之乎曰知之於陵仲子辭三公而為人灌園將軍知之乎曰知之知過去君弟變姓名為庶人將軍知之乎曰知之此五大夫者名辭之而實羞之今將軍方吞一國之權擅斧鉞之誅慎勿以士之所羞者驕士田瞶曰今日諸君為瞶祖道而先生獨教以聖人之道謹聞命論曰傳有之危者安之傾者扶之若齊貌辨數子之轉移離逖也可謂克任其道矣顧薛固田氏之本封而齊實其水也孟嘗去齊而客魏然則不為螻蟻所制也亦幸而已矣之薛有所濟而去齊無聞焉豈正其小而遺其大哉抑事不可為也秦越人即盧醫扁鵲文摯附扁鵲者勃海鄚人也原作鄭誤姓秦名越人鮑彪注扁鵲盧人字越人法言扁鵲盧人而醫多盧少時為人舍長舍客長桑君過越人獨竒之常謹遇之長桑君亦知越人非常人也出入十餘年乃呼越人私坐間與語曰我有禁方年老欲傳與公公毋泄越人曰敬諾乃出其懷中藥豫越人飲是以上池之水謂水未至地者蓋承露及竹木上水也三十日當知物矣乃悉取其禁方書與越人忽然不見殆非人也越人以其言飲藥三十日視見垣一方人言能隔牆見人以此視病盡見五藏癥結特以診脈為名耳為醫或在齊號盧醫或在趙名扁鵲當晉定公時諸大夫彊而公族弱趙簡子鞅為大夫専國事簡子疾五日不知人韓子作十日大夫皆懼于是召越人越人入視病出董安于問越人越人曰血脈治也而何怪昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有所學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦策于是出夫獻公之亂文公之霸而襄公敗秦師于殽而歸縱淫此子之所聞今主君之病與之同不出三日必間間必有言也居二日半簡子寤語諸大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及其子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人于范魁之西而亦不能有也正義嬴趙氏本姓周人謂衛晉亡之後趙成侯三年伐衛取鄉邑七十三是也賈逵曰月阜曰魁以按嬴氏或指秦秦亡東西周而不能有卒歸于漢也周指衛以范魁指鄉邑七十三未見確據魁引賈說亦不明董安于受言書而藏之以越人言告簡子簡子賜田四萬畝其後越人過虢虢大子死傅元云晉滅虢先此百二十年焉得有虢按虢改稱郭蓋虢即郭越人至虢宫門下問中庶子喜方者曰大子何病國中治穰過于衆事中庶子曰大子病血氣不時交錯而不得泄暴發于外則為中害精神不能止邪氣邪氣畜積而不得泄是以陽緩而隂急故暴蹶而死越人曰其死何如時曰雞鳴至今曰收乎曰未也其死未能半日也言臣齊勃海秦越人也家在于鄚未嘗得望精光侍謁于前也聞大子不幸而死臣能生之中庶子曰先生得無誕之乎何以言大子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石橋引案杌毒尉鑱石針嬌引謂按摩之法夭嬌引身案杌謂按摩而玩弄使調也毒尉謂以藥物尉帖也一撥見病之應因五藏之輸肺心肝脾腎少隂骨膽胃三焦膀胱大腸小腸十二經皆以輸為原也乃割皮解肌訣脈結筋搦髓腦揲荒爪幕荒膏荒爪幕以爪抉其闌幕也湔浣腸胃潄滌五藏練精易形先生之方能若是則大子可生也不能若是而欲生之曽不可以告咳嬰之兒終日越人歎曰夫子之為方也若以管窺天以郤視文越人之為方也不待切脈望色聽聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見于大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至于隂當尚溫也中庶子聞扁鵲言目眩然而不瞚舌嬌然而不下乃入報虢君虢君聞之大驚出見越人于中闕曰竊聞髙義之日久矣然未嘗得拜謁于前先生過小國幸而舉之偏國寡臣幸甚索隱寡臣虢君自謙董份曰寡臣謂太子有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆魂精泄橫流涕長澘忽忽承䀹悲不能自止容貌變更越人曰若太子病所謂尸蹶者也夫以陽入隂中動胃繵緣脈居隂部反陽脈見者為陽入隂中是隂乘陽也胃水穀之海繵緣謂脈纒繞胃也中經維絡十二經脈十五絡脈陽維隂維之脈也别下于三焦膀胱是以陽脈下遂隂脈上爭㑹氣閉而不通隂上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脈亂故形靜如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹶中之時暴作也良工取之拙者疑殆越人乃使弟子子陽厲針砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之尉以八減之齊和煮之言尉之令溫暖之氣入五分而藥之齊和所減有八也以更尉兩脅下太子起坐更適隂陽但服湯一旬而復故故天下盡以越人為能生死人越人曰越人非能生死人也此自當生者越人能使之起耳越人過齊齊桓侯客之太公和之子桓公午也入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾越人出桓侯謂左右曰醫之好利也欲以不疾者為功後五日越人復見曰君有疾在血脈不治將深桓侯曰寡人無疾越人出桓侯不悅後五日越人復見曰君有疾在腸胃間不治將深桓侯不應越人出桓侯不悅後五日越人復見望見桓侯而退走桓侯使人問其故越人曰疾之在腠理湯尉之所及也其在血脈針石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無奈之何今在骨髓臣是以無請也後五日桓侯體病使人召越人越人已逃去桓侯遂死使聖人預知微能使良醫得蚤從事則疾可已身可活也人之所病病疾多而醫之所病病道少故病有六不治驕恣不論于理一不治輕身重財二不治衣食不能適三不治隂陽并藏氣不定四不治形羸不能服藥五不治信巫不信醫六不治有此一者則重難治也越人名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫來入咸陽聞秦人愛小兒即為小兒醫隨俗為變史記新語扁鵲居宋得罪于宋出亡之衛衛人有病將死扁鵲欲為治之病者之父曰吾子病甚篤將迎良醫治非子所能治退而不用乃使靈巫求福對扁鵲而呪病者卒死列子魯公扈趙嬰齊二人有疾請扁鵲治既愈謂公扈嬰齊曰汝曩之疾自外而干府藏今偕生之疾與體皆長為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志强而氣弱故足于謀而寡于斷齊嬰志弱而氣强故少于慮而傷于専若换汝之心則均善矣遂飲二人毒酒迷死三日割胸探心易而置之投以神藥既悟如初二人辭歸公扈反齊嬰之室妻子弗識齊嬰反公扈之室妻子亦弗識二室相與訟扁鵲辨其所由訟乃已魏文侯問越人曰子昆弟三人其孰最善為醫越人曰長兄最善中兄次之越人最為下曰可得聞邪越人曰長兄于病視神未有形而除之故名不出于家中兄治病在毫毛故名不出于閭若越人者鑱血脈投毒藥副肌膚間而名聞于諸侯鶡冠子越人見秦武王自趙簡子至是已百三十年扁鵲蓋不下百五十嵗豈有道而夀與武王示之病越人請除左右曰君之病在耳之前目之下除之未必已也將使耳不聰目不明君以告越人越人怒而投其石曰君與知者謀之與不知者敗之此知秦國之政也則君一舉而亡國矣國策秦太醫令李諡自知伎不如越人也使人刺殺之史記扁鵲內經九卷外經十三卷漢書越人之後又有文摯者未詳何國人齊王疾痏使人之宋迎摰摰至視王之疾謂太子曰王之疾可已也然王疾已則必殺摰也太子曰何故曰非怒王則疾不可治怒王則摰必死太子頓首彊請曰茍已王之疾臣與臣之母以死爭之于王王必幸臣與臣之母先生勿患也摰曰諾與太子期而將往不當者三齊王固已怒矣摰至不解履登牀履王衣問王之疾王怒而不與言摰因出辭以重怒王王叱而起疾乃遂已王大怒將生烹摰太子與王后急爭之不能得果生烹摰爨之三日顔色不變摰曰誠欲殺臣胡不覆之以絶隂陽之氣王使覆之摰乃死吕氏春秋列子龍叔謂文摰曰子之術微矣吾有疾子能已乎摰曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毁不以為辱得而不喜失而弗憂視生如死視富如貧視人如豕視吾如人家如逆旅之舍鄉如戎蠻之國凡此衆疾賞不能勸罰不能威利害不能易哀樂不能移固不可事國君交親友御妻子制僕𨽻此奚疾哉能已之乎文摰命龍叔背明而立自後向明而望之曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為疾者或由此乎非吾淺術所能已也田齊逸民傳陳仲子屠牛吐生附閭邱先陳仲子者史記索隱字子終齊人也其兄戴為齊卿食祿萬鍾仲子以為不義將妻子適楚居於陵自謂於陵仲子窮不茍求不義之食不食遭嵗饑乏糧三日乃匍匐而食井上李實之蟲者三咽而能視身自織履妻擘纑以易衣食髙士傳宋人屈穀見之曰穀聞先生之義不恃仰人而食今穀有樹瓠之道堅如石厚而無竅獻之仲子曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛而任重如堅石則不可剖以斟吾無以瓠為也曰然穀將以欲棄之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也韓非子楚王欲以為相而不許為人灌園列士傳韓詩外傳齊王厚送女欲妻屠牛吐吐辭其友曰子終死腥臭之肆而已吐曰女醜其友曰何以知之曰吾以屠知之吾肉善而去若少耳吾肉不善雖以吾附益之尚猶賈不售今厚送子子醜故耳其友後見之果醜說苑宣王獵于社山社山父老十三人相與勞王王賜父老田不租父老皆拜閭邱先生不拜王曰以為少邪賜父老無徭役父老皆拜閭邱先生又不拜王曰拜者去不拜者前曰寡人賜田不租賜無徭役先生獨不拜寡人得無有過乎閭邱先生對曰聞王來游所以為勞王望得夀于王得富于王得貴于王王曰天殺生有時非寡人所得與無以夀先生倉廩雖實以備菑害無以富先生大官無缺小官卑賤無以貴先生對曰此非臣之所敢望也願王選有修行者以為吏平其法度臣可以得夀振之以時無煩擾百姓臣可以得富令少者敬長長者敬老臣可以得貴今王幸賜田不租則倉廩將虛也賜無徭役則官府無使焉此非臣之所敢望也王曰善願以先生為相田齊夫人傳君王后宿瘤女附君王后者莒太史敫之女也閔王之遇弒也其子法章變名姓為敫家傭敫女竒法章之狀貌以為非常人憐而常竊衣食之與私焉莒中及齊亡臣相聚求閔王子欲立之法章乃自言于莒共立法章為襄王襄王立以女為后生子建太史敫曰女無媒而嫁者非吾種也汙吾世矣終身不覩君王后后賢不以不覩之故失人子之禮也襄王薨子建立為齊王君王后事秦謹與諸侯信以故建立四十餘年不受兵秦昭王嘗遣使遺玉連環曰齊多智而解此環不君王后以示羣臣羣臣不知解君王后引椎椎破之謝秦使曰謹以解矣及君王后病且卒誡建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受言君王后曰老婦已忘矣國策王建十六年君王后卒史記世家列女傳宿瘤女者齊東郭采桑之女閔王出遊百姓盡觀宿瘤采桑如故王召問之對曰妾受教采桑不受教觀大王王曰竒女也惜哉宿瘤女曰屬之不二豫之不忘中心謂何宿瘤何傷王大說使使以金百鎰往聘迎之父母驚欲沐浴加衣裳女曰如是則變容更服不見識也于是如故隨使者王見諸夫人曰今日出遊得一聖女斥汝屬矣諸夫人皆怪之盛服而衛遲其至也宿瘤駭宫中諸夫人皆掩口而笑王曰無笑不飾耳夫飾與不飾固相去十百也女曰飾與不飾相去千萬何十百也昔者堯舜自飾以仁義天下歸善焉桀紂不自飾以仁義天下歸惡焉由是觀之飾與不飾相去千萬何十百也諸夫人皆慙王以為后侵三晉懼秦楚一立帝號瘤女有力焉女死燕遂屠齊閔王逃死于外誕不足徵姑識其說田齊逆臣傳淖齒王孫賈附淖齒者楚將也燕之入臨淄也閔王走莒楚使齒將兵救齊齒因相閔王史記世家初齊負郭之民有孤狐咺者正義閔王斫之檀衢齊孫室子陳舉直言殺之東閭司馬穰苴田完之裔為景公將者别是一人或名誤為政者也殺之以故燕舉兵使樂毅擊之齊使向子將而應之齊軍破向子以輿一乘亡吕氏春秋作觸子達子收餘卒復振與燕戰求所以賞閔王不與軍破走王遂奔莒齒數之曰夫千乘博昌之間方數百里血霑衣王知之乎嬴博之間地坼至泉王知之乎人有當闕而哭者求之不得去之聞其聲王知之乎天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆告矣而王不知戒何得無誅乎于是殺閔王于鼓里韓非子淖齒聞齊王之惡已也乃矯為秦使以知之王孫賈者年十五事閔王及王出走失王之處其母曰女朝出而晚來則吾倚門而望暮出而不還則吾倚閭而望女今事王而出走女不知其處女尚何歸王孫賈乃入市中曰淖齒亂齊國殺王欲與我誅者袒右市人從者四百人與之誅淖齒刺而殺之國策尚史卷七十二
