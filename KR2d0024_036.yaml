body:
  text: 尚史卷三十六列傳十四鑲白旗漢軍李鍇撰齊諸臣傳寧戚寧戚者衛人也欲干齊桓公窮困無以自進於是為商旅將任車以至齊暮宿於郭門之外公郊迎客夜開門辟任車爝火甚盛從者甚衆戚飯牛居車下望公而悲擊牛角疾歌歌曰南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦一作滄浪之水白石粲中有鯉魚長尺半弊布單衣裁至骭清朝飯牛至夜半黃犢上阪且休息吾將舍汝相齊國一作出東門兮厲石斑上有松柏青且闌粗布衣兮緼縷時不遇兮堯舜主牛兮努力食細草大臣在爾側吾當與爾適楚國歌後人所擬也後漢書注引説苑云寧戚飯牛於庸衢擊牛角而歌碩鼠高誘注吕覽亦云歌碩鼠也公聞之撫其僕之手曰異哉之歌者非常人也命後車載之公反至戚見説公以治境內明日復見説公以為天下公大説將任之羣臣爭之曰使人問之衛賢用之未晚也公曰不然問之患其有小惡以小惡亡大美此人主之所以失天下之士也已卒任之呂氏春秋韓非子桓公問置吏于管仲管仲曰墾草仭邑辟地生粟臣不如寧戚請以為大田公嘗問於戚曰吾何如而使姦邪不起民衣食足乎戚對曰要在得賢而任之曰得賢奈何對曰開其道路察而用之尊其位重其祿顯其名則士至矣公曰既以舉賢士而用之矣微夫子幸而臨之則未有布衣屈竒之士踵門而求見者對曰是君察之不明舉之不顯而用之疑官之卑祿之薄也且夫國之所以不得士者有五阻焉主不好士諂諛在旁一阻也言便事未嘗見用二阻也壅塞掩蔽必因近習然後見察三阻也訊獄詰窮其辭以法過之四阻也執事適欲擅國權命五阻也去此五阻則豪傑並興賢智求處五阻不去則上蔽吏民之情下塞賢士之路也公曰善吾將著夫五阻以為戒本也説苑賓胥無東郭牙弗鄭附蒙孫季友賓胥無者事桓公管夷吾曰賓胥無堅強以良可以為西土公任之公嘗問夷吾曰寡人欲霸以二三子之功既得霸矣今吾有欲王其可乎夷吾對曰公當召叔牙而問焉鮑叔牙至公問焉叔牙對曰公當召賓胥無而問焉賓胥無趨而進公又問焉賓胥無對曰古之王者其君豐其臣教今君之臣豐公遵循繆然逺二三子遂徐行而進公曰昔者太王賢王季賢文王賢武王賢武王伐殷克之七年而崩周公旦輔成王而治天下僅能制於四海之內矣今寡人之子不若寡人寡人不若二三子以此觀之則吾不王必矣管子桓公築緣陵以封杞築夷儀以封邢狄伐衛桓公且封之隰朋賓胥無諫曰不可三國所以亡者絶以小今君蘄封亡國國盡若何桓公問管仲管仲曰君有行之名安得有其實君其行也説謬東郭牙者亦當桓公時桓公問管夷吾曰吾念有而勿失得而勿忘為之有道乎對曰黃帝立明堂之義堯有衢室之問舜有告善之旌禹立諫鼓於朝湯有總街之庭武王有靈臺之復此古聖帝明王所以有而勿失得而勿忘也公曰吾欲效而為之其名云何對曰名曰嘖室之議人有非上之所過內于嘖室之議有司執事者咸以厥事奉職而不忘為此嘖室之事也請以東郭牙為之此人能以正事爭于君前者也管子吕氏春秋桓公謀伐莒謀未發而聞于國公怪之管夷吾曰國必有聖人焉公曰嘻曰之役者有執跖痢而上視者意者其是邪乃令復役無得相代少頃牙至夷吾曰此必是已乃延之而上分級而立夷吾曰子邪言伐莒者對曰然夷吾曰我不言伐莒子何故言伐莒對曰臣聞君子有三色顯然善樂者鍾鼓之色也湫然清淨者衰絰之色也艴然充盈手足矜者兵革之色也日者臣望君之在臺上也艴然充盈手足矜者此兵革之色也君呿而不􅀈所言者莒也君舉背而指所當者莒也臣竊慮諸侯之不服者其惟莒乎臣故言之按桓公時魯伐莒齊不伐莒也韓非子齊桓公將立管仲令羣臣曰寡人將立管仲為仲父善者入門而左不善者入門而右東郭牙中門而立曰以管仲之智為能謀天下乎公曰能以斷為敢行大事乎公曰敢牙曰智能謀天下斷敢行大事君因専屬之國柄焉以管仲之能乘公之勢以治齊國得無危乎公曰善乃令隰朋治內管仲治外以相參説苑略同説亦誣桓公時又有弗鄭季友蒙孫皆佐桓公以霸者管子桓公使弗鄭為宅又大匡篇季友之為人也恭以精博於教多小信可遊于魯蒙孫博於教而文巧於辭不好立大義而好結小信可遊於楚仲孫湫仲孫湫者亦齊大夫桓公二十四年莊三十二年魯慶父弒子般立閔公明年公使湫省難於魯歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間㩦二覆昏亂霸王之器也周亂王子帶來奔三十九年僖十三年公使湫聘于周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也是年秋為戎難故諸侯戍周湫致之左傳論曰聞諸先民曰一人善射百夫決拾倡之得也良賈冬則資絺夏則資皮豫之給也世無桓公跖􅲘之間牛口之下豈遂無物哉明乎五阻可以得士辨乎嘖室可以得言二子不徒以虛聲立矣晏弱桓子晏嬰平仲子晏圉附晏弱者齊大夫晏桓子也事頃公頃公四年宣十四年魯公孫歸父會公子穀見弱與之言魯樂音洛弱告髙固曰子家歸父字其亡乎懷于魯矣懷必貪貪必謀人謀人人亦謀己一國謀之何以不亡後四年歸父果來奔七年宣十七年晉使郤克徴會于我我怒郤克夏弱及髙固蔡朝南郭偃會于斷道髙固逃歸晉執弱于野王執朝于原執偃于溫既而緩之逸十年成二年卒敗我師于鞍靈公十一年襄二年魯齊薑薨公使諸薑宗婦往送葬召萊子萊子不會使弱城東陽以逼之十四年襄五年弱再城東陽遂圍萊四月甲寅堙之環城傅于堞明年王湫帥師及正輿子棠人軍我師我師大敗之遂入萊四月弱圍棠滅之遷萊於郳二十一年襄十二年靈王求后于我公問對于弱弱對曰先王之禮辭有之天子求后于諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人二十六年襄十七年弱卒左傳諡曰桓子嬰嗣管子桓公踐位十九年令晏子進貴人之子出不仕處不華而友有少長為上舉得二為次得一為下士處靖敬老與貴交不失禮行此三者為上舉得二為次得一為下耕者農農用力應于父兄事賢多行此三者為上舉得二為次得一為下按桓公距頃公六十餘年所謂晏子者或是弱之父祖也晏嬰者字仲弱之子也史記萊之夷維人弱卒嬰粗縗斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫晏子孔子曰晏子可謂能逺害矣不以己之是駁人之非遜辭以避咎義也夫初事靈公靈公薨事莊公莊公三年襄二十二年晉欒盈得罪自楚適我嬰言于公曰商任之會受命于晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳須無曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣冬諸侯會于沙隨復錮欒氏也欒盈猶在齊嬰曰禍將作矣齊將伐晉不可以不懼四年襄二十三年我伐衛自衛將遂伐晉嬰曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君晏子晏子臣於莊公公不説飲酒召晏子晏子至公令樂人奏歌曰已哉已哉寡人不能説也爾何來為三奏然後知其為己也遂起北面坐地公曰曷為坐地對曰嬰將與君訟嬰聞之衆而無義強而無禮好勇而惡賢者禍必及其身公之謂矣遂趨而歸徒行而東耕于海濱晏子莊公問晏子曰威當世而服天下時邪對曰行也曰何行曰愛邦國之民者能服境外之不善重士民之死力者能禁暴國之邪逆聽賃賢者能威諸候安仁義而樂利世者能服天下公不用晏子退而窮處期年而身及禍晏子莊公闔門而圖莒國人以為有亂也皆操兵立於閭公召睢休相曰若何對曰誠無亂而國以為有則仁人不存請令於國言晏子之在也公令於國孰謂國有亂者晏子在焉然後皆散兵而歸六年襄二十五年崔杼弒公嬰立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主君臣者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私䁥誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔杼必殺之杼曰民之望也舍之得民杼立公弟杵臼而相之是為景公慶封為左相盟國人于大宫曰所不與崔慶者嬰仰天嘆曰嬰所不為忠於君利社稷者是與有如上帝乃歃説苑晏子治東阿三年景公召而數之曰子治東阿而亂將加大誅于子對曰臣請改道易行而治東阿三年不治臣請死之許之明年上計公迎而賀之曰甚善矣子之治東阿也對曰前臣之治東阿也屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪臣今臣之治東阿也屬託行貨賂至并會賦斂倉庫少內便事左右陂池之魚入于權家當此之時飢者過半君乃反迎而賀臣願乞骸骨避賢者之路公知嬰賢任以國政三年而齊大興晏子同按晏子事靈莊已為名大夫不應治東阿而景公始知其賢也又襄二十五年景公即位崔慶當國三年崔慶滅亡欒髙柄政至襄二十九年晏子遂致邑與政以避其難然則所謂景公任以國政三年而齊大興亦當在欒高既敗之後耳景公三年襄二十八年慶封與慶舍封之子政將謀公孫竈公孫蠆竈欒子雅蠆髙子尾皆惠公孫使析歸父告嬰嬰辭既而欒髙陳鮑之徒殺慶舍慶封奔魯與嬰弼殿其鄙六十弗受公孫蠆曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以弼殿乃足欲足欲亡無日矣在外不得宰吾一邑不受弼殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利于是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也四年襄二十九年吳公子札來聘説嬰嬰因陳無宇遂納政與邑八年昭二年晉少薑卒明年公使嬰請繼室于晉既成昏嬰受禮羊舌肹從之宴相與語羊舌肹曰齊其何如嬰曰此季世也吾弗知齊其為陳氏矣公棄其民而歸于陳氏齊舊四量豆區釜鍾四升為豆各自其四以登于釜釜十則鍾陳氏三量皆登一焉謂以五升為豆五豆為區五區為釜鍾乃大矣以家量貸而以公量收之山木如市如往也弗加于山魚鹽蜃蛤弗加于海民參其力二入於公而以衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲四人皆舜後陳氏之先其相胡公大姬已在齊矣言其先祖鬼神已共在齊初公欲更嬰之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之于臣侈矣且小人近市朝夕得所求小人之利焉敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤于是景公煩于刑有鬻踊者故對曰踊貴屨賤公為是省于刑及嬰如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳無宇以請乃許之韓詩外傳晏子聘魯上堂則趨授玉則跪子貢怪之問孔子曰晏子知禮乎上堂則趨授玉則跪何也孔子曰其有方矣我將問焉晏子至孔子問之晏子曰夫上堂之禮君行一臣行二今君行疾臣敢不趨今君之授幣也卑臣敢不跪孔子曰善禮中又有禮韓非子晏子聘魯哀公問曰語曰莫三人而迷今寡人與一國慮之魯不免于亂何也對曰所謂莫三人而迷者一人失之二人得之三人足以為衆矣今魯之羣臣以千百數一言于季氏之私人數非不衆所言者一人也安得三哉晏子同而異説苑晏子使吳吳王曰吾聞齊君蓋賊以慢野以暴吾子容焉何甚也晏子逡巡而對曰臣聞之精事不通粗事不能者必勞大事不得小事不為者必貧大者不能致人小者不能至人之門者必困此臣之所以任也如臣豈能以道食人者哉晏子出王笑曰吾譏晏子也猶倮而訾高橛者説苑晏子使于楚楚王進橘置削晏子不剖而食之楚王曰橘當去剖對曰臣聞之賜人主前者瓜桃不削橘柚不剖今萬乘無教臣不敢剖非不知也韓詩外傳晏子南使楚左右曰晏子天下之辨士也王可與晏子坐使有司束人過王王問之使言齊人善盜是宜可以困之王曰善晏子至與之坐圖國之急務辨當世之得失再舉再窮王默然無以續語居有間束徒以過之王曰何為者對曰是齊人善盜束而詣吏王欣然大笑曰齊固善盜乎晏子曰然王不見夫江南之樹乎名橘樹之江北則化為枳何則地土使然爾夫子處齊儼有伯夷之廉今居楚而善盜意土地之化使然爾晏子同使魯及吳楚事經傳無之十月公孫竈卒司馬竈齊大夫見嬰曰又喪子雅矣嬰曰惜也子旗竈子欒施不免殆哉薑族弱矣而媯將始昌二惠公孫竈公孫蠆並惠公孫故曰二惠競爽猶可又弱一個焉薑其危哉説苑齊侯問于晏子曰當今諸侯孰危對曰莒其亡乎地侵于齊貨竭于晉是以亡也晏子略同十六年昭六年公如晉請伐北燕晉許之遂伐北燕將納簡公簡公北燕伯三年出奔齊嬰曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也果不克而還十六年昭十年陳鮑伐欒髙氏高強蠆子子良曰先得公陳鮑焉往遂伐虎門嬰端委立於虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒髙乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入五月欒髙敗欒施髙強奔魯陳鮑分其室嬰謂陳無宇曰必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也蕰利生孽姑使無蕰乎可以滋長二十六年昭二十年公疥疥當作痎遂痁期而不瘳諸侯之賔問疾者多在梁邱據與裔欵言于公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也盍誅于祝固史嚚以辭賓公説告嬰嬰曰日宋之盟屈建問范會之德于趙武武曰夫子之家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與欵謂寡人能事鬼神故欲誅于祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老夀者為信君使也其言忠信于鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私髙臺深池撞鍾舞女斬刈民力輸掠其衆以成其違不恤後人神怒民痛無悛于心其祝使薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚于鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞侯守之海之鹽蜃祈望守之衡鹿舟鮫虞候祈望皆官名縣鄙之人入從其政逼介之關暴征其私承嗣大夫強易其賄布常無藝徴斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令于鄙私欲養求不給則應民人若病夫婦皆詛祝有益也詛亦有損聊攝齊西界以東姑尤齊東界以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅于祝史修德而後可公説晏子裔款作會譴祝固史嚚作史固祝他説苑齊大旱公召羣臣曰天不雨久矣吾使卜之祟在髙山廣水欲少賦斂以祠靈山何如晏子進曰不可夫靈山固以石為身以草木為髮不雨髮將焦身將熱彼獨不欲雨乎曰祠河伯可乎曰不可夫河伯以水為國以魚鱉為民不雨國將亡民將滅彼獨不欲雨乎曰為之奈何曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎公出野暴露三日果大雨公至自田嬰侍于遄臺梁邱據馳而造焉公曰唯據與我和夫嬰對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之専一誰能聽之同之不可也如是韓詩外傳景公出田十有七日而不反晏子乘而往比至衣冠不正公見而怪之曰夫子何遽乎得無有急乎對曰然有急國人皆以君為惡民好禽臣聞之魚鱉就乾淺故得于釣網禽獸下都澤故得于田獵今君出田十有七日而不反不亦過乎公曰不然為賓客莫應待耶則行人子牛在為宗廟不血食耶則祝人大宰在為獄不中耶則大理子幾在為國家有餘不足邪則巫賢在寡人有四子猶有四肢也而得代焉對曰然人心有四肢而得代焉則善矣今四肢無心十有七日不死乎説苑景公獵休坐地而食晏子後至滅葭而席公曰寡人自以坐地二三子將坐地吾子獨搴草而坐何也對曰嬰聞之唯喪與獄坐于地今不敢以喪獄之事侍于君矣説苑景公出獵上山見虎下澤見蛇歸召晏子問之曰寡人出獵上山見虎下澤見蛇殆所謂不祥也晏子曰國有三不祥是不與焉夫有賢而不知知而不用用而不任所謂不祥也山虎之室也澤蛇之穴也如虎之室如蛇之穴而見之曷為不祥也晏子同公飲酒樂公曰古而無死其樂若何嬰對曰古而無死則古之樂也君何得焉昔爽鳩氏少皥氏之司冦始居此地季萴虞夏諸侯因之有逢伯陵殷諸侯薑姓因之蒲姑氏殷周之間諸侯因之而後太公因之古若無死爽鳩氏之樂非君所願也韓詩外傳景公遊于牛山之上而北望齊曰美哉國乎鬱鬱泰山使古而無死者則寡人將去此而何之俯而泣沾襟國子髙子曰然臣賴君之賜疏食惡肉可得而食駑馬柴車可得而乘且猶不欲死况君乎俯泣晏子曰樂哉今日嬰之逰也見怯君一而諛臣二使古而無死者則大公至今猶存吾君方將被簑笠而立乎畎畝之中惟事之恤何暇念死乎公慙舉觴自罰因罰二臣晏子同列子作史孔梁邱據三十二年昭二十六年齊有彗星公使禳之嬰曰無益也祇取誣焉天道不諂不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患于彗詩曰我無所監夏后及商用亂之故民卒流亡逸詩也若德回亂民將流亡祝史之為無能補也公説乃止公與嬰坐于路寢公歎曰美哉室其誰有此乎嬰曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以己之在禮家施不及國民不遷農不移工賈不變士不濫官不淹大夫不收公利公曰善哉吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也公曰善哉寡人今而後聞此禮之上也對曰先王所稟于天地以其為民也是以先王上之左傳孔叢子夫子適齊晏子就其館既宴其私焉曰齊其危矣若載無轄之車臨千仞之谷其不顛覆亦難也子或可救幸不吾隱夫子曰死病無醫夫政令者齊君失之久矣子欲挾輈而扶輪良弗及也抑猶可以終齊君及子之身過此以往齊其田氏矣四十八年定十年嬰卒史記諡曰平水經注嬰為誡曰吾生則近市死豈易志乃葬故宅後人名之曰清節里公嘗飲酒陳無宇侍望見嬰而復于公曰請浮晏子晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾嬰避席曰請飲而後辭乎辭而後飲乎公曰辭然後飲嬰曰君之賜卿位以尊其身嬰非敢為顯受也為行君令也寵以百萬以富其家嬰非敢為富受也為通君賜也臣以君之賜父之黨無不乘車者母之黨無不足衣食者妻之黨無凍餒者國之間士待臣而舉火者數百家如此者為彰君賜乎為隱君賜乎公曰善為我浮無宇也晏子説苑晏子朝乘敝車駕駑馬公見之曰嘻夫子之祿寡邪何乘不任之甚也對曰賴君之賜得以夀三族及國交遊皆得生焉臣飽食暖衣敝車駑馬以奉其身于臣足矣晏子出公遺之輅車乘馬三返不受公召晏子晏子至曰君使臣臨百官之吏節其飲食以先國人猶恐其侈而不顧其行也今輅車乘馬君乘之上臣乘之下民之無義侈而不顧其行者臣無以禁之遂讓不受説苑齊人好轂擊相犯以為樂晏子患之乃為新車良馬出與人相犯也曰轂擊者不祥下車棄而去之國人乃不為説苑景公好婦人而丈夫飾者國人盡服之公使禁之裂衣斷帶而不止晏子曰服之于內而禁之于外猶懸牛首于門而求買馬肉也公曰善使內勿服不旋月而國莫之服新序公飲酒而樂釋衣冠自鼓缶曰速駕迎晏子晏子朝服而至公曰寡人甚樂此樂願與夫子共之請去禮晏子對曰齊國五尺之童子力盡勝嬰而勝君所以不敢亂者畏禮也上無禮無以使下下無禮無以事上詩曰人而無禮胡不遄死故禮不可去也公曰善請革衣冠更受命公出弋昭華之池顔鄧聚主鳥而亡之公怒欲殺之嬰曰鄧聚有死罪四請數而殺之公曰諾嬰曰鄧聚為吾君主鳥而亡之罪一使吾君以鳥之故殺人罪二使諸侯以吾君重鳥而輕士罪三天子聞之必將貶黜吾君罪四此四罪者故當殺無赦公曰止吾過矣又有得罪于公者公大怒召左右支解之敢諫者誅嬰左持頭右磨刀仰而問曰古者明王聖主其支解人從何支始公離席曰縱之罪在寡人韓詩外傳晏子説苑略同説苑公遊於夀宫覩長年負薪而有飢色令吏食之嬰曰臣聞之樂賢而哀不肖守國之本也愛老而恩無不逮治國之本也請求老弱之不養鰥寡之不室者論而供秩焉公覩嬰兒有乞于塗者公曰是無歸夫嬰曰君存何為無歸使養之可立而以聞説苑景公探爵鷇鷇弱反之晏子聞之不待請而入見公汗出惕然晏子逡巡北面再拜而賀之曰吾君有聖王之道矣君探爵鷇鷇弱反之是長幼也吾君仁愛禽獸之加而况于人乎嬰事三公以節儉力行重於齊既相齊食不重肉妾不衣帛其在朝君語及之即危言語不及之即危行國有道即順命無道即衡命以此三世顯名于諸侯史記新序公問晏子曰忠臣之事君也何若對曰忠臣也者能盡于善君而不能與陷于難説苑晏子侍于景公朝寒請進熱食對曰嬰非厨養臣也請進服裘對曰嬰非田澤臣也公曰然夫子于寡人奚為者也曰社稷臣也曰何為社稷之臣對曰社稷之臣能立社稷辨上下之宜使得其理制百官之序使得其宜作為辭令可分布于四方也所著有晏子子圉悼公元年哀六年陳鮑攻高國圉及國圉高張奔魯左傳論曰子長記管晏特于執蓋者越石父三致意焉蓋其憤惋蕰中假物以鳴焉者執鞭之歎可見已豫故嘗曰史記有所為而為之非公天下之書也夫史所以紀事也權衡古人我無與焉斯為尚乎豫列次其事用傳疑信匪求異也尚史卷三十六
