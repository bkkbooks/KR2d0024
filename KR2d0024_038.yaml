body:
  text: 尚史卷三十八列傳十六鑲白旗漢軍李鍇撰齊諸臣傳弦章弦章者事景公公飲酒七日夜不止章諌曰章願君廢酒也不然章賜死晏嬰入見公曰章諫吾曰願君之廢酒也不然章賜死如是而聼之則臣為制也不聼又愛其死嬰曰幸矣章君也令章遇桀紂者章死乆矣于是公遂廢酒晏子公伐宋至于岐隄之上登髙以望太息而歎曰昔我先君桓公長轂八百乘以霸諸侯今我長轂三千乗而不敢乆處于此者豈其無管仲歟弦章對曰臣聞之水廣則魚大君明則臣忠昔有桓公故有管仲今桓公在此則車下之臣盡管仲也晏嬰没十有七年史記世家晏子卒後十年而景公薨此云十七年誤公射出質堂上唱善若出一口公作色太息播弓矢章入公曰章自吾失晏子未嘗聞吾過今射出質而唱善者若出一口章對曰此諸臣之不肖也然而有一焉臣聞之君好之則臣服之君嗜之則臣食之夫尺蠖食黄則黄食蒼則蒼君其猶有諂人言乎公曰善今日之言章為君我為臣適海人入魚公以五十乘賜章魚乘塞塗章撫其御之手曰曩之唱善者皆欲若魚者也晏子辭賞以正君諸臣諂諛以干利今受若魚是反晏子之義而順謟諛之欲也固辭不受説苑逢於何逢於何齊人也景公成路寢之臺逢於何遭喪遇晏嬰于途再拜乎馬前嬰下車挹之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨嬰曰嘻難哉雖然嬰將為子復之適不得子將若何對曰吾將左手擁格右手梱心立餓槁枯而死以告四方之士曰於何不能𦵏其母者也嬰曰諾遂入見公曰有逢於何者母死兆在路寢當如之何願請合骨公作色不説曰自古及今子亦嘗聞請葬人主之宫者乎對曰古之人君宫室節臺榭儉故未嘗聞請葬人主之宫者今君侈為宫室奪人之居廣為臺榭殘人之墓是生者愁憂不得安處死者離易不得合骨豐樂侈逰兼傲生死非人君之行也具嬰聞之生者不得安命之曰蓄憂死者不得葬命之曰蓄哀蓄憂者怨蓄哀者危君不如許之公曰諾逢於何遂葬其母路寢之牖下解衰去絰布衣縢履𤣥冠茈武踊而不哭躃而不拜已乃涕洟而去晏子又作盆成括事吕氏春秋齊有北郭騷者結罘罔梱蒲葦織屨履以飬其母猶不足踵門見晏子曰願乞所以飬母者晏子分倉粟府金而遺之辭金而受粟有間晏子見疑于齊君出犇過北郭騷之門而辭曰見疑于君將出奔北郭騷曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭騷召其友而告之曰吾聞之飬及親者身伉其難今晏子見疑吾將以身死白之令其友操劔奉笥而從造于君庭曰晏子天下之賢者也去則齊國必侵見國之侵不若先死請以頭託白晏子也因謂其友曰盛吾頭笥中奉以託退而自刎也其友因奉以託謂觀者曰北郭子為國故死吾將為北郭子死也又退而自刎齊君聞之大駭自追晏子請而反之晏子聞北郭騷之以死白已也曰嬰之亡豈不宜哉亦愈不知士甚矣按晏子無見疑出奔事葢假侯嬴而傳㑹者栢常騫栢常騫者周之賤史也去周之齊見晏嬰曰騫不量其不肖願事君子敢問正道直行則不容于世隠道危行則不忍道亦無滅身亦無廢者何若嬰曰善哉問嬰聞之執二法𥚑則不取也輕進苟合則不信也直易無諱則速傷也新始好利則無敝也且嬰聞飬世之君子從重不為進從輕不為退省行而不伐讓利而不夸陳物而弗専見象而勿强道不滅身不廢矣晏子孔家語作見子景公為露寢之臺成而不通騫曰臺成君何為不通公曰然梟昔者鳴吾惡之是以不通焉騫曰臣請禳而去之明日梟當陛布翼而死公曰子之道若此其明也亦能益寡人夀乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰亦有徴兆之見子對曰得夀地且動公喜令百官趣具騫之所求騫出遭晏嬰于塗拜馬前曰騫今且大祭為君請夀嬰曰嘻亦善矣能為君請夀也然則福名有見乎對曰得夀地將動嬰曰騫昔吾見維星絶樞星散地其動汝以是乎説苑晏子景公問大卜曰汝之道何能對曰臣能動地公召晏子而告之晏子不對出見大卜曰昔吾見鈎星在四心之間地其動乎大卜曰然晏子曰吾言之恐子之死也黙然不對恐君之惶也子言君臣俱得焉忠于君者豈必傷人哉大卜入見公曰臣非能動地地固將動也公為大鐘仲尼晏嬰及騫皆曰鐘將毁撞之果毁公召三子問之仲尼曰鐘大縣下其氣不得下薄是以曰將毁嬰曰鐘大非禮是以曰將毁騫曰今日庚甲雷日也隂莫勝于雷是以曰將毁晏子今初學記引本無論曰記云白受采易曰白賁无咎使國無晏子章雖賢安所受厥采哉逢於何事同季武子然聞蓄憂蓄哀之論而不許焉亦無人心甚矣逆臣傳公孫無知公孫無知者夷仲年之子也仲年為僖公同母弟生無知有寵于僖公衣服禮秩如適及襄公立絀之無知怨公使大夫連稱管至父戍葵邱𤓰時而徃曰及𤓰而代期戍公問不至請代弗許故二人因無知以作亂連稱有從妹在公宫無寵使間公曰㨗吾以女為夫人公自貝邱反遂弑之立無知無知虐于雍廩齊大夫明年雍廪殺無知左傳邴歜閻職邴歜閻職皆齊人懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乗懿公四年文十八年夏五月公逰于申池二人浴于池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舍爵而行示無所畏國人立公子元是為恵公左傳崔杼崔成崔彊崔明崔杼者齊大夫武子也有寵于恵公恵公十年宣十年公薨髙固國佐畏其偪也逐之杼奔衛靈公八年成十七年高國得罪髙弱以盧叛公使杼為大夫使慶克佐之帥師圍盧盧降十年襄元年杼㑹東諸侯之師侵楚焦夷及陳十一年襄二年杼㑹于戚城虎牢以偪鄭十八年襄九年杼從諸侯圍鄭鄭人行成十二月盟于戯二十三年㐮十四年杼㑹于向夏四月㑹伐秦二十八年㐮十九年公使髙厚傅公子牙以為大子而東大子光及公疾杼㣲逆光而立之是為莊公靈公薨杼殺髙厚而兼其室莊公四年㐮二十三年公伐衛將遂伐晋晏嬰諌不聼杼諫曰不可臣聞之小國間大國之敗言晋有欒盈之禍而毁焉必受其咎君其圖之弗聼遂伐晋取朝歌五年襄二十四年公聞將有晋師使陳無宇從薳啟彊楚大夫如楚乞師杼帥師送之遂伐莒侵介根六年㐮二十五年杼帥師伐魯北鄙師徒歸空歸也棠姜者齊棠公之妻東郭偃之娣也東郭偃臣于抒棠公死偃御杼以弔焉見棠姜而羙之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可弗聼遂取之公通焉驟如崔氏以杼之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是因是而怒又以其間伐晋也曰晋必將報欲弑公以説于晋而不獲間公鞭侍人賈舉而又近之乃為杼間公夏五月莒子朝于齊饗諸北郭杼稱疾不視事公問杼從姜氏姜入于室與杼自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刄于廟弗許皆曰君之臣抒疾病不能聼命近于公宫羣臣干掫有淫者不知二命公踰牆射之中股反隊遂弑之杼立景公而相之慶封為左相盟國人于大宫杼側莊公于北郭葬諸士孫之里四翣不蹕下車七乗不以兵甲㑹晋伐我以報朝歌之役杼以莊公説與晋成初衛獻公奔我及是晋使逆之杼止其帑以求五鹿抒生成及彊而寡偏䘮曰寡娶東郭姜生明東郭姜以孤入曰棠無咎棠公之子與東郭偃相崔氏崔成有疾而廢之立明成請老于崔崔崔氏邑杼許之偃與無咎弗予曰崔宗邑也必在宗主成與彊怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之他日又告慶封曰茍利夫子必去之難吾助女九月成彊殺東郭偃棠無咎于崔氏之朝杼怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之弗克使國人助之遂滅崔氏殺成與彊而盡俘其家其妻縊妻東郭姜嫳復命于杼且御而歸之至則無歸矣乃縊崔明夜辟諸大墓遂奔魯後欒髙氏討慶氏慶封亡乃求崔杼之尸得之改遷莊公殯于大寢以其棺尸杼于市國人猶知之皆曰崔子也左傳慶克慶封慶佐慶舍慶封字子家又曰季其弟曰慶佐皆慶克之子也慶克通于聲孟子靈公母國佐謫之夫人怒譖之靈公靈公八年成十七年刖鮑牽而逐髙無咎高弱無咎子以盧叛公使克圍盧適國佐從諸侯圍鄭歸遂如盧殺克明年殺國佐及其子國勝而以慶封為大夫慶佐為司㓂二十八年襄十九年崔杼立莊公執公子牙夙沙衛以髙唐叛封圍之弗克十一月公自克之醢衛莊公二年襄二十一年使佐為大夫復討公子牙之黨執公子買六年襄二十五年崔杼弑莊公立景公而相之封為左相為晋伐我我以莊公説使隰鉏請成封如師男女以班賂晋平公以宗器樂器自六正三軍之六卿及處守者皆有賂晋許之景公二年㐮二十七年公使封如魯聘晋楚弭兵秋七月封及諸侯之大夫盟于宋九月崔氏亂封殺之于是封獨當國封好田而耆酒與其子慶舍政以其内寔遷于盧蒲嫳氏易内而飲酒數日國遷朝焉封反諸亡人盧蒲癸王何皆嬖使執寢戈而先後之盧蒲癸王何謀攻慶氏三年㐮二十八年冬十月封田于萊陳湏無託妻疾召陳無宇歸慶嗣聞之曰禍將作矣謂封速歸禍作必于嘗歸猶可及也封弗聼亦無悛志嗣曰亡矣幸而獲在吳越嗣字子息封之族也十一月嘗于大公之廟慶舍涖事麻嬰為尸慶䧶户結反為上獻盧蒲癸王何執寢戈慶氏以其甲環公宫陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至于魚里欒髙陳鮑之徒介慶氏之甲公孫蠆抽桷擊扉三盧蒲癸自後刺舍王何以戈擊之解其左肩猶援廟桷動于甍以俎壺投殺人而後死遂殺慶繩即慶麻嬰封歸遇告亂者伐西門弗克還伐北門克之入伐内宫弗克反陳于嶽里名請戰弗許遂奔魯既而我譲魯封奔吳吳勾餘與之朱方聚其族而居之富于其舊也十年昭四年楚靈王伐吳圍朱方克之殺封而盡滅其族左傳陳乞陳瓘附鮑牧陳乞者陳僖子景公五十七年哀四年范中行氏以邯鄲叛晋乞及弦施救范氏圍晋五鹿五十八年哀五年景公薨國夏髙張立安孺子荼羣公子奔衛公子陽生及鉏奔魯悼公元年哀六年乞偽事髙國者毎朝必驂乗所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰高國得君必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之六月乞及鮑牧與諸大夫以甲入于公宫戰于莊敗髙國國夏髙張及弦施奔魯弦施字多髙國之黨也八月乞使召陽生逮夜至于齊國人知之乞使子士之母飬之冬十月立之是為悼公乞使胡姬景公妾以荼如賴去鬻姒荼之母殺王甲拘江説囚王豹于句竇之邱王甲江説王豹並景公嬖臣荼之黨公使朱毛齊大夫告于乞曰㣲子則不及此然君異于器不可以二器二不匱君二多難敢布諸大夫乞不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君其亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪于陳子而圖其小可也乞遂弑荼左傳公羊景公請陳乞曰吾欲立舍何如陳乞曰所樂乎為君者欲立之則立之不欲立則不立君如欲立之則臣請立之陽生謂陳乞曰吾聞子葢將不欲立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生子者也走矣與之玉節而走之景公死而舍立陳乞使人迎陽生于諸其家除景公之喪諸大夫皆在朝陳乞曰常之母有魚菽之祭願諸大夫之化我也諸大夫皆曰諾于是皆之陳乞之家坐陳乞曰吾有所為甲請以示焉諸大夫皆曰諾于是使力士舉巨薨而至于中霤諸大夫見之皆色然而駭開之則闖然公子陽生也陳乞曰此君也已諸大夫不得已皆逡巡北面再拜稽首而君之爾自是徃弑舍五年哀十年乞卒諡曰僖子瓘恒瓘字子玉恒之兄也為齊大夫簡公元年哀十一年我伐魯戰于郊魯右師奔我從之瓘及陳莊渉泗莊亦齊大夫㑹魯左師入我軍我不能師宵遁平公元年十五年瓘如楚過衛仲由見之曰天或者以陳氏為斧斤既斵䘮公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎何必惡焉瓘曰然吾受命矣子使告我弟三年十七年晋趙鞅圍衛瓘及國觀救衛得晋人之致師者瓘使服而見之曰國子寔執齊柄而命瓘曰無辟晋師豈敢廢命子又何辱趙鞅乃還左傳恒兄弟又有昭子莊簡子齒宣子夷穆子安廪邱子意兹芒子盈恵子得人杜預注鮑牧者國之孫逮事景公景公薨子安孺子荼立羣公子出奔悼公元年哀六年陳乞使召公子陽生十月丁邜立之將盟鮑牧醉而往其臣差車鮑㸃差車主車之官曰此誰之命也陳乞曰受命于鮑子遂誣牧曰子之命也牧曰女忘君之為孺子牛而折其齒乎景公嘗銜繩為牛使荼牽之荼頓地故折其齒而背之也陽生稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退否不唯子是從廢興無以亂則所願也牧曰誰非君之子乃受盟陽生立是為悼公殺荼于野幕之下二年哀八年牧帥師伐魯取讙及闡秋九月牧又謂羣公子曰使女有馬千乗乎有馬千乗使為君也公子愬之公謂牧曰或譖之子姑居于潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麋之以入麋束縛也遂殺之左傳陳恒成子闞止陳豹諸御鞅附陳逆東郭賈陳恒者乞之子成子也初相悼公悼公被弑子簡公壬立闞止者史作監止字子我初陳乞召悼公于魯也闞止知之先待諸外悼公曰事未可知反與壬也處壬簡公名故闞止有寵焉及簡公即位使為政史記田常與監止為左右相于是田常復修釐子之政以大斗出貨以小斗收齊人歌之曰嫗乎采芑歸乎田成子恒憚之驟顧諸朝諸御鞅齊大夫索隠御官鞅名田氏之族言于公曰陳闞不可並也君其擇焉弗聼闞止夕陳逆陳氏宗殺人逢之遂執以入陳氏方睦使疾而遺之潘沐潘米汁可以沐頭備酒肉焉饗守囚者醉而殺之而逃陳逆于是闞止盟諸陳于陳宗初陳豹亦陳氏宗欲為闞止臣使公孫言己巳有喪而止既而言之曰有陳豹者長而上僂望視目望陽事君子必得志欲為子臣吾憚其為人也故緩以告闞止曰何害是其在我也使為臣他日與之言政説遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺于陳氏矣且其違者不過數人何盡逐焉遂告恒陳逆曰彼得君弗先必禍子逆舍于公宫簡公四年哀十四年夏五月恒兄弟四乗如公闞止在幄出逆之遂入閉門侍人禦之陳逆殺侍人公與婦人飲酒于檀臺恒遷諸寢公執戈將擊之大史子餘曰非不利也將除害也恒出舍于庫聞公猶怒將出曰何所無君陳逆抽劒曰需事之賊也誰非陳宗所不殺子者有如陳宗乃止説苑陳成子謂鴟夷子皮曰何與常也曰君死不死君亡不亡陳成子曰然子何以與常曰未死去死未亡去亡有何死亡矣韓非子鴟夷子皮事田成子田成子去齊走而之燕鴟夷子皮負傳而從至望邑子皮曰子不聞涸澤之蛇乎涸澤蛇將徙有小蛇謂大蛇曰子行而我隨之人以為蛇之行者耳必有殺子不如相銜負我以行人必以我為神君也乃相銜負以越道而人皆避之曰神君也今子羙而我惡以子為我上客千乘之君也以子為我使者萬乗之卿也子不如為我舍人田成子因負傳而隨之至逆旅逆旅之人待之甚敬孔叢子墨子曰孔子怒景公之不封己乃樹鴟夷子皮于田常之門詰之曰夫樹人為信己也按田常無走燕事而樹人之説亦謬闞止歸屬徒攻闈宫中小門與大門皆不勝乃出陳氏追之闞止失道于弇中適豐邱陳氏邑豐邱人執之以告殺諸郭闗且將殺東郭賈東郭賈者闞止臣所謂大陸子方也陳逆請而免之賈矯公命取車于道及耏衆知而逐之賈遂東出雍門陳豹與之車弗受曰逆為余請豹與余車余私焉事子我而有私于其讎何以見魯衛之士遂奔衛恒執公于舒州公曰吾早從鞅之言不及此六月恒弑簡公立其弟驁是為平公左傳韓非子隰斯彌見田成子田成子與登臺四望三靣皆暢南靣隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古諺曰知淵中魚不祥夫田子將有事事大而我示之知㣲我必危矣不伐樹未有罪也知人之所不言其罪大矣韓非子田成子逰于海而樂之令曰言歸者死顔涿聚曰君逰海而樂之奈有圖國者何田成子曰寡人布令言歸者死今子犯之援戈將擊之顔涿聚曰臣言為國非為身也延頸而前君乃釋戈趣駕而歸至三日而聞國人有謀不内田成子者矣説苑作齊景公事列子田氏祖于庭中坐有獻魚鴈者田氏歎曰天之于民厚矣殖五榖生魚鳥以為之用衆客和之如響鮑氏之子年十二進曰不如君言天地萬物我與並生類也類無貴賤徒以小大智力相制人可取食者而食之豈天本為人生之是蚊蚋噆膚虎狼食肉豈天本為蚊蚋生人虎狼生肉者哉吕氏春秋田成子所以得國者有兄曰完子仁且有勇越人興師誅田成子曰奚故殺君而取國成子患之完子請逆越師請必戰戰必敗敗請必死成子曰夫必與越戰可也戰必敗敗必死寡人疑焉完子曰君之有國也百姓怨上賢良又有死之臣䝉耻以完子觀之國已懼矣今臣與之戰戰而敗賢良盡死不死者不敢入于國君與諸孤處于國以臣觀之國必安矣完子行成子泣而遣之恒既殺簡公恐諸侯誅己乃盡歸魯衛侵地西約晋韓魏趙氏南通呉越之使修功行賞親于百姓以故齊復定恒言于平公曰徳施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸恒恒于是盡誅鮑晏及公族之彊者而割齊安平以東至琅邪自為封邑大于平公之所食史記十三年哀二十七年晋荀瑶伐鄭鄭駟𢎞請救于齊齊救鄭及留舒違榖七里榖人不知及濮雨不渉國參鄭子産子曰大國在敝邑之宇下是以告急今師不行恐無及也恒衣製杖戈立于阪上馬不出者助之鞭之荀瑶聞之乃還使謂恒曰大夫陳子陳之自出陳之不祀鄭之罪也若刮本之顛瑶何有焉恒怒曰多陵人者皆不在知伯其能乆乎左傳恒卒謚曰成論曰天禍滛人寢戈之傷差後蒺藜而已陳乞救猱升木不已初柄弑君繼用盗國嘻使晏子唯禮之議不移陳宗雖横如姜氏何嬖臣傳豎刁開方雍巫豎貂者寺人貂諸本並作刁雍巫即易牙開方衛公子一作啟方並桓公之嬖也桓公多内寵内嬖如夫人者六人外嬖貂桓公二十八年僖二年貂漏師漏洩軍事也于多魚始貴寵用事雍巫善烹飪有寵于衛共姬因貂以薦羞于公左傳淮南子俞兒易牙淄澠之水合者嘗一哈水而甘苦之矣孟子疏引左傳云淄澠二水為食易牙亦知二水之味桓公不信數試始騐為公主味烹其子以進之亦有寵開方事公十五年父死而不敢歸哭故亦有寵吕氏春秋管子衛國之教危𫝊以利公子開方之為人也慧以給不能乆而樂始可游于衛管夷吾寢疾公往問之夷吾曰易牙子之不愛安能愛君君必去之公曰諾又曰豎貂身之不愛安能愛君君必去之公曰諾又曰衛公子開方去其千乗之大子而臣事君是所願得于君者将欲過其千乗也君必去之公曰諾管子韓非子史記畧同吕氏春秋管仲有疾公徃問之曰仲父將何以教寡人曰齊諺曰居者無載行者無埋今臣將有逺行胡可以問公曰願仲父之無譲也對曰願君之逺易牙豎刁常之巫衛公子啟方公曰諾管仲死盡逐之食不甘官不治苛病起朝不肅居三年公曰仲父不亦過乎皆召而反明年公病常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宫門築髙墻不通人一婦人踰垣入公求食飲婦人曰易牙豎刁常之巫相與作亂塞宫門築髙墻不通人無所得衛公子啟方以書社四十下衛公慨焉歎涕出曰嗟乎聖人之所見豈不逺哉死者有知將何面目以見仲父乎䝉衣袂而絶乎夀宫此桓公死與諸説異夷吾死五公子皆求立四十三年僖十七年冬十月桓公薨雍巫入與寺人貂因内寵以殺羣吏而立公子無虧衛共姬子孝公奔宋明年宋伐我我殺無虧將立孝公四公子之徒與宋人戰宋敗之羣公子奔楚卒立孝公而還孝公九年僖二十六年魯以楚師伐我寘公子雍于榖雍巫奉之以為魯援左傳豎貂開方莫知其所終夙沙衛夙沙衛者齊寺人靈公嬖之靈公十一年襄二年公伐萊萊人使正輿子賂衛以索馬牛皆百匹齊師乃還二十七年襄十八年晋㑹魯伐我公禦諸平隂塹防門而守之廣里于防門作塹横廣一里衛曰不能戰莫如守險弗聼已而我師夜遁衛連大軍以塞隧而殿殖綽郭最曰子殿國師齊之辱也乃代之衛恨之殺馬于隘以塞道綽最遂被獲公立公子牙而東大子光也使髙厚傅牙衛為少傅二十八年襄十九年公疾崔杼㣲逆光夏五月公薨光即位是為莊公公執公子牙以衛易己衛奔髙唐以叛慶封圍髙唐弗克冬十一月公圍之見衛在城上號之乃下問守備焉以無備告揖之乃登聞師將傳食髙唐人殖綽工僂㑹夜縋納師醢衛于軍左傳盧蒲就魁盧蒲癸盧蒲嫳盧蒲就魁者頃公之嬖人頃公十年成二年公伐魯北鄙圍龍就魁門焉攻龍門也龍人囚之公曰勿殺吾與而盟無入而封弗聼殺而膊諸城上公親鼓士陵城三日取龍莊公時有盧蒲癸盧蒲癸與王何皆莊公嬖臣莊公四年㐮二十三年癸為貳廣右從伐晋貳廣公副車晏嬰崔杼諌皆不聼六年㐮二十五年崔杼弑莊公癸奔晋王何奔莒景公三年㐮二十八年崔杼既死慶封當國使諸亡人得賊者以告而反之故反癸癸臣慶舍有寵以女妻之是為盧蒲姜慶舍之士曰男女辨姓子不辟宗何也慶氏盧蒲氏皆姜姓曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸又言王何而反之二人皆嬖使執寢戈而先後之癸與何欲謀慶氏報莊公思有以怒諸大夫公膳卿大夫之膳食日雙鷄饔人竊更之以鶩御者知之則去其肉而以其洎肉汁也饋公孫竈公孫蠆果怒有盧蒲嫳者慶封屬大夫崔氏之謀亂也慶封告盧蒲嫳嫳曰彼君之讎也君謂莊公天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也遂滅崔氏及是慶封又告盧蒲嫳嫳曰譬之如禽獸吾寢處之矣又將謀竈與蠆盧蒲癸王何卜攻慶氏示慶舍兆曰或卜攻讎敢獻其兆舍曰克見血盧蒲姜即慶舍女妻癸者謂癸曰有事而不告我必不㨗矣癸告之姜曰夫子愎莫之止將不出我請止之癸曰諾十一月嘗于大公之廟慶舍涖事盧蒲姜告之且止之弗聴曰誰敢者遂如公盧蒲癸王何執寢戈殺慶舍于廟而釋放也盧蒲嫳于北竟慶封奔魯九年昭三年公田于莒盧蒲嫳見泣且請曰予髪如此種種余奚能為公曰諾吾告二子歸而告之公孫蠆欲復之公孫竈不可曰彼其髪短而心甚長其或寢處我矣乃放盧蒲嫳于北燕左傳梁邱據裔欵附梁邱據字子猶景公之嬖大夫景公二十六年昭二十年公疥疥當作痎遂痁諸侯之賔問疾者多在梁邱據與裔欵言于公曰吾事鬼神豐于先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅于祝固史嚚以辭賔公説告晏嬰嬰諌乃止裔欵亦嬖大夫也三十二年昭二十六年公將納魯昭公命無受魯貨申豐女賈並季氏臣以幣錦二兩縳一如瑱適我師謂據之人髙齮據家臣能貨子猶為髙氏後粟五千庾髙齮以錦示據據欲之齮曰魯人買之百兩一布言以百兩為數布陳之以道之不通先入幣財據受之言于公曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晋卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪于鬼神故及此也君請待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉公從之昭公不果入左傳説苑景公飲酒移于晏子家前驅報閭曰君至晏子被𤣥端立于門曰諸侯得㣲有故乎國家得㣲有故乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于司馬穰苴之家前驅報閭曰君至司馬穰苴介胄操㦸立于門曰諸侯得㣲有兵乎大臣得㣲有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于梁邱據之家前驅報閭曰君至梁邱據左操瑟右挈竿行歌而至公曰樂哉今夕吾飲酒也㣲彼二子者何以治吾國㣲此一臣者何以樂吾身按穰苴閔王時人説苑葢誤據死公召晏嬰而告之曰據忠且愛我我欲豐其葬大其壟嬰曰敢問據之忠與愛君可得聞乎公曰吾喜于玩好有司未能具據以其所有共我是以知其忠毎風雨暮夜求必存吾是以知其愛也晏子論曰螟􅀈之細敗稼有餘蝎蟲之柔蝕木有餘細容柔入寧有極乎跡桓之徳優于景而亂顧甚之盖管仲前嬖死而晏子後據殂蝎有淺深之故與夫人傳共姬徐嬴蔡姬衛共姬少衛姬鄭姬葛嬴宻姬宋華子桓公夫人共姬者王姬也桓公夫人桓公三年莊十一年冬歸于齊無子薨諡曰共徐嬴蔡姬並桓公夫人二十九年僖三年公與蔡姬乗舟于囿蕩公公懼變色禁之不可公怒歸之未絶也蔡嫁之蔡姬與徐嬴皆無子長衛姬少衛姬鄭姬葛嬴宻姬宋華子並桓公嬖妾長衛姬生無虧少衛姬生恵公元鄭姬生孝公昭葛嬴生昭公潘宻姬生懿公商人宋華子生雍左傳長衛姬卒亦諡曰共吕氏春秋桓公合諸侯衛人後至公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾于衛無故子曷為請對曰妾望君之入也足髙氣彊有伐國之志也見妾而有動色伐衛也明日公朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之曰君之揖朝也恭而言也徐見臣而有慚色是以知之公曰善仲父治外夫人治内寡人知終不為諸侯笑矣謀衛事傳無之蕭同叔子恵公夫人蕭同叔子恵公夫人蕭國同姓叔子字公榖並作姪子生頃公頃公七年宣十七年晋郤克與魯臧孫許同時聘于我蕭同叔子踊于棓而闚客則客或跛或眇于是使跛者迓跛者使眇者迓眇者二大夫歸相與率師為鞌之戰齊師大敗公使國佐如師郤克欲以蕭同叔子為質國佐曰蕭同叔子者齊君之母也齊君之母猶晋君之母也不可請戰揖而去之郤克許之與之盟公羊榖梁季孫行父秃晋郤克眇衛孫良夫跛曹公子手僂同時而聘于齊齊使秃者御秃者眇者御眇者跛者御跛者僂者御僂者蕭同姪子處臺上而笑之聞于客聲孟子聲孟子宋女頃公夫人靈公之母也魯叔孫僑如奔我孟子通之使立于髙國之間僑如懼得罪奔衛又通于慶克克與婦人䝉衣乘輦而入于閎國佐謫克孟子怒譛之髙國皆得罪左傳薨諡曰聲顔懿姬鬷聲姬穆孟姬靈公母仲子戎子顔懿姬鬷聲姬並魯女靈公娶懿姬懿姬無子其姪鬷聲姬生光以為大子又諸妾仲子戎子並宋女戎子嬖仲子生牙屬諸戎子戎子請以為大子公許之仲子曰不可廢常不祥間諸侯難間厠于諸侯之列事難成也光之立也列于諸侯矣今無故而廢之是専黜諸侯而以難犯不祥也君必悔之不聴遂東大子光公疾崔杼逆光立之光殺戎子尸諸朝公薨莊公即位執公子牙左傳顔姬薨謚曰懿鬷姬薨諡曰聲穆孟姬魯叔孫僑如之女也僑如奔齊叔孫還齊羣公子納其女于靈公公嬖之生公子杼臼莊公被弑崔杼立之是為景公景公十六年昭十年陳無宇伐欒髙氏欒施髙彊奔魯公與無宇莒之旁邑無宇辭孟姬為之請髙唐陳氏始大左傳孟姬薨諡曰穆夫人重燕姬景公夫人鬻姒胡姫嬰子夫人重者魯公子憖之女景公夫人燕姬者亦景公夫人生子不成而死鬻姒胡姬者並景公妾鬻姒生安孺子荼公嬖之立荼及公薨陳乞立悼公陽生使胡姬以安孺子如賴去鬻姒而殺荼後二年或譛胡姬曰安孺子之黨也悼公殺胡姬左傳嬰子者景公之嬖妾也翟王子羡干公以重駕重平聲葢一車十六馬也公觀之而不説嬰子説之請厚禄之公許諾晏嬰見公公曰翟王子羡之駕寡人甚説之欲禄之以萬鍾嬰曰昔衛士東野之駕也公説之嬰子不說公遂不觀今翟王子羡之駕也公不説嬰子説公因許其請則是婦人為制也且詩曰載驂載駟君子所戒夫駕八固非制也今又重此其為非制也不滋甚乎公曰善遂不復觀嬰子死公守之三日不食膚著于席不去左右以復不聼晏嬰入復曰有術客與醫聞嬰子死願請治之公喜遽起曰病猶可為乎嬰曰客之道也又良醫也請嘗試之君請屏潔沐浴飲食間病者之宫彼將有鬼神之事焉公曰諾嬰令棺人入殮已殮而復曰醫不能治病已殮矣以聞公不説嬰曰君獨不知死者之不可以生邪且古聖王畜私不傷行殮死不失愛送死不失哀今朽尸以留生廣愛以傷行修哀以害性君之失矣嬰聞之朽而不殮謂之僇尸息而不收謂之陳胔反明王之性而内嬖妾于僇胔不可公曰寡人不識請因夫子而為之晏子季姬悼公夫人季姬者魯季孫肥之妹悼公之在魯也肥妻之即位而逆之季魴侯肥叔父通焉姬言其情弗敢與也公怒伐魯取讙及闡秋及魯平使閭邱明逆季姬以歸冬歸讙及闡于魯姬嬖故也左傳列女傳鋭司徒女杞梁妻傷槐女婧附辟司徒妻者鋭司徒之女也辟司徒主壘壁者鋭司徒主鋭兵者頃公十年成二年晋敗我師于鞌公自徐闗入辟女子使辟君也女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔公以為有禮問之辟司徒之妻也予之石􅐎杞殖字梁華還字周並齊大夫莊公四年襄二十三年公還自晋遂襲莒門于且于明日將復戰期于夀舒杞殖華還載甲夜入且于之隧宿于莒郊明日先遇莒子于蒲侯氏莒子重賄之使無死使無致死戰曰請有盟華還對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞殖莒人行成公歸遇杞殖之妻于郊使弔之辭曰殖之有罪何辱命焉若免于罪猶有先人之敝廬在下妾不得與郊弔公弔諸其室左傳説苑齊莊公伐莒為車五乗之賓而杞梁華舟不與歸而不食其母曰生而有義死而有名五乗之賔盡汝下也趣食乃行杞梁華舟至莒莒人逆之杞梁華舟下車鬬獲甲首三百莊公止之曰子止與子同齊國杞梁華舟曰君為五乗之賔而舟梁不與是無勇也臨敵止我以利是汚吾行也深入多殺者臣之事也遂進至莒城下莒人以炭置地二人不能入隰侯重為右曰來吾踰子隰侯重杖楯伏炭二子乗而入臨而哭之華舟後息杞梁曰無勇乎何哭也華舟曰是其勇與我同而先吾死是以哀之莒人曰子毋死與子同莒國杞梁華舟曰去國歸敵非忠臣也去長受賜非正行也鷄鳴而期日中妄之非信也深入多殺者臣之事也遂進殺二十七人而死其妻聞之而哭城為之阤列女傳杞梁之妻無子枕其夫之屍城下而哭十日城為之崩既葬曰吾何歸矣遂赴淄水而死古今注杞梁妻杞殖妻妹明月之所作也杞殖戰死妻抗聲長歌城感之而頽遂投水而死其妹為作歌名曰杞梁妻琴操以為其妻援琴作歌列女傳傷槐女名婧衍之女也景公有愛槐使人守之衍醉而傷槐公拘之且加罪焉婧乃造晏嬰之門曰妾父衍幸得充城郭為公民以風雨不時禱祠于名山不勝麴糵之味先犯君令固當死妾聞昔者宋景公之時大旱不雨召太卜而卜之曰當以人祀景公乃降堂北面稽首曰所以請雨者為吾民也今必以人祀寡人請自當之言卒大雨千里所以然者何也以能順天慈民也今吾君樹槐犯令者死殺婧之父孤婧之母恐傷執政之法而害明君之義也嬰明日朝謂公公曰寡人謹受命晏子辭繁而事同按宋景公後齊景公而即世不當云昔者說誤尚史卷三十八
