body:
  text: 尚史别史類提要臣等謹案尚史一百七卷國朝李鍇撰鍇字鐵君鑲白旗漢軍卷首自署曰襄平考襄平為漢遼東郡治今為盛京遼陽州地蓋其祖籍也康熙中鄒平馬驌作繹史採托百家雜說上起鴻荒下迄秦代仿袁樞紀事本末之體各立標題以類編次凡所徴引悉録原文雖若不相屬而實有端緒鍇是編以驌書為藁本而離析其文為之翦裁連絡改為紀傳之體作世系圖一卷本紀六卷世家十五卷列傳五十八卷繫六卷表六卷志十四卷末附序傳一卷仍於每假下各注所出書名其遺文瑣事不入正文者則以類附注於句下蓋體例凖諸史記而排纂之法則仿路史而小變之自序謂始事于雍正庚戌卒業於乾隆乙丑閲十六載而後就其用力頗勤考古來漁獵百家勒為一史實始於司馬遷今觀史記諸篇其出遷自撰者率經緯分明疏密得當操縱變化惟意所如而其雜采諸書以成文者非唯事迹異同時相抵牾亦往往㸃竄補綴不能隱斧鑿之痕知鎔鑄衆說之難也此書一用舊文翦裁排比使事迹聫屬語意貫通體如詩家之集句於厯代史家時為創格較鎔鑄衆說為尤難雖運掉或不自如組織或不盡密亦可云有條不紊矣至於晉逸民傳中列杜蕢狼瞫鉏麑提彌明靈輒逆臣傳中列趙穿而不列趙盾亂臣傳中列郤芮吕飴甥嬖臣傳中列頭須魯列女傳中列施氏婦豫奪多所未允又諸國公子皆别立傳而魯宋蔡曹莒邾六國則雜列諸臣中叛臣傳中如巫狐庸叛楚入吳吳楚兩見公山不狃叛魯入吳吳魯兩見已為重出而屈巫見於楚不見於晉苗賁皇見於晉不見於楚又復自亂其例如斯之類不一而足亦未能一一精核固不必為之曲諱焉乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3076e6d4d228e4823cc28f383a8f2895dfd0606e61f49b15b5672053db5de82f
