body:
  text: 尚史卷五十一列傳二十九鑲白旗漢軍李鍇撰衛諸臣傳石碏石厚附石祁子𢎞演附石稷成子石買共子石碏衛大夫事莊公公子州吁嬖人之子也有寵而好兵公弗禁碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁游禁之不可桓公立乃老桓公十六年隱四年州吁弒桓公未能和其民厚問定君於碏碏曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳碏使告於陳曰衛國褊小老夫髦矣無能為也此二人者實弒寡君敢即圖之陳人執之而請蒞於我蒞自臨討之也九月我使右宰醜蒞殺州吁於濮碏使其宰獳羊肩蒞殺石厚於陳國人立公子晉是為宣公左傳石祁子者衛大夫石駘仲之子也駘仲卒無嫡子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也記檀弓石祁子事懿公宋之弒閔公也猛獲來奔宋人請猛獲於我我欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也國人歸之戴公元年閔二年狄伐我懿公將戰公與石祁子玦寧速矢使守及戰我師敗績遂滅我宋人立戴公左傳吕氏春秋衛懿公有臣曰𢎞演有所於使翟人攻衛及懿公於滎澤殺之盡食其肉獨舍其肝𢎞演至報使於肝畢呼天而啼曰臣請為襮因自殺先出其腹實內懿公之肝桓公聞之曰衛之亡也以為無道有臣如此不可以不存於是復立衛於楚邱石稷者碏四世孫成子也事穆公穆公十一年成二年公使稷及孫良夫寧相向禽相禽並衛大夫將侵齊與齊師遇稷欲還良夫不可戰於新築我師敗績稷曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止㑹新築人救良夫良夫乃免稷卒諡曰成子買事殤公卒諡曰共左傳買子惡惡從子圃並見亂臣傳寧速莊子寧俞武子寧相附寧氏者出自武公公族也寧速是為寧莊子戴公元年閔二年狄伐我懿公使速守狄滅懿公速事戴公戴公薨事文公文公十九年僖十九年衛大旱卜有事於山川不吉速曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨文公薨事成公成公元年僖二十六年速㑹魯侯莒子盟於向速卒諡曰莊左傳寧俞衛大夫武子也事成公成公三年僖二十八年公欲叛晉與楚國人不欲出成公公適陳夏五月諸侯盟於踐土公使元咺奉叔武成公弟以受盟六月晉人復公俞與國人盟於宛濮曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟於爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不二公先期入俞先長牂大夫守門以為使也與之乘而入公子􅞰犬華仲前驅射殺叔武歂犬走出公使殺之元咺奔晉公與元咺訟俞為輔針莊子大夫為坐士榮為大士大士治獄官周禮命夫命婦不躬坐獄元咺不宜與君對坐故使針莊子為坐公不勝殺士榮刖針子謂俞忠而免之執公歸之於京師置諸深室俞職納槖饘焉元咺歸立公子瑕五年僖三十年晉侯使醫衍鴆公俞貨醫使薄其鴆不死㑹魯侯為公請乃釋公公賂周歂冶厪殺元咺公子瑕公入六年僖三十一年衛遷於帝邱公夢康叔曰相奪豫享公命祀相俞不可曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命十二年文四年俞如魯聘魯侯與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百旅弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾俞卒諡曰武子相事穆公穆公十一年成二年相及孫良夫侵齊我師敗於新築定公四年成六年相及孫良夫侵宋左傳說苑吳赤市使於智氏假道於衛寧文子具紵絺三百製以送之大夫豹曰吳雖大國也不攘交假之道亦敬矣又何禮焉文子不聽遂致之赤市至於智氏將歸吳智伯命造舟為梁赤市曰吾聞天子濟水造舟為梁諸侯維舟大夫方舟方舟臣之職也且敬大甚使人視之則兵在後矣將以襲衛赤市曰衛假吾道而厚贈我見難不告是與謀也使告衛衛人警戒智伯乃止按寧氏無諡文子者又是時吳滅已久說誣論曰衛之季也桓弒成出臲卼甚矣碏之義討逆有餘俞之忠濟亂有餘所以出乎困也困之九四曰來徐徐困於金車於上六曰有悔征吉二子以之亨之道也碏諌莊公曰愛子教之以義方勿納於邪然則厚具豺聲乎乃蔑義方之教也孫昭子孫良夫桓子孫昭子名未詳衛同姓食邑於戚事成公為大夫晉文公之季年成公不朝晉九年文元年晉伐我圍戚獲昭子其後有孫良夫是為孫桓子事成公成公三十三年宣七年良夫如魯盟成公薨事穆公穆公十一年成二年公使良夫石稷寧相向禽將侵齊與齊師遇石稷欲還良夫曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也戰於新築我師敗績新築人救良夫良夫是以免良夫不入遂如晉乞師㑹魯臧孫許亦如晉乞師晉許之敗齊師於鞍楚侵我冬十一月良夫及楚盟於蜀穆公薨事定公定公元年成三年良夫及晉却克伐牆咎如十一月良夫如魯聘丁未及魯盟四年成六年良夫寧相帥師侵宋左傳良夫卒諡曰桓子林父見逆臣傳孔達孔蒸鉏成子孔圉文子孔悝孔達世族未詳衛大夫事成公成公七年僖三十二年晉文公之末年也諸侯朝晉公不朝使達侵鄭伐綿訾及匡九年文元年晉襄公既祥伐我取戚我告於陳陳共公曰更伐之我辭之使衛更伐晉陳為衛以辭謝晉達帥師伐晉十年文二年陳為我請成於晉執達以說十二年文四年晉歸達於我以為衛之良也故免之公如晉拜十七年文九年楚伐鄭達㑹諸侯之大夫救鄭不及楚師二十五年文十七年宋人弒昭公達㑹伐宋穆公三年宣十二年達及晉宋曹同盟於清邱曰恤病討二於是陳二於楚宋為盟故伐陳我救之達曰先君有約言焉成公與陳共公有舊好故孔達背盟救之若大國討我則死之四年宣十三年晉以我救陳也討焉使人弗去曰罪無所歸將加而師達曰茍利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之明年達縊而死公以說於晉而免遂告於諸侯曰寡君有不令之臣達搆我敝邑於大國既伏其罪矣敢告公以為成勞復室其子使復其位左傳孔蒸鉏達之孫孔成子也初事定公定公十二年成十四年公有疾使蒸鉏寧殖立子衎以為大子公薨衎立是為獻公孫林父逐獻公蒸鉏事殤公殤公遇弒復事獻公獻公薨事襄公襄公夫人無子嬖人婤姶生孟摯及元蒸鉏夢康叔謂已立元余使羈蒸鉏子之孫圉與史茍相之史朝史苟父夢亦如之襄公薨蒸鉏立元是為靈公蒸鉏卒諡曰成子羈羈之孫圉是為孔文子圉取大子蒯瞶之姊生悝圉卒伯姬即蒯瞶姊通於豎渾良夫莊公元年哀十五年良夫伯姬謀納大子以大子入迫悝於厠强盟之遂劫以登臺出公輒出奔魯悝立大子是為莊公二年哀十六年公飲悝酒於平陽重酬之大夫皆有納焉悝醉而送之夜半而遣之載伯姬於平陽而行遂奔宋左傳元咺子角附元咺者衛大夫也事成公成公三年僖二十八年晉伐我取五鹿公欲叛晉與楚國人不欲故出公以說於晉公居於襄牛及晉敗楚師於城濮諸侯盟於踐土公懼出奔楚遂適陳使咺奉叔武成公弟以受盟或訴咺於公曰立叔武矣其子角從公公使殺之咺不廢命奉叔武以入守六月晉人復公公先期入公子歂犬華仲二子衛大夫前驅射殺叔武咺出奔晉冬諸侯㑹於溫公與咺訟不勝晉執公咺歸立公子瑕五年僖三十年晉釋公周歂冶厪殺咺及公子瑕公復入周歂冶厪並見逆臣傳左傳論曰知難在前而身犯之達之忠也奉假公守社稷子死不敢廢咺之忠也忠也而君子猶有議焉者陳不可倚母親於前晉不可倍母亢於後虎鼠兩端進退失據達之忠智不足已叔武之死也實不由公咺雖未達伏而待命慶鄭奔刑魏絳歸死可也君臣坐獄易植後君咺之忠義不盡已是故玉之白貴於溫臣之忠貴於純惜夫二子之未盡也北宫括懿子北宫他文子北宫遺附北宫括者成公曽孫所謂北宫懿子也事獻公獻公三年成十七年鄭侵晉括救晉侵鄭至于髙氏十三年襄九年諸侯伐鄭括及曹人邾人從晉荀偃韓起門于師之梁鄭成同盟于戲十八年襄十四年括及諸侯之大夫㑹吳于向傳以為括惰慢不攝故貶稱人而不書二月諸侯之大夫從晉侯伐秦及涇不濟魯莒先濟鄭公孫蠆見括曰與人而不固取惡莫甚焉若社稷何括說及蠆見諸侯之師而勸之濟至于棫林不獲成而還括卒左傳諡曰懿子二他遺北宫他括之子文子也初事獻公獻公薨事襄公襄公二年襄三十一年他相公以如楚過鄭印段迋勞于棐林如聘禮而以勞辭周聘禮而用郊勞之辭他入聘公孫揮為行人馮簡子與游吉逆客事畢而出言于公曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有公在楚他見令尹圍之威儀言于公曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家今聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟內外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂于是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也四年昭二年晉韓起來聘公享之他賦淇澳起賦木瓜襄公薨事靈公他卒諡曰文遺事殤公寧喜之弒殤公也晉討之執寧喜及遺以先歸左傳世叔儀文子世叔申懿子世叔齊悼子世叔遺僖子世叔儀是為大叔文子也為衛大夫事獻公獻公十八年襄十四年孫林父寧殖作亂公出奔齊魯侯使厚瘠來弔曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私于執事曰有君不弔有臣不敏君不赦宥臣亦不率職增淫發泄其若之何國人使儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺厚瘠歸語臧孫紇曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其內或營其外能無歸乎殤公十一年襄二十五年公入于夷儀自夷儀與寧喜言寧喜許之儀聞之曰烏乎詩所謂我躬不閲遑恤我後者寧子可謂不恤其後矣將可乎哉殆必不可君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪懈以事一人今寧子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而況置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉十二年襄二十六年寧喜弒殤公獻公入大夫逆于竟者執其手而與之言道逆者自車揖之逆于門者頷之而已公至使讓儀曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通外內之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之獻公後元年襄二十七年寧喜専公殺之使儀為卿三年襄二十九年儀㑹諸侯之大夫城杞儀卒諡曰文儀之孫申是為大叔懿子靈公二十五年昭三十二年申㑹諸侯之大夫于狄泉城成周申卒諡曰懿申之子齊初晉悼公子憗亡在衛使其女僕而田申止而飲之酒遂聘之生齊齊是為大叔疾大叔悼子也齊娶于宋子朝其娣嬖子朝出奔孔文子圉使齊出其妻而妻之齊使人誘其初妻之娣置于犂而為之一宫如二妻孔圉聞之怒欲攻之訪于仲尼仲尼命駕而行圉遽止之曰圉豈敢度其私訪衛國之難也齊或淫于外州外州人奪之軒以獻齊恥是二者出公九年哀十一年出奔宋齊臣向魋納美珠焉與之城鉏及向魋得罪出奔城鉏人攻齊莊公復之使處巢死焉殯于鄖葬于少禘諡曰悼齊之出奔也國人立世叔遺使室孔姞即孔圉女齊後妻遺齊之弟大叔僖子也莊公二年哀十六年公占夢嬖人求酒于遺不得與卜人比而告公曰君有大臣在西南偶弗去懼害公逐遺遺奔晉後二年莊公遇弒出公復入乃復遺左傳遺卒諡曰僖公叔發文子公叔戌趙黶附趙陽公叔發者公叔文子也厯事獻公襄公靈公靈公三十一年定公年魯侵鄭往不假道于我及還陽虎使季孫斯自南門入出自東門舍于豚澤虎將逐三桓欲使得罪鄰國公怒使彌子瑕追之發老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎文公之鼎成之昭兆寶龜定之鞶鑑鞶帶而以鏡為飾苟可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎大姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止左傳發卒其子戍請諡于君曰日月有時將葬矣請所以易其名者公曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班列以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子記檀弓說苑公叔文子問於王孫夏曰吾先君之廟小吾欲更之可乎對曰古之君子以儉為禮今之君子以汰易之夫衛國雖貧豈無文履一竒以易十稷之繡哉以為非禮也文子乃止戍亦事靈公靈公惡之以其富也戍又將去夫人之黨南子黨宋朝之徒夫人訴之曰戍將為亂三十九年定十四年公逐戍戍奔魯其黨趙陽奔宋趙陽者趙黶孫黶嘗于靈公二年昭九年及諸侯之大夫㑹楚子于陳左傳論曰傳有之經緯天地曰文經守恆緯推移焉文之謂也衛有若北宫他公叔發世叔儀者相襄贊靈綢繆殤獻經經緯緯不失厥道三子之所以並為文也蘧瑗蘧瑗字伯玉事獻公為大夫獻公十八年襄十四年孫林父將逐公并帑于戚而入見瑗曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近關出林父卒逐獻公立殤公殤公十二年襄二十六年寧喜將納獻公告瑗瑗曰瑗不得聞君之出敢聞其入遂行從近關出左傳後復逮事襄公靈公公叔發升于瑕邱瑗從發曰樂哉斯邱也死則我欲葬焉瑗曰吾子樂之則瑗請前記檀弓瑗外寬而內直自設于隱括之中直已不直人善廢而不悒悒韓詩外傳瑗年五十而知四十九年非何者先者難為知而後者易為攻也淮南子拾遺記師涓造新曲奏於靈公靈公情湎心惑忘于政事蘧伯玉諫曰此雖發揚氣律終為淫漫之音非宜薦於君靈公乃去其聲蘧伯玉焚其樂器於九達之衢列女傳靈公與夫人夜坐聞車聲至闕而止過闕復有聲夫人曰此蘧伯玉也公曰何以知之曰妾聞禮下公門式路馬所以廣敬也蘧伯玉敬以事上必不以暗昧廢禮是以知之公使視之果伯玉也淮南子蘧伯玉為相子貢往觀之曰何以治國曰以弗治治之簡子欲伐衛使史黯往覿焉還報曰蘧伯玉為相未可以加兵固塞險阻何足以致之按史魚尸諫以不能進伯玉是伯玉為相事蓋誤史鰌史鰌字魚衛史也事獻公襄公靈公公叔發朝而請享靈公退見鰌而告之鰌曰子必禍矣子富而君貪罪其及子乎公叔發曰然吾不先告子是吾罪也君既許我矣其若之何鰌曰無害子臣可以免富而能臣必免于難上下同之戍也驕戍發之子其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及發卒公逐戍以其富也左傳鰌病將卒命其子曰吾在衛不能進蘧伯玉退彌子瑕是不能正君也生而不能正君則死無以成禮置尸牖下于我畢矣其子從之靈公弔而問焉子以告公愕然曰寡人之過也命殯于客位進蘧伯玉而退彌子瑕家語序新同孔子曰直哉史魚邦有道如矢邦無道如矢魯論史朝史茍文子胥彌赦附史朝衛史也事獻公襄公襄公夫人姜氏無子嬖人婤姶生孟縶孔蒸鉏夢康叔謂已立元余使羈之孫圉羈蒸鉏子與史茍相之朝亦夢康叔謂已余將命而子苟與孔蒸鉏之曽孫圉相元朝見蒸鉏告之夢夢協襄公四年昭二年婤姶生子名之曰元孟縶之足不良弱行孔蒸鉏以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示朝朝曰元亨又何疑焉蒸鉏曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列于宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲于夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎襄公薨蒸鉏立元是為靈公苟又名狗朝之子文子也莊公時有胥彌赦亦筮史也莊公既殺渾良夫夢于北宫見人登昆吾之觀被髮北面而譟曰登此昆吾之虛綿綿生之瓜余為渾良夫叫天無辜公親筮之胥彌赦占之曰不害言公無道不敢以實對與之邑置之而逃奔宋公貞卜其繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰左傳既而公遇弒如繇辭論曰蘧伯玉史魚並見褒于孔子延陵季子亦說之曰衛多君子未有患焉夫當獻靈之頃而能無患謂非馮藉數子其誰與歸語曰不厚其棟不能任重衛有棟焉誰能崩陀之彪徯彪徯衛大夫事靈公靈公二十五年昭二十三年晉魏舒合諸侯之大夫于狄泉令城成周魏舒南面徯曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲渝敬天之渝不敢馳驅況敢干位以作大事乎明年城成周魏舒蒞政徯曰將建天子而易位以令非義也謂以晉大夫代周大夫為政大事奸義必有大咎晉不失諸侯魏子其不免乎左傳祝他祝他字子魚衛大祝也靈公二十九年定四年周劉文公合諸侯于召陵將㑹子行敬子衛大夫名未詳言于公曰㑹同難嘖有煩言莫之治也其使祝他從公曰善乃使他他辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以從于是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及臯鼬將長蔡于衛公使他私于周萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎他曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下于周為睦分魯公以大路大旗夏后氏之璜封父之繁弱封父古諸侯繁弱弓名殷氏六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周是使之職事于魯以昭周公之明德分之土田陪敦陪敦增厚也祀宗卜史備物典策官司彛器因商奄之民命以伯禽而封于少皥之虛分康叔以大路少帛績茷大赤取染草名旃旌大吕鐘名殷氏七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取于有閻之土有閻衛所受朝宿邑以共王職取于相土之東都以㑹王之東搜𣆀季授土陶叔授民命以康誥而封于殷虛皆啓以商政疆以周索索法也分唐叔以大路密須之鼓闕鞏甲名姑洗鐘名懷姓九宗職官五正命以唐誥而封于夏虛啓以夏正疆以戎索三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王于是乎殺管叔而蔡蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為已卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司寇𣆀季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸曹以伯爵居甸服言小于晉非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其德將如之何萇𢎞說乃長公于盟左傳論曰白茅藉玉侏儒乘棟材當其用有時而先是故祝他之長衛猶叔魚之歸季孫也佞與詐在所使爾栁莊栁莊者衛之太史也獻公出奔反于衛將班邑于從者而後入莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班及莊寢疾公曰疾若革雖當祭必告公再拜稽首請于尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以禭之與之邑裘氏與縣潘氏書而納諸棺曰世世子孫母變也記檀弓王孫賈王孫齊昭子子木附子羽王孫賈衛大夫事靈公靈公三十三年定八年晉以公之叛晉屬齊也盟公于剸澤使涉他成何辱公公怒賈趍進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也公欲叛晉而患諸大夫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質大夫曰茍有益也公子則往羣臣之子敢不皆負羈絏以從將行賈曰茍衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉說苑作王孫商賈子齊亦為大夫事出公出公後八年哀二十六年越臯如納出公師侵外州大獲我出禦之大敗掘禇師定子之墓焚之于平莊之上公孫彌牟使齊私于臯如曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已于是開陴納公公不敢入齊卒諡曰昭出公時又有子羽子木名不載並衛大夫出公十年哀十二年吳徵㑹于我初我殺吳行人且姚而懼謀于行人子羽子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必棄疾于人吳雖無道猶足以患衛往也長木之斃無不摽也國狗之瘈無不噬也而況大國乎公㑹吳于鄖吳執公既而舍之左傳論曰魯襄以還衛數叛晉晉業衰矣㑹澶淵盟剸澤德之不競祇以成惡賈也尸叛晉且無如之何矣逮至吳越迭興主齊盟陵上國出納諸侯蠻夷越俎而代庖又時變之推移與尚史卷五十一
