body:
  text: 尚史卷二十七列傳五鑲白旗漢軍李鍇撰周諸臣傳以下東周周桓公周公忌父周公閲周公楚周公宰孔周桓公名黒肩周公旦之後也食采于周故亦曰周公周采地扶風雍縣東北有周城桓王三年恵六年鄭伯如周朝王王不禮焉周桓公言于王曰我周之東遷晋鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣十三年桓五年王奪鄭伯政鄭伯不朝秋王伐鄭虢公林父將右軍桓公將左軍鄭為左右拒以當王師王師敗績莊王三年桓十八年桓公欲弑王而立王子克子克莊王弟子儀辛伯告王遂與王殺桓公王子克奔燕初子克有寵于桓王桓王屬諸桓公辛伯諫曰並后匹嫡兩政耦國亂之本也桓公弗從故及辛伯周大夫也其後周公忌父為王卿士大叔帯之難狄師伐周獲忌父左傳周公閲周之三公也襄王二十二年僖三十年王使閲聘于魯僖公饗之有昌歜白黒形鹽閲辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉榖鹽虎形以獻其功吾何以堪之及頃王崩匡王立閲與王孫蘓争政將訟于晉王叛王孫蘓使尹氏與聃啟尹氏卿士𥅆啟大夫訟閲于晉趙盾平王室而復之後有周公楚者簡王六年成十一年楚惡恵襄之族之偪也且與伯與争政伯與周卿士不勝怒而出及陽樊王使復之盟于鄄而入三日復出奔晉左傳周公孔為周宰杜預注宰官周采地恵王以恵后故將廢大子鄭而立王子𢃄二十二年僖五年齊侯帥諸侯㑹王大子于首止以定其位故王恨齊欲鄭伯叛之將盟王使宰孔召鄭伯鄭伯遂逃歸不盟襄王元年僖九年諸侯㑹于葵邱王使宰孔賜齊侯胙既盟宰孔先歸左傳遇晋獻公宰孔曰君可無㑹也夫齊侯好示務施與力而不務徳故輕致諸侯而重遣之使至者勸而畔者慕懷之以典言薄其要結而厚徳之以示之信三屬諸侯屬㑹也乘車之㑹三也存亡國三是以北伐山戎南伐楚西為此㑹也譬之如室既鎮其甍矣又何加焉吾聞之恵難徧也施難報也不徧不報卒于怨讐夫齊侯將施恵如出責是之不果奉而暇晋是皇雖後之㑹將在東矣君無懼焉其有勤也獻公乃還宰孔謂其御曰晋侯將死矣景霍以為城而汾河洓澮以為淵戎翟之民實環之汪是土也汪大貌茍違其道誰能懼之今晋侯不量齊徳之豐否不度諸侯之勢釋其閉脩閉守脩治也而輕于行道失其心矣君子失心鮮不夭昏國語按宰孔與忌父同時經謂宰孔曰宰周公杜注忌父曰周卿士豈一采地同時而有二公乎抑孔其名忌父其字乎論曰黒肩比子克宰孔右子帯不弭亂而樹亂所謂從君者與若夫辛伯之訓知所本矣凡有國者鍳之哉單伯單襄公單頃公單靖公單獻公單成公單穆公單武公單平公單愆期附單襄公名朝王卿士其先為單伯封于單周之親族也韋昭注莊王時宋弑閔公單伯㑹伐宋頃王時單伯為魯請子叔姬于齊齊人執之既而赦之單伯如魯致命春秋貴之公羊單伯滛于子叔姬榖梁同單襄公事定王定王使襄公聘于宋遂假道于陳以聘于楚火朝覿矣火心星道茀不可行也候不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹墾田若蓻膳宰不致餼司里不授館國無寄寓縣無施舍民將築臺于夏氏及陳陳靈公與孔寧儀行父南冠以如夏氏㽞賔弗見襄公歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢辰角星名角星相見東方建戍之初寒露節也雨畢者殺氣盛雨氣盡也天根見而水涸天根氐亢之間謂寒露之後五日天根朝見水潦盡竭也木見而草木節解本氐也謂寒露後十日草木枝節皆理解也駟見而隕霜駟房星也謂建戌之中霜始降火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而脩城郭宫室故夏令曰九月除道十月成梁其時儆曰收而場功偫而畚挶畚土籠挶卑土之器營室之中土功其始定謂之營室謂建亥小雪之中定星昏正于午土功可以始也火之初見期于司里此先王之所以不用財賄而廣施徳于天下者也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之教也周制有之曰列樹以表道立鄙食以守路國有郊牧畺有寓望藪有圃草囿有林池所以禦災也其餘無非榖土民無縣耜野無奥草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草間功成而不収民罷于逸樂是棄先王之法制者也周之秩官有之曰敵國賓至關尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司理授館司徒具徒司空視塗司㓂詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致餐廪人致餼司馬陳芻工人展車百官各以物至賓入如歸是故小大莫不懷愛其貴國之賔至則以班加一等益䖍至于王使則皆官正涖事上卿監之若王巡守則君親監之今雖朝也不才有分族于周承王命以為過賔于陳而司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰滛故凡我造國無從非彞無即慆滛各守爾典以承天休今陳侯不念􅏷續之常棄其伉儷妃嬪而帥其卿佐以滛于夏氏不亦瀆姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彞乎是又犯先王之令也昔先王之敎荗帥其徳也猶恐隕越若廢其教而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能乆乎定王六年宣八年襄公如楚八年宣十年陳侯殺于夏氏九年宣十一年楚子入陳國語十七年成元年晉景公平戎于王王使㐮公如晋拜成十八年成二年晋敗齊于鞌使鞏朔獻捷于周王弗見使襄公辭焉曰兄弟甥舅侵敗王畧王命伐之告事而已不獻其功左傳簡王十一年成十六年晋敗楚于鄢使郤至告慶于周王叔陳生周大夫王叔簡公飲之酒明日譽諸朝郤至見召桓公王卿士與之語召公以告㐮公曰王叔子譽温季即郤至食邑于温以為必相晉國相晉國必大得諸侯勸二三君子必先導焉可以樹今夫子見我以晋國之克也為己寔謀之曰微我晋不戰矣楚有五敗晋不知乗我則強之戰而勝是吾力也吾有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必下而趨禮也能獲鄭伯而赦之仁也若是而知晋國之政楚越必朝吾曰子則賢矣抑晋國之舉也不失其次吾懼政之未及子也謂我曰夫何次之有昔先大夫荀伯自下軍之佐以政趙宣子未有軍行而以政今欒伯自下軍徃是三子也吾又過于四之無不及若佐新軍而升為政不亦可乎將必求之是其言也君以為奚若㐮公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其葢人也夫人性陵上者也不可葢也求葢人其抑下滋甚故聖人貴讓且諺曰獸惡其網民惡其上書曰民可近不可上也詩曰愷悌君子求福不回在禮敵必三譲今郤至在七人之下而欲上之是求葢七人也其亦有七怨怨在小醜猶不可堪而况在侈卿乎其何以待之晋之克也天有惡于楚也故儆之以晋而郤至佻天以為己力佻偷也偷天功以為己力也不亦難乎佻天不祥乗人不義不祥則天棄之不義則民畔之且郤至何三伐之有夫仁禮勇皆民之為也以義死用謂之勇奉義順則謂之禮畜義豐功謂之仁姦仁為佻姦禮為羞姦勇為賊有三姦以求替其上逺于得政矣以吾觀之兵在其頸不可久也雖吾王叔未能違難在大誓曰民之所欲天必從之王叔欲郤至能勿從之國語十二年成十七年襄公㑹諸侯伐鄭六月盟于柯陵左傳襄公見晋厲公視逺歩髙晋卿郤錡見其語犯郤犨見其語迃郤至見其語伐齊國佐見其語盡魯成公見言及晋難及郤犨之譖襄公曰君何患焉晋將有亂其君與三郤其當之乎魯侯曰敢問天道乎抑人故也對曰吾非瞽史焉知天道吾見晋君之容而聽三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以歩目今晋侯視逺而足髙目不在體而足不歩目其心必異矣目體不相從何以能乆夫郤氏晋之寵人也三卿而五大夫可以戒懼矣髙位寔疾僨厚味實腊毒今郤伯之語犯叔迃季伐犯則陵人迃則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於滛亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有乎吾聞之國徳而鄰于不修必受其福今君偪于晋而鄰于齊齊晋有禍可以取伯無徳之患何憂於晋且夫長翟之人利而不義長翟之人謂叔孫僑如其利滛矣流之若何魯侯歸逐叔孫僑如是年晋殺三郤明年晋厲公被弑而齊人殺國佐皆如其言晋孫談之子周談晋襄公之孫恵伯談也周者談之子晋悼公適周事襄公襄公有疾召其子頃公而告之曰必善晉周周將得晉國其行也文能文則得天地天地所胙小而後國象天能敬帥意能忠思身能信愛人能仁利制能義事建能知師義能勇施辯能敎昭神能孝慈和能恵推敵能讓此十一者夫子皆有焉成公之歸也吾聞晋之筮之也遇乾之否曰配而不終君三出焉一既徃矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以墨曰使有晋國三而畀驩之孫故名之曰黒臀于今再矣襄公曰驩此其孫也而令徳孝恭非此其誰晋仍無道而鮮冑其將失之矣必蚤善晋子其當之也及厲公之亂召周子而立之是為悼公國語單㐮公卒子頃公亦為王卿士靈王二年襄三年頃公及諸侯同盟于鷄澤左傳單靖公頃公子靈王九年襄十年單靖公代王叔陳生為卿士以相王室晋羊舌肹之聘于周也靖公享之儉而敬賔禮贈餞視其上而從之燕無私送不過郊語説昊天有成命單之老送羊舌肹肹告之曰異哉吾聞之曰一姓不再興今周其興乎其有單子也單若有闕必兹君之子孫實續之不出于它矣國語靖公子獻公亦為周卿士單獻公棄親用羈景王十年昭七年襄頃之族殺獻公而立其弟成公十四年昭十一年單成公㑹晋韓起于戚視下言徐羊舌肹曰單子其將死乎十二月成公卒左傳單穆公旗者靖公之曾孫亦為王卿士景王二十一年昭十八年將鑄大錢單穆公曰不可古者天災降戾于是乎量資幣權輕重以振救民民患輕則為之作重幣以行之于是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重于是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取于民民不給將有逺志是離民也且夫備有未至而設之有至而後救之是不相入也可先而不備謂之怠可後而先之謂之召災周固羸國也天未厭禍焉而又離民以佐災無乃不可乎將民之與處而離之將災是備禦而召之則何以經國國無經何以出令令之不從上之患也且絶民用以寔王府猶塞川原而為潢汚也其竭也無日矣若民離而財匱災至而備亡王其若之何吾周官之于災備也其所怠棄者多矣而又奪之資以益其災是去其藏而翳其人也王其圖之弗聴卒鑄大錢二十三年昭二十年傳作昭二十一年王將鑄無射而為之大林單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼若積聚既䘮又鮮其繼生何以殖且夫鐘不過以動聲若無射有林耳不及也夫鐘聲以為耳也耳所不及非鐘聲也猶目不見不可以為目也夫目之察度也不過歩武尺寸之間其察色也不過墨文尋常之間耳之察龢也在清濁之間其察清濁也不過一人之所勝是故先王之制鐘也大不出鈞重不過石律度量衡于是乎生小大器用于是乎出故聖人慎之今王作鐘也聼之弗及比之不度鐘聲不可以知龢制度不可以出節無益于樂而鮮民財將焉用之夫樂不過以聼耳而羙不過以觀目若聼樂而震觀羙而眩患莫甚焉出令不信刑政放紛動不順時民無據依不知所力各有離心上失其民作則不濟求則不獲其何以能樂三年之中而有離民之器二焉國其危哉王弗聼國語初景王太子夀卒王立子猛後復欲立子朝及𫝊賔起有寵于王單穆公劉文公惡之二十五年昭二十二年四月王田北山使公卿皆從將殺單穆公劉文公而王崩子猛立是為悼王五月攻賔起殺之盟羣王子于單氏六月𦵏景王子朝作亂逐劉文公文公奔揚既而如劉單穆公逆悼王于莊宫以歸王子還夜取王以如莊宫單穆公出奔王子還與召莊公召伯奐子朝黨謀曰不殺單旗不捷也與之重盟必來背盟而克者多矣從之遂奉王以追單穆公及領周地大盟而復殺摯荒以說單穆公覺之亡奔于平畤羣王子追之單穆公殺還姑發弱鬷延定稠八子靈景之族子朝奔京單穆公伐之京人奔山劉文公遂入于王城㑹鞏簡公甘平公敗績于京並周卿士單穆公欲告急晋七月以王如平畤遂如圃車次於皇劉文公又如劉單穆公使王子處守于王城盟百工于平宫鄩肹子朝黨伐皇獲之焚諸王城之市八月司徒醜以王師敗績于前城百工叛伐單氏之宫兵敗單氏反伐之十月晋師九州之戎納王于王城單穆公劉文公以王師敗績于郊十一月王子猛卒敬王立十二月晋師取前城軍其東南王師伐京毁其西南敬王元年昭二十三年正月王師晋師圍郊郊鄩潰王使告間晋師還四月單穆公取訾劉文公取牆人直人六月子朝入于尹尹文公圉誘劉佗殺之佗劉文公族單穆公從阪道劉文公從尹道伐尹單穆公先至而敗劉文公還以王如劉子朝復入于王城尹辛敗劉師于唐四年昭二十六年單穆公復如晋告急劉人敗王城之師于尸氏又戰于施谷劉師敗績七月劉文公以王出王城人焚劉王次于滑十月王起師於滑十一月晋師克鞏召伯盈逐王子朝子朝奔楚召伯逆王于尸及劉文公單穆公盟王入于成周單穆公卒子武公亦為王卿士敬王十六年定六年子朝之餘黨儋翩復作亂王處于姑蕕十七年定七年單武公及劉桓公敗尹氏于窮谷尹氏復黨儋翩晋復送王入于王城單平公者亦為王卿士敬王三十八年定八年平公㑹魯哀公晋定公吳夫差于黄池又有單愆期者周卿士單公子也為靈王御士初靈王弟儋季卒其子括將見王而歎愆期過諸廷聞其歎而言曰烏乎必有此夫入以告王且曰必殺之不慼而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫靈王子景王弟周殺佞夫儋括奔晋左傳劉康公劉定公劉獻公劉文公劉桓公劉康公字季子定王母弟也公羊傳食采于劉定王八年宣十年王使劉康公聘于魯發幣于大夫季孫行父仲孫蔑皆儉叔孫僑如公孫歸父即東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寛肅宣恵君也敬恪恭儉臣也寛所以保本也肅所以濟時也宣所以教施也恵所以和民也本有保則必固時動而濟則無敗功教施而宣則徧恵以和民則阜乃可以長保民矣敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以恭給事則寛于死以儉足用則逺于憂則可以上下無隙矣今夫二子者儉則能足用矣用足則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之若是則必廣其身且夫人臣而侈國家弗堪亡之道也王曰幾何對曰東門之位不若叔孫而㤗侈焉不可以事二君叔孫之位不若季孟而亦㤗侈焉不可以事三君若皆蚤世猶可若登年以載其毒必亡國語十三年宣十五年晋趙同獻狄俘于周不敬劉康公曰不及十年原叔趙同也必有大咎天奪之魄矣十七年成元年晋平戎于王劉康公徼戎將遂伐之内史叔服諌不聴遂伐茅戎敗績于徐吾氏簡王六年成十一年晋郤至與周争鄇田鄇温别邑王命劉康公單㐮公訟諸晋卻至曰温吾故也故不敢失劉單曰昔周克商使諸侯撫封蘓忿生以温為司㓂與檀伯逹封于河蘓氏即狄又不能于狄而奔衛㐮王勞文公而賜之温狐氏陽氏先處之而後及子若治其故則王官之邑也子安得之晋侯使郤至勿敢争八年成十三年魯成公及諸侯朝王遂從劉康公成肅公㑹晋侯伐秦成子受脤于社不敬劉康公曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者飬之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在飬神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎五月成子卒于瑕左傳劉定公夏者王官師靈王十三年襄十四年將昏于齊王使劉定公賜齊侯命十四年襄十五年劉定公逆王后于齊景王四年昭元年虢之㑹王使劉定公勞晋趙武于頴館于雒汭劉定公曰美哉禹功明徳逺矣㣲禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉定公歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晋正卿以主諸侯而儕于𨽻人朝不謀夕棄神人矣神怒民叛何以能乆趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年十二月趙武卒左傳劉獻公摯王卿士景王十六年昭十三年與諸侯會于平邱晋人將尋盟齊人不可晋侯使羊舌肹告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乗以先啟行遲速唯君二十五年昭二十二年劉獻公卒單穆公立其庶子狄是為文公狄又名卷字伯蚠初事單穆公王子朝賔起有寵于景王劉文公惡賔起之為人願殺之又惡王子朝之言以為亂願去之及景王崩王子朝作亂劉文公奉王子猛出次于皇子猛卒敬王立敬王四年昭二十六年王子朝奔楚敬王乃入于成周詳單穆公傳十四年定四年劉文公㑹諸侯于召陵謀伐楚以楚納子朝故七月劉卷卒左傳先是劉文公與萇𢎞欲城成周為之告晉衛彪傒適周聞之見單穆公曰萇劉其不没乎天之所支不可壊也其所壊亦不可支也其後周殺萇𢎞及貞王劉氏亡國語劉文公子是為劉桓公敬王十六年定六年周儋翩率子朝之餘黨以作亂王處于姑蕕十七年定七年劉桓公與單武公敗尹氏于窮谷十一月劉桓公單武公逆王于慶氏晋師送王復入于王城十八年定八年劉桓公伐儀栗盂單武公伐榖城簡城以定王室焉左傳論曰定靈之際單劉賛王室尸盟㑹諸侯嘗以得王命為重由是而樹徳振功猶可斂殷道之中興惜乎不及此也子朝之難旗卷盡瘁然翟泉涖盟而王子虎卒召陵涖盟而劉卷卒周之不振抑以天乎終春秋唯卒二卿葢有㣲意也内史過内史過周大夫恵王十五年莊三十二年有神降于莘王問諸過曰是何故也對曰國之將興明神降之監其徳也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也王從之過徃聞虢請命反曰虢必亡矣虐而聽于神國語有神降于莘王問于内史過曰是何故固有之乎對曰有之國之將興民神無怨故明神降之觀其政徳而均布福焉國之將亡民神怨痛無所依懷故神亦徃焉觀其苛慝而降之禍是以或見神以興亦或以亡昔夏之興也融降於崇山其亡也回禄信于耹隧商之興也檮杌次于丕山其亡也夷羊在牧周之興也鸑鷟鳴於岐山其衰也杜伯射王于鄗是皆明神之志者也王曰今是何神也對曰昔昭王娶于房曰房后實有爽徳協于丹朱丹朱馮身以儀之生穆王焉寔臨照周之子孫而禍福之夫神壹不逺徙遷焉若由是觀之其丹朱乎王曰其誰受之對曰在虢土王曰然則何為對曰臣聞之道而得神是謂逢福滛而得神是謂貪禍今虢少荒其亡乎王曰吾其若之何對曰使太宰以祝史帥狸姓奉犧牲粢盛玉帛徃獻焉無有祈也王曰虢其幾何對曰昔堯臨民以五今其胄見神之見也不過其物由是觀之不過五年王使太宰忌父徃獻内史過從至虢虢公亦使祝史請土焉内史過歸告王曰虢必亡矣不禋于神而求福焉神必禍之不親于民而求用焉民必違之今虢公動匱百姓以逞其違離民怒神而求利焉不亦難乎十九年晋取虢襄王三年僖十一年王使召武公及過賜晋侯命恵公也受玉惰過歸告王曰晉侯其無後乎王賜之命而惰于受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昬何以長世左傳國語襄王使召公過内史過賜晋恵公命吕甥郤芮相晋侯不敬執玉卑拜不稽首内史過歸以告王曰晋不亡其君必無後且吕郤將不免王曰何故對曰民之所急在於大事先王知大事之必以衆濟也故袚除其心以和恵民考中度衷以涖之昭明物則以訓之制義庶孚以行之袚除其心精也考中度衷忠也昭明物則禮也制義庶孚信也今晋侯即位而背外内之賂虐其處者棄其信也不敬王命棄其禮也施其所惡棄其忠也以惡實心棄其精也四者皆棄則逺不至而近不和矣將何以守國夫晋侯非嗣也而得其位亹亹怵惕保任戒懼猶曰未也若將廣其心而逺其鄰陵其民而卑其上將何以固守夫執玉卑替其摯也拜不稽首誣其王也替摯無鎮誣王無民夫天事恒象任重享大者必速及故晋侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其禄弗諌而阿之亦必及焉八年晋侯隕於韓十六年晋人殺懷公無胄秦人殺子金子公内史叔興叔興父周内史㐮王八年僖十六年隕石于宋五隕星也六鷁退飛過宋都風也興聘于宋宋㐮公問焉曰是何祥也吉凶焉在對曰今兹魯多大䘮明年齊有亂君将得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也左傳二十年僖二十年王使太宰文公及興賜晋文公命興歸告王曰晋不可不善也其君必霸逆王命敬奉禮義成敬王命順之道也成禮義徳之則也則徳以道諸侯諸侯必歸之且禮所以觀忠信仁義也忠所以分也仁所以行也信所以守也義所以節也臣入晋境四者不失臣故曰晋侯其能禮矣王其善之樹于有禮艾人必豐王從之國語内史叔服叔服叔氏服字也亦周内史魯僖公薨㐮王二十六年文元年王使服㑹葬公孫敖聞其能相人也見其二子焉服曰榖也食子難也收子榖也豐下必有後於魯國頃王六年文十四年有星孛入于北斗服曰不出七年宋齊晋之君皆將死亂後皆如其言定王十七年成元年晋侯平戎于王單㐮公如晋拜成劉康公徼戎將遂伐之服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聼三月敗績于徐吾氏左傳論曰内史過曰禮國之幹敬禮之輿叔興曰成禮義徳之則嗚呼辨乎禮義而隂陽從矣周有五史内史掌六典八法八則八枋之貳固以禮教統官諧民其與叔世尚術誣民者有間矣富辰富辛附富辰周大夫王子帯之召戎伐周也周討王子𢃄子帯奔齊㐮王十四年僖二十二年富辰言於王曰詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王説王子帯自齊復歸于京師鄭人入滑十六年僖二十四年王使伯服游孫伯二子周大夫如鄭請滑鄭伯怨恵王之入而不與厲公爵也莊二十一年鄭虢納王鄭伯享王王予之鞶鑑虢公請器王與之爵又怨㐮王之與衛滑也故不聼王命而執二子王怒將以狄伐鄭辰諌曰不可臣聞之大上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也邘晋應韓武之穆也凡蔣邢茅胙祭周公之􅏷也召穆公思周徳之不類故糾合宗族于成周而作詩曰棠棣之華鄂不􅙽􅙽凡今之人莫如兄弟其四章曰兄弟䦧於牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄徳崇姦禍之大者也鄭有平恵之勲又有厲宣之親棄嬖寵而用三良于諸姬為近四徳具矣耳不聼五聲之和為聾目不别五色之章為昧心不則徳義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿徳也猶曰莫如兄弟故封建之其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周徳既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聼使頽叔桃子出狄師國語王將以翟伐鄭富辰諫曰不可人有言曰兄弟讒䦧侮人百里周文公之詩曰兄弟䦧于牆外禦其侮若是則䦧乃内侮雖䦧不敗親也鄭在天子兄弟也鄭武莊有勲力于平桓我周之東遷晋鄭是依子穨之亂又鄭之由定今以小忿棄之是以小怨置大徳也無乃不可乎且夫兄弟之怨不徵于它徵于它利乃外矣章怨外利不義棄親即翟不祥以怨報徳不仁夫義所以生利祥所以事神仁所以保民也不義則利不阜不祥則福不降不仁則民不至古之明王不失此三徳者故能光有天下而龢寧百姓令聞不忘王其不可以棄之王不聴狄伐鄭取櫟王徳狄人將以其女為后辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啓之女徳無極婦怨無終狄必為患王又弗聽國語翟師伐鄭王徳翟人將以其女為后富辰諌曰不可夫婚姻禍福之階也利内則福由之利外則取禍今王外利矣其無乃階禍乎昔摯疇之國也由大任杞繒由大姒齊許申吕由大姜陳由大姬是皆能内利親親者也昔鄢之亡也由仲任宻須由伯姞鄶由叔妘𥅆由鄭姬息由陳媯鄧由楚曼羅由季姬廬由􅀈媯是皆外利離親者也王曰利何如而内何如而外對曰尊貴明賢庸勲長老愛親禮新親舊然則民莫不審固其心力以役上令官不易方而財不匱竭求無不至動無不濟百姓兆民夫人奉利而歸諸上是利之内也若七徳離判民乃攜貳各以利退上求不暨是其外利也夫翟無列於王室鄭伯南也王而卑之是不尊貴也翟豺狼之徳也鄭未失周典王而蔑之是不明賢也平桓莊恵皆受鄭勞王而棄之是不庸勲也鄭伯捷之齒長矣王而弱之是不長老也翟隗姓也鄭出自宣王王而虐之是不愛親也夫禮新不間舊王以翟女間姜任非禮且棄舊也王一舉而棄七徳臣故曰外利矣書有之曰必有忍也若能有濟也王不忍小忿而棄鄭又登叔隗以階翟翟封豕豺狼也不可厭也王弗聽翟后立通于王子𢃄十八年僖二十六年王黜翟后翟人來誅殺譚伯辰曰昔吾驟諫王王弗從以及此難若我不出王其以我為懟乎乃以其屬死之國語左傳頽叔桃子以狄師伐周大敗周師獲周公忌父原伯毛伯富辰敬王時有富辛辛及石張如晉請城成周左傳萇宏萇宏周大夫萇叔也景王十四年昭十一年王問于宏曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之嵗也嵗在豕韋弗過此矣楚將有之然壅也嵗及大梁蔡復楚凶天之道也二十年昭十七年晋使屠蒯如周請有事于雒與三塗宏謂劉文公曰客容猛非祭也其伐戎乎陸渾氏甚睦扵楚必是故也君其備之晋果滅陸渾其衆奔甘鹿周大獲二十一年昭十八年毛得殺毛伯過而代之宏曰毛得必亡是昆吾稔之日也侈故之以而毛得以濟侈于王都不亡何待子朝之亂南宫極右之敬王元年昭二十三年八月南宫極震地震壓而死宏謂劉文公曰君其勉之先君謂蚠之父劉獻公也之力可濟也周之亡也其三川震今西王謂子朝之大臣亦震天棄之矣東王必大克二年昭二十四年南宫嚚以甘桓公見王子朝劉文公謂宏曰甘氏又徃矣對曰何害同徳度義大誓曰紂有億兆夷人亦有離徳余有亂臣十人同心同徳此周所以興也君其務徳無患無人晋范吉射攻其君不克奔朝歌劉氏范氏世為婚姻宏事劉文公故周與范氏二十八年哀三年晋趙鞅以為討周人殺宏初劉文公與宏欲城成周為之告晋衛彪奚及晋女叔寛曰萇叔將不免天之所壞不可支也及是果及禍左傳論曰同人之類族辨物所以主離徳之明也襄王舍鄭即狄敬王釋君助臣徳之不明族類之所由紊也富死萇討等死耳富之死為不可及已然執王使討王臣晋鄭不天而萇之死晋為政乎倉葛倉葛陽樊人襄王十七年僖二十五年晋文公殺大叔𢃄納王于王城王以陽樊賜之陽人不服圍之倉葛呼曰王以晋君為徳故勞之以陽樊陽樊懷我王徳是以未從于晋謂君其何徳之布以懷柔之使無有逺志今將大泯其宗祊而蔑殺其民人宜吾不敢服也夫三軍之所尋將蠻夷戎狄之驕逸不䖍于是乎致武此羸者陽也未狎君政故臣承命君若惠及之唯官是徴其敢逆命何足以辱師君之武震無乃玩而頓乎臣聞之曰武不可覿文不可匿覿武無烈匿文不昭陽不承獲甸而祗以覿武臣是以懼不然其敢自愛也且夫陽豈有裔民夫亦皆天子之父兄甥舅也若之何其虐之也晋侯聞之曰是君子之言也乃出陽氏國語伶州鳩伶州鳩周樂官景王二十四年昭二十一年王將鑄無射問之州鳩對曰臣之守官弗及也臣聞之琴瑟尚宫鐘尚羽石尚角匏竹利制以聲竒調利為制大不踰宫細不過羽夫宫音之主也第以及羽聖人保樂而愛財財以備器樂以殖財故樂器重者從細輕者從大是以金尚羽石尚角瓦絲尚宫匏竹尚議議從其調利革木一聲夫政象樂樂從和和從平聲以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以賛之革木以節之物得其常曰樂極極之所集曰聲聲應相保曰和細大不踰曰平如是而鑄之金磨之石繫之絲木越之匏竹越謂為之孔也節之鼓而行之以遂入風于是乎氣無滯隂亦無散陽隂陽序次風雨時至嘉生繁祉人民龢利物備而樂成上下不罷故曰樂正今細過其主妨于正用物過度妨于財正害財匱妨于樂細抑大陵不容于耳非龢也聼聲越逺非平也妨正匱財聲不龢平非宗官之所司也夫有和平之聲則有蕃殖之財若大匱財用罷民力以逞滛心聽之不龢比之不度無益于教而離民怒神非臣之所聞也王不聽問律于州鳩對曰律所以立均出度也均者均鐘木長七尺有弦繫之以均鐘者度鐘大小清濁也古之神瞽考中聲而量之以制度律均鐘百官軌儀紀之以三天地人也平之以六六律也成于十二十二律吕也天之道也夫六中之色也故名之曰黄鍾十一月曰黄鍾乾初九六律之首也所以宣飬六氣九徳也六氣隂陽風雨晦明也九徳水火金木土榖正徳利用厚生也由是第之二曰太蔟正月曰太蔟乾九二也所以金奏賛陽出滯也三曰姑洗三月曰姑洗乾九三也所以修潔百物考神納賔也四曰蕤賔五月曰蕤賔乾九四也所以安靖神人獻酬交酢也五曰夷則七月曰夷則乾九五也所以詠歌九則九則九功之則也平民無貳也六曰無射九月曰無射乾上九也所以宣布哲人之令徳示民軌儀也為之六間六間六吕在陽律之間也以揚沈伏而黜散越也元間大吕十二月曰大吕坤六四也助宣物也二間夾鍾二月曰夾鍾坤六五也出四隙之細也四隙四時之間氣㣲細者三間中吕四月曰中吕坤上六也宣中氣也四間林鍾六月曰林鍾坤初六也和展百事俾莫不任肅純恪也五間南吕八月曰南吕坤六二也賛陽秀也六間應鍾十月曰應鍾坤六三也均利器用俾應復也律吕不易無姦物也細鈞有鐘無鎛昭其大也細細聲謂角徴羽也鐘大鐘鎛小鐘有鐘無鎛為両細不相和故以大平細大鈞有鎛無鐘大謂宫商也有鎛無鐘平大為両大不相和故以小甚大無鎛鳴其細也甚大謂同尚大聲也則又去鎛鳴其細細謂絲竹革木也大昭小鳴和之道也龢平則久久固則純純明則終終復則樂所以成政也故先王貴之王曰七律者何七律者黄鐘為宫大蔟為商姑洗為角林鐘為徴南吕為羽應鐘為變宫蕤賔為變徴對曰昔武王伐殷嵗在鶉火嵗嵗星從桞九度至張十七度為鶉火周分野也月在天駟天駟房星也日在析木之津津天漠也從尾十度至斗十一度為析木其間為漢津辰在斗柄辰日月之會斗柄斗前也星在天黿星辰星天黿一曰𤣥枵從湏女八度至危十五度為天黿星與日辰之位皆在北維北維北方水位也顓頊之所建也帝嚳受之我姬氏出自天黿天黿齊之分野王季之母大姜齊女故言出自天黿及析木者有建星及牽牛焉建星在牽牛間謂從辰星所在天黿至析木厯建星及牽牛皆水宿言得水類也則我皇妣大姜之姪伯陵之後逢公之所馮神也嵗之所在則我有周之分野也月之所在辰馬農祥也辰馬謂房心星也心星所在大辰之次為天駟駟馬也故曰辰馬農祥謂房星晨正而農事起也我太祖后稷之所經緯也王欲合是五位三所而用之王武王五位嵗月日星辰也三所逢公所馮神周分野所在后稷所經緯也自鶉及駟七列也從張至房七列合七宿謂張翼軫角亢氐房也南北之揆七同也嵗在鶉火午辰星在天黿子鶉火周分野天黿周所出自午至子其度七同也凡神人以數合之以聲昭之數合聲龢然後可同也故以七同其數而以律龢其聲于是乎有七律王以二月癸亥夜陳未畢而雨以夷則之上宫畢之上宫以夷則為宫聲夷則上宫也故以畢陳周禮大師執同律以聽軍聲而詔吉凶當辰辰在戍上故長夷則之上宫名之曰羽長謂先用之也辰時也辰日月之㑹斗柄斗當初陳之時周二月昏斗建丑而斗柄在戍上下臨其時名其樂為羽所以屏藩民則也王以黄鐘之下宫布戎于牧之野故謂之厲黄鐘在下故曰下宫名此樂為厲所以厲六師也以大蔟之下宫布令于商昭顯文徳底紂之多辠故謂之宣太蔟在下故曰下官名其樂為宣所以宣三王之徳也反及嬴内嬴音媯内汭地名以無射之上宫布憲施舍于百姓故謂之嬴亂無射在上故曰上宫名其樂為嬴亂亂治也所以優柔容民也國語王卒鑄大鐘州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿而鐘音之器也天子省風以作樂器以鍾之輿以行之小者不窕窕他彫反細而不滿也大者不槬槬戸化反横而不入也則和于物物和則嘉成故和聲入于耳而藏于心心億則樂窕則不咸槬則不容心是以感感實生疾今鐘槬矣王心弗堪其能乆乎左傳鐘成伶人告龢王謂州鳩曰鐘果龢矣對曰未可知也王曰何故對曰上作器民備樂之則為龢今財亡民罷莫不怨恨臣不知其龢也且民所曹好鮮其不濟也其所曹惡鮮其不廢也故諺曰衆心成城衆口鑠金今三年之中而害金再興焉懼一之廢也王曰爾老耄矣何知二十五年昭二十三年王崩鐘不龢國語論曰仁置徳武置服陽不服而武以臨之宜倉葛之有言也陽樊屬周不欲𨽻晋周之徳猶有所繋有土有民推以及逺安在其舊物之不可復耶記曰大樂與天地同和公孫尼子曰樂者審以一定和和者樂之本也先王作樂以象徳金石絲竹比音而樂之以底于和也輕重細大其或踰之猶之昌陽于冬扶隂于夏天地且戾豈唯一人州鳩之對猶為細夫尚史卷二十七
