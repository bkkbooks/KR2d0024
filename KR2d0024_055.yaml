body:
  text: 尚史卷五十五列傳三十三鑲白旗漢軍李鍇撰鄭諸臣傳公孫申公子班公孫申字叔申某公子未詳襄公十八年成四年薨悼公即位申帥師疆許田許人敗諸展陂許訴于楚楚不直公公于是叛楚即晉及悼公薨成公即位二于楚成公三年成九年晉執公于銅鞮申謀之曰我出師以圍許為將改立君者而紓晉使勿亟遣使請晉晉必歸君冬我圍許公子班者字子如鄭公子也某公子未詳班聞申之謀明年立公子繻國人殺繻立成公大子髠頑班奔許夏五月晉歸成公公討立君者殺申及其弟叔禽七年成十三年夏六月夜公子班自訾求入于大宫不能殺子印子羽反軍于市公子騑帥國人從而盡焚之殺班及班弟子䮾班子孫叔䮾子孫知左傳公孫揮公孫揮字子羽某公孫未詳揮為行人事簡公簡公十七年襄二十四年揮如晉聘十九年襄二十六年賞入陳之功公孫舍之八邑公孫僑六邑僑辭曰臣之位在四且舍之之功也固豫之受三邑揮曰子産其將知政矣讓不失禮自上而下隆殺以兩為數位在四而受次卿之賞非禮也故曰讓不失禮二十二年襄二十九年楚康王卒郟敖即位公子圍為令尹揮曰是謂不宜必代之昌松柏之下其草不殖二十五年昭元年楚公子圍來聘且娶于公孫段氏伍舉為介將入館國人惡之使揮與之言乃館于外既聘將以衆逆公孫僑患之使揮辭曰以敝邑褊小不足以容從者請墠聽命欲于城外除地為墠行昏禮圍使對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告于莊共之廟而來若野賜之是委君貺于草莽也是寡大夫不得列于諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之揮曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之入逆而出遂會于虢及盟楚公子圍設服離衛設君服陳戈前衛離陳也魯叔孫豹曰楚公子美矣君哉罕虎曰二執戈者前矣禮君行有二執戈者在前蔡公孫歸生曰蒲宫有前言特緝蒲為宫以自殊異不亦可乎楚伯州犂曰此行也辭而假之寡君揮曰假不反矣州犂曰子姑憂子晳之欲背誕也言公孫黑殺良霄將為國難揮曰當璧猶在謂楚棄疾有當璧之命假而不反子其無憂乎齊國弱曰吾代二子愍矣陳公子昭曰不憂何成二子樂矣衛齊惡曰茍或知之雖憂何害宋向戍曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣義取暴虎馮河之可畏故不敢譏公子圍退會揮謂罕虎曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家公孫歸生持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子昭樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物其是之謂矣左傳禆竈里析附禆竈鄭大夫簡公二十一年襄二十八年竈曰今兹周王及楚子皆將死嵗棄其次而旅于明年之次以害鳥帑周楚惡之嵗星棄星紀之次客在𤣥枵失次于北禍衝于南南為朱鳥鳥尾為帑鶉火鶉尾周楚之分故周楚受其咎是年周靈王崩楚康王死二十三年襄三十年國人殺良霄初公孫蠆之卒也將葬公孫揮與竈晨會事焉過伯有氏即良霄其門上生莠揮曰其莠猶在乎伯有侈以莠喻之言不能久存于是嵗在降婁降婁中而且竈指之曰猶可以終嵗嵗不及此次也已嵗星十二年而一終言嵗星不再及降婁伯有必先亡也及其亡也嵗在陬訾之口其明年乃及降婁三十三年昭九年夏四月陳災竈曰五年陳將復封封五十二年而遂亡公孫僑問其故對曰陳水屬也陳顓頊之後故屬水火水妃也而楚所相也楚先祝融為火正主治火事今火出而火陳逐楚而建陳也水得妃而興陳興則楚衰故曰逐楚建陳妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也三十四年昭十年有星出于婺女竈言于僑曰七月戊子晉君將死今兹嵗在顓頊之虛謂𤣥枵姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜齊太公女晉唐叔之母星占婺女為既嫁之女邑姜齊之既嫁女妖星在婺女居𤣥枵之維首而齊得嵗故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿四七戊子逢公以登逢公殷諸侯居齊地者曾以戊子日卒登卒也星斯于是乎出逢公死之先妖星出婺女時非嵗星所在故齊自當禍吾是以譏之及期晉平公卒簡公薨事定公定公五年昭十七年有星孛于大辰房心尾也竈言于僑曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火僑弗與明年宋衛陳鄭同日火竈曰不用吾言鄭又將火國人請用之僑不可遊吉曰寶以保民也若有火國幾亡可以救火子何愛焉僑曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告僑曰將有大祥民震動國幾亡吾身泯焉良弗及也國遷其可乎僑曰雖可吾不足以定遷矣及火里析死矣未葬僑使輿三十人遷其柩里析亦鄭大夫也左傳禆諶馮簡子附禆諶鄭大夫簡公二十二年襄二十九年公孫黑將伐良霄大夫和之盟于伯有氏諶曰是盟也其與幾何詩曰君子與盟亂是用長今是長亂之道也禍未歇也必三年而後能紓鬷蔑曰政將焉往諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有魄即良霄子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾定也不然將亡矣諶能謀謀于野則獲謀于邑則否又有馮簡子者能斷大事故公孫僑有事與諶謀于野而使馮簡子斷之左傳渾罕渾罕字子寬鄭大夫簡公二十八年昭四年公孫僑作邱賦邱十六井當出馬一匹牛三頭今僑别賦其田蓋如魯之田賦履畝而賦也國人謗之曰其父死于路已為蠆尾以令于國國將若之何罕以告僑曰何害茍利社禝死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤于人言吾不遷矣罕曰國氏其先亡乎君子作法于凉其敝猶貪作法于貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法政不率法而制于心民各有心何上之有左傳論曰子金立圉而晉惠歸元咺奉叔武而衛成復申謀改立乃所以反其君也然國君惡二討功以罪蓋十九焉僑作邱賦實啓利塗商書曰罔以辨言亂舊政又曰以常舊服正法度詎渾罕有聞而國氏昧之耶政由時變一切而已夫人傳武姜莊母鄧曼莊夫人雍姞莊妾武姜申女武公夫人生莊公及共叔段愛共叔段欲立之亟請于武公公弗許及莊公即位段將襲鄭武姜將啓之公伐段段出奔共遂置姜氏于城潁而誓之曰不及黃泉無相見也既而悔之告潁考叔考叔曰君何患焉若掘地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也泄泄遂為母子如初左傳鄧曼鄧姓祭仲足有寵于莊公公使為卿仲足為公娶鄧曼生昭公雍姞宋雍氏女莊公妾生厲公左傳文芈姜氏文夫人燕姞陳媯江氏蘇氏文妾文芈芈氏楚女姜氏齊女並文公夫人文公三十五年僖二十二年楚子伐宋還芈氏姜氏勞楚子于柯澤楚子使師縉樂師示之俘馘遂入享于鄭享畢夜出芈氏送于軍以二姬歸楚穆公元年僖三十三年楚伐我將納公子瑕瑕死芈氏斂而葬之鄶城之下左傳燕姞南燕氏女文公之賤妾也夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭為國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子敢徵蘭乎公曰諾生穆公名之曰蘭及穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒左傳陳媯陳女初為子儀妻子儀遇弒文公報之漢律淫季父之妻曰報生子華子臧又娶于江生公子士又娶于蘇生子瑕子俞彌左傳亂臣傳共叔段公孫滑公父定叔公子吕附共叔段者武公之子莊公同母弟也母曰武姜武姜生莊公及共叔段莊公寤生驚姜氏遂惡之愛段欲立之亟請于武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而段命西鄙北鄙二于己公子吕曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及段又收二以為己邑至于廩延公子吕曰可矣厚將得衆公曰不義不昵厚將崩段完聚繕甲兵具卒乘將襲鄭武姜將啓之公聞其期曰可矣命公子吕帥車二百乘以伐京京叛段段入于鄢公伐諸鄢段出奔共段之子曰公孫滑段之亂滑出奔衛衛人為之伐我取廪延明年我伐衛討滑亂段之孫曰公父定叔定叔黨祭仲祭仲殺雍紏逐厲公及厲公再入後二年莊十六年公治與于雍紏之亂者殺公子閼刖强鉏定叔出奔衛三年而復之曰不可使共叔無後于鄭使以十月入曰良月也就盈數焉卒諡曰定左傳公子吕字子封某公子未詳祭仲祭仲字足又曰仲足為祭封人事莊公有寵使為卿武公及公為平王卿士王二于虢平王崩周人遂畀虢公政莊公二十三年隱二年仲帥師取溫之麥秋又取成周之禾二十六年隱五年衛人以燕師伐我仲敗燕師于北制三十七年桓五年桓王奪公政公不朝王以諸侯伐我公禦之戰于繻葛王卒大敗祝𥅆射王中肩夜公使仲勞王且問左右三十八年桓六年大子忽敗北戎齊人將妻之忽辭仲曰必取之君多內寵子無大援將不立三公子子突子亹子儀皆君也弗從四十三年桓十一年莊公薨大子忽立是為昭公仲為公取鄧曼生昭公故仲立之宋雍氏女雍姞生子突雍氏有寵于宋宋誘仲而執之曰不立突將死亦執突而求賂焉仲與宋人盟以突歸而立之是為厲公昭公奔衛公羊賢祭仲以為知權也祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡少遼緩之則突可故出而忽可故反古人之有權者祭仲是也榖梁立惡而黜正惡祭仲也榖梁說是厲公四年桓十五年仲専公患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告仲曰雍氏舍而室而將享子于郊吾惑之以告仲殺雍紏尸諸周氏之汪厲公出奔蔡昭公入昭公立二年髙渠彌弒之立子亹子亹元年桓十八年齊侯師于首止子亹會之髙渠彌相齊人殺子亹而轘髙渠彌仲逆子儀于陳而立之是行也仲知之故稱疾不往人曰祭仲以知免仲曰信也仲卒傅瑕弒子儀厲公復入左傳尉止司臣堵女父侯晉子師僕尉翩附司齊堵狗尉止司臣侯晉堵女父子師僕並鄭士也公子騑與尉止有爭簡公三年襄十年諸侯伐我師于牛首將禦諸侯之師公子騑黜其車抑之曰爾車非禮也尉止獲囚俘又與之爭弗使獻騑為田洫司氏堵氏侯氏子師氏皆喪田焉故五族羣聚不逞之人因公子之徒以作亂公子騑殺公子熙公子狐等事見騑傳冬十月帥賊以入晨攻執政于西宫之朝殺公子騑公子發公孫輒劫公以如北宫國人攻之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋翩尉止子齊司臣子也八年襄十五年我納賂于宋以請餘盜公孫黑為質焉宋歸堵女父尉翩司齊良司臣而逸之託諸魯我醢堵女父尉翩司齊宋復歸司臣堵女父之族有堵狗者娶于晉范氏既醢堵女父遂奪狗之妻歸諸范氏左傳論曰豫讀叔于田之詩以為民歸段仁及審其行而後知其愚也夫段武姜寵子也陷而辟之害恩弗辟害義莊公蔓草其弟滋蔓焉而後藴崇芟剃之曰是得罪于天豫無與也嗟乎段誠愚而莊亦忍矣是故天王殺其弟佞夫弟之者罪王也鄭伯克段于鄢不弟之者段不弟鄭伯不弟之所以深罪鄭伯也逆臣傳髙渠彌傅瑕髙克附髙渠彌即髙伯事莊公為卿莊公三十七年桓五年桓王伐我渠彌以中軍敗王于繻葛初莊公將以渠彌為卿昭公惡之固諫不聽及昭公立懼其殺己也二年桓十七年弒昭公立公子亹明年齊人殺子亹而轘渠彌傅瑕初事子儀為大夫子儀十四年莊十四年厲公自櫟侵鄭及大陵獲瑕瑕曰茍舍我吾請納君與之盟而舍之夏六月瑕殺子儀及其二子而納厲公厲公入遂殺瑕髙渠彌之後髙克為文公大夫好利而不顧其君文公惡之使克帥師次于河上久而弗召師潰而歸克奔陳鄭人為之賦清人左傳公子歸生公子宋公子歸生字子家公子宋字子公並鄭大夫也事穆公穆公三年文二年歸生會諸侯之大夫伐秦取汪及彭衙十四年文十三年魯侯朝晉還公會之請平于晉與魯侯宴于棐歸生賦鴻鴈義取哀恤鰥寡季孫行父賦四月取行役踰時歸生賦載馳之四章取有急欲助行父賦采薇之四章取豈敢定居示許為鄭還晉公拜魯侯答拜二十一年宣二年歸生受命于楚伐宋及宋戰于大棘宋師敗績獲華元樂吕穆公薨靈公即位靈公元年宣四年楚人獻黿于公公子宋及歸生將見宋之食指動以示歸生曰向日我如此必嘗異味及入宰夫將解黿相視而笑公問之歸生以告及食大夫黿召宋而弗與宋怒染指于鼎嘗之而出公怒欲殺宋宋與歸生謀先歸生曰畜老猶憚殺之而況君乎反譖歸生歸生懼而從之夏弒靈公襄公即位宋既弒君謀從晉以求媚襄公三年宣七年及晉平宋襄公會諸侯盟于黑壤五年宣十年歸生卒國人討靈公之亂斫歸生之棺而逐其族改葬靈公左傳公子騑子駟公子騑字子駟穆公之子也厯事靈襄悼三公為卿成公三年成九年晉執成公公子班立公子繻國人殺繻立成公大子髠頑公子班奔許明年騑為質于晉成公歸七年成十三年公子班入殺子印子羽反軍于市騑帥國人盟于大宫從而盡焚之殺班十年成十六年我叛晉騑從楚子盟于武城夏晉伐我我使告于楚大夫姚句耳與往楚救我過申句耳先歸騑問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也六月晉楚遇于鄢陵楚師敗績十一年成十七年騑侵晉虛渭十四年襄二年公有疾騑請息肩于晉公曰楚君為鄭故親集矢于其目若背之是棄力與言也秋成公薨僖公即位公子喜當國公子發為司馬騑為政晉師侵我諸大夫欲從晉騑曰官命未改不欲違成公意冬乃及晉平僖公五年襄七年公將會諸侯于鄬騑相不禮焉侍者諫不聽又諫殺之及鄵騑使賊夜弒公而以瘧疾赴于諸侯簡公生五年奉而立之簡公元年襄八年羣公子以僖公之死也謀騑騑先之辟殺公子狐子熙子侯子丁子狐之子孫擊孫惡出奔晉冬楚伐我騑欲從楚曰周詩有之曰俟河之清人夀幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待于二竟以待强者而庇民焉冦不為害民不罷病不亦可乎公孫舍之曰小所以事大信也小國無信兵亂日至亡無日矣五會之信五會謂雞澤戚城棣鄬邢邱今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎騑曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道請從楚騑也受其咎乃及楚平二年襄九年晉伐我我成將盟六卿皆從公晉為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀攸曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也乃盟而還冬楚伐我騑又將及楚平諸大夫曰與大國盟口血未乾而背之可乎騑曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平三年襄十年尉司五族作亂殺騑于西宫之朝左傳論曰渠彌傅瑕之賊君救死也若夫動口腹之欲以成惡不亦惑乎夫逆德大惡也弒君顯辟也死而可逃斫棺其已乎騑之無上不以國誅而死西宫之盜幸矣尚史卷五十五
