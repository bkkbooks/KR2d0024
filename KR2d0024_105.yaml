body:
  text: 尚史卷一百六志十四鑲白旗漢軍李鍇撰齊諸氏髙氏髙傒齊上卿髙敬仲也傒生髙莊子其後為宣子固固生無咎及厚靈公逐無咎無咎子弱以盧叛厚嗣髙氏莊公即位崔杼殺厚厚生止止被放止子豎以盧叛齊以傒之曾孫酀嗣髙氏酀生偃偃生昭子張張立公子荼陳乞鮑牧攻之張奔魯又有髙發者景公時發帥師伐莒又有髙齮臣梁邱據見據傳又有髙無丕簡公時無丕及國書帥師伐魯及清戰于郊既而魯會吳伐我克博至于嬴國書將中軍無丕將上軍宗摟將下軍以禦之戰于艾陵吳展如敗無丕國書敗吳胥門巢會吳卒助之我師敗績及陳恆弒簡公無丕奔北燕後復歸齊又帥師禦晉荀瑶戰于犂邱我師敗績左傳國氏國歸父齊上卿國莊子也歸父生武子佐佐生勝及弱靈公時佐殺慶克以盧叛公殺佐及勝弱奔魯既而反弱嗣國氏是為景子佐孫惠子夏陳乞殺公子荼夏奔魯後有國書悼公時魯殺之書生觀平公時晉趙鞅圍衛觀及陳瓘救衛左傳鮑氏鮑叔牙姒姓鮑敬叔之子也叔牙曾孫為莊子牽牽弟文子國國孫牧牧立悼公又欲立羣公子悼公殺之左傳管氏管仲山生管敬仲夷吾夷吾生武子鳴鳴生桓子啓方啓方生成子孺孺生莊子盧盧生悼子其夷其夷生襄子武武生景子耐步世本夷吾之後又有管修仕楚為賢大夫白公作亂殺之左傳晏氏晏弱是為晏桓子桓子生嬰嬰生圉悼公初陳鮑攻髙國圉奔魯又有晏父戎晏氂莊公伐衛以晏父戎為右自衛遂伐晉取朝歌戍郫邵封少水乃還晉趙勝追之獲晏氂左傳欒氏髙氏公孫竈公孫蠆並惠公孫竈為欒氏生欒施蠆為髙氏生髙疆景公時陳無宇伐欒髙施疆奔魯後適晉左傳崔氏崔杼武子也杼生成及疆又生明杼廢成立明成與疆怒殺相棠東郭偃杼告慶封慶封殺成與疆明奔魯左傳慶氏慶克通于靈公母聲孟子者也克生封及佐封生舍封田于萊陳無宇將攻舍慶嗣説封歸封不聽遂殺舍及慶嗣與並慶氏之族也封奔魯後奔吳楚靈王殺之盡滅其族左傳衛諸氏石氏石碏生厚厚黨州吁碏殺之碏四世孫石成子稷稷生共子買買生悼子惡惡黨寧氏出奔晉立其從子圃守石氏圃逐莊公及君起出公逐圃而復石魋魋系未詳又有石駘仲駘仲生祁子懿公使祁子守國狄滅之左傳寧氏寧氏出自武公公族也寧莊子速速之後武子俞俞生相相之後惠子殖俞蓋速子殖蓋相子殖生悼子喜殖逐獻公既卒命喜復之喜遂弒殤公復獻公獻公殺喜寧氏遂絶惠公時有寧跪為大夫公子泄公子職逐惠公及惠公再入放跪于秦出公輒時又有寧跪跪救晉范氏于五鹿左傳孫氏孫昭子衛同姓食邑于戚其後為孫桓子良夫良夫生文子林父林父生襄嘉蒯林父逐獻公立殤公獻公復入林父以戚叛如晉孫氏遂絶左傳孔氏孔嬰齊事懿公狄與衛戰于熒澤也渠孔御戎子伯為右黃夷前驅嬰齊殿衛師敗績狄滅衛其後孔達達孫成子蒸鉏蒸鉏子羈羈孫文子圉圉子悝悝納莊公莊公既立飲悝酒而遣之悝奔宋左傳世叔氏世叔儀是為大叔文子儀之孫懿子申申之子悼子齊齊取二妻又淫于外州外州人奪之軒恥是二者出奔宋國人立齊弟僖子遺嗣世叔氏左傳公叔氏公叔發是為公叔文子發生戍靈公惡其富逐戌戍奔魯左傳北宫氏北宫括成公曾孫所謂北宫懿子也括生文子他及遺他之後有北宫喜喜蓋他子喜逐靈公靈公入賜喜諡曰貞子靈公時又有北宫結公欲叛晉諸大夫不可公使結如齊而私于齊侯曰執結而侵我欲以齊懼諸大夫齊侯從之及齊盟于沙久之公逐公叔戍結奔魯左傳南氏公子郢靈公子也字子南故曰南氏郢生公孫彌牟及惠子蘭蘭廢適子虎立庶子言偃譏之虎乃立又有公孫免餘公孫臣公孫丁蓋皆公族也左傳鄭諸氏皇氏皇武子族未詳事文公其後有皇戍戍子耳簡公時耳帥師侵衛為衛所獲又有皇辰皇頡成公時辰會楚伐宋侵城郜取幽邱同伐彭城納宋魚石簡公時楚侵鄭頡戍城麋出與楚師戰為楚所獲穿封戍與公子圍爭頡以頡歸左傳石氏石甲父族未詳事文公其後有石楚石首石㲋首事成公㲋事僖公左傳侯氏侯宣多族未詳事文公其後有侯羽侯孺侯晉成公時羽軍楚師囚鍾儀而獻諸晉孺嘗為質于楚晉黨尉氏司氏國人攻之晉奔楚左傳子人氏公子語莊公之子也字子人遂為子人氏其後曰子人九左傳良氏以下十一族並穆公子公子去疾字子良是為良氏去疾生公孫輒輒生良霄公孫黑伐之霄奔雍梁既而入伐舊北門霄死公孫僑立霄之子止左傳遊氏公子偃字子遊是為遊氏偃生公孫蠆蠆生遊眅眅生良及吉遊眅奪人妻其夫殺眅于是廢遊良而立吉吉生連吉之從祖曰遊楚楚亦穆公孫與公孫黑爭妻公孫僑放楚于吳左傳國氏公子發字子國是為國氏尉氏司氏作亂發死發生公孫僑僑生國參左傳罕氏公子喜字子罕是為罕氏喜生公孫舍之及公孫鉏舍之生罕虎虎字子皮又為子皮氏虎生嬰齊及魋嬰齊生達公孫鉏嘗為馬師遂為馬師氏鉏生朔子皮氏飲酒無度故馬師氏與子皮氏有惡簡公時朔殺魋奔晉左傳駟氏公子騑字子駟是為駟氏騑生公孫夏公孫黑夏生駟帶駟乞帶生偃偃生絲偃卒絲弱其父兄立乞乞生顓公孫黑生駟印黑欲去遊氏而代其位公孫僑討之黑縊又有駟𢎞系未詳字子般聲公時齊輸晉范氏粟𢎞送之晉敗我師于鐵追我師𢎞及罕達公孫林殿而射前列多死宋圍曹𢎞帥師救曹侵宋晉荀瑶伐我𢎞請救于齊荀瑶還後瑶將圍我未至𢎞曰知伯愎而好勝早下之則可行也乃先保南里以待之又有駟秦富而侈嬖大夫也而常陳卿之車服于其庭國人惡而殺之左傳印氏公子印名未詳是為印氏成公時為公子班所殺子印生公孫黑肱黑肱生印段段生癸又有印堇父系未詳為大夫簡公時堇父與皇頡戍城麋楚及秦侵我囚頡及堇父以獻于秦國人取貨于印氏以請之遊吉為令正主辭令之正以為請公孫僑曰不獲受楚之功而取貨于鄭不可謂國秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不豫更幣從僑而後獲之左傳豐氏公子豐名未詳是為豐氏子豐生公孫段段生豐施又有豐卷字子張系未詳簡公時公孫僑為政卷將祭請田焉請田獵以供祭祀僑弗許曰唯君用鮮衆給而已卷怒退而徵役將攻僑僑奔晉罕虎止之而逐卷卷奔晉僑請其田里三年而復之反其田里及其入焉左傳孔氏公子嘉字子孔是為孔氏嘉生公孫泄簡公時尉氏司氏之亂嘉知之嘉又欲去諸大夫將叛晉而起楚師以去之國人伐之殺嘉公孫僑立泄嗣孔氏嘉之孫為孔張左傳然氏公子然名未詳是為然氏子然生然丹鄭殺公子嘉然丹奔楚又有然明是為鬷蔑左傳子孔氏士子孔名未詳亦字子孔故别曰子孔氏士子孔生子良鄭殺公子嘉子良奔楚左傳羽氏公子羽名未詳成公時為公子班所殺子羽孫曰羽頡良霄因頡以伐舊北門霄死頡出奔晉羽氏遂絶左傳尉氏司氏堵氏侯氏子師氏尉止司臣堵女父侯晉子師僕並鄭士也尉止生翩司臣生齊堵女父之族曰堵狗簡公時五族作亂國人殺尉止子師僕醢司臣司齊尉翩堵女父唯侯晉奔晉晉奪堵狗妻歸諸范氏左傳楚諸氏薳氏即蒍氏薳章族未詳章之後吕臣及蒍賈鬭椒惡賈殺之于轑陽賈生蒍艾獵是為孫叔敖艾獵從子蒍子馮子馮之子掩郟敖時公子圍殺掩又有薳啓疆薳射薳罷薳泄薳越薳固又有薳居靈王時作亂殺大子祿而公子棄疾立左傳鬭氏鬭伯比若敖氏若敖為楚八世祖及若敖氏娶于鄖生鬭伯比伯比生穀於莵及子良子良名未詳榖於莵生般般生克黃子良生椒椒生苗賁皇莊王時椒殺般又殺蒍賈將攻王王滅若敖氏而使克黃嗣苗賁皇奔晉穀於莵之曾孫曰棄疾為宫廏尹事靈王伐徐之役吳敗我師于房鍾獲棄疾棄疾生韋龜亦事靈王王欲遷許于賴使韋龜與公子棄疾城之而還韋龜生蔓成然蔓成然作亂弒靈王成然生三子曰辛懷巢吳入郢辛及巢從昭王奔隨鬭氏之族又有鬭廉鬭御疆鬬梧耿之鬭班又有鬭祈鬭勃鬬且鬬章章事成王我伐鄭章囚鄭𥅆伯又使章請平于晉晉陽處父報之晉楚始通又有鬭宜申謀弒穆王王殺之左傳成氏成得臣亦若敖氏之族也得臣生大心大心生熊公羊成熊作成然鬭椒作亂至靈王時王以鬭成同出若敖殺熊又有成嘉若敖之曾孫為穆王令尹左傳屈氏屈氏楚同姓也屈瑕為武王莫敖瑕之後有屈重屈完完之族有屈禦冦字子邊為息公戍商密秦降商密囚以歸其後有屈蕩蕩生到到生建建生生又别有屈蕩事康王康王以屈到為莫敖蕩為連尹到卒以屈建為令尹蕩為莫敖與到建同時而同其父祖名傳或誤屈蕩生申申亦為莫敖事靈王王伐吳使申圍朱方克之執齊慶封盡滅其族既而以申二于吳殺之又有屈巫即巫臣為莊王申公叛入晉又有屈罷平王初立使罷簡東國之兵于邵陵且撫其民左傳又有屈原為懷王左徒史記頃襄王時有屈署國策觀氏彭氏觀丁父為武王軍率其後曰觀射父射父後曰觀起起生從從為卜尹召公子比為亂又有觀瞻為惠王開卜大夫彭仲爽為文王令尹其後曰彭名名之後曰彭生左傳申叔氏申氏申叔侯為申公成王使之戍榖去榖者叔侯之後有申叔時時孫曰申叔豫又有申叔展又别有申氏曰申無畏無畏生犀又有申無宇無宇生亥又有申包胥又有范山國語申無宇曰范無宇固知范山亦申後穆王時為大夫晉靈公即位范山言于王曰晉君少不在諸侯北方可圖也穆王師于狼淵以伐鄭鄭及我平左傳潘氏潘崇為大子商臣師弒成王崇之後為尫尫生黨左傳伍氏伍參莊王嬖人參子舉是為椒舉舉生鳴及奢奢生尚及尚弟員奢為大子建師費無極譛之平王殺奢及尚員奔吳遂覆楚入郢左傳昭氏昭奚恤宣王相懷王時有昭陽又有昭雎昭過又有昭魚頃襄王時有昭常昭蓋左傳景氏景舍事宣王頃襄王時有景陽景鯉國䇿宋諸氏皇氏以下戴族皇父充石戴公子充石之後有皇鄖又有皇瑗為右師瑗生麋或誣麋將納桓氏景公殺麋及瑗已而復皇氏之族使瑗從子緩為右師又有皇野野生非我非我從昆弟曰皇懷又有皇國父為大宰為平公築臺妨于農功所謂澤門之晳者也元公時又有皇奄黨華向出奔楚左傳華氏華督戴公孫督孫御事御事生元元生閲及臣閲生皋比閲卒華臣殺其宰臣出奔陳又有華合比合比庶兄曰牼弟曰亥亥誣合比將納臣平公逐合比合比奔衛督曾孫曰華耦又有華椒文公時楚伐蕭椒以蔡人救蕭蕭潰椒及晉衛曹同盟于清邱椒生弱及定弱為平公司馬弱與樂轡少相狎長相優又相謗也樂轡怒以弓梏弱于朝公見之曰司武而梏于朝難以勝矣逐之弱奔魯定為平公司徒元公即位惡華氏向氏華亥華定向寧殺羣公子劫公時華氏之族費遂為大司馬貙多僚登並其子也公使費遂攻華向華向奔陳華登奔吳登亦其黨也已而多僚譛貙將納亡人公謀逐貙貙臣張丐殺多僚召華向華向自陳入宋師齊師敗之華妵歸華氏華豹死之亥定貙登出奔楚華氏遂絶左傳樂氏樂豫戴公玄孫文公時有樂吕平公時有樂喜是為司城子罕杜預注司城樂氏之大宗也蓋其先當是戴公之長庶子喜逐樂轡轡亦其族也喜孫舍挽祁犂舍黨元公華向之亂出奔鄭挽為元公大司冦子朱鉏為景公大司冦祁犂為元公司城祁犂子溷溷逐樂大心大心亦其族也溷子茷茷為景公司城公薨茷及樂得逐大尹立昭公樂得亦戴族也文公時有樂嬰齊楚圍我我使嬰齊告急于晉共公時有樂裔老佐公薨魚石叛華元使裔為司冦老佐為司馬遂圍魚石于彭城而老佐卒老佐戴公五世孫也平公時有樂懼樂將鉏懼戴公六世孫鄭伐我懼將鉏敗諸汋陂退舍于夫渠不警鄭人覆之敗諸汋陵獲懼及將鉏景公時有樂髠帥師伐曹左傳仲氏莊族公子成莊公子公孫固莊公孫公孫師亦莊公孫師子仲江江之孫幾幾子他他為卿事景公及公子辰出奔陳左傳向氏以下桓族向戍桓公曾孫是為合左師戍生寧宜鄭寧劫元公與華亥作亂宜及鄭黨元公以晉師敗華氏又有向勝向行亦黨元公華亥殺羣公子拘勝行于其廩又有向為人向􅙮為人為大司冦􅙮為大宰共公薨蕩山殺公子肥華元殺山向氏魚氏五大夫出奔楚後降晉又有向寧寧及華氏劫元公公攻之華向奔陳戍曽孫曰巢巢弟魋魋弟子頎子車魋有寵而害于景公公使巢攻之魋入于曹以叛巢伐之不克亦入于曹魋奔衛巢奔魯魋弟又有司馬牛左傳魚氏公子目夷字子魚是為魚氏桓公之子目夷子公孫友友孫魚石世為左師又有魚府為少宰共公薨魚石魚府五大夫出奔左傳鱗氏鱗矔桓公孫為司徒矔生朱為共公少司冦及魚向五大夫出奔左傳蕩氏公子蕩桓公子蕩生公孫夀夀生蕩意諸世為司城襄夫人殺昭公意諸死之文公使意諸弟蕩虺為司馬意諸生山共公薨山弱公室殺公子肥華元殺山左傳褚師氏褚師段共公之子褚師市官蓋以官為氏段生石彄為景公卿及公子辰出奔陳又有楚師子肥為景公大夫滅曹左傳陳諸氏轅氏轅濤塗為宣公大夫濤塗之後曰選其四世孫曰僑閔公時有轅頗轅買頗出奔鄭買出奔楚左傳針氏針子為桓公大夫其八世孫曰針宜咎黨慶氏出奔楚左傳慶氏慶虎慶寅為哀公大夫虎寅以陳叛楚役人殺虎及寅又有慶樂楚殺之左傳尚史卷一百六
