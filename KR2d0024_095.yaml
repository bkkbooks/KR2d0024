body:
  text: 尚史卷九十六志四鑲白旗漢軍李鍇撰地理志上夫天地既判人智參通其建標荒度必有由來矣逮乎黃帝推分星次以定律度取象渙隨舟車致用而後畛域分焉顧時移世短書契闕如所可論擬唯唐虞而已至其九州分合山川附屬又易代而推移焉固可按籍而求也述地理志地東西為廣南北為輪家語山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死邱陵為牡溪谷為牝周禮東至於泰逺西至於邠國南至於濮鉛北至於祝栗謂之四極觚竹北户西王母日下謂之四荒九夷八狄七戎六蠻謂之四海距齊州以南戴日為丹穴北戴斗極為空桐東至日所出為太平西至日所入為大䝉太平之人仁丹穴之人智大蒙之人信空桐之人武爾雅禹使豎亥步自東極至於西極五億十選選萬也九千八百步淮南子禹使大章步自西極二億三萬三千五百里七十五步詩合神霧天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里四海之內則東西二萬八千里南北二萬六千里出水者八千里受水者八千里山海經諸子稱神農之王天下也地東西九十萬里南北八十五萬而他說稱日月所照三十五萬里考諸子所載神農之地過日月之表近為虛誕及少昊氏之衰九黎亂德其制無聞洎顓頊之所建帝嚳受定則孔子稱其地北至幽陵南暨交趾西蹈流沙東極蟠木日月所照莫不底屬帝王世紀史記鄒衍云所謂中國者天下八十一分之一耳中國名曰赤縣內自有九州禹之九州是也不得為州數中國外如赤縣州者亦謂之九州有禆海環之如一區中者乃為一州如此者九都有大瀛海環其外此謂八極而天地際焉淮南子􅣹形之所載六合之間四極之內昭之以日月經之以星辰紀之以四時要之以太嵗天地之間九州八極何謂九州東南神州曰農土正南次州曰沃土西南戎州曰滔土正西弇州曰并土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隱土正東陽州曰申土九州之大純方千里九州之外乃有八殥亦方千里自東北方曰大澤曰無通東方曰大渚曰少海東南方曰昃區曰元澤南方曰大夢曰浩澤西南方曰渚資曰丹澤西方曰九區曰帛澤西北方曰大夏曰海澤北方曰大冥曰寒澤凡八殥八澤之雲是雨九州八殥之外而有八紘亦方千里自東北方曰和邱曰荒土東方曰棘林曰桑野東南方曰大窮曰衆女南方曰都廣曰反户西南方曰焦僥曰炎土西方曰金邱曰沃野西北方曰一目曰沙所北方曰積冰曰委羽凡八紘之氣是出寒暑以合八正必以風雨八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八殥八澤之雲以雨九州而和中土太𤣥經九地一沙泥二澤浼三征崖四下田五中田六上田七下山八中山九上山博物志地以名山為輔佐石為之骨川為之脈草木為之毛土為之肉三尺以上為糞三尺以下為地又曰崑崙山北地轉下三千六百里有八元幽都方二十萬里地下有四柱四柱廣十萬里地有三千六百軸犬牙相舉尚書考靈曜地有四逰冬至地上北三萬里夏至地下南三萬里春秋二分則其中矣地常動不止如人在舟舟行而人不覺按四柱四逰之說殊荒誕蓋地形如丸積氣浮之而四時太陽循乎赤道故至有南北是四柱不知地四逰不知天泰山為東嶽博物志泰山一曰天孫東方萬物始成故知人生命之長短五經通義一曰岱宗言王者受命易姓報功告成必於岱宗東方萬物始交代處華山為西嶽西山經華山一名太華山削成而四方霍山為南嶽荆州記衡山南嶽也至軒轅以灊霍之山為其副故爾雅云霍山為南嶽蓋因其副焉郭璞注霍山在盧江郡潜縣别名天柱恆山為北嶽風俗通恆常也萬物伏北方有常亦謂常山白虎通北方為常山者隂終陽始其道常久故曰常山嵩髙為中嶽白虎通中央居四方之中可髙故曰嵩髙梁山晉望也爾雅周職方氏掌九州州有名山為地鎮冀州其鎮山曰霍山注即太嶽與廬江者别并州其鎮山曰恆山東北幽州其鎮山曰醫無閭正東青州其鎮山曰沂山河東兖州其鎮山曰岱山河南豫州其鎮山曰華山東南揚州其鎮山曰㑹稽正南荆州其鎮山曰衡山正西雍州其鎮山曰嶽山周禮岱宗謂之泰山天柱謂之霍山華山謂之太華常山謂之恆山外謂之崏嵩岣嶁之衡山蜀山謂之崏山吳山謂之開山薄落謂之开頭土髙有石山山産也石䄷也冡腫也嶽確也凡天下名山五千二百七十出銅之山四百六十有七出鐵之山三千六百九十崑崙虛有三山閬風板銅元圃其髙萬一千一百一十里一十四步二尺六寸博雅河圖崑崙之墟五城十二樓河水出焉大荒西經赤水之後黑水之前有山曰崑崙之丘有神人面虎身有尾水經崑崙墟在西北去嵩髙五萬里地之中也其髙萬一千里河水出其東北陬史記崑崙甚髙三千五百餘里日月所相避隱為光明也博物志崑崙從廣萬一千里神物之所生聖人神仙之所集五氣雲氣五色流水其泉東南流入中國名為河天下名山八三在夷五在中國華山首陽山太室山少室山東太山此五山黃帝之常逰史記淮南子謂九山㑹稽泰山王屋首山太華岐山太行羊腸孟門陳有宛丘郭璞注在陳郡陳縣晉有潛丘在太原晉陽縣淮南有州黎丘在夀春縣天下有名丘五其三在河南二在河北說者多以州多寃營為河南潛敦為河北恐未足以當之殆别有傑大者五但未詳其名號耳東陵􅀈南陵息慎西陵威夷中陵朱滕北陵西隃鴈門是也陵莫大於加陵梁莫大於溴梁墳莫大於河墳爾雅禹所謂八陵者也魯有大野郭璞注髙平巨野縣東北大澤晉有大陸巨鹿北廣河澤秦有楊陓扶風汧縣西宋有孟諸梁國惟陽縣東北楚有雲夢南郡華容縣東南巴丘湖吳越之間有具區吳縣南太湖齊有海隅海濵廣斥燕有昭余祁太原塢陵縣北九澤鄭有圃田滎陽中牟縣西圃田澤周有焦護扶風池陽縣郀中爾雅禹所謂十藪者也周有八藪冀州楊紆并州昭餘祁幽州豯養青州望諸即孟諸兖州大野豫州圃田揚州具區荆州雲曹雍州弦蒲周禮水自河出為灉釋名作雍沛濟為楚汶為灛洛為波漢為潛淮為滸江為沱濄為洵潁為沙汝為墳博雅水自渭出為澩自汾出為𣲖江河淮濟為四瀆四瀆者發原注海者也河出崑崙虛色白所渠并千七百一川色黃百里小曲千里一曲一直爾雅江出岷山濟出王屋淮出桐柏博物志河之出昆崙虛也山海經崑崙山有青河白河赤河黑河環其墟其白水出其東北陬屈向東南流為中國河博雅崑崙墟赤水出其東南陬河水出其東北陬洋水出其西北陬弱水出其西南陬東流潜行地下至規期山北流分為兩源一出䓤嶺一出于闐其河復合河注蒲昌海復潜行地下南出積石山西南流又東廽入塞燉煌酒泉張掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東入河河東即龍門所在至華隂潼關與渭水合又東廽過砥柱山名陕州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成臯與濟水合又東北流過武德與沁水合至黎陽信都信都冀州絳水所在巨鹿之北遂分為九河又合為一河而入海水經九河者徒駭太史馬頰覆釜胡蘇簡潔鉤盤鬲津也爾雅河圖河導崑崙山東流千里至規期山北流千里至積石山邠南千里入龍首山間抵龍門首南流千里抵龍首至卷重山東流貫砥柱觸閼流山西距卷重山千里東至雒㑹東流至大岯山東流過洚水至大陸孝經援神契河者水之伯上應天漢吕氏春秋古龍門未開吕梁未發河出孟門大溢逆流名曰洪水禹乃决流疏河為彭灃之漳所活者千八百國桓談新論四瀆之源河最髙而長從髙注下其流激迅故為平地災害江之出岷山也其源若甕口可以濫觴在益州建寧滿江縣潜行地底數里至楚都遂廣十里名為南江初在犍為與青衣水汶水合至洛縣與洛水合東北至巴郡與涪水漢水白水合東至長沙與灃水沅水湘水合至江夏與沔水合至潯陽分為九道潯陽記九江者白鳥江蚌江烏土江嘉靡江畎江浮江禀江提江菌江東㑹於彭澤經蕪湖名為中江東北至南徐州名為北江而入海山海經三江者大江南江北江也岷山大江所出崍山南江所出東注大江崌山北江所出東注大江按禹貢漢水出嶓冡其流東滙彭蠡又東為北江江水出岷山其流東迤北㑹於滙又東為中江孔安國注左合漢為北江㑹彭蠡為南江岷江居其中為中江書稱東為中江者明岷江至彭蠡與南北合始得稱中也韋昭注三江松江錢塘江浦陽江沈懷逺南越志廣信江始安江鬱林江亦為三江是又三江之在吳越者江之别又有郫江任豫益州記亦曰涪江曰湔水在蜀與洛水合汶江益州記源出王輪阪下墊江崔鴻西京記水經仇池過晉夀山沱渠始號墊江至巴郡入大江弱桞江緣江記西江别支浙江山海經出三天子都地理志出新安黟縣南蠻中顧野王云發源東陽新安之間不與岷江相涉至錢塘入海松江劉澄之揚州記吳縣有松江自吳入海濟之出王屋也風俗通濟水出常山房子縣贊皇山此别是一水應氏以為流入河南之濟者非是初名沇水東出溫縣西北始名濟水又東南流當鞏縣之北而南入河與河並流過成臯晉志濟自大伾入河與河水鬭而東流溢出為滎水東流過陽武及封丘縣北又東過宛昫縣南至定陶縣南又東北流與河水㑹東至乘氏縣西分而為二其一東北流入巨野澤過夀張西與汶水合又北過榖城縣西又東北過盧縣北過臨濟縣南又東北經樂安縣南而入海其一東南流過昌邑縣北金鄉縣南至方輿為荷水過沛縣東北至下邳而入淮淮之出桐柏也山海經淮水出餘山餘山在朝陽東義鄉水經淮水出南陽平氏縣胎簮山東北過桐柏山其源初則涌出復潜流三十里然後長騖東北經大復山從義陽郡北東過江夏平春縣北又東過新息縣南期思縣北至原鹿縣南與汝水合又東過廬江安豐縣與决水合東北至九江夀春縣東與潁水合夀春縣北與淝水合又東至當塗縣北與渦水合東北至下邳淮隂縣與泗水合東至廣陵淮浦縣而入海水經八流亦出名山渭出鳥鼠水經注渭水出首陽山渭首亭南谷山在鳥鼠山西也漾出嶓冡禹貢嶓冡導漾東流為漢又為沔水所謂沔漢者也山海經漢出鮒嵎山洛出熊耳水經洛水出上洛縣歡舉山東徑熊耳山潁出少室地理志出陽城縣陽乾山汝出燕泉水經出梁縣勉鄉西天息山地理志出髙陵山亦言出南陽魯陽縣大盂山又言出𢎞農盧氏縣還歸山泗出陪尾山海經泗水出吳東北水經出魯下縣北山地理志出濟隂乘氏縣水經注出下縣故城東南桃墟西際阜俗謂之媯亭山陪尾蓋斯阜矣溜出月台山海經陽山留水出焉而南流注於河沂出泰山博物志水經出泰山蓋縣艾山康成云出沂山亦或云臨樂山淮南子何謂六水河水赤水遼水黑水江水淮水周職方氏掌九州州有川浸冀州其川漳水水經濁漳水出上黨長子縣發鳩山其浸汾潞水經汾水出太原汾陽縣北管涔山并州其川呼池嘔夷其浸淶易幽州其川河泲豯養其浸菑時青州其川淮泗其浸沂沐兖州其川河泲其浸盧維豫州其川熒雒其浸波溠揚州其川三江其浸五湖荆州其川江漢其浸潁湛雍州其川涇汭其浸渭洛周禮中古之地但有九州禹治水作貢亦因其舊曰冀州三面距河兖河之西雍河之東豫河之北濟河惟兖州東南距濟西北距河海岱惟青州東北至海西南距岱海岱及淮惟徐州東至海南至淮北至岱淮海惟揚州北至淮東南至海荆及衡陽惟荆州東距南條荆山南盡衡山之陽荆河惟豫州西南至南條山北距大河華陽黑水惟梁州東距華山之南西距黑水黑水西河惟雍州西距黑水東距西河所謂九州攸同是也及舜即位以冀青地廣分冀為幽并分冀東恆山之地為并州東北醫無閭之地為幽州分青為營分靑之東北遼東為營州所謂肇十有二州是也尚書水漢書堯遭洪天下分絶為十二州使禹治之水土既平更制九州既而復為九州殷時九州有幽營無青梁爾雅殷郭璞注蓋制周時九州有幽并無徐梁周禮輿地志周成王時以徐梁合之於青雍分冀州為幽并河圖九州殊題水泉剛柔各異青徐角羽集寬舒遲人聲緩其泉酸以鹹荆揚角徴㑹氣漂輕人聲急其泉酸以苦梁州商徴接剛勇漂人聲騫其泉苦以辛兖豫宫徴合平净有慮人聲端其泉甘以苦雍冀合商羽端駃烈人聲捷其泉辛以酸周周地桞七星張之分野也有河南雒陽榖成平隂偃師鞏緱氏周人巧僞趨利貴財賤義髙富下貧喜為啇賈不好仕宦漢書博物志周在中區西阻崤谷東望荆山南面少室北背太嶽三河之分雷風所起四險之國也秦秦地於天官東井輿鬼之分野也其界自𢎞農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂柯越嶲益州其民有先王遺風好稼穡務本業有鄠杜竹林南山檀柘號稱陸海為九州膏腴漢書博物志秦前有藍田之鎮後有胡苑之塞左崤函右隴蜀西通流沙險阻之國也魏魏地觜觽參之分野也其界自髙陵以東盡河東河內南有陳留及汝南之召陵㶏疆新汲西華長平潁川之舞陽郾許傿陵河南之開封中牟陽武酸棗卷俗剛強多豪傑侵奪薄恩禮好生分河東土地平易有鹽鐵之饒漢書博物志魏前枕黃河背漳水瞻王屋望梁山有藍田之寶浮池之淵韓韓地角亢氐之分野也得南陽郡及潁川之父城定陵襄城潁陽潁隂長社陽翟郟東接汝南西接𢎞農得新安宜陽土狹而險山居谷汲其俗夸奢上氣力好啇賈漁獵藏匿難制御也漢書趙趙地昴畢之分野也得趙國北有信都真定常山中山又得涿州之髙陽鄚州鄉東有廣平巨鹿清河河間又得渤海郡之東平舒中邑文安束州成平章武河以北也南至浮水繁陽內黃厈邱西有太原定襄雲中五原上黨丈夫相聚遊戲悲歌慷慨起則椎剽掘冢作姦巧多弄物漢書博物志趙東臨九州西瞻恆嶽有沃瀑之流飛壺井陘之險至於潁陽涿鹿之野燕燕地尾箕分野也東有漁陽右北平遼西遼東西有上谷代郡雁門南得涿郡之易容城范陽北新城故安涿縣良鄉新昌及渤海之安次樂浪𤣥莬亦屬焉其俗愚悍少慮輕薄無威亦有所長敢於急人漢書博物志燕却背沙漠進臨昜水西至君都東至於遼長蛇帶塞險固之國也齊齊地虛危之分野也東有菑川東萊琅邪髙密膠東南有泰山城陽北有千乘清河以南勃海之髙樂髙城重合陽信西有濟南平原齊地負海舄鹵而通魚鹽之利其士多好經術矜功名紓緩濶逹而足智其失夸奢朋黨言與行謬虛詐不情漢書魯魯地奎婁之分野也東至東海南有泗水至淮得臨淮之下相睢陵僮取慮地愜民衆頗有桑麻之業亡林澤之饒俗儉嗇愛財趨啇賈好訾毁多巧僞喪祭之禮文備實寡然其好學猶愈於他俗漢書博物志魯前有淮水後有岱嶽䝉羽之向洙泗之流大野廣土曲阜尼丘宋宋地房心之分野也得沛梁楚山陽濟隂東平及東郡之須昌夀張其後得山陽陳留其民厚重多君子好稼穡惡衣食以致畜藏漢書博物志宋北有泗水南迄淮濄有孟諸之澤碭山之塞衛衛地營室東壁之分野也得東郡及魏郡黎陽河內之野王朝歌後徙濮陽其俗剛武上氣力其失奢靡嫁取送死過度漢書博物志衛南跨於河北得洪水南過漢上左通魯澤右指黎山楚楚地翼軫之分野也得南郡江夏零陵桂陽武陽長沙及漢中汝南後東徙於陳有江漢川澤山林之饒民食魚稻以漁獵山伐為業信巫鬼重淫祀漢書博物志楚後背方城前及衡嶽左則彭蠡右則九嶷有江漢之流險阻之國也吳吳地斗之分野也得㑹稽九江丹陽豫章廬江廣陵六安臨淮其民好用劍輕死易發東有海鹽章山之銅三江五湖之利豫章出黃金然堇堇物之所有取之不足以更費江南卑濕丈夫多夭漢書博物志吳左洞庭右彭蠡後濵長江南至豫章水戒險阻之國粵粵地牽牛婺女之分野也得蒼梧鬱林合浦交趾九真南海日南後滅吳兼并其地漢書博物志東越通海處南北尾閭之間三江流入南海通東治嵩海深險絶之也南越之國與楚為鄰五嶺已前至於南海負海之邦交趾之土謂之南裔尚史卷九十六
