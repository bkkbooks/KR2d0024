body:
  text: 尚史卷八十二繫二鑲白旗漢軍李鍇撰孔子繫孔子下孔子居陳三歳㑹晉楚争彊更伐陳及吳侵陳陳嘗被冦于是孔子去陳過蒲㑹公叔氏以蒲叛蒲人止孔子弟子有公良孺者以私車五乗從孔子其為人長賢有勇力謂曰吾昔従夫子遇難于匡今又于此命也已吾與夫子再罹難寧鬭而死鬬甚疾蒲人懼謂孔子曰茍無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聴衛靈公聞孔子来喜郊迎問曰蒲可伐乎對曰可靈公曰吾大夫以為不可今蒲衛之所以待晉楚也以衛伐之無乃不可乎孔子曰其男子有死之志婦人有保西河之志言公叔氏欲以蒲適他國其男子不願従而婦人亦無戰意也吾所伐者不過四五人靈公曰善然不伐蒲靈公老怠于政不用孔子孔子行佛肹為中牟宰晋趙鞅攻范中行伐中牟佛肹畔使人召孔子孔子欲往子路曰由聞諸夫子其身親為不善者君子不入也今佛肹親以中牟畔子欲往如之何孔子曰有是言也不曰堅乎磨而不磷不曰白乎湼而不淄我豈匏𤓰也哉焉能繫而不食史記此下有繫磬學琴事學琴己見前非在衛時事也孔子既不得用于衛将西見趙鞅至于河而聞竇鳴犢舜華之死也國語作鳴鐸竇犨家語作竇犨鳴犢及舜華或作鳴鐸慶華臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之乃從政丘聞之刳胎殺夭則麒麟不至郊竭澤涸漁則蛟龍不合隂陽覆巢毁卵則鳳凰不翔何則君子諱傷其類也夫鳥獸之于不義也尚知辟之而况乎丘哉乃還息乎陬鄉作為陬操以哀之家語作槃操琴操槃操又名息陬操其辭曰乾澤而漁蛟龍不㳺覆巢毁卵鳳不翔留慘予心悲還原息陬孔叢子歌意同而辭頗繁水經注孔子適趙臨河不濟歎而作歌曰秋風衍兮風揚波舟楫顛倒更相加歸来歸来胡為斯新序趙簡子欲専天下謂其相曰趙有犢犨晋有鐸鳴魯有孔丘吾殺三人天下可王也于是召犢犨鐸鳴而問政焉已而殺之使使聘孔子于魯以胖牛肉迎于河上使者語船人曰中河流而殺之使者致命孔子仰天而歎曰美哉水洋洋乎使丘不濟此者命也夫子路趨而進曰何謂也孔子曰犢犨鐸鳴晉之賢大夫也趙簡子未得意之時須而後従政及其得意也殺之云云三國志注引按簡子無欲殺孔子事殺之而王于事理亦不合中壘支離往往若此而反乎衛入主蘧瑗家他日靈公問兵陳孔子曰俎豆之事則嘗聞之軍旅之事未之學也明日與孔子語見蜚鴈仰視之色不在孔子孔子遂行復如陳魯哀公三年孔子年六十有一矣史記作六十夏魯廟災孔子在陳聞之曰災必桓僖廟乎已而果然秋季孫斯病輦而見魯城喟然歎曰昔此國㡬興矣以吾獲罪于孔子故不興也顧謂其嗣肥曰我即死若必相魯相魯必召仲尼後數日斯卒子肥代立已塟欲召孔子公子魚曰昔吾先君用之不終終為諸侯笑今又用之不能終是再為諸侯笑肥曰則誰召而可曰必召冉求于是使使召冉求冉求将行孔子曰魯人召求非小用之将大用之也端木賜知孔子思歸送冉求因誡曰即用以孔子為招云冉求既去明年孔子自陳遷于蔡明年自蔡如葉去葉反于蔡孔子遷于蔡三嵗吳伐陳楚救陳軍于城父聞孔子在陳蔡之間楚使人聘孔子孔子将往拜禮孔叢子孔子使宰予使于楚楚昭王以安車象飾因宰予以遺孔子宰予曰夫子無以此為也夫子言不離道動不違仁貴義尚徳清素好儉道行樂其志不行樂其身故臣知夫子之無用此也王曰然則夫子何欲而可對曰方今天下道徳寝息其志欲興而行之誠有欲治之君能行其道夫子雖徒步以朝固猶為之何必辱君之重貺乎王曰乃今而後知孔子之徳大矣宰予歸以告孔子曰二三子以予之言何如子貢曰未盡夫子之美也夫子徳髙則配天深則配海若予之言行事之實也夫子曰夫言貴實舍實何稱乎賜之華不若予之實也又曰楚王使使奉金幣聘夫子宰予冉有曰夫子之道至是行矣遂請見問曰太公勤身苦志八十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼利天下者也然今世無文王雖有太公孰能識之乃歌曰大道隠兮禮為基賢人竄兮将待時天下如一欲何之陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今者久留陳蔡之間諸大夫所設行皆非仲尼之意今楚大國也来聘孔子孔子用于楚則陳蔡用事大夫危矣于是乃相與發徒役圍孔子于野不得行絶糧從者病莫能興孔子講誦絃歌不衰孔子知弟子有愠心召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為于此子路曰意者吾未仁邪人之不我信也意者吾未知邪人之不我行也孔子曰有是乎由使仁者而必信安有伯夷叔齊使知者而必行安有王子比干子路出子貢入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為于此子貢曰夫子之道至大故天下莫能容夫子盖少貶焉孔子曰賜良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之統而理之而不能為容今不修爾道而求為容賜而志不逺矣子貢出顔淵入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為于此顔淵曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰韓詩外傳孔子困于陳蔡之間即三經之席七日不食藜羮不糝弟子有饑色讀書習禮樂不休子路進曰為善者報之以福不善者報之以賊今夫子積徳累仁為善久矣意者當遣行乎奚居之隠也孔子曰由来吾語汝子以知者無罪乎則王子比干刳心而死以義者為聴乎則伍子胥抉目而懸吳門以亷者為用乎則伯夷叔齊饑于首陽以忠者用乎則鮑叔不用葉公子髙終身不仕鮑焦抱木而泣子推登山而燔君子不遇時者衆矣夫學者非為通也為窮而不憂困而志不衰先知禍福之始而心無惑焉荀子孔子邅難陳蔡孔子歌兩柱之間子路入見曰夫子之歌禮乎孔子不應曲終而曰由君子好樂為無驕也小人好樂為無懾也及至七日孔子修樂不休子路愠見曰夫子之修樂時乎孔子不應樂終而曰由昔者齊桓霸心生于莒句踐霸心生于㑹稽晋文霸心生于氏故居不幽則思不逺身不約則智不廣庸知而不遇之于是與明日免于厄説苑同吕氏春秋孔子窮乎陳蔡之間七日不嘗粒顔回索米得而爨之㡬熟孔子望見顔回攫其甑中而食之選間食熟謁孔子而進食孔子佯為不見起曰今者夢見先君食潔而後饋顔回曰不可嚮者煤室入甑中棄食不祥回攫而飯之孔子歎曰所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易矣家語畧同孔叢子墨子曰孔子厄于陳蔡之間子路烹豚孔子不問所由来而食之剥人之衣以沽酒孔子不問所由来而飲之詰之曰所謂厄者藜羮不粒乏食七日若烹豚飲酒何言乎厄且子路勇于見義豚酒不以義不取之可知也又何問焉按陳蔡之厄史説差近然子路有自反之誠猶之可也子貢為貶道之言夫安至此他如荀子之霸語吕覽之詐心孔叢子之剥衣為義取皆去聖賢居困之義殊逺于是使子貢至楚楚昭王興師迎孔子然後得免昭王将以書社地七百里封孔子楚令尹公子申曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之将帥有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止于是孔子自楚反乎衛是嵗也孔子年六十四史記作六十三而魯哀公六年也史記世家六年反衛其明年吳與魯㑹繒其明年與齊戰于郎是為哀公八年事與左傳謬八年冉有為季氏将師與齊戰于郎克之季孫肥曰子之于軍旅學之乎性之乎冉有曰學之于孔子肥曰孔子何如人哉對曰用之有名播之百姓質于鬼神而無憾求之至于此道雖累千社夫子不利也肥曰我欲召之可乎對曰欲召之則毋以小人固之可矣史記世家十一年孔圉之将攻太叔疾也訪于孔子孔子曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥孔圉遽止之曰圉豈敢度其私訪衛國之難也将止魯人以幣召之乃歸左傳史記季康子逐公華公賔公林以幣迎孔子孔子歸魯家語孔子在衛冉求言于季孫曰國有聖人而不能用欲以求治是猶却步而求及前人不可得已今孔子在衛衛将用之已有才而以資隣國難以言智也請以重幣迎之季孫以告公從之琴操孔子厯聘諸侯諸侯莫能任自衛反魯幽谷之中見香蘭獨秀歎曰夫蘭當為王者香今乃與衆草為伍乃止車援琴鼔之作猗蘭操孔叢子哀公以幣如衛迎孔子而卒不能用孔子作丘陵之歌歌辭皆俚鄙不足觀韓詩外傳孔子抢聖人之心彷徨乎道徳之域于時周室微百姓靡安禮義廢壊人倫不理孔子自西自東自南自北匍匐救之論衡孔子自知不用憫道不行民在塗炭之中故應聘周流為道不為已故逢患而不惡為民不為名故蒙謗而不避又曰孔子周流逰説七十二國鹽鐵論孔子能方不能圓故㡬于黎丘按黎丘事及七十國俱未聞然魯終不能用孔子孔子亦不求仕周室微而禮樂廢詩書缺追述三代之禮序書傳上紀唐虞之際下至秦穆編次其事尚書緯孔子求得黄帝𤣥孫帝魁之書迄于秦穆公凡三千二百四十篇㫁逺而定近可以為世法者百二十篇以百二篇為尚書十八篇為中候正部仲尼叙書上謂天談下謂民語兼該男女究其表裏孔叢子孔子曰書之于事也逺而不闊近而不迫志盡而而不怨辭順而不謟吾于髙宗彤日見徳有報之疾也茍由其道致其仁則逺方歸志而致其敬焉吾于洪範見君子之不忍言人之惡而質人之美也發乎中而見乎外以成文者其唯洪範乎古者詩三千餘篇及至孔子去其重取其可施于禮義上采契后稷中述殷周之盛至幽厲之缺始于衽席故曰闗睢之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆絃歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝尸子孔子云誦詩讀書與古人居讀書誦詩與古人謀孔叢子孔子讀詩及小雅喟然歎曰吾于周南召南見周道之所以盛也于柏舟見匹夫執志之不可以易也于淇澳見學之可以為君子也于考槃見遁世之士而不悶也于木𤓰見包且之禮行也于緇衣見好賢之心至也于雞鳴見古之君子不忘其敬也于伐檀見賢者之先事而後食也于蟋蟀見陶唐儉徳之大也于下泉見亂世之思明君也于七月見豳公之所以造周也于東山見周公之先公而後私也于狼跋見周公之逺志所以為聖也于鹿鳴見君臣之有禮也于肜弓見有功之必報也于羔羊見善政之有應也于節南山見忠臣之憂世也于蓼莪見孝子之思養也于四月見孝子之思祭也于裳裳者華見古之賢者世保其禄也于采菽見古之明王所以敬諸侯也家語孔子曰小辯害義小言破道闗睢興于鳥而君子美之取其雌雄之有别鹿鳴興于獸而君子大之取其得食而相呼若以鳥獸之名嫌之固不可行也又曰吾于甘棠見宗廟之敬也甚矣思其人必愛其樹尊其人必敬其位道也鹽鐵論孔子曰吾于河廣知徳之至也而欲得之各反其本復諸古而已説苑孔子論詩至于正月之卒章戄然曰不逢時之君子豈不殆哉從上依世則廢道違上離俗則危身世不與善已獨由之則曰非妖則孽也是以桀殺闗龍逢紂殺比干故賢者不遇時常恐不終焉孔子晚而喜易序㒸繫象説卦文言讀易韋編三絶曰假我數年若是我于易則彬彬矣抱朴子有古强者云孔子嘗勸我讀易云此良書也丘竊好之韋編三絶鐵撾三折今乃大悟漆書孔子讀易韋編三絶鐵撾三滅孔子以詩書禮樂教弟子盖三千焉身通六藝者七十有二人史記世家十四年春西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人孔子觀之曰麟也然後取之左傳公羊傳有以告者曰有麏而角者孔子曰孰為来哉孰為来哉反袂拭面涕沾袍曰吾道窮矣孔叢子鉏商樵于野而獲獸焉衆莫之識以為不祥棄之五父之衢冉有告夫子曰麏身而肉角豈天之妖乎夫子曰若求之言其必麟乎視之果信言偃問曰敢問今見其誰應之子曰宗周将滅天下無主孰為来哉遂泣曰予之于人猶麟之于獸也麟出而死吾道窮矣琴操緯書吐圖致書諸説荒謬不録乃因史記作春秋上至隠公下訖哀公十四年十二公據魯親周故殷運之三代正義殷中也又中運夏殷周之事也約其文辭而指博故吳楚之君自稱王而春秋貶之曰子説非是孔子徳雖聖人而位非天子惡得而貶之盖吳楚始本封子故子之踐土之㑹實召周天子而春秋諱之曰天王狩于河陽推此類以䋲當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聴訟文辭有可與人共弗獨有也至于為春秋筆則筆削則削子夏之徒不能賛一辭弟子受春秋孔子曰後世知丘者以春秋而罪丘者亦以春秋史記世家史記世家孔子明王道干七十餘君莫能用故西觀周室論史記舊文興于魯而次春秋約其辭文去其煩重以制義法王道備人事浃七十子之徒口受其傳指為有所刺譏褒諱挹損之文辭不可以書見也魯君子左丘明懼弟子人人異端各安其意失其意故因孔子史記具論其語成左氏春秋史記世家子曰吾欲載之空言不如見之于行事之深切著明也按孔子因魯史成春秋必著于䇿口授弟子已于義不順至云有所刺譏不可書見説尤乖剌失㫖矣嚴氏春秋孔子将修春秋與左丘明乗如周觀書于周史歸而修春秋之經丘明為之傳共為表裏春秋繁露仲尼之作春秋也上探正天端王公之位萬物民之所欲下明得失起賢才以待後聖故引史記理往事正是非也王公史記十二公之間皆衰世之事故門人惑孔子曰吾因其行事而加乎王心焉以為見之空言不如行事博深切故子貢閔子公肩子言其切而為國家資也其為切而至于殺君亡國奔走不得保社稷其所以然是皆不明于道不覽于春秋也故衛子夏言有國家者不可不學春秋不學春秋則無以見前後旁側之危不知國之大柄君子重任也論衡孔子之春秋素王之業也諸子之傳書素相之事也淮南子春秋二百四十二年亡國五十二弑君三十六采善鉏醜以成王道論亦博矣抱朴子仲尼春秋成紫微降光春秋演孔圖孔子修春秋九月而成卜之得陽豫之卦宋均曰夏殷卦名又曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔静精微易教也恭儉荘敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂其為人也温柔敦厚而不愚則深于詩者也疏通知逺而不誣則深于書者也廣博易良而不奢則深于樂者也潔静精微而不賊則深于易者也恭儉荘敬而不煩則深于禮者也屬辭比事而不亂則深于春秋者也記經觧孔子蚤作負手曳杖消揺于門歌曰泰山其頽乎梁木其壊乎哲人其萎乎既歌而入當户而坐子貢聞之曰泰山其頽則吾将安仰梁木其壊哲人其萎則吾将安放夫子殆将病也遂趨而入孔子曰賜爾来何遲也夏后氏殯于東階之上則猶在阼也殷人殯于兩楹之間則與賔主夹之也周人殯于西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠于兩楹之間夫明王不興而天下其孰能宗予予殆将死也盖寝疾七日而歿公孫尼子孔子有疾哀公使醫視之醫曰居處飲食何如子曰丘春居葛籠夏居宻楊秋不風冬不煬飲食不饋飲酒不醉醫曰是良醫也論衡孔子病商瞿卜期日中孔子曰取書来比至日中何事乎聖人之好學也死且不休按二説並妄聖人不爾也魯哀公誄孔子曰天不遺耆老莫相予位焉嗚呼哀哉尼父記檀弓左傳公誄之曰昊天不弔不慭遺一老俾屛余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律子戇曰君其不沒于魯乎夫子之言曰禮失則昬名失則愆失志為昬失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之史記同孔子年七十四以魯哀公十六年四月己丑卒史記索隠若孔子以魯襄二十一年生至哀十六年為七十三若襄二十二年生則年七十二按魯襄二十一年至哀十六年為七十四襄二十二年為七十三索隠自誤史以襄二十二年生哀十六年卒年七十三亦誤孔子實生于襄二十一年至哀十六年卒年七十四説見前塟魯城北泗上史記世家皇覽孔子冡去城一里冡塋百畆冡南北廣十步東西十三步髙一丈二尺冡前以瓴甓為祠壇方六尺與地平本無祠堂冡塋中樹以百數皆異種魯人世世無能名其樹者民傳言孔子弟子異國人各特其方樹来種之其樹柞枌雒離女貞五味毚檀之樹孔子塋中不生荆棘及刺人草白虎通孔子卒受魯君璜玉塟郭之北泗水為之却流家語孔子之喪公西赤掌殯塟焉唅以蔬米三貝􅊞衣十有二稱加朝服一冠章甫之冠佩象環徑五寸而綨組綬桐棺四寸柏椁五寸飾廧置翣設披周也設崇殷也綢練設旐夏也兼用三代禮所以尊師且備古也塟于魯城北泗水上蔵入地不及泉而封為偃斧之形髙四尺樹松柏為志焉孔子之喪公西赤為志焉飾棺廧置翣設披周也設崇殷也綢練設旐夏也孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服于是皆絰而出羣居則絰出則否孔子之喪有自燕来觀者舍于子夏氏子夏曰聖人之塟人與人之塟聖人也子何觀焉昔者夫子之言曰吾見封之若堂者矣見若防者矣見若覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也今一日而三斬板而已封尚行夫子之志乎哉記檀弓弟子三年心喪畢相訣而去則哭各復盡哀或復留唯子貢廬于冡上凡六年然後去弟子及魯人往従冡而家者百有餘室因命曰孔里魯世世相傳以嵗時奉祠孔子冡而諸儒亦講禮鄉飲大射于孔子冡孔子冡大一頃故所居堂弟子内後世因廟蔵孔子衣冠琴車書史記世家伯魚生伋字子思孔叢子夫子閒居喟然而歎子思再拜請曰意子孫不修将忝祖乎羡堯舜之道恨不及乎夫子曰爾孺子安知吾志子思對曰伋于進瞻亟聞夫子之教其父析薪其子弗克負荷是謂不肖伋毎思之所以大恐而不觧也夫子忻然笑曰然乎吾無憂矣世不廢業其克昌乎所問四端姑附其一子思之母死于衛赴于子思子思哭于廟門人至曰庶氏之母死何為哭于孔氏之廟乎子思曰吾過矣吾過矣遂哭于他室栁若謂子思曰子聖人之後也四方于子乎觀禮子盍慎諸子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何慎哉子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則従而隆道汚則従而汚伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母嘗曰喪三日而殯凡附于身者必誠必信勿之有悔焉耳矣三月而𦵏凡附于棺者必誠必信勿之有悔焉耳矣曽子謂子思曰伋吾執親之喪也水漿不入于口者七日子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入于口者三日杖而后能起穆公問于子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若将加諸膝退人若将隊諸淵毋為戎首不亦善乎又何反服之禮之有記檀弓孔叢子子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何不服子思曰吾豈愛乎禮不得也臣而去國君不掃其宗廟則為之服寄公寓乎是國而為國服吾既無列于魯而寄在衛吾何服哉是寄臣而服所寄之君則舊君無服明不二君之義也縣子曰善哉又曰穆公訪于子思曰寡人欲掩先君之惡以揚先君之善使談者有述焉為之若何子思曰以伋所聞舜禹之于其父非勿欲也以為私情之細不如公義之大故弗敢私之公曰思所以利民者曰有惠百姓之心則莫如除非法之事也毁不居之寳以賜窮民奪嬖寵之禄以賑困匱無令有悲怨而後世有聞見抑亦可又曰穆公問曰立太子有常乎荅曰有之在周公之典公曰昔文王舍適而立次微子舍孫而立弟是何法也子思曰殷人質而尊其尊故立弟周人文而親其親故立子亦各其禮也文王舍適立次權也公曰茍得行權豈惟聖人唯賢與愛立也子思曰聖人不以權教故立制垂法順之為貴公曰舍賢立聖舍愚立賢何如子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊于適何以限之又曰閭丘温見田氏将危齊欲以其邑叛而適魯穆公聞之謂子思曰子能懐之則寡人割邑如其邑以常宗子思曰伋雖能義所不為也彼為人臣君将敗弗能扶而叛之逆臣制國弗能死而逃之此罪誅之人也不能討而又要利召姦非忍行也韓非子魯穆公問于子思曰吾聞龎􅀈氏之子不孝其行奚如子思對曰君子尊賢以崇徳舉善以勸民若夫過行是細人之所識臣不知也子思出子服厲伯入見問龎􅀈氏子子服厲伯對曰其過三皆君之所未嘗聞自是之後君貴子思而賤子服厲伯或曰魯之公室刼于季氏不亦宜乎明君求善而賞之求姦而誅之其得之一也故以善聞者以説善同于上者也以姦聞者以惡姦同于上者也今子思不以過聞而穆公貴之厲伯以姦聞而穆公賤之此魯君之所以刼也穆公欲相子思子思不願将去魯魯君曰天下之主猶寡人也去将安之子思答曰葢聞君子猶鳥也疑之則舉今君既疑矣又以已限天下之君臣竊為言之過也孔叢子又曰魯人有公儀僣者砥節礪行子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人參分魯國而與之一子思對曰如君言公儀子愈所以不至也君若饑渇待賢雖蔬食飲水伋亦願在下風令徒以髙官厚禄餌君子公儀子之智若魚鳥可也不然彼将終身不躡君之庭矣吕氏春秋孔思請行魯君曰天下主亦猶寡人也将焉之孔思對曰盖聞君子猶鳥也駭則舉魯君曰主不肖而皆以然也違不肖過不肖而自以為能論天下之主乎凡鳥之舉也去駭従不駭去駭従不駭未可知也去駭従駭則鳥曷而舉矣孔思之對魯君也亦過矣吕氏刻深猶前韓説皆誣論耳縣子問子思曰顔回問為邦夫子曰行夏之時若是殷周異政為非乎子思曰夏數得天堯舜之所同也殷周之王征伐革命以應乎天因改正朔若云天時之改耳故不相因也夫受禅于人者則􅊞其統受命于天者則革之所以神其事如天道之變然也三統之義夏得其正是以夫子云孔叢子又曰縣子問子思曰子之先君見子産則兄事之而世謂子産仁愛夫子聖人是謂聖道事仁愛乎子思曰昔季孫問子㳺亦若子之言也康子曰子産死鄭人丈夫舍玦珮婦女舍珠瑱巷哭三月竽琴不作夫子之死也吾未聞魯人之若是也子㳺曰夫浸水之所及也則生不及則死故民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由来者又曰子思居貧友饋之粟受一車焉或獻樽酒束脩子思弗為當也或曰子取人粟而辭吾酒脯是辭少而取多也于義則無名于分則不全而子行之何也子思曰然伋不幸而貧于財至乃困乏将恐絶先人之祀夫以受粟為周之也酒脯則所以飲宴也方乏于食而乃飲宴非義也又曰衛公子交饋馬四乗于子思子思曰伋寄命以来朝夕受酒脯及祭燔之賜衣食之優意氣已定以無行志未敢當車馬之貺禮雖有爵賜人不踰父兄今重違公子之㫖則有失禮之僭若何公子曰交已言于君矣曰不可為人子者三賜不及車馬公子曰我之未聞也謹受教又曰子思適齊説齊王及尹文子及自齊反衛説衛君文繁不載説苑子思居衛緼袍無表二旬而九食田子方聞之使人遺狐白之裘恐其不受因謂之曰吾假人遂忘之吾與人如棄之子思辭而不受曰伋聞之妄與不如遺棄物于溝壑伋雖貧不忍以身為溝壑也説亦誣衛将軍文子之内子死復者曰皋媚女復子思聞之曰此女氏之字非夫氏之名也婦人于夫氏以姓氏稱禮也子思在魯使以書如衛問子上子上北面再拜受書伏讀然後與使者宴遂為復書返中庭北面再拜以授使者既受書然後退使者還魯問子思曰吾子堂上南面立授臣書事畢送臣子上中庭拜授臣書而不送何也子思曰拜而不送敬也使而送之賔也魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也答曰吾以其疎逺也子思聞之曰無恩之甚也昔者季孫問于夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之以食序列昭穆萬世婚姻不通忠篤之道然也孔叢子子思年六十二嘗困于宋子思作中庸史記世家儒家子思二十三篇漢書孔叢子子思年十六適宋宋大夫樂朔與之言學曰尚書虞夏數四篇善也下此効堯舜之言耳殊不如也乂曰凡書之作欲以喻民而乃故作難知之辭不亦繁乎子思曰書意深奥訓詀成義所以為典雅也昔魯巷有似君言者伋答之曰道為知者傳苟非其人道不傳矣樂朔不説而退曰孺子辱吾其徒請攻之遂圍子思宋君聞之不待駕而救子思子思既免于是撰中庸四十九篇子思子子思曰慈父能食子不能使知味聖人能説人不能使人必説又曰言而信信在言前令而化化在令外聖人在上而遷其化又曰國有道以義率身國無道以身率義荀息是也又曰君本也臣枝葉也本美則葉茂本枯則葉凋又曰民以君為心君以民為體又曰百心不得一人一心可得百人又曰繁于樂者重于憂厚于義者薄于行見長不能屈其色見貴不能盡其辭雖有風雨吾不入其門也又曰君子以心導耳目小人以耳目導心中論子思曰事自名也聲自呼也貌自眩也物自處也人自官也無非自已者又曰能勝其心于勝人乎何有不能勝其心如勝人何子思子見馬總意林其説與中論皆無深意而孔叢子尤謬悠故朱子嘗以為偽今節取一二禮家言餘不具録皇覧子思冡在孔子冡南大小相望鹽鐵論子思子之銀佩美于虞公之垂棘子思生白字子上年四十七孔叢子子上雑所習請于子思子思曰先人有訓焉學必由聖所以致其材也厲必由砥所以致其刃也夫子之教必始于詩書而終于禮樂雑説不與焉又何請又謂子上曰白乎吾嘗深有思而莫之得也于學則寤焉吾嘗企有望而莫之見也登髙則覩焉是故雖有本性而加之以學則無惑矣又謂子上曰有可以為公侯之尊而富貴人衆不與焉者非唯志乎成其志者非唯無欲乎知以身取節者則知足矣知足則不累其志矣子上生求字子家年四十五子家生箕字子京年四十六子京生穿字子髙年五十一子髙生子慎年五十七嘗為魏相子慎生鮒年五十七為陳王涉博士死于陳下史記世家賛曰孔子至聖也説者至衆要皆揣摹之辭謹采其切實著之傳嗚呼天地不尸其生聖人不専其名世以一端測之謬矣尚史卷八十二
