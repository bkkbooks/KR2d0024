body:
  text: 尚史卷二十八列傳六鑲白旗漢軍李鍇撰周諸王子傳平桓荘恵諸子王子狐王子克王子頽王子帶甘成公甘憚公甘景公甘平公甘簡公附甘桓公王子狐平王子鄭武公荘公為平王卿士王貳于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質于周左傳王子克桓王子子儀也子儀有寵于桓王桓王屬諸周公黒肩荘王三年桓十八年周公欲弑荘王而立王子克辛伯告王王殺周公王子克奔燕左傳王子頽荘王子母曰王姚王姚嬖于荘王故子頽有寵蔿國為之師恵王二年荘十九年王取蔿國之圃以為囿邊伯之宫近于王王取之又奪子禽祝跪詹父田而收膳夫之秩故蔿國邊伯詹父子禽祝跪石速作亂因蘇氏奉子頽以伐王不克出奔温蘇子奉子頽奔衛衛師燕師伐周立子頽三年荘二十年鄭伯和王室不克王處子櫟秋入于鄔四年荘二十一年鄭虢納王殺王子頽及五大夫左傳大叔帶恵王子食邑于甘謂之甘昭公母曰恵后大叔帶有寵于恵后恵后将立之未及而卒故齊桓公㑹王大子鄭于首止謀寧周也二十四年僖七年恵王崩襄王惡大叔帶之難懼不立不發喪而告難于齊明年春諸侯盟于洮襄王定位而後發喪襄王三年僖十一年王子帶召揚拒泉臯伊雒之戎同伐京師入王城焚東門秦晉伐戎以救周秋晉侯平戎于王四年僖十二年王以戎難故討王子帶子帶奔齊十四年僖二十二年富辰請召子帶王從之子帶復歸于京師先是王使頽叔桃子並周大夫出狄師以伐鄭王徳狄人遂以其女為后是為隗氏子帶之復也又通于隗氏王替隗氏十六年僖二十四年頽叔桃子曰我實使狄狄其怨我遂奉子帶以狄師攻王王御士将禦之王曰先后其謂我何寧使諸侯圖之遂出及坎欿國人納之秋頽叔桃子奉子帶復以狄師伐周大敗周師王出適鄭處于汜大叔以隗氏居于温王使告難于諸侯十七年僖二十五年秦伯師河上将謀納王晉侯辭秦師而下三月右師圍温左師逆王王入于王城取子帶于温殺之于隰城左傳子帶之後有甘成公甘景公甘簡公簡公弟過為甘悼公成公孫鰌為甘平公平公子為甘桓公桓公黨王子朝靈景諸子太子晉王子佞夫太子夀儋括附王子朝太子晉靈王子靈王二十二年襄二十三年糓洛鬭榖洛二水名鬬者兩水格有似于鬬将毁王宫王欲壅之晉諫曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚于髙歸物于下疏為川谷以導其氣陂唐汚庳以鍾其羙是故聚不阤崩而物有所歸氣不沈滯而亦不散越是以民生有財用而死有所𦵏然則無夭昏札瘥之憂而無飢寒乏匱之患故上下能相固以待不虞古之聖王唯此之慎昔共工棄此道也欲壅防百川墮髙堙庳以害天下禍亂并興共工用滅其在有虞有崈伯鯀播其淫心稱遂共工之過堯用殛之于羽山其後伯禹念前之非度釐改制量象物天地儀之于民共之從孫四岳佐之髙髙下下疏川導滯鍾水豐物莫非嘉績克厭帝心皇天嘉之胙以天下胙四岳國命為侯伯若啓先王之遺訓省其典圖刑法而觀其廢興者皆可知也今吾執政無乃實有所避而滑夫二川之神使至于争明以妨王宫王而飾之無乃不可乎人有言曰無過亂人之門又曰佐雝者嘗焉佐鬬者傷焉又曰禍不好不能為禍夫見亂而不惕所殘必多其飾彌章民有怨亂猶不可遏而況神乎王将防鬬川以飾宫是飾亂而佐鬬也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至于今未弭我又章之懼長及子孫王室其愈卑乎夫事大不從象小不従文上非天刑下非地徳中非民則方非時動而作之者必不節矣作又不節害之道也王卒壅之國語晉蚤卒故不立周書晉侯尚力侵我王畧叔向聞儲幼而果賢作太子晉晉平公使叔譽于周見太子晉與之言五稱而五窮歸告公曰太子晉行年十五而臣弗能與言君請歸聲就復與田平公将歸之師曠曰請使瞑臣往與之言若能幪予反而復之師曠見太子稱曰古之君子其行可則由舜而下其孰有廣徳王子應之曰如舜者天舜居其所以利天下奉翼逺人皆得已仁此之謂天如禹者聖勞而不居以利天下好取不好與必度其正是謂之聖如文王者其大道仁其小道恵三分天下而有其二敬人無方服事于商既有其衆而返失其身此之謂仁如武王者義殺一人而利天下異姓同姓各得之謂義師曠告善又稱曰宣辨名命異姓惡方王侯君公何以為尊何以為上王子應之曰人生而重丈夫謂之胄子胄子成人能治上官謂之士士率衆時作謂之曰伯伯能移善於衆與百姓同謂之公公能樹名與物天道俱謂之侯侯能成羣謂之君君有廣徳分任諸侯而敦信曰予一人善至于四海曰天子達於四荒曰天王四荒至莫有怨訾乃登為帝師曠罄然又稱曰温恭敦敏方徳不改聞物闕下學以起尚登帝臣乃參天子自古誰王子應之曰穆穆虞舜明明赫赫立義治律萬物皆作分均天財萬物熙熙非舜而誰能師曠曰善哉王子汝将為天下宗乎王子曰太師何汝賤我乎自太皥以下至于堯舜禹未有一姓而再有天下者夫大當時而不伐天何可得且吾問汝之人年長短告吾師曠曰汝聲清汗汝色赤白火色不夀王子曰吾後三年上賓于帝所汝慎無言闕将及汝師曠歸未及三年告死者至尸子太子晉生八年而服師曠潛夫論太子晉死孔子聞之曰惜哉殺吾君也王子佞夫亦靈王子靈王崩靈王弟儋季之子儋括欲立王子佞夫佞夫弗知景王二年襄三十年儋括作亂圍蔿逐蔿邑大夫成愆五月尹言多殺佞夫儋括及其黨王子瑕廖奔晉春秋書曰天王殺其弟佞夫罪在王也左傳太子夀景王子母穆后景王十八年昭十五年六月夀卒八月穆后崩左傳景王無適立遂啓子朝之亂也王子朝景王之長庶子也景王大子曰夀十八年昭十五年夀卒欲立子猛子朝有寵于景王王與其傅賓起説之又欲立子朝二十五年昭二十三年夏四月王田北山将殺單穆公劉文公而立子朝國語是年殺子猛之傅下門子㑹王崩子猛立是為悼王五月𦵏景王王子朝因舊官百工之喪秩者與靈景之族以作亂帥郊要餞三邑周地之甲以逐劉文公劉文公奔揚單穆公逆悼王以歸王子還子朝黨夜取王以如莊宫單穆公出奔羣王子追單穆公單穆公殺之子朝奔京已而鞏簡公甘平公敗績于京單穆公告急于晉十月晉師納王于王城十一月悼王崩敬王立元年昭二十三年晉師還子朝復入于王城二年昭二十四年三月晉侯使士彌牟涖問周故彌牟立于乾祭而問于介衆乃辭王子朝不納其使四年昭二十六年單穆公復如晉告急晉帥師納王十月王起師於滑十一月晉師克鞏召伯盈乃逐子朝子朝遂與其黨奉周之典籍以奔楚王入于成周子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以藩屏周亦曰吾無専享文武之功且為後人之迷敗傾覆而溺入於難則振救之至于夷王王愆于厥身諸侯莫不竝走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昏不若用愆厥位攜王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力于王室也至于恵王天不靖周生頽禍心施于叔帶恵襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頾王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剥亂天下壹行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍奸齊盟傲狠威儀矯誣先王晉為不道是攝是贊思肆其罔極兹不穀震蕩播越竄在荆蠻未有攸底若我一二兄弟甥舅奨順天法無助狡猾以従先王之命母速天罰赦圖不穀則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以徳徳鈞以卜王不立愛公卿無私古之制也穆后及大子夀早夭即世單劉贊私立少以間先王亦唯伯仲叔季圖之魯閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以専其志無禮甚矣文辭何為十五年定五年王人殺子朝于楚左傳論曰欲知來事視已然事桓王寵克而荘王寵頽恵王寵帶景王寵朝創未愈又養癰焉痛之迫身不且甚于已事乎曠林兄弟日尋干戈悼敬之頃曠紀五年周祚之危不啻朽索係隊石矣或謂東周無大失道縁遷國以凌夷豈其然哉王子虎王叔陳生伯輿附王子虎者僖王之子也公穀並以叔服為王子虎為周太宰國語杜預注為卿士襄王二十年僖二十八年五月晉獻楚俘于王王命尹氏及王子虎内史叔興父策命晉侯為侯伯曰王謂叔父敬服王命以綏四國糾逖王慝癸亥王子虎盟諸侯于踐土要言曰皆奨王室無相害也有淪此盟明神殛之俾隊其師無克祚國及其𤣥孫無有老幼二十一年僖二十九年王子虎盟諸侯于翟泉尋踐土之盟且謀伐鄭也二十八年文三年王子虎卒王子虎之子王叔桓公名未詳為周卿士襄王二十八年文三年楚師圍江晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱楚大夫而還定王五年宣七年鄭及晉平盟于黒壤王叔桓公臨之以謀不睦左傳王叔簡公周卿士王叔陳生也簡王十一年成十六年晉克楚于鄢使郤至告慶于周未将事王叔陳生飲之酒交酬好貨皆厚飲酒宴語相説也明日又譽諸朝單襄公譏之國語靈王四年襄五年戎陵虣周室王使王叔陳生愬戎于晉王叔陳生貳于戎晉人執之以告周九年襄十年王叔陳生與伯輿争政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以説焉不入遂處之河上晉侯使士匄平王室王叔陳生與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄于王庭士匄聴之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓従王牲用備具王賴之而賜之騂旄之盟曰世世無失職若篳門閨竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放于寵官之師旅不勝其富吾能無篳門閨竇乎唯大國圖之下而無直則何謂正矣士匄曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔陳生奔晉左傳伯輿亦周卿士簡王六年成十一年又有伯與與周公楚争政或曰即伯輿王孫滿王孫説王孫滿周大夫襄王二十五年僖三十三年秦将襲鄭過周北門左右免胄而下超乗者三百乗王孫滿尚幼觀之言于王曰秦師輕而無禮必敗輕則寡謀無禮則脱入險而脱又不能謀能無敗乎秦滅滑而還晉敗秦師于殽定王元年宣三年楚子伐陸渾之戎遂至于雒觀兵于周疆王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其姦回昏亂雖大輕也天祚明徳有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也左傳王孫説周大夫簡王八年成十三年魯成公來朝使叔孫僑如先聘且告見王孫説與之語説言于王曰魯叔孫之來也必有異焉其享覲之幣薄而言諂殆請之也若請之必欲賜也魯執政唯强故不歡焉而後遣之且其状方上而鋭下宜觸冒人王其勿賜若貪陵之人來而盈其願是不賞善也且財不給故聖人之施舍也議之其喜怒取與也亦議之是以不主寛恵亦不主猛毅主徳義而已王曰諾使私問諸魯請之也王遂不賜禮如行人及魯侯至仲孫蔑為介王孫説與之語蔑好讓説以語王王厚賄之國語周亂臣傳徐偃王徐偃王徐君子博物志徐君宮人有娠而生卵以為不祥棄于水濱孤獨毋有犬鵠蒼銜所棄卵以歸覆煖之遂􅭨成兒生時正偃故以為名徐君宫中聞之乃更録取長而仁智襲徐君國後鵠蒼臨死生角而九尾實黄龍也偃王令𦵏之徐界中今見狗壟偃王既有國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以己得天瑞因名為弓自稱徐偃王江淮諸侯多伏従伏従者三十六國周穆王遣使乗駟一日至楚使伐之偃王仁不忍鬭害其民為楚所敗逃走彭城武原縣東山下百姓隨之者以萬數後遂名其山為徐山徐夷僭號乃率九夷以伐宗周西至河上穆王畏其方熾乃分東方諸侯命徐偃王主之偃王處潢池東地方五百里行仁義陸地而朝者三十有六國後漢書穆王西巡狩偃王反穆王日馳千里馬攻偃王大破之史記後漢書穆王得驥騄之乗使造父御以告楚文王令伐徐一日而至于是楚文王舉兵滅之淮南子作楚荘王按荘王去穆王逺甚且春秋荘十年荆始見于經杜預注曰荆本楚號後改為楚楚僻陋在蠻夷于此始通上國然則令楚伐徐亦殊謬誤也偃王仁而無權不忍鬭其人故致于敗乃北走彭城武原縣東山下百姓隨之者以萬數因名其山曰徐山後漢書説苑王孫厲謂楚文王曰徐偃王好行仁義之道漢東諸侯三十二國盡服矣王若不伐楚必事徐王曰若信有道不可伐也對曰大之伐小强之伐弱猶大魚吞小魚虎之食豚也文王遂伐徐殘之徐偃王将死曰吾賴于文徳而不明武備好仁義之道而不知詐人之心以至于此荀子徐偃王之状目可瞻焉尸子偃王有筋而無骨故曰偃也又曰徐偃王好怪使人没深水而得怪魚入深山而得怪獸多列于庭蒍國邊伯子禽祝跪詹父蒍國邊伯子禽祝跪詹父並周大夫蒍國字子國為子頽師初晉武公伐夷執夷詭諸周大夫蒍國請而免之既而弗報僖王四年荘十六年蒍國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸及恵王即位取蒍國之圃以為囿又取邊伯之宫與子禽祝跪詹父田故五大夫因蘇氏作亂奉王子頽以伐王不克出奔温衛師燕師伐周立子頽王處于櫟三年莊二十年鄭伯虢公納王殺王子頽及五大夫賓起鄩肹南宫極鄩羅嚚附南宫賓起是為賓孟子朝之傅也景王立子猛起説子朝欲立之二十五年昭二十二年起適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異于是犧者實用人人犧實難已犧何害言設使寵人如犧則不宜假人以招禍難使犧在已則無患害喻使早寵子朝王弗應将立子朝而崩單旗劉狄遂攻起殺之左傳鄩肹周大夫南宫極卿士並黨王子朝悼王既立王子朝作亂單旗以王如平畤遂如圃車次于皇鄩肹伐皇大敗被獲焚諸王城之市敬王元年昭二十三年晉師納王王子朝入尹南宫極以成周人戍尹地震極死鄩肹子羅晉師納王而還六月王子朝復入于王城羅納諸荘宫南宫極子嚚嚚以甘桓公見王子朝及晉師再納王克鞏王子朝及毛伯召氏尹氏南宫嚚奔楚左傳儋翩儋括儋翩子朝之餘黨也敬王十六年定六年既殺子朝于楚儋翩率子朝之徒因鄭人将以作亂于周鄭于是乎伐馮滑胥靡負黍狐人闕外王處于姑蕕以辟其亂十七年定七年儋翩遂入儀栗以叛冬十一月單旗劉狄逆王晉人送王入于王城先是有儋括者靈王弟儋季之子也靈王崩儋括欲立王子佞夫佞夫弗知景王三年襄三十年儋括圍蒍逐成愆林堯叟注蒍周邑成愆蒍邑大夫尹言多劉毅單蔑甘過鞏成五子周大夫殺佞夫儋括奔晉左傳論曰古者天子有四鄰三公不必備唯其人是故有問無以對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼是故天子無爵三公無官參職天子任至重也養徳之器而以淫人乗之蔑不敗矣蒍國師頽賓起傅朝以淫䝉惛樹之侈心惡得不為衰周之禍哉諸子之亂佞夫最無罪食毒儋括卒隕厥生悲夫尚史卷二十八
