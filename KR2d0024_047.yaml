body:
  text: 尚史卷四十七列傳二十五鑲白旗漢軍李鍇撰晉諸臣傳逆臣傳里克丕鄭丕豹大夫附七輿里克者里季也丕鄭者丕鄭父也並為晉大夫事獻公獻公五年莊二十二年公伐驪戎克之以驪姬歸立以為夫人生奚齊其娣生卓子驪姬使太子申生處曲沃重耳處蒲城夷吾處屈史蘇掌卜大夫告大夫曰二三大夫其戒之乎亂本生矣及公將黜太子申生而立奚齊里克丕鄭荀息相見克曰夫史蘇之言將及矣其若之何息曰吾聞事君者竭力以役事不聞違命君立臣從何二之有鄭曰吾聞事君者從其義不阿其惑也惑則誤民民誤失德是棄民也民之有君以治義也義以生利利以豐民若之何其民之與處而棄之也必立太子克曰我不佞雖不識義亦不阿惑吾其靜也國語十七年閔二年公使太子伐東山皋落氏克諫曰太子奉冡祀社禝之粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師専行謀誓軍旅君與國政之所圖也非太子之事也師在制命而已禀命則不威専命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼不得立修已而不責人則免於難左傳二十一年僖四年驪姬將殺太子而難里克使優施夜說之克曰吾秉君以殺太子吾不忍通復故交吾不敢中立其免乎旦而里克見丕鄭曰夫史蘇之言將及矣優施告我君謀成矣將立奚齊鄭曰子謂何曰吾對以中立鄭曰惜也不如曰不信以疏之亦固太子以擕之多為之故以變其志志少疏乃可間也今子曰中立况固其謀况益也彼有成矣難以得間克曰往言不可及且人中心唯無忌之言驪姬無忌憚之心何可敗也子將何如鄭曰我無心是故事君者君為我心制不在我克曰殺君以為亷長亷以驕心因驕以制人家吾不敢亷利也言以太子故殺君以自利因驕以裁制人之父子吾不敢為抑撓志以從若為廢人以自利也利方以求成人吾不能方道也言廢申生利得道以求成奚齊吾不能為將伏也明日稱疾不朝三旬難成太子自殺二十六年僖九年獻公薨里克將殺奚齊先告荀息曰三公子之徒將殺孺子子將何如息曰死吾君而殺其孤吾有死而已吾蔑從之矣克曰子死孺子立死不亦可乎子死孺子廢焉用死哉息曰昔君問臣事君于我我對以忠貞君曰何謂也我對曰可以利公室力有所能無不為忠也葬死者養生者死人復生不悔生人不愧貞也吾言既往矣豈能欲行吾言而又愛吾身乎雖死焉辟之里克告丕鄭曰三公子之徒將殺孺子子將何如鄭曰荀息謂何對曰荀息曰死之鄭曰子勉之夫二國士之所圖二士里克荀息也無不遂也我為子行之子帥七輿大夫以待我七輿申生下軍大夫我使翟以動之援秦以搖之立其薄者可以得重賂厚者可使無入言立其恩薄者可以得重賂于己厚者可使二公子不得入立國誰之國也言晉可専克曰不可克聞之夫義者利之足也貪者怨之夲也廢義則利不立厚貪則怨生夫孺子豈獲罪于民將以驪姬之惑蠱君而誣國人讒羣公子而奪之利使君迷亂信而亡之殺無罪以為諸侯笑使百姓莫不有藏惡于其心中恐其如壅大川潰而不可救禦也是故將殺奚齊而立公子之在外者以定民弭憂于諸侯且為援庶幾曰諸侯義而撫之百姓欣而奉之國可以固今殺君而賴其富貪且反義貪則民怨反義則富不為賴賴富而民怨亂國而身殆懼為諸侯載載見于書為後戒也不可常也鄭許諾于是殺奚齊卓子及驪姬使屠岸夷晉大夫告公子重耳于翟曰國亂民擾得國在亂治民在擾子盍入乎吾請為子鉥導也重耳辭吕甥郤芮亦使蒲城午晉大夫告公子夷吾于梁曰子厚賂秦以求入吾主子夷吾賂秦秦立之是為惠公惠公即位之明年背秦賂使丕鄭聘于秦且謝之而殺里克曰子殺二君與一大夫為子君者不亦難乎左傳克對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死鄭如秦謝緩賂乃謂穆公曰君厚問以召吕甥郤稱冀芮而止之以師奉公子重耳臣之屬內作晉君必出穆公使冷至秦大夫報問且召三大夫鄭與客將事與冷至行聘事冀芮曰鄭之使薄而報厚其言我于秦也必使誘我弗殺必作難乃殺鄭及七輿大夫共華賈華叔堅騅歂纍虎特宫山祁皆里丕之黨也丕鄭之子豹出奔秦鄭之自秦反也聞里克死見共華曰可以入乎華曰二三子皆在而不及子使于秦可哉丕鄭入公殺之共華之族共賜晉大夫謂華曰子行乎其及也華曰夫子之入吾謀也將待及賜曰孰知之華曰不可知而背之不信謀而困人不知困而不死無勇任大惡三行將安入子其行矣我姑待死丕豹謂穆公曰晉君大失其衆背君賂殺里克而忌處者衆固不說今又殺臣之父及七輿大夫此其黨半國矣君若伐之其君必出穆公曰失衆安能殺人以禍為違孰能出君爾俟我國語豹終于秦趙穿趙旃附趙勝趙朝趙穿者趙夙之庶孫晉襄公之壻也靈公六年文十二年秦伐我取羈馬我禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之從秦師于河曲臾駢請深壘固軍以待之士㑹即范武子文七年奔秦謂秦伯曰必臾駢實為此謀趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦軍掩我上軍穿追之不及反怒曰褁糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏司馬法曰從綏不及則難陷蓋古名退軍為綏也及秦師將遁臾駢曰薄諸河必敗之穿及胥甲當軍門呼曰死傷未收而棄之不惠也不待期而薄人于險無勇也乃止秦師夜遁後七年晉人討不用命者放胥甲于衛而不及穿十一年文十七年靈公㑹諸侯于扈以穿及公壻池為質于鄭與鄭成十三年宣元年我欲求成于秦穿曰我侵崇秦急崇必救之吾以求成焉冬穿侵崇秦弗與公羊崇作桞桞天子之邑十四年宣二年公不君趙盾諫公將攻之盾自亡秋九月穿攻公于桃園弒之盾未出山而復使穿逆公子黑臀文公子于周而立之是為成公穿子旃事景公景公三年宣十二年楚伐鄭我救之遇楚師于邲楚使求成于我我許之盟有日矣楚人來致師我逐之既免旃求卿未得且怒失楚之致師者請挑戰弗許請召盟許之㑹魏錡魏犫之子求公族未得怒欲敗我師請致師弗許請使許之遂往請戰而還楚人逐錡旃夜至于楚軍席于軍門之外使其徒入之楚子逐旃旃棄車而走林屈蕩摶之得其甲裳我懼旃錡之怒楚師也使軘車逆之楚亦懼王之入我軍也遂出陳乘我師我師敗績旃以其良馬二濟其兄與叔父兄趙朔叔父趙同趙括以他馬反遇敵不能去棄車而走林逢大夫晉人與其二子乘謂其二子無顧不欲見趙旃顧曰趙叟在後怒之使下指木曰尸女于是授旃綏以免明日以表即所指木尸之皆重獲在木下十一年成二年我敗齊師于鞍明年賞鞍之功以旃為卿為新下軍佐景公薨事厲公厲公三年成十三年我伐秦以旃將新軍敗秦師于麻隧獲秦成差及不更女父并秦大夫旃子勝是為須子食采邯鄲又曰邯鄲勝事平公平公八年襄二十三年齊伐我取朝歌封少水而還勝帥東陽之師以追之獲晏氂齊大夫勝之曽孫朝頃公時魏舒為政謂朝餘子卿之庶子為餘子之不失職能守業者以為平陽大夫左傳欒書欒書欒盾之子武子也初事景公景公三年宣十二年楚克鄭鄭及楚平潘尫楚大夫師叔入盟子良鄭伯弟出質夏我師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍書佐之及河聞鄭既及楚平林父欲還先縠不可以中軍佐濟師遂濟次于邲鄭使如我師曰楚驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗先縠曰敗楚服鄭于此在矣必許之書曰楚自克庸以來其君無日不討國人而訓之於民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之於勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路籃縷以啓山林針之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不德而徼怨於楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩司馬法百人為卒二十五人為兩車十五乘為大偏今以十五乘為一廣亦用舊偏法復以二十五人為承副右廣初駕數及日中左則受之以至於昏內官序當其夜以待不虞不可謂無備師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙朔曰欒伯善哉實其言必長晉國已而趙旃魏錡怒楚師楚師乘我軍我師敗績十一年成二年郤克將中軍士燮佐上軍書將下軍伐齊敗齊師於鞍十三年成四年書代郤克將中軍以救許伐鄭取汜祭十五年成六年楚以鄭從晉故伐鄭書救鄭與楚師遇于繞角楚師還我遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請于書書將許之荀首士燮韓厥諌曰不可吾來救鄭楚師去我吾遂至于此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱己甚不如還也遂還于是軍帥之欲戰者衆或謂書曰聖人與衆同欲是以濟事子盍從衆子為大政將酌于民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也書曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎遂侵沈獲沈子揖初十七年成八年書侵蔡遂侵楚獲申驪楚大夫皆從知韓范也十八年成九年鄭伯來討其二于楚也執諸銅鞮書伐鄭殺其行人伯蠲十九年成十年鄭立髠頑康成公大子為君書曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉㑹景公有疾五月立厲公州蒲以為君而㑹諸侯伐鄭鄭成鄭伯歸六月景公薨厲公三年成十三年書及士燮韓厥以諸侯之師伐秦戰于麻隧秦師敗績六年成十六年鄭叛我公將伐之士燮不可書曰不可以當吾世而失諸侯必伐鄭乃興師鄭告于楚楚子救鄭五月我師濟河聞楚師將至士燮欲反書不可六月晉楚遇于鄢陵書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也乃戰射共王中目楚師宵遁晉入楚軍三日榖七年成十七年書怨郤至以其不從已而敗楚師也搆之于公公使長魚矯殺三郤胥童以甲劫書及中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也使辭于二子曰寡人有討于郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣于死君之惠也二臣雖死敢忘君德乃皆歸公逰于匠麗氏書及偃遂執公而殺胥童明年使程滑大夫弒公葬之于翼東門之外以車一乘逆周子于京師而立之是為悼公左傳是年書卒諡曰武子荀偃荀偃字伯遊庚之子中行獻子也為大夫厲公六年成十六年公伐鄭楚救之偃佐上軍敗楚鄭于鄢陵七年成十七年公殺三郤書及偃執公明年弒之逆周子于京師而立之是為悼公悼公元年襄元年韓厥及偃伐鄭入其郛敗其徒兵于洧上東諸侯之師次于鄫以待我師我師以鄫之師侵楚焦夷及陳九年襄九年公㑹諸侯伐鄭偃及韓起門于師之梁鄭城門鄭人請成偃欲圍鄭以待楚之救鄭而與之戰諸侯皆不欲乃許鄭成十一月同盟于戲十二月我復以諸侯伐鄭門其三門次于隂口鄭地而還十年襄十年公及諸侯㑹吳于柤楚地偃士丐請伐逼陽妘姓國而封宋向戍宋大夫五月滅逼陽以與向戍向戍辭乃與宋公十三年襄十三年荀罃卒中軍將公搜于綿上以治兵使偃將中軍十四年襄十四年公伐秦報櫟之役櫟役在十一年公待于竟使六卿帥諸侯之師以進至于棫林秦地偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶惡之曰余馬首欲東乃歸偃曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役夏四月衛孫林父出其君獻公而立公孫剽公問衛故于偃對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎悼公薨事平公平公元年襄十六年公㑹諸侯于溴梁與諸侯宴使諸大夫舞曰歌詩必類歌古詩當各從義類齊髙厚之詩不類偃怒且曰諸侯有異志矣使諸大夫盟髙厚厚逃歸于是偃及諸大夫盟曰同討不庭夏五月偃㑹諸侯之師伐許次于函氏許地偃及欒黶帥師伐楚及楚師戰于湛阪楚師敗績遂侵方城之外復伐許而還三年襄十八年齊伐魯偃將伐齊夢與厲公訟弗勝公以戈擊之首隊于前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事于東方則可以逞巫知偃有死徴勸之决意伐齊偃許諾公伐齊將濟河偃以朱絲係玉二㲄而禱曰齊環靈公名怙恃其險負其衆庶棄好背盟陵虐神主神主謂民也曽臣彪彪平公名曽臣猶末臣將帥諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹于魯濟同伐齊齊侯禦諸平隂塹防門而守之諸侯之士門焉齊人多死齊侯登巫山望我師我使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曵柴而從之齊侯畏其衆乃脫歸齊師夜遁十二月入平隂遂從齊師偃以中軍克京兹魏絳以下軍克邿趙武以上軍圍盧弗克遂焚雍門及四郭東侵及濰南及沂明年還及沂上盟諸侯于督揚公先歸魯襄公享我六卿于蒲圃賜之三命之服軍尉以下皆受一命之服賄偃以束錦加璧乘馬先吳夀夢之鼎偃疸疽生瘍于頭濟河及著雍病目出士丐請見弗內請後曰鄭甥可鄭甥荀吳其母鄭女二月卒而視不可含士丐盥而撫之曰事吳敢不如事主猶視欒盈曰其為未卒事于齊故也乎乃復撫之曰主茍終所不嗣事于齊者有如河乃瞑受含士丐出曰吾淺之為丈夫左傳諡曰獻子論曰書云作之君君者天也天一而已人無二天臣無二君通義也是故天無道不可以力勝君無道不可以逆加樹榖而焚之食之者其鮮矣晉之亂君厲靈為甚良臣宣猷莫逾欒趙豫榜逆臣而以書盾次列之蓋信通義以厠董狐匪得已也然君免臣死顧乃賊之書之罪實成于弒矣晉亂臣傳郤芮郤稱瑕吕飴甥郤芮字子公郤豹之子也食邑于冀故曰冀芮芮與郤稱及瑕吕飴甥并為公子夷吾臣驪姬之難也夷吾奔屈重耳奔狄獻公使賈華大夫伐屈夷吾將奔狄芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁左傳國語郤芮曰後出同走不免于罪且夫偕出偕入難聚居異情惡不若走梁梁近于秦秦親吾君吾君老矣子往驪姬懼必援于秦以吾存也且必告悔告悔是吾免也乃之梁居二年驪姬使奄楚以環釋言韋昭注謂以玉環自解釋也獻公薨里克殺奚齊及卓子郤稱及飴甥使告夷吾于梁夷吾告芮曰吕甥欲納我芮曰子勉之國亂民擾大夫無常不可失也非亂何入非危何安幸茍君之子唯其索之方亂以擾孰適禦我大夫無常茍衆所置孰能勿從子盍盡國以賂外內無愛虛以求入既入而後圖聚夷吾許使者飴甥出告大夫曰君死自立則不敢久則恐諸侯之謀徑召君于外也則民各有心恐厚亂盍請君于秦乎乃使告于秦穆公穆公使公子縶弔夷吾于梁夷吾告芮曰秦人勤我矣芮曰子勉之亡人無狷潔狷潔不行重賂配德公子盡之無愛財人實有之我以徼幸不亦可矣夷吾出見使者且賂之穆公問芮曰公子誰恃于晉對曰臣聞之亡人無黨有黨必有讎夷吾之少也不好弄戲不過所復怒不及色及其長也弗改是故出亡無惡于衆而衆安之不然夷吾不佞其誰能恃乎秦納夷吾是為惠公惠公元年僖十年公背秦賂使丕鄭聘秦且謝之而殺里克丕鄭說穆公召飴甥郤稱及芮而止之立重耳芮曰鄭之使薄而報厚其言我于秦也必使誘我弗殺必作難乃殺丕鄭及七輿大夫共華賈華叔堅騅歂纍虎特宫山祁皆里丕之黨也文公元年僖二十四年十月惠公薨懷公圉即位十二月秦納重耳懷公奔髙梁飴甥及芮帥師軍于廬栁秦使公子縶如師師退狐偃入盟重耳遂立是為文公既而飴甥及芮畏逼悔納公作亂焚公宮求公不獲遂如河上秦穆公誘而殺之國語瑕呂飴甥者姓瑕呂名飴甥字子金食邑于隂又曰隂飴甥紀年獻公十九年命瑕父呂甥邑于國都惠公六年僖十五年韓之役也秦獲惠公以歸既而許晉平公使郤乞大夫告瑕呂飴甥且召之飴甥教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也公從之衆皆哭于是乎作爰田分公田之稅爰之于所賞之衆飴甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說于是乎作州兵州二千五百家使州長各繕甲兵冬十月飴甥㑹秦穆公盟于王城穆公曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讐寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和穆公曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然穆公曰是吾心也遂歸公左傳郤稱亦郤氏族秦伯誘殺二子而不及稱稱或前死與尚史卷四十七
