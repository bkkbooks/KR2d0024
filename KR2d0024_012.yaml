body:
  text: 尚史卷十二世家五鑲白旗漢軍李鍇撰齊世家始武王十三年終安王二十三年凡七百四十四年傳二十八世太公丁公乙公癸公哀公胡公太公是為師尚父武王已平商而王天下封師尚父于齊營邱及成王少時管蔡作亂淮夷畔周乃使召康公命太公曰東至海西至河南至穆陵北至無棣五侯九伯實得征之齊繇此得征伐為大國都營邱太公之薨百有餘年子丁公吕伋即位丁公薨正義諡法述義不克曰丁按以丁為諡則乙公癸公又何説乎蓋猶用殷法以生日名子作諡非子乙公得即位乙公薨子癸公慈母即位系本作祭公古史考作祭公慈心癸公薨子哀公不辰即位世本作不臣宋𠂻曰哀公荒淫田遊史作還之詩以刺之哀公時紀侯譖之周夷王王烹哀公而立其弟靜是為胡公史記太公封于營邱比及五世皆反葬于周記檀弓胡公徙都薄姑獻公山襲殺之史記自胡公以上其年皆莫可考獻公武公厲公文公成公莊公獻公名山哀公同母少弟周夷王烹哀公而立胡公厲王時山怨胡公乃與其黨率營邱人襲攻殺胡公而自立是為獻公獻公元年盡逐胡公子因徙薄姑都治臨災九年公薨諡曰獻子武公即位武公名夀武公九年厲王出奔居彘十年王室亂大臣行政號曰共和二十四年宣王初立二十六年公薨諡曰武子厲公即位厲公名無忌厲公九年暴虐故胡公子復入齊齊人欲立之乃與攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君而誅殺厲公者七十人諡公曰厲世家無年用年表公子赤立是為文公文公十二年薨諡曰文子成公即位成公名脫系本古史考並作説成公九年薨諡曰成子莊公即位莊公名購系家系本並作贖莊公十三年宣王崩幽王立二十四年犬戎殺幽王周東徙雒六十四年公薨諡曰莊史記僖公以下春秋僖公名祿父莊公子莊公薨僖公即位九年魯隱公初立史記十一年隱三年春三月平王崩桓王立冬十二月公及鄭伯盟于石門先是與鄭盟于盧此復尋盧之盟十四年隱六年夏五月公會魯公盟于艾十五年隱七年夏使弟夷仲年如魯聘十六年隱八年春將平宋衛秋公會宋公衛侯于溫盟于瓦屋八月鄭伯以我朝王瓦屋周地鄭莊公以公在周地故以我朝王十七年隱九年宋不王王命伐宋冬公會魯公于防謀伐宋十八年隱十年春正月公會魯公鄭伯于中邱盟于鄧夏五月會伐宋六月復會于老桃敗宋師冬及鄭入郕討違王命不會伐宋十九年隱十一年秋七月公會魯公鄭伯伐許入之二十二年桓三年春正月公會魯公于嬴成昏于我也夏公及衛侯胥命于蒲秋七月魯公子翬來逆女公送薑氏于歡魯公來會冬夷仲年如魯聘二十四年桓五年夏公及鄭伯朝于紀欲襲紀紀人知之二十五年桓六年夏北戎伐我我乞師于鄭六月鄭敗戎師諸侯使大夫來戌二十六年桓七年秋及鄭衛伐盟向二邑名二十九年桓十年冬公及衛鄭戰魯于郎三十年桓十一年及衛鄭宋盟于惡曹三十二年桓十三年春二月魯公紀侯鄭伯及我與宋衛燕戰我師宋師衛師燕師敗績三十三年桓十四年冬十二月公薨左傳諡曰僖在位三十三年襄公襄公名諸兒僖公子僖公薨襄公即位元年桓十五年春三月桓公崩莊王立夏四月葬僖公六月公會魯公于艾謀定許二年桓十六年冬衛惠公來奔左公子泄右公子職立公子黔牟故三年桓十七年春正月公會魯公紀侯盟于黃平齊紀且謀衛夏及魯師戰于奚疆事也四年桓十八年春正月公會魯公于濼遂及文薑來公通焉魯公謫文薑文薑以告夏四月享魯公使公子彭生乘魯公魯公卒于車魯人來讓我殺彭生鄭高渠彌弒昭公立公子亹秋公師于首止殺子亹而轘高渠彌五年莊元年春三月魯文薑來奔冬王姬歸于我我師遷紀郱鄑郚欲滅紀故遷其三邑六年莊二年秋七月王姬卒冬十二月公會魯文薑于禚文薑還魯經傳不書七年莊三年春會魯師伐衛秋紀季紀侯弟以􅈶入于我我欲滅紀故季以邑入齊八年莊四年春二月魯文薑享公于祝邱夏公及陳侯鄭伯遇于垂紀侯大去其國違齊難也九年莊五年夏魯文薑來我師冬會魯宋陳蔡伐衛納惠公十年莊六年冬歸衛寶于魯文薑請之也十一年莊七年春魯文薑會公于防冬復會于榖十二年莊八年夏師及魯師圍郕郕降于我冬十二月公遊于姑棼遂田于貝邱見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足連稱管至父弒公而立公孫無知左傳諡曰襄在位十二年桓公桓公名小白僖公之庶子其母衛女也史記初襄公之立也無常小白出奔莒及亂作公子紏奔魯齊人立公孫無知桓公元年莊九年春雍廪齊大夫殺無知夏魯伐我納子糾小白自莒先入立是為桓公史記雍林人襲殺無知告齊大夫曰更立公子之當立者初襄公殺誅數不當羣弟恐禍及故弟紏奔魯管仲召忽傅之弟小白奔莒鮑叔傅之小白少好善大夫殺無知髙國先隂召小白魯亦發兵送子紏而使管仲别將兵遮莒道射中小白帶鉤小白佯死管仲使報魯魯送紏者行遲六日至齊小白已入立為桓公桓公載溫車中馳行又有髙國應故得先入立吕氏春秋同管子襄公逐小白小白走莒襄公薨公子糾踐位國人召小白小白曰不可管仲知召忽疆武鮑叔曰管仲得行其志于國國可謂亂乎召忽疆武豈能獨圖我哉乃命車駕鮑叔御小白乘而出于莒至于邑郊鮑叔令車二十乘先十乘後乃誓曰事之濟也聼我令事之不濟也免公子者為上死者為下吾以五乘之實距路鮑叔乃為前驅遂入國逐公子紏管仲射小白中鉤管仲與公子糾召忽遂走魯魯伐齊納公子糾而不能秋七月葬襄公八月我及魯師戰于乾時魯師敗績鮑叔牙帥師如魯曰子紏親也請君討之管召讐也請受而甘心焉乃殺子紏于生竇召忽死之管夷吾請囚鮑叔牙受之及堂阜而稅之歸而以告曰管夷吾治于髙傒使相可也公從之左傳國語桓公反于齊使鮑叔為宰辭曰非臣之所能也若必治國家者則管夷吾乎公曰管夷吾射寡人中鉤是以濱于死對曰夫為其君動也君若宥而反之夫猶是也公曰施伯魯之謀臣也知吾將用之必不豫對曰使人請諸魯曰寡人有不令之臣在君之國欲以戮于羣臣固請之則豫我矣公請諸魯施伯曰非欲戮之也欲用其政也令彼在齊必長為魯國憂矣殺而以其尸授之將殺管仲使者請曰寡君欲生為戮若不生得猶未得請也于是束縛以豫齊史記管子吕氏春秋略同桓公既得管夷吾與鮑叔牙隰朋髙傒修齊國政連五家之兵設輕重魚鹽之利輕重錢也又有捕魚煮鹽法以贍貧窮祿賢能齊人皆説史記二年莊十年春伐魯魯敗我師于長勺夏六月我師宋師次于郎魯敗宋師于乘邱我師乃還冬滅談談子奔莒公子出也過談談不禮焉及入諸侯皆賀談又不至三年莊十一年冬公如魯逆王姬即共姬桓公夫人四年莊十二年莊王崩僖王立五年莊十三年春公及宋陳蔡邾會于北杏以平宋亂宋弒閔公故衣裳之會一遂人不至夏滅遂而戍之冬公會魯公盟于柯左傳魯將盟曹劌以匕首劫公于壇上曰反魯之侵地公許之已而曹劌去匕首北面就臣位公後悔欲無與魯地而殺曹劌管夷吾曰夫劫許之而倍信殺之愈一小快耳而棄信于諸侯失天下之援不可于是遂與魯地諸侯聞之皆信齊而欲附焉史記史又曰五年伐魯魯將師敗公獻遂邑以平又曰與曹沫三敗所亡地國䇿亦曰三戰之所亡一朝而復之按遂國名舜後以不會北杏故滅之非魯邑也且長勺郎之師魯皆勝無三敗事史誤又曹沫事傳不載公羊榖梁吕氏春秋皆有之宋背北杏之會六年莊十四年春諸侯齊陳曺伐宋我請師于周夏單伯會之取成于宋而還冬公會單伯及諸侯齊宋衛鄭于鄄宋服故衣裳之會二七年莊十五年春公復會諸侯宋陳衛鄭于鄄齊始霸衣裳之會三秋諸侯為宋伐郳郳附庸屬宋而叛故鄭人間之而侵宋八年莊十六年夏諸侯宋齊衛伐鄭冬十二月公會諸侯宋陳衛鄭許滑滕魯同盟于幽鄭成故衣裳之會四九年莊十七年春執鄭詹鄭大夫鄭不朝齊故夏遂人饗我戍醉而殺之我戍殱焉穀梁遂之囚民飲戍者而殺之僖王崩惠王立十一年莊十九年秋公及宋公魯公子結盟于鄄冬我及宋陳伐魯西鄙微者會鄄盟故十二年莊二十年夏大災冬伐戎十四年莊二十二年春陳公子完來奔秋七月髙傒及魯盟于防冬魯公來納幣十五年莊二十三年夏魯公來觀社公及魯公遇于榖冬十二月公會魯公盟于扈十六年莊二十四年夏魯公來逆女十八年莊二十六年秋我會魯宋伐徐十九年莊二十七年夏六月公會諸侯魯宋陳鄭同盟于幽陳鄭服故衣裳之會五冬公會魯公于城濮二十年莊二十八年春公伐衛敗衛師數之以王命取賂而還秋荆伐鄭我會魯宋救鄭二十二年莊三十年秋七月降鄣紀附庸國冬公及魯公遇于魯濟謀山戎以其病燕故左傳山戎伐燕燕來告急公救燕遂伐山戎至于孤竹而還燕莊公送公于齊境公曰非天子諸侯相送不出境吾不可以無禮于燕于是分割燕君所至與燕命燕君復修召公之政納貢于周如成康時諸侯聞之皆從齊史記管子桓公北伐孤竹至卑耳之溪十里援弓將射引而未敢發謂左右曰見是前人乎對曰不見也公曰事其不濟乎寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也祛衣示前有水也右祛衣示從右方涉也至卑耳之溪贊水者曰左方涉深及冠右方涉深至膝右涉其大濟桓公立拜管仲于馬前曰仲父之聖至若此管子桓公曰天下之國莫強于越今寡人欲北舉事孤竹離枝恐越人之至為此有道乎管子對曰君請遏原流大夫立沼池以矩遊為樂則越人安敢至桓公曰行事奈何對曰請以令隱三川立員都立大舟之都大身之都有淵深壘十仭令曰能遊者賜千金未能用金千齊民之遊水不避吳越桓公終北舉事于孤竹離枝越人果至隱曲薔以水齊管子有扶身之士五萬人以待戰于曲薔大敗越人按是時越為小國未嘗見諸經何得有敗越事又伐孤竹而備越亦不相及矣韓非子有老馬知道蟻壤得水事見隰朋傳二十三年莊三十一年夏六月公如魯獻戎捷説苑桓公將伐山戎使人請助于魯魯許助之而不行齊已伐山戎而欲移兵于魯管仲曰不可伐逺而還誅近鄰鄰國不親非霸王之道君所得山戎之寶器不可不進周公之廟乎桓公乃分山戎之寶獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至伐莒事未聞二十四年莊三十二年春公為楚伐鄭之故請會于諸侯宋公請先見夏遇于梁邱冬十月魯莊公子慶父弒子般慶父來奔公子友奔陳二十五年閔元年春狄伐邢管夷吾言于公曰戎狄豺狼不可厭也諸夏親䁥不可棄也宴安鴆毒不可懷也請救邢我師救邢秋八月公及魯公盟于落姑魯請復公子友許之冬仲孫湫如魯省難二十六年閔二年春正月遷陽陽國名齊逼徙之秋八月魯慶父弒閔公哀薑公女弟與知之故孫于邾公取而殺之于夷以其尸歸冬髙傒如魯盟十二月狄入衛衛立戴公以廬于曹衛邑公使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩二十七年僖元年春正月我師宋師曹伯次于聶北救邢邢人潰出奔師師逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之楚伐鄭秋八月公會諸侯魯宋鄭曹邾于柳謀救鄭衣裳之會六二十八年僖二年春正月諸侯城楚邱而封衛秋七月公及宋公江人黃人盟于貫服江黃也衣裳之會不在九合之數寺人貂始漏師于多魚漏泄軍事也二十九年僖三年秋公及宋公江人黃人會于陽穀謀伐楚也衣裳之會不在九合之數公尋魯盟冬魯公子友來涖盟三十年僖四年春正月公會諸侯魯宋陳衛鄭許曹侵蔡蔡潰遂伐楚次于陘夏楚屈完來盟于師盟于召陵執陳轅濤塗誤軍道故冬十二月我會諸侯魯宋衛鄭許曹之師侵陳陳成歸轅濤塗三十一年僖五年夏公及諸侯魯宋陳衛鄭許曹會王世子于首止王以惠后故將廢太子公帥諸侯會之以定其位衣裳之會七秋八月諸侯盟于首止鄭伯逃歸不盟三十二年僖六年夏公會諸侯魯宋陳衛曹伐鄭圍新城秋楚人圍許諸侯遂救許三十三年僖七年春我伐鄭秋七月公會諸侯魯宋陳鄭盟于寧母衣裳之會八公修禮于諸侯諸侯官受方物諸侯官司各于齊受其方所當貢天子之物鄭伯使大子華聼命于會言于公曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉公將許之管夷吾曰君以禮與信屬諸侯而以姦終之不可公辭焉冬鄭來請盟閏月惠王崩襄王惡大叔帶之難懼不發喪而告難于我三十四年僖八年春正月公會王人及諸侯魯宋衛許曹陳盟于洮謀王室鄭伯乞盟襄王定位而後發喪兵車之會一三十五年僖九年夏公會宰周公及諸侯魯宋衛鄭許曹于葵邱王使宰孔賜公胙曰天子有事于文武使孔賜伯舅胙公將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受秋九月戊辰諸侯盟于葵邱曰凡我同盟之人既盟之後言歸于好榖梁葵邱之盟陳牲而不殺讀書加于牲上一明天子之禁曰毋雍泉毋訖糴母易樹子毋以妾為薑毋使婦人與國事公羊葵邱之會桓公震而矜之叛者九國晉獻公卒里克殺奚齊卓子冬公以諸侯之師伐晉及髙梁而還隰朋帥師會秦師納晉惠公三十六年僖十年春正月魯公來夏四月隰朋立晉惠公公及許男伐北戎三十七年僖十一年夏魯公及夫人薑氏會公于陽榖三十八年僖十二年王以戎難討王子帶去年子帶召戎伐京師子帶來奔冬公使夷吾平戎于王使隰朋平戎于晉三十九年僖十三年春使仲孫湫聘于周夏公會諸侯魯宋陳衛鄭許曹于鹹淮夷病把故且謀王室兵車之會二秋為戎難故諸侯戍周使仲孫湫致之四十年僖十四年春諸侯城緣陵而遷把四十一年僖十五年春正月魯公來楚伐徐三月公會諸侯魯宋陳衛鄭許曹盟于牡邱楚伐徐救徐也兵車之會三諸侯之師救徐諸侯次于匡以待之秋伐厲以救徐四十二年僖十六年夏伐厲不克救徐而還秋王以戎難來告我徵諸侯而戍周冬十二月公會諸侯魯宋陳衛鄭許邢曹于淮謀鄫且東略也兵車之會四城鄫役人病有夜登邱而呼曰齊有亂不果城而還四十三年僖十七年春我及徐人伐英氏魯滅項我討魯止魯公秋魯夫人聲薑會公于卞請魯公也初公之夫人三王姬徐嬴蔡姬皆無子公好內多內寵內嬖如夫人者六人長衛姬生無虧少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公于宋襄公以為太子雍巫有寵于衛共姬因寺人貂以薦羞于公亦有寵公許之立無虧管夷吾卒五公子皆求立冬十月公薨易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯史記桓公病五公子各樹黨爭立及公卒遂相攻以故宫中空莫敢棺公尸在牀上六十七日尸蟲出于户吕氏春秋管仲有疾桓公往問之曰仲父之疾病矣將何以教寡人管仲對曰願君之逺易牙豎刁常之巫衛公子啓方公曰諾管仲死盡逐之食不甘宫不治苛病起朝不肅居三年公曰仲父不亦過乎皆復召而反明年公有病常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宫門築髙牆不通人矯以公令有一婦人踰垣入至公所公曰我欲食婦人曰吾無所得公又曰我欲飲婦人曰吾無所得公曰何故對曰易牙刁豎常之巫相與作亂塞宫門築髙牆不通人故無所得衛公子啓方以書社四十下衛公慨焉歎涕出曰嗟乎聖人之所見豈不逺哉若死者有知將何面目以見仲父乎蒙衣袂而絶乎夀宫蟲流出于户上蓋以楊門之扇三月不葬事類趙主父桓公霸主必不至是三月不葬亦誤孝公元年僖十八年秋八月葬桓公左傳皇覽桓公冡在臨災城南七里所災水之南括地志在臨災縣南二十一里牛山上亦名鼎足山一所二墳晉永嘉末人發之初得版次得水銀池有氣不得入經數日乃牽犬入得金蠶數十薄珠𥜗玉匣繒綵軍器不可勝數又以人殉葬骸骨狼籍也諡曰桓在位四十三年當桓公時周室微唯齊楚秦晉為強晉初與會獻公死國內亂秦穆公辟逺不與中國會盟楚成王初收荆蠻有之雄長南服唯獨齊為中國會盟而桓公能宣其德故諸侯賔會于是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹西伐大夏涉流沙束馬懸車登太行至卑耳山而還諸侯莫違寡人寡人兵車之會三乘車之會六九合諸侯一匡天下昔三代受命又何以異于此乎吾欲封泰山禪梁父管夷吾固諌不聼乃説桓公以逺方珍怪物至乃得封桓公乃止史記淮南子桓公立政去食肉之獸食粟之鳥係罝之網三舉而百姓説韓詩外傳同孝公孝公名昭桓公子母鄭姬桓公與管夷吾屬孝公于宋襄公以為大子桓公薨易牙立公子無虧長衛姬子武孟孝公奔宋孝公元年僖十八年春宋襄公以諸侯曹衛邾之師伐我我殺無虧將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗我師于甗立孝公三年僖二十年秋及狄人盟于邢衛伐邢故四年僖二十一年及宋楚盟于鹿上六年僖二十三年我伐宋圍緡討不與盟于齊九年僖二十六年春侵魯西鄙魯追我師至􅈶弗及討魯與衛莒盟故夏伐魯北鄙衛伐我冬魯以楚師伐我取榖置桓公子雍于榖雍巫奉之以為魯援楚申公叔侯戍之十年僖二十七年夏六月公薨秋八月葬左傳諡曰孝在位十年昭公昭公名潘桓公子母曰葛嬴孝公薨弟公子潘即位是為昭公元年僖二十八年春二月公及晉侯盟于斂盂穀氏迫故夏四月國歸父及諸侯之師敗楚於城濮五月公會周王子虎及諸侯晉魯宋蔡鄭衛莒盟于踐土冬公會諸侯晉魯宋蔡鄭陳莒邾秦于溫天王狩于河陽諸侯遂圍許二年僖二十九年夏國歸父會周王子虎及魯公諸侯之大夫晉宋陳秦盟于翟泉三年僖三十年狄侵我六年僖三十三年國歸父聘于魯秋狄侵我冬魯公來朝七年文元年冬魯公孫敖來聘八年文二年魯公子遂來納幣十年文四年魯來逆出薑狄侵我十三年文七年公會諸侯魯宋衛陳鄭許曹晉大夫盟于扈晉靈公立故十四年文八年秋八月襄王崩頃王立十五年文九年魯出薑來歸寧夏狄侵我十七年文十一年鄋瞞侵我二十年文十四年春頃王崩匡王立夏五月公薨左傳諡曰昭在位二十年懿公懿公名商人亦桓公子母曰密姬魯女子叔姬妃昭公生舍叔姬無寵舍無威商人驟施于國而多聚士盡其家貸于公有司以繼之昭公二十年文十四年薨舍即位秋七月商人弒舍而自立冬周單伯來為魯請子叔姬執之又執子叔姬懿公元年文十五年赦單伯秋侵魯西鄙冬十一月晉會諸侯宋衛蔡陳鄭許曹盟于扈謀伐我我賂晉侯不克伐而還十二月歸魯子叔姬侵魯西鄙遂伐曹入其郛討其朝魯故二年文十六年春及魯平公會魯季孫行父于陽穀夏六月公及魯公子遂盟于郪邱三年文十七年伐魯北鄙經作西鄙蓋誤魯請盟夏六月公及魯公盟于穀冬魯公子遂來四年文十八年春公將伐魯戒師期而有疾醫曰不及秋將死夏五月公遊于申池邴􅧬閻職弒公納諸竹中國人立公子元左傳諡曰懿在位四年惠公惠公名元亦桓公子母曰少衛姬初懿公商人之弒舍也讓于兄元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之懿公遂立元不順懿公之為政終不曰公曰夫已氏懿公四年文十八年遇弒國人立元是為惠公是年魯文公卒秋公子遂叔孫得臣來請立文公庶子倭公新立欲親魯許之魯遂弒文公大子惡及弟視立倭即宣公冬出薑大子惡母歸于我季孫行父來惠公元年宣元年春魯公子遂來逆女夏魯季孫行父來納賂以請會公會魯侯于平州定宣公位也公子遂來拜成六月我取魯濟西田二年宣二年冬十月匡王崩定王立三年宣三年秋赤狄侵我四年宣四年春公及魯侯平莒及郯莒人不肯魯伐莒夏赤狄侵我秋魯侯來五年宣五年春魯侯來髙固使公止魯侯請叔姬秋九月髙固如魯逆叔姬六年宣六年夏定王使子服周大夫來求后冬召桓公來逆王后七年宣七年夏公會魯侯伐萊九年宣九年春正月魯侯來夏伐萊十年宣十年春魯侯來以魯服故歸魯濟西田夏四月公薨左傳諡曰惠在位十年頃公頃公名無野惠公子惠公十年宣十年薨公即位夏魯侯來奔喪六月葬惠公秋魯季孫行父來聘冬魯公孫歸父來公使國佐如魯報聘二年宣十一年夏魯公孫歸父會伐莒三年宣十三年春伐莒莒恃晉故四年宣十四年公會魯公孫歸父于榖五年宣十五年秋髙固會魯仲孫蔑于無婁七年宣十七年春晉侯使郤克徵會于我公帷婦人使觀之郤克登婦人笑于房克怒公使髙固晏弱蔡朝南郭偃會晉及斂盂髙固逃歸夏諸侯會于斷道晉執晏弱蔡朝南郭偃八年宣十八年春晉侯衛大子臧伐我至于陽榖公會晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸十年成二年春公伐魯取龍遂南侵及巢邱夏四月及衛孫良夫戰于新築衛師敗績六月晉郤克會魯季孫行父衛孫良夫曹公子首及公戰于鞍我師敗績晉師從我師入自邱輿擊馬陘公使國佐賂以紀甗玉磬與地秋七月晉師及國佐盟于爰婁使歸魯汶陽之田冬十一月及楚公子嬰齊魯侯蔡侯許男諸侯之大夫秦宋陳衛鄭曹邾薛鄫盟于蜀十一年成三年冬公朝晉史記頃公朝晉欲尊王晉晉不敢受乃歸歸而頃公弛苑囿薄賦斂振孤問疾虛積聚以救民民大説厚禮諸侯竟頃公卒百姓附諸侯不犯説苑公歸七年不飲酒不食肉外金石之聲逺婦女之色出會與盟卑下諸侯十三年成五年冬十一月定王崩簡王立十二月公會諸侯晉魯宋衛鄭曹邾杞同盟于蟲牢鄭服故十五年成七年秋楚伐鄭公及諸侯晉魯宋衛曹莒邾杞救鄭十六年成八年春晉使魯歸汶陽之田于我十七年成九年春公會諸侯晉魯宋衛鄭曹邾杞同盟于蒲歸汶陽之田諸侯二故秋七月公薨諡曰頃冬十一月葬頃公左傳在位十七年靈公靈公名環頃公子頃公薨靈公即位元年成十年夏五月公會諸侯晉魯宋衛曹伐鄭鄭從楚故二年成十一年秋魯叔孫僑如來聘四年成十三年春公及諸侯魯宋衛鄭曹邾滕朝王遂從劉康公成肅公會晉侯伐秦五年成十四年秋魯叔孫僑如來逆女六年成十五年春國佐會諸侯晉魯衛鄭曹宋邾同盟于戚討曹成公冬十一月髙無咎會諸侯之大夫晉魯宋衛鄭邾會吳于鍾離七年成十六年晉將伐鄭郤犨來乞師夏六月晉楚遇于鄢陵戰之日國佐髙無咎至于師秋七月公會諸侯晉魯衛宋邾于沙隨謀伐鄭國佐會周尹子晉侯邾人伐鄭八年成十七年夏五月公會周尹武公單襄公及諸侯晉魯宋衛曹邾伐鄭六月同盟于柯陵秋刖鮑牽逐髙無咎無咎奔莒髙弱無咎子以盧叛慶克通于靈公母聲孟子鮑牽告國佐國佐責之夫人怒譖髙鮑冬公會周單襄公及諸侯晉魯宋衛曹邾伐鄭十月圍鄭楚救鄭諸侯還公使崔杼慶克帥師圍盧國佐如盧師殺慶克以榖叛公與之盟于徐關而復之十二月盧降使國勝國佐子告難于晉待命于清九年成十八年春殺國佐清人殺國勝冬十二月崔杼會諸侯晉宋衛邾魯同盟于虛朾楚伐宋故十年襄元年春晉會諸侯之大夫魯宋衛曹莒邾滕薛圍宋彭城討魚石故我不會彭城晉人以為討二月大子光為質于晉夏晉韓厥伐鄭崔杼會諸侯魯曹邾杞之師次于鄫以待晉師晉師以鄫之師侵楚焦夷及陳秋九月簡王崩靈王立十一年襄二年春公伐萊萊人使正輿子萊大夫賂夙沙衛以索馬牛皆百匹索簡擇好者乃還魯齊薑薨公使諸薑宗婦如魯送葬召萊子萊子不會晏弱城東陽以逼之冬崔杼會諸侯之大夫晉魯宋衛曹邾滕薛小邾于戚城虎牢以逼鄭鄭成十二年襄三年晉為鄭服故且欲修吳好將合諸侯使士丐來乞盟公欲勿許而難為不協乃盟于耐外夏六月世子光會周單頃公及諸侯晉魯宋衛鄭莒邾同盟于雞澤晉逆吳子吳子不至十四年襄五年秋世子光會諸侯晉魯宋陳衛鄭曹莒邾滕薛具鄫于戚會吳且戍陳冬楚伐陳光會諸侯于城棣以救之十五年襄六年春三月入萊萊共公浮柔奔棠陳無宇獻萊宗器于襄宫晏弱圍棠冬十一月滅之遷萊于郳十七年襄八年夏五月髙厚會晉侯鄭伯及諸侯之大夫魯鄭宋衛邾于邢邱十八年襄九年冬世子光會諸侯晉魯宋衛曹莒邾滕薛杞小邾伐鄭鄭成十二月同盟于戲晉人不得志于鄭以諸侯復伐之次于隂口而還十九年襄十年春髙厚相世子光先會諸侯前諸侯于鍾離夏會于柤秋世子光會諸侯伐鄭冬戍鄭虎牢侵鄭北鄙而歸二十年襄十一年夏四月世子光會諸侯伐鄭七月同盟于毫城北九月復伐鄭鄭使行成冬十二月會于蕭魚二十一年襄十二年王來求后公許昏王使隂里結之二十三年襄十四年春正月我及諸侯之大夫會吳于向為吳謀楚故夏崔杼會諸侯之大夫伐秦衛獻公來奔孫林父逐之秋王使劉定公賜公命將昏于齊故曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壞繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命二十四年襄十五年周劉夏來逆王后夏公伐魯北鄙圍成二于晉故二十五年襄十六年春三月諸侯會于溴梁髙厚逃歸晉平公使諸大夫舞曰歌詩必類厚歌詩不類晉怒公伐魯北鄙秋伐魯北鄙圍郕仲孫速徼之公曰是好勇去之以為之名二十六年襄十七年秋公伐魯北鄙圍桃髙厚圍臧紇于防二十七年襄十八年秋公伐魯北鄙冬十月諸侯會于魯濟伐我我禦諸平隂公登巫山以望晉師畏其衆也乃脫歸我師夜遁十一月晉入我平隂遂從我師克京兹克邿圍盧弗克公駕將走郵棠大子與郭榮大夫諌乃止二十八年襄十九年夏晉欒魴從衛孫林父伐我秋七月公薨公以五月薨因光定位而後赴故經書七月諡曰靈冬葬靈公左傳在位二十八年莊公莊公名光靈公子母曰鬷聲姬生光為大子靈公諸子有仲子戎子諸子者諸妾戎子嬖仲子生牙屬諸戎子戎子請以為大子許之仲子不可公曰在我而已遂東大子光使髙厚傅牙為大子夙沙衛為少傅靈公二十八年襄十九年公疾崔杼微逆光疾病而立之公薨光即位是為莊公執公子牙于句瀆之邱以夙沙衛易已衛奔髙唐以叛晉士丐侵我及穀聞靈公喪而還秋八月崔抒殺髙厚慶封圍髙唐弗克冬十一月公圍之髙唐人納我師醢衛于軍我及晉平盟于大隧莊公元年襄二十年夏六月公會諸侯晉魯宋衛鄭曹莒邾滕薛杞小邾盟于澶淵我與晉平故秋魯叔老來聘二年襄二十一年公使慶佐為大夫復討公子牙之黨執公子買公子鉏奔魯叔還奔燕晉欒盈亂冬公會諸侯晉魯宋衛鄭曹莒邾于商任錮欒氏三年襄二十二年秋晉欒盈自楚來晏嬰曰商任之會受命于晉今納欒氏將安用之弗聼冬公會諸侯晉魯宋衛鄭曹莒邾薛杞小邾于沙隨復錮欒氏四年襄二十三年秋公伐衛自衛將伐晉晏嬰崔杼諌弗聼遂伐晉取朝歌為二隊入孟門登大行張武軍于熒庭戍郫邵封少水以報平隂之役乃還還自晉不入遂襲莒莒人行成淮南子莊公出獵有蟲舉足將搏其輪其御曰此所謂螳螂者也知進而不知却不量力而輕敵公曰此為人必為天下勇武去回車避之勇武聞之知所盡死五年襄二十四年春魯仲孫羯帥師侵我公既伐晉而懼將欲見楚子楚子使薳啓疆來聘且請期我社搜軍實使客觀之秋公聞將有晉師使陳無宇從薳啓疆如楚辭辭辭會期也且乞師崔杼帥師從之遂伐莒諸侯前諸侯會于夷儀謀伐我冬楚子伐鄭以救我諸侯還救鄭楚子還使薳啓疆帥師送陳無宇國人城郟王地也叛晉欲求媚于天子故六年襄二十五年春崔杼伐魯夏五月莒子來朝享諸北郭崔杼稱疾不視事乙亥公問杼疾杼遂弒之側公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲左傳諡曰莊在位六年景公景公名杵臼魯叔孫僑如之在齊也叔孫還羣公子納其女于靈公嬖生杵臼莊公六年襄二十五年夏五月崔杼弒莊公立杵臼而相之是為景公慶封為左相丁丑盟國人于大宫辛巳公與大夫及莒子盟晉侯濟自泮會諸侯魯宋衛鄭曹莒邾滕薛杞小邾于夷儀以伐我我以莊公説使隰鉏請成慶封如師男女以班班辨也齊之男女各以其辨賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂皆以男女為賂晉侯許之秋七月同盟于重邱景公元年襄二十六年衛寧喜弒殤公納獻公晉執寧喜及衛獻公秋七月公及鄭伯為衛故如晉晉許歸獻公二年襄二十七年春慶封聘于魯夏宋向戍欲弭諸侯之兵以為名來告許之為會于宋秋七月盟于宋西門之外慶封陳須無實與此會經不書者以齊秦不交相見也九月崔杼死慶封當國三年襄二十八年夏朝于晉冬十月盧蒲癸田何殺慶舍慶封子慶封出奔魯既而奔吳癸巳靈王崩景王立經書十二月四年襄二十九年夏髙止會諸侯之大夫晉魯宋衛鄭曹莒滕薛小邾城杞吳子使札來聘秋九月髙止出奔北燕髙豎髙止子以盧叛冬十月閭邱嬰帥師圍盧髙止出奔晉五年襄三十年冬十月公孫蠆會諸侯之大夫前諸國于澶淵宋災故謀歸宋財既而無歸六年襄三十一年夏五月公孫蠆殺閭邱嬰蠆害嬰故七年昭元年春正月國弱會諸侯之大夫晉楚魯宋衛陳蔡鄭許曹于虢尋宋盟八年昭二年春晉韓起來納幣為平公聘少薑夏四月晉韓須來逆女使陳無宇送女致少薑晉謂無宇非卿執諸中都冬十月無宇歸九年昭三年少薑卒公使晏嬰請繼室于晉晉許之夏五月晉韓起來逆女公孫蠆以其子更公女而嫁公子秋九月公孫竈放盧蒲嫳于北燕北燕伯來奔冬十月公孫竈卒十年昭四年秋七月楚伐吳執慶封殺之十二年昭六年冬十一月公如晉請伐北燕晉許之十二月伐北燕將納簡公昭三年來奔十三年昭七年春正月公次于虢燕人行成二月盟于濡上燕人歸燕姬賂以瑶甕玉櫝斝耳不克納而還三月魯叔孫婼來涖盟十四年昭八年秋七月公孫蠆卒十五年昭九年魯仲孫貜來殷聘十六年昭十年夏陳無宇鮑國伐欒施髙疆欒施髙疆出奔魯公與陳無宇莒之傍邑辭穆孟姬景公母為之請髙唐陳氏始大秋九月國弱如晉葬晉平公十七年昭十一年楚圍蔡秋國弱會諸侯之大夫晉魯宋衛鄭曹把于厥憗謀救蔡十八年昭十二年春髙偃納北燕伯即簡公于唐夏公如晉朝嗣君十九年昭十三年秋公會周劉子及諸侯晉魯宋衛鄭曹莒邾滕薛杞小邾于平邱晉成虒祁諸侯二故晉人將尋盟我不可羊舌肸告于我曰晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣我懼對曰小國言之大國制之敢不聼從甲戌同盟于平邱二十二年昭十六年春公伐徐至于蒲隧徐人行成徐子及郯人莒人會公盟于蒲賂以甲父之鼎二十五年昭十九年秋髙發帥師伐莒莒子奔紀鄣秋七月我師入紀二十六年昭二十年夏公使公孫青聘于衛青頃公孫子石二十七年昭二十一年宋華貙亂冬十一月苑何忌會晉衛曹救宋二十八年昭二十二年春北郭啓帥師伐莒莒敗我師于夀餘宫伐莒莒子行成盟于稷門之外夏四月景王崩王猛立王子朝作亂冬十月王猛卒敬王立二十九年昭二十三年秋敬王居于狄泉尹氏立王子朝三十一年昭二十五年秋九月魯侯來奔次于陽州公唁魯侯于野井冬十二月公取鄆魯邑取以居魯侯三十二年昭二十六年夏公將納魯侯魯賂梁邱據據説公待于曲棘使公子鉏帥師從魯侯我師圍成及魯師戰于炊鼻秋公會魯侯莒子邾子杞伯盟于剸陵謀納魯侯冬十月敬王入于成周王子朝奔楚十二月彗星見三十五年昭二十九年春魯侯自乾侯至鄆公使髙張唁之稱主君大夫稱主君魯侯如乾侯三十八年昭三十二年冬髙張會諸侯之大夫晉魯宋衛鄭曹莒薛杞小邾城成周髙張後不從諸侯四十二年定四年春三月國夏會周劉子及諸侯晉魯宋蔡衛陳鄭曹莒邾頓胡滕薛杞小邾于召陵謀伐楚夏五月及諸侯盟于臯鼬四十五年定七年春歸魯鄆陽關秋公及鄭伯盟于鹹執衛行人北宫結以侵衛公及衛侯盟于沙衛侯欲叛晉使我執結以侵衛國夏帥師伐魯西鄙四十六年定八年春正月魯侵我三月魯侵我夏國夏髙張伐魯西鄙四十七年定九年夏六月魯陽虎來奔執之囚諸西鄙虎逃奔宋秋公伐晉夷儀為衛討也晉敗我師于中牟公致禚媚杏三邑于衛四十八年定十年春及魯平夏公會魯侯于夾谷歸魯鄆歡龜隂之田冬公及衛侯鄭遊速會于安甫魯叔孫仇來聘五十年定十二年冬十月公會魯侯盟于黃五十一年定十三年春公及衛侯次于垂葭使師伐晉河內夏五月晉荀寅士吉射叛奔朝歌五十二年定十四年公會魯侯衛侯于牽秋及宋公會于洮謀救范中行氏五十三年定十五年夏五月公及衛侯次于渠蒢鄭伐宋謀救之五十四年哀元年晉趙稷以邯鄲叛夏四月公及衛侯救邯鄲圍五鹿秋八月公及衛侯會于乾侯救范氏伐晉取棘蒲五十五年哀二年秋八月輸范氏粟晉納衛蒯聵于戚五十六年哀三年春國夏衛石曼姑圍戚求援于中山中山鮮虞也五十七年哀四年秋七月陳乞弦施衛寧跪救范氏圍五鹿冬十二月國夏伐晉取邢任欒鄗逆畤隂人盂壺口晉八邑會鮮虞納荀寅于柏人五十八年哀五年春晉荀寅士吉射來奔夏伐宋秋九月公薨冬葬景公諡曰景在位五十八年景公嬖鬻姒之子荼公疾使國夏髙張立荼置羣公子于萊及薨公子嘉駒黔奔衛陽生及鉏奔魯萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎左傳越絶書闔廬伐齊大克取齊王女為質子為造齊門置于水海虛其臺在車道左水海右去縣七十里齊女思其國死葬虞西山説苑齊景公以其子妻闔廬送諸郊泣曰余死不汝見矣髙夢子曰齊負海而縣山誰干我君愛則勿行公曰余有齊國之固不能以令諸侯又不能聼是生亂也寡人聞之不能令則莫若從且夫吳若蜂蠆然不棄毒于人則不靜余恐棄毒于我也遂遣之悼公悼公名陽生景公子景公薨公子荼立陽生及公子鉏奔魯悼公元年哀六年夏六月陳乞鮑牧及諸大夫以甲入公宫及國夏髙張戰于莊國夏奔莒遂及髙張晏圉弦施奔魯秋八月陳乞使召陽生陽生駕而見鉏曰常獻馬于季孫不入于上乘故又獻此請與子乘之出萊門而告之故闞止陽生家臣知之先待諸外陽生曰事未可知反與壬陽生子簡公也處戒之遂行逮夜至于齊國人知之陳乞使子士之母乞之妾養之與饋者皆入冬十月立之使胡姬以安孺子荼如賴遷于駘不至殺諸野幕之下久之或譛胡姬亦殺之陽生即位是為悼公公之在魯也取魯季姬季孫肥妹既即位使逆之季姬淫魯弗敢與三年哀八年夏五月鮑牧伐魯取歡及闡六月公使如吳請師伐魯秋及魯平逆季姬以歸殺鮑牧冬十二月歸魯歡及闡季姬嬖故四年哀九年春公使公孟綽辭師于吳五年哀十年春魯侯會吳子邾子郯子伐我南鄙師于鄎國人弒公赴于師吳徐承帥舟師將自海入齊我敗之吳師乃還夏晉趙鞅帥師伐我取犁及轅毁髙唐之郭侵及賴而還五月葬悼公左傳諡曰悼在位五年簡公簡公名壬悼公子悼公被弒子壬立是為簡公元年哀十一年春國書髙無丕帥師伐魯戰于郊魯左師入我軍右師奔我師從之涉泗夏五月魯侯會吳子伐我克博甲戍戰于艾陵大敗我師獲國書公孫夏閭邱明陳書東郭書公即位闞止有寵使為政陳恆憚之諸御鞅言于公曰陳闞不可並也君其擇焉弗聼四年哀十四年夏四月陳恆殺闞止執公置于舒州公曰吾早從鞅之言不及此六月陳恆弒之左傳諡曰簡在位四年平公平公十二年春秋終宣公康公平公名驁簡公弟陳恆弒簡公立驁是為平公平公即位恆相之專齊之政史世家元年哀十五年春正月魯公孫宿以成叛歸于我夏五月髙無丕出奔北燕冬及魯平歸魯成二年哀十六年夏四月孔子卒三年哀十七年夏六月晉趙鞅圍衛國觀陳瓘救衛衛弒莊公立襄公孫般師冬十二月伐衛立公子起執般師以歸公會魯侯盟于蒙四年哀十八年衛君起來奔衛侯輒復入五年哀十九年冬敬王崩元王立六年哀二十年夏及魯會于廪邱為鄭故謀伐晉七年哀二十一年秋八月公及魯侯邾子盟于顧九年哀二十三年夏六月晉荀瑶伐我髙無丕帥師禦之戰于犂邱我師敗績十三年哀二十七年晉荀瑶伐鄭鄭請救于我我救鄭荀瑶乃還左傳是年元王崩貞王立二十五年悼十二年公薨諡曰平在位二十五年子宣公積即位宣公四十八年取魯之郕明年公與鄭人會西城伐衛取母邱五十一年薨田會自廪邱反紀年田布殺其大夫公孫孫公孫會以廪邱叛于趙田布圍廪邱翟角趙孔屑韓氏救廪邱及田布戰于龍澤田師敗逋吕氏春秋齊攻廪邱趙使孔青將死士救之與齊人戰大敗之得尸三萬以為二京寧越謂孔青曰惜矣不如歸師以內攻之越聞之沙隨賁服却舍延尸車甲盡于戰府庫盡于葬此之謂內攻之孔青曰齊不尸則如何寧越曰戰而不勝其罪一與人出而不與入其罪二與之尸而弗取其罪三民以此三者怨上上無以使下下無以事上是之謂重攻之宣公薨子康公貸即位康公立十四年淫于酒婦人不聼政墨子康公興樂萬人不衣短褐不食粳糟曰食飲不美面目顔色不足視也衣服不美身體容貌不足觀也是以食必梁肉衣必文繡康公十八年陳恆曽孫和始為諸侯遷康公海濱二十六年公薨吕氏遂絶其祀田氏卒有齊國史記世家贊曰齊桓衣裳之會九兵車之會四仲尼曰正而不譎蓋深許之矣既而內寵猾中踵亂數葉大癰晚潰罪坐養者悲夫景公賢佞並用若有侈心然薑柄授田景實為之何也髙唐之封大其圉已置羣公子萊而陽生立畀之政已竈蠆弱前髙國踣後田氏之威接弒二君而莫敢誰何景實為之也詩曰枝葉未有害本實先撥嗟乎景撥本矣俾北海之侯而為海濱之漁也尚史卷十二
