body:
  text: 尚史卷二十六列傳四鑲白旗漢軍李鍇撰周諸臣傳虢仲虢叔虢文公虢仲虢叔王季之子也為文王卿士穀梁傳武王克殷封仲于西虢封叔于東虢史記平王時叔恃險而不修德鄭滅之杜預注按鄭氏詩譜鄭滅虢在平王時仲之後是為虢文公文公為宣王卿士賈逵注仲之後韋昭注或曰虢叔之後非是宣王即位不籍千畝史記作十二年虢文公諌曰不可夫民之大事在農上帝之粢盛于是乎出民之蕃庶于是乎生事之共給于是乎在和協輯睦于是乎興財用蕃殖于是乎始敦龎純固于是乎成是故稷為大官古者大史順時覛土陽疸憤盈土氣震發農祥晨正日月底于天廟土乃脉發先時九日大史告稷曰自今至于初吉陽氣俱蒸土膏其動弗震弗渝脉其滿眚穀乃不殖稷以告王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民司空除壇于藉命農大夫咸戒農用先時五日瞽告有協風至王既齊宫百官御事各即其齊三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從及藉后稷監之膳夫農正陳藉禮大史贊王王敬從之王耕一墢班三之庶人終于千畝其后稷省功大史監之司徒省民大師監之畢宰夫陳饗膳宰監之膳夫贊王王歆大牢班嘗之庶人終食是日也瞽帥音官以省風土廩于藉東南鍾而藏之而時布之于農稷則遍戒百姓紀農協功曰陰陽分布震雷出滯土不備墾辟在司寇乃命其旅曰徇農師一之農正再之后稷三之司空四之司徒五之大保六之大師七之大史八之宗伯九之王則大徇耨獲亦如之民用莫不震動恪恭于農修其疆畔日服其鎛不解于時財用不乏民用和同是時也王事惟農是務無有求利于其官以干農功三時務農而一時講武故征則有威守則有財若是乃能媚于神而和于民矣則享祀時至而布施優裕也今天子欲修先王之緒而棄其大功匱神之祀而困民之財將何以求福用民王弗聽國語其後世見地理志仲山甫仲山甫即樊穆仲韋昭注仲山甫食乘于樊穆仲其諡也為宣王卿士詩注蓋以冢宰兼太保十二年魯武公以括與戲見王王立戲仲山甫諫曰不可立也不順必犯犯王命必誅故出令不可不順也令之不行政之不立行而不順民將棄上夫下事上少事長所以為順也今天子立諸侯而建其少是教逆也若魯從之而諸侯效之王命將有所壅若不從而誅之是自誅王命也是事也誅亦失不誅亦失天子其圖之王卒立之及魯侯卒魯人殺戲立伯御韋昭注伯御括也史記戲立是為懿公九年懿公兄括之子伯御與魯人攻殺懿公而自立班固人物表伯御懿公兄子與史合宣王伐魯立孝公諸侯從是不睦宣王欲得國子之能導訓諸侯者仲山甫曰魯侯孝王曰何以知之對曰肅恭明神而敬事耉老賦事行刑必問于遺訓而咨于故實不干所問不犯所咨王乃命魯孝公于夷宫三十九年戰于千畝王師敗績于姜氏之戎宣王既亡南國之師乃料民于太原仲山甫諫曰民不可料也夫古者不料民而知其少多司民協孤終司商協名姓司徒協旅司寇協姦牧協職工協革場協入廩協出是則少多死生出入往來者皆可知也于是乎又審之以事王治農于藉搜于農隙耨穫亦于藉獮于既蒸狩于畢時是皆習民數者也又何料焉不謂其少而大料之是示少而惡事臨政示少諸侯避之治民惡事無以賦令且無故而料民天之所惡也害于政而妨于後嗣王卒料之國語後有樊皮者惠王十三年樊皮杜預注周大夫叛王王命虢公執之歸于京師左傳論曰不藉千畝來姜戎之敗也而又料民是重過也宣王中興主乃棄功害政愎諌廢言一傳而亡遂以凌遲不振有以哉衮職有闕惟仲山甫補之虢文公亦有焉尹吉甫方叔南仲仍叔伯竒附尹吉甫為內史方叔為卿士南仲為將並事宣王吉甫有文武材周室衰玁狁勢熾王命吉甫帥師伐之有功而歸詩人賦六月以美之詩注王舅申伯出封于謝吉甫美宣王能建國親諸侯作嵩髙之詩召公平淮夷作江漢韓侯來朝作韓奕仲山甫城齊作蒸民皆所以美宣王勉諸臣也詩序方叔征玁狁及荆蠻背叛伐而服之南仲亦受王命伐玁狁城朔方又伐西戎又從王伐淮徐皆有功詩注仍叔者亦事宣王宣王有撥亂之志遇栽而懼側身修行欲消去之仍叔作雲漢之詩以美之詩序春秋時有仍叔之子吉甫子伯竒至孝後母譖之放于野宣王出遊吉甫從伯竒作歌以言感之宣王聞之曰此孝子之辭也吉甫乃求伯竒于野而殺後母琴操别本琴操履霜操尹伯竒所作也伯竒無罪為後母讒而見逐乃集芰荷為衣採楟花為食晨朝履霜自傷見放于是援琴鼓之而作操曰履朝霜兮採晨寒考不明其心兮聽讒言孤息别離兮推肺肝何辜皇天兮遭此愆痛殁不同兮恩有偏誰能流顧兮知我寃曲終投河而死琴清英尹吉甫子伯竒至孝後母譛之自投江中衣荷帶藻忽夢見水仙賜與美藥惟念飬親揚聲悲歌船人聞而學之吉甫聞船人之聲疑似伯竒援琴作子安之操說苑王國子前母子伯竒後母子伯封後母欲其子立為太子說王曰伯竒好妾王不信其母曰令伯竒于後園妾過其旁王上臺觀之即可知王如其言伯竒如園後母陰取蜂十數置單衣中過伯竒曰蜂螫我伯竒就衣中取蜂殺之王遙見乃逐伯竒孟子注伯竒作小辨之詩曹植云尹吉甫殺伯竒其弟伯封作黍離之詩按琴操諸說並迂誕說苑尤傅會而小辨黍離詩說亦未之前聞杜伯左儒隰叔附杜伯者陶唐氏之後也在夏為御龍氏在商為豕韋氏左傳商末豕韋國于唐周成王滅唐遷之于杜是為杜伯杜預注至宣王時杜伯與左儒相友善王將殺杜伯而非其罪左儒爭之九復之而王弗許王曰别君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則生不易則死左儒對曰臣聞古之士不枉義以從死不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之說苑四十六年王合諸侯田于圃日中杜伯乘白馬素車朱衣冠執朱弓矢射王中心折脊殪車中伏韜而死墨子杜伯子曰隰叔杜伯死隰叔違周難于晉國生士蒍為范氏先國語周春秋杜國之伯名恆為周大夫宣王之妾曰女鳩欲通之杜伯不可女鳩訴之宣王曰恆竊與妾交宣王信之囚杜伯于焦其友左儒爭之九諌而王不聽王使薛甫與司工錡殺杜伯左儒死之杜伯既死即為人見王曰恆之罪何哉召祝而以杜伯語告之祝曰始殺杜伯誰與王謀之王曰司工錡也祝曰殺錡以謝之王乃殺錡使祝以謝杜伯司工錡為人而至曰臣何罪之有王告皇甫曰祝也與我謀而殺人所殺者又皆為人而見奈何皇甫曰殺祝以兼謝焉又皆為人而至祝亦曰我焉知之奈何以為罪而殺臣也後三年逰于圃田從人滿野日中杜伯乘白馬素車司工錡為左祝為右朱衣朱冠起于道左執朱弓朱矢射宣王中心折脊伏于弓矢而死國語杜伯射王于鄗論曰宣王明主而殺左儒吉甫賢父而放伯竒忠臣孝子見杌于天不特罹昏暴之凶鋒也悲夫伯陽父伯陽父周大夫韋昭注史記周太史唐固注周柱下史老子幽王三年史記作二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民之亂也陽伏而不能出陰遁而不能蒸于是有地震今三川實震是陽失其所而鎮陰也陽失而在陰川源必塞夫水土演而民用也水土無演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之際矣其川源又塞塞必竭夫國必依山川山崩川竭亡之徴也川竭山必崩若國亡不過十年數之紀也夫天之所棄不過其紀是歲也三川竭岐山崩國語幽王廢申后及太子以褒姒為后以伯服為太子伯陽曰禍成矣無可奈何史記十一年幽王滅周東遷國語史伯史伯周太史鄭桓公友為司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯對曰王室將卑戎狄必昌不可逼也當成周者南有荆蠻申吕應鄧陳蔡隨唐北有衛燕翟鮮虞潞洛泉徐蒲西有虞虢晉隗霍楊魏芮東有齊魯曹宋滕薛鄒莒是非王之支子母弟甥舅也則皆荆蠻戎翟之人也非親則頑不可入也其濟洛河潁之間乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險是皆有驕侈怠慢之心而加之以貪冒君若以周難之故寄孥與賄焉不敢不許周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克二邑鄢蔽補丹依㽥厯莘君之土也若前莘後河右洛左濟主芣騩而食溱洧修典刑以守之唯是可以少固公曰南方不可乎對曰夫荆子熊嚴生子四人伯霜仲雪叔熊季紃叔逃難于濮而蠻季紃是立薳氏將起之禍又不克叔熊奔濮而從蠻俗季紃既立大夫薳氏將起立叔熊又有禍難而不能是天啓之心也又甚聰明和協蓋其先王臣聞之天之所啓十世不替夫其子孫必光啓土不可逼也且重黎之後也夫黎為髙辛氏火正以淳耀惇大天明地德光昭四海故命之曰祝融其功大矣夫成天地之大功者其子孫未嘗不章虞夏啇周是也虞幕能聽協風以成樂物生者也夏禹能單平水土以品處庶類者也商契能和合五教以保于百姓者也周棄能播殖百穀疏以衣食民人者也其後皆為王侯公伯祝融亦能昭顯天地之光明以生柔嘉材者也其後八姓於周未有侯伯八姓祝融之後已董彭秃妘曹斟芊佐制物于前代者昆吾為夏伯矣昆吾祝融之孫陸終第二子名樊為己姓大彭豕韋為商伯矣大彭陸終第三子曰籛彭姓豕韋彭姓之别封當周未有己姓昆吾蘇顧溫董五國皆昆吾之後别封者莒其後也董姓鬷夷豢龍則夏滅之矣董姓飂叔安之裔子曰董父以擾龍服事帝舜賜姓曰董氏曰豢龍封之鬷川當夏之興别封鬷夷于孔甲前而滅彭姓彭祖豕韋諸稽則商滅之矣彭祖大彭也豕韋諸稽其後别封秃姓舟人則周滅之矣禿姓彭祖之别舟人國名妘姓塢鄶路逼陽陸終第四子曰求言為妘姓封于鄶塢路逼陽其别封曹姓鄒莒陸終第五子曰安為曹姓封于鄒皆為采衛或在王室或在夷翟莫之數也而又無令聞必不興矣斟姓無後斟姓曹姓之别非斟灌斟尋也融之興者其在芈姓乎芉姓䕫越不足命也䕫越芈姓之别國熊繹六世孫曰熊摰有惡疾自棄于䕫蠻芊蠻矣蠻芊謂叔熊在濮從蠻俗唯荆實有昭德若周衰其必興矣姜嬴荆芊實與諸姫代相干也姜伯夷之後也嬴伯翳之後也伯夷能禮于神以佐堯者也伯翳能議百物以佐舜者也其後皆不失祀而未有興者周衰其將至矣公曰謝西之九州何如對曰其民㳫貪而忍不可因也惟謝郟之間虢鄶在郟南謝北其冡君侈驕其民怠㳫其君而未及周德若更君而周訓之是易取也且可長用也公曰周其弊乎對曰殆於必弊者大誓曰民之所欲天必從之今王棄髙明昭顯而好讒慝暗昧惡角犀豐盈而近頑童窮固去和而取同夫和實生物同則不繼以它平它謂之和故能豐長而物生之若以同禆同盡乃棄矣故先王以土與金木水火雜以成百物是以和五味以調口剛四支以衛體和六律以聰耳正七體以役心平八索以成人建九紀以立純德合十數以訓百體出千品具萬方計億事材兆物收經入行姟極經常也姟備也萬萬曰姟王收其常入舉九姟之數故王者居九畡之田收經入以食兆民周訓而能用之和樂如一夫如是和之至也于是乎先王聘后于異姓求財于有方擇臣取諫工而講以多物務和用也聲一無聽物一無文味一無果物一不講王將棄是類而與剸同天奪之明欲無弊得乎夫虢石父讒諂巧從之人也而立以為卿士與剸同也棄聘后而立內妾好窮固也侏儒戚施實御在側近頑童也周法不昭而婦言是行用讒慝也不建立卿士而妖試幸措行暗昧也是物也不可以久且宣王之時有童謠曰檿弧箕服實亡周國于是宣王聞之有夫婦鬻是器者王使執而戮之府之小妾生女而非王子也懼而棄之此人也收而奔褒褒人有獄而以為人王遂置之而嬖是女也使至于為后而生伯服天之生此久矣其為毒也大矣將俟淫德而加之焉毒之酋臘者精孰為酋臘極也其殺也滋速申繒西戎方强申姜姓太子宜咎之舅繒姒姓申之與國王室方騷將以縱欲不亦難乎王欲殺大子以成伯服必求之申申人弗畀必伐之若伐申而繒與西戎會以伐周周不守矣繒與西戎方將德申申吕方彊其隩愛太子亦必可知也王師若在其救之亦必然矣王心怒矣虢公從矣凡周存亡不三稔矣君若欲避其難速規所矣時至而求用恐無及也公曰若周衰諸姫其孰興對曰臣聞之武實昭文之功文之胙盡武其嗣乎武王之子應韓不在其在晉乎距險而鄰於小若加之以德可以大啓公曰姜嬴其孰興對曰夫國大而有德者近興秦仲齊侯姜嬴之俊也且大其將興乎公說乃寄孥與賄虢鄶受之十邑皆有寄地幽王八年而桓公為司徒九年而王室始騷十一年而斃及平王末而秦晉齊楚代興秦景襄于是乎取周土晉文侯于是乎定天子齊莊僖于是乎小伯楚蚡冒于是乎始啓濮國語論曰物之應幾先之識者每窺其微信乎前識者道之華而愚之始也史曰老子字伯陽或曰百六十歲或曰二百歲按幽王至定王百七十餘年故疑伯陽父老子即一人其信不未可知也今老子别立傳周后妃傳太姜太姜者有吕氏之女韋昭注齊許申吕四嶽之後太姜之家太王娶以為妃生太伯仲雍王季貞順率道靡有過失太王謀事遷徙必與太姜列女傳太任太任者摯任氏中女也韋昭注摰任姓奚仲仲虺之後太任之家王季娶為妃太任之性端一誠莊惟德之行及其有娠目不視惡色耳不聽淫聲口不出敖言能以胎教溲于豕牢而生文王列女傳宋書符瑞志太任夢長人感已􅘞于豕牢而生昌太姒邑姜太姒者有㜪姒氏之女也韋昭注杞鄫二國姒姓夏禹之後太姒之家仁而明道文王嘉之造舟為梁親迎于渭及入太姒思媚太姜太任旦夕勤勞以進婦道號曰文母文王理陽道而治外文母理陰道而治內太姒生武王周公教諸子自少及長未嘗見邪辟之事列女傳大紀娶于有莘氏曰太姒太姒不妒忌而西伯有內行此德政之所以流布風化之所以大興也詩傳文王之妃姒氏思得淑女以共內職賦關㫿邑姜太公女武王之妃也修教於內生太子誦帝王世紀宣姜后宣姜者齊侯之女宣王之后也賢而有德事非禮不言行非禮不動宣王常早卧晏起后夫人不出房姜后脫簮珥待罪于永巷使其傅母通言于王曰妾之不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘德也夫茍樂色必好奢窮欲亂之所興也原亂之興從婢子起敢請婢子之罪王曰寡人不德實自有過非夫人之罪也遂復姜后而勤于政事早朝晏退卒成中興之名列女傳琴録宣王有琴曰嚮風背銘云牆有耳伏冦在是武王之遺器也宣王每朝姜后輒以此銘援琴奏宣王於是益兢兢不忘房后房后者昭王之后也房后實有爽德協於丹朱丹朱馮身以儀之生穆王國語申后申后申侯女為幽王后生太子宜臼幽王嬖愛褒姒褒姒生子伯服遂廢申后去太子史記申后作白華之詩詩注詩序以為周人刺幽王幽王絀申后下國化之以妾為妻以孽代宗王弗能治周人作是詩褒姒褒姒幽王后昔夏后氏之衰也有二神龍止于夏帝庭而言曰余褒之二君夏帝卜殺之與去之與止之莫吉卜請其漦而藏之乃吉於是布幣而䇿告之龍亡而漦在櫝而去之夏亡傳此器殷殷亡又傳此器周比三代莫敢發之至厲王之末發而觀之漦流於庭不可除厲王使婦人祼而譟之漦化為𤣥黿以入王後宫後宫之童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王之時童女謠曰檿弧箕服實亡周國于是宣王聞之有夫婦賣是器者宣王使執而戮之逃於道而見鄉者後宫童妾所棄妖子出於路者聞其夜啼哀而收之夫婦遂亡奔于褒褒人有罪請入童妾所棄女子者于王以贖罪列女傳褒人姁有獄獻之以贖幽王受而嬖之遂釋褒姁棄女子出於褒是為褒姒幽王三年王之後宫見而愛之生子伯服于是廢申后及太子以褒姒為后伯服為太子列女傳幽王惑于褒姒出入與之同乘不恤國事驅馳弋獵不時以適其意飲酒沈湎以夜繼晝褒姒不好笑王欲其笑萬方故不笑王為熢燧大鼓有寇至則舉熢火諸侯悉至至而無寇褒姒乃大笑幽王說之為數舉熢火其後不信諸侯益亦不至申侯與繒西夷犬戎攻幽王幽王舉熢火徴兵兵莫至遂殺幽王驪山下虜褒姒史記吕氏春秋周宅酆鎬近戎人與諸侯約為髙葆禱于王路置鼓其上逺近相聞即戎冦至傳鼓以告諸侯之兵皆至救天子戎冦嘗至幽王擊鼓諸侯之兵皆至褒姒大說幽王欲褒姒之笑也因數擊鼓諸侯之兵數至而無寇後戎寇真至幽王身之乃死于麗山之下為天下笑紀季姜紀季姜桓王后字季姜紀姓也杜預注桓王十六年桓八年祭公如魯逆王后于紀明年紀季姜歸于京師左傳王姚王姚者莊王之妾也嬖于莊王生子頽左傳惠后陳媯者陳女惠王之后也惠王元年莊十八年虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師是為惠后生襄王及王子帶帶有寵于惠后惠后將立之未及而后崩襄王十六年僖二十四年子帶以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之遂出國人納子帶明年晉納王殺子帶左傳叔隗叔隗狄女隗氏國語襄王之后也襄王十六年僖二十四年王使狄伐鄭取櫟王德狄人以其女為后是為隗氏王子帶通于隗氏王替隗氏子帶以狄師攻王王適鄭子帶以隗氏居於溫明年晉納王取子帶于溫而殺之左傳定后姜氏齊女定王之后也定王四年宣六年王使子服大夫求后于齊冬召桓公逆王后于齊左傳靈后姜氏齊女靈王之后也靈王十一年襄十二年靈王求后于齊齊侯許昏王使陰里大夫結之十四年襄十五年官師劉夏從單靖公逆王后于齊左傳贊曰三母相承遂興有周及其既也一女優亡之詩曰赫赫宗周褒姒滅之蓋傷其易也文諸子傳富辰曰管蔡郕霍魯衛毛𣆀郜雍曹滕畢原鄷郇文之昭也今唯十二子可考郜子一見春秋伯邑考周公别有傳伯邑考文王長子史記兄弟十人惟發旦賢故文王舍伯邑考而以發為太子說非是蓋伯邑考前死故武王同母兄弟十人母曰太姒文王正妃也長即伯邑考次曰武王發有本紀次曰管叔鮮無後次曰周公旦後有世家次曰蔡叔度有世家次曰毛叔鄭詳地里志史記毛叔鄭作曹叔振鐸按左傳衛祝他曰武王母弟八人周公為太宰康叔為司寇𣆀季為司空五叔無官豈尚年哉曹文之昭也夫曹同為文王子而别之曰文王之昭者明非武王母弟也杜預注五叔者管叔鮮蔡叔度成叔武霍叔處毛叔鄭今從左氏次曰成叔武見志次曰霍叔處見志次曰康叔封見世家次曰冉季載見志史記世家伯邑考質于殷為紂御紂烹以為羮賜文王曰聖人當不食其子羮文王得而食之紂曰誰謂西伯聖者食其子羮尚不知也帝王世紀其後無所傳管叔鮮蔡叔度霍叔處管叔鮮蔡叔度霍叔處皆文王子武王封叔鮮于管叔度于蔡叔處于霍相紂子武庚祿父治殷遺民是為三監大紀武王崩成王少周公旦専王室羣叔流言疑周公為不利於成王乃挾武庚以作亂周公旦承王命伐誅武庚史記殺管叔于啇囚蔡叔于郭鄰以車七乘史記放蔡叔遷之與車十乘徒七十人降霍叔于庶人三年不齒尚書管叔誅死無後蔡叔之子仲見世家傳國至侯齊為楚所滅霍為晉所滅毛叔鄭成叔武𣆀季載毛叔鄭封于毛成叔武封于郕𣆀季載封于𣆀索隱載名季字也毛叔爵為公書顧命書公其後春秋書伯或降黜故為成王卿士成王將崩毛公同受顧命立康王尚書世其後見地理志成叔武事不載其後世見地理志𣆀季載有馴行周公舉為司空以佐成王治有令名于天下其後世無所見史記世家康叔封康叔封從武王克殷封于東土治殷餘民是為衛康叔作康誥王若曰孟侯朕其弟小子封惟乃丕顯考文王克明德慎罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時叙乃寡兄朂肆汝小子封在兹東土王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣德言往敷求于殷先哲王用保乂民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若德裕乃身不廢在王命王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺王曰嗚呼封有叙時乃大明服惟民其敕懋和若有疾惟民其畢棄咎若保赤子惟民其康乂非汝封刑人殺人無或刑人殺人又曰非汝封劓刵人無或劓刵人王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚王曰汝陳時臬事罰蔽殷彛用其義刑義殺勿庸以次汝封乃汝盡遜曰時叙惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕德惟乃知凡民自得罪寇攘姦宄殺越人于貨睯不畏死罔弗憝王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑兹無赦不率太戞矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則豫一人有懌王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦王曰封豫惟不可不監告汝德之說于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天王曰嗚呼封敬哉無作怨勿用非謀非彜蔽時忱丕則敏德用康乃心顧乃德逺乃猷裕乃以民寧不汝瑕殄王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命髙乃聽用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享又作酒誥梓材以誡之尚書康叔之國既以此命能和集其民民大說成王長用事舉康叔為周司寇史記分康叔以大路大旗少帛績茷旃旌大吕以章有德左傳其後世見世家至衛君角為秦所滅史記武王時康叔少未得封武王崩管蔡作亂周公誅之而分殷餘民封微子啓于宋封康叔于衛按此蓋録書序以康誥為成王之書故史遷踵其謬且武本紀曰王立于社南衛康叔封布兹少未得封語自抵牾畢公髙畢公髙初相文王及武王伐紂入商紂宫百夫荷罕旗以先驅曹叔鐸奉陳常車周公把大鉞畢公把小鉞以夾武王武王既入立于社南毛叔鄭奉明水衛康叔封布兹兹席也召公奭贊采師尚父牽牲尹佚策祝以討紂罪明周受命史記武王大建公侯封叔髙于畢留相周大紀武王崩畢公相成王為司馬孔氏書傳成王將崩命召公畢公率諸侯相康王作顧命書序初周公遷殷頑民于下都周公監之周公殁成王以君陳代之及康王立復以成周之衆命畢公保釐作畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既立三紀世變風移四方無虞豫一人以寧道有升降政由俗革不臧厥臧民罔攸勸惟公懋德克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王豫小子垂拱仰成王曰嗚呼父師今豫祗命公以周公之事往哉旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻慎固封守以康四海政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世祿之家鮮克有禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左祍罔不咸賴豫小子永膺多福公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政尚書畢公之後曰畢萬為魏之先見晉傳曹叔振鐸滕叔繡郜叔雍叔原叔酆叔郇叔曹叔振鐸封于曹滕叔繡封于滕事無所見其後見曹世家滕世家郜叔封于郜雍叔封于雍原叔封于原酆叔封于酆郇叔封于郇大紀自郜以下名與事俱不載郜原後世見地里志雍酆郇後世無考自畢公以下皆文王庶子也論曰或曰管蔡之亂絀周公信孺子也然則挾武庚以叛何居乎張頑民之勢動新造之周微周公幾何其不隕乃宗社乎蔡仲幹蠱東土續侯誅賞以公固不恤人之言也衛風渢渢儉而易行周之諸侯衛最後亡雖地在不爭亦其德也然畢萬開魏而冉後無聞實栗者穫豐天其或爽與尚史卷二十六
