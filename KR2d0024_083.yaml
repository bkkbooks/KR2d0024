body:
  text: 尚史卷八十三繫三鑲白旗漢軍李鍇撰孔子弟子傳顔回魯人也字子淵少孔子三十嵗新論顔淵感中台星又曰顔回重瞳顔淵問仁孔子曰克已復禮天下歸仁焉史記史記多采魯論以為傳今童稚皆習知之故謹載精要而略其餘家語顔淵問君子孔子曰愛近仁度近智為己不重為人不輕君子也敢問其次曰弗學而行弗思而得小人勉之又曰顔淵問小人孔子曰毁人之善以為辨狡訐懷詐以為智幸人之有過恥學而羞不能小人也又曰顔淵問曰小人之言有同乎君子者不可不察也孔子曰君子以行言小人以舌言故君子為義之上相疾也退而相愛小人為亂之上相愛也退而相惡又曰顔淵問朋友之際如何孔子曰君子之于朋友也心必有非焉而弗能謂吾不知其仁人也不忘久德不思久怨仁矣夫又曰孔子謂顔回曰人莫不知此道之美也而莫之御也莫之為也何居為聞者盍日思也夫又曰顔淵將西逰問于孔子曰何以為身孔子曰恭敬忠信可以為身恭則免于衆敬則人愛之忠則人與之信則人恃之必免于患矣故不比數而比疏不亦逺乎不修中而修外不亦反乎不先慮事臨難乃謀不亦晚乎韓詩外傳顔淵問曰淵願貧如富賤如貴無勇而威與士交通終身無患亦且可乎孔子曰夫貧而如富知足而無欲也賤而如貴讓而有禮也無勇而威恭敬而不失于人也終身無患其擇言而出之也若回者其至乎又曰孔子見客客去顔淵曰客仁也孔子曰恨兮其心顙兮其口仁則吾不知也言之所聚也顔淵蹙然變色曰良玉度尺雖有十仞之土不能掩其光良珠度寸雖有百仞之水不能掩其瑩夫形體也色心也閔閔乎其薄也茍有溫良在中則眉睫與之矣疵瑕在中則不能匿之說苑顔淵問曰成人之行何若子曰達乎情性之理通乎物類之變知幽明之故睹遊氣之源若此可謂成人既知天道行躬以仁義飾身以禮樂成人之行也子路入見孔子子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顔淵入子曰回知者若何仁者若何顔淵對曰知者自知仁者自愛子曰可謂明君子矣荀子韓詩外傳子路曰人善我我亦善之人不善我我不善之子貢曰人善我我亦善之人不善我我則引之進退而已耳顔淵曰人善我我亦善之人不善我我亦善之三子所持各異問于夫子子曰由之言蠻貊之言也賜之言朋友之言也回之言親屬之言也又曰孔子與子路子貢顔淵遊于戎山之上孔子喟然歎曰二三子各言爾志由爾何如對曰得白羽如月赤羽如日擊鐘鼓者上聞于天下槊于地使將而攻之惟由為能孔子曰勇士哉賜爾何如對曰得素衣縞冠使于兩國之間不持寸兵斗糧使兩國相親如弟兄孔子曰辨士哉回爾何如對曰願得明王聖主為之相使城郭不治溝池不鑿隂陽和調家給人足孔子曰大士哉由來區區汝何攻賜來便便汝何使願得之冠為子宰焉又有復出文作景山語略同家語亦同按諸說並非是仲孫何忌問于顔淵曰一言而有益于仁智可得聞乎淵曰智莫如豫仁莫如恕知其所不可由斯知所由矣叔孫州仇即武叔見未仕于顔淵淵曰賔之武叔多稱人之過而已評論之淵曰固子之來辱也宜有得于回焉吾聞諸孔子曰言人之惡非所以美已言人之枉非所以正已故君子攻其惡無攻人之惡顔淵謂子貢曰身不用禮而望禮于人身不用德而望德于人亂也謂子路曰力猛于德而得其死者鮮矣家語家語又曰孔子在衛昧旦晨興顔子侍側聞哭者之聲甚哀子曰回汝知此何所哭乎對曰回以此聲非但為死者而已又有生離别者乎子曰何以知之曰桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似于此回竊以音類知之使人問哭者曰父死賣子以葬與之長訣子曰回也善識音矣又曰魯定公問于顔子曰子亦聞東野畢之善御乎對曰善則善矣然馬將佚定公不說謂左右曰君子固誣人也後三日東野畢之馬佚兩驂曳兩服入于廄公聞之促駕召顔子曰東野畢之馬將佚吾子奚以知之對曰以政知之昔者帝舜巧于使民造父巧于使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣厯險致逺馬力盡矣然猶求馬不已臣以此知之公曰善吾子之言其義大矣願少進乎回曰臣聞之鳥窮則啄獸窮則玃人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公說衝波傳孔子使子貢往久而不來弟子占之遇鼎皆言無足不來顔子掩口而笑子曰回也哂謂賜來也曰無足者乘舟而來賜至清朝也子貢果朝至按家語說非是衝波尤謬妄淵年二十九髮盡白蚤死家語年二十九而髮白三十二而死列子顔子夀十八後漢書顔子十八天下歸仁諸說並誤顔子卒于伯魚之後按譜孔子七十而伯魚卒是顔子之卒當在孔子七十一之年顔子少孔子三十嵗是享年四十有一矣史不書卒年而云年二十九髮盡白亦誤當是三十九也孔子哭之慟曰自吾有回門人益親史記尚書大傳周文王胥附奔輳先後禦侮謂之四鄰懿子問曰夫子亦有四鄰乎孔子曰吾有四友焉自吾得回門人加親是非胥附乎自吾得賜逺方之士日至是非奔輳乎自吾得師前有光後有輝是非先後乎自吾得由惡言不至于門是非禦侮乎晏子仲尼居處惰倦亷隅不正則季次原憲侍氣欎而疾志意不通則仲由卜商侍德不盛行不厚則顔回騫雍侍尸子仲尼志意不立子路侍儀服不修公西華侍禮不習子遊侍辭不辨宰我侍亡忽古今顔回侍節小物冉伯牛侍曰吾以六子自勵也聖人齊莊中正以立身惡得有此二說非是淵之喪饋祥肉孔子出受之入彈琴而后食之記檀弓家語顔淵死魯定公弔焉使人訪于孔子孔子對曰凡在封內皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有笇也按淵死當在哀公時作定公誤韓詩外傳顔淵望吳門見一匹練孔子曰馬也論衡顔淵與孔子上魯泰山孔子望吳閶門外有繫白馬指以示之曰若見吳閶門乎顔淵曰見之曰門外何有曰有如繫練之狀孔子撫其目而止之下而顔淵髮白齒落遂以病死又曰顔淵困于學以才自殺韓說差近論衡太謬新論顔淵命短蓋慕孔子傷其年也又曰顔淵不以夜浴改容顔氏家訓邑號朝歌顔淵不舍述異記曲阜古城有顔回墓墓上有楠樹二株可三四十圍土人云顔子手植之木曾參南武城人字子輿少孔子四十六嵗史記曽子孝于父母每讀喪禮泣下霑襟嘗一夕五起視衣之厚薄枕之髙卑尸子曽子之事父也諭之以小杖則受諭之以大杖則走恐虧其禮非孝子之道也孟子說苑曽子藝瓜誤斬其根曽晳怒援大杖擊之曽子仆地有頃蘇蹶然起進曰參得罪于大人大人用力教參得無疾乎孔子聞之告門人曰參來勿內也曾子自以無罪使人謝孔子孔子曰舜之事父也索之未嘗不在側殺之未嘗可得小箠則待大箠則走以逃暴怒也今子立體而不去殺身以陷父不孝孰大乎莊子注曾子至孝為父所憎嘗見絶糧而後蘇抱朴子曾子鋤瓜三足烏萃其冠水經注曾子居曲阜鴟梟不入城郭曾晳使曾子過期而不至人見曾哲曰無乃畏邪曽晳曰彼雖畏我存夫安敢畏吕氏春秋曽子出薪于野有客至而欲去母曰願留參方到即扼其臂曽子臂立痛即馳至問母母曰今者客來吾扼臂以呼汝耳論衡孝子傳作樂正來侯參搜神記曽子從仲尼在楚而心動辭歸問母母曰思爾齧指琴操曾子事孔子十餘年眷然念二親援琴而鼓之曰往而不反者年也不可得而再事者親也歔欷歸耕來日安所耕厯山盤乎欽崟又曰曽子耕泰山之下天雨雪寒凍旬日不得歸作梁山吟淮南子曽子立亷不飲盜泉所謂養志也又曰曽子立孝不過勝母之閭詩疏曽子見益母而感孔子以為能通孝道故授之業作孝經史記曽子曰孝之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身也終其身也是故父母之所愛亦愛之父母之所敬亦敬之至于犬馬盡然而况于人乎記內則又曰孝有三大孝尊親其次弗辱其下能養又曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂烖及其親敢不敬乎又曰享孰羶薌嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衆之本教曰孝其行曰養養可能也敬為難敬可能也安為難安可能也卒為難父母既沒慎行其身不遺父母惡名可謂能終矣又曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以時非孝也又曰孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而不忘父母惡之懼而無怨父母有過諫而不逆父母既沒必求仁者之粟以祀之此之謂禮終記祭義仲憲即原憲言于曾子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曽子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎記檀弓荀子曾子曰孝子言為可聞所以說逺也行為可見所以說近也近者說則親逺者說則附親近而附逺孝子之行也吕氏春秋曾子曰父母生之子弗敢殺父母置之子弗敢廢父母全之子弗敢闕故舟而不遊道而不徑能全支體以守宗廟可謂孝矣養有五道修宫室安牀第節飲食養體之道也樹五色施五采列文章養目之道也正六律和五聲雜八音養耳之道也熟五榖烹六畜和煎調養口之道也和顔色說言語敬進退養志之道也此五者代進而後用之可謂善養矣大戴禮曽子曰忠者孝之本與孝子不登髙不履危痺亦弗慿不茍笑不茍訾隱不命臨不指故不在尤之中也孝子惡言死焉流言止焉美言興焉故惡言不出于口煩言不及于已故孝子之事親也居易以俟命不興險行以徼幸孝子遊之暴人違之出門而使不以或為父母憂也孝子之使人也不敢肆行又能事父之朋友又能率朋友以助敬也君子之孝也以正致諌士之孝也以德從命庶人之孝也以力任食又曰君子立孝其忠之用禮之貴故與父言言畜子與子言言孝父與臣言言事君君子之孝也忠愛以敬反是亂也盡力而有禮莊敬而安之微諫不倦聽從而不怠歡欣忠信咎故不生可謂孝矣是故未有君而忠臣可知者孝子之謂也未有長而順下可知者弟弟之謂也未有治而能仕可知者先修之謂也故曰孝子善事君弟弟善事長又曰單離居問于曽子曰事父母有道乎曽子曰愛而敬父母之行中道則從不中道則諌諌而不用行之如由己由己為無咎則寧由己為賢人則亂孝子無私樂父母所憂憂之所樂樂之孝子唯巧變故父母安之曰事兄有道乎曽子曰尊事之以為已望也兄之行中道則兄事之不中道則養之養之內不養于外是越之也養之外不養于內是疏之也是故君子內外養之也曰使弟有道乎曽子曰嘉事不失時也弟之行中道則正以使之不正道則兄事之詘事兄之道若不可然後舍之節録曾子仕于莒得粟三秉方是之時曽子重其祿而輕其身親沒之後齊迎以相楚迎以令尹晉迎以上卿方是之時曽子重其身而輕其祿韓詩外傳韓詩外傳又曰往而不可還者親也至而不可加者年也是孝子欲養而親不待木欲直而時不待也是故椎牛而祭墓不如雞豚逮親存也吾嘗仕齊為吏祿不過鍾釡尚猶欣然而喜樂其逮親也既歿後南逰于楚得尊官猶北鄉而泣悲不逮親也故家貧親老不擇官而仕若夫信其志約其親者非孝也淮南子曾子攀柩車引楯者為之止孝子傳曽子食生魚甚美因吐之人問其故曰母在不知生魚味遂終身不食曽子去妻藜蒸不熟問曰婦有七出不蒸亦預乎曰吾聞之也絶交令可友棄妻令可嫁也藜蒸不熟而已何問其故乎白虎通家語參後母遇之無恩而供養不衰其妻以藜蒸不熟因出之人曰非七出也曰藜蒸小物耳欲熟而不用命况大事乎出之終身不娶子元請焉曰髙宗以後妻殺孝已尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免于非乎韓詩外傳曽子喪妻不更娶人問其故曰以華元善人也韓非子曾子之妻之市其子隨之而泣其母曰女還顧反為女殺彘適市來曽子欲捕彘妻曰與兒戲耳曾子曰兒非與戲也兒非有知也待父母而學者也聽父母之教今欺之是教子欺也父欺子而不信非所以成教也遂烹彘與孟母買豚同說苑孔子家兒不知罵曽子家兒不知怒曾子寢疾病樂正子春坐于牀下曾元曾申坐于足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曾子聞之瞿然曰呼曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至于旦請敬易之曾子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒記檀弓大戴禮曾子疾病曾元抑首曾華抱足曾子曰微乎吾無夫顔氏之言吾何以語汝哉然而君子之務盡之有矣夫華煩而實寡者天也言多而行寡者人也鷹隼以山為卑而曾巢其上魚鱉黿鼉以淵為淺而蹶穴其中卒其所以得之者餌也是故君子茍無以利害義則辱何由至哉親戚不說不敢外交近者不親不敢求逺小者不審不敢言大故人之生也百嵗之中有疾病焉有老幼焉故君子思其不復者而先施焉親戚既歿雖欲為孝誰為孝年既耆艾雖欲為弟誰為弟故孝有不及弟有不時此之謂與言不逺身言之主也行不逺身行之本也言有主行有本謂之有聞矣知身是言行之基可謂閒矣君子尊其所聞則髙明矣行其所聞則廣大矣髙明廣大不在于他在加之志而已矣說苑曽子有疾孟儀往問之曽子曰鳥之將死必有悲聲君子集大辟必有順辭禮有三儀知之乎君子修禮以立志則貪欲之心不來思禮以修身則怠惰慢易之節不至修禮以仁義則忿爭暴亂之辭逺若夫置尊俎列籩豆此有司之事也君子雖勿能可也又曰曾子有疾曾元抱首曾華抱足曽子曰官殆于宦成病加于少愈禍生于懈惰孝哀于妻子察此四者慎終如始餘同戴說曽子嘗曰入其國也言信于羣臣則留可也行忠于鄉大夫則仕可也澤施于百姓則富可也孔子曰參可謂善安身矣又曰狎甚則相簡莊甚則不親是故君子之狎足以交歡其莊足以成禮孔子聞之曰孰謂參也不知禮乎孔子曰回有君子之道四焉强于行義弱于受諫怵于待祿慎于治身史鰌有君子之道三焉不仕而敬上不祀而敬鬼直已而曲于人曾子侍曰參昔聞夫子之三言而未之能行也見人之一善而忘其百非是夫子之易事也見人有善若已有之是夫子之不爭也聞善必躬行之然後導之是夫子之能勞也學夫子之三言而未之能行是以自知終不及二子也家語荀子曾子曰無內人之疏而外人之親無身不善而怨人無刑已至而呼天又曰同逰而不見愛吾必不仁交而不見敬吾必不長臨財而不見信吾必不信三者在身曷怨人怨人者窮怨天者無識淮南子曽子曰繫舟水中鳥聞之而髙翔魚聞之而深藏故所趨各兾而各得所便說苑曽子曰響不辭聲鑑不辭形君子正一而萬物皆成夫行非為影也而影隨之呼非為響也而響和之故君子功先成而名隨之又曰公孟子髙見顓孫子莫曰敢問君子之禮顓孫子莫曰去爾外厲與爾內色勝而心自取之去三者而可矣公孟不知以告曽子曽子曰大哉言乎無外厲者必內折色勝而心自取之者必為人役故君子德行成而容不知聞識博而辭不爭知慮微達而能不愚博物志曽子曰好我者知吾美矣惡我者知我惡矣中論曽子曰或言豫之善惟恐其聞或言豫之不善惟恐過而見豫之鄙色焉又曰人而好善福雖未至禍其逺矣人而不好善禍雖未至福其逺矣大戴禮有主言制言立事天圓記有檀弓曽子問雜記並文繁不載子夏嘗過曽子曾子曰入食子夏曰不為費乎曾子曰君子有三費飲食不在其中君子有三樂鐘鼓琴瑟不在其中子夏曰敢問三樂曽子曰有親可畏有君可事有子可遺一樂也有親可諫有君可去有子可怒二樂也有君可喻有友可助三樂也敢問三費曽子曰少而學長而忘一費也事君有功而輕負之二費也久交友而中絶之三費也子夏曰善哉謹身韓詩外傳韓詩外傳又曰孔子鼓瑟曽子子貢側門而聽曽子曰夫子瑟殆有貪狼之志邪僻之行子貢入以曽子之言告子曰夫參其習知音矣鄉者丘鼓瑟有鼠出遊狸見于屋循梁微行造焉而避厭目曲脊求而不得丘以瑟浮其音以為貪狼邪僻不亦宜乎孔叢子作閔子荀子曽子食魚有餘曰泔之門人曰泔之傷人不若奧之曽子涕泣曰有異心乎哉傷其聞之晚也說苑魯人攻鄪曽子辭于鄪君曰請出冦罷而來請姑母使狗豕入吾舍鄪君曰寡人之于先生也人無不聞今魯人攻我而先生去我胡守先生之舍魯人攻鄪數之罪十而曾子之所爭者九魯師罷鄪君復修曽子舍而迎之按春秋無鄪國且謂魯為冦曾子不爾也晏子曽子將行晏子送之曰君子贈人以軒不者以言吾請以言今夫車輪山之直木也良匠揉之其圓中規雖有槁暴不復嬴矣故君子慎所揉和氏之璧井里之困也良工修之則為存國之寶故君子慎所修今夫蘭本三年而成湛之苦酒則君子不近庶人不佩湛之縻醢而賈匹馬矣非蘭本美也所蕩然也願子之必求所湛嬰聞之君子居必擇居遊必擇士擇居所以求士求士所以辟患也嬰聞汩常移質習俗移性不可不慎也荀子說苑並同韓非子衛將軍文子見曽子曾子不起而延于坐席正身于奧文子謂其御曰曽子愚人也哉以我為君子也君子安可毋敬也以我為暴人暴人安可侮也曽子不僇命也說頗謬閔損字子騫康成注魯人少孔子十五歲家語作五十嵗非不仕大夫不食汙君之祿史記家語閔子為費宰問政于孔子語多涉大戴禮非是閔子未嘗宰費也以德行著名孔子稱其孝家語說苑閔子兄弟二人母死其父更娶復有二子子騫為父御車失轡父持其手衣甚單父歸呼其後母兒持其手衣甚厚謂婦曰汝欺吾去無留子騫前曰母在一子單母去四子寒孝子傳略同琴操崔子渡河操閔子騫作也崔子蚤失母後母嘗以其死母名呼之不應輒笞之崔子乃以渡河為辭繫石自沈而死冉耕字伯牛康成注魯人聖門志闕里廣志並以為少孔子七嵗孔子以為有德行伯牛有惡疾孔子往問之自牖執其手曰命矣夫斯人也而有斯疾也命矣夫史記白虎通冉伯牛危言正行而遭惡疾論衡伯牛空居而遭惡疾淮南子顔回季路子夏伯牛孔子之通學也然顔淵天季路葅于衛子夏失明伯牛為厲此皆迫性拂情而不得其和也冉雍字仲弓少孔子二十九嵗康成注魯人家語伯牛之宗族生于不肖之父孔子以仲弓為有德行曰雍也可使南面仲弓父賤孔子曰犂牛之子騂且角雖欲勿用山川其舍諸史記論衡鯀惡禹聖叟頑舜神伯牛寢疾仲弓潔全顔路庸固回傑超倫按此伯牛仲弓似父子殊謬仲弓問于孔子曰雍聞至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人治化必刑政相參焉太上以德教民而以禮齊之其次以政焉導民不刑刑不刑也化之弗變導之弗從傷義敗俗于是乎用刑矣顓五刑必即天倫行刑罰則輕無赦刑侀也侀成也一成而不可更故君子盡心焉家語不餘文繁載孔叢子仲弓問古之刑教與今之刑教孔子曰古刑省今刑繁其為教古有禮然後有刑是以省今無禮以教而齊之以刑是以繁又曰書曰哀矜折獄何謂也孔子曰古之聽訟者察貧窮哀孤獨鰥寡不肖而無告者雖得其情必哀矜之死者不可生斷者不可屬老而刑之謂之悖弱而刑之謂之尅不赦過謂之逆率過以小罪謂之枳冉求字子有康成注魯人家語仲弓之宗族少孔子二十九嵗老友朱庸若曰冉有與季路並驅不當少長二十年說似近有才藝以政事著名仕為季氏宰進則理其官職退則受教聖師性多謙讓故孔子曰求也退故進之冉有問于孔子曰先王制法使刑不上于大夫禮不下于庶人然則大夫不可以加刑庶人不可以治于禮乎孔子曰凡治君子以禮御其心所以屬之以亷恥之節也故古之大夫有坐不亷汚穢者曰簠簋不飭有坐淫亂無别者曰帷幕不修有坐罔上不忠者曰臣節未著有坐罷軟不勝任者曰下官不職有坐干國之紀者曰行事不請此五者大夫既自定有罪名矣而猶不正以呼之為之諱以愧恥之刑不上大夫而大夫亦不失其罪者教使然也所謂禮不下庶人者以庶人遽其事而不能充禮故不責之也冉有跪然免席曰言則美矣求未之聞退而記之冉有又問曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡為竊盜靡法者生于不足不足生于無度有度則民知所止則不犯不孝者生于不仁不仁生于喪祭之禮不明喪思慕祭祀不解人子饋養之道也喪祭之禮明則民孝矣殺上者生于不義朝聘之禮者所以明義也義既明則民不犯鬭變者生于相陵相陵生于長幼無序鄉飲酒之禮者所以明長幼之序而崇敬讓也淫亂者生于男女無别無别則夫婦失義婚禮聘享者所以别男女明夫婦之義也五者刑罰之所以生各有源焉源生于嗜欲不節禮度者所以禦民之嗜欲而明好惡禮度既陳五教畢修而民或未化必明其法典以申固之三皇五帝所以化民者如此雖有五刑不用不亦可乎家語韓詩外傳魯哀公問冉有曰凡人之質將必學而後為君子乎對曰臣聞之雖有良玉不刻鏤不成器雖有美質不學不成君子昔子路卞之野人子貢衛之賈人也皆學于孔子遂為顯士昔吳楚燕代謀為一舉而伐秦姚賈監門之子也為秦使之遂絶其謀秦王立為上卿百里奚齊之乞者也逐于齊自賣五羊皮為一軛車繆公立為相太公望少為人壻老而見去屠牛朝歌文王用之封于齊管仲親射桓公遂除報讐之心立為相此四子者皆嘗卑賤窮辱矣然其名聲馳于後世非學之所致乎由此觀之士必學然後成君子按姚賈監門子見國䇿當始皇時韓說誤仲由字子路卞人也尸子卞之野人少孔子九嵗子路性鄙好勇力志伉直冠雄雞佩猳豚陵暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子孔子曰自吾得由惡言不聞于耳史記家語子路初見孔子子曰汝何好曰好長劒子曰以子之所能而加之學豈可及乎子路曰南山有竹不揉自直斬而用之達于犀革以此言之何學之有子曰栝而羽之鏃而礪之其入之不亦深乎子路再拜曰敬受教又曰子路戎服見孔子拔劒而舞曰古之君子固以劒自衛乎子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之侵暴則以仁固之何待劒乎子路曰由乃今聞此言又曰子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音奏中聲以為節入于南不歸于北南者生育之鄉北者殺伐之域故君子之音溫柔居中小人之音亢麗微末昔者舜彈五絃之琴造南風之詩其興也勃焉紂好北鄙之聲其廢也忽焉由今匹夫之徒曽無意先王之制而習亡國之聲豈能保其七尺之軀哉冉有告子路子路懼而自悔靜思不食又曰子路盛服見孔子孔子曰由是倨倨者何也衣服既盛顔色充盈天下孰肯以非告汝乎子路趨而出改服而入論衡子路未入聖門時戴雞佩豚勇猛無禮聞誦讀之聲搖雞奮豚揚唇吻之音聒耳孔子引而教之漸漬磨礪猛氣消損卒能政事子路問于孔子曰由聞丈夫居世富貴不能有益于物貧賤不能屈節以求伸不足以論乎人之域矣子曰君子之行已期于必達于已可以屈則屈可以伸則伸是以雖屈而不毁其節志達而不犯于義又問曰有人于此被褐懷玉何如子曰國無道隱之可也國有道則衮冕而執玉家語荀子子路問曰君子亦有憂乎子曰君子其未得也則樂其意既已得之又樂其治是以有終身之樂無一日之憂說苑子路問曰請釋古之學而行古之意可乎子曰昔者束夷慕諸夏之義有女夫死為之納私壻終身不嫁不嫁則不嫁矣然非貞也蒼梧之弟娶妻而美請與兄易忠則忠矣然非禮也今子釋古之學而行子之意庸知用非為是用是為非乎又曰孔子閒居喟然而歎曰銅鞮伯華而無死天下其有定矣子路曰願聞其為人也子曰幼敏而好學壯有勇而不屈老有道而能下人子路曰夫有道又誰下哉子曰吾聞之以衆攻寡無不消也以貴下賤無不得也昔周公制天下之政而下士七十人豈無道哉又曰子路問曰管仲何如人也子曰大人也子路曰管仲說襄公襄公不說是不辨也立子糾而不能是無能也家殘于齊而無憂色是不慈也桎梏而居檻車是無愧也事所射之君是不貞也召忽死之管仲不死是無仁也夫子何以大之子曰管仲說襄公襄公不說襄公不知說也立子糾而不能不遇時也家殘于齊而無憂色知命也桎梏居檻車自裁也事所射之君知權也召忽死之管仲不死死之不免為溝中之瘠不死則功復用于天下由汝不知也論衡子路問曰豬肩羊膊可以得兆雚葦藁芼可以得數何必以蓍龜子曰蓋取其名也蓍之為耆龜之為言舊也明狐疑之事當問耆舊也中壘說多附㑹東夷蒼梧之論尤荒謬子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之為孝斂手足形還葬而無椁稱其財斯之謂禮記檀弓家語子路見于孔子曰負重致逺不擇地而休家貧親老不擇祿而仕昔者由事二親常食藜藿為親負米百里之外親喪之後南逰于楚纍茵而坐列鼎而食雖欲食藜藿為親負米不可復得也枯魚銜索幾何不蠧二親之夀忽如過隙孔子曰由也事親可謂生事盡禮死事盡思者也韓詩外傳子路曰有人于此夙興夜寐手足胼胝樹藝五榖以事其親而無孝子之名者何也子曰意者身未敬耶色不順耶辭不遜耶古人有言曰衣歟食歟曽不爾即勞以事親無此三者何為無孝之名孔叢子顔讐由善事親子路義之讐以非罪執子路請以金贖許之既而二三子納金于子路以入衛或謂孔子曰受人之金以贖其私昵義乎子曰義而贖之貧取于友非義而何愛金而令不辜陷辟凡人且不忍况二三子于由之所親乎吕氏春秋子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有强力之容肅敬之心皆倦怠矣有司跛倚以臨其為不敬大矣他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子曰誰謂由也而不知禮乎記禮器子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也魯人有朝祥而莫歌者子路笑之孔子曰由爾責于人終無己夫三年之喪亦已久矣夫子路出孔子曰又多乎哉踰月則其善也子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子路去魯蓋將適衛謂顔淵曰何以贈我曰吾聞之也去國則哭于墓而后行反其國不哭展墓而入謂子路曰何以處我子路曰吾聞之也過墓則式過祀則下記檀弓說苑子路將行辭于仲尼仲尼曰不强不逺不勞無功不忠無親不信無復不恭無禮慎此五者可以長久矣又曰敢問新交取親若何言寡可行若何長為善士而無犯若何仲尼曰新交取親其忠乎言寡可行其信乎長為善士而無犯其禮乎子路為蒲大夫衛邑辭孔子孔子曰蒲多壯士又難治然吾語汝恭以敬可以執勇寬以正可以比衆恭正以靜可以報上家語同又曰子路治蒲三年孔子過之入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信以寬矣至其庭曰善哉由也明察以斷矣子貢問曰夫子未見由之政而三稱其善可得聞與孔子曰入其境田疇易草萊辟溝洫深治此其恭敬以信民盡力也入其邑牆屋完固樹木茂此其忠信以寬民不偷也至其庭庭甚閒諸下用命此其明察以斷政不擾也韓詩外傳同荀子晉人欲伐衛畏子路不敢過蒲說苑子路為蒲令春修溝瀆豫人一簞食一壺漿孔子聞之使子貢止之子路不說往見夫子曰由與人修溝瀆而民多匱于食故與人一簞食一壺漿而夫子使止之何也夫子以仁教而禁其行仁也子曰爾以民為餓何不告于君發倉廩以給食之而以私饋之是不明君之惠見汝之德也速已則可否則罪矣韓非子以季孫相魯子路為郈令時事初衛靈公有寵姬曰南子靈公太子贖瞶得過南子懼誅出奔及靈公卒而夫人欲立公子郢郢不肯曰亡人太子之子輒在于是衛立輒為君是為出公出公立十二年其父贖瞶居外不得入子路為衛大夫孔悝之邑宰贖瞶乃與孔悝作亂謀入孔悝家遂與其徒􅊞攻出公出公奔魯而贖瞶入立是為莊公方孔悝作亂子路在外聞之而馳往遇子羔出衛城門謂子路曰出公去矣而門已閉子可還矣毋空受其禍子路曰食其食者不避其難子羔卒去有使者入城城門開子路隨而入造贖瞶贖瞶與孔悝登臺子路曰君焉用孔悝請得而殺之贖瞶弗聽于是子路欲燔臺贖瞶懼乃下石乞壺壓攻子路擊斷子路之纓子路曰君子死而冠不免遂結纓而死孔子聞衛亂曰嗟乎由死矣已而果然史記孔子哭子路于中庭有人弔焉而孔子拜之既哭進使者而問故使者曰醢之矣遂命覆醢記檀弓孝子傳仲子崔者仲由之子子路赴衛亂衛人孤黶時守門殺子路子崔既長告孔子欲報父讐子曰行矣子崔即行黶知之曰君子之勇不掩人之不備須後日于城西决戰其日黶持蒲弓木㦸與子崔戰而死韓詩外傳子路曰士不能勤苦不能輕死亡不能活貧窮而曰行義吾不信也昔者申包胥立于秦庭七日七夜哭是以存楚不能勤苦焉得行此比干且死而諫愈忠伯夷叔齊餓于首陽而志益彰不輕死亡焉能行此曽子褐衣緼緒未嘗完糲食未嘗飽義不合則辭上卿不活貧窮焉能行此夫士欲立身行道無顧難易行義徇名無顧利害然後能行之說苑趙襄子謂仲尼曰先生委質以見人主七十君矣而無所通不識世無明君乎意先生之道固不通乎仲尼不對襄子見子路曰嘗問先生以道先生不對知而不對則隱隱則安得為仁若信不知安得為聖子路曰建天下之鳴鐘而撞之以挺豈能發其聲哉君問先生無乃猶以挺撞乎論衡孔子出使子路齎雨具有頃天果大雨子路問其故孔子曰昨暮月離于畢後月復離畢孔子出子路請齎雨具不聽出果無雨子路問其故孔子曰昔月離其隂故雨昨暮月離其陽故不雨新書子路見孔子之背磬折舉哀曰唯由也見孔子聞之曰由也何以遺亡也故過猶不及有餘猶不足也語曰况乎明王執中履衡言秉中適而據乎宜故威勝德則淳德勝威則施威之與德交若紏纒且畏且懷君道正矣尚史卷八十三
