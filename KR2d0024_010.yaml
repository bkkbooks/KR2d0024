body:
  text: 尚史卷十世家三鑲白旗漢軍李鍇撰晉世家上始成王元年終烈王二年凡七百四十二年傳三十八世唐叔虞晉侯武侯成侯厲侯靖侯釐侯獻侯穆侯殤叔附文侯昭侯孝侯曲沃桓叔唐叔虞者姓姬氏字子于武王子母曰邑姜左傳邑姜方娠大叔初武王與邑姜㑹時夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故遂命之曰虞武王崩成王立唐有亂左傳成王時唐人作亂成王滅之而封大叔周公誅滅唐成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之于是遂封叔虞于唐吕氏春秋說苑並以史佚作周公唐在河汾之東方百里故曰唐叔虞唐叔子燮是為晉侯國都城記叔虞之子燮父徙居晉水傍改號曰晉晉侯子寧族是為武侯系本作曼期古史考作曼旗武侯之子服人是為成侯成侯子福系本作輻是為厲侯厲侯之子宜臼是為靖侯靖侯已來年紀可推自唐叔至厲侯五世無其年數靖侯元年當厲王二十一年按自成王元年至厲王二十年計二百五十七年而晉系裁五代恐誤當必有脫漏十七年厲王迷惑暴虐國人作亂王出奔彘大臣行政故曰共和十八年靖侯薨子釐侯司徒即位釐侯十四年宣王初立十八年釐侯薨子獻侯籍即位系本古史考並作蘇十一年獻侯薨子穆侯費王即位鄒誕本作弗生或作沸王穆侯四年取齊女姜氏為夫人七年伐條生大子仇十年伐千畝有功生少子名曰成師師服曰異哉君之命子也適庶名反逆晉其能毋亂乎二十七年穆侯薨弟殤叔自立大子仇出奔殤叔三年宣王崩幽王立四年大子仇率其徒襲殤叔而立是為文侯史記文侯十年申侯與犬戎殺幽王文侯與衛武公迎太子宜臼立之是為平王平王乃以文侯為方伯錫秬鬯圭瓉作文侯之命書傳王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正充左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純既我御事罔或耆夀俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位父義和汝克紹乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德尚書三十五年文侯薨子昭侯伯即位昭侯元年封文侯弟成師于曲沃曲沃邑大于翼翼晉侯都邑也成師封曲沃號為桓叔桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大于本而得民心不亂何待七年晉大臣潘父弒其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父左傳惠之三十年潘父弒昭侯是昭侯在位七年與世家同年表作六年今遵世家孝侯七年曲沃桓叔卒子鱓代立是為曲沃莊伯史記十五年曲沃莊伯伐翼弒孝侯表作十六年翼人立其弟鄂侯左傳鄂侯以下入春秋哀侯小子侯晉侯緡曲沃莊伯武公鄂侯名郤系本作郤他本作都孝侯弟史記世家作孝侯子鄂侯二年魯隱公初立四年隱三年平王崩桓王立六年隱五年曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之鄂侯奔隨是年秋曲沃叛王王命虢公伐曲沃而立鄂侯子哀侯于翼明年翼九宗五正九宗一姓為九族五正五官之長頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯左傳紀年鄂侯五年十月莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成于翼至相而還又曰六年王使虢公伐晉之曲沃晉鄂侯卒曲沃莊伯復伐晉立鄂侯子光是為哀侯公子萬救翼荀叔軫追之至于家谷史世家鄂侯六年卒曲沃莊伯乃興兵伐晉周平王使虢公伐莊伯莊伯走保曲沃晉人立鄂侯子光是為哀侯按傳哀侯立于翼鄂侯立于鄂是父子分立非鄂侯卒而後哀侯立也又鄂侯六年為桓王二年作平王亦誤鄂侯七年紀年史世家並曰鄂侯六年卒按傳隱六年嘉父納諸鄂謂之鄂侯隱六年是鄂侯七年也傳雖不書鄂侯卒年以哀侯考之蓋哀侯立于隱五年至隱六年鄂侯卒而後稱元也哀侯之元年也哀侯二年隱七年曲沃莊伯卒子稱代立是為曲沃武公史記紀年哀侯二年曲沃莊伯卒子稱立是為武公尚一軍三年荀人董伯皆叛曲沃哀侯既立侵陘庭之田陘庭南鄙啓曲沃伐翼史世家在哀侯八年九年桓三年曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右逐哀侯于汾隰驂絓而止夜獲之及欒賓左傳晉人乃立哀侯子小子為君是為小子侯小子侯元年桓四年曲沃武公使韓萬殺哀侯曲沃益强晉無如之何史記四年桓七年曲沃武公誘晉小子侯殺之紀年曲沃滅荀以其地賜大夫原氏黯是為荀叔明年滅翼冬王命虢仲立哀侯之弟緡于晉晉侯緡二年桓九年虢仲芮伯梁伯荀侯賈伯伐曲沃左傳紀年晉侯緡九年曲沃尚一軍異于晉八年桓十五年桓王崩莊王立二十三年莊十二年莊王崩僖王立二十七年莊十六年曲沃武公伐晉侯緡滅之盡以其寶器賂獻于僖王王命曲沃武公以一軍為晉侯列為諸侯于是盡併晉地而有之曲沃武公已即位三十七年更號曰晉武公晉武公始都晉國前即位通年三十八年自桓叔初封曲沃以至武公滅晉凡六十七嵗而卒代晉為諸侯武公代晉二年卒在位三十九年子獻公詭諸嗣史記獻公獻公名詭諸曲沃武公子也武公卒獻公即位是年僖王崩惠王立獻公元年莊十八年春公及虢公朝王王饗醴命之宥皆賜玉五㲄馬三匹左傳五年莊二十二年伐驪戎得驪姬驪姬弟俱愛幸之史記六年莊二十三年晉桓莊之族逼公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之明年士蒍又與羣公子謀使殺游氏之二子八年莊二十五年晉士蒍使羣公子盡殺游氏之族乃城聚而處之冬公圍聚盡殺羣公子九年莊二十六年士蒍為大司空夏士蒍城絳以深其宫史世家士蒍說公曰故晉之羣公子多不誅亂且起乃使盡殺諸公子而城聚都之命曰絳按史以桓莊之族為故晉公子又以聚為絳並誤秋虢人侵我冬虢人又侵我史記世家羣公子亡奔虢虢以其故再伐晉弗克十年莊二十七年公將伐虢士蒍曰不可虢公驕必棄其民無衆而後伐之初公蒸于齊姜生大子申生又娶二女于戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言于公曰曲沃君之宗也蒲與二屈君之疆也不可以無主若使大子主曲沃重耳夷吾主蒲與屈可以威民而懼戎且旌君伐公說十一年莊二十八年夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳十六年閔元年作二軍按周制大國三軍次國二軍小國一軍晉本大國自前僖王命曲沃伯以一軍為晉侯遂從小國之制公將上軍大子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為大子城曲沃賜趙夙耿畢萬魏以為大夫士蒍曰大子不得立矣分之都城而位以卿先為之極又焉得立十七年閔二年冬十二月公使大子申生伐東山臯落氏里克諫公曰寡人有子未知其誰立焉十九年僖二年使荀息假道于虞以伐虢虞公許之夏里克荀息帥師㑹虞師伐虢滅下陽二十一年僖四年驪姬謂大子曰君夢齊姜必速祭之大子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子大子奔新城公殺其傅杜原欵冬十二月申生縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈二十二年僖五年公使寺人披伐蒲重耳奔翟秋晉復假道于虞伐虢八月圍上陽冬十二月晉滅虢虢公醜奔京師紀年十九年㑹虞師伐虢虢公醜奔衛師還館于虞遂襲虞滅之執虞公韓非子獻公欲伐虞遺之屈産之乘垂棘之璧女樂六以榮其意而亂其政二十三年僖六年公使賈華伐屈夷吾不能守奔梁二十五年僖八年閏月惠王崩襄王立按惠王實以七年閏月崩襄王懼叔帶之難至八年定位而後發喪初里克敗狄于采桑夏狄伐我報采桑之役也二十六年僖九年夏公將㑹諸侯于葵邱遇周宰孔曰可無㑹齊侯不務德而勤逺略公乃還秋九月公薨里克㔻鄭以三公子之徒作亂冬十月里克殺奚齊于次荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之齊侯以諸侯之師伐我及髙梁而還齊隰朋帥師㑹秦師納公子夷吾左傳公在位二十六年諡曰獻惠公懷公惠公名夷吾獻公之子也驪姬之亂夷吾奔梁曰梁近秦而幸焉及獻公薨夷吾重賄秦以求入惠公元年僖十年夏四月周公忌父王子黨㑹齊隰朋立夷吾是為惠公公殺里克以說于是㔻鄭聘于秦且謝緩賂故不及公改葬共大子秋狐突適下國遇大子告之曰夷吾無禮余得請于帝矣將以晉畀秦秦將祀余對曰神不歆非類民不祀非族君祀無乃殄乎君曰諾吾將復請七日新城西偏將有巫者而見我焉及期往告之曰帝許我罰有罪矣敝于韓㔻鄭如秦請納重耳遂殺㔻鄭祁舉及七輿大夫㔻豹㔻鄭子奔秦二年僖十二年王使召武公內史過賜公命夏戎伐京師秦晉伐戎以救周秋公平戎于王四年僖十三年冬晉薦饑乞糴于秦秦輸粟于晉自雍及絳相繼五年僖十四年秋八月沙鹿崩冬秦饑乞糴于晉晉人弗與公之入也秦穆姬申生姊秦穆夫人屬賈君焉獻公次妃賈女也且曰盡納羣公子公蒸于賈君又不納羣公子是以穆姬怨之公許賂中大夫里㔻等既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴六年僖十五年秋秦伯伐我公謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右公逆秦師使韓簡視師復曰師少于我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚戰于韓原晉戎馬還濘而止公號慶鄭鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲公以歸晉大夫反首拔舍反垂頭髮拔草舍止從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以大子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君乃許晉平公使郤乞告瑕吕飴甥且召之飴甥教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉于是乎作爰田分公田之稅應入公者爰之于所賞之衆爰易也飴甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子衆說晉于是乎作州兵十月飴甥㑹秦伯盟于王城秦改館公饋七牢十一月公歸殺慶鄭而後入是嵗晉又饑秦伯又餼之粟曰吾怨其君而矜其民于是秦始征晉河東置官司焉即河外列城五始歸之秦也七年僖十六年秋狄侵我取狐厨受鐸涉汾及昆都八年僖十七年大子圉為質于秦秦歸河東而妻之十三年僖二十二年大子圉逃歸十四年僖二十三年秋九月公薨子圉立是為懷公明年秦納重耳殺懷公于髙梁左傳公在位十四年諡曰惠懷公在位一年諡曰懷文公文公名重耳獻公子狄女狐姬之所生也獻公十三年以驪姬故公子重耳備蒲城守秦史記及難作晉人伐諸蒲城蒲城人欲戰公子不可曰保君父之命而享其生祿于是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏犨胥臣左傳史記重耳少好士年十七有賢士五人曰趙衰狐偃賈他先軫魏武子自獻公為太子時重耳固已成人矣獻公即位重耳年二十一獻公十三年以驪姬故重耳備蒲城守秦二十一年殺大子申生驪姬讒之恐不辭獻公而守蒲城二十二年獻公使宦者履鞮趣殺重耳重耳遂奔狄狄其母國也是時重耳年四十三從此五士其餘不名者數十人居狄五嵗獻公薨里克殺奚齊卓子使人迎立公子公子畏殺固謝不敢入晉更迎夷吾立之是為惠公惠公使殺公子公子適齊居狄凡十二年而去史記過衛衛文公不禮焉出于五鹿乞食于野人野人與之塊公子怒欲鞭之狐偃曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可姜氏與狐偃謀醉而遣之醒以戈逐狐偃及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈曹大夫之妻曰晉公子必反其國子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諫弗聽及楚楚成王饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇于中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋得臣楚大夫請殺之成王不可乃送諸秦史記居楚數月晉大子圉亡秦秦怨之聞重耳在楚乃召之成王曰楚逺更數國乃至晉秦晉接境子其勉行秦穆公納女五人懷嬴與焉子圉妻他日公享之狐偃曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜文公元年僖二十四年春正月秦穆公納公子濟河圍令狐入桑泉取白襄二月甲午晉師軍于廬柳穆公使公子縶如晉師師退軍于郇辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫戊申使殺懷公于髙梁史世家重耳出亡凡十九嵗而得入時年六十二矣晉人多附焉吕甥郤芮惠公舊臣畏逼將焚公宫而弒公寺人披史作履鞮請見以難告三月公潛㑹秦穆公于王城己丑晦公宫火吕甥郤芮不獲公乃如河上穆公誘而殺之公逆夫人嬴氏以歸穆公送衛于晉三千人實紀綱之僕左傳公屬百官賦職任功棄責薄斂施舍分寡輕關易道通商寬農省用足財利器明德以厚民性舉善援能官方定物正名育類昭舊族愛親戚明賢良尊貴寵賞功勞事耉老禮賓旅友舊故胥籍狐箕欒郤伯先羊舌董韓實掌近官諸姬之良掌其中官異姓之能掌其逺官公食貢大夫食邑士食田庶人食力工商食官皂𨽻食職官宰食加官宰家臣加大夫之家田也政平民阜財用不匱襄王使大宰文公及內史興賜公命上卿逆于境公郊勞館諸宗廟饋九牢設庭燎及期命于武宫設桑主布几筵大宰涖之公端委以入大宰以王命命冕服大史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成王其善之國語是年秋叔帶以狄師攻王王出適鄭處于汜叔帶居溫二年僖二十五年春秦穆公師于河上將納王狐偃言于公曰求諸侯莫如勤王諸侯信之且大義也公使卜之吉筮之又吉乃辭秦師而下三月次于陽樊右師圍溫左師逆王夏四月王入于王城取叔帶于溫殺之公朝王王饗禮命之宥設醴酒又加之幣帛以助勤宥助也請隧闕地通路曰隧王之葬禮也諸侯皆縣柩而下弗許曰王章也與之陽樊溫原攢茅之田晉于是始啓南陽陽樊不服圍之出其民秋及秦師伐鄀秦楚間小國冬圍原命三日之糧原不降命去之退一舍而原降遷原貫于冀趙衰為原大夫狐溱為溫大夫冬楚人伐宋圍湣四年僖二十七年冬楚人及陳蔡鄭許圍宋宋使來告急先軫曰報施救患取威定霸于是乎在矣狐偃曰楚始得曹而新昏于衛若伐曹衛楚必救之則齊宋免矣于是乎搜于被廬作三軍謀元帥趙衰曰郤縠可乃使郤縠將中軍郤臻佐之使狐偃將上軍讓于狐毛而佐之命趙衰為卿讓于欒枝先軫佐之荀林父御戎魏犫為右五年僖二十八年春伐曹假道于衛衛弗許還自河南濟侵曹伐衛取五鹿二月郤縠卒先軫將中軍胥臣佐下軍公及齊侯盟于斂盂衛侯請盟弗許國人出其君以說于我公圍曹門焉多死曹人尸諸城上公患之聽輿人之謀曰稱舍于墓為將發冢師遷焉曹人凶懼為其所得者棺而出之因其凶也而攻之三月入曹數之以其不用僖負羈而乘軒者三百人且令無入僖負羈之宫而免其族報施也魏犨顛頡爇僖負羈氏公愛魏犨材舍之殺顛頡以徇于師立舟之僑以為戎右宋使來告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公從之楚成王入居于申使申叔去穀使得臣去宋曰無從晉師得臣請戰王怒少與之師唯西廣東宫與若敖之六卒實從之得臣使宛春楚大夫告于我師曰請復衛侯而封曹臣亦釋宋之圍狐偃曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公從之得臣怒從我師我師退三舍楚衆欲止得臣不可夏四月公次于城濮楚師背酅而舍公患之聽輿人之誦曰原田每每舍其舊而新是謀公疑焉狐偃曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒枝曰漢陽諸姬楚實盡之思小惠而忘大恥不如戰也公夢與楚子博楚子伏已而盬其腦是以懼狐偃曰吉我得天楚伏其罪吾且柔之矣得臣使鬭勃請戰公使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乘韅靷鞅靽在背曰韅在胸曰靷在腹曰鞅在後曰靽一云著掖皮曰韅軸曰靷頸皮曰鞅縶曰靽公登有莘之虛以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳于莘北胥臣以下軍之佐當陳蔡得臣以若敖之六卒將中軍曰今日必無晉矣鬬宜申將左鬭勃將右胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而僞遁楚師馳之先軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻鬭宜申楚左師潰楚師敗績得臣收其卒而止故不敗晉師三日館穀及癸酉而還至于衡雍作王宫于踐土鄭伯為楚師既敗懼行成于我欒枝入盟鄭伯五月公及鄭伯盟于衡雍獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也用平王享晉文侯仇之禮史世家周作晉文侯命王若曰父義和丕顯文武能慎明德昭登于上布聞在下維時上帝集厥命于文武恤朕身繼豫一人永在其位于是晉文公稱伯史記誤王享醴命公宥王命尹氏及王子虎內史叔興父策命公為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國紏逖王慝公三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受策以出出入三覲衛侯聞楚師敗懼出奔使元咺衛大夫奉叔武衛侯弟以受盟王子虎盟諸侯于王庭曰皆奬王室無相害也有渝此盟明神殛之說苑公合諸侯而盟曰吾聞國之昏不由聲色必由姦利好樂聲色者淫也貪姦者惑也夫淫惑之國不亡必殘自今以來無以美妾疑妻無以聲色妨正無以姦情害公無以貨利示下其有之者是謂伐其根素流于華葉若此者有患無憂有冦勿弭不如言者盟示之楚得臣歸及連穀而死公聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉已而已不在民矣史記世家晉焚楚軍火數日不息公歎左右曰勝楚而君猶憂何公曰吾聞能戰勝安者唯聖人是以懼且子玉猶在庸可喜乎子玉歸自殺公曰我擊其外楚擊其內內外相應于是乃喜說苑晉文公與楚人戰大勝之燒其軍火三日不滅文公退而有憂色侍者曰君有憂色何也公曰戰勝而安者唯聖人乎若夫詐勝之徒未嘗不危也吾是以憂六月復衛侯城濮之戰晉中軍風于澤牛馬因風而走皆失之亡大斾之左旃祁瞞干命司馬殺之以徇于諸侯師還濟河舟之僑先歸秋七月振旅愷以入于晉獻俘授馘飲至大賞徵㑹討二殺舟之僑以徇于國民于是大服史記世家晉侯歸國行賞狐偃為首或曰城濮之戰先軫之謀公曰城濮之事偃說我毋失信先軫曰軍事勝為右吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功吕氏春秋文公將戰于城濮召咎犯而問曰楚衆我寡奈何對曰臣聞繁禮之君不足于文繁戰之君不足于詐君亦詐之而已公告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸詐僞之道雖今偷可後將無復非長術也公用咎犯之言敗楚反而為賞雍季在上左右曰城濮之功咎犯之謀君用其言而賞後其身或者不可乎公曰雍季之言百世之利咎犯之言一時之務也焉有一時之務先百世之利者乎韓非子同冬公及諸侯㑹于溫執衛侯歸之于京師是㑹也公召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽諸侯圍許公有疾曹伯之豎侯獳貨筮史使曰以曹為解公復曹伯遂㑹諸侯圍許公作三行以禦狄荀林父將中行屠擊將右行先蔑將左行六年僖二十九年夏狐偃㑹周王子虎魯公及諸侯之大夫盟于翟泉尋踐土盟且謀伐鄭七年僖三十年春侵鄭公鴆衛侯不死納玉于王與公皆十㲄乃釋衛侯秋九月公及秦伯圍鄭秦伯與鄭盟而還公亦去之冬魯公子遂初來聘八年僖三十一年春分魯濟西田曹地也魯公子遂來聘秋搜于清原作五軍以禦狄晉作三行今罷之更為上下新軍趙衰為卿九年僖三十二年春楚請平使陽處父報之晉楚始通冬公薨左傳諡曰文在位九年公大布之衣牂羊之裘韋以帶劍威立于海內昔齊桓公合諸侯以乘車退誅于國以斧鉞文公合諸侯以革車退行于國以禮義桓公前柔而後剛文公前剛而後柔然而令行天下權制諸侯鈞者審于勢之變也淮南子韓非子文公伐宋乃先宣言曰吾聞宋君無道侮蔑長老分財不中教令不信余來為民誅之說苑文公伐衛入郭坐士令食曰今日必得大垣公子慮俯而笑公曰奚笑對曰臣之妻歸臣送之反見桑者而助之顧臣之妻則亦有送之者矣公懼還師而貉人攻其地列子作公子鋤伐宋事傳不載伐衛遂伐曹亦無還師事說並誣說苑大功之效在于用賢積道衰滅之過在于得意而怠晉文公是其效也文公出亡修道不休得至于饗國于是任咎犯先軫陽處父畜愛百姓厲養戎士政治內定則舉兵伐衛執曹伯敗强楚率諸侯而朝天子天下平定周室尊顯故曰大功之效在于用賢積道文公霸功立期至意得一年用三師進而圍許兵弊不服罷諸侯而歸自此怠政事狄泉之盟不親至威武詘折諸侯不朝鄭叛狄侵衛遷帝邱故曰衰滅之過在于得意而怠新序文公出獵前驅曰前有大蛇髙如隄阻道竟之公曰寡人有過天以戒寡人還車而反前驅曰臣聞之喜者無賞怒者無刑今禍福已在前矣不可變何不遂驅之公曰不然夫神不勝道妖不勝德禍福未發猶可化也還車反宿齊三日請于廟曰孤少犧不肥幣不厚罪一弋獵無度罪二多賦斂重刑罰罪三請自今關市無征澤梁無賦赦罪人舊田半稅新田不稅行令未半旬守蛇吏夢天帝殺蛇發夢蛇腐矣謁之公曰然神果不勝道妖亦不勝德應之以德而已按文公他事殊夥具散見諸傳中襄公襄公名歡文公子文公薨襄公即位元年僖三十三年春秦襲鄭滅滑而還公發命興姜戎公墨衰絰文公未葬以凶服從戎故墨染其衰而加絰夏四月敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉于是始墨文嬴請三帥使歸就戮公許之秋狄伐我及箕八月公敗狄于箕郤缺獲白狄子先軫死之冬及陳鄭伐許討其二于楚也陽處父侵蔡蔡即楚故楚鬬勃救之我師歸文公之季年衛成公不朝我而侵鄭二年文元年夏四月公既祥使告于諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師公朝王于溫先且居胥臣伐衛五月圍戚取之獲孫昭子昭子名未詳衛告于陳陳曰更伐之衛孔達衛大夫伐我秋疆戚田三年文二年春秦伐我戰于彭衙秦師敗績夏四月陽處父及魯公盟我以不朝討魯魯公來使大夫盟以恥之六月士縠盟諸侯于垂隴討衛故陳為衛請成于我執孔達以說冬先且居㑹諸侯大夫伐秦取汪及彭衙而還四年文三年春㑹諸侯之師伐沈沈潰夏五月秦伐我取王官及郊秋楚圍江先僕伐楚以救江冬以江故告于周王叔桓公陽處父伐楚以救江十二月魯公來公及魯公盟陽處父之盟懼無禮于魯請改盟故五年文四年春歸孔達于衛夏衛侯來拜曹伯來㑹正秋公伐秦圍邢新城六年文五年冬陽處父聘于衛趙衰欒枝先且居胥臣皆卒七年文六年春搜于夷舍二軍文公時作五軍今舍二軍復三軍之制使狐射姑將中軍趙盾佐之陽處父改搜于董謂趙盾能易中軍盾始為政秋八月公薨左傳諡曰襄在位七年靈公靈公名夷臯襄公大子母曰穆嬴襄公七年文六年薨靈公少我以難故欲立長君當趙盾為政欲立公子雍狐射姑曰不如立公子樂雍樂並文公子盾不可使先蔑士㑹如秦逆雍射姑亦使召樂于陳盾殺諸郫秋九月狐射姑使續鞫居狐氏族殺陽處父冬十一月殺續鞫居射姑奔狄靈公元年文七年秦送公子雍穆嬴日抱大子以啼于朝又抱以適趙氏責盾盾乃背先蔑而立大子是為靈公盾禦秦師敗秦師于令狐先蔑士㑹奔秦秋八月趙盾㑹諸侯齊宋衛陳鄭許曹盟于扈靈公立故二年文八年春歸匡戚之田于衛且致公壻池晉君女壻之封自申至于虎牢之竟夏秦伐我取武城秋八月襄王崩頃王立我以扈之盟討魯魯公後至冬魯公子遂㑹趙盾盟于衡雍三年文九年春賊殺先克夷之搜襄公將登箕鄭父先都使士縠梁益耳將中軍先克不可克又奪蒯得田故五人作亂討其亂殺先都梁益耳三月殺士縠箕鄭父蒯得楚伐鄭趙盾㑹諸侯之大夫救鄭不及楚師四年文十年春伐秦取少梁夏秦伐我取北徵五年文十一年夏郤缺㑹魯叔仲彭生于承筐謀諸侯之從楚者六年文十二年冬秦伐我取羈馬我禦之于河曲秦師夜遁復侵我入瑕七年文十三年公使詹嘉處瑕以守桃林之塞備秦也夏士㑹歸自秦冬十二月魯公來朝公及魯公盟八年文十四年春頃王崩匡王立夏五月邾捷菑來奔六月趙盾㑹諸侯魯宋陳衛鄭許曹同盟于新城從楚者服且謀納邾捷菑盾以諸侯之師八百乘納捷菑于邾弗克納新城之盟蔡人不與九年文十五年夏六月郤缺以上軍下軍伐蔡戊申入蔡秋齊侵魯魯來告冬十一月公㑹諸侯宋衛蔡陳鄭許曹盟于扈尋新城之盟且謀伐齊齊人賂公故不克而還宋弒昭公十一年文十七年春荀林父㑹伐宋立文公而還夏六月公搜于黃父復合諸侯于扈平宋也公不見鄭伯以為二于楚鄭子家以書告趙盾鞏朔遂行成于鄭晉鄭交質河曲之役在文十二年秦師將遁㬰駢請薄之趙穿胥甲父不可當軍門呼十三年宣元年夏放胥甲父于衛而立胥克秋楚侵陳遂侵宋趙盾救陳宋㑹諸侯宋陳衛曹于棐林伐鄭楚救鄭囚解揚大夫我師乃還我欲求成于秦冬侵崇小國名以求成秦弗與成我伐鄭十四年宣二年春秦伐我圍焦夏趙盾救焦遂及諸侯之師宋衛陳侵鄭楚鬬椒救鄭盾去之公不君厚斂以雕牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝趙盾士㑹諫不聽盾驟諫公患之將攻盾盾遂自亡秋九月趙穿弒公于桃園左傳說苑靈公造九層之臺費用千億曰敢諫者斬孫息曰臣能纍十三博棊加九雞子其上即以棊子置其下加九雞子其上公曰危哉曰是不危也九層之臺三年不成國用空虛鄰國謀議社稷一滅君何所望公乃壞臺又曰孫息學悲歌引琴作鄭衛之音靈公大惑琴清英有孫息鼓琴晉王傷心如雍門周事諡曰靈在位十四年成公成公名黑臀文公少子其母周女也史記靈公十四年宣二年趙穿弒靈公趙盾使穿逆公子于周而立之是為成公初麗姬之亂詛無畜羣公子自是晉無公族及公即位乃宦卿之適子而為之田以為公族又宦其餘子亦為餘子餘子適子之母弟其庶子為公行晉于是有公族餘子公行冬十月匡王崩定王立成公元年宣三年春公伐鄭及郔鄭平士㑹入盟三年宣五年冬楚伐鄭陳及楚平荀林父救鄭伐陳四年宣六年春趙盾及衛侵陳秋赤狄伐我圍懷及邢邱五年宣七年夏赤狄侵我取向隂之禾鄭及我平冬公㑹諸侯魯宋衛鄭曹盟于黑壤周王叔桓公臨之以謀不睦六年宣八年春白狄及我平夏㑹狄伐秦冬陳及我平七年宣九年秋九月公㑹諸侯宋衛鄭曹于扈陳侯不㑹荀林父以諸侯之師伐陳公薨于扈左傳諡曰成在位七年尚史卷十
