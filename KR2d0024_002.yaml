body:
  text: 尚史卷二本紀一鑲白旗漢軍李鍇撰軒轅本紀世傳三皇多以伏羲神農其一或曰燧人曰祝融曰女媧漢孔氏書序曰伏羲神農黃帝之書謂之三墳少皥顓頊髙辛唐虞之書謂之五典故黃帝以上為三皇少皥以下為五帝雖不知其所本然其序五帝與家語宰我問及春秋內外傳大戴禮略合至宋五峯胡氏直斷以易大傳以伏羲神農黃帝堯舜為五帝然亦非繫辭本旨不足以為定論今從書序紀五帝又上溯黃帝以紀其所自出而略羲農懼邃逺無徵云黃帝黃帝者少典之子史記索隱少典諸侯國號姬姓也史記姓公孫母曰附寶感大電繞北斗樞星照郊野而孕二十四月生黃帝於壽邱長於姬水受國於有熊居軒轅之邱因以為名又以為號帝王世紀左傳號帝鴻氏白虎通黃帝有天下號曰自然拾遺記軒轅出自有熊之國母曰昊樞以戊巳之日生故以土德王時有黃星之祥五行書以戊子日生生而神靈弱而能言幼而徇齊長而敦敏成而聰眀白虎通黃帝龍顔得天匡陽上法中宿取象文昌鬻子黃帝十嵗知神農之非而改其政今本無軒轅之時神農氏世衰諸侯相侵伐暴虐百姓而神農氏弗能征於是黃帝乃習用干戈以征不享諸侯咸來賓從而蚩尤最為暴莫能伐炎帝欲侵陵諸侯諸侯咸歸黃帝黃帝乃修德振兵治五氣藝五種撫萬民度四方教熊羆貔貅貙虎以與炎帝戰於阪泉之野帝王世記黃帝乃擾馴猛獸與神農氏戰於阪泉之野史記索隱猛獸可以教戰周禮有服不氏掌教擾猛獸即古服牛乘馬之類正義言教士卒習戰以猛獸之名名之用威敵也此説近是三戰然後得志國語少典取有嶠氏女而生黃帝炎帝成而異德用師以相濟也韋昭注言生者謂二帝本所生出也黃帝滅炎帝滅其子孫耳明非神農也賈誼新書炎帝者黃帝同母異父兄弟各有天下之半黃帝行道而炎帝不聽故戰于涿鹿之野血流漂杵歸藏黃帝與炎帝爭鬬涿鹿之野將戰筮于巫咸曰果哉而有咎蚩尤作亂不用帝命於是黃帝乃徵師諸侯與蚩尤戰於涿鹿之野遂禽殺蚩尤崔豹古今注黃帝與蚩尤戰于涿鹿之野蚩尤作大霧兵士皆迷於是作指南車以示四方遂擒蚩尤故後常建焉又涿鹿之戰常有五色雲氣金枝玉葉止於帝上有花葩之象故作華蓋鹽鐵論軒轅戰涿鹿殺兩曎蚩尤而為帝而諸侯咸尊黃帝為天子代神農氏有土德之瑞故號黃帝吕氏春秋黃帝之時天先見大蚓大螻黃帝曰土氣勝土氣勝故其色尚黃其事則土蚓土精大五六圍長十餘丈天下有不順者黃帝從而征之平者去之萬機論黃帝之初養性愛民不好戰伐而四帝各以方色稱號交共謀之邉城日警介胄不釋黃帝嘆曰君危于上民不安于下主失于國其臣再嫁厥疾之由非養冦邪今取民萌之上而四道亢衡遞震豫師於是遂師營壘以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民臣亦嫁於四帝矣披山通道未嘗寧居東至于海登九山及岱宗西至于空洞登雞頭南至于江登熊湘北逐葷粥合符釜山而邑于涿鹿之阿遷徙往來無常處以師兵為營衛官名皆以雲命為雲師杜預左傳注黃帝受命有雲瑞故百官師長皆以雲名為號縉雲氏其一官也置左右大監于萬國萬國和獲寶鼎漢書黃帝作寶鼎三象天地人迎日推䇿按日月朔望未來而逆推之故曰迎日舉風后力牧常先大鴻以治民尸子子貢問於孔子曰古者黃帝四面信乎孔子曰黃帝取合已者四人使治四方不謀而親不約而成功此之謂四面也順天地之紀幽明之占死生之説存亡之難時播百榖草木淳化鳥獸蟲蛾旁羅日月星辰水波土石金玉勞勤心力耳目節用水火材物史記黃帝內傳黃帝升為天子地獻草木述耕種之利因之以廣耕種拾遺記軒轅考定厯紀吹玉律正璇衡譙周古史考黃帝作釜甑始蒸榖為飯烹榖為粥天下人民野居穴處未有室屋則與鳥獸同域於是黃帝乃伐木構材築作宫室上棟下宇以避風雨賈誼新書始作合宫祀上帝布政教國語白虎通黃帝作宫室以避暑寒此宫室之始也黃帝內傳帝既斬蚩尤因立臺榭始作舟車以濟不通旁行天下方制萬里畫野分州得百里之國萬區漢書古史考黃帝作車引重致逺少昊時略加牛禹時奚仲加馬帝王世紀自神農以上有大九州柱州迎州神州之等黃帝以來德不及逺惟於神州內分為九州黃帝受命風后受圖割地布九州置十二國拾遺記置四史以主圖籍使九行之士以統萬國九行者孝慈文信言忠恭勇義以觀天地以祠萬靈始造書契服冕垂衣拾遺記鑄十二鐘以和五音以施英韶以仲春之月日在奎始奏之命之曰咸池吕氏春秋黃帝崩葬橋山史記帝王世紀黃帝在位百年而崩年百一十嵗或傳以為仙或言壽三百嵗皇覽黃帝冡在上郡橋山地理志在上郡陽周縣橋山南括地志在寧州羅川縣東八十里子午山黃帝之治天下也其民不引而來不推而往不使而成不禁而止黃帝之治也置法而不變使民安其位管子黃帝之治天下也日月精明星辰不失其行風雨時節五榖登孰青龍進駕飛黃伏皂諸北儋耳之國莫不獻其貢職然猶未及虙戲氏之道也淮南子尸子四夷之民有貫胸者有深目者有長肱者黃帝之德嘗致之黃帝二十五子子青陽之子孫曰摯立是為帝少皥春秋命厯序黃帝傳十世一千五百二十嵗兵隂陽有黃帝十六篇圖三卷道家黃帝四經四篇銘六篇黃帝君臣十篇雜黃帝五十八篇小説家黃帝説四十篇漢書列子黃帝書曰形動不生形而生影聲動不生聲而生響無動不生無而生有形必終者也天地終乎與我偕終終進乎不知也道終乎本無始進乎本不久有生則復于不生有形則復于無形不生者非本不生者也無形者非本無形者也生者理之必終者也終者不得不終亦如生者不得不生而欲恆有生畫其終惑于數也精神者天之分骨骸者地之分屬天清而散屬地濁而聚精神離形各歸其真故謂之鬼者歸也歸其真宅黃帝曰精神入其門骨骸反其根我尚何存新書黃帝曰道若川谷之水其出無已其行無止故服人而不為仇分人而不噂者惟其道矣故播之于天下而不忘者其惟道矣吕氏春秋黃帝言曰聲禁重色禁重衣禁重香禁重味禁重室禁重按三墳為軒轅政典然與隂符蓋皆附會非黃帝之書太史公所謂文不雅馴者近是今並略之贊曰世傳黃帝實仙去不死如皇覽古今注世紀諸説棼如而鑄鼎騎龍且自史遷發之列仙讖緯又其下已槩不具載具載其規矩天地軌範百王者如紀其神明之德謂實不死可也五帝紀説見前少皥金天氏帝少皥名摯周書摯作質黃帝子青陽氏之裔也土生金故為金德天下號曰金天氏漢書帝十二而冠八代記引公羊疏初降居江水有聖德邑于窮桑以登帝位都曲阜故又謂之窮桑氏帝王世紀古史考或曰宗師太皥之道故曰少皥氏拾遺記云少皥以主西方一號金天氏亦曰金窮氏時有五鳯隨方色集于庭因曰鳯鳥氏又號窮桑氏亦曰桑邱氏金鳴于山銀湧于地或如龜蛇有水屈曲如龍鳯有山盤紆如屈龍故有龍山龜山鳯水之目亦因以為姓末代為龍邱氏蛇邱氏曰皇蛾白帝子降與皇蛾宴喜而生少昊荒誕大甚略存一二少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也鳳知天時故名厯正元鳥氏司分者也元鳥燕也以春分來秋分去伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也青鳥鶬鷃也以立春鳴立夏止丹鳥氏司閉者也丹鳥鷩雉也以立秋來立冬去四時皆厯正之屬官祝鳩氏司徒也祝鳩鷦鳩也孝故為司徒主教民鴡鳩氏司馬也鴡鳩王鴡也鷙而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴣鵴也平均故為司空平水土爽鳩氏司冦也爽鳩鷹也鷙故為司冦主盜賊鶻鳩氏司事也鶻鳩鶻雕也春來冬去故為司事五鳩鳩民者也五雉為五工正雉有五種西方曰鷷雉攻木之工東方曰鶅雉磚埴之工南方曰翟雉攻金之工北方曰鵗雉攻皮之工伊洛而南曰翬雉設五色之工利器用正度量夷民者也九扈為九農正扈有九種春扈鳻鶞相五土之宜趣民耕種夏扈竊元趣民耘苗秋扈竊藍趣民收斂冬扈竊黃趣民蓋藏棘扈竊丹為果驅鳥行扈唶唶晝為民驅鳥宵扈嘖嘖夜為農驅獸桑扈竊脂為蠶驅雀老扈鷃鷃趣民收麥令不得晏起扈民無淫者也扈止也左傳在位百年而崩帝王世紀外紀在位八十四年壽百嵗紀年或曰名清不居帝位帥鳥師居西方以鳥紀官周書赤帝命蚩尤于宇少昊以正四方及黃帝執殺蚩尤乃命少昊請司馬鳥師以正五帝乏官少皥氏衰帝顓頊嗣春秋命厯序少皥傳八世顓頊髙陽氏帝顓頊髙陽者黃帝子昌意之裔也母曰景僕蜀山氏之女謂之女樞大戴禮記昌意娶于蜀山氏之子謂之昌僕氏産顓頊山海經昌意降處若水生韓流韓流擢首謹耳人面豕喙麟身渠股豚止取淖子曰阿女生顓頊韓流或作乾荒河圖瑶光如霓貫月正白感女樞于幽房之宫生顓頊首戴干戈有德文白虎通顓頊戴午是謂清明發節移度蓋象招搖潛夫論顓頊其相駢幹金天氏之末女樞生顓頊於若水昌意雖黃帝之嫡以德劣降居若水世為諸侯及顓頊生十年而佐少昊氏二十而登帝位帝王世紀鬻子顓頊年十五而佐黃帝二十而治天下其治天下也上緣黃帝之道而行之學黃帝之道而常之吕氏春秋黃帝誨顓頊曰爰有大圜在上大矩在下汝能法之為民父母按二説則顓頊逮事黃帝中闕少皥一世與史説近非是今從世紀而所謂少昊者乃其子孫非謂帝摯與世紀異靜淵以有謀疏通而知事養材以任地載時以象天依鬼神以剬義治氣以教化潔誠以祭祀北至于幽陵南至于交趾西至于流沙東至于蟠木動靜之物大小之神日月所照莫不砥屬史記以孟春正月為元其時正朔立春五星會于天厯營室天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和古史考平九黎之亂黎氏九人以水事紀官南正重司天以屬神北至黎司地以屬民民神不雜萬物有序始都窮桑徙桑邱帝王世紀淮南子顓頊之法婦人不避男子于路者拂之于四達之衢令飛龍作效八風之音命之曰承雲以祭上帝吕氏春秋金生水故為水德天下號曰髙陽氏漢書新書帝顓頊曰至道不可過也至義不可易也是故以後者復迹也故上緣黃帝之道而行之學黃帝之道而常之加而弗損天下亦平也又曰功莫美于去惡而為善罪莫大于去善而為惡故非吾善善而已也善緣善也非惡惡而已也惡緣惡也吾日慎一日其此已也在位七十八年年九十八嵗嵗在鶉火而崩葬東郡頓邱廣陽里帝王世紀皇覽顓頊冢在東郡濮陽頓邱城門外廣陽里中山海經漢水出鮒魚之山帝顓頊葬于陽九嬪葬于隂四蛇衛之顓頊崩而元囂之裔髙辛立是為帝嚳春秋命厯序顓頊傳二十世三百五十嵗或曰傳十世帝嚳髙辛氏帝摯帝嚳髙辛者黃帝之子元囂之裔孫也大戴禮記黃帝生元囂元囂生蟜極蟜極生髙辛生而神異自言其名曰夋白虎通帝嚳駢齒上法月參康度成紀取理隂陽桓談新論帝嚳戴肩齠齓有聖德年十五而佐髙陽氏三十登帝位都亳帝王世紀其治天下也緣黃帝之道而眀之學帝顓頊之道而行之鬻子普施利物不於其身聰以知逺明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之厯日月而迎送之明鬼神而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士言其公且亷也帝嚳溉執中而遍天下言若水之灌溉平等而執中正遍于天下日月所照風雨所至莫不從服史記以人事紀官故以勾芒為木正祝融為火正蓐收為金正元冥為水正后土為土正五行之官分職而治諸侯於是化被天下帝王世紀共工氏作亂帝嚳使重黎誅之史記命咸黑作為聲歌九招六列六英吕氏春秋水生木故為木德天下號曰髙辛氏漢書潛夫論帝嚳代顓頊氏其號髙辛厥質神靈德行祗肅迎送日月順天之則能敘三辰以周民作樂六英新書帝嚳曰緣道者之辭而學為己緣巧者之事而學為巧行仁者之操而學為仁也故節仁之器以修其躬而身専其美矣故上緣黃帝之道而明之學帝顓頊之道而行之而天下亦平也潛夫論德莫髙於博愛人政莫髙於博利人故政莫大於信治莫大於仁吾慎此而已也帝嚳在位七十年年百五嵗而崩葬東郡頓邱廣陽里帝王世紀皇覽帝嚳冢在東郡濮陽頓邱城南臺隂野中髙辛氏之後曰摯嗣摯立者曰放勳是為帝堯史記嚳子摯代立摯立不善崩弟放勳立帝王世紀摯在位九年政微弱而唐侯德盛諸侯歸之摯服其義乃率羣臣造唐而致禪唐侯自知有天命乃受帝禪封摯於髙辛綱目前編摯荒淫無度諸侯廢之而推堯為天子書帝摯有疾弗豫傳帝摯弱足不良春秋命厯序帝嚳傳十世帝堯陶唐氏帝堯陶唐氏祁姓也大戴禮記帝嚳産放勳是為帝堯母慶都孕十四月而生堯於丹陵是曰放勳鳥庭荷勝眉有八采豐下鋭上或從母姓伊氏世紀世紀堯初生時其母在三阿之南寄于伊長孺之家故從母所居為姓宋書符瑞志慶都觀于三河常有龍隨之一旦龍負圖而至其文要曰赤受天祐眉八采鬢髮長七尺二寸面鋭上豐下足履翼宿既而生堯於丹陵其狀如圖帝堯碑赤龍負圖出慶都讀之云赤受天運其下圖人衣赤衣鬢鬚尺餘長七尺二寸兌下豐上足履翼星題曰赤帝起成天下寶淮南子堯眉八采九竅通洞而公正無私一言而萬民齊春秋元命苞堯眉八采是謂通眀厯象日月璇璣玉衡尚書大傳堯八眉八者如八字也年十五而佐帝摯受封于唐為諸侯身長十尺嘗夢天而上之故二十而登帝位都平陽帝王世紀其仁如天其知如神就之如日望之如雲富而不驕貴而不舒黃收純衣彤車乘白馬史記克明峻德以親九族九族既睦平章百姓百姓昭眀協和萬邦黎民於變時雍乃命羲和欽若昊天厯象日月星辰敬授人時帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙論衡堯候四時之中命羲和察四星以占時氣帝曰疇咨若時登庸放齊曰胤子朱啓明帝曰吁嚚訟可乎帝曰疇咨若豫采歡兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族嶽曰異哉試可乃已帝曰往欽哉九載績用弗成帝曰咨四嶽朕在位七十載汝能庸命巽朕位嶽曰否德忝帝位曰眀眀揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉尚書帝知丹朱之不肖不足授天下召舜曰女謀事至而言可績三年矣女登帝位舜讓于德不懌正月上日受終于文祖文祖者帝大祖也於是帝堯老命舜攝行天子之政以觀天命帝立七十年得舜二十年而老薦之于天帝辟位史記二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音尚書帝之治天下也猶埴之在埏唯陶之為金之在罏唯冶之鑄其民引之而來推之而往使之而成禁之而止管子立誹謗之木尸子崔豹古今注堯設誹謗之木今之華表木也狀若花形似桔槹大路交衢悉施焉或謂之表木以表王者納諫亦以表識衢路也置敢諫之鼓諸侯有苗氏處南蠻而不服帝征而克之于丹水之浦帝王世紀吕氏春秋堯戰于丹水之浦以服南蠻命質作樂名之曰大章以祭上帝吕氏春秋帝之治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導民也水處者漁山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤臯織網陵阪耕田得以所有易所無以所工易所拙若風之遇簫忽然感之各以清濁應矣説苑當堯之時舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗臯陶為大理益掌驅禽堯知九職之事使九子者各封其事皆勝其任以成九功堯遂成厥功以王天下韓詩外傳辟土殖榖者后稷也決江疏河者禹也聽獄執中者臯陶也然而有聖名者堯也列子堯治天下五十年不知天下治不乃微服遊於康衢聞童兒謡曰立我蒸民莫匪爾極不識不知順帝之則堯喜還宫召舜因禪以天下新書帝堯曰吾存心于先古加意于窮民痛萬姓之罹罪憂衆生之不遂也故一民或飢曰我飢之一民或寒曰我寒之一民有罪曰我陷之帝之有天下也茅茨不翦采椽不斫大路不畫越席不緣大羮不和粢食不毇巡狩行教勤勞天下舉天下而傳之舜若釋重負然淮南子帝以甲申嵗生甲辰即帝位甲午徵舜甲寅舜代行天子事辛巳崩年百十八在位九十八年葬于濟隂之城陽西北是為榖林帝王世紀墨子堯北教乎八狄道死葬鞏山之隂衣衾三領榖木之棺葛以緘之既􅵟而後哭滿陷無封已葬而牛馬乘之吕氏春秋堯葬于榖林通樹之皇覽堯冡在濟隂城陽山海經狄山帝堯葬于陽帝嚳葬于隂帝舜有虞氏帝舜有虞氏姚姓也目重瞳故名重華字都君有聖德帝王世紀宋書符瑞志母曰握登見大虹意感而生舜于姚墟目重瞳子故名重華龍顔大口黑身長六尺一寸真源賦舜字仲華白虎通舜重瞳子是謂元景上應攝提以象三光元命苞元景作滋涼淮南子舜二瞳子是謂重明作事成法出言成章春秋繁露舜形體大上而圓首長于天文純於孝慈荀子堯舜參牟子蔡沈書傳重華言其光重合于堯舜祖曰虞幕生窮蟬窮蟬生敬康敬康生句望句望生橋牛橋牛生瞽叟瞽叟生舜路史吕梁碑同而無句望一世史記窮蟬以下皆同而以窮蟬父曰帝顓頊帝顓頊父曰昌意以至舜七世自窮蟬以至帝舜皆微為庶人舜父瞽叟盲而舜母死瞽叟更娶妻而生象瞽叟愛後妻子舜順事父及後母與弟日以篤謹匪有懈史記舜鰥在側陋論衡父母使舜完廩捐階瞽叟焚廪使浚井出從而掩之孟子論衡瞽叟與象謀殺之使之完廪火燔其下令之浚井土掩其上舜得下廪不被火災穿井旁出不觸土害宋書符瑞志舜父母憎舜使其塗廩自下焚之舜服鳥工衣飛去又使浚井自上填之以石舜服龍工衣自旁而出通史瞽叟使舜滌廪舜告堯二女女曰時其焚汝鵲汝衣裳鳥工往舜得免去舜穿井又告二女女曰去汝衣裳龍工往入井瞽叟實井舜從他井出按孟子有琴朕弤朕二嫂使治朕栖之説然經曰克諧以孝蒸蒸乂不格姦又曰祗載見瞽叟夔夔齊栗瞽亦允若蓋瞽叟實底豫于舜未遇之先也今從論衡舜父頑母嚚弟象傲皆欲殺舜欲殺不可得即求嘗在側舜二十以孝聞帝王世紀舜能和諧大杖則避小杖則受越絶書舜親父假母母常欲殺舜舜去耕厯山三年大熟身自外養父母皆飢舜父頑母嚚兄狂弟傲舜求為變心易志瞽􅕓欲殺舜未嘗可得呼而使之未嘗不在側抱朴子有虞至孝三足烏集其庭真源賦舜糶于平陽中父認之乃舐其目目以光明劉向孝子傳舜父糴稻榖中有錢乃三日三夜仰天自告舜過前舐之目霍然開按劉向儒者不應誕謬若此舜冀州之人也舜耕厯山漁雷澤陶河濵作什器于壽邱就時于負夏舜耕厯山厯山之人皆讓畔漁雷澤雷澤上人皆讓居陶河濱河濱器皆不苦窳一年而所居成聚二年成邑三年成都尚書大傳舜耕于厯山夢眉與髮等尸子舜灰于常羊什器于夀邱就時于負夏未嘗暫息頓邱買貴于是販于頓邱傳虛賣賤于是債于傳虛以均救之又曰其田厯山也荷彼耒耜耕彼南畝俱有其利其漁雷澤也旱則為耕者鑿瀆儉則為獵者表虎墨子舜耕于厯山陶于河濱漁于雷澤灰于常陽堯得之服澤之陽立為天子公孫尼子舜牧牛于潢陽堯舉之以為天子魯連子舜耕于厯山而友益陶于河濱而友禹吕氏春秋舜耕于厯山陶于河濱釣于雷澤天下説之秀士從之帝王世紀舜始遷于負夏販于頓邱債于傳虛家本冀州每徙則百姓歸之淮南子舜耕于厯山期年而田者爭處墝埆以封壤肥饒相讓釣于河濱期年而漁者爭處湍瀨以曲隈深潭相豫舜年三十而帝堯問可用者四嶽咸薦舜曰可於是帝乃以二女妻舜以觀其內使九男與處以觀其外舜居媯汭內行彌謹帝二女不敢以貴驕事舜親戚帝九男皆益篤史記淮南子堯妻以二女以觀其內任以百官以觀其外乃屬以九子贈以昭華之玉吕氏春秋堯傳天下于舜禮之諸侯妻以二女臣以十子身請北面朝之尸子有虞氏身有南畝妻有桑田又曰舜一徙成邑再徙成都三徙成國堯聞其賢徵之草茅之中與之語禮樂而不逆與之語政至簡而行與之語道廣大而不窮于是妻之以媓媵之以娥九子事之而託天下焉帝乃命以位慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷論衡試之于職官治職修事無廢亂使入大麓之野虎狼不摶蝮蛇不噬逢烈風疾雨行不迷惑帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于德弗嗣正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望于山川遍于羣神輯五瑞五瑞五玉也公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧既月乃日覲四嶽羣牧班瑞于羣后嵗二月東巡守至于岱宗柴望秩于山川肆覲東后五玉三帛二生一死贄三帛諸侯世子執纁公之孤執元附庸之君執黃二生卿執羔大夫執雁一死士執雉協時月正日同律度量衡修五禮吉凶軍賓嘉也如五器卒乃復五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖藝祖疑即文祖或曰文祖藝祖之所自出用特五載一巡守羣后四朝敷奏以言眀試以功車服以庸文中子舜一嵗而巡四嶽兵衛少而徵求寡也肇十有二州封十有二山濬川象以典刑流宥五刑墨劓剕宫大辟也鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音尚書堯崩三年之喪畢舜避堯之子于南河之南天下諸侯朝覲者不之堯之子而之舜獄訟者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉孟子是為帝舜史記其社用土祀中霤葬成畝其樂咸池承雲九韶其服尚黃淮南子竹書紀年堯德衰為舜所囚又云舜復偃塞丹朱使不與父相見狂怪之語所不忍聞月正元日舜格于文祖孔安國傳舜服堯三年喪畢將即政復至文祖廟告詢于四嶽闢四門明四目達四聰咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇言有能奮起事功以廣帝堯之事者使居百揆以明亮庶事而順成庶類也載采並訓事疇類也僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉帝曰棄黎民阻飢汝后稷播時百榖帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬帝曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允服服其罪也所謂上服下服是也三就孔氏以為大罪于原野大夫于朝士于市蔡沈以為大辟于市宫辟蠶室餘刑亦就屏處五流五等象刑之當宥者也五宅三居者流雖有五而宅之但為三等之居孔氏以為大罪居于四裔次九州之外次千里之外帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧帝曰咨四嶽有能典朕三禮三禮祀天神享人鬼祭地祗僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和帝曰龍朕塈讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庶績咸熙分北三苗尚書帝之踐帝位載天子旗往朝父瞽叟夔夔唯謹如子道封弟象為諸侯史記帝以堯之二十一年甲子生五十一年甲午徵用七十九年壬午即真百嵗癸卯南征崩于鳴條以瓦棺葬于蒼梧九疑山之陽是為零陵謂之紀市帝王世紀皇覽舜冢在零陵營浦縣其山九溪皆相似故曰九疑論衡舜葬蒼梧象為之耕山海經蒼梧之山帝舜葬于陽帝丹朱葬于隂又曰赤水之中有蒼梧之野舜與叔均之所葬也墨子舜西教乎七戎道死葬南已之市衣衾三領榖木之棺葛以緘之已葬而市人乘之吕氏春秋舜葬于紀市不變其肆述異記會稽山有虞舜巡狩臺臺下有望陵祠帝舜南巡葬于九疑民思之立祠曰望陵有虞氏之王也燒曽藪斬羣害以為民利封土為社置木為閭民始知禮也當是時民無愠惡不服而天下化之管子新書帝舜曰吾盡吾敬以事吾上故見謂忠焉吾盡吾敬以接吾敵故見謂信焉吾盡吾敬以使吾下故見謂愛焉是以見愛親于天下之民而見貴信于天下之君故吾取之以敬也吾得之以敬也古史考舜作瓦棺土塈淮南子舜作室築墻茨屋辟地樹榖令民皆知去巖穴各有家室韓詩外傳舜甑盆無膻而下不以餘獲罪飯乎土簋啜乎土型而農不以力獲罪麑衣而盩領而女不以巧獲罪法下易由事寡易為功而民不以政獲罪吕氏春秋舜之耕漁其賢不肖與為天子同其未遇時也以其徒屬掘地財取水利編蒲葦結罘網手足胼胝不居然後免于凍餒之患其遇時也登為天子賢士歸之萬民譽之丈夫女子振振殷殷無不戴説舜自為詩曰普天之下莫非王土率土之濱莫非王臣尸子舜之陶也不能利其巷南面而治天下則蠻夷蒙福又曰舜南面而治天下天下太平調于玉燭息于永風食于膏火飲于醴泉舜之行其猶河海乎千仭之溪亦滿焉螻蟻之穴亦滿焉帝子商均亦不肖帝乃豫薦禹于天十七年而崩三年喪畢禹亦讓舜子如舜讓堯子諸侯歸之然後禹踐天子位史記贊曰自少皥至髙辛代有統系顧典䇿闕焉學者遂難言之史遷則遺金天氏不録以遷就五帝之説又以顓頊傳帝嚳帝嚳傳摯遂及堯傳不以賢又不以子蓋祖世本雜説遂引紛紜之緒遷之疏也少皥有聖德其裔孫食郯與祝焦薊陳並垂祀焉庸可略乎尚史卷二
