body:
  text: 尚史卷七十七列傳五十五鑲白旗漢軍李鍇撰說客傳蘇秦蘇代附蘇厲蘇秦者東周雒腸人也索隱秦字季子蓋蘇忿生之後已姓國䇿作雒陽軒里人東事師于齊而習之于鬼谷先生出游數嵗說周顯王顯王左右素習知蘇秦皆少之弗信史記乃之趙說李兌曰雒陽乘軒車蘇某家貧親老無罷車駑馬桑輪蓬篋贏幐負書擔囊觸塵埃䝉霜露越河漳足重繭日百而舍造外闕願見于前口道天下之事李兌曰先生以鬼之言見我則可若以人事兌盡知之矣蘇秦對曰臣固以鬼之言見君非以人之言也李兌見之蘇秦曰今日臣之來也暮後郭門藉席無所得寄宿人田中傍有大叢夜半土梗與木梗鬪曰汝不如我我者乃土也使我逢疾風淋雨壞沮乃復歸土今汝非木之根則木之枝耳汝逢疾風淋雨漂入漳河東流至海汜濫無所止臣竊以為土梗勝也今君殺主父而族之君之立于天下危于纍卵君聽臣計則生不聽臣計則死李兌曰先生就舍明日復來見兌也蘇秦出李兌舍人謂兌曰臣竊觀君與蘇公談也其辨過君其博過君君能聽蘇公之計乎李兌曰不能舍人曰君即不能願君堅塞兩耳無聽其談也明日復見終日談而去舍人出送蘇秦秦謂舍人曰昨日我談粗而君動今日精而君不動何也舍人曰先生之計大而規髙吾君不能用也乃我請君堅塞兩耳無聽談者雖然先生明日復來吾請資先生厚用明日來抵掌而談李兌送蘇秦明月之珠和氏之璧黑貂之裘黃金百鎰蘇秦得以為用西入于秦秦孝公卒蘇秦始將連橫說秦惠王曰大王之國西有巴蜀漢中之利北有狐貉駿馬之用南有巫山黔中之限東有殽函之固田肥美民殷富戰車萬乘奮擊百萬沃野千里蓄積饒多地勢形便此所謂天府天下之雄國也以大王之賢士民之衆車騎之用兵法之教可以并諸侯吞天下稱帝而治願大王少留意臣請奏其效秦王曰寡人聞之毛羽不豐滿者不可以髙飛文章不成者不可以誅伐道德不厚者不可以使民政教不順者不可以煩大臣今先生儼然不逺千里而庭教之願以異日蘇秦曰臣固疑大王之不能用也昔者神農伐補遂黃帝伐涿鹿而禽蚩尤堯伐歡兜舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂齊桓任戰而霸天下由此觀之惡有不戰者乎夫徒處而致利安坐而廣地雖古五帝三王五霸明主賢君常欲坐而致之其勢不能故以戰續之寬則兩軍相攻迫則杖㦸相撞然後可建大功是故兵勝于外義强于內威立于上民服于下今欲并天下凌萬衆詘敵國制海內子元元臣諸侯非兵不可今之嗣主忽于至道皆惛于教亂于治迷于言惑于語沈于辨溺于辭以此論之王固不能行也說秦王書十上而說不行黑貂之裘敝黃金百斤盡資用乏絶去秦而歸贏縢履蹻負書擔囊形容枯槁面目黧黑狀有愧色歸至家妻不下絍嫂不為炊父母不與言蘇秦喟然歎曰妻不以我為夫嫂不以我為叔父母不以我為子是皆秦之罪也乃夜發書陳篋數十得太公陰符之謀伏而誦之簡練以為揣摩讀書欲睡引錐自刺其股血流至足曰安有說人主不能出其金玉錦繡取卿相之尊者乎朞年揣摩成曰此真可以說當世之君矣按史記以說秦之前大困而歸兄弟嫂妹妻妾竊皆笑之秦慙乃閉室誦周書陰符朞年以出揣摩與䇿異蓋史誤也乃東之趙奉陽君趙肅侯弟公子成甚不取于蘇秦蘇秦入燕李兌為蘇秦謂奉陽君曰齊燕離則趙重齊燕合則趙輕今君之齊謂以燕合齊非趙之利也奉陽君曰何吾合燕于齊曰夫制燕者蘇子也而燕弱國也東不如齊西不如趙豈能東無齊西無趙哉而君甚不善蘇秦蘇秦能抱弱燕而孤干天下哉是驅燕而使合于齊也奉陽君曰善乃使使與蘇秦結交奉陽君死蘇秦始合從說趙王曰天下之卿相人臣乃至布衣之士莫不髙賢大王之行義皆願奉教陳忠于前之日久矣雖然奉陽君妒大王不得任事是以外賓客游士無敢盡忠于前者今奉陽君捐館舍大王乃今得與士民相親臣故敢進其愚忠為大王計莫如安民無事請無庸有為也安民之本在于擇交擇交而得則民安擇交不得則民不得安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭斷絶人之交願大王慎無出于口也請别白黑國策作請屏左右今從史言所以異陰陽而已矣大王誠能聽臣燕必致氊裘狗馬之地齊必致海隅魚鹽之地楚必致橘柚雲夢之地韓魏皆可使致封地湯沐之邑貴戚父兄皆可以受封侯夫割地效實五霸之所覆軍禽將而求也封侯貴戚湯武之所以放殺而爭也今大王垂拱而兩有之是臣之所以為大王願也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則效宜陽宜陽效則上郡絶河外割則道不通楚弱則無援此三䇿者不可不熟計也夫秦下軹道則南陽動劫韓包周則趙自銷鑠據衛取淇則齊必入朝秦欲已得行于山東則必舉甲而向趙秦甲涉河踰漳據番吾則兵必戰于邯鄲之下矣此臣之所以為大王患也當今之時山東之建國莫如趙强趙地方二千里帶甲數十萬車千乘騎萬匹粟支十年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也且秦之所畏害于天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍稍蠶食之𫝊之國都而止矣韓魏不能支秦必入臣于秦秦無韓魏之隔禍必中于趙矣此臣之所以為大王患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之地以王諸侯湯武之卒不過三千人車不過三百乘而為天子誠得其道也是故明主外料其敵國之强弱內度其士卒之賢不肖不待兩軍相當而勝敗存亡之機固己見于胸中矣豈掩于衆人之言而以冥冥決事哉臣竊以天下地圖案之諸侯之地五倍于秦料諸侯之卒十倍于秦六國并力為一西面而攻秦秦破必矣今西面而事之見臣于秦夫破人之與破于人也臣人之與臣于人也豈可同日而言之哉夫橫人者皆欲割諸侯之地以與秦成與秦成則髙臺榭美宫室聽竽笙琴瑟之音察五味之和前有軒轅後有長庭美人巧笑卒有秦患而不與其憂是故橫人日夜務以秦權恐喝諸侯以求割地願大王之熟計之也臣聞明王決疑去讒屏流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠于前矣故竊為大王計莫如一韓魏齊楚燕趙六國從親以儐畔秦令天下之將相相與會于洹水之上通質刑白馬以盟之約曰秦攻楚齊魏各出鋭師以佐之韓絶食道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師以佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞午道趙涉河漳博關燕出鋭師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海韓魏出鋭師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉渤海燕出鋭師以佐之諸侯有先背約者五國共伐之六國從親以儐秦秦必不敢出兵于函谷關以害山東如是則霸業成矣趙王曰寡人年少蒞國之日淺未嘗得聞社稷之長計今上客有意存天下安諸侯寡人敬以國從乃封蘇秦為武安君飾車百乘黃金千鎰白璧百雙錦繡千純以約諸侯國䇿按史記封蘇秦武安君在說六國後是時周天子致文武之胙于秦惠王惠王使犀首攻魏禽將龍賈取魏之雕陰且欲東兵蘇秦恐兵之至趙也乃激怒張儀入之于秦史記于是乃說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沱易水地方二千餘里帶甲數十萬車七百乘騎六千匹粟支十年南有碣石鴈門之饒北有棗栗之利民雖不佃作棗栗之實足食于民矣此所謂天府也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎以趙之蔽其南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯難也且秦之攻燕踰雲中九原過代上谷彌地踵道數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之衆軍于東垣矣渡呼沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰于千里之外趙之攻燕也戰于百里之內夫不憂百里之患而重千里之外計無過于此者是故願大王與趙從親天下為一則國必無患矣文侯曰寡人國小西迫彊秦促近齊趙君幸教詔之合從以安燕國敬以國從于是齎蘇秦車馬金帛以至趙說韓昭侯史記作宣惠王誤曰韓北有鞏洛成臯之固西有宜陽常阪之塞東有宛穰洧水南有陘山地方千里帶甲數十萬天下之强弓徑弩皆自韓出溪子少府溪子國名地名又溪子陽匠名少府所造時力距來時力作之得時距來徑足以距來敵皆射六百步之外韓卒超足而射百發不暇止逺者達胸近者掩心韓之劍㦸皆出于冥山棠溪墨陽合伯鄧師宛馮淮南子墨陽之莫邪合伯史記作合賻地缺鄧師鄧國有工鑄劍宛馮宛人于馮池鑄劍龍淵太阿皆陸斷馬牛水擊鵠雁當敵即斬堅甲盾鞮鍪盾櫓鞮革履鍪兜鍪鐡幕臂脛之衣或曰疑是障面革抉以革為射決㕹芮㕹同瞂謂楯也芮如字謂繫楯之紛綬也無不畢具以韓卒之勇被堅甲跖徑弩帶利劍一人當百不足言也夫以韓之徑與大王之賢乃欲西面事秦稱東藩築帝宫受冠帶祠春秋交臂而服焉夫羞社稷而為天下笑無過此者矣是故願大王之熟計之也大王事秦秦必求宜陽成臯今兹效之明年又益求割地與之即無地以給之不與則棄前功而後更受其禍且夫大王之地有盡而秦之求無已以有盡之地而逆無已之求此所謂市怨而買禍者也不戰而地已削矣臣聞鄙語曰寧為雞口無為牛後今大王西面交臂而臣事秦何以異于牛後乎夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之韓王忿然作色攘臂按劍仰天太息曰寡人雖死必不能事秦今主君以趙王之教詔之敬奉社稷以從又說魏襄王曰大王之地南有鴻溝陳汝南許鄢昆陽邵陵舞陽新郪東有淮潁沂黃煮棗無疏西有長城之界北有河外卷衍酸棗地方千里名雖小然而廬田廡舍曽無所芻牧牛馬之地人民之衆車馬之多日夜行不休已無以異于三軍之衆臣竊料之大王之國不下于楚然橫人訹王外交强虎狼之秦以侵天下卒有國患不被其禍夫挾强秦之勢以內劫其主罪無過此者且魏天下之强國也王天下之賢王也今乃有意西面而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王愧之臣聞越王句踐以散卒三千禽夫差于干遂武王卒三千人革車三百乘斬紂于牧之野豈其士卒衆哉誠能振其威也今竊聞大王之卒武力二十餘萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乘騎五千匹此其過越王句踐武王逺矣今乃劫于羣臣之說而欲臣事秦夫事秦必割地效質故兵未用而國已虧矣凡羣臣之言事秦者皆奸臣非忠臣也夫為人臣割其主之地以外交偷取一旦之功而不顧其後破公家而成私門外挾强秦之勢以內劫其主以求割地願大王之熟察之也周書曰綿綿不絶蔓蔓若何毫毛不拔將成斧柯前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力則必無强秦之患故敝邑趙王使使臣獻愚計奉明約在大王詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國從因東說齊宣王曰齊南有泰山東有琅邪西有清河北有渤海此所謂四塞之國也齊地方二千里帶甲數十萬粟如邱山齊車之良五家之兵疾如錐矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉渤海也臨淄之中七萬戶臣竊度之下戶三男子三七二十一萬不待發于逺縣而臨淄之卒固已二十一萬矣臨淄甚富而實其民無不吹竽鼓瑟擊筑彈琴鬬雞走犬六博踏鞠者臨淄之途車轂擊人肩摩連袵成幃舉袂成幕揮汗成雨家敦而富志髙而揚夫以大王之賢與齊之强天下不能當今乃西面事秦竊為大王羞之且夫韓魏所以畏秦者以與秦接界也兵出而相當不至十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦攻齊則不然倍韓魏之地至衛陽晉之道徑亢父之險車不得方軌馬不得並行百人守險千人不能過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虛喝髙躍而不敢進則秦不能害齊亦明矣夫不料秦之不奈我何也而欲西面事秦是羣臣之計過今臣無事秦之名而有强國之實臣故願大王之少留計齊王曰寡人不敏今主君以趙王之詔教之敬奉社稷以從蘇秦乃南之楚三日乃得見威王談卒辭而行王曰寡人聞先生若聞古人今先生乃不逺千里而臨寡人曽不肯留願聞其說對曰楚國之食貴于玉薪貴于桂謁者難得見如鬼王難得見如天地今令臣食玉炊桂因鬼見帝王曰先生就舍寡人聞命矣蘇秦乃說威王曰楚天下之强國也大王天下之賢王也楚地西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也夫以楚之强大王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝于章臺之下矣秦之所害于天下莫如楚楚强則秦弱楚弱則秦强此其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武關一軍下黔中若此則鄢郢動矣臣聞之治之其未亂為之其未有也患至而後憂之則無及矣故願大王之早計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明志委社稷宗廟練士厲兵在大王之所用之大王誠能用臣之愚計則韓魏齊燕趙衛之妙音美人必充後宫燕代良馬橐它必實外廏故從合則楚王橫成則秦帝今釋霸王之業而有事人之名竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讐也橫人皆欲割諸侯之地以事秦此所謂養仇而奉讐者也夫為人臣而割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾强秦之威以內劫其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚橫合則楚割地以事秦此兩䇿者相去逺矣兩者大王何居焉敝邑趙王使臣效愚計奉明約在大王命之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫于秦患不可與深謀與深謀恐反人以入于秦故謀未發而國已危矣寡人自料以楚當秦未見勝焉內與羣臣謀不足恃也寡人卧不安席食不甘味心搖搖如懸旌而無所終薄今君欲一天下安諸侯存危國寡人敬奉社稷以從于是六國合從而并力焉國䇿又曰蘇子謂楚王曰仁人之于民也愛之以心事之以善言孝子之于親也愛之以心事之以財忠臣之于君也必進賢人以輔之今大王之大臣父兄好傷賢以為資厚賦斂諸臣百姓使王見疾于民非忠臣也大臣播王之過于百姓多賂諸侯以王之地退王之所愛亦非忠臣也是以國危臣願無聽羣臣之相惡也人臣莫難于無妒而進賢為主死易垂沙之事死者以千數為主辱易自令尹以下事王者以千數至于無妬而進賢未見一人也故明主之察其臣也必知其無妒而進賢賢臣之事其主也亦必無妒而進賢夫進賢之難者賢者用且使已廢貴且使已賤故人難之垂沙事未詳淮南子楚兵殆于垂沙蓋史佚其事也蘇秦之將說楚也東過洛陽父母聞之清宫除道張樂設飲郊迎三十里妻側目而視傾耳而聽嫂蛇行匍伏四拜自跪而謝蘇秦曰嫂何前倨而後卑也嫂曰以季子位尊而多金蘇秦曰嗟乎貧窮則父母不子富貴則親戚畏懼人生世上勢位富厚蓋可以忽乎哉國䇿史記蘇秦為從約長并相六國北報趙王乃行過洛陽車騎輜重諸侯各發使送之甚衆擬于王者周顯王聞之恐懼除道使人郊勞史記蘇秦喟然歎曰使我有雒陽田二頃吾豈能佩六國相印乎于是散千金以賜宗族朋友初蘇秦之燕貸百錢為資及得富貴以百金償之遍報諸所嘗見德者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子與我至燕再三欲去我易水之上方是時我困故望子深是以後子子今亦得矣蘇秦既約六國從親歸趙趙乃投從約書于秦此下史記云秦兵不敢闒函谷關十五年非是從親裁三年耳其後秦使犀首欺齊魏與共伐趙欲敗從約齊魏伐趙趙王讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解國䇿秦惠王謂寒泉子曰蘇秦欺寡人欲以一人之智反覆山東之君從以欺秦固負其衆故先使蘇秦約諸侯諸侯不可一猶連雞之不能俱止于棲亦明矣寡人忿然含怒曰久吾欲使武安子起往喻意焉寒泉子曰不可夫攻城墮邑請使武安子善我國家使諸侯請使客卿張儀秦惠王曰敬受命按起以昭二十九年為武安君自合從至是五十七年謂起誤國䇿蘇秦為趙王使于秦反三日不得見謂趙王曰秦乃者過柱山有兩木焉一蓋呼侣一蓋笑問其故對曰吾已大矣年已長矣吾苦夫匠人且以繩墨案規矩刻鏤我一蓋曰此非吾所苦也是故吾事也吾所苦夫鐡銛然自入而出夫人者今臣使于秦而三日不見無有為臣為鐵銛者乎秦惠王以其女為燕太子婦是嵗文侯卒太子立是為燕易王易王初立齊宣王因燕喪伐燕取十城易王謂蘇秦曰往日先生至燕而先王資先生見趙遂約六國從今齊先伐趙次至燕以先生之故為天下笑先生能為燕得侵地乎蘇秦大慙曰請為王取之史記蘇秦見齊王再拜而賀仰而弔齊王曰是何慶弔相隨之速也對曰人之饑而不食烏喙者以為雖愈充腹而與死同患也今燕雖弱小秦之少壻也王利其十城而深與彊秦為仇今使弱燕為鴈行而彊秦制其後以招天下之精兵是食烏喙之類也齊王曰然則奈何對曰聖人之制事也轉禍為福因敗為功王能聽臣莫如歸燕之十城秦知王以已之故歸燕城秦必德王燕無故而得十城亦必德王此所謂棄仇讐而立厚交也夫燕秦俱事齊則大王號令天下皆從是王以虛辭附秦以十城取天下此霸王之業也齊王大說乃歸燕十城人有惡蘇秦于燕王者曰武安君天下不信人也王尊之示天下與小人羣也蘇秦從齊來而燕王不館也蘇秦謂燕王曰臣東周之鄙人也身無咫尺之功而足下迎臣于郊顯臣于廷今臣為足下使利得十城功存危燕今足下不聽臣者人必有言臣不信傷臣于王者且臣之不信足下之福也使臣信如尾生孝如曽參亷如伯夷以事足下可乎王曰可曰孝如曽孫義不離親一宿于外足下安能使之齊亷如伯夷汙武王之義而不臣辭孤竹之君餓死首陽之山亷如此者何肯步行千里而事弱燕之危主乎信如尾生與女子期而不來抱柱而死信至如此何肯揚燕秦之威于齊而取大功乎哉且夫信行者所以自為也非所以為人也且臣有老母于周離老母而事足下去自覆之術而謀進取之道臣之趣固不與足下合者足下自覆之君也僕進取之臣也所謂以忠信得罪于君者也王曰夫忠信何罪之有對曰臣鄰有逺為吏者其妻私人其夫且歸其私者憂之妻曰勿憂吾已為藥酒待之矣後二日夫至妻使妾奉巵酒進之妾知其為藥酒也進之則殺主父言之則逐主母乃陽僵棄酒主父大怒而笞之妾之棄酒上以活主父下以存主母然不免于笞此以忠信得罪者也臣之事足下亢義益國今乃得罪臣恐天下後事足下者莫敢自必也且臣之說齊曽不欺之也使說齊者莫如臣之言也國䇿王曰善厚待之易王母文侯夫人也與蘇秦私通燕王知之而事之加厚蘇秦恐誅乃說燕王曰臣居燕不能使燕重而在齊則燕必重燕王曰唯先生之所為于是蘇秦佯為得罪于燕而亡走齊齊宣王以為客卿齊宣王卒湣王即位說湣王厚葬以明孝髙宫室大苑囿以明得意欲破敝齊而為燕燕易王卒燕噲立為王其後齊大夫多與蘇秦爭寵者而使人刺蘇秦不死殊而走齊王使人求賊不得蘇秦且死乃謂齊王曰臣即死車裂臣以徇于市曰蘇秦為燕作亂于齊如此則臣之賊必得矣于是如其言而殺蘇秦者果自出齊王因而誅之燕聞之曰甚矣齊之為蘇生報仇也蘇秦既死其事大泄齊後聞之乃恨怒燕燕甚恐蘇秦之弟曰代代弟厲譙周云秦兄弟五人秦最少兄代代弟厲及辟鵠並為游說之士典略同見兄遂亦皆學史記尚史卷七十七
