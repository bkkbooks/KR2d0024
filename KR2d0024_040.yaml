body:
  text: 尚史卷四十列傳十八鑲白旗漢軍李鍇撰晉諸臣傳士蒍士㑹范武子士燮文子士魴彘恭子士裘附士丐范宣子士鞅范獻子士吉射范昭子士蒍者字子輿劉纍之後杜伯之孫隰叔之子也周殺杜伯隰叔違周難于晉遂居晉生蒍蒍初為晉理國語世本范氏晉大夫隰叔生士蒍蒍生成伯缺缺生武子㑹㑹生文叔燮燮生宣叔丐丐生獻子鞅鞅生吉射獻公時桓莊之族逼公患之蒍曰去富子則羣公子可謀也已公曰爾試其事蒍與羣公子謀譖富子而去之獻公七年莊二十四年蒍又與羣公子謀使殺遊氏之二子蒍告公曰可矣不過二年君必無患八年莊二十五年蒍使羣公子盡殺遊氏之族乃城聚而處之冬公圍聚盡殺羣公子明年以蒍為大司空蒍城絳以深其宫十年莊二十七年公將伐虢蒍曰不可虢公驕若驟得勝于我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將饑左傳十六年閔元年公作二軍公將上軍大子將下軍以伐霍師未出蒍言于諸大夫曰夫大子君之二也恭以俟嗣何官之有今君分之土而官之是左之也吾將諌以觀之乃言于公曰夫大子君之二也而帥下軍無乃不可乎公曰下軍上軍之二也寡人在上申生在下不亦可乎蒍對曰下不可以二上公曰何故對曰二若體焉上下左右以相心目用而不倦身之利也上二代舉下二代履周旋變動以役心目故能治事以制百物若下攝上與上攝下周旋不變以違心目其反為物用也何事能治故古之為軍也軍有左右闕從補之成而不知是以寡敗若以下二上闕而不變敗弗能補也變非聲章不能移也聲章過數則有釁有釁則敵入敵入而凶救敗不暇誰能退敵敵之如志國之憂也可以陵小難以征大君其圖之公曰寡人有子而制焉非子之憂也對曰夫大子國之棟也棟成乃制之不亦危乎公曰輕其所任雖危何害蒍出語人曰大子不得立矣改其制而不患其難輕其任而不憂其危君有異心又焉得立行之克也將以害之若其不克其因以罪之雖克與不無所避罪與其勤而不入不如逃之君得其欲大子逺死且有令名為吳大伯不亦可乎國語大子不聽卒被讒以死重耳奔蒲夷吾奔屈初公使蒍為二公子築蒲與屈不慎置薪焉夷吾訴之公使讓之蒍稽首而對曰臣聞之無喪而戚憂必讎焉無戎而城讎必保焉冦讎之保又何慎焉守官廢命不敬固讎之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘䝉茸一國三公吾誰適從及驪姬之難公使寺人披伐蒲賈華伐屈左傳蒍卒子縠見亂臣傳士㑹字季初封隨謂之隨武子後又受范遂氏范士蒍之孫也文公時㑹代舟之僑攝戎右說苑文公登隧大夫皆扶隨㑹不扶事與趙簡子虎㑹同見虎㑹傳襄公七年文六年公薨大子夷罪少趙盾使先蔑及㑹如秦逆公子雍將立之明年秦送公子雍趙盾背先蔑而立夷罪是為靈公遂敗秦師于令狐先蔑奔秦㑹從之靈公六年文十二年秦為令狐之役伐我取羈馬我禦秦師㬰駢請深壘固軍以待之秦伯謂㑹曰若何而戰對曰趙氏新出其屬曰㬰駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡㬰駢之佐上軍也若使輕者肆焉其可乃掩我上軍趙穿果出追之及戰㬰駢請薄秦師穿沮之秦師夜遁七年文十三年六卿患秦之用㑹也使魏夀餘僞以魏叛者以誘㑹執夀餘帑于晉使夜逸請自歸于秦請以私邑自歸降于秦秦伯許之履㑹之足于朝秦伯師于河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使㑹㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益于君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行既濟魏人譟而還秦人歸其帑其處者為劉氏㑹在秦三年不見先蔑其人曰能亡人于國不能見于此焉用之㑹曰吾與之同罪非義之也將何見焉及歸遂不見十四年宣二年公不君趙盾將諫㑹曰諫而不入則莫之繼也㑹請先不入則子繼之三進及霤而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕唯仲山甫補之能補過也君能補過衮不廢矣猶不改秋九月趙盾弒靈公逆公子黑􅀢而立之是為成公成公元年宣三年我伐鄭鄭及我平㑹入盟成公薨景公即位景公元年宣十年楚伐鄭㑹救鄭逐楚師于潁北三年宣十二年楚伐鄭鄭及楚平夏六月我師救鄭荀林父將中軍趙朔將下軍㑹將上軍及河聞鄭既及楚平林父欲還㑹曰善㑹聞用師觀釁而動德刑政事典禮不易不可敵也不為是征楚軍討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸楚武王更此陳法遂以為名而舉啇農工賈不敗其業而卒乘輯睦事不奸矣蒍敖為宰擇楚國之令典軍行右轅左追蓐左右者挾轅為戰備在左者追求草蓐為宿備前茅慮無軍行前有斥候踏伏持絳白幡見騎舉絳幡見步舉白幡茅明也或曰時楚以茅為旌識中權後徑百官象物而動軍政不戒而備能用典矣其君之舉也內姓選于親外姓選于舊舉不失德賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以服烈所可也中軍佐先縠不可以中軍佐濟師遂濟楚乘我師我師敗于邲㑹使鞏朔韓穿帥七覆于敖前故上軍不敗楚使游闕游車補闕者四十乘從唐侯以為左拒以從上軍郤克曰待諸乎㑹曰楚師方壯若萃于我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗七年宣十六年㑹帥師滅赤狄甲氏及留吁赤狄别種鐸辰三月獻狄俘于王以黻冕命㑹將中軍且為太傅于是晉國之盜逃奔于秦周王孫蘇與召戴公毛伯衛爭政王室亂是年冬公使㑹平王室定王享之原襄公相禮殽蒸蒸升也升殽于俎也㑹私問其故王聞之召㑹曰季氏而弗聞乎王享有體薦享則半解其體而薦之宴有折俎宴則體解節折升之于俎公當享卿當晏王室之禮也㑹歸而講求典禮以修晉國之法八年宣十七年公使郤克徴㑹于齊齊頃公母笑郤克克怒夏㑹于斷道執齊使㑹召子燮曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以己亂也弗已者必益之郤子其或者欲己亂于齊乎不然余懼其益之也余將老死郤子逞其志庶有豸乎豸解也爾從二三子唯敬乃請老郤克為政左傳㑹卒諡曰武子子二燮魴燮嘗莫退于朝㑹曰何莫也對曰有秦客廋辭于朝大夫莫之能對也吾知三焉㑹怒曰大夫非不能也讓父兄也爾童子何知而三掩人于朝吾不在晉國亡無日矣擊之以杖折委筓委冠笄簪也國語士燮士㑹之子范文子也初事景公景公十一年成二年為上軍佐及郤克伐齊敗齊師于鞍師歸燮後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣十三年成四年鄭伐許燮及欒書救許伐鄭取汜祭十七年成八年燮聘于魯言伐郯以其事吳故魯成公賂之請緩師燮不可曰君命無二失信不立禮無加賀事無二成君後諸侯是寡君不得事君也燮將復之魯懼乃㑹伐郯鞍之役晉使齊歸魯汶陽之田既復請歸之于齊故諸侯二于晉晉人懼十八年成九年㑹于蒲以尋馬陵之盟馬陵盟在成七年魯季孫行父謂燮曰德則不競尋盟何為燮曰勤以撫之寬以待之堅彊以御之神明以要之柔服以伐二德之次也公觀于軍府見鍾儀曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也不知其他公語燮燮曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱大子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之厲公元年成十一年秦晉為成將㑹于令狐公先至秦伯不肯涉河次于王城使史顆盟公于河東郤犫盟秦伯于河西燮曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦果歸而背晉成二年成十二年宋華元合晉楚之成夏五月燮㑹楚公子罷許偃並楚大夫盟于宋西門之外晉楚既成好郤至如楚聘且涖盟楚子享之為地室而縣焉為樂室于地之下而縣鐘鼓金奏作于下郤至驚而走出曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂郤至歸以語燮燮曰無禮必食言吾死無日矣夫三年成十三年燮將上軍及欒書韓厥伐秦敗秦師于麻隧六年成十六年鄭叛晉公將伐鄭燮曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒書不可書將中軍燮佐之及郤錡韓厥荀偃郤至伐鄭四月我師起鄭告于楚楚子救鄭五月我師濟河聞楚師將至燮欲反曰我僞逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣欒書不可六月晉楚遇于鄢陵燮不欲戰郤至曰韓之戰箕之役邲之師皆晉之恥也子亦見先君之事矣今我辟楚又益恥也燮曰先君之亟戰也有故秦狄齊楚皆彊不盡力子孫將弱今三彊服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎國語厲公將伐鄭范文子不欲曰若以吾意諸侯皆畔則晉可為也唯有諸侯故擾擾焉凡諸侯難之本也得鄭憂滋長安用鄭郤至曰然則王者多憂乎文子曰我王者也乎哉夫王者成其德而逺人以其方賂歸之故無憂今我寡德而求王者之功故多憂子見無土而欲富者樂乎哉國語吾聞人臣者能內睦而後圖外不睦內而圖外必有內爭盍姑謀睦乎考訊其阜以出則怨靖國語鄢陵之役大夫欲戰范文子不欲曰吾聞君人者刑其民成而後振武于外是以內和而外威今吾司冦之刀鋸日弊而斧鉞不行內猶有不刑而况外乎夫戰刑也刑之過也過由大而怨由細故以惠誅怨以忍去過細無怨而大不過而後可以武刑外之不服者今吾刑外乎大人而忍于小民將誰行武武不行而勝幸也幸以為政必有內憂唯聖人能無外患又無內憂距非聖人必偏而後可偏而在外猶可救也疾自中起是難盍姑釋荆與鄭以為外患乎國語欒武子欲戰范文子不欲曰吾聞之唯厚德者能受多福無德而服者衆必自傷也今我戰又勝荆與鄭吾君將伐知而多力怠教而重斂大其私䁥而益婦人田不奪諸大夫田則焉取以益此諸臣之委室而徒退者將與幾人戰若勝亂地之秩者也其産將害大盍姑無戰乎欒武子曰昔韓之役惠公不復舍邲之役三軍不振旅箕之役先軫不復命晉固有大恥三今我任政不損晉恥又違蠻夷以重之雖有後患非吾所知也范文子曰擇福莫若重擇禍莫若輕福無所用輕禍無所用重晉固有大耻與其君臣不相聽以為諸侯笑也盍姑以違蠻夷為耻乎欒武子不聽甲午晦楚晨壓我軍而陳軍吏患之士丐士燮子趨進曰塞井夷竈陳于中軍而疏行首晉楚唯天所授何患焉燮執戈逐之曰國之存亡天也童子何知焉及戰射楚子中目楚師宵遁晉入楚軍三日榖燮立于戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有德之謂國語范文子立于戎馬之前曰吾聞之天道無親唯德是授吾庸知天之不授晉且以勸荆乎君與二三臣其戒之夫德福之基也無德而福隆猶無基而厚墉也其壞也無日矣秋九月郤犫受魯叔孫僑如之譖執季孫行父于苕邱魯使公孫嬰齊請行父郤犫為之請邑嬰齊辭燮謂欒書曰季孫于魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦行父七年成十七年燮反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及于難范氏之福也六月燮卒左傳冬難作欒書等遂弒公燮諡曰文子子丐士魴公羊作士彭字季食邑于彘是曰彘季又曰彘恭子亦㑹之子也厲公八年成十八年欒書中行偃弒厲公使荀罃及魴逆周子于京師而立之是為悼公公使魴為卿佐下軍左傳作國語將新軍曰武子之季文子之母弟也武子宣法以定晉國至于今是用文子勤身以定諸侯至于今是賴故以彘季屛其宗國語冬十一月楚伐宋公救宋使魴如魯乞師悼公五年襄五年王使王叔陳生訴戎于我我執之使魴如京師言王叔之二于戎九年襄九年魴從公伐鄭鄭從楚故門其三門鄭人恐乃行成十一月同盟于戲十二月復伐鄭門其三門次于隂口鄭地而還十年襄十年秋九月諸侯伐鄭冬城虎牢而戍之我師城梧及制梧制皆鄭舊地魴及魏絳戍之十一年襄十一年我及諸侯復伐鄭十二月秦庶長鮑庶長武伐我以救鄭魴御之少秦師而弗設備鮑武交伐我師我師敗于櫟十二年襄十二年使魴如魯聘且拜師謝伐鄭十三年襄十三年魴卒左傳諡曰恭子子裘幼未可立為卿故悼公舍新軍士丐者燮之子范宣子也初為公族大夫厲公七年成十七年欒書中行偃執厲公召丐丐辭不往明年遂弒公而立悼公二月魯成公來朝夏六月使丐如魯聘且拜朝悼公三年襄二年晉為鄭服故且欲修吳好將合諸侯使丐告于齊曰寡君使丐以嵗之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協乃盟于耐外五年襄五年楚使公子貞即子襄為令尹丐曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近于楚民朝夕急能無往乎有陳非吾事也無之而後可冬公子貞果伐陳八年襄八年魯襄公來朝冬使丐如魯聘且拜襄公之辱告將用師于鄭襄公享之丐賦摽有梅季孫宿曰誰敢哉言誰敢不從命今譬于草木寡君在君君之臭味也歡以承命何時之有宿賦角弓賔將出宿賦彤弓丐曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮九年襄九年知罃將中軍丐佐之從公及諸侯伐鄭門其三門鄭恐乃行成盟于戲而還十年襄十年丐及荀偃伐逼陽妘姓國滅之以逼陽子歸周王叔陳生與伯輿爭政公使丐平王室十一年襄十一年公及諸侯伐鄭圍鄭觀兵于南門西濟于濟隧水名鄭人懼乃行成同盟于亳丐曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟十三年襄十三年公搜于綿上以治兵使丐將中軍辭曰伯游即荀偃長昔臣習于知伯是以佐之非能賢也請從伯游使荀偃將中軍丐佐之使韓起將上軍辭以趙武又使欒黶黶亦辭使趙武將上軍起佐之使欒黶將下軍魏絳佐之君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之十四年襄十四年丐及諸侯大夫㑹吳于向數吳之不德以退吳人以其伐楚喪執莒公子務婁以其通楚使將執戎子駒支丐親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于瓜州乃祖吾離被苫蓋䝉荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏泄職女之由詰朝之事爾無與焉與將執女駒支對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大德謂我諸戎是四嶽之裔胄也母是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不二昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉于是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎犄之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逖今官之師旅無乃實有所闕以携諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與于㑹亦無瞢焉賦青蠅而退丐辭焉辭謝也使即事于㑹夏四月公伐秦報櫟之役使六卿帥諸侯之師以進至于棫林秦地不獲成焉欒黶先歸師乃大還晉人謂之遷延之役此役也欒針黶之弟及士鞅丐之子馳秦師針死而鞅反欒黶使丐逐鞅鞅奔秦已而復之是年丐假羽毛于齊析羽為旌王者游車之所建齊私有之因謂之羽毛而弗歸齊人始二平公三年襄十八年齊伐魯冬十月公㑹諸侯伐齊齊侯禦諸平隂塹防門而守之廣里諸侯之士門焉齊人多死丐告析歸父齊大夫子家曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之歸父告齊侯齊侯恐晉又使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曵柴而從之齊侯畏其衆乃脫歸丐以中軍克京兹遂東侵及濰南及沂四年襄十九年荀偃卒丐為政將中軍夏丐侵齊及榖聞齊靈公卒乃還冬齊及我平魯懼使叔孫豹㑹丐于柯六年襄二十一年欒盈母欒祁者丐之子也祁亂懼討訴盈于丐丐信之逐欒盈盈奔楚已而適齊丐殺其黨箕遺等十人八年襄二十三年欒盈自齊入于曲沃帥曲沃之甲以書入絳丐使子鞅帥卒退之盈奔曲沃晉人圍之冬十月克曲沃殺欒盈盡殺其族黨遂滅欒氏九年襄二十四年丐卒左傳諡曰宣子子鞅士鞅丐之子范獻子也悼公十四年襄十四年我伐秦報櫟之役櫟役在襄十一年鞅及欒針馳秦師針死而鞅反欒黶怒將殺之鞅奔秦秦伯問曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將于是乎在秦伯以為知言請于我而復之及平公即位鞅及祁奚韓襄欒盈為公族大夫平公三年襄十八年公㑹諸侯圍齊鞅門于雍門其御追喜以戈殺犬于門中又門于揚門鞅以其亡也即奔秦事怨欒氏故與欒盈為公族大夫而不相能六年襄二十一年鞅與欒祁士丐之子欒盈之母譖盈于宣子而逐之八年襄二十三年盈帥曲沃之甲因魏舒以晝入絳初欒盈佐魏絳于下軍魏舒私焉故因之宣子懼奉公如固宫使鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劔左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劔以帥卒欒氏退攝車從之遇欒樂曰樂勉之死將訟女于天樂射鞅不中又注則乘槐本而覆或以㦸鈎之斷肘而死遂滅欒氏尸子范獻子游河大夫皆在君曰知欒氏之子乎大夫莫答舟人清涓捨楫對曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善修晉國之政內得大夫外不失百姓雖欒氏子其若君何不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善十四年襄二十九年鞅如魯聘拜城杞也是年晉㑹諸侯城杞二十一年昭五年魯昭公來朝㑹魯納莒牟夷莒人訴于我公欲止魯昭公鞅曰不可入朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸魯昭公二十二年昭六年齊侯來請伐北燕使士文伯丐相鞅逆諸河二十三年昭七年衛襄公卒魯大夫言于鞅曰衛事晉為睦晉不禮焉庇其賊人謂孫林父而取其地戚邑也故諸侯二詩曰鶺鴒在原兄弟急難又曰死喪之威兄弟孔懷兄弟之不睦于是乎不弔况逺人誰敢歸之今又不禮于衛之嗣衛必叛我是絶諸侯也鞅以告韓起起使鞅如衛弔且反戚田平公薨事昭公公薨事頃公頃公五年昭二十一年鞅如魯聘魯以齊鮑國歸費之禮為鞅歸費在昭十四年魯為鮑國七牢鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢為十一牢七年昭二十三年晉以魯取邾師故執叔孫婼鞅求貨于婼使請冠焉婼取其冠法與之兩冠八年昭二十四年周有子朝之難鄭游吉說鞅鞅懼明年㑹于黃父謀王室也十一年昭二十七年鞅及諸侯之大夫㑹于扈令戍周且謀納魯昭公宋衛皆固請之鞅取貨于季孫意如謂宋樂祁衛北宫喜曰季孫未知其罪而君伐之請囚請亡于是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而說甲執冰以游叔孫氏懼禍之濫而自同于季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復于公頃公薨事定公定公元年昭三十一年公將以師納魯公鞅謂魏舒曰若召意如而不來則信不臣矣然後伐之若何晉人召意如鞅使私焉曰子必來我受其無咎于是意如㑹荀躒于適歷昭公卒不得復二年昭三十二年王使來請城成周鞅㑹魏舒曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事遂城成周明年魏舒城成周舒屬役于韓不信韓起孫而田于大陸焚焉還卒于寧于是鞅代為政去舒之柏椁以其未復命而田也六年定四年鞅及衛孔圉伐鮮虞七年定五年鞅圍鮮虞報觀虎之役也三年鮮虞獲觀虎魯陽虎専八年定六年强使仲孫何忌來報夫人之幣何忌謂鞅曰陽虎若不能居魯而息肩于晉所不以為中軍司馬者有如先君鞅曰寡君有官將使其人鞅何知焉鞅謂趙鞅曰魯人患陽虎矣秋八月宋樂祁犂來趙鞅逆而飲之酒于綿上獻楊楯干楯以楊木為之六十鞅怒言于公曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁犂十年定八年趙鞅言于公曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁犂鞅曰三年止之無故而歸之宋必叛晉將使樂祁犂子溷代之祁犂不可乃歸樂祁犂祁犂卒于大行鞅曰宋必叛不如止其尸以求成焉乃止諸州州晉地夏齊伐魯鞅及趙鞅荀寅救之㑹魯定公于瓦鞅執羔趙鞅荀寅皆執鴈魯于是始尚羔秋鞅㑹周成桓公周卿士侵鄭圍蟲牢報伊闕也定六年鄭伐周闕外晉為報之遂侵衛左傳鞅卒諡曰獻子鞅之父宣子嘗謂鞅曰鞅乎昔者吾有訾祏也訾祏宣子家臣吾朝夕顧焉以相晉國且為吾家今吾觀女也専則不能謀則無與將若之何對曰鞅也居處恭不敢安易敬學而好仁和于政而好其道謀于衆不以賈好私志雖衷不敢謂是也必長者之由宣子曰可以保身鞅又嘗聘于魯韋注在昭三十二年然經傳無之問具山敖山魯人以其鄉對鞅曰不為具敖乎對曰先君獻武之諱也獻公諱其武公諱敖鞅歸遍戒其所知曰人不可以不學吾適魯而名其二諱為笑焉唯不學也人之有學也猶木之有枝葉也木有枝葉猶庇䕃人而况君子之學乎國語古文瑣語范獻子卜獵命占之其繇曰君子得黿小人遺冠范獻子獵而無得遺其豹冠鞅子吉射士吉射鞅之子范昭子也事定公定公十五年定十三年趙鞅殺邯鄲午邯鄲叛晉圍之吉射及荀寅伐趙氏趙鞅奔晉陽范臯夷者范氏之側室子也無寵于吉射而欲為亂與荀躒知文子韓不信簡子魏曼多襄子謀逐吉射而以臯夷代之荀躒言于公曰君命大臣始禍者死今三臣始禍而獨逐鞅刑不鈞矣請皆逐之遂奉公以伐范氏中行氏弗克吉射及荀寅伐公國人助公吉射荀寅敗奔朝歌而韓魏請復趙鞅鞅入于絳明年晉圍朝歌范氏族析城鮒及小王桃甲鮒即士鮒二子晉大夫范中行氏之黨率狄師以襲晉戰于絳中不克而還士鮒奔周小王桃甲入于朝歌冬晉敗范中行氏之師于潞又敗鄭師及范氏之師于百泉定公十八年哀元年齊衛救范氏及鮮虞人伐我取棘蒲十九年哀二年齊輸范氏粟鄭罕逹駟𢎞送之吉射逆之趙鞅禦之遇于戚大敗鄭師獲齊粟千車二十年哀三年趙鞅圍朝歌荀寅伐其郛犯師而出奔邯鄲趙鞅殺士臯夷惡范氏也二十一年哀四年齊衛救范氏圍我五鹿九月趙鞅圍邯鄲邯鄲降荀寅奔鮮虞齊㑹鮮虞約荀寅于柏人明年晉圍柏人吉射及荀寅奔齊左傳范氏遂亡論曰聞之先民曰枝以蔽幹幹以固本日尋斧斤以披其枝枝葉既害難為木矣是故放勳為政克親九族王季造邦因心則友周之司徒明七教以興民德不聞以殺也桓莊之族枝葉寄也豐其祿約其任教之以禮敦之以仁平之以和董之以威可也乃士蒍為理刑以除逼骨肉薄矣是故居曲沃築蒲屈殺遊氏之教也毒胙斬祛城聚之道也晉之為晉賴文以國不然木將槁矣武子之知足使有聞然遇殽蒸而䝉焉經國固以禮貴也士渥濁貞子士弱莊子士丐文伯士彌牟景伯士渥濁者即士伯穆子之子貞子也穆子未詳初事景公景公三年宣十二年邲之敗我師歸荀林父請死公欲許之渥濁諫曰不可城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇者困獸猶鬬况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃久不警乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損于明公使復其位及荀林父敗赤狄于曲梁滅潞公賞林父狄臣千室亦賞渥濁以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣十四年成五年趙嬰趙盾弟通于趙莊姬趙朔妻朔趙盾子趙同趙括並嬰之兄放諸齊嬰夢天使謂已祭余余福女使問諸渥濁渥濁曰不識也既而告其人曰神福人而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡十五年成六年鄭伯來拜成授玊于東楹之東禮授玉兩楹之間鄭伯行疾故東過渥濁曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久是年鄭伯卒左傳厲公既被弒悼公即位以渥濁之帥志博聞而宣惠于教使為太傅國語渥濁卒諡曰貞子子弱士弱渥濁之子莊子也為晉主獄大夫事悼公悼公九年襄九年宋災公問于弱曰吾問之宋災于是乎知有天道何故問宋何故自知天道將災對曰古之火正或失于心或失于咮以出內火是故咮為鶉火心為大火火正掌火有功封為上公祀為貴神者心大火東方心星咮鶉火南方栁星也或以火正配食于心或以火正配食于栁季春建辰之月栁星昏在南方則令民放火是謂出火季秋建戍之月心星伏在日下不見則禁民放火是謂內火陶唐氏之火正閼伯居商邱閼伯髙辛氏之子遷于商邱主辰辰大火也今為宋星祀大火而火紀時焉相土因之故商主大火相土契孫商之祖代閼伯居商邱祀大火商人閲其禍敗之釁必始于火是以自知其有天道也公曰可必乎對曰在道國亂無象不可知也十年襄十年公將㑹吳于柤楚地齊髙厚相大子光先㑹諸侯于鍾離不敬弱曰髙子相大子以㑹諸侯將社稷是衛而皆不敬棄社稷也其將不免乎後皆如其言十五年襄十五年悼公薨事平公平公三年襄十八年我伐齊圍之弱及劉難亦晉大夫率諸侯之師焚申池之竹木十一年襄二十六年我以衛孫林父故執衛獻公囚之于弱既而歸之左傳弱卒諡曰莊子子丐文伯丐即士丐與范宣子同族同名字伯瑕弱之子也為晉大夫事平公平公二十二年昭六年三月鄭人鑄刑書文伯丐曰火見火心星周五月昏見鄭其火乎火未出而作火以鑄刑器藏爭辟焉火如象之不火何為六月鄭果災冬十一月齊侯來請伐北燕使文伯丐相之士鞅逆之禮也二十三年昭七年夏四月甲辰朔日有食之公問于文伯丐曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地衛地豕韋也魯地降婁也日食于豕韋之末息于降婁之始于是有災魯實受之其大咎其衛君乎魯將上卿公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時既而衛襄公魯季孫宿皆卒公謂文伯丐曰吾所問日食從矣可常乎對曰不可六物不同民心不一事序不類官職不則同始異終胡可常也詩曰或燕燕居息或憔悴事國其異終也如是公曰何謂六物對曰嵗時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰故以配日謂以子丑配甲乙平公薨事昭公昭公二年昭十二年齊侯來朝嗣君公宴齊侯荀吳相投壺公先荀吳曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之文伯丐謂荀吳曰子失辭吾固師諸侯矣壺何為焉其以中俊也齊侯弱吾君歸弗來矣荀吳曰吾君帥彊禦卒乘競勸今猶古也齊將何事左傳丐卒諡文伯子彌牟士彌牟文伯丐之子景伯也為晉理官韋昭注初事昭公昭公三年昭十三年我以邾莒故執魯季孫意如冬十月魯侯來朝荀吳曰執其卿而朝其君有不好焉使彌牟辭魯侯于河明年彌牟如楚昭公薨事頃公頃公七年昭二十三年以邾故執魯叔孫婼韓起使邾人聚其衆將以婼與之彌牟謂起曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館彌牟聽其辭而訴諸起乃皆執之彌牟御叔孫婼從者四人過邾館以如吏先歸邾子而謂婼曰以芻蕘之難從者之病將館子于都箕邑乃館諸箕明年彌牟逆之于箕曰寡君以為盟主之故是以久子不腆敝邑之禮將致諸從者使彌牟逆吾子婼受禮而歸周王子朝之亂公使彌牟涖問周故彌牟立于乾祭王城北門而問于介衆乃辭王子朝不納其使九年昭二十五年趙鞅㑹諸侯之大夫于黃父令輸王粟具戍人將納王宋樂大心曰我不輸粟我于周為客若之何使客彌牟曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之奉君命以㑹大事而宋背盟無乃不可乎大心不敢對彌牟告趙鞅曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉頃公薨事定公定公三年定元年魏舒合諸侯之大夫城成周宋仲幾不受功曰滕薛郳吾役也欲使三國代受役薛宰曰踐土之盟曰各復舊職從踐土從宋唯命仲幾曰踐土固然為宋役亦其職也彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎彌牟怒謂韓不信曰薛徴于人宋徴于鬼宋罪大矣且已無辭而抑我以神誣我也啓寵納侮此之謂矣必以為戮乃執仲幾歸諸京師左傳彌牟卒諡曰景伯尚史卷四十
