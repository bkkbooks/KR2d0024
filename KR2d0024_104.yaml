body:
  text: 尚史卷一百五志十三鑲白旗漢軍李鍇撰氏族志渾噩之初人以類從而已氏族之建始肇中古夏書曰錫土姓傳曰天子建德因生以賜姓胙之土而命之氏又曰保姓立氏以守宗祊是姓因其本而氏蒙其支先王之制也故氏族氏官氏諡氏王父字者有之而姓則無倍焉洎乎周末荒厥舊宗氏章姓湮邈焉為一史遷之書曰姓某氏蓋久已失其原矣今纂前緒用析厥初其有人承本系于傳無收者如魯之展瑕展玉父之于展氏晉之先蔑先僕之于先氏之屬並附著之述氏族志黃帝黃帝姬姓也史記姓公孫長于姬水受國于有熊居軒轅之邱因以為名又以為號帝王世紀氏左傳號帝鴻黃帝二十五子曰昌意玄囂苗龍休青陽揮夷鼓倉林禺陽外紀青陽方雷氏之甥也夷鼓彤魚氏之甥也青陽與夷鼓皆為己姓青陽與倉林同于黃帝又皆為姬姓其同生而異姓者四母三子别為十二姓凡黃帝之子二十五宗其得姓者十四人為十二姓十四人而二人為己二人為姬故十二姓姬酉祁己滕葴任荀僖姞儇依是也國語一説黃帝娶雷祖生昌意昌意降處若水生韓流韓流取淖子曰阿女生帝顓頊黃帝生駱明駱明生白馬白馬是為鯀世本黃帝娶于西陵氏謂之纍祖産青陽及昌意昌意生顓頊顓頊生鯀郭璞注諸言生者多謂其苗裔未必是親所産此説殊是黃帝一再傳不得與堯舜同時黃帝生禺䝞禺䝞生禺京即禺疆禺京處北海禺䝞處南海禺䝞子有儋耳之國任姓黃帝生苗龍苗龍生融吾融吾生㺯明㺯明生白犬是為犬戎黃帝之孫曰始均始均生北狄山海經周時祝與南燕並黃帝後為姞姓少皥少皥黃帝子青陽之子孫曰金天氏漢書邑于窮桑又謂之窮桑氏帝王世紀王嘉拾遺記少皥主西方號金天氏亦曰金窮氏時有五鳳集于庭因曰鳳鳥氏亦曰桑邱氏金鳴于山銀湧于地如龜蛇龍鳳故有龍山龜山鳳水之目亦因以為姓末代為龍邱氏蛇邱氏少皞生倍伐倍伐降處緡淵又生般又生魚山人一目威姓山海經少皞氏之後有南正重事顓頊重之後為羲國語又有裔子曰昧為玄冥師生允格臺駘顓頊封諸汾川沈姒蓐黃實守其祀左傳武王克商封其後兹輿于莒大紀郯亦其後為己姓顓頊顓頊黃帝子昌意之裔母曰景僕蜀山氏之女顓頊號髙陽氏帝王世紀産大戴記昌僕氏顓頊顓頊生老童老童生重黎世本老童娶于根水氏謂之驕福生重及黎國語髙陽氏之後為北正黎黎之後為和晉書重黎為夏官祝融厯唐虞夏商世序其職及周以夏官為司馬其後程伯休父克平徐方錫以官族因而為氏及吳回吳回生陸終陸終娶于鬼方氏生六子一曰樊是為昆吾韋昭注昆吾為夏伯夏衰遷于舊許二曰惠連是為參胡三曰籛是為彭祖四曰萊言是為云鄶人五曰安是為曹姓六曰季連是為芉姓昆吾衛氏也參胡韓氏也彭祖彭氏也云鄶人鄭氏也曹姓邾氏也季連楚氏也大戴記史記顓頊生窮蟬又生稱稱生卷章按卷章即老童之訛而多窮蟬及稱一説顓頊生老童老童生祝融祝融生長琴是處榣山始作樂風顓頊又生伯服又生歡頭歡頭生苗民苗民釐姓顓頊之子又有叔士又有季禺之國叔歜之國中䡢之國山海經又有蒼舒隤敳檮戭大臨龍降庭堅仲容叔達亦髙陽氏之後謂之八愷左傳陶杜預注即垂益禹皋之倫説誤帝嚳帝嚳者黃帝之子玄囂之裔帝王世紀大戴記黃帝生玄囂玄囂生蟜極蟜極生髙辛天下號曰髙辛氏號曰髙辛氏帝嚳生中容生季釐生晏龍晏龍是始為琴瑟晏龍生司幽帝嚳又生后稷稷弟台璽生叔均叔均是始作牛耕帝嚳又生禺號禺號生淫梁淫梁生番禺番禺是始為舟番禺生奚仲奚仲生吉光吉光是始以木為車帝嚳又生帝鴻帝鴻生白民白民銷姓又生黑齒薑姓山海經經于帝嚳皆作帝俊以帝俊生后稷準之帝俊當是帝嚳也然有帝俊妻娥皇生三身姚姓之文故郭璞注曰俊亦舜字假借音直以帝俊為帝舜夫諸書並以后稷為帝嚳之子未聞為帝舜之子且經于帝舜生戲帝舜生無淫又皆曰舜是俊舜自有别矣蓋帝俊妻娥皇生三身當是帝舜之訛郭注由此而誤耳今改定帝嚳之後曰摯嗣摯立者曰放勳世本帝嚳元妃有邰氏之女曰薑嫄生后稷次妃有娀氏之女曰簡狄生契次妃陳酆氏之女曰慶都生堯次妃訾陬氏之女曰常儀生帝摯大戴記帝嚳産放勳是為帝堯史記嚳子摯代立摯不善崩弟放勳立按春秋命厯序帝嚳傳十世緯書殊不足信要之摯為髙辛之後非其子也詳見世系圖説又有閼伯實沈髙辛氏之二子也閼伯主辰實沈主參閼伯為陶唐氏之火正又有伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍亦髙辛氏之裔也謂之八元左傳杜預注即稷契朱虎熊羆説誤唐祁姓帝堯陶唐氏祁姓也堯娶散宜氏之女曰女皇生丹朱帝王世紀又有男九人使與舜處九男皆益篤史記舜受禪使丹朱居丹淵為諸侯尚書逸篇武王克商封帝堯之後于薊大紀虞姚姓帝舜有虞氏姚姓也堯妻舜二女娥皇無子女英生商均帝王世紀謂大戴記舜娶帝堯之女之女匽氏一説娥皇生三身之國姚姓三身生義均義均是始為巧帝舜又生戲戲生搖民又生無淫降臷處是為無臷民朌姓山海經燭山海經舜妻登比氏生宵明光二女又曰登北氏夏后相時有虞思妻少康以二姚而邑諸綸遂復夏祀其後又有劉纍學擾龍事孔甲劉纍後為杜伯在夏為御龍氏在商為豕韋氏左傳豕韋國于唐周成王滅唐遷之于杜杜預注其後隰叔違周難于晉為范氏國語武王克殷封胡公滿于陳為媯氏大紀遂亦媯氏為齊所滅夏姒姓伯禹夏后氏姒姓也父鯀顓頊五世孫鯀娶有辛氏女曰女志生伯禹世本生論衡禹母吞薏苡而禹故姓曰姒禹生均國均國生役采役采生修鞈山海經啓有五子又有觀扈武王克商封其後東樓公于杞大紀鄫鄅亦其後姒姓商子姓契母曰簡狄有娀氏之女也契所出未詳以簡狄為帝嚳之妃者非是玄鳥至日祀髙禖因孕而生契古詩注契封於商賜姓子氏論衡契母吞燕卯而生契故殷姓曰子至湯伐桀遂有天下武王克商封紂子祿父以續殷祀祿父叛周誅成王以微子代殷後國于宋史記殷民有六族條氏徐氏蕭氏索氏長勺氏尾勺氏左傳周姬姓稷母有邰氏女曰薑原薑原踐巨人迹而生稷帝舜封稷于邰别姓姬氏至文王為西伯武王遂有天下平王東徙雒是為東周考王封其弟于河南是為西周桓公惠公封其少子于鞏是為東周惠公史記大王之子為吳虞王季之子為虢文王之子魯衛管蔡毛郕曹滕霍𣆀郜畢原雍酆郇武王之子晉邘應韓周公之子凡蔣邢茅胙祭其同姓之國為隨滑息榮芮魏駘岐隗楊耿密唐鮮虞太皞風姓宿任顓臾須句風姓太皞之後左傳神農薑姓蚩尤神農之裔路史黃帝既去蚩尤之凶遷其民善者于鄒屠之地惡者于有比之鄉其先以地名族後分為鄒氏屠氏拾遺記共工亦炎帝之後薑姓賈逵國語注炎帝之妻赤水之子聽訞生炎居炎居生節並節並生戲器戲器生祝融祝融生共工共工生術器共工又生后土后土生噎鳴噎鳴生嵗十有二山海經子郭璞注生卜二皆以嵗名名之后土在黃帝時為李管子在顓頊時與髙辛爭王為髙辛所滅賈逵注在周時紀向焦申吕菜亦神農之後薑姓左傳防風漆姓防風汪芒氏之君守封隅之山者也為漆姓國語鄋瞞是其後在夏為防風氏殷為汪芒氏左傳祝融妘姓己姓熊姓檜逼陽塢路妘姓昆吾蘇顧溫董己姓楚羅夔熊姓並祝融之後國語董父以豢龍事舜為鬷夷氏左傳昆吾當夏衰遷于舊許為楚之先韋昭注陸終彭姓秃姓大彭豕韋諸稽彭姓陸終之後舟人秃姓彭祖之别封也國語皋陶嬴姓秦蓼六梁黃徐嬴姓皋陶之後左傳奚仲任姓摯疇任姓奚仲仲虺之後大任之家韋昭注氏羌乞姓伯夷父郭璞注顓頊師生西嶽西嶽生先龍先龍生氐羌氐羌乞姓山海經赤狄隗姓陸渾允姓左傳周諸氏尹氏尹吉甫周內史其後為尹氏尹氏事襄王為卿士城濮之戰王命尹士命晉侯為侯伯簡王時有尹武公會諸侯伐鄭同盟于柯陵敬王時有尹文公圉尹辛尹固並子朝之黨晉逐子朝尹固及子朝奔楚已而固復還周周殺固固之復也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三嵗乎景王時有尹言多儋括欲立王子佞夫言多殺佞夫左傳周氏周公姬姓食采于周杜預注扶風雍縣東北有周城故亦曰周公世為周卿士桓王時有周公黑肩欲弒王而立王子克王殺黑肩惠王時有周公忌父大叔帶之難狄伐周獲忌父襄王時有周公閲與王孫蘇爭政簡王時有周公楚與伯輿爭政惠襄時又有周公孔是為宰孔襄王使宰孔賜齊侯胙左傳召公召氏世為周卿士按文四年召昭公來會葬杜預注召采地伯爵不明其為燕後而惠王以下燕自有侯以世相傳則此召氏非穆公嫡胤留相周室矣或其支庶别封于召如周公黑肩之比惠王時有召伯廖王使廖賜齊侯命襄王時有召武公過王使過賜晉侯命又有召昭公魯成風薨王使召昭公會葬定簡王時有召桓公定王使公逆王后于齊簡王使桓公賜魯侯命又有召戴公與王孫蘇爭政王孫蘇殺之立其子召襄敬王時有召莊公奐奐子簡公盈並黨王子朝莊公奐卒晉師納王盈乃逐子朝逆王于尸既而周殺盈左傳蘇氏蘇忿生蘇公也周克商蘇忿生以溫為司冦與檀伯達俱封于河左傳其後為蘇成公幽王時暴公為卿士而譖蘇公蘇公作何人斯以絶之詩序世本暴辛公作塤蘇成公作箎古史考古有塤箎二公特善其事耳桓王時蘇氏為大夫王奪其溫原絺樊隰郕攢茅向盟州陘隤懷十二邑以與鄭杜預注及莊王崩蘇氏及五大夫奉子頽以伐惠王不克出奔溫奉子頽奔衛衛師燕師立子頽子頽敗蘇氏即狄又不能于狄狄人伐之王不救滅溫蘇子奔衛後有蘇子復事頃王為卿士頃王五年蘇子及魯盟于女栗左傳毛氏毛氏毛叔鄭之後有毛伯毛伯衛毛伯過毛伯得左傳詳地理志原氏原氏武王之弟封于原其後有原莊公原伯原伯貫原襄公原伯絞及弟跪尋又有原伯魯左傳志詳地理單氏單伯封于單周之親族韋昭注世為卿士莊王時有單伯王將嫁女于齊命魯為主使單伯送王姬于魯宋萬弒閔公單伯會伐宋頃王時又有單伯為魯請子叔姬于齊定王時有單襄公朝聘于陳簡王時會伐鄭同盟于柯陵襄公子頃公頃公子靖公靖公子獻公襄頃之族殺獻公立其弟成公靖公之曾孫曰單穆公旗敬王時穆公定子期之難穆公子武公武公定儋翩之亂又有單平公單愆期左傳劉氏劉康公定王母弟公羊傳定王時康公聘于魯靈王時有劉定公夏景王時有劉獻公摯獻公子文公狄敬王時文公定子朝之難楚納子朝文公會諸侯于召陵謀伐楚文公子桓公桓公定儋翩之亂左傳魯諸氏展氏無駭者公子展孫也無駭卒隱公命以字為展氏其後有夷伯展禽展喜襄公時有展莊叔展瑕展玉父齊慶封來奔獻車于季孫宿美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也晉士鞅來聘公享之展莊叔執幣射者三耦公臣不足取于家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦左傳臧氏公子彄者孝公子臧僖伯也僖伯生臧孫達是為哀伯哀伯生伯氏瓶瓶生文仲辰辰生宣叔許許娶于鑄生臧賈臧為繼室以其姪生武仲紇紇奔齊臧賈使為以納請為遂自為請為竟嗣臧氏為生昭伯叔孫為有從弟會昭伯從昭公孫于齊會嗣臧氏會生賓如賓如生石左傳厚氏惠伯革者孝公子也其後為厚氏世本是為厚成瘠瘠事襄公瘠之後為后木后木嘗曰喪吾聞諸縣子曰夫喪不可不深長思也買棺外內易言斫棺當使外內平易我死則亦然記檀弓施氏施父者惠公子也施父生施伯勸莊公殺管仲以尸授齊者左傳考後系無三桓仲孫氏子服氏附公子慶父桓公子是為共仲仲孫氏之始也又曰孟氏慶父生孟穆伯敖敖生文伯榖惠叔難榖生獻子蔑蔑生莊子速及子服它速生孺子秩孝伯羯羯後為僖子貜貜或是羯子注未詳貜生懿子何忌南宮敬叔説何忌生武伯彘彘生敬子捷它别為子服氏它生惠伯湫湫生昭伯回回生景伯何又有孟之側字反亦孟氏族齊伐我武伯彘帥左師冉求帥右師及齊師戰于郊左師入齊軍右師奔孟之反後入以為殿抽矢策其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎曰惡賢徐步而死不狃魯士也左傳叔孫氏叔仲氏附叔牙慶父同母弟是為僖叔叔孫氏之始也牙生戴伯兹兹生莊叔得臣及惠伯叔仲彭生得臣生宣伯僑如穆叔豹豹生孟丙仲壬及昭子婼婼生成子不敢不敢生武叔州仇州仇生文子舒及叔孫輒輒無寵故因陽虎欲去三桓叔仲彭生别為叔仲氏彭生之孫為昭伯叔仲帶帶之子穆子小帶之孫叔仲志志亦因陽虎欲去三桓左傳季孫氏公鉏氏附季友桓公少子是為成季季孫氏之始也友生文子行父行父生武子宿宿生公彌及悼子紇紇生平子意如及公父穆伯名未詳意如生桓子斯斯生康子肥肥曾孫為昭子強公彌字公鉏别為公鉏氏公彌曾孫為公鉏極欲因陽虎以去三桓公父穆伯子為文伯歜季氏之族又有季公冶意如之庶叔父曰季公亥公亥兄曰公鳥公亥謀去季氏意如之弟曰公甫公之季孫斯之弟曰季寤寤亦因陽虎欲去三桓左傳子叔氏叔肹文公子宣公母弟子叔氏之始也肹生聲伯嬰齊嬰齊生齊子老韋昭注榮駕鵝亦聲伯子老生敬子弓弓生輒及鞅又有叔詣系未詳昭公時會于黃父謀定王室詣于昭公二十九年四月卒書卒書日蓋亦魯卿也又有叔還叔弓曾孫定公時如鄭涖盟哀公時如齊葬景公會吳于柤還子青敬王崩青如京師又如越左傳郈氏郈敬伯同郈惠伯之玄孫系未詳同之後有郈昭伯左傳又有郈成子郈成子為魯聘于晉過衛右宰穀臣止而觴之陳樂而不樂酒酣而送之以璧顧反過而弗辭其僕曰嚮者右宰穀臣之觴吾子也甚歡今侯泄過而弗辭郈成子曰夫止而觴我與我歡也陳樂而不樂告我憂也酒酣而送我以璧寄之我也由是觀之衛其有亂乎倍衛三十里聞寧喜之難作右宰榖臣死之還車而臨三舉而歸至使人迎其妻子隔宅而異之分祿而食之其子長而反其璧吕氏春秋仲氏公子遂是為襄仲居東門故曰東門氏公孫敖之從父昆弟也遂生公孫歸父及仲嬰齊文公薨遂弒子惡及視而立宣公宣公薨季孫行父逐歸父使仲嬰齊紹其後為仲氏左傳晉諸氏狐氏狐突晉同姓唐叔之後突生狐毛狐偃毛生溱為溫大夫偃生射姑其族又有狄鞠居以殺陽處父晉殺鞠居射姑奔狄又有狐父為大夫楚圍蔡使狐父請蔡于楚左傳欒氏欒賓靖侯之孫也賓生成是為欒共叔成生貞子枝枝生盾盾生武子書書生桓子黶及弟針黶生懷子盈平公時士丐克盈于曲沃欒樂死欒魴奔宋欒魴並欒氏族盡滅欒氏又有欒京廬欒弗忌欒斜並欒氏族左傳先氏先友先丹木晉舊姓也友丹木並為戎右其後有先軫軫生蒲城伯且居且居生克其族先都殺克晉殺都克之後有先縠邲之戰縠敗晉師又召狄伐晉晉殺縠盡滅其族又有先蔑字士伯文公作三行以禦狄荀林父將中行屠擊將右行蔑將左行及襄公薨趙盾使蔑逆公子雍于秦已而立靈公蔑奔秦襄公時又有先僕楚師圍江僕伐楚以救之又有先辛為胥甲父屬大夫晉放胥甲父辛奔齊左傳郤氏郤豹亦舊姓也豹生芮是為冀芮芮與郤稱郤乞並為公子夷吾臣稱乞並郤氏族也芮生成子缺缺生獻子克克生錡錡與郤犫郤至是為三郤郤犫步揚之子克之從父兄弟郤至步揚之孫蒲城鵲居之子並事厲公胥童殺三郤郤氏遂滅步揚嘗御戎與秦戰于韓又有步招堇隂之役御戎以敗秦師又有步􅐧郤至之弟麻隧鄢陵之役禦戎以敗秦楚師又有郤縠郤溱溱至之兄襄公時郤縠將中軍溱佐之城濮之役溱敗楚師左傳范氏士蒍劉纍之後杜伯之孫隰叔之子周殺杜伯隰叔違周難遂居晉生蒍蒍生縠縠殺先克晉殺縠蒍之孫為士會初封隨又受范遂氏范是為范武子會生文子燮及彘恭子魴魴生裘魴嘗將新軍魴卒裘幼故不得立燮生宣子丐丐生獻子鞅鞅生昭子吉射定公時吉射與荀寅奔齊范皋夷者范氏側室之子謀逐吉射而代之及趙鞅圍朝歌殺皋夷又有士鮒是為析城鮒晉圍朝歌鮒以狄師襲晉不克奔周范氏遂亡范氏之族别有士伯穆子系未詳穆子生貞子渥濁渥濁生莊子弱弱生文伯丐與范宣子同族同名丐生景伯彌牟又有范無恤者河曲之役無恤禦戎又有士富者亦曰范獻子范文子燮之族昆弟悼公時為候奄左傳中行氏荀息息後為荀林父世本晉大夫逝遨生林父文公作三行林父將中行遂氏中行氏是為中行桓子林父生中行伯庚庚生獻子偃偃生穆子吳吳生文子寅定公逐寅與士吉射寅吉射奔齊中行氏遂不嗣左傳知氏荀首字知季遂以為氏林父之弟知莊子也世本知氏與荀氏同祖逝遨首生武子罃罃生朔及悼子盈世本罃生朔朔生盈盈生文子躒躒生宣子甲甲生宵及襄子瑶瑶與韓魏伐趙三家反攻瑶殺瑶滅其族其族有知果知伯國者諫瑶瑶不聽知果更其姓為輔氏知氏滅惟輔氏存其族又有荀騅鞍之役騅有功景公作六軍賞其功使騅為卿騅之曾孫曰程鄭韋昭注程季之子也程季或即程滑為晉大夫悼公即位鄭為乘馬御六騶屬焉使訓羣騶知禮國語知程鄭端而不淫好諫不隱使為贊僕悼公薨平公嬖之使佐下軍鄭公孫揮來聘鄭問降階何由問自降下之道揮不能對而識者知其將死鄭果卒左傳又有荀賓荀家荀會國語會作禬悼公即位知荀賓之有力而不暴也使為戎右欒叔請公族大夫公曰荀家惇惠荀會文敏黶也即欒桓子果敢無忌即公族穆子鎮靖使兹四人者為之夫膏粱之性難正也使惇惠者教之則偏而不倦文敏者道之則婉而入果敢者諗之則過不隱鎮靖者修之則一使兹四人者為公族大夫國語又有知起中行喜者為晉大夫黨欒氏士丐逐欒盈知起中行喜皆奔齊又有知徐吾者知悼子盈之孫也魏戊為政以其為餘子不失職而能守業使為塗水大夫左傳祁氏祁奚食邑于祁因以為氏髙梁伯之子髙梁伯系未詳奚生午午生盈盈討家臣祁勝塢臧公殺盈遂滅祁氏祁氏之先有祁舉者為大夫黨于里丕謀出惠公納重耳郤芮殺舉又有祁瞞事文公城濮之戰瞞干命中軍風于澤牛馬相風而走皆失之亡大斾之左旃司馬殺之以徇于諸侯左傳羊舌氏羊舌大夫名未詳事獻公為軍尉羊舌大夫生職職生赤及肹及鮒及虎赤是為銅鞮伯華赤生子容肹字叔向食邑于揚又曰揚肹肹生楊石又曰楊食我食我黨欒盈平公殺食我遂滅羊舌氏鮒以賄死虎亦以黨欒盈死左傳胥氏胥臣臼季為司空又曰司空季子臼季生甲父甲父生克克生童童殺三郤晉殺童胥氏不嗣又有胥嬰者文公搜于清原作五軍使嬰將下軍又有胥梁帶為大夫執齊烏餘胥午守曲沃大夫以曲沃納欒盈左傳籍氏籍偃籍季之子也其八世祖孫伯黶為晉正卿司晉之典籍故曰籍氏偃生談談生秦秦黨范氏晉逐范中行氏秦從范氏出奔既而獲之籍氏不嗣左傳按韋昭注伯宗孫伯紏之子然則孫伯紏或亦孫伯黶之同族與則伯宗亦為籍氏箕氏箕鄭父為文公新上軍佐靈公立鄭父殺先克晉殺鄭父頃公時有箕遺子朝出悼王晉平周亂使遺取前城左傳右行氏右行辛者晉大夫將右行因以為氏韋昭注晉大夫賈辛也按晉頃公時有賈辛定子朝之亂距此五十餘年魏舒舉以為祁大夫知非右行辛也文公嘗作三行以禦狄屠擊將右行辛其屠氏之後歟韋氏之説莫知所本悼公即位知辛能以數宣物定功也使為司空國語頃公時有右行詭者為大夫子朝出悼王我平周亂籍談荀躒賈辛司馬督帥師軍于隂于侯氏于溪泉次于社詭及箕遺樂徴濟師取前城左傳董氏董因周太史辛有之後因之後為董狐為晉大史又有董伯董叔並事平公平公有疾夢黃能鄭公孫僑教之祀鯀遂祀夏郊以董伯為尸國語董韋昭注神不歆非類伯其姒姓乎董叔取士丐女者又有董安于者為趙鞅家臣左傳按董氏為辛有之後晉有辛廖或亦其族與尚史卷一百五
