body:
  text: 尚史卷四十六列傳二十四鑲白旗漢軍李鍇撰晉諸臣傳郭偃史蘇郭偃即卜偃為掌卜大夫史蘇為卜史禮卜卜師作龜大夫占色史占墨獻公卜伐驪戎史蘇占之曰勝而不吉公曰何謂也對曰遇兆挾以銜骨齒牙為猾謂兆端左右釁折有似齒牙中有從畫故銜骨在口中齒牙弄之象讒口之為害也戎夏交捽兆有一畫外象戎內象諸夏兆端㑹為牙交有似捽捽交對也交捽是交勝也臣故云且懼有口􅠬民􅠬離也或作攜國移心焉公曰何口之有口在寡人寡人弗受誰敢興之對曰茍可以攜其人也必甘受逞而不知胡可壅也公不聼遂伐驪戎克之獲驪姬以歸有寵立以為夫人公飲大夫酒令司正實爵與史蘇曰飲而無肴夫驪戎之役女曰勝而不吉故賞女以爵罰女以無肴克國得妃吉孰大焉史蘇卒爵再拜稽首曰兆有之臣不敢蔽蔽兆之紀失臣之官有二罪焉何以事君大罰將及不唯無肴抑君亦樂其吉而備其凶凶之無有備之何害若其有之備其為瘳臣之不信國之福也何敢憚罰飲酒出史蘇告大夫曰夫有男戎必有女戎若晉以男戎勝戎而戎亦必以女戎勝晉其若之何里克曰何如史蘇曰昔夏桀伐有施有施人以妹喜女焉妹喜有寵于是乎與伊尹比而亡夏殷辛伐有蘇有蘇氏以妲己女焉妲己有寵于是乎與膠鬲比而亡殷周幽王伐有褒有褒人以褒姒女焉褒姒有寵生伯服于是乎與虢石甫比逐大子宜咎而立伯服大子出奔申申人繒人召西戎以伐周周於是乎亡今晉寡德而安俘女又增其寵雖當三季之王不亦可乎且其兆云挾以銜骨齒牙為猾我卜伐驪龜往離散以應我夫若是賊之兆也非吾宅也離則有之不跨其國可謂挾乎不得其君能銜骨乎若跨其國而得其君雖逢齒牙以猾其中其誰云弗從諸夏從戎非敗而何從政者不可以不戒亡無日矣郭偃曰夫三季王之亡也宜民之主也縱惑不疚肆侈不違流志而行無所不疚是以及亡而不獲追鑑今晉國之方偏矦也方大也偏偏方也乃甸內偏方小矦也其土又小大國在側雖欲縱惑未獲專也大家鄰國將師保之多而驟立不其集亡雖驟立不過五矣且夫口三五之門也口所以紀三辰宣五行是以讒口之亂不過三五且夫挾小鯁也可以小戕而不能喪國當之者戕焉于晉何害雖謂之挾而猾以齒牙口弗堪也其與幾何晉國懼則甚矣亡猶未也商之衰也其銘有之曰嗛嗛之德嗛嗛猶小小也不可以矜而祇取憂也嗛嗛之食不足狃也不能為膏而祗離咎也雖驪之亂其離咎也已其何能服吾觀君夫人也若為亂其猶𨽻農也雖獲沃田而勤易之將弗克饗為人而已士蒍曰戒莫如豫豫而後給夫子戒也抑二大夫之言其皆有焉及驪姬生奚齊其娣生卓子驪姬請使申生處曲沃重耳處蒲夷吾處屈奚齊處絳以警無辱之故言警備于戎翟無耻辱于國公許之史蘇朝告大夫曰二三大夫其戒之乎亂本生矣日君以驪姬為夫人民之疾心固皆至矣昔者之伐也起百姓以為百姓也是以民能欣之故莫不盡忠極勞以致死今君起百姓以是封也民外不得其利而內惡其貪則上下既有叛矣然而又生男其天道也天彊其毒民疾其態其亂生哉吾聞君子好好而惡惡樂樂而安安是以能有常伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂今君滅其父而畜其子禍之基也又從其欲子思報父之耻而信其欲雖好色必惡心不可謂好好其色必授之情彼得其情以厚其欲從其惡心必敗國且深亂亂必自女戎三代皆然國語公筮嫁伯姬于秦遇歸妹兑下震上歸妹之暌兑下離上暌史蘇占之曰不吉其繇曰士刲羊亦無􅎺也女承筐亦無貺也震長男為士兌為羊離為中女又為大腹故稱筐又中虛故為虛筐西鄰責言不可償也兑西方兑為口舌以兑從震是口舌雷動歸妹之暌猶無相也歸妹女嫁之卦暌乖離之象相助也震之離離亦之震震為雷離為電二卦變而氣相通為雷為火為嬴敗姬火動熾而害其母女嫁反害其家之象車說其輹火焚其旗不利行師敗于宗邱震為車離為火上六之爻在震則無應故車脫輹在離則失位故火焚旗言皆失車火之用也車敗旗焚故不利行師火還害母故敗不出國近在宗邑歸妹暌孤寇張之弧暌之上九處暌之極故曰暌孤失位孤絶故遇寇難而有弓矢之警姪其從姑震為木離為火火從木生離為震妹于火為姑謂我姪者我謂之姑六年其逋逃歸其國而棄其家明年其死于髙梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益獻公十六年閔元年公滅耿滅霍滅魏賜畢萬魏以為大夫郭偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆二十年僖二年我伐虢滅下陽秋虢公敗戎于桑田偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必易晉而不撫其民矣不可以五稔二十二年僖三年八月復伐虢圍上陽公問于偃曰吾其濟乎對曰克之公曰何時對曰童謡云丙之晨龍尾伏辰龍尾尾星也日月之㑹曰辰日在尾故尾伏不見均服振振戎事上下同服振振盛貌取虢之旗鶉之賁賁天䇿焞焞火中成軍虢公其奔鶉鶉火星賁賁鳥星之體也天䇿傅說星時近日星微焞焞無光耀也言丙子平旦鶉火中軍事有成功也其九月十月之交乎謂建戌建亥之月丙子旦日在尾月在䇿是夜日月合朔于尾月行疾故至旦而過在䇿鶉火中必是時也冬十二月夏十月也丙子朔滅虢虢公醜奔京師左傳二十六年僖九年獻公薨秦納夷吾是為惠公惠公即位出共世子即申生而改葬之臭達于外國人誦之曰貞之無報也孰是人斯而有是臭也言惠公以正禮改葬世子而不獲吉報也誰使是人有是臭者言惠公使之也或曰貞謂世子與下義相違非是貞為不聼信為不誠國斯無刑偷居幸生不更厥貞大命其傾威兮懷兮各聚爾有以待所歸兮猗兮違兮心之哀兮嵗之二七其靡有微兮若翟公子謂重耳吾是之依兮鎮撫國家為王妃兮偃曰甚哉善之難也君改葬共君以為榮也而惡滋章夫人美于中必播于外而越于民民實戴之惡亦如之故行不可不慎也必或知之十四年君之冡嗣其替乎其數告于民矣公子重耳其入乎其魄兆于民矣若入必伯諸侯以見天子其光耿于民矣欲先導者行乎將至矣公既殺里克而悔之曰芮也使寡人過殺我社稷之鎮偃聞之曰不謀而諌者冀芮也不圖而殺者君也不謀而諌不忠不圖而殺不祥不忠受君之罰不祥罹天之禍受君之罰死戮罹天之禍無後志道者勿忘將及矣初公入而背外內之賂輿人誦之曰佞之見佞果喪其田謂里㔻受惠公賂田而納之惠公入而不豫也詐之見詐果喪其賂謂秦以詐立惠公惠公入而背之也得國而狃終逢其咎喪田不懲禍亂其興及里㔻死禍公隕于韓偃曰善哉夫衆口禍福之門也是以君子省衆而動監戒而謀謀度而行故無不濟內謀外度考省不倦日考而習戒備畢矣國語十四年僖二十三年惠公薨子圉立是為懷公懷公命無從亡人謂重耳狐突之子毛及偃從重耳在秦公執狐突殺之偃稱疾不出曰周書有之乃大明服已則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有明年重耳入立是為文公遂殺懷公于髙梁文公二年僖二十五年王以子帶之難適鄭處于汜狐偃請納王公使偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也言周自當帝兆不謂晋公曰筮之筮之遇大有乾下離上大有之暌兑下離上暌曰吉遇公用享于天子之卦也戰克而王饗吉孰大焉且是卦也天為澤以當日言乾變為兑而上當日也天子降心以逆公不亦可乎大有去暌而復亦其所也言去暌卦還論大有乾尊離卑降尊下卑亦有天子降心之象九年僖三十二年文公薨將殯于曲沃出絳柩有聲如牛偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉左傳論曰文公嘗問于郭偃曰始也吾以為國易今也難對曰君以為易其難也將至矣君以為難其易也將至矣見國語嗚呼其言有符于尼父不僅為卜筮之良也若夫史蘇之樂吉備凶君子亦有取焉辛廖辛廖晉大夫初畢萬筮仕于晉遇屯震下坎上屯之比坤下坎上比廖占之曰吉屯固比入吉孰大焉其必蕃昌震為土車從馬震為車坤為馬震變為坤故震為土車從馬足居之兄長之震為足動而遇坤安靜之象故居之震為長男兄也初又最長故長之母復之衆歸之坤為母坤為衆六體不易合而能固安而能殺水地比有合之義水雷屯有固之義以比承屯之變故合而能固比之下卦有坤坤為土安之象屯之下卦有震震為雷殺之象以坤承震之變故安而能殺公矦之卦也公侯之子孫必復其始萬畢公髙之子孫言必復為公侯左傳董因董狐董叔董因者晉大夫周太史辛有之後也辛有之二子董之晉故晉有董史按此則辛廖亦與董氏同族文公元年僖二十四年秦納公子重耳因迎于河公子問焉曰吾其濟乎對曰嵗在大梁將集天行集成也行道也言嵗星在大梁之次將成天道元年始受實沈之星也元年謂文公即位之元年嵗星去大梁在實沈之次實沈之虛晉人是居所以興也髙辛氏有子季曰實沈遷于大夏主祀參唐人是因成王滅唐而封叔虞子燮改為晉侯故參為晉星今君當之無不濟矣君之行也嵗在大火大火閼伯之星也是謂大辰魯僖五年重耳出奔嵗在大火髙辛氏有子曰閼伯遷于商邱祀大火辰以成善后稷是相唐叔以封辰即農祥謂后稷經緯相視以成善道又唐叔封時嵗在大火瞽史記曰嗣續其祖如榖之滋必有晉國臣筮之得泰之八乾下坤上泰遇泰無動爻隂爻不動其數皆八曰是謂天地配亨小往大來陽下隂升故曰配亨陽內隂外故曰往來今及之矣何不濟之有且以辰出而以參入皆晉祥也而天之大紀也濟且秉成必霸諸侯子孫賴之君無懼矣國語董狐蓋亦辛有之後也為晉大史靈公十四年宣二年趙穿弒靈公趙盾未出山而復狐書曰趙盾弒其君以示于朝盾曰不然對曰子為正卿亡不越竟反不討賊非子而誰孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免又有董叔者為大夫事平公平公三年襄十八年鄭公子嘉即子孔將叛我起楚師以去諸大夫于是楚師伐鄭晉人聞有楚師董叔曰天道多在西北嵗在豕韋月又建亥故曰多在西北南師無時必無功楚師果還左傳董叔將取于范氏范宣子士丐女羊舌肸曰范氏富盍已乎曰欲為繫援焉它日董祁即士丐女祁其名訴于士鞅曰不吾敬也鞅執而紡于庭之槐羊舌肸過之曰子盍為我請乎肸曰求繫既繫矣求援既援矣欲而得之又何請焉國語史趙史墨即蔡墨史龜桑田巫附史趙史墨史龜者並晉大史也平公二十四年昭八年楚滅陳公問于趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也嵗在鶉火鶉火南方栁星午位是以卒滅陳將如之今在析木之津猶將復由箕斗之間有天漢謂之析木之津由用也且陳氏得政于齊而後陳卒亡自幕至于瞽瞍無違命舜重之以明德置德于遂遂舜後蓋殷興存舜後而封遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣平公薨昭公即位昭公元年昭十一年魯葬齊歸魯昭公母昭公不戚我士之送葬者歸以語趙趙曰必為魯郊言昭公必出在郊野侍者曰何故曰歸姓也姓生也不思親祖不歸也史墨者又曰蔡墨又曰史黯事頃公頃公十三年昭二十九年秋龍見于綘郊魏舒問于墨曰吾聞之蟲莫知于龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏魏舒曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安飂古國叔安其君名有裔子曰董父實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾于有帝言孔甲之德能順于天帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後以纍代彭姓之豕韋纍遷魯縣豕韋復國至商而滅纍之後世復為豕韋氏龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷于魯縣范氏其後也魏舒曰今何故無之對曰夫物物有其官官修其方好是物者必有其官守居是官者必修其方法朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃坻伏坻止伏匿也鬱湮不育鬱湮湮塞也故有五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土龍水物也水官棄矣故龍不生得不然周易有之在乾之垢曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉坤之剝曰龍戰于野若不朝夕見誰能物之魏舒曰社稷五祀誰氏之五官也對曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為𤣥冥世不失職遂濟窮桑少皥之號也此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍共工氏在大皥後神農前以水名官者其子句龍能平水土為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷烈山氏神農世諸侯自夏以上祀之周棄亦為稷自商以來祀之趙鞅荀寅賦晉國一鼓鐵令各出功力共鼓石為鐵計令一鼓而足以鑄刑鼎著士丐所為刑書墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也其及趙氏趙孟與焉然不得已若德可以免定公元年昭二十一年十二月辛亥朔日有食之是夜也趙鞅夢童子裸而轉以歌且占諸墨曰吾夢如是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰庚日有變日在辰尾故曰以庚辰日月在辰尾辰尾龍尾也日月合朔于辰尾而食庚午之日日始有謫火勝金故弗克謫變氣也庚午十月十九日去辛亥朔四十一日雖食在辛亥更以始變為占也午南方楚位午火庚金庚午有變故災在楚楚仇唯吳故知入郢必吳食在辛亥亥水也水數六故六年也火勝金者午火勝庚金楚氣猶壯故終亦不克二年昭三十三年吳伐越墨曰不及四十年越其有吳乎存亡之數不過三紀嵗星三周三十六嵗故曰不及四十年越得嵗而吳伐之必受其凶魯昭公薨于乾侯趙鞅問于墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣離死于外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓虞夏商于今為庶主所知也在易卦雷乘乾曰大壯天之道也震居乾上言君臣易位大强壯也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之震妊娠謁告也曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功于魯受費以為上卿至于文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君于是失國政在季氏于此君也四公矣宣成襄昭民不知君何以得國是以為君慎器與名不可以假人左傳墨嘗為趙鞅史鞅田于螻晉君之囿墨聞之以犬待于門鞅見之曰何為曰有所得犬欲試之兹囿鞅曰何為不告對曰君行臣不從不順主將適螻而麓不聞麓主君苑囿之官臣敢煩當日當日直日也言主不煩麓以告君臣亦不敢煩直日以告主鞅乃還鞅嘗歎曰吾願得范中行之良臣墨侍曰將焉用之鞅曰良臣人之所願也又何聞焉對曰臣以為不良故也夫事君者諫過而賞善薦可而替不獻能而進賢擇才而薦之朝夕誦善敗而納之道之以文行之以順勤之以力致之以死聼則進不則退今范中行氏之臣不能匡相其君使至於難君出在外又不能定而棄之則何良之為若弗棄則主焉得之夫二子之良將勤營其君使復立于外死而後止何日以來若來乃非良臣也鞅曰善吾言實過矣國語吕氏春秋趙簡子將襲衛使默往睹之期以一月六月而後返簡子曰何其久也史默曰謀利而得害猶弗察也今蘧伯玉為相史鰌佐焉孔子為客子貢使令于君前甚聼易曰渙其羣元吉渙者賢也羣者衆也元者吉之始也渙其羣元吉者其佐多賢也簡子按兵而不動吕氏春秋簡子晝居喟然太息曰異哉吾欲伐衛十年矣而衛不伐侍者曰以趙之大伐衛之細君不欲則可君若欲之請今伐之簡子曰不知而言也衛有士十人于吾所吾且伐之十人者其言不義也而我伐之是我為不義也二十六年哀九年鄭之嬖許瑕圍宋雍邱宋報之伐鄭鞅卜救鄭遇水適火占諸史趙史墨史龜龜曰是謂沈陽火陽得水故沈可以興兵利以伐姜不利子商姜火師之後火弱故利伐姜子商謂宋屬水故伐商不利伐齊則可敵宋不吉墨曰盈水名也子水位也趙鞅姓盈水盈坎乃行宋姓子得北方水位名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可趙曰是為如川之滿不可游也既盈則得水位如川之滿不可慿遊鄭方有罪不可救也鄭以嬖寵伐人故以為有罪救鄭則不吉不知其他乃止先是有桑田巫者事景公景公十九年成十年公夢大厲被髮及地搏膺而踊曰殺余孫不義厲趙氏之先祖公殺趙同趙括故怒余得請于帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢公曰何如曰不食新矣六月公欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張腹滿也如厠陷而卒小臣有晨夢負公以登天及日中負公出諸厠遂以為殉左傳師曠師曠字子野為晉樂大師初事悼公悼公十四年襄十四年衛獻公出奔齊曠侍于公公曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司收之勿使失性有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂𨽻牧圉皆有親昵以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父子兄弟以補察其政史為書瞽為詩工誦針諌大夫規誨士傳言庶人謗商旅于市旅陳也陳物以示時所貴尚百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諌正月孟春于是乎有之諌失常也天之愛民甚矣豈其使一人肆于民上以從其淫而棄天地之性必不然矣悼公薨事平公平公三年襄十八年齊伐魯公㑹魯同伐齊齊侯禦諸平隂齊地塹防門而守之冬十月丙寅晦齊師夜遁曠告公曰鳥烏之聲樂齊師其遁邢伯晋大夫邢侯也告荀偃曰有班馬之聲齊師其遁羊舌肸告公曰城上有烏齊師其遁十一月丁卯朔入平隂遂從齊師鄭公子嘉將叛我起楚師以去諸大夫㑹鄭伯從我伐齊楚師伐鄭次于魚陵鄭地我聞有楚師曠曰不害吾驟歌北方又歌南風南風不競多死聲楚必無功羊舌肸曰在其君之德也十一年襄二十六年秦伯之弟針來修成羊舌肸命召行人子員行人子朱曰朱也當御三云肸不應子朱怒曰班爵同何以黜朱于朝撫劔從之肸曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之公曰晉其庶乎吾臣之所爭者大曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎淮南子師曠瞽而為大宰晉無亂政有貴于見者也淮南子平公出言不當師曠舉琴撞之跌衽宫壁左右欲塗之公曰舍之以為寡人失韓非子文繁而同說苑作師經魏文侯事淮南子平公問于師曠曰人君之道如何對曰人君之道清净無為務在博愛趨在任賢不固溺于流俗不拘繫于左右此人君之操也淮南子平公曰吾年七十欲學恐暮矣師曠曰何不炳燭乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎淮南子平公問于師曠曰咎犯與趙衰孰賢對曰陽處父欲臣文公因咎犯三年不達因趙衰三日而達不知其士不智也知而不言不忠也欲言而不敢無勇也言之而不聼不賢也新序平公閒居師曠侍公曰子生無目甚矣子之墨墨也對曰天下有五墨墨而臣不與一焉臣行賂以采譽百姓侵寃無所訴而君不悟一也忠臣不用用臣不忠下才處髙不肖臨賢而君不悟二也姦臣欺詐空虛府庫以其少才覆塞其惡而君不悟三也國貧民罷上下不和好財用兵嗜欲無厭而君不悟四也至道不明法令不行吏民不正百姓不安而君不悟五也臣之墨墨小墨墨耳古文瑣語師曠御平公鼓瑟輟而笑曰齊君與其嬖戲墜于牀而傷其臂公命書之曰某月某日齊君戲而傷二十四年昭八年春石言于魏榆魏邑之榆地公問于曠曰石何故言對曰石不能言或馮焉不然民聼濫也抑臣又聞之曰作事不時怨讟動于民則有非言之物而言今宫室崇侈民力雕盡怨讟並作莫保其性石言不亦宜乎于是公方築虒祈之宫羊舌肸曰子野之言君子哉君子之言信而有徵故怨逺于其身小人之言僭而無徵故怨及之詩曰哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休其是之謂乎是宫也成諸侯必叛君必有咎夫子知之矣左傳古文瑣語平公至澮上見人乘白驂八駟以來貍身狐尾去其車而隨公公問師曠曠曰其名曰首陽之神飲酒霍太山而歸其逢君子澮乎君其有喜古文瑣語有鳥從南來質白五色備集平公之庭相見如讓公問叔嚮嚮曰吾聞師曠曰西方有白質鳥五色備其名曰翬南方赤質五色備其名曰搖來為吾君臣其祥先至矣說苑平公出畋乳虎伏而不動謂師曠曰吾聞霸主出則猛獸伏今者乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬食􅀈鸃􅀈鸃食豹豹食駮駮食虎夫駮之狀似駮馬今君必驂駮馬公曰然曰臣聞一自誣者窮再自誣者辱三自誣者死今虎不動為駮馬非德義也君何自誣乎平公出朝有鳥環公不去謂師曠曰吾聞霸王之主鳯下之今者有鳥環寡人不去是其鳯乎師曠曰東方有鳥名諌珂文身而朱足憎烏而愛狐今君必衣狐裘公曰然曰鳥為狐裘故非德義也君何再自誣乎平公置酒虒祈之臺布蒺藜于階上召師曠師曠解履刺足仰天而歎曰肉生蟲而自失木生蠧而自刻人興妖而自賊五鼎之具不當生藜藿人主堂廟不當生蒺藜公曰為之奈何曰妖已在前無可奈何來月八日君將死矣至日平旦公謂師曠曰今日如何師曠謁歸未幾而公死公說新聲曠曰公室其將卑乎君之明兆于衰矣夫樂以開山川之風以耀德于廣逺也風德以廣之風山川以逺之風物以聼之修詩以詠之修禮以節之夫德廣逺而有時節是以逺服而邇不遷也國語韓非子衛靈公將之晉至濮水之上聞鼓新聲者使師涓撫琴而寫之去之晉以新聲示平公師曠撫止之曰此亡國之聲也師延與紂為靡靡之樂也及武王伐紂師延走濮水而自投聞此聲者必于濮水之上平公曰此何聲也曰清商也公曰清商固最悲乎曰不如清徵公曰願試聼之師曠援琴一奏之有𤣥鶴二入延頸而鳴舒翼而舞音中宫商聲聞于天公曰音莫悲于清徵乎曰不如清角公曰願試聼之師曠鼓之雲起風至大雨隨之裂帷破爼坐者散走晉國大旱平公瘙病淮南子師曠奏白雪之音神物為之下風雨暴至平公癃病晉國赤地吕氏春秋晉平公鑄大鐘師曠曰不調請更鑄之公曰工皆為調矣曰後有知音者將知不調也至師涓而果知鐘之不調拾遺記師曠或出于晉靈之世主樂官撰兵書萬篇平公時以隂陽之學顯兵家有師曠八篇漢書論曰桃園之難董狐顯誅盾墨于適婁則微諷之皆所以正天序申大經凛乎其不可犯己國無史史無人君臣之義安所取正哉天象龜兆各從其類而吉凶生然必配人以論天始可謂善言天矣前識多中非偶然也雖然桑田之巫且以藝死也晉逸民傳介推介之推者文公之微臣也初從文公出亡公入賞從亡者推不言祿祿亦弗及推曰獻公之子九人唯君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜况貪天之功以為己力乎下義其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱遂隱而死公求之不獲以綿之田曰以志吾過且旌善人左傳史記介子推從者憐之懸書宫門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也求之則亡聞其入綿上山中于是環山而封之以為介推田號曰介山吕氏春秋文公反國介推不肯受賞自為賦詩曰有龍于飛周遍天下五蛇從之為之丞輔龍反其鄉得其處所四蛇從之得其露雨一蛇羞之橋死于中野懸書宫門而伏于山中文公聞之曰此介子推也令曰有善得子推者爵上卿田百萬或遇之山中負釡蓋䔲問焉曰介子推安在應之曰夫介子推茍不欲見而欲隱吾獨焉知之遂背而行終身不見新序以謂焚其山宜出及焚其山遂不出而焚死琴操介子綏割其腓股以餌重耳重耳復國子綏獨無所得乃作龍蛇之歌以感之終匿于山文公燔山求之子綏遂抱木而死文公令民五月五日不得發火韓非子子推無爵祿而義隨文公不忍口腹而仁割其肌說苑龍饑無食一蛇割股淮南子介子歌龍蛇而文君垂泣按諸說龍蛇之歌各異而有割股焚山之事說苑又有龍蛇之歌而作舟之僑又有三賞不及陶叔狐事蓋皆非實也虢老夫漁者老古附農夫虢老夫故虢人也文公田于虢遇老夫而問焉虢之為虢久矣子處此故矣虢亡其有說乎對曰虢君斷則不能諌則無與也不能斷又不能用人此虢之所以亡也公輟田而歸遇趙衰而告之趙衰曰其人安在公曰吾不與之來也趙衰曰古之君子聼其言而用其人今之君子聼其言而棄其身哀哉晉國之憂也公乃召賞之新序新序又曰文公出田逐獸碭入大澤迷不知所出中有漁者公謂曰我若君也道安從出漁者曰臣願有獻公曰出澤而受之出澤公曰子之所以教寡人者何等也願受之漁者曰鴻鵠保河海厭而徙之小澤則必有丸矰之憂黿鼉保深淵厭而出之淺渚則必有網羅釣射之憂今君逐獸碭入至此何行之太逺也公曰善哉謂從者記漁者名漁者曰君何以名為君其尊天事地敬社稷固四國慈愛萬民臣亦與焉君不敬社稷不固四國外失禮于諸侯內逆民心一國流亡漁者雖得厚賜不能保也君亟歸國臣亦反吾漁所新序文公逐麋而失之問農夫老古者吾麋何在老古以足指曰如是往公曰寡人問子以足指何也老古振衣而起曰一不意人君如此也虎豹之居也厭閒而近人故得魚鱉之居也厭深而之淺故得諸侯厭衆而亡其國詩云維鵲有巢維鳩居之君放不歸人將君之于是文公恐歸遇欒武子欒武子曰獵得獸乎而有說色文公曰寡人逐麋而失之得善言故有說色欒武子曰其人安在曰吾未與來也欒武子曰居上位而不恤其下驕也緩令急誅暴也取人之言而棄其身盜也文公曰善還載老古與俱歸按欒武子即欒書書當厲公時非文公也說誤重人重人者莫知其名景公十四年成五年梁山崩公以傳召伯宗伯宗辟重遇重載之車使之避也曰辟傳重人曰待我不如捷之速也捷邪出也問其所曰綘人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壞而崩可若何國主山川故山崩川竭君為之不舉去盛饌不舉樂絳服乘鰻車無文徹樂出次舍于郊祝幣陳玉帛史辭大史修言辭以謝過以禮焉其如此而已雖伯宗若之何伯宗請見之見之于晉君不可遂以告而從之左傳榖梁梁山崩壅河三日不流晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅河三日不流伯尊曰君為此召我也為之奈何曰君親素縞帥羣臣而哭之既而祠焉斯流矣伯尊至君問之伯尊曰君親素縞帥羣臣而哭之既而祠焉斯流矣孔子聞之曰伯尊其無績乎攘善也絳縣老人絳縣老人者蓋亦隱君子也平公十五年襄三十年悼夫人食輿人之城杞者悼夫人杞出也故晉城杞絳縣人或年長矣無子而往與于食有與疑年使之年疑其年老使言其年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季于今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也在文十一年是嵗也狄伐魯叔孫莊叔于是乎敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身下二如身是其日數也古亥字二晝在上三人在下故以二為首以六為身下亥字上二畫竪置身傍當為㤥字蓋以二首為二萬六身為六千六百六十日也士丐曰然則二萬六千六百有六旬也四百四十五甲子合得二萬六千七百日以其末三分六甲之一故少四十日實得二萬六千六百六十日也趙武問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能用吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶主衣服之官以為絳縣師縣師掌地域辨其夫家人民而廢其輿尉左傳杜蕢宰人附杜蕢者傳作屠蒯平公之宰也荀盈卒即知悼子未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀匕是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至于今既畢獻斯揚觶謂之杜舉記檀弓左傳蒯趨入酌以飲工曰女為君耳將司聰也辰在子卯謂之疾日君徹宴樂學人舍業為疾故也君之卿佐是謂股肱股肱虧女弗聞而樂是不聰也又飲外嬖嬖叔曰女為君目將司明也服以旌禮禮以行事事有其物物有其容今君之容非其物也而女不見是不明也亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也初公欲廢知氏而立其外嬖為是悛而止使荀盈之子躒佐下軍以說焉而進用蕢平公薨事昭公昭公薨頃公即位頃公將伐陸渾使蕢如周請有事于雒與三塗雒水名三塗山名在陸渾南託祭山川以為名使荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知師從之遂滅陸渾左傳韓非子文公時宰臣上炙而髮繞之公召宰人而譙之曰汝欲寡人之哽邪奚為以髮繞炙宰人頓首再拜請曰有死罪三援礪砥刀利猶干將也切肉肉斷而髮不斷臣罪一也援木而貫臠而不見髮臣罪二也奉熾爐炭火盡赤紅炙熟而髮不燒臣罪三也堂下得無微有疾臣者乎公曰善乃召堂下譙之果然乃誅之古乘田差晏咎犯公子子附古乘者晉之舟人也平公遊于河而樂之歎曰安得賢士而與處焉古乘對曰夫珠玉無足去此數千里而來者人好之也今士有足而不來者是吾君不好之乎公曰吾客千人朝食不足暮收市征暮食不足朝收市征吾尚可謂不好士乎對曰鴻鵠髙飛逺翔其所恃者六翮也背上之毛腹下之毳無尺寸之數去之滿把飛不能為之卑益之滿把飛不能為之髙不知客千人者有六翮之用乎將盡毛毳也韓詩外傳一作盍胥新序作固桑說苑作趙簡子事新序平公為馳逐之車龍旌羽芝立于殿下令羣臣觀焉田差三過而不顧公怒差曰臣聞說天子者以天下說諸侯者以國說大夫者以官說士者以事說農者以食說婦者以織桀以奢亡紂以淫敗是以不敢顧也新序平公好樂敢諌者死有咎犯者以樂見公曰內之殿上出鐘磬竽瑟曰容子為樂咎犯對曰臣不能為樂臣善隱公召隱士十二人咎犯申左臂而詘五指公問隱官隱官皆不知公曰歸之咎犯申其一指曰一也便遊赭盡而峻城闕二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有饑色而馬有粟秩五也近臣不聼諌逺臣不敢達公曰善韓詩外傳平公藏寶之臺燒士大夫救火三日乃勝之公子晏子獨束帛而賀公勃然曰士大夫皆趨救之子獨賀何也公子晏子曰臣聞之王者藏于天下諸侯藏于百姓商賈藏于篋匱今百姓短褐不蔽形糟糠不充口而收大半藏之臺是以天火之昔者桀殘海內賦斂無度故湯誅之為天下戮笑今天降災于臺是君之福也而不知變悟亦恐為鄰國笑矣公曰善自今已往請藏于百姓之間論曰聖人之道一龍一蛇畚鍤之間牛口之下其為龍蛇也多矣微伯趙絳之二老亦卒委蛇而已夫狼瞫狼瞫晉人襄公元年僖三十三年秦使孟明視襲鄭我師擊之戰于殽戰之明日襄公縳秦囚使右萊駒以戈斬之囚呼萊駒失戈瞫取戈以斬囚禽之以從公乘遂以瞫為右秋狄伐我及箕晉地我禦之先軫黜瞫瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與汝為難瞫曰周志有之勇則害上不登于明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之三年文二年秦師伐我以報殽我禦之戰于彭衙秦地既陳瞫以其屬馳秦師死焉我師從之大敗秦師君子謂狼瞫于是乎君子怒不作亂而以從師可謂君子矣左傳鉏麑提彌明靈輒鉏麑者晉力士也靈公不君趙盾驟諌公患之使麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一于此不如死也觸槐而死提彌明者為趙盾車右公飲盾酒伏甲將攻之明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之盾曰棄人用犬雖猛何為鬬且出明死之靈輒者亦晉人也初盾田于首山舍于翳桑桑之多䕃翳者見輒餓問其病曰不食三日矣食之舍其半問之曰宦三年矣宦學也未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸槖以與之既而與為公介甲士倒㦸以禦公徒以免盾問何故對曰翳桑之餓人也問其名居不告而退左傳論曰狼􅀈授命于敵以蓋無勇能用其勇矣靈輒倒戈以酬簞食能用其義矣聞其風者可以厚俗鉏麑忠信死以自完然宣子為民之主必俟朝服假寐而後知之邪晉夫人傳姜氏穆夫人賈氏齊姜狐姬小戎子獻公妾姜氏者齊女穆矦夫人生文侯仇及桓叔成師左傳賈氏賈姬姓國獻公夫人無子齊姜者齊女為武公妾獻公蒸之生大子申生及秦穆夫人大戎狐姬大戎唐叔子孫别在戎狄者姬姓以狐為氏伯行之子伯行狐夫子空也狐偃其兄弟也生文公重耳小戎子小戎允姓之戎生惠公夷吾左傳驪姬獻夫人驪姬驪戎之女獻公伐驪戎以驪姬歸立為夫人生奚齊其娣生卓子驪姬嬖與里克成謀將立其子奚齊乃謂大子曰君夢齊姜必速祭之大子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子大子自殺姬遂譖重耳夷吾曰皆知之重耳奔蒲夷吾奔屈奚齊竟得立左傳公薨里克殺奚齊卓子及驪姬國語列女傳戮驪姬鞭而殺之姜氏季隗文嬴懷嬴文夫人杜祁逼姞文公妾姜氏齊宗女文公以難之齊齊桓公妻之有馬二十公安之從者以為不可將行謀于桑下蠶妾在其上以告姜氏姜氏殺之而謂公曰子有四方之志其聞之者吾殺之矣公曰無之姜曰行也懷與安實敗名公不可姜與狐偃謀醉而遣之左傳國語孝公即位諸侯叛齊子犯知齊之不可以動而知文公之安齊而有終焉之志也欲行而患之與從者謀于桑下蠶妾在焉莫知其在也妾告姜氏姜氏殺之而言于公子曰從者將以子行其聞之者吾已除之矣子必從之不可以二二無成名詩云上帝臨女無二爾心先王其知之矣二將可乎子去晉難而極于此自子之行晉無寧嵗民無成君天未喪晉無異公子有晉國者非子而誰子其勉之上帝臨子矣二必有咎公子曰吾不動矣必死于此姜曰不然周詩曰莘莘征夫每懷靡及夙夜征行不遑其處猶懼無及况其順身縱欲懷安將何及矣人不求及其能及乎日月不處人誰獲安西方之書有之曰懷與安實疚大事鄭詩云仲可懷也人之多言亦可畏也昔管敬仲有言小妾聞之曰畏威如疾民之上也從懷如流民之下也見懷思威民之中也畏威如疾乃能威民威在民上弗畏有刑從懷如流去威逺矣故謂之下其在辟也吾從中也鄭詩之言吾其從之此大夫管仲之所以紀綱齊國禆輔先君而成霸者也子而棄之不亦難乎齊國之政敗矣晉之無道久矣從者之謀忠矣時日及矣公子幾矣君國可以濟百姓而釋之者非人也敗不可處時不可失忠不可棄懷不可從子必速行吾聞晉之始封也嵗在大火閼伯之星也實紀商人商人之饗國三十一王瞽史之記曰唐叔之世將如商數今未半也亂不長世公子唯子子必有晉若何懷安公子弗聼姜與子犯謀醉而載之以行季隗牆咎如之女也赤狄之别種文公在狄狄人伐牆咎如獲其二女叔隗季隗納諸公公取季隗生伯倏叔劉公將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子及公入狄人歸季隗于晉左傳文嬴秦穆公之女也文公之秦秦伯妻之公入以吕郤吕甥郤芮之難潛㑹秦伯于王城秦伯誘殺吕郤公逆嬴氏以歸及公薨秦襲鄭襄公敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之左傳懷嬴又曰辰嬴亦秦女也大子圉為質于秦秦妻之及將逃歸謂嬴氏曰與于歸乎對曰子晉大子而辱于秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言圉遂逃歸左傳及文公之秦秦伯納女五人懷嬴與焉秦伯見公曰寡人之適音嫡此為才子圉之入備嬪嬙焉欲以成婚而懼離其惡名非此則無故言懼為子圉妻恐離其惡名非有此則無他故不敢以禮致之歡之故也不敢以婚姻正禮致之歡愛此女之故公子有辱寡人之罪唯命是聼公欲辭胥臣臼季曰兄弟為同姓今子于子圉道路之人也取其所棄以濟大事不亦可乎公謂狐偃曰何如對曰將奪其國何有于妻唯秦所命從也謂趙衰曰何如對曰今將婚媾以從秦受好以愛之聼從以德之懼其未可也又何疑焉乃歸嬴而納幣且逆之國語公使奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公懼降服而囚左傳嬴生公子樂杜祁逼姞並文公妾祁杜伯之後姞姞姓之女杜祁生公子雍逼姞生襄公杜祁以君故讓逼姞而上之以狄故讓季隗而已次之左傳穆嬴襄夫人悼夫人少姜平公妾穆嬴秦女襄公夫人生靈公襄公薨靈公少趙盾迎公子雍于秦將立之穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首于盾曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何盾與諸大夫皆患之且畏逼乃立靈公左傳悼夫人悼公夫人平公母杞孝公之姊妹也故平公使荀盈合諸侯之大夫以城杞城杞者悼夫人皆食之又使女叔齊如魯治杞田左傳少姜齊女平公之妾也平公使韓須如齊逆女齊陳無宇送女致少姜少姜有寵于公公謂之少齊謂陳無宇非卿欲使齊以適夫人禮送少姜執諸中都少姜為之請曰送從逆班畏大國也猶有所易是以亂作韓須公族大夫陳無宇上大夫言齊畏晉改易禮制使上大夫送女反致此執辱之罪已而少姜卒陳無宇乃歸左傳論曰申生無故奚齊卓子為羣公子長享其祿可也乃驪姬易之欲從而顛及適速其子不亦酷乎興戎于內卒為𨽻農死而有知齊姜將嘻其笑矣趙姬公子也而下叔隗使其三子下盾括遂得為公族大夫驪姬惡知夫裕以下人乃自裕哉晉列女傳叔隗趙姬叔隗趙姬並趙衰妻叔隗狄女趙姬文公之女也文公處狄狄人伐牆咎如赤狄别種獲其二女叔隗季隗納諸文公公取季隗以叔隗妻趙衰生盾復以己女妻衰生原同屏括樓嬰及文公入立狄人歸季隗于我趙姬請逆盾與其母衰辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之左傳羊舌職妻羊舌職妻肸即叔向之母也肸母妬虎即叔虎之母美而不使不使見職其子皆諌其母母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生虎美而有勇力欒盈嬖之故羊舌氏之族及于難左傳及鮒即叔魚之生也母視之曰是虎目而豕喙鳶肩而牛腹溪壑可盈是不可厭也必以賄死遂弗視國語列女傳羊叔姬者羊舌子之妻叔向叔魚之母也羊舌子好正不容于晉去之三室之邑邑人相與攘羊而遺之不受叔姬曰夫子居晉不容去之又不容于三室之邑不如受之羊舌子受之曰為肸與鮒烹之叔姬曰不可南方有鳥名曰乾吉食其子不擇肉子常不遂今肹與鮒童子也隨大夫而化者不可食以不宜之肉不若埋之以明不與後二年攘羊之事發都吏至羊舌子曰吾受之不敢食也發而視之則其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣漢儒荒謬更生亦爾初肸欲娶于申公巫臣氏夏姬女母欲娶其黨肸曰吾母多而庶鮮吾懲舅氏矣母曰子靈之妻殺三夫陳御叔楚襄老及巫臣一君陳靈公一子夏徵舒而亡一國陳地兩卿孔寧儀行父可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉鄭靈公子貉早死無後而天鍾美于是將必以是大有敗也昔有仍氏生女黰黑而甚美光可以鑑名曰𤣥妻樂正后䕫取之生伯封實有豕心貪婪無饜忿纇無期謂之封豕有窮后羿滅之䕫是以不祀且三代之亡共子即申生之廢皆是物也女何以為哉夫有尤物足以移人茍非德義則必有禍肸懼不敢取平公强使取之生陽食我始生赤即伯華之妻走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視左傳伯宗妻伯宗妻州犂之母也伯宗朝以喜歸其妻曰子貌有喜何也曰吾言于朝諸大夫皆謂我知似陽子對曰陽子華而不實主言而無謀是以難及其身子何喜焉伯宗曰吾飲諸大夫酒而與之語爾試聼之曰諾既飲其妻曰諸大夫莫子若也然而民不能戴其上久矣難必及子子盍亟索士憖庇州犂焉得畢陽及欒弗忌之難諸大夫害伯宗將謀而殺之畢陽送州犂于荆國語列女傳范獻子之三子逰于趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三德使民設令伐株于山將有馬為也已而閒囿示之株夫山逺而囿近民說一矣去險阻之山而伐平林之株民說二矣既畢而賤賣民說三矣簡子從之民果大說少子伐其謀歸以告母母喟然歎曰滅范氏者必是子也按范獻子之子曰士吉射一人而已列女傳佛肸以中牟叛趙法叛者身死家收佛肸之母將論自言死不當襄子見而問之曰母不能教子使至于反何為不當死也母曰吁妾之職盡久矣此乃在于主君妾聞子少而慢者母之罪也長而不能使者父之罪也今子少而不慢長而能使妾何負哉妾能為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有暴臣妾無暴子是以言妾無罪也襄子曰善遂釋之列女傳女娟者河津之女初趙簡子南擊楚與津吏期簡子至津吏醉不能渡簡子欲殺之娟曰妾父聞主君來渡不測之水恐風波之起水神動駭故禱祀之不勝杯酌餘瀝醉至于此君欲殺之妾願以鄙軀易父之死簡子曰非女子之罪也娟曰主君因其醉而殺之妾恐其身不知痛而心不知罪是殺不辜也願醒而殺之簡子遂釋不誅將渡用楫娟攘卷操楫而請曰妾願備父持楫簡子曰不榖義不與婦人同舟而渡娟曰妾聞湯伐夏左驂牝驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝䮲而遂克紂與妾同舟又何傷乎簡子說遂與渡中流發河激之歌其辭曰升彼阿兮面觀清水揚波兮杳𡨕𡨕禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持楫兮操其維蛟龍助兮主將歸呼來櫂兮行勿疑簡子大說將使祝祓以為夫人娟辭曰婦人之禮非媒不嫁嚴親在內不敢聞命簡子歸納幣于父母立以為夫人列女傳弓工妻者晉繁人之女也平公使其夫為弓三年乃成平公引弓而射不穿一札公怒將殺弓人弓人之妻請見曰妾夫造此弓其幹生于太山之阿一日三覩隂三覩陽傅以燕牛之角纒以荆麋之筋糊以河魚之膠此四者天下之妙選也而君不能穿一札是君不能射也妾聞射之道左手如拒右手如附枝右手發之左手不知公以其言而射穿七札韓詩外傳作齊景公說多支離尚史卷四十六
