  - {type: page-break, offset: 0, content: '', id: KR2d0024_WYG_093-1a, image: WYG0405/WYG0405-0598a.png}
body:
  text: 尚史巻九十四志二鑲白旗漢軍李鍇撰天文志日有中道中道者黄道一曰光道光道北至東井去北極近南至牽牛去北極遠東至角西至婁去極中夏至至于東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至于牽牛遠極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極遠近之差晷景長短之制也去極遠近難知要以晷景晷景者所以知日之南北也日陽也陽用事則進而北晝進而長陽勝故為温暑隂用事則日退而南晝退而短隂勝故為寒凉也若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也一曰晷長為潦短為旱奢為扶鄭氏注扶當作蟠蟠止不行也一説奢景形奢大扶附也扶者邪臣進而正臣疏君子不足姦人有餘漢志周以土圭致日土圭者尺有五寸大司徒以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中周禮康成注晝漏半而置土圭表隂陽審其南北景短于土圭謂之日南地于日為近南也景長于土圭謂之日北地于日為近北也東于土圭謂之日東地于日為近東也西于土圭謂之日西地于日為近西也凡日景于地千里而差一寸景尺有五寸者南戴日下萬五千里地與星辰四遊升降于三萬里之中是以半之得地之中也賈公彦疏周公度日景之時置五表于潁州陽城置一表為中表中表南千里置一表北千里置一表東千里置一表西千里置一表中表之南晝漏半立八尺之表表北景得尺四寸不滿尺五寸不與土圭等是地于日為近南景短多暑中表之北亦晝漏半表北得尺六寸景是地于日為近北景長多寒中表之東亦于晝漏半中表景得正時東表日已昳矣是地于日為近東晝漏半已得夕景故云景夕多風中表之西亦于晝漏半中表景得正時西表日未中仍得朝時之景故云景朝多隂南戴日下萬五千里者景一寸差千里地中尺五寸景去南戴日下萬五千里也地與星辰四遊升降者考靈耀文言春分之時地與星辰復本位至夏至地與星辰東南遊萬五千里下降亦然至秋分還復正至冬至地與星辰西北遊亦萬五千里上升亦然至春分還復正進退不過三萬里是以半之得地之中也按日行之道曰黄道恒星之天曰天體黄道與恒星之天相錯而推移焉是以當堯之時春分日在昴昬星中夏至日在張昬心中秋分日在房昬虛中冬至日在虛昬昴中而月令則春分日在奎昬弧中夏至日在井昬亢中秋分日在角昬牛中冬至日在斗昬壁中漢志則春分日在婁昬栁中夏至日在井昬氐中秋分日在角昬牛中冬至日在牛昬奎中所以然者嵗差之謂也葢天有三百六十五度四分度之一嵗有三百六十五日四分日之一天度四分之一而有餘嵗日四分之一而不足故天漸差而西嵗漸差而東也古厯簡易未立差法漢洛下閎知以八百年當差一度至晉虞喜立嵗差以五十年退一度為太過何承天倍其年又不及至隋劉焯取中數七十五年唐一行大衍厯定為八十三年宋紀元厯定為七十八年尤為最密故測日者止可倚晷景之短長以度去極之差不可膠恒星之度數以畫分至之限也然則漢志所謂黄道北至東井南至牽牛東至角西至婁者特一時之定程要非天體之妙㣲也又按天之樞為南北兩極其北極由地上常見之天以至南極百八十度南極由地下常隠之天以至北極亦百八十度分兩極而中畫之各九十度曰赤道赤道者東西建標南北定緯術者所由立算而天實無所謂赤道者也黄道則斜絡天腹半出赤道南半出赤道北其南當午距赤道二十三度半强而止其北當子距赤道亦如之而東西則與赤道交于卯酉是故春分日當兩道之交則晝夜平寒暑均八尺之表而晷景長七尺三寸六分過此則循黄道而漸出赤道北至夏至造其極故晝長多暑八尺之表晷景長尺五寸八分秋分又當兩道之交故晝夜又平寒暑又均八尺之表晷景長七尺三寸六分過此則循黄道而漸出赤道南至冬至造其極故晝短多寒八尺之表晷景長丈三尺一寸四分此晷景長短之所由四時寒暑之所以變也天運左旋無所遊移此體中立無所偏薄鄭氏雜取緯書以為夏至地與星辰東南遊萬五千里冬至地與星辰西北遊萬五千里地與星辰四遊升降于三萬里之中其説支離非周土圭之舊灋乎兩軍相當日暈暈等力鈞厚長大有勝薄短小無勝重抱大破無抱為和背不和為分離相去直為自立立侯王指暈若曰殺将負且戴有喜圍在中中勝在外外勝青外赤中以和相去赤外青中以惡相去氣暈先至而後去居軍勝先至先去前利後病後至後去前病後利後至先去前後皆病居軍不勝見而去其發疾雖勝無功見半日以上功大白虹屈短李竒曰屈或為尾韋昭曰短而直上下兑有者下大流血日暈制勝近期三十日遠期六十日其食食所不利復生生所利而食益盡為主位以其直及日所宿加以日時用命其國天官書月有九行黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一决房中道漢志索隠中道房室星之中間也房有四星若人之房三間有四表然故曰房南為陽間北為隂間中道房星之中間也故房星是日月五星之常行道宋祁注朱子文云房當作於是未知房為中道也月行中道安寧和平隂間多水隂事外北三尺隂星北三尺太隂大水兵陽間驕恣陽星多暴獄太陽大旱喪也索隠太隂太陽皆道也太陽亦在陽間之南各三尺按注殊是義未明晰竊謂隂星下北三尺三字當作南三尺在陽星上陽星下多暴獄三字當在驕恣下言月行隂間則多水隂事隂間近北三尺為隂星氣屬太隂其應主大水與兵陽間則驕恣多暴獄陽間亦近南三尺為陽星氣屬太陽其應主大旱與喪也角天門十月為四月十一月為五月十二月為六月水發近三尺遠五尺索隠謂月行入角與天門若十月犯之當為來年四月成災十一月則主五月也犯四輔輔臣誅索隠四輔房四星也行南北河以隂陽言旱水兵喪月蝕嵗星正義凡星入月見月中為星蝕月月掩星星滅為月蝕星其宿地饑若亡熒惑也亂填星也下犯上太白也彊國以戰敗辰星也女亂食大角主命者惡之心則為内賊亂也列星其宿地憂天官書凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分之星為候日東行星西轉日行疾則星西轉疾事埶然也故過中則疾君行急之感也不及中則遲君行緩之象也至月行則以晦朔决之箕星為風東北之星也東北地事天位也孟康曰東北陽日月五星起于牽牛故為天位坤在西南紐于陽為地統故為地事巽在東南為風風陽中之隂大臣之象其星軫也月去中道移而東北入箕若東南入軫則多風西方為雨雨少隂之位也月失中道移而西入畢則多雨星𫝊曰月入畢則將相有以家犯罪者言隂盛也月南入牽牛南戒民間疾疫月北入太㣲出坐北若犯坐則下人謀上一曰月為風雨日為寒温冬至日南極晷長南不極則温為害夏至日北極晷短北不極則寒為害政治變于下日月運于上矣漢志月食始日五月者六六月者五五月復六六月者一而五月者五凡百一十三月而復始索隠始日謂蒼始起之日也依此文計惟有一百二十一月與元數甚為懸校既無太初厯術不可得而推定以漢志統厯法計則五月者七六月者一又五月者一六月者五五月者一凡一百三十五月而復始耳或術家各異或傳寫錯謬無以明也故月蝕常也月蝕為不臧也日蝕國君月蝕將相當之天官書察日月之行以揆嵗星順逆晉灼云太嵗在四仲嵗行三宿在四孟四季嵗行二宿二八十六三四十二而行二十八宿十二嵗而周天曰東方木主春日甲乙義失者罰出嵗星漢志嵗星東方春木于人五常仁也五事貎也仁虧貌失逆春令傷木氣罰見嵗星以其舍命國所在國不可伐可以伐人其趨舍而前曰贏退舍曰縮贏其國有兵不復縮其國有憂將亡國傾敗其所在五星皆從而聚于一舍其下之國可以義致天下以攝提格嵗嵗隂左行在寅嵗星右轉居丑正月與斗牽牛晨出東方名曰監徳索隠星在斗牛失次應見于杓與甘氏及太初厯所在之宿不同色蒼蒼有光其失次有應見桞嵗早水晩旱嵗星出東行十二度百日而止反逆行逆行八度百日復東行嵗行三十度十六分度之七率日行十二分度之一十二嵗而周天出常東方以晨入于西方用昬單閼嵗嵗隂在卯星居子以二月與婺女虛危晨出曰降入大有光其失次有應見張嵗大水執徐嵗嵗隂在辰星居亥以三月與營室東壁晨出曰青章青青甚章其失次有應見軫嵗早旱晚水大荒駱嵗嵗隂在巳星居戍以四月與奎婁胃昴晨出曰跰踵徐廣曰一曰路嶂熊熊赤色有光其失次有應見亢敦牂嵗嵗隂在午星居酉以五月與胃昴畢晨出曰開明徐廣曰一曰天津炎炎有光偃兵唯利公王不利治兵其失次有應見房嵗早旱晩水叶洽嵗嵗隂在未星居申以六月與觜觹參晨出曰長列昭昭有光利行兵其失次有應見箕涒灘嵗嵗隂在申星居未以七月與東井輿鬼晨出曰大音昭昭白其失次有應見牽牛作鄂嵗嵗隂在酉星居午以八月與栁七星張晨出曰為長王作作有芒國其昌熟穀其失次有應見危有旱而昌有女喪民疾閹茂嵗嵗隂在戌星居巳以九月與翼軫晨出曰天睢白色大明其失次有應見東壁嵗水女喪大淵獻嵗嵗隂在亥星居辰以十月與角亢晨出曰大章徐廣曰一曰大星蒼蒼然星若躍而隂出旦是謂正平起師旅其率必武其國有徳將有四海其失次有應見婁困敦嵗嵗隂在子星居卯以十一月與氐房心晨出曰天泉𤣥色甚明江池其昌不利起兵其失次有應在昴赤奮若嵗嵗隂在丑星居寅以十二月與尾箕晨出曰天皓黫然黑色甚明其失次有應見參當居不居居之又左右揺未當去去之與他星㑹其國凶漢志所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安静中度吉所居久國有徳厚其角動乍小乍大若色數變人主有憂其失次舍以下進而東北孟康曰五星東行天西轉嵗星晨見東方行疾則不見不見則變為祅星三月生天棓長四尺末兌漢志嵗星贏而東北石氏見覺星甘氏不出三月迺生天棓本類星末鋭長四尺史記正義末鋭長四丈出東北方西方天下兵爭進而東南三月生彗星長二丈類彗星漢志嵗星贏而東南石氏見彗星甘氏不出三月迺生彗本類星末類彗長二丈史記正義天彗一名掃星小者數寸長長或竟天體無光假日之光夕見東指晨見西指見則兵起除舊布新所指之處弱退而西北孟康曰嵗星當伏西方行遊早没變為祅星三月生天欃長四丈末兌漢志嵗星縮而西北石氏見欃雲如馬甘氏不出三月迺生天欃本類星未鋭長數丈京房云天欃為真赤地千里枯骨籍籍退而西南三月生天槍長數丈兩頭兑謹視其所見之國不可舉事用兵漢志嵗星縮而西南石氏見槍雲如牛甘氏不出三月迺生天槍左右鋭長數大槍欃棓彗異狀其殃一也必有破國亂君伏死其辜其出如浮如沉其國有土功如沉如浮其野亡色赤而有角其所居國昌迎角而戰者不勝星色赤黄而沉所居野大穰色青白而赤灰所居野有憂自如浮如沉以下皆謂嵗星嵗星入月其野有逐相與太白鬬其野有破軍嵗星一曰攝提曰重華曰應星曰紀星營室為清廟嵗星廟也察剛氣以處熒惑晉灼云常以十月入太㣲受制而出行列宿司無道出入無常曰南方火主夏日丙丁禮失罰出熒惑熒惑失行是也漢志南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑出則有兵入則兵散以其舍命國為勃亂殘賊疾喪饑兵天官占熒惑伺驕奢亂孽其精為風伯惑童兒歌謡嬉戲反道二舍以上居之三月有殃五月受兵七月半亡地九月大半亡地因與俱出入國絶祀居之殃還至雖大當小久而至當小反大其南為丈夫北為女子喪若角動繞環之及乍前乍後左右殃益大與他星鬭光相逮為害五星相從聚于一舍正義三星合為驚位絶行其國外内有兵與喪民饑改立侯王四星合為太陽其國兵喪暴起君子憂小人流五星合為易行有徳受慶掩有四方無徳受殃乃以滅亡其下國可以禮致天下法出東行十六舍而止行二舍六旬復東行自所止數十舍十月而入西方伏行五月出東方其出西方曰反明主命者惡之東行急一日行一度半其行東西南北疾也兵各聚其下用戰順之勝逆之敗熒惑從太白軍憂離之軍却出太白隂有分軍行其陽有偏將戰當其行太白逮之破軍殺將其入守犯太㣲軒轅營室主命惡之心為明堂熒惑廟也謹候此厯斗之㑹以定填星之位晉灼云常以甲辰之元始建斗嵗鎮一宿二十八嵗而周天曰中央土主季夏日戊巳黄帝主徳女主象也嵗填一宿漢志中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填星迺為之動其所居國吉未當居而居若已去而復還還居之其國得土不乃得女若當居而不居既已居之又東西去其國失土不乃失女不可舉事用兵其居久其國福厚易福薄其一名曰地侯主嵗嵗行十二度百十二分度之五日行二十八分度之一二十八嵗而周天其所居五星皆從而聚于一舍其下之國可重致天下禮徳義殺刑盡失填星乃為之動揺贏為王不寧縮有軍不復填星色黄九芒音曰黄鐘宫其失次上二三宿曰贏有主命不成不乃大水失次下二三宿曰縮有后戚其嵗不復不乃天裂若地動斗為文太室填星廟天子之星也木星與土合為内亂饑主勿用戰敗水則變謀而更事火為旱金為白衣㑹若水金在南曰牝牡年穀熟金在北嵗偏無索隠嵗陽也太白隂也故曰牝牡火與水合為焠與金合為鑠為喪皆不可舉事用兵大敗土為憂生孽卿大饑戰敗為北軍軍困舉事大敗土與水合穰而擁閼有覆軍不可舉事出亡地入得地金為疾為内兵亡地三星若合其宿地國外内有兵與喪改立公王四星合兵喪並起君子憂小人流五星合是為易行有徳受慶改立大人奄有四方子孫蕃昌無徳受殃若亡填星出百二十日而逆西行西行百二十日反東行見三百三十日而入入三十日復出東方太嵗在甲寅填星在東壁故在營室察日行以處位太白晉灼曰常以正月甲寅與熒惑晨出東方二百四十日而入又出西方二百四十日而入入三十五日而復出東方爾雅注晨出東方髙三丈命曰啟明昬見西方髙三舍命曰太白曰西方秋司兵月行及天矢正義太白五芒出早為月蝕晩為天矢及彗其精散為天杵天椨伏靈大敗司奸天狗賤星天殘卒起星是古厯星若竹彗牆星猿星白彗皆以示變日庚辛主殺殺失者罰出太白漢志西方秋金義也言也義虧言失逆秋令傷金氣罰見太白太白失行以其舍命國其出行十八舍二百四十日而入入東方伏行十一舍百三十日其入西方伏行三舍十六日而出當出不出當入不入是謂失舍不有破軍必有國軍之簒其紀上元索隠上元是古厯之名以攝提格之嵗與營室晨出東方至角而入與營室夕出西方至角而入與角晨出入畢與角夕出入畢與畢晨出入箕與畢夕出入箕與箕晨出入栁與箕夕出入栁與栁晨出入營室與栁夕出入營室凡出入東西各五為八嵗二百二十日復與營室晨出東方其大率嵗一周天其始出東方行遲率日半度一百二十日必逆行一二舍上極而反東行行日一度半一百二十日入其庫近日曰明星柔髙遠日曰大囂剛其始出西行疾率日一度半百二十日上極而行遲日半度百二十日旦入必逆行一二舍而入其庫近日曰太白柔髙遠日曰大相剛出以辰戌入以丑未當出不出未當入而入天下偃兵兵在外入未當出而出當入而不入下起兵有破國其當期出也其國昌其出東為東入東為北方出西為西入西為南方所居久其鄉利疾其鄉凶出西逆行至東正西國吉出東至西正東國吉其出不經天經天天下革政孟康云太白隂星出東當伏東出西當伏西過午為經天晉灼曰日陽也日出則星没太白晝見午上為經天小以角動兵起始出大後小兵弱出小後大兵强出髙用兵深吉淺凶庳淺吉深凶日方南金居其南日方北金居其北曰贏康成云方猶向也謂晝漏半而置土圭影短于土圭謂之日南地于日為近南也長于土圭謂之日北地于日為近北也侯王不寧用兵進吉退凶日方南金居其北日方北金居其南曰縮侯王有憂用兵退吉進凶用兵相太白太白行疾疾行行遲遲行角敢戰動揺躁躁國以静静順角所指吉反之凶出則出兵入則入兵赤角有戰白角有喪黑圜角憂有水事青圜小角憂有木事黄圜和角有土事有年其已出三日而復㣲入入三日乃復盛出是謂耎其下國有軍敗將北其已入三日又復㣲出出三日而復盛入其下國有憂師有糧食兵革遺人用之卒為人虜其出西失行外國敗出東失行中國敗其色大圜黄􅗍可為好事其圜大赤兵盛不戰太白白比狼赤比心黄比參左肩蒼比參右肩黑比奎大星五星皆從太白而聚一舍其下之國可以兵從天下居實有得居虛無得索隠實謂星所合居之宿虛謂贏縮行勝色色勝位有位勝無位有色勝無色行得盡勝之晉灼云行應天度雖有色得位行盡勝之行重而色位輕星經得作徳出而留桑榆間疾其下國上而疾未盡期日過參天疾其對國上復下下復上有反將其入月將僇金木星合光其下戰不合兵雖起而不鬭合相毁野有破軍出西方昬而出隂隂兵彊暮食出小弱夜半出中弱雞鳴出大弱是謂隂陷于陽其在東方乘明而出陽陽兵之彊雞鳴出小弱夜半出中弱昬出大弱是謂陽陷于隂太白伏也以出兵兵有殃其出卯南南勝北方出卯北北勝南方正在卯東國利出酉北北勝南方出酉南南勝北方正在酉西國勝其與列星相犯小戰五星大戰漢志太白軍也熒惑憂也熒惑從太白軍憂離之軍舒其相犯太白出其南南國敗出其北北國敗行疾武不行文色白五芒出蚤為月蝕晩為天矢及彗星將發其國出東為徳舉事左之迎之吉出西為刑舉事右之背之吉反之皆凶太白光見景戰勝晝見而經天是謂爭明彊國弱小國彊女主昌亢為疏廟太白廟也太白大臣也其號上公其他名殷星太正營星觀星宫星明星大衰大澤終星大相天浩序星月緯大司馬位謹候此察日辰之㑹以治辰星之位晉灼云常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二旬而入晨候之東方夕候之西方宋均曰辰星正四時之法與北辰同名廣雅辰星謂之免星曰北方水太隂之精主冬日壬癸刑失者罰出辰星漢志北方冬水智也聽也智虧聽失逆冬令傷水氣罰見辰星以其宿命國是正四時仲春春分夕出郊奎婁胃東五舍為齊仲夏夏至夕出郊東井輿鬼栁東七舍為楚仲秋秋分夕出郊角亢氐房東四舍為漢仲冬冬至晨出郊東方與尾箕斗牽牛俱西為中國其出入常以辰戌丑未其蚤為月蝕晩為彗星及天矢其時宜效不效為失追兵在外不戰一時不出其時不和四時不出天下大饑其當效而出也色白為旱黄為五穀熟赤為兵黑為水出東方大而白有兵于外解在東其赤中國勝西而赤外國利無兵于外而赤兵起其與太白俱出東方皆赤而角外國大敗其與太白俱出西方皆赤而角外國利五星分天之中積于東方中國利積于西方外國用者利五星皆從辰星而聚于一舍其所舍之國可以法致天下辰星不出太白為客其出太白為主出而與太白不相從野雖有軍不戰出東方太白出西方若出西方太白出東方為格野雖有兵不戰失其時而出為當寒反温當温反寒當出不出是謂擊卒兵大起其入太白中而上出破軍殺將客軍勝下出客亡地辰星來抵太白太白不去將死正旗上出旗星名有九星破軍殺將客勝下出客亡地視旗所指以命破軍其繞環太白若與鬭大戰客勝免過太白間可椷劍小戰客勝免居太白前軍罷出太白左小戰摩太白右數萬人戰主人吏死出太白右去三尺軍急約戰免七命曰小正辰星天攙安周星細爽能星鈎星索隠謂免星有七名命者名也其色黄而小出而易處天下之文變而不善矣青圜憂白圜喪赤圜中不平黑圜吉青角兵憂黑角水赤行窮兵之所終赤一作意或作志赤角犯我城黄角地之爭白角號泣之聲其出東方行四舍四十八日其數二十日而反入于東方其出西方行四舍四十八日其數二十日而反入于西方其一候之營室角畢箕栁出房心間地動辰星之色春青黄夏赤白秋青白而嵗熟冬黄而不明即變其色其時不昌春不見大風秋則不實夏不見六十日旱月蝕秋不見有兵春則不生冬不見隂雨六十日有流邑夏則不長七星為員官辰星廟蠻夷星也天官書五星皆大其事亦大皆小事亦小早出者為贏嬴者為客晩出者為縮縮者為主人贏縮必有天應見于杓同舍為合相凌為鬭七寸以内必之矣五星色白圜為喪旱赤圜中不平為兵青圜為憂水黑圜為疾多死黄圜則吉赤角犯我城黄角地之爭白角哭泣之聲青角有兵憂黑角則水意行窮兵之所終五星同色天下偃兵百姓寧昌天官書凡五星嵗緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不逮急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占古厯五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫厯者正行也古人有言曰天下太平五星循度亡有逆行日不食朔月不食望夏氏日月𫝊曰日月食盡主位也不盡臣位也星𫝊曰日者徳也月者刑也故曰日食修徳月食修刑然而厯紀推月食與二星之逆亡異熒惑主内亂太白主兵月主刑自周衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變内臣猶不治四裔猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也詩云彼月而食則惟其常此日而食于何不臧詩傳曰月食非常也比之日食猶常也日食則不臧矣謂之小變可也謂之正行非也故熒惑必行十六舍去日遠而顓恣太白出西方進在日前氣盛乃逆行及月必食于望亦誅盛也漢志二十八宿主十二州斗秉兼之言北斗所建主十二辰兼十二州二十八宿所從來久矣角亢氐兖州房心豫州尾箕幽州斗江湖牽牛婺女揚州虛危青州營室至東壁幷州奎婁胃徐州昴畢冀州觜觹參益州東井輿鬼雍州栁七星張三河翼軫荆州天官書自斗十一度至婺女七度曰星紀之次于辰在丑謂之赤奮若于律為黄鐘斗建在子吳越分野自婺女八度至危十六度曰𤣥枵之次于辰在子謂之困敦于律為大吕斗建在丑齊分野自危十七度至奎四度曰娵訾之次于辰在亥謂之大淵獻于律為太簇斗建在寅衛分野自奎五度至胃六度曰降婁之次于辰在戍謂之閹茂于律為夾鐘斗建在夘魯分野自胃七度至畢十一度曰大梁之次于辰在酉謂之作噩于律為姑洗斗建在辰趙分野自畢十二度至東井十五度曰實沈之次于辰在申謂之涒灘于律為中吕斗建在巳晉魏分野自井十六度至栁八度曰鶉首之次于辰在未謂之叶洽于律為蕤賔斗建在午秦分野自栁九度至張十七度曰鶉火之次于辰在午謂之敦牂于律為林鐘斗建在未周分野自張十八度至軫十一度曰鶉尾之次于辰在巳謂之大荒落于律為夷則斗建在申楚分野自軫十二度至氐四度曰夀星之次于辰在辰謂之執徐于律為南吕斗建在酉韓分野自氐五度至尾九度曰大火之次于辰在卯謂之單閼于律為無射斗建在戌宋分野自尾十度至斗十度百三十五分而終曰析木之次于辰在寅謂之攝提格于律為應鐘斗建在亥燕分野帝王世紀一曰秦之疆候太白占狼弧吳楚之疆候熒惑占鳥衡燕齊之疆候辰星占虛危宋鄭之疆候嵗星占房心晉之疆亦候辰星占參罰及秦幷吞三晉燕代自河山以南者中國中國于四海内則在東南為陽陽則日嵗星熒惑填星占于街南畢主之其西北則胡貉月氐旃裘引弓之民為隂隂則月太白辰星占于街北昴主之故中國山川東北流其維首在隴蜀尾沒于勃海碣石是以秦晉好用兵復占太白太白主中國而胡貉數侵掠獨占辰星辰星出入趮疾常主夷狄其大經也甲乙海外日月不占丙丁江淮海岱戊巳中州河濟庚辛華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷子周丑翟寅趙卯鄭辰邯鄲巳衛午秦未中山申齊酉魯戌吳越亥燕代漢志春秋元命苞五星流為兖州鈎鈐星别為豫州箕星散為幽州分為燕國牽牛流為揚州分為越國虛危之精流為青州分為齊國營室流為并州分為衛國天弓星流為徐州昴畢間為天街散為冀州分為趙國觜參流為益州東井鬼星散為雍州分為秦國軫星散為荆州分為楚國洛書甄曜度嶓冡山上為狼星武開山為地門上為天髙星荆山為地雌上為軒轅星大别山為地理以天合地以通三危山在鳥䑕之西南上為天苑星坆山在崑崙東南為地乳上為天糜星汶山之地為井絡帝以㑹昌神以建福上為天井星桐柏山為地穴鳥䑕同穴山之幹也上為掩畢星熊耳山地門也精上為畢附耳星春秋文耀鈎布度定記分州繫象華岐以西龍門積石至二危之野雍州屬魁星大行以東至碣石王屋砥柱冀州屬樞星三河雷澤東至海岱以北兖州屬機星䝉山以東至南江㑹稽震澤徐揚之州屬權星大别以東至雷澤九江荆州屬衡星荆山西南至岷山北嶇鳥䑕梁州屬開星外方熊耳以至泗水陪尾豫州屬揺星博雅同二緯之説一以山鎮上為列星一以北斗下屬九州竒詭獨異姑附識之以廣博聞按周官保章氏以星土辨九州之地所封封域各有分星以觀妖祥而春秋傳曰參為晉星商主大火國語亦有嵗之所在則我有周之分野是分野之説所從來久矣康成則謂其書已亡所存非古數然則周官之所謂分星不知其何等也至以二十八宿分主九州則有疑焉夫恒星為天體而二十八宿天體盡矣中國九州于地特十之一耳以周天之星囿以一隅之地是隘視天廣視中國如此以定妖祥未必然也賈公彦疏云呉越在南齊魯在東嵗星或北或西不依國地所在者此古受封之日嵗星所在之辰國屬焉故也此説似與周官為近説詳分野圖後國皇星大而赤狀類南極所出其下起兵兵彊其衝不利孟康曰嵗星之精散所為也五星之精散為六十四變記不盡晉志去地三丈如炬火主内冦内難或曰内外有兵喪昭明星大而白無角乍上乍下所出國起兵多變孟康曰形如三足杌杌上有九彗上向熒惑之精春秋合誠圖赤帝之精象如太白七芒釋名為筆星氣有一枝末鋭似筆亦曰日華星晉志赤彗分為昭明昭明滅光以為起霸起徳之徵五殘星出正東東方之野其星狀類辰星去地可六丈大孟康云星表有青氣暈有毛填星之精晉志一名五鏠或曰蒼彗大而赤數動主乖亡為五分毁敗之徵亦為備急兵見則主誅政在伯野亂成有急兵有喪不利衝賊星出正南南方之野星去地可六丈大而赤數動有光孟康云形如彗九尺太白之精晉志六賊南方之星五殘六賊出禍合天下逆侵闗樞其下有兵衝不利司危星出正西西方之野星去地可六丈大而白類太白孟康云星大而有毛兩角熒惑之精晉志數動察之而赤為乖争之徵主撃强兵見則主失法豪傑起天子以不義失國有聲之臣行主徳獄漢星出正北北方之野星去地可六丈大而赤數動察之中青此四野星所出出非其方其下有兵衝不利孟康云青中赤表下有二彗縱横亦填星之精晉志一名咸漢主逐王主刺王出則隂精横兵起其下又為喪動則諸侯驚四填星所出四隅去地可四丈晉志或曰星大而赤去地二丈常以亱半時出見十月而兵起地維咸光亦出四隅去地可三丈若月始出所見下有亂亂者亡有徳者昌晉志作藏光燭星狀如太白其出也不行見則滅所燭者城邑亂孟康云星上有三彗上出填星之精晉志或曰主星所出城邑亂有大道不成又以五色占如星非星如雲非雲命曰歸邪歸邪出必有歸國者邪音虵孟康云星有兩赤彗上向上有葢狀如氣下連星天狗狀如犬奔星有聲其下止地類狗所墮及炎火望之如火光炎炎衝天其下圜如數頃田處上兑者則有黄色千里破軍殺將孟康云星有尾旁有短彗下有如狗形者太白之精晉志主侯兵討賊或曰是將鬬人相食所往之鄉有流血其君失地兵大起國易政格澤星如炎火之狀黄白起地而上下大上兌其見也不種而穫不有土功必有大害格澤音鶴鐸晉志以為瑞星蚩尤之旗類彗而後曲象旗見則王者征伐四方孟康云熒惑之精吕氏春秋其色黄上下白晉志或曰赤雲獨見或曰其色黄上白下或曰若植雚而長或曰如箕可長二丈末有星主伐柱逆主惑亂所見之方下有兵兵大起不然有喪旬始出于北斗旁狀如雄雞其怒青黑象伏鼈怒當音帑晉灼曰帑雌也晉志主爭兵又黄彗分為旬始為立主之題主亂主招横見則臣亂兵作諸侯虐期十年聖人起伐羣猾横恣或曰出則諸侯雄鳴枉天類大流星虵行而倉黑望之如有毛羽然晉志主反萌主射愚見則謀反之兵合射所謀亦為以亂伐亂長庚如一匹布著天此星見兵起天官書彗星所謂掃星本類星末類彗小者數寸長或寛天見則兵起大水主掃除除舊布新有五色各依五行所主彗體無光傅日而為光故夕見則東指晨見則西指頓挫甚芒或長或短光芒所及則為災爾雅彗星為欃槍奔星為彴約孛星偏指曰彗芒氣四出曰孛孛者孛孛然惡氣之所生也内不有大亂則外有大兵天下合謀闇蔽不明有所傷害晏子曰君若不改孛星將出彗星何懼由是言之災甚于彗天棓一名覺星本類星末兌長四丈或出東北方西方主奮爭天槍其出不過三月必有破國亂君伏死其辜殃之不盡當為旱饑暴疾天欃石氏曰雲如牛狀甘氏曰本類星末兌主捕制天衝出如人蒼衣赤頭不動見則臣謀主武卒發天子亡晉志彗孛以下史記于五星内見之故不再録今依晉志增附之備妖星之全天精而見景星景星者徳星也其狀無常出于有道之國晉志瑞星有四一曰景星如半月生于晦朔助月為明或曰星大而中空或曰有三星在赤方氣與青方氣相連黄星在赤方氣中二曰周伯星黄色煌煌然所見之國大昌三曰含譽光耀似彗喜則含譽射四曰格澤不種而穫有土功有大客按周伯含譽二星甘石星經及史記皆無之志成于李淳風葢取荆州雜占諸説以入之而甚不可者為含譽何也夫彗者妖氣之所生天所以示變警人主也安有徳星而復以彗者乎象緯𤣥遠毫釐之差吉凶紊焉誰得而證之將使驕愎之主藉口于上阿䛕之臣肆奸于下逞而不懼遂而不悔必底于亡而後已不㡬戾天之仁乎今削之星者金之散氣本曰火孟康云星名星衆國吉少則凶漢者亦金之散氣其本曰水河圖括地象河精為天漢漢星多多水少則旱其大經也星隊至地則石也河濟之間時有隊星天鼓有音如雷非雷音在地而下及地其所往者兵發其下天官書嵗星之精流為天棓天槍天猾天衝國皇及登蒼彗熒惑散為昭旦蚩尤之旗昭明司危天欃赤彗填星散為五殘獄漢大賁昭星絀流旬始蚩尤虹蜺擊咎黄彗太白散為天杵天柎伏靈大敗司姦天狗天殘卒起白彗辰星散為枉矢破女拂樞滅實繞綎驚理大奮祀黒彗五色之彗各有長短曲折應焉河圖京房集星章妖星皆見于月旁互有五色方雲以五寅日見天槍天根天荆真若天㨬天樓天垣嵗星所生見以甲寅其星有兩青方在其旁天隂晉若官張天惑天崔赤若蚩尤熒惑所生出在景寅有兩赤方在其旁天上天伐從星天樞天翟天沸荆彗填星所生出在戊寅有兩黄方在其旁若星帚星若彗竹彗􅀈星㨬星白雚太白所生出在庚寅有兩白方在其旁天美天毚天社天麻天林天蒿端下辰星所生出以壬寅有兩黒方在其旁三十五星五行氣所生皆出于月左右方氣之中各以其所生星將出不出日數期候之當其未出之前而見見則有水旱兵喪饑亂所指亡國失地主死破軍殺將凡望雲氣仰而望之三四百里平望在桑榆上餘二千里登髙而望之下屬地者三千里雲氣有獸居上者勝自華以南氣下黒上赤嵩髙三河之交氣正赤恒山之北氣下黒上青勃碣海岱之間氣皆黑江淮之間氣皆白徒氣白土功氣黄車氣乍髙乍下往往而聚騎氣卑而布卒氣搏前卑而後髙者疾前方而髙後兑而卑者郄其氣平者其行徐前髙而後卑者不止而反氣相遇者卑勝髙兑勝方氣來卑而循車轍者不過三四日去之五六里見氣來髙七八尺者不過五六日去之十餘里見氣來髙丈餘二丈者不過三四十日去之五六十里見稍雲精白者其將悍其士怯其大根而前絶遠者當戰青白其前抵者戰勝其前赤而仰者戰不勝陣雲如立垣杼雲類杼軸雲搏兩端兑杓雲如繩者居前亘天其半半天其蛪者類闕旗蛪亦作蜺音同故鉤雲句曲諸此雲見以五色合占而澤搏密其見動人乃有占兵必起合鬬其直正朔所候决于日旁日旁雲氣人主象皆如其形以占故北夷之氣如羣畜穹閭南夷之氣類舟舩幡旗大水處敗軍場破國之虛下有積錢金寶之上皆有氣不可不察海旁蜄氣象樓臺廣野氣成宫闕然雲氣各象其山川人民所積聚故候息耗者入國邑視封疆田疇之正治城郭室屋門戸之潤澤次至車服畜産精華實息者吉虛耗者凶若烟非烟若雲非雲郁郁紛紛蕭索綸囷是謂卿雲卿雲見喜氣也若霧非霧衣冠而不濡見則其域被甲而趨天雷電蝦虹辟厯夜明者陽氣之動者也春夏則發秋冬則藏故候者無不司之天開縣物地動坼絶山崩及徙川塞谿垘水澹澤竭地長見象城郭門閭閨臬枯槀宫廟邸第人民所次謡俗車服觀民飲食五穀草木觀其所屬倉府廐庫四通之路六畜禽獸所産去就魚鼈鳥䑕觀其所處鬼哭皆呼其人逢俉俉迎也謂相逢而驚也化言誠然天官書南風謂之凱風東風謂之谷風北風謂之凉風西風謂之泰風焚輪謂之頽扶揺謂之猋風與火為庉迴風為飄日出而風為暴風而雨土為霾隂而風為曀風汜也其氣博汜而動物也天氣下地不應曰雺地氣發天不應曰霧霧謂之晦隂亂則為霧也螮蝀謂之雩螮蝀虹也蜺為挈貳蜺霓者隂陽之精虹攻也純陽攻隂氣也弇日為蔽雲即暈氣疾雷為霆霓隂陽相薄感而為雷激而為霆雷于天地為長子以其首長萬物為出入也二月出地百八十日雷出則萬物出入月入地百八十日雷入則萬物入入則除害出則興利也雨䨘為霄雪雲者隂之蓄積甚也暴雨謂之涷小雨謂之霡霂久雨謂之淫淫謂之霖濟謂之霽太平之時十日一雨凡嵗三十六雨此時若之應也爾雅凡候嵗美惡謹候嵗始嵗始或冬至日産氣始萌臘明日人衆卒嵗一㑹飲食發陽氣故曰初嵗正月旦王者嵗首立春日四時之卒始也四始者候之日臘明正月旦决八風風從南方來大旱西南小旱西方有兵西北戎菽為戎菽胡豆為成也小雨趣兵北方為中嵗東北為上嵗東方大水東南民有疾疫嵗惡故八風各與其衝對課多者為勝多勝少久勝亟疾勝徐旦至食為麥食至日昳為稷昳至餔為黍餔至下餔為菽下餔至日入為麻欲終日有雨有雲有風有日日當其時者深而多實無雲有風日當其時淺而多實有雲風無日當其時深而少實有日無雲不風當其時者稼有敗如食頃小敗熟五斗米頃大敗則風復起有雲其稼復起各以其時用雲色占種其所宜其雨雪若寒嵗惡是日光明聽都邑人民之聲聲宫則嵗善吉商則有兵徵旱羽水角嵗惡或從正月旦比數雨率日食一升至七升而極月一日雨民有一升之食二日雨民有二升之食如此至七日過之不占數至十二日日直其月占水旱月一日雨正月水為其環城千里内占則其為天下候竟正月月三十日周天厯二十八宿然後可占天下月所離列宿日風雲占其國然必察太嵗所在在金穰水毁木饑火旱此其大經也正月上甲風從東方宜蠶風從西方若旦黄雲惡冬至短極縣土炭先冬至三日縣土戻于衡兩端輕重適均冬至日陽氣至則炭重夏至日隂氣至則土重炭動鹿角解蘭根出泉出躍畧以知日至要决晷景嵗星所在五穀逢昌其對為衝嵗乃有殃言晷景嵗星行不失次則五穀昌盛行而失舍有所衝則嵗乃有禍殃自初生民以來世主厯日月星辰及至五家三代紹而明之五家黄帝髙陽髙辛堯舜三代夏殷周也幽厲以往尚矣所見天變皆國殊窟穴家占物怪以合時應其文圖籍禨祥不法是以孔子論六經紀異而説不書至天道命不傳傳其人不待告告非其人雖言不著昔之傳天數者髙辛之前重黎于唐虞羲和有夏昆吾殷商巫咸周室史佚萇𢎞于宋子韋鄭則禆竈在齊甘公楚唐昩趙尹臯魏石申夫天運三十嵗一小變百年中變五百載大變三大變一紀三紀而大備此其大數也為國者必貴三五即五家三代上下各千嵗然後天下之際續備甘石厯五星法唯獨熒惑有反逆行逆行所守及他星逆行日月薄蝕皆以為占日月薄蝕行南北有時此其大度也故紫宫中宫房心東宫權衡南宫咸池西宫虛危北宫列宿部星此天之五官坐位也為經不移徙大小有差闊狹有常水火金木填星此五者天之五佐為經緯五星行南北為經東西為緯見伏有時所過行贏縮有度日變修徳月變省刑星變結和凡天變過度乃占國君强大有徳者昌弱小飾詐者亡太上修徳其次修政其次修救其次修禳正下無之夫常星之變希見而三光之占亟用日月暈適暈日旁氣適日之將食先黑氣之有變雲風此天之客氣其發見亦有大運然其與政事俯仰最近天人之符此五者天之感動為天數者必通三五終始古今深觀時變察其精粗則天官備矣蒼帝行徳天門為之開王者行春令布徳澤則上應靈威仰之帝而天門為之開天門即左右角間赤帝行徳天牢為之空王者行徳以應火精之帝則天牢為之空夏陽主舒散故人主當赦過宥罪也黄帝行徳天矢為之起黄帝中央含樞紐之帝季夏萬物盛大當大赦含養羣品也風從西北來必以庚辛一秋中五至大赦三至小赦白帝行徳以正月二十日二十一日月暈圍常大赦載謂有太陽也一曰白帝行徳昴畢為之圍白帝西方白招拒之帝秋萬物咸成則暈圍昴畢三暮帝徳乃成也圍三暮徳乃成不三暮及圍不合徳不成二曰以辰圍不出其旬黑帝行徳天闗為之動黒帝北方叶光紀之帝冬萬物閉藏動為之開閉也天一星在五車南畢西北為天門天行徳天子更立年天謂北極言王者當天心則北辰有光耀北辰有光耀則天子更立年也不徳風雨破石三能三衡者天廷也衡太㣲三光之廷客星出天廷有竒令天官書天體圓周三百六十五度四分度之一繞地左旋一日一周而過一度日行一日亦繞地一周而不及天一度積三百六十五日九百四十分日之二百三十五而與天㑹是一歲日行之數也月一日不及天十三度十九分度之七積二十九日九百四十分日之四百九十七而與日㑹十二㑹得日三百五十四九百四十分日之二百四十八是一歲月行之數也三百六十者一歲之常數也故日與天㑹而多五日九百四十分日之二百三十五者為氣盈月與日㑹而少五日九百四十分日之五百九十二者為朔虗合氣盈朔虛而閏生焉故一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是為一章也必以十九歲而無餘分者天數終于九地數終于十十九者天地一終之數積八十一章則盈虛之餘盡而復始四時定而歲功成矣南北極相去一百八十二度半彊赤道去南北極各九十一度彊春分日行正交赤道從此漸北距赤道二十四度是為夏至夏至以後日漸南至秋分還與赤道交從此漸南距赤道二十四度是為冬至其日行之道謂之黄道又有月行之道與日道相近交路而過半在日之表半在日之裏其當交則兩道相分去則相逺逺處相距六度此謂日有中道月有九行也月行所交以黄道内為陰厯外為陽厯冬入陰厯夏入陽厯月行青道冬至夏至後青道半交在春分之宿當黄道東立冬立夏後青道半交在立秋之宿當黄道東南至所衝之宿亦如之冬入陽厯夏入陰厯月行白道冬至夏至後白道半交在秋分之宿當黄道西立冬立夏後白道半交在立秋之宿當黄道西北至所衝之宿亦如之春入陽厯秋入陰厯月行朱道春分秋分後朱道半交在夏至之宿當黄道南立春立秋後朱道半交在立夏之宿當黄道西南至所衝之宿亦如之春入陰厯秋入陽厯月行黒道春分秋分後黒道半交在冬至之宿當黄道北立春立秋後黑道半交在立冬之宿當黄道東北至所衝之宿亦如之四序離為八節至陰陽之所交皆與黄道相㑹故月行有九道所謂日月之行有冬有夏也圜規有九重叠相錯黒道二出黄道北青道二出黄道東朱道二出黄道南白道二出黄道西併黄道為九道此先儒所傳九道舊圖也按月道雖重如絲纒彈丸止一縷往來未嘗㫁絶若如九規則道各有輪輪各有心㫁而不属是月之入各道也必於所交之處斜曲而後行理有不可矣元人知其非一之曰白道圖見後月道斜交黄道交初入黄道北至交半緯度極大乃向黄道行至交中出黄道南極于交半緯度又最大又向黄道行至交初而一周毎周退天之度為交差每一交之差退天一度餘凡二百四十九交有竒退天一周終而復始天有十二次日毎月行一次月毎月行周天復過一次故日月之㑹月移一次也如正月㑹于析木二月日行過大火月一周天復行至大火故二月㑹于大火也月本無光日耀之以為光光之初生如鈎日在其西去日漸逺光漸増八日為上弦十五日日月相對為望望後去日漸近光漸減二十三日為下弦光之將盡日在其東遂㑹而為晦也屈子曰圜有九重孰營度之是古之言天有九重之説而自漢以下失之也葢恒星七政并宗動為九宗動者無星之天一氣旋運而為衆動之宗者也所以知有此天者此天樞紐繫于太虚萬古不移而恒星天之極星去樞紐之不動者較古漸逺二十八舍經緯因之亦有古今之異是恒星自為一天在此天之下與七政同也地居天中與天度相應七政運行于天之内去地逺近不同最近地者月次日金水次火次木次土最逺恒星以行之遲疾校之月疾日金水遲火又遲木又遲土最遲知近則疾逺則遲也以象之髙下測之火退望時體大光爍金水退伏則遂出日下月長掩日是亦以次而近之徴也以理之陰陽推之火木土陽也在日之外金水月陰也在日之内有男女正位之義焉又其章著者也朱子云騷注九天只是九重葢天運行有許多重數在内者較緩至第九重則轉得愈𦂳矣地在中央不動不是在下天包乎地其氣極急形氣相催𦂳束而成體但中間之氣稍寛所以容得品物天有九重故七政各有本天然惟恒星以地心為心七政之天則不以地心為心因其有小大遲疾知有髙卑也在最髙則逺地視徑小覺行遲其差為朒在最卑則近地視徑大覺行速其差為朓凡五星東行為順西行為逆趨舍而前為盈退舍而後為縮近日則伏逺日則見同舍曰合同宿曰聚木星近日則遲逺日則疾火星近日則疾逺日則遲土星平行無太遲疾金水星附日而行此舊説也按七政各有本天有本輪日無次輪本輪上行度即為日體月及五星本輪之周又有次輪本輪上行度尚非月五星之體而次輪所行也本輪行度日金水歲一周月一歲十三周有竒火約二歲木約十二歲土約二十八歲皆一周星行次輪土三百七十八日竒而一周木三百九十九日弱而一周火七百八十日弱而一周金五百八十四日弱而一周水一百一十六日弱而一周皆自合伏至合伏也惟月則十四日竒而一周朔至望望至朔皆得全周也土木火合伏起順疾日前星後而晨見漸逺漸遲遲極而留將望而朔既望夕見逆極而留乃順遲行近日復疾再與日合而一周金水合伏亦起順疾日後星前而夕見漸逺漸遲遲極而留逆行就日而伏既乃晨見逆而極逺復留漸順遲行近日復疾再與日合而一周漢厯有遲速留逆諸限以今求之則星在次輪終古平行無有遲速其有遲速而又有逆留者皆視行也葢星行上半輪在本天之外去地最逺與輪心俱逐日而東輪行而星亦行故見為疾漸下在兩旁盡處人自下望其勢徑直雖行而似不行然星雖不動而輪猶移故見為遲及入下半輪稍深輪東星西其數相除恰盡則見為留星之西行其數稍贏則見為逆數適等又見為留轉至兩旁盡處又見為遲漸入上半輪界又以漸而速是故順逆遲留皆因人所見非星行實然而宛其故則輪周之轉為之也金水二星不經天者縁與日同天而其輪心行度又與日等故退伏而不退望實則與三星同理也九州地勢髙下不同而兩極出入亦隨之増損幽冀北極出地四十度揚州三十二度半青徐三十七度并州三十八度雍州三十六度豫州三十五度荆州三十一度梁州二十九度呉越三十度漢志所謂三十六度者周漢皆都雍州専指秦雍而言不可以天下槩也南極入地之度如北極出地之度尚史卷九十四
