body:
  text: 尚史八十四繫四鑲白旗漢軍李鍇撰孔子弟子傳宰豫字子我利口辨辭既受業問三年之喪不已久乎孔子曰三年之喪天下之通義也衝波傳宰我謂三年之喪朽者既枯于斯可矣顔淵曰鹿生三年其角乃墮子生三年而離父母之懷子雖美辨其能改三年之喪哉父母天地也天崩地壞為之三年不亦宜乎宰我問五帝之德孔子曰豫非其人也史記戴五帝問見大禮説支離不具録宰我曰豫聞鬼神之名不知其所謂孔子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服聖人以是為未足也築為宫室設為宗祧以别親疏逺邇教民反古復始不忘其所由生也衆之服自此故聽且速也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也記祭義宰我曰敢問禋于六宗何謂也孔子曰所宗者六皆潔祀之也埋少宰于大昭所以祭時也祖迎于坎壇所以祭寒暑也主于郊宫所以祭日也夜明所以祭月也幽滎所以祭星也雲滎所以祭水旱也問書云納于大麓烈風雷雨弗迷何謂也孔子曰此言人事之應乎天也堯既得舜厯試諸艱已而納之于尊顯之宫使大録萬機之政故隂陽清和五星不悖烈風雷雨各以其應不有迷錯愆伏明舜之行合于天也宰我問君子尚辭乎孔子曰君子以理為尚博而不要非所察也繁辭富説非所聽也唯知者不失理孔子曰吾于豫取其言之近類也于賜取其言之切事也近類則足以喻之切事則足以懼之孔叢子孔叢子又曰宰我使于齊而反見夫子曰梁丘據遇虺毒三旬而後瘳衆賔復獻攻療之方弟子謂之曰所以獻方將為病也今梁丘已療矣諸夫子乃復獻方方將安施意欲梁丘大夫復有虺害乎弟子此言何如夫子曰非也夫三折股為良醫梁丘獲療猶有與之同疾者家語宰豫仕齊為臨淄大夫與田常為亂夷三族孔子恥之曰不在利病其在宰豫説苑田成子常與宰我爭宰我夜伏卒將攻田成子令于軍曰不見旌節毋起鴟夷子皮聞之告田成子田成子因為旌節以起宰我之卒以攻之遂殘之鹽鐡論宰我秉事有寵于齊田常作難道不行身死庭中簡公殺于檀臺按左傳闞止字子我田闞爭寵子我為田常所殺家語誤為宰我史記因之諸説亂之並疏謬可笑今刪正端木賜衛人字子貢少孔子三十一嵗利口巧辭孔子常黜其辨史記破有子貢遊説而存魯弊齊吳霸越事荒謬不載子貢問于孔子曰敢問君子貴玉而賤瑉者何也為玉之寡而瑉之多與孔子曰非為瑉之多故賤之也玉之寡故貴之也夫昔者君子比德于玉焉溫潤而澤仁也縝密以栗知也亷而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達德也天下莫不貴者道也詩云言念君子溫其如玉故君子貴之也記聘義孔子觀于東流之水子貢問曰君子見大水必觀焉者何孔子曰夫水大遍與諸生而無為也似德其流埤下𥚑拘必循其禮似義洸洸乎不淈盡似道有決行之其應佚若聲響赴百仞之谷不懼似勇主量必平似法盈不求概似正淖約微達似察以出以入以就鮮潔似善化其萬折也必東似志是故君子見大水必觀焉子貢又問曰賜既為人下矣而未知為人下之道敢問孔子曰為人下者其猶土乎相之深則出泉汩渥樹其壤則百榖滋焉草木植焉禽獸育焉生則出焉死則入焉多有功而不意𢎞其志而無不容為人下者以此也家語韓詩説苑略同子路問于孔子曰魯大夫練而牀禮邪孔子曰吾不知也子路出謂子貢曰夫子有所不知由問魯大夫練而牀禮邪夫子曰吾不知也子貢曰吾將為汝問之問曰練而牀禮邪孔子曰非禮也子貢出謂子路曰汝謂夫子有所不知乎汝問非也禮居是邑不非其大夫子貢觀于魯廟之北堂出而問于孔子曰鄉者賜觀于太廟之北堂吾亦未輟還復瞻彼九蓋皆繼彼有説邪匠過絶邪孔子曰太廟之堂官致良上因麗節文非無良材也蓋曰貴文也荀子荀子又曰子貢問曰賜倦于學矣願息事君孔子曰詩云溫恭朝夕執事有恪事君焉可息哉然則願息事親孔子曰詩云孝子不匱永錫爾類事親焉可息哉然則願息于妻孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子焉可息哉然則願息于朋友孔子曰詩云朋友攸攝攝以威儀朋友焉可息哉然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖耕焉可息哉然則賜無息者乎孔子曰望其壙皋如也嵮如也鬲如也則知所息矣子貢曰大哉死乎君子息焉小人休焉列子韓詩外傳略同子貢觀于蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也張而不弛文武弗能也弛而弗張文武弗為也一張一弛文武之道也子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服請問兄弟之喪子曰兄弟之喪則存乎書䇿矣君子不奪人之喪亦不可奪喪也記雜記子貢問于孔子曰敢問子産晏子之所自為夫子所以與之者孔子曰子産于民為惠主于學為博物晏子于君為忠臣而行為敬敏又問曰管仲失于奢晏子失于儉二者孰賢孔子曰管仲鏤簋而朱紘旅樹而反坫山節藻棁賢大夫也而難為上晏平仲祀其先祖豚肩不掩豆一狐裘三十年賢大夫也而難為下君子下不僭上上不逼下家語説苑子貢問曰今之人臣孰為賢孔子曰吾未識也往者齊有鮑叔鄭有子皮賢者也子貢曰然則齊無管仲鄭無子産乎子曰汝聞進賢為賢邪用力為賢邪吾聞鮑叔之進管仲子皮之進子産也未聞管仲子産有所進也季孫之治魯也衆殺人而必當其罪多罰人而必當其過子貢曰暴哉治乎季孫聞之曰吾殺人必當其罪罰人必當其過先生以為暴何也子貢曰子産治鄭一年而負罰之過省二年而刑殺之罪亡三年而庫無拘人賜聞之託法而治謂之暴不戒致期謂之虐不教而誅謂之賊以身勝人謂之責責者失身賊者失臣虐者失政暴者失民于是季孫謝曰謹聞命矣韓詩外傳新序臧孫行猛政子貢非之曰夫政猶張琴瑟也大弦急則小弦絶矣故曰罰得則姦止賞得則下説子之賊心見矣獨不聞子産之相鄭乎推賢舉能抑惡揚善有大略者不問其短有厚德者不非小疵家給人足囹圄空虛故曰德莫大於仁禍莫大於刻後漢書注引今本無尚書大傳子貢曰傳云堯舜之王一人不刑而天下治教誠而愛深也吕氏春秋詩云執轡如組孔子曰審此言也可以為天下子貢曰何其躁也孔子曰非謂其躁也謂其為之于此而成文于彼也聖人組修其身而成文于天下矣韓非子殷之法刑棄灰于街者子貢以為重仲尼曰知治之道也重罰者人之所惡也而無棄灰人之所易也使人行其所易而無離其所惡此治之道一曰􅎋之法棄灰于道者斷其手子貢曰罪輕罰重古人何大毅也曰無棄灰所易也斷手所惡也行所易不關所惡古人以為易故行之説苑魯國之法有贖臣妾于諸侯者取金于府子貢贖人于諸侯而還其金孔子聞之曰賜失之矣聖人之舉事也移風易俗而教導可施于百姓非獨適其身之行也今贖而受金為不亷則自今以後魯人不復贖矣子貢事孔子一年自謂過孔子二年自謂與孔子同三年自知不及孔子論衡尚書大傳東郭子思問于子貢曰夫子之門何其雜也子貢曰夫櫽括之旁多枉木良醫之門多疾人砥礪之旁多頑鈍韓詩外傳齊景公謂子貢曰先生何師對曰魯仲尼曰仲尼賢乎曰聖人也景公嘻然而笑曰其聖何如子貢曰不知也景公悖然作色曰何也子貢曰臣終身戴天不知天之髙終身踐地不知地之厚也若臣之事仲尼譬猶操壺杓就江海而飲腹滿而去又安知江海之深乎又曰堂衣若扣孔子之門曰丘在乎丘在乎子貢應之曰君子尊賢而容衆嘉善而矜不能子何言吾師之名堂衣若曰子何年少言之絞子貢曰大車不絞不成其任琴瑟不絞不成其音子之言絞是以絞之堂衣若曰吾始以鴻之力今徒翼耳子貢曰非鴻之力安能舉其翼子貢好廢舉與時轉貨資喜揚人之美不能匿人之過常相魯衛家纍千金家語子貢為信陽宰將行辭于孔子孔子曰勤之慎之奉天子之時無奪無伐無暴無盜子貢曰賜也少而事君子豈以盜為纍哉孔子曰夫以賢代賢是謂之奪以不肖代賢是謂之伐緩令急誅是謂之暴取善自與是謂之盜盜非竊財之謂也吾聞之治民莫若平臨財莫若亷亷平之守不可改也匿人之善斯為蔽賢揚人之惡斯為小人內不相訓而外相謗非親睦也卒終于齊史記論衡魯將伐越筮之得鼎折足子貢以為行而折足凶孔子曰越人水居行用舟不用足吉魯伐越果克之博物志子路與子貢過鄭神社社樹有鳥神牽率子路子貢説之乃止魯無克越事二説並謬言偃吳人字子遊少孔子四十五嵗史記嵗家語作三十五許慎説文偃作於象旌旗之遊字子遊特習于禮以文學著名家語曽子弔于負夏衛地主人既祖填池推柩而反之降婦人而后行禮謂主人己祖奠婦人降在兩階之間矣賔至而為之暫反至明日復還柩向外降歸人于階間而后行遣奠之禮從者曰禮與曾子曰夫祖者且也且胡為其不可以反宿也從者又問諸子遊曰禮與子遊曰飯于牖下小斂于户內大斂于阼殯于客位祖于庭葬于墓所以即逺也故喪事有進而無退曽子聞之曰多矣乎豫出祖者謂勝豫出祖之言曾子􅊞裘而弔子遊裼裘而弔曽子指子遊而示人曰夫夫也為習于禮者如之何其裼裘而弔也主人既小斂袒括髮子遊趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也司冦惠子之喪衛將軍文子彌牟之弟蘭子遊為之麻衰牡麻絰惠子廢適子虎而立庶子故子遊變服以譏之文子辭曰子辱與彌牟之弟遊又辱為之服敢辭子遊曰禮也文子退反哭子遊趨而就諸臣之位文子又辭曰子辱與彌牟之弟遊又辱為之服又辱臨其喪敢辭子遊曰固以請文子退扶適子南面而立文子悟于是扶適子正喪主之位曰子辱與彌牟之弟遊又辱為之服又辱臨其喪虎也敢不復位子遊趨而就客位將軍文子即彌牟之喪既除喪而后越人來弔主人深衣練冠待于廟垂涕洟子遊觀之曰將軍文子之子其庶幾乎亡於禮者之禮也其動也中叔孫武叔之母死魯叔孫州仇也既小斂舉者出尸出户袒且拔其冠括髮子遊曰知禮公叔木衛公叔文子發之子有同母異父之昆弟死問于子遊子遊曰其大功乎狄儀有同母異父之昆弟死問于子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也小斂之奠子遊曰于東方曽子曰于西方斂斯席矣小斂之奠在西方魯禮之末失也記檀弓子遊問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居吾弗忍也遂練冠以喪慈母喪慈母自魯昭公始也記曽子問子遊問喪具夫子曰稱家之有亡子遊曰有亡惡乎齊夫子曰有母過禮茍亡矣斂首足形還葬縣棺而封人豈有非之者哉司士賁告于子遊曰請􅊞于牀禮始死廢牀而置尸于地及復而不生則尸復登牀襲者斂之以衣也子遊曰諾縣子名瑣知禮者聞之曰汰哉叔氏専以禮許人襲于牀者禮也後世禮失而襲于地司士知禮而請子遊不稱禮而答之以諾如禮自已出故縣子譏之衛司徒敬子死名未詳子夏弔焉主人未小斂絰而往子遊弔焉主人既小斂子遊出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰有子與子遊立見孺子慕者有子謂子遊曰豫一不知夫喪之踊也豫欲去之久矣情在于斯其是也夫子遊曰禮有微情者慮賢者過于情故立哭踊之節所以殺之有以故興物者慮不肖者不及情故興起衰絰之物使之睹服思哀有直情而徑行者戎狄之道也禮道則不然人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠句疑誤愠斯戚戚斯歎歎斯辟辟斯踊矣品節斯斯之謂禮人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也始死脯醢之奠將行遣而行之既葬而食之將葬有包裹牲體之遣既葬則有虞祭之食未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺于禮者亦非禮之訾也記檀弓偃記禮運有仲尼録與蠟言問禮事文繁不子遊仕為武城宰家語説苑季康子謂子遊曰仁者愛仁乎子遊曰然人亦愛之乎子遊曰然康子曰鄭子産死丈夫舍玦珮婦人舍珠珥夫婦巷哭三月不聞竽琴之聲仲尼之死吾不聞魯國之愛夫子奚也子遊曰譬子産之與夫子其猶浸水之與天雨乎浸水所及則生不及則死斯民之生也必以時雨既以生莫愛其賜卜商字子夏少孔子四十四嵗史記衛人習于詩能誦其義以文學著名為人性不𢎞家語又曰孔子將行雨無蓋門人曰商也有之孔子曰商之為人也甚吝于財吾聞與人交推其長者違其短者故能久也好論精微時人無以尚之家語家語又曰子夏問于孔子曰商聞易之生人及萬物鳥獸昆蟲各有竒耦氣分不同而人莫知其情惟達德者能原其本焉天一地二人三三三如九九九八十一一主日日數十故人十月而生八九七十二耦以從竒竒主辰辰為月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五主音音主猿故猿五月而生四九三十六六為律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風為蟲故蟲八月而化其餘各從其類矣魚鳥生隂而屬于陽故皆卵生魚逰于水鳥逰于雲故立冬則燕雀入海化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄齕吞者八竅而卵生齟􅻾者九竅而胎生四足者無羽翼戴角者無上齒無角無前齒者膏無角無後齒者脂晝生者類父夜生者似母是以至隂主牡至陽主牝敢問其然乎孔子曰然吾昔聞老𣆀亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡溪谷為牝蚌蛤龜珠與日月而盛虛是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美耗土之人醜食水者善逰而耐寒食土者無心而不息食木者多力而不治食草者善走而愚食桑者有緒而蛾食肉者勇毅而悍食氣者神明而夀食穀者智慧而巧不食者不死而神故曰羽蟲三百有六十而鳳為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾川之美也殊形異類之數王者動必以道動靜必以道靜順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝謂何也對曰微則微矣然非治世之待也孔子曰然各其所能大戴禮同而以為孔子之言孔子間居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達于禮樂之原以致五至而行三無以橫于天下四方有敗必先知之此之謂民之父母矣子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無既得略而聞之矣敢聞何詩近之孔子曰夙夜其命宥密無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰言則大矣美矣盛矣言盡于此而已乎孔子曰何為其然也君子之服之也猶有五起焉子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪內恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既起無體之禮施及四海無服之喪施于孫子子夏曰三王之德參于天地敢問何如斯可謂參于天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍是湯之德也天有四時春秋冬夏風雨露霜無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬氣志如神耆欲將至有開必先天降時雨山川出雲其在詩曰嵩髙維嶽峻極于天維嶽降神生甫及申維甫及申維周之翰四國于蕃四方于宣此文武之德也三代之王也必先其令聞詩云明明天子令聞不已三代之德也弛其文德協此四國大王之德也子夏蹶然而起負墻而立曰弟子敢不承乎記孔子聞居子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老𥅆曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也曽子問子夏問于孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬪曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬪曰請問居從父及昆弟之仇如之何曰不為魁主人能則執兵而陪其後記檀弓子夏問書大義子曰吾于帝典見堯舜之聖焉于大禹皋陶謨益稷見禹稷皋陶之忠勤功勳焉于洛誥見周公之德焉故帝典可以觀美大禹謨禹貢可以觀事皋陶謨益稷可以觀政洪範可以觀度秦誓可以觀義五誥可以觀仁甫刑可以觀誡通斯七者則書之大義舉矣孔叢子子夏讀詩已畢夫子問曰爾亦可言于詩乎子夏對曰詩之于事也昭昭乎若日月之光明燎燎乎如星辰之錯行上有堯舜之道下有三王之義弟子不敢忘雖居蓬户之中彈琴以詠先王之風有人亦樂無人亦樂亦可發憤忘食詩曰衡門之下可以棲遲泌之洋洋可以療飢夫子造然變容曰嘻吾子始可以言詩已矣然子以見其表未見其裏窺其門不入其中安知其奧藏之所在乎尚書大傳孔叢子並同子夏問曰關睢何以為國風始也孔子曰關睢至矣乎夫關睢之人仰則天俯則地幽幽冥冥德之所藏紛紛沸沸道之所行大哉關睢之道萬物之所繫羣生之所懸命也河洛出書圖麟鳳翔乎郊不由關睢之至則關睢之事將奚由至矣哉天地之間生民之屬王道之原不外此矣子夏喟然歎曰大哉關睢乃天地之基也韓詩外傳説苑孔子讀易至于損益喟然而歎子夏避席而問曰夫子何為歎子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎子曰夫學者以虛受之故曰得苟不知持滿則天下之善言不得入其耳矣日中則昃月盈則食天地盈虛與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長久矣子夏曰善請終身誦之子夏見曾子曾子曰何肥也曰戰勝故肥也曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰于胸中未知勝負故臞今先王之義勝故肥韓非子荀子子夏貧衣若縣鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見栁下惠與後門者同衣而不見疑非一日之聞也爭利如蚤甲而喪其掌孔子曰吾死之後商也日益賜也日損曾子曰何謂也子曰商也好與賢己者處賜也説不若己者處不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人處如入芝蘭之室久而不聞其香與不善人居如入鮑魚之肆久而不聞其臭與之化矣是以君子必慎其所處者焉家語列子子夏問孔子曰顔回之為人奚若子曰回之仁賢于丘曰子貢之為人奚若曰賜之辨賢于丘曰子路之為人奚若曰由之勇賢于丘曰子張之為人奚若曰師之莊賢于丘子夏避席而問曰然則四子何為事夫子曰居吾語汝夫回能仁而不能反賜能辨而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易吾吾弗許也此其所以事吾而不二也淮南子無子張孔子曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣子夏曰君子漸于飢寒而志不僻銙于五兵而辭不懾臨大事不忘昔席之言尸子又曰日習則學不忘自勉則身不墮亟聞天下之大言則志益廣中論韓詩外傳魯哀公問子夏曰必學而後可以安國保民乎子夏曰不學而能安國保民者未嘗聞也哀公曰然則五帝有師乎子夏曰臣聞黃帝學乎大真顓頊學乎緑圖帝嚳學乎赤松子堯學乎尹夀舜學乎務成跗禹學乎西王國湯學乎成子伯文王學乎鉸時子斯武王學乎郭叔周公學乎太公仲尼學乎老𥅆此十一聖人未邅此師則功業不著乎天下名號不傳乎千世新序同詩外傳又有衛靈公召勇士公孫悁而子夏往與悁論勇于靈公前説支離不載孔子既沒子夏西河教授為魏文侯師史記子夏喪其子而喪其明曽子弔之曰吾聞之也朋友喪明則哭之曽子哭子夏亦哭曰天乎豫之無罪也曽子怒曰商女何無罪也吾與女事夫子于洙泗之間退而老于西河之上使西河之民疑女于夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰爾何無罪與子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦已久矣記檀弓尚史卷八十四
