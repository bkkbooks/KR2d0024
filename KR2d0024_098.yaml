body:
  text: 尚史卷九十九志七鑲白旗漢軍李鍇撰樂志夫聲者天之元也音者人之比也合天人而相宣者樂之所由興也然而樂以作人政以成樂二者固相磨也是故聖王治世先正其樂正樂先以正人人無戾心無逆機無偽情春以仁生夏以禮會秋以義格冬以智藏夫然後六氣齊八風調六氣齊八風調而後謂之平平乃樂可和矣詩曰既和且平依我磬聲又曰德音不瑕和之謂也盛德多修容大樂不外作自然之招也若夫飄風折竿激水過顙豈其性哉和則靖矣宓羲以還代有樂顧詳言之者鮮周官具樂施而已掇拾樂記會萃羣説用通其源述樂志凡音之起由人心生也人心之動物使之然也感于物而動故形于聲聲相應故生變變成方謂之音比音而樂之及干戚羽毛謂之樂樂者音之所由生也其本在人心之感于物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非性也感于物而後動是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂政刑其極一也所以同民心而出治道也凡音者生人心者也情動于中故形于聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭衛之音亂世之音也比于慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也凡音者生于人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾于禮矣禮樂皆得謂之有德德者得也是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱絃而疏越一倡而三歎有遺音者矣大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也人生而靜天之性也感于物而動性之欲也物至知知然後好惡形焉好惡無節于內知誘于外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物者滅天理而窮人欲者也于是有悖逆詐偽之心有淫泆作亂之事是故強者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也婚姻冠筓所以别男女也射鄉食饗所以正交接也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治矣樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也暴民不作諸侯賓服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親明長幼之序以敬四海之內天子如此則禮行矣大樂與天地同和大禮與天地同節和故百物不失節故祭天祀地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也故事與時並名與功偕故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周還禓襲禮之文也故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴明于天地然後能興禮樂也論倫無患論雅頌之辭倫律吕之音樂之情也欣喜歡愛樂之官也中正無邪禮之質也莊敬恭順禮之制也若夫禮樂之施于金石越于聲音用于宗廟社稷事乎山川鬼神則此所與民同也王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非達禮也五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉是故志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅廉直徑正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂是故先王本之性情稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交于中而發作于外皆安其位而不相奪也然後立之學等廣其節奏省其文采以繩德厚律小大之稱比終始之序以象事行使親踈貴賤長幼男女之理皆形見于樂故曰樂觀其深矣土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅和平之德是以君子賤之也凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設于身體使耳目鼻口心知百體皆由順正以行其義然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理是故清明象天廣大象地終始象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本于心然後樂器從之是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為偽樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聽過故曰生民之道樂為大焉樂記按樂記有樂本樂論樂施樂言樂禮樂情樂化樂象及賔牟賈師乙魏文侯十一節略可次第今擇其切言樂者著録之夫正教者皆始于音音正而行正故音樂者所以動蕩血脈通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故樂所以內輔正心而外異貴賤也上以事宗廟下以變化黎庶也琴長八尺一寸正度也弦大者為宫而居中央君也商張右旁其餘大小相次不失其序則君臣之位正矣故聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮白虎通夫樂者先王之所以飾喜也軍旅鈇鉞所以飾怒也故先王之喜怒皆得其齊焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣聞角聲莫不惻隱而慈者聞徵聲莫不喜養好施者聞商聲莫不剛斷而立斷者聞羽聲莫不深思而遠慮者聞宫聲莫不溫潤而寬和者夫禮由外入樂自中出故君子不可須臾離禮須臾離禮則暴慢之行窮外不可須臾離樂須臾離樂則姦邪之行窮內故樂音者君子之所養義也夫古者天子諸侯聽鐘磬未嘗離于庭卿大夫聽琴瑟未嘗離于前所以養行義而防淫佚也夫淫佚生于無禮故聖人使人耳聞雅誦之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪辟無由入也史記伏羲樂曰扶來亦曰立本神農樂曰扶持亦曰下謀帝系譜孝經緯周隋樂志伏羲有約同之詠伊耆有葦蘥之音葛天八闋神農五絃黃帝作咸池少皥作大淵顓頊作五莖帝嚳作六英堯作大章舜作大韶禹作大夏湯作大濩武王作勺作大武樂緯列子周穆王時有化人來穆王奏承雲六瑩九招晨露以樂之張湛注承雲黃帝樂六瑩帝嚳樂九招舜樂晨露湯樂周禮注周所存六代之樂黃帝曰雲門大卷黃帝能成名萬物以明民共財言其德如雲之所出民得以有族類大咸咸池堯樂也堯能殫均刑法以儀民言其德無所不施大㲈舜樂也言其德能紹堯之道也大夏禹樂也禹治水傅土言其德能大中國也大濩湯樂也湯以寬治民而除其邪言其德能使天下得其所也大武武王樂也武王伐紂以除其害言其德能成武功漢書黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之遺也武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也咸池備矣博雅休流扶持下謀雲門六䪫五韺大章簫韶大濩大武勺又有房中之樂儀禮賈公彥疏絃歌周南召南之詩不用鐘鼓之節也所謂房中者夫人之所諷詠以事其君子也又有四夷之樂南夷之樂曰兜西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀之樂儛于堂四夷之樂陳于右樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持戟舞助時殺也北夷之樂持干舞助時藏也白虎通孝經鉤命訣東夷之樂曰休南夷之樂曰任西夷之樂曰林離北夷之樂曰僸毛詩傳儛四夷之樂是德廣所及也東夷之樂曰韎南夷之樂曰任西夷之樂曰朱離北夷之樂曰禁其大司樂以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武康成注雲門大卷黃帝樂大咸咸池堯樂大㲈舜樂大夏禹樂大濩湯樂大武武王樂與樂緯異以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以説遠人以作動物乃分樂而序之以祭以享以祀乃奏黃鐘歌大吕舞雲門以祀天神謂五帝及日月星辰乃奏大簇歌應鐘舞咸池以祭地示謂神州之神及社稷乃奏姑洗歌南吕舞大㲈以祀四望謂五嶽四鎮四瀆乃奏㽔賓歌函鐘舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣此謂薑嫄薑嫄無所妃特立廟以祭之謂之閟宫乃奏無射歌夾鐘舞大濩以享先祖此謂先王先公凡六樂者文之以五聲播之以八音凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及邱陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神此謂大蠟凡樂圜鍾為宫黃鐘為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鐘為宫大吕為角大簇為徵應鐘為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞九㲈當作大㲈于宗廟之中奏之若樂九變則人鬼可得而禮矣此謂禘大祭周禮凡樂事以鐘鼓奏九夏王夏康成注王出入奏之肆夏尸出入奏之昭夏牲出入奏之納夏四方賓來奏之章夏臣有功奏之齊夏夫人祭奏之族夏族人侍奏之陔夏客醉出奏之驁夏公出入奏之凡祭祀饗食奏燕樂凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩凡事大祭祀宿縣遂以聲展之王出入奏王夏尸出入奏肆夏牲出入奏昭夏帥國子而舞大射王出入奏王夏及射奏騶虞諸侯以弓矢舞王大食三侑皆奏鐘鼓大食朔月月半以樂侑食時也王師大獻奏愷樂大獻獻捷于祖也周禮鄉飲酒工入送瑟歌鹿鳴四牡皇皇者華笙入樂南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀康成注南陔白華華黍由庚崇邱由儀今亡其義未聞朱子詩注曰笙曰樂曰奏而不言歌有聲無辭明矣朱説是乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋鄉射亦合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋以樂樂賔奏騶虞賔興奏陔康成注陔夏其詩亡燕禮工歌鹿鳴四牡皇皇者華奏南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀升歌鹿鳴下管新宫康成注新宫小雅逸篇大射奏肆夏康成注肆夏詩亡歌鹿鳴管新宫奏貍首康成注貍首逸詩曾孫也貍之言不來也其詩有射諸侯首不朝者之言因以名篇後世失之謂之曾孫曾孫其章頭也射義所載詩曰曾孫侯氏是也賓醉奏陔公入驁儀禮中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡祈年于田祖吹豳雅擊土鼓以樂田畯祭蠟吹豳頌擊土鼓以息老物周禮康成注豳風七月也七月言寒暑之事豳雅亦七月也七月有于耜舉趾饁彼南畝之事豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事朱子詩注鄭氏三分七月之詩王氏不取謂本有是詩而亡之或又以七月全篇隨事而變其音節或以為風或以為雅或以為頌不然雅頌之中凡為農事而作者皆可冠以豳號如小雅之楚􅗔信南山甫田大田為豳雅周頌之思文臣工噫嘻豐年載芟良耜為豳頌雅者正也正樂之歌也正小雅者燕饗之樂也正大雅者會朝之樂受釐陳戒之辭也頌者宗廟之樂歌美盛德之形容以其成功告于神明者也常棣燕兄弟也伐木燕朋友故舊也天保下報上也采薇遣戍役也出車勞還率也杕杜勞還役也蓼蕭湛露天子燕諸侯也彤弓天子錫有功諸侯也菁菁者莪樂育材也朱子詩注以為燕賓客之詩又以桑扈為天子燕諸侯鴛鴦諸侯答桑扈䪻辨燕兄弟親戚之詩文王文王受命作周也大明文王有明德天復命武王也綿文王之興本由大王也並天子諸侯朝會之樂也國語並以為兩君相見之樂生民推后稷以配天也朱子詩注疑郊祀之後受釐頒胙用之又以行葦為祭畢而燕父兄耆老之詩既醉父兄答行葦也鳬鷖祭之明日繹而賔尸之樂假樂公尸答鳬鷖也清廟周公既成洛邑朝諸侯率以祀文王也維天之命告文王也維清象武奏也烈文諸侯助祭也天作祀先王先公也昊天有成命郊祀天地也國語道成王之德也朱子詩注疑祀成王之詩我將祀文王于明堂也時邁巡守祭告柴望也執競祀武王也朱子詩注祭武王成王康王之詩思文后稷配天也國語金奏肆夏樊遏渠天子以饗元侯也韋昭注肆夏一名樊韶夏一名遏納夏一名渠即周禮九夏之三吕叔玉云肆夏時邁也樊遏執競也渠思文也臣工諸侯助祭遣于廟也噫嘻春夏祈穀于上帝也朱子詩注並以為戒農官之詩振鷺二王之後來助祭也豐年秋冬報也有瞽始作樂而合乎祖也潛季冬薦魚春獻鮪也雍禘太祖也朱子詩注武王祭文王之詩樂師及徹帥學士而歌徹魯論曰以雍徹是此詩也載見諸侯始見乎武王廟也有客微子來見祖廟也武奏大武也閔豫小子嗣王朝于廟也訪落嗣王謀于廟也敬之羣臣進戒嗣王也小毖嗣王求助也並嗣王朝廟之樂也載芟春藉田而祈社稷也良耜秋報社稷也絲衣繹賓尸也朱子詩注祭而飲酒之詩酌告成大武也桓講武類禡也賚大封于廟也朱子詩注並以為頌文武之功般巡守而祀四嶽河海也駉有駜泮水閟宫並頌魯僖公也那祀成湯也烈祖祀中宗也朱子詩注亦以為祀成湯之樂玄鳥祀髙宗也長發大帝也殷武祀髙宗也詩序凡日月食四鎮五嶽崩大傀異災諸侯薨去樂大札大凶大災大臣死凡國之大憂弛縣凡建國禁其淫聲過聲凶聲慢聲大喪涖廞樂器及葬藏樂器亦如之周禮尚史卷九十九
