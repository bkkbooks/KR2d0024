body:
  text: 尚史卷五十四列傳三十二鑲白旗漢軍李鍇撰公子發子國國氏公孫僑國參公子發字子國穆公子國氏之始也穆公薨發事襄公襄公薨悼公即位元年成五年以我伐許故許訴公于楚公如楚訟不勝楚人執發及皇戌公遂叛楚與晉盟悼公薨成公即位成公三年成九年楚以重賂求我公㑹楚公子成于鄧發復歸事成公發反國傳無之意或在是年十四年襄二年成公薨僖公少于是公子喜當國公子騑為政發為司馬僖公三年襄五年發聘于魯通嗣君也五年襄七年僖公薨簡公即位元年襄八年發侵蔡獲蔡公子燮三年襄十年尉氏司氏五族作亂殺發及公子騑公孫輒左傳子僑嗣僑字子産又字子美簡公元年襄八年發侵蔡獲蔡公子燮國人皆喜唯僑不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣發怒之曰爾何知國有大命而有正卿童子言焉將為戮矣韓非子子産忠于君子國譙怒之曰夫介異于人臣而獨忠于主主聽與不聽未可知而女已離于羣臣離于羣臣則必危非徒危己又且危父矣三年襄十年尉止司臣侯晉堵女父子師僕五族亂殺發及公子騑公孫輒騑之子公孫夏聞盜不警而出尸而追盜先臨尸而追賊盜入于北宫乃歸授甲臣妾多逃器用多喪僑聞盜為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盜于北宫殺尉止子師僕盜衆盡死餘盜奔宋公子嘉當國為載書以位序聽辟大夫諸司門于弗順將誅之僑止之請為之焚書嘉不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎僑曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎専欲無成犯衆興禍子必從之乃焚書于倉門之外衆而後定五族之亂也公子嘉知之故不死又為政專國人患之十二年襄十九年殺嘉使公孫舍之當國公孫夏聽政立僑為少正十五年襄二十二年晉徴朝于我我使僑對曰在晉先君悼公九年我寡君于是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮于寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮于敝邑是年冬楚伐鄭謂之申禮者飾辭也敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢携二于楚我四年三月先大夫子蟜即公孫蠆又從寡君以觀釁于楚朝楚而曰觀釁亦飾辭也晉于是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨于執事以㑹嵗終二于楚者子侯石盂歸而討之鄭使石㚟告捷于楚楚人執之云二于楚者亦飾辭也溴梁之明年子蟜老矣公孫夏從寡君以朝于君見于嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聽事期不朝之間無嵗不聘無役不從以大國政令之無常國家罷病不虞薦至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讎敝邑是懼其敢忘君命委諸執事執事實重圖之吕氏春秋晉欲攻鄭令叔嚮聘焉視其有人與無子産為之詩曰子惠思我褰裳涉洧子不我思豈無他士叔嚮歸曰鄭子産在不可攻也秦荆近其詩有異心不可攻也十八年襄二十五年公孫舍之及僑伐陳入之僑獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至于莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授首于我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻方千里列國一同方百里自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以受楚捷不敢廢王命故也晉人不能詰乃受之十九年襄二十六年公賞入陳之功賜舍之先路三命之服先八邑賜僑再命之服先六邑僑辭邑曰自上以下隆殺以兩禮也臣之位在四公孫舍之上卿公孫夏次卿良霄又次之僑故在四且舍之之功也臣不敢及賞禮請辭邑公固豫之乃受三邑冬楚伐我國人將禦之僑曰晉楚將平諸侯將和楚王是故昧于一來不如使逞而歸乃易成也夫小人之性釁于勇嗇于禍以足其性而求名焉者非國家之利也若何從之釁動嗇貪言鄭之欲禦楚者皆釁勇貪禍之小人不可從也公孫舍之說不禦冦明年晉楚果平諸侯盟于宋二十一年襄二十八年蔡侯歸自晉入于鄭公享之不敬僑曰蔡侯其不免乎日其過此也君使子展廷勞于東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父通大子班之妻僑聞之如是者恆有子禍公孫黑即子晳駟氏將伐良霄即伯有大夫和之二十三年襄三十年僑相公以如晉羊舌肹問鄭國之政焉對曰吾得見與否在此嵗也駟良方爭未知所成若有所成吾得見乃可知也肹曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣夏僑如陳涖盟歸命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門以介于大國能無亡乎不過十年矣秋公孫黑以駟氏之甲伐良霄霄奔許人謂僑就直助彊僑曰豈為我徒國之禍難誰知所敝或主彊直難乃不生姑成吾所言中立無所助斂伯有氏之死者而殯之不及謀而遂行罕虎自止之僑入受盟于子晳氏公及大夫盟于大宫既而良霄入伐舊北門駟帶伐之皆召僑僑曰兄弟而及此吾從天所與言終無所與也良霄死僑襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城罕虎授僑政僑為政有事公孫段賂與之邑游吉曰國皆其國也奚獨賂焉僑曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛于邑邑將焉往吉曰若四國何僑曰非相違也而相從也四國何尤焉鄭書有之安定國家必大焉子姑先安大以待其所歸既公孫段懼而歸邑卒與之二十四年襄三十一年公如晉僑為相晉以魯襄公之喪故未之見僑使盡壞其館之垣而納車馬焉士丐讓之對曰以敝邑褊小介于大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廏繕修司空以時平易道路圬人以時塓館宫室諸侯賓至甸設庭燎僕人巡宫車馬有所賓從有代巾車脂轄𨽻人牧圉各瞻其事百官之屬各展其物公不留賓而亦無廢事憂樂同之事則巡之教其不知而恤其不足賓至如歸無寧菑患不畏冦盜而亦不患燥濕今銅鞮之宫數里而諸侯舍于𨽻人門不容車而不可踰越盜賊公行而夭癘不戒賓見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞士丐復命趙武曰信我實不德而以𨽻人之垣以贏諸侯是吾罪也使丐謝不敏焉乃築諸侯之館羊舌肹曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也二十五年昭元年公孫黑與游楚爭妻楚擊黑以戈大夫謀之僑曰直鈞游楚先聘楚直也楚用戈黑直也子産力未能討故鈞其事幼賤有罪罪在楚也乃執楚而數之曰國之大節有五女皆奸之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聼政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵在從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪遂放楚于吳秋晉侯有疾公使僑如晉聘且問疾羊舌肹問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也僑曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商邱主辰商邱宋地主祀辰星辰大火也商人是因故辰為商星遷實沈于大夏主參大夏晉地主祀參星參水星也唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災于是乎禜之日月星辰之之神則雪霜風雨之不時于是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身于是乎節宣其氣勿使有所壅閉湫底以露其體壅氣止而不行閉氣塞而不通湫氣聚而不散底氣泄而不快露贏也兹心不爽而昏亂百度今無乃一之一同四時也則生疾矣僑又聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君內實有四姬焉其無乃是也乎若由是二者弗可為也已四姬有省猶可無則必生疾矣晉侯聞之曰博物君子也重賄之楚公子圍使公子黑肱伯州犂城犫櫟郟三邑本鄭地國人懼僑曰不害令尹將行大事謂將弒君而先除二子也禍不及鄭何患焉既而圍弒郟敖殺伯州犂二十六年昭二年公孫黑將作亂殺游氏僑數其三罪而殺之二十七年昭三年僑相公如楚楚子享之僑賦吉日既享僑乃具田備王以田江南之夢二十八年八年昭四年楚使如晉求諸侯欲専㑹諸侯楚子問于僑曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之楚子曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼于齊而侵于晉唯是不來其餘君之所及也誰敢不至楚子曰然則吾所求者無不可乎對曰求逞于人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不㑹楚子使問禮于宋向戌及僑戌獻公合諸侯之禮六僑獻伯子男㑹公之禮六君子謂戌善守先代僑善相小國僑作邱賦邱十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦履畝而賦也國人謗之曰其父死于路已為蠆尾以令于國國將若之何渾罕大夫以告僑曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤于人言吾不遷矣二十九年昭五年僑相公㑹晉侯于邢邱三十年昭六年鑄刑書晉羊舌肹遺僑書讓之曰民知爭端矣將棄禮而徴于書終子之世鄭其敗乎僑復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠三十一年昭七年僑聘于晉晉侯有疾韓起逆客私焉曰寡君寢疾于今三月矣並走羣望有加而無瘳今夢黃熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎起祀夏郊晉侯有間賜僑莒之二方鼎古文瑣語晉平公夢朱熊窺其屏惡之而疾問于子産對曰昔共工之卿曰浮游敗于顓頊自沈于淮其色赤其言善笑其行善顧其狀如熊為天王祟見之堂則王天下者死見之堂下則邦人駭見之門則近臣憂見之廷則無傷今窺君之屏病而無傷其祭顓頊共工乎從其言而病間三十五年昭十一年楚執蔡侯殺之而圍蔡晉為㑹于厥憖謀救蔡罕虎將行僑曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎王謂楚子美惡周必復王惡周矣昭元年楚子弒君而立嵗在大梁後三嵗十三年嵗星周復于大梁晉請蔡楚弗許卒滅之三十六年昭十二年簡公薨定公即位夏僑相公如晉五月葬簡公將為葬除司墓之室有當道者毁之則朝而塴弗毁則日中而塴塴同窆游吉請毁之曰無若諸侯之賓何僑曰諸侯之賓能來㑹吾喪豈憚日中無損于賓而民不害何故不為遂弗毁日中而葬定公元年昭十三年公㑹諸侯同盟于平邱僑及游吉相及盟僑爭承承貢服之次曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至于昏晉人許之游吉咎之曰諸侯若討其可瀆乎僑曰晉政多門二偷之不暇何暇討國不競亦陵何國之為四年昭十六年晉韓起來聘起有環其一在鄭商起謁諸公僑弗與曰非官府之守器也寡君不知游吉子羽亦穆公子名不載謂僑曰韓子亦無幾求晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬬其問鬼神而助之以興其凶怒悔之何及吾子何愛于一環其以取憎于大國也盍求而與之僑曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令于小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何厭之有吾且為鄙邑則失位矣若韓子奉命以死而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓起買諸賈人既成賈矣商人曰必告君大夫韓起請諸僑曰日起請夫環執政弗義弗敢復也今買諸商人商人曰必以聞敢以為請僑對曰昔我先君桓公與商人皆出自周庸次比耦以芟殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無强賈毋或丐奪爾有利市實賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也言大國有所號令而共給無有藝法鄭雖為晉邊鄙之邑亦弗為也僑若獻玉不知所成敢私布之韓起辭玉曰起不敏敢求玉以徼二罪敢辭之及六卿餞起于郊起私覲于僑以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜六年昭十八年夏五月鄭災僑救火及禱旱龍鬪事並見五行志火之作也僑授兵登陴游吉曰晉無乃討乎僑曰吾聞之小國忘守則危況有災乎國之不可小有備故也既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪邊人恐懼不敢不告僑對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人薦為敝邑不利以重君之憂幸而不亡猶可說也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉既事晉矣敢有二心八年昭二十年僑卒仲尼聞之出涕曰古之遺愛也僑之從政也擇能而使之馮簡子能斷大事游吉美秀而文公孫揮能知四國之為而辨于其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀于野則獲謀于邑則否鄭國將有諸侯之事僑乃問四國之為于揮且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授游吉使行之以應對賓客是以鮮有敗事僑之為政也使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之韓非子簡公謂子産曰國迫于荆晉之間城郭不完兵甲不備不可以待不虞子産曰臣閉其外也已逺矣守其內也已固矣君其勿憂是以沒簡公身無患又曰簡公謂子産曰飲酒不樂也俎豆不大鐘鼓竽瑟不鳴寡人之事國家不定百姓不治耕戰不輯睦亦子之罪子有職寡人亦有職各守其職子産退而為政五年國無盜賊道不拾遺桃棗䕃于街者莫有援也錐刀遺道三日可反尸子說苑略同吕氏春秋子産出遏東匠之閭聞婦人之哭撫其御之手而聽之有間遣吏執而問之則手絞其夫者也其御問曰夫子何以知之曰其聲懼凡人于其親愛也始病而憂臨死而懼已死而哀今哭已死不哀而懼是以知其有姦也或曰姦必待耳目之所及而後知之則鄭國之得姦者多矣家語孔子曰子産者猶衆人之母也能食之勿能教也子游曰其事可言乎孔子曰子産以所乘之輿濟冬涉者是愛無教也說苑作景差從政一年輿人誦之曰取我衣冠而禇之褚畜也取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之左傳僑子參字子思史記鄭昭君之時以所愛徐摯為相國亂大宫子期言之君以子産為相一年豎子為戲狎斑白不提挈僮子不犂畔二年市不豫賈三年門不夜關道不拾遺四年田器不歸五年士不尺籍喪期不令而治治鄭二十六年而死丁壯號哭老人兒啼曰子産去我死乎民將安歸按子産事簡公上距昭公殊逺又無徐摯其人不知史說何本初事定公定公薨事獻公獻公四年昭三十二年參及諸侯之大夫㑹于狄泉城成周獻公薨事聲公聲公十一年哀五年駟秦公子騑之後富而侈鄭人惡而殺之參曰詩曰不解于位民之攸塈不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福十三年哀七年宋圍曹參曰宋人有曹鄭之患也不可以不救冬救曹三十三年哀二十七年晉荀瑤伐我我請救于齊齊救之及濮雨不涉參曰大國在敝邑之宇下是以告急今師不行恐無及也齊師出瑤乃還參卒諡曰桓左傳公子喜子罕罕氏公孫舍之罕虎罕嬰齊罕達公子喜字子罕穆公之子罕氏之始也喜為卿厯事襄公悼公悼公薨事成公晉以我之二于楚也執公于銅鞮我立髠頑以為君成公四年成十年晉㑹諸侯伐我而將歸公喜賂晉以襄鐘公乃歸八年成十四年喜帥師伐許敗焉公復伐許入其邪十年成十六年喜伐宋宋敗喜于汋陂退舍于夫渠不警我覆之敗諸汋陵十四年襄二年成公薨僖公即位于是喜當國公無禮于大夫元年襄三年公如晉公子豐亦穆公子欲訴諸晉而廢之喜不可後卒遇弒左傳喜子二公孫舍之公孫鉏鉏為馬師氏見氏族志舍之字子展喜卒舍之嗣為卿簡公元年襄八年我侵蔡獻捷于衛邢邱之㑹楚伐我諸大夫欲從楚舍之欲待晉曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信謂三年㑹雞澤五年㑹戚又㑹城棣七年㑹鄬八年㑹邢邱今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎公子騑不可乃及楚平明年晉兩伐我我及晉平楚伐我我又及楚平三年襄十年楚及我伐宋衛救宋師于襄牛舍之曰必伐衛不然是不與楚也得罪于晉又得罪于楚國將若之何公子騑曰國病矣舍之曰得罪于二大國必亡病不猶愈于亡乎諸大夫皆以為然遂侵衛秋諸侯伐我我及晉平楚師至我又及楚平四年襄十一年我患晉楚之故諸大夫曰不從晉國幾亡楚弱于晉晉不吾疾也晉疾楚將辟之何為而使晉師致死于我楚弗敢敵而後可固與也舍之曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆場之司惡于宋宋侵我大獲舍之曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告于楚楚師至吾又與之盟而重賂晉師乃免矣舍之遂侵宋夏諸侯伐我我成楚將伐我公復逆之伐宋秋諸侯悉師以復伐我我使告楚將復于晉乃與晉成晉趙武入盟公舍之出盟晉侯十一年襄十八年公子嘉欲去諸大夫將叛晉而起楚師以去之楚聞之伐我于是公㑹諸侯伐齊嘉及舍之公孫夏守舍之夏知嘉之謀完守入保嘉不敢㑹楚師楚師信于城下而還十二年襄十九年舍之及公孫夏伐公子嘉殺之而分其室舍之當國夏聽政立公孫僑為卿陳及楚伐我當陳隧者井堙木刋我怨之十八年襄二十五年舍之及公孫僑帥車七百乘伐陳宵突陳城入之舍之命師無入公宫與僑親御諸門陳侯使司馬賂以宗器陳侯免免音問喪服擁社抱社主示服使其衆男女别而纍以待于朝舍之執縶而見縶馬韁修臣僕之禮再拜稽首承飲而進獻僑入數俘而出祝祓社司徒致民司馬致節司空致地乃還冬舍之相公如晉拜陳之功十九年襄二十六年公賞入陳之功享舍之賜之先路三命之服先八邑賜僑次路再命之服先六邑僑辭受三邑晉以孫林父故執衛侯秋公及齊侯為衛故如晉晉侯兼享之賦嘉樂國弱相齊侯賦蓼蕭舍之相公賦緇衣羊舌肹命晉侯拜稱曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也晉侯使肹告衛侯之罪國弱賦轡之柔矣逸詩舍之賦將仲子兮晉乃許歸衛侯肹曰鄭七穆罕氏其後亡者也子展儉而一穆公十一子子然子已士子孔三族已亡子羽不為卿故為七穆二十二年襄二十九年靈王崩將葬公在楚上卿居守舍之使印段公子印孫往良霄即伯有曰弱不可舍之曰與其莫往弱不猶愈乎詩云王事靡盬不遑啓處東西南北誰敢寧處堅事晉楚以蕃王室也王事無曠何常之有遂使段如周夏五月舍之卒左傳子虎字子皮簡公二十二年襄二十九年舍之卒虎嗣上卿為冢宰于是鄭饑而未及麥虎以舍之之命餼國人粟戶一鍾是以得民二十三年襄三十年公孫黑即子晳駟氏伐良霄即伯有霄奔許大夫聚謀虎曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免公孫僑殯伯有氏之死者而出奔印段從之虎止之衆曰人不我順何止焉虎曰夫子禮于死者況生者乎遂自止僑僑乃入既而良霄死僑葬之公孫黑欲攻僑虎怒之曰禮國之幹也殺有禮禍莫大焉乃止冬十月為宋災故虎㑹諸侯之大夫于澶淵謀歸宋財既而無歸虎授公孫僑政僑對曰國小而逼族大寵多不可為也虎曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬二十四年襄三十一年虎欲使尹何為邑公孫僑曰少未知可否虎曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣僑曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛于子子于鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲虎曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行僑曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也虎以為忠故委政焉二十五年昭元年虎㑹諸侯之大夫于虢夏晉趙武魯叔孫豹曹大夫入于鄭公兼享之禮終乃宴虎賦野有死麏之卒章趙武賦常棣且曰吾兄弟比以安厖也可使無吠虎及叔孫豹曹大夫興拜舉兕爵曰小國賴子知免于戾矣二十七年昭三年晉逆齊女為夫人虎如晉賀且告曰楚人日徴敝邑以不朝立王之故敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云進退罪也寡君使虎布之晉使羊舌肹對曰君若辱有寡君在楚何害修宋盟也二十九年昭五年虎如齊娶于子尾氏晏嬰驟見之陳恆問其故曰能用善人民之主也三十四年昭十年晉平公卒虎如晉㑹葬虎將以幣行公孫僑曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡虎固請以行既葬諸侯之大夫欲因見新君晉辭虎盡用其幣歸謂公孫揮曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也三十五年昭十一年楚圍蔡虎㑹諸侯之大夫于厥憖謀救蔡定公元年昭十三年秋虎卒公孫僑從公㑹平邱歸未至聞虎卒哭且曰吾已無為為善矣唯夫子知我左傳子二嬰齊魋嬰齊字子齹嬰齊嗣卿卒子達嗣達字子姚又曰子賸是為罕武子達事獻公聲公聲公六年定五年達帥師伐宋敗宋師于老邱晉范中行氏叛八年哀二年齊輸范氏粟達及駟𢎞送之晉趙鞅禦之戰于鐵我師敗績達之嬖許瑕者求邑于達無以與之請外取許之十五年哀九年圍宋雍邱將以與許瑕宋皇瑗圍我師每日遷舍壘合我師哭達救之大敗宋取我師于壅邱使有能者無死以郲張與鄭羅歸初宋鄭之間有隙地曰彌作頓邱玉暢嵒戈錫凡六邑公孫僑與宋人為成曰勿有是及宋平元之族公子辰公子地之屬自蕭來奔我為之城嵒戈錫十八年哀十二年宋向巢伐我圍嵒達救嵒圍宋師明年宋向魋救其師達使徇于師曰得桓魋者有賞魋逃歸遂取宋師于嵒以六邑為虛達卒諡曰武左傳公子騑子駟駟氏公孫夏駟帶駟偃駟絲駟乞駟顓公孫黑鄧析駟印附公子騑字子駟穆公之子駟氏之始也為鄭正卿弒僖公而立簡公事見逆臣傳騑子二公孫夏公孫黑夏字子西簡公三年襄十年盜殺騑夏嗣為卿八年襄十五年晉悼公卒夏如晉奔喪十一年襄十八年公子喜將起楚師以去諸大夫于是公伐齊夏及公孫舍之守知嘉之謀完守入保嘉不敢㑹楚師楚師還明年夏及舍之伐嘉殺之舍之當國夏聽政為正卿十八年襄二十五年我伐陳入之冬夏復伐陳陳及我平十九年襄二十六年公如晉歸使夏如晉聘辭曰寡君來煩執事懼不免于戾使夏謝不敏左傳夏子二駟帶駟乞帶字子上夏之子也夏卒帶嗣為卿亦事簡公簡公二十三年襄三十年駟氏伐良霄霄自許復入伐舊北門帶率國人伐之霄死于是游吉如晉還聞難不入而奔晉帶追之與之盟吉復歸三十年昭六年二月或夢良霄介而行曰壬子余將殺帶也壬子帶固卒左傳偃字子游帶之子也帶卒偃嗣為卿事定公定公四年昭十六年晉韓起來聘六卿餞起于郊起請皆賦以知鄭志罕嬰齊賦野有蔓草起曰孺子善哉吾有望矣公孫僑賦鄭之羔裘起曰起不堪也游吉賦褰裳起曰起在此敢勤子至于他人乎游吉拜起曰善哉子之言是不有是事其能終乎偃賦風雨豐施賦有女同車印葵賦蘀兮起喜曰鄭其庶乎二三君子賦不出鄭志皆昵燕好也皆獻馬焉而賦我將僑拜使五卿皆拜曰吾子靖亂敢不拜德七年昭十九年偃卒偃娶于晉大夫生絲絲弱其父兄立駟乞駟乞者帶之弟偃之叔父也公孫僑憎其為人且以為不順弗許亦弗止駟氏聳懼也他日絲以告其舅晉使以幣來問乞立故駟氏懼乞欲逃僑弗遣請龜以卜亦弗豫大夫謀對僑不謀而對客曰鄭國不天寡君之二三臣札瘥夭昏今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族于謀而立長親寡君與其二三老曰抑天實剝亂是吾何知焉諺曰無過亂門民有兵亂猶憚過之而況敢知天之所亂今大夫將問其故抑寡君不敢知其誰實知之乎邱之會君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之乞字子瑕乞之子曰駟顓顓字子然獻公十二年定八年顓嗣游吉為政明年顓殺鄧析而用其竹刑析亦鄭大夫改所鑄舊制不受君命私造刑法書于竹簡君子謂顓于是不忠用其道而不恤其人無以勸能矣左傳吕氏春秋鄭國多相懸以書者子産令無懸書鄧析致之子産令無致書鄧析倚之令無窮則鄧析應之亦無窮子産治鄭鄧析務難之與民之有獄者約大獄一衣小獄襦袴民之獻衣襦袴而學訟者不可勝數以非為是以是為非所欲勝因勝所欲罪因罪鄭國大亂子産于是殺鄧析而民心乃服列子鄧析操兩可之說設無窮之辭當子産執政作竹刑數難子産之治子産誅之二說與傳異漢書名家鄧析二篇說膚近無大奇公孫黑字子哲公子騑之次子也為行人鄭尉氏司氏之亂其餘盜在宋簡公八年襄十五年我納賂于宋以求之以黑為質宋盡歸之二十二年哀二十九年良霄使黑如楚辭曰楚鄭方惡而使余往是殺余也良霄曰世行也言黑世為行人黑曰可則往難則已何世之有良霄將强使之黑怒將伐霄大夫和之盟于伯有氏即良霄二十三年襄三十年公及大夫盟駟良爭故秋良霄又將使黑如楚黑以駟氏之甲伐而焚之霄奔許徐吾犯大夫之妹美二十五年昭元年公孫楚即游楚子南氏聘之黑又使强委禽焉犯懼告公孫僑僑曰是國無政非子之患也唯所欲與犯請于二子請使女擇焉皆許之黑盛飾入布幣而出楚戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也遂適楚黑怒既而櫜甲以見楚欲殺之而取其妻楚知之執戈逐之及衝擊之以戈黑傷而歸告大夫曰我好見之不知其有異志也故傷大夫謀之公孫僑曰直鈞謂先聘楚直楚用戈黑直也幼賤有罪罪在楚也乃逐楚而數之曰國之大節有五女皆奸之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪遂放楚于吳夏五月公及大夫盟罕虎公孫僑公叔假遊吉駟帶印假私盟于薰隧黑彊與于盟使太史書其名且曰七子公孫僑弗討十六年昭二年黑將作亂欲去游氏而代其位傷疾作而不果駟氏黑之族與諸大夫欲殺之公孫僑在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐僑曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎黑請以印黑之子為禇師市官僑曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司冦將至黑縊尸諸周氏之衢加木焉左傳所駟印事無見公子印印氏公孫黑肱子長印段子石公子印名不載亦穆公子印氏之先也厯事靈襄悼成四公成七年成十三年為公子班所殺事見班傳子印子曰公孫黑肱黑肱字子張又曰伯張初事襄公襄公從楚邲之役使公子去疾為質于楚襄公十年宣十年晉伐我公懼使黑肱代去疾于楚最後事簡公為卿簡公十一年襄十八年黑肱從公㑹伐齊十五年襄二十二年黑肱有疾歸邑于公召室老宗人立段而使黜官薄祭祭以特羊殷以少牢四時祀以一羊三年盛祭以羊豕殷盛也足以共祀盡歸其餘邑曰吾聞之生于亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也秋九月黑肱卒印段嗣左傳段字子石黑肱之子也嗣為卿事簡公簡公二十年襄二十七年六卿從公享晉趙武于垂隴趙武請賦以觀志公孫舍之子展賦草蟲武曰善哉民之主也抑武也不足以當也良霄伯有賦鶉之賁賁武曰牀第之言不踰閾況在野乎非使人之所得聞也公孫夏子西賦黍苗之四章武曰寡君在武何能為公孫僑子産賦隰桑武曰請受其卒章游吉子大叔賦野有蔓草武曰吾子之惠也段賦蟋蟀武曰善哉保家之主也吾有望矣公孫段子石公子豐子賦桑扈武曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享武告羊舌肹曰伯有將為戮矣其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎二十二年襄二十九年靈王崩段如周會葬二十三年襄三十年公孫黑伐良霄公孫僑出奔段從之罕虎自止之僑及段入皆受盟于子晳氏二十四年襄三十一年公如晉罕虎使段如楚以適晉告二十六年昭二年晉少姜卒段如晉弔左傳段卒子癸嗣卿癸字子柳事定公公子豐豐氏公孫段子石豐施子旗公子豐名未詳穆公子豐氏之先也僖公之為大子也與子豐適楚不禮焉及僖公即位元年襄三年朝于晉子豐欲訴諸晉而廢之公子喜止之後卒遇弒子豐卒子公孫段嗣段字子石又曰伯石事簡公簡公二十六年襄二十九年段㑹諸侯之大夫城杞二十三年襄三十年公孫僑為政有事于段賂與之邑既而段懼而歸邑卒與之良霄死使大史命段為卿辭大史退則請命焉復命之又辭如是三乃受䇿入拜公孫僑惡之使次僑位二十五年昭元年楚公子圍來聘且娶于段將以衆逆僑患之使辭焉楚知有備乃逆而出二十七年昭三年公如晉段相甚敬而卑禮無違者晉侯嘉焉授之以䇿曰子豐有勞于晉國余聞而弗忘賜女州田以胙乃舊勳段再拜稽首受䇿以出假子豐施施字子旗三十一年昭七年段卒施嗣為卿公孫僑為施歸州田于韓起曰日君以夫公孫段為能任其事而賜之州田今無祿早世不獲久享君德其子弗敢有不敢以聞于君私致諸子起辭僑曰古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之祿其況能任大國之施縱吾子為政而可後之人若屬有疆場之言敝邑獲戾而豐氏受其大討吾子取州是免敝邑于戾而建置封氏也敢以為請韓起受之左傳公子嘉子孔孔氏公孫泄孔張公子嘉字子孔穆公妾宋子之所生孔氏之先也嘉厯事五公靈襄悼成僖及簡公之立也少故公子騑當國公子發為司馬公孫輒為司空嘉為司徒簡公元年襄八年楚伐我嘉欲待晉公子騑欲從楚遂及楚平明年晉㑹諸侯伐我我成嘉從公及諸侯同盟于戲晋人不能得志于我冬復伐我次于陰口嘉曰晉師可擊也師老而勞且有歸志必大克之公孫舍之不可晉師還楚又伐我我又及楚平三年襄十年尉氏司氏作亂攻執政于西宫之朝殺公子騑公子發公孫輒嘉知之故不死遂代騑當國為載書以位序聽政辟言各示職位以受執政之法大夫諸司門子弗順將誅之公孫僑止之且請焚書焚書而後衆乃定十一年襄十八年嘉又欲去諸大夫將叛晉而起楚師以去之使告楚令尹午楚師起直公伐齊嘉及公孫舍之公孫夏守二卿知嘉之謀完守入保嘉不敢㑹楚師楚師門于純門信于城下而還嘉為政專國人患之乃討西宫之難與純門之師嘉當罪以其甲及子革公子然子子良士子孔子氏之甲守公孫舍之公孫夏率國人伐之殺嘉而分其室子革子良出奔楚子公孫泄三十一年昭七年公孫僑立泄嗣嘉後左傳孔張嘉之孫蓋泄之子也為大夫事定公定公四年昭十六年晉韓起來聘公享之公孫僑戒曰茍有位于朝無有不共恪張後至立于客間執政禦之適客後又禦之適縣間樂肆之縣間客從而笑之事畢富子大夫名不載諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我國而無禮何以求榮孔張失位吾子之恥也公孫僑怒曰發命之不衷出令之不信刑之頗類獄之放紛㑹朝之不敬使命之不聽取陵于大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周于諸侯國人所尊諸侯所知立于朝而祀于家有祿于國有賦于軍喪祭有職受脤歸脤其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之辟邪之人而皆及執政是先王無刑罰也子寧以他規我左傳公子然然氏然丹鬷蔑然明公子然名未詳亦宋子所生然氏之先也晉人執成公我立大子髠頑成公四年成十年晉伐我而歸公以求成子然及晉盟于修澤成公歸十三年襄元年晉㑹諸侯伐我楚救我侵宋吕留子然侵宋取犬邱成公薨事僖公僖公四年襄六年子然卒左傳子然丹字子革鄭殺公子嘉然丹奔楚見楚傳鬷蔑即然明明其字也蓋子然之後所出未詳事簡公簡公十九年襄一十六年晉嬖程鄭使佐下軍鄭行人公孫揮如晉聘程鄭問曰敢問降階何由揮不能對歸以語蔑蔑曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也明年程鄭卒公孫僑始知蔑問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也僑喜以語游吉且曰他日吾見蔑之面而已今吾見其心矣游吉問政于公孫僑僑曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣二十四年襄三十一年國人游于鄉校以論執政蔑謂公孫僑曰毁鄉校何如僑曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也蔑曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣蔑貌惡晉羊舌肹嘗適鄭蔑欲觀肹從使之收器者而往立于堂下一言而善肹將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑今夫子少不揚子若無言吾幾失子矣言之不可以己也如是遂如故知左傳士子孔子孔氏子良士子孔名未詳穆公妾圭媯之所生子孔氏之先也圭媯之班亞宋子而相親宋子生公子嘉及子然故士子孔亦相親簡公元年襄八年士子孔卒士子孔子曰子良名未詳子然子曰然丹即子革公子嘉實相子良然丹之室三室如一及國人殺嘉子良然丹奔楚左傳公子羽羽氏羽頡公子羽名未詳穆公子羽氏之先也成公七年成十三年為公子班所殺事見班傳子羽孫曰羽頡為馬師與良霄比公孫黑伐良霄霄奔許既而自墓門之瀆入因頡介于襄庫以伐舊北門良霄死頡出奔晉為任大夫先是鄭有樂成者于雞澤之㑹奔楚遂適晉故頡因之與之比而事趙武言伐鄭之說武以宋之盟故不可左傳頡既出奔羽氏之族遂絶論曰鄭穆十一子二子孔子然三族亡子羽不為卿故曰七穆余序列七穆次以四子所以昭有德理亂緒也至若子孔之始比盜而終合楚迹其所懷務專而已身以是敗且沈三族雅有之受爵不讓至于已死亡又曰如彼泉流無淪胥以亡尚史卷五十四
