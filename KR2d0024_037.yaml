body:
  text: 尚史卷三十七列傳十五鑲白旗漢軍李鍇撰齊諸臣傳陳完敬仲夷孟思閔孟克陳須無文子陳無宇桓子陳開武子陳書陳完者陳厲公子敬仲也其少也周史有以周易見陳侯者陳侯使筮之遇觀坤下㢲上之否坤下乾上曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天于土上山也正卦三四五爻為艮變卦二三四爻亦為艮故曰山也此互體有山之材而照之以天光于是乎居土上故曰觀國之光利用賔于王四為諸侯變而之乾有國朝王之象庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象猶有觀焉故曰其在後乎風行而著于土故曰其在異國乎風動物行而著于土故不在本國若在異國必姜姓也姜大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎懿氏陳大夫卜妻完其妻占之曰吉是謂鳯皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京桓公十四年莊二十二年陳人殺宣公大子御寇完奔齊桓公使完為卿辭曰羇旅之臣幸若獲宥及于寬政赦其不間于教訓而免于罪戾弛于負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢左傳卒諡敬仲子夷孟思史記作稚孟懿夷孟思之子曰閔孟克史記作湣孟莊閔孟克之子曰陳須無系本陳須無者完曽孫文子也莊公四年襄二十三年公伐衛自衛將伐晋晏嬰及崔杼諌不聽須無見杼曰將如君何杼曰吾言于君君弗聽也以為盟主而利其難晋有欒盈之難羣臣若急君于何有子姑止之須無退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也况以惡乎五年襄二十四年公既伐晋而懼將欲見楚子楚子使薳啓疆來聘且請期齊杜搜軍實使客觀之須無曰齊將有寇吾聞之兵不戢必取其族崔杼見棠姜欲取之筮之遇困坎下兑上困之大過巽下兑上大過史皆曰吉示須無須無曰夫從風坎為中男變而為巽故曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟坎為險為水水之險者石不可以動據于蒺藜所恃傷也坎為險兑為澤澤之生物而險者蒺藜恃之則傷入于其宫不見其妻凶無所歸也六三失位無應則喪其妻失其所歸也杼曰嫠也何害先夫當之矣遂取之及後棠無咎東郭偃亂崔氏慶封滅之卒如其占景公二年襄二十七年宋向戍欲弭諸侯之兵以為名如晋晋許之如楚楚亦許之如齊齊人難之須無曰晋楚許之我焉得已且人曰弭兵而我弗許則固携吾民矣將焉用之齊亦許之夏六月須無及慶封㑹諸侯之大夫于宋三年襄二十八年公朝于晋宋之盟故也將行慶封曰我不與盟何為于晋須無曰先事後賄禮也小事大未獲事焉從之如志禮也雖不與盟敢叛晋乎重邱之盟未可忘也重邱盟在二十五年子其勸行慶封好田而耆酒與慶舍政舍慶封子十一月乙亥嘗于大公之廟欒髙陳鮑之徒殺慶舍公懼須無以公歸稅服而如內宫慶封伐內宫弗克遂出奔左傳須無卒諡曰文子無宇陳無宇完五世孫桓子也無宇逮事靈公靈公十五年襄六年公滅萊無宇獻萊宗器于襄宫莊公五年襄二十四年楚使薳啓疆來聘且請㑹期秋聞將有晋師使無宇從薳啓疆如楚辭且乞師冬楚子伐鄭以救我諸侯還救鄭楚子自棘澤還師薳啓疆帥師送無宇以歸六年襄二十五年莊公被弒弟景公立景公三年襄二十八年國人將討慶封須無謂無宇曰禍將作矣吾其何得對曰得慶氏之木百車于莊須無曰可慎守也己善無宇不志于貨財可慎守其家也冬十月慶封田于萊無宇從須無使召之請曰無宇之母疾病請歸慶封卜之示之兆曰死無宇奉龜而泣乃使歸無宇濟水而戕舟發梁遂殺慶舍八年昭二年四月晋韓須韓起之子來逆女無宇送女致少姜晋謂無宇非卿執諸中都少姜為之請曰送從逆班畏大國也猶有所易是以亂作十月無宇歸十六年昭十年惠欒髙氏皆耆酒彊于陳鮑氏而惡之有告無宇曰子旗即欒施子良即高彊將攻陳鮑亦告鮑氏無宇授甲而如鮑氏遂見鮑國則亦授甲矣使視二子則皆將飲酒無宇曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸遂伐欒髙氏敗之欒施髙彊奔魯陳鮑分其室晏嬰說無宇無宇盡致諸公而請老于莒子山子商子周者皆羣公子公孫蠆逐之至是無宇反之私具幄幕器用從者之衣屨而反棘焉棘子山邑子商亦如之而反其邑子周亦如之而與之夫于皆益其祿凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟公與無宇莒之旁邑辭穆孟姬景公母為之請髙唐陳氏始大卒諡曰桓子三開乞書乞見逆臣傳開字子彊是為陳武子景公三十二年昭二十六年公納魯昭公師及魯師戰于炊鼻冉豎季氏臣射開中手失弓而罵以告季孫意如曰有君子白晳鬒鬚眉甚口意如曰必子彊也無乃亢諸對曰謂之君子何敢亢之左傳卒諡曰武晏子公孫接田開疆古冶子事景公以勇力搏虎聞晏子曰君蓄勇力之士也無長幼之禮請餽之二桃曰三子計功而食公孫接曰接一搏􅢢而再搏乳虎若接之功可以食桃援桃而起田開疆曰吾伏兵而郤三軍者再開疆之功可以食桃援桃而起古冶子曰吾嘗從君濟于河黿銜左驂以入砥柱之流冶逆流百步順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出若冶之功可以食桃二子何不反桃抽劔而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇亦反其桃挈領而死所謂田開疆者或即武子書字子占是為孫書書事景公髙發伐莒莒子奔紀鄣莒邑使書伐之初莒有婦人莒子殺其夫已為嫠婦及老託于紀鄣紡焉以度而去之及師至則投諸外或獻諸書書使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出我師入紀簡公元年哀十一年魯㑹吳伐我書兄乞謂書爾死我必得志書曰此行也吾聞鼓而已不聞金矣陳逆者字子行亦命其徒具含玉以示必死及戰于艾陵大敗我師書死之逆免左傳論曰四時之序各以子代秋之于夏則從所不勝伏金越母而代之盛盛則殺天之道也姜興莫盛于桓而敬仲來伏金之道可畏哉苑何忌烏枝鳴烏餘附邴意兹萊章苑何忌烏枝鳴者並齊大夫景公二十六年昭二十年公使公孫青聘于衛適衛亂青將事有禮衛定而告寧于我且言青公將飲酒遍賜大夫曰二三子之教也苑何忌辭曰與子青之賞必及于其罰在康誥曰父子兄弟罪不相及况在羣臣臣敢貪君賜以干先王二十七年二十一年宋華氏叛華登以吳師救華氏時烏枝鳴戍宋齊師宋師敗吳師華登帥其餘以敗宋師烏枝鳴曰用少莫如齊致死齊致死莫如去備備長兵也彼多兵矣請皆用劔從之遂敗華氏㑹苑何忌及晋衛之帥救宋大敗華氏圍諸南里三十二年二十六年公納魯昭公師及魯師戰于炊鼻苑何忌取林雍耳斷其足以歸後有烏餘者亦齊大夫事具晋傳左傳邴意兹者齊大夫景公五十一年定十三年公及衛靈公次于垂葭使師伐晋將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河內傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河內公皆斂諸大夫之軒唯邴意兹乘軒悼公元年哀六年陳乞攻國夏高張高國敗邴意兹奔魯萊章者亦齊大夫平公十年哀二十四年晋伐我取廪邱軍吏令繕將進萊章曰君卑政暴往嵗克敵謂前年禽顔庚今又勝都天奉多矣又焉能進是躗言也躗過也役將班矣晋師果還左傳殖綽郭最州綽殖綽郭最皆齊大夫勇士也事靈公靈公二十七年襄十八年晋㑹諸侯伐我公禦諸平隂公登巫山以望晋師畏其衆也乃脫歸晋人從我師夙沙衛殿衛齊寺人殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬于隘以塞道衛恨其言故塞道欲使晋獲之晋州綽及之射殖綽中肩兩矢夾脰曰止將為三軍獲不止將取其衷殖綽顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆襟甲面縛坐于中軍之鼓下遂至齊都焚我四郭州綽門于東閭左驂迫還于東門中以枚數闔枚馬撾闔門扇而還殖綽郭最尋復歸齊及莊公立夙沙衛以髙唐叛莊公圍之殖綽夜縋納師遂醢衛莊公二年襄二十一年州綽以欒盈黨來奔公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還于門中識其枚數其可以與于此乎公曰子為晋君也對曰臣為𨽻新然二子者譬于禽獸臣食其肉而寢處其皮矣公被弒州綽死之殖綽後之衛孫林父叛衛晋為之戍茅氏殖綽伐茅氏殺晋戍三百人孫蒯追之孫氏臣雍鉏獲綽左傳東郭書敝無存王猛犂彌顔庚附顔晋東郭書敝無存王猛犂彌皆齊人景公四十七年定九年公伐晋夷儀敝無存之父將室之以與其弟曰此役也不死反必娶于髙國至夷儀敝無存先登求自門出死于霤下東郭書讓登城非人所樂故讓衆使後而已先登犂彌從之曰子讓而左我讓而右使登者絶而後下使登城者盡終而後下入城蓋彌譎書恐其先下也書左彌先下書與王猛息猛曰我先登書斂甲曰曩者之難今又難焉言登城有犂彌之難今又有王猛之難猛笑曰吾從子如驂之靳靳車中馬言如驂馬之隨靳也遂克夷儀晋車千乘在中牟伐我于五氏敗我師公賞犂彌犂彌辭曰有先登者臣從之晳幘而衣貍製晳白幘齒上下相值製裘也公使視東郭書曰乃夫子也吾貺子公賞東郭書辭曰彼賔旅也彼謂犂彌言彼與我若賔主相讓旅俱進退乃賞犂彌公謂夷儀人曰得敝無存者以五家免乃得其尸公三襚之襚衣也比殯三加襚衣與之犀軒與直蓋犀軒卿車直蓋髙蓋而先歸之坐引者以師哭之親推之三四十八年定十年公㑹魯定公于夾谷犂彌言于公曰孔邱知禮而無勇若使萊人以兵劫魯侯必得志焉公從之孔邱令以兵擊萊人責公公遽辟之歸魯汶陽之田簡公元年哀十一年魯㑹吳伐我東郭書曰三戰謂夷儀五氏與今必死于此矣戰于艾陵軍敗書死之又有顔庚者是為顔涿聚韓詩外傳有顔鄧聚為景公主鳥者事具晏子傳平公九年哀二十三年齊晋戰于犂邱顔庚死之庚子晋十三年哀二十七年晋伐鄭齊將救之陳恆屬孤子三日朝設乘車兩馬繫五邑焉召顔晋曰隰之役即犂邱而父死焉以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞左傳論曰邴萊測敵若觀火而邴獨乘軒國君固以進為多矣州綽羇旅東郭微者然從難從師有死無二菅蒯雖賤絲麻同功若夫加三襚繫五邑亦所以忠厚報下也徒人費石之紛如孟陽附徒人費者齊賤役也襄公十二年莊八年公游于姑棼田于貝邱見大豕人立而啼懼隊于車傷足喪屨反誅屨于徒人費弗得鞭之見血走出適連稱管至父作亂遇之于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬬死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于户下遂弒公石之紛如孟陽皆齊小臣左傳逢丑父邴夏逢丑父邴夏皆事頃公頃公十年成二年晋郤克㑹魯衛之師以伐我陳于鞍邴夏御公逢丑父為右及戰我師敗績晋韓厥中御而從公邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中丑父與公易位將及華泉驂絓于木而止丑父寢于轏中轏士車蛇出于其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前奉觴加璧以進丑父使公下如華泉取飲公免韓厥獻丑父郤克將戮之呼曰自今無有代其君任患者有一于此將為戮乎郤克曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之公既免求丑父三入三出左傳申鮮虞閭邱嬰傳摯閭邱明附祝他父申蒯鬷蔑附申鮮虞閭邱嬰者莊公近臣崔杼弒莊公閭邱嬰以帷縳其妻而載之與申鮮虞乘而出鮮虞推而下之曰君昏不能匡危不能救死不能死而知匿其昵其誰納之行及弇中狹道將舍嬰曰崔慶其追我鮮虞曰一與一誰能懼我言道狹一人敵一人耳遂舍枕轡而寢食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂奔魯僕賃于野以喪莊公楚人召鮮虞鮮虞如楚為右尹鮮虞子傅摯亦事莊公以武力聞崔慶敗閭邱嬰復于齊嬰復齊傳不載景公四年襄二十九年公孫蠆放髙止於北燕其子豎以盧叛嬰帥師圍盧豎奔晋六年襄三十一年公孫蠆害嬰欲殺之使帥師伐陽州魯問師故蠆殺嬰以說于魯師嬰子閭邱明悼公三年哀八年我及魯平明如魯涖盟且逆季姬以歸六年哀十一年魯㑹吳伐我宗樓字子陽齊大夫將下軍與明相厲及戰于艾陵明死之左傳祝他父者莊公之嬖臣也崔杼弒莊公他父祭於高唐至復命不說辨爵辨祭服說同脫而死于崔氏申蒯者侍漁者也退謂其宰曰爾以幣免我將死其宰曰免是反子之義也與之皆死杼又殺鬷蔑于平隂鬷蔑者平隂大夫亦公之外嬖也時賈舉勇力之士非侍人州綽邴師公孫敖封具鐸父襄伊僂堙皆死之左傳韓詩外傳崔杼弒莊公荆蒯芮使晋而反其僕曰君無道諸侯莫不聞夫子死之不亦難乎荆蒯芮曰善哉而言也早言我能諫諫而不用我能去今既不諫又不去吾食亂君之食又安得治君而死之遂驅車而死僕曰人有亂君猶必死之我有治長可無死乎乃結轡自刎于車上新序崔杼弒莊公有陳不占者聞難將赴之比去餐則失匕上車失軾御者曰怯如是去有益乎不占曰死君義也無勇私也不以私害公遂往聞戰聲恐駭而死南史氏南史氏者齊史也崔抒弒莊公大史書曰崔杼弒其君杼弒之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還左傳韓詩外傳田常弒簡公盟于國人曰不盟者死及家石他曰舍君以全親非忠也舍親以死君非孝也乃進盟以免父母退伏劔以死新序陳恆弒君使勇士六人劫子淵棲子淵棲曰子之欲與我以我為知乎臣弒君非知也以我為仁乎見利而背君非仁也以我為勇乎劫我以兵懼而與子非勇也吾無此三者何補于子有此三者終不從子矣乃舍之孔叢子東郭亥欲攻田氏執贄見夫子而訪焉夫子揖子貢使答之子貢曰子士也位卑而圖大位卑則人不附圖大則人憚之殆非子之任也馬方駭鼓而驚之繫方絶重而填之其危必矣東郭亥免戰而跪曰己矣願子無言既而夫子曰亥欲為義者也告之以難易可矣奚至懼之哉論曰晏子有云君為己死非其私昵誰敢任之嘻死固有未易者夫雖然厚祿之家見危而遷動以君市者仡仡乎與此有間乎大史氏蹈白刃以整天紀盾昭杼昏蓋難為董狐之直哉諸公子傳公子無虧公子雍大子舍公子彊公子無虧史作無詭字武孟桓公子長衛姬之所生也桓公二十六年閔二年狄滅衛宋立戴公以廬于曹桓公使無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材材本也使立門戶歸夫人魚軒重錦三十兩四十三年僖十七年公既立孝公為大子又許雍巫即易牙立無虧冬十月公卒雍巫與寺人貂殺羣吏而立無虧孝公奔宋明年宋襄公以諸侯伐我三月我殺無虧宋立孝公而還左傳公子雍亦桓公子宋華子之所生也桓公卒無虧立孝公元年僖十八年宋伐我我殺無虧雍及元潘商人四公子之徒與宋人戰師敗雍奔楚五年僖二十六年魯僖公以楚師伐我取榖置雍于榖雍巫奉之以為魯援楚申公叔侯戍之左傳桓公子六昭元潘商人無虧雍昭為孝公元為惠公潘為昭公商人為懿公無虧立而見殺雍卒不得立傳曰桓公之子七人為上大夫于楚蓋莫可考云大子舍昭公子子叔姬之所生也叔姬無寵舍無威昭公二十年文十四年公薨子舍立秋七月商人弒之而自立左傳公子彊公子角公子固公子鑄皆頃公子頃公七年宣十七年我怒晋郤克夏㑹于斷道晋執我使明年頃公㑹晋侯盟于繒以彊為質于晋晋師還靈公八年成十七年公㑹伐鄭聲孟子誣髙無咎鮑牽將不納公而立公子角髙鮑由是得罪公子固字子成鑄字子工景公十四年昭八年公孫蠆卒欒施殺梁嬰蠆家宰而逐固及鑄皆奔魯欒髙敗陳無宇仄之而皆益其祿左傳公子牙公子鉏荼買嘉駒黔公子牙靈公子母曰仲子仲生牙而屬諸戎子戎子請以為大子許之靈公遂東大子光使髙厚傅牙為大子公疾崔杼逆光立之執牙于句瀆之邱公子鉏公子買買一作賈公子嘉公子駒公子黔皆羣公子也鉏居魯之南郭故又謂之南郭且于莊公二年襄二十一年公復討公子牙之黨執買于句瀆之邱鉏奔魯叔孫還奔燕還亦齊之公族也景公三年襄二十八年崔杼死慶封出亡公乃皆召之具其器用而反其邑七年昭元年鉏納去疾莒君密州子于莒是為著邱公三十二年昭二十六年公將納魯昭公使鉏帥師從之戰于炊鼻不克納而還五十八年哀五年公疾使立安孺子荼而置羣公子于萊公薨嘉駒黔奔衛鉏及陽生即悼公奔魯故萊人歌之曰景公死乎不與埋三軍之事不與謀師乎師乎何黨之乎黨所之往也明年陳乞召陽生陽生駕而見鉏曰嘗獻馬于季孫不入于上乘故又獻此請與子乘之出萊門而告之故遂行陽生竟得立左傳晏子景公有男五人所使傅之者皆有車百乘者也晏子為一焉公召其傅曰勉之將以而所傅為子及晏子晏子辭曰君命其臣據其肩以盡其力臣敢不勉乎今人人命之曰將以而所傅為子此樹黨傾國之道也嬰不敢受命晏子淳于人納女于景公生孺子荼公愛之諸田欲廢公子陽生而立荼公以告晏子晏子曰不可廢長立少不可以教下尊孽卑宗不可以利所愛長少無等孽無别樹姦之本也不聽公沒田氏殺君荼立陽生殺陽生立簡公殺簡公而取齊國公孫竈欒氏子雅公孫蠆髙氏子尾欒施附髙彊王黑公孫竈公孫蠆者皆惠公孫竈字子雅所謂欒氏也蠆字子尾所謂髙氏也竈蠆厯事頃靈莊三公景公時慶封當國慶封好田而耆酒與慶舍封之子政又嬖盧蒲癸與王何癸與何皆莊公黨癸與何將謀慶氏故怒諸大夫及竈與蠆慶封知之與諸大夫共謀欒髙氏景公三年襄二十八年冬十月慶封田于萊盧蒲癸王何將攻慶氏十一月嘗于大公之廟慶舍涖事癸何執寢戈蠆抽桷擊扉三癸自後刺之何以戈擊之慶舍死慶封奔魯公與竈邑辭多受少與蠆邑受而稍致之公以為忠故欒髙又有寵四年襄二十九年竈蠆放大夫高止于北燕五年襄三十年蠆及諸侯之大夫㑹于澶淵宋災故六年襄三十一年蠆害閭邱嬰使伐魯復殺之以說于魯于是工僂灑渻竈孔虺賈寅四子嬰之黨出奔莒出羣公子子山子商子周九年昭三年晋少姜卒嗣昏于我韓起來逆女蠆為少姜之有寵也以其子更公女而嫁公子更嫁公女也公子公女變文耳九月竈放盧蒲嫳于北燕嫳慶封黨是年十月竈卒又五年蠆卒韓非子景公之晋問政于師曠師曠曰君必惠民而已矣公歸思得師曠之所謂公子尾公子夏家富而民說之此危吾位者也謂我惠民者使與二弟爭民邪于是發粟散財惠施于民居二年子夏逃楚子尾走晋緣其子欒施高彊誤二弟出嘗出仁竈子欒施蠆子髙彊施字子旗彊字子良景公八年昭二年晋韓起來納幣聘少姜見竈竈召施使見起起曰非保家之主也不臣見蠆蠆見彊起謂之如施大夫多笑之唯晏嬰信之曰夫子君子也君子有信其有以知之矣及蠆卒施欲治其室欲并治子良之家政殺梁嬰子尾家宰而立彊之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳無宇善于蠆亦授甲將助之或告施施不信則數人告將往又數人告于道遂如陳氏無宇將出矣聞之而還游服而逆之施請命對曰聞彊氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從施曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之其若先人何子盍謂之周書曰惠不惠茂不茂康叔所以服𢎞大也無宇稽首曰頃靈頃公靈公欒氏所事之君福子吾猶有望遂和之如初欒髙氏皆耆酒信內多怨彊于陳鮑氏而惡之十六年昭十年夏有告陳無宇曰子旗子良將攻陳鮑亦告鮑氏陳鮑方睦遂伐欒髙氏彊曰先得公陳鮑焉往遂伐虎門公卜使王黑齊大夫以靈姑銔公旗名率吉請斷三尺焉而用之明不敢與君同五月戰于稷欒髙敗又敗諸莊國人追之又敗諸鹿門施彊奔魯會叔孫婼至自晋大夫皆見髙彊見而退婼語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎後適晋五十一年定十三年晋知韓魏奉晋侯以伐范氏中行氏弗克二子伐晋侯彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聼遂伐晋侯師敗奔朝歌明年晋人敗之于潞獲彊左傳公孫捷公孫青公孫捷又曰淵捷字子車頃公孫景公十四年昭八年欒施逐之奔魯十六年昭十年陳無宇反之三十二年昭二十六年公使納魯昭公師及魯師戰于炊鼻捷從泄聲子魯大夫射之中楯瓦瓦楯脊繇朐汰輈匕入者三寸胊車軛輈車轅繇過汰矢激匕矢鏃聲子射其馬斬鞅殪改駕魯人以為鬷戾魯叔孫氏司馬也而助之捷曰齊人也魯人將擊捷捷射之殪其御曰又之捷曰衆可懼也而不可怒也公孫青字子石亦頃公孫景公二十六年昭二十年衛齊豹之亂靈公如死鳥衛地㑹公使青聘于衛既出聞衛亂使請所聘公曰猶在竟內則衛君也乃將事焉遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱命青曰寡君命下臣于朝曰阿下執事臣不敢二衛人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止靈公固請見之不獲命以其良馬見為未致使故也靈公以為乘馬青將掫行夜也衛人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭青曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免于戾請以除死親執鐸終夕與于燎及靈公入告寧于齊且言青公將飲酒遍賜大夫曰二三子之教也左傳公孫晳公孫叟公孫夏公孫揮公孫晳公孫叟公孫夏公孫揮蓋皆公族也並為大夫景公十三年昭七年公將納北燕伯次于虢燕人行成晳曰受服而退俟釁而動可也不克納而還十八年昭十二年晋平公以公宴荀吳相投壺平公先荀吳曰有酒如淮有肉如坻寡君中此為諸侯師中之公舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之叟趨進曰日旴君勤可以出矣以公出簡公元年哀十一年魯㑹吳伐我國書將中軍髙無㔻將上軍宗樓將下軍宗樓與閭邱明相厲相勸厲致死桑掩胥御國書公孫夏曰二子必死亦勸厲致死將戰夏命其徒歌虞殯公孫揮命其徒曰人尋約約繩也尋八尺也欲以繩貫首也吳髮短及戰大敗我師夏死之揮免左傳論曰桓啓內難景復踵之死無與埋猶之尸蟲出户也國既內潰而姦臣緣隙以斫喪之姜氏之祀疏屬莫尸矧夫兄弟伯叔哉殷士膚敏祼將于京傷絶祀也逸民傳桃殳丈夫小臣稷愚公郭墟野人桃殳丈夫者裒衣應步𢃄著桃殳桓公出逰怪而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯庶人之戒在于桃殳公說其言與之共載明年正月庶人皆佩韓詩外傳又有處士曰小臣稷桓公三往而弗得見公曰吾聞布衣之士不輕爵祿無以易萬乘之主萬乘之主不好仁義無以下布衣之士于是五往乃得見之韓非子新序同又有愚公者隱于齊桓公出獵逐鹿入谷見一老公而問之曰是為何谷對曰為愚公之谷曰何故曰以臣名之曰視公之狀非愚人也何為以公名對曰臣故畜牸牛生子而大賣之而買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷公曰公誠愚矣何為而與之公歸以告管夷吾夷吾正襟再拜曰此夷吾之愚也公之獄訟之不正故與之耳請退而修政孔子曰弟子記之桓公霸君也管仲賢佐也猶有以智為愚者也又有郭墟野人者桓公出遊見亡國故城郭氏之墟問于野人曰是為何墟野人曰是為郭氏之墟公曰郭氏何為墟曰郭氏善善而惡惡公曰善善而惡惡其所以為墟者何也曰善善而不能行惡惡而不能去是以為墟也公歸以語夷吾夷吾曰其人為誰公曰不知也夷吾曰君亦一郭氏也于是公召野人而賞焉新序說苑桓公設庭燎為士之欲造見者期年士不至東野鄙人有以九九之術見者公曰九九何足以見乎鄙人對曰臣聞君設庭燎以待士期年士不至夫士所以不至者君賢君也士皆自以論不及君故不至也夫九九薄能耳而君猶禮之况賢于九九乎夫泰山不辭壤石江海不逆小流所以成大也詩云先民有言詢于芻蕘言博謀也公曰善乃禮之期月四方之士相携而至虞人麥邱封人虞人者齊掌山澤之官景公田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之左傳景公逰于麥邱問其封人曰年幾何矣對曰鄙人之年八十五矣公曰夀哉子其祝我封人曰使君之年長于胡宜國家公曰善哉子其復之使君之嗣夀皆若臣公曰善哉子其復之使君無得罪于民公曰民得罪于君則可安有君得罪于民者乎晏嬰曰君過矣敢問桀紂君誅乎民誅乎公曰寡人固也于是賜封人麥邱以為邑晏子桓新序作公越石父於陵子附越石父齊人也晏嬰之晋見反裘負芻息于塗者以為君子也使人見焉曰曷為而至此對曰齊人纍之名為越石父嬰曰嘻遽解左驂以贖之載而與歸至舍勿辭而入越石父請絶嬰曰嬰未嘗得交也今免子于患吾于子猶未邪越石父曰吾聞君子屈乎不已知者而伸乎已知者吾是以請絶也嬰出見之曰嚮也見客之容而已今也見客之志嬰聞察實者不留聲觀行者不譏辭嬰可以辭而無棄乎遂以為客吕氏春秋於陵子於陵子齊人居楚齊楚有重邱之役也問于於陵子曰齊子産也楚子居也今二國構兵子將奚直於陵子曰古者諸侯擅誅伐天子得按其罪而輕重之然湯殱葛桀未放也西伯戡黎紂未亡也彼所謂聖人者且首于而靡悔焉矧蔑天子未有如今者乎昔者泰山與江漢爭王兩京之下泰山矢曰弗讓吾飄塵以實彼溝澮且不為齊主江漢亦矢曰弗汜吾淤瀝以蕩彼培塿且不為楚雄于是有中州之蝸將起而責其是非欲東之泰山㑹程三千餘嵗欲南之江漢亦㑹程三千餘嵗因自量其齒則不過旦暮之間于是悲憤莫勝而枯于蓬蒿之上為螻蟻所笑也今天子且拱手不能按其輕重而一匹之夫欲起而議之何異于中州之蝸為螻蟻所笑也黔敖黔敖齊人也齊大饑黔敖為食于路以待餓者而食之有餓者䝉袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以至于斯也從而謝焉終不食而死記檀弓論曰網罟無以竭淵魚弋畢不能窮邱禽遺逸之民所以飛沈限外也箕潁之事龍門疑之然麟角龍甲物不必有取重而已尚史卷三十七
