body:
  text: 尚史卷六十八列傳四十六鑲白旗漢軍李鍇撰魏諸臣傳芒卯孫臣附芒卯初事昭王秦約趙伐我昭王患之卯曰王勿憂也臣請發張倚魏人使謂趙王曰夫鄴寡人固形弗有也形猶勢也今大王收秦而攻魏寡人請以鄴事大王趙王喜召相國而命之曰魏王請以鄴事寡人使寡人絶秦相國曰收秦攻魏利不過鄴今不用兵而得鄴請許魏張倚因謂趙王曰敝邑之吏効城者已在鄴矣大王且何以報魏趙王因令閉闗絶秦秦趙大惡芒卯應趙使曰敝邑所以事大王者為完鄴也今効鄴者使者之罪也卯不知也趙王恐魏承秦之怒遽割五城以合于魏而支秦卯謂秦王曰王之士未有為之中者也中謂居中用事猶内間也臣聞明王不背中而行王之所欲于魏者長平王屋洛林之地也王能使臣為魏之司徒則臣能使魏獻之秦王曰善因任以為魏之司徒謂昭王曰王所患者上地也秦之所欲于我者長平王屋洛林之地也王獻之秦則上地無憂患因請以下兵東撃齊攘地必逺矣昭王曰善因獻之秦地入數月而秦兵不下昭王謂夘曰地入數月而秦兵不下何也卯曰臣有死罪雖然臣死則契折于秦王無以責秦王因赦其罪臣為王責約于秦乃之秦謂秦王曰魏之所以獻長平王屋洛林之地者欲以下大王之兵東擊齊也今地已入而秦兵不下臣則死人也雖然後山東之士無以利事王者矣秦王瞿然曰國有事未贍下兵也今以兵從後十日秦兵下卯并將秦魏之兵東撃齊啟地二十二縣史記世家芒邜以詐重而漏其事葢即謂此也淮南子孟卯妻其嫂有五子焉然而相魏寧其危解其患吕氏春秋魏令孟卯割絳􅀢安邑之地與秦王王喜令起賈為卬求司徒于魏王魏王不悦曰寡人寧以臧為司徒無用卬起賈出孟卬入見曰秦客何言王曰求以女為司徒曰王應之若何王曰寧以臧無用卬也孟卬太息曰冝矣王之制于秦也王何疑秦之善臣也以絳􅀢安邑令負牛書與秦猶乃善牛卬雖不肖獨不如牛乎且王令三將軍為臣先曰視卬如身是重臣也令二輕臣也令臣責卬雖賢固能乎居三日魏王乃聴起賈韓非子秦韓攻魏昭卯西説而秦韓罷齊荆攻魏卯東説而齊荆罷魏㐮王飬之以五乗將軍卯曰伯夷以將軍𦵏于首陽而天下曰夫以伯夷之賢與其稱仁而以將軍𦵏是手足不掩也今臣罷四國之兵而王乃與臣五乗此其稱功猶贏縢而履蹻芒卯未嘗事㐮王昭卯或别是一人列女傳芒卯後妻有三子前妻之子五人前妻中子犯令當死母朝夕勤勞以救其罪安釐王聞之髙其義乃赦其罪母率導八子咸為魏大夫卿士眧王薨卯事安釐王安釐王時秦敗我于華走卯而圍大梁須賈説穰侯魏冉乃罷梁圍明年魏將使叚干崇割地而講孫臣謂王曰魏不以敗之上割可謂善用不勝矣秦不以勝之上割可謂不善用勝矣今處期年乃欲割是羣臣之私而王不知也且夫欲璽者叚干子也王使之割地欲地者秦也王使之授璽夫欲璽者制地欲地者制璽其勢必無魏矣且以地事秦譬猶抱薪而救火薪不盡火不止今王之地有盡而秦之求無竆是薪火之説也王曰善雖然吾已許秦矣不可以革也對曰王獨不見夫博者之用梟邪欲食則食欲握則握今曰不可革何用智之不若梟也王曰善乃按其行國策史記以孫臣為蘓代孫臣亦魏人昭忌周訴附支期昭忌亦事昭王昭王時秦攻韓之管昭王發兵救之忌曰夫秦强國也而韓魏壤秦不出攻則已出攻非韓必魏也今幸而于韓此魏之福也王若救之夫解攻者必韓之管致攻者必魏之梁也王不聴曰不救韓韓西合于秦秦韓為一則魏危遂救之秦果釋管而攻魏王大恐謂忌曰不用子之言而禍至奈何忌乃為之見秦王曰臣聞明王之聼也不以挾私為政是㕘行也言叅彼己而行願王無攻魏秦王曰何也曰山東之從時合時離何也秦王曰不識也曰天下之合以王之不必也猶言不可測方攻韓又攻魏是也其離也以王之必也今攻韓之管國危矣未卒而移兵于梁合天下之從無精于此者矣以為秦之求索必不可支也故為王計不如制趙制趙則燕不敢不事秦荆濟荆楚濟齊也不能獨從天下爭敵于秦則弱矣秦王乃止安釐王時又有周訴支期秦敗魏于華王且入朝于秦周訴謂王曰宋人有學者三年反而名其母其母曰名我者何也其子曰吾所賢者堯舜堯舜名吾所大者天地天地名今母賢不過堯舜母大不過天地是以名母也其母曰子之于學將盡行之乎願子之有以易名母也子之于學將有所不行乎願子之且以名母為後也今王之事秦尚有可以易入朝者乎願王之有以易之而以入朝為後也王曰子患寡人入而不出邪許綰為我祝曰入而不出請殉寡人以頭訴曰如臣之賤也有謂臣曰入不測之淵而必出不出請以一鼠首為汝殉臣必不為也今秦不可知之國猶不測之淵也而許綰之首猶鼠首也内王于不可知之秦而殉王以鼠首竊為王不取也且無梁孰與無河内急王曰梁急無梁孰與無身急王曰身急曰以三者身上也河内其下也秦未索其下而王効其上可乎王尚未聴也支期曰王視楚王楚王入秦王以三乗先之楚王不入楚魏為一尚足以捍秦王乃止謂期曰吾始已諾于應侯今不行欺之矣期曰王勿憂臣使長信侯魏相而善應侯者史失名請無内王期説于長信侯曰王命召相國長信侯曰王何以臣為曰臣不知也王急召君長信侯曰吾内王于秦者寧以為秦都以為魏也期曰君無為魏計其自為計且安死乎安生乎安窮乎安貴乎君其先自為計長信侯曰樓公將入矣謂樓緩臣今從期曰王急召君君不行血濺君襟矣長信侯行期先入謂王曰偽病而見之臣已恐之矣長信侯入王曰病甚奈何吾始已諾于應侯矣意雖道死行乎長信侯曰王毋行矣臣能得之于應侯願王無憂也國策論曰魏至昭釐秦患偪矣乃縱横之士挾詐乗危繻補漏舟茍且而已而芒卯方且以詐重噫世風之汚顧若是乎斯時也儻有正言如孟子者將一握笑之乎唐睢唐睢者魏人年九十餘矣魏安釐王時秦魏為與國齊楚約而攻魏魏使求救于秦冠葢相望秦救不出睢謂王曰老臣請西説秦令兵先臣出王曰敬諾遂約車而遣之睢見秦王秦王曰丈人芒然乃逺至此甚苦矣魏來求救數矣寡人知魏之急矣睢對曰大王已知魏之急而救不發者是籌策之臣無任矣夫魏一萬乗之國稱東藩受冠帯祠春秋者以為秦之强足以為與也今齊楚之兵已在郊矣大王之救不至魏急則且割地而約齊楚王雖欲救之豈有及哉是亡一萬乗之魏而强二敵之齊楚也竊以為大王籌策之臣無任矣秦王悟遽發兵日夜赴魏齊楚聞之乃引去史記世家在安釐王十一年信陵君殺晋鄙救邯鄲破秦存趙趙王自郊迎睢謂信陵君曰臣聞之曰事有不可知者有不可不知者有不可忘者有不可不忘者信陵君曰何謂也對曰人之憎我也不可不知也吾憎人也不可得而知也人之有徳于我也不可忘也吾有徳于人也不可不忘也今君殺晋鄙救邯鄲破秦存趙此大徳也今趙王自郊迎卒然見趙王臣願君之忘之也信陵君曰無忌謹受教景閔王時秦王使人謂安陵君安陵君趙之别封曰寡人欲以五百里之地易安陵安陵君其許寡人安陵君曰大王加恵以大易小甚善雖然受地于先王願終守之弗敢易秦王不説安陵君使唐睢使于秦秦王謂睢曰寡人以五百里之地易安陵安陵君不聴寡人何也且秦滅韓亡魏而君以五十之地存者以君為長者故不錯意也今君逆寡人者輕寡人與睢對曰否非若是也安陵君受地于先王而守之雖千里不敢易也豈直五百里哉秦王怫然怒謂睢曰公亦嘗聞天子之怒乎天子之怒伏屍百萬流血千里睢曰大王嘗聞布衣之怒乎秦王曰布衣之怒亦免冠徒跣以頭搶地耳睢曰夫專諸之刺王僚也彗星襲月聶政之刺韓傀也白虹貫日要離之刺慶忌也倉鷹撃于殿上此三子者皆布衣之士也懷怒未發休祲降于天與臣而將四矣若士必怒伏尸二人流血五歩天下縞素今日是也挺劍而起秦王色撓長跪而謝之曰先生坐何至此寡人諭矣夫韓魏滅亡而安陵以五十里之地存者徒以有先生也國策十按釐王一年唐睢説秦救魏年已九十餘又二十六年而為景閔王元年是時睢已百二十嵗有奇矣然有滅韓亡魏之文是又在後十八年也秦相應侯使唐睢居武安以五百金散從或别是一人朱已季梁附朱已者亦當安釐王時安釐王將與秦攻韓已謂王曰秦與戎翟同俗有虎狼之心貪戾好利而無信不識禮義徳行茍有利焉不顧親戚兄弟若禽獸耳此天下所同知也非有所施厚積徳也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此于親戚兄弟若此而况于仇讐之敵國乎今王與秦伐韓而益近秦臣甚惑之而王弗識則不明矣羣臣知之而莫以此諫則不忠矣今韓氏以一女子承一弱主内有大亂外安能支强秦魏之兵王以為不破乎韓亡秦有鄭地與大梁鄰王以為安乎王欲得故地而負强秦之禍王以為利乎秦非無事之國也韓亡必且更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓之上黨而攻強趙是復閼與之事秦韓相攻閼與而趙奢破秦軍秦必不為也若道河内倍鄴朝歌絶漳滏之水與趙兵决勝邯鄲之郊是受智伯之禍也秦又不敢伐楚道渉山谷行三千里而攻危隘之塞所行甚逺所攻甚難秦又弗為也若道河外倍大梁而右上蔡召陵與楚兵决陳郊秦又不敢也故曰秦必不伐楚與趙矣又不攻衛與齊矣韓亡之後兵出之日非魏無攻矣秦故有懷地邢邱安城垝津以臨河内河内之共汲莫不危秦有鄭地得垣雍决滎澤而水大梁大梁必亡王之使者大過乃惡安陵君于秦秦欲許之乆矣秦之葉陽昆陽與舞陽髙陵鄰聼使者之惡也隨安陵氏而欲亡之秦繞舞陽之北以東臨許南國必危南國雖無危魏豈得安哉夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西去梁千里有河山以闌之有周韓而間之從林軍以至于今林一作横十攻魏五入國中邉城盡㧞文臺墮垂都焚林木伐䴢鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平闞所亡乎秦者山北河外河内大縣數百名都數十秦乃在河西晋去大梁尚千里而禍若是矣又况于使秦無韓而有鄭地無河山以闌之無周韓以間之去大梁百里禍必百此矣異日者從之不成也楚魏疑而韓不可得約也今韓受兵三年矣秦撓之以講韓知亡弗聼投質于趙請為天下鴈行頓刃以臣觀之楚趙必與之攻矣何也知秦欲之無窮也非盡亡天下之兵而臣海内之民必不休矣是故臣願以從事王王速受楚趙之約而挾韓之質以存韓因求故地于韓韓必効之如此則士民不勞而故地得其功多于與秦共伐韓而無與强秦鄰之禍夫存韓安魏而利天下此亦王之天時已通韓之上黨于共莫使言通其道不通它使也史記世家作共寗共衛州共城縣寗懐州脩武縣道已通因而闗之出入賦之是魏重質韓以其上黨也共有其賦足以富國韓必徳魏愛魏重魏畏魏韓必不敢反魏韓是魏之縣也魏得韓以為縣則衛大梁河外必安矣今不存韓則二周必危安陵必易楚趙大破衛齊甚畏天下西鄉而馳秦入朝而臣不乆矣史記世家朱已作信陵君無忌王又欲攻邯鄲季梁者亦魏人也聞之中道而反衣焦不申頭塵不去往見王曰今者臣來見人于大行方北面而持其駕告臣曰我欲之楚臣曰君之楚將奚為北面曰吾馬良臣曰馬雖良此非楚之路曰吾用多臣曰用雖多此非楚路也曰吾御者善此數者愈善而離楚愈逺耳今王動欲成霸王舉欲信于天下恃國之大兵之精鋭攻邯鄲以廣地尊名王之動愈數而離王愈逺耳猶之楚而北行也國策范痤范痤者魏相也安釐王時虞卿謂趙王曰人之情寕朝人乎寧朝于人也趙王曰人亦寧朝人耳何故寧朝于人虞卿曰夫魏為從主而違者范痤也今王能以百里之地若萬户之都請殺痤于魏痤死則從事可移于趙趙王曰善乃使人以百里之地請殺范痤于魏王許諾使司徒執痤而未殺也痤獻書于王曰臣聞趙王以百里之地請殺痤夫殺無罪范痤薄故也而得百里之地大利也臣竊為王羙之雖然百里之地不可得而死者不可復生也則王必為天下笑矣臣竊以為與其以死痤市不若以生痤市也史記世家吏捕痤圍而未殺痤上屋騎危與使者言又遺後相信陵君書曰夫趙魏敵戰之國也趙王以咫尺之書來而王輕為之殺無罪之痤痤雖不肖故魏之免相也嘗以魏之故得罪于趙夫國無用臣外雖得地勢不能守今能守魏者莫如君矣王聴趙殺痤之後强秦襲趙之欲倍趙之割則君將何以止之此君之累也信陵君遽言之王而出之國策論曰七國之勢秦最强而能制秦者在韓魏以其操搤吭之權也越國以攻燕趙秦之所難楚雖壤接兵出而三晋議其後秦雖彊無如之何也自范睢主逺交近攻之論而諸侯墮其術敗從約爭秦交遂資秦帝業已夫築防以遏水水與防若二事也而遏之之道寔在防結韓魏以制秦非愛韓魏也而制之之道寔在韓魏從約解則韓魏不支韓魏不支禍且及天下因勢借力以資秦是毁防遏水之道也朱已之説得秦計最深天下至亡不悟諸侯之愚也然智數如唐睢且將與秦焉它可知也宋就宋就梁大夫也為邉縣令與楚鄰界梁亭楚亭皆種𤓰梁亭劬力數灌其𤓰𤓰羙楚亭田窳稀灌其𤓰𤓰惡楚令怒夜竊搔梁𤓰有焦死者梁亭覺之請其尉亦欲竊往報搔𤓰宋就曰是構怨召禍之道也令人竊為楚亭夜灌其𤓰楚亭旦而往𤓰則已灌𤓰日以羙怪而察之則梁亭之為也楚令大説因以聞楚王楚王曰此之謂隂讓也乃謝以幣而請交于梁新書國策衛客使魏三年不得見衛客乃見梧下先生許之以百金梧下先生見魏王曰臣聞秦出兵未知其所之秦魏交而不修之日乆矣願王專事秦魏王曰諾趨出至郎門而返曰臣恐王事秦之晚王曰何也曰夫人于事己者過急于事人者過緩今王緩于事己者安能急于事人奚以知之衛客曰事王三年不得見臣以是知王緩也魏王趨見衛客新序魏王將起中天臺令曰敢諌者死許綰負畚操鍤入曰聞王將起中天臺願加一力王曰子何力有加曰能商王曰若何曰臣聞天與地相去萬五千里今半之當起七千五百里髙既如是其趾須方八千里盡王之地不足以為臺古者堯舜建諸侯地方五千里王必建此臺先伐諸侯又伐四夷得方八千里乃足以為趾林木之積人徒之衆倉廪之儲數以萬億臺具以備乃可以作魏王黙然乃罷起臺魏諸公子傳公子成公子成又曰公孫成季文侯之弟魏成子也成進卜子夏田子方叚干木于文侯而文侯皆師之文侯以成賢遂以為相史記世家説苑文侯御廪災文侯素服辟正殿五日羣臣皆弔公子成父獨不弔文侯復殿成父趨而入賀曰甚大善矣御廪之災也文侯作色不説曰夫御廪者寡人寳之所藏今火災羣臣皆弔而子大夫不弔猶入賀何為成父曰臣聞之天子藏于四海之内諸侯藏于竟内大夫藏于其家士庶人藏于篋櫝非其所藏者不有天災必有人患今幸無人患乃有天災不亦善乎文侯喟然歎曰善韓詩外傳作晋平公公中緩公中緩武侯之子也紀年武侯元年封公子緩武侯之薨也子罃與公中緩争為大子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩争為大子君亦聞之乎今魏罃得王錯大夫挾上黨固半國也因而除之破魏必矣不可失也懿侯説乃與趙成侯合軍以伐魏戰于濁澤魏氏大敗或為趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分為兩不彊于宋衛則我終無魏患矣趙不聼韓不説以其少卒夜去史記世家子罃卒立是為恵王大子申公子理大子申恵王大子公子理申之弟也恵王三十年王起境内衆將大子申而攻齊大子過宋外黄外黄徐子曰臣有百戰百勝之術大子能聼臣乎大子曰願聞之客曰固願效之今大子自將攻齊大勝并莒則富不過有魏而貴不益為王若戰不勝則萬世無魏此臣之百戰百勝之術也大子曰諾請必從公之言而還客曰大子雖欲還不得矣彼利大子之戰攻而欲滿其意者衆大子雖欲還恐不得矣大子上車請還其御曰將出而還與北同不如遂行遂與齊人戰而死大子之自將也客謂公子理傳曰何不令公子泣王大后止大子之行事成則樹徳不成則為王矣大子年少不習于兵田肹宿將也而孫子善用兵戰必不勝不勝必禽公子争之于王王聼公子公子必封不聼公子大子必敗敗公子必立立必為王也國策大子申死魏立大子鳴史記世家以公子赫為大子系本㐮王名嗣未詳孰是論曰語有之君終無適子其國可破也武侯賢而身蹈之恵王之身不死國不分幾希矣申之攻齊與申生異茍納徐生之言不戰而還亦無後憂乃啜汁者在求無覆餗得乎公子無忌信陵君公子牟附魏公子無忌者魏昭王少子而魏安釐王異母弟也昭王薨安釐王即位封公子為信陵君是時范睢亡魏相秦以怨魏齊故秦兵圍大梁破魏華陽下軍走芒邜魏王及公子患之公子為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年公子與魏王博而北境傳舉烽言趙㓂至且入界魏王釋博欲召大臣謀公子止王曰趙王田獵耳非為㓂也復博如故王恐心不在博居頃復從北方來傳言曰趙王獵耳非為㓂也魏王大驚曰公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為客輙以報臣臣以此知之是後魏王畏公子之賢能不敢任公子以國政魏有隐士曰侯嬴年七十家貧為大梁夷門監者公子聞之往請欲厚遺之不肯受曰臣修身絜行數十年終不以監門困故而受公子財公子于是乃置酒大㑹賔客坐定公子從車騎虛左自迎夷門侯生侯生攝弊衣冠直上載公子上坐不讓欲以觀公子公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥俾倪故乆立與其客語㣲察公子公子顔色愈和當是時魏將相宗室賔客滿堂待公子舉酒市人皆觀公子執轡從騎皆竊罵侯生侯生視公子色終不變乃謝客就車至家公子引侯生坐上坐徧賛賔客賔客皆驚酒酣公子起為夀侯生前侯生因謂公子曰今日嬴之為公子亦足矣嬴乃夷門抱關者也而公子親枉車騎自迎嬴于衆人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故立乆公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也于是罷酒侯生遂為上客侯生謂公子曰臣所過屠者朱亥此子賢者世莫能知故隐屠間耳公子往數請之朱亥故不復謝公子怪之魏安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲公子姊為趙恵文王弟平原君夫人數遺魏王及公子書請救于魏魏王使將軍晋鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已㧞趙必移兵先擊之魏王恐使人止晋鄙留軍壁鄴名為救趙寔持兩端以觀望平原君使者冠葢相屬于魏讓魏公子曰勝所以自附為㛰姻者以公子之髙義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊邪公子患之數請魏王及賔客辯士説王萬端魏王畏秦終不聼公子公子曰度終不能得之于王計不獨生而令趙亡乃請賔客約車騎百餘乗欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍状辭决而行侯生曰公子勉之矣老臣不能從公子行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曾無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也公子再拜因問侯生乃屛人間語曰嬴聞晉鄙之兵符常在王卧内而如姬最幸出入王卧内力能竊之嬴聞如姬父為人所殺如姬資之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬如姬之欲為公子死無所辭顧未有路耳公子誠一開口請如姬如姬必許諾則得虎符奪晋鄙軍北救趙而西却秦此五霸之伐也公子從其計請如姬如姬果盗晋鄙兵符與公子公子行侯生曰將在外主令有所不受以便國家公子即合符而晋鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晋鄙聼大善不聽可使擊之于是公子泣侯生曰公子畏死耶何泣也公子曰晋鄙嚄唶宿將往恐不聽必當殺之是以泣耳豈畏死哉于是公子請朱亥朱亥笑曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與公子俱公子過謝侯生侯生曰臣冝從老不能請數公子行日以至晋鄙軍之曰北鄉自剄以送公子公子遂行至鄴矯魏王令代晋鄙晋鄙合符疑之舉手視公子曰今吾擁十萬之衆屯于境上國之重任今單車來代之何如哉欲無聽朱亥袖四十斤鐵椎椎殺晋鄙公子遂將晋鄙軍勒兵下令軍中曰父子俱在軍中父歸凡弟俱在軍中兄歸獨子無兄弟歸飬得選兵八萬人進兵擊秦軍秦軍觧去遂救邯鄲存趙趙王及平原君自迎公子于界平原君負䪍矢為公子先引趙王再拜曰自古賢人未有及公子者也當此之時平原君不敢自比于人公子與侯生决至軍侯生果北鄉自剄魏王怒公子之盗其兵符矯殺晋鄙公子亦自知也己却秦存趙使將將其軍歸魏而公子獨與客留趙趙孝成王徳公子之矯奪晋鄙兵而存趙乃與平原君計以五城封公子公子聞之意驕矜而有自功之色客有説公子曰物有不可忘或有不可不忘夫人有徳于公子公子不可忘也公子有徳于人願公子忘之也且矯魏王令奪晋鄙兵以救趙于趙則有功矣于魏則未為忠臣也公子乃自矯而功之竊為公子不取也于是公子立自責似若無所容者趙王埽除自迎執主人之禮引公子就西階公子側行辭讓從東階上自言􅖄過以負于魏無功于趙趙王侍酒至暮口不忍獻五城以公子退讓也公子竟留趙趙王以鄗為公子湯沐邑魏亦復以信陵奉公子公子聞趙有處士毛公藏于博徒薛公藏于賣漿家公子欲見兩人兩人自匿不肯見公子公子聞所在乃間歩往從此兩人游甚歡平原君聞之謂其夫人曰始吾聞夫人弟公子天下無雙今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告公子公子乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之逰徒豪舉耳不求士也無忌自在大梁時常聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從逰乃装為去夫人具以語平原君平原君乃免冠謝固留公子平原君門下聞之半去平原君歸公子天下士復往歸公子公子傾平原君客公子留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使往請公子公子恐其怒之乃誡門下有敢為魏王使通者死賔客皆背魏之趙莫敢勸公子歸毛公薛公兩人往見公子曰公子所以重于趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先王之宗廟公子當何面目立天下乎語未及卒公子立變色告車趣駕歸救魏魏王見公子相與泣而以上將軍印授公子公子遂將魏安釐王三十年公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍于河外走䝉驁遂乘勝逐秦軍至函谷闗抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法秦王患之乃行金萬斤于魏求晋鄙客令毁公子于魏王曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞魏公子不聞魏王公子亦欲因此時定南面而王諸侯畏公子之威方欲共立之秦數使反間偽賀公子得立為魏王未也魏王日聞其毁不能不信後果使人代公子將公子自知再以毁廢乃謝病不朝與賔客長夜飲飲醇酒多近婦女日夜為樂飲者四嵗竟病酒而卒其嵗魏安釐王亦薨秦聞公子死使䝉驁攻魏㧞二十城初置東郡其後秦稍蠶食魏十八嵗而虜魏王屠大梁史記列士傳無忌方食有鳩飛入案下望見一鷂在屋上飛去乃縱鳩鷂逐而殺之公子不食曰鳩避惡歸吾竟為鷂得吾負之捕得鷂者吾無所愛左右捕鷂二百餘奉公子公子按劍至籠上曰誰獲罪吾者一鷂獨低頭不敢仰視乃殺之放其餘列士傳秦召無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著猛獸圈中亥瞋目視之眥裂血濺獸不敢動兵形勢魏公子二十一篇圖十卷漢書安釐王時有公子牟公子牟游于秦説應侯見趙豹傳過趙説趙王見建信君傳國䇿道家公子牟四篇漢書列子中山公子牟魏之賢公子也好與賢人㳺不恤國事而説趙人公孫龍樂正子輿之徒笑之曰公孫之為人也佞給而不中漫衍而無家惑人之心屈人之口與韓檀等肄之牟變容曰何子狀公孫之過與請問其寔子輿曰龍詒孔穿言善射者能令後鏃中前括發發相及矢矢相屬前矢造凖而無絶落後矢之括猶銜弦視之若一焉此未其妙者逢䝉之弟子鴻超怒其妻而怖之射其目矢來注眸子而眶不睫矢墜地而塵不揚是豈智者之言與牟曰後鏃中前括鈞後于前矢注眸子而不睫盡矢之勢也子何疑焉子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心有指不至有物不盡有形不移髪引千鈞白馬非白狐犢未嘗有母牟曰夫無意則心同無指則皆至盡物者常有形不疑者説在改也髪引千鈞勢至等也白馬非白形名離也狐犢未嘗有母非孤犢也子輿曰子以龍之鳴皆條也設令發于餘竅子亦將承之牟黙然退莊子公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何瞻子曰重生重生則利輕牟雖知之未能勝也瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重陽重陽之人無夀類矣魏牟萬乗之公子也其隠巖穴也難為于布衣之士論曰戰國四君信陵最賢漢髙過魯祀孔子過大梁祠信陵深賢之也然而竊符救趙矯以濟事㣲毛薛不幾客鄗以死乎雖然信陵將而函谷塞身殁十八年而魏亡公子之繫魏重若此予嘗過大梁之墟監門博徒庸有之而邈乎無公子之風矣魏嬖臣傳龍陽君龍陽君者魏之幸臣也史記失其名安釐王與龍陽君共船而釣龍陽君得十餘魚而涕下王曰有所不安乎對曰無敢不安也曰然則何為涕出曰臣為臣之所得魚也王曰何謂也曰臣之始得魚也甚喜後得又益大今臣直欲棄臣前之所得矣以臣之凶惡而得為拂枕席臣爵至人君走人于庭避人于途四海之内羙人亦甚多矣聞臣之得幸于王也必褰裳而趨王臣亦猶曩之前所得魚也亦將棄矣能無涕出乎王曰誤有是心也何不相告也于是布令曰敢言羙人者族國策尚史卷六十八
