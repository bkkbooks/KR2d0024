body:
  text: 尚史卷六十四列傳四十二鑲白旗漢軍李鍇撰越諸臣傳范蠡范蠡字少伯楚宛三户人太史公素王妙論南陽人髙呂覽解楚三户人佯狂倜儻負俗文種為宛令遣吏謁奉吏還曰范蠡狂種笑曰吾聞士有賢俊之姿必有佯狂之譏内懐獨見之明外有不知之毁此固非二三子之所知也駕車而􅉨蠡避之種再謁抵掌而談旁觀者聳聽㑹稽典録吳越春秋文種為宛令之三户之里范蠡從犬竇蹲而吠之從吏恐種慙引衣而障之文種曰無障也吾聞犬之所吠者人也人身而犬吠謂我是人也乃下車拜蠡不為禮越絶書范蠡始居楚也生于宛槖或伍户之虛其為結種之時一癡一醒時人以為狂然有聖賢之明大夫種入其縣得蠡而説乃從官屬問治之術志合意同俱見霸兆出于東南捐其官位相要而往去吳之越句踐賢之種躬正内蠡出治外種善圖始蠡能慮終越絶書范蠡始居楚曰范伯被髮佯狂不與于世謂大夫種曰天運厯紀千嵗一至黄帝之元執辰破已霸王之氣見于地户子胥于是要大夫種入呉此時馮同戒之伍子胥在自與不能闗其辭蠡曰吳越二邦同氣共俗地户之位非吳則越乃入越越王常與言盡日大夫石買有權辯口進曰􅃷女不貞􅃷士不信客歴諸侯無因自至殆非真賢于是范蠡退而不言遊于楚越之間大夫種進曰昔者市偷自􅃷于晉晉用之而勝楚伊尹負鼎入殷遂佐湯取天下有智之士不在逺近取也于是石買益疏後使將兵為軍士所殺後與種俱入越事越子句踐為大夫句踐三年哀元年吳伐我我逆之蠡進見曰夫國家之事有持盈有定傾有節事王曰三者奈何對曰持盈者與天定傾者與人節事者與地天道盈而不溢盛而不驕勞而不矜其功夫聖人隨時以行天時不作弗為人客人事不起弗為之始今王未盈而溢未盛而驕不勞而矜其功天時不作而先為人客人事不起而創為之始此逆于天而不和于人將妨于國家靡王躬身王弗聽蠡進諫曰夫勇者逆徳也兵者凶器也爭者事之末也隂謀逆徳好用凶器上帝之禁也先者不利王曰吾已斷之矣起師與呉戰于五湖不勝棲于㑹稽王召蠡而問曰不用子之言以至于此為之奈何蠡對曰持盈者與天定傾者與人節事者與地王曰與人奈何對曰卑辭厚禮玩好女樂尊之以名如此不已又身與之市謂身往事之如市賈貨易以利王乃令大夫種行成于吳請委管籥屬國家以身隨之吳人許諾王曰蠡為我守國對曰四封之内百姓之事臣不如種四封之外敵國之制立斷之事種不如蠡也王令種守國與蠡入宦于吳七年哀五年吳人遣之歸反至國王問于蠡曰節事奈何對曰地能包萬物以為一其事不失生萬物容畜禽獸然後受其名而兼其利美惡皆成以養生時不至不可彊生事不究不可彊成自若以處自若自如也以度天下待其來者而正之因時之所宜而定之時將有反事將有間事無間時無反則撫民保教以須之王曰不榖之國家蠡之國家也對曰四封之内百姓之事不亂民功不逆天時君臣上下交得其志蠡不如種四封之外敵國之制因隂陽之恒順天地之常柔而不屈彊而不剛徳虐之行因以為常韋昭注謂徳有所懐添虐有所斬伐以為常法兵勝于外福生于内種不如蠡也王令大夫種為之越絶書越王問范子曰聖王之治何左何右何去何取范子對曰臣聞聖主之治左道右術去末取實道者天地先生曲成萬物道生氣氣生隂隂生陽陽生天地天地立然後有四時而萬物備術者天意也盛夏之時萬物遂長聖人緣天心助天喜樂萬物之長故舜彈五絃之琴歌南風之詩而天下治所謂末者名也名過實則百姓不附親賢士不為用所謂實者榖也得人心任賢士也凡此四者邦之寳也王曰下士求賢不使名過實寡人能行也貯榖富百姓此天時水旱寜在一人耶何以備之范子曰湯執中和舉伊尹率諸侯伐桀為天下除殘賊民皆歌而歸之是謂執其中和者王曰今諸侯之地或多或少強弱不相當兵革暴起何以應之范子曰知保人之身者可以王天下生人得榖即不死榖能生人能殺人故謂人身王曰保穀奈何范子曰欲保必親于野覩諸所多少為備夫八穀貴賤之法必察天之三表即决矣王曰請問三表范子曰水之勢勝金隂氣蓄積大盛水據金而死故金中有水如此者嵗大敗八榖皆貴金之勢勝木陽氣蓄積大盛金據木而死故木中有火如此者嵗大美八榖皆賤金木水火更相勝此天之三表不可不察聖主施令必審于四時此至禁也王曰願知圖榖上下貴賤欲與他貨之内以自實為之奈何范子曰夫八榖之賤也如宿榖之登其明也諦審察隂陽消息觀市之反覆雌雄之相逐天道乃畢王曰何執而昌何行而亡范子曰執中則昌行奢侈則亡執中和而原其終始即位安而萬物定不執中和不原其終始即尊位傾萬物散文武之業桀紂之跡可知矣王曰春肅夏寒秋榮冬泄人治使然乎將道也范子曰天道三千五百嵗一治一亂終而復始此天之常道也四時易次寒暑失常治民然也春肅而不生者王徳不究也夏寒而不長者臣不奉命也秋順而復榮者刑不斷也冬温而泄者發府庫賞無功也王曰嵗之美惡榖之貴賤何以紀之范子曰夫隂陽錯繆即為惡嵗人生失治即為亂世一亂一治天道自然八榖亦一賤一貴極而復反八榖貴賤更相勝故死凌生者逆大貴生凌死者順大賤王曰人失其魂魄者死得其魂魄者生物皆有之將人也范子曰人有之萬物亦然天地之間人為貴物之生榖為貴以生人與魂魄無異可知也王曰其善惡可得聞乎范子曰欲知八榖之貴賤必察其魂魄視其動靜觀其所舍曰何謂魂魄對曰魂者槖也魄者生氣之源也神生者出入無門上下無根見所而功自存故名之曰神神主生氣之精魂主死氣之舍也魄者主賤魂者主貴故當安靜而不動魂者方盛夏而行故萬物得以自昌神者主貴而雲行故方盛夏之時不行則神氣槁而不成物矣故死凌生者嵗大敗生凌死者嵗大美故觀其魂魄即知嵗之善惡矣王曰聞隂陽之知不同力而功成不同氣而物生可得知乎范子曰臣聞隂陽氣不同處萬物生焉冬時草木既死萬物各異藏故陽氣避之伏壯于内使得成功于外夏時萬物遂長隂氣避之伏壯于内然而萬物親而信之陽者主生夏時大熱不至則萬物不成隂氣主殺冬時地不内藏則根荄不成一時失度即四序為不行王曰榖之貴賤可得而知乎范子曰陽者主貴隂者主賤當寒不寒榖暴貴當温不温榖暴賤故曰秋冬貴陽氣施于隂陽極而復貴春夏賤隂氣施于陽陽極而不復王曰善哉以丹書帛置之枕中以為國寳十一年哀九年王召蠡而問曰謀吳可乎對曰未可也蠡聞之上帝不考考成也時反是守彊索者不祥王無蚤圖夫吳君之吳也十二年哀十年王問曰吳淫于樂而忘其百姓聖人不出忠臣解骨謂通知者隠而忠良解體也其可乎對曰人事至矣天應未也王姑待之十三年哀十一年又問曰申胥即仮胥驟諫其王而殺之其可乎對曰逆節萌生天地未形而先為之征其事是以不成雜受其刑王姑待之韓詩外傳胥已死句踐欲伐之范蠡曰子胥之計策尚未忘于吳王之腹心也十四年哀十四年又問曰今其稻蟹不遺種其可乎對曰天事至矣人事未盡也王姑待之王怒曰道固然乎妄其欺不榖耶吾與子言人事子應我以天時今天應至矣子應我以人事何也對曰王姑勿怪夫人事必將與天地相參然後可以成功王其馳騁弋獵無至禽荒宫中之樂無至酒荒肆與大夫觴飲無忘國常彼上將薄其徳民將盡其力又使之望而不得食乃可以致天地之殛王姑待之越絶書越王曰吾聞父辱子死君辱臣死今寡人親已辱于吳矣欲行一切之變以復吳讐願子為寡人圖之范子曰立死下士而求成邦者上聖之計也且夫廣天下尊萬乗使百姓安其居樂其業者唯兵兵之要在人人之要在榖故民衆則主安榖多則民強王備二者然後可以圗之王曰吾地狹民少奈何范子曰夫陽動于上以成天文隂動于下以成地理審察開置之要可以為富凡欲先知天門開及地户閉其術天髙五寸減天寸六分以成地謹司八榖初見出于天者是謂天門開隂陽俱絶八榖不成大貴必應其嵗而起此天變見符也謹司八榖初見入于地者是謂地戸閉隂陽俱㑹八榖大成其嵗大賤來年大饑此地變見瑞也謹司八榖初見半于人者糴平熟無災害故天變而見符地應而見瑞聖人上知天下知地中知人此之謂天平地平以此為天圗十五年哀十三年王又問曰諺有之觥飯不及壺飱觥大也謂盛饌也言盛饌未具不及壺飱之救饑疾也今嵗晩矣子將奈何對曰臣聞從時者猶救火追亡人也蹶而趨之唯恐弗及王遂興師伐吳國語入之獲其大子友越及吳平二十二年哀二十年越伐吳左傳至于五湖吳人聞之出挑戰一日五反王弗忍欲許之蠡諫曰謀之廊廟失之中原其可乎王姑勿許居軍三年哀二十二年吳師自潰使王孫雄行成于越王弗忍欲許之前弗忍不勝其忿也此弗忍哀憐之也蠡諫曰先人有言曰伐柯者其則不逺王不斷其忘㑹稽之事乎十年謀之一朝而棄之其可乎王曰吾欲弗許而難對其使者蠡乃左提鼓右援桴以應使者曰昔者上天降禍于越委制于吳而吳不受今將反此義以報此禍吾王敢無聼天之命子往矣無使執事之人得罪于子使者辭反蠡不報于王擊鼓興師以至于姑蘇之宫遂滅呉國語報㑹稽之恥北渡兵于淮以臨齊晉號令中國以尊周室句踐以霸而范蠡稱上將軍還反國蠡以為大名之下難以乆居且句踐為人可與同患難與處安為書辭句踐曰臣聞主憂臣勞主辱臣死昔者王辱于㑹稽所以不死為此事也今既已雪恥臣請從㑹稽之誅句踐曰孤將與子分國而有之不然將加誅于子蠡曰君行令臣行意乃裝其輕寳珠玉自與其私徒屬乗舟浮海以行終不反于是句踐表㑹稽山以為蠡奉邑史記世家國語王命工以良金寫蠡之狀而朝禮之環㑹稽三百里以為蠡之地兵權謀范蠡二篇漢書越絶書越王既已勝吳反邦未至問大夫種曰聖人之術可以加于此乎大夫種曰不然范子豫見之策未肯為王言也越王愀然而恐請于范子曰寡人聞夫子明于隂陽進退豫知未形推往引前後知千嵗可得聞乎寡人垂意聼于下風范子曰夫隂陽進退前後幽冥未見未形此特殺生之柄而王制于四海邦之重寳也隂陽進退者天道自然夫隂入淺者嵗善陽入深者嵗惡故聖人見物不疑是謂知時固聖人所不傳也越王曰善以丹書帛置之枕中以為邦寳范子已告越王立志人海越絶書苦竹城者句踐封范蠡子也其僻居徑六十步為民治田塘長千五百步其策名土山范蠡苦勤功篤故封其子于是范蠡浮海出齊變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産居無幾何致産數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也乆受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懐其重寳間行以去止于陶以為此天下之中交易有無之路通為生可以致富矣于是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公朱公居陶生少子少子及壯而朱公中男殺人囚于楚朱公曰殺人而死職也然吾聞千金之子不死于市告其少子往視之乃裝黄金千鎰置褐器中載以一牛車且遣其少子朱公長男固請欲行朱公不聼長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言曰今遣少子未必能生中子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故所善莊生曰至則進千金于莊生所聼其所為慎無與爭事長男既行亦自私齎數百金至楚莊生家負郭披藜藿到門居甚貧然長男發書進千金如其父言莊生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過莊生而私留以其私齎獻遺楚國貴人用事者莊生雖居窮閻然以亷直聞于國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以為殊無短長也莊生間時入見楚王言某星宿某此則害于楚楚王素信莊生曰今為奈何莊生曰獨以徳為可以除之楚王曰生休矣寡人將行之王乃使使者封三錢之府賈逵云虞夏商周金幣三等或赤或白或黄黄為上幣銅錢為下幣韋昭曰錢金幣之名古者母平子子權母三品之來古而然矣楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨暮王使使封之朱公長男以為赦弟固當出也重千金虚棄莊生無所為也乃復見莊生莊生驚曰若不去邪長男曰固未也初為事弟弟今議自赦故辭生去莊生知其意欲復得其金曰若自入室取金長男即自入室取金持去獨自歡幸莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修徳報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右故王非能恤楚國而赦乃以朱公子故也楚王大怒曰寡人雖不徳耳奈何以朱公之子故而施惠乎令論殺朱公子明日遂下赦令朱公長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有所不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兎豈知財所從來故輕去之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也越絶書范蠡避位去越入齊老身西陶仲子由楚傷重而死符子陶朱公喪其中子鄰人往弔朱公方擁膝而笑鄰人曰聞子喪將唁子之哀朱公曰生不致哀死而唁何不通也新序梁嘗有疑獄羣臣半以為當罪半以為無罪雖王亦疑王曰陶之朱公以布衣富侔國是必有奇智召而問曰梁有疑獄獄吏半以為當罪半以為不當罪雖寡人亦疑吾子决是奈何朱公曰臣鄙民也不知當獄然臣有二白璧其色相如也其徑相如也其澤相如也然其價一千金一五百金王曰徑與色澤相如也千金五百金何也朱公曰側而視之一者厚倍王曰善故獄疑從去賞疑從與梁國大説新書同孔叢子陶朱公教猗頓畜五㹀養魚經朱公教齊威王五水畜小説瑣屑不具録故范蠡三徙成名于天下非茍去而已所止必成名卒老死于陶故世傳曰陶朱公史記世家盛𢎞之荆州記荆州華容縣西有陶朱公冡碑云是越范蠡括地志濟州平隂縣東三十里陶山南有陶公冡文種文種字子禽荆平王時為宛令吳越春秋後入越事越王句踐為大夫吳敗越句踐棲于㑹稽之上令于軍曰有能退吳者與之共知越國之政種進對曰臣聞之賈人夏則資皮冬則資絺旱則資舟水則資車以待之也今君王既棲于㑹稽之上然後求謀臣無乃後乎句踐曰得聞子大夫之言何後之有執其手而與之謀遂使行成于吳曰寡君使下臣種私于下執事寡君之師徒不足以辱君矣願以金玉子女賂君之辱越國之寳器畢從寡君帥越國之衆以從君之師徒唯君王左右之若以越罪不可赦將焚宗廟係妻孥沈金玉于江有帶甲五千人將以致死乃必有偶偶對也猶言倍也是以帶甲萬人以事君也夫差欲與之成伍員不可曰吳之與越讐敵之國也三江環之民無所移有吳無越有越無呉不可改矣員聞之陸人居陸水人居水夫上黨之國我攻而勝之不能居其地不能乘其車越國我攻而勝之能居其地能乘其舟此利也不可失也已越人飾美女八納之太宰嚭嚭諫曰嚭聞古之伐國者服之而已今已服矣又何求焉夫差與之成句踐既反國舉國政屬種新書夫差與越人戰江上棲之㑹稽越王之窮至于吃山草飲腑水易子而食于是履甓戴璧號唫告毋罪呼皇天使大夫種行成于吳吳王將許子胥曰不可越國之俗勤勞而不愠好亂勝而無禮谿徼而輕絶俗好詛而倍盟放此類者鳥獸之儕徒狐狸之醜類也生之為患殺之無咎請無與成大夫種拊心嘷啼沬泣而言信割白馬而為犧指九天而為證請婦人為妾丈夫為臣百世名寳因閒官為積孤身為關内諸侯吳王不忍結師與成句踐十年哀八年句踐與種深謀呉種曰夫欲報怨復讎破吳滅敵者有九術一曰尊天事鬼以求其福越王立東郊以祭陽名曰東皇公立西郊以祭隂名曰西王母祭陵山于㑹稽祭水澤于江州事鬼神一年國不被災二曰種財幣以遺其君多貨賄以遺其臣三曰貴糴粟槀以虚其國利所欲以疲其民大夫種曰願王請糴以入其意乃使種使吳吳與越粟萬石及越粟稔蒸粟還吳吳種越粟粟無生者吳大饑四曰遺美女以惑其心而亂其謀大夫種曰吳王淫而好色宰嚭佞以曳心往獻美女其必受之乃使相者得苧蘿山採薪之女西施鄭旦獻于吳拾遺記作夷光修明五曰遺之巧匠良材使起宫室以盡其財大夫種曰吳王好起宫室王選神材獻之王使入山伐木一夜天生神木一雙大二十圍長五十尋陽為大梓隂為楩柟獻之吳王王受之起姑蘇之臺五年乃成髙見二百里六曰貴其䛕臣使之易伐七曰強其諫臣使之自殺八曰君王國富而備利器九曰利兵甲以承其弊句踐曰善用其術卒滅吳種為相國吳越春秋越絶書同韓非子越已勝吳又索卒于荆而攻晉左史倚相謂荆王曰越破呉豪士死鋭卒盡大甲傷今又索卒以攻晉示我不病也不如起師與分吳荆王曰善因起師而從越越王怒將擊之大夫種曰不可吾豪士盡大甲傷與戰必不克不如賂之乃割露山之隂五百里以賂之范蠡自齊遺種書曰蜚鳥盡良弓藏狡兎死走狗烹越王為人長頸烏喙可與共患難不可與共樂子何不去種見書稱病不朝人或讒種史記句踐乃召相國謂曰子有隂謀九術今用三已破強吳其六尚在子幸以餘術為孤前王于地下謀呉之前人乃賜種劒種歎曰南陽之宰而為越王之禽自笑曰後世之末忠臣必以吾為喻矣遂伏劒死句踐葬種于西山又名種山語訛成重吳越春秋越絶書種山者句踐所葬大夫種也樓船卒二千人均足羡葬之三蓬下種將死自策後有賢者百年而至置我二蓬自章後世句踐葬之食𫝊三賢兵權謀大夫種二篇漢書舌庸苦成臯如逢同計􅒍皓進諸稽郢舌庸國語作舌庸左傳作后庸吳越春秋作曳庸苦成臯如吳越春秋作句如逢同吳越春秋作扶同計􅒍皓進諸稽郢左傳作諸暨鞅史記作柘郢七人者皆越大夫也句踐之入臣于吳也羣臣臨水祖道軍陳固陵此下文種前為祝辭極俚鄙王曰吾將逝矣願聞諸大夫之風文種曰内修封疆之役外修耕戰之備荒無遺土百姓親附臣之事也范蠡曰輔危主存亡國不恥屈厄之難安守被辱之地往而必反與君復讐臣之事也苦成曰發君之令明君之徳統煩理亂使民知分臣之事也舌庸曰奉令受使結和諸侯通命達㫖賂往遺來解憂釋患使無所疑臣之事也皓進曰一心齊志上與等之下不違令修徳履義守信温故舉過列平不阿親戚不私于外臣之事也諸稽郢曰望敵設陳飛矢揚兵履腹涉屍貪進不退破敵攻衆臣之事也臯如曰修徳行惠撫慰百姓蓄陳儲新國富民實為君養器臣之事也計􅒍曰候天察地紀厯隂陽觀變參災分别妖祥福見知吉妖出知凶臣之事也王曰諸大夫懐術抱徳各守一分以保社稷孤何憂焉在吳三年既反國吳越春秋吳復伐越越王起師逆之江韋昭注敗越于夫椒越子保于㑹稽在魯哀元年非是按其求成之辭曰昔者越得罪于天王天王心孤句踐而又宥赦之又曰敢思邊陲小怨以重得罪又曰前盟口血未乾葢是吳歸越子之後復起師伐越而越再求成也文種獻謀曰吳之與越唯天所授王其無庸戰夫申胥即伍員華登宋臣齊吳簡服吳國之士于甲兵未有所挫也一人善射百夫决拾勝未可成夫謀必素見成事而後履之不可以授命猶鬪命也王不如行成以喜其民以侈吳心吾以卜之于天天若棄吳必許吾成將必寛然有伯諸侯之心既罷弊其民而天奪之食安受其燼乃無有命矣王乃命諸稽郢行成于吳曰寡君句踐使下臣郢敢私告于下執事曰昔者越國見禍得罪于天王天王親趨玉趾以心孤句踐孤棄也而又宥赦之君王之于越也繄起死人而肉白骨也今句踐申禍無良草鄙之人敢忘天王之大徳而思邊垂之小怨以重得罪于下執事句踐用帥二三之老親委重罪頓顙于邉今君王盛怒屬兵將殘越國越國故貢獻之邑也句踐請盟一介嫡女執箕帚以䀭姓于王宫䀭備也一介嫡男奉盤匜以隨諸御春秋貢獻不解于王府天王豈辱裁之亦征諸侯之禮也諺曰狐埋之而狐搰之是以無成功搰發也今天王既封殖越國以明聞于天下而又刈亡之是天王之無成勞也四方諸侯則何實以事吳吳許之成將盟又使諸稽郢辭曰以盟為有益乎前盟口血未乾足以結信矣以為無益乎君王舍甲兵之威以臨使之而胡重于鬼神而自輕也吳王許之荒成不盟國語十年哀八年王登漸臺召問羣臣曰奈何而有功計􅒍越席而前曰願王明選左右得賢而已范蠡明而知内文種逺以見外願請種與深議則霸王之術在矣越絶書越王脅諸臣而與之盟吾欲伐吳奈何有功計􅒍舉首而起曰夫仁義者治之門士民者君之根闓門固根莫如正身正身之道謹選左右左右選則主日益上不選則主益二者貴質浸之漸也故明主用人不由所從不問其先説取一焉越王曰寡人雖愚唯在大夫計􅒍曰臣聞智者不妄言以成其勞賢者始于難動終于有成故賢君用臣畧責于絶施之職而成其功逺使以效其誠内告以匿以知其信與之講事以觀其智飲之以酒以觀其態選士以備不肖者無所置明年王欲伐吳計􅒍曰夫興師舉兵必且内蓄五榖實其金銀滿其府庫厲其甲兵凡此四者必察天地之氣原于隂陽明于孤虛審于存亡乃可量敵王曰其要奈何計􅒍曰天地之氣物有死生原隂陽者物貴賤也明孤虚者知㑹際也審存亡者别真偽也春種八榖夏長而養秋成而聚冬蓄而藏夫天時春生而不救種一死也夏長無苗二死也秋成無聚三死也冬藏無畜四死也雖有堯舜之徳無如之何勸者老作者少反氣應數不失厥理一生也留意省察謹除苗穢二生也前時設備物至則收國無逋税民無失穗三生也倉已封塗除陳入新君樂臣歡男女及信四生也夫隂陽者太隂所居之嵗留息三年貴賤見矣孤虚者天門地户存亡者君之道徳也乃仰觀天文集察緯宿厯象四時以下著上虚設入倉從隂收著望陽出糶筴其極計三年五倍越國熾富越絶書越王欲隂圖吳乃召計倪而問曰吾欲伐吳謀不成而息恐為天下咎野無積庾廪糧則不屬恐津梁之不通紆吾糧道故問其道計倪對曰先省賦歛勸農桑饑饉在問或水或塘因熟積以備四方得世之和擅世之陽王無忽諸臣聞君自耕夫人自織此竭于庸力而不斷時與智也時斷則循智斷則備知此二者形于體萬物之情短長逆順可觀而已明審用臣之議大可以王小可以霸王曰請問其要對曰太隂三嵗處金則穰三嵗處水則毁三嵗處木則康三嵗處火則旱故散有時積糴有時領則决萬物不過三嵗而發矣天下六嵗一穰六嵗一康凡十二嵗一饑是以民相離也故聖人早知天地之反為之預備王曰物有妖祥乎對曰有隂陽萬物各有紀綱日月星辰刑徳變為吉凶金木水火土更勝月朔更建莫主其常順之有徳逆之有殃從寅至未陽也太隂在陽嵗徳在隂嵗美在是聖人動而應之制其收發當以太隂在隂而發隂且盡之嵗亟賣六畜貨財以益收五榖以應陽之至陽且盡之嵗亟發糴以收田宅牛馬積歛貨財聚棺木以應隂之至此皆十倍者也其次五倍天有時而散是故聖人反其刑順其衡收聚而不散王曰善大夫言獨與孤比請遂受教計倪曰糴二十則傷農九十則病末農傷則草木不辟末病則貨不出故糴髙不過八十下不過三十王曰善乃著其法治牧江南甲貨之户曰粢為上物賈七十乙貨之户曰黍為中物石六十丙貨之户曰赤豆為下物石五十丁貨之户曰稻粟令為上種石四十戊貨之户曰麥為中物石三十已貨之户曰大豆為下物石二十庚貨之戸曰穬比蔬食無賈辛貨之户曰菓比蔬食無賈壬癸無貨史記句踐困于㑹稽之上乃用范蠡計然計然曰知鬬則修備時用則知物二者形則萬物之情可得而觀已積著之理務完物無息幣以物相貿易腐敗而食之貨勿留無敢居貴論其有餘不足則知貴賤貴上極則反賤賤下極則反貴貴出如糞土賤取如珠玉財幣欲其行如流水修之十年國富十四年哀十二年吳越春秋作九年九年者哀七年也時吳未有齊魯之役史記作反國之七年是為十四年召諸大夫而告之曰寡人念吳猶躃者不忘走盲者不忘視未知策謀惟大夫誨之逢同曰吳兵強于齊晉而怨結于楚王宜親于齊深結于晉隂固于楚而厚事呉吳志驕必輕諸侯而凌鄰國三國决權還為敵國必角勢交爭越承其弊可克也史記同范蠡曰方今吳楚結讐構怨不解齊雖不親外為之救晉雖不附猶效其義夫内臣謀而决讐其策鄰國通而不絶其援斯正呉之興霸諸侯之上尊願王匿聲無見其動以觀其靜苦成曰吳承闔廬之軍制子胥之典教政平未虧戰勝未敗大夫嚭狂佞達于策慮輕于朝事子胥力于戰伐死于諫議二人爭權必有敗壊願王自匿無示謀計皓進曰吳君驕臣奢民飽軍勇外有侵境之敵内有爭臣之震其可攻也臯如曰天有四時人有五勝昔湯武乘四時之利而制夏殷桓繆據五勝之使而列六國此乗其時而勝者也吳越春秋十五年哀十三年吳王夫差還自黄池息民不戒文種乃倡謀曰吾謂吳王將遂涉吾地今罷師不戒以忘我我不可以怠也日臣嘗卜于天今吳民既罷而大荒荐饑市無赤米赤水米之姦者惡之至者也囷鹿空虚其民必移就蒲嬴于東海之濵蒲蒲嬴蚌屬天占既兆人事又見我蔑卜筮矣王今起師以㑹奪之利無使失悛夫吳之邊鄙逺者罷而未至呉王將恥不戰必不須至之㑹也而以中國之師與我戰言必不待邉鄙逺兵之㑹而以國都之師戰也若事幸而從我我遂踐其地其至者亦將不能之㑹也已吾用禦兒臨之言吳邉鄙雖來亦不能㑹吾以禦兒之師臨之禦兒越北鄙呉王若愠而又戰幸遂可出使出奔不戰而結成王安厚取名而去之王曰善哉乃大戒師將伐吳召諸大夫曰吳為不道求殘吾社稷宗廟以為平原不使血食吾欲與之徼天之衷唯是車馬兵甲卒伍既具無以行之敢訪諸大夫問戰奚以而可舌庸對曰審賞則可王曰聖苦成對曰審罰則可王曰猛文種對曰審物則可説云别物善惡韋昭注謂旌旗物色之屬王曰辨范蠡對曰審備則可王曰巧臯如對曰審聲則可韋昭注謂鐘鼔進退之聲吳越春秋此下云審于音聲以别清濁清濁者謂昔君名聞于周室令諸侯不願于外説非是此問戰事不可以逺對也王曰可矣吳越春秋此下扶同曰廣恩知分則可廣恩以博施知分而不外王曰神哉計􅒍曰候天察地參應其變則可天便地應人道便利三者見前則可王曰明哉乃命范蠡舌庸沿海沂淮以絶吳路敗王子友于姑熊夷國語二十四年哀二十三年越既滅吳諸稽郢始如魯聘衛禇師比公孫彌牟出其君輙二十七年哀二十六年臯如舌庸帥師㑹魯宋納衛侯我師侵外州大獲衛師出禦我大敗之掘禇師定子褚師比之父之墓焚之于平莊之上公孫彌牟使私于臯如曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已衛乃重賂我衛侯不果入魯嘗侵邾田二十八年哀二十七年使舌庸如魯聘且言邾田封于駘上使魯還邾田封境至駘上春二月及魯盟于平陽左傳越之滅吳也范蠡辭去文種讒死計􅒍遂佯狂以免吴越春秋計􅒍者越絶書􅒍作倪史記作計然句踐困于㑹稽稽之上乃用范蠡計然徐廣注作計研葵濮上人辛氏字文子其先晉國公子也為人有内無外形狀似不及人而明學隂陽不肯自顯諸侯隂取所利者七國天下莫知故曰計然范子范子范子問何用九宫計然曰隂陽之道非獨于一物也聖人之變如水隨形形平則平形險則險范子五榖者萬民之命國之重寳無道之君無道之民不能積其盛有餘以待其衰不足范子徳取象于春夏刑取象于秋冬靈姑浮疇無餘謳陽靈姑浮越大夫事允常繼事句踐句踐元年定十四年吳伐我我禦之陳于檇李大敗之靈姑浮以戈擊闔廬闔廬傷將指取其一屨闔廬還遂卒于徑疇無餘謳陽亦越大夫句踐十四年哀十二年我伐呉為二隧隧道也疇無餘謳陽自南方先及郊與吳戰呉獲疇無餘謳陽及句踐至大敗之遂入呉左傳呉越春秋越王問范蠡報復之謀蠡曰越有處女出于南林國人稱善願王請之越王聘之處女將北見王道逢一翁自稱袁公問于處女聞子善劒願一見之女曰妾不敢隠惟公試之袁公即杖箖箊竹竹枝上頡橋末墮地女即㨗末袁公則飛上樹變為白猿遂去女見越王王問劒之道女曰道有門户亦有隂陽開門閉户隂衰陽興凡手戰之道内實精神外示安儀見之似好婦奪之似懼虎布形候氣與神俱往王號曰越女乃命五板之墮長髙習之教軍士蠡復進善射者陳音音楚人王問曰聞子善射道何所生音曰臣聞弩生于弓弓生于彈彈起古之孝子古者死則裹以白茅投于中野孝子不忍見父母為禽獸所食故作彈以守之絶鳥獸之害故歌曰斷竹續竹飛土逐肉黄帝之後楚有弧父所射無脱以其道傳于羿羿傳逢蒙逢蒙傳楚琴氏琴氏乃横弓著臂施機設樞加之以刃琴氏傳楚三侯所謂句亶鄂章人號麋侯翼侯魏侯也自三侯傳至靈王射道分流百家臣前人受之于楚五世于臣矣惟王試之王曰弩之狀何法焉音曰郭為方城守臣子也教為人君命所起也牙為執法守吏卒也牛為中將主内裹也闗為守禦檢去止也錡為侍從聼人主也臂為道路通所使也弓為将軍主重負也弦為軍師禦戰士也矢為飛客主教使也金為實敵往不止也衛為副使正理也又為受教知可否也縹為都尉執左右也敵為百死不得駭也王曰願聞正射之道音曰舉弩望敵翕心咽煙與氣俱發得其和平神定思去去止分離右手發機左手不知一身異教豈况雌雄王曰善乃使教士習射音死王葬之于國西號曰陳音山論曰纆牽長累千里負俗之士固不可以尋常貌已當蠡未遇非種無以識蠡然蠡之藴種葢未盡也種術九蠡以三該之而持盈之道種猶未喻乎舌庸以下皆能有為位事為能宜越之伯也尚史卷六十四
