body:
  text: 尚史巻五十九列傳三十七鑲白旗漢軍李鍇撰楚諸臣傳公子榖臣公子榖臣莊王之子也莊王十七年宣十二年邲之役我獲晉荀罃罃父荀首以其族反之射連襄老獲之遂載其尸又射榖臣囚之以二者還共王三年成三年晉歸榖臣及襄老之尸我歸晉荀罃左傳公子貞子囊囊瓦子常公子宜穀武城黒公子繁史皇附公子貞字子囊莊王之子也共王二十三年襄五年陳叛我由令尹公子壬夫實侵欲焉乃殺壬夫以貞為令尹冬貞伐陳二十五年襄七年貞圍陳二十六年襄八年鄭侵蔡貞討之伐鄭鄭成二十七年襄九年秦來乞師王許之貞曰不可當今吾不能與晉争晉君類能而使之舉不失選官不易方其卿讓于善其大夫不失守其士競于教其庶人力于農穡商工皂隸不知遷業韓厥老矣知罃禀焉以為政范匄少于中行偃而上之使佐中軍韓起少于欒黶而欒黶士魴上之使佐上軍魏綘多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋王師于武城以為秦援二十八年襄十年貞及鄭師圍宋門于桐門秋貞及鄭師侵魯還圍蕭克之諸侯伐鄭貞救之諸侯之師與我師夾潁而軍鄭宵涉潁與我盟諸侯之師還二十九年襄十一年諸侯伐鄭鄭及晉成貞乞旅于秦及秦師從王將伐鄭鄭伯逆之遂伐宋秋諸侯復伐鄭鄭使告于我遂及晉成三十年襄十二年貞及秦師伐宋師于楊梁報晉之取鄭也三十一年襄十三年王有疾告大夫曰不榖不徳亡師于鄢以辱社稷請謚為靈若厲王薨大夫謀謚貞曰君命以共若之何毁之請謚為共康王元年襄十四年貞師于棠以伐吳報前年庸浦之役吳不出而還貞殿以吳為不能而弗儆呉人自臯舟之隘要而擊之我不能相救吳人敗之獲我公子宜榖冬貞還自伐吳卒將死遺言謂公子午必城郢君子謂貞忠君薨不忘增其名將死不忘衛社稷可不謂忠乎忠民之望也吕氏春秋荆與吳將戰吳師衆子囊曰我戰必敗敗王師辱名虧土忠臣不為也不復于王而遁至于郊請死王曰遁以為利也將軍何死子囊曰遁者無罪則後皆依不利之名而遁是荆國終為天下撓遂伏劍而死王曰請成將軍義乃為之桐棺三寸加斧鑕其上貞孫曰囊瓦瓦字子常事平王平王十年昭二十三年瓦為令尹城郢以備吳十三年昭二十六年平王薨瓦以大子壬弱欲立長庶子申即子西申怒欲殺瓦瓦懼乃立壬是為昭王昭王元年昭二十七年吳因我喪伐我圍潜我救潜瓦以舟師及沙汭而還夏費無極構大夫郤宛瓦使鄢將師殺之國人謗瓦瓦病之秋殺費無極鄢將師詳費無極傳六年定二年吳誘瓦伐吳瓦師于豫章吳敗我師遂克巢獲我公子繁蔡侯唐侯來朝蔡侯有兩佩與裘唐侯有兩肅爽馬瓦欲之弗與皆三年止之七年定三年唐侯獻馬瓦歸唐侯蔡人聞之獻佩與裘瓦朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死遂歸蔡侯八年定四年蔡侯歸㑹諸侯于召陵侵我沈人不㑹蔡滅沈我為沈故圍蔡冬蔡侯吳子唐侯伐我舍舟于淮汭自豫章與我夾漢左司馬沈尹戌謂瓦曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅㝠阨三者漢東三隘道子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂瓦曰吳用木也我用革也不可久也不如速戰史皇謂瓦曰楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别三戰瓦知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說十一月二師陳于栢舉吳夫槩王以其屬五千先擊瓦卒瓦卒奔我師亂吳師大敗之瓦奔鄭史皇以其乗廣死吳五戰及郢王出奔隨左傳公子宜榖公子繁並楚羣公子繁守巢大夫武城黒者武城大夫史皇亦楚大夫也公子午子庚公子午字子庚亦莊王之子也初為共王司馬共王三十年襄十二年秦嬴歸于我午聘于秦為夫人寧韓非子荆王弟在秦秦不出也中射之士曰資臣百金臣能出之因之晉請以百金委叔向叔向見平公曰可以城壺邱矣荆王弟在秦秦不出也是秦惡荆也必不敢禁我城壺邱若禁之我曰為我出荆王之弟彼如出之可以徳荆不出是卒惡也必不敢禁我城壺邱矣公曰善乃城壺邱秦因出之荆王大說以鍊金百鎰遺晉說苑作公子午餘文同按公子午聘秦為好㑹秦不出午蓋誤三十一年襄十三年共王薨吳乗我䘮侵我午大敗吳師于庸浦楚地康王二年襄十五年午代公子貞為令尹五年襄十八年鄭公子嘉將叛晉起我師以去諸大夫使告午午弗許王聞之使揚豚尹宜告午曰國人謂不榖主社稷而不出師死不從禮言死將不得從先君之禮不榖即位于今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何午歎曰君王其謂午懐安乎吾以利社稷也見使者稽首而對曰諸侯方睦于晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱冬午帥師治兵于汾我師伐鄭鄭完守入保公子嘉不敢㑹我師我右師城上棘涉潁次于旃然蒍子馮公子嘉率銳師侵鄭東北至于蟲牢而反午門于純門信于城下而還涉于魚齒之下甚雨及之我師多凍役徒㡬盡八年襄二十一年夏午卒左傳公子追舒子南棄疾公子追舒字子南亦莊王之子也康王二年襄十五年追舒為箴尹八年襄二十一年代公子午為令尹觀起有寵于追舒未益禄而有馬數十乗國人患之王將討焉追舒之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之洩命重刑臣亦不為九年襄二十二年王殺追舒于朝轘觀起于四竟追舒之臣謂棄疾請徙子尸于朝曰君臣有禮唯二三子三日棄疾請尸王許之既塟其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讐吾弗忍也遂縊而死左傳論曰子囊遺言城郢籌國及死故君子以為忠囊瓦墮徳滅防而唯城是圖故司馬以為鄙城郢兆乎入郢矣子庚持重足嗣賢尹子南穢徳竟不克終㣲君陳固難為周畢繼也然子南貪賂辱止塟身囊瓦不度禍延覆國亡臣棲鄭裘馬將焉用之或以棄疾不洩命為有禮非也泥首請命乞以身代不得則負父以亡君子之孝也公子黒肱共王子公子黒肱字子晳共王之子也初為宫廐尹康王十四年㐮二十七年宋向戌弭諸侯之兵晉楚將盟于宋黒肱先至成言于晉成盟誓之言也郟敖四年昭元年令尹公子圍使黒肱城犨櫟郟三邑本鄭地是年圍弑郟敖公子比出奔晉黒肱出奔鄭圍自立是為靈王靈王十二年昭十三年觀從召比及黒肱入襲蔡遂入楚比為王黒肱為令尹既而比黒肱皆自殺左傳大子建司馬奮揚附大子建字子木平王大子也平王之在蔡也郥陽封人之女奔之生建及即位立為大子使伍奢為之師費無極為少師無寵費無極曰建可室矣王為之聘于秦無極勸王取女平王六年昭十九年使建居于城父說苑王子建出守城父與成公乾遇于疇中問曰是何也成公乾曰疇也疇也者何也曰所以為麻也麻也者何也曰所以為衣也成公乾曰昔者莊王伐陳舍于有蕭氏謂路室之人曰巷其不善乎何溝之不浚也莊王猶知巷之不善溝之不浚今子不知疇之為麻麻之為衣子其不主社稷乎七年昭二十年費無極言于王曰建與伍奢將以方城之外叛王使城父司馬奮揚殺大子未至而使遣之大子奔宋王召奮揚奮揚使城父人執已以至王曰言出于余口入于爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能茍貳奉初以還不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日大子後辟宋華氏之亂適鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜于大子請行而期焉請行襲鄭之期大子暴虐于其私邑邑人訴之鄭人省之得晉諜焉遂殺大子大子之子二勝燕並見亂臣傳左傳公子申子西公孫寧公孫朝公子申前共王時右司馬公子申别是一人字子西平王長庶子也平王薨令尹囊瓦欲立申曰大子壬弱其母非適也大子建實聘之申長而好善立長則順建善則治王順國治可不務乎申怒曰是亂國而惡君王也國有外援不可凟也外援謂秦壬母秦女也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹囊瓦懼乃立壬是為昭王昭王四年昭三十年吳公子掩餘燭庸來奔王大封而定其徙城養楚邑以居之取于城父與胡田以與之將以害呉也申諌曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邉疆使柔服焉猶懼其至吾又彊其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同于先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聴九年定四年吳入郢王奔隨申為王輿服以保路言偽為王車服以保安道路人國于脾洩楚邑聞王所在而後從王明年申包胥以秦師至申敗吳師于軍祥敗之于麇又敗之于公壻之谿冬十月王入郢王之奔隨也將涉于成曰藍尹亹涉其帑不與王舟及寧王欲殺之申曰囊瓦唯思舊怨以敗君何效焉國語作藍尹亹自解之辭王曰善使復其所吾以志前惡申代囊瓦為令尹十二年定六年吳敗我舟師獲潘子臣小惟子舟師之帥及大夫七人我大惕懼亡公子結又以陵師敗于繁揚申喜曰乃今可為矣于是乎遷郢于鄀而改紀其政以定楚國越絶書司馬子其令尹子西歸相與計謀子胥不死又不入荆邦猶未得安莫若求之而與之同邦乎昭王乃使使者報子胥于吳曰昔者先人殺子之父而非其罪也今子大夫報寡人也特甚寡人不敢怨子子大夫何不來歸子故墳墓丘塜為我邦雖小與子同有之子胥曰前報父仇後求其利賢者不為也父已死子食其禄非父之義也使者還報昭王曰子胥不入荆邦明矣辭意庸姑存異説二十二年哀元年申將圍蔡計板築九日及圍蔡里而栽去城一里栽設板築廣丈高倍夫屯晝夜九日如申之素蔡人男女以辨男女各判係纍而降使疆于江汝之間而還吳侵陳大夫皆懼曰闔廬唯能用其民以敗我于柏舉今聞其嗣又甚焉將若之何申曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑癘親巡孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我國語作藍尹亹語二十七年哀六年吳伐陳王救之將戰王有疾薨于城父申與公子結公子啟謀潜師閉塗逆越女之子章立之而後還惠王七年哀十三年申帥師伐陳九年哀十五年申及公子結伐吳及桐汭十年哀十六年申召故大子建子勝使處吳竟為白公勝勝作亂殺申及公子結説苑昭王欲之荆臺㳺司馬子綦進諌曰荆臺在洞庭右彭蠡南望獵山下臨方淮其樂使人遺老而忘死願王勿往㳺焉王曰荆臺吾地也有地而㳺子何為絶我怒而擊之于是令尹子西駕安車四馬徑于殿下曰今日荆臺之㳺不可不觀也王登車而拊其背曰荆臺之㳺與子共樂之步馬十里引轡而止曰臣不敢下車願得有道王聴之乎王曰言之子西曰臣聞為人臣而忠其君者爵祿不足以賞也為人臣而䛕其君者刑罰不足以誅也若司馬子綦者忠臣也若臣者䛕臣也願王殺臣而祿司馬子綦王曰我能聴公子後世㳺之無有極時奈何子西曰易耳王山陵崩陁為陵于荆臺未嘗有持鐘鼓管絃而㳺于父之墓上者也于是王還車卒不㳺荆臺申子二寧朝寧字子國為右司馬惠王十一年哀十七年王與沈諸梁卜以寧為令尹十二年哀十八年巴人伐我圍鄾初寧之卜也開卜大夫觀瞻曰吉如志故命以為右司馬及巴師至將卜帥王曰寜如志何卜焉使帥師而行遂敗巴師于鄾封寧于析淮南子大宰子朱侍飯于令尹子國子國啜羮而熱投巵漿而沃之明日子朱辭官而歸其僕曰大宰未易得也去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百按王卜寧為令尹時有沈尹朱大宰子朱或即其人官誤爾朝為武城尹白公之亂陳侵我既寧我將取陳麥王卜帥朝吉使帥師取陳麥陳人御之敗遂滅陳左傳公子結子期鑪金附公孫平公孫寛魯陽文子公子結字子期亦平王之子昭王之兄也昭王十年定四年吳入郢王奔隨吳人從之結似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳鑪金者初宦于結及是與隨人要言無出王王使見辭曰不敢以約為利王割結之心以與隨人盟當心前割血以盟十一年定五年秦救我敗吳師結及公子蒲滅唐秋吳師敗我師于雍澨秦師又敗吳師吳師居麇結將焚之公子甲曰父兄親暴骨焉不能收又焚之不可結曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰大敗吳師王入郢結代沈尹戌為司馬十二年定六年吳敗我舟師結又以陵師陸師敗于繁揚二十年定十四年結滅頓以頓子牂歸惠王四年哀十年結伐陳韓非子荆令公子伐陳丈人送之曰晉强不可不慎也公子曰丈人奚憂吾為丈人破晉丈人曰可吾方廬陳南門之外公子曰是何也曰我笑勾踐也為人之如是其易也已獨何為宻宻十年難乎九年哀十五年結伐吳十年哀十六年白公勝作亂殺結于朝結曰昔者吾以力事君不可以弗終抉豫章大木以殺人而後死韓非子司馬子期死而浮于江結子二平寛結死寛代為司馬十三年哀十九年寛及公子慶追越師至㝠不及乃還左傳結又有子曰魯陽文子名未詳或即是平寛惠王以梁與文子梁楚北境文子辭曰梁險而在北境懼子孫之有貳者也夫事君無憾憾則懼偪偪則懼貳夫盈而不偪憾而不貳者臣能自夀也不知其它縱臣得以首領没懼子孫之以梁之險而乏臣之祀也王曰子之仁不忘子孫施及楚國敢不從子與之魯陽國語淮南子魯陽公與韓構難戰酣日暮援戈而撝之日為之退三舍公子啟子閭公子啟字子閭亦平王之子昭王之兄也昭王二十七年哀六年吳伐陳王在城父將救陳卜戰不吉卜退不吉王曰然則死也命公子申為王不可則命公子結亦不可則命啟五辭而後許將戰王薨啟退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也立惠王而後還惠王十年哀十六年白公勝作亂欲以啟為王啟不可遂刼以兵啟曰王孫若安靖楚國匡正王室而後庇焉啟之願也敢不聴從若將専利以傾王室不顧楚國有死不能遂殺之左傳新序白公勝欲立王子閭子閭不肯刼之以刃曰楚國之重天下無有天以與子何不受也子閭曰吾聞辭天下者非輕其利明其徳也不為諸侯者非惡其位潔其行也今見國而忘主不仁也刼白刃而失義不勇也子雖告我以利威我以兵吾不為也論曰大子羈旅鄭國顧欲隂賊其所厚倒行逆施有遺行焉宜其不得于父而來無極之讒也莫益之或撃之勿恒之凶建實速之又誰咎邪子西兄弟終始讓王左提右挈用康國難尚矣然而搶攘外内昭奔惠刼㡬再亡國而三良與之嗟夫溯洄其初孽由大子詩曰宗子維城母俾城壊又誰之咎耶王孫由于王孫賈宋木附王孫由于者又曰吳由于為寢尹昭王十年定四年吳之入郢也王涉睢濟江入于雲中王寢盗攻之以戈擊王由于以背受之中肩王奔隨由于徐蘇而從明年王入郢初王在隨公子申為王輿服以保路國于脾洩偽為王車服立國于脾洩事寧王使由于城麇復命公子申問髙厚焉弗知申曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盗于雲中余受其戈其所猶在袒而視之背曰此余所能也脾洩之事余亦弗能也從王有功者由于及王孫圉王孫賈鬭辛鬭巢鬭懐申包胥鍾建宋木凡九人王入皆賞之左傳諸鬭申包胥别有傳鍾建見季􅇗傳宋木他事不載王孫賈葢亦王族也王孫圉王孫圉楚大夫事昭王嘗聘于晉定公饗之趙鞅鳴玉以相問于圉曰楚之白珩猶在乎對曰然鞅曰其為寶也幾何矣曰未嘗為寶楚之所寳者曰觀射父能作訓辭以行事于諸侯使無以寡君為口實又有左史倚相能道訓典以叙百物以朝夕獻善敗于寡君使寡君無忘先王之業又能上下說乎鬼神順道其欲惡使神無有怨痛于楚國又有藪曰雲連徒洲金木竹箭之所生也龜珠齒角皮革羽毛所以備賦用以戒不虞者也所以共幣帛以賔享于諸侯者也若諸侯之好幣具而道之以訓辭有不虞之備而皇神相之寡君其可以免罪于諸侯而國民保焉此楚國之寶也若夫白珩先王之玩也何寳焉圉聞國之寳六而已聖能制議百物以輔相國家則寳之玉足以庇䕃嘉榖使無水旱之災則寳之龜足以獻臧不則寳之珠足以禦火灾則寳之金足以禦兵亂則寳之山林藪澤足以備財用則寳之若夫譁囂之美楚雖蠻夷不能寳也國語論曰由于能背受戈而不能城城城必有不足城者詭辭以葢之焉爾簡子鳴玉盛有侈心白珩之對不待畢辭亦且中餒而已矣陽匄子瑕陽令終附弟完弟佗公子魴陽匄字子瑕穆王曾孫也為平王令尹平王四年昭十七年呉伐我匄卜戰不吉司馬公子魴曰我得上流何故不吉戰于長岸魴先死我師繼之大敗呉師獲其乗舟餘皇吳取餘皇復大敗我師六年昭十九年工尹赤遷隂于下隂隂楚邑匄城郟亦楚邑魯叔孫婼曰楚不在諸侯矣自完而已王為大子建聘秦女既而自取之夏匄聘于秦拜夫人也初靈王伐呉吳子使其弟蹶由犒師靈王執以歸在昭五年及是匄謂王曰彼何罪諺所謂室于怒市于色者楚之謂也舍前之忿可也乃歸蹶由十年昭二十三年吳伐州來我救之吳禦諸鍾離匄卒我師熸呉楚謂火滅為熸言軍主亡其氣衰也吳遂敗頓胡沈蔡陳許之師于雞父匄子三令終完佗令終為中廐尹昭王元年昭二十七年囊瓦殺郤宛並殺令終及完佗以其黨郤氏也左傳沈尹戌呉句卑附沈尹戌者莊王曾孫也初仕吳後為楚左司馬事平王平王六年昭十九年我城州來吳邑今城而取之戍曰楚人必敗昔吳滅州來子旗請伐之即蔓城然事見昭十三年王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戍曰吾聞撫民者節用于内而樹徳于外民樂其性而無寇讐今宫室無量民人日駭勞罷死轉忘寢與食非撫之也十年昭二十三年吳伐州來我師大奔秋令尹囊瓦城郢戍曰子常即囊瓦必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功春夏秋三時之務民無内憂而又無外懼國焉用城今吳是懼而城于郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待夫正其疆場修其土田險其走集親其民人明其伍候信其鄰國慎其官守守其交禮不僣不貪不懦不耆耆强也完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥徳無亦監乎若敖蚡冒至于武文土不過同方百里為同慎其四竟猶不城郢今土數圻方千里為圻而郢是城不亦難乎十一年昭二十四年王為舟師以畧吳疆戍曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎王及圉陽楚地而還吳人踵我而邊人不備遂滅巢及鍾離戌曰亡郢之始于此在矣王壹動而亡二姓之帥㡬如是而不及郢詩曰誰生厲階至今為梗其王之謂乎昭王元年昭二十七年吳公子掩餘燭庸伐我圍潛莠尹然工尹麇帥師救潛戍帥都君子與王馬之屬在都邑之士有復除者與王養馬官屬校人以濟師與吳師遇于窮左尹郤宛工尹夀至于潜吳師不能退㑹吳光弑王僚我師聞亂而還費無極謂囊瓦曰郤宛取賂而還又誤羣帥使退其師囊瓦使鄢將師殺郤宛及陽令終中厩尹晉陳大夫于是國言未已進胙者莫不謗令尹進胙國中祭祀戌言于囊瓦曰夫左尹與中厩尹莫知其罪而子殺之以興謗讟至于今不已戌也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之䜛人也民莫不知去朝吳出蔡侯朱喪大子建殺連尹奢屏王之耳目使不聰明不然平王之温惠共儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗㡬及子矣子而不圗將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位吳新有君疆場日駭楚國若有大事子其危哉知者除䜛以自安也今子愛䜛以自危也甚矣其惑也囊瓦曰是瓦之罪敢不良圖秋殺費無極鄢將師謗言乃止四年昭三十年吳使徐人執掩餘鍾吾人執燭庸掩餘燭庸來奔王使監馬尹大心逆之使居養戌及莠尹然城之將以害吳冬吳執鍾吾子滅徐徐子來奔戌帥師救徐弗及遂城夷使徐子處之五年昭三十一年吳侵我伐夷侵潛六並楚邑戌帥師救潛吳師還我師遷潛于南岡而還吳師圍絃戍及右司馬稽帥師救弦及豫章吳師還十年定四年蔡滅沈我為沈故圍蔡蔡侯吳子唐侯伐我舍舟于淮汭自豫章與楚夾漢戌與囊瓦謀毁其舟前後擊之既行囊瓦及吳師戰我師大敗五戰及郢王出奔戍及息而還敗吳師于雍澨傷初戌臣闔廬故恥為禽謂其臣曰誰能免吾首吳句卑曰臣賤可乎戌曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免左傳句卑呉人為戌臣戌子二諸梁后臧沈諸梁后臧陽附圉公沈諸梁字子高沈尹戌之子也為葉公昭王二十五年哀四年諸梁及左司馬眅致蔡于負亟蔡故地楚㑹致之以為邑致方城之外于繒闗襲梁及霍執蠻子以歸詳左司馬眅傳左傳公子申召白公勝諸梁聞之見申曰聞子召王孫勝信乎曰然諸梁曰將焉用之曰勝直而剛欲寘之境諸梁曰不可其為人也展而不信愛而不仁詐而不知毅而不勇直而不衷周而不淑是六徳者皆有其華而不實者將焉用之彼其父為戮于楚其心又狷而不潔思報怨而已則其愛也足以得人其展也足以復之其詐也足以謀之其直也足以帥之其周也足以葢之其不潔也足以行之而加之以不仁奉之以不義蔑不克矣夫造勝之怨者皆不在矣謂譛大子費無極之徒若來無寵速其怒也思舊怨以脩其心茍國有釁必不居矣非子職之其誰乎余愛子與司馬公子結故不敢不言公子申曰徳其忘怨乎余善之夫乃其寧諸梁曰不然吾聞之曰唯仁者可好也可惡也可髙也可下也好之不偪惡之不怨髙之不驕下之不懼不仁者則不然好之則偪惡之則怨髙之則驕下之則懼驕有欲焉懼有惡焉欲惡怨偪所以生詐謀也若召而下之將戚而懼為之上者將怒而怨詐謀之心無所靖矣有一不義猶害國家今壹五六而必欲用之不亦難乎吾聞國家將敗必用姦人而嗜其疾味其子之謂乎人有言曰狼子野心怨賊之人其又可善乎子不我信盍求若敖氏與子于子晳之族而近之安用勝也其能幾何昔齊騶馬繻以胡公入于貝水邴歜閻職戕懿公于囿竹晉長魚矯殺三郤于榭魯圉人犖殺子般于次夫是誰之故也非唯舊怨乎是皆子所聞也人求多聞善敗以鑑戒也子聞而棄之猶䝉耳也吾語子何益吾知逃而已公子申笑曰子之尚勝也不從使為白公諸梁以疾閒居于蔡國語惠王十年哀十六年白公勝作亂殺公子申公子結而刼王諸梁在蔡方城之外皆曰可以入矣諸梁曰吾聞之以險徼幸者其求無饜偏重必離既而聞白公勝殺齊管修管仲之後楚賢大夫諸梁乃入勝刼王如髙府楚别府圉公陽穴宫負王以如昭夫人之宫圉公陽亦楚大夫也㑹諸梁亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉賊盗之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾若見君面是得艾也艾安也民知不死其亦夫有奮心猶將旌君以徇于國而又掩面以絶民望不亦甚乎乃免胄而進遇箴尹薳固帥其屬將與白公勝諸梁曰㣲二子者謂公子申公子結楚不國矣棄徳從賊其可保乎乃從諸梁使與國人以攻勝勝奔山而縊荀子葉公子髙㣲小短瘠行若將不勝其衣然白公之亂令尹子西司馬子期皆死焉葉公子髙入據楚誅白公定楚國如反手白公之亂陳侵我十一年哀十七年我將取陳麥王問帥于大師子榖與諸梁子榖曰右領差車與左史老並楚大夫皆相令尹司馬以伐陳亦謂公子申公子結其可使也諸梁曰率賤民慢之懼不用命焉子榖曰觀丁父鄀俘也武王以為軍率是以克州蓼服隨唐大啟羣蠻彭伸爽申俘也文王以為令尹實縣申息朝陳蔡封畛于汝唯其任也何賤之有諸梁曰天命不謟令尹有感于陳公子申伐呉陳使使弔吳以此為恨在哀十五年天若亡之其必令尹之子是與君盍舍焉臣懼右領與左史有二俘之賤而無其令徳也王使公孫朝帥師公子申之子朝遂滅陳諸梁既平白公勝遂兼令尹司馬及是王與諸梁枚卜子良以為令尹子良者王之弟也沈尹朱曰吉過于其志諸梁曰王子而相國過將何為他日改卜遂以公孫寧公子申之子為令尹公孫寛公子結之子為司馬而諸梁老于葉十三年哀十九年越侵我諸梁伐東夷以報越三夷男女及我師盟于敖吳之入郢也諸梁之弟后臧從其母于吳楚既定后臧不待而歸諸梁終不正視之左傳論曰沈戍籌吳洞若觀火楚用其言吳雖疆如楚何及夫毁舟謀遂燎原之勢其猶可撲滅也惜夫䜛夫阻之而貪人之敗類也國人好司馬施及諸梁遂平勝難徳繫民望國乃不亡嗚乎君子當知所尚矣若夫圉公陽之穴宫吳句卑之免首小臣事主不以約遷雖然我實失子寧無滋歎乎尚史卷五十九
