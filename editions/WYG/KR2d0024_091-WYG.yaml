body:
  text: 尚史巻九十二表六鑲白旗漢軍李鍇撰戰國年表夫漓王風而作偽者霸也破霸而以詐力重者戰國之變也戰國變而天紀絶人心危傾詖不嫌于誣恫疑不嫌于喝當是時衡固益彊縱将餌弱六國委肉餓秦必無幸矣使韓魏之主疏知抉隠塞利守信結反覆之舌開仁義之門寄政于内協隣于外夫如是則守封不亡韓魏不亡秦不得帝舊防無用制水有餘此之謂夫秦紀與六國世家事年多舛今參用之始皇用紀魯宋後亡衛訖二世别釐出之作戰國年表尚史巻九十二
  hash: sha256:902f452b3d0b82a03fe5fd2ad40fdebe57df258b12da44bf6d1f2c4b5476be86
