body:
  text: 尚史卷十四世家七鑲白旗漢軍李鍇撰宋世家始成王元年終赧王二十九年凡八百三十七年傳三十二世微子微仲宋公稽丁公湣公煬公厲公僖公恵公哀公戴公武公宣公㣲子名啟殷帝乙之首子而紂之庶兄也前事見殷傳周公承成王命誅武庚乃命㣲子啟代殷後奉其先祀作㣲子之命史記王若曰猷殷王元子惟稽古崇徳象賢綂承先王脩其禮物作賔于王家與國咸休永世無窮嗚呼乃祖成湯克齊聖廣淵皇天眷祐誕受厥命撫民以寛除其邪虐功加于時徳垂後裔爾惟踐脩厥猷舊有令聞恪慎克孝肅恭神人予嘉乃徳曰篤不忘上帝時歆下民祗協庸建爾于上公尹兹東夏欽哉徃敷乃訓慎乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗予一人世世享徳萬邦作式俾我有周無斁嗚呼徃哉惟休無替朕命尚書國于宋㣲子故能仁賢乃代武庚故殷之餘民甚戴愛之㣲子薨立其弟衍是為㣲仲禮記㣲子舍其孫腯而立衍是也㣲仲薨子宋公稽即位宋公稽薨子丁公申即位丁公申薨子湣公共即位湣公共薨弟煬公熙即位史記湣公大子弗父何庶子鮒祀鮒一作魴譙周亦作魴祀鮒祀弑煬公欲立大子何何讓不受鮒祀自立左傳是為厲公厲公薨子僖公舉即位僖公元年周厲王二十一年也十七年厲王出奔彘二十八年公薨諡曰僖子恵公覸即位恵公四年宣王立三十年公薨諡曰惠子哀公即位哀公元年薨子戴公即位戴公十八年宣王崩幽王立二十九年幽王為犬戎所殺平王立三十四年戴公薨子武公司空即位武公生女為魯恵公夫人生魯桓公十八年公薨子宣公力即位宣公有大子與夷十九年公病讓其弟和曰父死子繼兄死弟及天下通義也我其立和和亦三讓而受之公薨弟和即位史記穆公七年入春秋穆公名和宣公弟穆公七年魯隠公元年秋九月及魯盟于宿九年隠三年春三月平王崩桓王立秋八月公疾召大司馬孔父曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以没先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄徳不讓是廢先君之舉也豈曰能賢光昭先君之令徳可不務乎吾子其無廢先君之功使子馮出居于鄭秋八月公薨左傳諡曰穆在位九年殤公殤公名與夷宣公子穆公薨殤公即位元年隐四年春公及魯侯遇於清公之即位也公子馮出居鄭鄭人欲納之及衞州吁弑桓公而立使告於我曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也我許之故公及陳侯蔡人衛人伐鄭圍其東門五日而還秋諸侯復伐鄭公使如魯乞師魯公子翬帥師㑹之敗鄭徒兵而還二年隠五年秋九月我取邾田邾人告于鄭曰請君釋憾于宋敝邑為道鄭人以王師㑹之伐我入其郛我如魯告命魯侯将救之問使者曰師何及對曰未及國魯侯怒乃止冬十二月我伐鄭圍長葛三年隠六年秋取長葛冬京師饑魯使來請糴四年隐七年秋及鄭平七月盟于宿魯伐邾為我討也五年隠八年春齊將平宋衛于鄭有㑹期公以幣請于衛請先相見衛侯許之故遇于犬邱齊卒平宋衛于鄭秋七月公及齊侯衛侯盟于瓦屋以釋東門之役公不王六年隠九年鄭伯為王左卿士以王命討公伐我我以入郛之役怨魯不告命魯怒絶我使冬魯侯齊侯㑹于房謀伐我七年隠十年夏五月魯公子翬㑹齊侯鄭伯伐我六月魯侯復㑹于老桃敗我師于菅鄭師入郜取防歸于魯秋七月鄭師猶在郊我及衛人入鄭蔡人從之伐戴戴音再國名八月鄭伯克戴取三師宋衛蔡三師九月鄭伯入我八年隠十一年冬十月鄭伯以虢師伐我大敗我師莊公元年桓二年春正月華父督殺孔父宋司馬而取其妻公怒督懼遂弑公左傳諡曰殤在位九年莊公莊公名馮穆公子莊公元年桓二年春正月華父督弑殤公召馮于鄭而立之是為莊公十年桓十一年春我及齊衛鄭盟于惡曹經不書宋闕雍氏女于鄭莊公曰雍姞生厲公突雍氏宗有寵于公秋九月執鄭祭仲曰不立突將死亦執突而求賂焉祭仲與我盟以突歸而立之鄭昭公出奔衛公㑹陳侯魯柔蔡叔盟于折公㑹魯侯于夫鍾冬十二月復㑹于闞十一年桓十二年魯侯欲平宋鄭秋七月公及魯侯燕人盟于榖邱八月又㑹于虚冬十一月又㑹於龜公辭平魯及鄭師伐我戰于宋十二年桓十三年春二月魯侯㑹紀侯鄭伯及公齊侯衛侯燕人戰我師齊師衛師燕師敗績十三年冬我以諸侯齊蔡衛陳伐鄭焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門宋城門之椽十四年桓十五年春三月桓王崩莊王立鄭厲公出奔蔡昭公復入冬公㑹諸侯魯衛陳于袲伐鄭納厲公弗克而還十五年莊十六年春正月公㑹諸侯魯蔡衛于曹夏四月公㑹諸侯魯衛陳蔡伐鄭十六年桓十七年秋我及魯衛伐邾邾宋争疆故十九年莊二年冬十一月公薨諡曰莊明年夏葬莊公左傳在位十九年閔公閔公名㨗莊公子莊公薨閔公即位衛二公子逐恵公恵公奔齊在桓十六年閔公三年莊五年冬我㑹諸侯魯齊陳蔡伐衛納恵公八年莊十年春二月魯侵我三月我遷宿取其地夏六月我及齊師次于郎魯敗我師于乗邱齊師還九年莊十一年夏五月我侵魯魯敗我師于鄑秋大水魯使弔焉曰天降淫雨害于粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱魯臧孫達曰宋其興乎禹湯罪已其興也浡焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御說之辭也達曰是宜為君有恤民之心十年莊十二年秋南宫萬弑公于蒙澤殺大夫仇牧及大宰督立公子游左傳諡公曰閔在位十年桓公桓公名御説亦莊公之子也閔公十年莊十二年南宫萬弑閔公立公子㳺羣公子奔蕭御説奔亳南宫牛萬之子猛獲圍亳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立御説是為桓公猛獲奔衛南宫萬奔陳我請于陳衛陳衛歸之皆醢之是年莊王崩僖王立桓公元年莊十三年春齊侯㑹我及諸侯陳蔡邾于北杏以平我亂已而我背北杏之㑹二年莊十四年春齊人陳人曹人伐我齊請師于周夏單伯㑹之取成于我而還冬公㑹單伯諸侯齊衛鄭于鄄三年莊十五年春公㑹諸侯齊陳衛鄭于鄄齊桓公始霸秋我及齊邾伐郳即小邾鄭侵我四年莊十六年夏我及齊衛代鄭冬十二月公㑹諸侯齊魯陳衛鄭許滑滕同盟于幽鄭成故五年莊十七年僖王崩恵王立七年莊十九年秋周王子頽作亂衛師燕師伐周立子頽冬我及齊陳伐魯西鄙幽之盟魯使㣲者㑹故九年莊二十五年春鄭公虢公納王殺子頽十四年莊二十六年秋我及魯齊伐徐十五年莊二十七年夏六月公㑹諸侯齊魯陳鄭同盟于幽陳鄭服故十六年莊二十八年秋荆伐鄭我㑹齊魯救鄭二十年莊三十二年齊以荆伐鄭故請㑹諸侯公請先見于齊侯夏遇于梁邱二十二年閔二年狄入衛衛人出走公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹狄伐邢二十三年僖元年春正月我及齊曹次于聶北救邢夏邢遷于夷儀我及齊曹城邢二十四年僖二年秋九月公及齊侯江人黄人盟于貫江黄服故二十五年僖三年秋公及齊侯江人黄人㑹于陽榖謀伐楚二十六年僖四年春正月公㑹諸侯齊魯陳衛鄭許曹侵蔡蔡潰遂伐楚次于陘夏楚屈完來盟于師盟于召陵冬我㑹諸侯齊魯衛鄭許曹之師侵陳陳成二十七年僖五年夏公及諸侯齊魯陳衛鄭許曹㑹王世子于首止王以恵后故将廢大子故齊桓㑹之以定其位秋八月諸侯盟于首止王使召鄭伯鄭伯逃歸不盟二十八年僖六年夏公㑹諸侯齊魯陳衛曹伐鄭逃首止盟故圍新城秋楚圍許以救鄭諸侯救許乃還二十九年僖七年秋公會諸侯齊魯陳鄭盟于寗母閏月恵王崩㐮王惡大叔帶之難懼不發喪三十年僖八年春正月公㑹王人諸侯齊魯衛許曹陳盟于洮謀王室也鄭伯乞盟請服也㐮王定位而後發喪三十一年僖九年春公薨左傳諡曰桓在位三十一年襄公襄公名兹父桓公大子桓公三十年僖八年冬公疾大子請立庶兄目夷目夷不可三十一年僖九年春桓公薨大子即位是為襄公夏公㑹宰周公諸侯齊魯衛鄭許曹于葵邱秋諸侯盟于葵邱公以目夷為仁使為左師以聼政于是宋治襄公二年僖十一年夏揚拒泉臯伊雒之戎代京師入王城王子帶召之也三年僖十二年秋王討王子帯子帯奔齊四年僖十三年夏公㑹諸侯齊魯陳衛鄭許曹于鹹淮夷病把且謀王室也秋諸侯戍周六年僖十五年秦楚伐徐三月公㑹諸侯前諸侯盟于牡邱遂次于匡諸侯之大夫救徐冬我伐曹莊十四年曹與諸侯伐我故七年僖十六年春隕石于宋五六鷁退飛過宋都周内史叔興來聘公問焉曰是何祥也吉凶焉在對曰今兹魯多大䘮明年齊有亂君將得諸侯而不終退而告人曰是隂陽之事非吉凶所生也冬十二月公㑹諸侯前諸侯于淮夷病鄫且東畧也八年僖十七年冬十月齊桓公卒孝公昭來奔九年僖十八年春正月公㑹曹伯衛人邾人伐齊齊殺無虧將立孝公不勝四公子之徒遂與我戰夏五月我敗齊師于甗立孝公而還十年僖十九年春執滕子嬰齊夏六月公及曹人邾人盟于曹南鄫子㑹盟于邾公使邾子用鄫子于次睢之社欲以屬東夷睢水次有妖神東夷皆社祠之宋使邾殺鄫子為犠牲以祭之欲徼福于神以屬東夷秋我圍曹曹南之盟不修地主禮故十二年僖二十一年春我及齊人楚人盟于鹿上宋為鹿上之盟求諸侯于楚楚人許之秋公及諸侯楚陳蔡鄭許曹㑹于盂楚執公以伐我冬十二月魯侯㑹諸侯前諸侯盟于薄釋公十三年僖二十二年夏公及諸侯衛許滕伐鄭楚伐我以救鄭公將戰大司馬固莊公孫諫弗聽冬十一月公及楚人戰于泓我師敗績公傷股十四年僖二十三年春齊伐我圍緡十九年盟于齊宋不與會故夏五月公薨左傳諡曰襄在位十四年成公成公名王臣襄公子襄公薨成公即位元年僖二十四年秋大叔帯以狄師攻王王適鄭處於氾八月我及楚平公如楚還入于鄭鄭伯享之有加禮二年僖二十五年夏晋納王殺大叔𢃄經于此年書宋殺其大夫傳不載大夫為誰不可知晉侯之亡也過我襄公贈之以馬二十乗及晉侯立我叛楚即晉三年僖二十六年冬楚伐我圍緡四年僖二十七年冬楚及諸侯陳蔡鄭許圍我我使公孫固如晉告急五年僖二十八年春晉侵曹衛以救我三月我又使門尹般大夫如晋告急晉執曹伯分曹衛之田以畀我楚怒夏四月公㑹晉侯齊師秦師及楚戰于城濮楚師敗績五月公㑹諸侯晋魯齊蔡鄭衛莒盟于踐土冬公㑹諸侯晋魯齊蔡鄭陳莒邾秦于温天王狩于河陽諸侯圍許六年僖二十九年夏六月公孫固㑹王子虎魯侯及諸侯之大夫晋齊陳秦蔡于翟泉尋踐土之盟且謀伐鄭十二年文二年夏六月公㑹陳侯鄭伯晉士縠魯公孫敖盟于垂隴討衞故冬公子成及諸侯之大夫晉陳鄭伐秦十三年文三年春正月我會諸侯之大夫晋魯陳衛鄭伐沈沈潰十七年文七年夏四月公薨昭公即位而𦵏成公左傳諡曰成在位十七年昭公昭公名杵臼成公子成公十七年文七年薨昭公即位昭公將去羣公子司馬樂豫戴公元孫曰不可親之以徳皆股肱也誰敢􅂝貳若之何去之不聴穆㐮之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室六卿公子成公孫友樂豫鱗矔公子蕩華御秋八月公㑹諸侯魯齊衛陳鄭許曹晉大夫趙盾盟于扈晉靈公故立昭公元年文八年秋八月襄王崩頃王立襄夫人襄王之姊也公不禮焉夫人因戴氏之族華樂皇皆戴族殺襄公之孫孔叔公孫鍾離大司馬公子卬皆昭公黨司城蕩意諸奔魯二年文九年春三月楚伐鄭華耦大夫㑹諸侯之大夫晉魯衛許救鄭不及楚師三年文十年冬狄侵我陳侯鄭伯㑹楚子于息遂及蔡侯次于厥貉將以伐我我逆楚子勞且聴命遂道以田孟諸公為右盂鄭伯為左盂盂田獵陳名期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧公違命無畏抶其僕以徇四年文十一年秋魯公子遂來聘言蕩意諸而復之七年文十四年春頃王崩匡王立夏六月公㑹諸侯魯陳衛鄭許曹晉趙盾同盟于新城陳鄭宋服且謀納邾㨗菑秋七月諸侯之師納㨗菑于邾弗克納九月髙哀奔魯宋卿不義昭公而出八年文十五年春三月司馬華耦華督孫如魯盟冬十一月公㑹諸侯晉衛蔡陳鄭許曹盟于扈謀伐齊九年文十六年公無道襄夫人将使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右冬十一月公田孟諸未至夫人使帥甸攻而殺之蕩意諸死之左傳諡曰昭在位九年文公文公名鮑昭公庶弟鮑禮于國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數于六卿之門國之材人無不事也親自桓以下無不恤也鮑羙而艷襄夫人欲通之不可乃助之施昭公無道國人奉鮑以因夫人昭公弑鮑即位是為文公使母弟湏為司城蕩虺為司馬文公元年文十七年春晉衛陳鄭伐我曰何故弑君我及晋平夏六月晉侯合諸侯于扈平我故二年文十八年武氏之族道昭公子將奉司城湏以作亂冬十二月殺湏及昭公子攻武氏遂出武穆之族使公孫師莊公孫為司城樂吕戴公曽孫為司㓂以靖國人三年宣元年鄭受盟于楚秋楚侵陳遂侵我晉趙盾救之公及諸侯陳衛曹㑹晉師于棐林伐鄭楚救鄭乃還冬我及晉人伐鄭四年宣二年春二月華元及鄭戰于大棘我師敗績鄭獲華元元逃歸夏我及諸侯晋衛陳之師侵鄭冬十月匡王崩定王立五年宣三年武穆之族以曹師代我秋我師圍曹九年宣七年冬公㑹周王叔桓公及諸侯晋衛鄭曹盟于黒壤鄭及晋平故十一年宣九年秋九月公㑹諸侯前諸侯于扈陳不㑹晉以諸侯之師伐陳冬我圍滕十二年宣十年夏六月我師伐滕滕不事我故鄭及楚平我及諸侯之師晋衛曹伐鄭取成而還十四年宣十二年冬楚伐蕭華椒大夫以蔡人救蕭十二月華椒及諸侯之大夫晋衛曹同盟于清邱我為盟故伐陳衛人救陳十五年宣十三年夏楚伐我十六年宣十四年楚使無畏聘于齊我殺之秋九月楚圍我十七年宣十五年夏五月我及楚平二十二年成二年秋八月公薨明年春二月塟文公始厚𦵏用蜃炭益車馬始用殉重器偹椁有四阿棺有翰檜四阿四注棺翰王禮左傳諡曰文在位二十二年共公共公名固文公子文公二十二年成二年薨共公即位是年冬十一月華元及諸侯魯蔡許諸侯之大夫楚秦陳衛鄭齊曹邾薛鄫盟于蜀共公元年成三年春正月公㑹諸侯晋魯衛曹伐鄭二年成四年春華元如魯聘三年成五年春正月魯仲孫蔑來聘秋殺公子圍龜文公子冬十一月定王崩簡王立十二月公㑹諸侯晉齊衛鄭曹邾杞同盟于蟲牢諸侯謀復㑹公辭以圍龜之難四年成六年春三月諸侯之師晉衛鄭及伊雒之戎侵我以我辭㑹也秋魯師侵我五年成七年秋楚伐鄭公㑹諸侯晉魯齊衛曹莒邾杞救鄭八月同盟于馬陵尋蟲牢盟且莒服故六年成八年春華元如魯聘伯姬穆姜女成公姊妹夏使公孫夀如魯納幣七年成九年春正月公㑹諸侯晋齊衛鄭曹莒杞同盟于蒲二月魯伯姬歸于我夏魯季孫行父來致女晉執鄭伯鄭貳于楚故鄭立公子髠頑八年成十年夏五月公㑹諸侯晋魯齊衛曹伐鄭歸鄭伯九年成十一年華元善楚又善晉冬華元如楚遂如晉合晉楚之成十年成十二年夏五月晉楚盟于我西門之外十一年成十三年夏五月公㑹周劉康公成肅公及諸侯晉魯齊衛鄭曹邾滕伐秦戰于麻隧秦師敗績十三年成十五年春三月世子成㑹諸侯晋魯衛鄭曹齊邾同盟于戚討曹伯殺大子而自立夏六月公薨秋八月𦵏共公左傳諡曰共在位十三年平公平公名成共公子共公十三年成十五年薨平公即位是年秋八月司馬蕩澤弱公室殺公子肥文公子華元殺蕩澤魚石向為人鱗朱向􅙮魚府五大夫並蕩氏族出奔楚冬十一月華元㑹諸侯之大夫晋魯齊衛鄭邾㑹吳于鍾離元年成十六年夏四月鄭侵我我敗諸汋陂鄭人覆之敗我師汋陵獲將鉏樂氏族樂懼戴公六世孫秋華元㑹諸侯晋魯齊衛邾于沙隨謀伐鄭七月我㑹周尹子及諸侯伐鄭鄭子罕宵軍之宋齊衛皆失軍二年成十七年夏五月公㑹周尹子單子及諸侯晋魯衛曹齊邾伐鄭自􅀈童至于曲洧六月同盟于柯陵冬復㑹周單子及諸侯前諸侯伐鄭十月圍鄭楚救之諸侯還三年成十八年夏六月鄭侵我及曹門外遂㑹楚伐我納魚石等彭城以三百乗戍之而還秋七月老佐戴公五世孫華喜華督𤣥孫圍彭城冬十一月楚救彭城伐我華元如晉告急晉侯救我楚師還十二月公㑹諸侯晉魯衛邾齊同盟于虚朾謀救我我辭諸侯而請師以圍彭城四年㐮元年春正月華元㑹諸侯之師晉魯衛曹莒邾滕薛圍我彭城彭城降晉晉以五大夫歸寘諸瓠邱秋楚侵我吕留二縣名鄭侵我取大邱九月簡王崩靈王立五年㐮二年春鄭侵我夏六月我師晉師衛師侵鄭秋七月華元㑹諸侯之大夫晉魯衛曹邾于戚謀討鄭魯叔孫豹來聘冬華元復㑹諸侯之大夫晉魯齊衛曹邾滕薛小邾于戚城虎牢以偪鄭鄭人乃成六年㐮三年夏六月公會周單子及諸侯晋魯衛鄭莒邾齊同盟于鷄澤晋逆吳子吳子不至八年襄五年秋公㑹諸侯晋魯陳衛鄭曹莒邾滕薛齊吳鄫于戚㑹吳且命戍陳冬戍陳楚伐陳公㑹諸侯晋魯衛鄭曹齊于城棣以救之九年襄六年春樂轡大夫以弓梏華弱華椒孫于朝公見之逐華弱弱奔魯亦逐樂轡十年㐮七年楚圍陳冬十二月公㑹諸侯晋魯陳衛曹莒邾于鄬以救之十一年襄八年春向戌㑹晉侯鄭伯及諸侯之大夫齊魯衛邾于邢邱以命朝聘之數十二年襄九年春災鄭及楚平冬十月公㑹諸侯晋魯衛曹莒邾滕薛杞小邾齊伐鄭鄭成十一月同盟于戲經書十二月己亥長厯推之經誤晉以諸侯復伐鄭次于隂口而還十三年襄十年春公㑹諸侯前諸侯㑹吳于柤夏六月楚鄭圍我門于桐門衛救我秋七月楚鄭侵魯還圍蕭宋邑克之九月侵我北鄙公㑹諸侯前諸侯伐鄭城虎牢而戌之鄭及晉平楚救鄭鄭與楚盟十一月諸侯之師還侵鄭北鄙而歸十四年㐮十一年向戎侵鄭大獲夏四月鄭侵我公㑹諸侯前諸侯伐鄭鄭成秋七月同盟于亳城北楚及秦師將伐鄭鄭伯逆之伐我九月諸侯前諸侯悉師以復伐鄭鄭使行成十二月㑹於蕭魚十五年襄十二年冬楚及秦師伐我十七年襄十四年春正月我㑹諸侯之大夫晋魯齊衛鄭曹莒邾滕薛杞小邾㑹吳于向楚敗吳為吳謀楚故夏四月我㑹諸侯之大夫前諸侯伐秦衛孫林父逐其君獻公立公孫剽冬華閲㑹諸侯之大夫晋魯衛鄭莒邾于戚謀定衛十八年㐮十五年春向戌如魯聘十九年㐮十六年春三月公㑹諸侯晋魯衛鄭曹莒邾薛杞小邾于溴梁戊寅向戍及諸大夫盟夏五月我㑹鄭伯及晋魯衛伐許二十年襄十七年春莊朝伐陳獲司徒卬冬華閲卒華臣閲之弟殺其宰華吳十一月臣出奔陳二十一年㐮十八年冬十月公㑹諸侯晋魯衛鄭曹莒邾滕薛杞小邾于魯濟同圍齊二十二年襄十九年春正月諸侯前諸侯盟于祝柯二十三年襄二十年夏六月公㑹諸侯晋魯齊衛鄭曹莒邾滕薛杞小邾盟于澶淵齊及晉平故冬魯季孫宿來聘二十四年㐮二十一年晋欒盈叛冬公㑹諸侯晋魯齊衛鄭曹莒邾于商任錮欒氏也二十五年㐮二十二年冬公㑹諸侯晋魯齊衛鄭曹莒邾薛杞小邾于沙隨復錮欒氏也齊伐晋二十七年襄二十四年秋八月公㑹諸侯晋魯衛鄭曹莒邾滕薛杞小邾于夷儀將伐齊水不克冬楚伐鄭以救齊諸侯還救鄭二十八年襄二十五年夏五月公㑹諸侯前諸侯于夷儀伐齊齊成秋七月諸侯同盟于重邱二十九年㐮二十六年夏六月向戍㑹魯侯及諸侯之大夫晉魯鄭宋曹于澶淵衛弑君剽討衛故三十年襄二十七年向戍善晉趙武又善楚屈建欲弭諸侯之兵以為名如晉告趙武晋許之如楚楚亦許之如齊秦齊秦亦許之皆告于小國為㑹于宋夏諸侯之大夫晋楚齊秦魯鄭陳衛邾滕蔡許曹㑹于宋秋七月公及諸侯之大夫盟于䝉門之外三十一年㐮二十八年為宋之盟故冬十一月公及諸侯魯陳鄭許如楚及漢楚康王卒公反靈王崩經從告書十二月景王立三十二年㐮二十九年宋饑司城樂喜即子罕請于公出公粟以貸使大夫皆貸夏六月華定㑹諸侯之大夫晋魯齊衛鄭曹莒滕薛小邾城杞三十三年㐮三十年夏五月宋大災伯姬卒秋七月魯叔弓來葬伯姬冬十月向戍及諸侯之大夫晋魯齊衛鄭曹莒邾滕薛杞小邾㑹于澶淵我災故謀歸我財既而無歸三十五年昭元年春正月向戍㑹諸侯之大夫晋楚齊魯衛陳蔡鄭許曹于虢三十八年昭四年夏世子佐及諸侯楚蔡陳鄭許徐滕頓胡沈小邾淮夷㑹于申世子佐先歸秋七月華費遂從諸侯伐吳四十年昭六年夏右師華合比出奔衛四十二年昭八年秋九月戴惡大夫㑹楚伐陳滅之四十三年昭九年春華亥及諸侯之大夫魯鄭衛㑹楚子于陳四十四年昭十年晉平公卒秋九月華定如晉𦵏平公冬十二月公薨明年春二月𦵏平公左傳諡曰平在位四十四年元公元公名佐平公子元公元年昭十一年春二月魯叔弓來㑹𦵏楚圍蔡秋華亥㑹諸侯之大夫晋魯齊衛鄭曹杞于厥憖謀救蔡二年昭十二年夏華定華椒孫如魯聘三年昭十三年秋公㑹周劉子及諸侯晋魯齊衛鄭曹莒邾滕薛杞小邾于平邱八月同盟于平邱齊服故八年昭十八年夏五月宋災邾襲鄅九年昭十九年春二月我伐邾取蟲夏五月邾人郳人徐人㑹公同盟于蟲公無信多私而惡華向二氏並宋公族十年昭二十年夏六月華定華亥與向寧殺羣公子公如華氏請遂刼公取大子欒母弟辰公子地以為質公亦取華向之子與華氏盟以為質冬十月公殺華向之質而攻之華亥向寧華定出奔陳華登華費遂之子奔吳華多僚與華貙相惡多僚貙並華費遂子乃譖諸公曰貙將納亡人公與華費遂謀逐貙十一年昭二十一年夏五月任鄭翩貙家臣殺多僚刼華費遂以叛而召亡人華亥向寧華定自陳入南里以叛六月我城舊鄘及桑林之門而守之冬十月華登以吳師救華氏齊烏枝嗚適戍我我師及齊師敗吳師于鴻口華登帥其餘以敗我師公欲出㕑人濮徇曰揚徽者公徒也衆從之遂敗華氏于新里十一月晉師齊師衛師救我與華氏戰于赭邱大敗華氏圍諸南里華登如楚乞師十二年昭二十二年春楚薳越使來請華氏諸侯之戍謀曰若華氏知困而致死楚耻無功而疾戰非吾利也不如出之以為楚功固請出之華亥向寧華定華貙華登出奔楚公使公孫忌為大司馬邉卬平公曽孫為大司徒樂祁犂樂喜孫為司城仲幾仲江孫為左師樂大心為右師樂輓樂喜孫為大司㓂以靖國人夏四月景王崩悼王立六月王子朝作亂王居于皇冬十一月悼王崩經書十月誤敬王立十三年昭二十三年秋王居于狄泉尹氏立王子朝十五年昭二十五年春魯叔孫婼來聘夏樂大心㑹諸侯之大夫晋魯衛鄭曹邾滕薛小邾于黄父晉趙鞅令輸王粟具戍人曰明年將納王魯季孫意如逐其君昭公冬十一月公將為魯故如晉薨于曲棘明年春正月𦵏元公左傳諡曰元在位十五年景公景公名欒史記名頭曼元公子元公將亡夢大子欒即位于廟及薨欒即位是為景公景公元年昭二十六年冬十月晋師納敬王王入于成周王子朝奔楚二年昭二十七年秋樂祁犂及諸侯之大夫晋衛曹邾滕㑹于扈戍周且謀納魯昭公七年昭三十二年冬仲幾㑹諸侯之大夫晋魯齊衛鄭曹莒薛杞小邾于狄泉謀城成周八年定元年春正月晉合諸侯之大夫城成周執仲幾歸諸京師十一年定四年春三月公㑹周劉子及諸侯晋魯蔡衛陳鄭許曹莒邾頓胡滕薛杞小邾齊于召陵侵楚十三年定六年秋八月樂祁犁如晋未致使而與趙鞅私飲酒晉執樂祁犁周儋翩作亂冬十月王處於姑蕕十四年定七年冬十一月王入于王城十五年定八年春樂祁犁歸卒于大行十六年定九年春向巢如晋盟且逆樂祁犁之尸公初使樂大心如晉大心辭以疾十七年定十年秋逐大心大心出奔曹公嬖向魋司馬桓魋取公子地景公弟馬與魋地怒抶魋而奪之地出奔陳冬母弟辰暨仲佗仲幾子石彄褚師叚子出奔陳十八年定十一年春弟辰及仲佗石彄公子地自陳入于蕭以叛秋樂大心自曹入于蕭晉荀寅士吉射叛二十一年定十四年秋公及齊侯㑹于洮謀救范氏也公子地自蕭奔鄭二十二年定十五年夏鄭伐我敗我師于老邱為地城嵒戈鍚三邑鄭宋問隙地事見哀十二年齊侯衛侯次于渠蒢謀救我二十五年哀三年夏樂髠伐曹二十六年哀四年春我執小邾子小邾子無道故二十七年哀五年夏齊伐我二十八年哀六年冬向巢伐曹二十九年哀七年春皇瑗侵鄭鄭叛晋故秋我圍曹築五邑于其郊曰黍邱揖邱大城鍾䢴冬鄭救曹侵我三十年哀八年春正月公滅曹執曹伯陽及司城公孫疆以歸殺之三十一年哀九年春鄭圍我雍邱皇瑗圍鄭師二月取鄭師于雍邱夏公伐鄭三十二年哀十年夏伐鄭三十四年哀十二年秋皇瑗及魯侯衛侯盟于鄖九月向巢伐鄭取錫殺公子地遂圍嵒冬十二月鄭救嵒圍我師三十五年哀十三年春向魋救我師逃歸鄭取我師于嵒獲成讙郜延皆宋大夫三十六年哀十四年向魋害于公公與左師向巢攻之魋入于曹以叛夏六月使巢伐之不能亦入于曹魋奔衛巢奔魯三十七年哀十五年夏鄭伐我三十八年哀十六年夏四月孔子卒三十九年哀十七年子儀克向魋臣讒皇瑗之子麋曰麋將納桓氏即向魋向巢等公執之皇瑗奔晋召之歸四十年哀十八年春殺皇瑗既而聞其情使皇緩為右師是年敬王崩元王立四十七年哀二十五年衛褚師比等逐衛侯輙輙來奔四十八年哀二十六年元王崩定王立夏五月樂茷會越臯如后庸並越大夫魯叔孫舒納衛侯不克入冬十月公薨左傳諡曰景在位四十八年史記六十四年景公卒誤昭公悼公休公辟公剔公君偃昭公名得史記作昭公特然前有昭公杵臼不應上同祖諡且左氏亦無昭公之文縁得諡不可知姑從史公孫周之子元公庶曽孫也景公無子取得與啟啟得弟畜諸公而未有立景公四十八年哀二十六年冬十月游于空澤邑名辛巳薨于連中館名大尹者為近官而有寵大尹興空澤之士千甲奉公自空桐入如沃宫使召六卿右師皇緩大司馬皇非我司徒皇懐左師靈不緩司城樂茷大司㓂樂朱鉏六卿至以甲刼之立啟得夢啟北首而寢于盧門之外已為烏而集于其上咮加于南門尾加于桐門曰余夢羙必立既而六卿使國人施於大尹施罪于大尹大尹奉啟以奔楚乃立得是為昭公左傳史記世家昭公者元公之曽庶孫也昭公父公孫糾糾父公子褍秦褍秦即元公少子也景公殺昭公父糾故昭公怨殺大子而自立昭公十二年定王崩考王立二十八年考王崩威烈王立昭公四十七年薨年表作四十九年子悼公購由即位悼公四年威烈王崩安王立悼公八年薨紀年作十八年子休公田即位休公二十三年薨子辟公辟兵即位紀年作桓侯璧兵一作辟公兵辟公三年薨子剔成即位史記紀年剔成肝廢其君璧而自立梁恵王伐邯鄲徵師于宋宋君使使請于趙曰梁兵勁而權重今徵師于敝邑敝邑不從則恐危社稷若扶梁伐趙以害趙國則寡人不忍願王之有以命敝邑也趙王曰然宋不敵梁寡人知之弱趙以强梁宋必不利也則吾何以告子而可使者曰臣請受邊城徐其攻而留其日以待下吏之有城而已趙王曰善宋因舉兵入趙圍一城梁王説曰宋人助我矣趙王亦説曰宋人止于此矣國䇿剔成四十一年剔成弟偃攻襲剔成剔成敗奔齊偃自立為宋君君偃十一年自立為王國策吕氏春秋並以偃諡康王東敗齊取五城南敗楚取地三百里西敗魏軍乃與齊魏為敵國盛血以韋囊縣而射之命曰射天淫於酒婦人羣臣諫者輙射之吕氏春秋宋王謂相唐鞅曰寡人所殺者衆矣而羣臣愈不畏何也鞅曰王之所罪盡不善者也罪不善善者故不畏不若無辨其善不善而時罪之則羣臣畏矣無何宋君殺鞅于是諸侯皆曰桀宋宋其復為紂所為不可不誅告齊伐宋王偃立四十七年年表四十三年齊湣王與魏楚伐宋殺王偃遂滅宋而三分其地史記國策宋康王之時有雀生􅞖于城之陬使史占之曰小而生巨必霸天下王大喜于是滅滕伐薛取淮北之地乃愈自信欲霸之速成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諌臣為無顔之冠以示勇剖傴之背鍥朝渉之脛而國人大駭齊聞而伐之民散城不守王乃逃倪侯之館遂得而死吕氏春秋齊攻宋王使人候齊㓂之所至使者還曰齊㓂近矣國人恐矣左右曰此所謂肉自至蟲者也以宋之强齊之弱惡能至此王怒而殺之又使人徃視報如前又殺之如此者三又使人徃視使者遇其兄曰鄉之視齊冦者以冦之近也報而死今也報其情死不報其情又恐死將若何其兄曰如報其情有且先夫死者死先夫亡者亡于是報于王曰殊不知齊冦之所在國人甚安王大喜左右皆曰鄉之死者宜矣王多賜之金㓂至王自投車上馳而走此人得以富于他國贊曰宣穆慕義勉行所難而釀亂五世君子或譏之是已然非徳不當雝若殤閔者御説之先驅爾于宣胡治乎文公伺釁盗國殷道親親時其替哉尚史卷十四
