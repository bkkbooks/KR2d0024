body:
  text: 尚史巻二十五列傳三鑲白旗漢軍李鍇撰周諸臣傳周文公周公旦者文王子也荀子周公之狀身如斷菑自文王在時旦為子孝䔍仁異于羣子及武王立周公常輔翼之用事居多武王十一年史記作九年下十三年作十一年今遵經東伐至盟津周公輔行十三年伐紂至牧野周公佐武王作牧誓破殷入啇宫紂自焚死周公把大鉞召公把小鉞以夾武王釁社告紂之罪于天及殷民尚書大傳紂死武王皇皇若天下之未定召太公而問曰入殷奈何太公曰臣聞之也愛其人者兼其屋上之烏不愛人者及其咠餘武王曰不可召公趨而進曰臣聞之也有罪者殺無罪者活咸劉厥敵母使有餘烈武王曰不可周公趨而進曰臣聞之也各安其宅各田其田母故毋新惟仁之親武王曠乎若天下之已定也説苑同封紂子武庚禄父使管蔡傅之以續殷祀封周公于少昊之虚曲阜是為魯公周公不就封留佐武王史記周書維武王勝殷撫國綏民乃觀于殷政告周公旦曰鳴呼殷政總總若風草有所積有所虚和此如何周公曰聞之文考來逺賔亷近者道别其隂陽之利相土地之宜水土之便營邑制命之曰大聚先誘之以四郊王親在之賔大夫免列以選赦刑以寛復亡解辱削赦闕重皆有數此謂行風乃立縣鄙商旅曰能來三室者與之一室之禄闢開修道五里有郊十里有井二十里有舍逺旅來至闗人易資舍其委市有五均早暮如一送行逆來振乏救窮老弱疾病孤子獨寡惟政所先民有欲畜發令以國為邑以邑為鄉以鄉為閭禍災相恤資喪比服五户為伍以首為長十夫為什以年為長合閭立教以威為長合旅同親以敬為長飲食相約興彈相庸耦耕闕耘男女有婚墳墓相連民乃有親六畜有羣室屋既完民乃歸之鄉立巫醫具百藥以備疾災畜五味以備百草立勤人以職孤立正長以順㓜立職喪以恤死立大葬以正同立君子以修禮樂立小人以教用兵立鄉社以習容春和獵耕耘以習遷行教茅與樹藝比長立職與田疇皆通立祭祀與嵗榖登下厚薄此謂徳教若其凶土陋民賤食貴貨是不政山林藪澤以因其闕工匠役工以政其材商賈趣市以合其用外商資貴而來貴物益賤資賤物出貴物以通其器夫然則闗夷市平財無鬱廢商不乏資百工不失其時無愚不教闕無窮乏則此謂和徳若有不言乃政其凶陂溝道路藂苴邱墳不可樹榖者以材木春發枯槁夏發榮葉秋發實蔬冬發新烝以匡窮困揖其民力相更為師因其土宜以為民資則生無乏用死無傳尸此謂仁徳旦聞禹之禁春三月山林不登斧以成草木之長夏三月川澤不入網罟以成魚鼈之長且以并農力執成男女之功夫然則有生而不失其宜萬物不失其性人不失其序天不失其時以成萬財萬財既成放此為人此為正徳泉深而魚鼈歸之草木茂而禽獸歸之稱賢使能官有材而歸之闗市平商賈歸之分地薄歛農民歸之水性歸下農民歸利王若欲求天下民先設其利而民自至譬之若冬日之陽夏日之隂不召而民自來此謂歸徳五徳既明民乃知常武王再拜曰嗚呼允哉天民側側余知其極有宜乃召昆吾冶而銘之金版藏府而朔之既克商二年王有疾弗豫太公召公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告太王王季文王史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪乃卜三龜一習吉啟籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圖兹攸俟能念予一人公歸乃納策于金縢之匱中王翼日乃瘳尚書武王崩成王年十有三而嗣立周公居冡宰攝政以治天下家語尸子昔者武王崩成王少周公旦踐東宫履乗石祀明堂假為天子七年荀子周公屏成王而反武王履天子之藉負扆而坐諸侯趨走堂下禮記周公朝諸侯于明堂之位天子負斧依南向而立康成注周公攝王位以明堂禮儀朝諸侯也不于宗廟避王也天子周公也為斧文屏風于户牖之間周公于前立也史記淮南其説並同按周公朝諸侯天子負斧依所謂天子者成王也葢謂負成王而朝諸侯也漢儒説禮傳㑹為多而鄭注直以天子為周公大乖事理家語攝政其説為允管叔及其羣弟乃流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無以告我先王鄭氏詩傳周公以管蔡流言辟居東都于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公周公居東二年秋大熟未穫天大雷雨以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啟金縢之書乃得周公所自以為功代武王之説二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其親迎我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之嵗則大熟尚書越絶書武王封周公使傅相成王成王少周公臣事之于是管叔蔡叔不知周公而讒之成王周公乃辭位出巡狩于邉一年天暴風雨樹木盡偃成王大恐及發金縢之櫃察周公之冊知周公有盛徳王乃夜迎周公樹木皆起天下皆實漢孔氏以居東為東征非是史以周公卒後發金縢書亦誤史記成王病周公祝于河曰干命者旦也亦藏其䇿于府及人讒周公周公奔楚成王發府見書乃泣反周公説尤誤今併正之管蔡武庚等率淮夷反周公乃奉成王命興師東伐作大誥遂誅管叔于商囚蔡叔于郭鄰以車七乗降霍叔于庶人三年不齒淮夷畢定諸侯咸復宗周史記尚書大傳管叔蔡叔疑周公流言于國曰公將不利于王奄君薄姑謂禄父曰武王既死矣今王尚㓜周公見疑此百世一時也請舉事禄父及三監叛韓詩外傳客有見周公者應之于門曰何以道旦也客曰在外言外在内言内入乎將毋周公曰請入客曰立即言義坐即言仁坐乎將毋周公曰請坐客曰疾言則翕翕徐言則不聞言乎將毋周公唯唯明日興師而誅管蔡故客善以不言之説周公善聴不言之説説苑畧同康叔得禾異畆同穎獻之成王王命康叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾書序武按康叔王時封于衛成王伐管蔡復以殷餘民益封之史作唐叔非是歸禾嘉禾篇亡東土以集周公歸報成王而淮夷徐戎及奄又叛周公為師召公為保東伐淮夷殘奄作成王政遷其君薄姑作將薄姑成王政將薄姑篇亦亡成王來自奄至于宗周周公作多方以誥戒殷民按多方者殘奄後之誥多士者營洛後之誥也多方曰王來自奄多士曰昔朕來自奄多方曰爾乃自時洛邑無一語及新營多士曰周公初于新邑洛又曰今朕作大邑于兹洛其先後本文明確可據也又多方曰今爾奔走臣我監五祀知其為七年成王營洛周公歸政之前也孔傳云成王即政淮奄又叛史説同之蔡沈書傳遂序多士于多方之前而以商民之遷在作洛之前以詮五祀之文説亦疎矣葢不察殘奄在營洛之先多士在多方之後也尚書大傳周公居攝一年救亂二年克商三年踐奄四年建侯衛五年營成周六年制禮作樂七年致政故通鑑前編亦序殘奄于東征之後今並多方正之成王七年王朝步自周至豐使召公營洛邑周公復卜申視卒營築居九鼎焉曰此天下之中四方入貢道里均作召誥洛誥成王既遷殷遺民周公以王命告作多士成王長能聴政于是周公乃還政成王周公恐成王壮治有所滛佚作無逸以戒成王史記周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民袛懼不敢荒寧肆中宗之享國七十有五年其在高宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆高宗之享國五十有九年其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟躭樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懐保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年周公曰嗚呼繼自今嗣王則其無滛于觀于逸于遊于田以萬民惟正之供無皇曰今日躭樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒徳哉周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聴人乃訓之乃變亂先王之正刑至于大小民否則厥心違怨否則厥口詛祝周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王兹四人廸哲厥或告之曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒此厥不聴人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寛綽厥心亂罸無罪殺無辜怨有同是叢于厥身周公曰嗚呼嗣王其監于兹尚書又作文王大明緜之詩詩注周之官政未次序于是作周官官别其宜作立政周公在豐病將歿曰必塟我成周以明吾不敢離成王周公既卒成王亦讓塟周公于畢括地志周公墓在雍州咸陽北十三里畢原上從文王以明予小子不敢臣周公也史記謚曰文尚書大傳周公將作大作禮樂優游三年不能作恐天下莫我知小作恐不能揚父祖功徳然後營洛以觀天下之心于是諸侯率其羣黨各攻位于其庭周公曰示之以力役且猶至况道之以禮樂乎然後敢作禮樂淮南子周公事文王也行無専制事無由己身若不勝衣言若不出口可謂能子矣武王崩成王㓜少周公繼文王之業履天子之藉聴天下之政負扆而朝諸侯誅黨斷制無所顧問可謂能武矣成王既壮周公屬藉致政北面委質而臣事之請而後為復而後行可謂能臣矣一人之身而三變者所以應時矣鬻子昔者魯周公曰吾聞之于政也知善不行者謂之狂知惡不改者謂之惑夫狂與惑者君子之戒也論曰公以懿親弼亮左右功施爛然至其攝政不疑居東不懼謂非盛徳何以堪之雖然天不右周風雷闕警囂囂讒口公亦靡所税駕已夫太公望太公望吕尚者古史考姓姜名牙炎帝之裔伯夷之後掌四岳有功封之于吕子孫從其封姓吕尚其後也史記索隱尚是其名牙葢其字東海上人吕氏春秋東夷之士其先祖嘗為四岳佐禹平水土有功虞夏之際封于吕或封于申姓姜氏夏商之時申吕或封枝庶子孫或為庶人尚其苗裔也本姓姜氏從其封姓故曰吕尚吕尚葢嘗窮困年老矣説苑太公田不足以償種漁不足以償網治天下有餘治古史考吕望嘗屠牛于朝歌賣飯于孟津鹽鐵論太公屠牛于朝歌利不及妻子聞周西伯賢又善養老乃徃焉以漁釣奸西伯説苑吕望年七十釣于渭渚三日三夜魚無食者望忿脱其衣冠上有農人者謂望曰子姑復釣必細其綸芳其餌徐徐而投無令魚駭望如其言初得鮒次得鯉刺魚腹得書書文曰吕望封于齊西伯將出獵卜之曰所獲非龍非彲非虎非羆而王者之輔也于是西伯獵果遇吕尚于渭之陽與語大説曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸以望為師或曰太公博聞嘗事紂紂無道去之游説諸侯無所遇而卒西歸周六韜文王將田史編布卜曰田于渭陽非龍非彲非虎非羆兆得公侯天遺汝師文王曰兆至是乎史編曰編之太祖疇為禹占得皋陶兆比于此文王乃齋三日田于渭陽卒見太公作茅以漁文王勞而問之曰子樂漁耶太公曰君子樂得其志小人樂得其事今吾漁甚有似也文王曰何謂有似太公曰釣有三權禄等以權死等以權官等以權夫釣以求得也其情深可以觀大矣文王曰願聞之太公曰緡微餌明小魚食之緡綢餌香中魚食之緡隆餌豐大魚食之夫魚食其餌乃牽于緡人食其禄乃服于君故以餌取魚魚可殺以禄取人人可竭以家取國國可拔以國取天下天下可畢文王拜曰允哉敢不受命乃載以俱歸立為師抱朴子文王遇吕尚桑隂未移而知其足以師楚辭注吕望鼓刀在列肆文王親往問之吕望對曰下屠屠牛上屠屠國文王喜載與俱歸楚辭注或言周文王夢立令狐之津太公在後帝曰昌賜汝名師文王再拜太公夢亦如之文王出田見識所夢載與歸以為太師史記或曰吕尚處士隠海濵周西伯拘羑里散宜生閎夭素知而招吕尚吕尚亦曰吾聞西伯賢又善養老盍往焉三人者為西伯求美女竒物獻之于紂以贖西伯西伯得以出反國周西伯昌之脱羑里歸與吕尚隂謀修徳以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀説苑望曰王國富民霸國富士僅存之國富大夫將亡之國富倉府西伯曰善曰宿善不祥于是發倉粟賑孤獨以望為師文王伐崇宻須犬夷大作豐邑天下三分其二歸周者太公之謀計居多文王崩武王即位十一年欲修文王業東伐以觀諸侯集否師行師尚父左杖黄鉞右把白旄以誓曰蒼兕蒼兕索隠一作蒼雉馬融曰蒼兕主舟楫官名王充云蒼兕水獸九頭今誓衆令急濟故言蒼兕以懼之總爾衆庶與爾舟楫後至者斬遂至盟津諸侯不期而㑹者八百諸侯皆曰紂可伐也武王曰未可遂還師史記此下曰與太公作太誓太誓乃十三年伐商作此葢孔壁書未出而太史公遵武帝時偽太誓耳居二年紂殺王子比干囚箕子武王將伐紂卜龜兆不吉風雨暴至羣公盡懼唯師尚父彊之勸武王武王于是遂行論衡武王伐紂卜之而龜􅔨占者曰凶太公曰龜􅔨以祭則凶以戰則勝武王從之卒克紂焉尸子武王伐紂魚辛諌曰嵗在北方不北征武王不聴韓詩外傳武王伐紂到于邢邱楯折為三天雨三日不休武王心懼召太公而問曰意者紂未可伐乎太公對曰不然折為三者軍當分為三也天雨三日不休欲灑吾兵也乃修武勒兵于寗六韜武王問散宜生曰伐紂吉乎曰不吉將行雨輜車太公曰是非子所知也祖行之日雨輜重車是洗濯甲兵也又武王問太公曰音律之聲可以知三軍之消息勝負之决乎太公曰深哉王之問也夫律管十二其要有五音宫商角徴羽此真正聲也萬物不易五行之神道之常也金木水火土各以其勝攻也其法以天清淨無隂雲風雨夜半遣輕騎往至敵人之壘九百步徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徴聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徴成敗之機武王曰善哉太公曰㣲妙之音皆有外候武王曰何以知之太公曰敵人驚動則聴之聞枹鼓之音者角也見火光者徴也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五音者聲色之符也太公金匱太師少師抱其祭器樂器奔周内史向摯載其圖法亦奔周武王問太公曰殷己亡三人可伐乎太公曰臣聞之知天者不怨天知己者不怨人先謀後事者昌先事後謀者亡且天與不取反受其殃非時而至是謂妄成故夏條可結冬冰可釋時難得而易失也十三年正月甲子至牧野作泰誓伐商紂紂師敗績紂登鹿臺自焚死史記作追斬紂今正之明日武王立于社羣公奉明水衛康叔封布采席師尚父牽牲史佚策祝以告神討紂之罪散鹿臺之財發鉅橋之粟以振貧民封比干墓釋箕子囚遷九鼎修周政與天下更始師尚父謀居多史記武王踐阼三日召士大夫而問焉曰惡有藏之約行之行萬世可以為子孫常者乎諸大夫對曰未得聞也然後召師尚父而問焉曰黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣三日王端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不强則枉弗敬則不正枉者滅廢敬者萬世藏之約行之行可以為子孫常者此言之謂也且臣聞之以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書之言惕若恐懼退而為戒書銘焉大戴禮記太公金匱武王平殷還問太公曰今民吏未安賢者未定如何太公曰無故無新如天如地得殷之財與殷民共之則商得其賈農得其田也一目視則不明一耳聴則不聰一足步則不行選賢自代上下各得其所於是封師尚父於齊營邱師尚父受封㽞為太師康成禮注史記太公東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行黎明至國萊侯來伐與之争營邱營邱邉萊萊人夷也㑹紂之亂而周初定未能集逺方是以與太公争國太公至國修政因其俗簡其禮通商工之業便魚鹽之利而人民多歸齊齊為大國按金縢終始具載二公孔頴達疏云周召與太公為周三公是史記東就國之説未為得也吕氏春秋太公封于齊周公封于魯二君者甚相善也相謂曰何以治國太公曰尊賢上功周公曰親親上恩太公曰魯自此削矣周公曰魯雖削有齊者亦必非吕氏也説苑伯禽與太公俱受封而各之國三年太公來朝周公曰何治之疾也曰尊賢先疏後親先義後仁此霸者之迹也周公曰太公之澤及五世五年伯禽來朝周公曰何治之難曰親親先内後外先仁後義此王者之迹也周公曰魯之澤及十世韓非子太公東封于齊齊東海上有狂矞華士昆弟二人立議曰吾不臣天子不友諸侯耕作而食掘井而飲無求于人也太公至殺之以為首誅周公聞之發急傳而問之曰饗國而殺賢者何也太公曰先王之所以使臣民者爵禄刑罰也今不足以使之望當誰為君乎今有馬於此如驥之狀者天下之至良也然驅之不前却之不止左之不左右之不右臧獲雖賤不託其足焉是以誅之春秋繁露營蕩為齊司冦太公封于齊問以治國之要對曰任仁義曰任仁義奈何對曰仁者愛人義者尊老曰愛人尊老奈何對曰愛人者有子不食其力尊老者妻長而夫拜之太公曰寡人欲以仁義治齊今子以仁義亂齊立而誅之以定齊國及周成王少時管蔡作亂淮夷畔周乃使召康公命師尚父曰東至海西至河南至穆陵北至無棣五侯九伯實得征之齊由此得征伐為大國葢尚父之卒百有餘年史記比及五世皆反塟于周禮記皇覽吕尚冡在臨菑縣城南十里説苑武王問于太公曰治國之道若何對曰愛民而已利之勿害成之勿敗生之勿殺與之勿奪樂之勿苦喜之勿怒此治國之道使民之誼也又問曰賢君治國何如對曰賢君治國其政平其吏不苛其賦歛節其自奉薄不以私善害公法不因喜以賞不因怒以誅上無滛慝下不隂害官無腐蠧之蔵國無流餓之民此賢君之治國也又問曰為國而數更法令者何也曰不法法以其所善為法也故令出而亂亂則更為法又問曰得賢敬士或不能治者何也曰不能獨斷以人言斷者也賢者不必用不肖者不必退而士不必敬曰其為國如何曰其為人惡聞其情而喜聞人之情惡聞其惡而喜聞人之惡是以不必治也又問曰舉賢而危亡者其失安在曰在君好用小善而已不得真賢也曰好用小善者何如曰君好聴譽而不惡讒也忠臣以誹死于無罪邪臣以譽賞于無功其國見于危亡武王曰善今日聞誹譽之情矣新書師尚父曰吾聞之于政也天下壙壙然一人有之萬民藂藂然一人理之故天下者唯有道者理之紀之使之宜處而乆之故守天下者非以道則弗得而長也故夫道者萬世之寶也武王曰受命矣新書昔文王使太公傳太子發嗜鮑魚而太公弗與曰禮鮑魚不登于俎豈有非禮而可以養太子哉論曰易曰盤桓利居貞利建侯方吕尚之屠釣殷墟槃桓困約何其劣也及合徳一朝垂老傳翼遂以建周啟齊居貞之效與若乃建堂堂之旗扶義而東置有禮覆昬暴固其宜也説者隂謀譎智歸諸道家誣矣世所傳太公兵法韜畧庸鄙牽合不足録所著有子牙子召康公召公奭周同姓姓姬氏武王滅紂封召公于北燕留為周太保史記在成王時召公為三公按書旅獒篇當在武王時既克商遂通道于九夷八蠻西旅底貢厥獒太保乃作旅獒用訓于王曰嗚呼明王慎徳四夷咸賔無有逺邇畢獻方物惟服食器用王乃昭徳之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟徳其物徳盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力不役耳目百度惟貞玩人喪徳玩物喪志志以道寧言以道接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寶逺物則逺人格所寶惟賢則邇人安嗚呼夙夜罔或不勤不矜細行終累大徳為山九仭功虧一簣允廸兹生民保厥居惟乃世王尚書武王崩成王立召公欲退老厥邑周公留之作君奭蔡沈書傳書序召公為保周公為師相成王為左右召公不説周公作君奭史記周公踐阼召公疑之不説周公周公作君奭召公乃説馬融注召公以周公既攝政致太平不宜復列在臣位故不説以為周公茍貪寵也孔頴達疏周公既攝政留在臣職當時怪之故欲開道周公之言以解世惑序意不明致諸説雜糅按書本文曰其汝克敬徳明我俊民在讓後人于丕時孔頴達疏祇若兹往敬用治詳其語意蔡説得之成王將蒞政召公作公劉之詩戒以民事又作泂酌巻阿以戒之詩序成王在豐欲宅洛邑使召公先相宅作洛誥書序惟二月既望越六日乙未王朝歩自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一越七日甲子周公乃朝用書命庶殷侯甸男邦伯通鑑前編以多士當在此下為告庶殷之辭厥既命殷庶庶殷丕作通鑑前編以梓村當在此下為告侯甸男邦伯之辭太保乃以庶邦冡君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智蔵瘝在夫知保抱擕持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬徳相古先民有夏天廸從子保面稽天若今時既墜厥命今相有殷天廸格保靣稽天若今時既墜厥命今冲子嗣則無遺夀耉其稽我古人之徳矧曰其有能稽謀自天嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬徳我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歴年我不敢知曰不其延惟不敬厥徳乃早墜厥命我不敢知曰有殷受天命惟有歴年我不敢知曰不其延惟不敬厥徳乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命厯年知今我初服宅新邑肆惟王其疾敬徳王其徳之用祈天永命其惟王勿以小民滛用非彛亦敢殄戮用乂民若有功其惟王位在徳元小民乃惟刑用于天下越王顯上下勤恤其曰我受天命丕若有夏厯年式勿替有殷厯年欲王以小民受天永命拜手稽首曰子小臣敢以王之讎民百君子越友民保受王威命明徳王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命尚書成王崩召公受顧命立子釗是為康王當成王時陜以西召公主之陜以東周公主之召公之治西方甚得兆民和召公巡行鄉邑有棠樹决獄政事其下自侯伯至庶人各得其所無失職者召公卒論衡召公年八十民人思召公之政懐棠樹不敢伐歌詠之作甘棠之詩史記謚曰康韓詩外傳昔召伯在朝有司請營召以居召伯曰嗟吾以一身而勞百姓此非吾先君文王之志也于是出而就于阡陌之間而聴斷焉召伯暴處逺野廬于樹下百姓大説耕桑倍力以勸其後在位者不恤元元百姓困乏于是詩人見召伯之所休息樹下美而歌之説苑召公述職當蠶桑之時不欲變民事故不入邑中舍于甘棠之下而聴斷焉陜間之人皆得其所故後世思而歌詠之論曰召為保相三王觀其所陳戒溯洄道原所存亦差聖一間耳或于君奭之篇謂以爵位拂中爝火視日猶盲論夫葛氏曰召公未免常人之情以爵位先後介意故周公作君奭以諭之辛甲辛甲故殷之臣事紂葢七十五諌而不聽去之周召公與語賢之告文王文王親自迎之以為公卿封長子劉向别録武王時為太史命百官官箴王闕于虞人之箴曰芒芒禹跡畫為九州經啟九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫左傳及成王立武庚叛周公東征已勝殷將攻商葢辛甲曰大難攻小易服不如服衆小以刼大乃攻九夷而商葢服韓非子道家有辛甲二十九篇漢書散宜生閎夭太顛南宫括散宜生散氏宜生名孔氏書傳女人物表女皇堯妃散宜氏則散宜為氏文王為西伯時宜生與太顛閎夭荀子閎夭之狀面無見膺鬻能辛甲大夫之徒往歸之崇侯虎譖西伯于帝帝紂乃囚西伯于美里宜生與閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因殷嬖臣費仲而獻之紂紂大説曰此一物足以釋西伯况其多乎乃赦西伯史記尚書大傳散宜生之犬戎氏取美馬驄身朱鬛雞目者陳于紂庭紂出見之曰此何人也散宜生趨而進曰西蕃之臣昌之使者淮南子散宜生以千金求天下之珍怪得騶虞雞斯之乗𤣥玉百工大貝百朋𤣥豹黄羆青犴白虎文皮千合以獻因費仲而通紂説乃免其身殺牛賜之及武王伐紂至于有戎之隧大風折斾宜生諫曰此其妖歟武王曰非也天落兵也風霽而乗以大雨水平地而嗇宜生又諌曰此其妖歟武王曰非也天灑兵也卜而龜熸宜生又諌曰此其妖歟武王曰不利以禱祠利以擊衆卒犯三妖而禽紂于牧野説苑散宜生太顛閎夭南宫括葢皆逮事文武故周公舉之以勸君奭武王克殷命南宫括散鹿臺之財發鉅橋之粟以賑貧弱萌𨽻史記尚書大傳散宜生閎夭南宫括三子俱學乎太公太公見三子之為賢人遂酌酒切脯約為朋友望曰嗟乎西伯賢君也四子遂見西伯于羑里伯逹伯适伯達伯适仲突仲忽叔夜叔夏季隨季騧並事文王為虞官國語文王詢于八虞賈逵注八士皆在虞官其母四産得八男皆君子雄俊春秋繁露時人號為八虞汲冡書命南宫忽振鹿臺之財命南宮伯達遷九鼎三巫或疑南宫忽即仲忽南宫伯達即伯達南宫括即伯适若然則八虞南宫氏也康成曰成王時人劉向曰宣王時人墓在咸陽縣東北五十里稱南宫氏癸度癸度者武王臣武王嘗問于癸度曰賀獻不重身不親于君左右不足友不善于羣臣故不欲收穡户籍而給左右之用為之有道乎癸度對曰吾國者衢處之國也逺秸之所通游客蓄商之所道財物之所遵故茍入吾國之粟因吾國之幣然後戴黄金而出故君請重重而衡輕輕運物而相因則國筴可成故謹毋失其度未與民可治武王曰行事奈何癸度曰金出于汝漢之右衢珠出于赤野之末光玉出于禺氏之旁山此皆距周七千八百餘里其途逺其至阨故先王度用于其重因以珠玉為上幣黄金為中幣刀布為下幣故先王善高下中幣制下上之用而天下定矣管子史佚史佚即尹逸亦曰史逸武王克殷既入即位于社南尹佚䇿祝曰殷之末孫季紂殄廢先王明徳侮蔑神祗不祀昬暴商邑百姓其章顯聞于皇天上帝于是武王再拜稽首曰膺更大命革殷受天明命武王又再拜稽首乃出遂命史佚展九鼎保玉史記成王時為少師賈誼新書王問政于尹逸曰吾何徳之行而民親其上對曰使之以時而敬順之忠而愛之布令信而不食言王曰其度安至對曰如臨深淵如履薄冰王曰懼哉對曰天地之間四海之内善之則畜也不善則讐也夏殷之臣反讐桀紂而臣湯武夙沙之民自攻其主而歸神農氏此君之所明知也若何其無懼也説苑王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之史記墨家有尹佚二篇漢書君陳君陳者成王之臣也初周公遷殷頑民于下都周公親自監之周公歿成王命君陳代周公作君陳王若曰君陳惟爾令徳孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉昔周公師保萬民民懐其徳往慎乃司兹率厥常懋昭周公之訓惟民其乂我聞曰至治馨香感于神明黍稷非馨明徳惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳嗚呼臣人咸若時惟良顯哉王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寛而有制從容以和殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟狃于姦宄敗常亂俗三細不宥爾無忿疾于頑無求備于一夫必有忍其乃有濟有容徳乃大簡厥修亦簡其或不修進厥良以率其或不良惟民生厚因物有遷違上所命從厥攸好爾克敬典在徳時乃罔不變允升于大猷惟予一人膺受多福其爾之休終有辭于永世尚書論曰聖不獨啟必濟羣佐辛甲癸度大顛閎夭之徒粲乎如列宿之附麗于天也予録次其梗概而封建皆莫可考云羑里之厄權不受命雖聖智亦有所不免歟君牙伯冏君牙伯冏書序史記並作伯皆穆王臣穆王以君牙為大司徒作誥曰王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾涉于春冰今命爾予翼作股肱心膂纉乃舊服無忝祖考𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧嗚呼丕顯哉文王謨丕承哉武王烈啟佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂以伯冏為太僕正作誥曰王若曰伯冏惟予弗克于徳嗣先人宅丕后怵惕惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懐忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祇若萬邦咸休惟予一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈今予命汝作大正正于羣僕侍御之臣懋乃后徳交修不逮慎簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣䛕厥后自聖后徳惟臣不徳惟臣爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟予汝辜王曰嗚呼欽哉永弼乃后于彛憲尚書祭公祭公謀父祭公周公之後祭公事昭王昭王南征濟漢船人以膠船進王至中流膠液船解王及祭公俱沒于水中帝王世紀其後祭公謀父為穆王卿士穆王將征犬戎謀父諌曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之先王之于民也茂正其徳而厚其性阜其財求而利其器用明利害之鄉以文修之使務利而辟害懐徳而畏威故能保世以滋大昔我先世后稷以服事虞夏及夏之衰也弃稷不務我先王不窋用失其官而自竄于戎狄之間不敢怠業時序其徳纂修其緒修其訓典朝夕恪勤守以惇篤奉以忠信奕世載徳不忝前人至于武王昭前之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡于民庶民弗忍訢戴武王以致戎于商牧是先王非務武也勤恤民隠而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎秋荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修徳序成而有不至則修刑于是乎有刑不祭伐不祀征不享讓不貢告不王于是乎有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而又不至則増修于徳無勤民于逺是以近無不聴逺無不服今自大畢伯士之終也犬戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓乎吾聞夫犬戎樹惇能率舊徳而守終純固其有以禦我矣王不聴遂征之得四白狼四白鹿以歸自是荒服者不至國語王欲肆其心周行天下謀父作祈招之詩以止王心其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心王是以獲没于祗宫左傳王因祭祖不豫詢其守位作祭公王若曰祖祭公次予小子䖍䖍在位旻天疾威予多時漙愆我聞祖不豫有加予維敬省不弔天降疾病予畏之威公其告予懿徳祭公拜手稽首曰天子謀父疾維不瘳朕身尚在兹朕魂在于天昭王之所朂宅天命王曰嗚呼公朕皇祖文王烈祖武王度下國作陳周維皇皇上帝度其心寘之明徳付俾于四方用應受天命敷文在下我亦維有若文祖周公暨烈祖召公兹申予小子追學于文武之蔑周克龕紹成康之業以將天命用夷居之大商之衆我亦維有若祖祭公之執和周國保乂王家王曰公稱丕顯之徳以予小子揚文武大勲宏成康昭考之烈王曰公無困我哉俾百寮乃心率輔弼予一人祭公拜手稽首曰允乃詔畢桓于黎民般公曰天子謀父疾維不瘳敢告天子皇天改大殷之命維文王受之維武王大尅之咸茂厥功維天貞文王之重用威亦尚寛壯厥心康受乂之式用休亦先王茂綏厥心敬恭承之雖武王申大命勘厥敵公曰天子上下辟于文武文武之子孫大開方封于下土天之所錫武王時疆土丕維周之闕后稷之受命是永宅之維我後嗣旁建宗子丕維周之始并嗚呼天子三公監于夏商之既敗丕則無遺後難至于萬億年守序終之既畢丕乃有利宗丕維文王由之公曰嗚呼天子我不則寅哉寅哉汝無以戾闕罪疾喪時二王大功汝無以嬖御固莊后汝無以小謀敗大作汝無以嬖御士疾大夫卿士汝無以家相亂王室而莫恤其外尚皆以時中乂萬國嗚呼三公汝念哉汝無泯泯芬芬厚顔忍醜時維大不弔哉昔在先王我亦維丕以我辟險于難不失于正我亦以免沒我世嗚呼三公維予不起朕疾汝其皇敬哉兹皆保之曰康子之攸保最教誨之世祀無絶不我周有常刑王拜手稽首黨言周書地其後世見理志吕矦吕矦為穆王相康成引書説司孔安國書傳為㓂穆王命訓刑以詰四方王曰若古有訓蚩尤為始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯䖍苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香徳刑發聞惟腥皇帝舜也哀矜庶戮之不辜報虐以威遏絶苗民無世在下乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無葢皇帝清問下民鰥寡有辭于苗徳威惟畏徳明惟明乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖三后成功惟殷于民士皋陶也制百姓于刑之中以教祗徳穆穆在上明明在下灼于四方罔不惟徳之勤故乃明于刑之中率乂于民棐彛典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天徳自作元命配享在下王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之廸其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世王曰嗚呼念之哉伯父伯兄仲叔季弟㓜子童孫皆聴朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三徳一人有慶兆民賴之其寧惟永王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及兩造具備師聴五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟内惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聴具嚴天威墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罸其屬二百五刑之屬三千上下比罪無僣亂辭勿用不行惟察惟法其審克之上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啟刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有徳惟刑今天相民作配在下明清于單辭民之亂罔不中聴獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罸非天不中惟人在命天罰不極庶民罔有令政在于天下王曰嗚呼嗣孫今往何監非徳于民之中尚明聴之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑史記吕作甫曰諸侯有不睦者言于王作修刑辟尚書論曰昭王隕漢穆不伐荆而伐戎不亦謬乎謀父具老成之見進典謨之辭雖不及此君子多之王道㣲缺蔑徳尚刑吕刑之所由作也然哀矜惻怛三致意焉猶得夫忠厚之遺也論者以尚古五刑無贖然疑而後赦非不疑而得贖也罪疑惟輕亦其遺意歟召穆公召穆公名虎康公之後為厲王卿士厲王無道召公傷周室大壊作蕩之詩以刺之詩序穆序以民勞亦公所作王虐國人謗王召公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚于防川川壅而潰傷人必多民亦如之是故為川决之使導為民者宣之使言故天子聴政使公卿至于列士獻詩瞽獻典史獻書師箴􅕓賦矇誦百工諌庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用于是乎出猶其有原隰衍沃也衣食于是乎生口之宣言也譱敗于是乎興行善而備敗所以阜財用衣食者也夫民慮之于心而宣之于口成而行之胡可壅也若壅其口其與能幾何王不聴于是國人莫敢出言國語三年乃相與畔襲厲王王出奔彘厲王太子靖史作静匿石公家國人圍之召公曰昔吾驟諌王王不從以及此難也今殺王太子王其以我為讐而懟怒乎夫事君者險而不讎懟怨而不怒况事王乎乃以其子代王太子太子竟得脱召公周公二相行政號曰共和韋昭注彘之亂公卿相與和而修政事號曰共和紀年魯連子並以共和為共伯和説具厲王紀十四年厲王死于彘太子靖長于召公家二相乃共立之是為宣王宣王即位二相輔之修政法文武成康之遺風諸侯復宗周史記宣王封申伯于謝命召公營謝以居之又命平淮南之夷疆理其地錫召公以圭瓉秬鬯山川土田焉詩序卒謚曰穆芮良夫芮良夫芮伯之後為厲王大夫厲王無道芮伯稽古作訓納王于善暨執政小臣咸省厥躬作芮良夫芮伯若曰予小臣良夫稽道謀告予惟民父母致厥道無逺不服無道左右臣妾乃違民歸于徳徳則民戴否則民讐兹言允効于前不逺古人求多聞以監戒不聞是惟弗知后除民害不惟民害害民乃非后惟其讐后作類后弗類民不知后惟其怨民至億兆后一而已寡不敵衆后其危哉嗚呼闕如之今爾執政小子惟以貪䛕為事不勤徳以備難下民胥怨財單竭手足靡措弗堪戴上不其亂而以予小臣良夫觀天下有土之君厥徳不逺罔有代徳時惟王之患其惟國人惟禍發于人之攸忽于人之攸輕闕不存焉變之攸伏我聞曰以言取人人飾其言以行取人人竭其行飾言無庸竭行有成惟爾小子飾言事王實蕃有徒王貌受之終弗獲用靣相誣蒙及爾顛覆爾自謂有餘予謂爾弗足敬思以徳備乃禍難難至于悔悔將安及無曰予為惟爾之禍周書厲王説榮夷公良夫諌曰王室其將卑乎夫榮公好専利而不知大難夫利百物之所生也天地之所載也而或専之其害多矣天地百物皆將取焉胡可専也所怒甚多而不備大難以是教王王能久乎夫王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來故頌曰思文后稷克配彼天立我烝民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至于今今王學専利其可乎匹夫専利猶謂之盗王而行之其歸鮮矣榮公若用周必敗既榮公為卿士諸侯不享王流于彘國語良夫賦桑柔之詩以傷悼之詩序地其後世見理志論曰厲王弭謗乃良夫直諫無所顧慮専利為盗殆危言哉彘之難召公殺子以脱大子且曠紀十有四年諸侯無變天位卒定非公忠之至鮮不敗者是故危難驟臻確乎不抜迄以人定勝天者召公有之尚史巻二十五
