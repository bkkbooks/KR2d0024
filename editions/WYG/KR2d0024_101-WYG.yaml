body:
  text: 尚史卷一百二志十鑲白旗漢軍李鍇撰兵志粤自包羲氏之畫卦也以坤上坎下至静而順象之曰師所以然者伏險于隂明不測也土以臨水防滛溢也委之𤣥㝠示無用也然而天不廢冬聖不廢師是故黄帝有涿鹿之戰堯有丹浦之誅舜有三危之伐逮乎湯薄鳴條武陳牧野毒以順之用得其道也周隊厥綱諸侯奪威翫黷由𠂻輕用民命隂凌冬殺兾以成嵗難已或以天徳以仁人徳以殺鷙鳥擊鮮桀獸猛噬鴻荒之初民實象之聖人立制嚴格其圉非順之也是殆不然仁從其生殺從其欲民之徳也禮樂以順其生威武以止其欲先王之教也是故禮樂者兵之本也禮樂得而兵無事矣如或所云是率天下而獸之也夏商以徃制無所徴周官司馬典章具在述兵志周制大司馬掌制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人周禮伍一比兩一閭卒一旅旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也軍帥不特置選于六官六卿之吏自卿以下徳任者使兼官焉此先王因農事而定軍令欲其恩足相恤義足相教服容相别音聲相識也康成注小司徒㑹萬民之卒伍而用之以起軍旅以作田役以此追胥以令貢賦乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒卒者毋過家一人以其餘為羡唯田與追胥竭作凡國之大事致民大故致餘子鄭司農謂餘子為羡康成謂為卿大夫之子此六鄉之内以上劑致甿遂人則以嵗時稽其人民而授之田野簡其兵器教之稼穯此六遂之内以下劑致甿上地可任者家三人中地二家五人下地家二人上劑以一人為正卒餘可任者皆為羡下劑皆以下地家二人任之一人為正卒一人為羡天子六鄉六遂合十二軍而迭用之故為六軍周禮司馬法述其舊法則以四井為邑四邑為邱邱十六井也有戎馬一匹牛三頭是為匹馬四邱為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人卒七十二人戈楯具是謂乘馬一同百里提封萬井除山川沈斥城池邑居園囿術路三千六百井定出賦六千四百共戎馬四百匹兵車百乗此卿大夫采地之大者也是謂百乗之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乗此諸侯之大者也是謂千乗之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗戎馬車徒干戈素具春振旅以蒐夏拔舍以苗秋治兵以獮冬大閲以狩皆于農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五載大簡車徒此先王為國立武足兵之大畧也漢志司馬法又曰畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家通十為成成百井三百家革車一乗成十為終終千井三千家革車十乗終十為同同方百里萬井三萬家革車百乗均之為司馬法也康成注按周制萬二千五百人為軍六軍七萬五千人千里之畿提封百萬井定出賦六十四萬井井有八家家有一夫為五百一十二萬夫率以七家征一夫不下七十三萬夫為六軍者十大司馬遞而征之十年而役一遍先王所以紓民力也小司徒起徒役毋過家一人者以可任者而言非盡征之也葢有大事合鄉遂近逺井征一夫一夫從軍七家奉之是故孫子曰興師十萬内外騷動不得撡事者七十萬家此之謂也若司馬法之一同百里萬井出車百乗者葢兼山川沈斥城池道涂之虚數而言其實無異也至齊桓公任管仲乃三分其國為二十一鄉工商之鄉六士鄉十五韋昭注士軍士十五鄉合三萬人是為三軍農野處而不暱不在都邑之數如注是四民之外别有軍士而兵農分矣公帥五鄉焉國子帥五鄉焉高子帥五鄉焉作内政而寄軍令五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之鼓有國子之鼓有高子之鼓春以􅼚振旅秋以獮治兵是故卒伍整于里軍旅整于郊内教既成令勿使遷徙伍之人祭祀同福死喪同恤禍灾共之人與人相疇家與家相疇世同居少同游故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同彊有士三萬人革車八百乗以誅無道以屏周室國語晉自曲沃伯始以一軍為晉侯獻公之十六年始作二軍公將上軍大子申生將下軍惠公韓之敗作州兵五黨為州州二千五百家也率一家起五人為萬二千五百人文公蒐于被廬作三軍郤縠將中軍狐毛將上軍欒枝將下軍明年作三行以禦狄荀林父將中行屠擊將右行先蔑將左行是晉有六軍矣清原之蒐更為上下新軍而為五軍襄公蒐于夷舍二軍以復三軍之制景公鞌之戰上中下各増新軍遂作六軍賞鞌之功厲公鄢陵之戰罷新上軍悼公時新軍無帥使其什吏從于下軍明年遂舍之傳曰禮也葢文公僭更王度至悼公而後復周之舊故予之也魯始三軍詩曰公徒三萬是也至成公元年謀伐齊作邱甲邱甲者邱益一甲率一甸而加甲士一人步卒二十四人三甸而加一乗舊法遂變矣榖梁以為甲非人人之所能為杜預以為邱出甸賦加舊四倍説並誤襄公十一年三桓改作三軍三分魯而各征其一季氏使其乗之人以其役邑入者無征不入者倍征孟氏使其半為臣若子若弟叔孫氏使盡為臣不然不合昭公五年遂舎中軍四分公室季氏擇二二子各一皆盡征之而貢于公季氏専將一軍而孟仲各専一軍之半公無軍焉魯不足以為國矣楚自武王始作荆尸授師孑焉以伐隨葢參用孑以為陳孑鎗屬短兵也至莊王則三軍以為正軍邲之役沈尹將中軍子重將左軍子反將右軍是也二廣以為親軍右廣初駕數及日中左廣受之至于昬内官序當其夜是也游闕以為游兵潘黨率游闕四十乗從唐侯是也廣有一卒卒偏之兩司馬法百人為卒二十五人為兩車十五乘為大偏今廣十五乗百人復以二十五人為承副于陳則為左右二拒工尹齊將右拒卒潘黨率游闕從唐侯以為左拒是也商農工賈不敗其業卒乗輯睦不奸于事軍行右轅左追蓐車右挾轅為戰備車左追求草蓐為宿備前茅慮無前有斥侯蹹伏皆持絳白幡見騎舉絳幡見步舉白幡茅明也明于思慮所無之事也中權後勁中軍制謀後以精兵為殿百官象物而動軍政不戒而備行軍之翼日則輜重至法至善也至共王伐吴為簡之師使鄧廖帥組甲三百被練三千組甲漆甲成文被練練袍若今軟甲葢簡其精鋭而使之也康王以蒍掩為司馬子木使掩庇賦數甲兵遂書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰皋井衍沃量入修賦賊車籍馬賦車兵徒卒甲楯之屬乃始用周法井田之遺呉楚惡始為舟師以畧吴彊平王時吴伐楚圍潛左司馬戍帥都君子與王馬之屬以救潛都君子都邑之士有復除者葢平常免其行役事急乃使之如越有君子六千是也王馬養官屬校人之類是又因便乘利而非周之舊矣左傳秦自穆公霸西戎始作三軍殽之役三帥而車三百乘又置䧟陳三萬秦置䧟陳三萬見吴子及孝公用商鞅商鞅變法令民為什伍而相收連坐告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率音律受上爵爲私鬭者各以輕重被刑宗室非有軍功論不得為屬籍行之十年民勇于公戰怯于私鬬又以秦地曠而人寡晉地狹而人稠誘三晉之人耕秦地優其田宅而使秦人應敵于外大率百人則五十人為農五十人習戰凡民二十三附之疇官給郡縣一月而更謂卒復給中都一嵗謂正卒復屯邉一嵗謂戍卒凡戰獲一首賜爵一級自公士至大庶長十八級後通闗内列侯二十級皆以戰功相君長至長平之役年十五以上悉發又非商鞅之舊矣史記善乎荀子之言曰夫仁人在上為下所卬猶子弟之衛父兄若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讐人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有詩曰武王載斾有䖍秉鉞如火烈烈則莫我敢遏言以仁誼綏民者無敵于天下也若齊之技擊得一首則受賜金事小敵脆則媮可用也事鉅敵堅則渙然離矣是亡國之兵也魏氏武卒衣三屬之甲大甲三屬竞人身謂上身一髀禈一經繳一凡三屬也撡十二石之弩負矢五十个置戈其上冠胄帶劍贏三日之糧日中而趨百里中試則復其户利其田宅如此則其地雖廣其税必寡其氣力數年而衰是危國之兵也秦人其生民也陿阸其使民也酷烈刼之以埶隠之以阸狃之以賞慶道之以刑罰使民所以要利于上者非戰無由也功賞相長五甲首而𨽻五家得著甲者五人首得𨽻役五家是最為有數故能四者有勝于天下然皆干賞蹈利之兵庸徒鬻賣之道耳未有安制矜節之理也故雖地廣兵彊鰓鰓常恐天下之一合而共軋已也至于齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏寇賊姦宄而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而旅禽桀紂所謂善陳不戰者也齊桓南服彊楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或犇走赴秦號哭請救秦人為之出兵二國并力遂走吴師昭王返國所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒𨽻之徒還為讐敵焱起雲合果共軋之斯為下矣凡兵所以存亡繼絶救亂除害也故伊吕之將子孫有國與商周並至于末世茍任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吴商白之徒皆身誅戮于前而國滅亡于後報應之埶各以類至其道然矣荀子積卒十二星在房西南本屬心宿五營軍士之象主衛士掃除不祥星小為吉明則有兵一星亡兵半出二星亡兵大出三星亡兵盡出五星守兵起天官書積卒十二布為内外二重外圍以八八營也内握以四中壘也合内外而為九九軍也各三星品連而為統向于前者前拒之鳥陳也向于後者後拒之蛇陳也向于左者左角之龍陳也向于右者右角之虎陳也外體圓天陳布也内體方地陳布也外四隅各一風雲起四維也東西各二天衝居左右也内二縱相對天衡居前後也二横相對地軸貫中央也外四位之相間離二星之廣内四星之相去離一星之廣陳間容陳隊間容隊也前參連如後參左參連如右參連以前為後以後為前四靣如一觸處為首也合有五營散有八陳數起于五而終于八也以内之四統外之八四竒傳命于八正八正取禀于四竒也師卦得五營九軍之數布四坎于中以為貞八坤于外以為悔環八方坤坎之相㴠營在其中矣對待交互其爻六十有四又八坤四坎積隂爻三十有二坼隂畫之隅其畫亦六十有四陳在其中矣坤者順也静也坎者險也不可測也或静或不可測竒正在其中矣一陽居中而用事内外三十二隂皆為所率將在其中矣初爻為殿二爻為中三爻為戎四爻為駐五爻為前六爻為先鋒卒在其中矣内外相維大小相包四靣如一觸處為首節制在其中矣故名曰師有陳之象也按師卦包羲所畫取其象而為陳葢後人為之縱布二天二天次之縱布四地次于天後縱布四風挾天地之左右縱布四雲起天地之四維縱布天衝居其左右縱布天衡居其前後縱布地軸居其中央風后竒經古經文凡六十字後世握法經一本有范蠡樂毅韓信諸註相雜葢范蠡樂毅為傳韓信張良又釋范樂之傳猶大傳之小傳也後錯而為一經傳不分公孫𢎞于難通之處增字發明雜亂愈甚今别析之縱者直陣龍象也三十二隊陽十六隊天衡八隊天衝八隊風三十二隊隂十二隊地軸十二隊地衝八隊雲公孫曰天地之衝為虎翼天地之後衝為飛龍風為蛇蟠雲為鳥翔天地以下八重以列或曰握竒望敵即列其後竒兵以犄角重列不動或分而為八或合而為一分合各隨人之多少觸類而長天圓布前為左後為右天地四望是也天衡居兩端其次雲其次風左右相向是也公孫曰此為動地方布風雲各在前後衝之前其次地居中間兩地為軸是也公孫曰此為静經曰縱布二天二天次之縱布四地次于天後縱布四風挾天地之左右縱布四雲起天地之四維縱布天衝居其左右縱布天衡居其前後虚實二壘是也公孫曰天前衝居其左天後衝居其右雲居四端縱布地軸居其中間范樂傳義註韓信之文餘加公孫以别之握竒之法黄帝觀于易象而為形其布列本于先天對待而起數天地定位故首布乾而坤山澤通氣故次布兑而艮雷風相薄故次布巽而震水火不相射故次布離而坎布于乾坤之外四陳為天天包乎外也布于乾坤之内四陳為地地載乎内也布于兑巽艮震之外四陳為風雲風鼓于天而變化雲出于地而飛揚也布于離坎之外四陳為天衝卯酉相射之義也布于兑艮巽震之内四陳為天衡衡者窺天之器璣璇而衡居其所也布于離坎之内四陳為地軸車之樞要輪轉而軸執其中也規環為圓對待為直直而布之故曰縱布也其軍九其陳六十四其形圓其象為龍乾為首坤為尾兑艮巽震為四足坎離為兩翼也竒者圓之數也凡物之圓者外圍三則内徑一三各一竒師卦外焉八坤其畫二十有四其蓍䇿積老少一千三百四十四内焉四坎其畫有八其蓍䇿積老少四百四十八内得其一外得其三三為外營一為中軍大將握之故取其名為握竒戰揄罔于阪泉擒蚩尤于涿鹿斯陳之勝也是時黄帝遷徙無常處城郭宫室未備輒以兵師分内外為營衛内營四外營十二以包之中衛二十八包外營外衛二十八又包中衛攻守居行法一而已地方六百步或六十步表十二辰太公書唐太宗問曰其術如何李靖對曰畫地方一千二百步開方之形也每部占地二十步之方横以五步立一人縱以四步立一人凡二千五百人分五方空地四處所謂陳間容陳也武王伐紂虎賁各掌三千人每陳六千人共三萬之衆此太公畫地之法也太公増天地人而為三防方諸井田中井虚五之地大將居之四旁八區四竒四正之將寓焉是為三才之陳大司馬中春教振旅司馬以旗致民平列陳如戰之陳辦鼓鐸鐲鐃之用以教坐作進退疾徐疏數之節遂以蒐田中夏教苃舍如振旅之陳羣史撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苗田而蒐之法中秋教治兵如振旅之陳辨旗物之用王載大常日月為常諸侯載旂交龍為旂軍吏載旗熊虎為旗師都孤卿載旜通帛為旜鄉遂載物雜帛為物郊野載旐龜蛇為旐百官載旟鳥隼為旟各書其事與其號焉其他皆如振旅遂以獮田而蒐田之法中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表田之日司馬建旗于後表第一表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗弊仆也誅後至者乃陳車徒如戰之陳皆坐羣吏聴誓于陳前斬牲以左右狥陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗植所仆旗車徒皆作鼓行鳴鐸車徒皆行及表第二表乃止三鼓摝鐸掩其口而振之羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐸車驟徒趨及表第三表乃止坐作如初乃鼓車馳徒走及表第四表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表退至第一表乃止坐作如初遂以狩田周禮小司徒㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍大司馬制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長周禮夏商制軍天子六諸侯三次國二小國一周因之小國子男地方五十里田一鄉一遂鄉遂之民各萬二千五百家次國伯地方七十里鄉遂倍之民倍之大國公地方百里鄉遂三之民三之天子地方千里鄉遂六之民六之軍之等視鄉焉卒之數視民焉以是為差凡平居五家為比比有長五比為閭閭有胥四閭為族族有師五族為黨黨有正五黨為州州有州長五州為鄉鄉有卿有事以比人為伍同伍為列比長為公司馬以閭人為兩同兩為拒胥為兩司馬以族人為卒百卒同一車族師為卒長以黨人為旅同族五車為一隊黨正為旅師以州人為師同師二十五車為偏州長為師帥偏將是也以鄉人為軍同軍五偏為陳命卿為軍將一陳之大將也寓兵于農此之謂也王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黒肩將左軍陳人屬焉鄭子元請于鄭伯為左拒以當蔡人衛人為右拒以當陳人曰陳亂而不整民莫有鬬志若先犯之必奔王卒顧之必亂蔡衛不救固將先王卒而奔既而三軍萃于王卒可以集事鄭伯從之使曼伯為右拒蔡仲足為左拒原繁高渠彌為中軍以中軍奉公為魚麗之陳先偏後伍伍乗彌縫戰于繻葛命二拒旝動而鼓蔡衛陳皆奔王卒亂鄭師合而攻之王卒大敗左傳鄭為大國其賦三軍一軍五偏一偏五隊一隊五車五偏五方而立為方陳以偏居前以伍承偏之後彌縫之間如魚隊之附故名魚麗按周制而為者也周制五車為一隊二十五車為一師一百二十五車為一軍以百人為卒一卒分為四兩兩各二十五人四靣環車而立以車甲士三人為中兩各當其一面戰合用竒而車出則卒分列車之兩旁隨車而進先偏後伍伍承彌縫其法同也楚武王荆尸而舉尸陳也荆更為陳兵之法軍行右轅車之右者挾轅為戰備左追蓐在左者追求草蓐為宿備前茅慮無軍行前有斥候蹹伏皆持絳及白旛見騎舉絳幡見步舉白幡茅明也或曰以茅為旌識中權後勁中軍制謀後以精兵為殿百官象物而動軍政不戒而備其君之戎分而為二廣廣有一卒卒偏之兩十五乗為廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乗亦用舊偏法復以二十五人為承副右廣初駕數及日中左則受之以至于昬内官序當其夜以待不虞又有游闕四十乘游車補闕者左傳晉荀吴敗無終及羣狄于太原崇卒也將戰魏舒曰彼徒我車所遇又阨以什共車更増十人以當一車之用必克困諸阨又克請皆卒自我始乃毁車以為行五乗為三伍乗車者車三人五乗十五人今去車更以五人為伍分三伍為五陳以相離兩于前伍于後専為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之左傳晉舊法用周制毎乗攻車七十五人前拒一隊左角一隊右角一隊守車二十五人為廐養樵汲炊爨守裝之用凡興兵十萬用輕重車各一千乗荀呉伐無終地阨而險始舍車為步一伍五人分左右前後中而立一兩二十五人立亦如之方各一伍也甲士居中餘居左右前後方各一兩也五車為隊二十五車為偏五偏為陳而卒之布如車之布焉其前後左右陳之衆寡不同者因地險夷而増損之亦一時之權宜也車有二法小偏九乗大偏十五乗小偏一乗居中八乗裹之中與四隅為正四方為竒大偏三乗居中十二乗裹之中與四隅七乗為正四方八乗為竒吴人伐州來楚薳越帥師及諸侯之師救之呉人禦于鍾離楚令尹子瑕卒于軍楚師熸呉公子光曰諸侯從于楚者衆而皆小國也畏楚而不獲已是以來吾聞之作事威克其愛雖小必濟胡沈之君㓜而狂陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師􅑒帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃揺心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吴子從之戰于鷄父吴以罪人三千先犯胡沈與陳為三軍以繫于後中軍從王公子光帥右掩餘帥左吴之罪人或奔或止三國爭走而亂吴師擊之獲胡沈之君及陳大夫舍胡沈之俘使奔許與蔡頓曰吾君死矣師噪而從之三國奔楚師大奔左傳吴舊無車乗三軍皆步其法三萬人為三軍分為百行行卒百人行頭皆用官師擁鐸持㦸建肥胡之幡奏文犀之渠十行一嬖大夫建旗提鼓挾經秉枹百行一將軍載常建鼓挾經秉枹萬人以為方陳中軍白裳白旗素甲白羽之矰望之如茶王親秉鉞載白旗以中陳而立左軍亦如之赤裳赤旟丹甲朱羽之矰望之如火右軍亦如之𤣥裳𤣥旗黒甲烏羽之矰望之如墨呉制如此及巫臣怨楚以晉之一卒適吴舍其偏兩之一車一乗卒一兩教吴車戰至是始伐州來管子作内政而寄軍令焉制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之鼓有國子之鼓有高子之鼓卒伍整于里軍旅整于郊伍之人世同居少同游夜戰聲相聞晝戰目相視其歡欣足以相死故守則同固戰則同彊國語齊始從周制管仲更之制國三萬人車六百乘一軍各五旅一旅小戎之車各四十乘一乘卒五十人五十人分為十伍以為三軍中軍公帥之左軍國子帥之右軍高子帥之别有卒一萬車二百乗為竒兵莊公伐衛因其遺制而無左右二軍軍不盡出也司馬穰苴曰五人為伍十伍為隊一軍凡二百五十隊餘竒為握竒故一軍以三千七百五十人為竒兵隊七十有五以為中壘守地六千尺積尺得四里以中壘四面乗之一面得地三百步壘内有地三頃餘百八十步正門為握竒大將軍居之六纛五麾金鼓府蔵輜重皆在中壘外餘八千七百五十人隊百七十五分為八陳六陳以二陳為游兵各有千九十四人六陳各減一人以為陳之部署通典周公以五偏之陳偏各一師二千五百人車二十五乗故制邱乗以萬二千五百人為一軍管仲為五偏之陳偏各一旅二千人車四十乗故作内政以萬人為一軍至穰苴為司馬復行周公邱乗之法布黄帝握竒之陳而以一萬二千五百人分之于九軍八陳之中與古司馬法似同而異且黄帝握竒圓陳也以圓物起數卒乗陳隊之多寡隨時用之穰苴謂餘竒為握竒以萬二千五百人取十之三為竒兵布之中壘取十之七為正兵布之外營其取義不同故其數參差不齊亦與黄帝之法不盡合焉孫武子乘之陳圖乗之陳配合伏羲方卦圖乗之陳配合河圖方象圖伏羲師卦陳内外俱圓黄帝變為握竒内圓外方孫子變為乗之内外俱方六十四陳八八相乗故曰乗之與河圖方卦相為經緯外圍二十八陳分為四正正各七陳四隅居之次圍二十陳分為四竒竒各五陳四方居之三圍十二陳為中軍裹圍四陳為握竒大小相包衆寡相裹竒正相涵一分一合而變化出矣其圖古有七巻見漢藝文志後不復傳惟立秋之日以六十四陳為貙劉故事而已尚史巻一百二
