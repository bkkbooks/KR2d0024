body:
  text: 尚史卷七十六列傳五十四鑲白旗漢軍李鍇撰秦諸臣傳王翦王賁附王離李信王翦者東陽東鄉人也少而好兵事秦始皇始皇十一年翦將攻趙閼與破之拔九城十八年翦將攻趙嵗餘遂拔趙趙王降盡定趙地為郡明年燕使荆軻為賊于秦秦王使王翦攻燕燕王喜走遼東翦遂定燕薊而還秦使翦子王賁擊荆荆兵敗還撃魏魏王降遂定魏地秦始皇既滅三晉走燕王而數破荆師秦將李信者年少壯勇嘗以兵數千逐燕太子丹至于衍水中卒破得丹始皇以為賢勇于是始皇問李信吾欲攻取荆于將軍度用幾何人而足李信曰不過用二十萬人始皇問王翦王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇其言是也遂使李信及蒙恬将二十萬南伐荆王翦言不用因謝病歸老于頻陽李信攻平輿蒙恬攻寢大破荆軍信又攻鄢郢破之于是引兵而西與蒙恬㑹城父荆人因隨之三日三夜不頓舍大破李信軍入兩壁殺七都尉秦軍走始皇聞之大怒自馳如頻陽見謝王翦曰寡人以不用將軍計李信果辱秦軍今聞荆兵日進而西將軍雖病獨忍弃寡人乎王翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰巳矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰為聼將軍計耳于是王翦將兵六十萬人始皇自送至灞上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑王翦既至闗使使還請善田者五軰或曰將軍之乞貸亦已甚矣王翦曰不然夫秦王怛而不信人今空秦國甲士而専委于我我不多請田宅為子孫業以自堅顧令秦王坐而疑我耶王翦果代李信擊荆荆聞王翦益軍而來乃悉國中兵以拒秦王翦至堅壁而守之不肯戰荆兵數出挑戰終不出王翦日休士洗沐而善飲食撫循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距于是王翦曰士卒可用矣荆數挑戰而秦不出乃引而東翦因舉兵追之令壯士擊大破荆軍至蘄南殺其將軍項燕荆兵遂敗走秦因乘勝略定荆地城邑嵗餘虜荆王負芻竟平荆地為郡縣因南征百越之君而王翦子王賁與李信破定燕齊地秦始皇二十六年盡并天下王氏蒙氏功為多名施于後世秦二世之時王翦及其子賁皆已死而又滅蒙氏陳勝之反秦秦使王翦之孫王離擊趙圍趙王及張耳鉅鹿城或曰王離秦之名將也今將强秦之兵攻新造之趙舉之必矣客曰不然夫為將三世者必敗必敗者何也以其所殺伐多矣其後受其不祥今王離已三世將矣居無何項羽救趙擊秦軍果虜王離王離軍遂降諸侯史記蒙恬蒙毅附蒙恬者其先齊人也恬大父蒙驁自齊事秦昭王官至上卿莊襄王元年蒙驁為秦將伐韓取成臯滎陽作置三川郡二年驁攻趙取三十七城始皇三年驁攻韓取十三城五年驁攻魏取二十城作置東郡始皇七年驁卒驁子曰武武子曰恬恬嘗書獄典文學始皇二十三年武為秦禆將軍與王翦攻楚大破之殺項燕二十四年武攻楚虜楚王蒙恬弟毅始皇二十六年恬因家世得為秦將攻齊大破之拜為内史秦已并天下乃使恬將三十萬衆北逐戎狄收河南築長城因地形用險制塞起臨洮至遼東延袤萬餘里于是渡河據陽山逶蛇而北暴師于外十餘年居上郡是時恬威振匈奴始皇甚尊寵蒙氏信任賢之而親近毅位至上卿出則參乘入則御前恬任外事而毅常為内謀名為忠信故雖諸將相莫敢與之爭焉趙髙者諸趙疏逺屬也趙髙昆弟數人皆生隠宫其母被刑僇世世卑賤秦王聞髙彊力通于獄法舉以為中車府令髙即私事公子胡亥喻之决獄髙有大罪秦王令毅法治之毅不敢阿法當髙罪死除其宦籍帝以高之敦于事也赦之復其官爵始皇欲游天下道九原直抵甘泉乃使恬通道自九原抵甘泉壍山堙谷千八百里道未就始皇三十七年冬行出游㑹稽並海上北走琅邪道病使毅還禱山川未反始皇至沙邱崩秘之羣臣莫知是時丞相李斯少子胡亥中車府令趙髙常從髙雅得幸于胡亥欲立之又怨毅法治之而不為己也因有賊心乃與丞相李斯少子胡亥隂謀立胡亥為太子太子已立遣使者以罪賜公子扶蘇蒙恬死扶蘇已死恬疑而復請之使者以恬屬吏更置胡亥以李斯舍人為䕶軍使者還報胡亥已聞扶蘇死即欲釋恬趙髙恐蒙氏復貴而用事怨之毅還至趙髙因為胡亥忠計欲以滅蒙氏乃言曰臣聞先帝欲舉賢立太子乆矣而毅諫曰不可若知賢而愈不立則是不忠而惑主也以臣愚意不若誅之胡亥聼而繫毅于代前巳囚恬于陽周喪至咸陽已葬太子立為二世皇帝而趙髙親近日夜毁惡蒙氏求其罪過舉劾之子嬰進諫曰臣聞故趙王遷殺其良臣李牧而用顔聚燕王喜隂用荆軻之謀而倍秦之約齊王建殺其故世忠臣而用后勝之議此三君者皆各以變古者失其國而殃及其身今蒙氏秦之大臣謀士也而主欲一旦棄去之臣竊以為不可臣聞輕慮者不可以治國獨智者不可以存君誅殺忠臣而立無節行之人是内使羣臣不相信而外使鬬士之意離也臣竊以為不可胡亥不聼而遣御史曲宫乘傳之代令毅曰先主欲立大子而卿難之今丞相以卿為不忠罪及其宗朕不忍乃賜卿死亦甚幸矣卿其圗之毅對曰以臣不能得先主之意則臣少宦順幸沒世可謂知意矣以臣不知大子之能則太子獨從周旋天下去諸公子絶逺臣無所疑矣夫先主之舉用大子數年之積也臣乃何言之敢諫何慮之敢謀非敢飾辭以避死也為羞累先主之名願大夫為慮焉使臣得死情實且夫順成全者道之所貴也刑殺者道之所卒也昔者秦繆公殺三良而死罪百里奚而非其罪也故立號曰繆昭襄王殺武安君白起楚平王殺伍奢吳王夫差殺伍子胥此四君者皆為大失而天下非之以其君不明以是籍于諸侯故曰用道治者不殺無罪而罰不加于無辜唯大夫留心使者知胡亥之意不聼毅之言遂殺之二世又遣使者之陽周令恬曰君之過多矣而卿弟毅有大罪法及内史恬曰自吾先人及于子孫積功信于秦三世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔自知必死而守義者不敢辱先人之教以不忘先主也昔周成王初立未離襁褓周公旦負王以朝卒定天下及成王有病甚殆公且自揃其爪以沈于河曰王未有識是旦執事有罪殃旦受其不祥乃書而藏之記府可謂信矣及王能治國有賊臣言周公旦欲為亂乆矣王若不備必有大事王乃大怒周公旦走而奔于楚成王觀于記府得周公旦沈書乃流涕曰孰謂周公旦欲為亂乎殺言之者而反周公旦故周書曰必參而伍之今恬之宗世無二心而事卒如此是必孽臣逆亂内陵之道也夫成王失而復振則卒昌桀殺關龍逢紂殺王子比干而不悔身死則國亡臣故曰過可振而諫可覺也察于參伍上聖之法也凡臣之言非以求免于咎也將以諫而死願陛下為萬民思從道也使者曰臣受詔行法于將軍不敢以將軍言聞于上也恬喟然太息曰我何罪于天無過而死乎良乆徐曰恬罪固當死矣起臨洮屬之遼東城壍萬餘里此其中不能無絶地脉哉此乃恬之罪也乃吞藥自殺史記論曰舉武安者穰侯也范睢羇旅扼冉吭而奪之若起者可以去矣易曰介于石不終日起也惡足以知此哉始皇親信唯蒙氏恬主外毅主内事宜無不闗白者乃毅出使而始皇崩若假斯髙緣隙為亂謂非天乎堆琴堆􅀢者秦人為中朝初事武王武王與堆􅀢爭論不勝王大怒堆􅀢徐行而去或為堆􅀢説王曰悍人也中期適遇明君故也向者遇桀紂必殺之矣王因不罪昭王時王嘗謂左右曰今日韓魏孰與始強對曰弗如也王曰今之如耳魏齊並魏人孰與孟嘗芒卯賢對曰弗如也王曰以孟嘗芒卯之賢帥強韓魏之兵以伐秦猶無奈寡人何也今以無能之如耳魏齊帥弱韓魏以攻秦其無奈寡人何亦明矣堆􅀢對曰王之料天下過矣昔者六晉之時智氏最強滅破范中行又帥韓魏圍趙于晋陽决晋水以灌晉陽城不沈者三板耳智伯出行水韓康子御魏桓子驂乘智伯曰始吾不知水之可以亡人之國也乃今知之汾水利以灌安邑絳水利以灌平陽魏桓子肘韓康子韓康子履魏桓子肘足接于車上而智氏分矣身死國亡為天下笑今秦之強不能過智伯韓魏雖弱尚賢其在晋陽之下也乃方其用肘足時也願王之勿易也秦䇿頓弱茅焦頓弱者秦人也當秦王政時王欲見弱弱曰臣之義不參拜王能使臣無拜則可矣不即不見也王許之于是弱曰天下有有其實而無其名者有無其實而有其名者有無其名又無其實者王知之乎有其實而無其名者商人是也無把銚挂耨之勢而有積粟之實此有其實而無其名者也無其實而有其名者農夫是也觧凍而耕暴背而耨無積粟之實此無其實而有其名者也無其名又無其實者王乃是也已立為萬乘無孝之名以千里養無孝之實王悖然而怒弱曰山東戰國有六威不掩于山東而掩于母臣竊為大王不取也王曰山東之戰國可兼與弱曰韓天下之咽喉魏天下之胷腹王資臣萬金而游聼之韓魏入其社稷之臣于秦即韓魏從而天下可圖也王曰寡人之國貧恐不能給也弱曰天下未嘗無事也非從即横横成則秦帝從成則楚王秦帝即以天下恭養楚王雖有萬金弗得私也王曰善乃資萬金使東游韓魏入其將相北游燕趙而殺李牧齊入朝四國畢從頓弱之説也國策茅焦者齊客也秦王政九年太后與嫪毐亂事覺夷毒三族殺大后所生兩子遂遷太后于雍明年茅蕉説秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之由此倍秦也秦王乃迎太后于雍而入咸陽復居甘泉宫史記説苑始皇太后不謹幸郎嫪毐以為長信侯生兩子毐專國事益驕與左右責臣博飲酒醉爭言而鬬瞋目大叱曰吾皇帝之假父窶人子何敢與我亢所與鬬者走行白皇帝皇帝大怒毐懼誅因作亂戰咸陽宫毐敗皇帝乃取毐四肢車裂之取其兩弟囊撲殺之取太后遷之萯陽宫下令曰敢以太后事諫者戮而殺之從蒺藜其脊肉闕四肢而積之闕下諫而死者二十七人矣齊客茅焦乃往上謁曰齊客茅焦願上諫皇帝皇帝使使出問客得無以太后事諫耶茅焦曰然使者還白皇帝曰走往告之不見闕下積死人邪使者問茅焦焦曰臣聞天有二十八宿今死者已二十七人矣臣所以來者欲滿其數耳走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝大怒曰是子故來犯吾禁趣炊鑊煮之是安得積闕下乎召之入皇帝按劒而坐口正沬出使者召之入茅焦不肯疾行足趣相過耳使者趣之茅焦曰臣至前則死矣君不能忍吾須㬰乎使者哀之茅焦至前再拜謁起稱曰臣聞之夫有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖人所欲急聞也陛下欲聞之不皇帝曰何謂也茅焦曰陛下有狂悖之行陛下不自知陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母萯陽宫有不孝之行從蒺藜于諫士有桀紂之治令天下閒之盡瓦解無向秦者臣竊恐秦亡為陛下危之所言畢乞行就質乃解衣伏質皇帝下殿手接之曰先生就衣今願受事乃立焦為仲父爵之上卿立駕自迎太后歸于咸陽太后大喜大置酒待茅焦及飲太后曰抗枉令直使敗更成使妾母子復㑹皆茅君之力也按嫪毐事在秦并天下前十六年説苑稱皇帝又曰恐天下無向秦者自舛謬然其文佳故具録之伯樂九方臯附伯樂善相馬穆公嘗謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天馬之馬者若滅若沒若亡若失若此者絶塵弭􅦪臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纒薪菜者有九方臯此其于馬非臣之下也公見之使行求馬三月而反報曰得之矣在沙邱公曰何馬也對曰牝而黄使人往取之牡而驪公不説召伯樂而謂之曰敗矣子所使求馬者色物牝牡弗能知又何馬之能知也伯樂喟然太息曰是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其麤在其内而忘其外見其所見不見其所不見若臯之相馬乃有貴乎馬者也馬至果天下之物列子醫緩醫和醫緩者秦人也當桓公時晉景公疾病求醫于我公使緩為之未至景公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何緩至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也景公曰良醫也厚為之禮而歸之醫和者亦秦人也當景公時晉平公有疾求醫于我公使和視之曰疾不可為也是謂近女室疾如蠱非鬼非食非由鬼神飲食惑以喪志良臣將死天命不祐平公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣言由遲而速由本而末以成中聲中聲成而罷退五降而樂遂息于是有煩手淫聲慆堙心耳乃忘平和君子弗聼也物亦如之至于煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣降生五味金味辛木味酸水味鹹火味苦土味甘皆由隂陽風雨而生發為五色辛色白酸色靑鹹色黒苦色赤甘色黄徵為五聲白聲商青聲角黑聲羽赤聲徴黄聲宫淫生六疾淫過也滋味聲色過則生疾六氣曰隂陽風雨晦明也分為四時序為五節五行之節過則為菑隂淫寒疾寒過則為冷陽淫熱疾熱過則喘渇風為末疾末四肢風為緩急雨淫腹疾濕過為洩注晦淫惑疾晦夜也過寢則心惑亂明淫心疾明晝也慮過則心勞生疾女陽物而晦時淫則生内熱惑蠱之疾女常隨男故言陽物家道常在夜故言晦時言陽淫則生内熱之疾晦淫則生惑蠱之疾今君不節不時能無及此乎出告趙武武曰誰當良臣對曰主是謂矣主相晋國于今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉必受其咎今君至于淫以生疾將不能圗恤社稷禍孰大焉主不能禦吾是以云也武曰何謂蠱對曰淫溺惑亂之所生也于文皿蟲為蠱榖之飛亦為蠱穀乆積則變為飛蟲名曰蠱在周易女惑男風落山謂之蠱皆同物也武曰良醫也厚其禮而歸之左傳優旃優旃者秦倡侏儒也善為笑言然合于大道秦始皇時置酒而天雨陛楯者皆沾寒優旃見而哀之謂之曰汝欲休乎陛楯者皆曰幸甚優旃曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬嵗優旃臨檻大呼曰陛楯郎郎曰諾優曰汝雖長何益幸雨立我雖短也幸休居于是始皇使陛楯者得半相代始皇嘗議欲大苑囿東至函谷闗西至雍陳倉優旃曰善多縱禽獸于其中冦從東方來令麋鹿觸之足矣始皇以故輟止二世立又欲漆其城優旃曰善主上雖無言臣固將請之漆城雖于百姓愁費然佳哉漆城蕩蕩冦來不能上即欲就之易為漆耳顧難為䕃室于是二世笑之以其故止居無何二世殺死優旃歸漢數年而卒史記秦諸公子傳公子宏小子憖公子縶公子宏穆公子康公母弟也小子憖亦穆公子穆公二十八年僖二十八年憖帥師及晉宋齊師敗楚師于城濮明年憖㑹盟于翟泉左傳公子縶字子顯亦羣公子為大夫事穆公晉之殺奚齊卓子也請君于秦公告百里視及公孫枝曰夫晋國之亂吾誰使先若夫二公子而立之以為朝夕之急百里視曰君使縶也縶敏且知禮敬以知微敏能竄謀知禮可使敬不隊命微知可否君其使之乃使縶弔重耳于翟重耳出見辭再拜不稽首起而哭退而不私縶退弔夷吾于梁夷吾出見再拜稽首起而不哭退而私于縶且入河外列城五縶反致命于公公曰吾與重耳重耳仁再拜不稽首不沒為後也起而哭愛其父也退而不私不沒于利也縶曰君之言過矣君若求置晋君而載之置仁不亦可乎君若求置晋君以成名于天下則不如置不仁以滑其中且可以進退臣聞之仁有置武有置仁置徳武置服乃先置夷吾是為惠公國語及戰于韓獲惠公大夫請以入縶曰不如殺之無聚慝焉公不可許晋平惠公卒使縶納重耳縶及晋大夫盟于郇左傳公子鍼公子鍼字伯車又曰后子桓公子景公母弟也景公二十九年襄二十五年秦晉為成自韓之戰二國不平至今晉韓起來涖盟鍼如晉涖盟明年鍼再如晉脩成初鍼有寵于桓公如二君于景公至景公三十六年昭元年其母曰弗去懼選選數也數其罪而加戮也夏五月鍼奔晉其車千乘鍼享晉侯造舟于河十里舍車自雍及絳一舍八乘雍絳相去千里用車八百乘歸取酬幣備九獻之儀始禮自齎其一故續送其八酬酒幣終事八反每十里以八乘車各以次載幣相授而還不徑至故言八反千里用車八百乘其二百乘以自随故言千乘晉女叔齊問曰子之車盡于此而已乎對曰此之謂多矣若能少此吾何以得見楚辭注秦伯有齧犬鍼欲請之秦伯不肯與鍼以百兩金易之而又不聽因逐鍼而奪其禄齊告晋侯曰秦公子必歸能知其過必有今圖鍼見趙武武曰吾子其曷歸對曰鍼懼選于寡君是以在此將待嗣君武曰秦君何如對曰無道武曰亡乎對曰何為一世無道國未艾也國于天地有與立焉不數世淫弗能斃也武曰天乎對曰有焉武曰其幾何對曰鍼聞之國無道而年榖和熟天賛之也鮮不五稔武視䕃曰朝夕不相及誰能待五鍼出而告人曰趙孟將死矣主民翫嵗而愒日其與幾何是年冬楚弑郟敖公子干亦奔晋晋使鍼與子干齒以年齒為髙下而坐鍼辭曰鍼懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎鍼先來晋欲同于晋臣為主人故以子干為羇客史佚有言曰非羇何忌忌敬也言不敬羇客當誰敬哉託謙辭欲以自别左傳鍼卒反國或卒于晋傳不載論曰魯論曰不貳過不謂其知之難謂改之難也鍼以車多懼選違離本邦痛自降損旅復聼諸天可已乃千乘八反幣酬所適詡其富乎得罪有由矣張其侈乎自知其尤矣昭罪蹈尤誠胡取乎辛伯有言曰匹嫡耦國亂之本也然則誰實致之又可嘅夫公子他髙陵君附涇陽君公子他者他一作池秦公子也系未詳昭王九年魏齊韓攻秦之函谷王謂樓緩曰三國之兵深矣寡人欲割河東而講對曰割河東大費也免于國患大利也此父兄之任也王何不召公子他而問焉王召公子他而問之對曰講亦悔不講亦悔王曰何也對曰王割河東而講三國雖去王必曰惜矣三國且去吾特以三城從之此講之悔王不講三國入函谷咸陽必危王又曰惜矣吾愛三城而不講此又不講之悔也王曰鈞吾悔也寜亡三城而悔無危咸陽而悔也寡人决講矣卒使公子他以三城講于三國三國之兵乃退昭王同母弟有髙陵君涇陽君名並未詳涇陽君嘗質于齊魏冉專政時髙陵涇陽並擅國事及范睢説昭王昭王懼乃出髙陵走涇陽于闗外國䇿公子扶蘇公子將閭公子扶蘇者始皇長子也始皇三十五年以諸生為訞言亂黔首阬諸生犯禁者四百六十人扶蘇諫曰天下初定逺方黔首未集諸生皆誦法孔子今上皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬于上郡三十七年始皇出游至平原津而病乃為璽書賜扶蘇曰與喪㑹咸陽而葬書已封未發趙髙與丞相斯詐立胡亥更為書賜扶蘇死使者至發書扶蘇泣入内欲自殺蒙恬止扶蘇曰陛下居外未立大子使臣將三十萬衆守邉公子為將此天下重任也今一使者來即自殺安知非詐請復請復請而後死未暮也使者數趣之扶蘇為人仁謂蒙恬曰父而賜子死尚安復請即自殺公子將閭葢亦始皇子也二世即位行誅大臣及諸公子六公子戮死于杜公子將閭昆弟三人囚于内宫議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賔賛也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼天者三曰天乎吾無罪昆弟三人皆拔劒自殺史記論曰或謂扶蘇不死秦未必亡是葢不然秦毒深天下思共噬之扶蘇雖仁雖善御朽索馭六馬必無幸矣至其死與將閭皆無罪寃同恭世子而其聲悲矣秦夫人傳魯姬子穆姬魯姬子寜公妾出子之母也史記穆姬穆公夫人晋大子申生姊伯姬也晋獻公卒秦納惠公于晋穆姬屬賈君獻公次姬且曰盡納羣公子惠公入烝于賈君又不納羣公子是以穆姬怨之及戰于韓秦獲惠公穆姬聞惠公將至以大子瑩子𢎞與女簡璧登臺而履薪焉使以免服衰絰逆免音問䘮服也且告曰上天降災使我兩君匪以玉帛相見而以興戎若晋君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺而許晋平左傳宣太后昭母惠文后武母華陽太后夏太后莊襄母帝太后附宣太后楚女故號􅇗八子昭王之母也昭王即位􅇗八子號為宣太后宣太后非武王母武王母號曰惠文后先武王薨秦本紀昭王二年庶長壯與大臣公子為逆皆誅及惠文后皆不得良死按此是惠文后後武王而死矣穰侯傳又云昭王即位誅季君之亂而逐武王后出之魏李君即庶長壯武王后即武王之妻非武王之母惠文后也紀或縁此而誤而存二説誤昭王少宣太后自治任魏冉為政史記昭王二十一年昭王欲為成陽君韓人求相韓魏韓魏弗聼宣太后為魏冉謂昭王曰成陽君以王之故窮而居于齊今王見其達而收之亦能翕其心乎王曰未也太后曰窮而不收達而報之恐不為王用也且收成陽君失韓魏之道也宣太后愛魏醜夫四十二年太后病將死出令曰為我葬必以魏子為殉庸芮秦人為醜夫説太后曰死者有知乎太后曰無知也曰太后之神靈明知死者之無知何以空以生所愛葬于無知之死人哉若死者有知先王積怒之日乆矣太后救過不贍何暇乃私魏醜夫乎太后曰善乃止國䇿華陽太后安國君所甚愛姬立以為正夫人無子夏姬生于楚質于趙華陽夫人内吕不韋説請子楚于趙而子之安國君立是為孝文王華陽夫人為王后國䇿國策請子楚時孝文王已立子楚為大子孝文王薨子楚立是為莊襄王以所養母華陽后為華陽太后真母夏姬為夏太后始皇七年夏太后薨先是華陽太后與孝文王㑹葬夀陵夏太后子莊襄王葬芷陽故夏太后獨别葬杜東曰東望吾子西望吾夫後百年旁當有萬家邑史記史記帝太后者邯鄲姬也絶好而善舞吕不韋取與居知有身子楚從不韋飲見而説之因起為夀請之不韋怒念業已破家為子楚欲以釣奇乃遂獻其姬姬自匿有身至大期時生子政子楚遂立姬為夫人子楚亡歸秦趙欲殺夫人及子政夫人豪家女也得匿以故母子竟得活子楚為太子趙奉夫人及子政歸秦子楚立為王夫人為王后子政立尊為太后秦王年少太后時時竊私通吕不韋秦王益壮太后淫不止不韋恐禍及已乃私求大隂人嫪毐以為舍人時縱倡樂使毐以其隂闗桐輪而行令太后聞之以啗太后太后聞果欲私得之不韋乃進嫪毐詐令人以腐罪告之不韋隂謂太后曰可事詐腐則得給事中太后乃隂厚賜主腐者吏詐論之拔其鬚眉為宦者遂得侍太后太后私與通絶愛之有身太后恐人知之詐卜當避時徙宫居雍嫪毐常從賞賜甚厚事皆决于嫪毐嫪毐家僮數千人諸客求宦為嫪毐舍人千餘人秦王九年有告嫪毐實非宦者常與太后私亂生子二人皆匿之與太后謀曰王即薨以子為後于是秦王下吏治具得情實九月夷嫪毐三族殺太后所生兩子遂遷太后于雍諸嫪毐舍人皆沒其家而遷之蜀十年齊人茅焦説秦王王乃迎太后于雍復居甘泉宫十九年太后薨諡為帝太后與莊襄王㑹葬茝陽論曰華陽子子楚遂基帝業不韋固釣奇亦以天假之乎趙姬事策無之豈國諱牆茨而然耶史遷必有所本然穢私冥行不以無徵而實之僅附見焉秦列女傳百里奚妻澣婦百里奚之故妻也百里奚為秦相堂上樂作所賃澣婦自言知音呼之搏髀援琴而歌者三其一曰百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴忘我為其二曰百里奚初娶我時五羊皮臨當别時烹乳雞今適富貴忘我為其三曰百里奚百里奚母已死葬南谿墳以瓦覆以柴舂黄粱搤伏雌西入秦五羖皮今日富貴捐我為問之乃其故妻還為夫婦風俗通今本無尚史卷七十六
