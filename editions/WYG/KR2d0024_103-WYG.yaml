body:
  text: 尚史巻一百四志十二鑲白旗漢軍李鍇撰田賦志昔者神農氏斵木為耜揉木為耒始教耕民知一母百子之利乃粒食土生食食生民王者寶土生民寶食葢不可一日離矣及禹為司空任土作貢棄為稷播百榖馴至于周作平土之制任三壤班五土火變水行而井田立限法昭然備矣葢賦取乎下田操乎上授受有節公私有程鄉閭州黨勤董督之是以野無廢土國無游民公田稼不善則罪民私田稼不善則罪吏興利除害民用以給是治之有道也暴秦墮則令民得自占田夫然後大權逆移縱弛以逞董子所謂富者連阡陌貧者無立錐如此而求治譬廢楫以濟川必無繇矣夫春秋之法諸侯不得専封大夫不得専地輿臺臧獲舉有執焉何以為治百一而賦祗益滛氓而已摭拾舊規述田賦志井田之制莫攷其所始洎商畧得其詳然少康逃奔有虞有田一成有衆一旅成為六十四井之甸豈夏時已有其制與商之為制以六百三十畆之地畫為九區區七十畆中為公田公田之中以十四畆為廬舍其外八家各授一區但借其力以助耕公田一夫實耕公田七畆周時方里而井井九百畆其中為公田公田之中以二十畆為廬舍八家皆耕百畆同養公田一夫實耕公田十畆按王制古者以周尺八尺為歩今以周尺六尺四寸為步是周尺每步少古尺一尺六寸則畮少百六十尺百畮少萬六千尺以六尺四寸而一得二千五百步為二十五畮以商之七十畮加二十五畮得九十五畮是每井裁少周五畮以小司徒經土地而井牧其田野九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都周禮所謂九夫為井者井方一里九夫所治之田也四井為邑方二里四邑為邱方四里四邱為甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井甸方八里八八開方之得六十四井此正田之數五百七十六夫井九夫積五百七十六夫此正農之數出田税三十六井此一甸旁加一里之數三百二十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也積萬井九萬夫其四千九十六井同方六十四里開方之得四千九十六井此正田之數三萬六千八百六十四夫此正農之數出田税二千三百四井同實方六十四里旁加十六里乃得方八十里此旁加十六里之數二萬七百三十六夫治洫三千六百井同方八十里旁加二十里乃得方百里此旁加二十里之數三萬二千四百夫治澮井田之法備于一同賈公彦疏四都方八十里開方之為六千四百井就裏除四千九十六井餘二千三百四井井有九夫為二萬七百三十六夫不出税使之治洫四成為縣縣方二十里更加五里方二十五里四縣是小都五十里四都方百里一同開方之為萬井就内除六千四百井餘三千六百井井有九夫為三萬二千四百夫不出税使之治澮司馬法曰六尺為步步百為畆漢時二百四十步為畆是古百二十畆當漢五十畆畆百為夫夫三為屋屋三為井井十為通通十為成成百井十成為終終千井十終為同同方百里萬井鄭𤣥注終井十為通成十為終者横以十貫而為長通十為成十為同者縱以十聫而為方也此與周官以四逓加之法筭各不同此都鄙井田之法所謂八家同井者也案井田之制周官文明甚鄭氏引司馬法一同方百里萬井之説而設旁加之法夫一甸既已旁加一里矣合為一同又旁加十里遂使一同之中正田裁四千九十六井正農裁三萬六千八百六十四夫治田出税而旁加之田且至五千九百四井人至五萬三千一百三十六夫不出税而治洫與澮是旁加之田反溢于公田而旁加之夫反溢于正夫矣周之本制未必若是也攷大司徒不易之地家百畝一易之地家二百畝再易之地家三百畝又有餘夫口受田二十五畝凡此諸田不附一井之旁將安從取給哉夫莱田者嵗更月易必不能越井而耕也餘夫者一户之子弟必不能别宅而居也鄭氏謂六鄉以九等受地皆以一夫為計其地則盡餘夫無地可受並出耕遂地之中百里之外其于事理有必不可者又若司馬法之井十為通通為匹馬三十家士一人徒二人此葢三分取一爾而賈疏云井有九夫十井為九十夫之地宮室塗巷三分去一唯有六十夫地在不易一易再易通率三夫受六夫之地三十夫受六十夫之地唯三十家使出馬一匹士一人徒二人此亦度一井九百畮之中當有餘畮以補莱田遂乃減夫以求其合是一井名為九夫而實則六夫矣夫求合百里萬井之説而設旁加求合一通三十家之説而減正夫牽率調停均非通論也今畫井定方用附餘田意之所儗理或然爾一井正田之外當附餘田五百六畝二分有半一邑合計餘田二千二十五畝一邱合計餘田八千一百畝一甸合計餘田三萬二千四百畝開方之四周各一里三十六井得甸方十里百井矣一縣合計餘田十二萬九千六百畝開方之四周各二里一百四十四井得縣方二十里四百井矣一都合計餘田五十一萬八千四百畝開方之四周各四里五百七十六井得都方四十里一千六百井矣一同今計餘田二百七萬三千六百畝開方之四周各八里二千三百四井得同方八十里六千四百井矣再加餘田三百二十四萬畝開方之四周又十里三千六百井得同方百里萬井矣田不外授農不越井平土之制葢不外此乎附圖于後遂人掌邦之野以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂皆有地域溝樹之凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿周禮十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仭徑畛涂道路皆所以通車徒于國都也徑容牛馬畛容大車涂容乗車一軌道容二軌路容三軌都之野涂與環涂同可也諸侯環涂五軌其野涂與都環涂皆三軌萬夫者方三十三里少半里賈疏從西北隅北畔至東頭有十洫一洫百夫十洫千夫千夫萬步萬步自三十三里餘百步是少半里以九澮總而言之則萬夫矣九而方一同以南畝圖之則遂縱溝横洫縱澮横九澮而川周其外焉康成注賈疏按詩有今適南畝故以南畝圖之其田南北細分者是以行隔為一夫十夫則于首為横溝十溝即百夫于東畔為南北之洫十洫則于南畔為横澮九澮則于四畔為大川此川人造廣深葢倍澮此川與匠人澮水所注川者異彼百里之間一川謂大川也此鄉遂溝洫之法所謂十夫有溝者也賈疏此與井田異制以九而方一同則百里之内九九八十一澮為井田則一同為一澮既溝澮稀稠不同又溝澮法以為貢子就夫税之十一而貢井田則九夫為井井税一夫美惡取于此不税民之所自治是溝洫井田異也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒鄭注古者耜一金兩人併發之其壟中曰􅍒􅍒上曰伐伐之言發也􅍒􅍒也今之耜岐頭兩金象古之耦也漢書后稷始􅍒田以二耜為耦􅍒長終畆一畆三􅍒一夫三百􅍒而播種于􅍒中苗生葉以上稍耨隴草因隤其土以附苗根比隴盡根深而能風與旱也田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仭謂之澮専達于川各載其名凡天下之地埶兩山之間必有川焉大川之上必有涂焉考工記川此是自然之川與九澮而周其外之川異此畿内采地之制異于鄉遂及公邑采地者在三百里四百里五百里之中畿内用夏之貢法邦國用殷之助法康成注地有九等上中下各有三等也又别有三等謂不易一易再易之地也食人有九等自二人至十人亦各有三等也下地食二人三人四人中地食五人六人七人上地食八人九人十人各有三等康成注大司徒造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮周禮都鄙王子弟公卿大夫采地也采地者公在大都卿在小都大夫在家邑其親王子母弟與公同在大都次疏者與卿同在小都次更疏者與大夫同在家邑不易之地嵗種之地美故家百畮一易之地休一嵗乃復種地薄故家二百畮再易之地休二嵗乃復種故家三百畮康成注遂人掌六遂之地辨其野之土上地中地下地以頒田里上地夫一廛廛百畮之宅田百畮萊五十畮萊謂休不耕者餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之周禮鄭司農云戸計一夫一婦而賦之田其一户有數口者餘夫亦受此田也康成注賈疏餘夫年二十九以下未有妻受口田二十五畮若三十有妻則受夫田百畮士工商家受田五口乃當農夫一人此謂平土可以為法者若山林藪澤原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以上上所長也十一嵗以上上所强也漢志若王制所謂百畮之分上農夫食九人其次食八人其次食六人下農夫食五人則又以人之勤惰為言不在受田之限也案内則云三十受田給征役鄉大夫註有夫有婦乃成家何休云一夫一婦受井田百畮并與鄭説合而朱子集註云一夫上父母下妻子以五口八口為率受田百畮如有弟是餘夫年十六别受二十五畮俟其壯而有室然後受百畮之田常制之外又有餘夫之田以厚野人也此説為獨得然有未盡者夫地有九等户亦如之論其中者經有上地家七人中地家六人下地家五人之文是一夫上父母下妻子旁兄弟謂之家其七六五人之外又有弟年十六以上乃受餘夫田二十五畮如有數弟則各受餘夫之田以養其妻子逮至夫與弟各生子則身又為父其冡子為夫次子為餘夫夫之冢子受原田弟之冢子受百畮之田所謂餘夫亦如之是也若如衆説一夫一婦與七六五人同受百畮顯與經倍而制且不均矣堯平水土為九州九州之地凡二千四百三十萬八千二十四頃定墾者九百二十萬八千二十四頃不墾者千五百一十萬民口千三百五十五萬三千九百二十三人至于塗山之㑹諸侯執玉帛有萬國四海之内東西二萬八千里南北二萬六千里出水者八千里受水者八千里男女耕織不奪其時故公家有三十年之積私家有九年之儲逮湯受命其能存者三千餘國方于塗山十損其七民離毒政將亦如之至周克商制五等之封凡千七百七十三國又減湯時千三百矣民衆之損將亦如之及周公相成王致治刑錯民口千三百七十一萬四千九百二十三人多禹十六萬一千人至莊王之十三年五千里内非天王九嬪之御自世子公侯以下至于庶民凡千一百八十四萬七千人除有土老疾定受田者九百萬四千人其後諸侯相并當春秋時尚有千二百國至于戰國存者十餘然考蘇張之説計秦及山東六國戎卒尚存五百餘萬推此尚當千餘萬人帝王世紀賦者上之所取也役者下之所供也然皆因地制賦因民定役賦貴薄征役取下劑過則毒民太古尚矣至禹任土作貢始别九州田辨九等賦亦如之冀州厥土惟白壤厥賦惟上上錯賦第一等而錯出第二等厥田惟中中兖州厥土黒墳厥田惟中下厥賦貞賦第九等貞正也以薄賦為正也青州厥土白墳海濵廣斥厥田惟上下厥賦中上徐州厥土赤埴墳厥田惟上中厥賦中中揚州厥土惟塗泥厥田惟下下厥賦下上上錯賦第七等雜出第六等荆州厥土惟塗泥厥田惟下中厥賦上下豫州厥土惟壤下土墳壚厥田惟中上厥賦錯上中賦第二等雜出第一等梁州厥土青黎厥田惟下上厥賦下中三錯賦第八等雜出第七第九等雍州厥土惟黄壤厥田惟上上厥賦中下孔氏曰田下而賦上者人功脩也田上而賦下者人功少也五百里甸服畿内之地去王城四靣各五百里百里賦納總禾本全曰總二百里納銍刈禾曰銍半藁也三百里納秸服半藁去皮曰秸服者三百里内去王城為近非惟納總銍秸又使之服輸將之事也四百里粟五百里米尚書夏制當亦如此而其詳與商制皆莫可得聞孟子云夏后氏五十而貢一夫受田五十畮毎夫計其五畮之入以為貢殷人七十而助殷始為井田之制畫地為九區區七十畮中為公田八家各授一區但借其力以助耕公田周人百畮而徹周時一夫授田百畮鄉遂用貢法十夫冇溝都鄙用助法八家同井耕則同力而作收則計畮而分故謂之徹其實皆什一也龍子曰治地莫善于助莫不善于貢貢者較數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉詩云雨我公田遂及我私由此觀之雖周亦助也周之賦有二都鄙用助法鄉遂用貢法其小司徒井牧其田野九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都此都鄙井田而用助法者也其大司徒建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一公之地自食其半半貢入天子侯伯之地三之一貢入天子子男之地四之一貢入天子載師掌任土之法以物地事授地職而待其政令以廛里任國中之地廛里若今邑里廛民居之區域里居也以場圃任園地圃樹果蓏之屬季秋于中為場樊圃謂之園以宅田士田賈田任近郊之地宅田致仕者之家所受田士讀為仕仕者亦受田所謂圭田也賈田在市賈人其家所受田以官田牛田賞田牧田任逺郊之地官田庶人在官者其家所受田牛田牧田畜牧者之家所受田賞田賞賜之田以公邑之田任甸地公邑六遂餘地天子使大夫治之以家邑之田任稍地家邑大夫采地以小都之田任縣地小都卿之采地以大都之田任畺地大都公之采地王子弟所食邑畺五百里王畿界也凡任地國宅無征園廛二十而一近郊十一逺郊二十而三輕近而重逺者近多役也園廛亦輕之者廛無穀園少利也甸稍縣都皆無過十二唯其漆林之征二十而五漆林之税特重以其自然所生非人力所作也凡宅不毛者有里布不樹桑麻罰以一里二十五家之泉凡田不耕者出屋粟罰以三家之税凡民無職事者出夫家之征夫税者百畮之税家税者出士徒車輦給繇役以時徵其賦此鄉遂公邑而用貢法者也其小司徒均土地以稽其人民而周知其數上地家七人可任也者家三人給地有九等此據中地三等而言中地之上所養者七人七人之中一人為家長餘六人在强弱半强而可任使者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡唯田與追胥竭作田田獵追追寇賊也其大司馬令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人周禮之賦給軍用者令邦國賦制如六遂此則鄉遂邦國役民之制也至周東遷其法滋壊而魯宣公十五年初税畮公羊傳曰譏履畮而税也古者什一而藉謂藉民力耕公田過于什一大桀小桀减于什一大貊小貊什一者天下之中正也成公元年作邱甲杜預注曰邱十六井出戎馬一匹牛三頭甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人與司馬法異此甸所賦魯使邱出之譏重歛詳見兵志哀公十二年用田賦公羊傳曰田者一井之田賦者歛取其財也若今歛民錢以田為率矣禮税民公田不過什一軍賦十井不過一乘哀公空盡國儲用田賦過什一而左氏傳曰季孫欲以田賦使冉有訪諸仲尼仲尼不對而私于冉有曰君子之行也度于禮施取于厚事取其中歛從其薄如是則以邱亦足矣邱出戎馬一匹牛三頭是賦之常法若不度于禮而貪冒無厭則雖以田賦又將不足哀公問于有若曰年饑用不足如之何對曰盍徹乎公曰二吾猶不足如之何其徹也由此觀之周之末季徹法不行賦嘗什二矣至秦孝公十二年初為賦用商鞅法以三晉地狹人貧秦地廣人寡于是誘三晉之人利其田地復三代無知兵事廢井田開阡陌任其所耕不限多少既而無所稽攷則舍地而税人洎始皇三十一年始使黔首自實田田租口賦鹽鐵之利二十倍于官或耕豪民之田則見税十五十分以五輸田主于是乎井田什一之賦絶不復行而民力日困矣若夫太宰以九賦歛財賄所謂邦中之賦在城郭者四郊之賦去國百里郊甸之賦邦甸二百里家削之賦家削三百里邦縣之賦邦縣四百里邦都之賦邦都五百里此平民也闗市之賦山澤之賦關市山澤謂占㑹百物幣餘之賦幣餘謂占賣國中之斥幣皆末作當増賦者此則計民口率出泉異乎田野之税也井田圖井方一里正田九百畆鄭氏以甸方十里百井同方百里萬井求其數而不得故設為旁加之法以旁加之夫為治洫治澮説誤正農九夫餘田五百六畆二分有半増入餘田以代旁加四井為邑方二里正田二千六百畆正農三十六夫餘田二千二十五畆四邑為丘方四里十六井正田一萬四千四百畆正農一百四十四夫餘田八千一百畆四丘為甸方八里六十四井正田五萬七千六百畆正農五百七十六夫鄭氏旁加法四周各加一里餘三十一井三百二十四夫治洫併前數為百井九百夫餘田三萬二千四百畆以餘田開方之四周各一里得甸方十里百井四甸為縣方十六里二百五十六井正田二十三萬四百畆正農二千三百四夫鄭氏旁加法縣方二十里實十六里毎甸旁加一里得今數又曰更加五里方二十五里此于縣内旁加則都餘田十二萬九千六百畆以方五十里同方百里同之内更不復旁加餘田開方之四周各二里得縣方二十里四百井四縣為都方三十二里一千二十四井正田九十萬三千六百畆正農九千三十六夫餘田五十一萬八千四百畆開方之四周各四里得都方四十里一千六百井四都為同方六十四里四千九十六井正田三百六十八萬六千四百畆正農三萬六千八百六十四夫餘田二百七萬三千六百畆開方之四周各八里得同方八十里再加餘田三百二十四萬畆開方之四周各十里得同方百里萬井鄭氏旁加法四都方八十里實六十四里加十六里得今數為六千四百井就裏除四千九十六井此方六十四里之井餘二千三百四井此旁加十六里之井二萬七百三十六夫治洫縣方二十里更加五里四縣是小都五十里四都為一同方百里萬井就裏除六千四百井此方八十里之井餘三千六百井此旁加二十里之井三萬二千四百夫治澮司馬法井田圖尚史巻一百四
