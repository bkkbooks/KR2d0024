body:
  text: 尚史卷九十七志五鑲白旗漢軍李鍇撰地理志下王制曰王者之制禄爵公侯伯子男凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合于天子附于諸侯曰附庸又曰八州州二百一十國天子之縣内九十三國凡九州千七百七十三國天子之元士諸侯之附庸不與班固曰周葢千八百國而太皥黄帝之後唐虞侯伯猶存周室既衰諸侯轉相吞滅數百年間列國耗盡至春秋時尚有數十國蘓軾列國圖得百二十四國夫自西周至東周裁三百五十年不應呑滅遂至十九葢王制之説度其九州之所容非必州有其國實如其數也朱子曰恐只是如此算法其寔不然是也今論次其經傳所見者凡百七十五國然其封建大國而式㣲厥終者如毛畢膺上爵鄷郇屬文昭而其後無聞有始寔附庸終巳不振者如蕭極鄣鄟附庸魯宋有越在荒逺史不及載者如鼓潞鮮虞陸渾之屬世系莫攷嵗月無紀不可為世家列傳上同二十一國故附之于地理志首先王後尚徳也次姬姓尊周也次諸小國次吴楚界别也其有名徳之臣并附著之如隨季梁虞宫之奇之屬以見材無不具云宿宿風姓太皥之後杜預注東平無塩縣男爵平王四十九年隠公元年魯及宋人盟于宿桓王四年七年宋及鄭平盟于宿五年八年夏六月宿男卒名諡無攷莊王十三年莊公十年宋人遷宿春秋杜預注宋彊遷之而取其地任任風姓杜預注任城縣顓臾顓臾風姓杜預注泰山南武陽縣東北魯附庸國封以為東䝉主東䝉山名冉求所謂固而近于費者是也魯論須句須句風姓任宿顓臾須句風姓也寔司太皥與有濟之祀杜預注東郡湏昌縣西北四國封近于濟故世祀之湏句之女為魯莊公夫人是為成風生僖公襄王十三年僖二十一年邾人滅須句須句子奔魯成風為之言于公曰崇明祀保小寡周禮也若封須句是崇皥濟而脩祀紓禍也明年公伐邾取須句反其君既而邾復滅之三十二年又七年公復伐邾取須句左傳紀紀姜姓神農之後杜預注東莞劇縣侯爵莫詳其始封平王四十九年隠元年紀人伐夷五十年二年紀魯昏大夫裂繻如魯逆女冬伯姬歸于紀莒魯有怨冬十月裂繻莒子盟于宻魯故也齊紀有怨桓王十三年桓五年齊侯鄭伯朝于紀欲以襲之紀人知之謀于魯明年魯侯㑹紀侯于成冬紀侯如魯朝請王命以求成于齊魯告不能十六年八年周祭伯逆王后于紀明年紀季姜歸于京師二十一年十三年魯侯紀侯鄭伯及齊宋衛燕戰齊宋衛燕敗績莊王二年十七年魯侯㑹齊侯紀侯盟于黄平齊紀也四年莊元年奔師遷紀郱鄑郚齊欲滅紀故徙三邑之民而取其地六年三年紀季紀侯弟以􅈶入于齊􅈶紀邑在齊東安平縣紀季入齊為附庸紀于是乎始判七年四年春三月紀伯姬卒紀侯不能下齊以與紀季夏紀侯大去其國齊葬紀伯姬十五年十二年紀叔姬歸干􅈶恵王十二年二十九年冬十二月紀叔姬卒明年秋八月𦵏紀叔姬左傳按紀雖滅叔姬能守節歸􅈶賢之故書卒書塟向向姜姓神農之後杜預注譙國龍亢縣東南有向城莒子娶于向向姜不安而歸平王五十年隠二年莒人入向春秋按魯别有向邑名桓十六年冬城向是也莒又有向宣四年公及齊侯平莒及郯莒人不肯公伐莒取向杜預注向莒邑東海承縣東有向城逺疑也又按漢志向在沛郡龍亢屬豫莒在城陽屬兖兖沛相近莒人入向或遂取而有之宣四年伐莒取向所謂向者葢即沛郡龍亢之向非東海承縣之向城也焦吕焦姜姓杜預注𢎞農陜縣有焦城武王克商封神農之後于焦大紀吕姜姓詩傳吕即甫書吕刑禮記作甫也刑而孔氏以吕侯後為甫侯是史伯曰當成周者南有荆蠻申吕國語後申見邰邰姜姓炎帝之後帝嚳元妃邰氏女也説文堯以棄有功于民復封于邰詩注大雅即有邰家室是也漢書注在陜西西安府武功縣五丈原南燕南燕姞姓黄帝之後杜預注東郡燕縣桓王二年隠五年衛人以燕師伐鄭鄭敗燕師于北制莊王三年桓十八年周公黒肩欲弑莊王而立王子克王殺周公克奔燕周恵王時燕伯曰仲父仲父黨王子頽恵王二年莊十九年王子頽伐王不克而奔衛衛師燕師伐周立子頽明年鄭伯執燕仲父以王處于櫟又明年入王殺王子頽左傳宻湏闕鞏阮宻須姞姓世本黄帝之後也詩注宻須在寧州杜預注在安定隂宻縣闕鞏亦國名地未詳大雅所謂宻人不恭敢距大拜侵阮徂共王赫斯怒爰整其旅以遏徂旅是也籍談曰宻須之鼓與其大路文王所以大蒐也闕鞏之甲武所以克商也唐叔受之以處參虚左傳阮亦國名詩注在涇州祝薊祝姞姓東海郡祝其縣武王克商封黄帝之後于祝封帝堯之後于薊大紀鑄吕氏春秋祝作薊作藜郯郯己姓漢書注盈姓少皥之後漢州郡志秦為郯郡漢屬東海郡子爵莒郯相怨定王二年宣四年魯侯齊侯平莒及郯莒人不肯魯伐莒簡王二年成七年呉伐郯郯成三年八年晋魯齊邾㑹伐郯與呉成故景王十九年昭十六年齊伐徐徐成徐子及郯人莒人㑹齊侯盟于蒲隧二十年十七年郯子如魯朝魯侯與之晏叔孫婼問焉曰少皥氏鳥名官何也郯子曰吾祖也我知之昔者黄帝以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳯鳥適至故紀于鳥為鳥師而鳥名鳯鳥氏厯正也鳯知天時故以名厯正元鳥氏司分者也元鳥燕也春分來秋分去伯趙氏司至者也伯趙伯勞夏至鳴冬至止青鳥氏司啟者也青鳥鶬鷗立春鳴立夏止丹鳥氏司閉者也丹鳥鷩雉立秋來立冬去以上四鳥皆厯正之屬官祝鳩氏司徒也祝鳩鷦鳩性孝故為司徒主教民鴡鳩氏司馬也鴡鳩王鴡鷙而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴶鵴性平均故為司空平水土爽鳩氏司㓂也爽鳩鷹也鷙故為司㓂主盗賊鶻鳩氏司事也鶻鳩鶻鵰春來冬去故為司事五鳩鳩民者也五雉為五工正雉五種賈逵曰西方曰鷷雉攻木之工東方曰鶅雉塼埴之工南方曰翟雉攻金之工北方曰鵗雉攻皮之工伊洛之南曰翬雉設五色之工利器用正度量夷民者也九扈為九農正扈九種賈逵曰春扈鳻鶞相五土之宜趣民耕種夏扈竊𤣥趣民耘苖秋扈竊藍趣民收歛冬扈竊黄趣民葢藏棘扈竊丹為果驅鳥行扈唶唶畫為民驅鳥宵扈嘖嘖夜為農驅獸桑扈竊脂為蠶驅雀老扈鷃鷃趣民種麥令不得晏起扈民無淫者也自顓頊以來不能紀逺乃紀于近為民師而命以民事則不能故也仲尼聞之見于郯子而學之敬王三十五年哀十年呉子㑹魯侯邾子郯子伐齊南鄙左傳後事不載有施有蘓有施喜姓之國有蘇己姓之國韋昭注史蘓曰夏桀伐有施有施人以妹喜女焉殷辛伐有蘓有蘓人以姐己女焉國語遂遂媯姓舜之後杜預注濟北蛇丘縣東北僖王元年莊十三年齊人滅遂而戍之五年十七年遂因氏頜氏工婁氏須遂氏四族遂之彊宗饗齊戍卒醉而殺之齊人殱焉左傳鄫鄫國語作繒姒姓夏禹之後杜預注琅邪鄫縣子爵莫詳其始封魯鄫為昏㐮王六年僖十四年季姬歸寜魯侯止之以鄫子之不朝也夏季姬及鄫子遇于防使鄫子如魯朝七年十五年季姬歸于鄫明年季姬卒淮夷病鄫冬十二月諸侯㑹于淮城鄫不果而還十一年十九年宋公曹人邾人盟于曹南鄫子㑹盟于邾宋公使邾人執鄫子用之于次睢之社定王十六年宣十八年秋邾人戕鄫子于鄫十八年成二年鄫人及諸侯楚人盟于蜀簡王十四年㐮元年晋伐鄭諸侯次于鄫以待晋師晋師自鄭以鄫之師侵楚􅞆夷及陳靈王三年四年魯屬鄫冬邾人莒人伐鄫魯救鄫四年五年秋鄫㑹諸侯于戚魯以屬鄫為不利使鄫大夫聼命于㑹五年六年莒人滅鄫左傳鄅鄅姒姓或曰妘姓妘姓祝融之後禹之後杜預注琅邪開陽縣景王二十一年昭十八年鄅人籍稻籍葢履行之邾人襲鄅鄅人將閉門邾人羊羅攝其首焉斬得門者頭遂入之盡俘以歸鄅子曰余無歸矣從帑于邾邾莊公反鄅夫人而舍其女鄅夫人宋向戍之女也明年宋伐邾取蟲乃盡歸鄅俘左傳莘莘姒姓夏啟封支子于莘史記郡國志郃陽南有古莘國散宜生為文王求有莘女以獻紂即此括地志在同州河西縣南二十里伊尹賢湯使人請之有莘氏有莘氏不可湯于是請取婦為㛰有莘氏喜以伊尹為媵送女吕氏春秋及周文王取有莘之長女生武王是為太姒列女傳檜檜妘姓祝融之後朱熹注在豫州外方之北榮波之南鄭桓公將襲檜先問檜之良臣與其名姓擇檜之良田賂之為官爵之名而書之因為設壇塲郭門之外而埋之釁之以鷄豭若盟狀檜君以為内難也盡殺其良臣桓公襲檜遂取之韓非子鄢鄢妘姓祝融之後仲任氏之女為鄢夫人為鄭武公所滅韋昭注鄢之亡也由仲任是也國語偪陽鄔路偪陽妘姓祝融之後杜預注彭城傳陽縣子爵靈王九年㐮十年諸侯㑹于柤晋及諸侯之師圍偪陽弗克夏五月滅之以偪陽子歸獻于武宫使周内史選其族嗣納諸霍人霍晋邑令居霍奉妘姓之祀左傳鄔路妘姓之别封韋昭注史伯曰妘姓鄔鄶路偪陽曹姓鄒莒皆為采衛國語昆吾蘓顧温董昆吾蘓顧温董並己姓祝融之後韋昭注商頌韋顧既伐昆吾夏桀是也史伯曰己姓昆吾蘓顧温董董姓􅀈夷豢龍則夏滅之國語蘓周别有温見後大彭豕韋諸稽大彭彭姓陸終第三子名籛封于大彭謂之彭祖彭城是也豕韋諸稽其後别封也韋昭注史伯曰彭姓彭祖豕韋諸稽則商滅之國語舟人舟人秃姓國名彭祖之别封也韋昭注史伯曰秃姓舟人則周滅之國語觀扈姺邳觀國名在頓邱衛縣扈國名在始平扈縣啟與有扈戰于甘之野是也姺邳二國名姺未詳邳在下邳縣杜預注趙武曰夏有觀扈商有姺邳是也左傳亳亳契所封國周公曰三亳阪尹是也尚書帝王世紀梁國有三亳南亳在榖熟即湯都北亳在䝉即景亳湯所受命地偃師為西亳即盤庚所徙蓼六蓼六並臯陶後杜預注蓼安豐蓼縣六廬江六縣㐮王三十年文五年六人叛楚即東夷秋楚成大心滅六冬楚子爕滅蓼魯臧孫辰聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉楚别有蓼國義陽棘陽縣東南湖陽縣楚盟貳軫鄖人將與隨絞州蓼伐楚師者是也左傳摯疇摯疇並任姓奚仲仲虺之後大任之家韋昭注疇摯之國由大任是也國語虞虞姬姓公爵大王子仲雍之後曰周章章弟亦曰虞仲武王克商封虞仲于周之北故夏墟徐廣曰河東太陽縣桓王十八年桓十年虢公來奔初虞公之弟虞叔有玉虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寳劍叔曰是無厭也無厭將及我秋遂伐虞虞公出奔共池恵王十九年僖二年晋荀息請以屈産之乗與垂棘之璧假道于虞以伐虢晉侯曰宫之奇存焉宫之奇虞大夫對曰宫之奇之為人也懦而不能彊諌且少長于君君暱之雖彊諫不聽乃使荀息假道于虞虞公許之且請先伐虢宫之奇諌不聴遂㑹晋師伐虢滅下陽二十二年五年晋復假道于虞以伐虢宮之奇諌曰虢虞之表也虢亡虞必從之晋不可啟㓂不可翫一之謂甚豈可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也公曰晋吾宗也豈害我哉對曰大伯虞仲大王之昭也大伯不從是以不祀虢仲虢叔王季之穆也為文王卿士勲在王室藏于盟府將虢是滅何愛于虞且虞能親于桓莊乎其愛之也桓莊之族何罪而以為戮不唯偪乎親以􅃂偪猶尚害之况以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親唯徳是依故周書曰皇天無親惟徳是輔又曰黍稷非馨明徳惟馨又曰民不易物惟徳繄物如是則非徳民不和神不享矣神所慿依將在徳矣若晋取虞而明徳以薦馨香神其吐之乎弗聽許晋使左傳宫之竒出謂其子曰虞將亡矣唯忠信者能留外㓂而不害除闇以應外謂之忠定身以行事謂之信今君施其所惡于人闇不除矣以賄滅親身不定矣夫國非忠不立非信不固既不忠信而留外㓂㓂知其釁而歸圖焉己自抜其本矣何以能乆吾不去懼及焉以其帑適西山國語曰虞不臘矣在此行也晋不更舉矣冬晋滅虢師還館于虞遂襲虞滅之執虞公及其大夫井伯或即百里奚以媵秦穆姫左傳虢虢有二曰西虢杜預注𢎞農陜縣東南有虢城曰東虢滎陽縣漢志又有北虢北虢在太陽東虢在滎陽西虢在雍州虢仲虢叔王季之子也武王封仲于西虢封叔于東虢大紀按虢叔封東虢鄭滅之所謂虢叔死焉者是也大紀以仲封東虢叔封西虢誤今更之鄭滅東虢惟西虢公之後是為虢文公虢仲虢叔虢文公並見西周傳文公之後曰虢公忌父事平王平王四十九年隠元年鄭以王師虢師伐衛平王將畀忌父政㑹崩桓王立忌父始作卿士于周虢公醜者亦曰虢仲即虢公林父亦為桓王卿士桓王八年十一年鄭以虢師伐宋大敗宋師十六年桓八年王命林父立晋哀侯之弟緡于晋十七年九年林父伐曲沃十八年十年林父譛其屬大夫詹父于王詹父有辭以王師伐虢林父出奔虞已而復之僖王四年莊十六年王使林父命曲沃伯以一軍為晋侯恵王元年十八年林父朝王王饗醴命之宥賜玉五㲄馬三匹林父使原莊公逆王后于陳三年二十年子頽之難王出居鄭鄭伯見虢叔按傳有虢仲虢公虢叔杜預注虢仲即虢公林父虢叔虢公之子韋昭國語注以虢叔為虢公林父二説異曰盍納王乎虢公許諾四年二十一年鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫王巡狩于虢林父為王宫于玤與之酒泉請器與之爵九年二十六年侵晋冬又侵晋十三年三十年王命林父討樊皮入樊執樊仲皮歸于京師十五年三十二年有神降于莘林父使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽于民國將亡聽于神神聰明正直而壹者也依人而行虢多凉徳其何土之能得閔公二年林父敗犬戎于渭汭舟之僑虢大夫曰無徳而祿殃也殃將至矣左傳林父夢在廟有神人面白毛虎爪執鉞立于西阿公懼而走神曰無走帝命曰使晋襲于爾門林父拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑臣也天事官成言禍福各以官象成也林父使囚之且使國人賀夢舟之僑告其諸族曰衆謂虢亡不乆吾乃今知之君不度而賀大國之襲于已何瘳吾聞之曰大國道小國襲焉曰服小國敖大國襲焉曰誅民疾君之侈也是以遂于逆命今嘉其夢侈必展是天奪之鑒而益其疾民疾其態天又誑之大國來誅出令乃逆宗國既卑諸侯逺已内外無親其誰云救之吾不忍俟也以其族適晋國語十九年僖二年晋滅虢下陽林父敗戎于桑田二十二年五年晋滅虢林父奔京師左傳管管叔鮮文王子武王母弟也封于管杜預注滎陽京縣東北括地志鄭州管城縣管叔鮮誅死無後史記世家毛毛叔鄭武王母弟也封于毛毛地未詳公爵毛叔鄭見西周傳其後毛伯為襄王卿士襄王十六年僖二十四年王子帯以狄師伐周大敗周師獲毛伯後毛伯衛亦為襄王卿士二十六年文元年王使毛伯衛如魯鍚文公命頃王元年九年毛伯衛如魯求金塟襄王定王十三年宣十五年王孫蘓與召氏毛氏爭政王札子殺毛伯衛及召戴公毛伯過周大夫過之族毛得殺過而伐之毛得黨王子朝敬王四年昭二十六年晋師克鞏子朝及召氏毛伯得奔楚左傳郕郕叔武武王母弟也封于郕杜預注東平剛父縣西南有郕鄉桓王二年隠五年郕人侵衛秋衛師入郕七年十年郕不㑹王命伐宋冬齊人鄭人入郕十一年桓三年魯侯㑹杞侯于郕莊王十一年莊八年魯及齊圍郕郕降于齊頃王時郕大子朱儒自安于夫鍾郕邑國人弗徇徇順也頃王四年文十二年春郕伯薨郕人立君大子以夫鍾與郕邽亦郕邑奔魯魯侯以諸侯逆之簡王時有成肅公史記郕叔武作成是郕與成一也為王卿士簡王八年成十三年劉康公成肅公㑹晋伐秦成肅公受脤于社不敬劉康公曰成子惰棄其命矣其不反乎五月成肅公薨于瑕後有成簡公亦為卿士景王十年昭七年衛襄公卒告䘮于周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉二圉周之先也魯别有郕為孟氏邑桓王十四年桓六年魯侯㑹紀侯于成杜預注魯地泰山鉅平縣東南靈王十五年㐮十六年齊圍郕孟孺子速徼之注郕孟氏邑是也左傳霍霍叔處武王母弟也封于霍杜預注永安縣東北有霍太山恵王十六年閔元年晋滅霍左傳􅆅􅆅季載武王母弟也封于􅆅索隠載名季字也􅆅地無攷􅆅季載有馴行成王時周公舉為周司空以佐成王治有令名于天下史記世家其後世無所見郜郜叔武王之弟也封于郜杜預注濟隂城武縣東南有北郜城漢志山陽郜城縣其後有郜子襄王十二年僖二十年郜子如魯朝簡王十三年成十八年楚鄭侵城郜取幽邱同伐彭城納魚石左傳郜時為宋邑葢為宋所滅矣畢畢公髙武王之弟也封于畢杜預注長安縣西北畢公髙見西周傳其後畢萬為魏之先原原叔武王之弟也封于原原地無攷其後有原莊公是為原伯恵王元年莊十八年使原莊公逆王后于陳三年二十年王子頽入成周王居鄭子頽享大夫樂及徧舞鄭伯曰哀樂失時殃咎必至子頽歌舞不倦樂禍也明年鄭伯納王殺子頽鄭伯享王于闕西辟樂備以王復辟享禮亦備六代之樂原莊公曰鄭伯效尤其亦將有咎五月鄭伯卒襄王時有原伯叔帯以狄師伐周獲原伯又有原伯貫者周守原大夫襄王十七年僖二十五年晋文公平叔帯之難與之陽樊温原攅茅之田原不服晋侯圍原原降遷原伯貫于冀又有原襄公者周大夫定王十三年宣十五年王孫蘓與召氏毛氏爭政明年晋使士㑹平王室王享之原襄公相禮焉又有原伯絞亦周大夫景王十五年昭十二年原伯絞虐其輿臣使曹逃輿衆曹羣也原輿人逐絞而立其弟跪尋絞奔郊原伯魯者亦周大夫魯人㑹𦵏曹平公原伯魯與之語不說學魯閔子馬曰周其亂乎原氏其亡乎敬王七年昭二十九年周討子朝之黨殺原伯魯之子左傳雍酆郇雍叔封于雍杜預注河内山陽縣西酆叔封于酆杜預注始平鄠縣東郇叔封于郇漢志扶風栒邑並武王之弟也其後世皆無所見邘應韓邘杜預注河内野王縣西北有邘城應杜預注㐮陽城父縣西南韓杜預注河東郡界漢志潁川父城縣並武王之子也宣王時命韓侯為侯伯其後晋滅以為邑以賜桓叔之子萬是為韓萬韋昭注國語史伯曰武王之子應韓不在其在晉乎言應韓其時雖存其興者當在晋也凡凡杜預注汲郡共縣東南有凡城伯爵凡蔣邢茅胙祭皆周公之􅏷也厲王時凡伯作板之詩以刺王作瞻卬召旻之詩以刺幽王詩序桓王時有凡伯為周卿士戎朝于周發幣于公卿凡伯弗賔桓王四年隠七年王使凡伯聘魯還戎伐之于楚邱以歸左傳邢邢杜預注廣平襄國縣侯爵桓王元年隠四年衛人殺州吁逆公子晋于邢二年五年曲沃以鄭人邢人伐翼恵王十五年莊三十二年狄伐邢十六年閔元年齊人救邢遷邢于夷儀明年齊師宋師曹師城邢襄王八年僖十六年邢侯㑹諸侯于淮十年十八年邢人狄人伐衛圍莵圃十一年十九年衛伐邢邢無道明年齊人狄人盟于邢謀衛難十七年二十五年衛滅邢殺邢侯國子左傳祭祭地未詳伯爵祭公祭公謀父見西周傳平王時祭伯為周卿士平王四十九年隠元年祭伯如魯桓王十六年桓八年祭伯如魯逆王后于紀恵王六年莊二十三年祭叔如魯聘榖梁作祭公左傳鄭别有祭杜預注陳留長垣縣東北有祭城蔣茅胙蔣杜預注弋陽期思縣茅杜預注髙平昌邑縣西有茅鄉胙杜預注東郡燕縣西南有胙亭始終並無所見邶鄘邶鄘朱熹注在冀州商紂所都武王克商分自紂城朝歌而北謂之邶南謂之鄘邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監漢書隨隨漢東姬姓國杜預注南陽隨縣桓王十四年楚伐隨使薳章求成于瑕以待之瑕隨地隨人使少師董成鬭伯比曰漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益季梁隨賢臣鬭伯比曰以為後圖少師得其君楚毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大滛所謂道忠于民而信于神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也隨侯曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也聖王先成民而後致力于神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也瘯蠡皮毛疥癬也謂其備腯咸有也奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉徳而無違心也所謂馨香無䜛慝也故務其三時修其五教親其九族以致其禋祀于是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑脩政而親兄弟之國庶免于難隨侯懼而脩政楚不敢伐十六年八年少師有寵鬭伯此曰可矣讐有釁不可失也夏楚子合諸侯于沈鹿黄隨不㑹楚子伐隨軍于漢淮之間季梁請下之弗許而後戰所以怒我而怠宼也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人尚左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃擕矣少師曰不當王非敵也弗從戰于速杞隨地隨師敗績隨侯逸鬬丹獲其戎車與其戎右少師隨及楚平楚子將不許鬬伯比曰天去其疾矣謂少師見獲而死隨未可克也乃盟而還莊王七年莊四年楚子伐隨卒于樠木之下鬬祈屈重除道梁溠溠水名時秘王䘮故為竒兵開道梁水營軍臨隨隨人懼行成鬬祈以王命入盟隨侯且請為㑹于漢汭而還襄王十二年僖二十年隨以漢東諸侯叛楚冬楚伐隨取成而還敬王十四年定四年呉入郢楚子奔隨呉人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰于楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之惠也漢陽之田君實有之隨人卜與之不吉乃辭吳曰以隨之辟小而宻邇于楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聼命吳人乃退二十六年哀元年隨侯及諸侯圍蔡左傳杜預注隨世服于楚不通中國及免昭王楚人徳之使列于諸侯故得見經隨後事無攷滑滑姬姓國都費杜預注河南緱氏縣伯爵僖王四年莊十六年滑伯及諸侯同盟于幽襄王十二年僖二十年滑人叛鄭而服于衛鄭人入滑滑聼命師還又即衛十六年二十四年鄭伐滑二十五年三十三年秦將襲鄭鄭有備滅滑而還左傳息息姬姓國杜預注汝南新息縣侯爵桓王八年隐十一年鄭息有違言息侯伐鄭鄭戰于竟息師大敗而還蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使謂楚子曰伐我吾求救于蔡而伐之莊王十三年莊十年楚敗蔡師以蔡侯歸僖王二年十四年蔡侯繩息媯以語楚子繩譽也楚子如息以食入享遂滅息以息媯歸左傳榮榮姬姓國榮地無攷榮伯事成王孔氏書傳周同姓諸侯為卿大夫成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命書序其後為榮夷公韋昭注榮國名夷謚好利厲王近之芮良夫諌不聼卒以榮公為卿士既而諸侯不享流王于彘國語襄王時有榮叔襄王二十九年文四年魯成風卒王使榮叔如魯歸含且賵左傳芮彤芮杜預注馮翊臨晉縣伯爵芮伯為成王司徒彤伯為宗伯彤地無攷其後世無所見同受顧命立康王孔氏書傳芮伯之後為芮良夫見西周傳桓王時有芮伯萬桓王十一年桓王年芮伯萬之母芮姜惡芮伯多寵人逐之出居于魏芮更立君十二年四年秦師侵芮敗焉冬王師秦師圍魏執芮伯萬以歸將納萬以困芮十七年九年芮伯及諸侯伐曲沃明年秦納芮伯萬于芮左傳魏駘岐魏姬姓國杜預注河東河北縣駘杜預注始平武功縣所治釐城岐杜預注扶風羙陽縣西北及魏芮畢並在西土夏世以后稷功受此五國為西土之長惠王十六年閔元年晉滅魏賜畢萬左傳駘岐後世無所見隗楊隗楊地未詳並姬姓國史伯曰當成周者西有晉隗霍楊魏芮國語耿耿姬姓國杜預注平陽皮氏縣東南有耿鄉惠王十六年閔元年晉滅耿賜趙夙左傳宻宻姬姓國韋昭注安定陰宻縣近涇宻康公事㳟王㳟王游于涇上宻康公從有三女奔之其母曰必致之于王夫獸三為羣人三為衆女三為粲王田不取羣公行下衆禮國君下卿位遇衆則式王御不參一族一族一父子也夫粲羙之物也衆以羙物歸女而何徳以堪之王猶不堪况爾小醜小醜備物終必亡康公弗獻一年王㓕密國語按齊桓公取宻姬生懿公豈㳟王滅宻而未絶其祀歟又莒有宻邑城陽淳于縣東北有宻鄉荀賈梁荀侯爵賈伯爵荀賈地未詳梁伯爵杜預注馮翊夏陽縣嬴氏國荀賈莫詳其氏及始封桓王十七年桓九年荀侯賈伯梁伯及虢仲芮伯伐曲沃惠王二十三年僖六年晉公子夷吾奔梁梁伯妻之梁嬴孕過期卜招父梁太卜與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男為圉女為妾襄王十年十八年梁伯益其國而不能實也無民以處之命曰新里秦取之梁伯好土功亟城而弗處民罷而弗堪則曰某㓂將至乃溝公宫曰秦將襲我民懼而潰十一年十九年秦取梁梁亡左傳荀賈後事無攷鄧巴鄧杜預注潁川召陵縣西南有鄧城漢志南陽鄧縣侯爵曼姓韋昭注巴杜預注巴郡江州縣子爵桓王十年桓二年蔡侯鄧伯㑹于鄭始懼楚十五年七年鄧侯吾離如魯朝十七年九年巴子使韓服告于楚請與鄧為好楚子使道朔大夫將韓服聘于鄧鄧南鄙鄾人攻而奪之幣殺朔及服楚讓于鄧鄧人弗受夏楚國亷帥師及巴師圍鄾鄧大夫養甥􅆅甥救鄾三逐巴師不克鬬亷横衝其師于巴師之中而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰莊王九年莊六年楚子與巴人伐申過鄧鄧祁侯祁謚曰吾甥也止而享之騅甥􅆅甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從是年楚子伐鄧僖王四年十六年楚復伐鄧􅌍之初楚與巴人伐申也驚巴師巴人叛楚而伐那處取之遂門于楚楚閻敖游涌而逸楚子殺之惠王元年十八年閻敖之族為亂巴人因之以伐楚大敗楚師于津匡王二年文十六年巴人及楚人秦人􅌍庸敬王四十三年哀十八年巴人伐楚圍鄾楚敗之于鄾左傳後事不載胡沈胡杜預注汝隂縣西北有胡城沈杜預注汝南平與縣北有沈亭並楚屬國子爵襄王二十八年文三年晉㑹諸侯伐沈沈潰以沈服楚也靈王二十六年襄二十七年晉楚弭兵盟于宋諸侯請交相見明年胡子沈子朝于晉景王七年昭四年胡子沈子㑹楚子于申秋㑹伐呉遂􅌍頼八年五年沈子㑹楚子伐呉十四年十一年楚􅌍蔡遷胡沈于荆十六年十三年楚平王即位復胡沈敬王元年二十三年呉伐州來楚以諸侯之師救州來戰于雞父吳獲胡子髠沈子逞十四年定四年胡子豹㑹周劉子諸侯于召陵侵楚沈人不㑹晉使蔡伐之夏蔡􅌍沈吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子又不事楚曰存亡有命事楚何為多取費焉二十五年十五年楚􅌍胡以胡子豹歸左傳頓頓杜預注汝南南頓縣楚屬國子爵靈王三年襄四年楚人使頓間陳而侵伐之冬陳人侵頓景王七年昭四年頓子㑹楚子于申秋㑹楚伐吳遂􅌍賴八年五年頓子㑹楚伐呉敬王元年二十三年呉伐州來楚以諸侯之師救州來呉敗頓胡沈蔡陳許之師于雞父十四年定四年頓子㑹周劉子諸侯于召陵侵楚頓子牂欲事晉背楚而絶陳好二十四年十四年楚師陳師􅌍頓以頓子牂歸左傳江黄黄杜預注汝南戈陽縣嬴姓國江杜預注汝南安陽縣楚與國桓王十六年桓八年楚子合諸侯于沈鹿楚地黄隨不㑹楚讓黄伐隨惠王二年莊十九年巴人大敗楚師于津楚子還隨伐黄敗黄師于踖陵十九年僖二年江黄服于齊江人黄人及齊侯宋公盟于貫二十年三年江人黄人㑹齊侯宋公于陽榖二十一年四年江人黄人及魯伐陳襄王三年十一年黄人不歸楚貢楚人伐黄黄人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我四年十二年楚􅌍黄二十八年文三年楚圍江晉伐楚以救江明年楚􅌍江齊别有黄莊王二年桓十七年魯侯㑹齊侯紀侯盟于黄注黄齊地左傳羅鄖貳軫絞州蓼羅熊姓國杜預注宜城縣西山中後徙南郡枝江縣漢志注楚文王徙羅子自枝江居長沙國羅縣鄖杜預注江夏雲社縣東南有鄖城貳軫絞地並未詳州杜預注南郡華容縣東南蓼杜預注義陽棘陽縣東南湖陽城七國皆近楚桓王十九年桓十一年楚將盟貳軫鄖人軍于蒲騷鄖邑將與隨絞州蓼伐楚師楚敗鄖師于蒲騷卒盟而還二十年十二年楚伐絞軍其南門大敗之為城下之盟而還楚伐絞之師分渉于彭水名羅人欲伐之使伯嘉諜之三廵數之明年楚伐羅羅與盧戎兩軍之大敗之定王六年宣八年楚􅌍蓼左傳他國後事無所見州别有國州公如曹者是為淳于公蓼别有國臯陶之後近楚之蓼音了臯陶之蓼音陸並别見䕫頼權越䕫熊姓國杜預注建平秭歸縣楚之别封也䕫子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于䕫吾是以失楚又何祀焉襄王十八年僖二十六年楚􅌍䕫以䕫子歸賴亦近楚國地未詳景王七年昭四年楚以諸侯伐呉遂􅌍賴賴子面縛衘璧士􅃝輿櫬從之造于中軍楚子親釋其縛受其璧焚其櫬遷賴于鄢權亦近楚國杜預注南郡當陽縣東南有權城楚武王克之以為邑後遷權于那處左傳越亦􅇗姓之别國韋昭注史伯曰􅇗姓䕫越不足命是也國語舒庸舒鳩舒庸宗巢舒杜預注廬江舒縣庸杜預注上庸縣舒鳩舒庸地並未詳皆偃姓宗地未詳巢杜預注廬江六縣東有居巢城亦羣舒之屬皆楚屬國也惠王二十年僖三年徐人取舒頃王四年文十二年羣舒叛楚楚執舒子平及宗子遂圍巢六年十四年楚莊王即位成嘉將襲羣舒使鬬克公子燮守而伐舒及蓼鬬克作亂而罷匡王二年十六年庸人帥羣蠻以叛楚麇人亦將伐楚于是申息之北門不起楚人謀徙于阪髙蒍賈曰不如伐庸于是使廬戢黎侵庸及庸方城庸人逐之囚子楊窓戢黎官屬楚又與之遇七遇皆北唯禆鯈魚人實逐之庸三邑庸人曰楚不足與戰矣遂不設備楚子分為二隊以伐庸遂􅌍庸定王六年宣八年楚以舒叛故伐舒􅌍之舒庸人以楚師之敗于鄢陵也簡王十二年成十七年道吳人圍巢伐駕圍釐虺杜預注楚四邑葢文十二年楚執舒子平之役遂􅌍宗巢而為邑遂恃吳而不設備楚襲舒庸􅌍之靈王二十三年襄二十四年呉召舒鳩人舒鳩人叛楚楚子師于荒浦使讓之舒鳩子敬逆楚使而告無之且請受盟乃還二十四年二十五年舒鳩人卒叛楚伐之及離城舒鳩城吳人救之楚敗吳師遂圍舒鳩舒鳩潰滅舒鳩敬王十二年定二年吳使舒鳩氏誘楚以師伐吳吳潛師于巢軍楚師于豫章敗之遂圍巢克之左傳唐唐杜預注義陽安昌縣東南有上唐鄉漢志南陽舂陵縣姬姓韋昭注侯爵定王時有唐惠侯定王十年宣十二年惠侯為楚左拒以從晉上軍敗晉師于邲惠侯之後曰唐成公敬王時成公如楚朝有兩肅爽馬楚令尹囊瓦欲之弗與三年止之敬王十三年定三年唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之囊瓦囊瓦歸唐侯竊馬者自拘于司敗曰君以弄馬之故隐君身棄國家羣臣請相夫人以賞馬必如之唐侯曰寡人之過也二三子無辱皆賞之明年唐侯及吳子蔡侯伐楚遂入郢十五年五年秦師救楚敗呉師秋滅唐左傳弦道栢弦杜預注弋陽軼縣東南子爵道杜預注汝南安陽縣南栢杜預注汝南西平縣有栢亭及江黄皆弦姻也江黄道栢方睦于齊弦子恃之而不事楚又不設備惠王二十二年僖五年楚滅弦弦子奔黄楚靈王之滅蔡也遷道于荆平王即位乃復之左傳栢事無所見申房申杜預注在方城内姜姓宣王之舅出封于謝尹吉甫作詩以送之詩序幽王亦娶于申生太子宜臼幽王廢申后詘太子申侯與犬戎殺幽王驪山下而立宜臼史記房杜預注汝南吳防縣即房國近楚國莊王九年莊六年楚伐申其後遂滅之以為邑楚靈王又遷申房于荆平王即位皆復之左傳麇桐麇地未詳楚屬國頃王二年文十年楚子㑹諸侯于厥貊麇子逃歸明年楚子伐麇敗麇師于汸渚潘崇復伐麇至穴錫汸渚穴錫並麇地匡王二年十六年楚大饑戎伐楚庸亦叛楚麇人帥百獛聚于選將伐楚楚出師伐庸麇及百濮乃罷桐亦楚屬國杜預注廬江舒縣西南有桐鄉敬王十二年定二年桐叛楚左傳後事並無所見厲英氏鄀厲杜預注義陽隨縣北有厲鄉英氏地未詳鄀杜預注本在商宻後遷南郡鄀縣皆楚與國也襄王七年僖十五年楚伐徐齊師曹師伐厲以救徐楚敗徐于婁林明年齊復伐厲不克救徐而還九年十七年齊人徐人伐英氏報婁林之役鄀秦楚界上小國十七年二十五年秦晉伐鄀楚以申息之師戍商宻都别邑商宻降秦其後鄀叛楚即秦又貳于楚三十年文五年秦人入鄀左傳崇黎崇地未詳秦與國匡王五年宣元年晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬晉侵崇秦弗與成黎杜預注上黨壺闗縣有黎亭漢志東郡黎縣注黎侯國侯爵赤狄潞子奪黎氏地定王十三年宣十五年晉滅潞畧狄土立黎侯而還左傳蘇温陽蘇忿生為武王司宼封蘇國書傳温杜預注河内温縣亦司宼蘇忿生之後桓王八年隐十一年王取鄔劉蒍邘之田于鄭杜預注河南緱氏縣西南有鄔聚西北有劉亭蒍邘鄭二邑而與鄭人蘇忿生之田温原絺樊隰郕攅茅向盟州陘隤懷杜預注源沁水縣西絺野王縣西南樊名陽樊野王縣西南有陽城隰郕懐縣西南攢茅修武縣北向軹縣西有地名向上盟盟津州州縣陘闕隤修武縣北懐懐縣惠王二年莊十九年蘓子奉王子頽伐周不克出奔温蘇子叛周即狄又不能于狄襄王二年僖十年狄滅温陽杜預注東海都陽縣近齊國惠王十七年閔二年齊人遷陽葢偪左徙之傳晉别有陽河外邑州榖檀州杜預注都淳于城陽淳于縣公名實是為淳于公桓王十三年桓五年州公如曹明年春州公自曹如魯朝度其國危遂不復其國榖杜預注南陽筑陽縣北伯名綏桓王十五年桓七年榖伯如魯朝檀地未詳伯名逹封于河左傳榖檀後事無所見極鄟項邿於餘丘牟葛極鄟地並未詳魯附庸國項杜預注汝南項縣邿杜預注任城亢父縣有邿亭於餘丘地未詳皆小國也平王五十年隐二年魯無駭帥師入極莊王五年莊二年魯公子慶父帥師伐於餘丘襄王九年僖十七年魯滅項簡王元年成六年魯取鄟靈王十二年襄十三年魯取邿牟杜預注泰山牟縣葛杜預注梁國寜陵縣東北並魯附庸國桓王二十三年桓十五年牟人葛人如魯朝惠王二十二年僖五年魯公孫兹聘于牟因娶焉左傳蕭彰蕭杜預注沛郡蕭縣宋附庸國彰杜預注東平無塩縣東北有彰城紀附庸國也惠王六年莊二十三年蕭叔朝魯侯于榖襄王二十二年僖三十年介人侵蕭定王十年宣十二年楚伐蕭蕭人囚熊相宜僚及公子丙楚子曰勿殺吾退蕭人殺之楚子怒圍蕭蕭潰遂􅌍蕭襄十年楚鄭圍蕭注宋邑葢楚􅌍蕭而不能有其地宋遂以為邑也惠王十三年莊三十年齊人降鄣杜預注小國孤危不能自固也左傳夷戴譚夷杜預注城陽莊武縣小國平王四十九年隐元年紀人伐夷戴杜預注陳留外黄縣東南戴城戴音再小國桓王七年隐十年宋衛入鄭蔡人從之伐戴鄭圍戴克之取三師譚杜預注濟南平陵縣西南亦小國齊桓公之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至莊王十三年莊十年齊􅌍譚周别有夷僖王四年莊十六年晉伐夷執夷詭諸注夷采地左傳中山中山鮑彪注漢為國有盧奴北平北新城唐深澤苦陘安國曲逆望都新城不知其所出與始封威烈王十八年魏文侯欲殘中山國䇿有魏伐中山假道于趙事葢即此也當魏文侯十七年是威烈王十八年常談莊趙人謂趙桓子曰魏并中山是無趙矣公何不請公子傾魏君女以為正妻因封之中山是中山復立也中山君饗都士大夫司馬子期在焉羊羮不遍子期怒而走于楚説楚伐中山中山君亡有二人􅀢戈而隨其後者中山君顧謂二人子奚為者也二人對曰臣有父嘗饑且死君下壺飱臣父臣父且死曰中山有事汝必死之故來死君也中山君喟然歎曰與不期衆少其于當厄怨不期淺深其于傷心吾以一杯羊羮亡國以一壺飱得士二人犀首立五王秦韓燕宋中山而中山後持立之後復疑持猶疑齊謂趙魏曰寡人羞與中山並為王願與大國伐之以廢其王中山聞之召張登而告之登曰君為臣多車重幣臣請見田嬰中山君遣之齊見嬰子曰臣聞君欲廢中山之王與趙魏伐之過矣中山恐必為趙魏廢其王而務附焉是為趙魏驅羊也非齊之利也豈若中山廢其王而事齊哉田嬰曰奈何張登曰今君召中山與之遇而許之王中山必喜而絶趙魏趙魏怒而攻中山中山必恐為君廢王事齊是君廢其王而立其國賢于為趙魏驅羊也田嬰曰諾張丑曰不可臣聞之同欲者相憎同憂者相親今五國相王也負海齊也不與焉是欲皆在為王而憂在負海今召中山與之遇而許之王是奪四國而益負海致中山而塞四國四國寒心必先與之王而故親之是君臨中山而失四國也且張登之為人善以㣲計薦中山之君難信以為利田嬰不聼果召中山君而許之王張登因謂趙魏曰齊欲伐河東何以知之齊羞與中山並為甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果與中山王而親之中山果絶齊而從趙魏或又曰齊閉闗不通中山之言其言曰我萬乘之國也中山百乘之國也何侔名于我欲割平邑以賂燕趙出兵以攻中山藍諸君中山相患之張登曰請令燕趙固輔中山而成其王事遂定公欲之乎藍諸君曰此所欲也曰請以公為齊王閔王而登試説公藍諸君曰願聞其説登曰王之所以不憚割地以賂燕趙出兵以攻中山者其實欲廢中山之王也王曰然然則王之為費且危夫割地以賂燕趙是强敵也出兵以攻中山首難也王行二者所求未必得如用臣之道地不虧而兵不用中山可廢也王必曰子之道奈何藍諸君曰然則子之道奈何張登曰王𤼵重使使告中山曰寡人之所以閉闗不通使者為中山之獨與燕趙為王而寡人不與聞王茍舉玉趾以見寡人請亦佐君中山恐燕趙之不已據也今齊之辭云必遁燕趙與王相見燕趙聞之必怒絶之王亦絶之是中山孤孤何得無廢以此説齊齊王聼乎藍諸君曰是則必聽矣此所以廢之何在其所以存之張登曰此王所以存者也齊以是辭來因言告燕趙而無往以積厚于燕趙燕趙必曰齊之欲割平邑以賂我者非廢中山之王徒欲離我于中山而已親之也雖百平邑燕趙必不受也藍諸君曰善遣張登往燕趙果輔中山而王事遂定趙主父欲伐中山使李疵觀之李疵曰可伐也中山之君所傾葢與車者而朝窮閭隘巷之士者七十家主父曰是賢君也安可伐李疵曰不然舉士則民務名不存本朝賢則耕者惰而戰士懦若此不亡者未之有也國䇿國䇿又曰司馬喜使趙為己求相中山公孫𢎞隂知之中山君出司馬喜御公孫𢎞參乘𢎞曰為人臣招大國之威以為己求相于君何如君曰吾食其肉不以分人司馬喜頓首于軾曰臣自知死至矣君曰何也曰扺罪君曰行吾知之矣居頃之趙使來為司馬喜求相中山君大疑公孫𢎞𢎞走出國䇿司馬喜三相中山中山君之姬隂簡難之田簡謂司馬喜曰趙使者來屬耳獨不可語隂簡之美乎趙必請之君與之即公無内難矣君弗與因勸君立之以為正妻隂簡之徳公無窮矣果令趙請之君弗與司馬喜曰君弗與趙趙必大怒大怒則君必危矣然則立以為妻固無請人之妻不徳而怨人者也䇿又作隂姬與江姬爭為后事同而説少異不再録徐鍾吾徐嬴姓杜預注下邳僮縣東南漢志臨淮徐縣即淮夷也成王伐淮夷書序徐即淮夷宣王亦命方叔伐淮夷詩徐方既同是也惠王九年莊二十六年魯宋齊伐徐徐後附齊二十年僖三年徐人取舒楚與國襄王七年十五年楚伐徐諸侯之大夫救齊冬楚人敗徐于婁林九年十七年齊人徐人伐英氏報婁林之役三十二年文七年徐伐莒簡王三年成八年巫臣通呉于晉使伐齊徐遂嘗附吳景王七年昭四年楚子合諸侯于申執徐子以徐子呉出而貳于吳也明年楚子以諸侯及徐人伐呉九年六年徐大夫儀楚聘于楚楚執之道歸楚伐徐吳人救之十五年十二年楚子伐徐十九年十六年齊侯伐齊徐行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父之鼎二十二年十九年邾人郳人徐人㑹宋公同盟于蟲敬王五年二十七年吳光弑王僚公子掩餘奔徐公子燭庸奔鍾吾鍾吾地未詳小國也八年三十年呉使徐人執掩餘使鍾吾人執燭庸二公子奔楚吳子怒執鍾吾子遂伐徐防山以水之滅徐徐子章禹斷其髪擕其夫人以逆吳子呉子唁而送之使其邇臣從之遂奔楚楚救徐弗及遂城夷使徐子處之左傳成周北别有徐赤狄也見後萊萊姜姓杜預注東萊黄縣東夷小國定王五年宣七年齊魯㑹伐萊靈王元年襄二年齊侯伐萊萊人使大夫正輿子賂夙沙衛以索牛馬索簡擇好者皆百匹齊師乃還左傳介根牟介杜預注城陽黔陬縣根牟杜預注琅琊陽都東有牟鄉並東夷國襄王二十一年僖二十九年介葛盧如魯朝魯侯在㑹舍于昌衍之上饋之芻米冬介葛盧以未見魯侯復如魯朝介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信定王七年宣九年魯取根牟左傳蜀羗髳㣲彭濮奄濮姑肅慎蜀羗孔安國注在西蜀髳㣲孔安國注在巴蜀彭孔安國注在西北濮孔安國注在江漢之南杜預注建寜郡南有濮夷皆四方小國也武王伐商及庸蜀羗髳㣲盧彭濮人至牧野作牧誓尚書庸上庸盧盧戎並别見奄嬴姓康成注在淮夷之北括地志兖洲曲阜縣奄至即奄國之地蒲姑漢志在琅琊姑幕杜預注樂安博昌縣北有蒲姑城肅慎杜預注𤣥莵北三十里並夷國也成王時淮夷及奄叛成王東伐殘奄作奄薄姑薄姑即蒲姑按史記成王殘奄遷其君薄姑是薄姑為奄君後遷之地成王既伐東夷肅慎來賀王賜榮伯作賄肅慎之命書序左傳景王曰蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也鄋瞞鄋瞞漆姓地未詳長狄國在夏為防風氏殷為汪芒氏頃王三年文十一年鄋瞞侵齊遂伐魯魯敗狄于鹹獲長狄僑如殺之埋其首于子駒之門初宋武公之世鄋瞞侵宋宋敗狄于長丘獲長狄縁斯僑如之先齊襄公之二年桓十六年鄋瞞伐齊齊獲榮如埋其首于周首之北門衛人獲簡如晉之滅潞也獲焚如宣十五年鄋瞞由是遂亡左傳焚如僑如之弟榮如焚如之弟簡如其季弟以魯年推之僑如焚如葢皆百有餘嵗白狄白狄杜預注故西河郡有白部狄國語當成周者北有翟鮮虞狄别種襄王二十五年僖三十三年狄伐晉晉敗狄于箕獲白狄子定王六年宣八年白狄及晉平㑹晉伐秦簡王四年成九年秦人白狄伐晉靈王十七年襄十八年白狄如魯二十七年二十八年白狄朝于晉傳曰宋之盟故是白狄亦嘗與宋之盟左傳肥鮮虞鼓肥杜預注鉅鹿下曲陽縣西南有肥累城白狄國都昔陽左傳沾杜預注樂平縣東有昔陽城鮮虞杜預注中山新市縣姬姓之在狄者韋昭注鼓杜預注鉅鹿下曲陽縣有鼓聚白狄别種景王十五年昭十二年晉假道于鮮虞遂入昔陽滅肥以肥子緜臯歸漢志注肥子奔燕燕封之于肥如屬遼西郡明年晉以甲車四千乗合諸侯于平丘鮮虞聞晉師之悉起也而不警邉且不脩備晉侵鮮虞及中人杜預注中山望都縣西北有中人城驅衝競驅衝車與狄爭逐大獲而歸十八年十五年晉伐鮮虞圍鼓克之以鼓子鳶鞮歸國語作宛支既獻而反之二十四年二十一年鼓叛晉屬鮮虞明年晉襲鼓滅之以鼓子鳶鞮歸左傳令鼓人各復其所非寮勿從鼓子之臣曰夙沙釐以其孥行軍吏執之辭曰我君是事非事土也名曰君臣豈曰土臣今君是遷臣何賴于鼓晉荀呉召之曰鼓有君矣爾止事君呉定爾禄爵對曰臣委質于翟之鼓未委質于晉之鼓也臣聞之委質為臣無有貳心委質而䇿死古之法也君有烈名臣無畔質敢即私刑以煩司宼而亂舊法其若不虞何荀吳言于頃公與鼓子田于河隂使夙沙釐相之國語敬王十三年定三年鮮虞人敗晉師于平中獲晉觀虎明年晉伐鮮虞又明年晉圍鮮虞晉范中行氏叛二十六年哀元年鮮虞伐晉救范氏取棘蒲二十八年三年晉荀寅奔鮮虞齊㑹鮮虞納荀寅于栢人三十一年六年晉趙鞅伐鮮虞左傳潞洛泉徐蒲臯落氏潞杜預注上黨潞縣隗姓韋昭注赤狄别種子爵潞子嬰兒之夫人晉景公之姊也潞相鄷舒為政而殺之又傷潞子之目定王十三年宣十五年晉侯將伐之諸大夫不可伯宗曰必伐之狄有五罪不祀一也耆酒二也棄仲章潞賢人而奪黎氏地三也虐我伯姬四也傷其君目五也晉侯從之敗赤狄于曲梁滅潞鄷舒奔衛衛人歸諸晉晉人殺之左傳洛泉徐蒲並赤狄隗姓史伯曰當成周者北有路洛泉徐蒲國語又有臯落氏亦赤狄别種惠王十七年閔二年晉獻公使大子申生伐東山臯落氏左傳戎戎杜預注陳留濟陽縣東南有戎城氐羗别種平王五十年隐二年魯侯㑹戎于潛戎請盟魯辭戎朝于周凡伯弗賓桓王四年七年王使凡伯聘魯還戎伐之于楚丘以歸十年桓二年魯侯及戎盟于唐惠王元年莊十八年戎侵魯魯追戎于濟西三年二十年齊人伐戎九年二十六年魯侯伐戎左傳蠻氏盧戎蠻氏杜預注河南新城縣東南有蠻城戎别種蠻氏亂又無質質信也楚聞之景王十九年昭十六年楚誘戎蠻子嘉殺子遂取蠻氏既而復立其子敬王二十九年哀四年楚圍蠻氏蠻氏潰蠻子赤奔晉隂地杜預注河南山北自上雒以東至陸渾楚師臨上雒請于晉晉士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聼卜遂執之與其五大夫以畀楚師于三户楚司馬偽致邑立宗以誘其遺民而盡俘以歸近楚又有盧戎南蠻也楚屈瑕伐羅羅與盧戎兩軍之是也左傳陸渾陸渾杜預注居秦晉西北之陸渾允姓戎襄王十四年僖二十二年秦晉遷陸渾之戎于伊川今遂為陸渾縣定王元年宣三年楚子伐陸渾之戎簡王元年成六年晉衛鄭及伊雒之戎陸渾蠻氏侵宋陸渾子貳于楚晉將伐之景王二十年昭十七年晉使如周請有事于雒與三塗雒雒水三塗山名在陸渾南偽請祭山川以龔陸渾秋晉師涉自棘津使祭史先用牲于雒陸渾人弗知師從之遂滅陸渾陸渾子奔楚伊雒舊有戎襄王三年僖十一年周王子帶召揚拒泉臯伊雒之戎同伐京師入王城焚東門秦晉伐戎以救周秋晉平戎于王明年齊使管夷吾平戎于王使隰朋平戎于晉左傳無終無終杜預注右北平無終縣山戎國子爵靈王三年襄四年無終子嘉父使孟樂如晉因魏絳納虎豹之皮以請和諸戎晉從之使魏綘和諸戎景王四年昭元年晉荀吳敗無終及羣狄于大原左傳氐氐西羗商頌自彼氐羗莫敢不來享莫敢不來王毛詩正義氐羗在秦隴之西前漢志隴西郡有氐道羗道二縣鬼方鬼方葢夷國名種與地未詳髙宗伐鬼方三年克之周易自上古迄戰國州土因革川流變移繁碎不足縷晰今援土訓之制用圖分畫俾鉤索如指掌有疑義異聞間疏厥源至如形勝阸塞攻守必争㑹盟所及亦綱舉之伏羲氏都陳炎帝都陳一曰曲阜黄帝都涿鹿在上谷言涿郡者誤少昊都曲阜高陽氏都帝邱髙辛氏都亳堯都平陽舜都蒲坡夏都安邑雞頭山括地志云一名空同山在原州平陽縣西輿地志云空同或即雞頭山酈道元云大隴山異名按雞頭山狀如雉頭故名亦在原州非空同隴山在華亭亦非雞頭也厯山雷澤括地志云蒲州河東縣雷首山一名中條山亦名厯山雷澤在濮州雷澤縣今兖州亦有厯山雷澤因漁澤而得名其上有舜廟蒲州近是舜南撫交阯北發索隠北發當云北户西戎析枝渠廋氐羌北山戎發息慎東長島夷四海之内咸戴帝舜之功按此文北發之北是西字之訛息慎上發字當移山戎之上當云南撫交阯西發西戎析枝渠廋氐羗北發山戎息慎東長島夷索隠説誤鳴條孔安國云在安邑之西鄭𤣥云南夷地名括地志以為廬州樂縣有巢湖即南巢淮南子曰桀與姝喜同舟浮江奔南巢之山而死太昊塟陳宛邱皇甫謐曰在南郡或曰在山陽高平之西女媧塟晉趙城炎帝塟長沙黄帝塟橋山地理志曰在上郡同陽縣括地志曰在寧州羅川縣東子午山顓頊塟頓邱皇覽曰在東郡濮陽頓邱廣陽里山海經曰塟鮒魚山之陽九嬪塟其隂在澶州或曰塟高陽高辛葬頓邱皇覽曰在頓邱臺隂野或曰塟郃陽古莘國也又曰塟滑堯塟城陽榖林皇覽曰在濟隂劉向曰在濟隂邱隴山舜塟九疑皇覽曰在零陵營浦縣禹塟㑹稽湯塟汾隂皇覽曰在汾隂亳縣北東郭吉州九河爾雅曰徒駭太史馬頰覆鬴胡蘇簡潔鉤盤鬲津及河之經流也自漢以來求九河者多云在徳州滄州臨津樂陵無棣之間班固則以滹沱為徒駭或不知一為河之經流分簡潔為二唯宋程氏以為滄州北與平州接境相去五百餘里禹之九河當在其地後為海水淪沒故迹不存又經言夾右碣石則九河入海之處有碣石在其西北今兖冀之地無此石而平州正南有碣石尚在海中九河已淪入海明矣漢司空掾王璜言天常連北風海水溢西南出浸數百里酈道元亦云碣石入海信而有徵是九河之地亦為海水所漸矣濟水漯水濟水發源王屋山至温縣入河復溢出為滎東北㑹汶入海程氏以為溢出者適㑹河溢非濟水因濟而溢故還以元名命之蔡氏以為濟水性下勁疾伏流絶河按水經濟水自温縣東南流當鞏縣北入河至滎陽縣北東出至甲下邑復入河而後入海酈注引山海經曰濟水絶鉅野注勃海入濟琅槐東北又東北而河水枝津注之經以為入河非是乃河入濟非濟入河也漯水蔡氏以為未詳所在地志曰出東郡東武陽至千乘入海程氏以為此漢河與漯殊異按水經漯水徑清河縣故城北至高唐河水注之過千乘徑楊墟縣東商河水出焉而商河東北流注於海郭景純曰濟自滎陽至樂安博昌入海今河竭濟水仍流不絶經言入河二説並失河於濟漯之北别流注海今所輟流者惟漯水耳按二説是濟水未嘗復入河而漯水為商河所奪其流中絶故不知所在也黒水地志出犍為郡南廣州汾闗山水經出張掖雞山南至燉煌過三危山南入南海唐樊綽云麗水古之黒水程氏曰麗水狹小不足為界西珥河與漢志葉榆水相貫其流正趨南海漢開滇嶲其地有古黒水祠是西珥河為黒水也雲夢澤名方八九百里跨江南北華容枝江江夏安陸皆其地也契始封商至湯八遷始居西亳仲丁遷嚻河亶甲居相祖乙居邢又曰居耿盤庚遷河南復居亳爾雅九州郭注云盖殷制也以禹貢較無青梁而有幽營以周職方較無青并而有徐營損益夏周之間故曰殷制也五嶽周官九鎮不言五嶽曰東南揚州其山鎮㑹稽正南荆州其山鎮衡山河南豫州其山鎮華山正東青州其山鎮沂山河東兖州其山鎮岱山正西雍州其山鎮嶽山東北幽州其山鎮醫無閭河内冀州其山鎮霍山正北并州其山鎮恒山所謂霍山者為霍太山地里志云太嶽在河東縣彘東名霍太山是也爾雅則専舉五嶽而言曰河南華河西嶽河東岱河北恒江南衡其山皆同也至曰泰山為東嶽華山為西嶽霍山為南嶽恒山為北嶽嵩高為中嶽此所謂霍山者郭璞注云即天柱山潛水所出而又曰霍山本衡山一名霍山漢武帝以衡山遼曠移其神天柱邢疏云注所謂即天柱山潛水所出此據作注時為言其經之霍山即江南衡也按此是周官之霍山為霍太山爾雅之霍山為衡山也又爾雅之舉五嶽也初曰河南華河西嶽河東岱河北恒江南衡云者是以華山為中嶽盖西周都雍雍近華故以華為中嶽也繼又曰泰山為東嶽華山為西嶽霍山為南嶽恒山為北嶽嵩高為中嶽云者盖王城宅洛洛近嵩故以嵩高為中嶽也各從二京之所近以為之中以定四方非前後異文也金仁山曰按李氏心傳辨周禮五嶽謂周都豐鎬則華山乃中嶽嵩高不得為中嶽嵩高之為中嶽葢東遷之後也今以此説推之禹貢冀州有太嶽謂之霍太山則堯都冀州當以太嶽為中嶽爾雅河西嶽周禮雍州其山鎮嶽山即禹貢岍山又名吴嶽然則唐虞之際當以岍山為西嶽霍太山為中嶽而東岱南衡北恒爾按二説良是至李氏以嵩高為中嶽為東遷之後是斷爾雅不得為西周書或未必然也十藪周官有九曰東南揚州其澤藪具區正南荆州其澤藪雲夢河南豫州其澤藪圃田正東青州其澤藪望諸河東兖州其澤藪大野正西雍州其澤藪弦蒲正北幽州其澤藪貕養河内冀州其澤藪楊紆正北并州其澤藪昭餘祈爾雅十藪曰魯有大野晉有大陸秦有楊陓宋有孟諸楚有雲夢吴越之間有具區齊有海隅燕有昭余祈鄭有圃田周有焦䕶鄭𤣥於楊紆注云所在未聞於弦蒲注云在汧邢昺爾雅疏云地理志汧吴山古文以為汧山北有蒲谷鄉弦中谷雍州藪今注亦云在汧然則周禮弦蒲即此楊陓也此説非是按周官與爾雅之藪同者有七何獨於雍之弦蒲取冀之楊紆以名弦蒲乎且弦蒲即為楊陓周官不得云雍藪弦蒲又云冀藪楊紆也竊以幽州豯養推之豯養在徐賈公彦疏云周時幽州南侵徐州之地然則楊紆在冀雍州獨不可東侵冀州之地乎是秦之楊陓即周官冀之楊紆不得以弦蒲為楊陓也而雍之弦蒲在汧冀之楊紆則未知所在爾波溠廬維周官為豫兖之浸鄭注云波讀播按禹貢有波水無播又云廬當作雷即雷夏在城陽西維當作雍汳水至䝉為灉按禹貢有濰無盧盧水在濟陽郡盧縣如本文解亦得鄭注似曲秦居雍獻公徙櫟陽孝公始都咸陽楚都郢頃襄王徙陳考烈王徙夀春趙起晉陽獻侯治中牟敬侯始都邯鄲魏起安邑惠王始都大梁韓起平陽哀侯都鄭景侯徙陽翟衛都濮陽徙野王戰國之勢天下共苦秦秦踞建瓴之勝扼闗東之吭俯膺殽函布翅河隴藉足巫山黔中乘險負固莫之敢攖據上游故也是故燕潰國都齊失臨菑韓受圍雍氏破岸門趙急長平邯鄲魏覆馬陵伊闕楚亡漢中敗藍田國無不破戰無不北趙嘗與四國共攻秦秦破之修魚西周約諸侯將天下鋭兵西攻秦秦滅西周入九鼎自有秦以來未聞一矢加遺于秦城其明效也地勢實然又重以詐力張儀取西河收上庸而楚魏削司馬錯滅蜀而巫黔通甘茂拔宜陽而二周震范睢納逺交近攻之説釋齊事韓得尺有尺得寸有寸蠶食之漸寢以及廣兵力既强人心服屬故以一隅困天下而有餘及其欲得意盈魚肉黔首殽函之險未失百二之重故在而魚爛自中土崩于外且以天子抗匹夫而不足是又明地勢之不足恃也蘇秦説趙王曰請一韓魏齊楚燕趙六國從親以儐秦盟于洹水之上約曰秦攻楚齊魏各出鋭師以佐之韓絶食道趙渉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師以佐之趙渉河漳燕守雲中秦攻齊則楚絶其後韓守成皋魏塞午道宜州西䕫州東有山名子午嶺南北直相當北山是子南山是午共為子午道趙渉河漳博闗燕出鋭師以佐之秦攻燕則趙守常山楚軍武闗齊涉渤海韓魏出鋭師以佐之秦攻趙則韓軍宜陽楚軍武闗魏軍河外齊涉渤海燕出鋭師以佐之諸侯有倍約者五國共伐之秦必不敢出兵函谷闗以害山東矣班彪嘗論之曰從約者天下之心亦其勢也以天下之心行天下之勢如水就下孰能禦之其所不可者諸侯之心不一或見小利而相侵或修小怨而相伐或眩子名實為横人所恐喝使諸侯之智少靈于連雞則秦人自保之不給安能圖併吞之舉耶説殊是雖然父子天屬兄弟同氣或有時而疑諸侯反覆其不相保不待智者而知之矣當是時使韓守宜陽塞轘轅築伊闗扞緱氏楚封武闗備南鄭壁方城魏控皮氏窒汾隂蒲阪趙崇離石絶西河屯馬邑雁門燕扼雲中九原塹滹沱鄙林胡樓煩六國各嚴其圉西鄉而戒教養安集内紓其力禦詐以信破讒以忠杜傾危之口斥縱横之術誠能如是雖亡秦不足于以禁秦之帝為有餘矣尚史卷九十七
