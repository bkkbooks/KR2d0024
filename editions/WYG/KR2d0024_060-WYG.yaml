body:
  text: 尚史卷六十列傳三十八鑲白旗漢軍李鍇撰楚諸臣傳昭奚恤以下戰國昭奚恤宣王之相也宣王十六年魏攻趙邯鄲奚恤謂王曰王不如無救趙而以强魏魏强其割趙必深矣趙不能聼則必堅守是兩敝也奚恤與江乙相惡江乙魏人後仕楚為魏使于楚謂王曰臣入境聞楚之俗不蔽人之善不言人之惡誠有之乎王曰有之乙曰然則白公之亂得無遂乎誠如是臣等之罪免矣王曰何也乙曰州侯即奚恤也相楚貴甚矣而主斷左右俱曰無有如出一口矣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對乙對曰虎求百獸而食之得狐狐曰子無敢食我也天帝使我長百獸今子食我是逆天帝命也子以為不信吾先行子隨我後觀百獸之見我而敢不走乎虎以為然遂與之行獸見之皆走虎不知獸畏已而走也以為畏狐也今王之地方五千里帶甲百萬而専屬之昭奚恤故北方之畏奚恤其實畏王之甲兵也乙又謂王曰人有以其狗為有執而愛之其狗嘗溺井其鄰人見狗之溺井也欲入言之狗惡之當門而噬之鄰人憚之遂不得入言邯鄲之難楚進兵大梁取矣即魏攻趙邯鄲事昭奚恤取魏之寳器臣居魏知之故昭奚常惡臣之見王乙又謂王曰下比周則上危下分争則上安王亦知之乎且人有好揚人之善者于王何如王曰君子也近之乙曰有好揚人之惡者于王何如王曰小人也逺之乙曰然則且有子殺其父臣弑其主者而王終已不知者何也以王好聞人之美惡聞人之惡也王曰善寡人願兩聞之昭奚恤與彭城君未詳其人議于王前王召江乙而問焉乙曰二人之言皆善也臣不敢言其後此謂慮賢也謂賢者言善已復言之使王疑彼思慮之也江尹即江乙欲惡昭奚恤于王而力不能故為梁山陽君魏人請封于楚王曰諾奚恤曰山陽君無功于楚國不當封江尹因得山陽君與之共惡昭奚恤于王王告奚恤奚恤曰臣朝夕以事聼命而魏入吾君臣之間臣大懼臣非畏魏也夫泄吾君臣之交而天下信之是其為人也近苦矣此指江乙夫茍不難為之外豈忘為之内乎臣之得罪無日矣王曰寡人知之大夫何患郢人有獄三年不决者故令人請其宅以卜其罪客因請之奚恤曰郢人某氏之宅臣願之奚恤曰郢人某氏不當服罪故其宅不得客辭而去奚恤已而悔之謂客曰奚恤得事公公何為以故與奚恤故謂設事以探己意客曰非用故也曰請而不得有説色非故何也國䇿韓非子昭奚恤之用荆也有燒倉廥􅀢者而不知其人昭奚恤令吏執販茅者而問之果燒也新序秦欲伐楚使使往觀楚之寳器楚王召昭奚恤而問焉對曰此欲觀吾得失而圖之不在寳器奚恤為壇使客上位東面令尹子西南面太宗子敖次之葉公子髙次之司馬子反次之奚恤自居西面稱曰客欲觀楚之寳器楚之所寳者賢臣也令尹子西太宗子敖葉公子髙司馬子反昭奚恤在此唯大國之所觀此因王孫圉而傅㑹者子西子反不與奚恤同時也列女傳江乙之母當恭王時乙為郢大夫有入王宫中盜者令尹以罪乙無何其母亡布言于王曰妾夜亡布令尹盗之王謂母曰令尹信盗之寡人不為其富貴不行法若不盜而誣之楚有常法母曰令尹不身盗之使人盗之昔叔孫敖之為令尹也道不拾遺門不閉闗而盗賊自息今令尹耳目不明盗賊公行是故得盗妾之布與使人盗何以異也王曰令尹不知何罪母曰昔者妾之子為郢大夫有盗王宫中之物者妾子亦豈知之哉然終坐之令尹獨何人而不以為過也上不明則下不治相不賢則國不寧王其察之王曰善非徒譏令尹又譏寡人命吏償母之布因賜金千鎰母讓曰妾豈貪貨而失大王哉怨令尹之治也遂去不受王曰母智若此子必不愚乃復江乙而用之按江乙宣王時人恭王宣王逺祖説亦誤昭陽昭雎昭魚昭常昭過附昭鼠昭陽懐王之令尹也懐王六年使昭陽伐魏得八城移兵而攻齊陳軫説之曰戰無不勝而不知止者身且死爵且後歸昭陽以為然解軍而去十一年韓趙魏燕齊約以伐秦昭陽謂王曰五國已破秦必南圖王曰然則奈何對曰韓氏輔國也謂可輔楚好利而惡難好利可營也惡難可懼也我厚賂之以利其心必營我悉兵以臨之其心必懼彼懼吾兵而營我利五國之事必可敗也約絶之後雖勿與地可王曰善乃命大公事楚人之韓見公仲曰失牛闌之事未詳馬陵之難魏三十年齊破魏馬陵親主之所見也王茍無以五國用兵請効列城五請悉楚國之衆以圖于齊齊人反趙魏之後而楚果弗與地五國伐秦魏欲和使惠施之楚楚將入之秦而使行和杜赫為昭陽曰凡為伐秦者楚也今施以魏來而公入之秦是明楚之伐而信魏之和也公不如無聼惠施而隂使人以請聼秦昭陽曰善因謂惠施曰凡為攻秦者魏也今子從楚為和楚得其利魏受其怨子歸吾將使人因魏而和惠施反魏王不説杜赫謂昭陽曰魏為子先戰折兵之半謁病不聼請和不得魏折而入齊秦子何以救之東有越累北無晉而交未定于齊秦是楚孤也不如速和昭陽曰善因令人謁和于魏昭陽之後有昭睢昭過懐王時又有昭魚買五珥請立后事與孟嘗君同昭睢昭魚或是一人張儀復相秦謂昭睢曰楚無鄢郢漢中有所更得乎曰無有曰無昭過陳軫有所更得乎曰無所更得張儀曰為儀謂楚王逐昭過陳軫請復鄢郢漢中昭睢歸報懐王懐王説之有人謂昭過曰甚矣楚王不察于争名者也韓求相工陳藉而周不聼魏求相綦母恢而周不聼何也周曰是列縣畜我也今楚萬乘之强國也大王天下之賢王也今儀曰逐君與陳軫而王聼之是楚自待不如周而儀重于韓魏之王也且儀之所行有功名者秦也所欲富貴者魏也欲為攻于魏必南伐楚故攻有道外絶其交内逐其謀臣陳軫夏人也夏中國也習于三晉之事故逐之則楚無謀臣矣今君能用楚之衆故亦逐之則楚衆不用矣此所謂内攻之者也而王不知察今君何不見臣于王請為王使齊交不絶儀聞之其効鄢郢漢中必緩矣是昭睢之言不信也王必薄之王又令昭睢之秦重張儀未至惠王死武王逐張儀王因収昭睢以取齊收捕繫之也桓臧為睢謂王曰從親之不合也儀貴惠王而善睢也今惠王死武王立儀走公孫郝甘茂貴甘茂善魏公孫郝善韓二人固不善睢也必以秦合韓魏韓魏之重儀儀有秦而睢以楚重之今儀困秦而睢收楚韓魏欲得秦必善二人二人者將收韓魏輕儀而伐楚方城必危王不如復睢而重儀于韓魏儀據楚勢挾魏重以與秦争魏不合秦王亦不從則方城無患史記世家懐王二十年齊湣王欲為從長惡楚之與秦合使使遺楚王書曰寡人患楚之不察于尊名也今秦惠王死武王立張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善乎韓而公孫衍善乎魏楚必事秦韓魏恐必因二人求合于秦則燕趙亦宜事秦四國争事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以案兵息民令于天下莫敢不樂聼則王名成矣王率諸侯並伐破秦必矣王取武闗蜀漢之地私吳越之富而擅江海之利韓魏割上黨西薄函谷則楚之疆百萬也且王欺于張儀亡地漢中兵挫藍田天下莫不代王懐怒今乃欲先事秦願大王孰計之楚王業已欲和于秦見齊王書猶豫不决下其議羣臣羣臣或言和秦或曰聼齊昭睢曰王雖東取地于越不足以刷耻必且取地于秦而後足以刷耻王不如深善齊韓以重樗里疾如是則王得齊韓之重以求地矣秦破韓宜陽而韓猶復事秦者以先王墓在平陽而秦之武遂去之七十里以故尤畏秦不然秦攻三川趙攻上黨楚攻河外韓必亡楚之救韓不能使韓不亡然存韓者楚也韓以得武遂于秦以河山為塞所報徳莫如楚厚臣以為其事王必疾齊之所信于韓者以韓公子昧為齊相也韓以得武遂于秦王甚善之使之以齊韓重樗里疾疾得齊韓之重其主弗敢棄疾也今又益之以楚之重樗里子必言秦復與楚之侵地矣于是懐王許之竟不合秦而合齊以善韓國策無葢即桓臧為睢游説之辭而誤睢實黨儀右秦不如史記説二十八年秦齊韓魏共伐楚楚令昭睢將以距秦王欲擊秦昭睢不欲桓臧為昭睢謂王曰睢戰勝三國惡楚之强也恐秦之變而聼楚也必深攻楚以勁秦秦王怒于戰不勝必悉起而撃楚是王與秦相罷而以利三國也戰不勝秦秦進兵而攻不如益昭睢之兵令之示秦必戰秦王惡與楚相敝而令天下利秦可以少割而收害也秦楚合而燕趙魏不敢不聼三國可定也齊秦約攻楚楚令景翠以六城賂齊太子為質昭睢謂景翠曰秦恐且因景鯉蘇厲而効地于楚公出地以取齊鯉與厲且以収地取秦公事必敗韋昭注收前所効者葢二人之辭曰楚出地取齊楚既弱矣何足與地秦收所効必悦二人也公不如令王重賂景鯉蘇厲使入秦秦恐必不求地而合于楚若齊不求是公與約也韋昭注秦恐齊楚之合不收所効兩國各不取地而止攻是約者復何也與如與國之與按韋解誤愚謂賂六城質太子齊楚必合齊楚合而秦恐必因鯉厲反以地賂楚而求合是景翠出地以合齊不若鯉厲得地以合秦矣今使鯉厲以合齊疑秦秦恐雖不以地賂楚必不求地而合于楚楚不以城賂齊齊亦不求地而合于楚是翠坐收兩國之約也韋葢以秦恐必不求地之文遂誤解上文也秦術視伐楚楚令昭鼠以十萬軍漢中昭雎勝秦于重邱屬平原國䇿三十年秦昭王遺王書願與王㑹武闗面相約結盟而去王患之欲往恐見欺無往恐秦怒雎曰王母行發兵自守夫秦虎狼不可信有并諸侯之心王子子蘭勸王行於是往㑹秦至則閉武闗遂與西至咸陽王悔不用雎言秦因留王要以割巫黔中之郡楚大臣相與謀曰吾王在秦不得還而大子質于齊齊秦合謀則楚無國矣欲立懐王子在國者睢曰王與太子俱困于諸侯今又倍王命立庶子不宜乃詐赴于齊齊歸楚太子太子横至立為王是為頃襄王乃告于齊曰齊當是秦頼社稷神靈國有王矣史記世家史記世家楚欲齊韓連和伐秦因欲圖周周王赧使武公説昭睢于是計輟不行睢後有昭常為頃襄王司馬典主東地國䇿景舍景陽景鯉附景舍宣王時人宣王十六年魏攻趙邯鄲昭奚恤謂王曰不如無救趙而以强魏魏强其割趙必深矣趙不能聼則必堅守是兩敝也景舍曰不然昭奚恤不知也夫魏之攻趙也恐楚之攻其後也今不救趙趙有亡形而魏無楚憂是楚趙共魏也害必深矣何以兩敝也且魏令兵以割趙趙見亡形而有楚之不救己也必與魏合而以謀楚故王不如少出兵以為趙援趙恃楚勁必與魏戰魏怒于趙之勁而見楚救之不足畏也必不釋趙趙魏相敝而齊秦應楚則魏可破也楚因使舍起兵救趙邯鄲㧞楚取睢濊之間頃襄王時有景陽頃襄王二十七年齊韓魏共攻燕燕使太子請救于楚王使陽將而救之暮舍使左右司馬各營壁地已植表陽怒曰女所營者水皆至􅌍表此焉可以舍乃令徙明日大雨山水大出所營者水皆􅌍表軍吏乃服于是遂不救燕而攻魏雝邱取之以與宋三國懼乃罷兵魏軍其西齊軍其東楚軍欲還不可得陽乃開西和門晝以車騎暮以燭通使于魏齊師怪之以為燕楚與魏謀之乃引兵而去齊兵已去魏失其與無與共擊之乃夜遁楚師還國䇿頃襄王薨子考烈王即位六年秦圍邯鄲趙告急楚楚使陽救趙七年至新中秦去兵史記世家又有景鯉逮事懐王頃襄王論曰昭屈景皆楚舊姓當與國同其存亡者也按䇿昭睢合秦拒齊亦縱横之士耳太史公所載乃獨異信然則與晉狐偃衛太叔儀同烈可也景陽用兵不啻穰苴然卒不能勁楚悲夫莫敖子華子華者威王之莫敖也王嘗問于子華曰自先君文王以至不榖亦有不為爵勸不為禄勉以憂社稷者乎子華對曰如華不足以知之矣王曰不于大夫無所聞之子華對曰王將何問者有亷其爵貧其身以憂社稷者有崇其爵豐其禄以憂社稷者有斷脰决腹一瞑而萬世不視不知所益以憂社稷者有勞其身愁其志以憂社稷者亦有不為爵勸不為禄勉以憂社稷者王曰大夫將何謂也子華對曰昔令尹子文緇帛之衣以朝鹿裘以處未明而立于朝日晦而歸食朝不謀夕無一日之積故彼亷其爵貧其身以憂社稷者令尹子文是也昔葉公子髙身獲于表薄表野外薄林薄而財于柱國財材同柱國以為財定白公之禍寧楚國之事恢先君以揜方城之外四封不亷亷同禮不亷言無事故不察治名不挫于諸侯當此時也天下莫敢以兵南鄉葉公子髙食田六百畛故彼崇其爵豐其禄以憂社稷者葉公子髙是也昔呉與楚戰于栢舉兩軍之間夫卒交莫敖大心撫其御之手顧而太息曰嗟乎子乎楚亡之日至矣吾將深入若扑一人若捽一人以與大心者也社稷其庶幾乎故斷脰决腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也傳不載昔呉與楚戰于栢舉三戰入郢寡君身出大夫悉屬百姓離散棼冒勃蘇曰吾被堅執鋭赴敵而死此猶一卒也不若奔諸侯于是贏糧潛行上峥山踰深谿蹠穿膝暴七日而薄秦王之朝雀立不轉晝吟宵哭七日不得告水漿無入口瘨而殫悶旄不知人秦王聞而走之冠帶不相及左奉其首右濡其口勃蘇乃蘇秦王身問之子孰誰也勃蘇對曰臣楚使新造􅉦官名棼冒勃蘇呉與楚戰于栢舉三戰入郢寡君身出大夫悉屬百姓離散使下臣來告亡且求救秦王顧令之起寡人聞之萬乘之君得罪一士社稷其危今此之謂也遂出革車千乗卒萬人屬之子滿子虎下塞以東與呉人戰于濁水而大敗之亦聞于遂浦故勞其身愁其思以憂社稷者棼冒勃蘇是也傳作申巳胥呉與楚戰于栢舉三戰入郢君王身出大夫悉屬百姓離散蒙榖楚將傳不載結鬭于宫唐之上舍鬭奔郢曰若有孤楚國社稷其庶幾乎恐王死難故意其子遂入大宫負雞次之典以浮于江逃于雲夢之中昭王反郢五官失法百姓昏亂蒙榖獻典五官得法而百姓大治此蒙榖之功多與存國相若封之執畦田六百畛蒙榖怒曰榖非人臣社稷之臣茍社稷血食餘豈患無君乎遂自棄于磨山之中至今無冒冒謂犯法故不為爵勸不為禄勉以憂社稷者蒙榖是也王乃太息曰此古之人也今之人焉能有之子華對曰昔者先君靈王好小腰楚士約食馮而能立式而能起食之可欲忍而不入死之可惡然而不避聞之其君好發者其臣决拾君王直不好若君王誠好賢此五臣者皆可得而致之國䇿慎子昭葢附慎子者頃襄王之傅也頃襄王為太子之時質于齊懐王薨太子辭于齊王而歸齊王隘之曰予我東地五百里乃歸子子不予我不得歸太子曰臣有傅請退而問傅傅慎子曰獻之地所以為身也愛地不送死父不義臣故曰獻之便太子入致命齊王曰敬獻地五百里齊王歸太子太子歸即位為王齊使車五十乗來取東地王告慎子曰齊使來求東地為之奈何慎子曰王明日朝羣臣皆令獻其計上柱國子良入見王曰寡人之得求反主墳墓復羣臣歸社稷也以東地五百里許齊齊令使來求地為之奈何子良曰不可不與也王身出玉聲許强萬乗之齊而不與不信後不可以約結諸侯請與而復攻之與之信攻之武臣故曰與之子良出昭常入見王曰齊使來求東地五百里為之奈何昭常曰不可與也萬乗者以地大為萬乗今去東地五百里是去我國之半也有萬乗之號而無千乗之用也不可臣故曰勿與常請守之昭常出景鯉入見王曰齊使來求東地五百里為之奈何景鯉曰不可與也雖然楚不能獨守王身出玉聲許萬乗之强齊而不與負不義于天下楚亦不能獨守臣請西索救于秦景鯉出慎子入王以三大夫計告慎子曰子良見寡人曰不可不與也與而復攻之常見寡人曰不可與也常請守之鯉見寡人曰不可與也雖然楚不能獨守也臣請索救于秦寡人誰用于三子之計慎子對曰王皆用之王怫然作色曰何謂也慎子曰臣請効其説而王且見其誠然也王發上柱國子良車五十乗而北獻地五百里于齊發子良之明日遣昭常為大司馬令往守東地遣昭常之明日遣景鯉車五乘西索救于秦王曰善乃遣子良北獻地于齊遣子良之明日立昭常為大司馬使守東地又遣景鯉西索救于秦子良至齊齊使人以甲受東地昭常應齊使曰我典主東地且與死生悉五尺至六十三十餘萬敝甲鈍兵願承下塵齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命敝邑之王是常矯也王攻之齊王大興兵攻東地伐昭常未涉强秦以五十萬臨齊右壤曰夫隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可不然則願待戰齊王恐乃請子良南道楚西使秦解齊患士卒不用東地復全國䇿國䇿薛公歸太子横因與韓魏之兵隨而攻東國太子懼昭葢曰不若令屈署以東國為和于齊以動秦秦恐齊之敗東國而令行于天下也必將救我太子曰善遽令屈署以東國為和于齊秦王聞之懼令芈戎告楚曰毋與齊東國吾與子出兵矣莊辛莊辛楚人亦事頃襄王謂王曰君王左州侯右夏侯輦從鄢陵君與夀陵君皆楚幸臣専滛逸侈靡矣王曰先生老悖乎將以為楚國妖祥乎辛曰臣誠見其必然也君王卒幸四子者不衰楚國必亡矣臣請避于趙淹留以觀之辛去之趙留五月秦果舉鄢郢巫上蔡陳之地王流揜于成陽使人發騶徵辛于趙辛至王曰寡人不能用先生之言今事至此為之奈何辛對曰臣聞鄙語曰見兎而顧犬未為晚也亡羊而補牢未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎六足四翼飛翔乎天地之間俛啄蛟䖟而食之仰承甘露而飲之自以為無患與人無争也不知夫五尺童子方將調飴膠絲加已乎四仞之上而下為螻蟻食也黄雀因是以俯噣白粒仰棲茂樹鼓翅奮翼自以為無患與人無争也不知夫公子王孫左挾彈右攝丸將加已乎十仞之上以其類為招晝游乎茂樹夕調乎酸鹹倐忽之間墜于公子之手夫雀其小者也黄鵠因是以游乎江海淹乎大沼俯噣鱔鯉仰囓䔖衡奮其六翮而凌清風飄揺乎髙翔自以為無患與人無争也不知夫射者方將修其碆盧治其矰繳將加已乎百仞之上被㔋磻引微繳折清風而枟矣故晝游乎江河夕調乎鼎鼐夫黄鵠其小者也蔡靈侯之事因是以南游乎髙陂北陵乎巫山飲茹溪流食湘波之魚左抱㓜妾右擁嬖女與之馳騁乎髙蔡之中而不以國家為事不知夫子發方受命乎靈王繫已以朱絲而見之也蔡靈侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與夀陵君飯封禄之粟而載方府之金與之馳騁乎雲夢之中而不以天下國家為事而不知夫穰侯方受命乎秦王填黽塞之内而投己乎黽塞之外襄王聞之色變體慄乃以執珪授之為陽陵君與淮北之地國䇿説苑楚王問莊辛曰君子之行若何對曰居不為垣墻人莫能傷行不從周衛人莫能害復問君子之富若何對曰貸人不徳也不責也食飲人不使也不役也親戚愛之衆人喜之不肖者事之説苑襄成君始封之日衣翠衣帶玉劍履縞舄立于遊水之上莊辛過而説之造託拜謁曰臣願把君之手襄成君作色莊辛遷延盥手而稱曰君不聞夫鄂君子晳之汛舟于新波之中也乗青翰之舟極䓣芘張翠葢榜枻越人擁楫而歌曰濫兮抃草濫予昌􅀈澤予昌州州􅳗州焉乎秦胥胥縵予乎昭澶秦踰渗惿隨河湖鄂君子晳曰吾不知越歌乃召越譯楚説之曰今夕何夕兮搴中洲流今日何日兮得與王子同舟蒙羞被好兮不訾詬耻心幾頑而不絶兮知得王子山有木兮木有枝心説君兮君不知于是鄂君子晳乃㯓修袂行而擁之舉繡被而覆之鄂君子管親楚王母弟也官令尹爵執珪一榜枻越人猶得盡意焉令尹何以踰于鄂君臣何以不若榜枻之人願把君之手其不可也論曰齊之求東地也子良䇿之正昭常䇿之戅景鯉䇿之迂慎子兼用之亦譎而已矣臯陶曰在知人在安民子華莊辛之論庶幾乎哲惠之道夫黄歇春申君春申君者楚人也名歇姓黄氏游學博聞事楚頃襄王頃襄王以歇為辯使于秦秦昭王使白起攻韓魏敗之于華陽禽魏將芒夘韓魏服而事秦秦昭王方令白起與韓魏共伐楚未行而歇適至于秦聞秦之計當是時秦已前使白起攻楚取巫黔中之郡㧞鄢郢東至竟陵頃襄王東徙治于陳縣歇見懐王為秦所誘而入朝遂見欺留死于秦頃襄王其子也秦輕之恐壹舉兵而􅌍楚乃上書説秦昭王曰天下莫强于秦楚今聞大王欲伐楚此猶兩虎相與鬭兩虎相與鬭而駑犬受其弊不如善楚臣請言其説臣聞物至則反冬夏是也致至則危累棊是也今大國之地半天下有二垂此從生民以來萬乗之地未嘗有也先帝文王武王王之身三世而不接地于齊史記武王作莊王誤又無王之身三字與三世不合以絶從親之要今王使成橋守事于韓成橋已北入燕是王不用甲不伸威而出百里之地王可謂能矣王又舉甲兵而攻魏杜大梁之門舉河内㧞燕酸棗虚桃人楚燕之兵雲翔而不敢校王之功亦多矣王休甲息衆二年然後復之又取蒲衍首垣以臨仁平邱小黄濟陽嬰城而魏氏服矣王又割濮磨之北屬之燕斷齊秦之要絶楚魏之脊天下五合六聚而不敢救王之威亦憚矣王若能持功守威省攻伐之心而肥仁義之誡使無復後患三王不足四五霸不足六也王若負人徒之衆恃甲兵之强一毁魏氏之威而欲以力臣天下之主臣恐有後患也詩云靡不有初鮮克有終易曰狐濡其尾此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也呉見伐齊之便而不知干隧之敗也此二國者非無大功也沒利于前而易患於後也吳之信越也從而伐齊遂攻齊人于艾陵還為越王禽于三江之浦智氏信韓魏從而伐趙攻晋陽之城勝有日矣韓魏反之殺智伯瑶于鑿臺之下今王妬楚之不毁也而㤀毁楚之强韓魏也臣為大王慮而不取詩云大武逺宅不渉逸詩武足迹宅猶居也言地之居逺者雖有是大足不涉之史記正義言大軍不逺攻伐非從此觀之楚國援也鄰國敵也詩云趯趯毚兎遇犬獲之他人有心予忖度之今王中道而信韓魏之善王也此正呉信越也臣聞敵不可易時不可失臣恐韓魏之卑辭慮患而實欺大國也王既無重世之徳于韓魏而有累世之怨焉夫韓魏父子兄弟接踵而死于秦者百世矣本國殘社稷壊宗廟隳刳腹折頥首身分離暴骨草澤頭顱僵仆相望于境父子老弱係虜相隨于路鬼神狐祥無所食百姓不聊生族類離散流亡為臣妾滿海内矣韓魏之不亡秦社稷之憂也今王之攻楚不亦失乎且王攻楚之日則惡出兵王將藉路于仇讎之韓魏乎兵出之日而王憂其不反也是王以兵資于仇讎之韓魏也王若不藉路于仇讎之韓魏必攻隨陽右壤此皆廣川大水山林谿谷不食之地王雖有之不為得地是王有毁楚之名無得地之實也且王攻楚之日四國必悉起應王秦楚之兵構而不離魏氏將出兵而攻留方與銍胡陵碭蕭相故宋必盡齊人南面泗北必舉此皆平原四達膏腴之地也而王使之獨攻王破楚以肥韓魏于中國而勁齊韓魏之强足以校于秦矣齊南以泗為境東負海北倚河而無後患天下之國莫强于齊齊魏得地葆利而詳事下吏一年之後為帝未能于以禁王之為帝有餘矣夫以王壤土之博人徒之衆兵革之强而注地于楚詘令韓魏歸帝重于齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨韓韓必授首王􅁭以山東之險帶以河曲之利韓必為闗中之候候候吏也史記作侯若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城上蔡召陵不往來也如此而魏而闗内侯矣王一善楚而闗内二萬乗之主注地于秦齊之右壤可拱手而取也是王之地一注兩海要絶天下也是燕趙無齊楚齊楚無燕趙也然後危動燕趙持齊楚此四國者不待痛而服矣國䇿史記同䇿文然明晰有不逮處今用䇿昭王曰善于是乃止白起而謝韓魏發使賂楚約為與國歇受約歸楚楚使歇與大子完入質于秦秦留之數年頃襄王病太子不得歸而太子與秦相應侯善于是歇乃説應侯曰相國誠善楚太子乎應侯曰然歇曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮是親與國而得儲萬乗也若不歸則咸陽一布衣耳楚更立太子必不事秦夫失與國而絶萬乗之和非計也願相國熟慮之應侯以聞秦王秦王曰令楚太子之傳先往問楚王之疾返而後圖之歇為太子計曰秦之留太子也欲以求利也今太子力未能有以利秦也歇憂之甚而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之太子因變衣服為楚使者御以出闗而歇守舍常為謝病度太子已逺秦不能追歇乃自言秦昭王曰楚太子已歸出逺矣歇當死願賜死昭王大怒欲聼其自殺也應侯曰歇為人臣出身以徇其主太子立必用歇故不如無罪而歸之以親楚秦因遣歇歇至楚三月頃襄王薨太子完立是為考烈王考烈王元年以歇為相封為春申君賜淮北地十二縣後十五嵗歇言之楚王曰淮北地邉齊其事急請以為郡便因并獻淮北十二縣請封于江東考烈王許之春申君因城故吳墟以自為都邑越絶書白石山故名胥女山春申君初封吳更名白石無錫歴山春申君時盛祠以牛立無錫塘國䇿虞卿為春申君曰臣聞之春秋于安思危危則慮安今楚王春秋髙矣而君之封地不可不早定也為君慮封莫如逺楚秦孝公封商君孝公死而後王殺之秦惠王封冉子惠王死而後王奪之公孫鞅功臣也冉子姻親也然而不免奪死者封近故也太公望封于齊邵公奭封于燕為其逺王室矣今燕之罪大而趙怨深故君不如北兵以徳趙踐亂燕以定身封此百代一時也春申君曰所道攻燕非齊則魏魏齊新怨楚楚軍雖欲攻燕將道何哉對曰請令魏王可廼謂魏王曰夫楚亦强大矣天下無敵乃且攻燕魏王曰鄉也子云天下無敵今也子云乃且攻燕何也對曰今謂馬多力則有矣若曰勝千鈞則不然者何也夫千鈞非馬之任也今謂楚强大則有矣若越趙魏而鬭兵于燕則豈楚之任哉非楚之任而楚為之是敝楚也敝楚則强魏也其于王孰便也虞卿定封之説似若為春申謀實則藉楚報燕耳春申君既相楚是時齊有孟嘗君趙有平原君魏有信陵君方争下士招致賓客以相傾奪輔國持權春申君為楚相四年秦破趙之長平軍四十餘萬五年圍邯鄲邯鄲告急于楚楚使春申君將兵往救之秦兵亦去八年北伐􅌍魯以荀卿為蘭陵令史記國䇿客説春申君曰湯以亳武王以鎬皆不過百里以有天下今孫子天下賢人也君藉之以百里之勢臣竊以為不便春申君曰善于是使人謝孫子孫子去之趙趙以為上卿客又説春申君曰昔伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊强夫賢者之所在其君未嘗不尊國未嘗不榮也今孫子天下賢人也君何辭之春申君又曰善于是使人請孫子孫子為書謝曰癘人憐王此不恭之語也雖然不可不審察也以為刼弑死亡之主言也夫人主年少而矜材無法術以知姧則大臣主斷國私以禁誅于己也故弑賢長而立㓜弱廢正適而立不義春秋戒之曰楚王子圍聘于鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立也齊崔杼之妻美莊公通之崔杼帥其君黨而攻莊公莊公請與分國崔杼不許欲自刃于廟崔杼不許莊公走出踰于外墻射中其股遂殺之而立其弟景公近代所見李兑用趙餓主父于沙邱百日而殺之淖齒用齊擢閔王之筋懸于廟梁宿夕而死夫癘雖癰腫胞疾上比前世未至絞纓射股下比近代未至擢筋而餓死也夫刦弑死亡之主也心之憂勞形之困苦必甚于癘矣由此觀之癘雖憐王可也因為賦曰寳珍隋珠不知佩兮禕衣與絲不知異兮閭姝子奢莫知媒兮嫫母求之又甚喜之兮以瞽為明以聾為聰以是為非以吉為凶嗚呼上天曷惟其同詩曰上天甚神無自瘵也書葢以癘自喻以刦弑者比楚隂賊言將内潰也十二年秦昭王卒使春申君弔祠于秦二十二年諸侯患秦攻伐無已時乃相與合從西伐秦而楚王為從長趙使魏加見春申君曰君有將乎曰有矣僕欲將臨武君未詳其人魏加曰臣少好射願以射譬異日者更羸與魏王處京臺之下仰見飛鳥更羸謂魏王曰臣為王引弓虚發而下鳥魏王曰射可至此乎更羸曰可有間鴈從東方來更羸以虛發而下之魏王曰射可至此乎更羸曰此孽也王曰何以知之對曰其飛徐而鳴悲飛徐者故瘡痛也鳴悲者乆失羣也故瘡未息而驚心未去也聞弦音烈而髙飛故瘡隕也今臨武君嘗為秦孽不可為拒秦之將也國䇿春申君至函谷闗秦出兵攻諸侯兵皆敗走王以咎春申君春申君以此益疎客有觀津人朱英謂春申君曰人皆以楚為彊而君用之弱其于英不然先君時善秦二十年而不攻楚何也秦踰黽隘之塞而攻楚不便假道于兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵其許魏割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬪也楚于是去陳徙夀春而秦徙魏野王作置東郡春申君繇此就封于呉行相事國䇿唐睢見春申君曰齊人飾身修行得為益然臣羞而不學也不避絶江河行千餘里來竊慕君之義而善君之業臣聞之賁諸懐錐刃而天下為勇西施衣褐而天下稱美今君相萬乗之楚禦中國之難所欲不成所求不得臣等少也夫梟棊之所以為能者以散棊佐之也夫一梟不如不勝五散亦明矣今君何不為天下梟而令臣等為散乎汗明見春申君候問三月而後得見談卒春申君大説之汗明欲復談春申君曰僕已知先生先生大息矣汗明蹙焉曰明願有問不審君之聖孰與堯也春申君曰先生過矣臣何足以當堯汗明曰然則臣孰與舜春申君曰先生即舜也汗明曰不然君之賢不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相如也今君一旦而知臣是君聖于堯而臣賢于舜也春申君曰善召門吏為汗先生著客籍五日一見汗明曰君亦聞驥乎夫驥之齒至矣服鹽車而上大行蹄申膝折尾湛胕潰漉汗灑地白汗交流外阪遷延負棘而不能上伯樂遭之下車攀而哭之解紵衣以幕之驥于是俛而噴仰而鳴聲達于天若出金石聲者何也彼見伯樂之知己也今僕之不肖阨于州部堀穴窮巷沈洿鄙俗之日乆矣君獨無意湔袚僕使得為君髙鳴屈于梁乎考烈王無子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐乆母寵李園求事春申君為舍人已而謁歸故失期還謁春申君問之狀對曰齊王使使求臣之女弟與其使者飲故失期春申君曰聘入乎對曰未也可得見乎曰可于是李園乃進其女弟即幸于春申君知其有身李園乃與其女弟謀園女弟承間説春申君曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百嵗後將更立兄弟則楚更立君後亦各貴其故所親君又安得長有寵乎非徒然也君貴用事乆多失禮于王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身矣而人莫知妾幸君未乆誠以君之重而進妾于王王必幸妾妾賴天有子則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出李園女弟謹舍而言之王王召入幸之遂生子立為大子以李園女弟為王后王貴李園園用事李園既入其女弟立為王后子為太子恐春申君語泄而益驕隂養死士欲殺春申君以􅌍口而國人頗有知之者二十五年考烈王病朱英謂春申君曰世有毋望之福又有毋望之禍今君處毋望之世事毋望之主安可以無毋望之人乎春申君曰何謂毋望之福曰君相楚二十餘年矣雖名相國實楚王也今王病旦暮且卒而君相少主因而代立當國如伊尹周公王長而反政不即遂南面稱孤而有楚國此所謂毋望之福也春申君曰何謂毋望之禍曰李園不治國王之舅也史記作仇頗費解今從䇿不為兵而養死士之日乆矣王卒李園必先入據權而殺君以􅌍口此所謂毋望之禍也春申君曰何謂毋望之人曰君置臣郎中王卒李園必先入臣為君殺之此所謂毋望之人也春申君曰先生置之李園弱人也僕又善之何至此朱英恐乃亡去後十七日考烈王薨李園果先入置死士于棘門之内春申君後入止棘門園死士夾刺春申君斬其頭投之棘門外于是使吏盡􅌍春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立是為楚幽王史記韓非子楚莊王之弟春申君有愛妾曰余正妻子曰甲余欲君之棄其妻也自傷其身以示君而泣曰得為君妾幸甚然適夫人非所以事君適君非所以事夫人身故不肖力不足以事二主與死夫人所者不若賜死君前妾以賜死若復幸于左右願必察之無為人笑君因棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余幸君之日乆矣甲非弗知也今乃强戲余至裂余之衣君怒而殺甲説未聞莊王弟尤誤論曰李園養死士國人頗知之而春申之客率皆充耳客何為者侯朱毛薛藐焉無間春申之士亦葉公之龍耳荀卿虞卿唐睢汗明各有建説而史不及載吾聞之上知辨意中知鍳色下知審聲及朱英進説而歇卒不内歇亦愚而已矣尚史卷六十
