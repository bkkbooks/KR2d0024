body:
  text: 尚史卷一鑲白旗漢軍李鍇撰世系圖世紀曰少皞帝名摯字青陽國語曰青陽黄帝之子是少皞為黄帝之子矣史記曰黄帝生昌意昌意生髙陽是顓頊為黄帝之孫矣又曰帝嚳父曰蟜極蟜極父曰𤣥囂𤣥囂父曰黄帝是帝嚳為黄帝之曽孫矣世本曰帝嚳元妃姜嫄生后稷次妃簡狄生契次妃慶都生堯次妃常儀生摯是堯與稷契皆為帝嚳之子黄帝之𤣥孫矣史記曰禹之父曰鯀鯀之父曰顓頊顓頊之父曰昌意昌意之父曰黄帝是禹亦黄帝之𤣥孫堯之同髙祖兄弟矣又曰重華父曰瞽叟瞽叟父曰橋牛橋牛父曰句望句望父曰敬康敬康父曰窮蝉窮蝉父曰顓頊顓頊父曰昌意以至舜七世是舜為黄帝之八世孫矣何舜之世次獨促于稷契及禹也史記又曰契傳十二世而成湯立稷傳十五世而文王立夫契至湯十二世湯又傳二十九王而後亡而稷裁十五世遂至文王何契之世次又獨促于稷也大抵世紀諸書漏闕殊多而史記繆戾未深考也吕梁碑以舜祖虞幕而不祖黄帝或曰顓頊亦不當祖黄帝予竊以青陽𤣥囂昌意為三宗而五帝三王之世由是生焉其原之同出黄帝與不則俟博聞之君子列後圖如左漢書曰少皞帝考徳曰清清者黄帝之子清陽也是其子孫名摯立號曰金天氏是少皞出自清陽而非黄帝之子也國語曰少皞之衰九黎亂徳顓頊受之所謂少皞者指其後世而言少皞生而有聖徳豈及其身而遽衰也傳曰少皞有裔子曰昧生允格臺駘允格臺駘能業其官帝顓頊嘉之封諸汾川是顓頊出自昌意而非昌意之子黄帝之孫也世紀曰帝嚳年十五而佐顓頊顓頊且不得父昌意而祖黄帝帝嚳亦不得祖𤣥囂而為黄帝之曽孫也春秋命厯序曰顓頊傳十世是帝嚳且不得與顓頊親承接也傳曰髙陽氏有才子八人世謂之八愷髙辛氏有才子八人世謂之八元此十六族者世濟其美不隕其名至于堯堯未能舉所謂世濟者累世之謂也夫八元既出自髙辛而堯為帝嚳之子是帝堯兄弟八元又何世美之不隕而舉且未能也以髙辛之聖舍稷之適與堯之徳而立摯先儒亦疑之矣傳又曰八元者髙辛氏之裔也其文明甚是堯出自𤣥囂而非帝嚳之子也吕梁碑以舜祖虞幕左傳史趙之言曰自幕至于瞽叟無違命是己國語又曰幕能帥顓頊者也傳又曰陳顓頊之族也是舜出自顓頊而幕又非即顓頊之子也漢書曰顓頊五代而生鯀是禹亦不得祖顓頊而為黄帝之𤣥孫而五代之説猶有未得也譙周曰契生堯代舜始舉之必非嚳子以其父微故不著名又曰弃帝嚳之胄其父亦不著是譙知稷契非帝嚳之子而不知帝堯亦非帝嚳之子也國語曰自后稷之始基靖民十五王而文始平之又曰基徳十五而始平所謂十五王者論其徳非論其世而史乃以十五世足之謬矣吕梁碑以后稷生漦蠒漦蠒生叔均叔均又數世而生不窋世本公非以下復有辟方侯牟雲都諸盭是不窋非后稷之子而下距武王且十七世也春秋命厯序曰少皞傳八世顓頊傳十世帝嚳傳十世䜟緯之言殊不足信要其世數雖不可知然自帝堯以上大抵如三代之迭興非唐虞之授受也尚史卷一
