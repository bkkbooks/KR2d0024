body:
  text: 尚史卷九十八志六鑲白旗漢軍李鍇撰禮志生民之性與天地凖而氣質之秉􅀈醇寄焉先王牖之于中使無過差不及是禮之所由起也是故樂由陽來禮由隂作樂所以修内禮所以修外樂期于和禮期于中禮樂不可斯須去身猶水火之給民用也雖然朝昏從君視父以夜忠孝之至也而知和而和敝流于瀆玉帛具文揖讓備儀而惂淫宿𠂻飾文交作敝流于偽瀆與偽不可以為治故樂宣其内禮節其外禮者防民之偽而教之中教之中者節文之謂也管子所謂因人之情縁義之理而為之節文者是也古禮寖失杞宋無徵惟周官二戴雜陳厥要儀禮厪存士儀具揖讓周旋之文是子太叔黄父之對非禮之大經者矣約其精鑿述禮志曲禮曰母不敬儼若思安定辭安民哉若夫坐如尸立如齊禮從宜使從俗夫禮者所以定親疏决嫌疑别同異明是非也禮不妄説人不辭費禮不踰節不侵侮不好狎修身踐言謂之善行行修言道禮之質也禮聞取于人不聞取人禮聞來學不聞往教道徳仁義非禮不成教訓正俗非禮不備分爭辯訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮慎子禮從俗政從上使從君國有貴賤之禮無賢不肖之禮有長幼之禮無勇敢之禮有親疎之禮無愛憎之禮白虎通朝廷之禮貴不讓賤所以有尊卑也鄉黨之禮長不讓幼所以明有年也宗廟之禮親不讓踈所以有親也此三者行然後王道得王道得然後萬物成也昔者仲尼與于蜡賓事畢出遊于觀之上喟然而歎仲尼之歎葢歎魯也言偃在側曰君子何歎孔子曰大道之行也與三代之英㐀未之逮也而有志焉大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養男有分女有歸貨惡其弃于地也不必藏于己力惡其不出于身也不必為己是故謀閉而不興盜竊亂賊而不作故外戸而不閉是謂大同今大道既隠天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇知以功為已故謀用是作而兵由此起禹湯文武成王周公由此其選也此六君子者未有不謹于禮者也以著其義以考其信著有過刑仁講讓示民有常如有不由此者在埶者去衆以為殃是謂小康言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死是故夫禮必本于天殽于地列于鬼神達于喪祭射御冠昬朝聘故聖人以禮示之故天下國家可得而正也言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉夏書小正我欲觀殷道是故之宋而不足徵也吾得坤乾焉殷書歸藏坤乾之義夏時之等吾以是觀之故聖人參于天地並于鬼神以治政也處其所存體之序也玩其所樂民之治也故天生時而地生財人其父生而師教之四者君以正用之故君者立于無過之地也故君者所明也非明人者也君者所養也非養人者也君者所事也非事人者也故君明人則有過養人則不足事人則失位故百姓則君以自治也養君以自安也事君以自顯也故禮達而分定故人皆愛其死而患其生故用人之知去其詐用人之勇去其怒用人之仁去其貪故國有患君死社稷謂之義大夫死宗廟謂之變變當作辨故聖人耐以天下為一家以中國為一人者非意之也必知其情辟于其義明于其利達于其患然後能為之何謂人情喜怒哀樂愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患故聖人所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉荀子夫人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之故先王患禮之不達于下也故祭帝于郊所以定天位也祀社于國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也故宗祝在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正故禮行于郊而百神受職焉禮行于社而百貨可極焉禮行于祖廟而孝慈服焉禮行于五祀而正法則焉故自郊社宗廟山川五祀義之修而禮之藏也是故夫禮必本于大一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命其官于天也夫禮必本于天動而之地列而之事變而從時協于分藝其居人也曰養其行之以貨力辭讓飲食冠昬喪祭射御朝聘故禮義也者人之大端也所以講信修睦而固人肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也故唯聖人為知禮之不可以已也故壊國喪家亡人必先去其禮故禮之于人也猶酒之有蘖也君子以厚小人以薄故聖人修義之柄禮之序以治人情故人情者聖王之田也修禮以耕之陳義以種之本仁以聚之播樂以安之故禮也者義之實也協諸義而協則禮雖先王未之有可以義起也義者藝之分仁之節也協于藝講于仁得之者强仁者義之本也順之體也得之者尊故治國不以禮猶無耜而耕也為禮不本于義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也安之以樂而不達于順猶食而弗肥也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也故事大積焉而不苑並行而不繆細行而不失深而通茂而有間連而不相及也動而不相害也此順之至也故明于順然後能守危也故禮之不同也不豐也不殺也所以持情而合危也故聖王所以順山者不使居川不使渚者居中原而弗敝也用水火金木飲食必時合男女頒爵位必當年徳用民必順故無水旱昆蟲之災民無凶饑妖孽之疾故天不愛其道地不愛其寶人不愛其情故天降膏露地出醴泉山出器車河出馬圖鳳皇麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而闚也則是無故先王能修禮以達義體信以達順故此順之實也禮器是故大備大備盛徳也禮釋回增美質措則正施則行其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉故君子有禮則外諧而内無怨故物無不懐仁鬼神饗徳先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行禮也者合于天時設于地財順于鬼神合于人心理萬物者也是故天時有生也地理有宜也人官有能也物曲有利也故天不生地不養君子不以為禮鬼神弗饗也居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮故必舉其定國之數以為禮之大經禮之大倫以地廣狹禮之薄厚與年之上下是故年雖大殺衆不匡懼則上之制禮也節矣禮時為大順次之體次之宜次之稱次之堯授舜舜授禹湯放桀武王伐紂時也詩云匪革其猶聿追來孝天地之祭宗廟之事父子之道君臣之義倫也社稷山川之事鬼神之祭體也喪祭之用賓客之交義也羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也孔子曰禮不可不省也禮不同不豐不殺此之謂也葢言稱也禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有㣲大者不可損小者不可益顯者不可揜㣲者不可大也故經禮三百曲禮三千其致一也未有入室而不由户者君子之于禮也有所竭情盡慎致其敬而誠若謂以少小下素為貴有美而文而誠若謂以多大髙文為貴君子之于禮也有直而行也謂若始死哭踊無節有曲而殺也謂若父在為母期有經而等也謂若天子至士庻人為父母三年有順而討也討去也謂若天子以十二公以九侯伯以七子男以五為節有摲而播也摲之言芟也謂芟殺有所與也若祭者貴賤皆有所得不使虛有推而進也謂若王者之後得用天子之禮有放而文也謂若天子之服服日月以至黼黻有放而不致也謂若諸侯自山龍以下有順而摭也謂若君沐粱大夫沐稷士沐梁三代之禮一也或素或青夏造殷因孔子曰禮之于正國也猶衡之于輕重也繩墨之于曲直也規矩之于方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善于禮此之謂也故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之别也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壊之者必有水敗以舊禮為無所用而去之者必有亂患故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也㣲其止邪也于未形使人日徙善遠罪而不自知也是以先王隆之也易曰君子慎始差若毫釐繆以千里此之謂也仲尼燕居子張子貢言游侍縱言至于禮子曰居女三人者吾語女禮使女以禮周流無不徧也子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁子曰師爾過而商也不及子産猶衆人之母也能食之不能教也子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也子貢退言游進曰敢問禮也者領惡而全好者與子曰然然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉茍知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示徳也下而象管示事也是故古之君子不必親相與言也以禮樂相示而已子曰禮也者理也樂也者節也君子無理不動無節不作不能詩于禮繆不能樂于禮素薄于徳于禮虛子曰制度在禮文為在禮行之其在人乎子貢越席而對曰敢問䕫其窮與子曰古之人與古之人也達于禮而不達于樂謂之素達于樂而不達于禮謂之偏夫䕫達于樂而不達于禮是以傳于此名也古之人也子張問政子曰師乎前吾語女乎君子明于禮樂舉而錯之而已子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奥阼席則有上下車則有左右行則有隨立則有序古之義也室而無奥阼則亂于堂室也席而無上下則亂于席上也車而無左右則亂于車也行而無隨則亂于塗也立而無序則亂于位也昔聖帝明王諸侯辨貴賤長幼逺近男女外内莫敢相踰越皆由此塗出也三子者旣得聞此言也于夫子昭然若發矇矣禮記鄭游吉見晉趙鞅鞅問揖讓周旋之禮焉對曰是儀也非禮也鞅曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外内以經二物夫治外婦治内各治其物為父子兄弟姑姊甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮雷電震曜天之威也以象類之為温慈恵和以效天之生殖長育春生夏長天之恩也以效法之民有好惡喜怒哀樂生于六氣是故審則宜類審其法則宜其象類以制六志哀有哭泣樂有歌舞喜有施舎怒有戰鬬喜生于好怒生于惡是故審行信令禍福賞罰以制死生生好惡也死惡物也好惡樂也惡物哀也哀樂不失乃能協于天地之性是以長久鞅曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人能自曲直以赴禮者謂之成人大不亦宜乎趙鞅曰鞅也請終身守此言也左傳伏羲制嫁娶以儷皮為禮則嫁娶嘉禮始于伏羲也神農始教天下種穀記云禮之初始諸飲食燔黍捭豚蕢桴而土鼓又云土鼓葦籥伊耆氏之樂又云伊耆氏始為蜡則祭祀吉禮起于神農也伊耆氏即神農黄帝與蚩尤戰于涿鹿則有軍禮也古者塟諸中野則有凶禮也軒知地利九牧倡教既有九州之牧當有朝聘是賓禮也自伏羲至黄帝吉凶賓軍嘉五禮始具堯則修五禮類于上帝吉禮也百姓如喪考妣凶禮也羣后四朝賓禮也舜征有苗軍禮也嬪于虞嘉禮也論語云殷因于夏禮周因于殷禮則夏商亦有五禮書亡無文耳禮記正義周則大宗伯以吉禮事邦國之鬼神示以凶禮哀邦國之憂以賓禮親邦國以軍禮同邦國以嘉禮親萬民吉禮之别十有二一曰禋祀二曰實祡三曰槱燎四曰血祭五曰埋沈六曰辜疈七曰肆獻八曰饋食九曰祠十曰禴十一曰嘗十二曰烝凶禮之别有五一曰喪禮哀死亡二曰荒禮哀凶札三曰弔禮哀禍災四曰禬禮哀圍敗五曰恤禮哀冦亂賓禮之别有八一曰朝二曰宗三曰覲四曰遇五曰㑹六曰同七曰問八曰視軍禮之别有五一曰大師之禮以用衆二曰大均之禮以恤衆三曰大田之禮以簡衆四曰大役之禮以任衆五曰大封之禮以合衆嘉禮之别有六一曰飲食二曰婚冠三曰賓射四曰饗燕五曰脤膰六曰慶賀周禮尚史卷九十八
