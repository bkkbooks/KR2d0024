body:
  text: 尚史卷四十五列傳二十三鑲白旗漢軍李鍇撰趙夙趙衰成子趙盾宣子趙同原同趙括屏括趙嬰樓嬰趙朔莊子趙武文子趙成景子趙鞅簡子趙無䘏襄子趙夙者事獻公獻公十六年閔元年夙御戎以滅耿滅霍滅魏賜夙耿以為大夫左傳趙氏由夙始夙之弟是為趙衰衰字子餘諡成故曰成季嘗為原大夫又曰原季驪姬之難衰從公子重耳出亡恵公十三年僖二十二年公子圉即懐公自秦逃歸秦伯召重耳于楚歸女五人懐嬴與焉重耳欲辭謂衰曰何如對曰禮志有之曰將有請于人必先有入焉欲人之愛己也必先愛人欲人之從己也必先從人無徳于人而求用于人罪也今將婚媾以從秦受好以愛之聴從以徳之懼其未可也又何疑焉乃歸女而納幣且逆之秦伯將饗重耳重耳使狐偃從偃曰吾不如衰之文也請使衰從秦伯饗公子如饗國君之禮衰相如賓卒事明日燕秦伯賦采菽衰使公子降拜秦伯降辭衰曰君以天子之命服命重耳重耳敢有安志敢不降拜成拜卒登衰使公子賦黍苗衰曰重耳之卬君也若黍苗之卬陰雨也若君實庇蔭膏澤之使能成嘉榖薦在宗廟君之力也君若昭先君之榮東行濟河整師以復疆周室重耳之望也重耳若獲集徳而歸載使主晉民成封國其何實不從君若恣志以用重耳四方諸侯其誰不惕惕以從君命秦伯歎曰是子將有焉豈專在寡人乎秦伯賦鳩飛公子賦河水秦伯賦六月衰使公子降拜秦伯降辭衰曰君稱所以佐天子匡王國者命重耳重耳敢有惰心敢不從徳國語文公元年僖二十四年秦伯納公子公子入立是為文公明年定周難殺大叔帶王與之陽樊温原攢茅之田冬圍原原降公問原守于寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故以衰為原大夫韓非子作箕鄭事左傳四年僖二十七年蒐于被廬作三軍公問元帥于衰對曰郤縠可行年五十矣守學彌惇夫先王之法志徳義之府也夫徳義生民之本也能惇篤者不忘百姓也請使郤縠公從之公使衰將下軍辭曰欒枝貞慎先軫有謀胥臣多聞皆可以為輔臣弗若也乃以欒枝將下軍先軫佐之公使衰將上軍辭曰夫三徳者偃之出也三徳為勸文公納襄王以示臣義伐原以示信大蒐以示民禮以徳紀民其章大矣不可廢也使狐偃偃辭以狐毛乃使毛將上軍偃佐之毛卒使衰代之辭曰城濮之役先且居之佐軍也善軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在乃使先且居將上軍公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢徳也八年僖三十一年以衰之故蒐于清原作五軍更為新上下軍使衰將新上軍箕鄭佐之胥嬰将新下軍先都佐之及狐偃卒公曰趙衰三讓不失義讓推賢也義廣徳也徳廣賢至有何患矣乃使衰佐上軍國語新序文公將伐鄴趙衰言所以勝鄴文公用之而勝鄴將賞衰衰曰君將賞其末乎賞其本乎賞其末則騎乘者存賞其本則臣聞之郄虎公召郄虎曰衰言所以勝鄴葢聞之子子當賞虎對曰言之易行之難臣言之者也公曰子無辭虎乃受賞伐鄴事經傳無之文公薨事襄公襄公三年文二年秦孟明視帥師伐我先且居將中軍衰佐之敗秦師于彭衙秦伯猶用孟明視視増修國政重施于民衰言于諸大夫曰秦師又至將必辟之懼而増徳不可當也詩曰毋念爾祖聿修厥徳孟明念之矣念徳不怠其可敵乎明年秦師伐我我師不出六年文五年衰卒左傳諡曰成盾衰之子宣子也初衰從文公奔狄狄人伐廧咎如赤狄别種獲其二女叔隗季隗納諸文公公取委隗以叔隗妻衰生盾及文公入衰後妻趙季文公女請以為嫡子衰卒盾遂嗣為卿初事襄公襄公七年文六年蒐于夷使狐射姑將中軍盾佐之陽處父改蒐于董易盾將中軍曰使能國之利也盾于是乎始為國政制事典正法罪辟刑獄董逋逃由質要治舊洿治舊日洿穢不理之事本秩禮貴賤不失其本續常秩出滯淹既成以授大傅陽處父與大師賈佗使行諸晉國以為常法是年八月襄公薨靈公少以難故立長君盾曰立公子雍文公子襄公庶弟狐射姑曰不如立公子樂亦文公子盾不可使逆雍于秦姑射亦使召樂于陳盾殺諸郫晉地明年秦送公子雍穆嬴靈公母抱大子以責盾盾與諸大夫患穆嬴且畏偪畏國人以大義逼己乃背雍而立靈公以禦秦師及堇陰晉地盾曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心遂敗秦師于令狐秋八月盾會諸侯盟于扈靈公立故也靈公二年文八年盾會魯公子遂于衡雍三年文九年楚伐鄭鄭及楚平盾會諸侯之大夫救鄭不及楚師六年文十二年秦以令狐之役故伐我取羈馬盾禦之秦師夜遁左傳盾嘗言于公以韓厥為司馬是役也盾使人以其乘車干行厥執而戮之衆咸曰韓厥必不没矣其主朝升之而莫戮其車其誰安之盾召而禮之曰吾聞事君者比而不黨夫周以舉義忠信曰周比也舉以其私黨也夫軍事無犯犯而不隠義也吾言汝于君懼汝不能也舉而不能黨孰大焉事君而黨吾何以從政吾故以是觀汝汝勉之茍從是行也臨長晉國者非汝其誰皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免于罪矣國語八年文十四年盾㑹諸侯同盟于新城從于楚者服陳與宋也且謀納邾也邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑來奔秋七月盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且即邾定公長盾曰辭順而弗從不祥乃還左傳十年文十六年宋文公鮑殺昭公明年盾請師于公以伐宋公曰非晉國之急也對曰大者天地其次君臣所以為明訓也今宋人殺其君是反天地而逆民則也天必誅焉晉為盟主而不修天罰將懼及焉公許之乃發令于太廟召軍吏而戒樂正令三軍之鐘鼓必備使荀林父㑹諸侯伐宋猶立文公而還十三年宣元年陳宋受盟于我而鄭及楚盟秋楚侵陳宋盾帥師救之㑹于棐林以伐鄭楚救鄭遇于北林囚觧揚我師乃還冬我伐鄭以報北林之役于是公侈盾為政驟諫而不入故不競于楚十四年宣二年秦伐我圍焦晉河外邑盾救焦遂自陰地河南地及諸侯之師侵鄭楚鬬椒救鄭次于鄭以待我師盾曰彼宗競于楚殆將斃矣姑益其疾乃去之公不君盾驟諌公飲盾酒伏甲將攻之盾遂自亡㑹趙穿弑公盾未出山而復大史書曰趙盾弑其君盾使趙穿逆公子黑臀于周而立之是為成公成公四年宣六年盾及衛孫免侵陳陳即楚故六年宣八年盾卒左傳諡曰宣同趙括趙嬰者並衰之子母曰趙姬文公之女也同食邑于原是曰原同括食邑于屏是曰屏季嬰食邑于樓是曰樓嬰又曰趙嬰齊狄人之歸盾也趙季以盾為才請為適子而使三子下之及成公即位宦卿之適子而為之田以為公族盾請以括為公族曰君姬氏之愛子也㣲君姬氏則臣狄人也公許之盾為旄車之族旄車公行之官使括以其故族為公族大夫成公薨景公立景公三年宣十二年楚伐鄭我救之荀林父將中軍括嬰為中軍大夫同為下軍大夫鄭既及楚平林父欲還先縠獨以中軍佐濟諸大夫皆以為不可括同曰率師以來唯敵是求克敵得屬又何俟必從彘子及戰楚敗我師于邲六年宣十五年荀林父滅赤狄公使同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎天奪之魄矣十一年成二年我敗齊師于鞌明年以括為卿為新中軍佐賞鞌之功也嬰通于趙莊姬朔妻嬰之姪婦也同括放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聴嬰夢天使謂已祭余余福女使問諸士渥濁渥濁曰不識也既而告其人曰神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡十七年成八年趙莊姬為趙嬰之亡故謂之于公曰原屏即同括將為亂欒郤為徴公討同括殺之左傳朔者盾之子莊子也為下軍佐朔尚成公女莊姬生武朔卒莊姬譖趙同趙括景公討之殺同括以趙氏之田與祁奚武從莊姬畜于公宫既而韓厥言于公曰成季趙衰之勲宣孟趙盾之忠而無後為善者懼矣乃立武為大夫而反其田左傳國語趙文子冠見欒武子武子曰美哉昔吾逮事莊主華則榮矣實則不知請務實乎見中行宣子宣子曰美哉惜也吾老矣見范文子文子曰而今可以戒矣夫賢者寵至而益戒不足者為寵驕故興王賞諫臣逸王罰之吾聞古之王者政徳既成又聴于民于是乎使工誦諫于朝在列者獻詩使勿兠風聽臚言于市辨妖祥于謠考百事于朝問謗譽于路有邪而正之盡戒之術也先王疾是驕也見郤駒伯駒伯曰美哉然而壯不若老者多矣見韓獻子獻子曰戒之此之謂成人成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有墻屋也糞除而已何又加焉見知武子武子曰吾子勉之成宣之後而老為大夫非恥乎成子之文宣子之忠其可忘乎夫成子道前志以佐先君道法而卒以政可不謂文乎夫宣子進諫于襄靈以諫取惡不憚死進也可不謂忠乎吾子勉之有宣子之忠而納之以成子之文事君必濟見苦成叔子叔子曰抑年少而執官者衆吾安容子見温季子季子曰誰之不如可以求乎見張老而語之張老曰善哉從欒伯之言可以滋范叔之教可以大韓子之戒可以成物備矣志在子若夫三郤亡人之言何稱述焉知子之道善矣是先主覆露子也景公薨事厲公厲公被弑悼公即位公以武為文也而能恤大事使佐新軍國語既而使將新軍悼公九年襄九年公會諸侯伐鄭武及魏絳斬行栗諸侯圍鄭鄭恐乃成同盟于戲鄭地冬十二月復伐鄭次于陰口鄭地而還十一年襄十一年再伐鄭鄭成武入盟鄭伯鄭公孫舍之出盟公遂㑹于蕭魚鄭地十三年襄十三年公蒐于緜上以治兵使武將上軍韓起佐之悼公薨事平公平公三年襄十八年公㑹諸侯圍齊武及韓起以上軍圍盧弗克及魯秦周魯大夫伐雍門之荻十年襄二十五年武為政將中軍令薄諸侯之幣而重其禮魯叔孫豹見之謂豹曰自今以往兵其少弭齊崔慶新得政將求善于諸侯武也知楚令尹屈建也若敬行其禮道之以文辭以靖諸侯兵可以弭十一年襄二十六年衛甯喜弑殤公納獻公孫林父以戚叛武㑹魯襄公及諸侯之大夫于澶淵以討衛疆戚田執甯喜及衛獻公衛人歸衛姬于我乃釋獻公十二年襄二十七年宋向戍善于武又善于楚屈建欲弭諸侯之兵告于晉楚齊秦皆許之皆告于小國為㑹于宋五月武至于宋宋人享之羊舌肹為介司馬置折俎壬戌楚公子黒肱先至成言于晉成盟載之言两相然可丁卯宋向戍如陳從屈建成言于楚屈建謂向戍請晉楚之從交相見也使諸侯從晉楚者更相朝見向戍復于武武曰晉楚齊秦匹也晉之不能于齊猶楚之不能于秦也楚君若能使秦君辱于敝邑寡君敢不固請于齊向戍復言于屈建建使驛謁諸楚子楚子曰釋齊秦他國相見也秋七月戊寅武及公子黒肱盟以齊言要齊其辭至盟時不得復争訟庚辰屈建至自陳皆以藩為軍各以藩籬為軍不築營壘示不相忌晉楚各處其偏荀盈謂武曰楚氛甚惡懼難武曰吾左還入于宋若我何辛巳將盟于宋西門之外楚人衷甲及盟晉楚争先武曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉羊舌肹謂武曰子務徳勿争先乃先楚人壬午宋公兼享晉楚之大夫乙酉宋公及諸侯之大夫盟于蒙門之外前盟諸大夫不敢敵公禮也令宋公以近在其國故謙而重盟鄭伯享武于垂隴公孫舍之良霄公孫夏公孫僑游吉公孫黒肱公孫段從武曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志舍之賦草蟲取亦既覯止我心則降武曰善哉民之主也抑武也不足以當之良霄賦鶉之賁賁取人之無良我以為兄我以為君武曰牀第之言不踰閾況在野乎非使人之所得聞也公孫夏賦黍苗之四章比趙孟于召伯武曰寡君在武何能焉公孫僑賦隰桑取思見君子盡心以事之武曰武請受其卒章取心乎愛矣遐不謂矣游吉賦野有蔓草取邂逅相遇適我願矣武曰吾子之恵也印段賦蟋蟀取好樂無荒良士瞿瞿武曰善哉保家之主也我有望矣公孫段賦桑扈取君子樂胥受天之祜武曰匪交匪敖福將焉往若保是言也欲辭福禄得乎卒享武告羊舌肹曰伯有即良霄將為戮矣詩以言志志誣其上而公怨之以為賓榮其能久乎幸而後亡羊舌肹曰然已侈所謂不及五稔者夫子之謂矣武曰其餘皆數世之主也子展即舍之其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎及屈建卒武喪之如同盟十五年襄三十年武㑹諸侯之大夫于澶淵宋災故大夫謀歸宋財既而無歸于宋十七年昭元年武㑹楚公子圍及諸侯之大夫于虢尋宋之盟也祁午謂武曰宋之盟楚人得志于晉謂楚先歃今令尹之不信諸侯之所聞也子弗戒懼又如宋子木即屈建之信稱于諸侯猶詐晉而駕焉謂衷甲況不信之尤者乎武曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕于晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已許之乃盟魯季孫宿伐莒取鄆莒人告于㑹楚欲戮魯使樂王鮒求貨于叔孫豹豹弗與曰我以貨免魯必受師是禍之也雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨武聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚汚勞事出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視逺如邇疆埸之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可壹于是乎虞有三苗夏有觀扈皆國名商有姺邳二國商諸侯周有徐奄二國皆嬴姓自無令王諸侯逐進狎主齊盟其又可壹乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辯焉呉濮有釁呉在東濮在南建寕郡南有濮夷楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎魯莒争鄆為日久矣茍無大害于其社稷可無亢也去煩宥善莫不競勸子其圖之固請于楚而免之夏四月武及魯叔孫豹曹大夫入于鄭鄭伯兼享之武辭五獻朝聘之制大國之卿五獻用一獻武為客禮終乃宴叔孫豹賦鵲巢喻晉君有國趙孟治之武曰武不堪也又賦采蘩義取蘩菜薄物可以薦公侯曰小國為蘩大國省穡而用之其何實非命穡愛也鄭罕虎賦野有死麕之卒章義取君子徐以禮來無使我失節而使狗驚吠武賦棠棣取凡今之人莫如兄弟且曰吾兄弟比以安厖也可使無吠叔孫豹罕虎及曹大夫興拜舉兕爵曰小國賴子知免于戾矣飲酒樂武出曰吾不復此矣及周天王使劉定公勞武于潁館于雒汭冬十二月晉既烝武適南陽將㑹孟子餘即趙衰武之曽祖其廟在南陽徃㑹祭之甲辰朔烝于温庚戌卒州縣者樂豹之邑也欒氏亡士匄韓起及趙武皆欲之武曰温州本屬温吾縣也士匄韓起曰自郤稱以别三傳矣郤稱始受州自是州與温别傳三家晉之别縣不唯州誰獲治之武病之乃舍之二子曰吾不可以正議而自與也皆舍之及武為政武之子獲曰可以取州矣武曰退二子之言義也違義禍也余不能治余縣又焉用州其以徼禍也君子曰弗知實難知而弗從禍莫大焉有言州必死左傳武嘗與叔譽國語作叔向觀乎九原武曰死者如可作也吾誰與歸叔譽曰其陽處父乎武曰行并植于晉國不没其身謂剛而無謀為狐射姑所殺其知不足稱也其舅犯乎武曰見利不顧其君謂及河授璧請亡其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂武知人武其中退然如不勝衣其言呐呐然如不出諸其口所舉于晉國管庫之士七十有餘家生不交利死不屬其子焉記檀弓序國語韓非子新畧同武卒諡曰文記檀弓作獻文子二獲成成事平公為中軍佐平公二十五年昭九年周甘人與閻嘉争閻田我率陰戎伐潁王使辭于我辭責讓也㑹王有姻喪韓起使成如周弔且致閻田與襚襚送死衣反潁俘左傳成卒諡曰景子鞅嗣鞅後名志父成之子簡子也初事頃公頃公七年昭二十三年周有子朝之難王居于狄泉九年昭二十五年公使鞅㑹諸侯于黄父謀王室鞅令諸侯之大夫輸王粟具戍人曰明年將納王明年鞅及知躒帥師納王使女寛守闕塞我師克鞏子朝奔楚王入于成周我師使成公般戍周而還十三年昭二十九年鞅及荀寅帥師城汝濱所取陸渾地遂賦晉國一鼓鐵以鑄刑鼎令晉國各出功力共鼓石為鐵計令一鼓而足著士匄即范宣子所爲刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法僖二十七年文公蒐被廬修唐叔之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也范宣子蒐于夷在文六年一蒐而三易中軍帥貫季箕鄭之徒遂作亂若之何以為法頃公薨事定公定公十年定八年齊伐魯鞅及士鞅荀寅救之魯定公㑹我師于瓦衛地士鞅卒鞅為政我師將盟衛靈公于鄟澤先是衛叛我屬齊鞅欲摧辱之曰羣臣誰敢盟衛君者涉佗成何二子晉大夫曰我能盟之衛人請執牛耳盟禮尊者涖牛耳主次盟者成何曰衛吾温原也焉得視諸侯將歃涉佗捘衛靈公之手及腕擠血至腕靈公怒遂叛我我請改盟弗許遂伐我夷儀十二年定十年鞅圍衛報夷儀也夷儀之役衛伐邯鄲大夫午于寒氏晉地城其西北而守之午衆宵熸及我圍衛午以徒七十人門于衛西門殺人于門中曰請報寒氏之役涉佗曰夫子則勇矣然我徃必不敢啟門亦以徒七十人旦門焉步左右皆至而立如植如立木不動以示整日中不啟門乃退衛人懼貢五百家于鞅鞅置之邯鄲十五年定十三年鞅謂邯鄲大夫午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而置諸晉陽是絶衛之道也言衛以五百家在邯鄲為是故與邯鄲親不如侵齊而謀之侵齊則齊當來報欲因懼齊而徙乃如之而歸于晉陽鞅怒召午而囚諸晉陽曰吾私有討于午也二三子唯所欲立遂殺午午子稷以邯鄲叛鞅使上軍司馬籍秦圍邯鄲邯鄲午者荀寅之甥也秋七月荀寅士吉射伐趙氏之宫鞅奔晉陽晉人圍之公伐荀寅士吉射寅吉射奔朝歌韓不信魏曼多以趙氏為請十二月鞅入于絳盟于公宫遂改名曰志父十八年哀元年鞅伐朝歌明年衛靈公薨出公輒立鞅帥師納衛世子蒯瞶于戚齊人輸士吉射粟鄭罕達駟𢎞送之吉射逆之鞅禦之遇于戚卜戰龜焦兆不成樂丁晉大夫曰詩曰爰始爰謀爰契我龜謀協以故兆詢可也言始納衛太子卜得吉兆今既謀同可不須更卜鞅誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂得遂進仕人臣𨽻役免去厮役志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟桐棺三寸示罰也屬次大棺辟柂棺也王棺四重被水牛及犀之為一重辟為二重屬為三重大棺為四重君再重屬與辟為一重大棺為二重大夫一重無辟唯屬與大棺為一重今云不設辟者僣君制非正禮也素車樸馬無入于兆下卿之罰也將戰郵無恤即王良御鞅衛世子為右登鐵上邱名望見鄭師衆世子懼自投于車下無恤授世子綏而乘之曰婦人也鞅巡列曰畢萬匹夫也七戰皆獲有馬百乘死于牖下羣子勉之死不在冦繁羽御趙羅宋勇為右三子並晉大夫羅無勇麇之吏詰之御對曰痁作而伏衛世子禱曰曽孫蒯瞶敢昭告皇祖文王烈祖康叔文祖襄公鄭勝鄭聲公名亂從晉午晉定公名在難不能治亂使鞅討之蒯聵不敢佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩王不敢愛鄭人擊鞅中肩斃于車中獲其蠭旗旗名世子救之以戈鄭師北獲温大夫趙羅世子復伐之鄭師大敗獲齊粟千車鞅喜曰可矣傳傁鞅之屬曰猶有知在憂未艾也言知氏猶将為難追鄭師鄭罕達駟𢎞公孫林殿而射前列多死鞅曰國無小也二十年哀三年鞅圍朝歌師于其南荀寅伐其俘使其徒自北門入已犯師而出奔邯鄲鞅殺范臯夷惡范氏也二十一年哀四年齊衛救范氏圍我五鹿九月鞅圍邯鄲邯鄲降荀寅奔鮮虞趙稷奔臨晉邑齊逆之墮臨以處稷㑹鮮虞納荀寅于栢人明年晉圍栢人荀寅士吉射奔齊夏鞅伐衛范氏之故也遂圍中牟二十三年哀六年伐鮮虞治范氏之亂也二十六年哀九年宋伐鄭鞅􅁲救鄭占者曰利以伐姜不利子商明年鞅帥師伐齊大夫請卜之鞅曰吾卜于此起兵謂徃嵗卜伐宋不吉利以伐姜事不再令􅁲不襲吉行也于是乎取犁及轅毁髙堂之郭侵及賴而還三十一年哀十四年鞅帥師伐衛明年再伐衛是年衛世子蒯聵入立是為莊公出公輒出奔魯三十四年哀十七年鞅使告于衛曰君之在晉也志父為主請君若大子來以免志父不然寡君其曰志父之為也衛莊公辭以難大子又使椓之椓訴父欲速得位鞅圍衛㑹齊救衛鞅曰吾卜伐衛未卜與齊戰乃還冬十月我復伐衛入其郛將入城鞅曰止叔向有言曰怙亂滅國者無後衛人出莊公而與我平我立襄公之孫般師而還三十七年哀二十年鞅卒左傳史記世家作出公十七年張華曰簡子家在臨水界二冡并上氣成樓閣諡曰簡子無䘏嗣鞅嘗問壯馳兹晉大夫曰東方之士孰為瘉馳兹拜曰敢賀鞅曰未應吾問何賀對曰臣聞之國家之將興也君子自以為不足其亡也若有餘今主任晉國之政而問及小人又求賢人吾是以賀鞅又嘗歎曰雀入于海為蛤雉入于淮為蜃黿鼉魚鼈莫不能化唯人不能哀夫竇犫晉大夫侍曰臣聞之君子哀無人不哀無賄哀無徳不哀無寵哀名之不令不哀年之不登夫中行范氏不恤庶難而欲擅晉國今其子孫將耕于齊宗廟之犧為畎畝之勤人之化也何日之有國語王孫子簡子嘗獵于晉山之陽撫膺而歎董安于曰敢問何歎簡子曰吾有食榖之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也韓非子趙簡主出税者吏請輕重簡主曰勿輕勿重重則利入于上輕則利歸于民吏無私利而止矣又曰簡主謂左右車席泰美夫冠雖賤頭必戴之屨雖貴足必履之今車席泰美吾將何屩以履之夫美下而耗上妨義之本也説苑趙簡子乘敝車膄馬衣羖羊裘其宰曰車新則安馬肥則徃來疾狐白之裘温且輕簡子曰吾聞之君子服善則益㳟細人服善則益倨我以自備恐有細人之心也又曰或謂簡子曰君何不更乎簡子曰諾左右曰君未有過何更曰吾謂是諾未必有過也吾將以來諫者也今却之是却諫者諫者止我過無日矣又曰趙簡子與欒激游將沈于河曰吾嘗好聲色而激致之好宫室䑓榭而激為之好良馬善御而激求之今吾好士六年矣而激未嘗進一人是進吾過而黜吾善也韓詩外傳魏文侯之時子質仕而獲罪去而北游謂簡主曰從今以後不復樹徳于人矣簡主曰何以也質曰吾所樹堂上之士半朝廷之大夫半邊境之人亦半今堂上之士恐我以法邊境之人刼我以兵是以不樹徳于人矣簡主曰子言過矣夫春樹桃李夏得陰秋得實春樹蒺藜夏不可採其葉秋得刺焉由此觀之在所樹也今子所樹非其人也按趙簡子不與魏文侯同時又語與陽虎同無䘏鞅之子襄子也初姑布子卿見簡子司馬彪曰姑布姓子卿字簡子徧召諸子相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子于路殆君之子也簡子召子無䘏無䘏至則子卿起曰此真將軍矣簡子曰此其母賤翟婢也奚道貴哉子卿曰天所授雖賤必貴自是之後簡子盡召諸子與語無恤最賢簡子乃告諸子曰吾藏寳符于常山上先得者賞諸子馳之常山上求無所得無䘏還曰已得符矣簡子曰奏之無䘏曰從常山上臨代代可取也簡子于是知無䘏果賢乃廢太子伯魯而以無䘏為太子韓詩外傳趙簡子太子伯魯小子無䘏簡子自為一書牘曰節用聴聰敬賢勿慢使能勿賤親自表之與二子使誦之居三年簡子問二書所在伯魯亡其表令誦不能得無䘏出書于袖令誦習焉乃出伯魯而立無䘏簡子卒無䘏代立是為襄子是年越圍吳無䘏降喪食使楚隆問呉王無䘏姊前為代王夫人簡子既𦵏未除服北登夏屋請代王使厨人操銅枓以食代王及從者行斟陰令宰人各以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩筓自殺代人憐之所死地名之為摩笄之山吕氏春秋畧同水經注趙襄子既害代王迎姊代夫人夫人曰以弟慢夫非仁也以夫怨弟非義也磨笄自刺而死民憐之而立神屋于山側因名磨笄之山遂以代封伯魯子周為代成君伯魯者無䘏兄故太子太子蚤死故封其子史記世家無䘏使新穉狗晉大夫新穉穆子伐翟勝左人中人翟二邑遽人來告遽傳也無䘏將食尋飯有恐色侍者曰狗之事大矣不怡何也無䘏曰吾聞之徳不純而福禄並至謂之幸夫幸非福非徳不當雝雝不為幸吾是以懼國語列子畧同韓詩外傳趙簡子薨而未𦵏中牟畔之葬五日襄子興師次之圍未匝而城自壊者十丈襄子擊金退之軍吏曰君誅中牟之罪而城自壊是天助之也曷為退之襄子曰吾聞之叔向曰君子不乘人于利不厄人于險使其城然後攻之中牟聞而請降出公十一年荀瑤伐鄭將門瑤謂無䘏入之對曰主謂荀瑤在此瑤曰惡而無勇何以為子對曰以能忍恥庶無害趙宗乎無䘏由是惎瑤左傳淮南子趙簡子以襄子為後董閼于曰無恤賤今以為後何也簡子曰是為人也能為社稷忍羞異日知伯與襄子飲而批襄子之首大夫請殺之襄子曰先君之立我也曰能忍羞豈曰能刺人哉史記知伯圍鄭醉以酒灌擊毋䘏知伯歸因謂簡子使廢毋䘏毋䘏由此怨知伯按出公十一年簡子已卒説誤十八年知伯瑤與趙韓魏分范中行故地晉出公怒告齊魯欲伐四卿四卿恐遂共攻出公出公奔齊道死知伯乃立昭公曽孫驕是為晉懿公世家作襄子四年誤知伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱知伯怒遂率韓魏攻趙史記世家無䘏之宰張談即張孟談曰先主為重器也為國家之難盍姑無愛寶于諸侯乎無䘏曰吾無使也張談曰地也可地亦無䘏臣無䘏曰吾不幸有疾不夷于先子言行有闕病不及先子不徳而賄夫地也求飲吾欲是養吾疾而干吾禄也吾不與皆斃無䘏出曰吾何走乎從者曰長子晉别縣近且城厚完無䘏曰罷民力以完之又斃以守之其誰與我從者曰邯鄲之倉廩實無䘏曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寛也民必和矣乃走晉陽晉師圍而灌之沈竈産鼃民無畔意國語無䘏懼乃夜使張談私于韓魏與合謀以三月丙戌三國反滅知氏共分其地史記襄子奔保晉陽原過從後至于王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無䘏原過既至以告襄子襄子齊三日親自剖竹有朱書曰趙無䘏余霍泰山山陽侯天使也三月丙戌余將使女反滅知氏女亦立我百邑余將賜女林胡之地至于後世旦有伉王亦黒龍面而鳥噣髩麋髭髯大膺大胸修下而馮左袵界乘奄有河宗至于休溷諸貉南伐晉别北滅黑姑襄子再拜受三神之令及滅知氏遂祠三神于百邑使原過主霍泰山祠祀于是趙北有代南并知氏彊于韓魏其後娶空同氏生五子無䘏為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取成君子浣立為太子無䘏立三十三年卒史記世家諡曰襄子浣即位是為獻侯見趙世家世本公明生共孟及趙夙夙生成季衰衰生宣孟盾史記夙生共孟共孟生趙衰論曰晉之諸卿有先氏狐氏毛氏郤氏欒氏荀氏中行氏樹徳不滋卒斬厥祀然諸族亡而三家昌曲沃之宗不振其隨矣若夫趙之為趙也莊姬之譛邯鄲之伐與晉陽之圍不中絶者如綫使非成季宣孟壅苗三世其先諸宗而槁落乎尚史卷四十五
