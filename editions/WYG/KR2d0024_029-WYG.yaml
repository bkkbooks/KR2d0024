body:
  text: 尚史卷二十九列傳七鑲白旗漢軍李鍇撰周諸臣傳以下戰國時司寇布西周司寇布事西周武公武公之共太子死有五庶子無適立司寇布為周最即武公庶子謂周君曰君使人告齊王以周最不肯為太子也臣為君不取也函冶氏為齊太公買良劔公不知善歸其劔而責之金越人請買之千金折而不賣将死而屬其子曰必無獨知言必無告人獨知其良耳今君之使最為太子獨知之契也天下未有信之者也臣恐齊王之謂君實立果亦庶子而讓之于最以嫁之于齊君為多巧最為多詐君何不買信貨哉奉養無有愛于最也使天下見之國策周最周最者武公之庶子也史記公子咎為太子國策楚請立公子咎齊請立最説兩存姑闕之赧王四十五年周君之秦或謂周最曰不如譽秦王之孝也因以原為太后養地秦王太后必喜是公有秦也交善周君必以為公功交惡勸周君入秦者必有罪矣秦欲攻周最謂秦王昭王曰為王之國計者不攻周攻周實不足以利國而聲畏天下天下以聲畏秦必東合于齊兵敝于周而合天下于齊則秦孤而不王矣是天下欲罷秦故勸王攻周秦與天下俱罷則令不横行于天下矣蘇厲為最謂蘇子周臣曰君不如令王聴最以地合于魏趙故必怒鮑注蘇子怒合于齊怒最而反其所合是君以合齊與强楚吏産子時齊與楚善合齊則得與楚為與國可至再世産子言易也按吏産子語義未詳鮑解未安也君若欲因最之事謂與最同合魏趙此厲本謀也則合齊者君也割地者最也謂最曰仇赫宋相之相宋将以觀秦之應趙宋敗三國韓魏齊也三國不敗将與趙宋合于東方即韓魏齊以孤秦亦将觀韓魏之于齊也不固則将與宋敗三國則賣宋于三國言赫不忠于宋不應秦則應三國公何不令人謂韓魏之王曰欲秦趙之相賣乎何不合周最兼相使韓魏皆相之視之不可離則秦趙必相賣以合于王也最既相魏欲之齊客為最謂魏王哀王曰秦知趙之難與齊戰也将恐齊趙之合也必隂勁之趙不敢戰恐秦不已收也先合于齊秦趙争齊而王無人焉不可王不去周最合與收齊而以兵急之則伐齊無固守矣言不去周最使之合齊而以兵伐之則秦亦必伐齊謂最曰魏王以國與先生貴合于秦以伐齊薛公故主最嘗仕齊故以薛公為故主主者猶孔子適宋主司城貞子之謂也鮑彪以為指齊閔王恐誤輕忘其薛不顧其先君之邱墓謂田文欲去國以避秦兵而公獨修虚信為茂行明羣臣據故主不與伐齊産以忿强秦産猶生也謂生此節目也不可公不如謂魏王薛公曰請為王入齊天下不能傷齊而有變臣請為救之無變王遂伐之言有變臣救齊無變王伐秦且臣為齊奴也如累王之交于天下不可言臣為齊如奴事主不可因臣而使王惡于天下鮑注以交謂齊魏恐亦誤王為臣賜厚矣臣入齊則王亦無齊之累也最入齊謂吕禮齊人曰子何不以秦攻齊臣請令齊相子禮使秦攻齊齊欲免攻故可使相禮子以齊事秦必無慮矣子因令最居魏以共之是天下制于子也子東重于齊西貴于秦秦齊合則子常重矣齊聴祝弗齊人外最或謂齊王閔王曰逐周最聴祝弗相吕禮者欲深取秦也秦得天下則伐齊深矣言秦得齊則益强强則亦不能存齊夫秦齊合則趙恐伐故急兵以示秦趙恐秦伐之急兵以攻齊秦以趙攻與之齊伐趙其實同理必不處矣言秦以趙攻齊與趨齊伐趙其實相同以理斷之必不據齊以伐趙齊無兵而趙已出兵故也之趨也處據也鮑注以理字為句故用祝弗即天下之理也理在受兵于趙也謂田文即薛公曰周最于齊王厚也而逐之聴祝弗相吕禮者欲取秦也秦齊合弗與禮重矣有齊秦必輕君君弗如急北兵趨趙以秦魏收周最以為後行後行猶後舉言與趙攻秦收最用之以為後舉且反齊王之信又禁天下之率齊前與秦合今與趙攻之反其信也率從之又禁天下使從于齊齊無秦天下果弗必走齊王誰與為其國言齊不合秦天下果于從齊祝弗必将出走而齊舍田文無與為國矣果為句鮑注以果弗必走為決不趨齊恐誤或為最謂金投葢趙人之不善齊者曰秦以周最之齊疑天下疑天下合而攻已又知趙之難子言趙不敢違投齊人戰恐秦既疑齊投又不善齊故齊懼伐齊之合必先合于秦秦齊合則公之國虚矣公不如救齊因佐秦而伐韓魏上黨長子並韓地趙之有已公東收寶于秦南取地于韓魏因以困徐為之東則有合矣東謂齊言齊趙合也最謂金投曰公負令秦與强齊戰負猶失也其失在此也戰勝謂齊勝秦秦且收齊而封之使無多割而聴天下之戰言齊勝秦秦收齊而疆理之諸國求地于齊齊不多割則必戰此秦弱齊之計不勝謂齊不勝秦國大傷不得不聴秦言齊不勝秦國必大傷不得不合于秦也鮑注以戰勝收齊謂秦勝而疆理齊不勝國大傷謂趙令秦與齊戰秦不勝必咎趙趙必大傷詳其辭理恐亦誤也秦盡韓魏之上黨太原西土秦之有已秦地天下之半也制齊楚三晉之命覆國且身危是何計之道也國策游騰樊餘游騰樊餘並周人秦令樗里疾秦恵王弟以車百乗入周周君迎之以卒甚敬楚王懷王怒讓周以其重秦客騰謂楚王曰昔智伯欲伐厹由夷國遺之大鐘載以廣車因隨入以兵厹由卒亡無備故也桓公伐蔡也號言伐楚其實襲蔡今秦虎狼之國也兼有吞周之意使樗里疾以車百乗入周周君懼焉以蔡厹由惑之故使長兵在前强努在後名曰衛疾而實囚之周君豈能無愛國哉恐一日之亡國而憂大王楚王乃悦韓魏易地西周弗利樊餘謂楚王曰周必亡矣韓魏之易地韓得二縣魏亡二縣所以為之者盡包于周多于二縣九鼎存焉且魏有南陽鄭地山川而包二周則楚方城之外危韓兼兩上黨逺韓近趙故言兩以臨趙即趙羊腸以上危故易成之日楚趙皆輕楚王恐因趙兵以止易及秦敗楚漢中楚王入秦秦王留之游騰為楚謂秦王曰王挾楚王而與天下攻楚則傷行矣不與天下攻之則失利矣王不如與之盟而歸之楚王必不敢背盟背盟王與三國攻之義也國語綦毋恢綦毋恢周人也秦敗魏犀武于伊闕遂進攻周周君之魏求救魏王昭王以上黨之急或有韓趙兵辭之周君反見梁囿而樂之也恢謂周君曰温囿不下此而又近臣能為君取之反見魏王王曰周君怨寡人乎對曰不怨且誰怨乎臣為王有患也周君謀主也而設以國為王扞秦而王無之扞也臣見其必以國事秦也秦悉塞外之兵與周之粟以攻南陽而兩上黨絶矣言趙韓援魏之路絶魏王曰然則奈何恢曰周君形不好小利事秦而好小利小利謂温囿言有秦助則無國患乃得游觀今王許戍三萬人與温囿周君得以為辭于父兄百姓而私温囿以為樂必不合于秦臣嘗聞温囿之利計嵗八十金周君得温囿以其事王者嵗百二十金是上黨無患而贏四十金魏王因使孟夘致温囿于周君而許之戍國策宫他馮雎宫他周人謂周君曰宛恃秦而輕晉秦飢而宛亡宛故申伯國秦飢不暇救宛晉滅之鄭恃魏而輕韓魏攻蔡而鄭亡鄭君乙二十一年韓哀侯乃滅之邾莒亡于齊邾曺姓國莒盈姓國邾二十九世莒三十世楚滅之葢恃齊也陳蔡亡于楚楚恵王十年滅陳四十二年滅蔡葢恃楚不備也此皆恃援國而輕近敵也今君恃韓魏而輕秦國恐傷君不如使周最隂合于趙以備秦則不毁魏周肖鮑注疑即霄謂他曰子為肖謂齊王王建曰肖願為外臣令齊資我于魏他日不可是示齊輕也夫齊不以無魏者以害有魏者為魏所重者曰有魏無魏反是故公不如示有魏公曰王之所求于魏者臣請以魏聴齊必資公矣是公有齊以齊有魏也他有罪亡之東周盡輸西周之情于東周東周大喜西周大怒有馮雎者曰臣能殺之君予金三十斤雎使人操金與書間遺他曰告宫他事可成勉成之不可成亟亡來事久且泄自令身死因使人告東周之侯曰今夕有姦人當入者矣候得而獻東周東周立殺他國䇿顔率顔率周人也秦興師臨周而求九鼎周君患之以告顔率率曰大王勿憂臣請東假救于齊率至齊謂齊王閔王曰夫秦之無道也欲興兵臨周而求九鼎周之君臣内自盡計與秦不若歸之大國夫存危國羙名也得九鼎厚實也願大王圖之齊王大發師五萬人使陳臣恩将以救周而秦兵罷齊将求九鼎周君又患之率曰大王勿憂臣請東解之率至齊謂齊王曰周賴大國之義得君臣父子相保也願獻九鼎不識大國何涂之從而致之齊齊王曰寡人将寄徑于梁率曰不可夫梁之君臣欲得九鼎謀之暉臺之下沙海之上其日久矣鼎入梁必不出齊王曰寡人将寄徑于楚對曰不可楚之君臣欲得九鼎謀之葉庭之中其日久矣若入楚鼎必不出王曰寡人終何涂之從而致之齊率曰敝邑固竊為王患之夫鼎者非效壺醯醤瓿耳可懐挾提挈以至齊者非效鳥集烏飛興馬逝灕然止于齊者昔周之伐殷得九鼎凡一鼎而九萬人輓之九九八十一萬人士卒師徒械器被具所以備者稱此今大王縱有其人何涂之從而出竊為大王私憂之齊王曰子之數來猶無與耳率曰不敢欺大國疾定所從出敝邑遷鼎以待命齊王乃止率見韓公仲公仲不見率謂謁者曰公仲必以率為陽故不見也公仲好内率曰好士公仲嗇于財率曰散施公仲無行率曰好義自今以來率亦正言之而已矣謁者以告公仲遽見之國䇿馬犯馬犯周臣也赧王四十二年秦破華陽約破魏将芒夘犯謂周君曰請令梁戍周乃謂梁王安釐王曰周王病若死則犯必死矣正義周王憂懼國破若身之重病犯請以九鼎自入于王王受九鼎而圖犯梁王曰善遂與之卒言戍周因謂秦王曰梁非戍周也将伐周也王試出兵境以觀之秦果出兵又謂梁王曰周王病甚矣犯請後可而復之國䇿甚作瘉後可而復之者言王病瘉所圖不遂請得其後有可之時以鼎入梁也今王使䘚之周諸侯皆生心後舉事且不信不若令卒為周城以匿事端梁王曰善遂使城周史記周累東周周累周人也秦攻韓宜陽周君謂周累曰子以為何如對曰宜陽必拔也君曰宜陽城方八里材士十萬粟支數年公仲韓相之軍二十萬景翠楚将以楚之衆臨山而救之秦必無功對曰甘茂羈旅也攻宜陽而有功則周公旦也無功則消迹于秦秦王不聴羣臣父兄之議而攻宜陽宜陽不拔秦王恥之臣故曰拔君曰子為寡人謀且奈何對曰君謂景翠曰公爵為執珪官為柱國戰而勝則無加焉矣不勝則死不如背秦援宜陽翠時援宜陽而有秦私故説之公進兵秦恐公之乗其敝也必以寳事公公仲慕公之為己乗秦也亦必盡其寶秦拔宜陽景翠果進兵秦懼遽效煮棗韓氏果亦効重寶景翠得城于秦受寶于韓而徳東周國䇿杜赫杜赫周人赫欲重楚景翠于周謂周君曰君之國小盡君之重寶珠玉以事諸侯不可不察也譬之如張羅者張之于無鳥之所則終日無所得矣張于多鳥處則又駭鳥矣必張于有鳥無鳥之際然後能多得鳥矣今君将施于大人大人輕君施于小人小人無可以求又費財焉君必施于今之窮士不必且為大人者故能得欲矣周䇿八鮑彪注齊策楚䇿皆有杜赫當齊威王周顯王時去此十年疑杜赫名誤按楚策杜赫曰楚杜赫葢别是楚人而同名氏者吕倉工師藉吕倉工師藉者皆周相也事周文君鮑彪注恵公後别有此君或恵公别稱淮南子亦有周昭文君工師藉免吕倉為相吕倉見客于周君前相工師藉恐客之傷已也因令人為周君曰客者辯士也然而所以不可者好毁人周文君之免工師藉相吕倉也國人不説君亦有閔閔之心或謂周文君曰國必有誹譽忠臣令誹在已譽在上宋君奪民時以為䑓而民非之子罕釋相為司空民非子罕而善其君齊桓公宫中女市女閭七百國人非之管仲故為三歸之家以掩桓公春秋記臣弑君者以百數皆大臣見譽者也故大臣得譽非國家之羙也故衆庶成强増積如山周君遂不免謂卒相倉也國䇿温人温人之周周不納客即對曰主人也問其巷而不知也吏囚之君使人問之曰子非周而自謂非客何也對曰臣少而誦詩詩曰普天之下莫非王土率土之濱莫非王臣今周君天下則我天子之臣而又為客哉故曰主人君乃使吏出之國策論曰戰國之士重舌辯傾危反覆無足取者滙之以見世風之變爾尚史卷二十九
