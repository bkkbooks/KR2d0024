body:
  text: 尚史卷十三世家六鑲白旗漢軍李鍇撰衛世家始武王十三年終秦二世元年凡九百一十四年傳三十七世康叔康伯考伯嗣伯􅛨伯靖伯貞伯頃侯衛康叔名封周武王同母弟也武王即位于社南羣臣畢從毛叔鄭奉明水康叔封傳禮史記康叔封布兹召公奭賛采師尚父牽牲汲冢周書既克殷封康叔為衛侯書序成王既伐管蔡以殷餘民封康叔史記因之蔡氏識其誤以為武王封之今從蔡氏居河淇之間分之以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土疆自武父之南及圃田之北竟取于有閻之土以共王職取于相土之東都以㑹王之東蒐􅆅季授土陶叔授民左傳王若曰孟侯朕其弟小子封惟乃丕顯考文王克明徳慎罸不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時叙乃寡兄朂肆汝小子封在兹東土王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣徳言往敷求于殷先哲王用保乂民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若徳裕乃身不廢在王命王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民王曰嗚呼封敬明乃罰人有小罪非𤯝乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺王曰嗚呼封有叙時乃大明服惟民其勅懋和若有疾惟民其畢棄咎若保赤子惟民其康乂又曰非汝封刑人殺人無或刑人殺人非汝封劓刵人無或劓刵人王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚王曰汝陳時臬事罰蔽殷彛用其義刑義殺勿庸以次汝封乃汝盡遜曰時叙惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕徳惟乃知凡民自得罪冦攘姦宄殺越人于貨睯不畏死㒺弗憝王曰封元惡大憝惟不孝不友子弗祇服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑兹無赦不率大戞矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非徳用乂汝亦㒺不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌王曰封爽惟民廸吉康我時其惟殷先哲王徳用康乂民作求矧今民㒺廸不適不廸則罔政在厥邦王曰封予惟不可不監告汝徳之説于罰之行今惟民不静未戾厥心廸屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天王曰嗚呼封敬哉無作怨勿用非謀非彛蔽時忱丕則敏徳用康乃心顧乃徳逺乃猷裕乃以民寧不汝瑕殄王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命髙乃聽用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享尚書商受酗酒天下化之妹土商之都邑染惡尤甚武王以其地封康叔故又作酒誥梓材教之書序衛世家梓材示君子可法則故謂之康誥酒誥梓材以命之按蔡傳以梓材文多不類若人臣進戒之辭仁山金氏亦以為治洛命侯邦之文詳辭義信非命康叔之文故不録康叔之國既以此命能和集其民民大説武王崩成王立舉康叔為周司寇康叔薨子康伯即位系本康伯名髠宋忠云即王孫牟也事康王為大夫左傳所謂王孫牟父是也譙周古史考作牟伯康伯薨子考伯即位考伯薨子嗣伯即位嗣伯薨子􅛨伯即位系本作摯伯􅛨伯薨子靖伯即位靖伯薨子貞伯即位系本作箕伯貞伯薨子頃侯即位史記頃侯厚賂周夷王命衛為侯孔安國曰方伯州牧也五代恒為方伯至頃侯徳衰不監諸侯乃從本爵而稱侯非是至子而削爵及賄夷王而稱侯也按世家云頃侯立十二年卒子釐侯立釐侯十三年厲王出犇于彘以犇彘之年逆推之頃侯元年當在厲王十三年而夷王已前死十餘年其曰賂夷王命為侯誤頃侯十二年薨子僖侯即位十三年厲王犇于彘共和行政二十八年宣王立四十二年僖侯薨史記諡曰僖在位四十二年武公武公名和僖侯子僖侯世子恭伯恭伯早卒詩序僖侯薨恭伯弟和立是為武公史衛世家釐侯卒大子共伯餘立為君共伯弟和有寵于釐侯多與之賂和以其賂賂士以襲攻共伯于墓上共伯入釐侯羡自殺衛人因葬之釐侯傍謐曰共伯而立和是為武公楊慎曰大史公未見毛詩左傳附㑹至此武公元年宣王十六年也武公即位修康叔之政百姓和集三十一年宣王崩幽王立四十二年犬戎殺幽王武公將兵往佐周平戎甚有功平王命武公為公五十五年薨史記衛本侯爵自武公以下皆稱公按春秋經魯隠公八年春宋公衛侯遇于垂固知稱公之僭自武公始也或平王止命武公為公如史之説而莊公以下遂稱之也在位五十五年諡曰武武公年九十五猶箴儆于國曰自卿以下至于師長士茍在朝者無謂我老髦而舍我必恪恭于朝夕以交戒我在輿有旅賁之規位宁有官師之典倚几有誦訓之諫居寝有􅉏御之箴臨事有瞽史之道宴居有工師之誦史不失書矇不失誦以訓御之于是作懿戒即大雅抑之詩以自儆國語又飲酒悔過作賔之初筵韓詩外傳及其沒也謂之叡聖武公莊公桓公十三年入春秋莊公名揚武公薨莊公即位在位二十三年薨諡曰莊莊公有寵妾生子州吁長好兵莊公使將石碏諫不聽及莊公薨大子完即位是為桓公桓公二年州吁驕奢公絀之州吁出奔十三年隠元年鄭伯弟段攻其兄不勝亡而州吁求與之友十五年隠三年平王崩桓王立十六年隠四年州吁收聚衛亡人以襲殺桓公州吁自立為衛君史記夏及宋公陳侯蔡人伐鄭秋復伐鄭左傳詩序州吁用兵暴亂使公孫文仲與陳蔡伐鄭國人怨其勇而無禮作擊鼓之詩州吁好兵弑桓公衛人不愛秋州吁如陳石碏使右宰醜涖殺州吁于濮而迎桓公弟晉于邢而立之是為宣公史記宣公元年隠五年夏四月葬桓公左傳在位十六年諡曰桓宣公宣公名晉元年隠五年秋我師入郕衛亂郕侵衛故四年隠八年齊侯將平宋衛于鄭春公及宋公遇于垂齊人卒平宋衛于鄭秋七月公及宋公齊侯㑹于温盟于瓦屋六年隠十年宋公不王鄭以王命伐宋秋七月我及宋人入鄭蔡人從之伐戴鄭伯圍戴克之取三師宋衛蔡三國師十年桓三年夏公及齊侯胥命于蒲申約言以相命而不㰱血也十一年桓五年夏我及陳蔡從王伐鄭十四年桓七年秋我及齊鄭伐盟向二邑求成于鄭而背之故十七年桓十年秋魯侯㑹公于桃邱弗遇冬十二月公齊侯鄭伯戰魯于郎十八年桓十一年春正月我及齊鄭宋盟于惡曹經不書宋夏鄭祭仲立公子突即厲公鄭忽即昭公來奔十九年桓十二年冬十一月公薨惠公元年桓十三年葬左傳在位十九年諡曰宣惠公惠公名朔宣公子宣公烝于夷姜生㥯子屬諸右公子職為之娶于齊而美公取之是為宣姜生夀及朔屬夀于左公子洩宣姜與朔構急子公使盗殺夀及急子宣公薨朔立是為惠公惠公元年桓十三年春二月魯侯㑹紀侯鄭伯及公齊侯宋公燕人戰我師齊師宋師燕師敗績宋立突多責賂于鄭鄭不堪命故二年桓十四年冬十二月宋以諸侯齊蔡衛陳伐鄭三年桓十五年春三月桓王崩莊王立冬公㑹諸侯魯宋陳于袲伐鄭將納厲公弗克而還四年桓十六年春正月公㑹諸侯魯宋蔡于曹謀伐鄭夏公會諸侯魯宋蔡衛伐鄭冬十一月左公子洩右公子職怨公立公子黔牟公出奔齊公羊天子使守衛朔而不能使衛小衆越在岱隂齊屬負兹舍不即罪爾注言以朝廟告月朔使衛發小衆不能使行走越于齊託有疾止不就罪也天子有疾稱不豫諸侯曰負兹大夫稱犬馬士曰負薪榖梁天子召而不往也五年桓十七年及宋人魯人伐邾十一年荘五年冬魯伐我納公十二年莊六年春正月王人子突救我夏公入放黔牟于周放寗跪于秦殺左公子洩右公子職十八年莊十二年莊王崩僖王立經傳不載二十年荘十四年冬我㑹周單伯諸侯齊宋鄭于鄄宋服故二十一年莊十五年春復㑹諸侯齊宋陳衛鄭于鄄齊桓公始霸二十二年莊十六年夏我及宋人齊人伐鄭鄭侵宋故冬十二月公㑹諸侯齊宋陳鄭許滑滕同盟于幽鄭成故二十三年莊十七年僖王崩惠王立亦不載二十五年莊十九年秋周子頽伐惠王弗克出奔温蘇子奉子頽來奔我師燕師伐周冬立子頽二十六年莊二十年春鄭伯虢叔納王殺子頽三十一年莊二十五年夏五月公薨左傳在位二十一年諡曰惠懿公懿公名赤惠公子惠公薨赤立是為懿公懿公二年莊二十七年惠王使齊請伐我以我立子頽也三年莊二十八年春三月齊伐我我及齊人戰我師敗績戴公元年閔一年冬十二月狄人伐我公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰及狄人戰于熒澤我師敗績公不去其旗是以甚敗遂滅衛左傳紀年晉獻公十七年衛懿公及赤狄戰于洞澤按洞當作泂戴公戴公名申惠公庶兄公子頑烝于宣姜生齊子戴公申文公燬宋桓夫人許穆夫人戴公元年閔二年狄敗衛宋桓公逆諸河宵濟衛之遺民男女七百三十人益之以共滕之民為五千人立戴公以廬于曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩是年公薨左傳文公文公名燬戴公薨文公立二年僖二年春諸侯城楚邱而封我四年僖四年春公㑹諸侯齊魯宋陳鄭許曹侵蔡蔡潰遂伐楚次于陘冬我㑹諸侯之師齊魯宋鄭許曹侵陳陳成討轅濤塗不忠五年僖五年夏公及諸侯齊魯宋陳鄭許曹㑹王世子于首止謀寧周秋八月諸侯盟于首止鄭伯逃歸不盟六年僖六年夏公㑹諸侯齊魯宋陳曹伐鄭圍新城逃首止盟故八年僖八年春正月公㑹王人諸侯齊魯宋許曹陳盟于洮謀王室時惠王已崩襄王惡大叔帯之難懼不發喪而告難于齊冬十二月惠王崩惠王實以七年閏月崩子襄王立九年僖九年夏公㑹宰周公諸侯齊魯宋鄭許曹于葵邱齊侯以諸侯之師伐晉討晉里克之亂十年僖十年春狄滅温温子來奔十二年僖十二年春諸侯城我楚邱之郛十三年僖十三年春狄侵我夏公㑹諸侯齊魯宋陳鄭許曹于鹹淮夷病把故且謀王室秋為戎難故諸侯戍周十四年僖十四年春諸侯城縁陵遷把十五年僖十五年春楚伐徐公㑹諸侯前諸侯盟于牡邱遂次于匡諸侯之大夫救徐十六年僖十六年秋王以戎難告于齊齊徴諸侯戍周冬十二月公㑹諸侯齊魯宋陳鄭許邢曹于淮謀鄫且東畧齊桓公卒齊立無虧孝公奔宋十八年僖十八年春宋以我師及諸侯曹邾伐齊齊殺無虧冬邢人狄人伐我圍莵圃公以國讓父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師于訾婁狄師還十九年僖十九年秋伐邢二十一年僖二十一年春狄侵我二十五年僖二十五年春正月伐邢遂滅邢夏四月公薨諡曰文秋葬文公文公之封于楚邱也大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘左傳文公在位二十五年成公成公名鄭文公子文公二十五年僖二十五年薨成公立我平魯莒冬十二月公會魯侯莒慶盟于洮成公元年僖二十六年春正月寗速㑹魯侯莒子盟于向夏齊伐魯北鄙我伐齊三年僖二十八年春晉侯將伐曹假道于我我弗許晉侵曹伐我取五鹿二月晉齊盟于歛盂公請盟晉人弗許公欲與楚國人不欲故出公以説于晉公出居襄牛楚人救我夏四月戰于城濮楚師敗績公聞楚師敗懼出奔楚遂適陳五月元咺奉叔武成公弟㑹諸侯晉魯齊宋蔡鄭莒盟于踐土或訴元咺于公曰立叔武矣其子角從公公使殺之六月晉人復公寗俞衛大夫與國人盟于宛濮曰既盟之後行者無保其力居者無懼其罪有渝此盟明神先君是糾是殛國人聞此盟也而後不貳公先期入寗俞先長牂衛大夫守門以為使也與之乘而入公子顓犬華仲並衛大夫前驅射殺叔武公知其無罪也枕之股而哭之顓犬走出公使殺之元咺出奔晉公羊晉文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故于是已立然後為踐土之㑹治反衛侯衛侯得反曰叔武簒我元咺争之曰叔武無罪終殺叔武元咺走而出冬諸侯晉魯齊宋蔡鄭陳莒邾秦㑹于温公與元咺訟公不勝執公歸之于京師寘諸深室元咺歸于衛立公子瑕五年僖十三年晉侯酖公不死㑹魯為之請納玉于王與晉侯皆十㲄王許之秋乃釋公公使賂周歂冶厪並衛大夫曰苟能納我吾使爾為卿歂厪殺元咺及公子瑕瑕弟子儀公復入六年僖三十十年冬狄圍我我遷于帝邱卜曰三百年七年僖三十二年夏狄有亂我侵狄狄請平秋我及狄盟晉文公之末年諸侯朝晉公不朝使孔逹侵鄭伐緜訾及匡九年文元年晉襄公使先且居胥臣伐我圍戚夏六月取之獲孫林父我使告于陳陳共公曰更伐之我辭之孔逹伐晉十年文二年夏六月晉士縠㑹諸侯宋陳鄭魯盟于垂隴陳共公為我請成于晉執孔逹以説十一年文三年春公如陳拜晉成十二年文四年春晉歸孔逹夏公如晉拜秋使寗俞如魯聘十三年文五年冬晉陽處父來聘十五年文七年秋八月公會諸侯晉大夫魯齊宋陳鄭許曹晉趙盾盟于扈十六年文八年秋八月襄王崩子頃王立十七年文九年春楚伐鄭孔逹㑹諸侯之大夫晉魯宋許救鄭二十一年文十三年冬魯侯如晉朝公㑹魯侯于㳫請平于晉我貳于楚故狄侵我二十二年文十四年春頃王崩匡王立夏六月公㑹諸侯晉大夫魯宋陳鄭許曹晉趙盾同盟于新城從楚者服且謀納邾㨗菑二十三年文十五年冬十一月公及諸侯晉宋蔡陳鄭許曹盟于扈尋新城之盟且謀伐齊齊執周單伯且數伐魯故齊人賂晉侯不克伐而還宋人弑昭公二十五年文十七年春孔逹及晉陳鄭之大夫伐宋二十八年宣二年夏晉以我師宋師陳師侵鄭鄭為楚伐宋故冬十月匡王崩定王立三十二年宣六年春孫免及晉趙盾侵陳陳即楚故三十三年宣七年春使孫良夫如魯盟冬公㑹諸侯晉魯宋鄭曹盟于黒壤三十五年宣九年秋九月公㑹諸侯晉宋鄭曹于扈陳侯不㑹晉荀林父以諸侯之師伐陳冬十月公薨左傳諡曰成在位三十五年穆公穆公名遫成公子成公薨穆公即位元年宣十年夏六月晉以我師宋師曹師伐鄭鄭及魯平故取成而還三年宣十二年孔達及晉宋曹同盟于清邱宋為盟故伐陳陳貳于楚故我救陳晋以為討五年宣四十年春我殺孔達以説于晋八年宣十七年夏六月公㑹諸侯晋魯曹邾于斷道將伐齊九年宣十八年春世子臧㑹晋侯伐齊十一年成二年春孫良夫侵齊齊敗我師于新築良夫遂如晋乞師魯臧孫許亦如晋乞師夏六月孫良夫㑹晋師魯師曹師及齊侯戰于鞌齊師敗績秋九月公薨謚曰穆定公元年葬穆公左傳穆公在位十一年定公定公名臧穆公子穆公十一年成二年薨定公即位是年冬楚鄭侵我我請平十一月孫良夫及楚公子嬰齊魯侯蔡侯許男及諸侯之大夫秦宋陳鄭齊曹邾薛鄫盟于蜀定公元年成三年春正月公㑹諸侯晋魯宋鄫伐鄭討邲之役秋孫良夫晋郤克伐廧咎如赤狄之餘廧咎如潰冬十一月使良夫如魯聘丁未盟三年成五年冬十一月定王崩簡王立十二月公會諸侯晋魯齊宋鄭曹邾杞同盟于蟲牢鄭服故諸侯謀復㑹宋辭四年成六年春三月孫良夫及晋師鄭師伊雒之戎陸渾蠻氏侵宋五年成七年秋楚伐鄭公㑹諸侯晉魯齊宋曹莒邾杞救鄭八月同盟于馬陵公惡孫林父良夫之子冬林父以戚奔晉公如晉晉反我戚七年成九年春正月公㑹諸侯晉魯齊宋鄭曹莒邾同盟于蒲将㑹呉呉人不至晉以鄭貳于楚執鄭伯八年成十年春黒背公弟侵鄭夏五月公㑹諸侯晉魯齊宋曹伐鄭鄭成鄭伯歸十年成十二年夏公㑹晉侯魯侯于𤨏澤晉楚成故十一年成十三年夏五月公從劉康公成肅公㑹諸侯晉魯齊宋鄭曹邾滕伐秦戰于麻隧秦師敗績十二年成十四年春公如晉晉侯强見孫林父公不可夏晉侯使郤犨送林父公見而復之公有疾使孔烝鉏寗殖立子衎為大子冬十月公薨諡曰定獻公元年成十五年春二月葬定公左傳定公在位十二年獻公殤公獻公名衎定公子母曰敬姒定公薨獻公即位元年成十五年春三月公㑹諸侯晉魯鄭曹宋齊邾同盟于戚晉執曹伯歸于京師討其殺大子而自立冬十一月孫林父㑹諸侯之大夫晉魯齊宋鄭邾㑹呉于鍾離二年成十六年鄭從初夏四月公伐鄭至于鳴鴈晉伐鄭郤犨來乞師戰于鄢陵之日公出于衛秋公㑹諸侯晉魯齊宋邾于沙隨三年成十七年春鄭侵晉北宫括救晉侵鄭至于髙氏夏五月公㑹尹武公單襄公及諸侯晉魯宋曹齊邾伐鄭六月同盟于柯陵冬公㑹單襄公及諸侯伐鄭十月圍鄭楚救之諸侯還四年成十八年楚伐宋冬十二月公㑹諸侯晉宋邾及魯齊之大夫同盟于虚朾謀救宋五年襄元年春正月寗殖㑹諸侯之大夫晉齊宋曹莒邾滕薛圍宋彭城宋魚石叛討魚石也夏晉韓厥伐鄭公次于戚以為之援秋九月簡王崩子靈王立冬使公孫剽如魯聘六年襄二年夏寗殖及晉師宋師侵鄭秋七月孫林父㑹諸侯之大夫晉魯宋曹邾于戚謀鄭故冬復㑹于戚城虎牢以偪鄭鄭人乃成七年襄三年夏六月公㑹單頃公及諸侯晉宋鄭莒邾齊同盟于雞澤陳使袁僑如㑹戊寅及陳袁僑盟九年襄五年春孫林父㑹呉于善道秋公㑹諸侯晉魯宋陳鄭曹莒邾滕薛齊呉鄫于戚㑹呉且命戍陳冬楚伐陳十一月公㑹諸侯晉魯宋鄭曹齊于城棣以救陳十一年襄七年秋魯季孫宿來冬十月使孫林父如魯聘壬戌及魯盟楚圍陳十二月公㑹諸侯晉魯宋陳曹莒邾于鄬以救陳十二年襄八年夏五月寗殖㑹諸侯晉鄭齊宋邾于邢邱十三年襄九年冬十月公㑹諸侯晉魯宋曹莒邾滕薛杞小邾齊伐鄭鄭從楚故鄭行成十二月同盟于戯晉以諸侯復伐鄭閏月侵鄭次于隂口而還十四年襄十年春公㑹諸侯前諸侯㑹呉于柤夏五月楚鄭伐宋公救宋師于襄牛鄭皇耳侵我我追之獲皇耳秋公㑹諸侯前諸侯伐鄭師于牛首城號牢而戍之鄭及晉平㑹楚救鄭鄭又與楚人盟諸侯之師還侵鄭北鄙而歸十五年襄十一年夏四月公㑹諸侯前諸侯伐鄭鄭行成秋七月同盟于亳城北楚伐鄭鄭逆之伐宋九月諸侯悉師復伐鄭冬十月鄭成十二月㑹于蕭魚楚敗呉十八年襄十四年春正月北宫括㑹諸侯前諸侯之大夫㑹呉于向夏四月北宫括㑹諸侯前諸侯之大夫伐秦公怒孫林父寗殖林父殺羣公子公出奔齊齊人以郲寄公國人立公孫剽是為殤公殤公者穆公孫也孫林父寗殖相之以聽命于諸侯冬孫林父㑹諸侯之大夫晉魯宋鄭莒邾于戚謀定我殤公二年襄十六年春三月公㑹諸侯晉魯宋鄭曹莒邾薛杞小邾于溴梁戊寅寗殖及諸侯大夫盟三年襄十七年石買孫蒯伐曹取重邱四年襄十八年夏晉執我行人石買及孫蒯為曹故冬十月公㑹諸侯晉魯宋鄭曹莒邾滕薛杞小邾同圍齊五年襄十九年春正月諸侯前諸侯盟于祝柯夏孫林父晉欒訪伐齊六年襄二十年夏六月公㑹諸侯晉魯齊宋鄭曹莒邾滕薛杞小邾盟于澶淵齊成故七年襄二十一年晉欒盈亂春公㑹諸侯晉魯齊宋鄭曹莒邾于商任錮欒氏八年襄二十二年冬公㑹諸侯晉魯齊宋鄭曺莒邾薛杞小邾于沙隨復錮欒氏九年襄二十三年秋齊伐我自我伐晉十年襄二十四年秋八月公㑹諸侯晉魯宋鄭曹莒邾滕薛杞小邾于夷儀將以伐齊水不克冬楚伐鄭以救齊諸侯還救鄭十一年襄二十五年夏五月公㑹諸侯前諸侯于夷儀伐齊齊已弑荘公遂與晉平晉侯使魏舒宛沒逆獻公將使衛與之夷儀齊崔杼止其帑以求五鹿秋七月諸侯前諸侯同盟于重邱齊成故八月獻公入于夷儀獻公自夷儀使母弟鱄與寗喜言曰茍反政由寗氏祭則寡人寗喜許之十二年襄二十六年春二月寗喜殺孫襄林父子弑殤公剽孫林父以戚如晉甲午獻公入大夫逆于竟者執其手而與之言道逆者自車揖之逆于門者頷之而已公至使讓大叔儀曰寡人淹恤在外獨子不在寡人對曰臣不能負羈紲從扞牧圉罪一臣不能貳通外内之言罪二有二罪敢忘其死乃行公使止之我侵戚孫林父愬于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人夏六月魯侯㑹諸侯大夫晉鄭宋曹于澶淵以討我疆戚田取我西鄙懿氏六十以與孫氏秋晉執寗喜公如晉晉人執而囚之于士弱氏齊侯鄭伯如晉請公晉許之冬十二月我歸衛姬于晉晉乃釋公獻公後元年襄二十七年春石惡㑹諸侯之大夫晉魯楚蔡陳鄭許曹于宋寗喜専公患之公孫免餘衛大夫攻寗氏殺喜及右宰榖母弟鱄出奔晉公使免餘為卿辭曰大叔儀不貳乃使大叔儀為卿秋七月諸侯之大夫盟于宋二年襄二十八年討寗氏之黨石惡出奔晉冬十二月靈王崩景王立實以十一月癸巳崩三年襄二十九年夏五月公薨諡曰獻秋九月葬獻公左傳獻公在位十八年出亡殤公立殤公立十二年遇弑獻公復入入三年薨獻公前後通在位二十一年襄公襄公名惡獻公子獻公後三年襄二十九年薨襄公即位夏五月世叔儀㑹諸侯之大夫晉魯齊宋鄭曹莒滕薛小邾城杞六月呉子使札來襄公元年襄三十年冬十月北宫佗㑹諸侯之大夫晉齊宋鄭曹莒邾滕薛杞小邾于澶淵宋災故謀歸宋財既而無歸二年襄三十一年冬十二月公如楚三年昭元年春正月齊惡㑹諸侯之大夫晉楚魯齊宋陳蔡鄭許曹于虢尋宋盟宋盟在襄二十七年四年昭二年春晉韓起來聘九年昭七年秋八月公薨晉士鞅來弔且反戚田齊惡告䘮于周且請命王使成簡公來弔且追命公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉諡曰襄冬十二月塟襄公左傳在位九年靈公靈公名元襄公子襄公嬖人婤姶生孟縶孟縶之足不良能行孔烝鉏衛卿夢康叔謂已立元史朝亦夢襄公四年昭二年婤姶生子名之曰元公薨烝鉏立之是為靈公靈公二年昭九年春趙黶及魯宋鄭之大夫㑹楚子于陳三年昭十年晉平公卒秋九月北宫喜如晉㑹葬四年昭十一年楚圍蔡秋北宫佗㑹諸侯之大夫晉魯齊宋鄭杞曹于厥憖謀救蔡五年昭十二年夏公如晉朝嗣君六年昭十三年秋七月公㑹周劉子諸侯晉魯齊宋鄭曹莒邾滕薛杞小邾于平邱公兄孟縶狎齊豹奪之司寇與鄄又惡北宫喜禇師圃欲去之公子朝通于襄夫人宣姜靈公嫡母懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂十三年昭二十年夏六月公在平夀齊氏殺孟縶公聞亂乘驅自閲門入載寶以出如死鳥㑹齊侯使公孫青來聘遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣于朝曰阿下執事臣不敢貳主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之公入與北宫喜盟于彭水之上秋七月朔遂盟國人八月公子朝禇師圃子玉霄子髙魴出奔晉霄魴並齊氏黨閏月殺宣姜公子朝尋復入子朝復入傳無明文十四年昭二十一年宋華氏叛冬十一月公子朝㑹諸侯之大夫晉齊曹救宋十五年昭二十二年夏四月景王崩子猛立是為悼王子朝作亂冬十月晉納王于王城十一月悼王崩母弟敬王立居于狄泉十八年昭二十五年夏北宫喜㑹諸侯之大夫晉魯宋鄭曹邾滕薛小邾于黄父晉趙鞅令輸王粟具戍人曰明年將納王十九年昭二十六年冬十月晉納王王入于成周二十年昭二十七年秋北宫喜㑹諸侯之大夫晉宋曹邾滕于扈戍周且謀納魯昭公昭公時出居鄆二十五年昭三十二年冬世叔申㑹諸侯之大夫晉魯齊宋鄭曹莒薛杞小邾于狄泉謀城成周二十六年定元年春正月城成周二十九年定四年春三月公㑹周劉子諸侯晉魯宋蔡鄭陳許曹莒邾頓胡滕薛杞小邾齊于召陵侵楚三十一年定六年魯侵鄭不假道于我及還陽虎使季孟自南門入出自東門舍于豚澤公怒使彌子瑕追之公叔發諫乃止三十二年定七年秋齊侯鄭伯盟于鹹徴㑹于我公欲叛晉諸大夫不可公使北宫結如齊而私于齊侯曰執結以侵我齊從之公及齊侯盟于𤨏三十三年定八年夏齊伐魯晉師救魯將盟公于剸澤趙鞅曰誰敢盟衛侯者以衛叛晉欲摧辱之涉佗成何並晉大夫曰我能盟之衛人請執牛耳盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳成何曰衛吾温原也焉得視諸侯將㰱涉佗捘公之手及捥擠血至捥公怒乃叛晉晉人請改盟弗許秋晉士鞅侵鄭遂侵我九月魯季孫斯仲孫何忌侵我冬公及鄭伯盟于曲濮三十四年定九年秋齊伐晉克夷儀齊侯在五氏晉地公將如五氏卜過中牟龜焦公曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之禇師圃亡在中牟曰衛雖小其君在焉未可勝也不如從齊乃伐齊敗之齊侯致禚媚杏于我三十五年定十年夏晉趙鞅圍我晉討我之叛故曰由涉佗成何于是執涉佗成何以求成于我我不許晉人殺涉佗成何奔燕冬公及齊侯鄭游速㑹于安甫三十七年定十二年夏公孟彄伐曹克郊三十八年定十三年春公及齊侯次于垂葭使師伐晉河内公惡公叔戍戍文子公叔發之子以其富也戍又將去夫人之黨夫人愬之曰戍將為亂三十九年定十四年春公逐公叔戍戍奔魯其黨趙陽奔宋夏北宫結奔魯亦黨戍晉范中行氏叛晉圍朝歌五月公㑹齊侯魯侯于牽謀救范中行氏大子蒯聵将殺夫人南子夫人覺之大子奔宋盡逐其黨公孟彄出奔鄭自鄭奔齊四十年定十五年夏鄭伐宋公及齊侯次于渠蒢謀救宋晉趙稷以邯鄲叛四十一年哀元年夏四月公及齊侯救邯鄲圍五鹿秋八月公㑹齊侯于乾侯救范氏孔圉及魯師齊師鮮虞人伐晉取棘蒲四十二年哀二年夏四月公薨諡曰靈新序衛靈公天寒鑿池宛春諌曰天寒起役恐傷民公曰天寒乎曰君衣狐裘坐熊席隩隅有竈民衣敝不補履决不苴君則不寒民誠寒矣公曰善令罷役左右諌曰罷役是徳歸宛春怨歸于君公曰春也有善寡人有春之善非寡人之善與王孫子衛君重裘而坐見負薪而哭者問曰何也對曰雪下衣薄衛君懼見于色曰為君而不知民孰以我為君于是出倉粟以賑貧窮又曰靈公坐重華之臺侍御數百隋侯照日羅衣從風仲叔敖入諌曰昔桀紂行此而亡今君内寵無乃大盛與靈公再拜曰寡人過矣于是出宫女數百人二説不實而宛春之論足為君範冬十月塟靈公左傳博物志衛靈公葬得石槨銘曰不逢箕子靈公奪我里靈公在位四十二年出公出公名輙太子蒯聵子靈公適孫也靈公四十二年哀二年薨大子得罪出亡乃立輙是為出公是年夏六月晉趙鞅納太子于戚出公元年哀三年春石曼姑及齊國夏圍戚求援于中山即鮮虞二年哀四年秋七月寗跪及齊陳乞救晉范氏圍五鹿三年哀五年夏晉趙鞅伐我圍中牟四年哀六年秦晉魏曼多侵我八年哀十年公孟彄自齊來歸定十四年逐大子黨彄奔齊九年哀十一年冬世叔齊出奔宋十年哀十二年呉徴㑹于我初衛人殺呉行人公懼秋公㑹呉于鄖及魯侯宋皇瑗盟而卒辭呉盟呉人藩公之舍子貢説太宰嚭乃舍公十一年哀十三年秋晉魏曼多侵我十二年哀十四年秋晉趙鞅伐我莊公元年哀十五年秋八月晉趙鞅伐我冬公孟彄出奔齊閏月大子入立是為荘公公出奔魯經在十六年從告自公之出亡也莊公立國人出莊公晉立襄公之孫般師齊人執般師衛立公子起君起元年哀十八年夏石圃逐君起起奔齊出公自齊復歸逐石圃而復石魋與大叔遺皆莊公所逐是年敬王崩元王立出公後七年哀二十五年夏五月禇師比公子彌牟等作亂公出奔宋公為支離之卒支離陳名因祝史揮以侵衛衛逐揮公館諸外里使如越請師後八年哀二十六年夏五月越臯如后庸宋樂茷魯叔孫舒帥師納公公孫彌牟致衆而問焉曰請納之衆曰勿納曰彌牟亡而有益請自北門出衆曰勿出乃重賂越人申開守陴而納公公不敢入師還立莊公庶弟公子黚是為悼公出公遂卒于越是年元王崩定王立左傳出公在位十二年出奔魯亡三年復入又七年復出奔宋前後通在位十九年史記作二十一年誤莊公般師起附公子莊公名蒯聵靈公大子也宋公子朝舊通于靈公夫人南子朝在宋靈公召之靈公三十九年定十四年秋齊宋㑹于洮大子獻盂邑名于齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭大子羞之謂戲陽速家臣曰從我而見少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走曰蒯聵將殺余靈公執其手以登臺大子奔宋大子告人曰戲陽速禍余速告人曰大子則禍余大子無道使余殺其母余不許將戕于余若殺夫人將以余説余是故許而弗為以紓余死諺曰民保于信吾以信義也四十二年哀二年靈公薨出公輙立夏六月晉趙鞅納大子于戚宵迷陽虎魯家臣奔晉曰右河而南必至焉使大子絻始發䘮之服八人衰絰偽自衛逆者告于門哭而入遂居之荀寅士吉射叛晉秋八月齊人輸范氏粟鄭師送之晉趙鞅禦之將戰郵無恤御趙鞅大子為右登鐵上望見鄭師衆大子懼自投于車下無恤授大子綏而乘之曰婦人也趙鞅廵列曰畢萬匹夫也七戰皆獲有馬百乘死于牖下羣子勉之死不在冦大子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無靣傷以集大事無作三祖羞大命不敢請佩玊不敢愛鄭人擊趙鞅中肩斃于車中獲其蠭旗大子救之以戈鄭師北大子復伐之鄭師大敗趙鞅喜曰可矣出公元年哀三年春齊衛圍戚初孔圉娶大子之姊生悝孔氏之豎渾良夫長而美孔圉卒通于内良夫通孔伯姬大子在戚孔姬使之焉大子與之言曰茍使我入獲國服冕乘軒三死無與與之盟為請于伯姬莊公元年哀十五年冬閏月良夫與大子入迫孔悝于厠强盟之遂刼以登臺出公輙奔魯孔悝立大子是為莊公公害故政欲盡去之先謂司徒瞞成曰寡人離病于外久矣子請亦嘗之歸告禇師比欲與之伐公不果二年哀十六年春瞞成禇師比出奔宋公使鄢肹告于周曰蒯聵得罪于君父君母逋竄于晉晉以王室之故不棄兄弟寘諸河上天誘其衷獲嗣守封焉使下臣肹敢告執事王使單平公對曰肹以嘉命來告余一人往謂叔父余嘉乃成世復爾禄次敬之哉方天之休弗敬弗休悔其可追夏四月孔子卒六月公逐孔悝悝出奔宋秋七月逐大叔遺遺奔晉公與渾良夫謀召出公輙大子疾亦莊公子刼公强盟之求必立已且請殺渾良夫三年哀十七年春大子殺渾良夫晉趙鞅召公若大子來公辭以難大子又使㭬之夏六月趙鞅圍我齊救我鞅乃還冬十月晉復伐我入其郛我出公而與晉平晉立襄公之孫般師而還十一月公自鄄入般師出初公登城以望見戎州問之以告公曰我姬姓也何戎之有焉翦之公使匠久又欲逐石圃辛巳石圃因匠氏攻公公閉門而請弗許踰于北方而隊折股戎州人攻之大子疾公子青踰從公戎州人殺之公入于戎州己氏初公自城上見己氏之妻髪美使髠之以為吕姜髢既入焉而示之璧曰活我吾與女璧己氏曰殺女璧其焉往遂殺之而取其璧國人復公孫般師而立之十二月齊人伐我我請平立靈公子起執般師以歸舍諸潞齊邑君起元年哀十八年夏石圃逐君起起奔齊出公輙自齊復歸左傳莊公為大子出亡十六年入立為諸侯在位三年遇弑諡曰莊般師凡兩立隨廢公子起在位一年悼公以下戰國敬公昭公懐公慎公聲公成侯平侯嗣君懐君元君君角悼公名黚系本名䖍史記作黔莊公庶弟悼公元年哀二十六年越人帥師納出公不克而還我立公子黚是為悼公史記出公李父黔攻出公子而自立公孫彌牟相之以城鉏衛邑與越人左傳悼公五年薨紀年四年卒于越子敬公弗即位世本作費敬公十九年薨子昭公紏即位系本敬公生橈公舟非是是時三晉彊衛如小侯屬之昭公三年定王崩考王立六年公子亹弑公代立是為懐公懐公十一年公子頽弑懐公而代立是為慎公慎公父公子適系本適作䖍䖍悼公也適父敬公也慎公元年考王崩威烈王立二十五年威烈王崩安王立四十二年慎公薨子聲公訓即位系本作聖公馳聲公十年安王崩烈王立十一年聲公薨子成侯速即位系本作不逝更按上穆公名遫不得成侯名速系本是成侯十六年衛貶號曰侯二十九年成侯薨子平侯立平侯八年薨子嗣君立紀年作孝襄侯嗣君五年更貶號曰君獨有濮陽史世家衛嗣君時胥靡逃之魏衛贖之百金不與乃請以左氏衛地羣臣諌曰以百金之地贖一胥靡無乃不可乎君曰治無小亂無大教化喻于民三百之城足以為治民無亷恥雖有十左氏將何以用之四十二年嗣君病富術謂殷順旦並衛人曰子聽吾言以説君勿益損也君必善子人生之所行與死之心異始君之所行于世者食髙麗也言養身豐厚所用者緤錯挐薄也二臣名羣臣盡以為君輕國而好髙麗必無與君言國事者子謂君君之所行于天下者甚謬緤錯主㫁于國而挐薄輔之自今以往公孫氏不血食矣公孫氏衛國姓君曰善與之相印曰我死子制之嗣君死殷順旦以君令相公子期緤錯挐薄之族皆逐之國䇿公子期葢即懐君也懐君三十一年朝魏魏囚殺懐君魏更立嗣君弟是為元君元君為魏壻故魏立之元君十四年秦㧞魏東地初置東郡更徙衛野王縣而并濮陽為東郡二十五年元君卒子君角即位年表元君十一年秦置東郡十二年徙野王二十二年卒説異君角九年秦并天下立為始皇帝二十一年二世廢君角為庶人衛絶祀史記贊曰春秋之際衛亂最甚桓公弑于州吁伋子戕于子朔懿公滅于狄成公濫叔武之誅獻公構孫寗之禍靈公逞宣姜之亂莊公出公逆天滅紀父母兄弟相為仇讐噫使周公秉成衛誅為先矣乃享國數十葉後諸侯亡由康叔善樹武文善承而衛多君子之故與尚史卷十三
