body:
  text: 尚史卷六十七列傳四十五鑲白旗漢軍李鍇撰魏諸臣傳田子方叚干木田子方名無擇莊子田子方侍坐于魏文侯數稱谿工文侯曰谿工子之師邪子方曰非也無擇之里人也子方名無擇唯見莊子然説苑又載文侯舍人名無擇獻鵠于楚者附見淳于髠傳魏文侯之師也文侯與田子方飲酒而稱樂文侯曰鐘聲不比乎比猶協左髙子方笑文侯曰奚笑子方曰臣聞之君明則樂官樂音洛以治官為樂不明則樂音今君審于聲臣恐君之聾于官也文侯曰善國策子方見老馬于道喟然問其御曰此何馬也曰此故公家畜也老罷不為用出而鬻之子方曰少貪其力老棄其身仁者弗為也束帛以贖之淮南子子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹守子廪子方曰善子加之弋我加之國韓非子説苑文侯與田子方語有兩童子衣青白衣而侍子方曰君之寵子乎文侯曰非也其父死于戰此其㓜孤也寡人收之子方曰臣以君之戰心為足矣今滋甚君之寵此子也且以誰之父殺之乎文侯愍然曰寡人受令矣自是兵革不用説苑有田子顔者自大術至乎平陵城下見人子問其父見人父問其子子方曰其以平陵反乎吾聞行于内然後施于外子顔欲使其衆甚矣後果以平陵叛太子擊逢子方于朝歌引車避下謁子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脱躧然奈何其同之哉子擊不懌而去史記説苑田子方侍文侯坐太子擊趨而入見賔客羣臣皆起子方不起文侯有不悦之色子方稱曰為子起與無如禮何不為子起與無如罪何請為子誦楚恭王之為太子也將之雲夢遇大夫工尹工尹趨避太子下車從之曰子何為其若是吾聞之敬其父者不兼其子兼其子不祥莫大焉子何為其若是工尹曰向吾見子面今見子之心文侯曰善叚干木者晋之大駔亦文侯之師也干木辭禄而處家高士傳叚干木晋人也治清節逰西河師事卜子夏田子方守道不仕魏文侯就造其門干木踰墻而避文侯文侯以客禮待之文侯過其廬而軾之其僕曰君何為軾文侯曰叚干木在是以軾其僕曰干木布衣之士君軾其廬不已甚乎文侯曰叚干木不趨勢利懷君子之道隠處窮巷聲馳千里敢不軾乎干木光于徳寡人光于勢干木富于義寡人富于財勢不若徳尊財不若義高干木雖以已易寡人不為吾曰悠悠慙于影子何以輕之哉其後秦將伐魏司馬庾諌曰叚干木賢者其君禮之諸侯莫不聞伐之無乃妨于義乎乃偃兵不攻魏淮南子序吕氏春秋新畧同西門豹西門豹為鄴令辭文侯文侯曰子徃矣必就子之功而成子之名豹曰敢問就功成名有術乎文侯曰有之鄉邑老者而先受坐之士子入問其賢良之士而師之求其好掩人之善揚人之醜者而參驗之夫物多相類而非也幽莠之㓜也似禾黧牛之黄也似虎白骨疑象武夫類玉此皆似之而非者也國策説苑文侯使豹徃治鄴告之曰不可以特聞從事夫耳聞之不如目見之目見之不如足踐之足踐之不如手辨之人始入官如入晦室乆而愈明明乃治治乃行豹往到鄴㑹長老問民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾嘗嵗賦歛百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視人家女好者云是當為河伯婦即䀻取洗沐之為治新繒綺縠衣閒居齋戒為治齋宫河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃没其人家有好女者恐大巫祝為河伯取之多持女逺逃亡以故城中益空無人又困貧所從來乆逺矣民人俗語曰即不為河伯娶婦水來漂沒溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦徃送女皆曰諾至其時西門豹徃㑹之河上三老官屬豪長者里父皆㑹以人民往觀之者三二千人其巫老女子也已年七十從弟子女千人所衣皆繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何乆也弟子趣之復以弟子一人投河中有頃曰弟子何乆也復使一人趣之復投一弟河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簮筆磬折嚮河立待良乆長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之乆若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦韓非子西門豹為鄴令清剋潔慤秋毫無私利而甚簡左右左右惡之居期年上計文侯收其璽綬豹自請曰臣昔者不知所以治鄴今得矣願請璽復治鄴不當請伏罪文侯不忍而復與之豹因重歛百姓急事左右期年上計文侯迎而拜之豹曰往年為君治鄴而君奪臣璽今臣為左右治鄴而君拜臣臣不能治矣遂納璽而去韓非子豹為鄴令佯亡其車轄令吏求之不能得使人求之而得之家人屋間韓非子豹性急故佩韋以緩已淮南子西門豹治鄴廪無積粟府無儲錢庫無甲兵官無計㑹人數言其過文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能道則可不能將加誅豹曰臣聞王主富民霸主富武亡國富庫今君欲為霸王者也臣故畜積于民君以為不然臣請升城鼔之一鼓甲兵粟米可立具也于是升城鼓之一鼓民被甲括矢操兵弩而出再鼓輦粟而至文侯曰罷之豹曰與民約信非一日之積也一舉而欺之後不可用燕嘗侵魏入城臣請北擊之以復侵地遂舉兵擊燕復地而後反西門豹即發民鑿十二渠引河水灌民田田皆溉當其時民治渠少煩苦不欲也豹曰民可以樂成不可與慮始今父老子弟雖患苦我然百嵗後期令父老子孫思我言史記吕氏春秋魏襄王與羣臣飲酒酣王為羣臣祝令羣臣皆得志史起對曰賢者得志則可不肖者得志則不可王曰皆如西門豹之為人臣也對曰魏氏之行田也以百􅅕鄴獨二百􅅕是田惡也漳水在其旁而豹弗知用是其愚也知而弗言是不忠也愚與不忠不可效也魏王明日召史起而問曰漳水可以灌田乎對曰可曰何不為寡人為之起曰臣恐王之不能為也臣為之民必大怨臣大者死其次乃籍臣臣雖死藉願王使他人遂之也王曰諾使為鄴令起往為之鄴民大怨欲藉史起起不敢出而避之王乃使他人遂為之水已行民大利相與歌之曰鄴有聖令時為史公决漳水灌鄴旁終古斥鹵生之稲梁漢書同論曰商頌輯之亂曰温恭朝夕執事有恪孔子曰行已也恭恭者上下之通徳在屋漏不忘安見貧賤而可驕人者哉且夫安弓危矢危弓安矢均之道也大子遇子方引車辟下謁既恭矣而復折之不且失均乎西門豹引漳溉鄴以富河内至漢欲合渠為橋民卒不肯聽然則父老子孫之思之百嵗且未艾也樂羊樂羊魏將也魏將攻中山其子在中山中山之君烹其子而遺之􅃵樂羊坐于幕下而啜之盡一杯文侯謂覩師賛曰樂羊以我之故食其子之肉對曰其子之肉尚食之其誰不食文侯于是賞其功而疑其心國策韓非子同樂羊已得中山還反報文侯有貴功之色文侯命主書曰羣臣賔客所獻書者操以進之主書舉兩篋以進令樂羊視之書盡難攻中山之事也樂羊還走北面再拜曰中山之舉非臣之力君之功也吕氏春秋文侯封樂羊以靈夀樂羊死𦵏于靈夀子孫因家焉史記李克翟璜任座附李克翟璜並文侯之臣也中山既㧞翟璜進克為中山守文侯嘗問克曰人有惡乎克曰有貴者賤惡之富者貧惡之智者愚惡之文侯曰行此三者使人無惡可乎克曰可臣聞貴而下賤則衆弗惡也富而分貧則窮士弗惡也智而教愚則童䝉者弗惡也文侯曰善哉言乎韓詩外傳又嘗問曰刑法之源安生克曰生于奸邪滛佚之行彫文刻鏤害農事者也錦繡纂組傷女工者也農事害則饑之本也女工傷則寒之原也饑寒並至而不為奸邪者未之有也男女飾美以相矜而無滛佚者未之有也故上不禁技巧則國貧民侈貧者為奸邪而富者為滛佚是驅民而為邪也為邪而以法隨誅之是為民設䧟也刑罰之起有源人主不塞其本而替其末傷國之道乎文侯曰善説苑説苑文侯問克曰為國何如對曰為國之道食有勞而禄有功使有能而賞必行罰必當文侯曰吾賞罰當而民弗與何也對曰國其有滛民乎臣聞之曰奪滛民之禄以來四方之士其父有功而禄其子無功而食之乗車馬衣美裘修竽琴鐘石之聲而安其子女之樂以亂鄉曲之教如此者得其禄以來四方之士此之謂奪滛民也又嘗問曰吳之所以亡者何也對曰數戰數勝文侯曰數戰數勝國之福也所以亡何也曰數戰則民疲數勝則主驕以驕主治疲民此其所以亡也新序吕覽作武侯韓詩外傳作里克文侯謂克曰先生嘗敎寡人曰家貧則思良妻國亂則思良相今所置非成則璜成公子成文侯弟二子何如對曰臣聞之卑不謀尊疎不謀戚臣在闗門之外不敢當命文侯曰先生臨事勿譲克曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣克趨而出過翟璜之家璜曰今者聞君召先生而卜相果誰為之克曰魏成子為相矣璜忿然作色曰以耳目之所覩記臣何負于魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已㧞無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負于魏成子克曰子之言克于子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克㢤是以知魏成子之為相也且子安得與魏成子比乎魏成子食禄千鍾什九在外什一在内是以東得卜子夏田子方叚干木三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也璜逡巡再拜曰璜鄙人也失對願卒為弟子史記世家韓非子翟璜善于韓乃召韓兵令之攻魏因請為魏王構之以自重韓非子田子方從齊之魏望翟璜乗軒騎駕出方以為文侯也移車而避之則翟璜也方問曰子奚乗是車也曰君謀伐中山臣薦翟角而謀得果伐之臣薦樂羊而中山㧞得中山憂欲治之臣進李克而中山治是以君賜此車方曰寵之稱功尚薄説苑畧同説苑子方曰魏國之相不去子而之他矣翟璜曰君母弟有公孫成季者進子夏而君師之進叚干木而君友之進先生而君敬之彼其所進師也友也所敬者也臣之所進者皆守職守禄之臣也何以至魏國相乎子方曰子五舉盡賢子勉之子終其次也新序文侯弟曰季成友曰翟璜文侯欲相之而未能决以問李克對曰君置相則問樂商與王孫茍端孰賢文侯以王孫茍端為不肖翟璜進之樂商為賢季成進之故相季成吕覽畧同文侯燕飲令諸大夫論已至于任座座曰君不肖君也得中山不以封弟而以封子是以知君之不肖也文侯不説任座趨出次及翟璜璜曰君賢君也臣聞君賢臣直今者任座之言直是以知君之賢也文侯喜曰可反歟璜對曰奚為不可臣聞忠臣畢其忠而不敢逺其死座殆尚在于門璜徃視之任座在門以君令召之入文侯下階而迎之以為上客文侯曰㣲翟璜則幾失忠臣矣吕氏春秋吕氏春秋文侯見叚干木立倦而不敢息反見翟璜踞堂而與之言璜不説文侯曰叚干木官之則不肯禄之則不受今汝欲官則相位欲禄則上卿既受吾寔又責吾禮無乃難乎論曰樂羊啜羮人情之所難然投柸慷慨亦足破敵來賛之譖固有以夫儒家有李克七篇或曰克子夏弟子為文侯相見漢書觀其所言類多知本信乎守西河之道者李悝白珪李悝者文侯上地之守也韓非子悝為文侯作盡地力之敎以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畮治田勤謹則畮益三升不勤則損亦如之地方百里之増減輙為粟百八十萬石矣又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民無傷而農益勸今一夫挾五口治田百畮嵗取畮一石半為粟百五十石除十一之税十五石餘百三十五石食人月一石半五人終嵗為粟九十石餘有四十五石石三十為錢千三百五十人社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十不幸疾病死喪之費及上賦歛又未與此此農夫所以常困有不勸耕之心而令糴至于甚貴者也是故善平糴者必謹觀嵗有上中下孰上孰其收自四餘四百石中孰自三餘三百石下孰自倍餘百石小饑則收百石中饑七十石大饑三十石故大孰則上糴三而舍一中孰則糴二下孰則糴一使民適足賈平則止小饑則發小孰之所歛中饑則發中孰之所歛大饑則發大孰之所歛而糴之故雖遇饑饉水旱糴不貴而民不傷取有餘以補不足也行之魏國國以富彊法家有李悝三十二篇漢書韓非子李悝為上地守欲人之善射乃下令曰有狐疑之訟者射的中者勝不中者負令下而人皆疾習射及與秦人戰大敗之以人之善戰射也韓非子李悝謹其兩和曰謹警敵人旦暮且至擊汝如是者再三而敵不至兩和懈不信居數月秦人襲之幾奪其軍韓非子悝與秦人戰謂左和曰速上右和已上矣又至右和曰左和已上矣左右和争上其明年與秦人戰秦人襲之幾奪其軍白珪者名丹魏人也史記作周人鮑彪國策注趙岐以為周人非也事昭王韓成陽君欲以韓魏聽秦昭王弗利白珪謂王曰王不如隂使人説成陽君曰君入秦秦必留君而多割于韓韓不聽秦必留君而伐韓矣故君不如安行求質于秦成陽君必不入秦秦韓不合則王重矣國策韓非子白珪相魏暴譴相韓珪謂譴曰子以韓輔我于魏我請以魏待子于韓臣長用魏子長用韓文侯時李悝史記作李克誤務盡地力而珪則樂觀時變故人棄我取人取我與夫嵗孰取榖予之絲漆蠒出取帛絮予之食太隂在邜穰明嵗衰惡至午旱明嵗美至酉穰明嵗衰惡至子大旱明嵗美有水至邜積著率嵗倍欲長錢取下穀長斗石取上種能薄飲食忍嗜欲節衣服與用事僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹吕尚之謀孫呉用兵商鞅行法是也是故其智不足與權變勇不足以决斷仁不能以取予彊不能用所守雖欲學吾術終不告之矣史記珪嘗謂孟子曰吾欲二十而取一何如孟子曰子之道貉道也欲輕之于堯舜之道者大貉小貉也欲重之于堯舜之道者大桀小桀也珪又曰丹之治水也愈于禹孟子曰子過矣禹之治水水之道也是故禹以四海為壑子以鄰國為壑孟子又嘗問于鄒公子夏后啟曰踐繩之節四上之志三晋之事此天下之豪英以處于晋而迭聞晋事未嘗聞踐繩之節四上之志願得而聞之夏后啟曰以為可為故為之為之天下弗能禁矣以為不可為故釋之釋之天下弗能使矣珪曰利弗能使乎威弗能禁乎夏后啟曰生不足以使之則利何足以使之死不足以禁之則害何足以禁之珪無以應吕氏春秋鄒陽書白珪顯于中山中山人惡之魏文侯文侯投以夜光之璧按策白珪當魏昭王時而史與鄒陽並作文侯誤事文侯則與吳起先後安得引孫吳以自􅃷也論曰伯禹使民貿遷有無化居在周則有遂師移用遺人委積之法記曰知者創物巧者述之悝其亦能述聖人之知者與糴貴傷民糴賤傷農經國之要二語盡之雖然傷一也而農常困是又不徒以貴賤論糴已吳起公叔痤恵施朱倉附恵盎吳起者衛人也好用兵嘗學于曽子事魯君齊人攻魯魯欲將吳起吳起取齊女為妻而魯疑之吳起于是欲就名遂殺其妻以明不與齊也魯卒以為将将而攻齊大破之韓非子吳起衛左氏中人也使其妻織而狹于度吳子使更之及成復度之不中度呉子怒出之其妻請其兄而索入其兄曰吳子為法者也且欲與萬乗致功必先踐之妻妾子母索入矣其妻之弟重于衛君因衛君之重請吳子吳子不聽遂去衛而入荆韓非子吳子示其妻以組曰為我織組令之如是已就而組異善起曰使子為組令之如是而今異善何也妻曰用財若一也加務善之起曰非語也使之衣歸其父往請之起曰起家無虚言韓非子吳起出遇故人而止之食故人曰諾令返而御吳子曰待公而食故人至暮不來起不食明日求故人故人來方與之食魯人或惡吳起曰起之為人猜忍人也其少時家累千金游仕不遂遂破其家鄉黨笑之吳起殺其謗已者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛遂事曽子居頃之其母死起終不歸曽子薄之而與起絶起乃之魯學兵法以事魯君魯君疑之起殺妻以求將夫魯小國而有戰勝之名則諸侯圖魯矣且魯衛兄弟之國也而君用起則是棄衛魯君疑之謝吳起韓非子魯季孫新弑其君吳起仕焉或謂起曰夫死者始死而血已血而衂已衂而灰已灰而土反其土也無可為者矣今季孫乃始血其毋乃未可知也吳起因去之晋吳起于是聞魏文侯賢欲事之文侯問李克曰吳起何如人哉李克曰起貪而好色然用兵司馬穰苴不能過也于是魏文侯以為將擊秦㧞五城起之為將與士卒最下者同衣食卧不設席行不騎乗親裹贏糧與士卒分勞苦尉繚子吳起臨戰左右進劍起曰將専主旗鼓臨難决疑揮兵指刃此将事也一劍之任非將事也三軍成行一舍而後成三舍三舍之餘如决川原望敵在前因其所長而用之敵白者堊之赤者赭之吳起與秦戰未合一夫不勝其勇前獲雙首而還吳起立斬之軍吏諌曰此材士也起曰非吾令也斬之卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年吳公吮其父其父戰不旋踵遂死于敵吳公今又吮其子妾不知其死所矣是以哭之文侯以吳起善用兵亷平盡能得士心乃以為西河守以拒秦韓魏文侯既卒起事其子武侯武侯浮西河而下中流顧而謂吳起曰羙哉乎山河之固此魏國之寳也起對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不徳武王殺之由此觀之在徳不在險若君不修徳舟中之人盡為敵國也武侯曰善史記國策同韓非子吳起為西河之守秦有小亭臨境不去則甚害田者去之則不足以徵甲兵乃倚一車轅于北門之外而令之曰徙此南門之外者賜之上田上宅人莫之徙也及有徙之者賜之如令又置一石赤菽東門之外而令之曰徙此于西門之外者賜之如初人争徙之乃下令曰明日且攻亭能先登者仕之國大夫賜之上田宅人争趨之于是攻亭一朝而㧞之吕氏春秋畧同武侯謀事而當羣臣莫能逮退朝而有喜色起進曰亦嘗有以楚莊王之語聞于左右者乎武侯曰莊王之語何如對曰楚莊王謀事而當羣臣莫逮退朝而有憂色申公巫臣進曰王朝而有憂色何也莊王曰不榖謀事而當羣臣莫逮是以憂也其在中蘬之言曰諸侯得師者王得友者霸得疑者在自為謀而莫已若者亡今以不榖之不肖而羣臣莫吾逮吾國幾于亡乎是以憂也楚莊王以憂而君以憙武侯逡巡再拜曰天使夫子振寡人之過也荀子新序吳子並同吕覽作李悝説苑武侯問元年于呉子對曰言國君必慎始也慎始奈何曰正之正之奈何曰明智智不明何以見正多聞而擇焉所以明智也是故古者君始聴治大夫而一言士而一見庶人有謁必逹公族請問必語四方至者勿距可謂不壅蔽矣分禄必及用刑必中君心必仁思民之利除民之害可謂不失民衆矣君身必正近臣必選大夫不兼官執民柄者不在一族可謂不權勢矣此皆春秋之意而元年之本也吳起為西河守甚有聲名魏置相相田文吳起不悦謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賔從子孰與起文曰不如子起曰子此三者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之于子乎屬之于我乎起黙然良乆曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文吕氏春秋作商文田文既死公叔為相尚魏公主而害吳起公叔之僕曰起易去也公叔曰奈何其僕曰吳起為人節亷而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與彊秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君吳起見公主之賤君也則必辭于是吳起見公主之賤魏相果辭魏武侯武侯疑之而弗信也吳起懼得罪遂去吕氏春秋吳起治西河之外王錯譛之于武侯武侯召之起至于岸門止車而休望西河泣數行下其僕曰竊觀公之志視舍天下若屣今去西河而泣何也起曰子弗識也君誠知我而使我畢能秦必可亡而西河可以王今君聽讒人之議西河之為秦也不乆矣魏從此削矣起去魏入荆而西河畢入秦即之楚楚悼王素聞起賢至則相楚明法審令捐不急之官廢公族疏逺者以撫飬戰鬪之士要在彊兵破馳説之言從横者于是南平百越北并陳蔡郤三晋西伐秦諸侯患楚之彊故楚之貴戚盡欲害吳起及悼王死宗室大臣作亂而攻吳起呉起走之王尸而伏之擊起之徒因射刺吳起并中悼王悼王既𦵏太子立乃使令尹盡誅射吳起而并中王尸者坐射起而夷宗死者七十餘家史記淮南子吳起為楚令尹適魏問屈宜若曰先生試觀起之為人也屈子曰將奈何起曰將裒楚國之爵而平其制禄損其有餘而綏其不足砥礪甲兵時爭利于天下屈子曰宜若聞之善治國家者不變其故不易其常今子變其故易其常行之者不利宜若聞之曰怒者逆徳也兵者凶器也争者人之所本也今子隂謀逆徳好用凶器始人之所本逆之至也且子用魯兵不宜得志于齊而得志焉子用魏兵不宜得志于秦而得志焉宜若聞之非禍人不能成禍吾固惑吾王之數逆天道戾人理至今無禍差須夫子也起惕然曰尚可更乎屈子曰成形之徒不可更也子不若敦愛而篤行之韓非子呉起教楚悼王以楚國之俗曰大臣太重封君太衆若此則上偪主而下虐民此貧國弱兵之道也不如使封君之子孫三世而收其爵禄絶滅百吏之禄秩損不急之枝官以奉選練之士悼王行之期年而薨呉起枝解于楚吕氏春秋呉起謂荆王曰荆所有餘者地也所不足者民也今王以所不足益所有餘臣不得而為也于是令貴人徃實廣虚之地皆甚苦之荆王死貴人皆來尸在堂上貴人相與射起起號呼曰吾示子吾用兵也㧞矢而走伏尸挿矢而疾言曰羣臣亂王呉起死荆國之法麗兵于王尸者加重罪逮三族起之智可謂㨗矣兵權謀呉起四十八篇漢書公叔痤者亦衛人也為魏將與韓趙戰澮北禽樂祚趙將恵王郊迎以賞田百萬禄之痤反走再拜辭曰夫使士卒不崩直而不倚棟橈而不避者此吳起餘教也前脉形地之險阻决利害之備使三軍之士不迷惑者巴寧爨㐮之力也縣賞罰于前使民昭然信之于後者王之明法也見敵之可也鼓之不敢怠倦者臣也王特為臣之右手不倦賞臣可也臣何力之有乎王曰善于是索吳起之後賜之田二十萬巴寕爨㐮田各十萬王曰公叔豈非長者哉既為寡人勝强敵矣又不遺賢者之後不掩能士之迹公叔何無可益乎又與田四十萬加之百萬之上使百四十萬史記世家九年伐敗韓于澮與秦戰少梁虜我將公孫痤按年表云虜我太子世家葢誤痤病王往問之曰公叔病即不可諱將奈社稷何痤對曰痤有御庶子公孫鞅願王以國事聴之也弗能勿使出境王弗應出而謂左右曰豈不悲哉以公叔之賢而謂寡人必以國事聽鞅不亦悖乎痤死已葬鞅西之秦孝公用之秦日以强魏日以削國策恵施者宋人髙誘吕覽注事恵王説苑梁相死恵子欲之梁渡河而遽墮水中船人救之船人曰子欲何之而遽也曰梁無相吾欲往相之船人曰子居船檝之間而困無我則子死矣何能相梁恵子曰居艘楫之間則吾不如子至于安國家全社稷子之比我䝉䝉如未視之狗耳符子恵子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子恵子曰施方來遇羣川之水長有人溺流而下呼施救之施曰吾不善游方將為子告急于東越之王簡其善游者以救子溺人曰我得一瓢之力則活矣子之救我不如求我于重淵之下魚龍之腹齊魏戰于馬陵齊殺大子申覆十萬之軍王召施而告之曰夫齊寡人之讐也怨之至死不忘國雖小欲悉起兵而攻之何如對曰不可臣聞之王者得度而霸者知計王固先屬怨于趙而後與齊戰今戰不勝國無守戰之備又欲悉起兵而攻齊此非臣之所謂也王若欲報齊乎則不如變服折節而朝齊楚必怒矣王游人而合其鬪則楚必伐齊以休楚伐罷齊則必為楚禽矣是王以楚毁齊也恵王曰善乃入報齊願臣畜而朝楚王大怒自將伐齊大敗齊于徐州吕氏春秋匡章謂恵子曰公之學去尊今又王齊王何其到也恵子曰今有人于此欲擊其愛子之頭石可以代之匡章曰公取之代乎其不與施曰取代之子頭所重也石所輕也擊其所輕以免其所重豈不可哉匡章曰齊王用兵而不休攻撃人而不止者其故何也恵子曰大者王其次霸也今可以王齊王而夀黔首之命免民之死是以石代愛子頭也何為不為施為齊魏交令太子鳴質于齊恵王欲見之朱倉魏人謂王曰何不稱病臣請説嬰子即田嬰曰魏王之年長矣今有疾公不如歸太子以徳之不然公子高在楚將内而立之是齊抱空質而行不義也吕氏春秋恵子為恵王為法為法已成以示諸民人民人皆善之獻之恵王恵王善之以示翟翦翟翦曰善也恵王曰可行邪曰不可曰善而不可行何故對曰今舉大木者前呼輿謣後亦應之此于舉大木者善矣豈無鄭衛之音哉然不若此其宜也夫國亦木之大者也吕氏春秋白圭新與恵子相見也恵子説之以彊白圭無以應恵子出白圭告人曰人有新取婦者婦至宜安矜烟視媚行豎子操蕉火而鉅新婦曰蕉火大鉅入于門門中有欿䧟新婦曰塞之將傷人之足此非不便之家氏也然而有大甚者今恵子之遇我尚新其説我有大甚者恵子聞之曰不然詩曰愷悌君子民之父母愷者大也悌者長也君子之徳長且大者則為民父母父母之敎子也豈待乆哉何事比我于新婦乎吕氏春秋白圭謂魏王曰市邱之鼎以烹鷄多洎之則淡而不可食少洎之則􅞆而不熟然而視之蝺焉羙無所可用恵子之言有似于此恵子聞之曰不然使二軍饑而居鼎旁適為之甑則莫宜此鼎矣吕氏春秋匡章謂恵子于魏王之前曰蝗螟農夫得而殺之為其害稼也今公行多者數百乗歩者數百人少者數十乗歩者數十人此無耕而食者其害稼亦甚矣恵王曰恵子施也難以辭與公應雖然請言其志恵子曰今之城者或操大築乎城上或負畚乎城下或操表掇以晞望若施者其操表掇者也使工女化而為絲不能治絲使大匠化而為木不能治木使聖人化而為農夫不能治農夫施治農夫者也何事比施于螣螟乎吕氏春秋恵王謂恵子曰上世之有國者必賢者也今寡人寔不若先生願得傳國恵子辭王固請曰寡人莫有之國于此者也而傳之賢者民之貪争之心止矣欲先生以此聽寡人也恵子曰若王之言則施不可聼矣王固萬乗之主也以國與人猶尚可今施布衣也可以有萬乗之國而辭之此其止貪之心愈甚也按善而不可行之説淮南子有之新婦之説戰國策有之而無所為或即白圭之言而脱之與譲國之説不見旁徵諸侯讓國自燕噲而外無聞焉恵王惡得有此邪説苑客謂梁王曰恵子之言事也善譬王使無譬則不能言矣明日見謂恵子曰願先生言事則直言耳無譬也恵子曰今有人于此而不知彈者曰彈之狀何若應曰彈之狀如彈則諭乎王曰未諭也于是更應日彈之狀如弓而以竹為弦則知乎王曰可知矣曰夫説者固以其所知諭其所不知而使人知之今王曰無譬則不可矣王曰善恵王薨葬有日矣天大雨雪至于牛目駕車用牛以及目為深侯壞城郭且為棧道而𦵏羣臣多諌太子者曰雪甚如此而䘮行民必病官費恐不給請㢮期更日太子曰為人子而以民勞與官費之故而不行先王之䘮不義子勿復言羣臣皆不敢言而告公孫衍衍曰吾未有以言之是其唯恵公乎請告恵公恵施曰諾駕而見太子曰葬有日矣太子曰然施曰昔王季厯𦵏于楚山之尾灓水齧其墓灓漏流也見棺之前和文王曰嘻先君必欲一見羣臣百姓也夫故使灓水見之于是出而為之張朝百姓皆見之三日而後更𦵏此文王之義也今𦵏有日矣而雪甚及牛目太子為及日之故得毋嫌于欲亟𦵏乎願太子更日先王必欲少留而扶社稷安黔首也故使雪甚因㢮期而更日此文王之義也若此而弗為意者羞法文王乎太子曰甚善敬㢮期更擇日張儀欲以魏合于秦韓而攻齊楚施欲以魏合于齊楚以案兵人多為張儀于㐮王所施謂王曰小事也謂可者謂不可者正半况大事乎以魏合于秦韓而攻齊楚大事也而王之羣臣皆以為可不知是其可也如是其明邪而羣臣之智術也如是其同邪是其可也未如是其明也而羣臣之智術也又非皆同也是其有半塞也所謂刼王者失其半者也哀王時王令施之楚令公孫衍之齊鈞二子者乗數均將測交也施因令人先之楚言曰魏王令犀首之齊恵施之楚鈞二子者將測交也楚王聞之因郊迎施國策國策田需貴于哀王恵施曰子必善左右今夫楊横樹之則生倒樹之則生折而樹之又生然使十人樹楊一人㧞之則無生楊矣故以十人之衆樹易生之物而不勝一人者樹之難而去之易也今子雖自樹于王而欲去子者衆則子必危矣及張儀之去秦相魏也逐恵施施遂之楚楚王受之馮郝楚人謂楚王曰逐恵子者張儀也而王親與之約是欺儀也恵子為儀來者而惡張儀恵子必弗行也且宋王之賢恵子也天下莫不聞今之不善張儀也天下莫不知今為事之故棄所貴于讐人貴謂儀讐謂施言楚王嘗貴儀今為儀之讐而棄儀也臣以為大王輕矣王不如舉恵子而納之宋而謂儀曰請為子勿納也今必徳王恵子窮人也而王奉之又必徳王此不失為儀之實而可以徳恵子楚王曰善乃奉施而納之宋國策恵施之族有恵盎者盎見宋康成公即康王偃疾言曰寡人之所説勇有力而無為仁義者客何以敎寡人盎對曰臣有道于此使人雖勇刺之不入雖有力擊之弗中也夫刺之不入擊之不中此猶辱也臣有道于此使人有勇弗敢刺有力弗敢撃也夫不刺不敢擊非無其志也臣有道于此使人本無其志也夫無其志未有愛利之心也臣有道于此使天下文夫女子莫不驩然皆欲愛利之此其賢于勇有力也居四累之上髙誘注四累謂卿大夫士及民四等非是自刺不入擊不中至有愛利之心四累而上也大王獨無意邪王曰此寡人之所欲得盎曰孔墨是也孔丘墨翟無地為君無官為長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乗之主也誠有其志則四境之内皆得其利也盎趨而出宋王謂左右曰辯矣客之以説服寡人也吕氏春秋子列同論曰叔痤識鞅恵施測齊若視黑白而不止將大子申豈知出先丹木羊舌大夫之下邪抑有所諱邪若夫辭賞以及吳起之後更日而納王于善彌縫啟沃予有取焉呉起小人貪于功名其見絶于曾子也宜哉尚史卷六十七
