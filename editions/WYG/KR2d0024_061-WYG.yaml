body:
  text: 尚史卷六十一列傳三十九鑲白旗漢軍李鍇撰楚諸臣傳楚逸民傳楚狂接輿楚狂接輿列仙傳名陸通不知所本耕于方城尸子楚王使使者造門曰大王使臣奉金百鎰願請先生治河南接輿笑而不應使者去妻從市來曰先生少而為義豈將老而遺之哉門外車軼何其深也接輿曰王使使者欲使我治河南妻曰許之乎曰未也妻曰君使不從非忠也從之是遺義也不如去之乃夫負釡甑妻戴織器變易姓字莫知其所之韓詩外傳田贊獻魚者附田贊未詳何國人衣補衣而見荆王荆王曰先生之衣何其惡也贊對曰衣有惡于此者王曰可得聞乎曰甲惡于此冬日則寒夏日則暑衣無惡乎甲者贊也貧故衣惡夫大王富貴無敵而好衣民以甲意者為其義邪甲之事兵之事也刈人之頸刳人之腹墮人之城郭刑人之父子也為其實邪茍慮害人人亦必慮害之茍慮危人人亦必慮危之之二者臣為大王無取焉荆王無以應吕氏春秋新序楚人有獻魚楚王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也王曰子不知漁者之仁也葢聞倉粟有餘者國有餓民後宫多幽女者民多曠夫餘衍之蓄聚于府庫者境内多貧寡人聞之乆矣未能行也漁者其以此喻也于是遣使恤鰥寡存孤獨出倉粟發幣帛去後宫不御者以妻鰥夫楚民大説鄰國歸之家語獻魚孔子畧同楚夫人傳鄧曼武夫人鄧曼武王夫人武王四十二年桓十三年莫敖屈瑕伐羅鬪伯比請濟師王辭焉入告鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃于蒲騷之役十一年瑕敗鄖于蒲騷將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令徳見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也王使賴人追之不及屈瑕大敗于羅瑕縊于荒谷羣帥囚于冶父以聼刑王曰孤之罪也皆免之五十一年莊四年王伐隨將齊入告鄧曼曰余心蕩將授兵于廟而志意動散也鄧曼歎曰玉禄盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨于行國之福也王遂行薨于樠木之下左傳息媯文夫人息媯陳女也息侯娶之蔡侯亦娶于陳文王六年莊十年息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使楚伐息息求救于蔡而伐之楚從之伐蔡以蔡侯歸十年莊十四年蔡侯繩息媯以語王繩譽也王如息以食入享遂􅌍息以息媯歸生堵敖及成王息媯未言未與王言王問之對曰吾一婦人而事二夫縱弗能死其又奚言王遂伐蔡入之吕氏春秋楚王欲取息與蔡乃佯善蔡侯而與之謀曰吾欲得息奈何蔡侯曰息夫人吾妻之姨也吾請饗息侯與其妻而與王俱因而襲之楚王因與俱遂取息旋舍于蔡又取蔡列女傳楚伐息破之虜其君使守門將妻其夫人而納之宫楚王出遊夫人出見息君曰人生要死而已乃作詩曰榖則異室死則同穴謂予不信有如皦日遂自殺息君亦自殺楚王賢其守節以諸侯之禮合而葬之按息媯實未死大車亦非其所作説謬王薨成王即位六年莊二十八年令尹公子元欲蠱之為館于其宫側而振萬焉萬舞也息媯聞之泣曰先君以是舞也習戎備也令尹不尋諸仇讎而于未亡人之側不亦異乎元遂伐鄭既歸而處王宫欲遂蠱之鬪班殺元左傳鄭二姬成王妾鄭二姬者文芈女也成王敗宋于泓歸文芈勞王于柯澤王入享于鄭享畢夜出文􅇗送于軍取二姬以歸左傳莊夫人樊姬附秦嬴共夫人莊夫人氏左傳不載共王之母也共王二十七年襄九年王伐鄭夫人薨王未能定鄭而歸左傳列女傳莊王好獵樊姬諌不止乃不食禽獸之肉王改過勤于政事王聼朝罷晏姬下堂而迎之曰何晏也王曰與賢者語不知饑倦也姬曰王之所謂賢者何也曰虞邱子也姬掩口而笑王曰何也姬曰妾執巾櫛十一年遣人至鄭衛求美人進于王今賢于妾者二人同列者七人妾豈不欲擅寵哉不能以私蔽公虞邱子相楚十餘年未嘗進賢退不肖妾之所笑不亦可乎王以告虞邱子虞邱子避舍使迎孫叔敖而進之叔敖治楚三年莊王以霸秦嬴秦景公妹共王夫人也共王三十年襄十二年歸于我我使公子午聘于秦為夫人寧左傳平夫人大子建母嬴氏昭王母昭夫人平夫人郥陽封人之女也平王在蔡女奔之生大子建及即位為建聘于秦費無極勸王取之平王六年昭十九年嬴氏至自秦立為夫人使陽匄聘于秦明年大子建出奔建母歸于郥十年昭二十三年建母自郥召呉人而啓之呉大子入郥取建母與其寳器以歸呉越春秋呉王僚遣公子伐楚大敗楚師因迎故大子建母于鄭鄭君送建母珠玉簮珥欲以解殺建之過嬴氏生子壬是為昭王左傳列女傳伯嬴者秦穆公女楚平王夫人昭王之母也呉入郢昭王亡闔廬盡妻其後宫次至伯嬴伯嬴持刀拒之呉王慙退舎伯嬴與保阿閉永巷不釋兵三旬按秦穆距楚昭殊逺且昭王出奔取妹畀我以出焉有母在而故委之乎公榖並有妻母之文其不及左氏逺矣昭夫人越女也生子章是為惠王白公勝之亂刼惠王如髙府圉公陽大夫穴宫負王以如夫人之宫乃免左傳列女傳越姬者越王句踐之女昭王燕逰蔡姬在左越姬參右王登附社之臺以望雲夢之囿觀士大夫逐者既驩乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰固願生俱樂死同時王顧謂史書之復謂越姬越姬對曰昔者吾先君莊王滛樂三年不聼政事終而能改卒霸天下妾以為君王能法吾先君將改斯樂而勤于政也今則不然而要婢子以死豈可得乎居二十五年王救陳二姬從王病在軍中有赤雲夾日如飛鳥王問周内史内史曰是害王身然可移于將相將相聞之請以身禱王曰將相猶股肱也移禍焉庸為去是身乎不聼越姬曰大哉君王之徳以是妾願從王矣請先驅狐狸于地下王曰昔日之逰樂吾特戲之耳若將必死是彰孤之不徳也越姬曰妾聞之信者不負其言義者不虛設其事妾死王之義不死王之好也遂自殺王薨于軍中蔡姬竟不能死王弟子問于子西子期謀曰母信者子必仁乃迎越姬子熊章立是為惠王按傳惠王時夫人猶存死昭王前謬又救陳前二十五年亦不得為句踐之女矣列女傳昭王出逰留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符夫人曰王與宫人約召必以符今使者不持符妾不敢行使者曰水方大至還而取符恐後夫人曰貞女之義不犯約男者不畏死妾知從死者必生留必死然棄約越義而求生不若留而死耳使者取符水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號曰貞姜季芈白公妻貞姬附季芈字畀我服䖍注我世族譜以季芈畀皆平王女昭王之妹也昭王十年定四年呉入郢王取妹季芈以出及奔鄖鍾建負季芈以從明年事寧王將嫁季芈季芈辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹左傳列女傳貞姬者白公勝之妻也白公死妻紡績不嫁呉王聞其美且有行使大夫持金百鎰白璧一雙以聘以軿車三十乘迎之將以為夫人其妻辭曰白公生之時妾幸得執箕帚託為妃匹白公不幸而死妾願守其墳墓今王賜金璧之聘夫人之位非所聞也且夫棄義從欲者汚也見利忘死者貪也貪汚之人王何以為哉妾聞忠臣不借人以利貞女不假人以色妾既不仁不能從死今又去而嫁不亦太甚乎呉王賢其守號曰貞姬論曰泰誓數紂曰用婦人之言使用鄧曼之言其免羅辱乎徳無常師主善為師在所審爾息媯事二夫而危二國振萬之侮有自來矣建母啓戎卒階吳禍辟纑亡紀漚菅瘠魯信乎怨讟之于人甚矣哉楚逆臣傳潘崇潘崇大子商臣師也成王既立商臣為大子又欲立王子職而黜商臣商臣聞之而未察告崇曰若之何而察之崇曰享江􅇗而勿敬也江􅇗者成王之妹也商臣從之江􅇗怒曰呼發聲也役夫宜君王之欲殺女而立職也告崇曰信矣崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能成王四十六年文元年冬十月以宫甲圍成王王縊商臣立以其為大子之室與崇使為大師且掌環列之尹宫衛之官穆王十年文十一年王伐麇敗之崇復伐麇至于錫穴莊王即位崇使公子燮鬪克守而伐舒蓼燮克作亂死崇還左傳楚亂臣傳鬪宜申子西仲歸附鬪宜申字子西為司馬事成王成王三十三年僖二十一年王執宋公以伐宋使宜申如魯獻㨗三十八年僖二十六年宜申及成得臣􅌍䕫以䕫子歸宋叛我冬及成得臣伐宋圍緡四十年僖二十八年及成得臣及晉師戰于城濮我師敗績初范巫矞似謂成王及成得臣鬪宜申曰三君皆將强死及是王思之使止成得臣曰母死不及止宜申宜申縊而縣絶王使適至遂止之使為商公㳂漢沂江將入郢王在渚宫下見之懼而辭曰臣免于死又有䜛言謂臣將逃臣歸死于司敗也王使為工尹掌百工之官穆王九年文十年宜申又與仲歸謀弑穆王王聞之殺宜申及仲歸仲歸字子家左傳鬬克公子燮鬪緡附鬪敖鬪克字子儀鬪氏族公子燮羣公子也鬪克初為申公成王三十七年僖二十五年秦晉伐鄀秦楚界上小國克及息公屈禦㓂以申息之師戍商宻鄀别邑秦人過析楚邑隈入而係輿人入隐蔽之處係縛輿人詐為克析得其囚俘以圍商宻昬而傅焉宵坎血加書偽與克及屈禦㓂盟者商宻人懼曰秦取析矣戍人反矣乃降秦秦囚克及禦㓂以歸乆之秦歸克左傳穆王薨莊王㓜弱克為師公子燮為傅國語元年文十四年令尹成嘉大師潘崇將襲羣舒使克及燮守而伐舒蓼克燮作亂城郢使賊殺成嘉不克而還克燮以王出將如商宻廬戢黎誘之遂殺克及燮初克囚于秦秦有殽之役使歸求成成而不得志公子燮嘗􅌍蓼求令尹而不得故作亂克之先有鬪緡武王克權使緡尹之緡叛圍而殺之遷權于那處使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛我而伐那處取之遂門于楚閻敖游涌而逆文王殺之其族為亂巴人因之以伐我左傳鬪椒子越椒苖賁皇見晋傳鬪椒又曰子越椒字伯棼一作伯賁鬪伯比之孫司馬子良之子也初事成王成王四十年僖二十八年城濮之役王使成得臣去宋得臣不可使椒請戰晉遂敗我師于城濮穆王八年文九年使椒聘于魯執幣傲魯叔仲惠伯曰是必􅌍若敖氏之宗莊王三年文十六年庸人帥羣蠻以叛椒自石溪子貝名氏未詳自仞以伐庸遂􅌍庸七年宣二年晉侵鄭椒救之曰能欲諸侯而惡其難乎次于鄭以待晉師晉趙盾曰彼宗競于楚殆將斃矣若敖氏世為令尹姑益其疾乃去之令尹薳莒臣卒鬪般為令尹椒為司馬蒍賈為工正賈譖般而殺之椒為令尹賈為司馬九年宣四年椒又惡賈圄賈而殺之遂處烝野將攻王王以三王之子文成穆為質焉弗受師于漳澨與若敖氏戰于臯滸椒射王汰輈及鼓跗著于丁寧鉦也又射汰輈以貫笠轂兵車無葢尊者邉人執笠依榖而立曰笠榖師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡于是矣鼓而進之遂􅌍若敖氏初子良生椒其兄鬪榖於菟曰必殺之是子也熊虎之状而豺狼之聲弗殺必􅌍若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可榖於菟以為大慼及將死聚其族曰椒也知政乃速行矣無及于難且泣曰鬼猶求食若敖氏之鬼不其餒而左傳椒子苖賁皇椒死賁皇奔晉見晉傳鬪成然子旗薳居許圍蔡洧常夀過觀從鬪成然是為蔓成然字子旗鬪韋龜之子也薳居大司馬薳掩之族許圍許大夫蔡洧蔡人常夀過越大夫也靈王之為令尹也殺薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵于王王之􅌍蔡也其父死焉申之㑹常夀過戮焉王奪鬪韋龜中犫又奪蔓成然邑而使為郊尹成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也靈王十一年昭十二年王狩于州來使蔡洧與于守而行明年羣䘮職之徒啟常夀過作亂圍固城克息舟楚邑城而居之觀從者字子玉觀起之子也起之死也觀從在蔡事朝吳故蔡大夫聲子之子曰今不封蔡蔡不封矣我請試之以蔡公棄疾之命召公子比公子黒肱及郊而告之情强與之盟入襲蔡棄疾將食見之而逃觀從使公子比食坎用牲加書而速行若與棄疾已盟者以示衆已徇于蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益賊謂二公子衆釋之乃奉蔡公棄疾召二子而盟于鄧依陳蔡人以國公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚遂殺大子禄及公子罷敵公子比為王黑肱為令尹棄疾為司馬使觀從師于乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰靈王縊于申亥氏觀從謂公子比曰不殺棄疾雖得國猶受禍也比曰余不忍也從曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣棄疾又使周走而呼曰王至矣國人大驚使蔓成然走告公子比公子黒肱曰王至矣國人殺君司馬偽言殺棄疾以怨之將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺棄疾即位是為平王使蔓成然為令尹封陳蔡復遷邑召觀從王曰唯爾所欲對曰臣之先佐開卜乃使為卜尹鬪成然子三辛懐巢成然既立平王不知度而求無厭平王殺之使辛為鄖公以無忘舊勲昭王十年定四年呉入郢王奔鄖弟懐將弑王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讎之君命天也若使天命將誰讎詩曰柔亦不茹剛亦不吐不侮矜寡不畏疆禦唯仁者能之違彊陵弱非勇也乘人之約非仁也􅌍宗廢祀非孝也動無令名非知也必犯是余將殺女遂與弟巢以王奔隨吳之入郢也以班處宫公子子山處令尹之宫夫槩王欲攻之懼而去之辛聞其争宫也曰吾聞之不讓則不和不和不可以逺征呉争于楚必有亂有亂則必歸焉能定楚十一年昭五年王入于郢賞辛巢及懐公子申曰請舍懐也王曰大徳􅌍小怨道也左傳國語公子申諌曰君有二臣或可賞也或可戮也君王均之羣臣懼矣王曰夫子旗之二子邪吾知之矣或禮于君或禮于父均之不亦可乎白公勝王孫燕石乞僚附熊宜白公勝大子建之子王孫燕其弟也鄭人之殺大子建也勝在呉公子申欲召之葉公沈諸梁曰吾聞勝也詐而亂無乃害乎公子申曰吾聞勝也信而勇不為不利舍諸邉竟使衛藩焉諸梁曰周仁之謂信率義之為勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處呉竟為白公勝請伐鄭公子申曰楚未節也言國新復政令未節不然吾不忘也他日又請許之未起師晉人伐鄭我救之與之盟勝怒曰鄭人在此讎不逺矣勝自厲劍公子結之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告公子申申曰勝如卵余翼而長之楚國第用士以次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我言若得自死我乃非人公子申不悛淮南子屈建告石乞曰白公勝將為亂石乞曰不然勝卑身下士不敢驕賢其家無筦籥之信闗楗之固大斛以出輕兩以内而乃論之以不宜也屈建曰此乃所以反也説苑屈建曰白公其為亂乎石乞曰白公所下士者三人與已相若臣者五人所與同衣食者千人白公之行若此何故為亂建曰此建之所謂亂也以君子行則可于國家行過禮則國家疑之且茍不難下其臣必不難髙其君矣孔叢子墨子稱景公問晏子以孔子而不對公曰問子而不對何也晏子曰聞孔子之荆知白公謀而奉之以石乞勸下亂上非聖賢之行也詰之曰楚昭王之世夫子應聘如荆不用而反惠王立十年子西乃召王孫勝時魯哀公十五年也夫子自衛反魯居五年矣白公立一年乃作亂在十六年秋夫子已卒十旬矣按孔叢子説良是淮南二説亦誣屈建康王時人也列子白公問孔子曰人可與㣲言孔子不應白公曰若以石投水何如曰呉之善没者能取之曰若以水投水何如曰淄澠之合易牙嘗而知之白公曰人固不可與㣲言乎曰何為不可唯知言者之謂乎夫知言之謂者不以言言也争魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所争者末矣白公不得已遂死于浴室列子白公勝慮亂罷朝而立倒杖䇿錣上貫頤血流至地而弗知也鄭人聞之曰頤之忘將不忘哉韓非子同勝謂其徒石乞曰王與二卿士公子申公子結也皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人矣乃從勝而見之與之言説告之故辭承之以劍不動勝曰不為利諂不為威惕不洩人言以求媚者去之淮南子市南宜遼弄丸而兩家之難無所闗其辭説苑齊人有子蘭子者事白公勝勝將為難告子蘭子曰吾將舉大事願與子共之子蘭子曰我事子而子殺君是助子之不義也畏患而去子是遁子于難也故不與子殺君以成吾義契領于庭以遂吾行新序白公將弑惠王及子西欲得易甲陳士勒兵以示曰與我無患不富貴不吾與則此是也易甲笑曰立得天下不義吾不取也威吾以兵不義吾不從也子將弑子之君而使我從子非吾義也子行子之威吾亦得明吾義也逆子以兵争也應子以聲鄙也吾聞士立義不争行死不鄙拱而待兵顔色不變新序白公勝將弑王㧞劍而屬之于屈廬曰與我舍子不與我必殺子廬曰子殺叔父而求福于廬也可乎為人臣者時生則生時死則死故上知天命下知臣道其有可刧乎子胡不推之勝内其劍惠王十年哀十六年呉人伐慎勝敗之請以戰備獻許之遂作亂殺公子申公子結于朝而刼王公子申以袂掩面而死慙于沈諸梁公子結抉豫章以殺人而後死石乞曰焚庫弑王不然不濟勝曰不可弑王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患勿從淮南子白公勝得荆國不能以府庫分人七日石乞入曰不義得之又不能布施患必至矣不能予人不若焚之白公不聼九日葉公入發大府之貨以予衆出髙庫之兵以賦民因而攻之十有九日而擒白公勝欲以公子閭為王閭不可殺之而以王如髙府葉公沈諸梁與國人攻勝勝奔山而縊其徒微之匿其尸也生拘石乞而問勝之死焉對曰余知其死所而長者使余勿言曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞勝弟燕奔黄氏左傳韓詩外傳楚有士曰申鳴治園以養父母孝聞于楚王召之申鳴辭其父曰王欲用汝何謂辭之鳴曰何舍為子乃為臣乎其父曰我欲女之仕也鳴曰諾遂之朝受命王以為左司馬白公之亂鳴以兵之衛白公謂石乞曰申鳴天下勇士也今將兵為之奈何乞曰吾聞申鳴孝刦其父以兵使謂申鳴曰與我則與子楚國不與我則殺乃父鳴流涕而應之曰始則父之子今則君之臣已不得為孝子矣安得不為忠臣乎援桴鼓之遂殺白公其父亦死王歸賞之鳴曰受君之禄避君之難非忠臣也正君之法以殺其父非孝子也若此而生亦何以示天下之士哉遂自刎而死新序白公之難楚有莊善者辭其母將往死之其母曰棄其親而死其君可謂義乎莊善曰吾聞事君者内其禄而外其身今養母者君之禄也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣何不返曰懼者吾私也死義吾公也君子不以私害公及公門刎頸而死論曰性善之言聞諸子輿子若鬪椒白公者所禀匪天耶豺狼性成噬人而死寧有塈乎子文前識有符于叔向之母噫天覆厥宗是生狼子若敖羊舌之衰也然克黄繼世而食我自夷羊舌之鬼其真餒乎觀從石乞助亂之賊使委身於正其材具皆可觀惜也語曰至白不緇皦皦乎市南宜僚之貴矣楚叛臣傳屈巫即巫臣狐庸附屈巫字子靈屈氏族是為巫臣也為申公初事莊王莊王十七年宣十一年冬王伐蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭巫曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊遂傳于蕭蕭潰初莊王之討陳夏氏也欲納夏姬巫曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為滛滛為大罰周書曰明徳慎罸文王所以造周也明徳務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之王乃止公子側欲取之巫臣曰是不祥人也是夭子蠻鄭靈公也夏姬之兄殺死無後殺御叔夏姬之夫亦早死殺靈侯陳靈公也戮夏南夏姬子徴舒出孔儀孔寧儀行父䘮陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是公子側乃止王以與連尹襄老襄老死于邲不獲其尸其子黒要烝焉巫使道焉曰歸吾聘女又使自鄭召之曰尸可得也詐言襄老之尸可得必來逆之姬以告王王問諸巫對曰其信知罃之父荀首成公之嬖也而中行伯荀林父之季弟也新佐中軍而善鄭皇戌甚愛此子其必因鄭而歸王子與襄老之尸以求之邲之役楚獲知罃晉射公子穀臣與襄老之尸以歸鄭人懼于邲之役而欲求媚于晉其必許之王遣夏姬歸巫聘諸鄭鄭伯許之共王二年成二年將伐魯為陽橋之役使巫聘于齊且告師期巫盡室以行及鄭使介副使也反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣于晉晉人使為邢大夫公子側請以重幣錮之王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所葢多矣且彼若能利國家雖重幣晉將可乎若無益于晉晉將棄之何勞錮焉初圍宋之役也在宣十四年師還公子嬰齊請取于申吕楚二邑以為賞田王許之巫曰不可此申吕所以邑也是以為賊以御北方若取之是無申吕也晉鄭必至于漢王乃止公子嬰齊是以怨巫公子側欲取夏姬巫止之遂取以行側亦怨之共王即位嬰齊側殺巫之族子閻子蕩及清尹弗忌及襄老之子黒要而分其室嬰齊取子閻之室使沈尹與王子罷分子蕩之室側取黒要與清尹之室巫自晉遺公子書曰爾以讒慝貪惏事君而多殺不辜余必使爾罷于奔命以死巫請使于呉晉侯許之吳子夀夢説之乃通吳于晉以兩之一卒適呉舍偏兩之一焉司馬法百人為卒二十五人為兩車九乘為小偏十五乗為大偏葢留九乗車及一兩二十五乗令呉習之與其射御教吳乗車教之戰陳教之叛楚寘其子狐庸焉使為行人于呉呉使伐楚伐巢伐徐嬰齊奔命七年成七年馬陵之㑹吳入州來嬰齊自鄭奔命嬰齊側于是乎一嵗七奔命蠻夷屬于楚者呉盡取之是以始大通呉于上國八年成八年晉使巫如呉假道于莒與渠邱公立于池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啟封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎明年公子嬰齊伐莒莒城惡衆果潰左傳巫終于晉卒不復楚嬖臣傳費無極鄢將師費無極鄢將師者楚之嬖臣也無極為大子建少師將師為右領並事平王蔡大夫朝呉有功于平王王寘諸蔡無極欲去之乃謂之曰王唯信子故處子于蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信呉故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及于難平王二年昭十五年蔡人逐朝呉朝呉出奔鄭王怒曰余唯信吳故寘諸蔡且㣲吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也伍奢為大子建師無極為少師無寵欲譖諸王六年昭十九年無極逆建妻于秦勸王取之是年夏王伐濮無極言于王曰晉之伯也邇于諸夏而楚僻陋故弗能與争若大城城父而寘大子焉以通北方王收南方是得天下也王説從之明年無極言于王曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之使司馬奮揚殺大子建建奔宋無極曰奢之子材若在呉必憂楚國盍以免其父召之彼仁必來不然將為患王使召之伍尚歸皆殺之蔡隐大子之子東國者蔡侯朱之叔父也八年昭二十一年蔡侯朱來奔無極取貨于東國而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱愬于我王將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隐大子其子與君同惡平侯東國並隐大子之子蔡侯朱平侯之子也靈王殺隐大子平侯與公子比殺靈王故言與君同惡徳君必甚又使立之不亦可乎且廢置在君蔡無他矣無極與鄢將師比而惡郤宛昭王元年昭二十七年無極譖之于令尹囊瓦曰宛將為子不利囊瓦召將師而告之將師退遂令攻郤氏且爇之郤宛自殺盡滅郤氏之黨殺陽令終令尹陽匄子與其弟完及佗與晉陳大夫及其子弟晉陳之族呼于國曰鄢氏費氏自以為王専禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何囊瓦病之秋九月囊瓦殺無極與將師盡滅其族以説于國謗言乃止左傳論曰詩云哲婦傾城又曰取彼譖人投畀豺虎信矣二者之禍人深也然而徇國徇身世孰聞之曽不如夏姬無極踵亂連禍若此其酷也天子蠻殺御叔弑靈侯戮夏南出孔儀叛巫臣斃黒要妖􅁋之宗也翦朝呉出蔡侯朱逐大子建殺連尹奢夷大夫宛險詖之叢也跡其歸則譛人灰滅而哲婦令終何耶尚史卷六十一
