body:
  text: 尚史卷四十二列傳二十鑲白旗漢軍李鍇撰晉諸臣傳羊舌大夫羊舌職羊舌赤伯華羊舌肹叔向羊舌鮒叔魚羊舌虎叔虎楊石楊食我子容附羊舌大夫者失其名事獻公為軍尉家語晉平公問祁奚曰羊舌大夫何如對曰其為人也數變其十五年也亷以不匿其過其二十也仁以喜義其三十也為晉中軍尉勇以喜仁其年五十也為邉城将逺者復親公曰果賢大夫也每變益上矣子職事景公為大夫邲之敗也荀林父請死士渥濁諫公免之及林父敗赤狄滅潞公賞林父狄臣千室亦賞渥濁以𤓰衍之田曰微子吾喪伯氏矣職說是賞也曰周書所謂庸庸祇祇者謂此物也夫士伯即士渥濁庸中行伯即荀林父君信之亦庸士伯此之謂眀徳矣文王所以造周不是過也故詩曰陳錫哉周能施也率是道也其何不濟景公七年宣十六年公命士㑹将中軍且為大傅于是晉國之盗逃奔于秦職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄冰善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也及悼公即位使祁奚為中軍尉職佐之國語知羊舌職之聰敏肅給也使佐之悼公三年襄三年職卒左傳子四曰赤肹鮒虎羊舌赤者所謂銅鞮伯華也事悼公悼公三年襄三年代職佐中軍尉士匄與龢大夫争田欲攻之問于赤赤曰外有軍内有事赤也外事也不敢侵官且吾子之心有出焉可徵訊也謂以軍旅出可召問也國語及欒盈之難士匄囚赤及其弟肹既而免之左傳赤之子曰子容羊舌肹字叔向食邑于楊又曰楊肹悼公時使傅太子彪即平公國語平公即位肹為太傅肹弟虎字叔虎美而有勇力欒盈嬖之平公六年襄二十一年士匄逐欒盈殺虎且囚肹人謂肹曰子離于罪其為不知乎肹曰與其死亡若何詩曰優哉㳺哉聊以卒嵗知也㑹祁奚請肹肹免冬公㑹諸侯于商邱錮欒氏也齊侯衛侯不敬肹曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也十一年哀二十六年我以孫林父故執衛侯齊侯鄭伯為衛侯故來公兼享之賦嘉樂國弱相齊侯賦蓼蕭公孫舍之即子展罕氏也相鄭伯賦緇衣肹命公拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也國弱使晏嬰私于肹曰晉君盟主也今為臣執君若之何肹告趙武武以告公公言衛侯之罪使肹告二君告殺晉戍三百人之罪國弱賦轡之柔矣舍之賦將仲子兮公乃許歸衛侯肹曰鄭七穆謂罕氏駟氏國氏良氏游氏豐氏印氏也鄭穆公十一子子然二子孔三族已亡子羽不為卿故曰七穆罕氏其後亡者也子展儉而壹十二年襄二十七年宋向戌欲弭諸侯之兵為㑹于宋五月趙武至于宋宋人享武肹為介及楚屈建至将盟楚人𠂻甲趙武患之以告肹肹曰何害也匹夫一為不信猶不可單斃其死單盡斃踣也若合諸侯之卿以為不信必不捷矣食言者不病不病者單斃于死非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病為楚所病則入宋城則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也國語諸侯之大夫盟于宋楚令尹子木欲襲晉軍文子謂叔向曰若之何叔向曰子何患焉忠不可暴信不可犯忠自中而信自身其為徳也深矣其置本也固矣故不可抈也今我以忠謀諸侯而以信覆之荆之逆諸侯也亦云是以在此若襲我是自背其信而塞其忠也信反必弊忠塞無用安能害我且夫合諸侯以為不信諸侯何望焉此行也荆敗我諸侯必叛之子何愛于死死而可以固晉國之盟主何懼焉是行也以蕃為軍攀輦即利而舍候遮扞衛不行楚人不敢謀畏晉之信也及盟晋楚争先歃肹謂趙武曰諸侯歸晉之徳只非歸其尸盟也子務徳無争先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人國語宋之盟楚請先歃叔向謂趙文子曰夫伯王之勢在徳不在先歃子若能以忠信賛君而禆諸侯之闕歃雖後諸侯将戴之何争于先若違于徳而以賄成事今雖先歃諸侯将棄之何欲于先昔成王盟諸侯于岐陽楚為荆蠻置茅蕝設望表與鮮牟守燎故不與盟今将與狎主諸侯之盟唯有徳也子務徳勿争先宋公享晉楚之大夫趙武為客一坐所尊為客屈建與之言弗能對使肹侍言焉屈建亦不能對也十七年昭元年趙武㑹楚公子圍于虢尋宋之盟也公子圍設服離衛設君服陳兵衛事畢趙武謂肹曰令尹即公子圍自以為王矣何如對曰王弱令尹彊其可哉雖可不終武曰何故對曰彊以克弱而安之彊不義也不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也令尹為王必求諸侯晉少懦矣諸侯将往若獲諸侯其虐滋甚民弗堪也将何以終夫以彊取不義而兄必以為道道以淫虐弗可久矣是年冬十一月公子圍弑楚王右尹王子比即子干來奔從車五乗先是秦公子鍼景公母弟亦來奔其車千乗肹使與秦公子同食皆百人之餼趙武國語作韓宣子曰秦公子富肹曰底禄以徳徳鈞以年年同以尊公子以國不聞以富且夫以千乗去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也十八年昭二年韓須如齊逆女齊陳無宇送女致少姜公以其非卿執諸中都少姜為之請不許少姜卒肹言陳無宇于公曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以為盟主且少姜有辭乃歸陳無宇十九年昭三年齊侯使晏嬰請繼室于我公使肹許之既成昏晏嬰受禮肹從之晏相與語肹曰齊其何如晏嬰曰此季世也吾弗知齊其為陳氏矣公棄其民而歸于陳氏齊舊四量豆區釜鍾四升為豆各自其四以登于釜四豆為區區斗六升四區為釜釜六斗四升釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣豆區釜三等皆加舊量之一以五升為豆五豆為區五區為釜則區一斗釜八斗鍾八斛以家量貸而以公量收之山木如市弗加于山魚鹽蜃蛤弗加于海民參其力二入于公而衣食其一公聚朽蠧而三老上夀中夀下夀皆八十以上者凍餒國之諸市屨賤踊貴踊刖足者之屨民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民将焉辟之箕伯直柄虞遂伯戯皆舜後陳氏之先其相胡公大姬已在齊矣胡公四人之後始封陳之祖大姬其妃也言陳氏将有國其先祖鬼神已與胡公共在齊肹曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乗無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃冦讐欒郤胥原狐續慶伯八姓晉臣之族降在皂𨽻政在家門民無所依君日不悛以樂慆淫公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠况日不悛其能久乎晏嬰曰子将若何肹曰晉之公族盡矣肹聞之公室将卑其宗族枝葉先落則公從之肹之宗十一族唯羊舌氏在而已肹又無子無賢子公族無度幸而得死豈其獲祀秋七月鄭罕虎來賀夫人且告曰楚人日徵敝邑以不朝立王之故楚靈王新立往則畏執事謂寡君有外心不往則宋之盟云宋盟交相見進退罪也寡君使虎布之韓起使肹對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免于戾矣君若不有寡君雖朝夕辱于敝邑寡君猜焉君實有心何辱命焉君其往也茍有寡君在楚猶在晉也二十一年昭五年韓起如楚送女肹為介鄭罕虎㳺吉勞諸索氏㳺吉謂肹曰楚王汰侈已甚子其戒之肹曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子欲以韓起為閽刖足使守門以肹為司宫加官刑以辱我薳啟彊諷楚子楚子乃謝厚為韓起禮又欲敖肹以其所不知而不能亦厚其禮二十二年昭六年鄭人鑄刑書肹使詒公孫僑書曰始吾有虞于子今則已矣昔先王議事以制不為刑辟懼民之有争心也猶不可禁禦是故閑之以義糾之以政行之以禮守之以信奉之以仁制為禄位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊斷之以剛猶求聖哲之上眀察之官忠信之長慈恵之師民于是乎可任使也而不生禍亂民知有辟則不忌于上並有争心以徴于書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑九刑或即吕刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政作邱賦制參辟鑄刑書參辟謂用三代之末法将以靖民不亦難乎詩曰儀式刑文王之徳日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知争端矣将棄禮而徵于書錐刀之末将盡争之亂獄滋豐賄賂並行終子之世鄭其敗乎肹聞之國将亡必多制其此之謂乎僑復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大恵夏六月楚公子棄疾來聘報韓起也起之適楚楚人弗逆棄疾及晉竟公将亦弗逆肹曰楚辟我衷辟邪衷正也若何效辟詩曰爾之教矣民胥效矣從我而已焉用效人之辟書曰聖作則無寧以善人為則而則人之辟乎匹夫為善民猶則之况國君乎公説乃逆之二十五年昭九年周甘人與閻嘉晉閻縣大夫争閻田我率隂戎伐頴周邑王使詹桓伯辭于我曰文武成康之建母弟以蕃屏周亦其廢隊是為豈如弁髦而因以敝之童子垂髦始冠必以弁故曰弁髦緇布冠也既三加冠成禮棄其緇布之冠永不復用后稷封殖天下今戎制之不亦難乎肹謂韓起曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰徳而暴滅宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之韓起説乃致閻田反潁俘平公薨事昭公昭公元年昭十一年楚子召蔡靈侯而殺之圍蔡韓起問于肹曰楚其克乎對曰克哉蔡侯獲罪于其君謂弑父而立而不能其民天将假手于楚以斃之何故不克然肹聞之不信以幸其可再也楚王奉孫吳以討于陳曰将定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緍以喪其國紂克東夷而隕其身楚小位下而亟暴于二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材即五行而将用之力盡而敝之是以無拯不可没振猶言没不可復振夏五月周單成公㑹韓起于戚視下言徐肹曰單子其将死乎朝有著定朝内列位常處謂之表著㑹有表野㑹設表以為位衣有襘帶有結禬領禬結帶結㑹朝之言必聞于表著之位所以昭事序也視不過結禬之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事于㑹視不登帶言不過歩貌不道容而言不昭矣不道不共不昭不從貌正曰共言順曰從無守氣矣魯齊歸昭公母薨大蒐于比蒲及葬魯侯不慼肹曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國三年昭十三年楚觀從觀起之子召公子比即子干公子黒肱即子晳元年子干奔晉子晳奔鄭将為亂于楚公子比歸韓起問于肹曰子干其濟乎對曰難起曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亡無愛徵可謂無徳王虐而不忌楚君子干涉五難以弑舊君誰能濟之有楚國者其棄疾乎棄疾楚平王名君陳蔡城外屬焉苛慝不作盗賊伏隠私欲不違民無怨心先神命之共王以璧見于羣望曰當璧而拜者神所立乃宻埋璧于庭使五人入拜康王跨之靈王肘加焉子干子晳皆逺之平王再拜皆厭紐國民信之芈姓有亂必季實立楚之常也獲神一也有民二也令徳三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣民無懐焉國無與焉将何以立起曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵于僖有鮑叔牙賓須無隰朋以為輔佐有莒衛以為外主有髙國以為内主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵于獻好學而不貳生十七年有士五人有先大夫子餘趙衰子犯狐偃以為腹心有魏犫賈佗以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主亡十九年守志彌篤恵懐棄民民從而與之獻無異親民無異望天方相晉将何以代文此二君者異于子干共有寵子國有奥主寵子奥主并謂棄疾無施于民無援于外去晉而不送歸楚而不逆何以冀國晉成虒祁宫名諸侯朝而歸者皆有貳心為魯取郠故在十年我将以諸侯討魯肹曰諸侯不可以不示威乃并徵㑹告于吳吳子辭還秋七月遂合諸侯于平邱将尋盟齊人不可肹告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋肹曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而無昭共則不明不明棄共百事不終所由傾覆也是故眀王之制使諸侯嵗聘以志業嵗聘以修其職業間朝以講禮三年一朝王班爵之義率長幼之序再朝而㑹以示威六年一㑹以訓上下之則制財用之節再㑹而盟以顯昭眀十二年一盟所以昭信義凡八聘四朝再㑹王一巡守盟于方嶽之下志業于好講禮于等示威于衆昭明于神自古以來未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犧齊盟之犧牲而布諸君求終事也君曰余必廢之何齊之有唯君圖之齊人懼對曰小國言之大國制之敢不聽從肹曰諸侯有間矣不可以不示衆八月治兵建而不斾建立旌旗不曵其斾斾㳺也既而斾之軍将戰則斾故復斾以恐之諸侯畏之公以邾莒愬故不見魯侯使肹往辭曰諸侯将以甲戌盟寡君知不得事君矣請君無勤魯人對曰君信蠻夷之訴以絶兄弟之國寡君聞命矣肹曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨于豚上其畏不死僨仆也以瘠牛仆于小豚之上牛不畏豚之不死亦猶晋不畏魯之不亡也南蒯子仲之憂子仲公子憗憗與南蒯謀季氏南蒯叛而憗奔齊其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戌同盟于平邱五年昭十五年荀躒如周葬穆后大子壽之母籍談為介既葬除喪以荀躒宴樽以魯壺王讓晉不脩職貢無彛器籍談歸以告肹肹曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉謂大子壽及穆后天子絶期唯服三年故后雖期通謂之三年喪于是乎以喪賓宴又求彛器樂憂甚矣且非禮也彛器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典将焉用之左傳肹卒子楊石初平公射鴳鴳扈小鳥不死使竪襄搏之失公怒拘将殺之肹聞之夕夕至于朝公告之肹曰君必殺之昔吾先君唐叔射兕于徒林殪以為大甲以封于晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之耻者也君其必速殺之勿令逺聞公忸怩乃趣赦之説苑平公使叔向聘于吳吳人拭舟以逆之左右五百人有繡衣而豹裘錦衣而狐裘者歸以告公公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可發千兵下可陳鐘鼓諸侯亦曰奚以敬臺奚以敬民所敬各異也公乃罷臺又曰公問叔向曰嵗饑民疫翟人攻我将若何對曰嵗饑來年反矣疫将止矣翟不足患也曰患有大于此者乎對曰夫大臣重禄而不諫近臣畏罪而不言左右顧寵于小官而君不知此患之大者也公曰善韓非子叔向御坐平公請事公腓痛足痺轉筋而不敢壊坐髙士傳亥唐晋人也平公與亥唐坐亥唐出叔向入平公伸足曰向與亥唐坐腓痛足痺不敢伸叔向勃然不説公曰亥先生無欲也吾非正坐無以養之子何不説乎肸見女叔齊之子齊即司馬侯其子盖即女叔寛撫而泣之曰自此其父之死吾蔑與比而事君矣昔者此其父始之我終之我始之夫子終之無不可籍偃籍季之子在側曰君子有比乎肸曰君子比而不别比徳以賛事比也引黨以封己利己而忘君别也肸甞見韓起韓起憂貧肸賀之起曰吾有卿之名而無其實無以從二三子吾是以憂子賀我何故對曰昔欒武子欒書無一卒之田其官不備其宗噐宗廟祭噐宣其徳行順其憲則使越于諸侯諸侯親之戎狄懐之以正晋國行刑不疚以免于難及桓子書之子黶驕㤗奢侈貪欲無藝略則行志假貸居賄宜及于難而頼武之徳以没其身及懐子黶之子盈改桓之行而修武之徳可以免于難而離桓之罪以亡于楚夫郤昭子郤至其富半公室其家半三軍恃其富寵以泰于國其身尸于朝其宗戮于絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無徳也今吾子有欒武子之貧吾以為能其徳矣是以賀若不憂徳之不建而患貨之不足将弔不暇何賀之有趙鞅嘗曰魯孟獻子有鬬臣五人我無一何也肹曰子不欲也若欲之肹也待交捽可也國語新序趙文子問于叔向曰晉六将軍孰先亡乎對曰中行氏乎中行氏之為政也以苛為察以欺為明以刻為忠以計多為善以聚歛為良譬之猶鞟革者也大則大矣裂之道也説苑韓平子問于叔向曰剛與柔孰堅曰臣年八十矣齒再墮而舌尚存知柔之堅于剛也韓非子叔向賦獵功多者受多功少者受少羊舌鮒字叔魚肹之弟也平公三年昭十三年平公合諸侯于平邱鮒攝司馬次于衛地鮒求貨于衛淫芻蕘者淫縱也衛使饋肹羮與一篋錦曰諸侯事晉未敢擕貳况衛在君之宇下而敢有異志芻蕘者異于他日敢請之肹受羮反錦曰晉有羊舌鮒者瀆貨無厭亦将及矣為此役也子若以君命賜之其已客從之未退而禁之我以邾莒故執魯季孫意如既而歸之意如請從于㑹欲得盟㑹見遣不欲私去士匄患之謂肹曰子能歸季孫乎對曰不能鮒也能乃使鮒鮒見意如曰昔鮒也得罪于晉君自歸于魯君葢坐叔虎欒盈事微武子意如之祖季孫宿之賜不至于今雖獲歸骨于晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏将為子除館于西河其若之何且泣意如懼遂先歸邢侯楚申公巫臣之子與雍子亦故楚人争鄐田久而無成四年昭十四年理官士彌牟如楚鮒攝理韓起命斷舊獄罪在雍子雍子納其女于鮒鮒蔽罪邢侯曲斷其罪也邢侯怒殺鮒與雍子于朝韓起問其罪于肹肹曰三人同罪施生戮死可也施行罪也雍子自知其罪而賄以買直鮒也鬻獄邢侯専殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與鮒于市仲尼曰叔向古之遺直也治國制刑不隠于親三數叔魚之罪平邱之㑹數其賄也歸魯季孫稱其詐也邢侯之獄言其貪也不為末減曰義也夫可謂直矣楊石字伯石又名楊食我肹之子也頃公十二年昭二十八年祁盈専殺頃公殺盈及食我食我黨盈而助亂也遂滅祁氏羊舌氏左傳事見祁盈傳史記晉之宗家祁奚孫叔嚮子相惡于君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫論曰或謂春秋莫賢于子産予曰其叔向乎美足以正君知足以周物水徳盈科無所慊焉疇能及之然知其無子不獲終祀而義短石碏私討不及豈三數弟魚不能加諸食我哉慶鄭蛾晳梁由靡虢射家僕徒司馬説附慶鄭者晉之舊姓也梁由靡虢射家僕徒蛾晳並為晉大夫事恵公恵公許賄秦五城既入而背之恵公四年僖十三年我饑秦輸之粟眀年秦饑使乞糴于我我弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四徳皆失何以守國虢射曰皮之不存毛将安傅皮以喻所許秦城毛以喻糴慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損于怨而厚于冦不如勿與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉六年僖十五年秦伯伐我及韓公謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使使步揚郤讎之父御戎家僕徒為右乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乗異産以從戎事及懼而變将與人易亂氣狡僨隂血周作張脉僨興外疆中乾進退不可周旋不能君必悔之弗聽戰于韓原晉戎馬還濘而止公號慶鄭鄭曰愎諌違卜固敗是求又何逃焉遂去之梁由靡御韓簡韓簡晉卿韓萬之孫虢射為右輅秦伯将止之輅迎也慶鄭以救公誤之遂失秦伯而秦乃獲公以歸左傳冬十一月秦伯将歸公未至蛾晳謂慶鄭曰君之止子之罪也今君将來子何俟慶鄭曰鄭也聞之曰軍敗死之将止死之二者不行又重之以誤人而喪其君有大罪三将安適君若來将待刑以快君志君若不來将獨伐秦不得君必死之此所待也臣得其志而使君瞢是犯也瞢慙犯逆也君行犯猶失其國而况臣乎公止于絳郊聞慶鄭止使家僕徒召之曰鄭也有罪猶在乎慶鄭曰臣怨君始入而報徳不降韋注不自降下而背秦愚意謂秦兵不東降而伐晉降而聽諫不戰戰而用良不敗既敗而誅又失有罪不可以封國臣是以待即刑以成君政公曰刑之慶鄭曰下有直言臣之行也上有直行君之眀也臣行君明國之利也君雖弗刑必自殺也蛾晳諫曰臣聞之奔刑之臣不若教之以報讎君盍赦之以報于秦梁由靡曰不可我能之秦豈不能且戰不勝而報之以賊不武出戰不克入處不安不知成而反之不信失刑亂政不威出不能用入不能治敗國且殺孺子孺子子圉也秦復恵公而質子圉言伐秦秦必殺之不若刑之公曰斬鄭無使自殺家僕徒諫曰有君不忌有臣死刑其聞賢于刑之梁由靡曰夫君政刑是以治民不聞命而擅進退犯政也快意喪君犯刑也鄭也賊而亂國不可失也且戰而自退退而自殺臣得其志君失其刑後不可用也公命司馬説軍司馬說其名也刑之司馬説進三軍之士而數慶鄭曰夫韓之誓曰失次犯令死将止不面夷死将為敵獲而面不受傷者死偽言誤衆死今鄭失次犯令而罪一也鄭擅進退而罪二也女誤梁由靡使失秦而罪三也君親止女不面夷而罪四也鄭也就刑慶鄭曰説三軍之士皆在有人能坐待刑而不能面夷趣行事乎遂斬鄭國語梁由靡虢射逮事獻公獻公二十四年僖七年里克伐狄梁由靡御虢射為右敗狄于采桑梁由靡曰狄無耻從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣眀年狄果伐我左傳顛頡舟之僑祁瞞顛頡事公子重耳驪姬之難頡從重耳出亡賢而有功卒相重耳反晉國文公五年僖二十八年公入曹令無入僖負羈之宫而免其族報施也文公過曹負羈饋飱置璧頡及魏犫怒曰勞之不圖報于何有爇僖負羈氏公舍魏犫而殺頡以徇于師立舟之僑為戎右以代魏犫夏四月我師敗楚師于城濮濟河舟之僑先歸既入殺舟之僑以徇于國是役也祁瞞奸命中軍風于澤牛馬相風而走皆失之亡大斾之左旃司馬殺之徇于諸侯民于是大服君子謂文公其能刑矣三罪而民服左傳舟之僑者故事虢公以其族適晉而虢亡見虢志祁瞞祁氏族韓非子公問于狐偃曰寡人甘肥周于堂巵酒豆肉集于宫殺一牛遍于國中一嵗之功盡以衣士卒足以戰乎曰不足公曰弛闗市之征而緩刑罰足以戰乎曰不足公曰吾民有喪者使郎中視事有罪者赦之貧窮不足者與之足以戰乎曰不足此皆所以慎産也而戰之者殺之也民之從公為慎産也因而迎殺之失所以從公矣曰然則如何曰令無得不戰公曰無得不戰奈何曰信賞必罰其足以戰公曰刑罰之極安至曰不辟親貴法行所愛公曰善眀日田于圃陸顛頡後期遂斬以徇而百姓皆懼此說獨異李離李離者文公之理也過聽殺人自拘當死公曰官有貴賤罰有輕重下吏有過非子之罪也離曰臣居官為長不與吏讓位受禄為多不與下分利今過聽殺人傅其罪下吏非所聞也辭不受令公曰子自以為有罪寡人亦有罪邪離曰理有法失刑則刑失死則死公以臣能聽微决疑故使為理今過聽殺人罪當死遂不受令伏劒而死史記新序李離曰君量能而授官臣奉職而任事君命曰必以仁義輔政寧過于生勿失于殺臣受命不稱壅恵蔽恩如臣之罪乃當死君何道乎今離刻深不顧仁義信文墨不察是非聽他辭不精事實掠服無罪使百姓怨怨積于百姓惡揚于天下權輕于諸侯如臣之罪是當重死文公曰吾聞之也直而不枉不可與往方而不圓不可與長存願子以此聽寡人也離曰君以所私害公法殺無罪而生當死二者非所以教于國也離不敢受命論曰武事尚信慶鄭之誅三罪之服均于信矣而恵公有私焉非中于刑也慶鄭快意喪君雖待以即刑非李離之亞已尚史卷四十二
