body:
  text: 尚史卷一百一志九鑲白旗漢軍李鍇撰律吕志下五聲清濁髙下之次宫君土商臣金角民木徵事火羽物水最下最濁次下次濁髙下清濁之間次髙次清最髙最清凡聴徵如負豬豕覺而駭凡聴羽如鳴馬在樹馬當作鳥凡聴宫如牛鳴􅐎中凡聴商如離羣羊凡聴角如雉登木以鳴音疾以清以鳴六字疑衍管子五聲相生之次宫八十一下生徵徵五十四上生商商七十二下生羽羽四十八上生角角六十四官下生變凡將起五音凡首謂音之總先先主一而三之四開以合九九一而三之四也以四開合于五音九也又九之為八十一也以是生黄鐘小素之首以成宫素本宫八十一收生黄鐘之宫為五音之本三分而益之以一為百有八為徵本八十一益以三分之一二十七通得百有八是為徵數百有八者半之則為五十四也有三而去其乗適足以是生商乗亦三分之一也三分百八而去一餘七十二是為商數有三分而復於其所以是成羽三分七十二而益一分二十四合為九十六是羽之數九十六者半之則為四十八也有三分而去乗適足以是成角三分九十六去其一分餘六十四是角之數管子二變相生之法變宫四十二餘九分分之六上生變徵變徵五十六餘九九分之六姑洗生應鐘比于正音故為和應鐘生㽔賔不比于正音故為謬淮南子朱子曰按五聲相生至於角位則其數六十有四隔八相生當得宫前一位以為變宫然其數三分損一毎分各得二十有一尚餘一分不可損益故五聲之正至此而窮若欲生之則須更以所餘一分析而為九損其三分之一分乃得四十二分餘九分分之六而後得成變宫之數又自變宫隔八上生當得徴前一位其數五十有六餘九分分之八以為變徴正合相生之法自此又當下生則又餘二分不可損益而數又窮故立均之法于是而終焉然而二變但為和謬已不得為正聲矣五聲數曰九九八十一以為宫三分去一得五十四以為徴三分益一得七十二以為商三分去一得四十八以為羽三分益一得六十四以為角十二律數曰黄鐘九寸為宫林鐘六寸為徴太簇八寸為商南吕五寸三分為羽姑洗二寸一分為角應鐘四寸六分六釐㽔賔六寸二分八釐大吕八寸三分七釐六毫夷則五寸五分五釐一毫夾鐘七寸四分三釐七毫三絲無射四寸八分八釐四毫八絲中吕六寸五分八釐三毫四絲六忽史記按黄鐘管長九寸圍九分相乗得八十一為宫三分損一得函鐘五十四為徴三分益一得太簇七十二為商三分損一得南吕四十八為羽三分益一得姑洗六十四為角三分損一得應鐘四二六不盡為變宫三分益一得㽔賔五六九四不盡為變徴三分益一得大吕七五九二三分損一得夷則五六一四不盡三分益一得夾鐘六七四八五四不盡三分損一得無射四四九九二七不盡三分益一得小吕五九九八七二七不盡復三分益一得黄鐘七九九八二七尚不足一分一七二有竒九九一轉而後復元此隔八相生三分損益以成十二律也其五正數皆整五音之正也應鐘以下竒零不盡二變之謬也律又有七始五降七始者五正合二變為黄鐘之正生也五降者大吕以下為㽔賔之變生也中吕再變而復者三轉之㑹歸也黄太姑㽔夷無六竒為律為陽大夾仲函南應六偶為吕為隂黄太姑三律居左當音為陽中之陽㽔夷無三律居右不當音為陽中之隂應夾函三鐘為隂中之陽中南大三吕為隂中之隂黄鐘為宫律大吕為宫吕函鐘為徴吕夷則為徴律太簇為商律夾鐘為商吕南吕為羽吕無射為羽律姑洗為角律中吕為角吕陽三隂二者三天兩地之義也黄鐘上五統五音之正大吕下五統五隂之合應㽔在二五之中無專位故為變應鐘變宫以接宫㽔賔變徴以接角始終相應子午交還之道也義見還宫方圓圖六十聲旋宫圗律吕之數往而不返故黄鐘不復為他律役所用七聲皆正律無空積忽㣲自林鐘而下則有半聲大吕太簇一半聲夾鐘姑洗二半聲㽔賔林鐘四半聲夷則南吕五半聲無射應鐘六半聲仲吕為十二律之窮三半聲自㽔賔而下則有變律㽔賔一變律大吕二變律夷則三變律夾鐘四變律無射五變律仲吕六變律皆有空積忽㣲不得其正故黄鐘獨為聲氣之元黄鐘一均所謂純粹中之純粹者也八十四聲正律六十三自黄鐘歴應鐘凡六均毎均七律得正律四十二自㽔賔歴仲吕凡六均毎均遞減得正律二十一合之得六十三變律二十一自黄鐘之變厯應鐘凡六均毎均遞減得變律二十一六十三者九七之數也二十一者三七之數也律吕新書此七音為均八十四聲也周還無端得一氣運行之全體隂陽往來成正變相生之全用折方圖而圓之于義為著自㽔賔已下至仲吕六均凡再見之黄林太南姑應六律俱為變律加囗以别之律之有半聲者太吕太簇宫商之間夾鐘姑洗商角之間㽔賔林鐘二徴之間夷則南吕徴羽之間無射應鐘羽宫之間四者適得半聲與仲吕一律自得半聲也所以用半者以上律濁而下律清故抑濁揚清以應下律音之所以無奪倫也律之有變者黄鐘為君自本宫首起立均之後不復為他律役至㽔賔立均而後黄鐘為變徴變宫及角羽商徴是陽為陰役而變矣黄鐘既變則餘律皆變臣之所以從君也其所以變之之道者以下律役上律下律短而上律長故須變上律使少短而後與下律應也然律變有凖必倚乎數損益之數至仲吕而窮法以六三之七百二十九因仲吕之實十三萬一千七十二得九千五百五十五萬一千四百八十八再用三分益一而生黄鐘得一千七萬四千七百六十二不及黄鐘正律二千有竒其下五律相因而生皆減于舊是律之變又出于數之自然而已還宫方圖宫徵商羽角變宫變徴黄鐘函鐘太簇南吕姑洗應鐘㽔賔函鐘太簇南吕姑洗應鐘㽔賔大吕太簇南吕姑洗應鐘㽔賔大吕夷則南吕姑洗應鐘㽔賔大吕夷則夾鐘姑洗應鐘㽔賔大吕夷則夾鐘無射應鐘㽔賔大吕夷則夾鐘無射中吕㽔賔大吕夷則夾鐘無射中吕黄鐘大吕夷則夾鐘無射中吕黄鐘函鐘夷則夾鐘無射中吕黄鐘函鐘太簇夾鐘無射中吕黄鐘函鐘太簇南吕無射中吕黄鐘函鐘太簇南吕姑洗中吕黄鐘函鐘太簇南吕姑洗應鐘黄函太南姑應六陽律也㽔大夷夾無仲六陰律也上下對待六陽律闢而分列迤左而右六陰律闔而居中此正變闢闔以陽包陰十二律之體也黄函太南姑五正也大夷夾無仲五合也上之五正右列五合左列而應㽔二變合而在中下之五正左列五合右列而應㽔二變分而在外此陰陽分合以變應正十二律之用也自黄鐘縱數之厯七律而至㽔賔㽔賔起調終一均仍得黄鐘本律隔七首尾相應自黄鐘横數之厯七律而至㽔賔㽔賔右分自仲吕横數之厯七律而至應鐘應鐘左分二變隔七分合相應是又變動不居周流六虗之義也還宫用圖以第三律之角下一律首中吕尾姑洗是為還宫之用餘律並同體圖七音為均者成天地之全體五音為均者合人事之正用七音為均用二變五音為均變正角角者五音之中也中吕者角之吕十二律之中也降用中吕者以角協角以中孚中所以成其用也六十調圖宫商角變徵徴羽變宫黄鐘宫黄正太正姑正㽔正林正南正應正無射商無正黄變半太變半姑變半仲半林變半南變半夷則角夷正無正黄變半太變半夾半仲半林變半仲吕徴仲正林變南變應變黄變半太變半姑變半夾鐘羽夾正仲正林變南變無正黄變半太變半大吕宫大正夾正仲正林變夷正無正黄變半應鐘商應正大半夾半仲半㽔半夷半無半南吕角南正應正大半夾半姑半㽔半夷半㽔賔徵㽔正夷正無正黄變半大半夾半仲半姑洗羽姑正㽔正夷正無正應正大半夾半太簇宫太正姑正㽔正夷正南正應正大半黄鐘商黄正太正姑正㽔正林正南正應正無射角無正黄變半太變半姑變半仲半林變半南變半林鐘徴林正南正應正大半太半姑半㽔半仲吕羽仲正林變南變應變黄變半太變半姑變半夾鐘宫夾正仲正林變南變無正黄變半太變半大吕商大正夾正仲正林變夷正無正黄變半應鐘角應正大半夾半仲半㽔半夷半無半夷則徴夷正無正黄變半太變半夾半仲半林變半㽔賔羽㽔正夷正無正黄變半大半夾半仲半姑洗宫姑正㽔正夷正無正應正大半夾半太簇商太正姑正㽔正夷正南正應正大半黄鐘角黄正太正姑正㽔正林正南正應正南吕徴南正應正大半夾半姑半㽔半夷半林鐘羽林正南正應正大半太半姑半㽔半仲吕宫仲正林變南變應變黄變半大變半姑變半夾鐘商夾正仲正林變南變無正黄變半太變半大吕角大正夾正仲正林變夷正無正黄變半無射徵無正黄變半太變半姑變半仲半林變半南變半夷則羽夷正無正黄變半太變半夾半仲半林變半㽔賔宫㽔正夷正無正黄變半大半夾半仲半姑洗啇姑正㽔正夷正無正應正大半夾半太簇角太正姑正㽔正夷正南正應正大半應鐘徵應正大半夾半仲半㽔半夷半無半南吕羽南正應正大半夾半姑半㽔半夷半林鐘宫林正南正應正大半太半姑半㽔半仲吕商仲正林變南變應變黄變半太變半姑變半夾鐘角夾正仲正林變南變無正黄變半太變半黄鐘徴黄正太正姑正㽔正林正南正應正無射羽無正黄變半太變半姑變半仲半林變半南變半夷則宫夷正無正黄變半太變半夾半仲半林變半㽔賔商㽔正夷正無正黄變半大半夾半仲半姑洗角姑正㽔正夷正無正應正大半夾半大吕徴大正夾正仲正林變夷正無正黄變半應鐘羽應正大半夾半仲半㽔半夷半無半南吕宫南正應正大半夾半姑半㽔半夷半林鐘商林正南正應正大半太半姑半㽔半仲吕角仲正林變南變應半黄變半太變半姑變半太簇徴太正姑正㽔正夷正南正應正大半黄鐘羽黄正太正姑正㽔正林正南正應正無射宫無正黄變半太變半姑變半仲半林變半南變半夷則商夷正無正黄變半太變半夾半仲半林變半㽔賔角㽔正夷正無正黄變半大半夾半仲半夾鐘徴夾正仲正林變南變無正黄變半太變半大吕羽大正夾正仲正林變夷正無正黄變半應鐘宫應正大半夾半仲半㽔半夷半無半南吕商南正應正大半夾半姑半㽔半夷半林鐘角林正南正應正大半太半姑半㽔半姑洗徴姑正㽔正夷正無正應正大半夾半太簇羽太正姑正㽔正夷正南正應正大半十二律旋相為宫各有七聲合八十四聲宫聲十二商聲十二角聲十二徴聲十二羽聲十二凡六十聲為六十調其變宫十二在羽聲之後宫聲之前變徴十二在角聲之後徴聲之前宫不成宫徴不成徴凡二十四聲不可為調黄鐘宫至夾鐘羽並用黄鐘起調大吕宫至姑洗羽並用大吕起調太簇宫至仲吕羽並用太簇起調次厯九律至應鐘起調是為六十調六十調即十二律十二律即一黄鐘也黄鐘生十二律十二律生五聲二變五聲各為綱紀以成六十調皆黄鐘損益之變也宫商角二十六調老陽也徴羽二十四調老陰也調成而陰陽備也律吕新書按上六十調毎五律成一調而五聲徧其序左旋下八十四聲毎七律成一均而七聲徧其序右旋五聲七聲各極縱横錯綜之致而陰陽正變靡不該矣尚史卷一百一
