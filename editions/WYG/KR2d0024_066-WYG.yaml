body:
  text: 尚史卷六十六列傳四十四鑲白旗漢軍李鍇撰韓諸臣傳公仲朋公叔公仲朋一作明史記作侈是為韓朋事宣恵王為相秦韓戰於濁澤韓氏急朋謂王曰與國不可恃今秦之心欲伐楚王不如因張儀為和於秦賂之以一名都與之伐楚此以一易二之計也王曰善乃儆朋之行将西講于秦楚王聞之大恐用陳軫謀選師言救韓令戰車滿道路發信臣多其車幣謂王曰敝邑雖小已悉起之矣願大國遂肆意于秦敝邑将以楚殉韓王大說乃止朋朋曰不可夫以實告我者秦也以虚名救我者楚也恃楚之虚名輕絶强秦之敵必為天下笑矣且楚韓非兄弟之國又非素約而謀伐秦秦欲伐楚楚因以起師言救韓此必陳軫之謀也且王已報于秦矣弗行是欺秦也夫輕强秦之禍而信楚之謀王必悔之矣王弗聴絶和于秦秦大怒興師與我戰于岸門楚救不至韓氏大敗宣惠王薨事㐮王㐮王四年秦圍宜陽㳺騰周人謂朋曰公何不興趙藺離石祁以質許地則樓緩必敗矣緩以趙害韓者趙韓合故緩敗收韓趙之地以臨魏樓必敗矣以魏害韓者韓趙為一魏必倍秦甘茂必敗矣茂攻宜陽韓得趙魏則不易㧞故茂敗以成陽資翟强于齊楚必敗矣齊楚敵也齊得地則益强可以敗楚湏秦必敗湏言少待以趙魏救至而楚不助故敗秦失魏宜陽必不㧞矣朋以宜陽之故仇甘茂六年秦歸武遂于韓秦王疑甘茂之以武遂解于朋也杜聊韓人為朋謂秦王曰朋也願因茂以事王若朋與茂善以實秦王之疑秦王大怒于甘茂公子幾瑟與公子咎争國幾瑟亡在楚十二年楚欲復幾瑟圍雍氏韓借救于秦秦為發使公孫昧入韓朋曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田以入攻楚出兵于三川以待公殆不合軍于南鄭矣言不與楚戰朋曰奈何對曰秦王必祖張儀之故謀楚威王攻梁張儀謂秦王曰與楚攻梁魏折而入楚韓固其與也是秦孤也故不如出兵以勁魏于是攻皮氏楚攻魏魏氏勁威王怒楚與魏大戰秦取西河之外以歸今也陽言救韓而隂善楚公恃秦而勁必輕與楚戰楚隂得秦之不用也必易與公相支也公戰勝楚遂與公乘易三川而歸公戰不勝楚楚塞三川而守之不能救也臣甚惡其事司馬康秦人一作庚三反之郢矣甘茂與昭獻遇于境其言收璽實有約也朋恐曰然則奈何對曰公必先韓而後秦先身而後張儀言先己所見後儀之故智臣以公不如亟以國合于齊楚秦必委國于公以解伐公之所以外者儀而已其實猶之不失秦也于是楚解雍氏圍或謂朋曰夫孿子一乳兩子之相似者唯其母知之利害之相似者唯智者知今公國其利害之相似正如孿子也得其道則主尊而身安不得其道則主卑而身危今秦魏之和成而非公適兩束之則韓必謀矣韓隨魏以善秦是為魏從也則韓輕主卑矣秦已善韓必置其所愛信令用事于韓是公危矣今公與安成君韓人為秦魏之和成固為福不成亦為福秦魏之和成而公適兩束之是韓為秦魏之門户韓重而主尊矣安成君東重于魏而西重于秦操右契而為公責徳于秦魏之王裂地而為諸侯公之事也此主尊而身安矣秦魏不終相聼者也秦怒于不得魏必善韓以塞魏魏不聼秦必善韓以備秦是公擇布而割也秦魏和則兩國徳公不和則兩國争事公所謂成為福不成亦為福也或謂明曰今有一舉而可以忠于主便于國利于身願公之行之也今天下㪚而事秦則韓最輕矣今天下合而離秦則韓最弱矣合離之相屬則韓最先危矣此君之國大患也今公以韓先合于秦天下隨之是韓以天下事秦秦之徳韓也厚矣韓與天下朝秦而獨厚取徳焉是其于主也至忠矣天下不合秦秦令而不聼秦必起兵以誅不服秦與天下構難而兵不决韓息士民以行其舋是其于國也大便也昔者周佼以西周善于秦而封于梗陽周啓以東周善于秦而封于平原今公以韓為天下先合于秦秦必以公為諸侯是其于身大利也願公之加務也國䇿國䇿又曰謂韓相國曰人之所以善扁鵲者為有臃腫也使善扁鵲而無臃腫也則人莫之為之也今君以所事善平原君者為惡于秦也而善平原君乃所以惡于秦也釐王時朋卒韓辰代相趙魏攻華陽韓謁急于秦冠葢相望秦不救辰謂田苓史記作陳筮曰事急願公雖疾為一宿之行苓見魏冉曰韓急乎使公來對曰未急也魏冉怒曰是何以為公之主使乎冠葢相望告敝邑言未急何也曰使韓急則将變矣魏冉曰公無見王矣臣請令發兵救韓八日而至大敗趙魏于華陽之下國䇿公叔者名未詳亦事宣恵王宣恵王欲兩用公仲即公仲朋公叔摎留韓人曰不可晉用六卿而國分簡公用田成監止而弑魏兩用犀首張儀而西河之外亡今王兩用之其多力者内樹其黨其寡力者竊外權則王之國危矣襄王時卒兩相之公叔欲得武遂於秦或謂公叔曰公不如令人恐楚王而令人為公求武遂於秦謂楚王曰發重使以為韓求武遂於秦秦聼是令行於萬乘之王也韓得武遂以限秦無秦患而徳楚韓楚之縣而已秦不聼是秦韓之怨深而交事楚也國䇿又曰謂公叔曰乘舟舟漏而弗塞則舟沈矣塞漏舟而輕陽侯之波則舟覆矣今公自以為辨於薛公而輕秦是塞漏舟而輕陽侯之波也齊令周最使韓立韓擾為相而廢公叔周最患之曰公叔與周君交今我立韓擾而廢公叔語曰怒於室者色於市今公叔怨齊無奈何也必絶周君而深怨我矣史舍曰公行矣請令公叔必重公周最行至韓公叔大怒史舍入見曰周最固不欲来臣竊强之周最不来以為公也臣强之亦以為公也公叔曰請聞其說曰周最固得事足下而以不得已之故來使彼將禮陳其辭而緩其言韓王必以齊為不急必不許也今周最不來他人必來來使者無交於公而欲徳韓擾其使之必疾言之必急韓王必許之矣公叔曰善遂重周最王果不許韓擾公仲為韓魏易地公叔争之而不聼且亡史惕韓史曰公亡則易必成矣公無辭以復反且示天下輕公公不若順之夫韓地易於上則害於趙魏易於下則害於楚公不如告楚趙楚趙惡之趙起兵臨羊腸楚發兵臨方城而易必敗矣韓諸公子争國楚欲立幾瑟魏欲立咎㐮陵之役史記其不載事畢長謂公叔曰請毋用兵而楚魏皆徳公夫楚欲置公子咎置猶廢也必以兵臨魏魏欲立咎故公何不令人說昭陽曰戰未必勝請為子起兵以之魏子有辭以毋戰韓順楚欲故可以毋戰於是太子嵗瑟也與昭陽梁王皆徳公矣及齊師入韓太子走楚齊明謂公叔曰齊逐幾瑟楚善之今楚欲善齊甚公何不令齊王謂楚王王為我逐幾瑟以窮之楚聼是齊楚合而幾瑟走也楚弗聼是有隂於韓也詳諸公子傳國䇿封人子髙封人子髙葢韓之有隐徳者也韓氏城新城期十五日而成叚喬為司空有一縣後二日叚喬執其吏而囚之囚者之子走告封人子髙唯先生能活臣之父願委之先生子髙曰諾乃見叚喬自扶而上城左右望曰美哉城乎一大功矣必有厚賞矣自古及今功若此其大也而能無有罪戮者未嘗有也子髙出叚喬使人夜解其吏而出之吕氏春秋韓諸公子傳太子嬰公子幾瑟公叔伯嬰太子嬰者㐮王大子公子幾瑟史記作蟣虱公叔伯嬰公子咎咎即釐王並㐮王之子也史記索隠註公叔伯嬰即太子嬰誤按國䇿伯嬰别是一人然有所謂公叔有所謂韓公叔有所謂公叔伯嬰尋其事里所謂韓公叔者公叔伯嬰也縁又有相曰公叔故加韓以别之鮑彪註以韓公叔即公叔亦誤㐮公十二年大子嬰卒幾瑟初質楚與韓相公叔不善公叔為之伐楚鄭彊者故鄭人怨韓滅鄭欲報之以金八百入秦以伐韓冷向謂彊曰以八百金請伐人之與國秦必不聼公不如令秦王疑公叔彊曰如何曰公叔之攻楚也以幾瑟之存焉故伐楚也今令楚奉幾瑟車百乘居陽翟令昭獻楚相轉而與之處旬有餘彼已角昭獻本不善幾瑟令之轉而相善角二人均禮也而幾瑟公叔之讎也昭獻公叔之人也秦王聞之必疑公叔為楚也太子嬰既死幾瑟自楚歸楚欲立之魏欲立公子咎齊欲立公叔伯嬰鄭彊為楚使於韓矯以新城陽人命幾瑟以與公叔伯嬰争國楚怒將罪之彊曰臣之矯與之以為國也臣為世子即幾瑟得新城陽人以與公叔争國而得全魏必急韓氏魏欲立咎故韓氏急必懸命於楚又何新城陽人敢索若戰而不勝幸而不死今且以至又安敢言地楚王曰善齊為公叔伯嬰伐韓中庶子强謂幾瑟曰不若及齊師未入急擊公叔幾瑟曰不可戰於國中國必分對曰事不成身必危尚何足以圖國之全為幾瑟弗聼齊師入幾瑟走楚楚善之或謂秦􅇗戎曰公叔伯嬰恐秦楚之内幾瑟也公何不為韓求質子於楚别質子以伐幾瑟也楚王聼而入質子於韓則公叔伯嬰必知秦楚之不以幾瑟為事必以韓合於秦楚矣秦楚挾韓以窘魏魏氏不敢東是齊孤也公又令秦求質子於楚楚不聼則怨結於韓韓挾齊魏以盻楚楚王必重公矣公挾秦楚之重以積徳於韓則公叔伯嬰必以國事公矣胡衍韓人將出幾瑟於楚教公仲即公中朋謂魏王曰幾瑟在楚韓不敢離楚也王何不試奉公子咎而為之請大子因令人謂楚王曰韓立公子咎而棄幾瑟是王抱虚質也王不如亟歸幾瑟幾瑟入必以韓權報讎於魏而徳王矣楚將攻秦而復幾瑟或謂芋戎秦宣后弟曰廢公叔而相幾瑟者楚也相謂左右之今幾瑟亡之楚楚又收秦而復之幾瑟入鄭之日韓楚之縣已公不如令秦王賀伯嬰之立也韓絶於楚其事秦必疾秦挾韓親魏齊楚後至者先亡此王業也冷向又謂韓咎史記有公子咎有韓咎國䇿幾瑟得入而得公後又曰韓咎立為君是亦二人也曰幾瑟亡在楚楚王欲復之甚今楚兵十餘萬在方城之外臣請令楚築萬家之都於雍氏之旁韓必起兵以禁之公必將矣公因以楚韓之兵奉幾瑟而内之幾瑟得入而徳公必以韓楚奉公矣楚令景鯉入韓韓且内公叔伯嬰於秦景鯉患之冷向又謂伯嬰曰大子即伯嬰入秦秦必留大子而合楚以復幾瑟也是大子反棄之䇿皆不行韓竟立公子咎為大子公叔將殺幾瑟或謂公叔曰大子之重公也畏幾瑟也幾瑟死大子無患必輕公韓大夫見王老兾大子之用事也固欲事之大子外無幾瑟之患而内收諸大夫以自輔公必輕矣不如無殺以恐大子公叔卒欲殺幾瑟宋赫謂公叔曰幾瑟之能為亂也内得父兄而外得齊楚也今公殺之大子無患必輕公秦楚若無韓言小韓不之有必隂事伯嬰伯嬰亦幾瑟也伯嬰與大子嬰非一人明甚公不如勿殺伯嬰恐必隂保於公韓大夫不能必其不入也必不敢輔伯嬰以為亂秦楚挾幾瑟以塞伯嬰伯嬰外無秦楚之權内無父兄之衆必不能為亂矣此便於公於是幾瑟伯嬰卒不得立國䇿論曰六國之勢韓最弱逼秦不聞有所樹立廼外主齊楚兄弟争國國又無人焉韓亦殆矣哉伊尹有言曰與亂同事罔不亡後此六十年裁二葉而國滅於秦亂之終也韓褐韓褐葢亦韓族也韓褐濟於河津人告曰夫人過此者未有不快用者也而子不用乎韓褐曰天子祭海内之神諸侯祭封域之内大夫祭其親士祭其祖禰褐也未得事河伯也津人申楫舟中水而運津人曰向也役人固己告矣夫子不聼今舟中水而運甚殆治装衣而下㳺乎韓褐曰吾不為人之惡我而改吾志不為我將死而改吾義言未已舟泆然行說苑尚史卷六十六
