body:
  text: 尚史卷三十一列傳九鑲白旗漢軍李鍇撰魯諸臣傳中桓三公子慶父共仲公孫敖孟穆伯文伯榖惠叔難仲孫蔑孟獻子仲孫速孟莊子仲孫羯孟孝伯仲孫貜孟僖子仲孫何忌孟懿子附仲孫説仲孫彘孟武伯仲孫捷孟敬子公子慶父是為共仲桓公子莊公庶兄所謂仲孫氏也慶父殺般又弑閔公見逆臣傳公孫敖慶父子是為孟穆伯僖公十五年楚伐徐敖帥師及諸侯之大夫救徐僖公薨文公立元年王使叔服來㑹葬敖聞其能相人見其二子文伯榖惠叔難焉叔服曰榖也食子難也收子榖也豐下必有後于魯國是年秋晉侯疆戚田敖㑹之冬敖如齊始聘二年公朝晉未至六月敖㑹諸侯及晉司空士縠盟于垂隴五年敖如晉初敖娶于莒曰戴已生文伯榖其娣聲已生惠叔難戴已卒又聘于莒莒人以聲已辭則為公子遂聘焉七年敖如莒涖盟且為遂逆己氏及鄢陵登城見之美自為娶之公子遂請攻敖叔仲彭生成之使遂舍之敖反之復為兄弟如初八年襄王崩敖如周弔喪不至以幣奔莒從己氏焉魯人乃立文伯榖敖生二子于莒而求復榖以為請公子遂使無朝聼命復而不出三年而盡室以復適莒及惠叔難立敖請重賂以求復惠叔難以為請許之將來十四年九月卒于齊告䘮請以卿禮葬勿許十五年齊人或為孟氏謀曰魯爾親也飾棺寘諸堂阜魯必取之從之卞人以告惠叔難猶毁毁過喪禮以為請立于朝以待命許之取而殯之葬視慶父謚曰穆聲己不視帷堂而哭他年其莒所生二子來仲孫蔑愛之聞于國或譖之曰將殺子蔑以告季孫行父二子曰夫子以愛我聞我以將殺子聞不亦逺于禮乎逺禮不如死一人門于句鼆一人門于戾邱皆死左傳初文公欲弛文伯榖之宅使謂之曰吾欲利子于外之寛者對曰夫位政之建也署位之表也車服表之章也宅章之次也禄次之食也君議五者以建政為不易之故也今有司來命易臣之署與其車服而曰將易而次為寛利也夫署所以朝夕䖍君命也臣立先臣之署服其車服為利故而易其次是辱君命也不敢聞命若罪也則請納禄與車服而違署唯里人之所命次公弗取公欲弛郈敬伯同之宅同郈惠伯𤣥孫亦如之對曰先臣惠伯以命于司里嘗禘烝享之所致君胙者有數矣出入受事之幣以致君命者亦有數矣今命臣更次于外為有司之以班命事也無乃違乎請從司徒以班徙次自以有罪請従司徒徙里公亦弗取臧孫辰聞之曰孟孫善守矣其可以葢穆伯而守其後于魯乎國語榖疾請曰榖之子弱請立難也許之榖卒謚曰文弟惠叔難立難卒謚曰惠榖之子蔑立叔服之相榖與難也卒皆如其言云仲孫蔑文伯榖之子是為孟獻子宣公九年蔑聘于周王以為有禮厚賂之十四年楚子圍宋蔑言于宣公曰臣聞小國之免于大國也聘而獻物于是有庭實旅百朝而獻功于是有容貎采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説使大夫㑹楚子于宋十五年蔑㑹齊髙固于無婁成公二年公受盟于晉從晉伐齊楚伐我以救齊師于蜀侵及陽橋蔑往賂之以執斵執鍼織紝皆百人公衡為質公衡成公子以請盟楚人許平十一月盟于蜀畏晉而竊與楚盟也五年春蔑如宋六年蔑及叔孫僑如侵宋晉命也十三年晉將伐秦使卻錡來乞師將事不敬蔑曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命不亡何為三月公如京師叔孫僑如欲賜請先使王以行人禮禮焉及蔑從王以為介而重賄之五月晉㑹諸侯伐秦蔑曰晉師乗和必有大功戰于麻隧秦師敗績十六年晉伐鄭欒黶來乞師蔑曰有勝矣戰于鄢陵楚鄭果敗績鄭猶未服秋公將㑹諸侯于沙隨謀伐鄭㑹叔孫僑如通于穆姜成公母欲去季孟季文子孟獻子而取其室將行穆姜送公而使逐二子公曰請反而聴命姜怒指公子鉏公子偃曰汝不可是皆君也公待于壊隤申宫儆備使蔑守宫而後行十八年八月成公薨襄公立十二月蔑㑹諸侯于虚朾蔑先歸㑹葬襄公元年蔑㑹諸侯之師圍宋彭城為宋討魚石也五月蔑㑹諸侯之師次于鄫二年鄭叛晉大夫㑹于戚蔑曰請城虎牢以偪鄭荀罃善之冬復㑹于戚遂城虎牢鄭人乃成三年公及晉侯盟于長樗蔑相公稽首荀罃曰天子在而君辱稽首寡君懼矣蔑曰以鄙邑介在東表宻邇仇讐寡君將君是望敢不稽首四年公如晉晉侯享公公請屬鄫晉侯不許蔑曰以寡君之宻邇于仇讎而願固事君無失官命鄫無賦于司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之新序孟獻子聘于晉宣子觴之三徙鐘石之懸不移而具獻子曰富哉家宣子曰子家孰與我富獻子曰吾家甚貧惟有二士曰顔囘兹無靈使吾邦家安平百姓和協惟此二者耳客出宣子曰彼君子也以養賢為富韓非子孟獻伯相魯食不二味坐不重席居不粟馬出不從車叔向以告苗賁皇非之曰是出主之爵禄以附下也韓非子孟獻伯拜上卿叔向徃賀曰子無二馬二輿何也獻伯曰國人尚有饑色是以不秣馬斑白者尚徒行故不二輿向曰吾賀子之拜卿今賀子之儉也向語苗賁皇苗子曰夫爵禄旗章所以異功伐别賢不肖也夫卿必有軍事是故循車馬比卒乗以備戎事有難則備不虞平夷則給朝事獻伯之儉也可與又何賀五年蔑及衛孫林父㑹吴于善道六年夏四月三卜郊不從蔑曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也十年楚子囊鄭子耳侵我還圍蕭克之九月子耳侵宋蔑曰鄭其有災乎師競已甚周猶不堪競况鄭乎有災其執政之三士乎已而尉止等殺子駟子國子耳十一年作三軍三分公室而各有其一十二年公如晉明年公至自晉蔑書勞于廟禮也十五年宋向戍來聘且尋盟見蔑尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間也十九年蔑卒謚曰獻左傳蔑禫縣而不樂比御而不入夫子曰獻子加于人一等矣及蔑之喪司徒旅歸四布夫子曰可也記檀弓子仲孫速仲孫它速嗣仲孫氏它為子服氏别有傳仲孫速蔑之子是為孟荘子襄公十六年齊侯圍郕孟氏邑速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還十八年公㑹諸侯圍齊門于雍門秦周魯大夫伐雍門之荻速斬其槆以為公琴二十年速㑹莒人盟于向邾人驟至秋速伐邾以報之二十三年速卒謚曰莊速子二孺子秩其長子羯其庶子也初臧孫紇既為季孫宿廢公鉏而立悼子紇公鉏怨之及是速疾孟氏之御騶豐㸃好羯曰從余言必為孟孫再三云羯從之豐㸃謂公鉏曰茍立羯請讎臧氏公鉏謂季孫宿曰孺子秩固其所也若羯立則季氏信有力于臧氏矣言立孟氏之少則季氏有力過于臧氏弗應及速卒公鉏奉羯立于户側季孫宿至入哭而出曰秩焉在公鉏曰羯在此矣宿曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯是為孟孝伯秩奔邾孟氏間臧氏于季孫宿宿命攻之臧孫紇亦奔邾二十四年羯帥師侵齊二十八年公將如楚使羯如晉告二十九年羯㑹諸侯之大夫以城杞冬羯如晉三十一年羯卒左傳諡曰孝仲孫貜是否速之子未詳是為孟僖子昭公七年公如楚鄭伯勞于師之梁貜為介不能相儀及楚不能答郊勞九月公至自楚貜病不能相禮乃講學之茍能禮者從之九年貜如齊聘十年貜及季孫意如叔弓伐莒取郠十一年貜㑹邾莊公盟于祲祥二十四年貜卒謚曰僖子二説何忌何忌嗣貜之將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔邱聖人之後也而滅于宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘于是鬻于是以餬余口其共也如是臧武仲有言曰聖人有明徳者若不當世其後必有達人今其將在孔邱乎我若獲沒必屬説與何忌于夫子使事之而學禮焉以定其位故何忌與説師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效已矣左傳仲孫何忌貜之子是為孟懿子也昭公十一年貜㑹邾莊公盟于祲祥泉邱人有女夢以其帷幕孟氏之廟遂奔貜其僚從之盟于清邱之社曰有子無相棄也先是貜以薳氏女為副妾别居于外乃使助薳氏之簉簉副倅也反自祲祥宿于薳氏生何忌及説于泉邱其僚無子使子説説是為南宫敬叔何忌是為孟懿子二十五年公伐季氏季孫意如登臺請弗許公使郈昭伯逆何忌㑹叔孫氏救季氏孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之遂伐公徒公孫于齊二十七年公至自齊居于鄆秋何忌陽虎伐鄆欲奪公也三十二年冬何忌㑹諸侯城成周定公三年何忌及邾子盟于拔六年季孫斯如晉獻鄭俘何忌如晉報夫人之幣時陽虎専强使之冬何忌及季孫斯圍鄆鄆貳于齊也八年何忌及季孫斯侵衛十年何忌及季孫州仇圍郈討侯犯叔孫家臣郈馬正弗克秋及齊師復圍郈卒弗克侯犯奔齊十二年仲由為季氏宰將墮三都于是叔孫氏墮郈季氏墮費將墮成成宰公歛陽謂何忌曰子偽不知我將不墮公圍成弗克哀公元年何忌伐邾二年何忌及季孫斯叔孫州仇伐邾取漷東田及沂西田及邾子盟于句繹三年何忌及叔孫州仇圍邾六年何忌伐邾十一年齊伐我及清季孫肥與其宰冉求謀禦之以告叔孫州仇及何忌二子以政在季氏不欲戰乃禦諸郊冉求帥左師何忌子武伯彘帥右師左師入齊軍右師奔十四年何忌卒謚曰懿子彘嗣仲孫説是為南宫敬叔哀公三年桓僖宫災仲孫説至命周人出御書俟于宫曰庀女而不在死又嘗與孔子適周問禮樂觀明堂廟朝之度左傳仲孫彘即孟孺子洩何忌之子是為孟武伯也初武伯彘將圉馬于成成宰公孫宿不受彘怒襲成哀公十五年成叛于齊彘伐成不克遂城輸以偪成十七年公㑹齊侯盟于蒙彘相齊侯稽首公拜齊人怒彘曰非天子寡君無所稽首彘問于高柴曰諸侯盟誰執牛耳執牛耳尸盟者柴曰鄫衍之役吴公子姑曹發陽之役衛石魋彘曰然則彘也鄫衍則大國執發陽則小國執執者無常故彘以為可執二十五年公至自越彘與季孫肥逆于五梧公宴之飲酒不樂公與大夫始有惡二十七年彘及季孫肥叔孫舒盟越后庸于平陽公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多間公㳺于陵阪遇彘于孟氏之衢曰請有問于子余及死乎對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月公如公孫有陘氏因孫于邾乃遂如越左傳彘卒諡曰武仲孫捷彘之子是為孟敬子悼公之喪季昭子强問于捷曰為君何食捷曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能母乃使人疑夫不以情居瘠者乎哉我則食食記檀弓子服它子服湫惠伯子服囘昭伯子服何景伯子服它者孟獻子蔑之庶子别為子服氏者也季孫行父相宣公成公無衣帛之妾無食粟之馬它諌曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以子為愛且不華國乎行父曰吾亦願之然吾觀國人其父兄之食麤而衣惡者猶多矣吾是以不敢人之食麤衣惡而我美妾與馬無乃非相人者乎且我聞以徳榮為國華不聞以妾與馬行父以告仲孫蔑蔑囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠行父聞之曰過而能改者民之上也使為上大夫國語子服湫字孟椒仲孫它之子是為子服惠伯襄公二十三年臧孫紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟季孫召外史掌惡臣而問盟㫖焉對曰盟東門氏也曰母或如東門遂不聴公命殺適立庶盟叔孫氏也曰母或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此湫曰盍以其犯門斬關季孫用之乃盟臧氏曰母或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎二十五年晉伐齊齊崔杼弑荘公乃賂晉以求成晉許之使羊舌肹告于諸侯公使湫對曰君舍有罪以靖小國君之惠也寡君聞命矣三十一年襄公薨滕成公來㑹葬惰而多涕湫曰滕君將死矣怠于其位而哀已甚兆于死所矣能無從乎昭公三年滕君卒叔弓如滕葬滕成公湫為介及郊遇懿伯之忌懿伯椒之叔父忌怨也與椒有私怨也叔弓不入湫曰公事有公利無私忌湫請先入乃先受館叔弓從之十二年南蒯季氏費邑宰將以費叛枚筮之遇坤之比曰黄裳元吉以為大吉也示子服湫曰即欲有事何如湫曰吾嘗學此矣忠信之事則可不然必敗外疆内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三徳為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黄上美為元下美則裳参成可筮猶有闕也筮雖吉未也十三年晉合諸侯于平邱邾莒愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使羊舌肹來辭湫對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣左傳初湫謂季孫意如曰晉信蠻夷而棄兄弟其執政貳也貳必失諸侯豈唯魯然夫失其政者必毒于人魯懼及焉不可以不恭必使上卿從之季孫意如曰然則意如乎若我徃晉必患我誰為之貳湫曰湫既言之矣敢逃難乎湫請從晉人執意如以歸湫見韓起曰夫盟信之要也晉為盟主是主信也若盟而棄魯侯信抑闕矣昔欒氏之亂齊人間晉之禍伐取朝歌我先君襄公不敢寧處使叔孫豹悉帥弊賦踦跂畢行無有處人以從軍吏次于雝俞與邯鄲勝晉大夫擊齊之左犄止晏菜齊大夫焉齊師退而後敢還非以求逺也以魯之宻邇于齊而又小國也齊朝駕則夕極于魯國不敢憚其患而與晉共其憂亦曰庶幾有益于魯國乎今信蠻夷而棄之夫諸侯之勉于君者將安勸矣若棄魯而茍固諸侯羣臣敢憚戮乎諸侯之事晉者魯為勉矣若以蠻夷之故棄之其無乃得蠻夷而失諸侯之信乎子計其利者小國共命起説乃歸意如國語左傳季孫猶在晉子服惠伯私于中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳于晉親親與大賞共罰否所以為盟主也子其圖之諺日臣一主二吾豈無大國穆子告韓宣子乃歸季孫子服湫曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠于㑹起患之使羊舌鮒恫之以言意如懼先歸湫待禮左傳湫卒謚曰惠子囘子服囘湫之子子服昭伯也昭公十六年公至自晉囘語季孫意如曰晉之公室其將遂卑矣君㓜弱六卿疆而奢傲將因是以習習實為常能無卑乎意如曰爾㓜惡識國秋八月晉昭公卒意如如晉葬昭公乃曰子服囘之言猶信子服氏有子哉二十三年我取邾師邾人愬于晉囘副叔孫婼如晉晉人執之館婼于箕舍囘于他邑明年乃歸之左傳回卒諡曰昭子何子服何回之子子服景伯也哀公三年桓僖災子服何至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守宫人肅給濟濡帷幕鬰攸從之蒙葺公屋自大廟始外内以悛助所不給有不用命則有常刑無赦七年公㑹呉于鄫呉來徴百牢何對曰先王未之有也吴人曰宋百牢我魯不可以後宋且魯牢晉大夫過十呉王百牢不亦可乎何曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命于諸侯則有數矣若亦棄禮則有滛者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事呉人弗聴何曰呉將亡矣棄天而背本不與必棄疾于我乃與之季孫肥欲伐邾乃饗大夫以謀之何曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保于城城保于徳失二徳者危將焉保仲孫何忌曰二三子以為何如惡賢而逆之惡猶安也言安有賢如景伯而可逆之乎大夫對曰禹合諸侯于塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言何忌曰魯徳如邾而以衆加之可乎不樂而出八年呉為邾故伐我克武城仲孫何忌謂何曰若之何對曰呉師來斯與之戰何患焉且召之而至又何求焉呉師克東陽遂次于泗上呉人行成將盟何曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吴輕而逺不能乆將歸矣請少待之弗從何乃負載造于萊門魯請舍子服何于吴吴人許之又請以吴王子姑曹當之乃止不舍何吴人盟而還初衛殺吴行人十二年吴徵㑹于衛衛侯㑹吴于鄖公及衛侯宋皇瑗盟呉人藩衛侯之舍何謂端木賜曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吴不行禮于衛而藩其君舍以難之子盍見大宰賜説太宰嚭乃舍衛侯十三年公㑹晉侯及吴子于黄池呉人將以公見晉侯何對使者曰王合諸侯則伯帥侯牧以見于王伯合諸侯則侯帥子男以見于伯自王以下朝聘玉帛不同故敝邑之職貢于吴有豐于晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦于吴八百乗若為子男則將半邾以屬于吴而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吴人乃止既而悔之將囚何何曰何也立後于魯矣將以二乗與六人從遲速唯命遂囚以還及户牖謂大宰嚭曰魯將以十月上辛有事于上帝先王季辛而畢何世有職焉自襄以來未之改也若不㑹祝宗將曰吴實然且謂魯不共而執其賤者七人何損焉大宰嚭言于王曰無損于魯而祇為名不如歸之乃歸何十五年及齊平何如齊左傳卒諡曰景伯尚史卷三十一
