body:
  text: 尚史卷八世家一鑲白旗漢軍李鍇撰魯世家上始武王十三年終秦荘襄王元年凡八百七十四年傳三十四世伯禽考公煬公幽公魏公厲公獻公真公武公懿公伯御附孝公惠公禽父者周公元子伯禽也尚書大傳伯禽與康叔見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名曰橋二三子往觀之見橋實髙髙然而上反以告商子商子曰橋者父道也南山之隂有木焉名曰梓二三子復往觀焉見梓實晉晉然而循反以告商子商子曰梓者子道也明日見周公入門而趨登堂而跪拂其首勞而食之曰爾安見君子乎武王終成王少周公相成公而使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟今王之叔父我於天下亦不賤矣然我一沐三捉髪一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人荀子伯禽将歸於魯周公謂伯禽之傳曰汝将行盍志而子美徳乎對曰其為人寛好自用以慎此三者其美徳也已周公曰嗚呼以人惡為美徳乎君子好以道徳故其民歸道彼其寛也出無辨矣汝又美之彼其好自用也是所以窶小也君子力如牛不與牛争力走如馬不與馬争走知如士不與士争知彼争者均者之氣也汝又美之彼其慎也是其所以淺也聞之曰無越踰而見士見士問曰無乃不察乎不問即物少至少至則淺彼淺者賤人之道也汝又美之吾語汝吾于天下不賤矣然而所執贄而見者十人還贄而相見者三十人貌執之士者百有餘人欲言而請畢事者千有餘人吾僅得三士焉所以得三士者亡于十人與三十人中乃在百人與千人之中故上士吾薄為之貌下士吾厚為之貌人以我為越踰好士故士至汝其以魯國驕人㡬矣説苑成王封周公周公辭不受乃封伯禽於魯将辭去周公戒之曰吾聞之徳行廣大而守以恭者榮土地博裕而守以儉者安禄位尊盛而守以卑者貴人衆兵强而守以畏者勝聰明睿知而守以愚者益博聞多記而守以淺者廣此六者皆謙徳也夫天道毁滿而益謙是以衣成則缺衽宫成則缺隅屋成則加錯示不成者天道然也易曰謙亨君子有終吉詩曰湯降不遲聖敬日躋戒之哉子其無以魯國驕士矣又曰成王封伯禽為魯公召而告之曰爾知為人上之道乎凡處尊位者必以敬下順徳規諫必開不諱之門撙節安静以藉之諫者勿振以威勿格以言博采其辭乃擇可觀夫有文無武無以威下有武無文民畏不親文武俱行威徳乃成既成威徳民親以服清白上通巧佞下塞諫者得進忠信乃畜伯禽再拜受命而辭按伯禽受封時成王尚㓜烏能識此邪説謬吕氏春秋伯禽將行請所以治魯周公曰利而弗利也伯禽之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民必歸之吕氏春秋太公封於齊周公封於魯相謂曰何以治國太公曰尊賢上功周公曰親親上恩太公曰魯自此削矣周公曰魯雖削有齊者亦必非吕氏也説苑伯禽與太公俱受封而之國三年太公来朝周公問曰何治之疾也對曰尊賢先疏後親先義後仁此霸者之迹也周公曰澤及五世五年伯禽来朝周公問曰何治之難對曰親親先内後外先仁後義此王者之迹也周公曰澤及十世伯禽即位之後淮夷徐戎並興於是伯禽率師伐之于費作費誓史記書序伯禽宅曲阜徐淮並興東郊不開作費誓孔傳費魯郊之地名公曰嗟人無譁聴命徂兹淮夷徐戎並興善糓乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善今惟淫舍牿牛馬杜乃擭敜乃穿無敢傷牿言大放舍牿牢之牛馬擭捕獸機檻當杜塞之穽穿地陷獸當以土窒敜之無敢令傷牿之傷汝則有常刑馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢冦攘踰垣墻竊馬牛誘臣妾汝則有常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹題曰楨甲旁曰幹戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑尚書遂平徐戎定魯伯禽五十三年薨帝王世紀世紀伯禽以成王元年封在位四十六年康王十六年卒按成王元年至康王十六年計五十三年所謂四十六年誤子考公酋即位系本作就或作遒考公四年薨弟熙即位熙一作怡是謂煬公煬公築茅闕門史記煬公六十年薨漢書史記煬公六年卒按伯禽始封至真公十四年厲王奔彘本紀世家通覈之魯系較周短六十四年盖煬公六十年譌而為六年耳今從漢書子幽公宰即位世本名圉幽公十四年弟㵒殺幽公而自立是為魏公系本㵒作弗音沸魏作㣲魏公五十年薨子厲公擢即位系本作翟厲公三十七年薨魯人立其弟具是為獻公獻公三十六年薨史記作三十二年漢書作五十年世紀作三十六年今從世紀子真公濞即位真音慎系本作慎公摯鄒誕作慎公嗥漢書作慎公嚊按史真公十四年厲王奔彘則真公元年當在厲王二十四年獻公之薨在厲王十七年則真公元年上距獻公薨時尚缺六年不敢臆補姑闕之真公十四年王無道出奔彘共和行政二十八年厲王崩宣王立三十年真公薨弟敖即位是為武公武公十年春武公與長子括少子戲西朝王王愛戲欲立戲為魯太子樊仲山甫諫曰不可立也不順必犯犯王命必誅故出令不可不順也令之不行政之不立行而不順民将棄上夫下事上少事長所以為順今天子建諸侯立其少是教民逆也若魯從之諸侯效之王命将有所壅若弗從而誅之是自誅王命也誅之亦失不誅亦失王其圖之王弗聴卒立戲為魯太子夏歸而武公薨漢書武公即位二年按宣王紀十二年魯武公来朝當在武公十年世家曰武公九年春来朝夏歸而卒誤戲即位是為懿公懿公九年懿公兄括之子伯御與魯人攻弑懿公而立伯御為君伯御十一年王伐魯殺其君伯御而問魯公子能道順諸侯者以為魯侯仲山甫曰魯懿公弟稱肅恭明神敬事耆老賦事行刑必問於遺訓而咨于固實不干所問不犯所知王曰然能訓治其民矣乃立稱于夷宫夷宫者宣王祖父夷王之廟古者爵命必于祖廟是為孝公自是諸侯多畔王命孝公十四年宣王崩子幽王立二十五年諸侯畔周犬戎殺幽王按年表幽王十一年為犬戎所殺當孝公之三十六年者因以伯御在位之十一年通為孝公之年也孝公實在位二十七年諸侯立幽王子宜臼是為平王二十七年孝公薨子弗湟即位系本作弗皇是為惠公惠公四十六年薨長庶子息攝當國行君事是為隠公史記漢書惠公四十六年子隠公息立伯禽至春秋三百八十六年隠公以下春秋隠公息世本名息姑恵公長庶子惠公元妃孟子孟子卒繼室以聲子生隠公宋武公生仲子歸于我生桓公惠公薨隠公立而奉之史記惠公適夫人無子公賤妾聲子生子息息長為娶于宋宋女至而好惠公奪而自妻之生子允登宋女為夫人以允為太子及惠公卒為允少故魯人令息攝政索隠經傳不言惠公無道左史文亦分明大史公何據而為此説譙周亦不信隠公元年春三月公及邾儀父盟于蔑夏四月費伯大夫帥師城郎秋七月王使宰咺来歸惠公仲子之賵左傳王使宰咺歸公仲子之賵緩且子氏未薨故名又曰贈死不及尸弔生不及哀豫凶事非禮也公羊仲子桓之母穀梁仲子惠公母孝公妾詳魯傳九月及宋人盟于宿冬十月改葬惠公公弗臨惠公之薨有宋師葬故有闕是以改葬以桓為大子故隠公讓而不敢為喪主衛侯来㑹葬不見公新作南門十二月周祭伯来公子益師卒二年春公㑹戎于潛司空無駭帥師入極極附庸小國秋八月公及戎盟于唐冬十有二月夫人子氏薨公羊子氏隠公母穀梁隠公妻詳魯傳三年春三月平王崩桓王立夏四月尹氏卒左傳作君氏聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏公羊傳尹氏天子之大夫也按左氏傳尹氏作君氏以為隠公母聲子為公故曰君氏是變文書之以成公之志也然以夫人子氏為桓公母仲子之説不通則子氏非隠母即隠妻也子氏為隠母隠妻則君氏不得為隠母矣公羊作尹氏以為天子之大夫天王崩諸侯乏主故卒之然終春秋唯卒王子虎劉卷尹氏何所系而獨卒之竊意隠公之見獲于鄭也囚諸尹氏賂尹氏而禱于其主鍾巫遂與尹氏歸而立其主然則尹氏者或即鄭大夫既歸魯當視魯大夫且徳之故卒之未可知也周武氏子来求賻王未葬故四年夏公及宋公遇于清秋公子翬帥師㑹宋公陳侯蔡人衛人伐鄭宋公来乞師公辭之翬固請而行五年春公矢魚于棠公子彄諫即臧僖伯不聴秋九月考仲子之宫初獻六羽諸侯無二嫡隐公成父之志為仲子别立宫鄭伐宋宋使来告命公将救之問于使者曰師何及對曰未及國公怒乃止冬十二月公子彄卒公曰叔父有憾于寡人恨諫觀魚不聴寡人弗敢忘葬之加一等六年春鄭人来渝平和而不盟曰平公為公子戰于狐壤為鄭所執逃歸怨鄭鄭伐宋公怒宋使者不救宋鄭因此而来渝平夏五月公㑹齊侯盟于艾冬京師来告饑公為之請糴于宋衛齊鄭七年夏城中邱齊侯使其弟夷仲年来聘秋公伐邾冬天王使凡伯卿士来聘八年春三月鄭伯使宛来歸祊庚寅我入祊鄭伯請釋泰山之祀而祀周公以泰山之祊易許田許田成王賜周公朝宿之邑後立周公别廟祊鄭助祭泰山湯沐之邑鄭以天子不能復巡守故欲以防易許田各従本國之所近秋九月公及莒人盟于浮来成紀好也二年紀莒盟于宻為魯故今公尋之冬十有二月無駭卒九年春天王使南季天子大夫来聘三月挟卒魯大夫夏城郎冬公㑹齊侯于祊謀伐宋十年公㑹齊侯鄭伯于中邱夏公子翬帥師㑹齊人鄭人伐宋六月公㑹齊侯鄭伯于老桃壬戌敗宋師于菅辛未取郜辛巳取防十一年春薛侯滕侯来朝争長薛曰我先封滕曰我周之卜正也不可以後之公使公子翬請于薛曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯夏公㑹鄭伯于時来即邾謀伐許秋七月公及齊侯鄭伯入許齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人公子翬請殺桓公将以求大宰公曰為其少故也吾将授之矣使營莬裘吾将老焉翬懼反譛公于桓公而請弑之公之為公子也與鄭人戰于狐壤止焉内諱獲故言止鄭人囚諸尹氏賂尹氏而禱于其主鍾巫遂與尹氏歸而立其主冬十一月公祭鍾巫齊于社圃館于􅀢氏翬使賊弑公于􅀢氏而立桓公左傳公在位十一年諡曰隠桓公桓公名軌史記名允惠公大子元年春正月公即位三月公㑹鄭伯于垂鄭伯以璧假許田公修好于鄭鄭人請復祀周公卒易祊夏四月公及鄭伯盟于越結祊成也二年春滕子来朝三月公㑹齊侯陳侯鄭伯于稷以成宋亂宋督弑其君與奭宋以郜大鼎賂公夏四月取郜大鼎納于大廟秋七月杞侯来朝不敬九月入杞討不敬也公及戎盟于唐修舊好也三年春正月公㑹齊侯于嬴成昬于齊夏六月公㑹杞侯于郕秋公子翬如齊逆女齊侯送姜氏于讙公㑹齊侯于讙夫人姜氏至自齊冬齊侯使其弟年来聘致夫人也四年春正月公狩于郎夏天王使宰渠伯紏来聘五年夏天王使仍叔之子来聘城祝邱齊鄭将襲紀故六年春正月州公實来夏四月公㑹紀侯于成紀来諮謀齊難北戎伐齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒我懼秋八月大閲九月子同生冬紀侯来朝請王命以求成于齊公告不䏻七年春二月焚咸邱火田也公羊榖梁並曰邾邑以火攻也夏穀伯綏鄧侯吾離来朝八年天王使家父来聘冬十月祭公来遂逆王后于紀王使魯主昬故来受命九年冬曺伯使其世子射姑来朝賔之以上卿十年秋公㑹衛侯于桃邱弗遇鄭人怒我請師于齊齊以衛師助之冬十二月齊侯衛侯鄭伯来戰于郎十一年柔大夫㑹宋公陳侯蔡叔盟于折公㑹宋公于夫鍾冬又㑹于闞十二年夏六月公㑹杞侯莒子盟于曲池公欲平宋鄭秋七月公㑹宋公燕人盟于榖邱宋成未可知也故又㑹于虚冬又㑹于龜宋公辭平故與鄭伯盟于武父十二月及鄭師伐宋戰于宋十三年春二月公㑹紀侯鄭伯及齊侯宋公衛侯燕人戰齊宋衛燕敗績鄭人来請修好十四年春正月公㑹鄭伯于曺夏鄭伯使其弟語来盟十五年春二月天王使家父来求車三月桓王崩子荘王立夏五月公㑹齊侯于艾許叔入于許謀定之邾人牟人葛人来朝鄭伯突出奔蔡入于櫟冬公㑹宋公衛侯陳侯于袲伐鄭将納厲公弗克而還十六年公㑹宋公蔡侯衛侯于曺謀伐鄭夏㑹伐鄭冬城向十七年春正月公㑹齊侯紀侯盟于黄二月公㑹邾儀父盟于趡尋蔑盟蔑盟在隐元年夏及齊師戰于奚疆事也齊人侵魯疆疆吏来告公曰疆埸之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉十八年春正月公将有行遂與姜氏如齊申繻諫不聴公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乗公公薨于車魯人告于齊曰寡君畏君之威不敢寧居来修舊好禮成而不反無所歸咎惡于諸侯請以彭生除之齊人殺彭生冬十二月葬桓公左傳公在位十八年諡曰桓荘公莊公桓公大子桓公六年九月丁夘公生以大子之禮舉之接以大牢卜士負之士妻食之禮世子生三日􅁲士負之射人以桑弧蓬矢射天地四方􅁲士之妻為乳母公與文姜宗婦命之世子生三月君夫人沐浴于外寝立于阼階西鄉世婦抱子升自西階君命之乃降公問名于申繻對曰不以國不以官不以山川不以隐疾不以畜牲不以器幣公曰是其生也與吾同物命之曰同桓公薨于齊公即位元年春三月魯人責文姜文姜孫于齊尋復歸魯經書不傳夏單伯天子卿送王姬将嫁女于齊命魯為主秋築王姬之館于外桓公之薨魯不䏻讐齊又喪制未闋故異其禮冬十月王使榮叔周大夫来錫桓公命二年夏公子慶父帥師伐于餘邱國名冬十二月文姜㑹齊侯于禚三年春正月溺大夫㑹齊師伐衛冬公次于滑将㑹鄭伯謀紀齊欲滅紀故四年春正月文姜享齊侯于祝邱冬公及齊人狩于禚五年夏文姜如齊師秋郳犁来来朝冬公㑹齊宋陳蔡伐衛納惠公六年冬齊人来歸衛寳文姜請之也七年春文姜㑹齊侯于防冬又㑹于穀八年春正月将伐郕師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不徳齊師何罪罪我之由夏書曰皋陶邁種徳徳乃降姑務修徳以待時乎秋師還齊無知弑襄公公子紏来奔九年春齊人殺無知公及齊大夫盟于蔇夏公伐齊納子糾齊小白入于齊秋八月及齊師戰于乾時我師敗績公喪戎路傳乗而歸乃殺子紏于生竇十年春正月齊師伐我戰于長勺齊師敗績二月公侵宋夏六月齊師宋師次于郎公子偃犯宋師公從之大敗宋師于乗邱齊師乃還十一年夏五月宋侵我公禦之敗諸鄑秋宋大水公使弔之冬齊侯来逆共姬王姬也魯主昬十二年荘王崩經傳不書子僖王立十三年冬公㑹齊侯盟于柯十五年夏文姜如齊十六年冬十二月㑹諸侯齊宋陳衛鄭許滑滕同盟于幽十七年僖王崩經書不傳孫惠王立十八年夏戎侵我公追戎于濟西十九年秋公子結大夫媵陳人之婦于鄄遂及齊侯宋公盟文姜如莒周王子頺伐王不克出奔温衛師燕師伐周立子頽二十年春王處于鄭二月文姜如莒二十一年春鄭伯虢叔同伐王城殺王子頽納王秋七月文姜薨二十二年春正月肆大眚葬我小君文姜秋七月及齊髙傒盟于防冬公如齊納幣結昬于齊而親納幣二十三年春周祭叔来聘夏公如齊觀社曺劌諫不聴荆人来聘公及齊侯遇于榖秋丹桓宫楹冬十二月公㑹齊侯盟于扈二十四年春三月刻桓宫桷夏公如齊逆女秋八月夫人姜氏入哀姜也大夫宗婦覿用幣二十五年春陳女叔来聘冬公子友如陳二十六年春公伐戎秋公㑹宋人齊人伐徐二十七年春公㑹杞伯姬公女于洮夏六月公㑹諸侯齊宋陳鄭同盟于幽秋公子友如陳𦵏原仲冬杞伯姬来莒慶莒大夫来逆叔姬公女杞伯来朝公㑹齊侯于城濮二十八年秋荆伐鄭公㑹齊人宋人救鄭冬築郿大無麥禾臧孫辰告糴于齊二十九年春新延廐書不時也凡馬日中而出日中而入日中春秋分也冬十二月城諸及防三十年夏次于成将卑師少故曰次齊将降鄣故設備冬公及齊侯遇于魯濟謀山戎也三十一年春築臺于郎夏築臺于薛六月齊侯来獻戎捷秋築臺于秦三十二年春城小穀為管仲也公感其徳故城其私邑秋八月公薨于路寝公疾問後于叔牙對曰慶父材問于季友對曰臣以死奉般荘公子公曰鄉者牙曰慶父材季友乃酖殺叔牙立子般冬十月慶父賊子般季友奔陳慶父懼出適齊國人立庶子啟方是為閔公公在位三十二年諡曰荘閔公閔公名啓方史記作閒荘公庶子子般遇弑公即位年八嵗杜預注元年夏六月葬荘公子般之弑也季友奔陳秋八月公及齊侯盟于落姑請復季友齊侯許之召諸陳公次于郎以待之季友来歸冬齊仲孫湫来省難故公羊榖梁並以齊仲孫為公子慶父非是二年夏五月吉禘于荘公三年喪畢致新主于廟逺主遷祧因是大祭以審昭穆謂之禘荘公喪制未闋時别立廟廟成而吉祭不於大廟秋八月公薨初公傅奪卜齮大夫田公不禁慶父使卜齮賊公于武闈季友以公庶兄申適邾慶父奔莒乃入立之季友求慶父于莒慶父縊而死慶父通于哀姜哀姜欲立之公之死也哀姜與知之九月哀姜孫于邾冬齊髙傒来盟左傳公羊傳桓公使髙子将南陽之甲立僖公而城魯公在位二年諡曰閔僖公僖公名申荘公之子閔公庶兄也母曰成風公子友之将生也桓公使卜楚邱之父卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌成風聞公子友之繇乃事之而屬公焉故友立之元年秋八月公㑹諸侯齊宋鄭曺邾于檉九月公敗邾師于偃虚邱之戍将歸者也虚邱邾地邾人既送哀姜還齊人殺哀姜邾人因戍虚邱欲以侵魯至是歸公要而敗之冬莒人来求賂求還慶父之賂公子友敗諸酈獲莒子之弟挐哀姜之孫于邾也齊人取而殺之于夷以其尸歸公請而葬之冬十二月哀姜之喪至自齊二年夏五月葬我小君哀姜三年齊侯為陽榖之㑹来尋盟秋㑹于陽榖謀伐楚冬公子友如齊涖盟四年春正月公㑹諸侯齊宋陳衛鄭許曺侵蔡蔡潰遂伐楚次于陘楚屈完来盟于師盟于召陵冬公孫兹㑹諸侯之師齊宋衛陳許曺侵陳陳成五年春杞伯姬来朝其子夏公孫兹如牟娶焉公及諸侯齊宋陳衛鄭許曺㑹王世子于首止秋八月諸侯盟于首止鄭伯逃歸不盟恵王将廢大子鄭而立王子帶故齊桓帥諸侯㑹大子以定其位六年夏公㑹諸侯齊宋陳衛曺伐鄭圍新城七年夏小邾子来朝秋七月公㑹諸侯齊宋陳鄭盟于甯母謀鄭故公子友如齊聘閏月惠王崩襄王惡大叔帶之難懼不立不發喪八年春正月公㑹王人諸侯齊宋衛許曺陳盟于洮鄭伯乞盟請服也襄王定位而後發喪九年夏公㑹宰周公諸侯齊宋衛鄭許曺于葵邱秋九月諸侯盟于葵邱十年春正月公如齊十一年公及夫人姜氏㑹齊侯于陽榖十三年夏公㑹諸侯齊宋陳衛鄭許曺于鹹淮夷病杞故且謀王室冬公子友如齊十四年夏六月季姬及鄫子遇于防使鄫子来朝季姬魯女鄫夫人也季姬来寧公怒止之以鄫子之不朝也夏遇于防而使来朝公羊非使来朝使来請已也十五年春正月公如齊楚人伐齊三月公㑹諸侯齊宋陳衛鄭許曹盟于牡邱謀救徐遂次于匡公孫敖帥師及諸侯之大夫救徐十六年春三月公子友卒秋七月公孫兹卒冬十二月公㑹諸侯齊宋陳衛鄭許邢曺于淮謀鄫且東畧也鄫為淮夷所病故十七年夏滅項淮之㑹公有諸侯之事未歸而取項齊人以為討止公公羊穀梁並作齊滅項秋夫人姜氏㑹齊侯于卞聲姜㑹齊以請公九月公至自齊十八年春正月宋曺衛邾伐齊夏師救齊十九年冬㑹陳蔡楚鄭盟于齊修桓公之好也楚始與夏盟二十年春新作南門夏郜子来朝姬姓國二十一年夏大旱公欲焚巫尫臧孫辰諫從之邾人滅須句須句子来奔須句大皞之後成風僖公之母須句之女故因之冬公伐邾二十二年春公伐邾取須句反其君秋八月及邾人戰于升陘我師敗績二十四年夏王子帶以狄師攻王王出居于鄭冬王使来告難曰不榖不徳得罪于母弟之寵子帯鄙在鄭地汜敢告叔父臧孫辰對曰天子䝉塵于外敢不奔問官守二十五年夏四月王入于王城殺王子帶冬十二月公㑹衛子莒慶盟于洮衛人平莒于我也二十六年春正月公㑹莒子衛甯速盟于向尋洮之盟齊人侵我西鄙公追齊師至􅈶弗及夏齊人伐我北鄙衛人伐齊公使展喜犒師齊師乃還公子遂臧孫辰如楚乞師辰見得臣楚大夫道之伐齊宋冬楚伐宋圍緡公以楚師伐齊取榖寘桓公子雍于榖易牙奉之以為魯援二十七年春杞子来朝公卑杞杞不共也秋公子遂帥師入杞冬十二月公㑹諸侯楚陳蔡鄭許盟于宋二十八年春晉伐衛公子買戍衛楚人救衛不克公懼于晉殺買謂楚人曰不卒戍也夏五月公㑹諸侯晉齊宋蔡鄭衛莒盟于踐土陳侯如㑹公朝于王所王在踐土秋公子遂如齊冬公㑹諸侯晉齊宋蔡鄭陳莒邾秦于温天王狩于河陽公朝于王所諸侯遂圍許二十九年春介葛盧来朝夏公㑹王子虎諸侯之大夫晉宋齊陳秦盟于翟泉尋踐土之盟且謀伐鄭冬介葛盧来三十年冬天王使宰周公来聘公子遂如京師遂如晉三十一年春取濟西田公子遂如晉三十三年春齊使國歸父来聘夏公伐邾取訾婁秋公子遂帥師伐邾冬十月公如齊十二月公薨于小寝左傳在位三十三年諡曰僖文公文公名興僖公之子也元年春正月公即位二月天王使叔服来㑹葬夏四月葬僖公天王使毛伯来錫公命叔孫得臣如京師秋公孫敖㑹晉侯于戚冬十月公孫敖如齊二年春二月作僖公主三月晉以公不朝来討公如晉夏四月及晉處父盟六月公孫敖㑹諸侯宋陳鄭晉士縠盟于垂隴秋八月大事于大廟躋僖公大事禘也躋僖公于閔公上逆祀也冬公子遂如齊納幣三年春正月叔孫得臣㑹晉宋陳衛鄭伐沈沈潰夏五月王子虎卒冬公如晉及晉侯盟四年夏逆婦姜于齊秋衛使甯俞来聘冬十一月夫人成風薨五年春正月王使榮叔歸含且賵三月葬我小君成風王使召伯来㑹葬公羊作毛伯夏公叔敖如晉六年夏季孫行父如陳聘于陳且娶焉秋季孫行父如晉冬十月公子遂如晉葬晉襄公七年春公伐邾三月取須句寘邾文公子文公子叛在魯故公使為守須句大夫遂城郚夏狄侵我西鄙秋八月諸侯齊宋衛陳鄭許曺晉大夫趙盾盟于扈晉靈公立故公後至冬公孫敖如莒涖盟徐伐莒莒人来請盟八年秋八月襄王崩子頃王立晉人以扈之盟来討冬公子遂㑹晉趙盾盟于衡雍公子遂㑹雒戎盟于暴公孫敖如京師不至而奔莒宋殺其大夫司馬司城蕩意諸来奔公以其官逆之皆復之卿違従大夫公賢其効節故以本官逆之九年春周毛伯衛来求金二月叔孫得臣如京師葬襄王楚伐鄭公子遂㑹晉宋衛許救鄭冬楚使越椒来聘秦人来歸僖公成風之禭十年春三月臧孫辰卒秋七月及周蘇子盟于女栗頃王立故十一年夏叔仲彭生㑹晉郤缺于承筐謀諸侯之従于楚者秋曹伯来朝公子遂聘于宋狄侵齊遂伐我冬十月叔孫得臣敗狄于鹹十二年春正月郕伯来奔郕伯卒郕人立君大子来奔公以諸侯禮逆之杞伯来朝秋滕伯来朝秦使西乞術来聘将伐晉故冬十二月季孫行父帥師城諸及鄆十三年秋七月大室屋壊冬公如晉衛侯會公于沓請平于晉公還自晉鄭伯㑹公于棐亦請平于晉公皆成之十四年春頃王崩子匡王立邾伐我叔仲彭生帥師伐邾夏六月公㑹諸侯宋衛鄭許曺晋趙盾同盟于新城従楚者服且謀納邾捷菑秋九月公孫敖卒于齊宋子哀来奔冬齊人執子叔姬叔姬魯女齊侯舍之母公子商人弑舍公子遂請以王寵求子叔姬冬單伯如齊請齊人執之又執子叔姬十五年春季孫行父如晉為單伯與子叔姬故夏曺伯来朝六月周單伯至自齊齊人許單伯請而赦之使来致命秋齊人侵我西鄙季孫行父如晉冬十二月齊人来歸子叔姬齊侯侵我西鄙遂伐曺討其朝魯十六年春季孫行父㑹齊侯于陽榖齊侯弗及盟及齊平公有疾使行父㑹于陽榖請盟齊侯曰請俟君間夏五月公四不視朔六月公子遂及齊侯盟于郪邱秋八月夫人聲姜薨文公母毁泉臺有蛇自泉宫出如先君之數八月聲姜薨毁泉臺十七年夏四月齊侯伐我北鄙六月公及齊侯盟于榖冬十月公子遂如齊拜榖之盟十八年春二月公薨于臺下夏六月葬我君文公左傳在位十八年諡曰文宣公宣公名倭一名接又作委文公取于齊曰出姜出姜生大子惡及弟視二妃敬嬴生宣公敬嬴嬖而私事公子遂宣公長而屬諸遂遂欲立之叔仲彭生不可文公十八年薨秋公子遂叔孫得臣如齊遂見于齊侯而請之齊侯新立欲親魯許之冬十月遂殺惡及視而立宣公召叔仲彭生而殺之出姜歸于齊季孫行父如齊元年春正月公即位公子遂如齊逆女三月遂以夫人婦姜至自齊夏季孫行父如齊納賂以請㑹公㑹齊侯于平州簒立者諸侯既與之㑹則不得復討故㑹侯以定公位夏六月齊人取濟西田賂齊也秋邾子来朝二年匡王崩弟定王立四年春正月公及齊侯平莒及郯莒人不肯公伐莒取向秋公如齊五年春公如齊髙固使齊侯止公請叔姬秋九月齊髙固来逆叔姬叔孫得臣卒冬齊髙固及子叔姬来反馬也禮送女留其送馬謙不敢自安三月廟見遣使反馬七年春衛侯使孫良夫来盟夏公㑹齊侯伐莱冬公㑹諸侯晉宋衛鄭曺于黒壤晉侯成公之立也公不朝又不使大夫聘晉人止公于㑹盟于黒壤公不與盟以賂免八年夏六月公子遂如齊至黄乃復卒于垂夫人敬嬴薨宣公母冬十月葬我小君敬嬴城平陽九年春正月公如齊王使来徴聘夏仲孫蔑如京師秋取根牟東夷國十年春公如齊齊人歸我濟西田以我服故夏齊惠公卒公如齊六月公孫歸父如齊葬齊惠公秋天王使王季子来聘公孫歸父帥師伐邾取繹季孫行父如齊冬公孫歸父如齊伐邾故齊侯使國佐来聘十一年夏公孫歸父㑹齊人伐莒十四年冬公孫歸父㑹齊侯于榖楚圍宋仲孫蔑言于公曰小國之免于大國也聘而獻物今楚在宋君其圖之公説十五年春公孫歸父㑹楚子于宋秋仲孫蔑㑹齊髙固于無婁初税畝公田之法十取其一今又履其餘畆復十收其一十七年夏六月公㑹諸侯晉衛曺邾同盟于斷道冬公弟叔肹卒十八年春公伐杞夏公使如楚乞師欲以伐齊秋公孫歸父如晉謀以晉人去三桓以張公室冬十月公薨于路寝歸父奔齊左傳公在位十八年諡曰宣尚史卷八
