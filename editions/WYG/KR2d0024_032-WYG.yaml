body:
  text: 尚史卷三十二列傳十鑲白旗漢軍李鍇撰叔牙僖叔公孫兹戴伯叔孫得臣莊叔叔孫僑如宣伯叔孫豹穆叔叔孫婼昭子叔孫不敢成子叔孫州仇武叔叔孫舒文子叔孫輒附叔牙桓公子慶父同母弟僖叔也莊公三十二年公疾問後于叔牙對曰慶父材問于季友對曰臣以死奉般公曰鄉者牙曰慶父材季友使以君命命叔牙待于鍼巫氏魯大夫使鍼季酖之曰飲此則有後于魯國不然死且無後飲之歸及逵泉而卒謚牙曰僖公羊傳荘公病將死召季子曰牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎俄而牙弑械成季子和藥而飲之無傫氏至乎王隄而死魯立牙子公孫兹為叔孫氏是為叔孫戴伯僖公四年兹帥師㑹諸侯之師侵陳五年兹如牟娶十六年卒左傳謚曰戴叔孫得臣嗣叔仲彭生亦叔牙孫别為叔仲氏别有傳叔孫得臣叔牙孫叔孫莊叔也文公元年襄王使毛伯衛來錫文公命得臣如周拜三年得臣㑹諸侯之師伐沈沈潰冬十有二月公如晉及晉侯盟晉侯饗公賦菁菁者莪得臣以公降拜曰小國受命于大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂九年得臣如京師葬襄王十一年鄋瞞狄國名防風之後漆姓侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御得臣緜房甥為右富父終甥駟乗冬十月敗狄于鹹獲長狄僑如富父終甥樁其喉以戈殺之埋其首于子駒之門十八年文公薨齊來㑹葬得臣如齊拜葬也宣公五年卒左傳諡曰荘子二僑如豹僑如嗣叔孫僑如得臣子宣伯也得臣敗鄋瞞獲長狄僑如遂以僑如名宣伯以豹名穆叔成公二年僑如及季孫行父臧孫許公孫嬰齊帥師㑹晉敗齊師于鞌三年取汶陽之田棘不服僑如帥師圍棘六年僑如及仲孫蔑帥師侵宋晉命也八年晉士燮來聘言伐郯以其事吴故公請緩師不可使僑如帥師㑹伐郯十一年僑如聘于齊十三年公如京師僑如欲王賜已請先使王以行人之禮禮焉及仲孫蔑從王以為介而重賄之十四年僑如如齊逆女秋九月以夫人姜氏至自齊十五年僑如及諸侯大夫㑹吴于鍾離始通吴也僑如通于穆姜成公母欲去季孫行父仲孫蔑而取其室十六年公將㑹諸侯于沙隨穆姜送公使逐二子公不可姜怒公子偃公子鉏趨過指之曰女不可是皆君也故公待于壊隤申宫儆傋設守而後行僑如使告晉郤犫曰魯侯待于壊隤以待勝者郤犫取貨于僑如而訴公于晉侯晉侯不見公僑如又使告郤犫曰魯之有季孟猶晉之有欒范也政令于是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已無從晉矣若欲得志于魯請止行父而殺之我斃蔑也而事晉無有貳矣魯不貳小國必睦不然歸必叛矣晉人執行父于苕邱公使公孫嬰齊請之乃許魯平赦行父出僑如而盟之僑如奔齊行父歸刺公子偃召叔孫豹于齊而立之齊聲孟子靈公母復通僑如使立于高國之間僑如曰不可以再罪奔衛亦間于卿左傳叔孫豹僑如弟穆叔也成公十六年公㑹尹武公及諸侯伐鄭諸侯之師次于鄭西我師次于督揚不敢過鄭公孫嬰齊使豹請逆于晉師㑹僑如將作亂豹奔齊娶于國氏生孟丙仲壬及僑如奔齊豹饋之僑如曰魯以先子之故將存吾宗必召女召女何如對曰願之乆矣季孫行父召之不告而歸乃立為卿以嗣孫叔氏襄公二年豹聘于宋三年豹及諸侯之大夫及陳袁僑盟陳請服也四年豹如晉報聘晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓厥使行人子員問之曰子以君命辱于敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使君也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問于善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜初襄公如晉請屬鄫五年豹覿鄫世子巫于晉豹又以屬鄫為不利九月諸侯㑹于戚使鄫大夫聴命于㑹六年豹如邾聘且修平平狐駘之戰也七年衛孫林父來聘公登亦登豹相趨進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安林父無辭亦無悛容豹曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折十一年季孫宿將作三軍告豹曰請為三軍各征其軍豹曰政將及子子必不能宿固請之豹曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一國語季武子為三軍叔孫穆子曰不可天子作師公帥之以征不徳元侯作師卿帥之以承天子諸侯有卿無軍帥教衛以賛元侯自伯子男有大夫無卿帥賦以從諸侯是以上能征下下無姦慝今我小侯也處大國之間繕貢賦以共從者猶懼有討若為元侯之所以怒大國無乃不可乎弗從遂作中軍自是齊楚伐討于魯襄昭皆如楚十四年豹從晉侯伐秦及涇不濟豹賦匏有苦葉魯人莒人先濟已而晉師還遂無功十五年齊圍成豹及季孫宿帥師城成郛十六年公㑹諸侯于溴梁齊高厚逃歸于是豹及諸侯之大夫盟曰同討不庭是年齊再伐我圍郕冬豹如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘豹曰以齊人之朝夕釋憾于敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也見荀偃賦圻父偃曰偃知罪矣敢不從執事以同恤社稷而使魯及此見士匄賦鴻鴈之卒章匄曰匄在此敢使魯無鳩乎十九年齊及晉平盟于大隧豹㑹士匄于柯見羊舌肹賦載馳之四章肹曰肹敢不承命豹歸曰齊猶未也不可以不懼二十二年臧孫紇如晉雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為豹聞之曰不可使也而傲使人國之蠧也令倍其賦二十三年齊侯伐衛遂伐晉豹帥師救晉次于雍榆二十四年豹如晉士匄逆之問焉曰古人有言曰死而不朽何謂也豹未對匄曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎豹曰以豹所聞此之謂世禄非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之大上有立徳其次有立功其次有立言雖乆不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之禄之大者不可謂不朽冬齊人城郟豹如周聘且賀城王嘉其有禮也賜之大路二十七年齊慶封來聘其車美仲孫羯謂豹曰慶季之車不亦美乎豹曰豹聞之服美不稱必以惡終美車何為豹與慶封食不敬為賦相鼠亦不知也宋弭諸侯之兵夏豹㑹于宋將盟季孫宿使謂豹以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟豹曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟春秋貶之不書其族言違命也二十八年齊慶封來奔豹食慶封慶封汜祭豹不説使工為之誦茅鴟逸詩刺不敬亦不知既而齊人來讓慶封奔吴吴勾餘吴子夷末也與之朱方聚其族焉而居之富于其舊子服湫謂豹曰天殆富滛人慶封又富矣豹曰善人富謂之賞滛人富謂之殃天其殃之也其將聚而殱旃齊求崔杼之尸將戮之不得豹曰必得之武王有亂臣十人崔杼其有乎不十人不足以𦵏既崔氏之臣獻其柩冬公如楚過鄭鄭伯不在良霄即伯有廷勞于黄崖不敬豹曰伯有無戾于鄭鄭必有大咎言不受戮必為鄭國害敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻寘諸宗室季蘭尸之宗室宗廟季蘭服蘭之女敬也敬可棄乎及漢楚康王卒公欲反叔仲帶曰我楚國之為豈為一人行也子服湫曰君子有逺慮小人從邇饑寒之不恤誰遑其後不如姑歸也豹曰叔仲子専之矣子服子始學者也公遂行楚人使公親禭公患之豹曰祓殯而禭則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之三十年楚子使薳罷來聘豹問王子圍之為政何如對曰吾儕小人食而聴事猶懼不給命而不免于戾焉與知政固問焉不告豹告大夫曰楚令尹將有大事子蕩薳罷字將與焉助之匿其情矣冬十月豹及諸侯之大夫㑹于澶淵宋災故也三十一年豹至自㑹見仲孫羯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能乆矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉羯曰人生幾何誰能無偷朝不及夕將安用樹豹出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉又與季孫宿語晉故宿不從及趙武卒晉公室卑政在侈家韓起為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平邱之㑹公作楚宫豹曰大誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月公薨于楚宫立敬歸之子子野九月子野卒立敬歸之娣齊歸之子公子禂豹不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂宿不聴卒立之比及𦵏三易衰衰衽如故衰左傳昭公元年豹㑹于虢楚公子圍二人執戈先焉蔡公孫歸生與鄭罕虎見豹豹曰楚公子甚美不大夫矣抑君也虎曰有執戈之前吾惑之歸生曰楚大國也公子圍其令尹也有執戈之前不亦可乎豹曰不然天子有虎賁習武訓也諸侯有旅賁禦災害也大夫有貳車備承事也士有陪乗苦奔走也今大夫而設諸侯之服有其心矣若無其心而敢設服以見諸侯之大夫乎將不入矣夫服心之文也如龜焉灼其中必文于外若楚公子不為君必死不合諸侯矣公子圍反殺郟敖而代之國語三月季孫宿伐莒取鄆莒人告于㑹楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂王鮒相趙武欲求貨于豹而為之請使請帶焉弗與梁其踁叔孫家臣曰貨以藩身子何愛焉豹曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為人之有墻以蔽惡也墻之隙壊誰之咎也衛而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其􅄶矣趙武聞之曰魯叔孫豹可謂能矣請免之以靖能者楚人許之乃免豹國語樂王鮒求貨于穆子穆子不與梁其踁曰貨以衛身出貨以免子何愛焉穆子曰非汝所知也承君命以㑹大事而國有罪我以貨私免是我㑹吾私也茍如是則又可以出貨而成私欲乎雖可以免吾其若諸侯之事何夫必將或循之曰諸侯之卿有然者故也則我求安身而為諸侯法矣君子是以患作作而不𠂻將或導之是昭其不􅇆也余非愛貨惡不𠂻也且罪非我之由為戮何害楚人乃赦之豹歸曽夭御季孫宿以勞之旦及日中不出曽夭謂曽阜叔孫家臣曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其内焉用之阜曰數月于外一旦于是庸何傷賈而欲贏而惡囂乎阜謂豹曰可以出矣豹指楹曰雖惡是其可去乎乃出見之國語穆子歸武子勞之日中不出其人曰可以出矣穆子曰吾不難為戮養吾棟也夫棟析而榱崩吾懼壓焉故曰雖死于外而庇宗于内可也今既免大耻而不忍小忿可以為能乎乃出見之三年秋邾穆公來朝季孫宿欲卑之豹曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也宿從之四年豹田于邱蕕遇疾豎牛欲亂其室而有之殺其二子孟丙仲壬事具叛臣傳絶豹食十二月癸丑豹不食乙卯卒謚曰穆豎牛立豹庶子婼而相之初呉公子札來聘見豹説之謂豹曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子左傳叔孫婼豹庶子昭子也昭公七年婼如齊涖盟九年冬築郎囿季孫意如欲其速成也婼曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎十年婼及諸侯之大夫如晉葬平公諸侯大夫欲因見新君婼曰非禮也弗聴晉果辭不見婼至自晉大夫皆見高彊見而退婼語諸大夫曰為人子不可不慎也㢤昔慶封亡子尾彊之父公孫蠆字多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令徳其子弗能任罪猶及之難不慎也喪夫人之力棄徳曠宗以及其身不亦害乎詩曰不自我先不自我後其是之謂乎十二年宋華定來聘享之為賦蓼蕭弗知又不答賦婼曰必亡宴語之不懐寵光之不宣令徳之不知同福之不受將何以在季悼子意如父之卒也婼以再命為卿及季孫意如克莒婼受三命叔仲小欲構二家謂意如曰三命踰父兄非禮也意如曰然使婼辭婼曰叔孫氏有家禍殺適立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣朝而命吏曰婼將與季氏訟書辭無頗意如懼而歸罪于叔仲小使婼逐小小聞之不敢朝婼命吏謂小待政于朝曰吾不為怨府十六年齊侯伐徐徐人行成㑹盟于蒲隧賂齊以甲父之鼎婼曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎十七年小邾穆公來朝公與之燕季孫意如賦采菽穆公賦菁菁者莪婼曰不有以國其能乆乎言有用國之才故能乆有國夏六月甲戌朔日有食之祝史請所用幣婼曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也季孫意如禁之曰止也唯正月朔正月正陽之月建巳月也慝未作日有食之于是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災于是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏意如弗從婼退曰夫子將有異志不君君矣十九年楚工尹赤遷隂于下隂令尹陽匄城郟婼曰楚不在諸侯矣其僅自完也以持其世而已二十年二月己丑日南至梓慎望氛曰宋有亂婼曰然則戴桓也汰侈無禮已甚亂所生也已而宋華亥向寧奔陳戴桓之族也二十一年𦵏平公蔡大子朱失位位在卑不在適子位以長㓜齒大夫送𦵏者歸見婼婼問蔡故以告婼歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之夏晉士鞅來聘婼為政季孫意如欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒魯恐加四牢焉為十一牢二十三年武城人取邾師邾人愬于晉晉人來討婼如晉晉人執之晉人使與邾大夫坐坐訟曲直婼曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓起使邾人聚其衆將以婼與之婼聞之去衆與兵而朝士彌牟説韓起乃弗與使各居一館士彌牟聴其辭而愬諸起乃皆執之士彌牟御婼從者四人過邾館以如吏先歸邾子而謂婼曰以芻蕘之難從者之病將館子于都婼旦而立期焉乃館諸箕舍子服回于他邑士鞅求貨于婼使請冠焉婼取其冠法而與之兩冠曰盡矣魯為婼故申豐季氏家臣以貨如晉婼曰見我吾告女所行貨見而不出不令申豐出而行貨吏人之與婼居于箕者請其吠狗弗與及將歸殺而與之食之婼所館者雖一日必葺其墻屋去之如始至冬昭公為婼故如晉及河有疾而復二十四年晉士彌牟逆婼于箕婼使梁其踁待于門内曰余左顧而欬乃殺之右顧而笑乃止婼見士彌牟彌牟曰寡君以為盟主之故是以乆子不腆敝邑之禮將致諸從者使彌牟逆吾子婼受禮而歸夏五月乙未朔日有食之椊慎曰將水婼曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也陽氣莫然不動乃將積聚陽不克莫絶句果旱二十五年婼聘于宋且為季孫意如逆宋女樂大心宋右師見之語卑宋大夫而賤司城氏婼告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡宋公享婼賦新宫婼賦車轄明日宴飲酒樂宋公使婼右坐語相泣也樂祁曰君與叔孫其皆死乎九月公伐季孫意如不克孫于齊㑹婼自闞魯邑歸見意如意如稽顙曰子若我何婼曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何意如曰茍使意如得改事君所謂生死而肉骨也婼從公于齊公與婼言于幄内曰將安衆而納公公徒將殺婼伏諸道左師展告公公使婼自鑄歸意如有異志婼耻見欺冬十月齊于其寢使祝宗祈死戊辰卒左傳諡曰昭子不敢嗣叔孫不敢婼之子成子也昭公薨不敢逆公之喪于乾侯季孫意如使不敢止子家羈欲與之從政子家羈不見易幾而哭幾哭㑹也朝夕哭不同㑹不敢請見羈羈辭不見不敢使告之曰公衍公為實使羣臣不得事君若公子宋定公名主社稷則羣臣之願也凡從君出而可以入者將唯子是聴子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告羈對曰羈也君知其出也未知其入也羈將逃也定公五年不敢卒左傳諡曰成子州仇嗣叔孫州仇不敢之子武叔也定公八年陽虎欲去三桓以季寤季孫斯之弟更季氏以叔孫輒叔孫氏庶子更叔孫氏已更孟氏冬十月將享季孫斯于蒲圃而殺之斯覺奔孟氏陽虎刼定公與州仇以伐孟氏㑹公歛陽孟氏家臣敗陽虎虎入于讙陽關以叛初叔孫不敢欲立州仇公若藐叔孫氏之族固諌曰不可不敢立之而卒州仇使公若藐為郈宰使郈馬正侯犯殺之弗能十年侯犯以郈叛州仇及仲孫何忌圍郈弗克秋州仇何忌及齊師復圍郈弗克州仇使郈工師駟赤間侯犯侯犯奔齊齊人乃致郈冬州仇聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜哀公二年州仇及季孫斯仲孫何忌伐邾將伐絞邾邑邾人愛其土賂以漷沂之田盟于句繹三年州仇及季孫斯帥師城啟陽冬及仲孫何忌帥師圍邾十一年齊國書高無㔻伐我及清季孫肥之宰冉求謀禦之州仇及何忌以政在季氏不欲戰肥使冉求從于朝俟于黨氏之溝州仇呼而問戰焉對曰君子有逺慮小人何知何忌强問之對曰小人慮材而言量力而共者也州仇曰是謂我不成丈夫也退而蒐乗孟孺子洩帥右師冉求帥左師戰于郊左師入齊軍而右師奔為郊戰故公㑹吴子伐齊將戰呉子呼州仇曰而事何也對曰從司馬吴子賜之甲劍鈹曰奉爾君事敬無廢命州仇未能對衛賜進曰州仇奉甲從君而拜戰于艾陵大敗齊師州仇卒謚曰武子舒嗣哀公二十六年舒㑹師納衛侯輒不果舒卒謚曰文叔孫輒字子張叔孫氏之庶子無寵于叔孫氏故因陽虎欲去三桓嘗帥費人以襲魯左傳叔仲彭生惠伯叔仲帶昭伯叔仲小穆子志附叔仲彭生者亦叔牙孫别為叔仲氏是為叔仲惠伯初公孫敖為公子遂敖從父昆弟聘莒女敖見之美自為娶之遂請攻之文公將許之彭生諌曰臣聞之兵作于内為亂于外為冦冦猶及人亂自及也今臣作亂而君不禁以啟冦讎若之何公止之彭生平之使遂舍之敖反之復為兄弟如初九年楚子越椒來聘執幣傲彭生曰是必滅若敖氏之宗傲其先君神弗福也十一年彭生㑹晉郤缺于承筐謀諸侯之從于楚者十四年邾人伐我南鄙彭生帥師伐邾十五年公孫敖之喪歸自齊公子遂欲勿哭彭生曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨于人遂説帥兄弟以哭之十八年文公薨大子惡即位文公二妃敬嬴生宣公敬嬴嬖而私事公子遂宣公長而屬諸遂遂欲立之彭生不可冬十月遂弑大子惡及視視惡母弟而立宣公遂以君命召彭生其宰公冉務人止之曰入必死彭生曰死君命可也公冉務人曰若君命可死非君命何聴弗聴乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏左傳諡彭生曰恵叔孫帶者彭生之孫是為叔仲昭伯為隧正襄公七年南遺為費宰帶欲善季氏而求媚于南遺謂遺請城費吾多與而役故季氏城費二十八年公如楚㑹楚康王卒公欲反帶曰我楚國之為豈為一人行也榮駕鵞亦言之公遂行國語襄公如楚及漢聞康王卒欲還叔仲昭伯曰君之來也非為一人也為其名與其衆也今王死其名未改其衆未敗何為還夫義人者固慶其喜而弔其憂况畏而服焉聞畏而往聞䘮而還茍芈姓實嗣其誰代之任喪王大子又長矣執政未改予為先君來死而去之其誰曰不如先君將為喪舉聞喪而還其誰曰非侮也事其君而任其政其誰由已貳求説其侮而亟于前之人其讎不滋大乎説侮不懦執政不貳帥大讎以憚小國其誰云待之若從君而走患則不如違君以避難且夫君子計成而後行二三子計乎有禦楚之術而有守國之備乎則可也若未有不如往也乃遂行三十一年六月公薨于楚宫帶竊其拱壁以與御人納諸其懐而從取之昭公四年叔孫豹卒昭公使杜洩叔孫氏宰葬叔孫豎牛賂帶與南遺使惡杜洩于季孫宿而去之左傳帶卒謚曰昭帶子小是為叔仲穆子小及南蒯公子憖謀季氏不克詳南蒯傳卒謚曰穆帶孫志因陽虎欲去三桓不克詳陽虎傳季友成季季孫行父文子季孫宿武子季孫紇悼子季孫意如平子季孫斯桓子季孫肥康子季强公冶季寤附公亥季友字季子桓公少子莊公母弟成季也是為季孫氏為魯上卿荘公二十五年陳女叔來聘冬友如陳報女叔之聘二十七年友如陳塟原仲陳大夫原仲友之舊也公羊傳辟内難也公子慶父公子牙通乎夫人以脅公季子治之不得視之不忍故請至于陳而葬原仲也穀梁傳三十二年八月公薨子般立冬十月慶父弑子般友奔陳魯立閔公閔公元年公及齊侯盟于落姑請復友齊侯許之使召諸陳公次于郎以待之友来歸二年八月慶父又弑閔公友以僖公適邾慶父懼討奔莒友乃入立之以賂求慶父于莒慶父自殺僖公元年莒人来求復慶父之賂友敗諸酈獲莒子之弟拏公賜之汶陽之田及費榖梁傳公子友謂莒拏曰吾二人不相説士卒何罪屏左右而相搏公子友處下左右曰孟勞孟勞者魯之寶刀也公子友以殺之三年友如齊涖盟七年友如曹十三年友如齊十六年卒左傳謚曰成子行父嗣季孫行父友之子文子也文公六年臧孫辰以陳衛之睦也欲求好于陳夏行父聘于陳且娶焉秋行父將聘于晉使求遭喪之禮以行其人曰將焉用之行父曰備豫不虞古之善教也求而無之實難過求何害八月晉襄公卒十二年行父帥師城諸及鄆十四年齊商人弑其君舍我告于王王使單伯請子叔姬魯女舍之母于齊齊人執單伯又執子叔姬十五年行父如晉為單伯與子叔姬故秋齊人侵我西鄙行父告于晉齊侯之侵我西鄙也謂諸侯不能也遂伐曹入其郛討其朝我也行父曰齊侯其不免乎已則無禮而討于有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐㓜賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣十六年及齊平公有疾使行父㑹齊侯于陽榖請盟齊侯不肯曰請俟君間十八年文公薨公子遂請于齊殺大子惡及視惡母弟而立宣公行父如齊莒大子僕弑其父紀公以其寶玉來奔納諸公公命與之邑曰今日必授行父使司冦出諸竟曰今日必達公問其故行父使大史克即里革對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮于其君者事之如孝子之養父母也見無禮于其君者誅之如鷹鸇之逐鳥雀也宣公元年行父如齊納賂以請㑹十年行父聘于齊十八年公孫歸父公子遂子以遂之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬宣公薨成公即位行父言于朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏歸父奔齊成公二年行父帥師㑹晉郤克及齊師戰于鞌齊師敗績四年公如晉晉侯見公不敬行父曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成于楚而叛晉行父曰不可晉雖無道未可叛也國大臣睦而邇于我諸侯聴焉未可以貳史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止六年行父以鞌之功立武宫夏四月晉遷于新田冬行父如晉賀七年呉伐郯郯成行父曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受吾亡無日矣八年晉侯使韓穿來言汶陽之田歸之于齊行父饑之私焉曰大國制義以為盟主是以諸侯懐徳畏討無有貳心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懐也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士貳其行士也罔極二三其徳七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將徳是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之九年為歸汶陽之田故諸侯貳于晉晉人懼㑹于蒲以尋馬陵之盟行父謂士燮曰徳則不競尋盟何為二月伯姬歸于宋夏行父如宋致女女嫁三月又使大夫隨加聘問謂之致女十年晉景公卒公如晉弔晉人以公為貳于楚故止公十一年公受盟而後歸郤犫來聘且涖盟夏行父如晉報聘且涖盟十六年公㑹諸侯于沙隨㑹叔孫僑如謀作亂使告郤犫曰請止行父而殺之我斃蔑也而事晉蔑有貳矣晉人執行父于苕邱公羊晉人來乞師而不與公㑹晉侯將執公季孫行父曰此臣之罪也于是執季孫行父成公將㑹厲公㑹不當期將執公季孫行父曰臣有罪執其君子有罪執其父此聴失之大者也今此臣之罪也舍臣之身而執臣之君吾恐聴失之為宗廟羞也于是執季孫行父注公㑹晉侯㑹沙隨也成公將㑹厲公謂伐鄭也並在十六年公還待于鄆使公孫嬰齊請行父于晉晉士燮亦言之乃許魯平赦行父僑如奔齊冬十二月行父及郤犫盟于扈襄公五年冬十二月行父卒大夫入歛公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠于公室也相三君矣而無私積可不謂忠乎左傳説苑衛文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤季孫宿行父之子武子也襄公六年莒滅鄫晉人以鄫故來討曰何故亡鄫宿如晉見且聴命七年宿城費秋宿如衛報公孫剽之聘剽聘在元年八年宿㑹晉侯于邢邱冬晉士匄來聘告將用師于鄭公享之匄賦摽有梅宿曰誰敢㦲今譬于草木寡君在君君之臭味也歡以承命何時之有賦角弓賔將出賦彤弓九年宿如晉報士匄之聘冬十月公㑹諸侯伐鄭宿從晉荀罃士匄門于鄟門鄭成盟于戯十二月復伐之次于隂口而還公送晉侯晉侯以公宴于河上問公年宿對曰㑹于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具宿對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉十一年作三軍三分公室而各有其一三子各毁其乗季氏使其乗之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣十二年莒人伐我東鄙圍台宿救台遂入鄆取其鐘以為公盤十四年宿㑹諸侯之大夫于向為吴謀楚衛孫林父逐衛侯冬宿及諸侯之大夫㑹于戚謀定衛十五年齊侯伐我北鄙圍成宿及叔孫豹帥師城成郛十八年公㑹晉及諸侯圍齊十九年宿如晉拜師晉侯享之士匄為政賦黍苗宿興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月宿以所得齊之兵作林鐘銘魯功二十年宿如宋報向戍之聘向戍聘在襄十五年禇師叚逆之以受享賦棠棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺宿去所曰臣不堪也二十九年公自楚還及方城宿取卞使公冶季氏屬大夫問且曰聞守卞者將叛臣帥徒以討之既得之矣敢告公曰欲之而言叛祇見疏也公欲無入榮駕鵞賦式㣲乃歸三十年晉絳縣人年長矣與城杞趙武聞之召之而謝過焉使為君復陶主衣服之官以為絳縣師于是魯使者在晉歸以語諸大夫宿曰晉未可媮也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可媮乎勉事之而後可三十一年公薨立公子禂公子禂者敬媯之娣齊媯之子年十九矣猶有童心叔孫豹不欲宿不聴卒立之是為昭公昭公元年宿伐莒取鄆二年晉韓起來聘昭公享之宿賦緜之卒章韓起賦角弓宿拜曰敢拜子之彌縫敝邑寡君有望矣賦節之卒章既享宴于季氏有嘉樹焉韓起譽之宿曰敢不封殖此樹以無忘角弓遂賦甘棠韓起曰起不堪也無以及召公冬宿如晉五年毁中軍宿不欲親其議毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公六年宿如晉晉侯享之有加籩宿退使行人告曰小國之事大國也茍免于討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓起曰寡君以為驩也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨七年晉人來治杞田宿將以成孟氏邑本杞田與之謝息僖子家臣為孟孫守不可宿與謝息桃及菜柞二山以易之冬十有一月宿卒左傳謚曰武季武子成寢杜氏之葬在西階之下請合塟焉許之入宫而不敢哭武子曰合𦵏非古也自周公以來未之有改也吾許其大而不許其細何居命之哭武子寢疾蟜固不説齊衰而入見曰斯道也將亡矣士唯公門説齊衰武子曰不亦善乎君子表㣲及其喪也曽㸃倚其門而歌記檀弓子二公彌紇宿無適子公彌長而愛紇欲立之訪于申豐季氏屬大夫申豐不可訪于臧紇臧紇曰飲我酒吾為子立之宿飲大夫酒臧孫為客既獻臧紇北面重席新樽絜之召紇降逆之大夫皆起及旅獻酬既畢而通行為旅而後召公彌使與之齒宿失色以公彌為馬正家司馬愠而不出閔馬父説公彌公彌然之敬共朝夕恪居官次宿喜使飲已酒而以具往盡舍之故公彌富又出為公左宰左傳而紇由是遂立以嗣季孫氏紇卒謚曰悼子子意如嗣公彌别為公鉏氏季孫意如公羊作隠如紇之子平子也昭公十年意如及叔弓仲孫貜伐莒取郠獻俘始用人于亳社十三年為取郠故晉將以諸侯來討八月同盟于平邱晉使羊舌肹辭公不與盟而執意如以幕蒙之使狄人守之司鐸射魯大夫懐錦奉壺飲氷氷箭筩以蒲伏焉守者御之乃與之錦而入晉人以意如歸冬十月歸意如十六年意如如晉葬晉昭公有郈昭伯者季郈之雞鬭季氏介其羽郈氏為之金距意如怒益宫于郈氏且讓之郈昭伯怨意如魯大夫亦多怨意如與昭公子公為公果公賁謀去季氏二十五年公居于長府九月伐季氏殺公之意如弟于門遂入之意如登臺而請曰君不察臣之罪使有司討臣以干戈臣請待于沂上以察罪弗許請囚于費弗許請以五乗亡弗許子家羈曰君其許之弗聼郈昭伯曰必殺之公使郈昭伯逆仲孫何忌㑹叔孫氏之司馬鬷戾救季氏仲孫何忌遂殺郈昭伯伐公徒公遂行孫于齊次于陽州當公伐季氏時叔孫婼適如闞及是婼自闞歸見意如意如稽顙曰子若我何婼曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何意如曰茍使意如得改事君所謂生死而肉骨也婼從公于齊與公言將安衆而納公公徒將殺婼伏諸道公使婼自鑄歸而意如有異志婼尋卒公竟不得入二十七年晉士鞅㑹諸侯之大夫于扈謀納公宋衛皆利納公固請之士鞅取貨于意如乃辭小國而以難復公比嵗居鄆或在乾侯意如每嵗賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬三十一年晉侯將以師納公士鞅曰若召意如而不來則信不臣矣然後伐之晉人召意如士鞅使私焉曰子必來我受其無咎意如㑹晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之意如練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月意如從荀躒如乾侯荀躒以晉侯之命唁公且曰寡君使躒以君命討于意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂意如君怒未怠子姑歸祭三十二年公薨于乾侯定公元年夏六月公之喪至自乾侯七月意如塟昭公于墓道南及孔子為司冦始溝而合諸墓昭公出故意如禱于煬公九月立煬宫五年意如行東野還未至卒于房左傳家語季平子卒將以君之璠璵歛贈以珠玉孔子為中都宰聞之厯級而救焉曰送死而以寶玉是猶曝尸于中原也其示民以姦利之端而有害于死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止詳陽虎傳諡曰平子斯嗣季孫斯意如之子桓子也斯既嗣立當陽虎强欲為亂定公五年陽虎囚斯及公父歜即公父文伯斯從父昆弟而逐仲梁懐季氏家臣冬十月殺公何藐季氏族己丑盟斯于稷門之内庚寅大詛遂逐公父歜及秦遄皆奔齊六年公侵鄭取匡為晉討也往不假道于衛及還陽虎使斯自南門入出自東門舍于豚澤將以怒衛侯衛侯果怒使追之公叔發曰天將多陽虎之罪以斃之君姑待之乃止夏斯如晉獻鄭俘秋陽虎又盟公及三桓于周社盟國人于亳社詛于五父之衢冬斯及仲孫何忌帥師圍鄆八年斯及何忌帥師侵衛冬十月陽虎欲去三桓將享斯于蒲圃而殺之斯覺之奔孟氏陽虎刼公與叔孫州仇以伐孟氏成宰公歛陽孟氏家臣敗陽虎虎入于讙陽關以叛公歛陽欲殺斯仲孫何忌懼而歸之十二年仲由為季氏宰將墮三都于是叔孫氏墮郈季氏墮費孟氏不墮成公圍成弗克哀公二年斯及叔孫州仇仲孫何忌帥師伐邾將伐絞邾人愛其土賂以漷沂之田盟于句繹三年斯及叔孫州仇城啓陽秋七月斯卒左傳諡曰桓子肥嗣公父歜後復于魯卒謚文伯季孫肥斯之子康子也哀公七年公㑹吴于鄫太宰嚭召肥肥使衛賜辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命于諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國肥欲伐邾饗大夫以謀之子服何仲孫何忌議與諸大夫異不聴秋伐邾入之以邾子益來邾茅夷鴻請救于呉八年吴為邾故伐我克武城東陽遂進次于泗上吴人行成子服何曰城下之盟是棄國也吴輕而逺將歸矣請少待之弗從吴人盟而還齊悼公之來也肥以其妹妻之即位而逆之季魴侯肥叔父通焉女言其情弗敢與也齊侯怒伐我取讙及闡又使如吴請師以伐我我乃歸邾子及齊平齊逆季姬以歸十年公㑹吴伐齊師于鄎齊人弑悼公乃還十一年齊為鄎故國書高無㔻帥師伐我肥謀禦之仲孫何忌叔孫州仇以政在季氏不欲戰使仲孫彘帥右師冉求帥左師季氏之甲七千冉求以武城人三百為已卒從老㓜守宫次于雩門之外及齊戰于郊右師奔左師入齊軍齊人不能師宵遁冉求請從之三肥弗許五月公㑹吴伐齊戰于艾陵大敗齊師秋肥命修守備曰小勝大禍也齊至無日矣肥欲以田賦訪諸仲尼仲尼以為不可弗聴卒賦之二十三年宋景曹卒宋元公夫人肥外祖母肥使冉求弔且送塟曰敝邑有社稷之事使肥與有職競焉是以不得助執紼以肥之得備彌甥也有不腆先人之産馬使求薦諸大夫之宰其可以稱旌繁乎二十四年公如越得大子適郢將妻公而多與之地肥懼使因大宰嚭而納賂焉乃止二十五年公至自越肥及仲孫彘逆于五梧郭重魯人僕見二子謂季孟曰惡言多矣君請盡之公宴于五梧彘為祝惡郭重曰何肥也肥曰請飲彘也以魯國之宻邇仇讎臣是以不獲從君克免于大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡二十七年越使后庸來聘盟于平陽肥及仲孫彘叔仲舒皆從肥耻從蠻夷盟病之言及衛賜曰若在此吾不及此夫彘曰然何不召曰固將召之舒曰他日請念夏四月肥卒公弔焉降禮左傳諡曰康肥之曽孫強是為季昭子檀弓季氏之族有季公冶字子冶為魯大夫襄公二十九年公自楚還及方城季孫宿取卞使公冶問問公起居璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭强之而後受五月公至自楚公冶致其邑于季氏而終不入焉曰欺其君何必使余宿見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服歛非徳賞也且無使季氏塟我季公亥者字公若季孫意如之庶叔父也公亥之姊為小邾夫人生宋元夫人是為景曹景曹生子以妻意如叔孫婼如宋聘且逆之公亥從謂景曹勿與魯將逐之景曹卒與之公亥兄曰公鳥初公鳥娶妻于齊鮑文子生申公鳥死公亥與公思展與公鳥之臣申夜姑相其室及季姒即公鳥妻與饔人檀通而懼乃使其妾抶己以示秦遄之妻秦遄魯大夫妻公鳥妹秦姬曰公亥欲使余余不可而抶余又訴于公甫意如弟曰展與夜姑將要余秦遄妻以告公之亦意如弟公之與公甫告意如意如拘展于卞而執夜姑將殺之公亥泣而哀之曰殺是是殺余也將為之請意如使竪勿内日中不得請有司逆命公之使速殺之故公亥怨意如公亥獻弓于公為昭公子務人且與之出射于外而謀去季氏公為告公果公賁果賁皆公為弟公果告公昭公二十五年九月公伐季氏殺公之于門遂入之意如登臺請弗許㑹仲孫叔孫救季氏伐公徒公孫于齊季寤者字子言季孫斯之弟亦不得志于季氏欲因陽虎以去三桓事敗陽虎叛季寤辨舍爵于季氏之廟而出辨猶周徧也徧告廟飲酒示無所懼左傳論曰立嗣之道年均以賢賢均以卜先王之訓也當莊公之頃孽子彊弟内外相軋廼不夙定以崇魯亂奕碁數君三桓之専莊實基之又誰咎㢤至襄昭而卒分公室張而後圖勢將誰與燎原之火其猶可撲乎然而好陵上者困于下陽虎南蒯又踵之矣尚史卷三十二
