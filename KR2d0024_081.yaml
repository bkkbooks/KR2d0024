body:
  text: 尚史卷八十一繫一鑲白旗漢軍李鍇撰孔子繫孔子孔子之先宋之後也成王命微子啓國於宋微子卒其弟曰仲思名衍嗣微子後號微仲生宋公稽宋公生丁公申申生湣公共及襄公熙熙生弗父何及厲公方祀弗父何生宋父周周生世子勝勝生正考甫考甫生孔父嘉五世親盡别為公族故以孔為氏一曰孔父生時所賜號也孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯防叔生伯夏伯夏生叔梁紇紇取魯之施氏生九女其妾生孟皮字伯尼儀禮疏孔子兄曰伯居孟皮有足疾乃婚于顔氏家語史記與顔氏野合而生孔子家語紇求婚于顔氏顔氏有三女其小曰徴在顔父問三女曰陬大夫雖父祖為士然其先聖王之裔今其人身長十尺武力絶倫雖年長性嚴不足為疑三子孰能為之妻二女莫對徴在曰從父所制將何問焉父曰即爾能矣遂以妻之按此文明甚而史遷何本乃有野合之文索隱以紇老顔少不合于禮以繹野合亦強解耳魯襄公二十一年十月庚子孔子生穀梁傳孔子之生諸説各異年不同者公羊榖梁作襄公二十一年史記作二十二年拾遺記周靈王二十一年孔子生是亦當襄公之二十二年也月不同者公羊作十有一月榖梁作十月按公榖去孔子近説必有本賈逵注襄公二十一年經云此年孔子生服虔注昭公二十四年經云時仲尼年三十五是皆以為二十一年生也年之從公榖無疑矣月有可疑者以十有一月無庚子庚子在十月之二十一日是榖梁之説為無誤故斷之以十月也杜預主史記非是司馬貞主公榖而以周正十一月屬之明年以遷就公榖之異亦非是今斷孔子之生在夏正己酉年之八月二十一日也近庸若朱氏曰當在十有二月二十二日以商任之會下書孔子生知必逾月也其十有一月者必十有二月之訛説亦可從宋羅泌初亦主是説而後復主孔氏之譜因禱尼丘之山生孔子故名丘字仲尼史記生而首上墟頂故名丘索隱注言頂上窳也孔子頂如反宇反宇者若屋宇之反中低而四傍髙也白虎通孔子反宇是謂尼甫丘德澤所興藏元通流論衡孔子反羽荀子仲尼之狀面如蒙倛史記孔子生魯昌平鄉陬邑孔安國曰陬叔梁紇所治邑于寶三日紀徵在生孔子空桑之地今名空竇俗名女陵山新論顔徵感黑帝而生孔子孔子三嵗而叔梁紇卒葬于防家語史記葬于防山防山在魯東由是孔子疑其父墓處母諱之也索隱注不的知父墳非謂不知其瑩地也梁紇老死徵在少寡益以為嫌不從送葬故不知墳處非諱之也孔子為兒嬉戲常陳俎豆設禮容史記世家十九嵗娶于宋之幵官氏一嵗而生伯魚伯魚之生也昭公以鯉賜孔子榮君之貺故名曰鯉字伯魚家語孔子貧且賤及長嘗為季氏史料量平嘗為司職吏而畜蕃息史記孔子少孤母死不知其墓殯于五父之衢人之見之者皆以為葬也其慎也蓋殯也問于陬曼父之母然後得合葬于防史記作挽父之母正義注慎謂以紼引棺論衡孔子生不知其父其母匿之吹律自知殷宋大夫子氏之世孔子既得合葬于防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也于是封之崇四尺孔子先反門人後兩甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓家語孔子有母喪既練陽貨弔焉私于孔子曰季氏將饗士子聞諸孔子曰丘弗聞也聞之雖在衰絰亦欲與往陽貨曰季氏饗士不及子也陽貨出曽點問曰何謂也孔子曰已則衰服猶應其言示所以不非也按史記作孔子要絰而往陽貨絀之而退竟為實事誤又要絰一作要經猶帶經也劉氏曰嗜學之意亦誤孔子既祥五日彈琴而不成聲十日而成笙歌禮記孔子觀于魯桓公之廟有欹器焉問于守廟者曰此為何器對曰蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆顧謂弟子曰試注水焉乃注之水中則正滿則覆孔子喟然歎曰嗚呼夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以讓勇力撫世守之以怯富有四海守之以謙此所謂損之又損之道也荀子家語同文子三皇五帝有戒之器命曰侑巵其沖即正其盈即覆孔子學琴于師襄子襄子曰子于琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣曰丘未得其志也有間曰已習其志可以益矣曰丘未得其為人也有間孔子繆然思焉有所睪然髙望而逺眺曰丘殆得其為人矣近黮而黑頎然長曠如望羊奄有四方非文王其孰能為此師襄子避席葉拱而對曰子聖人也其傳曰文王操史以學琴次擊磬于衛之下蓋聨類而然也韓詩外傳師襄子曰敢問何以知其文王之操也孔子曰然夫仁者好偉和者好粉智者好彈有殷勤之意者好麗丘是以知文王之操也仲孫何忌仲孫説並僖子之子受孟僖子之命學禮于孔子孔子謂仲孫説曰吾聞老𥅆通禮樂之原明道德之歸則吾師也今將往仲孫説曰謹受命乃言于魯君曰臣受先臣之命云孔子聖人之後也臧孫紇有言曰聖人之後若不當世必有達者孔子少而好禮其將在矣汝必師之今孔子將適周觀先王之制君盍以乘資之臣請與往公曰諾與孔子車一乘馬二匹豎子侍御仲孫説與俱至周問禮于老𥅆訪樂于萇𢎞厯郊社考明堂察廟朝于是喟然歎曰吾乃今知周公之聖與周之所以王也家語萇𢎞語劉文公劉蚠曰吾觀孔仲尼有聖人之表河目而隆顙黃帝之形貌也修肱而龜背長九尺有六寸成湯之容體也史記孔子長九尺有六寸人皆謂之長人而異之春秋演孔圖孔子長十尺大九圍坐如蹲龍立如牽牛望之如昂如斗緯書有四十二表之異列子孔子之徑能拓國門之關而不肯以力聞淮南子孔子之通智過于萇𢎞勇服于孟賁足躡郊兔力招城關能亦多矣而勇力不聞伎巧不知専行教道以成素王並荒謬不足信然言稱先王躬履謙讓洽聞強記博物不窮抑亦聖人之興者乎劉文公曰方今周室衰微而諸侯力爭孔丘布衣聖將安施萇𢎞曰堯舜文武之道或弛而墜禮樂崩喪亦正其統紀而已矣既而孔子聞之曰吾豈敢哉亦好禮樂者也孔叢子家語孔子觀乎明堂覩四門墉有堯舜之容桀紂之象而各有善惡之狀興廢之誡又有周公相成王抱之負斧扆南面以朝諸侯之圖孔子徘徊而望之謂從者曰此周之所以盛也又曰孔子觀周入太祖后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒勿行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰不滅炎炎若何涓涓不塞終為江河綿綿不絶或成網羅亳末不札將尋斧柯誠能慎之福之根也曰是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆或之我獨不徙內藏我智不示人技我雖尊髙人弗我害誰能如此江海雖左長于百川以其卑也天道無親而能下人戒之哉孔子既讀斯文顧謂弟子曰小子識之此言實而中情而信自周反于魯弟子稍益進史記于適周之上謂孔子為司空已而去魯斥乎齊逐乎宋衛困于陳蔡之間由是反魯又謂孔子年十七孟釐子病且死誡其嗣懿子師孔子以昭公二十四年事繫諸七年之下並舛誤今正之是時也晉平公淫六卿擅權東伐諸侯楚靈王兵疆陵轢中國齊大而近于魯魯小弱附楚則晉怒附晉則楚來伐不備于齊齊師侵魯魯昭公之二十年孔子蓋三十一矣史作三十齊景公與晏嬰來適魯景公問孔子曰昔秦穆公國小處僻其霸何也對曰秦國雖小其志大處雖辟行中正身舉五羖爵之大夫與語三日授之以政以此取之雖王可也其霸小矣景公説孔子年三十六史記作三十五季孫意如與郈昭伯以鬭雞故得罪昭公公率師擊意如意如與孟氏叔孫氏三家共攻公公師敗奔于齊齊處公于鄆史記作乾侯誤乾侯晉地魯亂孔子適齊史記世家吕氏春秋季孫氏劫公家孔子欲諭術則見外于是受養而便説魯國以訾孔子曰龍食乎清而遊乎清螭食乎清而遊乎濁魚食乎濁而遊乎濁今丘上不及龍下不若魚丘其螭邪夫欲立功者豈得中繩哉救溺者濡追逃者趨孔叢子季桓子以粟千鍾餼孔子孔子受之而不辭既而以頒門人之無者子貢曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰夫受人財不以成富與季孫之惠于一人豈若惠數百人哉齊景公讓登孔子降一等景公三辭然後登既坐曰夫子降德辱臨寡人寡人以為榮也而降階以逺自絶于寡人寡人未知所以為罪孔子曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君私之其若義何孔叢子史記孔子適齊為髙昭子家臣欲以通乎景公説謬不知所本景公問政孔子孔子曰君君臣臣父父子子當此之時陳恆制齊故以此對景公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸他日又復問政于孔子孔子曰政在節財景公説史記世家景公致廩丘以為養孔子辭不受出謂弟子曰吾聞君子當功以受祿今説景公景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行説苑晏子仲尼見景公景公説之欲封之爾稽以告晏子晏子曰不可自大賢之滅周室之卑也威儀加多而民行滋薄聲樂繁充而世德滋衰今孔丘盛聲樂以侈世飾弦歌鼓舞以聚徒繁登降之禮趨翔之節以觀衆傳學不可以儀世勞思不可以補民兼夀不能殫其教當年不能究其禮今欲封之以侈齊國之俗非所以導衆存民也公曰善于是厚其禮而留其敬不問其道孔子乃行又曰景公上路寢聞哭聲曰何謂者也梁丘據對曰魯孔丘之徒鞠語者也明于禮樂審于服喪母死葬埋甚厚服喪三年哭泣甚疾公曰豈不可哉而色説之晏子曰古者聖人非不知繁登降之禮制規矩之節以教民以為煩人留日故制禮不羡于便事非不知揚干戚鐘鼓以勸衆以為費財留工故制樂不羡于和民非不知纍世殫國以奉死哭泣處哀以持久知無補死者而深害生者故不以導民三者聖王之所禁也賢人不用德毁俗流故三邪得行于世公曷為不察而色説之墨子略同史記景公欲以尼溪田封孔子晏子阻之説亦同且曰齊大夫欲害孔子按諸説謬悠殊甚墨子無論己晏子當時賢者與孔子相友善寧有是耶廩丘之祿孔子自辭説為近之反乎魯孔子年四十三史記作四十二魯昭公薨于乾侯定公即位季孫斯嬖臣仲梁懷與陽虎有隙陽虎執懷季孫斯怒陽虎因囚斯與盟而醳之陽虎由此輕季氏季氏亦僭于公室陪臣執國政是以魯自大夫以下皆僭離于正道故孔子不仕退而修詩書禮樂弟子彌衆至自逺方莫不受業焉定公八年公山不狃不得意于季氏因陽虎為亂陽虎不勝奔于齊公山不狃以費畔史記定公九年陽虎不勝奔于齊是時孔子年五十按以襄公二十二年孔子生故每少一嵗至上文云孔子年四十二昭公卒是定公元年孔子年四十三九年當是五十一而云五十是又少一嵗矣且陽虎奔齊即八年事作九年亦誤使人召孔子孔子欲往子路不説止孔子孔子曰夫召我者豈徒哉如用我其為東周乎然亦卒不行史記此上有周文武起豐鎬而王今費雖小儻庶幾乎之文桓談以為誣是也後定公以孔子為中都宰四方皆則之由中都宰為司冦史記世家家語孔子為中都宰制養生送死之節長幼異食強弱異任男女别塗路無拾遺器不雕偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉定公曰學子此法以治魯國何如孔子對曰雖天下可乎于是二年定公以為司空乃别五土之性而物得所生之宜季氏葬昭公于墓道之南孔子溝而合諸墓謂季桓子曰合之所以掩夫子之不臣由司空為大司冦設法而不用無姦民史記亦曰由中都宰為司空由司空為大司冦符子魯侯欲以孔子為司徒將召三桓議之謂左丘明曰寡人欲以孔子為司徒而授以政將欲謀諸三子左丘明曰孔丘其聖人與夫聖人佐政過者離位焉雖欲謀其將弗合乎魯侯曰吾子奚以知之左丘明曰周人欲為千金之裘而與狐謀其皮具少牢之珍而與羊謀其羞言未卒狐相率逃于重丘之下羊相呼藏于深林之中何者謀失之矣今君欲以孔丘為司徒召三桓而謀之亦與狐謀裘與羊謀羞哉于是魯侯遂不與三桓謀而召孔子為司徒按司徒司馬司空者三卿也司冦實大夫不得與三卿並且諸説無為司徒司空事左傳孔子之為司冦也溝而合諸墓而家語以為司空時蓋史踵家語之妄而誤而符子司徒之説為尤誤也命之曰宋公之子弗甫有孫魯孔丘命爾為司冦孔子曰弗甫敦及厥辟將不堪公曰不妄韓詩外傳荀子孔子為魯司冦有父子訟者孔子拘之三月不别其父請止孔子舍之季孫聞之不説曰是老也欺豫語豫曰為國家必以孝今殺一人以戮不孝又舍之冉子以告孔子歎曰嗚呼上失之下殺之其可乎不教其民而聽其獄殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也嫚令謹誅賊也斂也無時暴也不教而責成功虐也已此三者然後刑可即也書曰義刑義殺勿庸以即豫維曰未有順事言先教也韓詩外傳家語略同家語孔子為司冦斷獄訟皆進衆議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰當從某子幾是説苑同春秋繁露孔子為司冦斷獄屯屯與衆共之不敢自専是以死者不恨生者不怨定公十年夏公會齊侯于夾谷孔子相犂彌言于齊侯曰孔丘知禮而無勇若使菜人以兵劫魯侯必得志焉齊侯從之孔子以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好于神為不祥于德為愆義于人為失禮君必不然齊侯聞之遽辟之將盟齊人加于載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔子使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其己也乃不果享齊人來歸我鄆歡龜隂之田榖梁頰谷之會孔子相焉兩君就壇兩相相揖齊人鼓噪而起欲以執魯君孔子厯階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷會齊人使優施舞于魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆歡龜隂之田蓋為此也史記世家略同正義魯築城以旌孔子功因名謝城十二年將墮三都于是叔孫氏墮郈季氏墮費將墮成公斂處父不墮冬十二月公圍成弗克左傳公羊傳孔子行乎季孫三月不違曰家不藏甲邑無百雉之城于是帥師墮郈帥師墮費注云二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長數叛者坐邑有城池之固家有甲兵之藏故也季孫説其言而墮之家語遂墮三都誤史記世家在十三年亦誤十三年孔子由大司冦攝行相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎于是誅魯大夫亂政者少正卯荀子孔子誅少正卯家語孔子朝政七日而誅少正卯戮之于兩觀之下尸于朝三日子貢進曰少正卯魯之聞人也今夫子為政始誅之或者為失乎孔子曰天下有大惡者五而竊盜不與焉心逆而險行僻而堅言偽而辨記醜而博順非而澤此五者有一則不免于君子之誅而少正卯皆有之不可以不除按朱子以論語左傳不載子思孟子不言疑無其事新論少正卯在魯與孔子同時孔子門人三盈三虛唯顔淵不去獨知聖人之德也夫門人去仲尼而皈少正卯非不知仲尼之聖亦不知少正卯之佞説尤舛謬與聞國政三月鬻羔豚者弗飾賈男女行者别於塗塗不拾遺四方之客至乎邑者不求有司皆豫之以歸史記世家孔子始用于魯魯人鷖誦之曰麛裘而鞞投之無戾鞞之麛裘投之無郵三年民又作誦曰男子行乎塗右女子行乎塗左財物之遺者民莫之舉孔叢子吕氏春秋同家語初魯之販羊有沈猶氏者常朝飲其羊以詐市人有公慎氏者妻淫不制有慎潰氏者奢侈踰法鬻六畜者飾之以儲賈及孔子為政沈猶氏不朝飲其羊公慎氏出其妻慎潰氏越境而徙三月鬻牛馬者不儲賈賣羊豚者不加飾男尚忠信女尚貞順齊人聞而懼曰孔子為政必霸霸則吾地近焉我之為先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎于是選齊國中女子好者八十人皆衣文衣而舞康樂家語作容璣舞名也文馬三十駟遺魯君陳女樂文馬于魯城南髙門外季孫斯微服往觀再三將受乃語魯君為周道遊往觀終日怠于政事仲由曰夫子可以行矣孔子曰魯今且郊如致膰乎大夫則吾猶可以止季孫斯卒受齊女樂三日不聽政郊又不致膰俎于大夫孔子遂行宿乎屯而師己送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗蓋優哉遊哉維以卒嵗師已反季孫斯曰孔子亦何言師已以實告斯喟然歎曰夫子罪我以羣婢故也史記世家在十四年年表在十二年並誤當在十三年琴操季桓子受女樂孔子欲諫不得退而望魯龜山作龜山操曰豫欲望魯兮龜山蔽之手無斧柯奈龜山何孔子遂適衛主顔讐由家彌子之妻與子路之妻兄弟也史記世家作子路妻兄顔濁鄒今從孔子衛靈公問孔子居魯得祿幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譛孔子于靈公靈公使公孫余假一出一入謂以兵仗出入也孔子恐獲罪居十月去衛將適陳過匡顔刻為僕以其䇿指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人于是遂止孔子孔子狀類陽虎拘焉史記世家仲由彈劒而歌孔子和之曲三終匡人解圍而去家語史記孔子使從者為寧武子臣于衛然後得去按寧武子當衛文公時至靈公已百四十年是史誤也韓詩外傳簡子將殺陽虎孔子似之帶甲以圍孔子舍子路愠怒奮戟將下孔子止之曰由何仁義之寡裕也夫詩書之不習禮樂之不講是丘之罪也吾非陽虎而以我為陽虎則非丘之罪也命也子歌我和若子路歌孔子和之三終而圍解琴操孔子到匡郭外顔淵舉䇿指匡穿垣曰往與陽貨正從此入匡人聞其言告君曰往者陽貨今復來乃率衆圍孔子數日乃和琴而歌音曲甚哀有暴風擊軍士僵仆于是匡人乃知孔子聖人自解也去即過蒲月餘反乎衛主蘧瑗家靈公之夫人南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環珮玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不説孔子矢之曰豫所不者天厭之天厭之居衛月餘靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖市過之孔子醜之去衛過曹是嵗魯定公薨孔子去曹適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去弟子曰可以速矣孔子曰天生德于豫桓魋其如豫何家語孔子見宋君君問孔子曰吾欲使長有國而列都得之欲使民無惑使士竭力使日月當時聖人自來官府治理為之奈何孔子曰丘聞之鄰國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之祿則皆竭力尊天敬鬼則日月當時崇道貴德則聖人自來任能黜否則官府治理宋君曰善哉寡人不佞不足以致之孔子曰此事非難唯欲行之孔子適鄭與弟子相失孔子獨立郭東門鄭人家語作姑布子卿或謂子貢曰東門有人其顙似堯其項類皋陶其肩類子産然自要以下不及禹三寸纍纍若喪家之狗子貢以實告孔子孔子欣然笑曰形狀末也而似喪家之狗然哉然哉韓詩外傳孔子出衛之東門曰二三子引車避有人將來相我姑布子卿亦曰二三子引車避有聖人將來孔子下步姑布子卿迎而視之五十步從而望之五十步顧子貢曰是何為者也子貢曰賜之師也所謂魯孔丘也曰賜之師何如姑布子卿曰得堯之顙舜之目禹之頸皋陶之喙從前視之盎盎乎似有土者從後視之髙肩弱脊此惟不及四聖者也曰子何患焉汗面而不惡葭喙而不藉逺而望之羸乎若喪家之狗子何患焉子貢以告孔子孔子獨辭喪家之狗曰丘何敢乎子貢曰汗面而不惡葭喙而不藉賜以知之矣不知喪家狗何足辭也子曰賜汝獨不見夫喪家之狗歟既斂而椁布器而祭顧望無人意欲施之上無明王下無賢士方伯王道衰政教失強陵弱衆暴寡百姓縱心莫之綱紀是人固以丘為欲當之者也丘何敢乎孔子遂至陳主于司城貞子家孔叢子陳惠公大城因起凌陽之臺未終而坐法死者數十人又執三監吏夫子適陳聞之見陳侯與俱登臺而觀焉夫子曰美哉斯臺自古聖王之為城臺未有不戮一人而能致功若此者陳侯遂竊赦所執吏既而見夫子問曰昔周作靈臺亦戮人乎答曰文王之興附者六州六州之衆各以子送來故區區之臺未及期日而成何戮之有嵗餘有隼集于陳廷而死楛矢貫之石砮矢長尺有咫陳湣公家語國語並作惠公惠公于定公四年已前卒湣公是使使問孔子孔子曰隼來逺矣此肅慎之矢也昔武王克商通道九夷百蠻使各以其方賄米貢使無忘職業于是肅慎貢楛矢石砮長尺有咫先王欲昭其令德以肅慎矢分大姬配虞胡公而封諸陳分同姓以珍玉展親分異姓以逺方職使無忘服故分陳以肅慎矢試求之故府果得之國語同又曰吳伐越墮會稽獲骨焉節専車吳子使來好聘且問之仲尼曰敢問骨何為大仲尼曰丘聞之昔禹致羣神于會稽之山防風氏後至禹殺而戮之其骨節専車此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神社禝之守為公侯皆屬于王者客曰防風氏何守也仲尼曰汪芒氏之君也守封隅之山者也為漆姓在虞夏商為汪芒氏于周為長翟今為大人客曰人長之極幾何仲尼曰焦僥氏長三尺短之至也長者不過十尺數之極也國語季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪曰夔蝄蜽水之怪曰龍罔象土之怪曰墳羊韓詩外傳魯哀公穿井得一玉羊孔子見之曰水之精為玉土之精為羊此羊得之井中在水土之際其身玉其肝土也殺之果然家語楚王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問羣臣莫之能識使使聘于魯問孔子子曰萍實也可剖而食之使者反王食之大美魯大夫因子遊問曰何以知其然乎曰吾昔之鄭過乎陳之野聞童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜吾是以知之家語齊有一足鳥飛集于公朝下止于殿前舒翅而跳齊侯大怪之使使聘魯問孔子孔子曰此名商羊水祥也昔童兒有屈一腳振肩而跳且謡曰天將大雨商羊鼓舞今齊有之其應至矣急告民趨治溝渠修隄防頃之大霖雨水溢泛唯齊有備不敗景公曰聖人之言信而有徵衝波傳有鳥九尾人以問孔子曰鶬也子夏曰何以知之孔子曰河上之歌曰鶬兮鶬兮逆毛衰兮一身九尾長兮論衡孔子未嘗見狌狌至輒能名之孔子名狌狌聞昭人之歌按孔子言行師表萬世多聞其末也姑識數端如左他如抱朴子之紫文金簡吳越春秋之靈寶五符語並荒誕不足録家語五帝德傳會戴記亦削之尚史卷八十一
