body:
  text: 尚史卷三十列傳八鑲白旗漢軍李鍇撰魯諸臣傳上司空無駭夷伯附展禽展喜附無駭者公子展孫也為魯司空隠公二年無駭帥師入極八年卒公子翬請謚與族公命以字為展氏左傳其後有夷伯者為魯大夫僖公十五年九月晦震夷伯之廟是也展獲即展禽字季栁下其邑恵其謚也亦無駭之後僖公二十六年齊孝公伐我臧孫辰欲以辭告病焉問于展獲對曰獲聞之處大教小處小事大所以禦亂也不聞以辭若為小而崇以怒大國使加已亂亂在前矣辭其何益臧孫辰曰國急矣百物唯其可者將無不趨也願以子之辭行賂焉其可乎獲使展喜韋昭注乙喜魯大夫展喜也以膏沐犒師國語齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以紏合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還左傳海鳥曰爰居止于魯東門之外二日臧孫辰使國人祭之獲曰越哉臧孫之為政也夫祀國之大節也而節政之所成也故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也法施于民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典昔烈山氏之有天下也其子曰柱能殖百榖百蔬夏之興也周棄繼之故祀以為稷共工氏之伯九有也其子曰后土能平九土故祀以為社黄帝能成命百物以明民共財顓頊能修之帝嚳能序三辰以固民堯能單均形法以儀民舜勤民事而野死鯀鄣洪水而殛死禹能以徳修鯀之功契為司徒而民輯冥勤其官而水死湯以寛治民而除其邪稷勤百榖而山死文王以文昭武王去民之穢故有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊冥而宗湯周人禘嚳而郊稷祖文王而宗武王幕能帥顓頊者也有虞氏報焉杼能帥禹者也夏后氏報焉上甲㣲能帥契者也啇人報焉髙圉大王能帥稷者也周人報焉凡禘郊宗祖報此五者國之典祀也加之以社稷山川之神皆有功烈于民者也及前哲令徳之人所以為明質也及天之三辰民所以瞻仰也及地之五行所以生殖也及九州名山川澤所以出財用也非是不在祀典今海鳥至已不知而祀之以為國典難以為仁且知矣夫仁者講功而知者處物無功而祀之非仁也不知而不問非知也今兹海其有災乎夫廣川之鳥獸恒知而避其災也是嵗也海多大風冬煗夏父弗忌為宗將躋僖公有司不可弗聴獲曰夏父弗忌必有殃夫宗有司之言順矣僖又未有明焉犯順不祥以逆訓民亦不祥易神之班亦不祥不明而躋之亦不祥犯鬼道二犯人道二能無殃乎侍者曰若有殃焉在抑形戮也其夭札也曰未可知也若血氣强固將夀寵得沒雖夀而沒不為無殃既其𦵏也焚烟徹于上國語齊攻魯求岑鼎公載他鼎以徃齊侯弗信而反之為非使人告公曰栁下季以為是請因受之公請于獲獲曰君之賂以欲岑鼎也以免國也臣亦有國于此破臣之國以免君之國此臣之所難也于是公以真鼎徃也吕氏春秋公甞問于獲曰我欲攻齊何如獲對曰不可退而有憂色曰吾聞之也謀伐國者不問于仁人此何為至于我也春秋繁露獲甞處魯三黜而不去其妻曰無乃瀆乎獲曰油油之民將䧟于害吾能已乎且彼為彼我為我彼雖祼䄇安能汚我油油然與之處仕于下位獲卒門人將誄之其妻曰將誄夫子之徳邪則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從容不彊察兮䝉耻救民徳彌大兮雖遇三黜終不蔽兮愷悌君子永能厲兮嗟乎惜哉乃下世兮庶幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之謚宜為惠兮門人從之以為誄莫能竄一字列女傳風俗通栁下惠不枉道以事人故三黜而不去孔子以為不恭符子鄰人謂展禽曰夫子三黜無憂何也禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯枯茂非四時之悲欣榮辱豈吾心之憂喜韓詩外傳栁下惠殺身以成其信家語魯人有獨處室者鄰之釐婦亦獨處一室夜暴風雨至婦室壊趨而託焉魯人閉戸不納釐婦自牖與之言子何不仁而不納我魯人曰吾聞男女不六十不同居今子㓜吾亦㓜是以不敢納也婦曰子何不如栁下恵然嫗不建門之女國人不稱其亂魯人曰栁下恵則可吾固不可吾將以吾之不可學栁下恵之可孔子聞之曰善哉欲學栁下恵者未有似于此者期于至善而不襲其為可謂智乎毛詩傳顔叔子獨處于室鄰之釐婦亦獨處于室夜暴風雨至而屋壊婦趨而子叔子納之使執燭放于旦蒸盡縮屋而繼之自以為避嫌之不審矣論曰若展季其人者吾欲從之游得乎不徼世不抗俗屈柔從容而自㓗非所謂持已有恒者乎臧孫書其言棄其人無後于魯宜哉公子彄即臧僖伯臧孫達哀伯臧孫辰文仲臧孫許宣叔臧孫紇武仲臧賈附臧為臧堅臧昭伯臧㑹臧賓如附臧石公子彄者孝公子臧僖伯也為魯大夫隠公五年公將如棠觀魚彄諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民于軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苗秋獮冬狩皆于農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登于爼皮革齒牙骨角毛羽不登于器則君不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將畧地焉遂徃陳魚而觀之彄稱疾不從冬十二月彄卒公曰叔父有憾于寡人寡人弗敢忘𦵏之加一等左傳謚曰僖子達嗣臧孫達僖伯子哀伯也桓公二年宋華督弑殤公以郜大鼎賂我公納于大廟達諌曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲㳺纓昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鸞和鈴昭其聲也三辰旂旗昭其明也夫徳儉而有度登降有數文物以紀之聲明以發之以臨照百官百官于是乎戒懼而不敢易紀律今滅徳立違而寘其賂器于大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器于大廟其若之何公不聴周内史聞之曰臧孫達其有後于魯乎君違不忘諌之以徳左傳卒謚曰哀孫辰嗣臧孫辰哀伯孫伯氏瓶之子文仲也為魯大夫莊公十一年宋大水公使弔焉曰天作滛雨害于粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱辰曰宋其興乎禹湯罪已其興也浡焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶㡬乎既而聞之曰公子御説之辭也曰是宜為君有恤民之心左傳二十八年魯饑辰言于公曰夫為四鄰之援結諸侯之信重之以婚姻申之以盟誓固國之艱急是為鑄名器藏寳財固民之殄病是待今國病矣君盍以名器請糴于齊公曰誰使對曰國有饑饉卿出告糴古之制也辰也備卿辰請如齊公使徃從者曰君不命吾子吾子請之其為選事乎辰曰賢者急病而讓夷居官者當事不避難在位者恤民之患是以國家無違今我不如齊非急病也在上不恤下居官而惰非事君也以鬯圭玉磬如齊告糴曰天災流行戾于敝邑饑饉薦䧏民羸㡬卒大懼殄周公大公之命祀職貢業事之不共而獲戾不腆先君之敝器敢告滯積以紓執事以救敝邑使能共職豈唯寡君與二三臣實受君賜其周公大公及百辟神祗實永饗而賴之齊人歸其玉而予之糴國語僖公二十年宋襄公欲合諸侯辰聞之曰以欲從人則可以人從欲鮮濟二十一年大旱僖公欲焚巫尫辰曰非旱備也脩城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之二十二年春伐邾取湏句秋八月邾人以湏句故出師公卑邾不設備而禦之辰曰國無小不可易也無備雖衆不可恃也詩曰戰戰競競如臨深淵如履薄冰又曰敬之敬之天惟顯思命不易哉先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聴我師敗于升陘二十四年襄王以太叔之難出居鄭使來告難曰不榖不徳得罪于母弟之寵子帶鄙在鄭地汜敢告叔父辰對曰天子䝉塵于外敢不奔問官守左傳三十年晉人執衞成公使醫鴆之不死醫亦不誅辰言于公曰夫衞君殆無罪矣刑五而已無有隠者隠乃諱也大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚笮薄刑用鞭朴以威民也故大者陳之原野小者致之市朝五刑三次是無隠也今晉人鴆衛侯不死亦不討其使者諱而惡殺之也有諸侯之請必免之臣聞之班相恤也故能有親夫諸侯之患諸侯恤之所以訓民也君盍請衞君以示親于諸侯且以動晉夫晉新得諸侯使亦曰魯不棄其親其亦不可以惡公説行玉二十㲄乃免衞侯自是晉聘于魯加于諸侯一等爵同則厚其好貨衞侯聞其為臧孫辰之為也使納賂焉辭曰外臣之言不越境不敢及君三十一年晉文公解曹地以分諸侯公使辰徃宿于重館重舘人告曰晉始伯而欲固諸侯故解有罪之地以分諸侯諸侯莫不望分而欲親晉皆將争先晉不以故班亦必親先者吾子不可以不速行魯之班長而又先諸侯其誰望之若少安恐無及也從之獲地于諸侯為多反既復命為之請曰地之多也重舘人之力也臣聞之曰善有章雖賤賞也惡有釁雖貴罸也今一言而辟境其章大矣請賞之乃出而爵之海鳥曰爰居止于魯東門之外辰使國人祭之展禽非之辰聞之曰信吾過也季子之言不可不法也使書以為三筴國語三十三年齊國歸父來聘自郊勞至于贈賄禮成而加之以敏辰言于公曰國子為政齊猶有禮君其朝焉臣聞之服于有禮社稷之衞也文公十年卒左傳謚曰文子許嗣臧孫許是為臧宣叔文仲子為魯司㓂宣公十八年公孫歸父以其父遂之立公也有寵欲去三桓以張公室宣公薨季孫行父欲追罪遂許怒曰當其時不能治也後之人何罪子欲去之許請去之成公元年齊將出楚師魯懼許及晉侯盟于赤棘冬許令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞二年齊頃公伐我取龍南侵及巢邱又敗衛孫良夫于新築良夫如晉乞師許亦如晉乞師晉以八百乗救魯衛許逆晉師且道之季孫行父帥師㑹之六月敗齊師于鞌晉使齊人歸我汶陽之田冬楚侵衛遂侵我師于蜀使許徃辭曰楚逺而久固將退矣無功而受名臣不敢乃使公孫蔑徃賂之公衡成公子為質以請盟楚人許平楚師及宋公衡逃歸許曰衡父不忍數年之不宴以棄魯國國將若之何誰居後之人必有任是夫國棄矣三年晉使荀庚來聘且尋盟衛使孫良夫來聘且尋盟成公問諸許曰中行伯即荀庚之于晉也其位在三孫子之于衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛四年卒左傳謚曰宣子紇嗣臧孫紇宣叔子宣叔取于鑄生臧賈臧為鑄女死繼室以其姪穆姜之姨子也生紇長于公宫姜氏愛之故立之是為武仲成公十八年楚伐宋晉將救之士魴來乞師季孫行父問師數于紇對曰伐鄭之役知伯實來下軍之佐也今彘季即士魴亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之襄公四年陳成公卒楚人將伐陳聞䘮乃止陳人不聴命紇聞之曰陳不服于楚必亡大國行禮焉而不服在大國猶有咎而况小乎冬十月邾人莒人伐鄫紇救鄫侵邾敗于狐駘國人誦之曰臧之狐裘敗我于狐駘我君小子朱儒是使朱儒朱儒使我敗于邾十一年晉悼公帥諸侯伐鄭鄭人行成十二月㑹于蕭魚晉侯使叔肹告于諸侯襄公使紇對曰凡我同盟小國有罪大國致討茍有以藉手鮮不赦宥寡君聞命矣十三年將城防紇請俟畢農事冬乃城防十四年衛孫林父逐獻公獻公在郲紇如齊唁之衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展獻公弟公子鱄聞之見紇與之言道紇説謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎十七年齊伐我圍桃髙厚圍紇于防我師自陽闗逆紇至于旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅臧堅者臧紇之族也齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮于士以杙抉其傷而死公㑹晉圍齊焚其雍門及西郭南郭東郭北郭十九年季孫宿以所得于齊之兵作林鍾而銘魯功焉紇謂季孫曰非禮也夫銘天子令徳諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彞器銘其功烈以示子孫昭明徳而懲無禮也今將借人之力以救其死若之何銘之小國幸于大國而昭所獲焉以怒之亡之道也二十一年邾庶其以漆閭邱來奔季孫宿以公姑姊妻之皆有賜于其從者于是魯多盗宿謂紇曰子盍詰盗紇曰不可詰也紇又不能宿曰我有四封而詰其盗何故不可子為司㓂將盗是務去若之何不能紇曰子召外盗而大禮焉何以止吾盗子為正卿而來外盗使紇去之將何以能庶其竊邑于邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盗禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劒帶是賞盗也賞而去之其或難焉紇也聞之在上位者洒濯其心壹以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎古文𤨏語魯國多盗季康子治之獲一人焉詰之曰汝胡以盗對曰此猶蟻羶也慕羶而附寧可已邪子大夫為政不能不盗何以詰吾盗栁下跖魯之民盗也嘯其徒驪山之陽抉人肝而食之而邑宰不得問也陽貨魯之家盗也國命出其手叛費囚桓寳玉大弓先王所遺貨偃然竊以逋也而子大夫不得問也子大夫魯之國盗也政為家事賦為家賦藐然魯君如無有焉而魯君不得問也魯君魯之大夫也乾侯之難亦唯季孫意如之故不得政其終魯君靦然不斥季孫之立而以為身則魯何以有王章也逐一君復易一君而周天子不得問也吾儕小人其何知知則于人而已矣詰安用之季孫宿無適子公彌長而愛悼子紇欲立之訪于紇紇曰飲我酒吾為子立之季氏飲大夫酒紇為客既獻紇命北面重席新樽絜之召悼子紇降逆之大夫皆起及旅而後召公彌使與之齒公彌由是怨紇仲孫速亦惡之而季孫宿愛之仲孫速疾孟氏之御騶豐㸃謂公彌曰茍立庶子羯仲孫速之子請讎臧氏二十三年八月仲孫速卒公彌言于季孫宿廢其孺子秩而立羯紇入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何紇曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告于季孫宿曰臧氏將為亂不使我𦵏季孫宿不信紇聞之戒冬十月孟氏將辟辟穿藏也藉除于臧氏借除借人除𦵏道紇使正夫助之除于東門甲從已而視之孟氏又告季孫宿宿怒命攻臧氏紇斬鹿門之闗以出奔邾紇之立也臧賈臧為出在鑄及是紇自邾使告臧賈且致大蔡焉曰紇不侫失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可臧賈曰是家之禍也非子之故也賈聞命矣再拜受龜使臧為以納請臧為遂自為請也紇如防使來告曰紇非能害也知不足也非敢私請茍守先祀無廢二勲敢不辟邑乃立臧為紇致防而奔齊左傳仲尼曰臧武仲雖曰不要君吾不信也魯論齊侯將為臧紇田紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫鼠晝伏夜動不穴于寢廟畏人故也今君聞晉之亂而後作焉寧將事之非䑕如何乃弗與田仲尼曰知之難也有臧武仲之知而不容于魯國抑有由也作不順而施不恕也夏書念兹在兹順事恕施也昭公十年季孫意如伐莒取郠獻俘始用人于亳社紇在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰徳音孔昭視民不佻佻之謂甚矣而壹用之將誰福哉左傳卒謚曰武臧昭伯者名未詳臧為子昭公二十五年臧昭伯如晉昭伯從弟臧㑹竊其寳龜句僂以卜為信與僭僭不信也僭吉臧氏老將如晉問㑹請徃昭伯問家故盡對及内子與母弟叔孫則不對再三問不對及郊㑹逆問又如初至次于外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉計于季氏臧氏使五人以戈楯㐲諸桐汝之間㑹出逐之反奔執諸季氏中門之外季孫意如怒曰何故以兵入吾門拘臧氏老將禘于襄公萬者二人其衆萬于季氏臧昭伯曰此之謂不能庸先君之廟季臧遂有隙及昭公將伐季氏以告臧孫以難告郈孫郈昭伯也郈孫以可勸九月遂伐季氏㑹孟孫叔孫氏救季氏伐公徒公與臧孫如墓謀遂行孫于齊次于陽州臧昭伯率徒者將盟載書曰戮力壹心好惡同之信罪之有無繾綣從公無通外内子家羈曰通外内而去君君將速入弗通何為而何守焉乃不與盟昭伯既從公孫于齊意如立臧㑹㑹曰句僂不余欺也臧㑹子曰賔如哀公八年及齊平臧賔如如齊涖盟賔如子曰臧石哀公二十四年晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取榖宣叔以晉師伐齊取汶陽寡君欲徼福于周公願乞靈于臧氏臧石帥師㑹之取廪邱晉師還餼臧石牛謝之曰以寡君之在行牢禮不度敢展謝之左傳論曰宋華魯桓罪均也哀伯争器以正名正華適所以正桓俾不納鼎庸可冀乎然可謂善述者矣紇曰多聞乃祖祖知無基而厚墉墉之崩徴臧氏之敗也衆仲衆仲魯大夫隠公四年衛州吁弑桓公而立時宋公子馮在鄭鄭人欲納之州吁使告于宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從宋人許之于是伐鄭圍其東門五日而還公問于衆仲曰衛州吁其成乎對曰臣聞以徳和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民于是乎不務令徳而欲以亂成必不免矣五年九月考仲子桓公母之宫將萬焉公問羽數于衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之于是初獻六羽始用六佾八年齊平宋衛于鄭使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之恵也寡君聞命矣敢不承受君之明徳公子展之孫無駭卒公子翬請謚與族公問族于衆仲衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為謚因以為族官有世功則有官族邑亦如之公命以字為展氏左傳申繻豎曼附申繻魯大夫桓公六年子同生同莊公名公問名于申繻對曰名有五有信有義有象有假有類以名生為信以徳命為義以類命為象取于物為假取于父為類不以國不以官不以山川不以隐疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同十八年公將有行與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗不聴齊侯通文姜使彭生乗公公薨于車管子公將如齊與夫人偕行申俞諫不聴齊公子彭生乗魯侯脅之薨于車豎曼曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二于君無盡言而䛕行以戱我君使我君失親戚之禮命又力成吾君之禍以構二國之怨彭生其得免乎魯若有誅必以彭生為説莊公十四年鄭傅瑕殺鄭子及其二子而納厲公初内蛇與外蛇鬬于鄭南門中内蛇死六年而厲公入公聞之問于申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖左傳施父施伯施父恵公之子為魯大夫桓公九年曹大子來朝享之初獻樂奏而歎施父曰曹大子其有憂乎非歎所也明年曹桓公卒左傳施父子施伯事莊公莊公九年齊桓公既入使請管夷吾于我曰寡君有不令之臣在君之國欲以戮于羣臣故請之公以問施伯施伯對曰此非欲戮之也欲用其政也夫管子天下才也所在之國則必得志于天下令彼在齊則必長為魯國憂矣公曰若何曰殺而以其屍授之公將殺夷吾齊使請曰寡君欲親以為戮若不生得以戮于羣臣猶未得請也請生之于是束縛以與之齊果任之用覇諸侯國語管子鮑叔請管仲于魯施伯曰勿予非戮之也將用其政也殺而授之其屍魯君將殺管仲鮑叔進曰寡君願生得之以徇于國為羣臣戮魯君乃遂束縛以予齊鮑叔受而哭之三舉施伯從而笑之謂大夫曰管仲必不死夫鮑叔之忍不僇賢人其智稱賢以自成也鮑叔相小白先入管仲召忽奉子糺後入與魯以戰能使魯敗得天與失天其人事一也今魯殺子糺召忽囚管仲以與齊鮑叔知無後事必將勤管仲以勞其君以顯其功衆必予之有得力死之功猶尚可加也顯生之功將何如是昭徳以貳君也鮑叔之智不是失也又曰桓公問于鮑叔曰何以定社稷曰得管仲與召忽則社稷定矣亟召則可不亟不得也施伯進對魯君曰管仲有急其事不濟今在魯君其致魯之政焉受之則齊可弱也不受則殺之以説于齊魯未及致政而齊使至魯君問施伯施伯曰君與之管仲天下之大聖也反齊天下皆鄉之豈猶魯乎今若殺之此鮑叔之友也鮑叔因此以作難君必不能待也不如與之二説自異曹劌公子偃附縣賁父㣲虎曹劌魯士史記作曹沫莊公十年春齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢尃也必以分人對曰小恵未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乗戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有㐲焉吾視其轍亂望其旗靡故逐之是年夏齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許偃自雩門竊出蒙臯皮而先犯之公從之大敗宋師于乗邱齊師乃還偃魯大夫成公庶弟者亦曰公子偃别是一人也左傳公戰于乗邱也縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之記檀公十三年齊桓公許與魯㑹于柯而盟既盟于壇上劌執匕首刼桓公桓公左右莫敢動而問曰子將何欲劌曰齊强魯弱而大國侵魯亦以甚矣今魯城壊即壓齊境君其圖之桓公乃許盡歸魯之侵地既已言劌投其匕首下壇北面就羣臣之位顔色不變辭令如故史記管子桓公伐魯魯不敢戰去國五十里而為之闗請此于闗内以從于齊齊亦毋復侵魯桓公許諾魯人請盟曰魯小國也固不帯劒今帯劒是交兵聞于諸侯請去兵管仲曰不可君如是以退可不聴又諌曰必不去魯胡不用兵曹劌之為人也堅彊以忌不可以約取也不聴與之遇莊公自懐劒曹劌亦懐劒踐壇莊公抽劔其懐曰魯之境去國五十里亦無不死而已管仲走君曹劌抽劔當兩階之間曰二君將改圖無有進者管仲曰君與地以汶為境桓公許諾以汶為境而歸公羊傳吕氏春秋畧同二十三年齊因祭社蒐軍實公如齊觀社劌諌曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序征伐以討其不然諸侯有王王有廵守以大習之非是君不舉矣君舉必書書而不法後嗣何觀國語曹劌曰夫齊棄大公之法而觀民于社君為是舉而徃觀之非故業也何以訓民土發而社助時也收攟而烝納要也今齊社而徃觀旅非先王之訓也天子祀上帝諸侯㑹之受命焉諸侯祀先王先公卿大夫佐之受事焉臣不聞諸侯之相㑹祀也慎子莊公鑄大鐘曹劌入見曰今國𥚹而鐘大君何不圖之又有㣲虎者亦魯大夫哀公八年吳伐我克東陽而進公賔庚公甲叔子與戰于夷獲叔子與析朱鉏公賔庚公甲叔子析朱鉏皆魯人獻于吳子吳子曰此同車必使能國未可望也次于泗上㣲虎欲宵攻吳子之舎私屬徒七百人三踊于幕庭卒三百人設格躍之終得三百人有若與焉及稷門之内或謂季孫肥曰不足以害吳而多殺國士不如己也乃止之吳子聞之一夕三遷左傳論曰夀餘延秦繞朝先覺鮑叔詐魯施伯獨寤詩曰猷之未逺是用大諫經國貴逺猷信乎曹劌盟柯㡬同任侠而能以禮正君休休乎有君子之風矣御孫夏父展夏父慶忌匠慶御孫名慶為魯匠師莊公二十四年丹桓宫楹刻其角御孫諌曰臣聞之儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎國語莊公丹桓宫之楹而刻其桷匠師慶言于公曰臣聞聖王公之先封者遺後之人法使無䧟于惡其為後世昭前之令聞也使長監于世故能攝固不解以久今先君儉而君侈之令徳替矣公曰吾屬欲美之對曰無益于君而替前之令徳臣故曰庶可以已乎秋哀姜至公使宗婦覿用幣御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎左傳宗人夏父展韋注宗人宗伯也亦諌曰非故也公曰君作故對曰君作而順則書之逆則亦書其逆也臣從有司懼逆之書于後也故不敢不告公弗聴夏父弗忌者夏父展之後亦為魯宗伯文公二年烝將躋僖公宗有司曰非昭穆也夏父弗忌曰我為宗伯明者為昭其次為穆何常之有有司曰夫宗廟之有昭穆也以次世之長㓜而等胄之親疏也夫祀昭孝也各致齊敬于其皇祖昭孝之至也故工史書世宗祝書昭穆猶恐其踰也今將先禰而後祖自𤣥王以及主癸莫若湯自稷以及王季莫若文武商周之烝也未甞躋湯與文武為踰也魯未若商周而改其常無乃不可乎左傳夏父弗忌曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也弗聴遂躋之展禽曰夏父弗忌必有殃弗忌死既𦵏焚烟徹于上國語襄公時又有匠慶者初成公母穆姜使擇美檟以自為襯與頌琴頌音容及成公夫人齊姜薨季孫行父取以𦵏襄公四年公母定姒薨不殯于廟無襯不虞虞祭也匠慶謂行父曰子為正卿而小君之䘮不成不終君也君長誰受其咎匠慶又請木行父曰略不以道取為略初行父為已樹六檟于蒲圃東門之外匠慶用蒲圃之檟行父不御左傳周豊顔栁公宣子附周豐魯人也哀公執摯請而見之而曰不可公曰我其已矣使人問焉曰有虞氏未施信于民而民信之夏后氏未施敬于民而民敬之何施而得斯于民也對曰墟墓之間未施哀于民而民哀社稷宗廟之中未施敬于民而民敬殷人作誓而民始畔周人作㑹而民始疑茍無禮義誠慤之心以涖之雖固結之民其不解乎又有顔栁者孺子􅀈之䘮哀公欲設撥洒榆汁之器問于有若有若曰其可也君之三臣猶設之顔栁曰天子龍輴而椁幬龍輴輴車載柩畫轅為龍椁幬叢木為椁覆幬其上諸侯輴而設幬為榆沈以榆白皮之汁播地取其引車滑而不滯故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉記檀弓淮南子哀公為室而大公宣子諌曰室大衆與人處則譁少與人處則悲公曰聞命矣築室不輟公宣子復見曰國小而室大百姓必怨吾君諸侯必輕吾國公曰聞命矣築室不輟公宣子復見曰左昭而右穆為大室以臨二先君之廟得無害乎公乃罷役論曰閔僖皆孽也然閔既臣僖僖雖兄有不得而尚之者所謂子雖齊聖不先父食者也故禹不先鯀湯不先契文武不先不窋所以辨世次序昭穆也大小不得以徳踰而以齒乎易曰幹父之蠱用譽丹楹刻桷用侈而已嗚呼魯禮樂之國也宗廟禮樂之所也而踰之不可以式矣尚史卷三十
