body:
  text: 尚史卷三十九列傳十七鑲白旗漢軍李鍇撰晉諸臣傳師服師服者晉大夫事穆侯穆侯以條之役生大子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聼易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎穆侯卒子文侯仇立文侯卒子昭侯伯立危不自安封成師於曲沃是為桓叔師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有貳宗士有隸子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也甸服之諸侯也而建國本既弱矣其能久乎後大夫潘父弑昭侯而納桓叔不克晉立孝侯平至桓叔孫武公弑晉侯緡卒并翼云左傳狐突突子毛偃毛子溱偃子射姑先友梁餘子養罕夷先丹木狐鞠居附狐突者晉同姓唐叔子後大戎伯行也為重耳外祖父事獻公獻公十七年閔二年冬十二月公使申生伐臯落氏衣之偏衣佩之金玦突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要逺災親以無災又何患焉突嘆曰時事之徵也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之尨服逺其躬也佩以金玦棄其衷也服以逺之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有内讒不如違之突欲行羊舌大夫曰不可違命不孝弃事不忠雖知其寒惡不可取子其死之大子將戰突諫曰不可昔辛伯諗周桓公云内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也左傳國語申生欲戰狐突諫曰不可突聞之國君好艾大夫殆好内適子殆社稷危若惠於父而逺於死惠於衆而利社稷其可以圖之乎况其危身於翟以起讒於内也韓非子狐突曰國君好内則太子危好外則相室危不聼敗翟於稷桑而反讒言益起突杜門不出國語申生卒以讒死二十六年僖九年獻公薨明年惠公夷吾即位公改葬共大子秋突適下國遇大子大子使登僕而告之曰夷吾無禮謂其烝賈姬不納羣公子余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓僖十五年秦敗晉於韓獲惠公惠公十四年僖二十三年薨懐公子圉即位命無從亡人期期而不至無赦突之子毛及偃從重耳在秦弗召冬公執突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟之今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之左傳説苑太子死狐突乃復事獻公三年獻公卒狐突辭於諸大夫曰突受太子之詔今事終矣與其久生亂世也不若死而報太子乃歸自殺説誤狐毛突之子也驪姬之亂也毛從重耳亡厯二十餘年及重耳復國是為文公使偃為卿辭曰毛之知賢於臣其齒又長毛也不在位不敢聞命乃使毛將上軍而偃佐之國語文公五年僖二十八年楚圍宋宋告急晉晉救之我師陳於城濮毛設二斾而偽退楚師馳之先軫以中軍横擊之毛及偃以上軍夾攻之遂敗楚師毛卒子溱為溫大夫左傳狐偃字子犯為重耳舅故曰舅犯初從重耳出亡及栢谷卜適齊楚偃曰無卜焉夫齊楚道逺而望大不可以困往道逺難通望大難走困往多悔困且多悔不可以走望若以偃之慮其翟乎夫翟近晉而不通愚陋而多怨走之易達不通可以竄惡多怨可以共憂今若休憂於翟以觀晉國且以監諸侯之為其無不成乃遂之翟獻公二十六年僖九年薨里克既殺奚齊卓子使屠岸夷大夫告重耳于翟曰國亂民擾得國在亂治民在擾子盇入乎吾請為子鉥導也重耳告偃偃曰不可夫望樹在始始不固本終必槁落夫長國者唯知哀樂喜怒之節是以導民不哀喪而求國難因亂以入殆以喪得國則必樂喪樂喪必哀生因亂以入者必喜亂喜亂必怠徳是哀樂喜怒之節易也何以導民民不我導誰長重耳曰非喪誰伐非亂誰納我曰偃也聞之喪亂有小大大喪大亂之剡也不可犯也父母死為大喪讒在兄弟為大亂今適當之是故難重耳出見使者曰子惠顧亡人重耳父生不得供備灑掃之臣死又不敢蒞喪以重其罪且辱大夫敢辭吕甥郤稱亦使蒲城午大夫告夷吾于梁曰子厚賂秦以求入吾主子夷吾告冀芮冀芮曰非亂何入非危何安唯其索之夷吾出見使者再拜許諾且使請君於秦秦使公子縶弔重耳于翟曰得國常於喪失國常於喪時不可失喪不可久公子其圖之重耳告偃偃曰不可亡人無親信仁以為親是故置之者不殆父死在堂而求利人孰仁我人實有之我以徼幸人孰信我不仁不信將何以長利重耳出見使者曰重耳身亡父死不得與於哭泣之位何敢有它志以辱君義再拜不稽首起而哭退而不私公子縶弔夷吾於梁如弔重耳夷吾告冀芮冀芮曰公子勉之重賂配徳無愛財人實有之我以徼幸不亦可乎夷吾出見使者再拜稽首起而不哭退而私於公子曰亡人茍入掃除宗廟定社稷何國之與有且入河外列城五秦遂置夷吾是為惠公重耳在翟十二年偃曰日吾來此也非以翟為榮可以成事也吾曰奔而易達困而有資休以擇利可以戾也今戾久矣戾久將底底箸滯淫誰能興之盇速行乎吾不適齊楚避其逺也蓄力一紀可以逺矣齊侯長矣而欲親晉管仲沒矣多讒在側謀而無正哀而思始夫必追擇前言求善以終厭邇逐逺逺人入服不為郵矣郵過也皆以為然乃行過五鹿乞食於野人野人舉塊以與之公子怒將鞭之偃曰天賜也民以土服又何求焉天事必象十有二年必獲此土嵗在夀星及鶉尾其有此土乎天已命矣有此其以戊申乎所以申土也日以戊申戊土也申申廣土地也再拜稽首受而載之遂適齊齊侯妻之有馬二十乗符子公子重耳奔齊與五臣游乎大澤之中見蜘蛛布網曵繩執豸而食之公子顧咎犯曰此蟲也而猶役其智執豸以食之况乎人之智而不能廓網布繩以供方丈之御是曽不如蜘蛛之智乎咎犯曰公子慎勿言也君終行之則有邦有嗣也桓公卒孝公立偃知齊之不可以動而知公子之安齊欲行而患之與從者謀于桑下醉而載之以行醒以戈逐偃曰若無所濟吾食舅氏之肉其知厭乎偃走且對曰若無所濟余未知死所誰能與豺狼争食若克有成公子無亦晉之柔嘉足以甘食偃肉腥臊將焉用之遂行過衛厯曹宋鄭遂如楚楚王享之九獻庭實旅百周禮上公出入所享􅛰餼九牢米百有二十筥醯醢百有二十􅜍禾二十車芻薪倍禾公子欲辭偃曰夭命也君其饗之亡人而國薦之非敵而君設之非天誰啓之心于是子圉自秦逃歸秦國召公子于楚惠公十四年僖二十三年十月公薨懐公子圉立明年正月秦伯納公子及河偃授公子璧曰臣從君還軫巡于天下惡其多矣臣猶知之而况君乎不忍其死請由此亡公子曰所不與舅氏同心者有如河水沈璧以質韓非子文公反國至河令籩豆捐之席蓐捐之手足胼胝面目黧黒者後之咎犯聞之而夜哭公曰寡人出亡二十年乃今得反國咎犯聞之不喜而哭意不欲寡人反國邪犯對曰籩豆所以食也席蓐所以卧也而君捐之手足胼胝面目黧黑勞有功者也而君後之今臣有與在後中不勝其哀故哭且臣為君行詐偽以反國者衆矣臣尚自惡也而况于君再拜而辭文公止之曰諺曰築社者攓撅而置之端冕而祀之今子與我取之而不與我治之與我置之而不與我祀之焉可解左驂而盟于河二月偃及秦晉之大夫盟于郇公子遂入立是為文公而殺懐公于髙梁國語襄王避大叔帶之難居于鄭地汜文公二年僖二十五年秦伯師于河上將納王偃曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣于諸侯今為可矣三月我師逆王殺大叔帶于溫王與之陽樊溫原攅茅之田晉于是始啓南陽四年僖二十七年楚圍宋宋告急晉偃曰楚始得曹而新昬于衛若伐曹衛楚必救之則齊宋免矣于是乎蒐于被廬作三軍五年僖二十八年公圍曹入之分曹衛之田以畀宋人楚子使申叔去榖使得臣去宋曰無從晉師得臣不可從我師我師退軍吏曰以君辟臣辱也且楚師老矣何故退偃曰師直為壯曲為老豈在久乎㣲楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止得臣不可楚師背酅而舍公患之聼輿人之誦曰原田毎毎舍其舊而新是謀公疑焉偃曰戰也戰而捷必得諸侯若其不㨗表裏山河必無害也公夢與楚子搏楚子伏已而盬其腦盬啑也是以懼偃曰吉我得天楚伏其罪我且柔之矣四月遂敗楚師于城濮説苑城濮之戰文公謂咎犯曰吾卜戰而龜熸我迎嵗彼背嵗彗星見彼操其柄我操其摽吾又夢與荆王搏彼在上我在下吾欲無戰子以為何如咎犯對曰卜戰龜熸是荆人也我迎嵗彼背嵗彼去我從之也彗星見彼操其柄我操其摽以掃則彼利以擊則我利君夢與荆王搏彼在上君在下則君見天而荆王伏其罪也且吾以宋衛為主齊秦輔我我合天道獨以人事則將勝之矣文公從之荆人大敗六年僖二十九年偃㑹王子虎及諸侯之大夫盟于翟泉尋踐土之盟且謀伐鄭七年僖三十年偃從公及秦伯圍鄭秦伯與鄭盟而還偃請擊之公不許亦罷去明年偃卒文公始入而教其民二年欲用之偃曰民未知義未安其居于是乎出定襄王入務利民民懐生矣將用之偃曰民未知信未宣其用于是乎伐原以示之信三日糧盡而退退而原降事在二十五年民易資者不求豐焉明徵其辭公曰可矣偃曰民未知禮未生其共于是乎大蒐以示之禮作執秩主爵秩之官以正其官民聼不惑而後用之出榖戍釋宋圍一戰而霸文之教也説苑文公問政于舅犯舅犯對曰分熟不如分腥分腥不如分地割以分民而益其爵禄是以上得地而民知富上失地而民知貧古之所謂致師而戰者此之謂也又曰文公問于咎犯曰誰可使為西河守者咎犯對曰虞子羔可也公曰非汝之讎耶對曰君問可為守者非問臣之讎也羔見咎犯而謝之曰幸赦臣之過薦之于君得為西河守咎犯曰薦子者公也怨子者私也吾不以私事害公義子其去矣顧吾射子也偃子曰狐射姑食采于賈又曰賈季晉初作三軍後蒐于清原作五軍襄公七年文六年蒐于夷復舍二軍使射姑將中軍趙盾佐之陽處父至自溫改蒐于董易趙盾將中軍曰使能國之利也是以上之秋八月襄公薨以難故欲立長君趙盾曰立公子雍射姑曰不如立公子樂盾不可使逆公子雍射姑亦使召公子樂盾殺諸郫射姑怨陽處父之易其班也而知其無援于晉也九月使狐鞫居殺處父晉殺狐鞫居射姑奔狄靈公元年文七年狄侵魯告于晉趙盾使因射姑問狄相酆舒且讓之酆舒問于射姑曰趙衰趙盾孰賢對曰衰冬日之日也盾夏日之日也後荀林父請復射姑曰能外事且由舊勲郤缺曰賈季亂且罪大遂不得復云狐鞫居者亦狐氏族是為續簡伯也左傳論曰獻公食蠱毒延諸子突不能定晉而賴偃以定㣲狐氏晉亂其有艾乎夫不教子貳忠之歸也不赴父難孝之移也君子深悲之矣然翼龍升天羣虵壑藏公子及河寘璧而逃死亦壑藏之㑹也要而後入偃有未純乎若夫出榖釋宋僅足致伯亦小矣哉欒賔子成黶成子枝書子鍼枝子盾黶子盈盾子書欒欒欒魴忘欒弗欒京廬欒糾附欒成者欒賔之子也賔為靖侯孫昭侯使賔傅曲沃桓叔成乃事翼之哀侯為大夫哀侯九年桓三年曲沃武公伐翼獲哀侯止欒成曰茍無死吾以子見天子令子為上卿制晉國之政辭曰成聞之民生于三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故壹事之唯其所在則致死焉報生以死報賜以力人之道也臣敢以私利廢人之道君何以訓矣且君知臣之從也未知其待于曲沃也從君而貳君焉用之遂鬪而死國語諡曰共是為共叔共叔之子曰枝欒枝共叔成之子欒貞子也事文公文公四年僖二十七年楚圍宋宋告急晉于是乎蒐于被廬作三軍命趙衰為卿衰讓于欒枝先軫使枝將下軍軫佐之既而使軫將中軍胥臣佐下軍明年遇楚師公退三舍次于城濮公曰若楚惠何枝曰漢陽諸姬楚實盡之思小惠而亡大耻不如戰也楚得臣背酅而舍使鬭勃請戰公使枝對曰寡君聞命矣楚之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乗敬爾君事詰朝將見既戰胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾以上軍退欒枝使輿曵柴而偽遁楚師馳之先軫以中軍公族横擊之狐毛以上軍夾攻楚左師潰楚師敗績鄭伯懼行成枝入盟鄭伯襄公六年文五年枝卒左傳説苑文公時翟人有獻封狐文豹之皮者公歎曰封狐文豹何罪哉以皮為罪也欒枝曰地廣而不平財聚而不散獨非狐豹之罪乎公曰善哉説之枝曰地廣而不平人將平之財聚而不散人將争之于是裂地以分民散財以賑貧謚曰貞子盾亦將下軍事靈公盾子書是為欒武子書弑厲公見逆臣傳書子二黶鍼欒黶書之子桓子也欒鍼黶弟也并事厲公厲公三年成十三年我伐秦郤縠御戎鍼為右敗秦師于麻隧六年成十六年我伐鄭黶如魯乞師鄭告于楚楚救之晉楚遇于鄢陵有淖于前乃皆左右相違于淖郤縠御厲公鍼為右欒范以其族夾公行䧟于淖欒書將載公鍼曰書退國有大任焉得專之且侵官冒也失官慢也離局姦也有三罪焉不可犯也乃掀公以出于淖八年成十八年悼公立以黶為公族大夫國語黶也果敢使果敢者諗之悼公元年襄元年黶㑹諸侯之大夫圍宋彭城九年襄九年黶將下軍士魴佐之從諸侯伐鄭滕人薛人從黶門于北門鄭請成乃盟于戲而還十三年襄十三年荀罃士魴卒公使韓起將上軍辭以趙武又使黶辭曰臣不如韓起韓起願上趙武君其聼之乃使趙武將上軍魏絳佐下軍十四年襄十四年公使六卿帥諸侯之師伐秦以報櫟之役襄十二年秦敗晉師于櫟至于棫林而還鍼曰此役也報櫟之敗也役又無功晉之耻也吾有二位于戎路謂黶將下軍鍼為戎右敢不耻乎與士鞅士匄之子馳秦師鍼死之士鞅反黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余弟也弗逐余亦將殺之士鞅奔秦秦請而復之平公元年襄十六年黶及荀偃帥師伐楚敗楚師于湛阪遂侵方城之外伐許而還左傳黶卒謚曰桓子子盈欒盈史記盈作逞黶之子懐子也平公元年襄十六年平公以盈及士鞅為公族大夫士鞅以其亡也怨欒氏故與盈同官而不相能三年襄十八年我㑹諸侯伐齊入平隂盈佐魏絳以下軍克邿遂侵濰及沂初黶娶欒祁士匄之子也生盈黶卒欒祁與其老州賔通㡬亡室矣盈患之祁懼其討也愬諸士匄曰盈將為亂以范氏為死桓主即桓子黶大夫稱主也而專政矣曰吾父逐鞅不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專于國有死而已我蔑從之矣其謀如是懼害于主吾不敢不言范鞅為之徵盈好施士多歸之士匄畏其多士也信之六年襄二十一年使盈城著晉邑而遂逐之秋盈出奔楚匄殺其黨十人箕遺黄淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆皆晉大夫國語平公納大夫陽畢之説逐欒盈與傳殊異事具陽畢傳盈過于周周西鄙掠之辭于行人曰天子陪臣盈得罪于王之守臣將逃罪罪重于郊甸無所伏竄敢布其死昔陪臣書能輸力于王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死于尉氏討姦之官不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候送迎賔客之官出諸轘轅冬公㑹諸侯于商任錮欒氏也七年襄二十二年盈適齊冬㑹于沙隨復錮欒氏也盈猶在齊八年襄二十三年我將嫁女于吳齊侯使析歸父媵之以藩車之有蔽障者載盈及其士納諸曲沃欒氏邑盈夜見胥午守曲沃大夫而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何貳之有盈出徧拜之四月盈帥曲沃之甲因魏舒以晝入絳初盈佐魏絳于下軍魏舒私焉故因之或告士匄曰欒氏至矣匄懼奉公以如固宫使子鞅刼魏舒之公所有斐豹者隸也著于丹書罪没為奴以丹書其罪欒氏之力臣曰督戎國人懼之斐豹謂匄曰茍焚丹書我殺督戎匄喜曰而殺之所不請于君焚丹書者有如日乃出豹而閉之督戎從之豹踰隠短墻而待之督戎踰入豹自後擊而殺之欒氏乗公門匄謂子鞅曰矢及君屋死之士鞅用劍以帥卒欒氏退欒樂死欒魴傷樂魴並欒氏族盈奔曲沃晉人圍之冬十月克盈于曲沃盡殺欒氏之族欒魴出奔宋史記欒逞有罪奔齊齊莊公㣲遣欒逞于曲沃以兵隨之齊兵上大行欒逞從曲沃中反襲入絳絳不戒平公欲自殺范獻子止公以其徒擊逞逞敗走曲沃曲沃攻逞逞死遂滅欒氏宗又有欒京廬欒弗忌欒糾皆欒氏族京廬見郤克傳弗忌見伯宗傳糾即卞糾悼公即位使卞糾御戎校正屬焉使訓諸御知義左傳國語知欒糾之能御以和于攻也使為戎御論曰曲沃奪宗共叔致命雖父子異趣實所以壹之也嗟夫哀侯者桓叔之親亦故君之子也知從也不知其待也凜乎斯言桓叔其羞聞之矣舊姓之亡欒最無罪書植之黶揠之信矣然盈不比肸而虎羆是嬖且凱風敝笱有㣲刺焉惡在其善之未及邪先軫子且居且居子克先都先縠先軫者晉之舊姓也國語胥籍狐箕欒郤栢先羊舌董韓實掌近官韋昭注十一族晉之舊姓其先有先友先丹木並事獻公詳狐突傳軫食邑于原是為原軫初事文公為下軍佐文公四年僖二十七年楚子圍宋宋來告急軫曰報施救患取威定霸于是乎在矣五年僖二十八年春正月公伐衛取五鹿軫之謀也衛出其君以説我三月圍曹入之㑹郤縠卒遂以軫將中軍宋又使門尹般大夫至我師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説楚得臣使宛春大夫告于師曰請復衛侯而封曹臣亦釋宋之圍狐偃曰子玉得臣字無禮哉君取一臣取二不可失矣軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説得臣果怒從我師既戰軫以中軍公族横擊之遂敗楚師于城濮九年僖三十二年冬十二月文公薨襄公立襄公元年僖三十三年秦將襲鄭不果滅滑姬姓國而還軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂興姜戎敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴文公妻襄公敵母請三帥公許之軫朝問秦囚公曰夫人請之吾舍之矣軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦讎亡無日矣不顧而唾公使追之不及秋八月狄伐我及箕軫曰匹夫逞志于君而無討謂不顧而唾敢不自討乎免胄入狄師死焉狄人歸其元面如生左傳子且居先且居軫之子是為蒲城伯後受霍又為霍伯初為軍佐敗楚師于城濮後代狐毛將上軍國語襄公元年僖三十三年箕之役先軫死于狄反自箕襄公以三命命且居將中軍二年文元年公既祥以衛不朝使告于諸侯而伐衛且居曰效尤禍也請君朝王臣從師公朝王于溫且居及胥臣伐衛五日取戚獲孫林父三年文二年秦伐我且居將中軍以禦之敗秦師于彭衙冬且居㑹諸侯大夫伐秦取汪及彭衙而還六年文五年且居卒左傳子克先克且居之子也襄公薨趙盾將中軍克佐之逆公子雍既而盾背秦立靈公敗秦師于令狐左傳先都者晉大夫葢亦克之族也蒐于清原也作五軍先都為新下軍佐國語及夷之蒐襄公將登箕鄭父先都于上軍而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之克又奪蒯得田于堇隂靈公三年文九年箕鄭父先都士縠梁益耳蒯得作亂使賊殺克晉人討之殺先都五人左傳先縠者彘季也又曰彘子曰原縠事景公為中軍佐景公三年宣十二年夏六月楚圍鄭我救之及河聞鄭既及楚平荀林父欲還縠不可曰晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵彊而退非夫也命以軍帥而卒以非夫唯羣子能我不為也以中軍佐濟師遂濟楚師次于管我師在敖鄗之間鄭使如師請擊楚鄭師為承縠曰敗楚服鄭于此在矣必許之他帥皆不欲唯趙同趙括曰必從彘子楚少宰如我師曰寡君少遭閔凶不能文聞二先君楚成王穆王之出入此行也將鄭是訓定豈敢求罪于晉二三子無淹久士㑹對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱縠以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹于鄭曰無辟敵羣臣無所逃命楚又使求成于我許之盟有日矣魏錡魏犫之子求公族未得怒欲敗晉師請致師挑戰也弗許請使許之遂往請戰而還趙旃趙穿之子求卿未得請挑戰弗許請召盟許之與魏錡皆命而往郤克曰二憾往矣弗備必敗縠曰鄭人勸戰勿敢從也楚人求成弗能好也師無成命多備何為士㑹曰備之善縠不可魏錡趙旃怒楚師楚師乗之遂敗我師于邲冬十二月縠及宋人衛人曹人盟于清邱四年宣十三年縠召狄伐我及清冬我討邲之敗與清之師殺縠盡滅其族左傳論曰軫實善謀又獲死所晉之舊勲狐先為烈而不蒙謚何邪縠之討于清為後而滅其族抑又何邪司冦掌三議之法若軫之勲曽不及是乎郤豹子芮子芮子缺孫缺子克縠克子錡附缺從犫從至郤郤溱郤豹字叔虎亦舊姓也獻公田見翟柤國名之氛歸寢不寐豹朝公語之對曰牀第之不安邪抑驪姬之不存側邪公辭焉出語士蒍曰今夕君不寐必為翟柤也夫翟柤之君好專利而不忌其臣競諂以求媚其進者壅塞其退者距違其上貪以忍其下偷以幸有縱君而無諫臣有冒上而無忠下君臣上下各厭其私以縱其回民各有心無所據依以是處國不亦難乎君若伐之可克也吾不言子必言之士蒍以告公説乃伐翟柤豹將乗城其徒曰棄政而役非其任也豹曰既無老謀而又無壯事何以事君被羽先升遂克之國語子郤芮芮悔納文公謀作亂秦伯誘殺之見亂臣傳卻缺芮之子即冀缺所謂郤成子也初耕于冀野胥臣使過冀見缺耨其妻饁之敬相待如賔遂與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也公以為下軍大夫襄公元年僖三十三年狄伐我及箕公敗之于箕缺獲白狄子命缺為卿復與之冀七年文六年襄公薨明年靈公立缺言于趙盾曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳無徳何以主盟子為正卿以主諸侯而不務徳將若之何夏書曰戒之用休董之用威勸之以九歌勿使壊九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正徳利用厚生謂之三事義而行之謂之徳禮無禮不樂所由叛也若無子之徳莫可歌也其誰來之盍使睦者歌吾子乎靈公五年文十一年缺㑹魯叔仲彭生于承筐謀諸侯之從于楚者六年文十二年秦伐我取羈馬使趙盾將中軍欒盾將下軍缺將上軍禦之于河曲秦師遁七年文十三年六卿相見于諸浮趙盾曰隨㑹在秦隨㑹即士㑹晉使迎公子雍既而背之㑹奔秦賈季在狄賈季在狐射姑殺陽處父晉討之射姑奔狄難日生矣若之何荀林父曰請復賈季能外事且由舊勲缺曰賈季亂且罪大不如隨㑹能賤而有耻柔而不犯其知足使也且無罪乃復隨㑹九年文十五年缺以上軍下軍伐蔡曰君弱不可以怠入蔡以城下之盟而還十四年宣二年靈公弑成公即位成公六年宣八年趙盾卒缺為政下軍佐胥克有蠱疾缺廢胥克使趙朔佐下軍七年宣九年成公薨景公即位冬十月楚伐鄭缺救鄭鄭敗楚師于栁棼景公二年宣十一年缺求成于衆狄衆狄疾赤狄之役赤狄潞氏最强故服役衆狄遂服于我秋公㑹狄于櫕函是行也諸大夫欲召狄缺曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡徳乎左傳缺卒諡曰成子子克郤克缺之子獻子也景公三年宣十二年楚伐鄭荀林父帥師救之克代臾駢佐上軍及楚師戰于邲我師敗績八年宣十七年公使克徵㑹于齊齊頃公帷婦人使觀之克病跛及登婦人笑于房克怒出而誓曰所不此報無能涉河克先歸使欒京廬克之介也待命于齊曰不得齊事無復命矣克至請伐齊公弗許請以其私屬又弗許是年秋士㑹請老克為政十一年成二年齊伐魯又敗衛師魯衛來乞師皆主克公許之七百乗克曰此城濮之賦也有先君之明與先大夫之肅故㨗克于先大夫無能為役請八百乗許之克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛及衛地韓厥將斬人克馳將救之至則既斬之矣克使速以狥告其僕曰吾以分謗也師從齊師于莘六月壬申至于靡笄之下齊侯使請戰曰子以君師辱于敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾于敝邑之地寡君不忍使羣臣請于大國無令輿師淹于君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也癸酉陳于鞌邴夏御齊侯逢丑父為右解張御克鄭邱緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之克傷于矢血流及屨未絶鼓音曰余病矣解張曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之鄭邱緩曰自始合茍有險余必下推車子豈識之然子病矣解張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之克乃左並轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥迓齊侯及之丑父與齊侯易位使齊侯下如華泉取飲齊侯以免韓厥獻丑父克曰人不難以死免其君戮之不祥赦之遂從齊師入自邱輿擊馬陘齊侯使國佐賂以紀甗玉磬與地不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命于諸侯而曰必質其母是以不孝令也先王疆理天下物土之宜而布其利今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎子以君師辱于敝邑畏君之震師徒撓敗唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聼魯衛諫曰齊疾我矣不許讐我必甚晉人許之對曰羣臣帥賦輿以為魯衛請若茍有以藉口而復于寡君君之惠也敢不唯命是聼秋七月及國佐盟于爰婁使齊歸魯汶陽之田魯公賜三帥先路三命之服司馬以下皆受一命之服克歸見公公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉士燮見勞之如郤克對曰庚所命也荀庚將上軍時不出燮上軍佐代行故稱帥以讓克之制也燮何力之有焉欒書見公亦如之對曰燮之詔也士用命也書何力之有焉十二年成三年克及衛孫良夫伐廧咎如赤狄别種討赤狄之餘廧咎如潰冬十二月齊侯朝于我將授玉克趨進曰此行也君為婦人之笑辱也寡君未之敢任左傳克卒謚曰獻子子錡錡字駒伯克之子犫是為苦成叔步揚之子克之從父兄弟至字季步揚之孫蒲城䧿居之子昭子也食邑于溫又曰溫季並為晉大夫事厲公厲公元年成十一年我以魯成公貳于楚成公請受盟使郤犫如魯聘且蒞盟犫奪魯施氏婦以歸秋郤至與周争鄇田鄇溫别邑王命劉康公單襄公訟諸公公使至勿敢争冬秦晉為成秦使史顆盟公于河東公使犫盟秦伯于河西二年成十二年郤至如楚聘且涖盟楚子享之公子側相為地室而縣焉至將登金奏作于下驚而走出側曰日云莫矣寡君湏矣吾子其入矣至曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢側曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君湏矣吾子其入也至曰若讓之以一矢禍之大者其何福之為世之治也諸侯閒于天子之事則相朝也于是乎有享宴之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰﨣﨣武夫公侯干城及其亂也諸侯貪冒侵欲不忘争尋常以盡其民畧其武夫以為已腹心股肱牙爪故詩曰﨣﨣武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事三年成十三年公將伐秦使郤錡如魯乞師將事不敬仲孫蔑曰郤氏其亡乎夏五月錡為上軍佐至為新軍佐及秦軍戰于麻隧秦師敗績四年成十四年衛定公來公强見孫林父林父衛臣逐定公後奔晉定公不可定公既歸公使犫送孫林父而見之定公饗犫犫傲寗殖曰苦成家其亡乎傲取禍之道也五年成十五年三郤害伯宗譖而殺之及欒弗忌欒弗忌晉之賢大夫也韓厥曰郤氏其不免乎六年成十六年公使錡將上軍至佐新軍及欒書士燮荀偃韓厥伐鄭使犫如衛遂如齊皆乞師鄭告于楚楚子救鄭夏六月晉楚遇于鄢陵士燮不欲戰至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之耻也子亦見先君之事矣今我避楚又益耻也國語作欒書欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦晦月終隂盡兵家所忌在陳而囂合而加囂各顧其後莫有鬬心舊不必良以犯天忌我必克之及戰至三遇楚子之卒見楚子必下免胄而趨風趨疾如風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不榖而趨無乃傷乎至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間䝉甲胄不敢拜命敢告不寧君命之辱為事之故敢肅使者肅手至地若今撎三肅使者而退㑹吕錡射楚子中目囚楚公子茷楚師宵遁秋公㑹諸侯于沙隨犫時將新軍且為公族大夫以主東諸侯犫取貨于魯叔孫僑如而訴魯成公于公公不見魯成公且執季孫行父于苕邱冬十二月許魯平犫及行父盟于扈公使至獻楚㨗于周與單襄公語驟稱其伐單子曰溫季其亡乎位于七人之下而求掩其上亂之本也厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童胥克子以胥克之廢也怨郤氏宣八年郤缺廢胥克而嬖于公史記厲公多外嬖姬欲去羣大夫而立諸姬兄弟寵姬兄曰胥童嘗與郤至有怨郤錡奪夷陽五田五亦嬖于公郤犫與長魚矯争田執而梏之與其父母妻子同一轅既矯亦嬖于公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師齊魯衛之師之未至也軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎謂鄢陵戰時楚子問郤至以弓君盍嘗使諸周而察之至聘于周欒書使孫周見之公使覘之信遂怨郤至公田與婦人先殺而飲酒後使大夫殺至奉豕寺人孟張奪之至射而殺之公曰季子欺余七年成十七年冬十二月公將作難胥童曰必先三郤族大多怨去大族不偪敵多怨有庸公曰然郤氏聞之錡欲攻公曰雖死君必危至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之禄是以聚黨有黨而爭命罪孰大焉胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結袵而偽訟者三郤將謀于榭矯以戈殺錡及犫于其位至曰逃威也遂趨欲逃㓙賊為害故曰威言可畏也矯及諸其車以戈殺之皆尸諸朝左傳三郤既誅而厲公亦遇弑卒立孫周是為悼公郤縠郤溱者並郤氏族溱至之兄韋昭注或云溱即至非是為晉大夫文公四年僖二十七年公蒐于被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍郤溱佐之明年郤縠卒使原軫將中軍夏四月與楚師戰于城濮原軫郤溱以中軍公族横擊之楚師敗績左傳論曰大公有言曰敬勝怠者吉史佚曰動莫若敬野餉而敬敬不忘矣敬以立身于治何有然非胥氏之子取節而進之冀野之農安收白狄之效哉然則鎛趙之間不缺缺比遇不遇爾缺以胥升而竟廢胥克趙孟所謂比而不黨者亦由是以覆厥宗直道之難也尚史卷三十九
