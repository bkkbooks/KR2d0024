body:
  text: 尚史卷六本紀五鑲白旗漢軍李鍇撰周本紀以下春秋平王平王名宜臼幽王太子也西戎犬戎與申侯伐周殺幽王驪山下諸侯即申侯共立宜臼是為平王史記紀年幽王死申侯立平王於申虢公立王子余二王並立余晋文侯所殺是為攜王平王錫晋文侯秬鬯圭瓉作文侯之命書序平王立東遷于雒邑辟戎㓂封秦㐮公為諸侯賜之岐以西之地平王之時周室衰㣲諸侯強并弱齊楚秦晋始大政由方伯史記王不撫其民而逺屯戍於母家周人怨思作揚之水以刺之詩序四十九年隠元年王使宰咺歸魯惠公仲子之賵冬十月鄭以王師虢師伐衞討鄭公孫滑之亂五十一年隠三年春二月己巳日有食之三月王崩孫桓王立左傳桓王桓王名林平王孫太子洩父子也平王崩太子洩父蚤死立其子是為桓王史記初平王貳于虢王崩周人將畀虢公政鄭師取温之麥又取成周之禾桓王元年隠四年衛州吁弑其君完桓公二年隠五年王使尹氏武氏周世族大夫助曲沃莊伯伐翼翼侯奔隨曲沃叛王秋王命虢公林父伐曲沃而立哀侯于翼九月鄭以王師㑹伐宋三年隱六年如魯告饑魯為之請糴于宋衛齊鄭四年隠七年使凡伯如魯聘還戎伐之于楚邱以歸五年隠八年虢公忌父始作卿士于周八月鄭伯莊公以齊人來朝史記三年鄭莊公朝王不禮五年鄭怨與魯易許田六年隠九年使南季周大夫聘魯宋公不王鄭伯為王左卿士以王命討之伐宋八年隠十一年王取鄔劉蒍邘鄭四邑之田于鄭而與鄭人蘇忿生之田温原絺樊隰郕攅茅向盟州陘隤懐凡十二邑冬十月魯公子翬弑其君息姑隠公十年桓二年宋督弑其君與夷十一年桓三年秋七月壬辰朔日有食之既十二年桓四年使宰渠伯糾如魯聘冬王師秦師圍魏秦執芮伯以歸芮伯萬之母芮姜惡芮伯故逐之出居於魏十三年桓五年使仍叔之子如魯聘王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭射王中肩十五年桓七年曲沃伯武公弑晋小子侯哀侯之子十六年桓八年使家父周大夫如魯聘曲沃伯滅翼冬王命虢公醜立晋哀侯之弟緡于晋祭公逆王后于紀二十三年桓十五年使家父求車於魯春三月王崩左傳子莊王立史記莊王僖王莊王名佗桓王子也莊王二年桓十七年冬十月朔日有食之三年桓十八年史記作四年周公黒肩欲殺莊王而立王子克莊王弟子儀辛伯周大夫告王王殺周公王子克奔燕四年莊元年使榮叔周大夫如魯追錫桓公命六年莊三年夏五月𦵏桓王九年莊六年王人子突救衛諸侯伐衛納衛侯朔王救之十一年莊八年齊無知弑其君諸兒㐮公十三年莊十年齊滅譚左傳十五年莊十二年王崩子僖王立史記秋宋萬弑其君㨗閔公左傳僖王名胡齊僖王元年莊十三年齊人滅遂二年莊十四年單伯㑹齊伐宋夏楚滅息四年莊十六年曲沃伯并晋王使虢公命曲沃伯以一軍為晋侯左傳五年莊十七年王崩子惠王立莊僖崩𦵏經傳不書故失日月史記惠王惠王名閬僖王子也惠王元年莊十八年春虢公林父晋侯獻公來朝王享醴命之宥皆賜玉五㲄馬三匹使原莊公逆王后于陳陳媯歸于京師實惠后三月日有食之二年莊十九年初王姚嬖于莊王生子頽有寵及惠王即位取蒍國之圃以為囿又取邉伯之宫奪子禽祝跪詹父田而収膳夫石速之秩故蒍國等作亂因蘇氏秋五大夫奉子頽以伐王不克出奔温按史記以恵王犇温非是蘇子奉子頽奔衛衛師燕師伐周立子頽三年莊二十年鄭伯厲公和王室不克遂以王歸王處于櫟秋王及鄭伯入于鄔遂入成周取其寶器而還四年莊二十一年鄭伯虢叔同伐王城殺王子頽及五大夫鄭伯享王于闕西王與之武公之畧自虎牢以東五月王廵虢守虢公為王宫于玤王與之酒泉鄭伯之享王也王以后之鞶鑑予之虢公請器王予之爵鄭伯由是始惡于王冬王歸自虢六年莊二十三年祭叔如魯聘八年莊二十五年夏六月辛未朔日有食之九年莊二十六年冬十二月癸亥朔日有食之十年莊二十七年使召伯廖賜齊侯桓公命且請伐衛以其立子頽也十二年莊二十九年樊皮叛周大夫明年虢公執樊皮歸于京師十五年莊三十二年秋八月魯荘公薨慶父殺公子般十六年閔元年晋滅耿滅霍滅魏十七年閔二年魯慶父弑其君啟方閔公左傳二十二年僖五年王以惠后故將廢太子鄭而立大叔帯夏齊侯桓公帥諸侯㑹王大子鄭于首止以定其位王恨齊杜預注秋諸侯盟王使宰孔召鄭伯文公曰吾撫女以從楚輔之以晉可以少安鄭伯逃歸不盟楚滅弦九月戊申朔日有食之冬晉滅虢滅虞二十四年僖七年閏月王崩左傳崩史記作二十五年明按惠王實以二十四年閏月㐮王懼叔帯之難年十二月始赴告諸侯襄王頃王匡王襄王名鄭惠王太子也惠王崩太子鄭惡太叔帶之難懼不立不發䘮而告難於齊二十五年僖八年春王人㑹諸侯盟于洮襄王定位而後發䘮元年僖九年夏宰孔㑹諸侯于葵邱王使宰孔賜齊侯胙冬晋里克殺其君之子奚齊二年僖十年春狄滅温晋里克殺其君卓夏四月周公忌父周卿士王子黨周大夫㑹齊隰朋立晋侯惠公三年僖十一年使召武公内史過賜晋侯命夏戎伐京師入王城焚東門大叔帶召之也秦晋伐戎以救周秋晋侯平戎于王四年僖十二年春三月庚午日有食之夏楚滅黄秋王以戎難故討大叔帶帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晋史記作三年五年僖十三年齊使仲孫淑來聘且言王子帶事畢不與王言復命曰王怒未怠不十年王弗召也七年僖十五年夏五月日有食之八年僖十六年内史叔興聘于宋秋王以戎難故告于齊十一年以來戎遂為王室難齊征諸侯而戍周九年僖十七年魯滅項十一年僖十九年梁亡秦取之也十三年僖二十一年邾滅須句十四年僖二十二年大叔帶自齊復歸于京師富辰言于王王召之也十六年僖二十四年晋立公子重耳殺其君圉鄭伐滑王請滑鄭執王使王怒將以狄伐鄭富辰大夫諫不聴使頽叔桃子二子周大夫出狄師伐鄭王徳狄人将以其女為后富辰諫又不聴卒以其女為后是為隗氏大叔帶通于隗氏王替隗氏頽叔桃子遂奉大叔帶以狄師攻王王出及坎塪國人立帶狄師伐周大敗周師獲周公忌父原伯毛伯富辰王適鄭處于氾大叔帶以隗氏居于温冬王使告難于魯曰不榖不徳得罪于母弟之寵子帶鄙在鄭地汜敢告叔父王使簡師父告于晋使左鄢父告于秦鄭伯省視官具于汜十七年僖二十五年春衛滅邢三月晋侯文公逆王王入於王城殺大叔帶於隰城晋侯朝王王享醴命之宥請隧闕地通路曰隧王𦵏禮也弗許曰王章也未有代徳而有二王亦叔父之所惡也國語晋文公既定㐮王於郏請隧王弗許曰昔我先王之有天下也規方千里以為甸服以供上帝山川百神之祀以備百姓兆民之用以待不庭不虞之患其餘以均分公侯伯子男使各有寕宇以順及天地無逢其災害先王豈有頼焉内官不過九御外官不過九品足以供給神祗而已豈敢厭縱其耳目心腹以亂百度亦唯是生死之服物采章以臨長百姓而輕重布之王何異之有今天降禍災于周室余一人僅亦守府又不佞以勤叔父而班先王之大物以賞私徳其叔父實應且憎以非余一人余一人豈敢有愛也先民有言曰改玉改行叔父若能光裕大徳更姓改物以創制天下自顯庸也而縮取備物以鎮撫百姓余一人其流辟于裔土何辭之與有若猶是姬姓也尚将列為公侯以復先王之職大物其未可改也叔父其茂昭明徳物将自至余敢以私勞變前之大章以忝天下其若先王與百姓何何政令之為也若不然叔父有地而隧焉余安能知之與之陽樊温原攅茅之田十八年僖二十六年楚滅䕫二十年僖二十八年夏四月晋敗楚師于城濮還作王宫于踐土五月諸侯朝于王所獻楚俘于王王享晋侯䇿命晋侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人史記以賜文公河内地及珪鬯弓矢為伯均在㐮王十七年誤曰王謂叔父敬服王命以綏四國糾逖王慝癸亥王子虎周太宰王叔文公盟諸侯于王庭曰皆奨王室無相害也冬諸侯㑹于温晋侯召王以諸侯見且使王狩仲尼書曰天王狩于河陽言非其地也二十一年僖二十九年夏王子虎㑹諸侯於翟泉二十二年僖二十年使周公閲聘於魯魯使公子遂來聘二十五年僖三十三年秦滅滑二十六年文元年二月癸亥日有食之使叔服周内史㑹魯𦵏𦵏僖公夏使毛伯衞卿士錫魯侯命文公楚世子商臣弑其君頵成王二十八年文三年夏四月王子虎卒卿士不卒㐮王時卒王子虎敬王時卒劉卷時係也冬十二月楚伐江王叔桓公卿士王子虎之子㑹晋伐楚以救江三十九年文四年楚滅江三十年文五年使榮叔如魯含且賵召昭公㑹魯𦵏𦵏莊公妾成風秋楚滅六冬滅蓼三十三年文八年秋八月㐮王崩史作三十二年子頃王立頃王名壬臣頃王元年文九年春毛伯衞如魯求金二月𦵏㐮王二年文十年蘇子卿士及魯盟于女栗六年文十四年春頃王崩周公閲與王孫蘇争政故不赴諸侯子匡王立匡王名班秋七月閲将與蘇訟於晋王叛蘇使尹氏卿士與聃啟大夫訟閲于晋晋平王室而復之齊公子商人弑其君舍九月使單伯如齊為魯請子叔姬齊人執之匡王元年文十五年六月辛丑朔日有食之齊許單伯請單伯如魯致命二年文十六年楚人秦人巴人滅庸冬宋人弑其君杵臼昭公三年文十七年甘歜大夫敗戎於邥垂四年文十八年齊人弑其君商人懿公莒弑其君庶其紀公六年宣二年晋趙盾弑其君夷臯靈公冬十月匡王崩弟定王立左傳定王定王名瑜匡王之弟也定王元年宣三年春正月𦵏匡王楚子荘王伐陸渾之戎至雒王使王孫滿大夫勞之楚子問鼎對曰在徳不在鼎二年宣四年鄭公子歸生弑其君夷靈公四年宣六年使子服大夫求后於齊冬召桓公逆后於齊五年宣七年諸侯盟於黒壌王叔桓公卿士臨之以謀不睦六年宣八年楚人滅舒蓼秋七月甲子日有食之既七年宣九年王使徴聘於魯夏仲孫蔑來聘王以為有禮厚賄之八年宣十年夏四月丙辰日有食之陳夏徴舒弑其君平國靈公王季子王母弟劉康公報聘於魯十年宣十二年楚滅蕭十三年宣十五年王孫蘇與召氏毛氏争政殺召戴公及毛伯衛立召㐮夏晋滅赤狄潞氏十四年宣十六年春晋士㑹滅赤狄甲氏及留吁來獻狄俘王以黻冕命士㑹将中軍且為大傅夏成周宣榭火成周洛陽宣榭講武屋秋毛召之難故王室復亂王孫蘇奔晋晋復之使士㑹來平王室十五年宣十七年六月癸卯日有食之十七年成元年晋侯平戎于王單㐮公朝卿士如晋拜成劉康公季子伐茅戎敗績公榖並曰晋敗王師十八年成二年晋使鞏朔來獻齊㨗敗齊師于鞌王弗見使單朝辭焉曰蠻夷戎狄不式王命滛湎毁常王命伐之則有獻㨗王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親暱禁淫慝也今叔父克遂有功於齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又奸先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國而大師之後也寕不亦淫從其欲以怒叔父抑豈不可諌誨鞏朔不能對王使委于三吏三公也以鞏朔宴而私賄之曰非禮也勿籍二十一年成五年定王崩子簡王立左傳簡王靈王簡王名夷定王子也簡王三年成八年召桓公如魯賜魯侯成公命六年成十一年周公楚惡惠㐮惠王㐮王之族之偪且與伯輿卿士争政出奔晋晋卻至與周争鄇田王命劉康公季子單㐮公朝訟諸晋晋使卻至勿敢争八年成十三年諸侯來朝劉康公成肅公㑹晋侯厲公伐秦十一年成十六年夏六月丙寅朔日有食之尹武公㑹諸侯伐鄭冬十一月晋使卻至來獻楚㨗敗楚師於鄢陵十二年成十七年尹武公單㐮公及諸侯伐鄭自戲童至於曲洧冬十二月丁巳朔日有食之楚滅舒庸十三年成十八年晋欒書中行偃弑其君州蒲厲公十四年㐮元年秋九月簡王崩子靈王立靈王名泄心靈王元年㐮二年春正月𦵏簡王二年㐮三年單頃公卿士及諸侯同盟於雞澤四年㐮五年王使王叔陳生卿士愬戎於晋晋人執之士魴來京師言陳生貳於戎五年㐮六年莒滅鄫冬齊滅萊九年㐮十年晋滅偪陽冬王叔陳生與伯輿亦卿士争政王右伯輿陳生奔晋單靖公為卿士以相王室十一年㐮十二年王求后於齊齊侯靈公許昏王使隂里大夫結之十三年㐮十四年春二月乙未朔日有食之王使劉定公夏官師賜齊侯命曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是頼今余命女環靈公名兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命十四年㐮十五年劉夏從單靖公逆王后於齊秋八月丁巳日有食之十九年㐮二十年冬十月丙辰朔日有食之二十年㐮二十一年秋九月庚戌朔日有食之冬十月庚辰朔日有食之二十二年㐮二十三年春二月癸酉朔日有食之左傳榖洛鬬将毁王宫王欲壅之太子晋諌曰不可防闘川以飾宫是飾亂而佐闘也王卒壅之國語二十三年㐮二十四年秋七月甲子朔日有食之既八月癸巳朔日有食之冬齊人城郟王城也魯叔孫豹來聘且賀城王嘉其有禮賜之大路二十四年㐮二十五年齊崔杼弑其君光荘公秋楚滅舒鳩二十五年㐮二十六年衞寗喜弑其君剽殤公晋韓起來聘二十六年㐮二十七年冬十一月乙亥朔日有食之經作十二月失閏故二十七年㐮二十八年冬十二月靈王崩子景王立左傳景王景王名貴靈王之子也景王元年㐮二十九年夏五月𦵏靈王鄭使印叚來㑹𦵏二年㐮三十年蔡世子般弑其君固景公儋括靈王弟儋季之子欲立王子佞夫景王弟佞夫弗知尹言多五大夫等殺佞夫儋括奔晋三年㐮三十一年莒人弑其君宻州犂比公四年昭元年諸侯大夫㑹於虢王使劉定公夏勞晋趙武於潁七年昭四年楚滅頼十年昭七年夏四月甲辰朔日有食之秋八月衞侯卒㐮公王使成簡公卿士如衞弔且追命㐮公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉二圉周之先也十一年昭八年楚滅陳昭十三年復之十二年昭九年周甘人與晋閻嘉争閻田晋人率隂戎伐潁王使詹桓伯辭於晋辭責讓也曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屛周亦其廢隊是為豈如弁髦而因以敝之先王居檮杌于四裔以禦螭魅故允姓之姦隂戎之祖居于𤓰州伯父惠公歸自秦而誘以來使偪我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕㧞本塞原専棄謀主雖戎狄其何有余一人晋致閻田反潁俘王亦執甘大夫襄以説於晋晋人禮而歸之十四年昭十一年單成公卿士㑹晋韓起於戚冬楚滅蔡昭十三年復之十五年昭十二年晋滅肥原輿人逐原伯絞大夫而立其弟跪尋絞奔郊周地甘悼公過卿士将去成景之族成景皆過之先君成景之族賄劉獻公亦卿壬殺甘悼公而立成公之孫鰌十六年昭十三年楚公子比弑其君䖍靈公公子棄疾殺公子比劉獻公㑹諸侯於平邱十八年昭十五年夏六月丁巳朔日有食之大子夀卒秋八月穆后崩太子夀母冬十二月晋荀躒來𦵏穆后籍談為介既𦵏除䘮以荀躒宴樽以魯壺王求彜器於晋荀躒揖籍談談不能對二十年昭十七年夏六月甲戌朔日有食之晋使屠蒯來請有事於雒與三塗乃警戎備秋九月晋滅陸渾其衆奔甘鹿周地周大獲二十一年昭十八年毛得殺毛伯過過大夫得過之族而伐之左傳王將鑄大錢單穆公旗卿士諫曰不可絶民用以實王府猶塞川原而為潢汚也其謁無日矣王不聼卒鑄大錢國語二十二年昭十九年許世子止弑其君買左傳二十三年昭二十年王将鑄無射鐘名單旗曰不可作重幣以絶民資又作大鐘以鮮其繼三年之中有離民之器二焉國其危哉王弗聴國語年左氏作二十四今從國語二十四年昭二十一年秋七月壬午朔日有食之二十五年昭二十二年王子朝景王長庶子有寵於王欲立之單旗劉狄劉獻公子伯蚠惡子朝願去之夏四月王田北山使公卿皆從将殺單劉王崩史記作二十年子悼王立左傳悼王敬王悼王名猛景王之子也景王太子夀卒王立子猛後王子朝景王長庶子賔起子朝傅有寵於景王王與賔起説之欲立之景王二十五年昭二十二年王崩子猛立遂攻賔起殺之盟羣王子于單氏夏六月𦵏景王王子朝作亂單穆公旗逆王于荘宫以歸王子還子朝黨夜取王以如荘宫單旗出王子還與召伯奐亦子朝黨奉王以追單旗旗殺還及羣王子子朝奔京伐之敗績單旗欲告急於晋秋七月以王如平畤周地遂如圃車次于皇冬十月晋師納王於王城十一月子猛卒謚曰悼王敬王立敬王名匄悼王之母弟也敬王舘於子旅氏十二月癸酉朔日有食之閏月晋師取前城王師伐京敬王元年昭二十三年王師晋師圍郊郊鄩潰王使告閒子朝敗故告閒暇於晋晋師還夏四月王居於狄泉在王城之東左傳謂之東王子朝入於王城謂之西王杜預注二年昭二十四年晋使士彌牟涖問故夏五月乙未朔日有食之六月子朝攻瑕及杏瑕杏敬王邑皆潰三年昭二十五年尹文公子朝黨焚東訾敬王邑弗克四年昭二十六年單旗如晋告急王城人劉人戰於施谷劉師敗績秋七月劉卷卿士即文公伯蚠以王出次於滑晋師納王冬十月王起師於滑十一月晋師克鞏召伯盈逐子朝逆王入於成周盟於襄宫晋師戍周而還子朝奔楚史記景王愛子朝欲立之㑹崩子丐之黨與争立國人立子猛子朝攻殺猛猛為悼王晋人攻子朝而立丐是為敬王敬王元年晋人入敬王不得入居澤四年晋率諸侯入敬王子朝為臣十六年子朝之徒復作亂敬王犇於晋十七年晋遂入敬王説與左氏異五年昭二十七年吳弑其君僚秋晋士鞅㑹諸侯之大夫於扈令戍周七年昭二十九年王殺召伯盈尹氏固及原伯魯之子皆子朝黨王子趙車叛隂不佞大夫敗之八年昭三十年呉滅徐九年昭三十一年冬十二月辛亥朔日有食之十年昭三十二年王使富辛石張並周大夫如晋請城成周天子曰天降禍於周俾我兄弟並有亂心以為伯父憂我一二親眤甥舅不皇啟處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文徳焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寕蝥賊逺屛晋之力也其委諸伯父使伯父實重圖之俾我一人無徴怨於百姓而伯父有榮施先王庸之十一年定元年晋合諸侯城成周歸諸侯之戌十二年定二年鞏氏子弟賊鞏簡公卿士十四年定四年春三月劉卷㑹諸侯於召陵侵楚沈人不㑹夏蔡滅沈秋七月劉卷卒十五年定五年王人殺子朝於楚三月辛亥朔日有食之十六年定六年鄭滅許夏四月儋翩率王子朝之徒因鄭人以作亂鄭伐我馮滑胥靡負黍狐人闕外晋戍周城胥靡冬十二月王處於姑蕕周地十七年定七年儋翩叛夏四月單武公單旗子劉桓公劉卷子敗尹氏於窮谷尹氏復黨儋翩冬十一月單武公劉桓公逆王晋籍秦送王入於王城十八年定八年單武公劉桓公伐榖城儀栗簡城盂以定王室二十二年定十二年冬十一月丙寅朔日有食之二十三年定十三年薛弑其君比二十四年定十四年楚滅頓秋王使石尚如魯歸脤二十五年定十五年楚滅胡秋八月庚辰朔日有食之二十八年哀三年殺萇𢎞晋趙鞅討其黨范氏三十一年哀六年齊陳乞弑其君荼三十三年哀八年宋滅曹三十八年哀十三年單平公卿士㑹諸侯於黄池三十九年哀十四年夏五月庚申朔日有食之六月齊人弑其君壬簡公四十一年哀十六年衞侯荘公入衞使鄢肹來告王使單平公對曰肹以嘉命來告余一人往謂叔父余嘉乃成世復爾禄次敬之哉方天之休弗敬弗休悔其可追夏四月孔子卒四十二年哀十七年楚滅陳四十四年哀十九年王崩子元王立左傳世族譜敬王四十二年崩在哀十七年史記周夲紀十二諸侯年表并以四十二年崩賛曰天厭周徳東遷寄王懇懇修徳懼猶失焉廼淫昏繼寵兄弟迭乗惠蹈子頽之難而終之以叔帶景離佞夫之厄而終之以子朝遂致居櫟次滑守器靡終悲夫書曰殷鍳不逺身之不鍳殷何有乎然始禍造姦首自子克匪惟黒肩是尤實致嘆於桓王也元王貞王哀王思王考王元王名仁敬王之子也元王三年哀二十二年越滅呉八年哀二十七年王崩杜預世族譜敬王四十二年崩子元王十年春秋之傳終按史記周本紀皆云元王八年崩杜氏葢上縮敬王之二年以益元王故為十年也子貞王立貞王名介史記貞作定帝王世紀作貞定國語亦作定韋昭注定當作貞貞王名介敬王子也世本亦作定魯哀二十年定王介崩子元王赤立按世本韋注二説皆以定王為敬王子元王為定王子與史説異今遵史記而以定為貞十六年三晉滅智伯分有其地二十八年貞王崩長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立為思王思王立五月少弟嵬攻殺思王而自立是為考王帝王世紀作考哲王此三王皆貞王之子考王十五年崩子威烈王立史記威烈王安王烈王威烈王名午二十三年九鼎震始命韓魏趙為諸侯二十四年崩子安王立是嵗盗殺楚聲王史記安王名驕三年王子定奔晉虢山崩壅河五年日有食之通鑑韓嚴仲殺韓相侠累陽竪與焉道周亡過周王本文作周君按其時周尚未分不得謂安王為周君也留之十四日載以乗車駟馬而遣之韓使人讓周王患之客謂王正語之曰寡人知嚴氏之為賊而陽竪與之故留之十四日以待命也小國不足以容賊君之使又不至是以遣之也國䇿十一年齊田和遷其君貸康公於海上食一城十六年初命田和為諸侯二十年日有食之既二十三年田氏滅齊二十六年王崩子烈王立烈王名喜元年日有食之韓滅鄭五年韓嚴遂弑其君哀侯六年齊威王來朝七年日有食之王崩史記作十年王崩子顯王立通鑑顯王慎靚王顯王名扁顯王五年秦獻公敗三晋之師於石門王賜以黼黻之服通鑑獻史記賀秦獻公公稱伯九年致文武胙於秦孝公二十五年秦㑹諸侯於京師二十六年王致伯於秦孝公通鑑秦㑹諸侯於逢澤以朝王三十三年賀秦惠王三十五年致文武胙於秦惠王四十四年秦初稱王其後諸侯皆為王四十八年王崩子慎靚王立慎靚王名定慎靚王三年宋初稱王六年崩子赧王立史記西周西周㣲弱載記闕如史記東西合紀國䇿雖分載而文有混淆今依國䇿原文其顯誤者釐正之編年姑因史記通鑑他事分見諸臣傳中赧王西周桓公威公惠公武公赧王名延帝王世紀赧王名誕初考王封其弟於河南帝王世紀考哲王封弟揭於河南是為西周桓公以續周公之官職桓公卒子威公代立威公卒子惠公代立乃封其少子於鞏以奉王號東周惠公王赧時東西周分治王赧徙都西周史記西周武公之共大子死有五庶子母適立司馬翦楚卿謂楚王懐王曰何不封公子咎而為之請太子左成楚人曰不可周不聴是公之智困而交絶於周也不如為周君曰孰欲立也㣲告翦翦令楚資之以地果立公子咎為太子國䇿周國䇿又以楚王為齊王公子咎為最左成為左尚兩存其説八年秦攻宜陽楚救之而楚以周為秦故将伐周蘇代説楚王乃止詳見蘇代傳史記十四年日有食之既通鑑十五年楚圍雍氏韓徴甲與粟於周史記作東周與國䇿異周君患之告蘇代代説韓不徴甲與粟於周且與周髙都十七年齊薛公田文為韓魏攻楚又與韓魏攻秦而藉兵乞食於周韓慶韓人仕周者謂田文曰君為韓魏攻楚取宛葉以北今又攻秦以益之韓魏南無楚憂西無秦患則地廣而益重齊必輕矣夫本末更盛虚寔有時竊為君危之君不如令敝邑隂合為秦無籍兵乞食君臨函谷而無攻令敝邑謂秦王曰薛公所以進兵者欲王令楚割東國以與齊而秦出楚王懐王以為和秦得無攻而以楚之東國免必欲之楚王出必徳齊齊得東國而益強而薛世世無患田文曰善使三國無攻秦而不籍兵乞食於周三國攻秦反周恐魏之藉道也為西周謂魏王哀王曰楚宋不利秦之聴三國也聴猶順從也彼且攻王之聚以利秦魏王懼令軍設舍速東二十二年秦攻魏犀武於伊闕進兵而攻周周君之魏求救魏許之戍或為周最謂趙李兑曰君不如禁秦之攻周趙之上計莫如今秦魏復戰秦攻周而得衆必傷欲持周之得必不攻魏秦攻周而不得前有勝魏之劳後有攻周之敗又必不攻魏今君禁之而全趙令其止必不敗不聴是吾却秦而定周也秦去周必復攻魏魏不支必因君而講則君重矣若魏不講而疾支之是君存周而戰秦魏也重亦在趙國䇿楚欲與齊韓連和伐秦因欲圖周王赧使武公謂楚相昭陽曰三國以兵割周郊地以便輸而南器以尊楚臣以為不然夫弑共主臣世君大國不親以衆脅寡小國不附大國不親小國不附不可以致名實名實不得不可以傷民夫有圖周之聲非所以為號也昭陽曰乃圖周則無之雖然周何故不可圖也曰軍不五不攻城不十不圍夫一周為二十晋公之所知也韓嘗以二十萬之衆辱於晋之城下鋭士死中士傷而晋不㧞公無百韓以圖周此天下之所知也夫怨結於兩周以塞鄒魯之心交絶於齊聲失天下其事危矣危兩周以厚三川川方城之外必為韓弱矣何以知其然也西周之地絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以勁兵雖無攻之名為弑君然而好事之君喜攻之臣發號用兵未嘗不以周為終始是何也祭器在焉欲器之至而㤀弑君之亂臣恐天下以器讎楚也臣請譬之夫虎肉臊其兵利身人猶攻之也若使澤中之麋蒙虎之皮人之攻也必萬之於虎裂楚之地足以肥國詘楚之名足以尊主今子将以欲誅殘天下之共主居三代之傳器吞三翮六翼以為世主非貪而何周書曰欲起無先故器南則兵至矣於是楚計輟不行四十二年秦破華陽約秦昭王使胡傷撃魏将芒卯華陽破之馬犯説梁梁城周史記楚兵在山南山吴岳也伍得楚将将為楚王属怨於周或謂周君曰不如令太子将軍正迎伍得於境而君自郊迎令天下皆知君之重伍得也因泄之楚曰周君所以事伍得者器必名曰謀楚王必求之而伍得無効也王必罪之秦興師臨周而求九鼎周君患之以告顔率顔率東獻鼎而借救於齊齊大發師救周而秦兵罷齊将求九鼎顔率復説之而齊兵亦罷原本載東周紀中按東周居鞏非鼎之所在周䇿曰西周者故天子之國也多名器重寶固知當属西周也秦召周君周君難往或謂周君謂魏王安釐曰秦召周君将使攻魏之南陽史記魏作韓南陽韓地也王何不出兵於河南周君聞之将為辭於秦而不往周君不入秦秦必不敢越河而攻南陽國䇿五十九年秦取韓陽城負黍西周恐倍秦與諸侯約從将天下鋭師出伊闕攻秦令秦無得通陽城秦昭王怒使将軍摎攻西周西周君奔秦頓首謝罪盡獻其邑三十六口三萬秦受其獻歸其君於周周君王赧卒宋忠曰諡曰西周武公索隠葢武公與王赧並卒故連言之宋説非劉伯荘曰諡法無赧輕㣲危弱寄住東西足為慚赧故號之曰赧帝王世紀赧王多負債於民上臺以遊之名曰逃債臺雒陽南宫簃臺是也周民遂東亡秦取九鼎寶器而遷西周君於􅓆狐史記東周惠公東周惠公者西周惠公之少子也别封於鞏是為東周東周與西周戰韓救西周為東周謂韓王襄王曰西周者故天子之國也多名器重寶按兵而勿出可以徳東周西周之寶可盡矣東周與西周争西周欲和於楚韓齊明疑楚人謂東周君曰臣恐西周之與楚韓寶令之為已求地於東周也不如謂楚韓曰西周之欲入寶持二端今東周之兵不急西周西周之寶不入楚韓楚韓欲得寶且趣我攻西周是我為楚韓取寶以徳之也西周弱矣秦假道於周以伐韓周恐假之而惡於韓不假而惡於秦史黶謂周君曰君何不令人謂韓公叔曰秦敢絶塞而伐韓者信東周也公何不與周地發重使之楚秦必疑不信周是韓不伐也又謂秦王武王曰韓強與周地將以疑周於秦秦必無辭令周弗受是得地於韓而聴於秦也十五年楚攻雍氏周粻秦韓楚王懐王怒周為周謂楚王曰以王之強而怒周周恐必以國合於所與粟之國是勁王之敵也故不如速觧周恐彼前得罪而後得解必厚事王矣趙取周之祭地周君患之鄭朝鄭人曰臣請以三十金復取之周君予之鄭朝獻之趙太卜及王病太卜曰周之祭地為祟趙乃還之十八年三晋隘秦周令其相之秦以秦之輕也㽞其行有人謂相國曰秦之輕重未可知也秦欲知三國之情公不如遂見秦王曰請為王聴東方之處鮑彪注處所為也秦必重公是公重周以取秦也齊重故有周而已取齊有周猶善周言齊為天下重故甞善周而又取善於齊是周甞不失重國之交也史記齊重則固有周聚以収齊正義周聚事齊而和於齊周故得齊重以周聚為人名楚昭翦與東周惡或謂翦曰為公畫隂計翦曰何也曰西周甚憎東周常欲東周與楚惡西周必令賊賊公因宣言東周也以惡之於王也翦曰善遽和東周石行秦周人謂秦大梁造秦爵名鮑彪注葢白起也曰欲决覇王之名不如備兩周辯智之士謂周君曰君不如令辯智之士為君争於秦備者謹待之也争者争秦之卑周也國䇿後七年秦荘襄王滅東西周東西周皆入於秦周不祀史記賛曰元王以還周擁虗器弁髦芻狗天下顯棄之至若盜臣竊玉與國請命虎皮䝉羊覇王懼攻是文武之徳雖擕而餘緒如綫猶足繫屬一時予於其衰益見周徳之盛也尚史卷六
