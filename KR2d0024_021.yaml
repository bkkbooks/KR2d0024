body:
  text: 尚史卷二十一世家十四鑲白旗漢軍李鍇撰韓世家始威烈王二十三年終秦始皇十七年凡百七十四年自景侯至王安傳十一世景侯列侯文侯哀侯懿侯昭侯韓之先與周同姓曲沃武公之叔父也自韓萬封韓纍傳至韓厥韓不信並見晋傳不信是為韓簡子簡子卒子庚代是為莊子莊子卒子虎代是為康子康子與趙襄子魏桓子共敗知伯分其地地益大大子諸侯康子卒子啓章代是為武子武子二年伐鄭殺其君幽公紀年晉烈公元年韓武子都平陽十六年武子卒子䖍代是為景侯景侯元年伐鄭取雍邱二年鄭敗我負黍六年與趙魏俱得列為諸侯九年鄭圍我陽翟景侯薨于列侯取即位系本作武列侯九年秦伐我宜陽取六邑十三年薨諡曰列在位十三年子文侯即位紀年無文侯系本無列侯文侯二年伐鄭取陽城伐宋至彭城執宋君七年伐齊至桑邱九年代齊至靈邱十年薨諡曰文在位十年子哀侯即位哀侯元年與趙魏分晉國二年滅鄭因徙都鄭史記世家紀年魏武侯二十二年晉桓公邑韓哀侯于鄭是韓既徙都因改號曰鄭故國䇿謂韓惠王曰鄭惠王猶魏徙大梁稱梁王也六年韓嚴弒哀侯及相韓傀國䇿史記年表世家皆書列侯三年聶政殺相俠纍哀侯六年書韓嚴弒哀侯而刺客傳書嚴仲子事哀侯與相俠纍有隙使聶政刺殺之國䇿韓傀相韓嚴遂重于其君二人相害嚴遂使聶政刺俠纍纍走抱哀侯並中哀侯仲子蓋嚴遂字俠纍韓傀字也諡曰哀在位六年子懿侯即位紀年韓山堅弒其君哀侯而韓若山立若山即懿侯韓山堅即韓嚴也懿侯二年魏敗我馬陵五年與魏惠王㑹宅陽九年魏敗我澮十二年薨諡曰懿在位十二年子昭侯即位紀年名武昭侯元年秦敗我西山二年宋取我黃池六年伐東周取陵觀邢邱八年申不害相修術行道國內以治按此下史云十年韓姬弒其君悼公悼公為誰且昭侯事中攙入悼公恐誤十一年昭侯如秦二十四年秦拔我宜陽二十五年旱作髙門二十六年髙門成昭侯薨史記世家諡曰昭在位二十六年宣惠王襄王釐王桓惠王王安宣惠王昭侯之子也紀年鄭昭侯武薨次威侯立威侯七年與邯鄲圍襄陵五月梁惠王㑹威侯于巫沙十月鄭宣王朝梁威侯宣王不紀薨立紀年亦不足據也昭侯薨宣惠王即位八年魏敗我將韓舉紀年在威侯八年十一年君號為王與趙㑹區鼠十四年秦敗我鄢十六年秦敗我修魚虜我將䱸申差我急將西購于秦與之南伐楚楚王聞之大恐乃興師言救我戰車滿道路發信臣多其車重其幣王聞之大說相公仲侈諫不聽遂絶秦秦因大怒益甲伐我大戰楚救不至十九年大破我岸門太子倉質于秦以和二十一年與秦共攻楚敗楚將屈丐是年王薨諡宣惠在位二十一年太子倉即位是為襄王襄王四年與秦武王㑹臨晉秋秦甘茂攻我宜陽五年拔宜陽斬首六萬六年秦與我武遂九年秦復取我武遂十年太子嬰朝秦而歸十一年秦伐我取穰與秦伐楚敗楚將唐昧十二年太子嬰死公子咎公子蟣虱爭為太子時蟣虱質于楚韓咎韓咎韓人與公子咎别是一人令楚圍我雍氏將因韓楚奉蟣虱而內之公仲侈以國合于齊楚于是楚解雍氏圍蟣虱竟不得歸立公子咎為大子齊魏王來十四年與齊魏共擊秦至函谷而軍焉十六年秦與我河外及武遂王薨諡曰襄在位十六年大子咎即位是為釐王釐王三年使公孫喜率周魏攻秦秦敗我軍二十四萬虜喜伊闕五年秦拔我宛六年與秦武遂地二百里十年秦敗我師于夏山十二年與秦昭王㑹西周佐秦攻齊齊敗十四年與秦㑹西周間二十一年使暴䳒救魏為秦所敗䳒走開封二十三年趙魏攻我華陽我告急于秦秦救我敗趙魏于華陽之下是年王薨諡曰釐在位二十三年子桓惠王即位桓惠王元年伐燕九年秦拔我涇城汾旁十年秦擊我于大行我上黨郡守以上黨降趙十四年秦拔趙上黨殺趙卒四十餘萬于長平十七年秦拔我陽城負黍二十四年秦拔我城臯滎陽二十六年秦悉拔我上黨二十九年秦拔我十三城三十四年王薨諡桓惠在位三十四年子王安即位王安五年秦攻我我急使韓非使秦秦留非殺之九年秦虜王安盡入其地為潁川郡韓遂亡史記世家贊曰厥起厚基韓氏用昌卒得南面平陽分晉滅鄭然韓最近秦使宣惠以還翼魏挾趙連和齊楚腹心秦疾秦雖暴無如韓何乃二三厥德詐力相尚逮秦勢既熾然後仰關西攻偏敗衆携宜不濟也韓業餧肉虎口韓非鯫生顧將劘其牙而探之悲夫魏世家始威烈王二十三年終秦始皇二十二年凡百七十九年自文侯至王假傳九世魏桓子文侯武侯魏之先畢公髙之後也髙封于畢于是為畢姓其後絶封為庶人或在中國或在夷狄其苗裔曰畢萬事晉獻公獻公滅魏以封萬為大夫萬生武子犫犫生莊子絳史記世家武子生悼子悼子徙治霍系本武仲生莊子絳無悼子而系本居篇又曰魏武子居魏悼子徙霍是有悼子也然內外傳皆有悼子絳生獻子舒史記世家絳生魏嬴嬴生獻子系本獻子名荼莊子之子無魏嬴同左氏舒生簡子取取生襄子曼多史記世家獻子生魏侈無簡子一代侈一作哆即魏曼多也以上詳晉列傳曼多生桓子駒系本按史記以桓子為襄子孫代系多不合駒與韓康子趙襄子共伐滅知伯分其地駒之孫曰文侯斯按世本作斯系本同而其傳曰孺子􅗢是魏駒之子史記作都文侯元年周威烈王之二年也六年城少梁八年復城少梁十三年使子擊圍繁龎出其民十六年伐秦築臨晉元里十七年伐中山使子擊守之趙倉唐傅之說苑文侯使子擊守中山趙倉唐傅之居三年往來之使不通于君倉唐問曰胡不遣人使上國乎擊曰願之久矣誰可者倉唐請行問君所嗜好擊曰嗜晨鳬好壯犬乃遣倉唐緤北犬而奉晨鳬獻于文侯倉唐至上謁曰孽子擊使者不敢見于朝請以燕閒奉晨鳬敬獻庖人緤北犬敬上涓人文侯悅曰擊愛我不忘吾所嗜好者召倉唐見之曰擊無恙乎倉唐曰唯唯如是者三乃曰太子在外君國名非臣所得聞也文侯怵然為之變容曰子之君無恙乎曰臣之來也拜送書于庭文侯顧指左右曰子之君孰與是長曰擬人必于其倫國君無所擬之文侯曰長大孰與寡人曰君賜之外府之衣則能勝之賜之斥帶則不更造矣文侯曰子之君何業曰業詩文侯曰于詩何好曰好晨風黍離文侯誦晨風曰子之君以我忘之乎曰非敢也思君耳文侯復誦黍離曰子之君怨乎曰非敢也思君耳文侯于是遣倉唐賜太子襲衣曰必以雞鳴時至太子發篋視之衣盡顛倒曰君侯召擊矣倉唐曰臣未聞命也擊曰君命子以雞鳴至而衣盡顛倒詩不云乎東方未明顛倒裳衣顛之倒之自公召之遂西見文侯文侯大喜置酒而稱曰逺賢而近所愛非社稷之計也乃出少子摯封之中山而復太子擊子擊西攻秦至鄭而還築雒陰合陽二十二年列為諸侯二十四年秦伐我至陽狐二十六年虢山崩壅河三十二年伐鄭城酸棗敗秦于注三十五年齊伐我取襄陵三十六年秦侵我陰晉三十八年伐秦敗之武下得其將識是年文侯薨史記世家年紀年云五十韓趙嘗相難韓索兵于我曰願得借師以伐趙文侯曰寡人與趙兄弟不敢從趙又索兵以攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反已乃知文侯已講于己也皆朝魏文侯與虞人期獵是日飲酒樂天雨文侯將出左右曰公將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃往身自罷之國䇿略韓非子同文侯受子夏經藝客段干木過其廬未嘗不軾也任西門豹守鄴而河內稱治秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也文侯由此得譽于諸侯淮南子解扁為東封上計而入三倍有司請賞之文侯曰吾土地非益廣人民非益衆入何以三倍對曰以冬伐木而積之于春浮之河而鬻之文侯曰民春以力耕暑以强耘秋以收斂冬閒無事伐林而積之負軛而浮之河是用民不得休息民以敝矣雖三倍入將焉用之說苑文侯觴大夫于曲陽飲酣文侯喟然嘆曰吾獨無豫讓以為臣蹇重舉酒進曰臣請浮君文侯曰何以對曰臣聞有命之父母不知孝子有道之君不知忠臣夫豫讓之君亦何如哉文侯曰善又曰文侯與大夫飲酒使公乘不仁為觴政曰飲不嚼者浮以大白文侯飲不盡嚼公乘不仁舉白浮君曰周書曰前車覆後車戒蓋言其危今君已設令令不行可乎君曰善以公乘不仁為上客新序文侯出遊見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知裏盡而毛無所恃邪明年東陽上計錢布十倍大夫畢賀文侯曰此非所賀也無異夫反裘而負芻也今吾田地不加廣士民不加衆而錢十倍必取之士大夫也吾聞之下不安者上不可居也又曰文侯見箕季其牆壞而不築文侯曰何為不築對曰不時牆枉而不端問曰何不端曰固然從者食其園之桃箕李禁之少焉日晏進糲餐之食瓜瓠之羮文侯出曰吾一見季而得四焉牆壞不築云待時者教我無奪農時也牆枉而不端曰固然者教我無侵封疆也從者食桃箕季禁之教我下無侵上也食以糲餐者教我無多斂于百姓也韓詩外傳文侯問狐卷子曰父賢足恃乎曰不足子賢足恃乎曰不足兄賢足恃乎曰不足弟賢足恃乎曰不足臣賢足恃乎曰不足文侯作色曰五者一一為不足何也對曰父堯而丹朱放子舜而瞽瞍頑兄舜而象傲弟周公而管叔誅臣湯武而桀紂伐望人者不至恃人者不久君欲治從身始符子文侯見宋陵子三仕不願文侯曰何貧乎曰楚富者牧羊九十九而願百其鄰人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰人與之從此觀焉富者非富貧非貧也薨諡曰文在位三十八年漢書儒家魏文侯六篇子擊即位是為武侯元年趙公子朔為亂敬侯來奔與我襲邯鄲我敗而去二年城安邑王垣七年伐齊至桑邱九年翟敗我于澮我使吳起伐齊至靈邱十一年與韓趙三分晉地滅其後十五年敗趙北藺十六年伐楚取魯陽武侯薨史記世家諡曰武在位十六年惠王惠王名罃武侯之子也武侯薨王即位初武侯之薨也公中緩與惠王爭為太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩爭為太子君亦聞之乎今魏罃得王錯魏大夫紀年惠王二年魏大夫王錯出奔韓挾上黨固半國也因而除之破魏必矣不可失也懿侯說乃與趙成侯伐我戰于濁澤我大敗或為趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分為兩不彊于宋衛則我終無魏之患矣趙不聽韓不說以其少卒夜去二年敗韓于馬陵敗趙于懷三年齊取我觀五年與韓㑹宅陽城武堵為秦所敗六年伐宋取儀臺九年取韓于澮與秦戰少梁虜我將公孫痤取龎十年伐趙取皮牢彗星見十二年星晝墜有聲十四年與趙㑹滈十五年魯衛宋鄭君來朝按紀年在十四年鄭君鄭釐侯也鄭釐侯者韓昭侯也韓滅鄭改號鄭十六年與秦孝公㑹社平侵宋黃池宋復取之十七年與秦戰元里秦取我少梁圍趙邯鄲十八年拔邯鄲趙請救于齊齊救趙敗我桂林十九年諸侯圍我襄陵築長城塞固陽二十年歸趙邯鄲與盟漳水上魏䇿龎葱與太子質于邯鄲謂魏王曰今一人言市有虎王信之乎王曰否二人言市有虎王信之乎王曰寡人疑之矣三人言市有虎王信之乎王曰寡人信之矣龎葱曰夫市之無虎明矣然而三人言而成虎今邯鄲去大梁也逺于市而議臣者過于三人願王察之也王曰寡人自為知于是辭行而讒言至後太子罷質果不得見史無質太子事十一年與秦㑹彤二十八年中山君相三十年伐趙趙告急齊齊救趙擊我我大興師使龎涓將令太子申為上將軍與齊人戰敗于馬陵齊虜太子申殺將軍涓軍大破三十一年秦趙齊伐我秦商􅀈詐我將軍公子卬而襲破之秦用商鞅東地至河而齊趙數破我安邑近秦于是徙治大梁以公子赫為太子三十五年與齊宣王㑹平阿南三十六年復與齊王㑹甄是年王薨紀年惠成王三十六年改元稱一年後十七年卒王數敗于軍旅卑禮厚幣以招賢者鄒衍淳于髠孟軻皆至梁軻以仁義說王王不能用史記世家王在位三十六年諡曰惠襄王哀王襄王名嗣系本惠王之子也惠王薨王即位元年與諸侯㑹徐州稱王追尊父惠王為王徐廣曰二年伐趙五年秦敗我龍賈軍于雕陰圍我焦曲沃豫秦河西地六年與秦㑹應秦取我汾隂皮氏焦我伐楚敗之陘山七年我盡入上郡于秦秦降我蒲陽八年秦歸我焦曲沃十二年楚敗我襄陵諸侯執政與秦相張儀㑹齧桑十三年張儀相我有女子化為丈夫秦取我曲沃平周十六年王薨紀年魏襄王十九年薛侯來㑹王于釜邱二十年王與齊王㑹于韓諡曰襄在位十六年子哀王即位紀年起自黃帝終魏之今王今王者魏惠成王子而以襄王之年為惠成王之後十七年世本惠王生襄王襄王生昭王而無哀王並誤張儀復歸秦哀王元年五國共攻秦韓魏楚趙燕不勝而去二年齊敗我觀津五年秦樗里疾伐我取曲沃走犀首岸門索隱犀首官名即公孫衍六年秦求立公子政為太子政魏公子與秦㑹臨晉七年攻齊與秦伐燕八年伐衛拔列城二紀年翟章伐衛九年與秦王㑹臨晉張儀魏章皆來歸章為魏將後相秦相田需卒太子為相十一年與秦武王㑹應十二年太子朝秦秦伐我皮氏未拔而解十四年秦來歸我王后十六年秦拔我蒲反陽晉封陵紀年作晉陽封谷十七年與秦㑹臨晉秦與我蒲反十八年與秦伐晉二十一年與齊韓共敗秦軍函谷二十三年秦復豫我河外及封陵以和是年王薨史記世家諡曰哀在位二十三年紀年終于二十年昭王三年喪畢始稱元年昭王安釐王景湣王王假昭王名遫系本哀王之子也哀王薨王即位元年秦拔我襄城二年與秦戰不利三年佐韓攻秦秦白起破我軍伊闕二十四萬六年豫秦河東地方四百里芒卯以詐重事見芒卯傳七年秦拔我城六十一九年秦拔我新垣曲陽城十年齊滅宋宋公死我溫十二年與秦趙韓燕共伐齊敗之濟西湣王出亡燕獨入臨菑與秦王㑹西周十三年秦拔我安城兵至大梁去徐廣曰十四年大水十九年王薨史記世家諡曰昭在位十九年子安釐王即位安釐王名圉系本元年秦拔我兩城二年又拔我二城軍在梁下韓來救豫秦溫以和三年秦拔我四城斬首四萬四年秦破我及韓趙殺十五萬人走我將芒卯段干子請豫秦南陽以和九年秦拔我懷十年秦太子外質于我死十一年秦拔我郪邱齊楚相約而攻我我使求救于秦秦救我魏氏復定王以秦救我故欲親秦而伐韓以求故地信陵君無忌諫乃止二十年秦圍邯鄲無忌矯奪將軍晉鄙兵以救趙趙得全無忌因留趙三十年無忌來歸率五國兵攻秦敗之河內走蒙驁太子增質于秦秦怒欲囚增蘇秦為增謂秦王曰公孫衍史記作公孫喜固謂魏相曰請以魏疾擊秦秦王怒必囚增魏王又怒擊秦秦必傷今王囚增是衍之言中也故不若貴增而合魏以疑之于齊韓秦乃止三十四年王薨諡安釐在位三十四年太子增即位是為景湣王系本作景愍王午信陵君無忌卒景湣王元年秦拔我二十城以為東郡二年秦拔我朝歌三年秦拔我汲五年秦拔我垣蒲陽衍徐廣曰十二年獻城秦十五年王薨諡景湣在位十五年子王假即位徐廣曰二年新鄭反王假三年秦灌大梁虜王假遂滅魏史記世家列女傳秦殺假贊曰文侯受子夏經客段干木秦遂不敢加兵然則賢者固所以警敵國禦外侮者歟子輿氏間關造魏庶幾惠成尚祖德而踵前修蓋深有意也乃蔑仁專利棄賢勿務兵破于齊地逼于秦舍安邑徙大梁所謂我能往冦亦能往徙且安之乎本實先拔强延六葉幸矣然信陵一振五國奮䝉驁奔嗟乎信陵不死魏未必亡信陵其亦賢者之亞與趙世家始威烈王二十三年終秦始皇二十五年凡百八十二年自獻侯至王嘉十十二世烈侯武侯敬侯成侯肅侯趙氏之先與秦共祖至中衍為帝大戊御其後蜚亷有子二人惡來其後為秦季勝其後為趙季勝生孟增孟增幸于成周王是為宅臯狼生衡父衡父生造父造父善御幸于穆王列子造父之師曰泰豆氏造父始從習御泰豆三年不告造父執禮愈謹泰豆乃告之曰汝先觀吾趣趣如吾然後六轡可持六馬可御造父曰唯命泰豆乃立木為塗僅可容足計步而置履之而行趣走往還無跌失也造父學之三日盡其巧泰豆嘆曰子何敏也凡所御者亦如此得之于銜應之于轡得之于轡應之于手得之于手應之于心則不以目視不以䇿驅心間體正六轡不亂而二十四蹄所投無差回旋進退莫不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地山谷之險原隰之夷視之一也吾術窮矣汝其識之造父取驥之乘匹與桃林盜驪驊騮騄耳獻之穆王穆王使造父御西巡狩見西王母樂之忘歸而徐偃王反穆王日馳千里馬攻徐偃王大破之乃賜造父以趙城繇此為趙氏自造父以下六世至奄父曰共仲宣王伐戎奄父為御及千畝之戰王師敗績奄父脫王于難奄父生叔帶叔帶之時幽王無道去周如晉事晉文侯始建趙氏于晉國自叔帶以下趙宗益興五世而生趙夙晉獻公之十六年伐霍魏耿而趙夙為將伐霍霍公求一作來奔齊晉大旱卜之曰霍太山為祟夙召霍君于齊復之以奉霍太山之祀晉復禳獻公賜夙耿夙生共孟共孟生趙衰衰卒子盾嗣盾卒子朔嗣朔死後十五年子武嗣武生成成生􅀈是為簡子廢太子伯魯而以無恤為太子簡子卒無恤嗣是為襄子于是趙北有代南并知氏彊于韓魏襄子三十三年卒伯魯孫浣嗣史記世家按自趙夙至襄子凡九世並見前晉諸臣列傳是謂獻侯獻侯浣代安成君周之子故太子伯魯之孫也系本代成君起即襄子之子襄子為伯魯之不立也不肯立子代成君先死乃取代成君子浣立為太子襄子卒浣即位是為獻侯獻侯少即位治中牟襄子弟桓子逐獻侯自立于代系本作襄子子一年卒國人曰桓子立非襄子意乃共殺其子而復迎立獻侯十三年城平邑紀年晉烈公元年趙襄子城泣氏十五年薨諡曰獻在位十五年子烈候籍即位烈侯六年韓魏趙皆立為諸侯追尊獻子為獻侯烈侯九年薨諡曰烈在位九年弟武公即位譙周云系本及說趙語者並無其事又按三晉皆自侯僭王無稱公者武公十三年薨諡曰武在位十三年趙立烈侯太子章是為敬侯敬侯元年武公子朝作亂不克出奔魏趙始都邯鄲二年敗齊于靈邱三年救魏于廩邱大敗齊人四年魏敗我兔臺築剛平以侵衛五年齊魏為衛攻我取我剛平六年借兵于楚伐魏取棘蒲八年拔魏黃城九年伐齊齊伐燕我救燕十年與中山戰于房子十一年韓魏趙共滅晉分其地伐中山又戰于中人十二年薨諡曰敬在位十二年子成侯種即位成侯元年公子勝與成侯爭立為亂二年六月雨雪三年伐衛取鄉邑七十三衛敗我藺四年與秦戰髙安敗之五年伐齊于鄄魏敗我懷攻鄭敗之以與韓韓與我長子六年中山築長城伐魏敗之涿澤圍魏惠王七年侵齊至長城與韓攻周此下有八年與韓分周為兩事周紀無之九年與齊戰阿下十年攻衛取甄十一年秦攻魏我救之石阿十二年秦攻魏少梁我救之十三年魏敗我澮取皮牢成侯與韓昭侯遇上黨十四年與韓攻秦十五年助魏攻齊十六年與韓魏分晉封晉君以端氏十七年成侯與魏惠王遇葛孽十五年與齊宋㑹平陸與燕㑹阿二十年魏獻榮椽劉氏云榮椽蓋地名康成云榮屋翼也說文椽榱也屋梠之兩頭起者為榮二十一年魏圍我邯鄲二十二年魏惠王拔我邯鄲齊亦敗魏于桂陵二十四年魏歸我邯鄲與魏盟漳水上秦攻我藺二十五年成侯薨諡曰成在位二十五年公子緤與太子語爭立系本肅侯名語緤敗亡奔韓太子即位是為肅侯肅侯元年奪晉君端氏徙處屯留二年與魏惠王遇于陰晉三年公子范襲邯鄲不勝而死四年朝天子六年攻齊拔髙唐七年公子刻攻魏首垣十一年伐魏十五年起夀陵史記世家十六年蘇秦自燕之趙始合從說肅侯一韓魏齊楚燕趙六國從親以儐畔秦肅侯乃封蘇秦為武安君飾車百乘黃金千鎰白璧百雙錦繡千純以約諸侯國䇿史記蘇秦既約六國從親歸趙乃投從約書于秦秦兵不敢窺函谷關十五年其後秦使犀首欺齊魏與共伐趙敗從約按國䇿約從在肅侯十六年至十八年齊魏伐趙蓋即犀首敗從之事然則合從裁及二年而云十五年不敢窺函谷關史詡辭爾十七年圍魏黃不克築長城十八年齊魏伐我我決河水灌之兵去二十二年趙疵與秦戰敗秦殺疵河西取我藺離石二十三年韓舉與齊魏戰死于桑邱徐廣曰韓舉韓將非是蓋趙將也韓將戰死何預趙事而紀趙世家紀年亦曰趙將二十四年肅侯薨秦楚燕齊魏出鋭師各萬人來葬史記世家諡曰肅在位二十四年武靈王惠文王武靈王名雍肅侯之子也肅侯薨王即位元年陽文君趙豹相梁襄王與太子嗣韓宣王與太子倉來朝信宫武靈王少未能聽政博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮年表魏敗我趙護三年城鄗四年與韓㑹于區鼠五年娶韓女為夫人八年五國相王趙獨否曰無其實敢處其名乎令國人謂己曰君九年與韓魏共擊秦秦敗我斬首八萬齊敗我觀澤十年秦取我西都及中陽齊破燕十一年王召公子職于韓立以為燕王使樂池送之紀年同燕世家無之蓋趙遙立職實未嘗入燕十三年秦拔我藺虜將軍趙莊楚魏王來過邯鄲十四年趙何攻魏十七年王出九門為野臺以望齊中山之竟十八年秦武王死王使代相趙固迎公子稷于燕送歸立之是為昭王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至于房子遂之代北至無窮西至河登黃華之上召樓緩别是一人非武成王時樓緩也謀欲胡服騎射以教百姓樓緩曰善羣臣皆不欲使告公子成公子成不可王遂自請之語見公子成傳公子成聽命于是遂胡服招騎射淮南子武靈王貝帶鵕翿而朝趙國化之二十年王略中山地至寧葭西略地至榆中林其王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊趙固致中林兵二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將軍騎趙希并將燕代趙與之陘合軍曲陽攻取丹邱華陽鴟之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷軍二十三年攻中山二十五年惠后卒太子章之母使周祒胡服傅王子何二十六年復攻中山攘地北至燕代西至雲中九原二十七年五月戊申大朝于東宫傳國立王子何為王是為惠文王惠文王惠后吳娃子也武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北略燕地而欲從雲中九原直南襲秦于是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫關矣審問之乃主父也秦人大驚主父所以入秦者欲自略地形因觀秦王之為人也惠文王二年主父行新地遂出代西遇樓煩王于西河而致其兵三年滅中山遷其王于膚施起靈壽北地方從代道大通還歸行賞大赦置酒酺五日封長子章為代安陽君四年主父及王遊沙邱異宫公子章作亂殺肥義公子成李兑以兵入距難公子章敗往走主父主父開之謂容其入宫藏也成兌因圍主父宫公子章死成兑謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫中後出者夷宫中人悉出主父欲出不得又不得食探爵鷇而食之三月餘而餓死沙邱宫索隱武靈王葬代郡靈邱縣括地志墓在蔚州靈邱縣東三十里主父定死乃發喪赴諸侯主父諡武靈在位二十七年而傳位又四年薨是時王少成兌專政五年與燕鄭易八年城南行唐九年趙梁將與齊合軍攻韓至魯關下十一年董叔與魏伐宋得河陽于魏秦取梗陽十二年趙梁將攻齊十三年韓徐將攻齊十四年相國樂毅將趙秦韓魏燕攻齊取靈邱與秦㑹中陽十五年燕昭王來見趙與韓魏秦共攻齊齊王敗走燕深入取臨菑十六年秦復與趙數擊齊齊人患之蘇厲為齊遺王書曰齊之所以伐者以事王也天下屬行以謀王也齊背五國之約而殉王之患西兵以擊彊秦齊之事王宜為上佼而今乃抵罪今王毋與天下攻齊天下必以王為義齊抱社稷而厚事王王以天下善秦秦暴王以天下禁之是一世之名寵制于王也于是趙乃謝秦不擊齊王與燕王遇亷頗將攻齊昔陽取之十七年樂毅將攻魏伯陽秦怨趙不擊齊伐趙拔我兩城十八年秦拔我石城王再之衛東陽決河水伐魏大潦漳水出魏冉來相十九年秦拔我二城趙與魏伯陽趙奢將攻齊麥邱取之二十年亷頗將攻齊與秦昭王遇西河外年表與秦㑹澠池二十一年徙漳水武平西二十二年大疫置公子丹為太子二十三年樓昌將攻魏幾不能取亷頗攻幾取之二十四年亷頗將攻魏房子拔之又攻安陽取之二十五年燕周將攻昌城髙唐取之與魏共擊秦秦將白起破我華陽得一將軍二十六年取東胡歐代地二十七年徙漳水武平南封趙豹為平陽君王母弟河水出大潦二十八年藺相如伐齊至平邑罷城北九門大城二十九年秦韓相攻而圍閼與趙使趙奢將擊秦大破秦軍閼與下三十三年王薨史記世家諡惠文在位三十三年孝成王悼襄王幽繆王趙王嘉孝成王名丹惠文王太子也惠文王薨太子丹即位是為孝成王元年秦伐我拔三城王新立秦急攻之我求救于齊以長安君為質長安君惠文王少子齊兵將出齊田單將我師而攻燕中陽拔之又攻韓注人拔之二年惠文后卒田單為相四年王夢衣偏裻之衣乘飛龍上天不至而墜見金玉之積如山明日王召筮史敢占之曰夢偏衣裻之衣者殘也乘飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也後三日韓上黨守馮亭使者至曰韓不能守上黨欲入之秦吏民安為趙不欲為秦有城市邑十七願入之趙趙遂發兵取上黨亷頗將軍軍長平七年亷頗免趙括代將秦圍括括以軍降卒四十餘萬皆坑之王還不聽秦秦圍邯鄲八年趙勝如楚請救還楚來救九年魏公子無忌亦來救秦圍乃解十年燕攻昌壯壯當作城一作社拔之樂乘慶舍攻秦信梁軍破之太子死索隱趙太子史失名徐廣曰是嵗周郝王卒或者太子云天子此說誤書法無曰天子死者而秦攻西州拔之徒父祺出索隱祺趙大夫正義秦拔西州故令徒父祺將兵出境按史記十年事多未詳或太子死當在拔西州之下蓋趙破秦軍而秦拔西州為一事太子死而徒父祺出為一事不然而字義不屬十一年城元氏縣上原十四年趙勝卒十五年封亷頗為信平君燕王令丞相栗腹約歡以五百金為王酒還歸伐我栗腹攻鄗卿秦攻代亷頗將破殺栗腹虜卿秦十六年亷頗圍燕以樂乘為武襄君十七年樂乘攻燕圍其國十八年延陵鈞帥師從亷頗助魏攻燕秦拔我榆次三十七城十九年趙與燕易土以龍兑汾門臨樂與燕燕以葛武陽平舒與趙二十年秦拔我晉陽二十一年王薨諡孝成史記世家初齊人李伯見孝成王王說之以為代郡守居無幾何人告之反孝成王方饋不墮食告者復至孝成王不應已乃使使者言齊舉兵擊燕按代地非齊所經恐誤恐以擊燕為名而絶趙故發兵自備今燕齊已合臣請要其敝而地可多割也自是之後為孝成王從事于外者人無自疑趙䇿孝成王在位二十一年子偃即位是為悼襄王是年亷頗將攻繁陽取之使樂乘代之亷頗攻樂乘乘走亷頗亡入魏悼襄王元年大備正義謂行大備之禮徐廣曰一作修魏欲通平邑中牟之道不成正義平邑中牟時屬魏欲渡黃河作道相通遂不成也按上大備之義未詳且無此書法又魏欲通道當繫之魏世家不應入趙竊謂悼襄既立而亷頗入魏或畏其來攻故大備魏也又按下文五年傅抵將居平邑是平邑屬趙不屬魏蓋趙欲以平邑與魏中牟之道相通而不成也武靈王時起靈壽北地方從代道大通還歸行賞是通道為趙之故事然則大備魏當為句通平邑趙事故繫之趙世家二年李牧將攻燕拔武遂方城秦召春平君年表太子從質秦歸正義太子即春平君按此蓋即趙王遷也因而留之泄鈞趙人說秦秦遣之我城韓臯三年龎暖將攻燕擒其將劇辛四年龎暖將趙楚魏燕之鋭師攻秦蕞不拔移攻齊取饒安五年傅抵將居平邑慶舍將東陽河外師守河梁六年魏與我鄴九年攻燕取貍陽城貍當作漁兵未罷秦攻鄴拔之是年王薨諡悼襄在位九年攻燕取貍幽繆王遷即位遷母倡也嬖于悼襄王悼襄王廢適子嘉立遷幽繆王元年城柏人二年秦攻武城扈輒率師救之軍敗死焉三年秦攻赤麗宜安李牧率師與戰肥下却之封牧為武安君四年秦攻畨吾李牧却之五年代地大動自樂徐以西北至平陰屋大半壞地坼東西百三十步六年大饑七年秦攻趙李牧司馬尚擊之李牧誅司馬尚免趙忽國策忽作葱及齊將顔聚代之趙忽軍破顔聚亡去以王遷降徐廣曰王遷流于房陵思故鄉作山水之謳聞者莫不隕涕王遷無行信讒誅良將李牧用郭開以至于亡王遷在位七年追諡為幽穆王徐廣曰王遷無諡蓋趙滅後人竊追諡之或太史公别有所見而記之括地志王遷墓在房州房陵縣西九里八年邯鄲為秦趙之亡大夫共立悼襄王故適子嘉為王王代六嵗秦進兵破之遂滅趙以為郡史記世家贊曰毋恤雄桀也而嗣趙趙之興也宜矣通其志者為武靈方其胡服騎射略樓煩中山欲從雲中九原直南襲秦何其壯也武靈不死秦之北門殆不啓與乃猛噬之氣馴諸枕席食鷇沙邱為天下笑夫春秋多楚患制楚者晉也而鄭實操其紐六國苦秦暴制秦者齊也而趙實扼其吭卒之閼與前振長平繼隳亷藺奢牧接踵無補魚爛自中若薦腥然秦雖不欲虎噬又安得耶田齊世家始安王十六年終秦始皇二十六年凡百六十六年自太公至王建傳七世太公桓公陳之先完者陳厲公躍之子也史記世家作他非是完為陳大夫宣公殺太子禦冦完奔齊為工正卒諡為敬仲完生稚孟夷系本作夷孟思完之如齊以陳字為田氏應劭云始食采地由是改姓田氏索隱陳田二字聲相近遂為田氏田稚孟夷生湣孟莊系本作閩孟克莊一作芷湣孟莊生文子須無文子卒生桓子無字桓子卒生武子開與僖子乞僖子行陰德于民得齊衆心宗族益彊民思田氏僖子立齊悼公為相專齊僖子卒子常嗣是為田成子成子弒齊簡公立平公成子為相齊國之政皆歸成子割齊自安平以東至郎邪自為封邑封邑大于平公之所食成子卒成子以上詳見齊傳子襄子盤嗣世本名班史記世家田常選齊國中女子長七尺以上為後宫後宫以百數而使賓客舍人出入不禁及常卒有七十餘男鮑昱云陳成子有數十婦生男百餘譙周古史考按春秋陳恆雖負殺君之名至于行事亦修整非茍為獸禽之行夫成事在姦雖子七十祗以長亂事豈然哉襄子相齊宣公使其兄弟宗人盡為齊都邑大夫且以有齊國襄子卒子莊子伯嗣莊子相宣公莊子卒子太公和嗣紀年齊宣公十五年田莊子卒明年立田悼子宣公四十七年悼子卒次立和莊子田成子殺齊君十二代而有齊國鬼谷子同按十二代者蓋自成子上下推之而中加悼子也太公亦相宣公宣公卒子康公淫于酒婦人不聽政太公乃遷康公于海上食一城以奉其先祀康公之十八年太公與魏文侯㑹濁澤求為諸侯魏文侯乃使使言周天子及諸侯天子許之田和立為齊侯列于周室太公元年周安王之十六年也二年徐廣曰伐魯破之太公薨子桓公午即位紀年齊康公五年田侯午生二十二年田侯剡立後十年田午弒其君及孺子喜而為公春秋後傳田午弒田侯及孺子喜而兼齊是為桓侯按後傳脫剡一代桓公五年韓魏趙伐我至桑邱此下云秦魏攻韓韓求救于齊齊陰許之而起兵襲燕取桑邱按此乃湣王十年伐燕噲子之之事史記誤六年救衛紀年桓公十一年弒其君母是年桓公薨紀年梁惠王十三年當桓公十八年其後威王始見蓋桓公在位十九年威王宣王威王名因齊桓公之子也桓公六年薨威王即位是年故齊康公卒絶無後奉邑皆入田氏威王元年三晉因我喪來伐我靈邱六年魯伐我入陽關三晉伐我至博陵史記作晉蓋脫三字七年衛伐我取薛陵九年趙伐我取甄王即位以來不治委政卿大夫九年之間諸侯並伐國人不治于是王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不闢民貧苦昔日趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆并烹之考要譽阿大夫者佞臣周破胡也遂起兵西擊趙衛敗魏于濁澤而圍惠王惠王獻觀以和趙人歸我長城于是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵于齊二十餘年鄒忌相封以下邳號曰成侯二十三年與趙王㑹平陸二十四年與魏王會田于郊魏王問曰王亦有寶乎王曰無有魏王曰寡人國小也尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為冦東取泗上十二諸侯皆來朝吾臣有肹子者使守髙唐則趙人不敢東漁于河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾吏有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉魏王慙不懌而去韓詩外傳作宣王二十六年魏圍邯鄲趙求救于我王使田忌南攻襄陵及邯鄲拔因起兵擊魏大敗之桂陵于是齊最彊于諸侯自稱為王以令天下三十三年殺其夫人牟辛年表作夫人世家作夫人紀年宣王八年殺其王后三十六年王薨諡曰威在位三十六年子辟疆即位是為宣王宣王二年魏伐趙趙與韓擊魏趙不利戰于南梁韓氏請救于齊王陰告韓使者而遣之韓恃齊五戰不勝而東委國于齊齊因起兵使田忌田嬰將孫臏為帥救韓趙以擊魏大敗之馬陵殺其將龎涓虜其太子申其後三晉之王皆因田嬰朝王于博望盟而去七年與魏王㑹平河南明年復㑹甄明年與魏襄王㑹徐州諸侯相王十年楚圍我徐州十一年與魏伐趙趙決河水灌齊魏兵罷十九年王薨諡曰宣在位十九年宣王喜文學游說之士自如鄒衍淳于髠田駢接豫慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以稷下學士復盛且數百千人史記世家湣王襄王王建湣王名地系本名遂宣王之子也宣王薨湣王即位元年秦使張儀與諸侯執政㑹于齧桑三年封田嬰于薛四年迎婦于秦七年與宋攻魏敗之觀澤十二年攻魏二十三年與秦擊敗楚于重邱二十四年秦涇陽君質于齊二十五年歸涇陽君于秦薛文入秦即相秦文亡去二十六年與韓魏共攻秦至函谷君焉二十八年秦與韓河外以和兵罷二十九年佐趙滅中山三十六年王為東帝秦昭王為西帝蘇代自燕來見于章華東門王曰嘻善子來秦使魏冉致帝子以為何如對曰王之問臣也卒而患之所從來微願王受之而勿備稱也秦稱之天下安之王乃稱之無後也且讓爭帝名無傷也秦稱之天下惡之王因勿稱以收天下此大資也且天下兩立帝王以天下為尊齊乎尊秦乎王曰尊秦曰釋帝天下愛齊乎愛秦乎王曰愛齊而憎秦曰兩帝立約伐趙孰與伐桀宋之利王曰伐桀宋利對曰夫約鈞然與秦為帝而天下獨尊秦而輕齊釋帝則天下愛齊而憎秦伐趙不如伐桀宋之利故願王明釋帝以收天下倍約賓秦與爭重而王以其間舉宋夫有宋衛之陽地危有濟西趙之阿東國危有淮北楚之東國危有陶平陸梁門不開釋帝而貸之以伐桀宋之事國重而名尊燕楚所以形服天下莫敢不聼此湯武之舉敬秦以為名而後使天下憎之此所謂以卑為尊者也願王熟慮之于是齊去帝復為王秦亦去帝位三十八年伐宋宋王出亡死于溫齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼三十九年秦伐我拔列城九四十年燕秦三晉各出鋭師伐我敗我濟西鹽鐵論湣王奮二世之餘烈南舉楚淮北并巨宋苞十二國西摧三晉郤彊秦五國賓從鄒魯之君泗上諸侯皆入臣矜功不休百姓不堪故諸侯合謀伐之燕師遂入臨菑取齊之寶藏器王出亡之衛衛君辟宫舍之稱臣而共具王不遜衛人侵之王走鄒魯有驕色鄒魯弗內遂走莒楚使淖齒將兵救齊因相王淖齒遂殺王而與燕共分齊之侵地鹵器王在位四十年諡曰湣湣王之遇殺子法章變名姓為莒太史敫家庸久之乃敢自言我湣王子也于是莒人共立法章是為襄王以保莒城而布告齊國中王已立在莒矣襄王既即位立太史敫女為王后是為君王后襄王在莒五年田單攻破燕軍迎王于莒入臨菑齊故地盡復屬齊十四年秦擊我剛壽十九年王薨諡曰襄在位十九年子建即位六年秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟于齊齊不聽周子曰蓋齊之謀臣國䇿以為蘇秦非是不如聽之以退秦兵不聽則秦兵不却是秦之計中而齊楚之計過也且趙之于齊楚扞蔽也猶齒之有唇也唇亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釜也夫救趙髙義也却秦兵顯名也義救亡國威却彊秦之兵不務為此而務愛粟為國計者過矣王弗聽秦破趙于長平遂圍邯鄲十六年秦滅周君王后卒二十三年秦置東郡二十八年王入朝秦秦王置酒咸陽三十五年秦滅韓三十七年秦滅趙三十九年秦破燕明年秦滅魏秦兵次于厯下四十二年秦滅楚明年虜代王喜滅燕王喜四十四年秦兵擊齊王聽相后勝計不戰以兵降秦秦虜王建遷之共遂滅齊為郡天下一并于秦秦皇政立號為皇帝齊人怨王建不蚤與諸侯合從攻秦聽姦臣賓客以亡其國歌之曰松耶柏耶住建共者客耶疾建用客之不審也建在位四十四年史記世家贊曰國不虛繫民必有歸姜替而媯隆陰德盛也湣王赫赫蔑天子抗彊秦一旦國破身弒者聞諸先民曰稚木所以滋長伏金所以滋殺氣有豐殺天時以移德之于人亦猶是夫昔箕子過朝歌嘗為佼童之詩松柏之歌悲怨乃與向者同可勝歎哉可勝歎哉尚史卷二十一
