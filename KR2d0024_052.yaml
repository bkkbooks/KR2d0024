body:
  text: 尚史卷五十二列傳三十鑲白旗漢軍李鍇撰夫人傳莊薑莊夬人厲媯附一戴媯莊薑齊東宫得臣之妹莊公夫人美而無子衛人所為賦碩人者也左傳列女傳莊薑始往操行衰惰心淫佚冶容傅母諭之作碩人之詩女遂感而自修與詩説異莊公惑于嬖妾莊薑賢而失位故作緑衣日月終風之詩詩序莊公又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊薑以為己子公子州吁嬖人之子也莊薑惡之左傳及莊公薨州吁弒桓公戴媯大歸于陳莊薑作燕燕之詩以送之詩序列女傳衛定公公子既娶而死其婦無子定薑歸其婦自送之賦燕燕于飛坊記注亦以為定薑詩釋文以為魯詩夷薑桓公妾宣薑宣公妾夷薑齊女桓公妾宣公之庶母也宣公蒸之生急子宣薑者急子所取齊女宣薑美宣公納之作新臺于河上以要之詩序宣薑生夀及朔宣薑與朔搆急子宣公使盜殺急子并殺夀朔竟得立是為惠公惠公之即位也少齊人使公子頑惠公庶兄蒸于宣薑生齊子戴公文公宋桓夫人許穆夫人左傳定薑定夫人敬姒定公妾定薑齊女定公夫人定公惡孫林父林父出奔晉定公十二年成十四年公如晉強見林父公不可既歸晉送林父而見之公欲辭定薑曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈于亡乎君其忍之安民而宥宗卿不亦可乎公見而復之公有疾立子衎獻公以為大子及薨定薑既哭而息見大子之不哀也不內酌飲嘆曰是夫也將不唯衛國之敗其必始于未亡人烏乎天禍衛國也夫吾不獲鱄也衎之母弟子鮮使主社稷獻公十四年襄十年楚鄭伐宋我救宋師于襄牛鄭皇耳帥師侵我孫林父卜追之獻兆于定薑定薑問繇曰兆如山陵有夫出征而喪其雄定薑曰征者喪雄禦冦之利也大夫圖之衛人追之獲皇耳十八年襄十四年孫林父寧殖作亂獻公出奔晉及竟公使祝宗告亡且告無罪定薑曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以中櫛事先君而暴妾使余三罪也告亡而已無告無罪左傳敬姒定公妾獻公衎及鱄之母也殤公十二年襄二十六年獻公使鱄為復求復國辭敬姒強命之獻公復入左傳宣薑襄夫人婤姶附南子靈夫人宣薑襄公夫人無子襄公薨靈公立公子朝通于夫人懼而與齊豹作亂靈公如死鳥衛地國人滅齊氏公入殺宣薑婤姶襄公嬖人生公孟縶靈公元左傳南子靈公夫人通于宋公子朝公叔戍將去夫人之黨夫人訴之曰戍將為亂靈公逐戍為之召宋朝靈公三十九年定十四年諸侯會于洮大子蒯瞶過宋野野人歌之曰既定爾婁豬盍歸吾艾豭大子羞之謂戲陽速大子家臣曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走曰蒯瞶將殺余公執其手以登臺大子奔宋左傳夏氏出公夫人夏氏者夏戊之女也戊世叔齊之甥齊出亡衛人翦夏丁氏以其帑賜彌子瑕瑕飲出公酒納戊之女嬖以為夫人及夏戊之子朝逐公公適城鉏令茍有怨于夫人者報之而殺其子之為大子者左傳諸公子傳急子夀左公子泄附右公子職急子詩作伋夀並宣公子宣公蒸于夷薑宣公庶母生急子屬諸右公子職為之娶于齊而美公取之是為宣薑生夀及朔屬夀于左公子泄宣薑與朔搆急子公使諸齊使盜待諸莘將殺之夀告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒夀載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之朔竟得立是為惠公惠公四年桓十六年職泄怨惠公立公子黔牟惠公奔齊十二年莊六年惠公復入放黔牟于周殺左公子泄右公子職左傳公子頑公子頑宣公子惠公庶兄昭伯也惠公之即位也少齊人使頑蒸于宣薑不可強之生齊子戴公文公宋桓夫人許穆夫人左傳叔武叔武成公弟夷叔也成公三年僖二十八年公欲與楚國人不欲出公以説晉公居于襄牛諸侯盟于踐土公使元咺奉叔武以受盟或訴元咺于公曰立叔武矣及晉人歸公公先期入公子歂犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之左傳諡曰夷公子瑕子儀附公子瑕字子適某公子未詳成公三年僖二十八年元咺立之五年僖三十年周歂冶厪納成公殺瑕及其弟子儀左傳子叔黑背析朱鉏子叔黑背定公之弟也定公八年成十年黑背帥師侵鄭黑背孫曰析朱鉏靈公十三年昭二十年齊豹之亂也公如死鳥析朱鉏宵從竇出徒行從公及北宫氏滅齊氏公入賜朱鉏諡曰成子而以齊氏之墓豫之左傳子展子鮮子蟜子行子伯角子皮大子附子展名未詳子鮮並獻公弟子鮮名鱄獻公十八年襄十四年孫林父怒獻公公使子蟜子伯子皮並羣公子與林父盟于邱宫林父皆殺之子展奔齊公如鄄衛地又使子行亦羣公子于林父林父又殺之公出奔齊林父立殤公獻公在邾子鮮從公魯臧紇如齊唁公公與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧紇説謂其人曰衛君必入夫二子者或挽之或推之欲無入得乎獻公之入夷儀也使與寧喜言寧喜曰必子鮮在不然必敗殤公十二年襄二十六年公使子鮮為復辭敬姒公及子鮮母強命之對曰君無信臣懼不免敬姒曰雖然以吾故也子鮮以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜遂弒殤公及大子角孫林父出奔晉獻公復入明年寧喜専公使公孫免餘殺之子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河託于木門晉邑不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎吾不可以立于人之朝矣終身不仕公喪之如稅服終身稅即穗喪服無月數左傳公羊獻公歸殺寧喜公子鱄挈其妻子而去之將濟于河携其妻子而與之盟曰茍有履衛地食衛粟者昧雉彼視注昧割也時割雉以為盟猶曰視彼割雉也榖梁傳出奔晉織絇邯鄲終身不言衛孟縶公孟彄公子荆附公子朝孟縶襄公子公孟也母曰婤姶縶之足不良襄公薨孔蒸鉏立其弟元是為靈公縶狎齊豹奪之司寇與鄄又惡北宫喜禇師圃欲去之故齊豹輩欲作亂靈公十三年昭二十年公在平夀衛下邑縶有事于蓋獲之門外齊氏伏甲殺縶公聞亂乘驅自閲門入慶比御公公子荆驂乘載寶以出過齊氏齊氏射公中荆之背公遂出如死鳥及齊氏滅公乃復縶之子彄靈公三十七年定十三年彄帥師伐曹克郊明年再伐曹三十九年定十四年大子蒯瞶得罪出奔公盡逐其黨彄出奔鄭自鄭奔齊出公八年哀十年彄自齊宋歸莊公元年哀十五年莊公入出公出奔彄復出奔齊公子荆字南楚某公子未詳初吳公子札來聘説荆及蘧瑗史狗史鰌公叔發公子朝與宋公子朝别是一人詳宋朝傳曰衛多君子未有患也朝亦衛公子宋華氏叛朝及晉師齊師救宋左傳公子郢公孫彌牟文子惠子蘭子虎附公子郢字子南靈公子也靈公遊于郊郢僕公曰余無子蒯瞶出奔故將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下卿大夫士曰三揖見周禮君命祇辱四十二年哀二年公薨夫人曰命公子郢為太子君命也對曰郢異于他子且君沒于吾手若有之郢必聞之且亡人之子輒在乃立輒郢之子曰公孫彌牟彌牟字子之所謂公孫文子也郢字子南故又曰南氏出公輒十年哀十二年公會吳于鄖吳執公及歸效夷言彌牟尚幼曰君必不免其死于夷乎執焉而又説其言從之固矣出公出亡彌牟事莊公莊公遇弒出公再入奪彌牟邑出公後七年哀二十五年彌牟及禇師比等作亂攻公公適城鉏明年越會魯宋納公彌牟致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出衆曰勿出重賂越人申開守陴而納公公不敢入師還立悼公彌牟相之以城鉏與越人左傳晉犀首伐黃過衛使人謂悼公曰敝邑之師過大國曽無一介之使以存之敢請其罪今黃城將下矣已將移兵大國之城下公懼束組三百緄黃金三百鎰以隨使者彌牟止之曰是勝黃必不敢來不勝亦不敢來勝黃功大名美內臨其倫夫在中者惡臨議其事蒙大名挾成功坐御以待中之議犀首雖愚必不為也不勝黃破心而走歸恐不免于罪安敢攻衛果勝黃城帥師而歸遂不敢過衛犀首蓋晉官名非公孫衍衍不與悼公同時晉荀瑶將伐我獻野馬四白璧一羣臣皆賀彌牟有憂色公曰何故對曰野馬四白璧一此小國之禮也而大國致之君其圖之公以其言告邊境荀瑶果襲我至境而反曰衛有賢者知吾謀矣已而又欲襲我使其大子來奔彌牟曰大子顔知伯之愛子也非有大罪而亡必有故也使人逆之于境曰車過五乘慎勿納也荀瑶乃止國策彌牟卒諡曰文彌牟之弟曰惠子蘭蘭為衛司冦蘭廢適子虎而立庶子及惠子蘭卒言偃變服弔彌牟以譏之而後虎立記檀弓子南氏之後至漢武帝時封周子南君以紹周後大子疾公子青渾良夫附太子疾公子青並莊公之子也初莊公之未入也有渾良夫者孔圉之豎也長而美圉取莊公之姊伯姬生悝圉卒通于伯姬莊公在戚伯姬使之焉公與之言曰苟使我入獲國服冕乘軒三死無與與之盟為請于伯姬良夫與公入舍于孔氏之外圃昏二人蒙衣而乘寺人羅御如孔氏孔氏之老欒寧問之稱姻妾以告遂入適伯姬氏既食伯姬杖戈而先公與五人介輿豭從之迫孔悝于厠強盟之遂劫以登臺召獲衛大夫奉出公出奔魯公遂入莊公二年哀十六年公謂渾良夫曰吾繼先君而不得其器若之何良夫代執火者而言曰疾與亡君皆君之子也召之而擇材焉可也若不材器可得也豎告大子疾疾使五人輿豭從已劫公而強盟之盟求必立己且請殺良夫公曰其盟免三死曰請三之後有罪殺之公曰諾哉明年公為虎幄于籍圃成求令名者而與之始食焉疾請使良夫良夫乘衷甸兩牡衷甸一轅卿車紫衣狐裘君服至袒裘不釋劒而食疾使牽以退數之以三罪而殺之三月晉趙鞅使召公曰請君若大子來公辭以難疾又使椓之椓父欲速得位故夏趙鞅圍我冬晉復伐我國人出公而與晉平晉師還公復入石圃攻公公踰于北方戎州人攻之疾及青踰從公戎州人殺之並弒公左傳論曰非道有之難乎其保之叔武子郢不有其位均也而所保異焉忍哉歂犬之矢已厲鏃于殺子角之日固不待其先期而入矣小人承旨可畏夫昧雉之盟使人氣塞及讀新臺二子之詩而悲惋逾深已天道無親常與善人然乎否耶公孫免餘公孫無地公孫臣公孫丁公孫免餘公孫無地公孫臣並衛大夫寧喜之納獻公也喜専公患之免餘請殺之公曰微寧子不及此吾與之言矣事未可知祇成惡名止也對曰臣殺之君勿與知獻公後元年襄二十七年免餘與無地臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣公出時公孫臣之父為孫氏所殺夏免餘復攻寧氏殺喜公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不二能贊大事君其命之乃使儀為卿又有公孫丁者亦事獻公善射尹公他學射于庾公差庾公差學射于公孫丁獻公十八年襄十四年孫林父之亂公奔齊丁御公庾公差尹公他追公差曰射為背師不射為戮射為禮乎射兩軥而還他曰子為師我則逺矣乃反之丁授公轡而射之貫臂左傳之孟子作庾公斯學射於尹公之他尹公之他學射於子濯孺子與傳異逆臣傳公子州吁公子州吁莊公之子也其母嬖有寵而好兵公弗禁莊公薨桓公即位桓公十六年隱四年州吁弒桓公而自立宋殤公之即位也公子馮出奔鄭鄭人欲納之及州吁立將修先君之怨于鄭隱二年鄭伐衛而求寵于諸侯以和其民使告于宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之故宋陳蔡衛伐鄭圍其東門五日而還秋復伐鄭敗鄭徒兵取其禾而還九月州吁如陳陳人執之而請蒞于衛衛使右宰醜蒞殺州吁于濮左傳孫林父寧殖寧喜孫嘉右宰穀孫蒯附孫襄孫林父良夫之子文子也寧殖是為寧惠子殖系未詳並事定公定公惡林父五年成七年林父出奔晉公如晉晉反我戚十二年成十四年公如晉晉侯強見林父公不可既歸晉使郤犫送林父公見而復之公饗郤犫殖相郤犫敖殖曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔彼交匪敖萬福來求今夫子敖取禍之道也冬十月定公薨獻公不哀大夫無不聳懼林父自是不敢舍其重器于衛盡置諸戚而甚善晉大夫獻公十一年襄七年林父如魯聘魯侯登亦登叔孫豹相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所遇吾子其少安林父無辭亦無悛容十八年襄十四年公戒林父及寧殖食皆服而朝日旰不召而射鴻于囿林父寧殖從之不釋皮冠而與之言二臣怒公使子蟜子伯子皮并羣公子與林父盟于邱宫林父皆殺之四月公如鄄使子行亦羣公子于林父林父又殺之公出奔齊孫氏追之敗公徒于阿澤國人立公孫摽是為殤公林父與殖相之以聽命于諸侯殤公六年襄二十年殖疾召子喜曰吾得罪于君悔而無及也名藏在諸侯之策君入則掩之若能掩之則吾子也若不能則有鬼神吾有餒而已不來食矣喜許諾殖遂卒十一年襄二十五年獻公入于夷儀使與喜言求復國喜曰子鮮在不然必敗子鮮者公母弟鱄也十二年襄二十六年公使鱄以公命與喜言曰苟反政由寧氏祭則寡人喜告蘧瑗瑗辭告右宰穀右宰穀者亦衛大夫初獻公之出也穀從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔袖乃赦之及是穀曰不可獲罪于兩君天下誰畜之喜曰吾受命于先人不可以二穀曰我請使焉而觀之遂見公于夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣喜曰子鮮在穀曰子鮮在何益多而能亡于我何為喜曰雖然弗可以己孫林父在戚孫嘉聘于齊孫襄居守嘉襄並林父子喜及右宰穀伐孫氏不克孫襄傷喜出舍于郊襄死孫氏夜哭國人召喜喜復攻孫氏克之遂弒殤公及大子角獻公復入林父以戚叛如晉晉為會于澶淵取衛西鄙懿氏六十以與林父執喜且執獻公既而釋之獻公後元年襄二十七年喜専公使公孫免餘攻寧氏殺喜及右宰穀尸諸朝寧氏遂絶喜諡曰悼後三年襄二十九年獻公薨吳公子札自衛如晉將宿于戚聞鐘聲焉曰異哉吾聞之也辨而不德必加于戮夫子獲罪于君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之林父聞之終身不聽琴瑟林父卒諡曰文子三襄嘉蒯襄字伯國蒯逮事獻公獻公十四年襄十年楚鄭圍宋公救宋鄭皇耳帥師侵我蒯追之獲皇耳于犬邱十八年襄十四年林父之在戚也蒯入使公飲之酒使大師歌巧言之卒章欲以喻林父居河上而為亂大師辭師曹請為之師曹者衛樂人初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒林父以報公公使歌之遂誦之蒯懼告林父林父曰君忌我矣弗先必死遂并帑于戚逐獻公而立殤公殤公三年襄十七年蒯田于曹隧飲馬于重邱毁其瓶重邱人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為夏蒯及石買伐曹取重邱曹人訴于晉明年晉執石買于長子執蒯于純留殤公既遇弒林父以戚叛衛人侵戚東鄙孫氏訴于晉晉為戍茅氏即戚東鄙殖綽伐茅氏殺晉戍三百人蒯追之弗敢擊林父曰厲之不如蒯遂從衛師敗之圉衛地雍鉏獲殖綽左傳孫氏蓋自林父以戚叛如晉孫氏遂絶不嗣論曰書契之作取諸夬夬者所以決小人之偽者也是故黃帝有左右史周有五史當春秋之際國必有史有事必赴于諸侯而載記之不特晉之乘楚之檮杌魯之春秋也寧殖果于逐君王誅伯討曽不滋懼而畏名在諸侯之策噫春秋成而亂臣賊子懼者以此也然則扶陽抑隂樹之大防前聖已先孔子而憂之矣亂臣傳石惡悼子石圃石魋附石惡買之子是為石悼子惡黨寧喜獻公後元年襄二十七年獻公入殺寧喜尸諸朝惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行會盟于宋二年襄二十八年討寧氏之黨惡出奔晉立其從子圃以守石氏之祀惡卒諡曰悼初買之卒也惡不哀孔蒸鉏曰是謂蹶其本必不有其宗至是果然圃初事襄公厯事靈公出公及莊公入公使匠久欲逐圃圃因匠氏攻公公閉門而請勿許戎州人遂弒公國人立公子起明年圃逐君起起奔齊出公輒自齊復歸逐圃而復石魋魋系未詳魋亦為莊公所逐者左傳齊豹北宮喜褚師圃祝蛙華華齊申寅附褚師子齊豹齊惡之子惡為大夫事襄公襄公三年昭元年惡及諸侯之大夫會晉楚于虢九年昭七年襄公薨惡告喪于周惡卒豹為司寇事靈公靈公兄公孟縶狎之奪之司寇與鄄鄄豹邑有役則反之無則取之又惡北宫喜及褚師圃欲去之宋公子朝通于宣薑懼故豹與北宫喜褚師圃公子朝謀作亂靈公十三年昭二十年公在平夀孟縶有事于蓋獲之門外齊子氏帷于門外而伏甲焉使祝蛙置戈于車薪以當門使一乘從孟縶以出使華齊御孟縶及閎中閎曲門齊氏以戈擊孟縶殺之公聞亂乘驅自閲門入慶比御公公子荆驂乘使華寅乘二車及公宫鴻駵魋駟乘于公公載寶以出褚師子申遇公于馬路之衢遂從過齊氏使華寅肉袒執蓋以當其闕肉袒示不敢與齊氏爭齊氏射公中公子荆之背公遂出華寅閉郭門踰而從公公如死鳥齊氏之宰渠子召北宫喜北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之公入與喜盟于彭水之上遂盟國人褚師圃公子朝出奔宋殺宣薑公賜喜諡曰貞子初虢之會也晉懼楚為患齊惡曰苟或知之雖憂何害鄭罕虎曰衛大夫其不免乎憂而弗害取憂之道也及是豹竟滅齊氏左傳祝蛙華齊齊氏黨褚師子申蓋褚師圃同族與華寅皆公之黨也公子荆宋公子朝别有傳褚師比瞞成司寇亥公文要夏期拳彌鄄子士附祝史揮褚師比者褚師定子之子聲子也比與司徒瞞成並事出公及莊公復入害故政欲盡去之先謂瞞成曰寡人離病于外久矣子請亦嘗之瞞成歸告比欲與之伐公不果莊公後二年哀十六年比及瞞成出奔宋既而比復歸比歸傳不載出公七年哀二十五年公為靈臺于藉圃與諸大夫飲酒焉比襪而登席公怒辭曰臣有疾異于人若見之君將殼之殼嘔吐也是以不敢公愈怒大夫辭之不可比出公戟其手曰必斷而足聞之比與司冦亥乘曰今日幸而後亡公之再入也奪公孫彌牟邑而奪司冦亥政公使侍人納公文要之車于池公以夫人之弟夏期為司徒夫人寵衰期得罪公使三匠久又使優狡盟拳彌而甚近信之故比及公孫彌牟公文要司冦亥司徒期因三匠與拳彌以作亂皆執利兵無者執斤使拳彌入于公宫而自大子疾之宫疾前死故宫尚存譟以攻公鄄子士衛大夫請禦之拳彌援其手曰子則勇矣將若君何不見先君乎君何所不逞欲且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也公乃出將適蒲彌曰晉無信不可將適鄄彌曰齊晉爭我不可將適冷彌曰魯不足與請適城鉏以鉤越越有君乃適城鉏彌曰盜不可知也請速自我始乃載寶以歸公為支雜之卒因祝史揮以侵衛衛人病之公文要知之見公孫彌牟請逐揮彌牟曰無罪要曰彼好専利而妄夫見君之入也將先道焉若逐之必出于南門而適君所夫越新得諸侯將必請師焉揮在朝使吏遣諸其室揮出信再宿為信弗內五日乃館諸外里公所在遂有寵使如越請師明年越臯如納公公孫彌牟欲納之公文要曰君愎而虐少待之必毒于民乃睦于子矣公不果入遂卒于越褚師比卒諡曰聲子司徒瞞成司冦亥他事不載公孫彌牟别有傳公文要是為公文懿子拳彌衛大夫夏期者夏戊之子戊女為出公夫人公之在城鉏也曰期則為此令苟有怨于夫人者報之期聘于越公攻而奪之幣期告越越命取之期以衆取之公怒殺期之甥之為大子者左傳嬖臣傳宋朝宋朝者宋公子也按傳子朝凡五見襄二十九年季札適衛所悅者公子朝昭二十年通于襄夫人謀亂者公子朝二十一年救宋者衛公子朝定十四年靈公為南子召宋朝哀十一年大叔疾娶于宋子朝杜注或為一人為二人初不分别唯于救宋者注云前年出奔晉今還衛是蓋以為一人也然傳于李札所説及通襄夫人者槩書公子朝而救宋者别加衛字至于通南子及大叔疾所娶則書宋子朝是衛公子朝與宋子朝為二人明甚且季札既以君子許公子朝厠于蘧瑗史茍之間無通襄夫人以作亂之理既作亂奔晉褚師圃等未歸而朝以羈旅之臣何遽召之復令之救宋既救宋何又有為南子召之之文以此斷之是季札所説及救宋者為衛公子朝通襄夫人通南子及大叔疾所取女者乃宋朝也今傳别之仕衛為大夫朝通于襄夫人宣薑靈公嫡母懼而欲以作亂靈公十三年昭二十年遂與齊豹北宫喜褚師圃作亂殺公孟縶事平朝及褚師圃子玉霄子髙魴霄魴並齊氏黨出奔晉而殺宣薑朝又通于夫人南子三十九年定十四年公為夫人南子召朝大子蒯瞶羞之將殺南子南子覺之蒯瞶出奔宋左傳彌子瑕癰疽彌子瑕是為彭封彌子嬖大夫也靈公三十一年定六年魯侵鄭往不假道于我及還陽虎使季孫斯自南門入出自東門虎將逐三桓欲使得罪鄰國舍于豚澤公怒使瑕追之公叔發諫乃止靈公薨事出公夏戊者世叔齊之甥也齊出亡國人翦夏戊以其帑賜瑕瑕飲公酒納夏戊之女以為夫人左傳癰疽者亦嬖臣也癰疽與瑕二人者専君之勢以蔽左右復塗偵蓋亦衛大夫謂公曰昔日臣夢見君曰子何夢曰夢見竈君公忿然作色曰吾聞夢見人君者夢見日今子夢見竈君而言君也有説則可無則死對曰日并燭天下者也一物不能蔽也竈則不然前人之煬則後之人無從見也今臣疑人之有煬于君者也是以夢見竈君公曰善于是廢癰疽彌子瑕而立司空狗衛策同韓非子説苑彌子瑕愛于衛君衛法竊駕君車罪刖瑕之母疾夜往告之瑕駕君車而出君聞之曰孝哉為母犯刖瑕食桃而甘不盡而奉君君曰愛我而忘其口及瑕色衰愛弛君曰是故嘗矯吾車又嘗食我以餘桃家臣傳宗魯宗魯公孟縶之家臣也齊豹見宗魯于公孟縶而為驂乘焉及豹將作亂謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子周猶終竟也而歸死于公孟其可也靈公十三年昭二十年孟縶有事于蓋獲之門外宗魯驂乘及閎中齊氏用戈擊孟縶宗魯以背蔽之斷肱以中孟縶之肩皆殺之琴牢孔子弟子聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚于回不以回待人不蓋不義不犯非禮左傳戲陽速戲陽速大子蒯瞶家臣大子謀殺夫人南子謂速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走曰蒯瞶將殺余公執其手以登臺大子出奔宋大子告人曰速禍余速告人曰大子則禍余大子無道使余殺其母余不許將戕于余若殺夫人將以余説余是故許而弗為以紓余死諺曰民保于信吾以信義也左傳許公為許公為孔悝臣孔悝既納出公公逐悝及西門使二車反祏于西圃西圃孔氏廟所在祏藏主石函使副車還取廟主于西圃也子伯季子名不載初為孔氏臣新登于公為大夫請追之遇載祏者殺而乘其車公為反祏怪載祏者久不來故公為反逆之遇之曰與不仁人爭明無不勝必使先射射三發皆逺公為公為射之殪或以其車從得祏于槖中左傳尚史卷五十二
