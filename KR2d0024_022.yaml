body:
  text: 尚史卷二十二世家十五鑲白旗漢軍李鍇撰秦世家始孝王時至赧王五十九年滅周又十年而帝葢六百五十年有竒大業至大駱系年莫攷自非子至公子嬰傳三十六世非子秦侯公伯秦仲莊公秦嬴姓少昊之後也秦趙以母族而祖顓頊非是按左傳郯少昊之後嬴姓知秦為少昊後秦之先帝顓頊之苖裔孫曰女脩女脩生子大業其父不著又按史云女脩織𤣥鳥隕卵女脩吞之生大業葢因商事附㑹故削之大業取少典之子曰女華女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費贊禹功其賜爾皁游爾後嗣將大出乃妻之姚姓之玉女大費拜受佐舜調馴鳥獸鳥獸多馴服是為栢翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀于鳴條大亷𤣥孫曰孟戲中衍鳥身人言帝大戊聞而卜之使御吉遂致使御而妻之自大戊以下中衍之後遂世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰仲潏在西戎保西垂生蜚亷蜚亷生惡來惡來有力晏子舂秋惡來子裂虎兕蜚亷善走父子俱以材力事殷紂周武王伐紂並殺惡來是時蜚亷為紂石北方還無所報為壇霍太山而報得石棺銘曰帝令處父不與殷亂處父蜚亷别號賜爾石棺以華氏死遂塟于霍太山蜚亷復有子曰季勝季勝生孟増孟増幸于成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸于繆王得驥温驪温音盗盗竊也淺青色驊騮騄耳之駟西廵狩樂而忘歸徐偃王作亂造父為繆王御長驅歸周以救亂繆王以趙城封造父造父族由此為趙氏自蜚亷生季勝已下五世至造父别居趙趙衰其後也惡來革者蜚廉子也蚤死與前惡來或是二人有子曰女防女防生旁皋旁臯生大凡大凡生大駱大駱生非子以造父之寵皆䝉趙城姓趙氏非子居犬邱好馬及畜善養息之犬邱人言之孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言于孝王曰昔我先酈山之女為戎胥軒妻生中潏以親故歸周保西垂西垂以其故和睦今我復與大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之于是孝王曰昔伯翳為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎秦嬴生秦侯秦侯立十八年卒生公伯公伯立三年卒生秦仲秦仲立三年厲王無道諸侯或叛之西戎反王室滅犬邱大駱之族宣王即位乃以秦仲為大夫誅西戎西戎殺秦仲秦仲立二十三年死于戎有子五人其長曰莊公宣王乃召莊公昆弟五人與兵七千使伐西戎破之于是復與秦仲後及其先大駱地犬邱并有之為西垂大夫莊公居其故西犬邱立四十四年薨史記襄公世父附襄公莊公之子也莊公子三人其長男世父世父曰戎殺我大父仲我非殺戎王則不敢入邑遂將擊戎讓其弟襄公為大子莊公薨襄公即位元年以女弟穆嬴為豐王妻二年戎圍犬邱世父世父擊之為戎人所虜嵗餘復歸世父七年犬戎與申侯伐周殺幽王酈山下公將兵救周戰甚力有功周避犬戎難東徙雒邑公以兵送平王王封公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐地秦能攻逐戎即有其地與誓封爵之公于是始國與諸侯通使聘享之禮乃用駵駒黄牛羝羊各三祠上帝西畤十二年伐戎而至岐薨史記在位十二年諡曰襄文公四十四年入春秋竫公附文公襄公之子也襄公薨公即位元年居西垂宫三年以兵七百人東獵四年至汧渭之㑹曰昔周邑我先秦嬴于此後卒獲為諸侯乃卜居之占曰吉即營邑之十年初為鄜畤括地志秦文公薨黄蛇自天而下屬地其口止于鄜衍作畤郊祭白帝曰鄜畤用三牢十三年初有史以紀事民多化者十六年公以兵伐戎戎敗走于是遂收周餘民有之地至岐岐以東獻之周十九年得陳寳晉太康地志文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媦常在地中食死人腦即欲殺之拍捶其首媦亦語曰二童子名陳寳得雄者王得雌者霸陳倉人乃逐二童子化為雉雌止陳倉北坂為石秦祠之二十年法初有三族之罪二十七年伐南山大梓豐大特録異傳文公時雍南山有大梓樹公伐之輙有大風雨樹生合不㫁時一人病夜往山中聞鬼語樹神曰秦若使人被髪以朱絲繞樹伐汝汝得不困邪樹神無言明日病人語聞公如其言伐樹㫁中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髪解牛畏之入不出故置旄頭武都郡立怒特祠是大梓牛神也四十四年魯隠公初即位四十八年隠五年太子卒賜諡為竫公竫公之長子為太子五十年隠七年公薨葬西山史記諡曰文在位五十年寧公寧公竫公之子文公之孫也文公薨公即位二年隠九年徙居平陽遣兵伐蕩社索隠西戎之君號曰亳王葢成湯之𦙍其邑曰蕩社三年隠十年與亳戰亳王奔戎遂滅蕩社十二年桓八年伐蕩氏取之公生十嵗立立十二年薨塟西山史記帝王世紀寧公塟西山大麓號秦陵山諡曰寧在位十二年武公出子附武公寧公長男為太子魯姬子寧公妾生出子寧公薨大庶長弗忌威壘三父廢太子而立出子為君史記出子二年桓十年我納芮伯萬于芮初芮伯出居魏芮更立君寧公時我侵芮敗焉我㑹王師圍魏執芮伯以歸至是納之左傳六年桓十四年三父等復共令人賊殺出子出子生五嵗立立六年卒三父等乃復立故太子武公公元年桓十五年伐彭戲氏戎號也至于華山下居平陽封宫三年桓十七年誅三父等夷三族以其殺出子也十年莊六年伐邽冀戎初縣之十一年莊七年初縣杜鄭滅小虢虢叔所封是曰西虢二十年莊十六年公薨塟雍平陽初以人從死從死者六十六人史記諡曰武在位二十年徳公徳公武公同母弟也武公薨公即位元年莊十七年初居雍城大鄭宫以犧三百牢祠鄜畤卜居雍後子孫飲馬于河梁伯芮伯來朝二年莊十八年初伏正義伏者隠伏避盛暑也歴忌金氣伏蔵之日也以狗禦蠱徳公生三十三嵗而立立二年薨史記諡曰徳在位二年宣公成公宣公徳公長子也徳公薨公即位元年莊十九年衛燕伐周出惠王立王子頽三年莊二十一年鄭伯虢叔殺子頽入恵王四年莊二十二年作宻畤括地志秦宣公作宻畤于渭南祭青帝與晉戰河陽勝之十二年莊三十年公薨諡曰宣在位十二年宣公生子九人莫立立其弟成公公元年莊三十一年梁伯芮伯來朝四年閔二年公薨諡曰成在位四年成公生子七人莫立立其弟任好是為穆公史記穆公穆公名任好徳公之少子也成公薨公即位元年僖元年公伐茅津勝之四年僖四年逆夫人于晉申生姊也五年僖五年授百里奚政號曰五羖大夫以蹇叔為上大夫秋公伐晉戰于河曲史記七年僖七年閏月惠王崩襄王立九年僖九年晉獻公卒晉亂公子夷吾重賂我以求入冬我㑹齊師納晉惠公惠公入而背我十年僖十年晉㔻鄭來聘鄭言于公請召吕甥郤芮臣出晉君君納重耳公使冷至大夫報問且召吕郤郤芮殺㔻鄭鄭子豹來奔言于公曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君十三年僖十三年晉薦饑乞糴于我㔻豹請伐晉公曰其君是惡其民何罪于是輸粟于晉自雍及絳相繼命之曰汎舟之役十四年僖十四年我饑乞糴于晉晉弗與十五年僖十五年公伐晉使卜徒父筮之吉涉河侯車敗公詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也千乘三句筮書雜辭狐蠱為君義喻晉侯其象未聞蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待九月戰于韓獲晉侯以歸史記晉君棄其軍與秦爭利還而馬騺繆公以麾下馳追之不得晉君反為晉軍所圍晉擊繆公繆公傷于是岐下食善馬者三百人馳冒晉軍晉軍解遂脱繆公而反得晋君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推鋒争死以報食馬之徳吕氏春秋穆公車敗右服失而野人取之方將食于岐山之陽公曰食馬肉而不還飲酒余恐傷女也徧飲而去處一年韓原之戰晉人已環穆公之車矣梁由靡已扣穆公之左驂矣惠公之右路石奮投而擊穆公之甲中之者已六札矣野人食馬肉者三百餘人畢力為穆公疾鬬于車下遂克晉反獲惠公夫人以免服衰絰逆乃舍諸靈臺許晉平冬與吕甥盟于五城改館晉侯饋七牢十一月歸晉侯是嵗晉又饑公又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹徳焉以待能者于是我始征晉河東置官司焉十七年夏晉太子圉為質于我因歸河東而妻之十八年僖十八年取梁新里十九年僖十九年滅梁史記二十年滅梁芮二十二年僖二十二年晉子圉亡歸晉明年晉公子重耳來二十四年僖二十四年晉惠公卒公納公子重耳重耳入立是為文公文公殺懐公即子圉于髙梁公誘殺吕甥郤芮于河上秋王叔帶以狄師攻襄王王出適鄭二十五年僖二十五年公師于河上將納王晉辭我師而納王秋及晉伐鄀秦楚界上小國楚商宻降我師二十八年僖二十八年少子憖穆公子及晉侯敗楚師于城濮冬我及諸侯晉魯齊宋蔡鄭陳莒邾㑹于温天王狩于河陽二十九年僖二十九年小子憖㑹盟于翟泉三十年僖三十年公㑹晉侯圍鄭鄭使燭之武説公公與鄭人盟使杞子逢孫楊孫戌之而還晉師亦還三十二年僖三十二年杞子使告于我請襲鄭公訪諸蹇叔蹇叔不可公辭焉召百里孟明視西乞術白乙丙使出師明年及滑鄭覺之杞子奔齊逢孫揚孫奔宋我師滅滑而還晉敗我師于殽獲視乞術既而歸之公素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大徳三十五年文二年孟明視帥師伐晉戰于彭衙我師敗績公猶用孟明視増修國政重施于民三十六年文三年公伐晉取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎三十七年文四年晉伐我圍邧新城以報王官之役楚滅江公為之降服出次不舉過數言素服辟正寝去盛饌而過其禮數也大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也三十八年文五年春公薨以奄息仲行鍼虎為殉左傳諡曰穆在位三十九年康公康公名罃穆公太子也穆公薨公即位晉襄公卒先蔑士㑹來逆公子雍將立之康公元年文七年公送公子雍于晉晉背先蔑而立靈公敗我師于令狐先蔑士㑹來奔二年文八年我伐晉取武城以報令狐之役秋八月襄王崩頃王立三年文九年我歸魯僖公成風之禭衣服曰禭四年文十年晉伐我取少梁夏我伐晉取北徴六年文十二年公使西乞術如魯聘冬公伐晉取羈馬晉禦我師于河曲我師歸復侵晉入瑕八年文十四年頃王崩匡王立十二年文十八年春二月公薨左傳諡曰康在位十二年共公共公名稻索隠名猳康公之子也康公薨公即位元年宣元年晉侵崇以求成于我崇秦與國我弗與成二年宣二年我伐晉報崇遂圍焦冬十月匡王崩定王立四年宣四年春正月公薨左傳諡曰共在位四年史記作五年桓公桓公索隠自桓公至靈公並失名共公之子也史記共公薨公即位四年宣八年晉及白狄伐我獲我諜殺諸絳市六日而蘇史記三年晉敗我一将葢即此事十一年宣十五年公伐晉晉敗我師于輔氏獲杜回十六年成二年右大夫説及魯侯諸侯之大夫楚宋陳衛鄭齊曹邾薛鄫蔡許盟于蜀十九年成五年冬十一月定王崩簡王立二十三年成九年我及白狄伐晉二十五年成十一年我及晉成將㑹于令狐公不肯涉河次于王城使史顆盟晉侯于河東晉郤犨盟公于河西公歸而背成二十七年成十三年晉以諸侯之師伐我戰于麻隧我師敗績獲我成差及不更女父二十八年成十四年冬十月公薨左傳諡曰桓在位二十八年史記作二十七年景公景公世本景公名后伯車非是后伯車景公之弟鍼也桓公之子也桓公薨公即位五年襄元年秋九月簡王崩靈王立十三年襄九年公使士雃大夫乞師于楚將以伐晉楚許之秋我侵晉楚子師于武城以為我援十四年襄十年晉伐我十五年襄十一年楚乞師于我使右大夫詹從楚子伐鄭鄭伯逆之伐宋冬我伐晉戰于櫟晉師敗績十六年襄十二年庶長無地及楚師伐宋秦嬴歸于楚楚公子午來聘十八年襄十四年晉以諸侯之師伐我濟涇而次我毒涇上流師人多死晉師還士鞅來奔已而復之史記十八年晉悼公彊數㑹諸侯率以伐秦敗秦軍秦軍走晉兵追之遂渡涇至棫林而還二十八年襄二十四年及晉成晉韓起來涖盟公子鍼如晉涖盟三十年襄二十六年鍼如晉脩成夏及楚子侵呉三十一年襄二十七年宋欲弭諸侯之兵為㑹于宋來告許之㑹宋經傳皆不書秦葢以㣲者㑹故三十二年襄二十八年冬十二月靈王崩景王立三十六年昭元年公子鍼出奔晉終景公世乃復歸四十年昭五年秋七月公薨明年春正月塟左傳諡曰景在位四十年哀公惠公悼公哀公景公之子也景公薨公即位十四年昭十九年楚費無忌來逆女夏楚陽匄來聘拜夫人也十七年昭二十二年夏四月景王崩悼王立王子朝作亂入于王城冬悼王崩敬王立二十一年昭二十六年冬十月王入于成周王子朝奔楚三十一年定四年呉入郢楚昭王奔隨申包胥來乞師依庭墻哭七日公為之賦無衣使子蒲子虎帥車五百乘以救楚明年敗呉師于沂秋滅唐又敗呉師于雍澨三十六年定九年秋公薨冬塟哀公諡曰哀在位三十六年孫惠公即位公九年哀三年冬十月薨子悼公即位公元年哀四年春二月塟惠公十三年哀十六年孔子卒十五年哀十八年公薨是年敬王崩元王立左傳惠公在位九年悼公在位十五年史記惠公十年悼公十四年厲共公躁公懐公靈公簡公惠公出子附厲共公悼公之子也悼公薨厲共公即位二年蜀人來賂八年元王崩定王立十六年壍河旁以兵二萬伐大荔取其王城二十一年初縣頻陽二十五年晉殺智伯瑶智開來奔三十三年伐義渠虜其王三十四年公薨諡曰厲共在位三十四年子躁公即位躁公二年南鄭反是年定王崩考王立十三年義渠伐我至渭南十四年公薨諡曰躁在位十四年弟懐公即位懐公三年考王崩威王烈立四年庶長鼂與大臣圍懐公公自殺諡曰懐在位四年公太子昭子蚤死大臣乃立昭子之子是為靈公靈公懐公孫也靈公六年晉城少梁我擊之十三年城籍姑公薨諡曰靈在位十三年靈公季父悼子即位是為簡公公昭子之弟而懐公之子也簡公六年令吏初帶劒壍洛城重泉十年威烈王崩安王立十六年公薨諡曰簡在位十六年子惠公即位前有惠公不應上同先諡史或誤惠公十三年伐蜀取南鄭公薨諡曰惠在位十三年子出子即位出子二年庶長改迎獻公殺出子及其母沈之淵旁史記獻公孝公獻公名師隰靈公之子也靈公薨公不得立出子二年庶長迎公于河西而立之是為獻公秦以往者數易君君臣乖亂故晉復奪我河西地獻公元年止從死二年城櫟陽五年安王崩烈王立十一年周太史儋見公曰周故與秦國合而别别五百嵗復合合七十七嵗而霸王出十六年烈王崩顯王立桃冬花十八年雨金櫟陽二十一年及晉戰于石門斬首六萬天子賀以黼黻二十三年及魏晉戰少梁虜其將公孫痤二十四年公薨諡曰獻在位二十四年孝公即位孝公名渠梁年已二十一嵗矣元年河山以東彊國六與齊威楚宣魏惠燕悼韓哀趙成侯並淮泗之間小國十餘周室㣲諸侯力政爭相併秦僻在雍不得與中國諸侯之㑹盟夷翟遇之孝公于是布惠振孤寡招戰士明功賞下令國中曰昔我穆公自岐雍之間修徳行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美㑹往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛于心賔客羣臣有能出竒計彊秦者吾且尊官與之分土于是乃出兵東圍陜城西斬戎之獂王衛鞅聞是令下西入秦見公二年天子致胙三年鞅説公變法修刑内務耕稼外勸戰死之賞罰公善之拜鞅為左庶長七年及魏惠王㑹杜平八年及魏戰元里十年衛鞅圍魏安邑降之十二年作為咸陽築冀闕徙都之并諸小鄉聚集為大縣縣一令四十一縣為田開阡陌南北為阡東西為陌河東以東西為阡南北為陌東地渡洛十四年初為賦為軍賦也十九年天子致伯二十年諸侯畢賀使公子少官率師㑹諸侯逢澤朝天子二十二年衛鞅擊魏虜魏公子卬二十四年及晉戰鴈門虜其將魏錯公薨史記諡曰孝在位二十四年惠文王惠文王史記作君恐誤名駟孝公之子也孝公薨惠文王即位誅衛鞅元年楚韓趙蜀人來朝二年天子賀三年稱王王冠四年天子致文武胙六年魏納隂晉更名寧秦七年公子卬及魏戰虜其將龍賈斬首八萬八年魏納河西地九年渡河取汾隂皮氏㑹魏王于應圍焦降之十年張儀相魏納上郡十五縣十一年縣義渠歸魏焦曲沃義渠君為臣十二年初臘十三年張儀取陜出其人與魏十四年更為元年後世改元始此二年張儀及齊楚大臣㑹齧桑三年韓魏太子來朝張儀相魏四年周顯王崩慎靚王立五年王游至北河七年樂池相韓趙魏燕齊帥匈奴共攻我我使庶長疾與戰修魚虜其將申差五國共伐而曰虜其将是司馬疎漏處申差盖魏将也敗趙公子渇韓太子奐斬首八萬二千八年張儀復相九年司馬錯伐蜀滅之史記于是年書錯伐蜀滅之于十一年書公子通封于蜀又書丹犂臣蜀相壮殺蜀侯來降武王元年書誅蜀相壯按錯既已滅蜀安得又有相殺蜀侯事若以蜀侯為公子通通為秦公子又秦所封相壯既殺通豈復敢來降秦攷華陽國志陳壯反殺蜀侯通秦遣甘茂張儀司馬錯伐蜀誅壯盖即一事而史遷誤分為三又以蜀侯通誤為公子通也取趙中都西陽十年周慎靚王崩赧王立韓太子倉來質取韓石章敗趙將泥取義渠二十五城十一年㯉里疾攻魏焦降之敗韓岸門斬首萬走其將犀首十二年王與梁王㑹臨晉庶長疾攻趙虜趙將壯張儀相楚十三年庶長章擊楚于丹陽虜將屈匄斬首八萬又攻楚漢中取地六百里置漢中郡使庶長疾助韓東攻齊到滿助魏攻燕十四年伐楚取召陵王薨史記諡惠文在位二十七年武王武王名蕩惠文王之子也惠文王薨王即位韓魏齊楚趙一作越非是皆賔從元年及魏哀王㑹臨晉史記作惠王誤表作哀王張儀魏章皆東出之魏伐義渠丹犂二年初置丞相㯉里疾甘茂為左右丞相三年及韓襄王㑹臨晉外㯉里疾相韓王謂甘茂曰寡人欲容車通三川窺周室死不恨矣秋使甘茂庶長封伐宜陽四年㧞宜陽斬首六萬涉河城武遂韓邑魏太子來朝王有力好戲力士任鄙烏獲孟説皆至大官王與孟説舉鼎絶臏八月王薨史記帝王世紀秦武王好力烏獲孟賁之徒歸焉孟賁生㧞牛角秦王舉周鼎烏獲兩目血出韓非子孟賁過河先其五船人怒以楫虓其頭中河孟賁瞋目而視船人髪植目裂鬢指舟中之人揚播入于河諡曰武在位四年皇覽秦武王冡在扶風安陵縣西北畢陌中大冢是也人以為周文王冢非昭襄王昭襄王名則一名稷武王異母弟也母楚人芉氏號宣太后武王取魏女為后無子王薨時昭襄王為質于燕燕人送歸遂即位元年嚴君疾為相或即㯉里疾封蜀郡嚴道縣因號嚴君二年庶長壯與大臣諸侯公子為逆皆伏誅及惠文后皆不得良死紀年秦内亂殺其太后及公子雍公子壯史冉侯傳后先武王死悼武王后出歸位三年王冠與楚王㑹黄棘與楚上庸四年取蒲坂五年魏王來朝應亭復與魏蒲坂六年蜀侯煇反司馬錯定蜀華陽國志秦封王子煇為蜀侯蜀侯祭歸胙于王後母疾之加毒以進王使司馬錯賜煇劔庶長奐伐楚斬首二萬七年㧞新城㯉里疾卒八年使將軍芈戎攻楚取新市九年孟嘗君薛文來相奐攻楚取八城十年楚懐王來朝我留之薛文以金受免正義金受秦相名樓緩為丞相十一年齊韓魏趙宋中山五國共攻我至鹽氏而還與韓魏河北及封陵以和楚懐王走之趙趙不受還之秦即死歸塟十二年樓緩免穰侯魏冉為相予楚粟五萬石十三年向夀伐韓取武始左更白起攻新城十四年白起攻韓魏于伊闕斬首二十四萬虜公孫喜㧞五城十五年白起攻魏取垣復予之攻楚取宛十六年左更錯取軹及鄧魏冉免十七年城陽君入朝及東周君來朝王之宜陽十八年錯攻垣河雍决橋取之十九年王為西帝齊為東帝皆復去之吕禮來自歸任鄙卒二十年王之漢中又之上郡北河二十一年錯攻魏河内魏獻安邑出其人募徙河東賜爵赦罪人遷之二十二年䝉武伐齊河東為九縣與楚王㑹宛與趙王㑹中陽二十三年尉斯離與三晉燕伐齊破之濟西與魏王㑹宜陽與韓王㑹新城二十四年與楚王㑹鄢又㑹穰取魏安城至大梁燕趙救之我軍去魏冉免相十六年已書再免今復書免相葢脱再相事二十五年㧞趙二城與韓王㑹新城與魏王㑹新明邑二十六年赦罪人遷之冉復相二十七年錯攻楚赦罪人遷之南陽白起攻趙取代光狼城司馬錯攻楚黔中㧞之二十八年白起攻楚取鄢鄧赦罪人遷之二十九年白起攻楚取郢為南郡楚王走周君來王與楚王㑹襄陵三十年蜀守若伐取巫郡及江南為黔中郡三十一年白起伐魏取兩城楚人反我江南正義黔中郡反歸楚法按此當云我反楚人江南今書獨異未詳三十二年魏冉攻魏至大梁破暴鳶斬首四萬魏入三縣請和三十三年客卿胡傷攻魏卷蔡陽長社取之擊芒卯華陽破之斬首十五萬魏入南陽以和三十四年與魏韓上庸地為一郡南陽免臣遷居之三十五年佐韓魏楚伐燕初置南陽郡三十六年客卿竈攻齊取剛夀三十八年胡傷攻趙閼與不能取四十年悼太子死四十一年夏攻魏取邢邱懐四十二年安國君為太子十月宣太后薨四十三年白起攻韓㧞九城斬首五萬四十四年攻韓南郡取之四十五年五大夫賁攻韓取十城四十七年攻韓上黨上黨降趙我因攻趙趙發兵相距我使白起擊大破趙于長平四十餘萬盡殺之四十八年韓獻垣雍王齕伐趙武安皮牢㧞之司馬梗北定太原盡有韓上黨五大夫陵攻趙邯鄲四十九年益發卒佐陵陵免王齕代將將軍張唐攻魏為蔡尉捐弗守還斬之五十年白起有罪為士伍遷隂宻張唐攻鄭㧞之益發卒軍汾城旁白起有罪死齕攻邯鄲不㧞去還奔汾軍二月餘攻晉軍斬首六千晉楚流死河二萬人攻汾城即從唐㧞寧新中更名安陽初作河橋五十一年將軍摎攻韓取陽城負黍斬首四萬攻趙取二十餘縣首虜九萬西周君背我與諸侯約從將天下鋭兵出伊闕攻我令我毋得通陽城我使將軍摎攻西周西周君走來自歸頓首受罪盡獻其邑三十六城口三萬王受獻歸其君于周五十二年周民東亡其器九萬入秦周亡五十三年天下來賔魏後我使摎伐魏取呉城韓王入朝魏委國聽令五十四年王郊見上帝于雍五十六年秋王薨史記韓非子昭王病百姓為之禱病愈殺牛塞禱郎中閻遏公孫衍出見之見王賀曰過堯舜矣王病民以牛禱病愈殺牛塞禱以王為過堯舜也王訾其里正與伍老屯二甲居數月王飲酒酣閻遏公孫衍謂王曰前時臣竊以王為過堯舜非敢諛也堯舜病民未至為之禱也王病而民以牛禱病愈殺牛塞禱今乃訾其里正與伍老屯二甲臣竊怪之王曰彼民之所以為我用者非以吾愛之為我用以吾勢之為我用也吾釋勢與民相收若是吾適不愛而民因不為我用也故絶愛道也又曰昭王令工施鈎梯上華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王嘗與天神博于此諡昭襄在位五十六年孝文王莊襄王孝文王名柱昭襄王之子也昭襄王薨王即位尊唐八子為唐太后而合其塟于先王正義以其母為太后與昭王合塟韓王衰絰入弔祠諸侯皆使使來弔祠視喪事元年赦罪人修先王功臣褒厚親戚弛苑囿王除喪十月己亥即位三日辛丑薨索隠五十三而立立一年卒塟夀陵謚孝文在位一年子莊襄王即位王名楚元年大赦罪人修先王功臣施徳厚骨肉而布惠于民東周君與諸侯謀我我使相國吕不韋誅之盡入其國不絶其祀以陽人地賜周君奉其祭祀使䝉驁伐韓韓獻成臯鞏秦界至大梁初置三川郡二年使䝉驁攻趙定太原三年驁攻魏髙都汲㧞之攻趙榆次新城狼孟取三十七城四月日食四年王齕攻上黨初置太原郡魏將無忌率五國兵擊我我郤于河外䝉驁敗解而去夏五月王薨史記索隠三十二而立立四年塟陽陵謚莊襄在位四年子政即位是為秦始皇帝贊曰秦至襄公始國與諸侯通乃文立三族之法武以人從死馴至于穆遂殉三良其慘刻寡恩有非忠厚之遺及乎商鞅變法古則蕩然詩書之燼孝公誠為之嚆矢矣詩曰不愆不忘率由舊章書曰不師古訓于何其訓秦徳戾古若是而威張欲從卒基帝業詎先民之言有不信乎火必熛而後熸水必滿而後决張秦乃所以絶秦夫賈生云秦既逆取使得中主且可以守豈其然乎自獻公至莊襄計首功者凡百四十二萬八千天生胡亥毒噬諸嬴而滅頂望夷一以酬萬猶為歉夫尚史卷二十二
