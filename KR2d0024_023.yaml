body:
  text: 尚史卷二十三列傳一鑲白旗漢軍李鍇撰黃帝諸臣傳風后天者常先五聖封胡知命大常規紀奢龍地典祝融大封附后土風后者黃帝之相也帝王世紀黃帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊萬羣帝寤而歎曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力者也驅羊萬羣能牧民為善者也天下豈有姓力名牧者哉于是依二占以求之得風后于海隅登以為相得力牧于大澤進以為將黃帝得六相而天地治神明至風后原本作蚩尤誤外紀風后明乎天道是也明乎天道使為當時大常察乎地利使為廪者奢龍辨乎東方使為土師祝融辨乎南方使為司徒大封辨乎西方使為司馬后土辨乎北方使為李管子李漢書黃帝法壁壘已定穿窬不繇路是謂姦人姦人者殺黃帝以風后配上台天老配中台五聖配下台謂之三公其餘知命規紀地典力牧常先封胡孔甲等或以為師或以為將帝王世紀黃帝師風后風后善於伏羲之道故推演隂陽之事春秋內事其握奇經曰天地風雲龍虎鳥蛇四為正四為奇餘奇為握機或以此十九字為經以下太公傳或總稱之先出遊軍定兩端天有衡地有軸前後有衝風附于天雲附于地天衝重列各四隊前後之衝各四隊風居四維故以圓地軸單列各三隊雲居四角故以方天居兩端地居中間總為八陳陳訖遊軍從後躡敵或驚其左或驚其右聽音望麾以出四奇天地之前衝為虎翼風為蛇蟠圍繞之義也虎居于中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居于中張翼以進鳥掖兩端向敵而翔以應之虛實二壘皆逐天文氣候山川向背利害隨時而行以正合以奇勝天地以下八重以列或曰握機望敵即引其後以犄角前列不動或合而為一因離而為八各隨師之多寡觸類而長天或圓而不動前為右後為左天地四望之屬是也天居兩端其次風其次雲左右相向是也地方布風雲各在前後衝之前天居兩端其次地居中間兩地為比是也從布天一天二次之從布地四次于天衝後從布四風挾天地之左右天地前衝居其右後衝居其左雲居兩端虛實二壘則此是也風后握竒經兵隂陽家有風后十三卷圖二卷漢書后土共工氏子能平九土故祀以為社國語山海經共工生后土力牧神皇直附應龍太山稽力牧者黃帝之將也蚩尤作亂黃帝徵諸侯使力牧神皇直討之擒于涿鹿之野使應龍殺之于凶黎之邱凡五十二戰而天下大服帝王世紀山海經蚩尤作兵伐黃帝黃帝令應龍攻之冀州之野應龍畜水蚩尤請風伯雨師縱大風雨黃帝乃下天女曰魃雨止遂殺蚩尤魃不得復上所居不雨帝置之赤水之北應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨郭璞注應龍龍之有翼者黃帝治天下力牧太山稽輔之以治日月之行律治隂陽之氣節四時之度正律厯之數别男女異雌雄明上下等貴賤使強不掩弱衆不暴寡人民保命而不夭歲時孰而不凶田者不侵畔漁者不爭隈道不拾遺市不豫賈城郭不關邑無盜賊鄙旅之人相讓以財狗彘吐菽粟于路而無爭忿之心淮南子兵隂陽家有力牧十五篇道家力牧二十二篇漢書太山稽亦黃帝臣黃帝精推步則訪山稽力牧抱朴子列子黃帝夢遊華胥之國不知斯齊國幾千萬里蓋非舟車足力之所及神遊而已其國無帥長自然而已其民無嗜欲自然而已寤怡然自得召天老力牧太山稽告之曰朕夢若此今知至道不可以情求矣朕得之矣而不能以告若矣又二十有八年天下大治幾若華胥氏之國蒼頡沮誦孔甲附蒼頡者為黃帝左史論衡蒼頡四目為黃帝史制字使天下義理必歸文字必歸六書外紀蒼頡作書而天雨粟鬼夜哭淮南子外紀或云蒼帝名頡創文字在伏羲前春秋元命苞倉帝史皇氏名頡姓侯岡龍顔侈哆四目靈光實有睿德生而能書及受河圖緑字于是仰觀俯察指掌而創文字天為雨粟鬼為夜哭龍乃潛藏治百有一十載都于陽武終葬衙之利鄊亭淮南子史皇生而能書世本史皇作畫按此則蒼頡史皇為一人又為帝而非黃帝史也又有沮誦者亦為黃帝史視彼鳥迹始作書契紀綱萬事垂法立則衛恆書勢又有孔甲者亦黃帝史盤盂書者孔甲為之書盤盂中為誡法或於鼎名曰銘七略黃帝巾几銘豫居民上搖搖恐夕不至朝惕惕恐朝不及夕兢兢栗栗日慎一日人莫躓于山而躓于垤雜家有孔甲盤盂二十六篇漢書鬼臾區鬼臾區黃帝臣號大鴻漢書作鬼容區黃帝舉風后力牧常先大鴻以治民大鴻者即鬼臾區也黃帝得寶鼎宛朐問于鬼臾區鬼臾區對曰帝得寶鼎神䇿是嵗己酉朔旦冬至得天之紀終而復始于是黃帝迎日推䇿鬼臾區死葬雍故鴻冡是也史記內經有鬼臾區對文多不載兵隂陽家有鬼臾區三卷圖一卷熲冶子一篇圖一卷地典六篇漢書注並黃帝臣左徹左徹者黃帝臣帝以土德王帝崩應地裂而陟葬左徹感思帝德取衣冠几杖而廟饗之諸侯大夫嵗時朝焉紀年博物志黃帝登仙其臣左徹者削木象黃帝帥諸侯以朝七年不還左徹乃立顓頊左徹亦仙去論曰黃帝之臣又有揮作弓牟夷作矢大撓作甲子容成作厯𨽻首作數雍父作舂黃帝作旃冕胡曺作冕伯余作衣裳於則作扉履黃帝作車骸作服牛共鼓貨狄作舟伶倫造磬見世本又命伶倫與榮將鑄十二鐘以和五音見吕氏春秋岐伯作短簫鐃歌見古今注又命雷公岐伯論經脈旁通問難八十為難經教制九針著內外術經見帝王世紀經綸草昧垂法利用何濟濟也時鄰邃古其勳猷軌度靡由備徵惜夫黃帝后妃傳嫘祖女節彤魚氏嫫母黃帝元妃西陵氏女曰嫘祖生昌意史記嫘祖生二子其一曰玄囂是為青陽其一曰昌意次妃方雷氏女曰女節生青陽帝王世紀次妃彤魚氏女生夷鼓次妃嫫母生蒼林人物表嫫母於四妃之班居下甚醜而最賢心每自退列女傳黃帝使嫫母訓宫人而有淑德奏上德之頌帝周遊行時元妃嫘祖死於道帝祭之以為祖神令嫫母監護於道以時祭之因以為方相氏軒轅本紀吕氏春秋嫫母執乎黃帝黃帝曰屬女德而弗忘與女正而弗衰雖惡奚傷黃帝諸子傳昌意玄囂苗龍休青陽揮夷鼓蒼林禺陽黃帝二十五子曰昌意玄囂苗龍休青陽揮夷鼓蒼林禺陽餘子無考詳氏族志外紀蚩尤夸父附蚩尤者九黎之君也孔安國史記注路史蚩尢神農之裔嘗稱炎帝軒轅之時神農氏世衰蚩尢作亂不用帝命於是黃帝乃徵師諸侯與蚩尢戰於涿鹿之野遂禽殺蚩尢史記周書昔天之初闕作二后乃設建典命赤帝分正二卿命蚩尤于宇少昊以臨四方司闕上天莫成之慶蚩尤乃逐帝于涿鹿之河九隅無遺赤帝大懾乃説于黃帝執蚩尤殺之于中冀以甲兵釋怒用大正順天思序紀于大帝用名之曰絶轡之野乃命少昊請司馬鳥師以正五帝之官故名曰質天用大成至于今不亂管子黃帝問于伯髙曰吾欲陶天下而為一家為之有道乎伯髙對曰上有丹砂者下有黃金上有慈石者下有銅金上有陵石者下有鉛錫赤銅上有赭者下有鐵此山之見榮者也山之見榮者君封而祭之距封十里而為一壇使乘者下行行者趨犯者罪死然則與折取之逺矣修教十年而葛盧之山發而出水金從之蚩尤受而制之以為劍鎧矛戟是歲相兼者諸侯九雍狐之山發而出水金從之蚩尤受而制之以為戟芮戈是歲相兼者諸侯十二按周書以為蚩尤逐炎帝而後黃帝殺之管子以為黃帝使蚩尤制五兵二説互異龍魚河圖蚩尤兄弟八十一人並獸身人語銅頭鐵額食砂石造兵杖威振天下黃帝仁義不能禁天遣元女下授兵符制伏蚩尤帝因使之主兵以制八方黃帝內傳黃帝伐蚩尤玄女為帝製夔牛鼓八十面一震五百里連震三千八百里又為帝製司南車當其前記里鼓居其右又有元女兵法愈怪誕不載皇覽蚩尤冡在東平郡夀張縣闞鄉城中髙七丈民常以十月祀之有赤氣出如匹綘帛民名曰蚩尤旗肩鞞冡在山陽郡巨野縣重聚大與闞冡等傳言黃帝殺蚩尤身體異處故别葬之山海經蚩尤所棄其桎梏是為楓木又有夸父者黃帝亦使應龍殺之山海經山海經夸父與日逐走入日渴欲得飲飲于河渭河渭不足北飲大澤未至道渴而死棄其杖化為鄧林少皞諸子傳倍伐般少皞子曰倍伐曰般倍伐處緡淵有水四方名曰俊壇般始為弓矢山海經顓頊諸臣傳允格臺駘允格臺駘者少皞之裔也少皞有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝顓頊嘉之封諸汾川沈姒蓐黃實守其祀左傳南正重北正黎南正重者系出少皞氏北正黎者系出髙陽氏尚書注重少皞之後黎髙陽之後重即羲黎即和少皞氏之衰也九黎亂德民神雜揉家為巫史民瀆齋盟禍災荐臻帝顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆書吕刑乃命重黎絶地天通罔有降格是也其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之國語重黎之後是為羲和共工共工者諸侯炎帝之後薑姓也賈逵國語注為共工生后土黃帝使李此蓋是其子孫襲其先號者也共工虞於湛樂淫失其身欲壅防百川墮髙堙庳以害天下國語顓頊氏衰共工侵陵諸侯與髙辛爭王遂為髙辛所滅賈逵注顓頊諸子傳窮蟬稱卷章參胡重黎彭祖吳回會人陸終曺姓昆吾季連顓頊生子窮蟬按路史窮蟬父曰虞幕蓋顓頊之苗裔説見五帝圖又生稱稱生卷章卷章生重黎吳回大戴禮顓頊生老童老童生重黎餘並同世本老童生重及黎山海經老童生重及黎帝令重獻上天黎卬下地國語南正重司天北正黎司地按此重黎為二人而史與戴記合為一人誤又按書注重少皞之後黎髙陽之後是又系出二本矣吳回生陸終陸終生子六人坼剖而産焉其一曰昆吾二曰參胡三曰彭祖四曰會人五曰曹姓六曰季連風俗通陸終氏娶于鬼方是謂女嬇孕而三年不育啓其左脅三人出焉啓其右脅三人出焉重黎為帝嚳居火正甚有功能光融天下帝嚳命曰祝融國語黎為髙辛氏火正以淳耀惇大天明地德光昭四海故命之曰祝融共工氏作亂帝嚳使重黎誅之不盡帝乃以庚寅日誅重黎而以其弟吳回為重黎後復居火正為祝融史記帝嚳后妃傳羲和鄒屠氏女羲和之國有女子名曰羲和方日浴於甘淵有神表後為帝俊之妻帝俊即帝嚳山海經又帝嚳之妃鄒屠氏之女生八子謂之八英拾遺記世系帝嚳元妃有邰氏之女曰薑嫄生后稷次妃有娥氏之女曰簡狄生契次妃陳鄷氏之女曰慶都生帝堯次妃訾陬氏之女曰常儀生帝摯帝嚳卜其四妃之子皆有天下帝王世紀與世本同大戴禮記陳鄷作陳隆史記陳鄷作陳鋒訾陬作陬訾帝嚳諸子傳中容季釐帝鴻晏龍黑齒禺號台繭帝嚳生中容季釐帝鴻晏龍黑齒禺號后稷稷弟台繭山海經山海經帝俊有子八人是始為歌舞山海經帝俊妻羲和生十日郭璞注言生十子各以日名之注以帝俊為帝舜非是今改定詳見氏族志帝堯諸子傳丹朱庶子九人堯娶散宜氏之女曰女皇生丹朱又有庶子九人皆不肖帝王世紀堯知子丹朱之不肖不足授天下於是乃權授舜授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病利一人卒授舜以天下史記舜使丹朱居丹淵為諸侯尚書逸篇山海經蒼梧之山帝舜葬于陽丹朱葬于隂帝舜后妃傳娥皇女英癸比氏娥皇女英堯之二女舜之二妃也娥皇無子女英生商均帝王世紀列女傳有虞二妃帝堯之女也長娥皇次女英二女承事舜于畎畝之中不以天子之女故而驕盈怠幔猶謙謙恭儉思盡婦道瞽叟與象謀殺舜使塗廩二女曰往哉瞽叟焚廪舜往飛去象復與父母謀使舜浚井二女曰往哉格其出入從掩舜舜潛出瞽叟又速舜飲酒醉將殺之二女與舜藥浴注遂往舜終日不醉舜之女弟繫憐之與二嫂諧二妃死於江湘之間俗謂之湘君列女傳帝王世紀或曰二妃葬衡山水經注大舜之陟方也二妃往征溺于湘江神遊洞庭之淵出入瀟湘之浦博物志堯之二女舜之二妃曰湘夫人帝崩二妃啼以涕揮竹竹盡斑舜又娶癸比氏舜葬于蒼梧之野三妃未之從也禮記康成注舜征有苗而死遂留葬焉山海經舜妻癸比氏生宵明燭光處河大澤二女之靈能照此所方百里一曰癸比氏帝舜諸子傳商均商均舜子女英之所生也商均不肖舜乃豫薦禹于天十七年而崩禹踐天子位堯子丹朱舜子商均皆有疆土索隱注商均封虞在梁國以奉先祀服其服禮樂如之以客見天子天子弗臣示不敢専也史記論曰丹淵與薊無所聞陳國建矣亦瑣尾至田齊而後若掉大尾焉詩有之瓶之罄矣唯罍之恥丹朱商均其蒙罍恥乎唐虞諸臣傳羲仲羲叔和仲和叔羲仲羲叔其先曰重和仲和叔其先曰黎堯即位乃命羲和欽若昊天厯象日月星辰敬授人時分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交曰明都平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙尚書論衡堯候四時之中命羲和察四星以占時氣尸子造厯數者羲和子也山海經注羲和蓋天地始生主日月者堯因立羲和之官堯既立羲和之官後世遂以為國至仲康夏中衰羲和氏黨后羿仲康命胤侯征之作胤征書傳契相土冥附契所出未詳母曰簡狄有娀氏之女玄鳥至日以太牢祀髙禖因孕而生契古詩注史記契母曰簡狄為帝嚳次妃三人行浴見元鳥墮其卵簡狄取吞之因孕生契論衡契母吞燕卵而生契故殷姓曰子宋書符瑞志髙辛氏之世妃曰簡狄以元鳥至之日從帝祀郊禖有元鳥墜卵簡狄吞之遂孕胸剖而生契列女傳簡狄有娀氏之長女與其妹娣浴于元邱之水有元鳥銜卵過而墜之五色甚好簡狄取吞之遂生契古史考契生堯世舜始舉之以其父微故不著名其母與宗婦三人浴于川元鳥遺卵簡狄吞之則簡狄非帝嚳次妃明矣帝堯之時契為司馬淮南子帝舜即位契佐禹治水有功乃命契曰百姓不親五品不遜汝為司徒敬敷五教五教在寬封于商賜姓子氏契興于唐虞大禹之際功業著于百姓百姓以平契卒子昭明立世本昭明居砥石昭明卒子相土立世本相土作乘馬史記相土封于商邱代閼伯之後祀大火杜預左傳注外詩相土烈烈海有截是也四傳至冥冥契後六世孫根圉之子韋昭國語注為夏司空勤于官事死于水杜預左傳注死禮𡨕勤其官而水是也凡傳十有三世而成湯受命稷公劉附稷名棄其母有邰氏女曰薑原薑原出野見巨人迹心欣然説欲踐之踐之而身動如孕者居期而生子以為不祥棄之隘巷馬牛過者皆辟不踐徙置之林中適會山林多人遷之而棄渠中氷上飛鳥以其翼覆薦之薑原以為神遂收養長之初欲棄之因名曰棄棄為兒時屹如巨人之志其遊戲好種樹麻菽麻菽美及為成人遂好耕農相地之宜宜榖者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功帝舜受禪命之曰黎民阻飢爾后稷播時百榖封棄于邰號曰后稷别姓姬氏后稷之興在陶唐虞夏之際皆有令德史記吳越春秋棄為兒時好種禾黍桑麻五榖相五土之宜青赤黃黑陵水髙下粢稷黍禾蕖麥豆稻各得其理堯遭洪水人民泛濫逐髙而居堯聘棄使教民山居隨地造區妍營樹之術三年餘行人無飢乏之色乃拜稷為農師封之台后稷卒山海經西南黑水之間有廣都之野后稷葬焉爰有膏菽膏稻膏黍膏稷百榖自生冬夏不死子曰漦繭漦繭生叔均吕梁碑叔均始作牛耕山海經至不窋史以不窋為后稷子帝王世紀亦曰后稷納姞氏生不窋然厯千有餘年而止十五世不合事理今按山海經世本前後增入之夏后氏政衰去稷不務不窋用失其官而奔戎狄之間不窋卒子鞠立子鞠卒子公劉立史記公劉之後曰慶節史記慶節國于豳按詩篤公劉于豳斯館是史誤也皇僕差弗為隃史記作毁隃世本作榆公非辟方帝王世紀公非字辟方髙圉國語髙圉能率稷者也周人報焉侯年漢書作夷俟亞圉雲都帝王世紀亞圉雲都字漢書雲都亞圉弟組紺諸盩三代世表作叔類帝王世紀公祖一名祖紺諸盩字叔類號曰太公史記作公叔祖類按史記以紺紺諸盩為一人據世本曰太公組紺諸盩似亦為一人也世本不窋傳十有三世而至大王臯陶臯陶生于曲阜偃地故賜姓曰偃帝王世紀字庭堅杜預左傳注一又曰即八愷之或曰名庭堅字隤帝顓頊之後人物考秦本紀帝顓頊之苗裔曰女修生大業大業生大費與禹平水土是為柏翳列女傳陶子生五歲而佐禹曹大家注陶子者臯陶之子伯益也按此伯益即伯翳則大業為臯陶是臯陶為秦之先然考楚滅六蓼臧文仲曰臯陶庭堅不祀忽諸是時秦嬴方盛臧氏何得云然且伯益暨夏禹臯陶同為卿佐相與都俞吁咈于帝舜之朝亦不得為臯陶子也以臯陶大業作二人為是臯陶烏喙決獄明白察于人情白虎通堯時為大理説苑文子臯陶喑而為大理天下無虐刑荀子臯陶之狀色如削瓜春秋元命苞堯夢白虎遺馬喙子其母曰扶始升髙邱覩白虎上有雲感己生臯陶索扶始問之如堯言明于刑罰罪次始終故立臯陶為大理論衡觟䚦者一角之羊也性知有罪臯陶治獄罪之疑者令羊觸之有罪觸無罪則否臯陶敬羊起坐視之詭僻不經舜受禪命臯陶曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允舜老將讓位禹禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功帝曰臯陶惟兹臣庶罔或干豫正汝作士明于五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司帝曰俾豫從欲以治四方風動惟乃之休及禹受攝臯陶乃昌言于庭曰允迪厥德謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永惇敘九族庶明勵翼邇可逺在兹禹拜昌言曰俞臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞強而義彰厥有常吉哉日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和𠂻哉天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉天聰明自我民聰明天明畏自我民明威達于上下敬哉有土臯陶曰朕言惠可底行禹曰俞乃言底可績臯陶曰豫未有知思日贊贊襄哉帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂臯陶曰俞師汝昌言禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為豫欲觀古人之象日月星辰山龍華蟲作會宗彜藻火粉米黼黻絺繡以五采彰施于五色作服汝明豫欲聞六律五聲八音在治忽以出納五言汝聽豫違汝弼汝無面從退有後言欽四鄰庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世豫創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣豫弗子惟荒度土功弼成五服至于五千州有十二師外薄四海咸建五長各迪有功苗頑弗即工帝其念哉帝曰迪朕德時乃功惟敘臯陶方祗厥敘方施象刑惟明帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事惰哉帝拜曰俞往欽哉尚書帝崩夏禹立以臯陶最賢薦之于天且授政焉而臯陶卒封其後于英六或在許楚成大心滅之史記魯臧孫辰聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉左傳伯益伯益索隱注嬴姓之先一名柏翳尚書謂之伯益系本漢書同一名大費大費父曰大業帝顓頊之苗裔孫曰女修女修織元鳥隕卵女修吞之生大業大業少皥氏之後也左傳郯國少昊之後而嬴姓蓋其族也按秦趙宜祖少昊氏而以母族祖顓頊非是大業取少典之子曰女華女華生大費費與禹平水土論衡禹益並治洪水禹主治水益主記異物海外山表無逺不至以所聞見作山海經已成帝錫禹元圭尚書禹錫元圭告厥成功謂以元圭為贄告成功于舜也從經為是禹曰非禹能成亦大費為輔帝曰咨爾費贊禹功其賜爾皂遊爾後嗣將大出乃妻之姚姓之女費佐帝調馴鳥獸鳥獸多馴服帝賜姓嬴氏是為伯益舉以為虞益拜稽首讓于朱虎熊羆帝曰往矣汝諧遂以朱虎熊羆為佐史記説苑堯時益掌驅禽尚書刑德考益為司馬益嘗戒帝曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王惟時有苗弗率帝命禹征之三旬苗民逆命益贊于禹曰惟德動天無逺勿屆滿招損謙受益時乃天道帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊栗瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格尚書益受禪七年史記作十年禹東巡守崩于會稽以天下授益三年之喪畢益讓禹之子啓而辟居箕山之陽孟子作隂益佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君之子也史記初禹薦益而封之百里益死啓歲善犧牲以祠之越絶書淮南子伯益作井而龍登元雲神棲崑崙能愈多而德愈薄矣垂伯夷夔龍夔子伯封附垂伯夷夔龍皆佐堯及舜即位帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉世本伯夷作刑垂作鐘無句作磬帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔曰戞擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀又曰於豫擊石拊石百獸率舞庶尹允諧帝王世紀夔放山川溪谷之音作樂大章天下大和帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允尚書禹臯陶稷契伯夷夔龍垂益彭祖自堯時而皆舉用未有分職及舜謀于四嶽命臯陶為大理平民各伏得其實伯夷主禮上下咸讓垂主共師百工致功益主虞山澤辟棄主稷百榖時茂契主司徒百姓親和龍主賔客逺人至十二牧行而九州莫敢辟違二十二人咸成厥功史記傳禹見夏紀稷契臯陶益别有彭祖見顓頊諸子傳夔子曰伯封有仍氏生女黰黑而甚美光可以鑑名曰元妻夔取之生伯封伯封實有豕心貪婪無饜忿纇無期謂之封豕有窮后羿滅之夔是以不祀又有八愷八元者蒼舒隤敳檮戭大臨龍降庭堅仲容叔達八人者髙陽氏之裔也齊聖廣淵明允篤誠天下謂之八愷杜預注此即垂益禹臯陶之倫庭堅即臯陶字伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍八人者髙辛氏之裔也忠肅共懿宣慈惠和天下謂之八元杜預注此即稷契朱虎熊羆之倫此十六族也世濟其美不隕其名舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝內平外成左傳六按八愷八元或别是十人杜説蓋未必然論曰世至唐虞燒藪斬害璞剖而器成矣丞疑師保雍容揖讓于廷陛間蔚然乃猶可想見也董父董父飂君飂顓頊之裔昆吾已氏之别受氏為國者叔安之裔也實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川其後為鬷夷氏左傳至夏孔甲前滅韋昭國語注閼伯實沈閼伯實沈者髙辛氏之二子也伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討帝堯不臧遷閼伯于商邱主辰辰大火也遷實沈于大夏主參參水星也閼伯為陶唐氏之火正祀大火而火紀時焉左傳唐虞逸民傳壤父善卷許由巢父雄陶續牙方回伯陽東不識附秦不空壤父年八十餘當帝堯之世而擊壤于道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德于我哉髙士傳善卷者得道之士也堯論其德行達智而弗若故北面而問焉吕氏春秋及舜舜以天下讓卷卷曰昔唐氏之有天下也不教而從不賞而勸今子盛為衣裳之服以眩民目繁調五音之聲以亂民耳丕作皇韶之樂以愚民心亂始此矣豫立宇宙之間冬毛夏葛春種秋斂逍遙自得何以天下為遂去莫知其處許由者字武仲陽城槐里人據義履方邪席不坐邪膳不食髙士傳隱于箕山恬泊養性無欲于世堯禮待之終不肯就時人遂崇大之曰堯將以天下讓許由由耻聞之乃洗其耳吕氏春秋堯以天下讓子州友父子州友父曰以我為天子可也雖然我適有幽憂之病方將治之未暇在天下也又有巢父與許由同志或曰許由夏常居巢故一號巢父古史考或遺由一瓢由挂樹間風吹有聲猶以為煩舉而棄之逸民傳髙士傳堯讓天下于許由由不受遁耕于頴水之陽箕山之下終身無經天下之色堯又召為九州長由不欲聞之洗耳于潁水濵適其友巢父牽犢欲飲之見由問其故而告之巢父曰子處髙深誰能見子子故浮遊欲聞求其名譽汙吾犢口牽犢上遊飲之由殁葬箕山之巔莊子吕氏春秋略同韓非子堯以天下讓許由許由逃之舍于家人家人藏其皮冠夫棄天下而家人藏其皮冠是不知許由者也帝王世紀堯以尹夀許由為師符子堯以天下讓巢父巢父曰君之牧天下亦猶余之牧孤犢是各有所牧矣焉用惴惴焉以所牧而與余余無用天下為也牽犢而去水經注箕山上有許由冢堯所封也山下有牽牛墟側潁水有犢泉是巢父還牛處石上犢迹存焉又有雄陶方回續牙伯陽東不識秦不空皆一國之賢者嘗與舜遊尸子又或作東不訾秦不不虛有靈甫共七人論曰世多傳堯以天下讓許由揚子法言曰或問堯將讓天下于許由有諸曰好大者為之也顧由無求于世而已矣允哲堯儃舜之重則輕于由矣好大纍堯巢父灑耳不亦宜乎四凶傳歡兜共工鯀三苗帝鴻氏有不才子掩義隱賊好行凶德天下謂之渾沌少皥氏有不才子毁信廢忠崇飾惡言天下謂之窮竒顓頊氏有不才子不可教訓不知話言天下謂之檮杌縉雲氏有不才子貪于飲食冒于貨賄天下謂之叨餮左傳渾沌者歡兜也窮竒者共工氏也檮杌者鯀也叨餮者三苗也杜預注漢書鯀顓頊五世孫帝王世紀顓頊之子字熙國語檮杌次于丕山韋昭注檮杌鯀也世本鯀作城蔡沈書傳三苗九黎之後鯀及歡夔共工並臣帝堯共工為水官康成書注鯀封于崇謂之崇伯鯀國語帝堯老曰疇咨若時登庸放齊亦堯臣曰胤子朱啓明帝曰吁嚚訟可乎帝曰疇咨若豫采采事也歡兜曰都共工方鳩僝功鳩聚僝見言方鳩聚而見其功帝曰吁靜言庸違象恭滔天史記試之功師果淫辟帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰鯀哉帝曰吁咈哉方命圯族嶽曰異哉試可乃已帝曰往欽哉九載績用弗成尚書三苗在江淮荆州數為亂于是舜言于帝流共工于幽州以變北狄放歡兜于崇山以變南蠻遷三苗于三危以變西戎博物志堯以天下讓于虞三苗之民非之帝殺有苗之民叛浮入南海為三苗國殛鯀于羽山以變東夷史記國語鯀違命帝殛之于羽山化為黃􅀢入于羽淵越絶書堯使鯀治水舜知鯀不能數諫不去堯殛之于羽山此之謂舜之時鯀不從令也楚辭注鯀治水績用不成堯放殺之羽山飛鳥水蟲曵銜而食之楚辭注堯長放鯀于羽山絶在不毛之地三年不舍其罪拾遺記鯀自沈于羽淵遂化為元魚海民于羽山之中修立鯀廟四時致祭歸藏鯀死三歲不腐剖之以吕刀化為黃龍韓非子堯欲傳天下于舜鯀諫曰不祥哉孰以天下而傳之匹夫堯不聽殺鯀于羽山之郊共工又諌曰孰以天下而傳之匹夫堯不聽誅共工于幽州之都仲尼曰堯之知舜之賢非難也不以其所疑敗其所察則難也吕氏春秋堯以天下讓舜鯀為諸侯怒曰得天之道者為帝得地之道者為三公今我得地之道而不以我為三公以堯為失論怒甚猛獸欲以為亂比獸之角能以為城舉其尾能以為旌召之不來倣徉于野舜于是殛之于羽山論曰放齊舉子朱歡兜進共工而稷契臯夔曾不得與乎二臣之口氣交類從所以見小人之朋也若乃嚚訟之質象恭圯族之情聖智若堯乃有以燭之不然則蠱淫于下而蔽張于上矣逮夫厲智榮夷紂忠崇侯是又自聖其聖自賢其賢比德而狎遂與之偕亡又其下已尚史卷二十三
