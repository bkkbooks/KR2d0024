body:
  text: 尚史卷五本紀四鑲白旗漢軍李鍇撰周本紀太王王季文王太王者是為古公亶父組紺諸盩之子后稷棄之裔也舜封棄於邰號曰后稷别姓姬氏后稷别有本傳見唐虞諸臣史記子曰漦繭漦繭生叔均山海經叔均始作牛耕叔均又數世生不窋吕梁碑史記后稷卒子不窋立帝王世紀亦曰后稷納姞氏生不窋皆誤不窋末年夏后氏政衰去稷不務不窋以失其官而奔戎狄之間不窋卒子鞠立鞠卒子公劉立史記自后稷積德纍善十餘世至公劉公劉避桀居豳漢書公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮度渭取材用行者有資居者有畜積民賴其慶百姓懷之多從而保歸焉周道之興自此始故詩人歌樂思其德吳越春秋公劉性慈仁行不履生草運車以避葭葦避夏桀于戎狄變易風俗民化其政公劉卒子慶節立史記慶節國于豳按詩篤公劉于豳斯館史誤也慶節卒子皇僕立皇僕子差弗立差弗卒毁隃立世本作僞榆毁隃卒子公非立公非卒辟方立帝王世紀公非字辟方辟方卒髙圉立國語髙圉能帥稷者也周人報焉紀年殷祖一十五年命邠侯高圉髙圉卒侯牟立漢書侯牟作夷俟侯牟卒亞圉立紀年盤庚十九年命邠侯亞圉亞圉卒雲都立漢書雲都亞圉弟帝王世紀亞圉雲都字也雲都太公組紺諸盩立紀年祖甲十三年命邠侯組紺三代世表作叔帝王世紀公祖一名組紺諸盩字叔類號曰太公按史記作公叔祖類世本作太公組紺諸盩似并為一人也自公非以下據世本增辟方侯牟雲都數世或子或弟未詳組紺諸盩卒子古公亶父立古公亶父復修后稷公劉之業積德行義國人皆戴之薰育戎狄攻之欲得財物豫之已復攻欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之豫不忍為乃與私屬遂去豳渡漆沮踰梁山止於岐下豳人舉國扶老攜弱盡復歸古公于岐下及他旁國聞古公仁亦多歸之吳越春秋古公杖䇿去邠踰梁山處岐周曰彼君與我何異邠人父子兄弟相率負老攜幼揭釡甑而歸古公居三月成城郭一年成邑二年成都而民都倍其初後漢書武乙暴虐犬戎冦邉周古公踰梁山而避于岐下琴苑要録岐山操周太王之所作也曰戎狄侵兮土地遷移邦邑適于岐山蒸民不憂兮誰者知嗟嗟奈何兮豫命遭斯於是古公乃貶戎狄之俗而營築城郭室屋而邑别居之作五官有司民皆歌樂之頌其德古公有長子曰太伯次曰虞仲太姜生少子季厯季厯取太任皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎太伯虞仲知古公欲立季厯以傳昌乃二人亡如荆蠻文身斷髮以讓季厯古公卒季厯立是為公季修古公遺道篤於行義諸侯順之史記公季當殷武乙之時公季伐西落鬼戎紀年武乙三十四年周公季厯來朝王賜地三十里玉十㲄馬十匹三十五年季厯伐西落鬼戎俘二十翟王太丁時公季復伐燕京之戎戎人大敗周師紀年文丁二年周人伐燕京之戎周師大敗後二年周人克余無之戎於是太丁命公季為牧師紀年文丁四年周人伐余無之戎克之周王季命為殷牧師自是之後更伐始呼翳徒之戎皆克之後漢書紀年文丁七年周人伐始呼之戎克之十一年周人伐翳徒之戎捷其三大夫王嘉季厯之功賜之圭瓉秬鬯九命為伯孔叢子羊容問子思曰古之帝王中分天下使二公治之謂之二伯周自后稷封為王者後子孫據國至太王王季文王此固世為諸侯矣焉得為西伯乎子思曰吾聞諸子夏殷王帝乙之時王季以公九命作伯受圭瓉秬鬯之賜故文王因之得専征伐公季卒紀年文丁執諸塞庫季厯困而死帝王世紀葬鄠縣之南山子昌立是為西伯西伯曰文王白虎通文王四乳是謂至仁宋書符瑞志太任夢長人感于于豕牢而生昌龍顔虎肩身長十尺胸有四乳春秋合誠圖蒼帝之為人望之廣視之専而長九尺一寸遵后稷公劉之業則古公公季之法篤仁敬老慈少禮下賢者日中不暇食以待士士以此多歸之墨子文王封于岐周方地百里與其百姓兼相愛交相利是以近者安其政逺者歸其德聞文王者皆起而趨之罷不肖股肱不利者處而願之曰奈何乎使文王之地及我乎吾則吾利豈不亦猶文王之民也哉又曰文王之治西土若日若月乍光于西方于西土不為大國侮小國不為衆庶侮鰥寡不為暴勢奪穡人黍稷狗彘天屑臨文王慈是以老而無子者有所得終其夀連獨無兄弟者有所雜于生人之間少失其父母者有所放依而長有闕文伯夷叔齊在孤竹聞西伯善養老往歸之太顛閎夭散宜生鬻子辛甲大夫之徒皆往歸之帝王世紀太顛閎夭散宜生南宫適之屬咸至是為四臣文王雖在諸侯之位襲父為西伯崇侯虎譖西伯于殷紂曰西伯積善纍德諸侯皆嚮之將不利紂乃囚西伯於羑里閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因殷嬖臣費仲而獻之紂紂大喜說曰此一物足以釋西伯况其多乎乃赦西伯賜之弓矢斧鉞使得征伐曰譖西伯者崇侯虎也吕氏春秋紂為無道殺梅伯而醢之鬼侯而脯之以禮諸侯于廟文王流涕而咨之紂恐其叛欲殺文王而滅周文王曰父雖無道子敢不事君雖不惠臣敢不事孰王而可叛也紂乃赦之六韜商王拘周伯于羑里太公與散宜生以金千鎰求天下珍物得犬戎氏文馬駮身朱鬛目加金黃項下雞毛名曰雞斯之乘以獻商王今本無古今樂録文王囚于羑里太顛之屬往見文王文王為矉右目者言紂之好色柎桴其腹者言欲得其寶蹀躞其足者使迅疾也於是周流求之以獻紂琴操文王備修道德百姓親附是時崇侯虎與文王列為諸侯德不及文王常嫉妒之乃譖文王于紂曰西伯昌聖人也長子發中子旦皆聖人也三聖合謀君其慮之乃囚文王于羑里將欲殺之於是文王四臣散宜生等周流海內得美女二人水中大貝白馬朱鬛以獻于紂陳于中庭紂立出西伯新書紂作梏數千睨諸侯之不諂己者杖而梏之文王桎梏于羑里七年而後得免及武王克殷令殷民投桎梏于河民輸梏者手撒之弗敢墜也跪入之水弗敢投也曰昔者文王常擁此故愛思文王猶敬其梏況其法教乎西伯乃獻洛西之地以請紂去炮烙之刑紂許之皇王大紀是時西有昆夷之患北有玁狁之難紂乃召昌釋之因獻洛西之地請除炮烙之刑紂大喜許之賜之弓矢斧鉞使専征伐為西方諸侯伯吕氏春秋文王處岐事紂冤侮雅遜朝夕必時上貢必適祭祀必敬紂喜命文王稱西伯賜之千里之地文王再拜稽首而辭曰願為民請炮烙之刑文王非惡千里之地得民心則賢于千里之地故曰文王智矣越絶書文王以務爭者紂為天下殘賊奢佚不顧邦政文王以聖事紂天下皆盡誠從之此謂文王以務爭也紂以惡刑爭文王以仁義爭此之謂也韓非子文王侵孟克莒舉酆三舉事而紂惡之文王乃懼請入洛西之地赤壤之國方千里以請解炮烙之刑天下皆說仲尼聞之曰仁哉文王輕千里之國解炮烙之刑智哉文王出千里之國得天下之心吕氏以下邪辟縱橫語出戰國宜矣西伯出獵遇吕尚於渭之陽與語大說載與俱歸立為師楚辭注周文王夢立令狐之津太公在後帝曰昌賜汝名師文王再拜太公夢亦如此文王出田見識所夢載與俱歸以為太師又曰吕望鼓刀在列肆文王親往問之吕望對曰下屠屠牛上屠屠國文王喜載與俱歸也潛夫論文王遊畋遇姜尚於渭濵察言觀志而見其心不咨左右不諏羣臣遂載反歸委之以政抱朴子文王之接吕尚桑隂未移而知其可師矣西伯行善削隂字諸侯皆來决平於是虞芮之人有獄不能决乃如周入界耕者皆讓畔民俗皆讓長虞芮之人未見西伯皆慚相謂曰吾所爭周人所恥何往為祗取辱耳遂還俱讓而去諸侯聞之曰西伯蓋受命之君家語虞芮二國爭田而訟連年不决乃相謂曰西伯仁人也盍往質之入其境則耕者讓畔行者讓路入其朝士讓於大夫大夫讓于卿虞芮之君曰嘻吾儕小人也不可以入君子之朝遂自相與而退以所爭之田為間田也孔子曰以此觀之文王之道其不可加焉不令而從不教而聽至矣哉孔安國書傳周自虞芮質厥成諸侯並附以為受命之年至九年而文王卒正義毛傳稱天下聞虞芮之訟息歸周者四十餘國知周自虞芮質成諸侯並附以為受命之年改稱元年至九年而文王卒史記正義注二國相讓後諸侯咸尊西伯為王蓋此年受命之年稱王也尚書大傳一年斷虞芮之質二年伐邘三年伐密須四年伐犬夷五年伐耆六年伐崇按文王無改元事歐陽氏嘗論之說見武王紀稱王說尤妄明年伐犬戎明年伐密須姞姓之國說苑文王曰吾欲用兵誰可伐密須氏疑於我可先往伐管叔曰不可其君天下之明君也伐之不義太公望曰吾聞之先王伐枉不伐順伐嶮不伐易伐過不伐不及文王曰善遂伐密須氏滅之明年敗耆國正義注即黎國紂按戡黎者武王說見紀明年伐邘明年伐崇侯虎說苑文王欲伐崇先宣言曰余聞崇侯虎滅侮父兄不敬長老聽獄不中分財不均百姓力盡不得衣食余將來征之唯為民乃伐崇令毋殺人毋壞室毋填井毋伐樹术毋動六畜有不如令者死無赦崇人聞之因請降韓非子文王伐崇至鳯黃墟襪繫解因自結太公望曰何為也王曰君與處皆其師中皆其友下盡其使也今皆先君之臣故無可使也又作晉文公吕覽作武王作豐邑自岐下徙都豐紀年周大飢西伯自程遷于豐周書維周王宅程三年遭天之大荒作大匡以召牧其方三州之侯咸率王乃召冡卿三老三吏大夫百執事之人朝于大庭曰不榖不德政事不時國家羅病不能胥匡二三子尚助不榖官考厥職鄉問其人因其耆老及其總害慎問其故無隱乃情及某日以告于廟有不用命有常不赦王既發命入食不舉百官質方不食饔及期日質明王麻衣以朝朝中無采衣官考其職卿問其利因謀其菑旁匡於衆無敢有違詰退驕頑方收不服慎惟怠惰什伍相保動觀游居事節時茂農夫任戶户盡夫出農廩分鄉鄉命受糧程課物徴躬競比藏藏不閉糴糴不加均賦灑其幣鄉正保貸成年不償信誠匡助以輔殖財財殖足克食賦為征數口以食食均有賦外食不贍開關通糧糧窮不轉孤寡不廢滯不轉留戌城不留足以守出旅分均馳車送逝旦夕運糧於是告四方遊旅旁生欣通津濟道宿所至如歸幣租輕乃作毋以行其子易資貴賤以均遊旅無使滯無粥熟無室市權內外以立均無蚤暮閭次均行均行衆從積而勿以罰助均無使之窮平均無乏利民不淫無播蔬無食種以數度多少省用祈而不賔祭服潄不制車不雕飾人不食肉畜不食榖國不鄉射樂不牆合牆屋有補無作資農不敗務非公卿不賔賔不過具哭不留日登降一等庶人不獨葬伍有值送往迎來亦如之有不用命有常不違餘篇不具載明年西伯薨即位五十年史記史記又曰西伯受命之年稱王而斷虞芮之訟改法度制正朔追尊古公為太王公季為王季說非是吕氏春秋文王之時天先見火赤烏銜丹書集于周社文王曰火氣勝火氣勝故其色尚赤其事則火年九十七禮記葬于異皇王大紀括地志墓在雍州萬年縣西南二十八里原上文王之為世子也朝于王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也禮記其囚羑里演易繫卦辭史記唐孔氏正義伏羲初畫八卦因其八而更重之為六十四卦也繫辭曰因而重之爻在其中矣是也然重卦之人凡為四說王輔嗣等以為伏羲重卦鄭康成之徒以為神農重卦孫盛以為夏禹重卦史遷等以為文王重卦其言夏禹及文王重卦者案繫辭神農之時已有蓋取益與噬嗑以此論之不攻自破其言神農重卦亦未為得今依輔嗣以伏羲既畫八卦即自重為六十四卦為得其實史記其囚羑里蓋益易之八卦為六十四卦琴操文王在羑里時演易八卦以六十四乃申憤以作歌曰殷道溷溷浸濁煩兮朱紫相合不分别兮迷亂聲色信讒言兮炎炎之虐使我愆兮幽閉牢穽由其言兮遘我四人憂勤勤兮史說誤今遵正義琴歌俚鄙非文王語其作靈臺掘地得死人骨吏以聞文王曰更葬之吏曰此無主矣文王曰寡人固其主又安求主天下聞之皆曰文王賢矣澤及枯骨新序吕覽同淮南子文王葬死人之骸而九夷歸之新書文王夢人登城而呼之曰我東北陬之膏骨也速以王禮葬我文王曰諾覺召吏視之信有焉吏曰此無主矣請以五大夫禮文王吾已許之矣奈何其倍之也士民聞之曰我君不以夢之故倍膏骨况生人乎及其寢疾謂世子發曰見善勿怠時至勿疑去非勿處此三者道之所止也及武王克殷祀于太廟追王古公亶父曰太王季厯曰王季文考曰文王皇王大紀武王武王名發文王之世子也論衡武王望陽白虎通武王望羊是謂攝掦盱目陳兵天下富昌春秋元命苞武王駢齒是謂剛强宋書符瑞志太姒夢商庭生棘太子發植梓樹于闕間化為松柏棫柞以告文王文王幣告羣臣與發並拜吉夢文王崩太子發立是為武王武王即位太公望為師周公旦為輔召公畢公之徒左右王師修文王緒業淮南子武王䕃暍人於樹下左擁而右扇之而天下懷其德十一年武王戡黎殷之臣祖伊聞之懼以告帝紂紂曰不有天命乎是何能為史記以戡黎為文王辨見紂紀史記又曰九年武王上祭于畢東觀兵至于盟津為文王木主載以車中軍武王自稱太子發言奉文王以伐不敢自専乃告司馬司徒司空諸節齊栗信哉豫無知以先祖有德臣小子受先功畢立賞罰以定其功遂興師師尚父號曰總爾衆庶與爾舟楫後至者斬武王渡河中流白魚躍入王舟中武王俯取以祭既渡有火自上復于下至于王屋流為烏其色赤其聲魄云是時諸侯不期而㑹盟津者八百諸侯皆曰紂可伐矣武王曰女未知天命未可也乃還師歸淮南子武王伐紂載尸而行海內未定故不為三年之喪越絶書文王死九年八百諸侯一旦㑹于孟津不言同辭欲從武王伐紂當是時比干箕子微子尚在武王賢之不敢伐也歸二年乃興師伐紂通鑑前編三十有一祀周西伯發十一年西伯東觀兵勘黎又曰昔者紂為黎之搜則黎乃紂濟惡之國武王觀政于商則戡黎之師或因以警紂耳按武王十一年觀兵戡黎十三年逾孟津伐紂太史公由未見古文尚書故引河內女子僞泰誓之語誤以伐紂之師為觀兵孟津又誤以十一年為九年也淮南說尤誤今遵前編居二年聞紂昏亂暴虐甚殺王子比干囚箕子太師疵少師彊抱其樂器而奔周於是西伯遍告諸侯曰殷有重罪不可以不畢伐此下削乃遵文王語遂率戎車三百乘虎賁三千人此下有甲士四萬五千人率按吕氏春秋選車三百虎賁三千博物志輿三百乘甲三三千書序戎車三百虎賁三千人皆與經豫有臣三千惟一心合且春秋以前師固未有及萬者況武王之弔伐乎削之以從經下文紂兵七千萬人說亦誤以東伐紂史記十有三年春書序惟十有一年武王伐殷一月戊午師渡孟津作泰誓史記因之孔安國書傳虞芮質成為文王受命改元之年凡九年而文王崩武王立二年而觀兵三年而伐紂合為十有三年史記索隱大戴禮云文王十五而生武王則武王少文王十四嵗矣禮記文王九十七而終武王九十三而終按文王崩時武王已八十三矣八十四即位至九十三崩武王即位適滿十年言十三年伐紂者續文王受命年欲明其卒父業故也金縢篇云惟克商二年王有疾按文王受命九年而崩十一年武王服闋觀兵孟津十三年伐紂十五年有疾後四年而崩則武王年九十三矣而太史公以為武王即位年數與尚書違甚疏矣歐陽氏曰古者人君即位必稱元年後世曲學之士說春秋始以改元為重事果重事歟西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元反不改元乃上冒先君之元年並其居喪稱十一年及其滅商而得天下其事大于聽訟逺矣又不改元學者知西伯生不稱王不再改元則詩書所載文武之事粲然明白矣朱子蔡傳並作武王之十三年按書序及史說倍經孔傳索隱違禮今遵朱蔡大㑹于孟津王曰嗟我友邦冡君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母今商王受弗敬上天降灾下民沈湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害於爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勳未集肆豫小子發以爾友邦冡君君觀政于商惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪豫曷敢有越厥志同力度德同德度義受有臣億萬惟億萬心豫有臣三千惟一心商罪貫盈天命誅之豫弗順天厥罪惟鈞豫小子夙夜祇懼受命文考類于上帝宜于冡土以爾有衆底天之罰天矜于民民之所欲天必從之爾尚弼豫一人永清四海時哉弗可失惟戊午王次于河朔羣后以師畢㑹王乃狥師而誓曰嗚呼西土有衆咸聽朕言我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄犂老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢德彰聞惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剝喪元良賊虐諌輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王天其以豫乂民朕夢協朕卜襲于休祥戎商必克受有億兆夷人離心離德豫有亂臣十人同心同德雖有周親不如仁人天視自我民視天聽自我民聽百姓有過在豫一人今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光朂哉夫子罔或無畏寧執非敵百姓凛凛若崩厥角嗚呼乃一德一心立定厥功惟克永世時厥明王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斫朝涉之脛剖賢人之心作威殺戮毒痡四海崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以悅婦人上帝弗順祝降時喪爾其孜孜奉豫一人恭行天罰古人有言曰撫我則后虐我則讐獨夫受洪惟作威乃汝世讐樹德務滋除惡務本肆豫小子誕以爾衆士殄殱乃讐爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良史記十一年十二月戊午師畢渡盟津諸侯咸㑹曰孳孳無怠武王乃作泰誓告于衆庶今殷王紂乃用其婦人之言自絶于天毁壞其三正離逖其王父母弟乃斷棄其先祖之樂乃為淫聲用變亂正聲怡恱婦人故今豫發惟共行天罰勉哉夫子不可再不可三此亦僞泰誓文而髣佛牧誓者吕氏春秋武王使人候殷反報曰殷其亂矣讒慝勝良武王曰未也復往反報曰亂加矣賢者出走矣武王曰未也又往反報曰亂甚矣百姓不敢誹怨矣武曰嘻遽告太公太公對曰讒慝勝良命曰戮賢者出走命曰崩百姓不敢誹怨命曰刑勝其亂至矣不可以加矣故選車三百虎賁三千朝要甲子之期而紂為禽淮南子武王伐紂渡于孟津陽侯之波逆流而擊疾風晦冥人馬不相見於是武王左操黃鉞右秉白旄瞋目而撝之曰余在天下誰敢害吾意者於是風濟而波罷拾遺記武王伐紂夜濟河雲明如晝八百之族皆齊而歌有大蜂狀如丹鳥飛集王舟因畫其旗翼日而梟紂名其船曰蜂舟時甲子昧爽王朝至于商郊牧野乃誓王左杖黃鉞右秉白旄以麾曰逖矣西土之人王曰嗟我友邦冡君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人吕氏春秋武王至殷郊係墮五人御于前莫肯之為曰吾所以事君者非係也武王左釋白羽右釋黃鉞勉而自為係孔子聞之曰此五人者之所以為王者佐也不肖主之所以不安也華陽國志武王伐紂實得巴蜀之師巴蜀勇鋭歌舞以凌殷人倒戈故世稱之曰武王伐紂前歌後舞稱爾戈比爾干立爾矛豫其誓王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄於商邑今豫發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮尚書誓已諸侯兵㑹者車四千乘陳師牧野帝紂聞武王來亦發兵若林距武王武王使師尚父與百夫致師以大卒馳帝紂師紂師雖衆皆無戰心心欲武王亟入紂師皆倒兵以戰以開武王淮南子紂之士億有餘萬然皆倒戈而射旁㦸而戰武王左操黃鉞右執白旄以麾之則瓦解而走鬻子武王伐紂紂虎旅百萬陳于商郊起自黃鳥至于赤斧三軍之靡不失色武王乃命太公把白旄以麾之紂軍反走尚書大傳武王與紂戰于牧之野紂之卒輻分紂之車瓦裂紂之甲魚鱗下賀乎武王論衡武王伐紂太公隂謀食小兒以丹令身純赤長大教言殷亡殷民見之皆謂商滅兵至牧野晨舉脂燭姦謀惑民權掩不備周之所諱也按此與魚帛狐篝無異曽謂太公謀同戌卒乎武王馳之紂兵皆崩畔紂紂走反入登于鹿臺之上䝉衣其珠玉自燔于火而死周書紂取天智玉琰環身厚以自焚五日武王俾人求之天智玉五在火中不銷武王乃揖諸侯諸侯畢從武王至商國商國百姓咸待于郊於是武王使羣臣告語商百姓曰上天降休商人皆再拜稽首武王亦答拜史記又曰武王持太白旗麾諸侯諸侯畢拜武王乃揖諸侯按此本之逸周書氣象不類聖人武王且答商人之拜詎于諸侯驁慢乃爾遂入史記紂之官位舉紂之軀棄之玉門之外民之觀者皆進蹴武王使入帷而守之賈誼新書淮南子紂拘于宣室不反其過而悔不誅文王于羑里周書商師大敗商主奔內登于廩臺之上屏遮而自燔于火武王乃手太白以麾諸侯諸侯畢拜遂揖之商庶百姓咸俟于郊羣賔僉進曰上天降休再拜稽首武王答拜先入適王所乃尅射之三發而後下車擊之以輕吕斬之以黃鉞折懸諸太白適二女之所乃既縊王又射之三發乃又擊之以輕吕斬之以元鉞懸諸小白乃出場于厥軍史記同墨子武王戰乎牧之野王手禽費仲惡來衆畔百走武王入奔入宫萬年梓株折紂而繫之赤環載之白旗以為天下諸侯僇論衡紂赴火死武王就斬以鉞懸其首于大白之旗古今注武王以黃鉞斬紂故王者以為戒太公以元鉞斬妲己故婦人以為戒尸子武王親射惡來之口親斫殷紂之頸手汚于血不溫而食乃出復車其明日除道修社及商紂宫及期百夫荷罕旗以先驅武王弟叔振鐸奉陳常車周公旦把大鉞畢公把小鉞以夾武王散宜生太顛閎夭皆執劍以衛武王既入立于社南大卒之左右畢從毛叔鄭奉明水衛康叔封布兹召公奭贊采師尚父牽牲尹佚莢祝曰殷之末孫季紂殄廢先王明德侮蔑神祗不祀昏暴商邑百姓其章顯聞于天皇上帝於是武王再拜稽首曰膺更大命革殷受天明命武王又再拜稽首乃出周書略同已而命召公釋箕子之囚命畢公釋百姓之囚表商容之閭命南宫適散鹿臺之財發巨橋之粟以振貧弱萌𨽻命南宫括史佚展九鼎保玉命閎夭封比干之墓命宗祝享祠于軍史記同周書周公旦進殷之遺老問殷之亡故民之所欲遺老欲復盤庚之政於是武王復盤庚之政吕氏春秋淮南子封比干之象表商容之閭柴箕子之門朝成湯之廟發巨橋之粟散鹿臺之錢破鼓折枹弛弓絶絃去舍露宿以示平易解劒帶笏以示無仇越絶書武王朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封微子于宋此武王以禮信也說苑上堂見玉曰誰之玉也曰諸侯之玉即取而歸之諸侯天下聞之曰武王廉于財矣入室見女曰誰之女也曰諸侯之女也即取而歸之諸侯天下聞之曰武王廉于色矣於是發巨橋之粟散鹿臺之財以與士民乃罷兵西歸行狩記政事周書記滅殷分俘狩禽事文多不載作武成史記惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商底商之罪告于皇天后土所過名山大川曰惟有道曽孫周王發將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪豫小子既獲仁人敢祇承上帝以遏亂略華夏蠻貊罔不率俾惟爾有神尚克相豫以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發巨橋之粟大賚於四海而萬姓恱服厥四月哉生明王來自商至于豐乃偃武修文歸馬於華山之陽放牛於桃林之野示天下弗服吕氏春秋濟于河西歸報于廟乃稅馬于華山稅牛于桃林馬弗復乘牛弗復服釁鼓旗甲藏之府庫終身不復用既生魄庶邦冡君暨百工受命于周丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集豫小子其承厥志恭天成命肆豫東征綏厥士女惟其士女篚厥𤣥黃昭我周王天休震動用附我大邑周列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治尚書遂率天下諸侯追王太王亶父王季歷文王冒不以卑臨尊也禮記武王大建公侯于天下封黃帝之後于祝唐帝之後于薊虞帝之後胡公媯滿于陳以備三恪封夏后氏之後東婁公于杞封紂子武庚于殷皆為上公是為二王之後禮記武王克殷反商未及下車而封黃帝之後于薊封帝堯之後于祝封帝舜之後于陳下車而封夏后氏之後于杞投殷之後于宋韓詩外傳同吕氏春秋武王入殷未下輿命封黃帝之後于鑄帝堯之後于黎帝舜之後于陳下輿命封夏后之後于杞立成湯之後于宋以奉桑林得神農之後封之于焦封尚父于齊周公于魯召公于燕庶叔髙于畢皆留相周封叔鮮于管叔度于蔡叔處于霍以監殷是為三監以殷餘民封康叔于朝歌號衛封叔振鐸于曹叔武于郕季載于邥封庶弟叔繡于滕叔鄭于毛又封諸叔于郜于雍于原于郇于豐虢仲虢叔為文王卿士仲封于西虢叔封于東虢初泰伯仲雍奔荆楚遂為國自號勾吳泰伯薨仲雍嗣使求其後得仲雍曽孫周章世君吳矣因封之曰吳伯復封章弟為虞仲封少昊之裔兹輿于莒封祝融安期之裔挾于邾封四嶽姜姓文叔于許封仲虺弟雍滑之後于薛兄弟之君十有五人同姓者四十人班宗彞作分器皇王大紀書序武王既勝殷邦諸侯班宗彞作分器篇亡墨子武王使諸侯分其祭曰使親者受內祀疏者受外祀武王問箕子以天道箕子以洪範陳之武王徴九牧之君登豳之阜以望商邑至于周自夜不寐周公旦即王所曰曷為不寐王曰告女維天不饗殷自發未生于今六十年麋鹿在牧周書及隨巢子並作夷羊在牧夷羊怪物也蜚鴻滿野髙誘注蜚鴻蠛蠓言蔽田滿野為灾也隨巢子作飛拾飛拾蟲也正義飛鴻滿野喻忠賢君見放棄也楊慎曰蜚鴻馬名言養無用而害有用也天不享殷乃今有成維天建殷其登名民三百六十夫不顯亦不賔滅索隱言殷登進名賢之人既無非大賢故殷家不大光昭亦不即至賔滅以至今我未定天保何暇寐王曰定天保依天室悉求夫惡貶從殷王受索隱言悉取夫惡人不知天命不順周家者咸貶責之與受同罪日夜勞來我西土我維顯服及德方明自洛汭延于伊汭居易毋固其有夏之居我南望三塗北望嶽鄙顧詹有河粵詹洛伊毋逺天室營周居于雒邑而後去史記西旅獻獒太保作旅獒巢伯來朝芮伯作旅巢命書序下篇亡克殷後二年武王病天下未集羣公懼穆卜周公乃祓齊自為質欲代武王武王有瘳後而崩禮記武王九十三而終紀年武王年五十四括地志墓在雍州萬年縣西南二十八里畢原上太子誦立是為成王史記周人之禮其社用栗祀竈葬樹柏其樂大武三象棘下其服尚赤淮南子楚辭注武王既誅紂令壞邠岐之社徙以為天下太社成王康王成王名誦武王之子也武王崩成王年十有三而嗣立明年夏六月既葬冠成王而朝于祖以見諸侯周公命祝雍作頌曰祝王辭達而勿多也祝雍辭曰使王近于民逺于佞嗇于時惠于財親賢而任能其頌曰令月吉日王始加元服去王幼志服王衮職欽若昊天六合是式率爾祖考永永無極家語同大戴禮周初定天下周公恐諸侯畔周公乃攝行政當國管叔蔡叔羣弟疑周公周公辟居東都居東二年成王啓金縢書反周公越絶書武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加于無功刑罰不加于無罪天下家給人足禾黍茂美使人以時說之以禮上順天地澤及夷狄于是管叔蔡叔不知周公而讒之成王周公乃辭位出巡狩于邉一年天暴風雨樹木盡偃成王大恐乃發金縢之匱察周公之冊知周公有盛德乃迎周公管叔蔡叔與武庚作亂畔周周公奉成王命伐誅武庚管叔放蔡叔以微子開代殷後國于宋史記周書武王克殷立王子祿父俾守商祀建管叔于東蔡叔霍叔于殷俾監殷臣武王崩周公立相天子三叔及殷東徐奄及熊盈以畔周公召公內弭父兄外撫諸侯元年夏六月葬武王于畢二年作師旅臨衛攻殷殷大震潰降辟三叔王子祿父北奔管叔經而卒乃囚蔡叔于郭鄰凡所征熊盈十有七國俘維九邑俘殷獻民遷于九畢俾康叔宇于殷俾中旄父宇于東淮夷徐戎及奄叛王乃大搜于岐陽東伐淮夷帝王世紀遂踐奄作成王政既踐奄遷其君於蒲姑作將蒲姑書序篇二亡周公行政七年成王長周公反政成王成王在豐使召公復營洛邑如武王之意成王自奄歸在宗周作多方既絀殷命襲淮夷歸在豐作周官興正禮樂度制於是改而民和睦頌聲興成王既伐東夷自慎來賀成王賜榮伯作賄息慎之命成王將崩懼太子釗之不任乃命召公畢公率諸侯以相太子而立史記惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗宏濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾兹既受命還出綴衣于庭越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗丁卯命作冊度越七日癸酉伯相命士須材狄設黻扆綴衣牖間南嚮敷重蔑席黼純華玉仍几西序東向敷重底席綴純文貝仍几東序西向敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几越玉五重陳寶赤刀大訓宏璧琬琰在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖鼓在西房兑之戈和之弓垂之竹矢在東房大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前一人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王冊命曰皇后慿玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三咤上宗曰饗太保受同降盥以異同秉璋以酢受宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜太保降收諸侯出廟門俟王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我高祖寡命王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞羣公既皆聽命相揖趨出王釋冕反喪服尚書成康之際天下安寧刑錯四十餘年不用紀年十六年王南巡狩至九江廬山康王命作䇿畢公分居里成周郊作畢命後漢書康王晚朝關睢作諷又曰昔周王承文王之盛一朝晏起夫人不鳴璜宫門不擊柝關雎之人見幾而作韓詩大人內傾于色賢人見其萌詠關雎以刺時史記周道缺詩人本之衽席關雎作揚子周康之時頌聲作乎下關雎作乎上習治也習治則傷始亂也列女傳康王晏出朝關睢預見康王崩子昭王瑕立康王在位二十六年史記昭王穆王共王懿王孝王夷王厲王昭王名瑕康王之子也康王崩昭王立昭王德衰南征濟于漢船人惡之以膠船進王王御船至中流膠液船解王沒于水中而崩周人諱之帝王世紀吕氏春秋昭王征荆辛餘靡為王右逺反涉漢梁敗王及祭公擅于漢中辛餘靡振王又反振蔡公紀年昭王十六年伐楚涉漢遇大兕楚辭注昭王背成王之制而出遊南至于楚楚人沈之而遂不還刀劍録昭王在位五十一年立昭王子滿是為穆王穆王即位春秋已五十矣王道衰微史記紀年自武王至穆王享國百年穆王以下都于南鄭穆王命君牙為大司徒作君牙命伯冏為太僕正作冏命書序穆王西巡狩見西王母樂之忘歸而徐偃王反穆王攻徐偃王大破之列子周穆王時西極之國有化人來穆王敬之若神事之若君為之築臺其高千仞臨終南之上號曰中天之臺簡鄭衛處子娥媌靡曼者以滿之奏承雲六英九韶晨雲以樂之化人猶不舍然居亡幾何謁王同遊王執化人之袪騰而上者中天乃止暨及化人之宫出雲雨之上所觀聽納嘗皆非人間之有實以為清都紫微鈞天廣樂化人復謁王同逰所及之處仰不見日月俯不見河海光影所照百骸六藏悸而不凝既寤化人曰吾與王神逰也王大說不恤國事肆意逺遊駕八駿之乘遂宿于崑崙之阿赤水之陽别日升崑崙之邱觀黃帝之宫而封之遂賔于西王母觴于瑤池之上乃觀日之所入一日行萬里紀年穆王十三年西征于青鳥之所憩十七年西征崑崙邱見西王母其年西王母來見賔于昭宫又曰穆王西征還里天下億有九萬里又曰穆王北征行積羽千里歸藏昔穆王筮西征不吉曰龍降于天而道里修逺飛而冲天蒼其羽穆王將征犬戎祭公謀父諫曰先王耀德不觀兵不聽遂征之得四白狼四白鹿以歸自是荒服者不至列子穆王大征西戎西戎獻錕鋙之劒火浣之布劔長尺有咫切玉如切泥布浣之必投于火出火而振之皓然疑乎雪十洲記穆王時西胡獻昆吾割玉刀夜光常滿杯刀長一尺杯受三升刀切玉如切泥杯光明夜照夕出杯于庭比明水滿杯中紀年穆王三十七年大起九師東至于九江駕黿鼉以為梁遂伐越至于紆荆人來貢抱朴子穆王南征一軍盡化君子為猿為鶴小人為沙為蟲古文周書穆王田有黑鳥若鳩翩然而跱于衡御者斃之以䇿馬佚不克止之躓于乘傷帝左股述異記穆王時天下連雨三月王乃吹笛雨遂止按羣說及穆天子傳皆詭僻不經姑録數端以廣異聞諸侯有不睦者甫侯言於王作修刑辟命曰甫刑周書穆王時思保位為難恐貽世羞欲自警寤作史記維正月王在成周昧爽召三公左史戎夫曰今朕寤遂事驚豫乃取遂事之要戒戎夫言之朔望必以聞信不行義不立則哲士陵君政禁而生亂皮氏以亡諂諛日近方正日逺則邪人専國政禁而生亂華氏以亡好貨財珍怪則邪人因財而進賢良日蔽而逺賞罰無位隨財而行夏后以亡嚴兵而不仁者其臣懾而不敢忠民不親其吏刑始于親逺者寒心殷商以亡樂専于君者權専于臣刑専于民君娛于樂臣爭于權民盡于刑有虞氏以亡奉孤以専命者謀主必畏其威而疑其前事挾德而責數日疏位均而爭平林以亡大臣有錮職譁誅者危昔者質沙三卿朝而無禮君怒而久拘之譁而弗加諸卿謀變質沙以亡外內相間下撓其民民無所附三苗以亡弱小在强大之間存亡將由之則無天命矣不知命者死有夏之方興也扈氏弱而不恭身死國亡嬖子兩重者亡昔義渠氏有兩子異母皆重君病大臣分黨而爭義渠以亡功大不賞者危昔平州之功大而不賞諂臣日賞貴功日怒而生變平州之君以走出召逺不親者危昔有林氏召離或之君而朝之至而不禮留而弗親離戎逃而去之林氏誅之天下叛林氏昔曲集之君伐智而専事强力而下賊其臣賢良皆伏愈州氏伐之君孤而無使曲集以亡昔有巢氏有亂臣而貴任之以國假之以權君已而奪之臣怒而生變有巢以亡斧小不勝柯者亡昔有鄶之君嗇儉減爵損祿羣臣卑讓後君少弱禁伐不行重氏伐之鄶君以亡久空重位者危昔有共工自賢自以無臣久空大官下官交亂民無所附唐氏伐之共工以亡犯難爭攘疑者昔有林氏上衡氏爭權林氏再戰弗勝上衡氏僞義弗尅俱身死國亡知能均而不親並重事君者危昔有南氏有二臣貴寵力均勢敵競進爭權下爭朋黨君弗禁南氏以分昔有果氏好以新易故故者疾怨內爭朋黨隂事外權有果氏以亡爵重祿輕比已不成者亡昔畢程氏損祿增爵羣臣貌匱比而戾民畢程氏以亡好變故易常者亡昔陽氏之君自伐而好變事無故業官無定位民運于下陽氏以亡業刑而愎者危昔榖平之君愎類無親破國弗尅業刑用國外國相援榖平以亡武不止者亡昔版泉氏用兵無已并兼無親文無所立智士寒心徙居至于獨鹿諸侯叛之版泉以亡佷而無親者亡昔縣宗之君佷而無聽執事不從宗職者疑發大事羣臣解體國無立功縣宗以亡昔者𤣥都賢鬼道廢人事天謀臣不用龜䇿是從神巫用國哲士在外𤣥都以亡文武不行者亡西夏性仁非兵城郭不修武士無位惠而好賞屈而無以賞唐氏伐之西夏以亡美女破國昔有續陽强力四征重邱遺之美女續陽之君說之熒惑不治大臣爭權逺近不相聽國分為二宫室破國昔有洛氏宫室無常池囿廣大工巧日進以後更前農失其時飢饉無食成湯伐之有洛以亡又曰王化雖弛天命方永四夷八蠻攸遵王政作職方即周官職方氏文不復載穆王立五十五年崩子共王繄扈立世本作伊扈共王滅密事見後傳帝王世紀共王能庇昭穆之闕故春秋稱之共王崩子懿王囏立紀年懿王名堅元年天再旦于鄭懿王之時王室遂衰詩人作刺史記漢書懿王時戎狄交侵暴虐中國詩人始作疾而歌之曰靡室靡家獫允之故沈約曰懿王之世興居無節號令不時挈壺氏不能共其職諸侯于是携德懿王徙都槐里即廢邱大紀懿王崩共王弟辟方立是為孝王紀年孝王七年厲王生孝王召非子使主馬于汧渭之間馬大蕃息於是分土為附庸邑之秦孝王崩諸侯復立懿王太子燮是為夷王史記王始下堂而見諸侯禮記紀年夷王二年蜀人吕人來獻瓊玉賔于河用介圭六年王獵于杜林獲犀牛一以歸七年虢公帥師伐太原之戎至于俞泉獲馬千匹八年王有疾諸侯祈于山川王陟夷王十六年崩子厲王胡立帝王世紀芮伯稽古作訓納王于善作芮良夫文具芮良夫傳周書厲王即位三十年好利近榮夷公芮良夫諌不聽卒以榮公為卿士用事王行暴虐侈傲國人謗王召公諌王曰民不堪命矣王怒得衛巫使監謗者以告則殺之其謗鮮矣諸侯不朝三十四年王益嚴國人莫敢言道路以目厲王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚于防水若壅其口其與能幾何王不聽于是國莫敢出言三年乃相與畔襲厲王厲王出奔于彘厲王太子靜匿召公之家國人聞之乃圍之召公乃以其子代王太子太子竟得脫召公周公二相行政號曰共和韋昭注彘之亂公卿相與和而修政事號曰共和竹書紀年共伯干王位沈約注大旱既久廬舍俱焚㑹汾王崩卜于太陽兆曰厲王為祟周公召公乃立太子靖共和遂歸國和有至德尊之不喜廢之不怒逍遙得志于共山之首魯連子共伯名和好行仁義諸侯賢之周厲王無道國人作難王奔于彘諸侯奉和以行天子事號曰共和十四年厲王死共伯使諸侯奉王子靖為宣王而共伯復歸于衛吕氏春秋共伯修其行好賢仁而海內皆以來為稽矣周厲之難天子曠紀而天下皆來請矣十四年厲王死于彘太子靜長于召公家二相乃共立之是為宣王史記宣王幽王宣王名靜靜本作靖厲王之子也厲王死于彘宣王即位周公召公二相輔之修政法文武成康之遺風諸侯復宗周史記宣王北伐玁狁南征蠻荆命召公平淮夷漢書宣王興師命將詩人美大其功曰薄伐玁狁至于太原出車彭彭城彼朔方四夷賔服稱為中興內修政事外攘夷狄復文武之竟土修車馬備器械復㑹諸侯于東都詩序六年旱通鑑前編王遇烖而懼側身修行以銷去之詩序十二年魯武公來朝史記王不籍于千畝虢文公諌曰不可民之大事在農王不聽三十九年通鑑前編在四十年戰于千畝王師敗績于姜氏之戎韋昭注西夷别種四嶽之後後漢書王伐條戎奔戎王師敗績後二年晉人敗北戎于汾隰戎人滅姜侯之邑明年王征申戎破之史記千畝戰奄父脫宣王王既亡南國之師乃料民于太原仲山甫諫曰民不可料也王不聽卒料民國語四十六年宣王崩史記周春秋宣王殺杜伯而無罪宣王㑹諸侯田于圃日中杜伯起于道左射宣王中心折脊而死國語杜伯射王于鄗是也宣王承厲王之烈內有撥亂之志萬民離散不安其居王勞來還定安集之至于矜寡無不得其所天下復平王建國諸侯任賢使能周室中興詩序為周世宗通鑑前編宣王崩子幽王宫涅立幽王三年史記作二年西周三川皆震伯陽父曰周將亡矣山崩川竭亡國之徴也川竭必山崩若國亡不過十年數之紀矣是嵗也三川竭岐山崩國語幽王嬖愛褒姒褒姒生子伯服幽王欲廢太子太子母申侯女而為后後幽王得褒姒愛之竟廢申后并去太子宜臼以褒姒為后以伯服為太子史記年通鑑前編在五綱目在九年古文瑣語幽王將殺太子宜臼立伯服釋虎將執之宜臼叱之虎弭耳而伏六年冬十月朔日有食之通鑑前編詩序十月之交大夫刺幽王也魯詩十月之交言厲王無道內寵熾盛政化失理故致灾異王不親九族而好讒佞骨肉相怨暴虐無親刑罰不中諸侯皆不欲朝政煩賦重田萊多荒飢饉降喪民卒流亡祭祀不享在位貪殘下國搆禍怨亂並興戎狄叛之荆舒不至乃命將率東征東國困于役而傷于財談大夫作大東以告病焉詩序後漢書王命伯士伐六濟之戎軍敗伯士死焉王之廢申后去太子也申侯怒十一年與繒西夷犬戎攻王遂殺幽王驪山下虜褒姒盡取周賂而去諸侯乃即申侯共立故幽王太子宜臼是為平王以奉周祀史記紀年自武王滅殷以至幽王凡二百五十七年贊曰周之陵夷兆于穆歸于厲逮彘之流微共和周道不且如斬哉宣王承厲乘幽龍德不純卒淪西土姤始剝終理運自然乃君子自强又不得諉之于天已尚史卷五
