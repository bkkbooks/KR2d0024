body:
  text: 尚史卷七十九列傳五十七鑲白旗漢軍李鍇撰説客傳張儀張儀魏人也始嘗與蘇秦俱事鬼谷先生學術蘇秦自以不及張儀張儀已學而遊説諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盜相君之璧共執張儀掠笞數百不服醳之其妻曰嘻子毋讀書遊説安得此辱乎張儀曰視吾舌尚在不其妻笑曰舌在也儀曰足矣蘇秦已説趙王而得相約從親然恐秦之攻諸侯敗約後負念莫可使用于秦者乃使人微感張儀曰子始與蘇秦善今秦已當路子何不往遊以求通子之願張儀于是之趙上謁求見蘇秦蘇秦乃誡門下人不為通又使不得去者數日已而見之坐之堂下賜僕妾之食因而數讓之曰以子之材能乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之張儀之來也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舍人曰張儀天下賢士吾殆弗如也今吾幸先用而能用秦柄者獨張儀可耳然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我隂奉之乃言趙王發金幣車馬使人微隨張儀與同宿舍稍稍近就之奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人乃辭去張儀曰賴子得顯方且報德何故去也舍人曰臣非知君知君乃蘇君蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣隂奉給君資盡蘇君之計謀今君已用請歸報張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言且蘇君在儀寧渠能乎張儀既相秦為文檄告楚相曰始吾從若飲我不盜而璧若笞我若善守汝國我顧且盜而城史記楚攻魏張儀謂秦王曰不如與魏以徑之與猶助魏戰勝復聽于秦必入西河之外不勝魏不能守王必取之王用儀言取皮氏卒萬人車百乘以與魏犀首戰勝威王魏兵罷敝恐畏秦果獻西河之外國䇿惠王使公子華與張儀圍蒲陽降之儀因言秦復與魏而使公子繇質于魏儀説魏王曰秦王之遇魏甚厚魏不可以無禮魏因入上郡少梁謝惠王惠王乃以張儀為相更名少梁曰夏陽儀相秦四嵗立惠王為王居一嵗為秦將取陜築上郡塞史記楚許魏六城與之伐齊而存燕張儀欲敗之謂魏王曰齊畏三國之合也必反燕地以下楚楚必聽之而不與魏六城是王失謀于楚而樹怨于齊秦也齊遂伐趙取乘邱收侵地虛頓邱危楚破南陽九夷內沛許鄢陵危王之所得者親觀也而道塗宋衛為制事敗為趙驅敗謂楚不與城齊將伐趙魏必奔走援之事成功縣宋衛成謂楚與之地然受地必由宋衛輕重繫之魏王弗聽也張儀告公仲韓相令以飢故賞韓王以近河外賞猶勸也時韓飢因勸之就粟河外河外近魏故魏恐魏王懼問張儀儀曰秦欲救齊韓欲攻南陽秦韓合而欲攻南陽無異也無異言無他也且以遇卜王王不遇秦韓之卜也決矣遇則講信修睦魏不與秦遇韓知其見惡必合秦而攻魏魏王遂尚遇秦信韓廣魏救趙斥楚人遽于革下革下地缺遽傳也楚乘傳來許地魏斥之也伐齊之事遂敗國䇿惠王使與齊楚之相會齧桑東還而免相相魏以為秦國䇿張儀以秦相魏齊楚怒而欲攻魏雍沮謂張子曰魏之所以相公者以公相則國家安而百姓無患今公相而魏受兵是魏計過也齊楚攻魏公必危矣張子曰然則奈何曰請令齊楚解攻雍沮謂齊楚之君曰王亦聞張儀之約秦王乎曰王若相儀于魏齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得魏矣若不勝魏必事秦以持其國必割地以賄王若欲復攻其弊不足以應秦此儀之所以與秦王隂相結也今儀相魏而攻之是使儀之計當于秦非所以窮儀之道也齊楚之王曰善乃解攻欲令魏先事秦而諸侯效之魏王不肯聽儀秦王怒伐取魏之曲沃平周復隂厚張儀益甚張儀慙無以歸報留魏四嵗而魏襄王卒哀王即位張儀説哀王哀王不聽于是張儀隂令秦伐魏魏與秦戰敗明年齊又來敗魏于觀津秦復欲攻魏先取韓申差軍斬首八萬諸侯震恐史記于是張儀為秦連橫説魏王曰魏地方不至千里卒不過三十萬地四平諸侯四通條逹輻湊無名山大川之限從鄭至梁二百餘里馬馳人趨不待倦而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭障者不下十萬魏之地勢故戰場也魏南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合於韓則韓攻其西不親于楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者將以安社稷尊主強兵顯名也合從者一天下約為兄弟刑白馬以盟洹水之上以相堅也夫親昆弟同父母尚有爭錢財而欲恃詐偽反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外拔卷衍燕酸棗劫衛取晉陽則趙不南趙不南則魏不北魏不北則從道絶大王之國欲求無危不可得也秦挾韓而攻魏韓劫于秦不敢不聽秦韓為一魏之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣且夫秦之所欲弱莫如楚而能弱楚者莫若魏楚雖有富大之名其實空虛其卒雖多然而輕走易北不敢堅戰悉魏之兵南面而伐楚勝之必矣夫虧楚而益魏攻楚而適秦嫁禍安國此善事也大王不聽臣秦甲兵而東伐雖欲事秦不可得矣且夫從人多奮辭而寡可信説一諸侯而成封侯是故天下之遊士莫不日夜扼腕瞋目切齒以言之便以説人主人主覽其辭牽其説惡得無眩哉臣聞之積羽沈舟羣輕折軸衆口鑠金故願大王之熟計之也哀王于是乃倍從約而因儀請成于秦張儀復歸相秦三嵗而魏復背秦為從秦攻魏取曲沃明年魏復事秦秦欲伐齊齊楚之交善惠王患之張儀曰王其為臣約車并幣臣請試之張儀南見楚王也敝邑之王所甚説者無大大王唯儀之所甚願為臣者亦無大大王敝邑之王所甚憎者無大齊王唯儀之所甚憎者亦無大齊王今齊王之罪于敝邑甚厚敝邑欲伐之而大國與之歡是以敝邑之王不得事令而儀不得為臣也大王茍能閉關絶齊臣請使秦王獻商於之地方六百里若此齊必弱是北弱齊西德于秦而私商於之地以為利此一計而三利俱至楚王大説宣言于朝曰不榖得商於之地方六百里羣臣畢賀陳軫獨不賀楚王曰不榖不煩一兵不傷一人而得商於之地六百里寡人自以為智矣諸大夫皆賀子獨不賀何也陳軫對曰臣見商於之地不可得而患必至也王曰何也對曰夫秦所以重王者以王有齊也今地未得而齊先絶是楚孤也秦又何重孤國且先出地絶齊秦計弗為先絶齊後責地必受欺于張儀受欺于張儀王必惋之是西生秦患北絶齊交則兩國兵必至矣楚王曰吾事善矣子其無言以待吾事楚王使人絶齊使者未來又重絶之張儀反秦使人使齊齊秦之交隂合楚因使一將軍受地于秦張儀至稱病不朝楚王曰張子以寡人不絶齊乎乃使勇士往詈齊王張儀知楚絶齊也乃出見使者曰從某至某廣從六里使者曰臣聞六百里不聞六里反報楚王楚王大怒欲興師伐秦陳軫曰臣可以言乎伐秦非計也王不如賂之一名都與之伐齊是我亡于秦而取償于齊也楚國不尚全事今已絶齊而責欺于秦是合齊秦之交也國必大傷楚王不聽遂舉兵伐秦秦與齊合韓氏從之楚兵大敗于杜陵國䇿殺屈丐遂取丹陽漢中之地楚又復益發兵襲秦至藍田大戰楚大敗于是楚割兩城以與秦平秦要楚欲得黔中地欲以武關外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言張儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心于子張儀曰秦強楚弱臣善靳尚尚得事楚夫人鄭褎褎所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚史記楚王拘張儀將欲殺之靳尚為儀謂楚王曰拘張儀秦王必怒天下見楚之無秦也楚必輕矣又謂夫人鄭褎曰子亦自知且賤于王乎鄭褎曰何也尚曰張儀者秦王之有功臣也秦王欲出之秦王有愛女而美又簡宫中佳麗習音者從之資之金玉寶器奉以上庸六縣為湯沐邑欲因張儀內之楚王惑于虞樂必厚親愛之子益賤而日疏矣子何不急言王出張子張子得出德子無巳時秦女不來而秦必重子子內擅楚之貴外結秦之交畜張子以為用子之子孫必為楚太子矣鄭褎遽説楚王出張儀按此下國䇿又曰楚王將出張儀恐其敗已也靳尚謂楚王曰臣請隨之儀事王不善臣請殺之楚小臣靳尚之仇也謂魏用事者張旄曰以張儀之智而有秦楚之用君必窮矣君不如使人微要靳尚而殺之楚王必大怒儀儀窮則子重矣楚秦相難則魏無患矣張旄果令人要靳尚刺之楚王大怒秦楚搆兵而戰秦楚爭事魏張旄果大重按張儀既出遂説諸侯連橫以事秦儀未歸而惠王卒諸侯復畔橫合從無秦楚搆兵事國䇿張儀之楚貧舍人怒而欲歸張儀曰待我為子見楚王當是時南后鄭褎貴于楚張儀見楚王楚王不説儀曰王無所用臣臣請北見晉君楚王曰諾儀曰王無求于晉國乎王曰黃金珠畿犀象出于楚寡人無求于晉國儀曰王徒不好色耳彼鄭周之女粉白墨黑立于衢間非知而見之者以為神楚王曰楚僻陋之國未嘗見中國之女如此其美也寡人見之獨何為不好色也乃資之以珠玉南后鄭褎聞之大恐令人謂儀曰妾聞將軍之晉國偶有金千斤進之左右以供芻秣鄭褎亦以金五百斤儀辭楚王曰天下門關不通未知見日也願王賜之觴王觴之儀中飲再拜而詩曰非有它人于此也願王召所便習而觴之王召南后鄭褎儀再拜而請曰儀有死罪于大王王曰何也曰儀行天下遍矣未嘗見人如此其美而儀言得美人是欺王也王曰子釋之吾固以為天下莫若是兩人也按儀自辱于楚相未嘗至楚相秦之後事勢不類又其謀鄙甚蓋亦䇿士虛辭也張儀為秦破從連橫説楚王曰秦地半天下兵敵四國被山帶河以為固虎賁之士百餘萬車千乘騎萬匹粟如邱山法令既明士卒安難樂死主嚴以明將智以武雖無出甲席卷常山之險必折天下之脊天下後服者先亡且夫為從者無以異于驅羣羊而攻猛虎虎之與羊不格明矣今王不與猛虎而與羣羊臣竊以為大王計過矣凡天下強國非秦而楚非楚而秦兩國交爭其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下河東取成臯韓必入臣韓入臣魏則從風而動秦攻楚之西韓魏攻其北社稷豈得無危哉且夫從者聚羣弱而攻至強不料敵而輕戰國貧而驟舉兵危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久夫從人飾辨虛辭髙主之節言其利不言其害卒有秦禍無及為已是故願大王之熟計也秦西有巴蜀方船積粟起于汶山循江而下至郢三千餘里舫船載卒一舫載五千人與三月之糧下水而浮一日行三百餘里里數雖多不費汗馬之勞不至十日而距扞關扞關驚則從竟陵以東盡城守矣黔中巫郡非王之有已秦舉甲出武關南面而攻則北地絶秦兵之攻楚也危難在三月之內而楚恃諸侯之救在半嵗之外此其勢不相及也夫恃弱國之救忘強秦之禍此臣所以為大王患也且大王嘗與吳人戰五戰三勝陳卒盡矣遍守新城居民苦矣臣聞之功大者易危民敝者怨上夫守易危之功而逆強秦之心臣竊為大王危之且夫秦之所以不出甲函谷十五年以攻諸侯者隂謀有吞天下之心也楚嘗與秦搆難戰于漢中楚人不勝通侯執圭死者七十餘人遂亡漢中楚王大怒與秦戰于藍田又却此所謂兩虎相摶者也夫秦楚相敝而韓魏以全制其後計無危于此者矣願大王熟計之也秦下甲攻衛陽晉必關扃天下之胸大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有已凡天下所信約從親堅者蘇秦封為武安君而相燕即隂與燕王謀破齊分其地乃佯有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦于市夫以一詐偽反覆之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請秦太子入質于楚楚太子入質于秦請以秦女為大王箕帚之妾效萬家之都以為湯沐之邑長為昆弟之國終身無相攻擊臣以為計無便于此者楚王曰上客幸教以明制寡人敬以國從張儀去楚因遂之韓説韓王曰韓地險惡山居五榖所生非麥而豆民之所食大抵豆飯藿羮一嵗不收民不饜糟粳地不滿九百里無二嵗之食料大王之卒悉之不過三十萬而厮徒負養在其中矣除守徼亭障塞見卒不過二十萬而已秦帶甲百餘萬車千乘騎萬匹虎鷙之士跿跔科頭貫頤奮戟者至不可勝計秦馬之良戎兵之衆探前蹶後蹄間三尋言馬走之疾前後蹄間一擲而過三尋也不可勝數也山東之卒被甲冒胄以會戰秦人捐甲徒裎以趨敵左挈人頭右挾生虜夫秦卒與山東之卒猶孟賁之于怯夫以重力相壓猶烏獲之與嬰兒夫戰孟賁烏獲之士以攻不服之弱國無異于墮千鈞之重于鳥卵之上必無幸矣諸侯不料兵之弱食之寡而聽從人之甘言好辭比周以相飾也皆言曰聽吾計可以強霸天下夫不顧社稷之長利而聽須臾之説詿誤人主無過此者大王不事秦秦下甲據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫桑林之苑非王之有已夫塞成臯絶上地則王之國分矣先事秦則安不事秦則危夫造禍而求福計淺而怨深逆秦而順楚雖欲無亡不可得也故為大王計莫如事秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能強于楚也其地勢然也今王西面而事秦以攻楚秦王必喜夫攻楚而私其地轉禍而説秦計無便于此者韓王曰客幸教之請效宜陽張儀歸報秦王封儀五邑號曰武信君使張儀東説齊王曰天下強國無過齊者大臣父兄殷衆富樂然而為大王計者皆為一時之説不顧萬世之利從人説大王者必謂齊西有強趙南有韓魏齊負海之國也地廣人衆兵強士勇雖有百秦將無奈何大王覽其説而不察其實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有勝名而有亡之實是何也齊大而魯小也今趙之與秦也猶齊之與魯也秦趙戰于河漳之上再戰而再勝秦戰于番吾之下再戰又勝秦四戰之後趙亡卒四十萬邯鄲僅存雖有勝秦之名而國破矣是何也秦強而趙弱也今秦楚嫁子取婦為昆弟之國韓獻宜陽魏效河外趙入朝黽池割河間以事秦大王不事秦秦驅韓魏攻齊之南地悉趙兵涉河關指博關臨災即墨非王之有己國一日被攻雖欲事秦不可得也是故願大王熟計之齊王曰齊僻陋隱居東海之上未嘗聞社稷之長利今大客幸而教之請奉社稷以事秦獻魚鹽之地三百里張儀去西説趙王曰大王收率天下以賔秦秦兵不敢出函谷關十五年大王之威行于山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之內愁居懾處不敢動搖唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎白馬之津秦雖僻逺然而心忿含怒之日久矣今秦有敝甲凋兵軍于黽池願渡河踰漳據番吾會邯鄲之下願以甲子合戰以正殷紂之事敬使使臣先聞左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反齊國而自令車裂于市夫天下之不可一亦明矣令楚與秦為昆弟之國而韓魏稱東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬬失其黨而孤居求欲毋危豈可得乎今秦發三將軍其一軍塞于道告齊使興師渡清河軍于邯鄲之東一軍軍成臯驅韓魏軍于河外一軍軍黽池約四國為一以攻趙趙服必四分其地是故不敢匿意隱情先以聞于左右臣竊為大王計莫如與秦王遇于黽池面相見而口相結請案兵無攻願大王之定計趙王曰先王之時奉陽君専權擅勢蔽欺先王獨擅綰事先王棄羣臣寡人年幼奉祀之日新乃且願變心易慮割地謝前過以事秦説趙事趙䇿獨無今采史記入之趙王許張儀張儀乃去北之燕説燕昭王曰大王之所親莫如趙昔趙主以其姊為代王妻欲并代與代王遇于勾注之塞乃令工人作為金斗長其尾令可以擊人與代王飲而隂告厨人曰即酒酣樂進熱啜反斗以擊之于是酒酣樂進熱啜厨人進斟羮因反斗而擊代王殺之王腦塗地其姊聞之摩笄以自刺故至今有摩笄之山天下莫不聞夫趙王之狼戾無親大王之所明見也且以趙王為可親邪趙興兵而攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝黽池效河間以事秦大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非王之有已且今時趙之于秦猶郡縣也不敢妄興師以征伐今大王事秦秦王必喜趙不敢妄動是西有強秦之援而南無齊趙之患是故願大王熟計之也燕王曰蠻夷僻處雖大男子裁如嬰兒言不足以求正謀不足以決事今上客幸而教之請西面事秦獻常山之尾五城國䇿張儀歸報未至咸陽而秦惠王卒武王即位武王自為太子時不説張儀及即位羣臣多讒張儀曰無信左右賣國以求容秦必復用之恐為天下笑諸侯聞張儀有郤武王皆畔橫復合從史記武王元年左右惡張儀未已而齊讓又至張儀謂武王曰儀有愚計願效之王王曰奈何曰為秦社稷計者東方有大變然後王可以多割地今齊王甚憎儀儀之所在必舉兵伐之故儀願乞不肖身而之梁齊必舉兵伐之齊梁之兵連于城下不能相去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍此王業也王曰善乃具革車三十乘納之梁國䇿又曰鄭強欲走張儀于秦曰儀之使者必之楚故謂楚太宰曰公留儀之使者強請西圖儀于秦因西請秦王曰張儀使人致上庸之地故使使臣再拜謁秦王怒張儀走齊果舉兵伐之梁王大恐張儀曰王勿患請令罷齊兵乃使其舍人馮喜之楚藉使之齊齊楚之事已畢因謂齊王王甚憎張儀雖然厚矣王之託儀于秦也齊王曰寡人甚憎張儀儀之所在必舉兵伐之何以託儀也對曰是乃王之託儀也儀之出秦與秦王約曰為王計者東方有大變然後王可以多割地今齊王甚憎儀儀之所在必舉兵伐之故儀願乞不肖身之梁齊必舉兵伐梁梁齊之兵連于城下不能去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍是王業也秦王以為然與革車三十乘而納儀于梁今果伐之是王內自罷而伐與國廣鄰敵以自臨而信儀于秦王也此臣之所謂託儀也齊王曰善乃止後公孫衍以梁與齊戰于承匡而不勝張儀謂梁王曰不用臣言以危國梁王因相儀儀將以秦梁之齊合橫親公孫衍欲敗之謂衛君曰衍非有怨于儀值所以為國者不同耳君必解衍衛君為告儀儀許諾因與之參坐于衛君之前公孫衍跪行為儀千秋之祝明日張儀行衍送之至于齊疆齊王聞之怒曰衍也吾讐而儀與之俱是必與儀鬻吾國矣遂不聽儀國䇿又曰周最善齊翟強善楚二子者欲傷張儀于魏張儀聞之曰使其人為見者嗇夫間見者因無敢傷張儀儀相魏一嵗卒于魏國䇿年表張儀以安王十年卒紀年梁哀王九年五月卒論曰張儀魏人也柄秦之日誑楚讐齊以扇諸侯其私則右夫魏以為之用是故新王示隙儀不之魏其不為商鞅之續者幾希尚史卷七十九
