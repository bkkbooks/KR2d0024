body:
  text: 尚史卷四十八列傳二十六鑲白旗漢軍李鍇撰晉嬖臣傳梁五東關五梁五東關五者並獻公之嬖大夫也驪姬生奚齊其娣生卓子驪姬欲立其子賂梁五與東關五使言于公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆場無主則啓戎心戎之生心民慢其政國之患也若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫于晉為都晉之啓土不亦宜乎公説十一年莊一十八年夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦左傳優施僕人贊附優施者獻公之優施其名也施通于驪姬驪姬問焉曰吾欲作大事而難三公子之徒如何對曰蚤處之使知其極鮮有慢心雖其慢乃易殘也言蚤定申生使自知其位所極至自知其極則戒懼不敢違慢有官任而違慢乃易殘毁驪姬曰吾欲為難安始而可施曰必于申生其為人也小心精潔而大志重大年長重惇重也又不忍人精潔易辱重僨可疾不忍人必自忍也辱之近行辱之以不義之行驪姬曰重無乃難遷乎施曰知辱可辱可辱遷重言知辱者雖重必移若不知辱亦必不知固秉常矣言不知辱則固執常謀因以罪加之今子內固而外寵且善不無不信若外單善而內辱之外盡善意待大子而內以不義加辱之無不遷矣且吾聞之甚精必愚精而易辱愚不知避難雖欲無遷其得之乎是故先施讒于申生施教驪姬夜半而泣曰吾聞申生甚好仁而強甚寬惠而慈于民皆有所行之今謂君惑于我必亂國夫無乃以國故而行強于君君未終命而不沒君其若之何盍殺我無以一妾亂百姓公曰夫豈惠其民而不惠于其父乎驪姫曰妾亦懼矣吾聞之外人之言曰為仁與為國不同為仁者愛親之謂仁為國者利國之謂仁故長民者無親衆以為親茍衆利而百姓和豈能憚君以衆故不敢愛親衆况厚之况益也彼將惡始而美終以晚蓋者也凡民利是生殺君而厚利衆衆孰沮之殺親無惡于人人孰去之茍交利而得寵志行而衆説欲其甚矣孰不惑焉雖欲愛君惑不釋也今夫以君為紂若紂有良子而先喪紂無章其惡而厚其敗鈞之死也無必假手于武王而其世不廢祀至于今吾豈知紂之善不哉君欲勿恤其可乎若夫難至而恤之其何及矣公懼曰若何而可驪姬曰君盍老而授之政彼得政而行其欲得其所索乃其釋君且君其圖之自桓叔以來孰能愛親唯無親故能兼翼公曰不可與政我以武與威是以臨諸侯未沒而亡政不可謂武有子而不勝不可謂威我授之政諸侯必絶能絶于我必能害我失政而害國不可忍也爾勿憂吾將圖之驪姬曰以臯落翟之朝夕苛我邉鄙使無日以牧田野君之倉廩固不實又恐削封疆君盍使之伐翟以觀其果于衆也與衆之信輯睦焉若不勝翟雖濟其罪可也若勝翟則善用衆矣求必益廣乃可厚圖也且夫勝翟諸侯驚懼吾邉鄙不警倉廩盈四鄰服封疆信君得其賴又知可不其利多矣君其圖之公説是故申生伐東山衣之偏裻之衣裻在中左右異故曰偏佩之金玦僕人贊大子僕聞之曰殆哉君賜之奇奇生怪怪生無常無常不立使之出征先以觀之故告之以離心而示之以堅忍之權則必惡其心而害其身矣惡其心必內險之害其身必外危之危自中起難哉且是衣也狂夫阻之衣也狂夫方相氏之士也阻古詛字周禮方相氏黃金四目玄衣朱裳執戈揚盾以驅疫其言曰盡敵而反雖盡敵其若內讒何左傳作先友先丹木之言今兩存之及勝翟而反處五年驪姬謂公曰吾聞申生之謀愈深日吾固告君曰得衆衆弗利焉能勝翟今矜翟之善其志益廣狐突不順故不出韋注謂大子不順愚謂不順大子之所為故杜門不出吾聞之申生甚好信而強又失言于衆矣謂詐衆以取國雖欲有退衆將責焉言不可食衆不可弭是以深謀君若不圖難將至矣公曰吾不忘也抑未有以致罪焉驪姬告施曰君既許我殺大子而立奚齊矣吾難里克奈何施曰吾來里克一日而已子為我具特羊之饗吾以從之飲酒我優也言無郵過也驪姬許諾乃具使施飲里克酒中飲施起舞謂克妻曰主孟大夫之妻亦稱主孟妻字啖我我教兹暇豫事君乃歌曰暇豫之吾吾吾讀如魚吾吾不敦自親之貌不如鳥烏人皆集于苑苑音鬱茂木貌已獨集于枯里克笑曰何謂苑何謂枯施曰其母為夫人其子為君可不謂苑乎其母既死其子又有謗可不謂枯乎枯且有傷施出里克辟奠辟去奠置也不飱而寢夜半召施曰曩而言戲乎抑有所聞之乎曰然君既許驪姬殺大子而立奚齊謀既成矣里克曰吾中立其免乎施曰免明日里克稱疾不朝三旬難乃成國語夷陽五長魚矯清沸魋夷陽五國語作午長魚矯清沸魋者皆厲公之嬖也卻錡嘗奪夷陽五田五嬖于公郤犫又與長魚矯爭田執而牿之父母妻子同一轅矯亦嬖于公及欒書胥童皆怨郤氏譖之于公公信之厲公七年成十七年公作難使胥童及五帥甲八百將攻郤氏矯請無用衆公使魋助之抽戈結衽而偽訟者偽若二人將訟曲直于郤氏者三郤將謀于榭矯以戈殺郤錡郤犫于其位郤至曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄左傳韓非子厲公時六卿貴胥僮長魚矯諌曰大臣貴重敵主爭事外市樹黨下亂國法上以劫主而國不危者未嘗有也公曰善乃誅三卿胥僮長魚矯又曰夫同罪之人偏誅而不盡是懷怨而借之間也公曰吾一朝而夷三卿豫不忍盡也長魚矯曰公不忍之彼將忍公居三月諸侯作難殺公而分其地樂王鮒樂王鮒者樂桓子也為晉大夫事平公平公六年襄二十一年晉逐欒盈遂及羊舌氏殺虎而囚肹鮒見肹曰吾為子請肹弗應出不拜人咎肹肹曰必祁大夫樂王鮒從君者也何能行鮒恨之及公問肹之罪于鮒對曰不棄其親其有焉已而祁奚請之乃免州綽邢蒯者亦晉大夫欒盈既逐綽蒯出奔齊鮒謂士丐曰盍反州綽邢蒯勇士也士丐曰彼欒氏之勇也余何獲焉鮒曰子為彼欒氏乃亦子之勇也明年欒盈帥曲沃之甲入絳鮒侍坐于士丐或告曰欒氏至矣丐懼鮒曰奉君以走固宫宫之有臺觀守備者必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其惟魏氏乎謂魏舒而可強取也夫克亂在權子無懈矣會公有姻喪鮒使丐墨縗冒絰冒絰以絰冒其首或云縗冒絰三者皆墨之二婦人輦以如公為婦人服而入奉公以如固宫劫魏舒以拒欒盈遂滅欒氏十七年昭元年趙武會諸侯之大夫于虢會魯伐莒取鄆莒人告于會乃執魯叔孫豹鮒相趙武欲求貨于豹而為之請使請帶焉難指求貨以帶為辭豹曰鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙武聞之固請于楚乃免豹左傳鮒卒諡曰桓子論曰豫誦小辨巷伯之詩輒為之廢書而歎曰嗟乎悲哉齒牙銷骨何其利也然尋譖人之言蓋亦有術不苦而甘其入也順不卒而緩其濡也深不迫而逺其中也微聽者授之情而已若刳心焉能無售乎雖然必有間間以疏之解可市矣是故君子貴無間無間者使心無腐而已螙蝕無繇弭譖之本也寺人披頭須寺人披者字伯楚為晉勃鞮蓋官名見韋昭注獻公二十一年僖四年公既殺大子申生驪姬又譖二公子曰重耳夷吾與知共君即申生之事公使披刺重耳重耳逃于翟使賈華晉大夫刺夷吾夷吾逃于梁梁近秦驪姬懼秦納夷吾使披以環釋言環玉釋環還也釋言以言自解釋也文公元年僖二十四年文公入立披求見公辭焉曰驪姬之讒爾射豫于屏內樹謂之屏禮諸侯內屏困余于蒲城斬余衣袪又為惠公從余于渭濱命曰三日若宿而至若干二命獻惠之命以求殺余余于伯楚屢困何舊怨也退而思之異日見我對曰吾以為君已知之矣故入猶未之知又將出矣事君不二是謂臣好惡不易是謂君君君臣臣是謂明訓明訓能終民之主也二君之世蒲人翟人余何有焉除君之所惡唯力所及何二之有今君即位其無蒲翟乎伊尹放太甲而卒以為明王管仲賊桓公而卒以為侯伯乾時之役申孫之矢集于桓鉤乾時之戰在魯莊九年申孫矢名鉤帶鉤也鉤近于袪而無怨言佐相以終成令名今君之德宇何不寬裕也惡其所好其能久矣君實不能明訓而棄民主余罪戾之人也又何患焉且不見我君其無悔乎于是吕甥郤芮畏逼悔納公謀作亂將以己丑焚公宫公出救火而遂殺之披知之故求見公公懼遽見之曰豈不如女言然是吾惡心也吾請去之披以吕郤之謀告公懼乘驛自下下下道也脫會秦伯于王城脫會遁行也及公宫火甥芮求公不獲遂如河上秦伯誘而殺之國語同左傳略頭須又名里鳬須為文公守藏豎左右小吏曰豎文公之出也竊藏以遁盡用以求納之及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讐匹夫懼者甚衆矣僕人以告公遽見之左傳韓詩外傳文公出亡過曹里鳬須從盜公資而亡公反國國中多不附公于是里鳬須造曰臣能安晉公使應之曰子尚何面目來見寡人欲安晉也里鳬須曰君沐邪沐者其心倒心倒者言悖君何言之悖也使者以聞公見之里鳬須曰離國久臣民多過君鳬須嘗竭君之資避于深山而君以餒介子推割股肉以食君天下莫不聞臣之為賊亦大矣今君誠赦臣之罪與驂乘遊于國中百姓見之人自安矣公大説晉家臣傳訾祏訾祏者范宣子士丐之家臣也丐與和大夫爭田久而無成丐欲攻之遍問于諸大夫皆不對問于羊舌鮒鮒曰待吾為子戮之羊舌肹聞之見丐曰聞子與和未寧遍問于大夫又無決盍訪之訾祏訾祏實直而博直能端辨之博能上下比之且吾子之家老也吾聞國家有大事必順于典刑而訪咨于耉老而後行之丐問于訾祏祏對曰昔隰叔子周杜伯之子違周難于晉國生子輿即士蒍為理理士官以正于朝朝無姦官為司空以正于國國無敗績世及武子士會佐文襄為諸侯諸侯無二心及為卿以輔成景軍無敗政及為成師居大傅成當為景魯宣公六年晉景公請于王命士會將中軍為大傅端刑法輯訓典國無姦民後之人可則是以受隨范晉二邑及文子士燮成晉荆之盟豐兄弟之國使無有間隙是以受郇櫟晉二邑今吾子嗣位于朝無姦行于國無邪民于是無四方之患而無外內之憂賴三子之功而饗其祿位今既無事矣而非和非恨也于是加寵將何治為丐説乃益和田而與之和國語王生張未王生張未並為范吉射臣張未者張栁朔也王生惡張栁朔言諸吉射使為柏人為柏人宰吉射曰未非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及晉圍柏人士吉射出奔齊在哀五年栁朔謂其子爾從主勉之我將止死王生授我矣吾不可以僭之言授我死節不可以不信遂死于柏人左傳辛俞辛俞者欒氏之臣也平公逐欒盈盈出奔楚執政使欒氏之臣勿從從欒氏者為大戮施辛俞行吏執而獻之公公曰國有大令何故犯之對曰臣順之也豈敢犯之執政曰無從欒氏而從君是明令必從君也臣聞之曰三世仕家君之再世以下主之事君以死事主以勤君之明令也自臣之祖以無大援于晉國世𨽻欒氏于今三世矣臣故不敢不君今執政曰不從君者為大戮臣敢忘其死而叛其君以煩司寇公説固止之不可厚賂之辭曰臣嘗陳辭矣心以守志辭以行之所以事君也若受君賜是墮其前言君問而陳辭退而逆之何以事君公知其不可得乃遣之國語董安于董安于者趙鞅之臣也趙鞅殺趙午圍邯鄲荀寅士吉射將作亂攻趙鞅安于聞之告鞅曰先備諸鞅曰晉國有命始禍者死為後可也安于曰與其害于民寧我獨死請以我説晉國若討可殺我以自解説趙鞅不可范氏中行氏伐趙鞅鞅奔晉陽晉人圍之既而荀躒韓不信魏舒奉定公伐范氏中行氏而復趙鞅左傳晉陽之圍也安于戰為多至是趙鞅賞之辭固賞之對曰方臣之少也進秉筆贊為名命稱于前世義于諸侯而主弗志及臣之壯也耆其股肱以從司馬耆致也讀作指苛慝不産及臣之長也端委蹕帶以隨宰人民無二心今臣一旦為狂疾而曰必賞女是以狂疾賞也不如亡趨而出乃釋之國語説苑董安于治晉陽問政于蹇老蹇老曰忠曰信曰敢忠于主信于令敢于不善人董安于曰此三者是矣説苑趙簡子從晉陽之邯鄲中路而止引車吏問君何為止簡子曰董安于在後吏曰此三軍之事也奈何以一人留三軍簡子曰諾驅之百步又止吏將進諌安于適至簡子曰秦道之與晉國交者吾忘令人塞之安于曰此安于之所為後也簡子曰官之寶璧吾忘令人載之對曰此安于之所為後也簡子曰行人燭過年長矣言未嘗不為晉國法也吾行忘令人辭且聘焉對曰此安于之所為後也韓非子董閼于作趙上地守行石邑山中澗峭如牆深百仭問其旁鄉左右曰人嘗有入此者乎曰無有嬰兒癡聾狂悖之人嘗有入此者乎曰無有牛馬犬彘嘗有入此者乎曰無有閼于喟然太息曰吾能治矣使吾法之無赦猶入澗之必死則人莫敢犯也何為不治之梁嬰父者荀躒之嬖也嬰父惡安于謂荀躒曰不殺安于使終為政于趙氏趙氏必得晉國盍以其先發難也討于趙氏荀躒使告于趙鞅曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其罪矣敢以告趙鞅患之安于曰我死而晉國寧趙氏定將焉用生人誰不死吾死莫矣乃縊而死趙鞅尸諸市而告知氏曰主命戮罪人安于既伏其罪矣敢以告荀躒從趙鞅盟而後趙氏定祀安于于廟左傳尹鐸少室周傳叟公孫尨周舍薄疑十人附尹鐸者趙鞅之臣也鞅使鐸為晉陽曰必墮其壘培范中行氏圍趙氏所作壘培吾將往焉若見壘培是見寅與吉射也鐸往而增之鞅如晉陽見壘怒曰必殺之而後入是昭余讎也郵無恤説鞅乃賞之鐸之為晉陽也請曰以為繭絲乎抑為保鄣乎繭絲賦稅保鄣蔽扞也鞅曰保鄣哉鐸乃損其户數鞅戒其子無恤曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸及荀瑤攻無恤無恤出曰吾何走乎從者曰長子晉别縣近且城厚完無恤曰罷民力以完之又斃以守之其誰與我從者曰邯鄲之倉廩實無恤曰浚民之膏澤以實又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寬也民必和矣乃走晉陽晉師圍而灌之沈竈産蛙民無畔意吕氏春秋趙簡子曰厥也愛我鐸也不愛我厥之諫我也必于無人之所鐸之諫我也喜質伐于人中必使我醜尹鐸對曰厥也愛君之醜也而不愛君之過也鐸也愛君之過也而不愛君之醜也臣嘗聞相人于師敦顔而土色者忍醜不質君于人中恐君不變也説苑厥作赦厥鐸作尹綽説苑又曰趙簡子春築臺于邯鄲天雨而不息謂左右曰可無趨種乎尹鐸對曰公事急厝種而懸之臺夫雖欲趨種不能得也簡子惕然乃罷役曰我以臺為急不如民之急也少室周者亦鞅之臣為鞅右聞牛談亦鞅之臣有力請與之戲弗勝致右焉鞅許之使周為宰曰知賢而讓可以訓矣國語韓非子少室周者古之貞亷潔慤者也為趙襄主力士與中牟徐子角力不若也入言之襄主以自代曰臣以力事君者也今徐子力多臣臣不以自代恐他人言之而為罪也一曰周為襄主驂乘與晉陽力士牛子耕角力而不勝周進之鞅之臣又有傅叟公孫尨者尨故臣范氏初周人與范氏田尨稅焉趙氏得而獻之吏請殺之鞅曰為其主也何罪止而與之田及鐵之戰鄭獲鞅蜂旗尨以徒五百人宵攻鄭師取蜂旗于罕達之幕下獻曰請報主德鞅既敗鄭師喜曰可矣傅叟曰猶有知在言知氏又將為難憂未艾也左傳又有周舍者舍立于門下三日三夜鞅使問曰子何事對曰願為諤諤之臣墨筆操牘從君之過而日有記也月有成也嵗有效也鞅居與之居出與之出舍死鞅與諸大夫飲于洪波之臺酒酣鞅泣諸大夫皆出走曰臣有罪而不知鞅曰大夫無罪昔者周舍有言曰千羊之皮不如一狐之腋衆人諾諾不如一士之諤諤自周舍死吾未嘗聞吾過也亡無日矣是以泣也韓詩外傳史記略同韓非子薄疑謂簡主曰君之國中飽簡主欣然而喜曰何如對曰府庫空虛于上百姓貧餓于下而姦吏富矣吕氏春秋趙簡子有兩白騾甚愛之陽城胥渠處廣門之官夜欵門而謁曰主君之臣胥渠有疾醫教之曰得白騾之肝病則止不得則死謁者入通董安于御于側愠曰嘻胥渠也期吾君騾請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎于是殺白騾取肝以與陽城胥渠無何趙攻翟廣門之官左七百人右七百人皆先登而獲甲首説苑楊因見趙簡主曰臣居鄉三逐事君五去聞君好士故來見簡主聞之絶食而歎左右曰居鄉三逐事不容衆也事君五去是不忠上也今君有士見過八矣簡子曰子不知也夫美女者醜婦之仇盛德之士亂世所疏也正直之行邪枉所憎也遂出見之授以為相而國大治説苑公叔文子問于史叟曰武子勝事趙簡子久矣其寵不解奚也史叟曰武子勝博聞多能而位賤君親而近之致敏以遜藐而疏之恭而無怨色入與謀國家出不見其寵君賜之祿知足而辭故能久也説苑趙簡子問翟封荼曰吾聞翟雨穀三日信乎曰信雨血三日信乎曰信馬生牛牛生馬信乎曰信簡子曰大哉妖亦足以亡矣對曰雨穀三日虻風之所飄也雨血三日鷙鳥擊于上也馬生牛牛生馬雜牧也此非翟之妖也其國數散其君幼弱其諸卿貨其大夫比黨以求祿其百官肆斷而無告其政令不竟而數化其士巧貪而有怨此其妖也説苑趙簡子圍衛之郛犀楯革櫓立于矢石之所鼓之而士不起簡子投枹曰烏乎吾士之數弊也燭過免胄而對曰君之不能耳士無弊者昔者吾先君獻公并國十七服國三十八戰十有二勝是民之用也惠公淫衍暴亂身好玉女秦人來侵去絳十七里亦是人之用也文公圍衛取鄴城濮之戰五敗荆人亦此人之用也君不能耳士無弊者簡子乃去楯櫓立于矢石之所鼓之而乘士之戰大勝簡子曰吾得革車千乘不如聞行人燭過之一言也説苑趙簡子舉兵攻齊令軍中敢諌者死被甲之士公廬望見簡子大笑簡子曰子何笑對曰臣有夙笑簡子曰有以解之則可無則死對曰當桑之時臣鄰家夫與妻俱之田見桑中女因往追之不能得還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也罷師而歸説苑趙簡子攻陶有二人先登死于城上簡子欲得之陶君不與承盆疽謂陶君曰簡子將掘君之墓以與君之百姓市曰踰邑梯城者將舍之不者將掘其墓朽者揚其灰未朽者辜其尸陶君懼請效二人之尸以和又有成摶論羊殖事同家語見羊舌大夫傳新序趙鞅上羊腸之坂羣臣皆偏袒推車虎會獨擔戟行歌簡子曰寡人上坂羣臣皆推車會獨擔戟行歌為人臣侮其主其罪何若會對曰為人臣而侮其主者死而又死簡子曰何謂死而又死曰身死妻子又死是謂死而又死君既已聞為人臣而侮其主者之罪矣亦聞為其君而侮其臣者乎鞅曰為人君而侮其臣者何若會曰為人君而侮其臣者智者不為謀辨者不為使勇者不為鬬智者不為謀則社稷危辨者不為使則使不通勇者不為鬬則邊竟侵簡子曰善乃罷羣臣不推車置酒與羣臣飲以會為上客事與隨會同莊子簡子出田鄭龍為右有一野人簡子曰龍下射彼無驚吾馬三命龍龍不對簡子怒鄭龍曰昔吾先君伐衛克曹退為踐土之盟不戮一人今一朝田而曰為我殺人是虎狼食人故將救之簡子愀焉曰不愛其身以活人者可無從乎還車輟田曰人之田也得獸今吾田也得士逸篇今本無楚隆楚隆者趙無恤之家臣也定公三十七年哀二十年越圍吳趙無恤時有父簡子之喪無恤降于喪食飲食又降于居喪楚隆曰三年之喪親昵之極也又降之無乃有故乎無恤曰黃池之役在哀十三年先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之非晉之所能及也謂欲敵越救吳以相距甚逺非晉力之所及吾是以為降隆曰若使吳王知之若何無恤曰可乎隆曰請嘗之乃往先造于越軍曰吳犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之許之告于吳子曰寡君之老無恤使陪臣隆敢展謝其不共黃池之役君之先臣志父即鞅得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之吳子拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙無恤曰句踐將生憂寡人寡人死之不得矣言使我生受其憂欲為之死不可得且曰溺人必笑將有問也自喻所問不急猶溺人不知所為而反笑史黯何以得為君子史黯即蔡墨黯云不及四年吳當亡吳子感此問也對曰黯也進不見惡退無謗言吳子曰宜哉左傳張孟談髙共八人附張孟談者是為張談趙無恤之臣也智伯瑤使人請地于韓韓與之使請地于魏魏亦與之又使人之趙請藺皋狼之地無恤弗與智伯因結韓魏伐趙無恤召孟談而告之曰夫智伯之為人陽親而隂疏三使韓魏而寡人弗與焉其移兵寡人必矣今吾安居而可孟談曰董閼安于簡子之才臣也世治晉陽而君澤循之君澤尹鐸之訛君其定居晉陽曰諾至行城郭案府庫視倉廪召孟談曰吾城郭完府庫足倉廩實矣無矢奈何孟談曰臣聞董子之治晉陽也公宫之垣皆以荻蒿苫楚牆之其髙至丈餘君發而用之于是發而試之其堅則箘簬之徑不能過也曰矢足矣銅少奈何孟談曰臣聞董子之治晉陽也公宫之室皆以鍊銅為柱質請發而用之無恤曰善備守已具三國之兵乘晉陽城三月不能拔因圍之決晉水而灌之圍晉陽三年城中巢居而處懸釡而炊財食將盡士卒病羸無恤謂孟談曰吾不能守矣欲以城下何如孟談曰臣聞之亡不能存危不能安則無為貴知士也臣請見韓魏之君孟談于是隂見韓魏之君曰臣聞唇亡則齒寒今智伯帥二國之君伐趙趙將亡矣亡則二君為之次矣二君曰我知其然夫智伯之為人粗中而少親我謀未遂而知則其禍必至為之奈何孟談曰謀出二君之口入臣之耳人莫之知也二君即與孟談隂約三軍之期日夜遣入晉陽以報無恤無恤使孟談見韓魏之君日夜期殺守隄之吏而決水灌智伯軍智伯軍救水而亂韓魏翼而擊之無恤卒犯其前大敗智伯軍禽智伯淮南子張武為知伯謀曰中行文子可伐以廣地于是伐范中行氏而滅之又教求地于韓魏趙韓魏裂地授之趙不與乃率韓魏伐趙圍晉陽三年張孟談乃潛行而出三國隂謀同計以擊知氏遂滅之史記三國攻晉陽嵗餘羣臣皆有外心禮益慢惟髙共不敢失禮襄子夜使相張孟同私于韓魏以三月丙戌反滅知氏分其地于是襄子行賞髙共為上張孟同曰晉陽之難唯共無功襄子曰方晉陽急羣臣皆懈唯共不敢失人臣禮是以先之吕氏春秋作髙赦韓非子説苑作髙赫孟談既固趙宗廟封疆發五霸乃稱簡之塗以告無恤曰昔者前國地君之御有之鮑彪注稱舉其説也此士國地君之御國地猶武安之類御即之塗也按䇿語未詳注亦略曰五霸之所以治天下者約主勢能制臣無令臣能制主故貴為列侯者不令在相位自將軍以下不為近大夫今臣之名顯而身尊權重而衆服臣願損功名去權勢以離衆無恤恨然曰何哉吾聞輔主者名顯功大者身尊此先聖之所以集國家子何為然對曰君之所言成功之美也臣之所言持國之道也臣主之權均之能美未之有也君若弗圖則臣力不足愴然有決色且曰左司馬見使于國家安社稷不避其死以成其忠君其行之無恤乃許之孟談耕于負親之邱三年韓魏齊楚負親以謀趙無恤往見張談而告之曰昔者智氏之地趙氏分則多十城復來此篇語意多未詳而今諸侯謀我奈何孟談曰君其負劒御臣之國舍臣之廟授吏大夫臣試計之無恤曰諾孟談乃行其妻之楚長子之韓次子之魏少子之齊四國疑而謀敗國䇿韓非子王登為中牟令上言于趙襄子曰中牟有士曰中章胥已者其身甚修其學甚博君何不舉之襄子曰子見之我將為中大夫相室諌曰中大夫晉重列也無功而受非晉臣之意君其耳而未之目邪襄子曰我取登既耳而目之矣登之所取又耳而目之是耳目人無已也登一日而見二中大夫豫之田宅中牟之人棄其田耘賣宅圃而隨文學者邑之半吕覽作任登膽胥已孔叢子孔子對衛出公語略同韓非子襄子學御于王子期俄而與子期逐三易馬而三後襄子曰子之教御術未盡也對曰術已盡用之過也凡御之所貴馬體安于車人心調于馬而後可以進速致逺今君後則欲逮臣先則恐逮于臣夫誘道爭逺非先則後也而先後心皆在于臣尚何以調于馬此君之所以後也新序襄子飲酒五日五夜不廢謂侍者曰我誠邦士也夫飲酒五日五夜矣而殊不病優莫曰君勉之不及紂二日耳不亡何待曰桀紂之亡也遇湯武也今天下盡桀也而君紂也桀紂並世焉能相亡然亦殆矣新序佛肹以中牟叛置鼎于庭致士大夫曰與我者受邑不者烹大夫皆從之至于田卑田卑者中牟之邑人也曰義死不避斧鉞義窮不受軒冕無義而生不仁而富不如烹褰裳將就鼎佛肹脫屨而生之趙氏聞其叛也攻而取之聞田卑不肯與也求而賞之田卑曰不可一人舉而萬夫俯首智者不為賞一人以慙萬夫義者不取辭賞從處以行臨人不道吾去矣遂之楚史記趙朔妻成公姊為夫人晉景公之三年大夫屠岸賈欲誅趙氏初趙盾在時夢見叔帶持要而哭甚悲已而笑拊手且歌盾卜之兆絶而後好趙史援占之曰此夢甚惡非君之身乃君之子然亦君之咎至孫趙將世益衰屠岸賈者始有寵于靈公及至于景公而賈為司寇將作難乃治靈公之賊以致趙盾遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意屠岸賈不聽韓厥告趙朔趨亡朔不肯曰子必不絶趙氏朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏于下宫殺趙朔趙同趙括趙嬰齊皆夷其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索于宫中夫人置兒褲中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵臼曰今一索不得後必且復索之奈何杵臼曰立孤與死孰難嬰曰死易立孤難耳杵臼曰趙世先君遇子厚子強為其難者吾為其易者請先死乃謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將曰嬰不肖不能立趙孤誰與我千金吾告趙氏孤處諸將喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宫之難不能死與我謀匿趙氏孤今又賣我縱不能立而忍賣之乎抱兒呼曰天乎天乎趙氏孤何罪請活之獨殺杵臼可也諸將遂殺杵臼與孤兒以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至于成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜策唯君圖之景公問趙尚有子孫乎韓厥具以實告于是景公乃與韓厥謀立趙孤召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸將而見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命並命羣臣非然誰敢作難微君之疾羣臣固且請立趙後今君有命羣臣之願也于是召趙武程嬰遍拜諸將諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難我非不能死我思立趙氏之後今武既立為成人復故位我將下報宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祀之世世勿絶按趙同趙括之殺也緣朔妻莊姬之譖事在景公十七年趙武已從莊姬畜于公宫又獻公時有屠岸夷無所謂屠岸賈者而程嬰杵臼三傳亦不具載姑存史説于此論曰訾祏匡范趙氏有左右臣宜其有聞也然假羽毛于齊鑄刑于鼎猶有遺行焉君一臣二張未辛俞犯難不二而能一之亦獨行之君子乎士茁郤疵士茁者知伯荀瑤之家臣也荀瑤為室美茁夕焉瑤曰室美夫對曰美則美矣抑臣亦有懼也瑤曰何懼對曰臣以秉筆事君志有之曰髙山峻原不生草木松柏之地其土不肥今土木勝臣懼其不安人也室成三年而知氏亡國語郤疵者晉人事智伯瑤智伯從韓魏圍晉陽而水之城不沈者三板疵謂智伯曰韓魏之君必反矣智伯曰何以知之疵曰以人事知之夫從韓魏之君攻趙約勝趙而三分其地今城不沒者三板臼竈生蛙人馬相食城降有日而韓魏之君無喜志而有憂色是非反何也明日智伯以告韓魏之君韓魏之君曰城今且拔也二家雖愚不棄美利于前背信盟之約而為危難不可成之事其勢可見也是疵為趙計矣使君疑心而解于攻趙也為君惜之趨而出疵謂智伯曰君何以疵言告韓魏之君為智伯曰子安知之對曰韓魏之君視疵端而趨疾也疵知其不聽請使于齊智伯遣之韓魏果反國語豫讓青荓長兒子魚附豫讓者畢陽之孫也始事范中行氏不説去而就智伯智伯寵之及三晉分智氏趙襄子最怨智伯將其頭以為飲器讓遁逃山中曰嗟乎士為知己者死女為説己者容吾其報智伯之讎矣乃變姓名為刑人入宫塗厠欲以刺襄子襄子如厠心動執問塗者則豫讓也刃其扞曰欲為智伯報讎左右欲殺之襄子曰彼義士也吾謹避之耳且智伯已死無後而其臣至為報讎此天下之賢人也卒釋之讓又漆身為厲滅鬚去眉自刑以變其容為乞人而往乞其妻不識曰狀貌不似吾夫其音何類之甚也又吞炭為啞變其音其友謂之曰以子之才善事襄子襄子必近幸于子得近而行所欲此甚易而功必成讓笑而應之曰吾所為此者以明君臣之義非從易也且夫委質而事人而求弒之是懷二心以事君也吾所為難亦將以愧人臣懷二心者居頃之襄子當出讓伏所過橋下襄子至橋而馬驚襄子曰此必豫讓也問之果然于是襄子面數讓曰子不嘗事范中行氏乎智伯滅范中行氏而子不為報讎反委質事智伯智伯已死子獨何為報讎之深也讓曰臣故事范中行氏范中行氏以衆人遇臣臣故衆人報之智伯以國士遇臣臣故國士報之襄子乃喟然嘆曰嗟乎豫之為智伯名既成矣寡人舍子亦已足矣子自為計寡人不舍子使兵環之讓曰臣聞明主不掩人之義忠臣不愛死以立名君前以寬舍臣天下莫不稱君之賢今日之事臣故伏誅然願請君之衣而擊之雖死不恨非所望也敢布腹心于是襄子使使者持衣與讓讓拔劔三躍呼天擊之曰可以報智伯矣遂伏劒而死死之日趙國之士聞之皆為涕泣國策吕氏春秋趙襄子逰囿中至于梁馬却不肯進青荓為驂乘襄子曰進視梁下類有人青荓進豫讓却寢佯為死人叱青荓曰去長者吾且有事青荓曰少與子友子且為大事而我言之是失相友之道子將賊吾君而我不言是失為臣之道如我者唯死為可乃退而自殺新書趙襄子破智伯豫讓伏刺襄子五起而弗中襄子患之食不甘味一夕五易卧見不全身餘文略同説苑襄主將出豫讓偽為死人處梁下駟馬驚不進襄主動心使視梁下得豫讓重其義不殺也又盜為抵罪被刑人赭衣入繕宫襄主動心執而問之曰非義也子壯士也乃自置車庫中水漿毋入口者三日以禮豫讓讓自知遂自殺新序智伯囂之時有士曰長兒子魚絶知伯而去之三年將東之越道聞知伯囂之見殺也謂御曰還車反吾將死之御曰夫子絶而去之三年矣今反死之是絶屬無别也長兒子魚曰不然吾聞仁者無餘愛忠臣無餘祿吾聞知伯之死而動吾心餘祿之加于我者至今尚存吾將往依之反而死段規任章趙葭段規者韓人晉舊姓事韓康子任章趙葭者並魏人事魏桓子智伯伐范中行氏滅之休數年使人請地于韓韓康子欲弗與段規諌曰不可夫智伯之為人也好利而鷙請地不與必加兵于韓矣君其與之彼狃又將請地于他國他國不聽必鄉之以兵然則韓可以免于難而待事之變康子曰善使使致萬家之邑一于智伯智伯又使人請地于魏魏桓子弗與任章曰何故弗與桓子曰無故索地章曰無故索地鄰國必恐重欲無厭天下必懼君豫之地智伯必驕而輕敵鄰國懼而相親以相親之兵待輕敵之國智氏之命不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之君不如與之以驕智伯何釋以天下圗智氏而獨以吾國為資乎趙葭亦諫曰彼請地于韓韓與之請地于魏魏弗與是魏內自強而外怒智伯也然則其錯兵于魏也必矣桓子曰善乃與之萬家之邑一智伯因索蔡皋狼于趙趙弗與因圍晉陽韓魏反于外趙氏應于內智氏遂亡三晉已破智氏將分其地段規謂韓康子曰分地必取成皋曰成皋石溜之地也無所用之規曰不然臣聞一里之厚而動千里之權者地利也萬人之衆而破三軍者不意也君用臣言則韓必取鄭矣康子曰善果取成皋至韓之取鄭也果從成皋始大國策論曰知氏善養士故多令臣或挽于前或推于後然而大車以敗不救其亡愎以濟貪必無幸矣既死無後而猶使豫讓兩報故主嗟乎呼天擊衣豈惟三晉之士為之涕泣哉縮髙不教子二有晉之遺風焉蕩之什曰雖無老成人尚有典型此豫于家臣而有述焉者也尚史卷四十八
