body:
  text: 尚史卷六十五列傳四十三鑲白旗漢軍李鍇撰燕諸臣傳陳翠陳翠事王噲翠合齊燕將令王之弟為質於齊史記蘇代說王噲乃使一子質齊王許諾太后聞之大怒曰陳公不能為人之國則已焉有離人子母者老婦欲得志焉翠欲見太后王曰太后方怒子翠曰無害也遂入見太后曰賴得先王鴈鶩之餘食不宜臞臞者憂公子之且質於齊也翠曰人主之愛子不如布衣之甚又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金齎地百里以為人之終也今王願封公子百官持職曰公子無功不當封今王以公子為質也且以為公子功也而太后弗聽臣是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家太子即位公子賤於布衣故非及太后與王封公子公子終身不封矣太后曰老婦不知長者之計乃命束車為行具國策趙與觸讋說威后略同郭隗鄒衍附劇辛郭隗先生者王噲時人王噲之亂齊既破燕昭王卑身厚幣以招賢者欲將報讐往見郭隗先生曰齊因孤國之亂而襲破燕孤極知燕小力少不足以報然得賢士與共國以雪先王之恥孤之願也敢問以國報讐者奈何隗對曰帝者與師處王者與友處霸者與臣處亡國與役處詘指而事之北面而受學則百已者至先趨而後息先問而後默則什已者至人趨已趨則若己者至馮几據杖眄視指使則厮役之人至若恣睢奮擊響籍叱咄則徒𨽻之人至矣此古服道致士之法也王誠博選國中之賢者而朝其門下天下之士必趨於燕矣王曰寡人將誰朝而可隗曰臣聞古之君人有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬馬已死買其骨五百金反以報君君大怒曰所求者生馬安事死馬而捐五百金㳙人對曰死馬且買之五百金况生馬乎天下必以為王能市馬馬今至矣期年千里之馬至者三今王誠欲致士先從隗始隗且見事况賢於隗者乎豈逺千里哉於是王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭湊燕國策說苑昭王問於隗曰寡人地狹民寡齊人取薊八城胸奴驅馳樓煩之下以孤之不肖得承宗廟恐社稷危存之有道乎隗曰帝者之臣師王者之臣友誠欲與王霸同道隗請為天下之士開路於是置隗為上客鄒衍後事惠王盡忠左右譖之王繫之仰天而哭夏五月為之隕霜淮南子劉向别録鄒衍在燕燕有谷地美而寒不生五榖衍居之吹律而溫氣至榖生今名黍谷劇辛後為趙龎暖破殺之樂毅樂閒樂乘樂毅者其先祖曰樂羊樂羊為魏文侯將伐取中山魏文侯封樂羊以靈夀樂羊死葬於靈夀其後子孫因家焉中山復國至趙武靈王時復滅中山而樂氏後有樂毅樂毅賢好兵趙人舉之及武靈王有沙邱之亂乃去趙適魏聞燕昭王以子之之亂而齊大敗燕燕昭王怨齊未嘗一日而忘報齊也燕國小僻逺力不能制於是屈身下士先禮郭隗以招賢者樂毅於是為魏昭王使於燕燕王以客禮待之樂毅辭讓遂委質為臣燕昭王以為亞卿久之當是時齊湣王彊南敗楚相唐昧於重邱西摧三晉於觀津遂與三晉擊秦助趙滅中山破宋廣地千餘里與秦昭王爭重為帝已而復歸之諸侯皆欲背秦而服於齊湣王自矜百姓弗堪於是燕昭王問伐齊之事樂毅對曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏趙䇿齊破燕趙欲存之樂毅謂趙王曰無約而攻齊齊必讐趙不如請以河東易燕地於齊趙有河北齊有河東燕趙必不爭矣是二國親也以河東之地強齊以燕以趙輔之天下憎之必皆事王以伐齊是因天下以破齊也王曰善乃以河東易齊楚魏憎之令淖滑惠施之趙請伐齊而存燕於是使樂毅約趙惠文王别使連楚魏令趙嚪秦以伐齊之利諸侯害齊湣王之驕暴皆爭合從與燕伐齊樂毅還報燕昭王悉起兵使樂毅為上將軍趙惠文王以相國印授樂毅樂毅於是并護趙楚韓魏燕之兵以伐齊破之濟西諸侯兵罷歸而燕軍樂毅獨追至於臨菑齊湣王之敗濟西亡走保於莒樂毅獨留徇齊齊皆城守樂毅攻入臨菑盡取齊寶財物祭器輸之燕燕昭王大說親至濟上勞軍行賞饗士封樂毅於昌國號為昌國君於是燕昭王收齊鹵獲以歸而使樂毅復以兵平齊城之不下者樂毅留徇齊五嵗下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服㑹燕昭王薨子立為燕惠王惠王自為太子時嘗不快於樂毅及即位齊之田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患唯恐他將之來於是燕惠王固已疑樂毅得齊反間乃使騎劫代將而召樂毅樂毅知燕惠王之不善代之畏誅遂西降趙趙封樂毅於觀津號曰望諸君尊寵樂毅以警動於燕齊齊田單後與騎劫戰果設詐誑燕軍遂破騎劫於即墨下而轉戰逐燕北至河上盡復得齊城而迎襄王於莒入於臨淄燕惠王後悔使騎劫代樂毅以故破軍亡將失齊又怨樂毅之降趙恐趙用樂毅而乘燕之弊以伐燕燕惠王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讐天下莫不震動寡人豈敢一日而忘將軍之功哉㑹先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久暴露於外故召將軍且休計事將軍過聽以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報遺燕惠王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞賢聖之君不以祿私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有高世主之心故假節於魏以身得察於燕先王過舉厠之賓客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入於燕齊器設於寧臺大吕陳於元英故鼎反乎磨室薊邱之植植於汶篁自五伯以來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉令承教可幸無罪是以受命不辭臣聞賢聖之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之彊國收八百嵗之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法令慎庶孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥說聽於闔閭而吳王逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不早見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣恐侍御者之親左右之說不察疏逺之行故敢獻書以聞唯君王之留意焉於是燕王復以樂毅子樂閒為昌國君而樂毅往來復通燕燕趙以為客卿樂毅卒於趙史記惠王薨燕王喜即位王喜使粟腹以五百金為趙孝成王夀酒三日反報曰趙民其壯者皆死長平其孤未壯可伐也王乃召樂閒而問曰何如對曰趙四達之國也其民皆習於兵不可與戰王曰吾以倍攻之可乎曰不可曰以三可乎曰不可王大怒左右皆以為趙可伐遽起六十萬以攻趙令栗腹以四十萬攻鄗使慶秦以二十萬攻代趙使廉頗以八萬遇栗腹於鄗使樂乘毅之族以五萬遇慶秦於代燕人大敗樂聞入趙王以書且謝焉曰寡人不佞不能奉順君意故君捐國而出則寡人之不肖明矣敢端其願而君不肯聽故使使者陳愚意君試論之語曰仁不輕絶智不輕怨君之於先王也世之所明知也寡人望有非則君掩蓋之不虞君之明罪之也望有過則君教誨之不虞君之明棄之也且寡人之罪國人莫不知天下莫不聞君微出明怨以棄寡人寡人必有罪矣雖然恐君之未盡厚也諺曰厚者不毁人以自益仁者不危人以要名故掩人之邪者厚人之行也救人之過者仁者之道也世有掩寡人之邪救寡人之過非君孰望之今君厚受位於先王以成尊輕棄寡人以快心則掩邪救過難得於君矣且世有薄而故厚施行有失而故惠用今使寡人任不肖之罪而君有失厚之纍於為君擇之也無所取之國之有封疆家之有垣牆所以好合掩惡也室不能相和出語鄰家未為通計也怨惡未見而明棄之未為盡厚也寡人雖不肖乎未如殷紂之亂也君雖不得意乎未如商容箕子之纍也然則不內蓋寡人而明怨於外恐其適足以傷於高而薄於行也非然也茍可以明君之義成君之高雖任惡名不難受也本欲以為明寡人之薄而君不得厚揚寡人之辱而君不得榮此一舉而兩失也義者不虧人以自益况傷人以自損乎君無以寡人不肖纍往事之美昔者栁下惠吏於魯三黜而不去或謂之曰可以去栁下惠曰茍與人之異惡往而不黜乎猶且黜乎寧於故國爾栁下惠不以三黜自纍故前業不忘不以去為心故逺近無議今寡人之罪國人未知而議寡人者遍天下語曰論不修心議不纍物仁不輕絶智不簡功簡棄大功者輟也輕絶厚利者怨也輟而棄之怨而纍之宜在逺者不望之乎君也今以寡人無罪君豈怨之乎願君捐怨追惟先王復以教寡人意君曰余且慝心以成爾過不顧先王以明爾惡使寡人進不得修功退不得改過君之所揣也唯君圗之此寡人之愚意也敬以書謁之樂閒樂乘怨不用其計二人卒留趙不報國策史記廉頗破栗腹之軍禽栗腹樂乘是乘為燕將攻趙也以樂閒樂乘怨不用其計之文論之史記說誤趙封樂乘為武襄君其明年樂乘廉頗為趙圍燕燕重禮以和乃解後五年趙孝王卒襄王使樂乘代廉頗廉頗攻樂乘乘走廉頗亡入魏史記論曰徇齊五年得七十餘城莒與即墨亦且謂旦暮下固未嘗以全燕之兵萃力致死期一决也不然單雖善禦亦决防而潰爾讀毅報惠王書其於君臣進退之義可謂得之而子閒乃亦翩然行也將渠將渠燕大夫燕王喜四年王命相栗腹約歡趙以五百金為趙王酒還報王曰趙可伐也王問樂閒樂閒不可王怒卒起二軍車二千乘栗腹將而攻鄗卿秦攻代將渠謂王曰與人通關約交以五百金飲人之王使者報而反攻之不祥兵無成功王不聽自將偏軍隨之將渠引王綬止之曰王必無自往往無成功王蹴之以足將渠泣曰臣非以自為為王也燕軍至宋子趙破栗腹於鄗卿秦於代逐之五百里圍其國燕人請和趙不許必令將渠處和燕相將渠以處和趙聽之解燕圍史記荆軻高漸離荆軻者衛人也其先乃齊人徙於衛衛人謂之慶卿而之燕燕人謂之荆卿荆卿好讀書擊劒以術說衛元君衛元君不用其後秦伐衛置東郡徙衛元君之支屬於野王荆軻嘗游過榆次與蓋聶論劒蓋聶怒而目之荆軻出人或言復召荆卿蓋聶曰曩者吾與論劒有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報蓋聶曰固去也吾曩者目攝之荆軻游於邯鄲魯句踐與荆軻博爭道魯句踐怒而叱之荆軻默而逃去遂不復㑹荆軻既至燕愛燕之狗屠及善擊筑者高漸離荆軻嗜酒日與狗屠及高漸離飲於燕市酒酣以往高漸離擊筑荆軻和而歌於市中相樂也已而相泣旁若無人者荆軻雖游於酒人乎然其為人沈深好書其所游諸侯盡與其賢豪長者相結其之燕燕之處士田光先生亦善待之知其非庸人也居頃之㑹燕太子丹質秦亡歸燕燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹歡及政立為秦王而丹質於秦秦王之遇燕太子丹不善故丹怨而亡歸歸而求為報秦王者國小力不能其後秦日出兵山東以伐齊楚三晉稍蠶食諸侯且至於燕燕君臣皆恐禍之至太子丹患之問其傅鞠武武對曰秦地遍天下威脅韓魏趙氏北有甘泉谷口之固南有涇渭之沃擅巴漢之饒右隴蜀之山左關殽之險民衆而士厲兵革有餘意有所出則長城之南易水以北未有所定也奈何以見陵之怨欲批其逆鱗哉丹曰然則何由對曰請入圗之居有間秦將樊於期得罪於秦王亡之燕太子受而舍之鞠武諫曰不可夫以秦王之暴而積怒於燕足為寒心又况樊將軍之所在乎是謂委肉當餓虎之蹊也禍必不振矣雖有管晏不能為之謀也願太子疾遣樊將軍入胸奴以滅口請西約三晉南連齊楚北購於單于其後乃可圗也太子曰太傅之計曠日彌久心惛然恐不能須臾且非獨於此也夫樊將軍窮困於天下歸身於丹丹終不以迫於彊秦而棄所哀憐之交置之胸奴是故丹命卒之時也願太傅更慮之鞠武曰夫行危欲求安造禍而求福計淺而怨深連結一人之後交不顧國家之大害此謂資怨而助禍矣夫以鴻毛燎於爐炭之上必無事矣且以鵰鷙之秦行怨暴之怒豈足道哉燕有田光先生其為人智深而勇沈可與謀太子曰願因太傅而得交於田先生可乎鞠武曰敬諾出見田先生道太子願圗國事於先生也田光曰敬奉教乃造焉太子逢迎却行為導跪而蔽席田光坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰老駑馬先之今太子聞光盛壯之時不知臣精已消亡矣雖然光不敢以圗國事所善荆卿可使也太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趨出太子送至門戒曰丹所報先生所言者國之大事也願先生勿泄也田光俯而笑曰諾僂行見荆卿曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言足下於太子也願足下過太子於宫荆軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言者國之大事也願先生勿泄是太子疑光也夫為行而使人疑之非節俠也欲自殺以激荆卿曰願足下急過太子言光已死明不言也因遂自刎而死荆軻遂見太子言田光已死致光之言太子再拜而跪膝行流涕有頃而後言曰丹所以誡田先生毋言者欲以成大事之謀也今田先生以死明不言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹之不肖使得至前敢有所道此天之所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海內之王者其意不厭今秦已虜韓王盡納其地又舉兵南伐楚北臨趙王翦將數十萬之衆距漳鄴而李信出太原雲中趙不能支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦窺以重利秦王貪其勢必得所願矣誠得劫秦王使悉反諸侯侵地若曹沫之與齊桓公則大善矣則不可因而刺殺之彼秦大將擅兵於外而內有亂則君臣相疑以其間諸侯得合從其破秦必矣此丹之上願而不知所委命唯荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請毋讓然後許諾於是尊荆卿為上卿舍上舍太子日造門下供太牢具異物間進車騎美女恣荆軻所欲以順適其意久之荆軻未有行意秦將王翦破趙虜趙王盡收入其地進兵北略地至燕南界太子丹恐懼乃請荆軻曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆軻曰微太子言臣願謁之今行而毋信則秦未可親也夫樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圗奉獻秦王秦王必說見臣臣乃得有以報太子曰樊將軍窮困來歸丹丹不忍以己之私而傷長者之意願足下更慮之荆軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期仰天太息流涕曰於期每念之常痛於骨髓顧計不知所出耳荆軻曰今有一言可以解燕國之患報將軍之仇者何如於期乃前曰為之奈何荆軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸然則將軍之仇報而燕見陵之愧除矣將軍豈有意乎樊於期偏袒扼捥而進曰此臣之日夜切齒腐心也乃今得聞教遂自剄太子聞之馳往伏尸而哭極哀既已不可奈何乃遂盛樊於期首函封之於是太子豫求天下之利匕首得趙徐夫人匕首取之百金使工以藥焠之以試人血濡縷人無不立死者乃裝為遣荆卿燕國有勇士秦舞陽年十三殺人人不敢忤視乃令秦舞陽為副荆軻有所待欲與俱其人居逺未來而為治行頃之未發太子遲之疑其改悔乃復請曰日已盡矣荆卿豈有意哉丹請得先遣秦舞陽荆軻怒叱太子曰何太子之遣往而不反者豎子也且提一匕首入不測之彊秦僕所以留者待吾客與俱今太子遲之請辭决矣遂發太子及賓客知其事者皆白衣冠以送之至易水之上既祖取道高漸離擊筑荆軻和而歌為變徵之聲士皆垂淚涕泣又前而歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髮盡上指冠於是荆軻就車而去終已不顧遂至秦持千金之資幣物厚遺秦王寵臣中庶子蒙嘉嘉為先言於秦王曰燕王誠振怖大王之威不敢舉兵以逆軍吏願舉國為內臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期之頭及獻燕督亢之地圗函封燕王拜送於庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賓見燕使者咸陽宫荆軻奉樊於期頭函而秦舞陽奉地圖匣以次進至陛秦舞陽色變振恐羣臣怪之荆軻顧笑舞陽前謝曰北蕃蠻夷之鄙人未嘗見天子故振懾願大王少假借之使得畢使於前秦王謂軻曰取舞陽所持地圖軻既取圖奏之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶拔劒劒長操其室時惶急劒堅故不可立拔荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下非有詔召不得上方急時不及詔下兵以故荆軻乃逐秦王而卒惶急無以擊軻而以手共搏之是時侍醫夏無且以其所奉藥囊提荆軻也秦王方環柱走卒惶急不知所為左右乃曰王負劒負劒遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以擲秦王不中中銅柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕倨以罵曰事所以不成者以欲生劫之必得約契以報太子也於是左右既前殺軻秦王不怡者良久已而論功賞羣臣及當坐者各有差而賜夏無且黃金二百鎰曰無且愛我乃以藥囊提荆軻也於是秦王大怒益發兵詣趙詔王翦軍以伐燕十月而拔薊城燕王喜太子丹等盡率其精兵東保於遼東秦將李信追擊燕王急代王嘉乃遺燕王喜書曰秦所以尤追燕急者以太子丹故也今王誠殺丹獻之秦王秦王必解而社稷幸得血食其後李信追丹丹匿衍水中燕王乃使使斬太子丹欲獻之秦秦復進兵攻之後五年秦兵滅燕虜燕王喜其明年秦并天下立號為皇帝於是秦逐太子丹荆軻之客皆亡高漸離變名姓為人庸保匿作於宋子久之作苦聞其家堂上客擊筑倣徨不能去每出言曰彼有善不善從者以告其主曰彼庸乃知音竊言是非家丈人召使前擊筑一坐稱善賜酒而高漸離念久隱畏約無窮時乃退出其裝匣中筑與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使擊筑而歌客無不流涕而去者宋子傳客之聞於秦始皇秦始皇召見人有識者乃曰高漸離也秦始皇惜其善擊筑重赦之乃矐其目使擊筑未嘗不稱善稍益近之高漸離乃以鉛置筑中復進得近舉筑朴秦皇帝不中於是遂誅高漸離終身不復近諸侯之人魯句踐已聞荆軻之刺秦王私曰嗟乎惜哉其不講於刺劒之術也甚矣吾不知人也曩者吾叱之彼乃以我為非人也史記論曰豫讀荆卿傳嘗恨其不與所待客俱客為誰不可知也顧其時高漸離在其不與俱而待所待客何邪漸離副軻事其濟乎雖然政死而扶蘇立墨衰絰趣信翦奮以擊燕燕不立碎乎濟不濟皆所以速亡燕軻豈僅以劒術疏哉軻之匕首固不逮漸離之筑也而狗屠其人者為誰又不可知也燕亂臣傳子之市被附子之者王噲之相也蘇秦在燕與子之為婚而蘇代與子之交王噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以尊子之也於是燕王大信子之子之因遺蘇代百金而聽其所使鹿毛夀謂燕王不如以國讓相子之人之謂堯賢者以其讓天下於許由許由不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益已而以啓人為吏及老而以啓人為不足任乎天下傳之於益己而啓與交黨攻益奪之天下謂禹名傳天下於益己而實令啓自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印自三百石吏以上而效之子之子之南面行王事而噲老不聽政顧為臣國事皆决於子之三年國大亂百姓恫恐將軍市被與太子平謀將攻子之諸將謂齊湣王曰因而赴之破燕必矣齊王因令人謂燕太子平曰寡人聞太子之義將廢私而立公飭君臣之義明父子之位寡人之國小不足以為先後雖然則唯太子所以令之太子因要黨聚衆將軍市被圍公宫攻子之不克將軍市被及百姓反攻太子平將軍市被死以徇因搆難數月死者數萬衆人恫恐百姓離志孟軻謂齊王曰今伐燕此文武之時不可失也王因令章子將五都之兵以因北地之衆以伐燕士卒不戰城門不閉燕君噲死齊大勝燕子之亡二年而燕人共立太子平是為燕昭王史記太子平是役死昭王非平詳燕世家尚史卷六十五
