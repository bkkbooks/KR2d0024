body:
  text: 尚史卷十七世家十鑲白旗漢軍李鍇撰吳世家始武王十三年終元王四年凡六百五十年傳三十世太伯仲雍周章吳太伯弟仲雍太王之子王季歷之兄也季歷賢而有聖子昌太王欲立季歷以及昌於是太伯仲雍二人乃奔荆蠻斷髮文身示不可用以避季歷韓詩外傳太王賢昌而欲季為後也太伯去之吳太王將死謂曰我死汝往讓兩兄彼即不來汝有義而安太王薨季之吳告吳伯伯仲從季而歸羣臣欲伯之立季季又讓伯謂仲曰何以處之仲曰刑有所謂矣要于扶微者可以立季季遂立孔子曰太伯獨見王季獨知伯見父志季知父心故太王太伯王季可謂見始知終而能承志矣論衡太王薨太伯還季歷三讓不可季歷立是為王季應劭曰常在水中故斷其髮文其身以象龍子故不見傷害太伯之奔荆蠻自號勾吳正義太伯居梅里荆蠻義之從而歸之千餘家立為吳太伯韋昭注武王追封為吳伯故曰吳太伯太伯卒皇覽冡在吳縣北梅里聚去城十里無子弟仲雍立是為吳仲雍仲雍卒吳地志仲雍冡在吳鄉常熟縣西海虞山上與言偃冡並列子季簡立季簡卒子叔達立叔達卒子周章立是時武王克殷求太伯仲雍之後得周章周章已君吳因而封之又封周章弟虞仲于周之北故夏墟在河東太陽縣是為虞仲列為諸侯周章卒子熊遂立熊遂卒子柯相立柯相卒子彊鳩夷立彊鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗高立頗高卒子句卑立是時晉獻公滅周北虞公以開晉伐虢也句卑卒子去齊立去齊卒子夀夢立夀夢立而吳始益大稱王自太伯祚吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅而夷蠻之吳興凡十九世至夀夢又六世而滅吳史記丗家壽夢壽夢元年魯成公六年也吳初屬楚夀夢既即位楚殺巫臣之族巫臣自晉使于吳夀夢說之乃通吳于晉左傳林堯叟注先是吳自安僻陋未嘗與中國相通至是巫臣因楚乃始通晉以兩之一卒來舍偏兩之一焉司馬法百人為卒二十五人為兩車九乘為小偏十五乘為大偏蓋留車九乘及一兩二十五人令吳習之與其射御教吳乘車教之戰陳教之叛楚置其子狐庸使為行人于吳吳始伐楚伐巢伐許巢徐楚屬國蠻夷屬于楚者吳盡取之是以始大通吳于上國二年成七年我入州來楚邑十年成十五年我會諸侯之大夫晉魯齊宋衛鄭邾于鍾離楚邑吳越春秋夀夢元年朝周適楚觀諸侯禮樂魯成公㑹于鍾離深問周公禮樂因歎而去曰於乎哉禮也元年誤朝周適楚亦未聞十五年襄二年秋九月簡王崩靈王立十六年襄三年楚公子嬰齊伐我為簡之師簡選練也克我鳩兹至于衡山使鄧廖帥組甲三百被練三千組甲漆甲成組文被練練袍也以侵我我要而擊之獲鄧廖其能免者組甲八十被練三百而已嬰齊歸我伐駕取駕駕良邑也鄧廖亦楚之良也吳越春秋十六年楚共王怨吳為巫臣伐之也乃伐吳至衡山而還夏六月晉㑹諸侯同盟于雞澤使逆吳子于淮上吳子不至十八年襄五年我㑹諸侯晉魯宋陳衛鄭曹莒邾滕薛齊鄫于戚二十三年襄十年我㑹諸侯晉魯宋衛曹莒邾滕薛杞小邾齊于柤二十五年襄十二年秋九月吳子薨左傳在位二十五年夀夢子四曰諸樊餘祭夷昧季札諸樊諸樊名遏壽夢之子也壽夢薨諸樊即位諸樊元年襄十三年楚共王卒我侵楚戰于庸浦大敗我師獲公子黨我告敗于晉二年襄十四年諸侯之大夫前諸侯㑹我于向諸樊既除喪將立季札季札辭固立之棄其室而耕乃舍之秋楚師于棠以伐我我不出而還我自臯舟之隘要而擊之敗楚師獲其公子宜榖十二年襄二十四年楚為舟師以伐我無功而還冬我召舒鳩人叛楚舒鳩楚屬國十三年襄二十五年舒鳩叛楚楚伐之我救之大敗我師遂滅舒鳩冬十二月諸樊伐楚門于巢巢牛臣射之薨左傳在位十三年餘祭餘祭號戴吳壽夢之子也諸樊薨餘祭即位餘祭元年襄二十六年楚秦侵我及雩婁聞我有備而還三年襄二十八年齊慶封來奔與之朱方冬十二月靈王崩景王立四年襄二十九年使公子札如魯聘夏五月閽弒吳子餘祭吳嘗伐越獲俘焉以為閽使守舟餘祭觀舟閽以刀弒之左傳在位四年夷末夷末號餘昧又號句餘亦壽夢之子也餘祭弒夷末即位二年襄三十一年使屈狐庸聘于晉巫臣之子三年昭元年莒展輿來奔六年昭四年楚以諸侯伐我克朱方殺齊慶封冬我伐楚入棘櫟麻並楚邑七年昭五年楚子以諸侯及東夷伐我我敗其偏師于鵲岸楚師及汝清楚界我不可入楚子觀兵于坻箕之山而還八年昭六年楚伐徐我救之楚伐我我敗其師于房鍾獲宮厩尹鬬棄疾十四年昭十二年楚伐徐明年楚弒靈王師還自徐我敗諸豫章獲蕩侯潘子司馬裻嚻尹午陵尹喜五帥冬我滅州來十七年昭十五年春正月夷末薨左傳在位十七年吳王僚吳王僚號州于夷末之子也先儒以為諸樊之弟誤夷末薨王僚即位二年昭十七年我伐楚戰于長岸楚大敗我師獲我乘舟餘皇公子光師夜從之大敗楚師取餘皇以歸七年昭二十二年夏四月景王崩子朝作亂悼王既立而崩敬王立楚人復城州來八年昭二十三年我伐州來楚及諸侯之師奔命救州來我禦諸鍾離敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧大夫楚師大奔楚大子建之母在郥楚邑召我而啓之冬十月大子諸樊入郥諸樊王僚之子名同前誤取楚夫人與其寶器以歸九年昭二十四年我滅巢及鍾離史記吳之邊邑卑梁與楚邊邑鍾離小童爭桑兩家交怒相攻滅卑梁人卑梁大夫怒發邑兵攻鍾離楚王聞之怒發國兵滅卑梁吳王聞之大怒亦發兵使公子光因建母家攻楚遂滅鍾離居巢楚乃恐而城郢吕氏春秋略同按傳城郢在滅巢之前史誤十一年昭二十六年敬王入于成周子朝奔楚十二年昭二十七年我伐楚圍濳楚邑夏四月公子光弒王僚左傳在位十二年吳王闔廬吳王闔廬名光諸樊之子也初為羣公子楚之殺伍奢也其子貟來奔貟言伐楚之利公子光曰是宗為戮而欲反其讐不可從也貟曰彼將有他志乃見鱄設諸于光長岸之役也楚大敗我師獲乘舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命公子光請于其衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潜伏于舟側長鬛類楚人曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂我大敗之取餘皇以歸雞父之役也我伐州來楚以頓胡沈蔡陳許之師奔命救州來我禦諸鍾離楚令尹陽丐卒楚師熸大滅為熸軍主亡故軍人無復氣勢公子光曰諸侯從于楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子從之七月戊辰晦遣兵忌晦戰擊楚所不意戰于雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以擊于後中軍從王光帥右掩餘帥左吳之罪人或奔或止三國亂我師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔王僚十二年昭二十七年我伐楚使公子掩餘公子燭庸圍潛使季札聘于上國光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之諸樊兄弟相傳欲以及季札季札不受宜及諸樊之子故云事若克季子雖至不吾廢也夏四月光伏甲于堀室而享王遂弒王僚掩餘奔徐燭庸奔鍾吾光即位是為闔廬闔廬三年昭三十年闔廬使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚大封而定其徙闔廬怒執鍾吾子遂伐徐防山以水之滅徐徐子章禹斷其髮携其夫人以逆闔廬闔廬唁而送之使其邇臣從之遂奔楚四年昭三十一年我侵楚伐夷侵潛六楚救潜我師還我師圍弦楚救弦及豫章我師還用伍貟之謀也五年昭三十二年我伐越七年定二年桐叛楚闔廬使舒鳩氏誘楚人桐舒鳩並楚屬國曰以臨我我伐桐為我使之無忌教舒鳩誘楚人以臨吳吳僞若畏楚師臨已伐其叛國以取媚欲使楚不忌楚果伐我師于豫章我見舟于豫章僞將伐桐而潜師于巢軍楚師于豫章敗之遂圍巢克之獲楚公子繁九年定四年楚圍蔡蔡侯唐侯因闔廬伐楚舍舟于淮汭自豫章與楚夾漢楚令尹囊瓦濟漢而陳自小别至于大别三戰囊瓦欲奔冬十一月二師陳于柏舉我師擊之楚師亂大敗之五戰入郢楚子奔隨我師從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰于楚而君又竄之周室何罪君若惠顧周室施及寡人以將天衷君之惠也漢陽之田君實有之隨人卜與之不吉乃辭我曰以隨之僻小而密邇于楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聽命我師乃退吕氏春秋闔廬選多力五百人利趾者三千人以為前陳與荆戰五戰五勝遂有郢東征至于庳廬西伐至巴蜀北道齊晉令行中國新論闔廬習武試其民于五湖劒皆加肩流血不肯止十年定五年越入我夏秦師救楚大敗我師于沂楚地又敗我師于軍祥亦楚地遂滅唐秋九月夫暨王歸自立與闔廬戰而敗奔楚我師敗楚師于雍澨秦師又敗我師焚我師于麇又戰于公壻之溪我師大敗闔廬乃歸吳越春秋闔廬立夫差為太子使太子屯兵守楚留止自治宫室立射臺于安里華池在平昌南城宫在長安闔廬出入游卧秋冬治城中春夏治城外治姑蘇之臺旦食組山晝游蘇臺射于鷗陂馳于游臺興樂石城走犬長洲越絶書闔廬宫在高平里射臺二一在華池昌里一在安陽里南越宫在長樂里東到春申君府秋冬治城中春夏治姑胥之臺旦食紐山晝游胥母射于鷗陂馳于游臺興樂辟塞者吳備候塞也居東城者所游城也柴碎亭到語兒就李吳侵以為戰地者也麋湖城者所置麋也欐溪城者所置船宫也閶門外郭中冡巫門外冡者氷室也婁門外雞陂墟所畜雞使李保養之者也胥門外九曲路以游姑胥之臺以望大湖中窺百姓者也巫欐城者所置諸侯逺客離城也撫侯山者治以諸侯冡次者也古城者所置美人離城也述異記木蘭洲在潯陽江中多木蘭樹吳王闔閭植用構宫殿十九年定十四年夏五月我伐越陳于檇李大敗我師闔廬傷將指還薨于陘左傳在位十九年越絶書闔廬冡在閶門外虎邱下池廣六十步水深丈五尺銅槨三重墳池六尺玉鳬之流扁諸之劒三千方圎之口三千時耗魚腸之劒在焉千萬人築治之取土臨湖口築三日而白虎居上故號虎邱述異記闔廬夫人墓中周回八里别館洞房迤邐相屬漆燈照爛如日月金蠶玉燕各千餘隻夫差夫差闔廬之子也夫差既立使人立于庭茍出入必謂已曰夫差而忘句踐之殺而父乎則對曰唯不敢忘三年哀二年楚圍蔡師還蔡請遷于我二月夫差敗越于夫椒吳地遂入越越行成我及越平闔廬之入郢也召陳侯陳侯不至是年秋侵陳冬泄庸如蔡聘遂遷蔡于州來七年哀六年我伐陳楚子救陳卒于城父八年哀七年夫差㑹魯侯于鄫秋魯伐邾以邾子歸邾茅夷鴻請救于我九年哀八年我伐魯克武城又克東陽而進遂次于泗上我行成及魯盟而還夏齊使來請伐魯魯懼乃歸邾子邾子又無道夫差討之立其大子革十年哀九年齊侯使辭師于我辭伐魯之師夫差曰昔我寡人聞命今又革之不知所從將進受命于君城䢴溝通江淮冬使如魯警師伐齊十一年哀十年夫差㑹魯侯郯子伐齊南鄙師于鄎齊人弒悼公赴于師夫差三日哭于軍門之外大夫徐承帥舟師將自海入齊齊人敗之我師乃還秋復使魯警師冬楚伐陳公子札救陳十二年哀十一年復會魯伐齊中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍夏五月克博至于嬴並齊邑戰于艾陵大敗齊師獲國書公孫夏閭邱明陳書東郭書革車八百乘甲首三千以獻于魯左傳淮南子艾陵之戰也夫差曰夷聲陽句吳其庶乎使行人奚斯釋言于晉釋言以辭自解也曰寡人帥不腆吳國之伇伇卒也遵汶之上不敢左右唯好之故今大夫國子興其衆庶以犯獵吳國之師徒天若不知有罪則何以使下國勝國語反役賜伍貟死十三年哀十二年夫差㑹魯侯于槖臯復徵㑹于衛秋㑹衛侯于鄖十四年哀十三年夏夫差㑹周單子晉侯魯侯于黃池六月越伐我大敗我師獲大子友入我我告敗于夫差夫差惡其聞也自剄七人于幕下秋七月及晉魯盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯卒先晉人榖梁吳夷狄之國也祝髮文身欲因魯之禮因晉之權而請冠端而襲其籍于成周以尊天王吳王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也國語吳王㑹晉于黃池于是越襲吳邊遽至以亂告吳王懼合大夫而謀曰無㑹而歸與㑹而先晉孰利王孫雄曰必㑹而先之吳王昏乃戒令秣馬食士夜中令服兵擐甲係馬舌出火竈陳士卒百人以為徹行百行行頭皆官帥􅗙鐸拱稽建肥胡奉文犀之渠十行一嬖大夫建旌提鼓挾經秉枹十旌一將軍載常建鼓挾經秉枹為萬人以為方陳皆白常白旗素甲白羽之矰望之如荼王親秉鉞載白旗以中陳而立左軍亦如之皆赤常赤旟丹甲朱羽之矰望之如火右軍亦如之皆𤣥常𤣥旗黑甲烏羽之矰望之如墨為帶甲三萬以勢攻雞鳴乃定既陳去晉軍一里昧明王乃秉枹親就鳴鐘鼓丁寧錞于振鐸勇怯盡應三軍皆譁扣以振旅其聲動天地晉師大駭不出周軍飭壘乃令董褐請事曰兩君偃兵接好日中為期今大國越録而造敝邑之軍壘敢請亂故吳王親對之曰天子有命周室卑弱貢獻莫入無姬姓之振也君今非王室不安平是憂億負晉衆庶不式諸戎翟楚秦將不長弟以力征一二兄弟之國孤欲守吾先君之班爵進則不敢退則不可今㑹日薄矣恐事之不集以為諸侯笑孤之事君在今日不得事君亦在今日董褐將還王稱左畸曰攝少司馬兹與王士五人坐于王前皆進自􅤏于客前以酬客董褐既致命乃告趙鞅曰臣觀吳王之色類有大憂小則嬖妾嫡子死大則越入吳將毒不可與戰主其許之趙鞅乃令董褐復命曰曩君之言周室既卑諸侯失禮于天子孤以下密邇于天子無所逃罪今君掩王東海以淫名聞于天子君有短垣而自踰之况蠻荆則何有于周室夫命圭有命固曰吳伯不曰吳王君若無卑天子以干其不祥而曰吳公孤敢不順從君命長弟許諾吳王乃退就幕而㑹吳公先㰱晉侯亞之夫差將以魯侯見晉侯魯子服何說之乃止既而悔之囚子服何夫差欲伐宋殺其丈夫而囚其婦人太宰嚭不可乃歸越及我平十六年哀十五年楚伐我陳使來弔十七年哀十六年孔子卒夏我伐慎楚邑白公勝敗我師十八年哀十七年越伐我夫差禦之笠澤夾水而陳越子為左右句卒使夜或左或右鼓噪而進我師分以禦之越子以三軍潜涉當我中軍而鼓之我師大亂遂敗說苑越王不墮舊冡而吳人服冬敬王崩元王立二十一年哀二十年越圍我二十三年哀二十二年越滅我使夫差居甬東辭曰孤老矣焉能事君乃縊越人以歸以其尸歸左傳國語夫差行成曰寡君之師徒不足以辱矣請以金玉子女賂君之辱句踐曰昔天以越賜吳而吳不受今天以吳賜越越可以無聼乎請達王甬句東吾與君為二君乎夫差曰寡人禮先一飯矣君若不忘周室而為敝邑宸宇亦寡人之願也君若曰將殘汝社稷滅汝宗廟寡人請死又曰使死者無知則已矣若其有知吾何面目以見貟也遂自殺越絶書范蠡數吳王曰王有過五殺忠臣伍子胥公孫聖大過者二齊無罪伐之大過者三越王繫于天皇之位而使其芻莖秩馬比于奴虜大過者四宰嚭讒諛聼而用之大過者五吳王曰聞命矣以帛置吾目吾慚見伍子胥公孫聖又曰夫差冡在猶高西卑猶位越王候干戈人一纍土以葬之近太湖拾遺記越謀滅吳矯以江南億萬輸吳為庸保又有美女夷光修明以貢于吳處以椒華之宫貫細珠為簾幌二人當軒並坐竊窺者謂之神人及越兵入國乃抱二女以逃吳苑述異記吳王築姑蘇之臺三年乃成上立春宵宫作長夜飲作天池池中造青龍舟與西施為水嬉于宫中作海靈宫館娃閣銅溝玉檻梧桐宫在吳宫一名鳴琴川又曰香水溪西施浴處史記西施越之美女以獻于吳吳王幸之每入市人願見者先輸金錢一文孟子注疏引今本無吳越春秋吳亡後越浮西施于江令隨鴟夷以終墨子西施之沈其美也修文御覽引夫差在位二十三年而滅贊曰闔廬多智卒踐所求及乎水徐肄楚五戰入郢威且立矣又承之以夫差報越破齊㑹盟上國當是時吳幾伯嗟夫使其循道樹德引翼王室詎知太伯之裔不遂祚周乎乃養癰于越食毒宰嚭我所以罷楚者轉授之越威削知奪垂翼海東天呼人與明夷之上六有之夷其明傷也越世家敬王二十四年句踐始立終顯王四十八年凡百七十六年無餘至允常系年莫考自句踐至無疆傳七丗無餘無壬無䁺夫談允常句踐鼫與不壽王翳王之侯王無疆越禹之苗裔也或謂越祝融之後芈姓史伯告鄭桓公曰芈姓䕫越不足命也禹行天下還歸大越崩而葬焉至少康恐禹迹宗廟祭祀之絶乃封其庶子于越號曰無餘無餘始受封人民山居雖有鳥田之利地理志山上有禹井禹祠相傳下有羣鳥耘田水經注鳥為之耘春拔草根秋啄其穢租貢才給宗廟祭祀之費乃復隨陵陸而耕種賀循㑹稽記少康少子號曰于越越國之稱始此越絶書無餘都㑹稽山南故越城是也無餘傳世十餘末君微劣不能自立禹祀斷絶十有餘載有人生而言語曰我無餘君之苗末衆民喜悅共封立之以承越後號曰無壬無壬生無䁺無䁺卒或為夫談輿地志越傳國三十餘葉歷殷至周敬王時有越侯夫談夫談生允常越之興自允常始吳越春秋允常之時與吳王闔廬戰而相怨伐允常卒子句踐即位是為越王元年魯定公之十四年也吳王闔廬聞允常死乃興師伐越越王句踐使死士挑戰三行至吳陳呼而自剄吳師觀之越因襲擊吳師吳師敗于檇李射傷吳王闔廬闔廬且死告其子夫差曰必母忘越四年哀二年句踐聞吳日夜勒兵且以報越欲先吳未發往伐之范蠡諫曰不可句踐曰吾已决之矣遂興師吳王聞之悉發精兵擊越敗我于夫椒句踐乃以餘兵五千人保棲于㑹稽吳王追而圍之句踐謂范蠡曰以不聼子故至于此為之奈何對曰持滿者與天定傾者與人節事者與地卑辭厚禮以遺之不許而身與之市句踐曰諾乃令大夫種行成于吳吳不許種還報句踐句踐欲殺妻子燔寶器觸戰以死種曰吳太宰嚭貪可誘以利請間行言之于是句踐乃以美女寶器令種間獻吳太宰嚭嚭乃見大夫種于吳王因說吳王曰越以服為臣若將赦之此國之利也吳王將許之伍貟諫弗聼卒赦越史記世家夫差與越成句踐說于國人曰寡人不知其力之不足也而又與大國執讐以暴露百姓之骨于中原此寡人之罪也寡人請更于是葬死者問傷者養生者弔有憂賀有喜送往者迎來者去民之所惡補民之不足然後卑事夫差宦士三百人于吳其身親為夫差前馬國語韓非子句踐入官于吳身執干戈為吳王洗馬句踐之困㑹稽也喟然歎曰吾終于此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由此觀之何遽不為福乎句踐既反國乃苦身焦思置膽于坐坐卧即仰膽飲食亦嘗膽曰女忘㑹稽之恥邪史記世家句踐之地南至于句無北至于禦兒東至于鄞西至于姑蔑廣運百里乃致其父兄昆弟而誓之曰寡人聞古之賢君四方之民歸之若水之歸下也今寡人不能將帥二三子夫婦以蕃命壯者無取老婦老者無取壯妻女子十七不嫁丈夫二十不取其父母有罪將免者以告公令醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼當室者死三年釋其政支子死三月釋其政必哭泣葬埋之如其子令孤子寡婦疾疹貧病者納宦其子其達士潔其居美其服飽其食而摩厲之于義四方之士來者必朝禮之句踐載稻與脂于舟以行國之孺子之游者無不餔無不啜以問其名非身之所種不食非夫人之所織不衣國語吕氏春秋越王苦㑹稽之恥內親羣臣下養百姓以求其心有甘脆不足分弗敢食有酒流之江與民同之身親耕而食妻親織而衣時出行路從車載食以親孤寡老弱之漬病困窮顔色愁悴不贍者必身自食之吳越春秋句踐臣吳至歸越句踐七年也王曰寡人欲築城立郭分設里閭于是范蠡乃築作小城周千一百二十一步西北主龍飛翼之樓象天門東南伏漏石竇象地戶陵門四達象八風城成而怪山自生者琅琊東武海中山也范蠡曰臣之築城其應天矣崑崙之象存焉天地卒號以著其實名東武起游臺其上東南為司馬門立增樓冠其山巔以為靈臺起離宫于淮陽宿臺在高平駕臺在成邱立苑于樂野燕臺在石室齊臺在襟山句踐之出遊也休息食室于氷厨越王乃升明堂立政翼翼小心出不敢奢入不敢侈王念復吳讐乃苦身勞心夜以接日目卧則攻之以蓼足寒則漬之以水冬常氷夏常握火懸膽于户出入嘗之中夜潜泣泣而復嘯又曰越王既棲㑹稽范蠡等曰臣竊見㑹稽之山有魚池上下二處水中有三江四瀆之流九溪六谷之廣上池宜于君王下池宜于臣民畜魚三年國當富盈今本無越絶書㑹稽山上城者句踐與吳戰敗棲其中因以下為目魚池又曰句踐將降西至浙江待詔入吳故有雞鳴墟又曰女陽亭者句踐入官于吳夫人從道産女此亭養于李鄉句踐勝吳更名女鄉更就李為語兒鄉又曰龜山者句踐起怪遊臺也車南司馬門因以照龜又仰望天氣觀天怪也高四十六丈周五百三十二步一曰怪山怪山者一夜自來故謂怪山樂野者越之弋獵處其山上石室句踐所休謀也東郭外南小城者句踐氷室句踐之出入也齊于稷山往從田里去從北郭門照龜龜山更駕臺馳于離邱遊于美人宫興樂中宿過歷馬邱射于樂野之衢走犬若邪休謀石室食于氷厨領功銓土已作昌土臺藏其形隱其情一曰氷室者所以備羞膳也北郭外路南溪北城者築鼓鐘宫也姑中山者銅官之山也越人謂之銅姑瀆長二百五十里朱餘者鹽官也越人謂鹽曰餘官瀆者工官也富中大塘者治以為義田為肥饒謂之富中拾遺記初越王入國有丹烏夾王而飛故句踐入國起望烏臺范蠡相越日致千金家僮間算術者萬人收四海難得之貨以為器銅鐵之類積如山阜或藏之井塹謂之寶井奇容麗色溢于閨房謂之游宫句踐欲使范蠡治國政蠡對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種于是舉國政屬大夫種而使范蠡與大夫諸稽郢行成于吳句踐自㑹稽歸七年拊循其士民士民欲用以報吳大夫逢同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之擊也必匿其形今吳兵加齊晉怨深于楚越名高天下實害周室德少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也句踐曰善吳越春秋越王曰吳王好服之離體吾欲采葛織布獻之乃使國中男女采葛作黃絲之布未及遣使吳王賜之書增之以封東至勾甬西至檇李南至姑末北至平原縱橫八百里越王乃索葛布十萬甘蜜九瓽文笥七枚狐皮五雙晉竹十廋以復封禮吳王得獻乃復增越之封賜羽毛之飾九枚諸侯之服采葛之婦傷越王用心之苦乃作苦之詩詩俚惡不足録越絶書葛山者句踐罷吳種葛使越女織布獻于吳犬山者畜犬獵南山白鹿獻吳故曰犬山其高為大亭六山者句踐鑄銅鑄銅不爍埋之東坂其上馬箠句踐遣使取于南社徙種六山飾治為馬箠獻之吳又曰邱土城句踐所習教美女西施鄭旦宫臺也女出苧蘿山欲獻于吳恐朴陋故近大道居又曰麻林山一名多山句踐欲伐吳種麻以為弓弦使齊人守之越謂齊人多故曰麻林多以防吳以山下田封功臣射圃者句踐習兵處也射卒陳音死葬民西故曰陳音山獨婦山者句踐將伐吳徙寡婦致獨山上以為死士示得專一也防塢者越以遏吳軍也雞山豕山者畜雞豕將伐吳以食士也浙江南路西城者范蠡敦兵城也其陵固可守謂之固陵舟室者船宫也石塘者越所害軍船也杭塢者句踐杭也巫里句踐所徙巫為一里巫山者越􅸾神巫之官也死葬其上江東中巫葬者越神巫無社子孫也死句踐于中江葬之巫神欲使覆禍吳人船又曰句踐反國六年皆得士民之衆而欲伐吳于是使之維甲維甲者治甲系斷修內矛赤雞稽繇者也越人謂人鎩也方舟航買儀塵者越人往如江也治須慮者越人謂船為須慮亟怒紛紛者怒貌也怒至士擊高文者躍勇士也習之于夷夷海也宿之于菜菜野也致之于單單者堵也述異記句踐得范蠡之謀乃示民以耕桑延四方之士作臺于外而館賢士今㑹稽山有越王臺今交州麻林一名紵林句踐種麻將以弦弓糠頭山句踐貯米于其上舂積糠為山㑹稽之上有鑄劒洲箭鏃洲往往得箭鏃拾遺記越王使工人桐昆吾之神採金鑄八劍一掩日二斷水三轉魄四懸翦五驚鯢六滅魂七郤邪八真剛以切玉斷金如削土木韓非子越王入宦于吳勸之伐齊以弊吳吳兵既勝于艾陵張之于江濟強之于黃池故可制于五湖居二年哀十二年吳伐齊敗之艾陵大夫種曰臣觀吳王政驕矣請貸粟以卜其事請貸吳王與之越乃私喜吳既殺伍貟任嚭政居三年哀十三年吳王北㑹諸侯于黃池吳精兵從王惟老弱與大子留守史記世家而越十年不收于國民居有三年之食國之父兄請曰昔夫差恥吾君今越國亦節矣請報之辭曰昔者之戰寡人之罪也姑無庸戰父兄又請句踐許之乃致其衆而誓之曰寡人聞古之賢君不患衆之不足而患其志行之少恥也今夫差衣水犀之甲者億有三千不患其志行之少恥而患其衆之不足也今寡人將助天滅之吾不欲匹夫之勇也欲其旅進旅退也進則思賞退則思刑乃發習流二千教士四萬人君子六千人諸御千人伐吳國人皆勸父勉其子兄勉其弟婦勉其夫故敗吳于囿又敗之于沒又郊敗之國語吳告急于王王祕之已盟黃池乃使人厚禮以請成越越自度亦未能滅吳乃與吳平韓非子越伐吳乃先宣言曰吳王築如皇之臺掘深池罷苦百姓煎靡財貨余為民誅之又曰越王問大夫種曰伐吳可乎對曰君欲知之試焚宫室于是焚宫室下令曰救火者死比死敵之賞救火而不死者比勝敵之賞不救火者比北降之罪人塗其體被濡衣而赴火者左三千人右三千人又曰越王見怒蛙而式之御者曰何為曰蛙有氣是嵗人有自剄死以頭獻者故越王將復吳試燔臺而鼓之使民赴火者賞在火也臨江而鼓之使人赴水者賞在水也臨戰而使人絶頭刳腹而無顧者賞在兵也墨子越王好士之勇焚舟失火試其士曰越國之寶盡在此親自鼓其士而進之士聞鼓音破碎亂行蹈火而死者左右百人有餘越王擊金而退之淮南子越王一决獄不辜援龍淵而切其股血流至足以自罰而戰武士必其死其後四年哀十二年越復伐吳吳士民罷弊輕鋭盡死于齊晉而越大破吳因而留圍之三年吳師敗越遂復棲吳王于姑蘇之山吳王使王孫雄肉袒膝行而前請成句踐不忍欲許之范蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎謀之二十二年一旦而棄之可乎句踐曰吾欲聽子言吾不忍其使者范蠡乃鼓進兵曰王已屬政于執事使者去不者且得罪吳使者泣而去句踐憐之乃使人謂吳王曰吾置王甬東君百家吳王謝曰吾老矣不能事君王遂自殺越絶書安城里高庫者句踐禽夫差以為勝兵築庫高閣之周二百三十步句踐已平吳乃以兵北渡淮與齊晉諸侯㑹于徐州致貢于周周元王使人賜句踐胙命為伯句踐已去渡淮南以淮上地與楚歸吳所侵宋地于宋與魯泗東方百里當是時越兵橫行于江淮東諸侯畢賀號稱霸王越絶書句踐平吳春祭三江秋祭五湖因以其時為之立祠于是度兵徐州致貢周室沛歸于宋浮陵以付楚臨期開陽復之于魯越專其功故曰越絶說苑句踐與吳戰大敗之兼有九夷近臣三逺臣五令曰聞吾過而不告者其罪刑水經注琅琊山名越王句踐之故國句踐并吳欲霸中國徙都琅琊紀年晉出公七年於越徙都琅琊越絶書句踐伐吳霸關東從琅琊起觀臺以望東海孔子從弟子奉雅琴治禮往奏句踐不可孔子辭按紀年越絶二說謬是時晉久亡孔子亦前卒吳越春秋越王使人如木客之山取元常之喪欲徙葬琅琊三穿元常之墓墓中生熛風飛砂石人莫能入遂置而去句踐乃號令齊楚秦皆輔周室秦桓公不如命句踐乃攻秦秦引咎乃還軍人作河梁之詩說亦謬秦桓公亦久卒淮南子越王句踐􅗴髮文身無皮辨搢笏之服拘罷拒折之容然而勝夫差于五湖南面而霸天下泗上十二諸侯皆率九夷以朝韓詩外傳越王使亷稽獻民于荆王荆王使者曰越夷狄之國也臣請欺其使者荆王曰越王賢人也子慎之使者出見曰冠則得見不冠不得見廉稽曰夫越周室之列封也不得處于大國而處江海之陂文身翦髮今來至上國必曰冠得見不冠不得見如此則上國使適越亦將劓墨文身翦髮而後得見可乎荆王聞之被衣出謝說苑越使諸發執一枝梅遺梁王餘說同梁王見春秋後說誤吕氏春秋客有以吹籟見越王上下宫商和而王不喜或為之野者而王說之新論越王退吹籟之音而好鄙野之聲句踐薨吳越春秋句踐寢疾謂太子夷興曰吾自禹之後承元常之德從窮越之地以摧吳跨江涉淮自致于斯夫霸者之後難以久立慎之哉遂卒新書范蠡負石而蹈五湖大夫種䋢領謝室渠如處車裂回泉自此之後句踐不樂憂悲薦至內崩而死子王鼫與即位紀年于粵子句踐卒次鹿郢立六年卒樂資云越語謂鹿郢為鼫與王鼫與薨子王不夀即位王不壽薨紀年不夀立十年見殺是為盲姑次朱勾立子王翁即位王翁薨紀年朱勾三十四年滅滕三十五年滅郯三十七年朱勾卒子王翳即位吕氏春秋越人三弒其君子搜患之逃乎丹穴不肯出越人薰之以艾乘以王輿淮南子子搜越王翳也王翳薨子王之侯即位紀年翳三十三年遷于吳三十六年七月太子諸咎弒其君翳十月粵殺諸咎粵滑吳人立孚錯枝為君明年大夫寺區定粵亂立初無余之十二年寺區弟思弒其君莽安次無顓立無顓八年薨是為菼燭卯樂資云號曰無顓蓋無顓後乃次無疆也則王之侯即無余之也王之侯薨子玉無疆即位王無疆時越興師北伐齊西伐楚與中國爭強當楚威王時越北伐齊齊威王使人說越王曰越不伐楚大不王小不伯圖越之所為不伐楚者為不得晉也韓魏固不攻楚韓之攻楚覆其軍殺其將則葉陽翟危魏亦覆其軍殺其將則陳上蔡不安故二晉之事越也不至于覆軍殺將馬汗之力不效所重得于晉者何也言韓魏與楚鄰今令越合于二晉以伐楚然所以重得二晋者何故越王曰所求于晉者不至頓刃接兵而况于攻城圍邑乎願魏以聚大梁之下願齊之試兵南陽莒地以聚常郯之境則方城之外不南淮泗之間不東商於析酈宋胡之地夏路以左不足以備秦江南泗上不足以待越矣則齊秦韓魏得志于楚是二晉不戰而分地不耕而穫之不此之為而頓刃于河山之間以為齊秦用所待者如此其失計奈何其以此王也齊使者曰幸也越之不亡也吾不貴其用智之如目見豪毛而不見其睫也今王知晉之失計而不知越之過是目論也王所待于晉者非其汗馬之力也又非可與合軍連和也將待之以分楚衆也今楚衆已分何待于晉越王曰奈何曰楚三大夫張九軍北圍曲沃于中以至無假之關者三千七百里景翠之軍北聚魯齊南陽分有大此者乎且王之所求者鬬晉楚也晉楚不鬭越兵不起是知二五而不知十也此時不攻楚臣以是知越大不王小不伯復讐龎長沙楚之粟也竟澤陵楚之材也索隱讐當作犨邑名竟澤陵當為竟陵澤復上文勢脫况字越窺兵通無假之關此四邑者不上貢事于郢矣臣聞之圖王不王其敝可以伯然而不伯者王道失也故願大王之轉攻楚也于是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無疆盡取故吳地至浙江北破齊于徐州徐廣曰周顯王之四十六年也紀年粵子無疆薨後十年楚伐徐州無楚敗越殺無疆之語是無疆為無顓之後紀年不得録也而越以此散諸族子爭立或為王或為君濵于江南海上服朝于楚史記世家贊曰吳挫于陘志報越卒破之越困于㑹稽隂謀二十二年卒入吳是故君人者尚其志志王則王志伯則伯矣然困則持解則弛故易于困而有致命遂志也楚據吳上游坎險共之無疆納齊游說與齊惡楚用自殄刈書曰慮善以動動惟厥時不善不時能無殄乎尚史卷十七
