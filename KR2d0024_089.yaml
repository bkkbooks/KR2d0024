body:
  text: 尚史卷九十表四鑲白旗漢軍李鍇撰周異姓諸侯年表上春秋之初齊最盛宋桓襄世頗求諸侯若楚若秦自欒戎居初不與中國通東遷後始張而馴為中國患逮至宋會東門楚執牛耳晉失王官秦傳虎翼遂乃齊尊上國狎主齊盟薑嬴芉子異姓之強凡有四焉陳杞以下號稱式微然侵伐兵端所由興不著之無以知由來周事見前表紀甲子示統而已作異姓諸侯年表尚史卷九十
  hash: sha256:e7cccb3f2f6c30c6edb730bf58026a5aab7b8aaf7725bd514ff6094658ee247d
