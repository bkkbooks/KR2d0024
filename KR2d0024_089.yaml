body:
  text: 尚史巻九十表四鑲白旗漢軍李鍇撰周異姓諸侯年表上春秋之初齊最盛宋桓襄世頗求諸侯若楚若秦自欒戎居初不與中國通東遷後始張而馴為中國患逮至宋㑹東門楚執牛耳晉失王官秦𫝊虎翼遂乃齊尊上國狎主齊盟姜嬴芉子異姓之彊凡有四焉陳杞以下號稱式微然侵伐兵端所由興不著之無以知由来周事見前表紀甲子示統而已作異姓諸侯年表尚史巻九十
