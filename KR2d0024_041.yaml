body:
  text: 尚史卷四十一列傳十九鑲白旗漢軍李鍇撰晉諸臣傳鞏朔鞏朔晉大夫士莊伯也所出未詳蓋亦士氏族靈公十一年文十七年搜于黃父遂復合諸侯于扈公不見鄭伯以為二于楚也鄭公子歸生與趙盾書乃使朔行成于鄭趙穿公壻池為質焉景公二年宣十二年邲之役及韓穿為上軍大夫將戰士㑹上軍將使朔及穿帥七覆于敖前及楚乘我軍上軍不敗十一年成二年我敗齊于鞍公使朔獻齊捷于周王弗見使委于三吏三公也禮之降于卿禮一等王以朔宴而私賄之使相告之曰非禮也勿籍伐蠻夷戎狄則有獻捷兄弟甥舅告事而已故曰非禮勿書明年作六軍命朔為卿賞鞍之功也左傳論曰莊子文伯災咎之對也有酬矣而卒之以國亂無象不可知異終不可常卓乎君子之論夫易有之先張之弧後說之弧羣疑釋也荀息荀林父中行桓子荀庚荀偃見逆臣傳荀吳中行穆子荀寅中行文子荀息荀叔也為大夫事獻公獻公十九年僖二年息請以屈産之乘與垂棘之璧假道于虞以伐虢公曰是吾寶也對曰若得道于虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能强諌且少長于君君䁥之雖諌將不聽乃使息假道于虞曰冀為不道入自顛軨伐鄍三門前是冀伐虞至鄍冀之既病則亦唯君故今虢為不道保于逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宫之竒諌不聽遂起師夏息及里克㑹虞師伐虢滅下陽虢越邑三年遂滅虢且滅虞初公使息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告息曰三怨將作三公子之徒秦晉輔之子將何如息曰將死之里克曰無益也息曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎二十六年僖九年獻公薨息立奚齊冬十月里克殺奚齊息將死之人曰不如立卓子而輔之息立卓子以葬十一月里克殺卓子息死之左傳荀林父者中行桓子也文公時搜于被盧以林父為御戎公作三行以禦狄林父將中行遂氏中行氏世本晉大夫逝遨生桓伯林父林父生宣伯庚庚生獻伯偃偃生穆伯吳吳生寅本姓荀自荀偃將中軍晉改中軍曰中行因氏焉元與智氏同祖逝遨按林父將中行遂以為氏其曰荀偃將中軍改中軍曰中行因氏焉誤文公薨事襄公襄公薨靈公少趙盾使先蔑如秦逆公子雍靈公元年文七年秦送公子雍盾又背先蔑而立靈公林父佐上軍以禦秦師敗秦師于令狐先蔑之使也林父止之曰夫人大子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章又弗聽及亡林父盡送其帑及其器用財賄于秦曰為同寮故也六年文十二年秦為令狐之役伐我取羈馬林父佐中軍以從秦師于河曲出戰交綏古名退軍為綏秦師夜遁宋人弒昭公十一年文十七年林父及諸侯之大夫伐宋曰何故弒君猶立文公取賄而還靈公遇弒成公即位成公四年宣六年赤狄伐我圍懷及邢邱皆晉邑公欲伐之林父曰使疾其民以盈其貫將可殪也周書殪戎殷此類之謂也七年宣九年林父帥師伐陳㑹成公薨于扈乃還景公三年宣十二年楚圍鄭鄭及楚平潘尫楚大夫師叔入盟子良鄭伯弟出質夏六月我師救鄭林父將中軍及河間鄭既及楚平林父欲還曰無及于鄭而勦民焉用之楚歸而動不後士㑹曰善見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚先縠不可以中軍佐濟荀首林父弟知莊子曰此師殆哉果遇必敗韓厥謂林父曰彘子即先縠以偏師陷子罪大矣子為元帥師不用命誰之罪也與其専罪六人同之不猶愈乎師遂濟楚師次于郔鄭北地將飲馬于河而歸聞晉師既濟改乘轅而北之次于管以待之我師在敖鄗之間鄭皇戍使至我師曰子擊之鄭師為承楚師必敗先縠曰必許之欒書曰子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從楚子使求成于我我許之盟有日矣楚許伯樂伯攝叔致我師我逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜龜背之隆髙當心者晉鮑癸當其後使攝叔奉麋獻焉曰以嵗之非時獻禽之未至敢膳諸從者鮑癸止之止不逐也曰其左善射其右有辭君子也既免魏錡犫之子求公族未得怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及熒澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給于鮮敢獻于從者潘黨命去之趙旃穿之子求卿未得且怒失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤克曰二憾往矣弗備必敗先縠不可士㑹曰備之善若二子怒楚楚人乘我喪師無日矣使鞏朔韓穿帥七覆于敖前故上軍不敗趙嬰齊先具舟于河故敗而先濟潘黨既逐魏錡趙旃夜至于楚軍席于軍門之外使其徒入之楚子乘左廣以逐趙旃旃棄車而走林屈蕩摶之得其甲裳我懼魏錡趙旃之怒楚師也使軘車兵車名逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳疾進師車馳卒奔乘我軍林父不知所為鼓于軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也我師右移上軍未動楚以右拒逐下軍以左拒從上軍士㑹曰楚師方壯若萃于我吾師必盡殿其卒而退不敗及昏楚師軍于邲晉之餘師不能軍宵濟亦終夜有聲我師歸林父請死公將許之士渥濁諫公使復其位五年宣十四年公伐鄭為邲故也告于諸侯搜焉而還林父之謀也曰示之以整使謀而來六年宣十五年林父敗赤狄于曲梁遂滅潞公賞之以狄臣千室左傳卒諡曰桓子子庚是為中行伯事景公為下卿嘗佐中軍敗秦師于麻隧庚子偃弒厲公見逆臣傳偃子吳荀吳偃之子中行穆子也淮南子中行繆伯手搏虎而不能生也蓋力優而克不能及也亦為大夫事平公平公十一年襄二十六年衛寧戚弒其君剽孫林父入戚于我以叛我以孫氏故將討衛夏吳如魯聘召諸侯六月㑹諸侯于澶淵以討衛十七年昭元年吳帥師敗無終山戎及羣狄于大鹵即大原崇卒將戰也崇聚也魏舒曰彼徒我車所遇又厄請皆卒自我始乃毁車以為行吳之嬖人不肯即卒斬以徇為五陳以相離乃大敗之平公薨事昭公昭公元年昭十一年楚子殺蔡侯圍蔡吳謂韓起曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之二年昭十二年吳僞㑹齊師者假道于鮮虞遂入昔陽鮮虞白狄别種昔陽肥國都滅肥以肥子綿臯歸肥白狄也冬伐鮮虞明年鮮虞人聞晉師之悉起也而不警邊且不修偹吳自著雍以上軍侵鮮虞及中人城名驅衝競驅衝車與狄爭逐大獲而歸我以邾莒故執魯季孫意如冬十月魯侯來朝吳謂韓起曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃辭魯侯季孫意如猶在晉魯子服湫私于吳曰魯事晉何以不如夷之小國魯兄弟也若為夷棄之使事齊楚其何瘳于晉吳告韓起且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸意如五年昭十五年吳帥師伐鮮虞圍鼓白狄之别鼓人或請以城叛吳弗許左右曰師徒不勤而可以獲城何故不為吳曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君吳曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率意不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸淮南子中行穆伯攻鼓弗能下餽聞倫曰鼓之嗇夫聞倫知之請無罪武夫而鼓可得也穆伯弗應左右曰鼓可得也君奚弗為穆伯曰聞倫為人佞而不仁使聞倫下之可以勿賞乎賞之是賞佞人舍仁而為佞雖得鼓將何所用之昭公薨事頃公頃公元年昭十七年公將伐陸渾之戎使屠蒯膳宰如周請有事于雒與三塗雒水名三塗山名九月使吳涉自棘津使祭史先用牲于雒陸渾人弗知師從之遂滅陸渾數之以其二于楚也陸渾子奔楚我之取鼓也既獻而反鼓子焉又叛于鮮虞六年昭二十二年吳略東陽使師僞糴者負甲以息于昔陽之門外遂襲鼓滅之以鼓子䳒鞮歸使涉他晉大夫守之左傳吳卒諡曰穆子子寅荀寅吳之子中行文子也為下卿初事頃公頃公十三年昭二十九年寅及趙鞅帥師城汝濵陸渾之地遂賦晉國一鼓鐵共鼓石為鐡計令一鼓而卒以鑄刑鼎著士丐所為刑書焉丐之刑夷之搜也在文六年仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子即士丐之刑夷之搜也晉國之亂制也若之何以為法頃公薨事定公蔡侯如楚楚三年止之定公六年定四年周劉文公即劉卷王官伯也合諸侯于召陵謀伐楚寅求貨于蔡侯弗得言于士鞅曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起中山鮮虞不服棄盟取怨無損于楚而失中山不如辭蔡侯吾自方城以來襄十六年晉敗楚侵方城楚未可以得志祗取勤焉乃辭蔡侯晉于是乎失諸侯十年定八年齊伐魯寅及士鞅趙鞅救之魯侯㑹我師于瓦十一年定十三年趙鞅殺邯鄲午圍邯鄲邯鄲午者寅之甥也寅士吉射之姻也而相與睦故不與圍邯鄲而作亂伐趙鞅鞅奔晉陽荀躒韓不信魏舒請于公並逐寅及士吉射寅及吉射奔朝歌趙鞅復入于絳明年晉人圍朝歌寅使其黨析成鮒小王桃甲率狄師以襲晉戰于絳中不克而還冬十二月晉敗范中行氏之師于潞又敗鄭師及范氏之師于百泉二十年哀三年趙鞅圍朝歌師于其南寅伐其郛使其徒自北門入已犯師而出奔邯鄲二十一年哀四年齊衛救范氏秋七月圍我五鹿九月趙鞅圍邯鄲邯鄲降寅奔鮮虞冬十二月齊國夏伐我㑹鮮虞納寅于柏人明年春晉圍柏人寅及吉射奔齊新序中行寅將亡召其太祝欲加罪焉曰子為我祝犧牲不肥澤邪齊戒不敬邪使吾國亡何也祝簡對曰昔者吾先君中行穆子皮車十乘不憂其薄憂德義之不足今主君革車百乘不憂德義之薄唯患車不足也夫舟車飾則賦斂厚賦斂厚則民怨謗詛矣且君茍以為祝有益乎則詛亦將為損一人祝之一國詛之國亡不亦宜乎韓非子中行文子出亡過于縣邑從者曰此嗇夫公之故人奚不休舍且待後車文子曰吾嘗好音此人遺我鳴琴吾好佩此人遺我玉環是振我過者也以求容于我者吾恐其以我求容于人也乃去之果收文子後車二乘而獻之其君說苑後車入門文子聞嗇夫之所在執而殺之仲尼聞之曰中行文子背道失義以亡其國然後得之猶活其身道不可遺也若此餘文同後荀瑶伐鄭齊陳恆救之寅告陳恆曰有自晉師告寅者將為輕車千乘以厭齊師之門則可盡也陳恆曰寡君命恆曰無及寡無畏衆雖過千乘敢辟之乎寅曰吾乃今知所以亡君子之謀也始𠂻終皆舉之而後入焉今我三不知而入之不亦難乎左傳寅卒于齊中行氏遂不嗣論曰忠中也貞正也中者不偏正者不枉荀息逞妖姬哆二五詘適伸孽以適君惡在其忠貞也為息者匡獻公以仁傅奚齊以讓不聽則死之不愈于死奚齊乎燎其欲而煽之若助薪焉節之上九曰苦節不可貞其凶也宜矣又嘗聞之曰軍事尚整整者亦正之謂也虞鼓克均也鼓為整已荀首知莊子以下知氏荀罃知武子荀朔子荀盈知悼子荀躒知文子梁嬰父附荀甲知宣子荀瑶知襄子知果知伯國荀首者字知季林父之弟知莊子也初為下軍大夫事景公景公三年宣十二年邲之役林父聞鄭及楚平欲還先縠不可以中軍佐濟首曰此師殆哉周易有之在師之臨坎下坤上師兑下坤上臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱坎為衆今變為兑兑柔弱川壅為澤坎為川今變為兊兊為澤是川見壅有律以如己也如從也坎為法象今為衆則散為川則壅是失法之用從人之象故曰律否臧且律竭也竭敗也坎變為兑是法敗也盈而以竭天且不整所以凶也水以盈為功以竭則敗水遇天塞不得整流則竭涸也不行之謂臨水變為澤乃成臨卦澤不行之物有師而不從臨孰甚焉此之謂矣果遇必敗彘子即先縠尸之雖免而歸必有大咎及戰我師敗績明年殺先縠我師之敗也楚熊負羈楚大夫囚知罃首之子首以其族反之魏錡御下軍之士多從之每射抽矢菆納諸魏錡之房菆好箭房箭舍錡怒曰非子之求而蒲之愛董澤之蒲可勝既乎首曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還十二年成三年首佐中軍我歸楚公子穀臣與連尹襄老之尸而復知罃十三年成四年鄭伯許首救許伐鄭取汜祭鄭地十四年成五年首如齊逆女左傳首卒諡曰莊子子罃荀罃字子羽首之子知武子也邲之役楚獲罃景公十二年成三年楚人歸之楚子送罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必告不榖對曰以君之靈纍臣得歸骨于晉寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請于寡君而以戮于宗亦死且不朽若不獲命而使嗣宗職次及于事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也楚子曰晉未可與爭重為之禮而歸之景公薨事厲公厲公三年成十三年罃為下軍佐伐秦敗秦師于麻隧六年成十六年鄢陵之役罃居守秋七月公㑹諸侯伐鄭罃以諸侯之師侵陳至于鳴鹿遂侵蔡明年將再伐鄭使罃如魯乞師八年成十八年欒書弒厲公使罃逆周子于京師而立之是為悼公悼公元年襄元年魯襄公即位使罃如魯聘二年襄二年罃及諸侯之大夫㑹于戚謀鄭故也魯仲孫蔑請城虎牢以逼鄭罃曰善鄫之㑹吾子聞崔子之言今不來矣襄元年蔑與齊崔杼次于鄫杼有不服晉之言滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復于寡君而請于齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之冬復㑹于戚齊及滕薛小邾皆㑹遂城虎牢鄭人乃成八年襄八年楚伐鄭鄭及楚平使告于我罃使行人子貟對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之明年諸侯伐鄭罃代韓厥將中軍門于鄟門鄭城門荀偃門于師之梁亦鄭城門欒黶門于北門鄭恐乃行成荀偃曰遂圍之以待楚人之救也而與之戰不然無成罃曰許之盟而還師以敝楚人吾三分四軍分四軍為三部與諸侯之鋭以逆來者于我未病楚不能矣猶愈于戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也乃許鄭成同盟于戲將盟士渥濁為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟鄭公子騑趨進曰自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀偃曰改載書鄭不可罃謂偃曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃于鄭乃盟而還十年襄十年公及諸侯㑹吳于祖楚地荀偃士丐請伐逼陽妘姓國而封宋向戍罃曰城小而固勝之不武弗勝為笑固請圍之弗克請于罃曰水潦將降懼不能歸請班師罃怒投之以機出于其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之荀偃士丐帥卒攻逼陽親受矢石遂滅逼陽以與向戍向戍辭乃豫宋公宋公享公于楚邱請以桑林殷天子之樂罃辭荀偃士丐曰諸侯宋魯于是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎舞師題以旌夏舞師樂師也旌夏大旌也題識也公懼而退入于房去旌卒享而還及著雍晉地疾卜桑林見荀偃士丐欲奔請禱焉奔宋禱謝罃不可曰我辭禮矣彼則以之猶有鬼神于彼加之公有間以逼陽子歸夏六月罃伐秦報其侵也九年秦侵我冬十月公及諸侯伐鄭諸侯城虎牢而戍之我師城梧及制梧制皆鄭舊地而戍之鄭及我平楚救鄭十一月諸侯之師還繞也鄭而南至于陽陵鄭地楚師不退罃欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進與楚師夾頴而軍鄭宵涉潁與楚人盟欒黶欲伐鄭師罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命言不可命以必克不如還也諸侯之師還侵鄭北鄙而歸楚人亦還明年公復伐鄭罃至于西郊東侵舊許鄭新邑諸侯圍鄭鄭懼乃行成秋七月同盟于亳十三年襄十三年罃卒諡曰武子子二朔盈朔前卒盈字伯夙悼公時罃為中軍將盈生六年而罃卒故盈不得嗣帥及長事平公為下軍佐平公二十五年昭九年如齊逆女卒于戲陽左傳諡曰悼子子躒荀躒文伯盈之子知文子也初平公欲廢知氏而立其外嬖及盈卒未葬公飲酒樂膳宰屠蒯諌公說為是悛而止使躒佐下軍平公薨事昭公昭公五年昭十五年躒如周葬穆后大子夀母昭公薨事頃公頃公六年昭二十二年景王崩王子猛立子朝作亂子猛出居于皇冬十月躒帥九州之戎即陸澤戎及焦瑕溫原之師以納王于王城十一月子猛卒敬王立躒軍于侯氏我軍取前城伐京子朝所在明年王使告間子朝敗王使告間暇于晉乃還十年昭二十六年周單穆公來告急王次于滑躒及趙鞅帥師納王使女寬大夫守闕塞冬十一月我師克鞏子朝奔楚王入于成周我師使成公般大夫戍周而還頃公薨事定公定公元年昭三十一年魯昭公出在乾侯公將納之使躒㑹季孫意如于適歷躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之意如謝請從君而歸遂從躒如乾侯躒以公之命唁昭公且曰寡君使躒以君命討于意如意如不敢逃死君其入也昭公曰所能見夫人者有如河躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂意如曰君怒未怠子姑歸祭昭公由是卒不得入十一年定十三年荀寅士吉射伐趙鞅趙鞅奔晉陽有梁嬰父者嬖于躒躒欲以為卿乃言于公曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之遂奉公以伐范氏中行氏荀寅士吉射奔朝歌趙鞅復入于絳先是祁盈午之子執其家臣祁勝塢臧祁勝賂躒躒為之言于頃公遂滅祁氏羊舌氏躒之力也左傳躒卒諡曰文子子甲是為知宣子甲子二宵瑶瑶嗣卿世本逝遨生莊子首首生武子罃罃生莊子朔朔生悼子盈盈生文子櫟櫟生宣子申申生智伯瑶按此朔生盈誤又朔諡與其祖同亦誤荀瑤知伯甲之子知襄子也為晉卿出公三年哀二十三年瑤伐齊齊禦之瑤視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子晉大夫請卜瑶曰君告于天子而卜之以守龜于宗祧吉矣吾又何卜焉且齊人取我英邱君命瑤非敢耀武也治英邱也以辭伐罪足矣何必卜戰于犂邱齊師敗績瑤親禽顔庚齊大夫顔涿聚七年哀二十七年瑤帥師伐鄭次于桐邱鄭請救于齊齊陳恆救之及濮雨陳恆衣製雨衣杖戈立于阪上馬不出者助之鞭之瑤聞之乃還曰我卜伐鄭不卜敵齊使謂陳恆曰大夫陳子陳之自出陳之不祀鄭之罪也故寡君使瑶察陳𠂻焉謂大夫其恤陳乎若利本之顛瑶何有焉陳恆怒曰多陵人者皆不在知伯其能久乎說苑智伯伐鄭田恆救之有登蓋必身立焉車徒有不進必令助之壘合而後處井竈成而後食智伯曰吾聞田恆新得國而愛其民內同其財外同其勤勞治軍若此其得衆也不可待也乃去之十一年悼四年瑤帥師圍鄭入南里門于桔柣之門將門瑤謂趙無恤入之對曰主謂知伯在此瑶曰惡而無勇惡貌醜也何以為子對曰以能忍恥庶無害趙宗乎瑤不悛無恤由是惎瑤左傳史記晉出公十一年知伯伐鄭趙簡子疾使太子毋恤將而圍鄭知伯醉以酒灌擊毋恤毋恤羣臣請死之毋恤曰君所以置毋恤為能忍詬然亦愠知伯知伯歸謂簡子使廢母恤簡子不聽毋恤由此怨知伯按晉出公十一年為魯悼公四年傳于魯哀公二十年趙襄子稱先臣志父是簡子已前卒史誤紀年十三年荀瑤城南梁十八年悼十一年瑤與趙韓魏盡分范中行故地出公怒告齊魯欲以伐四卿四卿恐遂共攻出公出公奔齊道死瑤乃立昭公曽孫驕是為懿公是時晉政皆决于瑤懿公不得有所制瑤遂有范中行故地最强史世家中山之國有夙繇韓非子作仇由者瑶欲攻之而無道也為鑄大鐘方車二軌以遺之夙繇之君將斬岸堙溪以迎鐘赤章蔓枝諌曰詩云唯則定國我胡則以得是于知伯夫知伯之為人也貪而無信必欲攻我而無道故為大鐘方車二軌以遺君君因斬岸堙溪以迎鐘師必隨之弗聽又諫君曰大國為歡而子逆之不祥子釋之赤章蔓枝曰為臣不忠罪也忠不見用逺身可也斷轂而行至衛七日而夙繇亡吕氏春秋紀年出公十八年河水赤三日荀瑤伐中山取窮魚之邱瑤欲伐衛遺衛君野馬四白璧一南文子衛臣曰此小國之禮而大國致之君其圖之衛君告邊境瑤果襲衛至境而反曰衛有賢人先知吾謀也國䇿說苑趙簡子事同又載智伯造舟為梁將以襲衛事見寧文子傳瑤益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱也瑤怒率韓魏攻趙趙毋恤懼奔保晉陽三國攻晉陽嵗餘引汾水灌其城城不浸者三版史記瑶行水魏駒即桓子御韓虎即康子驂乘瑤曰吾乃今知水可以亡人國也魏駒肘韓虎韓虎履魏駒之跗以汾水可以灌安邑絳水可以灌平陽也趙無恤使張孟談私于韓魏韓魏隂與約毋恤乃夜殺守隄吏决水灌瑶軍瑶軍亂韓魏翼而擊之毋恤犯其前大敗其衆遂殺瑶滅其族而分其地國䇿韓非子智伯軍敗晉陽身死髙良之東遂卒被分漆其首以為溲器淮南子襄子疏隧而擊之大敗知伯破其頭以為飲器吕氏春秋同史記韓魏殺知伯埋于鑿壺之下後漢書注引今本無古文瑣語知伯敗將出走夢火見於西方乃奔秦又夢見于南方遂奔楚說苑智伯厨人亡炙而知之韓魏反而不知史記年表秦厲共公二十五年晉大夫知開率其邑人來奔二十九年晉大夫知伯寬率其邑人來奔正義開知伯瑶之子也知果者國䇿作知過知氏族為晉大夫知甲有二子曰宵曰瑶甲將以瑶為後知果曰不如宵也甲曰宵也狠對曰宵之狠在面瑤之狠在心心狠敗國面狠不害瑶之賢于人者五其不逮者一美鬢長大則賢射御足力則賢伎藝畢給則賢巧文辨惠則賢彊毅果敢則賢如是而甚不仁以其五賢陵人而以不仁行之其誰能待之若果立瑤也知宗必滅弗聽國語及立是為知伯知伯結韓魏伐趙圍晉陽三年趙遣張孟談結韓魏之君隂約三軍孟談朝知伯而出遇果轅門之外果入見知伯曰二主殆將有變臣遇張孟談于轅門之外其志矜其行髙知伯曰不然吾與二主約謹矣破趙三分其地寡人所親必不欺也子釋之果出見二主入說知伯曰二主色動而意變必背君不如殺之知伯曰兵著晉陽三年矣旦暮當拔而饗其利乃有他心不可子慎勿復言果曰不殺則遂親之知伯曰親之奈何曰魏桓子之謀臣曰趙葭韓康子之謀臣曰假規是皆能移其君之計君其與二君約破趙則封二子各萬家之縣一如是則二主之心可不變而君得所欲矣知伯曰破趙而三分其地又封二子者各萬家之縣一則吾所得者少不可果見君之不用也出更其姓為輔氏知氏滅惟輔氏存焉國䇿知伯國者知氏族亦晉大夫荀瑤還自衛三卿知瑤韓虎魏駒宴于藍臺瑶戲韓虎而侮假規魏駒之相伯國聞之諫曰主不備難必至矣曰難將由我我不為難誰敢興之對曰異于是夫郤氏有車轅之難郤犫執長魚矯父母妻子同一轅既矯嬖于厲公滅三郤趙有孟姬之讒趙莊姬通于趙嬰讒趙同趙括于景公而殺之欒有叔祁之訴欒祁與其老州賔通訴欒盈于士丐遂滅欒氏范中行有函冶之難函冶范臯夷之邑臯夷無寵于范氏謀逐范吉射中行寅卒滅之皆主之所知也夏書有之曰一人三失怨豈在明不見是圖周書有之曰怨不在大亦不在小夫君子能勤小物故無大患今主一宴而恥人之君相又弗備曰不敢興難無乃不可乎夫誰不可喜而誰不可懼蚋蛾蛾通作蟻蜂䘍皆能害人况君相乎弗聽國語論曰發黃間者却引滿理勢之歸也晉之舊姓十一族降在皂𨽻不知凡幾知魏趙韓狎柄晉國而知氏尤虎視最彊將猛噬三家何有于晉乃釋括之頃跮踱而仆之其却引之道乎祁奚祁午祁盈祁奚者食邑于祁因以為氏髙梁伯之子也韋昭注系髙梁伯未詳初事景公悼公即位以奚為中軍尉國語知祁奚之果而不淫也使為元尉悼公三年襄三年奚請老公問嗣焉稱解狐其讎也將立之而卒韓非子解狐薦其讎于簡主以為相其讎以為且幸釋已也往謝狐乃引弓送而射之曰薦汝公也讎汝私怨也不以私怨故擁汝于吾君一曰解狐舉邢伯栁為上黨守栁往謝之曰子釋罪敢不再拜曰舉子公也怨子私也子往矣怨子如初也又作趙武事按解狐卒于悼公三年時簡子尚未立說誤作趙武亦誤韓詩外傳解狐薦荆伯栁為西河守作魏文侯事亦誤又問對曰午也可午奚之子國語對曰臣之子午也可人有言也擇臣莫若君擇子莫若父午之少也婉以從令遊有鄉處有所好學而不戲其壯也彊志而用命守業而不淫其冠也和安而好敬柔惠小物而鎮定大事有直質而無流心非義不變非上不舉若臨大事其可以賢于臣也臣請薦所能擇而君比義焉公使午為軍尉沒平公軍無秕政吕氏春秋略同左傳而作祁黃羊于是羊舌職死公曰孰可以代之對曰赤也可赤職之子于是使祁午為中軍尉羊舌赤佐之君子謂奚能舉善矣平公元年襄十六年奚為公族大夫左傳士丐與和大夫爭田久而無成丐欲攻之問于奚奚曰公族之不恭公室之回內事之邪大夫之貪是吾罪也若以軍官從子之私懼子之應且憎也國語六年襄二十一年士丐欒盈殺其黨羊舌虎十人而囚羊舌肹即叔向樂王鮒曰吾為子請羊舌肹弗應出不拜人皆咎肹肹曰必祁大夫樂王鮒從君者也何能行祁大夫外舉不棄讎內舉不失親其獨遺我乎詩曰有覺德行四國順之夫子覺者也于是奚老矣聞之乘驛而見士丐曰詩曰惠我無疆子孫保之書曰聖有謨訓明徴定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放大甲而相之卒無怨也管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為士丐說與之乘而言諸公而免之奚不見肹而歸肹亦不告免焉而朝左傳吕氏春秋羊舌虎善欒盈有罪晉誅羊舌虎叔嚮為之奴而朡祁奚曰吾聞小人得位不爭不祥君子在憂不救不祥乃往見范宣子曰善為國者賞不過而刑不慢賞過則懼及淫人刑慢則懼及君子與其不幸而過寧過而賞淫人毋過而刑君子宣子乃命吏出叔嚮祁午者奚之子也初事悼公為中軍尉平公時士丐與和大夫爭田午見曰晉為諸侯盟主子為正卿若能靖端諸侯使服聽命于晉晉國其誰不為子從何必和盍密和和大以平小乎平公十七年昭元年晉楚及諸侯之大夫㑹于虢尋宋之盟也宋盟在襄二十七年午謂趙武曰宋之盟楚人得志于晉謂楚先㰱今令尹謂公子圍之不信諸侯之所聞也子弗戒懼又如宋子木即屈建之信稱于諸侯猶詐晉而駕焉况不信之尤者乎楚重得志于晉晉之耻也子相晉國以為盟主于今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以耻午也是懼吾子其不可以不戒趙武曰武受賜矣乃盟午卒子盈事頃公頃公十二年昭二十八年盈家臣祁勝與塢臧通室易妻也盈將執之訪于司馬叔遊叔侯之子叔遊曰鄭書有之惡直醜正實蕃有徒無道立矣子懼不免姑已若何盈曰祁氏私有討國何有焉遂執之祁勝賄荀躒荀躒為之言于公公執盈盈之臣曰鈞將皆死憖使吾君聞勝與臧之死也以為快乃殺之公殺盈及楊食我羊舌肹之子食我盈之黨也遂滅祁氏及羊舌氏左傳論曰隂中善類莫利于黨駢首誅之無敢橫議者乘驛犯危卒免善人信矣祁大夫果而不淫夫我鄉往之三日不食諸公子傳共太子申生杜原欵附奚齊卓子伯倏叔劉公子雍公子樂共大子名申生獻公之子母曰齊姜獻公立以為大子及驪姬生奚齊驪姬請使申生處曲沃奚齊處絳公許之及蒸于武公公稱疾不與使奚齊涖事猛足大子臣言于大子曰伯氏猶言長子也不出奚齊在廟子盍圖乎大子曰吾聞之羊舌大夫羊舌職之父曰事君以敬事父以孝受命不遷為敬敬順所安為孝棄命不敬作令不孝又何圖焉且夫間父之愛而嘉其况有不忠焉廢人以自成有不貞焉孝敬忠貞君父之所安也棄安而圖逺于孝矣吾其止也獻公十六年閔元年公作二軍公將上軍大子將下軍以伐霍士蒍曰大子不得立矣君有異心不如逃之君得其欲大子逺死且有令名為吳大伯不亦可乎大子聞之曰子輿之為我謀忠矣然吾聞之為人子者患不從不患無名為人臣者患不勤不患無祿今我不才而得勤與從又何求焉焉能及吳大伯乎大子遂行克霍而反讒言彌興十七年閔二年公使大子伐東山臯落氏至于稷桑臯落翟地翟人出逆大子欲戰狐突諫曰不可突聞之國君好艾大夫殆好內適子殆社稷危若惠于父而逺于死惠順也去避奚齊為順父心而逺于死也惠于衆而利社稷其可以圖之乎况其危身于翟以起讒于內也大子曰不可君之使我非歡也抑欲測吾心也是故賜我竒服而告我權竒服偏裻權金玦也又有甘言焉言之大甘其中必苦譖在中矣君故生心雖蝎譖蝎木蟲譖從中起如蝎食木焉避之不若戰也不戰而反我罪滋厚我戰雖死猶有令名焉果戰敗翟而反二十一年僖四年驪姬以君命命大子曰君夢齊姜必速祠而歸福大子祭于曲沃歸福于絳公田驪姬受福乃置鴆于酒置堇于肉鴆運日堇烏頭公至召大子獻公祭之地地墳起也大子恐而出公命殺其傅杜原欵大子奔新城即曲沃杜原欵將死使小臣圉告于申生曰欵也不才寡知不敏不能教導以至于死不能深知君之心度棄寵求廣土而竄伏焉小心狷介不敢行也是以言至而無所訟之故陷于大難乃逮于讒然欵也不敢愛死唯與讒人均是惡也吾聞君子不去情不反讒讒行身死可也猶有令名焉死不遷情彊也守情說父孝也殺身以成志仁也死不忘君敬也孺子勉之死必遺愛死民之思不亦可乎大子許諾人謂大子曰非子之罪何不去乎大子曰不可去而罪釋必歸于君是惡君也章父之惡而笑諸侯吾誰鄉而入內困于父母外困于諸侯是重困也棄君去罪是逃死也吾聞之仁不惡君知不重困勇不逃死乃雉經于新城之廟左傳或謂大子子辭君必辨焉大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我將死使猛足言于狐突曰申生有罪不聽伯氏以至于死申生不敢愛其死雖然吾君老矣國家多難伯氏不出奈吾君何伯氏茍出而圖吾君申生受賜以至于死雖死何悔及惠公即位改葬大子諡曰共君國語同記檀弓兒乃謡曰共大子更葬矣後十四年晉亦不昌昌乃在兄史記奚齊卓子皆獻公之子也公伐驪戎以驪姬歸驪姬生奚齊其娣生卓子獻公二十一年僖四年驪姬譖申生而殺之遂以奚齊為大子二十五年僖九年公薨奚齊立冬十月里克殺之荀息立卓子十一月里克又殺之左傳伯倏叔劉並文公子母曰季隗公處狄時之所生也文公元年僖二十四年公入即位狄人歸季隗而請其二子公子雍公子樂亦文公子雍母曰杜祁樂母即懷嬴也雍仕于秦樂仕于陳襄公七年文六年公薨靈公少我以難故欲立長君趙盾曰立公子雍好善而長先君愛之且近于秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故欲立長君有此四德難必抒矣狐射姑曰不如立公子樂辰嬴即懷嬴嬖于二君立其子民必安之趙盾曰辰嬴賤班在九人其子何震威也之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞襄公母而上之以狄故讓季隗狄女而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母愛子義足以威民立之不亦可乎使先蔑士㑹如秦逆雍射姑亦使召樂盾殺樂于郫晉地明年秦送雍盾又背雍而立靈公雍卒不立左傳論曰人審所安共大子却三子之謀而杜傅是循其安死以惠父蓋亦蕰中久矣詩有小辨傷哉其辭之比也尚史卷四十一
