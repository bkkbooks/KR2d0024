body:
  text: 尚史卷一百志八鑲白旗漢軍李鍇撰律吕志上聲者天地自然之鳴也中聲者陰陽之和應也聖人制律規于和以協夫中聲聲有五五者陽之中也律有六六者陰之盡也陽中以生陰盡以變而變化章焉是故天地之紐正于子而變于午五聲之紐正于黃鐘而變于㽔賔黃鐘位子㽔賔位午當子午之交陰陽逆生而變徴乘權也十二律之紐正于黃鐘而變于仲吕黃鐘位宫仲吕位角當五聲之中體用相磨故下一律而正角乘權也至其理有體用數有竒全氣有升降聲有清濁舉協之而凖協之而凖而後五聲調八音平其損益錯綜自然之應實本乎天初不可以人意參也舊圖之外增方圓體用四圖用昭其微述律吕志六律六同合陰陽之聲陽聲黃鐘太簇姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鐘小吕夾鐘黃鐘太簇姑洗為陽中之陽小吕夾鐘大吕為陽中之陰㽔賔夷則無射為陰中之陽應鐘南呂函鐘為陰中之隂皆文之以五聲宫商角徴羽爾雅律謂之分宫謂之重商謂之敏角謂之經徴謂之迭羽謂之栁皆播之以八音金石土革絲木匏竹周禮聲者鳴也聞其聲即知其所生音者飲也言其剛柔清濁和而相飲也五聲者宫商角徵羽也八音者土曰塤世本暴辛公作塤竹曰管皮曰鼓匏曰笙世本隨作笙絲曰絃石曰磬金曰鍾木曰柷􅀈塤坎音也管艮音也鼓震音也絃離音也鐘兌音也柷􅀈乾音也白虎通商之為言章也物成孰可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽宇也物聚藏宇覆之也夫聲者巾于宫觸于角祉于徴章于商宇于羽故四聲為宫紀也協之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物唱和有象故言君臣位事之體也五聲之本生于黃鐘之律九寸為宫或損或益以定商角徴羽九六相生陰陽之應也律十有二陽六為律陰六為吕律以統氣類物有三統之義焉其傳曰黃帝之所作也黃帝使泠綸自大夏之西昆侖之陰取竹之解谷孟康注解脫也谷竹溝也取竹之脫無溝莭者一説解谷谷名按文義孟説是生其竅厚均者斷兩節間而吹之以為黃鐘之宫制十二筒以聽鳯之鳴其雄鳴為六雌鳴亦六比黃鐘之宫而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定三統者天施地化人事之紀也十一月乾之初九陽氣伏于地下始著為一萬物萌動鐘于太陰故黃鐘為天統律長九寸九者所以究極中和為萬物元也易曰立天之道曰陰與陽六月坤之初六陰氣受任于太陽繼飬化柔萬物生長㮊之于未令種剛強大故林鐘為地統律長六寸六者所以含陽之施楙之于六合之內令剛柔有體也立地之道曰柔與剛乾知大始坤作成物乾之九三宋祁注九三當作九二萬物棣通族出于寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故太族為人統律長八寸象八卦宓羲氏之所以順天地通神明類萬物之情也立仁之道曰仁與義在天成象在地成形后以裁成天地之道輔相天地之宜以左右民此三律之謂矣是謂三統其于三正也黃鍾子為天正林鍾未之衝丑為地正太族寅為人正三正正始是以地正適其始紐于陽東北丑位易曰東北喪朋乃終有慶答應之道也及黃鐘為宫則太族姑洗林鐘南吕皆以正聲應無有忽微孟康注謂正聲無有殘分也不復與他律為役者同心一統之義也非黃鐘而它律難當其月自宫者則其和應之聲有空積忽微孟康注十二月之氣各以其月之律為宫非五音之正則聲有髙下差條也空積者鄭氏分一寸為數千不得其正此黃鐘至尊亡與並也易曰參天兩地而倚數天之數始于一終于二十有五其義紀之以三故置一得三又二十五分之六凡二十五置于天之數得八十一以天地五位之合終於十者乘之為八百一十分應厯一統孟康注十九嵗為一章一統凡八十一章千五百三十九嵗之章數黃鐘之實也繇此之義起十二律之周徑孟康注律孔徑三分參天也之數也圍九分終天之數地之數始于二終于三十其義紀之以兩故置一得二凡二十置終地之數得六十以地中數六乘之為三百六十分當期之日林鐘之實孟康注林鐘長六寸圍六分以圍乘長得積三百六十分人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終于十者乘之為六百四十分以應六十四卦太族之實也孟康注太族長八寸圍八分為積六百四十分書曰天功人其代之天兼地人則天故以五位之合乘焉唯天為大唯堯則之之象也地以中數乘者陰道理內在中饋之象也三統相通故黃鐘林鐘太族律長皆全寸而亡餘分也天之中數五地之中數六而二者為合六為虛五為聲周流于六虛虛者爻律夫陰陽登降運行列為十二而律吕和矣漢志廣莫風居北方廣莫者言陽氣在下陰莫陽廣大也故曰廣莫東至于虛虛者能實能虛言陽氣冬則宛藏于虛曰冬至則一陰下藏一陽上舒故曰虛東至于須女言萬物變動其所隂陽氣未相離尚相如胥也故曰須女十一月也律中黃鐘黃鐘者陽氣踵黃泉而出也其于十二子為子子者滋也滋者言萬物滋于下也漢志孳萌于子其于十母為壬癸壬之為言任也言陽氣任養萬物于下也癸之為言揆也言萬物可揆度故曰癸漢志懷任于壬陳揆于癸又曰黃鐘黃者中之色君之服也鐘者種也天之中數五五為聲聲上宫五聲莫大焉地之中數六六為律律有形有色色上黃五色莫盛焉故陽施種於黃泉孳萌萬物為六氣元也以黃色名元氣律者著宫聲也宫以九唱六變動不居周流六虛始于子在十一月鄭玄周禮注聲之隂陽各有合黃鐘子之氣也十一月建焉而辰在星紀白虎通黃鐘中和之氣鐘者動也言陽氣于黃泉之下動養萬物也東至牽牛牽牛者言陽氣牽引萬物出之也牛者冒也言地雖凍能冒而生也牛者耕植種萬物也東至于建星建星者建諸生也十二月律中大吕大吕者史記闕不説大吕其于十二子為丑丑者紐也言陽氣在上未降萬物厄紐未敢出漢志紐牙于丑又曰大吕吕旅也言陰大旅助黃鐘宣氣而牙物也位于丑在十二月周禮汪大吕丑之氣也十二月建焉而辰在玄枵白虎通太大也吕者拒也言陽氣欲出陰不許也吕之為言拒者旅抑拒難之也又曰太陰見于亥亥者仰也律中應鐘壯于子子者孳也律中黃鐘衰于丑丑者紐也律中大吕其曰壬癸壬者陰始任癸者揆度也時為冬冬之為言終也其位在北方其色黑其音羽羽之為言舒言萬物始孶其帝顓頊顓頊者寒縮也其神玄冥玄冥者入冥也其精玄武掩起離體泉龜蛟珠蛤條風居東北主出萬物條之言條治萬物而出之故曰條風南至于箕箕者言萬物根棋故曰箕正月也律中泰簇泰簇者言萬物簇生也故曰泰簇其于十二子為寅寅言萬物始生蚓然也故曰寅漢志引達于寅南至于尾言萬物始生如尾也南至于心言萬物始生有華心也南至于房房者言萬物門戶也至于門則出矣漢志太族族奏也言陽氣大奏地而達物也位于寅在正月周禮注太族寅之氣也正月建焉而辰在娵訾白虎通太亦大也簇者湊也言萬物始大湊地而出也明庶風居東方明庶者明衆物盡出也二月也律中夾鐘夾鐘者言隂陽相夾厠也其于十二子為卯卯之為言茂也言萬物茂也漢志冒茒于卯其于十母為甲乙甲者言萬物剖符甲而出也乙者言萬物生軋軋也漢志出甲于甲奮軋于乙又曰夾鐘言隂夾助太族宣四方之氣而出種物也位于卯在二月周禮注夾鐘卯之氣也二月建焉而辰在降婁白虎通夾者孚甲也言萬物孚甲種類分也南至于氐氐者言萬物皆至也南至于亢亢者言萬物亢見也南至于角角者言萬物皆有枝格如角也三月也律中姑洗姑洗者言萬物洗生其于十二子為辰辰者言萬物之蜄也漢志振美于辰又曰姑洗洗潔也言陽氣洗物辜潔之也位于辰在三月周禮注姑洗辰之氣也三月建焉而辰在大梁白虎通姑者故也洗者鮮也言萬物皆去故就新莫不鮮明也又曰少陽見于寅寅者演也律中太簇律之為言率所以率氣令生也卯者茂也律中夾鐘衰于辰辰震也律中姑洗其日甲乙者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動搖也其帝太皞皞者大起萬物擾也其神勾芒者物之始生芒之為言萌也其精青龍陰中陽清明風居東南維主風吹萬物而西之軫軫者言萬物益大而軫軫然西至于翼翼者言萬物皆有羽翼也四月也律中仲吕仲吕者言萬物盡旅而西行也其于十二子為己己者言陽氣之已盡也漢志已盛于己又曰中吕言微隱始起未成著于其中族助姑洗宣氣齊物也位于己在四月周禮注中吕已之氣也四月建焉而辰在實沈白虎通言陽氣將極中充大也故復中言之也西至于七星七星者陽數成于七故曰七星西至于張張者言萬物皆張也西至于注索隱注咮也天官書栁為鳥味則注栁星也注者言萬物之始衰陽氣下注故曰注五月也律中㽔賔㽔賔者言隂氣幼少故曰㽔痿陽不用事故曰賔景風居南方景者言陽氣道竟故曰景風其于十二子為午午者陰陽交故曰午漢志咢布于干其于十母為丙丁丙者言陽道著明故曰丙丁者言萬物之丁壯也故曰丁漢志明炳于丙大盛于丁又曰㽔賔㽔繼也賔導也言陽始導隂氣使繼養物也位于午在五月周禮注㽔賔午之氣也五月建焉而辰在鶉首白虎通㽔者下也賔者敬也言陽氣上極隂氣始賔敬之也西至于弧弧者言萬物之吳落且就死也西至于狼狼者言萬物可度量斷萬物故曰狼涼風居西南維主地地者沈奪萬物氣也六月也律中林鐘林鐘者言萬物就死氣林林然其于十二子為未未者言萬物皆成有滋味也漢志昧愛于未又曰林鐘林君也言陰氣受任助㽔賔君主種物使長大楙盛也位于未在六月周禮注林鐘未之氣也六月建焉而辰在鶉火白虎通林者衆也言萬物成熟種類多也又曰太陽見于己巳者物必起律中仲吕壯盛于午午物滿長律中㽔賔衰于未未味也律中林鐘其曰丙丁者其物炳明丁者強也時之為夏夏言大也位在南方其色赤其音徵徵止也陽度極也其帝炎帝者太陽也其神祝融祝融者屬續其精為鳥離為鸞北至于罰罰者言萬物氣奪可伐也北至于參參言萬物可參也故曰參七月也律中夷則夷則言隂氣之賊萬物也其于十二子為申申者言隂用事申賊萬物故曰申漢志申堅于申又曰夷則則法也言陽氣正法度而使陰氣夷當傷之物也位于申在七月白虎通夷則申之氣也七月建焉而辰在鶉尾白虎通夷傷也則法也言萬物始傷被刑法也北至于濁爾雅濁謂之畢濁者觸也言萬物皆觸死也故曰濁北至于留索隱留即卯毛傳亦以留為卯留者言陽氣之稽留也故曰留八月也律中南吕南吕者言陽氣之旅入藏也其于十二子為酉酉者萬物之老也故曰酉漢志留孰于酉閶闔風居西方閶者倡也闔者藏也言陽氣道萬物闔黃泉也其于十母為庚辛庚者言隂氣庚萬物故曰庚辛者言萬物之辛生故曰辛漢志斂更于庚悉新于辛又曰南吕南任也言隂氣旅助夷則任成萬物也位于酉在八月周禮注南吕酉之氣也八月建焉而辰在夀星白虎通南任也言陽氣尚任包大生薺麥也北至于胃胃者言陽氣就藏皆胃胃也北至于婁婁者呼萬物且內之也北至于奎奎者主毒螫殺萬物也奎而藏之九月也律中無射無射者隂氣盛用事陽氣無餘也故曰無射其于十二子為戍戍者言萬物盡滅故曰戍漢志畢入于戍又曰亡射射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也位于戍在九月周禮注無射戍之氣也九月建焉而辰在大火白虎通射終也言萬物隨陽而終當復隨隂而起無有終已又曰少陰見于申申者身也律中夷則壯于酉酉者老物收斂律中南吕衰于戍戌者滅也律中無射無射者無聲也其日庚辛庚者物更也辛者隂始成時為秋秋之為言愁亡也其位西方其色白其音商商者強也其帝少皞少皥者少斂也其神蓐收蓐收者縮也其精白虎虎之為言搏討也不周風居西北主殺生東璧居不周風東主辟生氣而東之至于營室營室者主營胎陽氣而産之東至于危危垝也言陽氣之危垝故曰危十月也律中應鐘應鐘者陽氣之應不用事也其于十二子為亥亥者該也言陽氣藏于下故該也史記漢志該閡于亥又曰應鐘言隂氣應亡射該藏萬物而雜陽閡種也位于亥在七月周禮注應鐘亥之氣也十月建焉而辰在析木辰與建交錯貿處如表裏然是其合也白虎通應者應也言萬物應陽而動下藏也按漢初以十月為嵗首故史起應鐘今依衆説始黃鐘而以應鐘終之律數九九八十一以為宫三分去一五十四以為徵八十一而三分之每分二十七去其一得今數三分益一七十二以為商五十四而三分之每分一十八益其一得今數三分去一四十八以為羽七十二而三分之每分二十四去其一得今數三分益一六十四以為角四十八而三分之每分一十六益其一得今數黃鐘長八寸七分一宫索隱七當作十上文律九九八十一故長八寸十分一而漢書云黃鐘長九寸者九分之寸也劉歆鄭玄皆以長九寸即十分之寸不依此法也云宫者黃鐘為律之首宫為五音之長十一月以黃鐘為宫則聲得其五黃鐘長九寸凡律空圍九分康成禮注籥黃鐘之宫長九寸空圍九分容秬黍一千二百粒稱重十二銖兩之為一合三分損益轉生十一律蔡雍銅籥銘黃鐘之管長九寸徑三分孟康月令章句黃鐘之變也管長九寸徑三分圍九分因而九之九九八十一黃鐘之宫立焉韋昭國語注黃鐘八寸十分一空圍九分者空圍中廣九分也康昭不通律故圍徑異蔡沉律吕新書大吕長七寸五分三分一一當作二索隱謂十一月以黃鐘為宫五行相次大吕為商者大吕所以助陽宣化大吕長八寸二百四十三分寸之一百四鄭注大吕七寸五分三分二強四百五律吕新書太簇長七寸七分二角索隱七當作十太簇長八寸鄭注太簇七寸十分二律吕新書夾鐘長六寸一分三分一一當作十夾鐘長七寸二千一百八十七分寸之千七十五鄭注夾鐘六十七分三分一強一百九十八姑洗長六寸七分四羽索隱七當作十羽以金生水故姑洗長七寸九分寸之一鄭注姑洗六寸十分四律呂新書仲吕長五寸九分三分二徵仲吕長六寸萬九千六百八十三分寸之萬二千九百七十四鄭注仲吕五寸九分三分二強五百八十二律吕新書㽔賔長五寸六分三分一一當作二㽔賔長六寸八十一分寸之二十六鄭注㽔賔五寸六分三分二強四百八十六律吕新書林鐘長五寸七分四角索隱七當作十水生木故以為角林鐘長六寸鄭注林鐘五寸十分四律吕新書夷則長五寸四分三分二商夷則長五寸七百二十九分寸之四百五十一鄭注夷則五寸三分二弱二百五十六律吕新書南吕長四寸七分八徵索隱七當作十南吕長五寸三分寸之一鄭注南吕四寸十分八律吕新書無射長四寸四分三分二無射長四寸六千五百六十一分寸之六千五百六十四鄭注無射四寸四分二強六百二律吕新書應鐘長四寸二分三分二羽應鐘長四寸二十七分寸之二十鄭注應鐘四寸二分三分二律吕新書律數史記與鄭注異史以九分為寸注以十分為寸也鄭破一寸為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數其中損益之際皆有餘分雖有巧厯終不能盡是以自分而下遂不可折而直以九相乘厯十二管至破一寸以為一萬九千餘分而後略可得而記焉然亦苦于難記而易差終不若太史公之法為得其要而易考也蓋其以子為一而十一三之以至于亥則得十七萬七千一百四十七算而子為全律之實可知矣以寅為子之寸數而酉為寸法則其律有九寸可知矣以辰為子之分數而未為分法則其寸有九分可知矣以午為子之釐數而已為釐法則其分有九釐可知矣以申為子之毫數而卯為毫法則其釐有九毫可知矣以戌為絲數而丑為絲法則毫有九絲可知矣下而為忽亦因絲而九之雖出權宜而不害得乎自然之數以之損益則三分之數整齊簡直記而不差也朱子鐘律解按黃鐘下宫太簇下角姑洗下羽仲吕下徵林鐘下角夷則下商南吕下徵應鐘下羽諸説未詳而晉志亦謂罔見通達者遂都以為誤索隱以大吕為商考要以太簇下角為商字之誤皆非也蓋用五聲相生四時相承而别開其義也夫五聲相生而曰黃鐘宫林鐘角太簇商南吕徵姑洗羽與黃鐘一均之序宫徵商羽角獨異者有二義焉一循十二律本位之次林鐘角承南吕徵南吕徴承黃鐘宫黃鐘宫承太簇商太簇商承姑洗羽順而左旋適合五行之序也一循十二律相生之次則黃鐘位子得水氣生林鐘角林鐘位未得土氣生太簇商太簇位寅得木氣生南吕徵南吕位酉得金氣生姑洗羽而五音迭承還克其所生之母故林鐘角克黃鐘宫太簇商克林鐘角南吕徵克太簇商仲吕羽克南吕徵尚書所謂六府水火金木土穀還以所克為生者是也四時相承而曰太簇角仲吕徵夷則商應鐘羽此居寅申乙亥之衝而紀四孟之音月令所謂孟春之月其音角孟夏之月其音徵孟秋之月其音商孟冬之月其音羽者是也然則太簇之下當商角並書今書角而不書商者五聲之序不書商人自通之四時之序不書角則其義不彰也詳見後圖黃鐘律本長九寸空圍九分積八百一十分黃鐘之實子一丑三為絲法寅九為寸數以酉數為法約亥數得寅寸數卯二十七為毫法辰八十一為分數以未數為法約亥數得辰分數已二百四十三為釐法午七百二十九為釐數以已數為法約亥數得午釐數未二千一百八十七為分法申六千五百六十一為毫數以卯數為法約亥數得申毫數酉一萬九千六百八十三為寸法戊五萬九千四十九為絲數以丑數為法約亥數得戍絲數亥一十七萬七千一百四十七黃鐘九寸以三分為損益故以三厯十二辰得一十七萬七千一百四十七為黃鐘之實其十二辰所得之數子寅辰午申戌六陽辰為黃鐘寸分毫釐絲之法其寸分釐毫絲之法皆用九數九絲為毫九毫為釐九釐為分九分為寸為黃鐘律吕新書置一而九三之以為法實如法得九寸命曰黃鐘之律規始于一一不生故分而為隂陽陰陽合和而萬物生故曰一生二二生三三生萬物三參物三三如九故黃鐘之九寸而宫音調因而九之九九八十一故黃鐘之數立焉黃者土德之色鐘者氣所種也日冬至德氣為土土色黃故曰黃鐘律之數六分為雌雄故曰十二鐘以副十二月十二各以三成故置一而十一三之為積分十七萬七千一百四十七黃鐘之大數立焉淮南子太極元氣函三為一極中也元始也行于十二辰始動于子參之于丑得三又參之于寅得九又參之于卯得二十七又參之于辰得八十一又參之于己得二百四十三又參之于午得七百二十九又參之于未得二千一百八十七又參之于申得六千五百六十一又參之于酉得萬九千六百八十三又參之于戍得五萬九千四十九又參之于亥得十七萬七千一百四十七此隂陽合德氣鐘于子化生萬物者也漢志淮南子置一而十一三之以為黃鐘之大數即置一而九三之以為寸法也夫置一而九三之既為寸法則七三之為分法五三之為釐法三三之為毫法一三之為絲法從可知矣一三之而得三三三之而得二十七五三之而得二百四十三七三之而得二千一百八十七九三之而得一萬九千六百八十三故一萬九千六百八十三以九分之則為二千一百八十七二千一百八十七以九分之則為二百四十三二百四十三以九分之則為二十七二十七以九分之則為三三者絲法也九其三得二十七則毫法也九其二十七得二百四十三則釐法也九其二百四十三得二千一百八十七則分法也九其二千一百八十七得一萬九千六百八十三則寸法也以之生十一律以之生五聲二變上下乘除參同契合無所不通蓋數之自然也律吕新書生鐘分以史記參律吕新書子一分索隱以下十一辰皆以三乘之為黃鐘積實之數一為九寸子黃鐘也九寸黃鐘之管丑三分二索隱黃鐘長九寸林鐘為衡衡長六寸以九比六三分少一故云丑三分二即是黃鐘三分去一下生林鐘之數一為三寸丑林鐘也以黃鐘九寸分為三分每分三寸用二分得林鐘之管六寸林鐘在隂無所增損數三其子之一得丑三分倍其子之一得二丑隂隂數用倍者三分黃鐘而損其一也寅九分八索隱太簇長八寸圍八分寅九分八即是林鐘三分益一上生太簇之數一為一寸寅太簇也以黃鐘九寸分為九分每分一寸用八分得太簇之管八寸三其丑之三得寅九分四其丑之二得八寅陽數陽數用四者三分林鐘而增其一也卯二十七分十六索隱南吕為卯衡長五寸三分寸之一以三約二十七得九即黃數之本數又以三約十六得五縣三分之一即南吕之長故云卯二十七分十六亦是太簇三分去一下生南吕之數三為一寸一為三分卯南吕也以黃鐘九寸分為二十七分每三分一寸用十六分得南吕之管五寸三分南吕在隂無所增損此三其寅之九得卯二十七分倍其寅之八得十六三分太簇而損其一也辰八十一分六十四索隱以下八辰準上九為一寸一為一分辰姑洗也以黃鐘九寸分為八十一分每九分一寸用六十四分得姑洗之管七寸一分得二其卯之二十七得辰八十一分四其卯之十六六十四此三分南吕而增其一也已二百四十三分一百二十八二十七為一寸三為三分一為三釐已應鐘也以黃鐘九寸分為二百四十三分每二十七分一寸用一百二十八分得應鐘之管四十六分六釐應鐘在隂無所增損六三其辰之八十一得已二百四十二分倍其辰之十四得一百二十八此三分南吕而增其一也午七百二十九分五百一十二八十一為一寸九為一分一為一釐午㽔賔也以黃鐘九寸分為七百二十九分每八十一分一寸用五百十二分得㽔賔之管六寸二分八釐三其已之二百四十三得午七百二十九分四其四之一百二十八得五百一十二此三分應鐘而增其一也未二千一百八十七分一千二十四二百四十三為一寸二十七為一分三為一釐一為三毫未大吕也以黃鐘九寸分為二千一百八十七分每二百四十三分為一寸用一千二十四分得四寸一分八釐三毫在陽倍之得大吕之管八寸三分六釐六毫三其午之一百二十九得未二千一百八十七分倍其午之五百一十二得一千二十四此三分㽔賔而增其一也申六千五百六十一分四千九十六七百二十九為一寸八十一為一分九為一釐一為一毫申夷則也以黃鐘九寸分為六千五百六十一分每七百二十九分為一寸用四千九十六分得夷則之管五寸五分五釐一毫一三其未之二千一百八十七得申六千五百六十分四其未之一千二十四得四千九十六此三分大吕而損其一也酉一萬九千六百八十三分八千一百九十二二千一百八十七為一寸二百四十三為一分二十七為一釐三為一毫一為一絲酉夾鐘也以黃鐘九寸分為一萬九千六百八十三分每二千一百八十七分為一寸用八千一百九十二分得三寸六分六釐三毫六絲在陽倍之得夾鐘之管七寸四分三釐七毫三絲三其申之六千五百六十一得酉一萬九千六百八十三分倍其申之四千九十六得八千一百九十二此三分夷則而增其一也戍五萬九千四十九分三萬二千七百六十八六千五百六十一為一寸七百二十九為一分八十一為一釐九為一毫一為一絲戍無射也以黃鐘九寸分為五萬九千四十九分每六千五百六十一分為一寸用三萬二千七百六十八分得無射之管四寸八分八釐四毫八絲四三其酉之一萬九千六百八十三得戍五萬九千十九分四其酉之八千一百九十二得三萬二千七百六十八此三分夾鐘而損其一也亥一十七萬七千一百四十七分六萬五千五百三十六一萬九千六百八十三為一寸二千一百八十七為一分二百四十三為一釐二十七為一毫三為一絲一為一忽亥仲吕也以黃鐘九寸分為一十七萬七千一百四十七分每一萬九千六百八十三分為一寸用六萬五千五百三十六分得三寸二分八釐六毫二絲三忽在陽倍之得仲吕之管六寸五分八釐三毫四絲六忽三其戍之五萬九千四十九得亥一十七萬七千一百四十七分倍其戍之三萬二千七百六十八得六萬五千五百三十六此三分無射而增其一也黃鐘生十一律子寅辰午申戍六陽辰皆下生丑卯巳未酉亥六隂辰皆上生其上三厯十二辰者皆黃鐘之全數其下隂數以倍者即算法倍其實三分本律而損其一也陽數以四者即算法四其實三分本律而增其一也以上論數之實此下推管之長六陽辰當位自得子為陽辰黃鐘當位自得也六隂辰則居其衝丑為未衝林鐘以未而居丑居其衝也其林鐘南吕應鐘三吕在隂無所增損自午至亥隂位也未酉亥隂辰也三吕居之隂之隂也其大吕夾鐘仲吕三吕在陽則用倍數自子至已陽位也丑卯已隂辰也三吕居之隂之陽也方與十二月之氣相應蓋隂之從陽自然之位也律吕新書按淮南之説自午㽔賔以後隂氣用事上下損益律吕交變故有五上六下之文此説六陽辰皆下生六隂辰皆上生隂數以倍者三分損一陽數以四者三分益一是主漢志不變之説也詳見後生黃鐘生黃鐘術曰以下生者倍其實三其法索隱蔡雍云陽生隂為下生隂生陽為上生律厯志隂陽相生自黃鐘始而左旋八八為伍孟康注從子數辰至未得八下生林鐘數未至寅得八上生太簇上下相生皆以此為率今云以下生者謂黃鐘下生林鐘黃鐘長九寸倍其實者二九十八三其法者以三為法約之得六為林鐘之長焦延夀云以上生下皆三生二以下生上皆三生四是此説也以上生者四其實三其法索隱四其實者謂林鐘上生太簇林鐘長六寸以四乘六得二十四以三約之得八為太簇之長上九商八羽七角六宫五徵九索隱此五聲之數亦上生三分益一上生宫宫去一下生徵徵益一上生商商去一下生羽羽益一上生角然此文似數錯朱子曰當作宫九徵六商八羽五角七故二説並以五數為本律管數之長云數誤按上九商八羽七角六宫五徵九者踵上文律數五聲四孟之義而言也上九云者蓋自黃鐘至應鐘凡得一宫二商二角二徵二羽九律也除四時相生之角徵商羽四律外再遞推之則宫五角六羽七商八徵九而九律之序畢定矣以圓圖考之次第昭然而未嘗誤也蓋角六徵九得三五之數為老隂老陽居其右午以後隂用事也羽七商八亦得三五之數為少陽少隂居其左子以後陽用事也而宫以五居其中固土寄四時之義也又以五數三二而剖之商增三而得八羽增二而得七也以五數一四而剖之角增一而得六徵增四而得九也是商羽角徵四律各分宫律五數之半而成商八羽七角六徵九也此次九律之位非謂其十二律管數之長也獨舉五聲之角羽商徵者明不得與十二律損益並推也至下文置一而九三之云云始為推黃鐘首律之管數附圖如左以明之置一而九三之以為法樂彥云一氣生于子至丑而三是一三也又自丑至酉為九皆以三乘之是九三也實如法得長一寸索隱實謂以子一乘丑三至亥得十七萬七千一百四十七為實數如法謂以上萬九千六百八十三之法除實得九為黃鐘之長言得一者算術設法辭長寸二字衍韋昭云得九寸之一也文按得長一寸猶言得寸之一位也止云得一與下凡得二字義轉不屬凡得九寸命曰黃鐘之宫史記黃鐘參分損一下生林鐘黃鐘之實九寸下生者倍其實得十八為法三分其法得一者六為六寸以為林鐘黃鐘位子其數八十一主十一月下生林鐘淮南子黃鐘初九也下生林鐘之初六康成周禮注參分林鐘益一上生太簇林鐘之實六寸上生者匹其實得二十四以為法三分其法得一者八為八寸以為太簇林鐘之數五十四主六月上生太簇淮南子林鐘上生太簇之九二鄭注參分太簇損一下生南吕太簇之實八寸下生者倍其實得十六以為法三其一得三以分其法用十五得三者五為五寸餘一為三分寸之一合之為南吕太簇之數七十二主正月下生南吕淮南子太簇下生南吕之六二鄭注參分南吕益一上生姑洗南吕之實五寸三分寸之一計十六分上生者四其實得六十四以為法三其三得九以分其法用六十三得九者七為七寸餘一為九分寸之一合之為姑洗南吕之數四十八主八月上生姑洗淮南子南吕上生姑洗之九三鄭注參分姑洗損一下生應鐘姑洗之實七寸九分寸之一計六十四分下生者倍其實得一百二十八以為法三其九得二十七以分其法用一百八得二十七者四為四寸餘二十為二十七分寸之二十合之為應鐘姑洗之數六十四主三月下生應鐘淮南子姑洗下生應鐘之六三鄭注參分應鐘益一上生㽔賔㽔賔之實四寸二十七分寸之二十計一百二十八分上生者四其實得五百一十二以為法三其二十七得八十一以分其法用四百八十六得八十一者六為六寸餘二十六為八十一分寸之二十六合之為㽔賔應鐘之數四十二主十月上生㽔賔淮南子應鐘上生㽔賔之九四鄭注參分㽔賔損一下生大吕㽔賓之實六寸八十一分寸之二十六計五百一十二分下生者倍其實得一千二十四午以後陽律下生用倍數倍之得二千四十八以為法三其八十一得二百四十三以分其法用一千九百四十四得二百四十三者八十八寸餘一百四為二百四十三分寸之一百四合之為大吕㽔賔之數五十七主五月上生大吕淮南子㽔賔上生大吕之六四鄭注與此後上下相生漢志異參分大吕益一上生夷則大吕之實八寸二百四十三分寸之一百四計二千四十八分隂吕上生用半數半之得一千二十四分上生者四其實得四千九十六以為法三其二百四十三得七百二十九以分其法用三千六百四十五得七百二十九者五為五寸餘四百五十一為七百二十九分寸之四百五十一合之為夷則大吕之數七十六主十二月下生夷則淮南子大吕下生夷則之九五鄭注參分夷則損一下生夾鐘夷則之實五寸七百二十九分寸之四百五十一計四千九十六分下生者倍其實得八千一百九十二又倍之得一萬六千三百八十四以為法三其七百二十九得二千一百八十七以分其法用一萬五千三百九得二千一百八十七者七為七寸餘一千七十五為二千一百八十七分寸之一千七十五合之為夾鐘夷則之數五十一主七月上生夾鐘淮南子夷則上生夾鐘之六五鄭注參分夾鐘益一上生無射夾鐘之實七寸二千一百八十七分寸之一千七十五計一萬六千三百八十四分半之得八千一百九十二分上生者四其實得三萬二千七百六十八以為法三其二千一百八十七得六千五百六十一以分其法用二萬六千二百四十四得六千五百六十一者四為四寸餘六千五百二十四為六千五百六十一分寸之六千五百二十四合之為無射夾鐘之數六十八主二月下生無射淮南子夾鐘下生無射之上九鄭注參分無射損一下生中吕無射之實四寸六千五百六四十一分寸之六千五百二十計三萬二千七百六十八分下生者倍其實得六萬五千五百三十六又倍之得十三萬一千七十二以為法三其六千五百六十一得一萬九千六百八十三以分其法用十一萬八千九十八得一萬九千六百八十三者六為六寸餘一萬二千九百七十四為一萬九千六百六十三分寸之一萬二千九百七十四合之為中吕無射之數四十五主九月上生中吕淮南子無射上生仲吕之上六鄭注參分仲吕益一上生宫中吕之實六寸一萬九千六百八十三分寸之一萬二千九百七十四計十三萬一千七十二分半之得六萬五千五百三十六分上生者四其實得五十二萬四千二百八十八以為法三其一萬九千六百八十三得五萬九千四十九以分其法用四十七萬二千三百九十三得五萬九千四十九者八為八寸餘五萬一千八百九十六為五萬九千四十九分寸之五萬一千八百九十六合之為黃鐘之變隂陽相生自黃鐘始而左旋八八為伍漢志仲吕之數六十主四月極不生淮南子仲吕又上生黃鐘之變同位者象夫婦異位者象子母所謂律取妻吕生子也下生者三分去一上生者三分益一五下六上乃一終矣周禮注黃鐘生林鐘林鐘生太簇太簇生南吕南吕生姑洗姑洗生應鐘應鐘生㽔賔㽔賔生大吕大吕生夷則夷則生夾鐘夾鐘生無射無射生仲吕三分所生益之一分以上生三分所生去其一分以下生黃鐘大吕太簇夾鐘姑洗仲吕㽔賔為上林鐘夷則南吕無射應鐘為下吕氏春秋音始于宫窮于角數始于一終于十成于三氣始于冬至周而復生神生于無形成于有形然後數形而成聲故曰神使氣氣就形形理如類有可類然未形而未類或同形而同類類而可班類而可識聖人知天地識之别故從有以至未有以得細若氣微若聲然聖人因神而存之雖妙必效情核其華道者明矣非其聖心以乘聰明孰能存天地之神而成形之情哉神者物受之而不能知及其去來故聖人畏而欲存之唯欲存之神之亦存其欲存之者故莫貴焉史記按黃鐘至應鐘陽氣用事故律下生吕上生迄于㽔賔則隂氣用事天地之樞紐亦變故律上生吕下生自子至辰皆下生自已至亥皆上生陽順隂逆猶之八卦乾兑離震順而右旋巽坎艮坤逆而左轉也史有下生倍其實上生四其實之法漢志乃條分十二律上下之生終始一軌不由㽔賔而變至淮南子鄭氏始開五下六上之説理協數符于義為得而西山蔡氏専主漢志用倍數下生夫自㽔賔以下用本律之數倍其實如法而一以下生則不足不足數則不得倍倍其數是還為四其實也如㽔賔之實六寸八十一分寸之二十六計五百一十二分下生者倍其實得一千二十四以為法三其八十一得二百四十三以分其法得四寸五十二不足故用倍數八寸一百四而後合大吕之數與四其實以為法而以二百四十三以分之得數正同是還為四其一也自大吕以下用本律之數四其實如法而一以上生則數贏數贏不得不半半其數是還為倍其實也如大吕之實八寸二百四十三分寸之一百四計二千四十八分上生者四其實得九千九十八以為法三其二百四十三得七百二十九以分其法得十寸九百數贏故用半數五寸四百五十一而後合大吕之數與倍其實以為法而以二百四十三分得數正同是還為倍其實也是用倍用半以求合乎下生上生之名而于義反強而後通也至若吕氏春秋之七上五下説又獨異莫知其所本云尚史卷一百
