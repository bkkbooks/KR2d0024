body:
  text: 尚史卷八十五繫五鑲白旗漢軍李鍇撰孔子弟子傳顓孫師陳人字子張少孔子四十八嵗史記為人有容貌資質寛沖博接從容自務居不務立於仁義之行孔子門人友之而弗敬家語為孟子注琴張子張也人踸踔譎詭論語曰師也辟故不能甚善而稱狂又善鼓琴號曰琴張按琴張琴牢也説誤子張問政子曰師乎前吾語汝乎君子明于禮樂舉而錯之而已子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼔然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奥阼席則有上下車則有左右行則有隨立則有序古之義也室而無奥阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長幼逺近男女外内莫敢相踰越皆由此塗出也記仲尼燕居家語同子張問入官子曰安身取譽為難也有善勿専教不能勿搢已過勿發失言勿踦不善辭勿遂行事勿留君子入官自行此六路者則身安譽至而政從矣且夫忿數者獄之所有生也拒諫者慮之所以塞也慢易者禮之所以失也墮怠者時之所以後也奢侈者財之所以不足也専者事之所以不成也厯者獄之所由生也君子入官除七路者則身安譽至而從政矣故君子南面臨官大城而公治之精知而略行之合是忠信考是大倫存是美惡進是利除是害無求其報焉而民情可得也故臨之無抗民之志勝之無犯民之言量之無狡民之辭養之無擾于時愛之勿寛于刑則身安譽至而民自得也故君子南面臨官所見邇故明不可弊也所求邇故不勞而得也所以治者約故不用衆而譽至也法象在内故不逺源泉不竭故天下積也而木不寡短長人得其量故治而不亂故六者貫乎心蔵乎志形乎色發乎聲若此則身安譽至而民自得也故君子南面臨官不治則亂至亂至則争争之至又反於亂是故寛裕以容其民慈愛以優柔之而民自得也已故躬行者政之始也調說者情之道也善政行易則民不怨言調說則民不辨法仁在身則民顯以佚之也財利之生徴矣貪以不得善政必簡矣茍以亂之善言必聴矣詳以失之規諫曰至煩以不聴矣言之善者在所日聞行之善者在所能為故上者民之儀也有司執政民之表也邇臣便辟者羣臣僕之倫也故儀不正則民失誓表弊則百姓亂邇臣便辟不正亷而羣臣服汙矣故不可不慎乎三倫矣故君子修身反道察說而邇道之服存焉是故工女必自擇絲麻良工必自擇齎材賢君良上必自擇左右始故佚諸取人勞于治事勞於取人佚于治事故君子欲譽則謹其所便欲名則謹於右右故上者辟如縁木者務高而畏下者滋甚六馬之離必於四面之衢民之離必於上之佚政也故上者尊嚴而絶百姓者卑賤而神民而愛之則存惡之則亡也故君子南面臨官貴而不驕富恭有本能圖修業居久而譚情邇暢而及乎逺察一而闗于多一物治而萬物不亂者以身為本者也故君子莅民不可不知民之性達民之情既知其以生有習然後民特從命也故世舉則民親之政均則民無怨故君子莅民不臨以髙不道以逺不責民之所不能今臨之明王之成功則民嚴而不迎也道以數年之業則民疾疾則辟矣故古者冕而前旒所以蔽明也統絖塞耳所以弇聰也故水至清則無魚人至察則無徒故枉而直之使自得之優而柔之使自求之揆而度之使自索之民有小罪必以其善以赦其過如死使之生其善也是以上下親而不離故惠者政之始也政不正則不可教也不習則民不可使也故君子欲言之見信也者莫若先虚其内也欲政之速行也者莫若其身先之也欲民之速服也者莫若以道御之也故不先以身雖行必鄰也不以道御之雖服必强矣故非忠信則無以取親於百姓矣外内不相應則無以取信者矣四者治民之統也大戴記子夏既除䘮而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉子張問曰書云高宗三年不言言乃讙有諸仲尼曰胡為其不然也古者天子崩王世子聴於冡宰三年孔叢子子張問曰堯舜之世一人不刑而天下治何則以教誠而愛深也龍子以為一夫而被以五刑敢問何謂孔子曰不然五刑所以佐教也龍子未可謂能為書也孔叢子書曰兹殷罰有倫子張曰何謂也孔子曰不失其理之謂也今諸候不同徳國君異法折獄無倫以意為限是故知法之難也子張曰古之知法者與今之知法者異乎孔子曰古之知法者能逺今之知法者不失有罪不失有罪其于怨寡矣能逺則於獄其防深矣寡怨近乎濫防深治乎本書曰維敬五刑以成三徳言敬刑所以為徳也又曰書曰若保赤子子張曰聴訟可以若此乎孔子曰可哉古之聴訟者惡其意不惡其人求所以生之不得其所以生乃刑之君必與衆共焉今之聴訟者不惡其意而惡其人求所以殺是反古之道也又曰子張問曰聖人受命必受諸天而書云受終於文祖何也孔子曰受命于天者湯武是也受命於人者舜禹是也夫不讀詩書易春秋則不知聖人之心又無以别堯舜以禪湯武之伐也又曰子張問曰禮丈夫三十而室昔者舜三十徴庸而書云有鰥在下曰虞舜何謂也曩師聞諸夫子曰聖人在上君子在位則内無怨女外無曠夫堯為天子而有鰥在下何也孔子曰夫男子二十而冠冠而後娶古今通義也舜父頑母嚚莫克圖室家之端焉故逮之三十而謂之鰥也詩云娶妻如之何必告父母父母在則宜圖婚若已殁則已之娶必告其廟今舜之鰥乃父母之頑嚚也雖堯為天子其如舜何又曰子張曰女子必漸乎二十而後嫁何也孔子曰十五許嫁而後從夫是陽動而陰應男唱而女隨之義也以為繢組紃織絍者女子之所有事也黼黻文章之義婦人之所有大功也必十五以往漸乎二十然後可以通乎此事通乎此事然後乃能上以孝于舅姑下以事夫養子也又曰子張問書云奠髙山何謂也孔子曰高山五嶽定其差秩祀所視焉子張曰其禮如何孔子曰牲幣之物五嶽視三公小名山視子男子張曰仁者何樂于山曰夫山者巋然髙曰髙則何樂爾曰夫山草木植焉鳥獸蕃焉財用出焉直而無私焉四方皆伐焉興吐風雲以通乎天地之間隂陽和合雨露之澤萬物以成百姓咸饗此仁者之所以樂乎山也子張病召申詳而語之曰君子曰終小人曰死吾今日其庶㡬乎子張死曾子有母之喪齊衰而往哭之或曰齊衰不以弔曾子曰我弔也與哉子張之喪公明儀為志焉禇幕丹質蟻結於四隅殷士也記檀弓韓詩外傳孔子過康子子張子夏從孔子入坐二子相與論終日不决子夏辭氣甚隘顔色甚變子張曰子亦聞夫子之論邪徐言誾誾威儀翼翼後言先黙得之推讓巍巍乎蕩蕩乎道有歸矣小人之論也専意自是瞋目搤腕疾言噴噴一幸得勝疾笑嗌嗌威儀固陋辭氣鄙俗是以君子賤之也說苑孔子卦得賁喟然而嘆意不平子張進而問曰師聞賁者吉卦而歎之乎孔子曰賁非正色也吾思也質素白當正白黑當正黑夫質何也吾亦聞之丹漆不文白玉不雕寶珠不飾質有餘者不受飾也新序子張見魯哀公七日而公不禮託僕夫而去曰臣聞君好士故犯霜露冒塵垢百舍重趼以見君七日而君不禮君之好士也有似葉公子高之好龍也葉公子高好龍鉤以寫龍鑿以寫龍屋室雕文以寫龍于是天龍聞而下之窺頭于牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者也今臣聞君好士故不逺千里以見君七日不禮君非好士也好夫似士而非士者也敢託而去中論孔子謂子張曰師吾欲聞彼将以改此也聞彼而不改此雖聞何益外傳抑子夏太甚新序好龍之說有似戰國辨士語附著之以廣所聞澹臺滅明武城人字子羽少孔子三十九嵗家語作四十九嵗状貌甚惡水經注澹臺子羽齎千里之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼撡劎斬蛟蛟死乃投璧於河三投而輒躍出乃毁璧而去欲事孔子孔子以為材薄既已受業退而修行行不由徑非公事不見卿大夫南游至江索隠吳國東南有澹臺湖從弟子三百人設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽史記家語澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辨孔子曰里語云相馬以輿相士以居弗可廢矣以容取人失之子羽以辭取人失之宰予史云貌惡而家語以為君子之容語正相反博物志澹臺子羽子溺水死欲葬之滅明曰此命也與螻蟻何親與魚鱉何讎遂使勿葬宓不齊字子賤孔安國曰魯人少孔子四十九嵗史記十家語作三嵗仕於魯為單父宰辭行請君之近史二人與之俱至官宓子戒邑吏令二史書方書輙掣其肘書不善則從而怒之二史患之辭請歸宓子曰子之書甚不善子免而歸矣二史歸報於君曰宓子使臣書而掣肘書惡而又怒臣邑吏皆笑之此臣之所以來也魯君以問孔子孔子曰宓不齊君子也屈節治單父将以自試也意者以此為諫乎公寤太息而歎曰寡人不肖亂宓子之政而責其善者數矣遽發使告宓子曰自今以往單父非吾有也從子之制有便於民者子决為之五年一言其要宓子遂得行其政於是單父治焉說苑宓子賤為單父宰辭于夫子夫子曰母迎而距也母望而許也許之則失守距之則閉塞譬如髙山深淵仰之不可極度之不可測也說苑子賤為單父宰過於陽晝曰子亦有以送僕乎陽晝曰吾少也賤不知治民之術有釣道二焉請以送子夫扱綸錯餌迎而吸之者陽橋也其為魚薄而不美若存若亡若食若不食者魴也其為魚也博而厚味子賤曰善未至單父冠盖迎之者交接於道子賤曰車驅之陽晝之所謂陽橋者矣至單父請其耆老尊賢者而與之共治單父齊人攻魯道由單父單父之老請曰麥熟矣今齊冦至不及人人自收其麥請放民出穫麥可以益糧且不資於冦三請而宓子不聴俄而齊冦逮於麥季孫聞之怒使人讓宓子曰民寒耕熱耘曾不得食豈不哀哉不知猶可以告者三而子不聴非所以為民也宓子蹵然曰今兹無麥明年可樹若使不耕者穫是使民樂有冦且得單父一嵗之麥於魯不加彊喪之不加弱若使民有自取之心其創必數世不息季孫聞之曰地若可入吾豈忍見宓子哉孔子使巫馬期逺觀政巫馬期入單父界見漁者得魚輒舍之巫馬期問焉漁者曰魚之大者名為䲖吾大夫愛之其小者名為鱦吾大夫欲長之是以得二者輒舍之巫馬期返以告孔子曰宓子之徳至使民闇行若有嚴刑於旁敢問何行而得於是孔子曰吾嘗與之言曰誠於此者刑乎彼宓子行此術於單父也家語吕氏春秋同說苑宓子賤治單父彈鳴琴身不下堂而單父治巫馬期亦治單父以星出以星入日夜不處而單父亦治巫馬期問其故於宓子宓子曰我之謂任人子之謂任力任力者固勞任人者固佚說苑孔子弟子有孔蔑者與宓子賤皆仕孔子過孔蔑問之曰自子之仕何得何亡孔蔑曰未有所得而所亡者三曰王事若襲學焉得習以是學不得明所亡者一也奉禄少鬻鬻不足及親戚親戚益疏所亡者二也公事多急不得弔死視病朋友益䟽所亡者三也孔子復見子賤曰自子之仕何得何亡子賤曰未有所亡而所得者三始誦之文今履而行之是學日益明所得者一也奉禄雖少鬻鬻得及親戚親戚益親所得者二也公事雖急夜勤弔死視病朋友益親所得者三也說苑孔子謂子賤曰子治單父而衆說語丘所以為之者曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣曰不齊所父事者三人兄事者五人友者十一人孔子曰父事三人可以教孝矣兄事五人可以教弟矣友十一人可以教學矣中節也中民附矣曰此地有賢於不齊者五人不齊事之教不齊所以治之術孔子曰欲其大者乃於此在矣昔者堯舜清微其身以聴觀天下務來賢人夫舉賢者百福之宗也神明之主也不齊之所治者小也所治者大其與堯舜繼矣韓非子宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細治之而憂治天下将奈何淮南子賓有見人於宓子者賓出宓子曰子之賓有三過望我而笑是攓也談語而不稱師是返也交淺而言深是亂也賓曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也與趙䇿馮忌說同見說客傳韓非子田明辜射宓子賤宰予不免於田常宋書畢萬保軀宓賤殘領按闞止事誤宰我已見前宓賤死事當亦誤儒家宓子十六篇又景子三篇說宓子似其弟子漢書高柴字子臯又作羔少孔子三十嵗史記十家語作四嵗齊人鄭康成注衛人高氏之族長不過六尺為人篤孝而有法正家語子臯之執親之喪也泣血三年未嘗見齒君子以為難仕魯為成宰家語作武城宰誤成人有兄死而不為衰者聞子臯将為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰子臯葬其妻犯人之禾申詳以告曰請庚之子臯曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也魯子蒲卒哭者呼滅子臯曰若是野哉哭者改之記檀弓後與子路俱仕衛衛蒯聵與孔俚作亂子路聞之馳往遇子臯出衛城門謂子路曰出公去矣而門已閉子可還矣母空受其禍子路曰食其食者不避其難子臯卒去子路死之史記說苑子羔為衛政刖人之足衛亂子羔走郭門郭門閉刖者守門曰于彼有缺子羔曰君子不踰曰于彼有竇子羔曰君子不隧曰于此有室子羔入追者罷子羔将去謂刖者曰吾不能虧損主人法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰㫁足固我罪也無可奈何君之治臣也傾側法令先後臣以法欲臣之免于法也臣知之獄决罪定臨當行刑君愀然不樂見於顔色臣又知之君豈私臣哉韓非子同而以孔子為衛相人惡孔子於衛君衛君欲執孔子孔子走弟子皆逃子臯從出門誣甚文選注衛蒯聵亂子臯滅髭鬚衣婦人衣逃出曰父子争國吾何為其間乎原憲檀弓作仲憲字子思宋人康成注魯人少孔子三十六嵗清静守節貧而樂道孔子為魯司冦原憲嘗為孔子宰家語孔子卒原憲亡在草澤中家語作隠於衛子貢相衛結駟連騎排藜藿入窮閻過謝原憲憲攝敝衣冠見子貢子貢曰夫子豈病乎原憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慚不懌而去終身恥其言之過史記繁韓詩外傳語而同漆雕開字子若史記作子開蔡人康成注魯人少孔子十一嵗習尚書不樂仕孔子曰子之齒可以仕矣時将過子若曰吾斯之未能信孔子說家語孔叢子漆雕開形殘非行已之致何傷于徳哉說苑孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢漆雕馬人對曰臧氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人之美也隐而顯其言人之過也徴而著故智不能及明不能見得無數卜乎按說苑馬人嘗事臧氏三世與開不仕者正相反非開明矣而弟子中又無所謂漆雕馬人者家語作漆雕慿亦無之有若字子有魯人少孔子三十三嵗史記作四十三嵗今本家語作三十六嵗為人彊識好古家語有若問於曾子曰問喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也聞諸夫子也有子又曰是非君子之言也曾子曰參也與子游聞之有子曰然然則夫子有為言之也曾子以斯言告於子游子游曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速杇為桓司馬言之也南宫敬叔反必載寶而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子游之言告有子有子曰然吾固曰非夫子之言也曾子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也昔者夫子失魯司冦将之荆葢先之以子夏又申之以冉有以斯知不欲速貧也曾子曰晏子可謂知禮也已㳟敬之有焉有若曰晏子一孤裘三十年遣車一乗及墓而反言其既窆即歸不留賓客有事也國君七個遣車七乗大夫五個遣車五乗人臣賜車馬者乃得有遣車遣車之差大夫五諸候七个謂所包遣奠牲體之數晏子焉知禮曾子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮史記孔子既没弟子思慕有若状似孔子弟子相與共立為師事之如夫子時他日弟子進問曰昔夫子當行使弟子持雨具已而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離於畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨啇瞿年長無子其母為取室孔子使之齊瞿母請之孔子曰無憂瞿年四十後當有五丈夫子已而果然敢問夫子何以知之有若黙然無以應弟子起曰有子避之此非子之座也師事有若史不知何所本謬悠之言不足徴也有若之喪悼公弔焉子游擯由左記檀弓公西赤字子華康成注魯人家語同少孔子四十二嵗史記束帶立朝閒賔立之儀家語孔叢子書曰其在祖甲不義惟王公西赤曰聞諸晏子湯及太甲武丁祖乙天下之大君夫太甲為王居喪行不義同稱君何也孔子曰君子之於人計功而除過太甲即位不明居喪之禮而干冡宰之政伊尹放之於桐憂思三年追悔前愆起而復位謂之明王以此觀之雖四於三王不亦可乎淮南子公西華之養親也若與朋友處南宫縚一名括字子容孔安國曰魯人以智自将世清不廢世濁不汚孔子以其兄之子妻之家語南宫縚之妻之姑之喪夫子誨之曰爾母從從爾從從髙也爾母扈扈爾扈扈廣也葢榛以為笄長尺而總八寸記檀弓索隠即孟僖子之子仲孫閲康成注亦同並誤說見後巫馬施字子旗康成注魯人家語巫馬期陳人字子期少孔子三十嵗史記韓詩外傳子路與巫馬期薪於韞邱之下陳之富人處師氏者指車百乗觴於韞邱之上子路曰使子無忘子之所知亦無進子之所能得此富終身無復見夫子子為之乎巫馬期喟然而嘆曰聞之夫子勇士不忘喪其元志士仁人不忘在溝壑子不知予與試予與意者其志與子路心慚負薪先歸孔子曰由何為偕出而先返也子路以告孔子援琴而彈詩曰肅肅鴇羽集於苞栩王事靡盬不能藝稷黍父母何怙悠悠蒼天曷其有所子道不行也使汝願者顔無繇字路路者顔囘父父子嘗各異時事孔子史記少孔子六嵗孔子始教於闕里而受學焉家語曾蒧字晳曾參父疾時禮教不行欲修之孔子善焉家語司馬耕家語司馬黎耕字子牛孔安國曰宋人性躁好言語兄桓魋行惡嘗憂之家語樊須字子遲康成注齊人家語魯人少孔子四十六嵗弱仕于季氏家語左史記少三十六嵗為按哀十一年清之戰冉求帥師管周父御樊遲右季孫曰須也弱有子曰就用命焉葢少孔子四十六嵗至此裁二十三嵗故云弱公晳哀字季次家語作公晳克魯人孔子曰天下無行多為家臣仕於都唯季次未嘗仕史記困潛夫論顔原公晳饉於郊野公冶長齊人字子長家語魯人名萇范甯云名芝孔子以其子妻之史記海録公治長辨鳥雀語云唶唶嘖嘖白蓮水邊有車覆粟車脚淪泥犢牛折角收之不盡相呼共啄人驗之果然張華云公冶長墓在城陽姑幕城東南五里所墓極髙商瞿魯人字子木少孔子二十九嵗孔子傳易於瞿瞿傳楚人馯臂子弓史記作宏誤子弓傳江東人矯子庸疵漢書作橋疵魯人疵傳燕人周子家豎漢書作周醜豎傳淳于人光子乗羽羽傳齊人田子荘何何傳東武人王子中同同傳菑川人楊何史記梁鱣一作鯉字叔魚少孔子二十九嵗史記家語齊人少孔子三十九嵗梁鱣年三十未有子欲出其妻商瞿謂曰子未也昔吾年三十八無子吾母為吾更取室夫子使吾之齊母欲請留子曰無憂也瞿過四十當有五丈夫子今果然吾恐子自晩生耳未必妻之過從之二年而有子顔幸字子柳康成注魯人少孔子四十六嵗史記子栁之母死子碩請具子栁曰何以哉子碩曰請粥庶弟之母子栁曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子栁曰不可吾聞之也君子不家於喪請班諸兄弟之貧者記檀弓皮註子栁魯叔之子子碩之兄冉孺字子魯一作曾家語魯人字子魚少孔子五十嵗史記公伯寮史記作繚或云即申繚字子周史記翁馬融注魯人弟子也文禮殿圖有家語無曹䘏字子循少孔子五十嵗史記伯䖍字子析家語作伯處字子晳少孔子五十嵗史記公孫龍字子石孟子趙人康成注楚人家語作公孫寵衛人詳趙傳少孔子五十三嵗史記說苑子貢問子石子不學詩乎子石曰吾暇乎哉父母求吾孝兄弟求吾悌朋友求吾信吾暇乎哉說苑子石登吳山四望而歎曰嗚呼悲哉世有明於事情不合於人心者有合於人心不明於事情者弟子問曰何謂也曰昔者吳王夫差不聴伍子胥盡忠極諫抉目而辜太宰嚭公孫雒偷合茍容以順志而沈身江湖頭懸越旗昔者費仲惡來革長鼻抉耳崇侯虎順紂之欲武王伐紂四子身死牧之野頭足異所比干盡忠剖心而死今欲明事情恐有抉目剖心之禍欲合人心恐有頭足異所之患由是觀之君子道狹耳不逢明主狹道之中又将險危閉塞無可從出者史記自公孫龍已右顯有年名及受業聞見於書傳者三十五人冉季字子産史記魯康成注人公祖句兹字子之史記祖家語作公兹秦商字子丕史記四康成注楚人家語魯人字丕兹少孔子十嵗其父厪父與孔子父叔梁紇俱以力聞蘇轍古史少四嵗說似近申黨字周史記周正義魯人或作棠即申棖家語申績字子或作續按鄭康成云申棖葢孔子弟子申續是申續即申棖也後漢王政碑云有羔羊之潔無申棠之欲是申棠亦即申棖也顔之僕字叔史記記康成注魯人家字子叔榮旂字子祺史記字家語榮祈子顔縣成字子祺康成注魯人家語縣成字子横左人郢字行史記左康成注魯人家語郢字子行燕伋字思史記字家語燕級子思薛邦字子從家語為史記鄭國字子徒葢誤薛鄭避漢諱邦作國秦非字子之史記魯康成注人施之常字子恒史記子家語字常顔噲字子聲史記魯康成注人步叔乗字子車史記韻康成注齊人廣作少叔乗原亢籍史記正家語原亢字籍義亢作冗樂欬字子聲史記語正義魯人家作樂欣廉絜字庸史記語康成注衛人家字子曹叔仲㑹字子期史記晉康成注人家語魯人少孔子五十嵗與孔璇年相比每孺子執筆記事於夫子二人迭侍左右孟武伯見孔子而問曰此二孺子之幼也於學豈能識于壮哉孔子曰然少成則若性也習慣若自然也顔何字冉史記稱康成注晉人家語字史記索隠引秦祖字子南史記秦康成注人漆雕哆字子歛史記魯康成注人顔高字子驕史記産家語名今本家語作顔刻字子驕少孔子五十嵗孔子適衛子驕為僕衛靈公與夫人南子同車出而使孔子為次游過市孔子恥之曰吾未見好德如好色者也漆雕徒父史記作康成注字子有家語從父字子文壤駟赤字子徒史記語康成注秦人家字子從商澤史記家康成注字子季語字子秀石作蜀字子明史記語康成注成紀人家作石子蜀任不齊字選史記語康成注楚人家字子選公良孺字子正史記周家語陳人賢而有勇孔子行常以家車五乗從后處字子里史記作康成注齊人家語石處字里之秦冉字開史記無家語公夏首字乗史記公康成注魯人家語夏守字子乗奚容蒧字子晳史記奚正義衛人家語蒧字子偕公堅定字子中史記家康成注魯人或云衛人語公肩字子仲顔祖字襄史記顔正義魯人家語相字子襄鄡單字子家史記單家語縣亶字子象之按鄡古作鄡亶家象並以音形近而譌以為家語無者誤句井疆史記語康成注衛人家字子疆罕父黑字子索史記一家語字子黑作字索狄黑字晳史記晳家語字之邽選字子歛史記選康成注魯人家語字子飲文翁圖作國葢亦避漢諱改之劉氏作邽巽孔忠史記子注云字蔑家語孔弗字子蔑孔子兄孟皮之子孔蔑問行己之道子曰知而弗為莫若弗知親而弗信莫若勿親樂之方至樂而弗驕患之将至思而勿憂孔蔑曰行己乎子曰攻其所不能補其所不備毋以其所不能疑人毋以其所能驕人終日言無遺己之憂終身行不遺己之患唯智者有之公西輿如字子上史記西家語作公與公西蒧字子上史記冉康成注魯人家語字子尚者史記自季已後無年及不見書傳四十二人按公良孺顔高秦商叔仲㑹孔忠家語並有事迹是不見書傳者三十七人陳亢陳人字子亢一字子禽少孔子四十嵗家語陳子車死於衛其妻與其家大夫謀以殉葬定而後陳子亢至以告曰夫子疾莫養於下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也於是弗果用記檀弓琴牢衛人字子開一字子張家語荘子子桑戸死孟子反子琴張編曲鼓琴而歌孔子使子貢往待事焉反以告孔子曰彼游方之外者也舊說家語無秦冉顔何鄡單公伯寮而有陳亢琴牢縣亶按古本家語顔何字稱縣亶即鄡單公伯僚實愬子路家語黜之是所無者唯秦冉一人而已陳亢見經琴牢見荘子今増之孺悲恤由之喪哀公使孺悲之孔子學士喪禮士喪禮于是乎書小戴禮雜記之孺悲欲見孔子辭以疾悲遂不得厠弟子列然如戴聖所紀士喪禮由悲而傳闕之非是今増之公罔之裘記射義序㸃孔子射于矍相之圃葢觀者如堵墻射至于司馬使子路執弓矢出延射曰賁軍之将亡國之大夫與為人後者不入其餘皆入葢去者半入者半又使公罔之裘序㸃揚觶而語公罔之裘揚觶而語曰幼壮孝悌耆耋好禮不從流俗修身以俟死者不在此位也葢去者半處者半序㸃又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也葢㢙有存者記射義仲孫何忌孟僖子之子懿子也孟僖子将死召其大夫曰孔丘聖人之徒也臧孫紇有言曰聖人有明徳者若不當世其後必有達人今其将在孔丘乎我若獲後必屬說與何忌于孔子使事之而學禮焉故孟懿子與南宫敬叔師事仲尼左傳仲孫説一作閲懿子之弟居南宫曰南宫敬叔禮康成注敬叔孟懿子之子仲孫閲又云南宫縚孟僖子之子南宫閲字子容其妻孔子兄女陸徳明釋文南宫閲一名縚史記索隠南宫适家語作南宫縚是孟僖子之子仲孫閲則諸說並以南宫适與括與縚與仲孫閲俱為一人按春秋名號歸一圖仲孫即閲南宫敬叔孔子弟子初不言括縚則南宫括别是一人明甚孔子與敬叔俱至周問禮樂自周反魯弟子稍益進焉子曰自南宫敬叔之乗我車也而道加行家語敬家語南宫叔以富得罪于定公奔衛衛候請復之載其寶以朝夫子聞之曰若是其貨也喪不若速貧之愈按敬叔無奔衛事說由檀弓而誤孔璇家語仲事見前叔㑹惠叔蘭衛将軍文子彌牟之弟為衛司冦子游嘗從孔子適衛與子蘭相善使之受學于孔子家語之檀弓記子蘭喪詳子游傳左丘明魯太史孔子将修春秋與左邱明乗如周觀書於周史歸而修春秋之經丘明為之傳嚴彭祖注漢書仲尼與丘明觀魯史記有所褒貶口授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而作傳論衡春秋諸家去孔子逺左氏傳出孔子壁中近得其實杜預注邱明受經于仲尼是為素臣荀崧曰孔子作春秋丘明子夏造膝親受史通丘明躬為魯史受經于仲尼啖助曰左氏受經于仲尼博采諸家叙事尤備此餘傳功最髙者按諸家並以丘明受業孔子至宋趙匡則疑左氏在孔子之前王安石疑左氏在孔子之後並誤葉夢得曰古有左氏左丘氏太史公稱左丘失明厥有國語今春秋傳作左氏而國語出左丘氏則不得為一家文體亦自不同其非一家書明甚矣按此則左丘明實為國語而作春秋傳者又别有左氏說又獨異廉瑀文翁禮殿圖林放文翁禮殿圖牧皮事孔子學者趙岐孟子注子服何是為子服景伯魯峻石壁畫像賓牟賈注不言孔子弟子然問樂免席而請子曰居吾語汝是亦弟子之禮也賈侍坐于孔子孔子與之言及樂曰夫武之備戒已久何也夫武之樂先擊鼓備戒已久乃始作舞對曰病不得其衆也武王伐紂病不得衆心故先鳴鼔戒衆久乃出戰今舞象此咏歎之淫液之何也對曰恐不逮事也恐諸侯後至不及戰事故長歌以致望慕之情發揚蹈厲之已蚤何也對曰及時事也象及時伐紂不可緩也武坐致右憲左何也坐跪也問舞武樂之人有時而跪以右足致地而左足仰何也對曰非武坐也賈言非武人坐舞法無坐也聲淫及商何也樂有貪商之聲對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣言武王實有心取商豈精明神武應天順人之志哉子曰唯丘之聞諸萇𢎞亦若吾子之言是也賓牢賈免席而請曰夫武之備戒已久則既聞命矣敢問遲之遲而又久何也言久立于綴也子曰居吾語汝夫樂者象成者也總干而山立武王之事也将舞舞人總持干盾如山之立此象武王持盾以待諸候之志發揚蹈厲太公之志也象太公鷹揚之志武亂皆坐周召之治也樂卒章象周公召公文徳之治盖以文而止武也且夫武始而北出自南第一位北至第二位為一成再成而滅商自第二位至苐三位而象滅啇三成而南自第三位至第四位極北而反南象克殷南還四成而南國是疆自北第一位至第二位象伐紂後疆理南國五成而分周公左召公右自第二位至苐三位乃分左右象周召六成復綴以崇天子自第三位而復於南頭初位象武功成而歸鎬京四海皆崇武王為天子夾振之而駟伐盛威於中國也夾舞振鐸以為節舞者戈矛四次擊刺象伐紂之兵盛威于中國夾而進事蚤濟也舞者各有部分振鐸者夾之而進於武王之事為蚤成久立於綴以待諸侯之至也久立于行綴之位象武王待諸侯之集且女獨未聞牧野之語乎武王克殷反當作及商未及下車而封黄帝之後于薊封帝堯之後於祝封帝舜之後于陳而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍禄濟河而西馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅而藏之府庫而弗復用倒載干戈包以虎皮将帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也散軍而郊射左射貍首左東學在東郊射歌貍首以為節右射騶虞右西學在西郊射歌騶虞以為節而貫革之射息也禆冕措笏而虎賁之士說劍也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬五者天下之大教也食三老五更於大學天子袒而割牲執醤而饋執爵而酳冕而總干所以教諸侯之弟也若此則周道四達禮樂交通則夫武之遲久不亦宜乎記樂記鞠語景公上路寢聞哭聲曰吾若聞哭聲何為者也梁邱據對曰魯孔丘之徒鞠語者也明于禮樂審於服喪其母死葬埋甚厚服喪三年哭泣甚哀公曰豈不可哉而色悅之晏子春秋孔叢子同顔涿聚史作濁鄒左傳作顔庚齊大夫初梁父之大盜也學于孔子為天下名士以終其夀吕覽身史記孔子世家弟子三千通六藝者七十有二人如顔濁鄒之徒受業者甚衆而于弟子列傳内無顔涿聚左傳黎邱之役涿聚為晋禽見齊傳史記七十七人外増陳亢以下十七人合九十四人此外申棖申績即申黨鄭國即薛邦不並編入又荘子徳充符篇有常季郭象注常季孔子弟子按荘子多寓言不見他本亦不敢以假託編入也孔子門人歐陽子云受業者為弟子受業于弟子者為門人成囘學於子路三年囘恭敬不已子路問其故囘對曰臣聞之行者比于鳥上畏鷹鸇下畏羅網夫人為善者少為讒者多若身不死安知禍罪不施行年七十常恐行節之虧囘是以恭敬待大命子路稽首曰君子哉說苑馯臂子弓弓一作𢎞楚人孔子傳易于商瞿瞿傳子弓史記應劭曰子弓子夏門人漢儒林傳商瞿受易仲尼瞿傳魯橋疵子庸子庸傳江東馯臂子弓橋疵子庸疵一作庇字子肩魯荘公族世子商瞿受易以授橋疵子庸漢書書史記謂子弓授子庸漢謂子庸授子弓魏文候名都世本名斯受子夏經藝史記段干木晉之大駔也學于子夏為天下名士顯人以終其夀吕覽路史段干氏初邑段後邑干因邑為氏風俗通以為姓段名干木誤髙行子齊人趙岐注子夏授詩於髙行子徐整注曽申字子西曽參之子受詩于子夏陸徳明注左丘明授春秋于曾申劉向别録穆公之母卒使人問于曽子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達布幕衛也縿幕魯也記檀弓大又曰曽子疾病曽元曽申坐于足戴記作曽華曽子疾病曽元抑首曽華抱足而趙岐注以為曽子之孫誤公羊高齊人子夏傳春秋與公羊高戴宏春秋論受荀崧曰公羊親子夏梁武帝曰公羊稟西河之學孔穎達曰孔子授春秋于卜商商授弟子公羊高穀梁赤各為之傳穀梁赤魯人子夏弟子風俗通孝縻信以為秦孝公同時人阮緒曰名俶字元始顔師古注名喜受經於子夏樂正子春曾子弟子康成注樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情記檀弓樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曽子曽子聞諸夫子曰天之所生地之所養無人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而不敢忘孝也今予忘孝之道予是以有憂色壹舉足而不敢忘父母壹出言而不敢忘父母壹舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆壹出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣記祭義正韓非子齊伐魯索讒鼎作樂子春事與栁下惠同檀弓魯人善於禮陸徳明音義修胡寅曰曽子門人纂論語公儀仲子魯同姓之喪檀弓免焉仲子舍其孫而立其子禮適子死立適孫檀弓曰何居我未之前聞也趨而就子服伯子即子服何景伯于門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫記檀弓國孔穎達䟽檀弓在六時知者以仲梁子是六國時人故知也非孔門門徒而于仲梁予之下康成注曰魯人孔疏云魯有仲梁懐仲梁魯姓故知是魯人其說自相舛戾國按記檀弓與孔子同時而云六時人誤沈猶行曽子弟子趙岐注曾子居武城有越冦或曰冦至盍去諸曰無寓人于我室毁傷其薪木冦退則曰修我墻屋我将反冦退曾子反左右曰待先生如此其忠且敬也冦至則先去以為民望冦退則反殆於不可沈猶行曰是非汝所知也昔沈猶有負芻之禍從先生者七十人未有與焉陽膚曽子弟子包成論語章句公明高曾子弟子趙岐注公明宣學於曾子三年不讀書曾子曰宣而居參之門三年不學何也公明宣曰宣見夫子居宫庭親在叱吒之聲未嘗至犬馬宣說之宣見夫子之應賓客恭儉而不懈惰宣說之宣見夫子之居朝廷嚴臨下而不毁傷宣說之宣說此三者學而未能宣安敢不學乎曾子避席謝之曰參不及宣其學而已說苑公明儀子張弟子子張之喪公明儀為志焉又為曾子弟子孔穎達疏子襄曾子弟子趙岐注公孫尼子七十子之弟子顔師古注沈約曰樂記取公孫尼子劉巘曰緇衣公孫尼子作孺家有公孫尼子二十八篇雜家有公孫尼一篇漢書世碩陳人七十子之弟子顔師古注世碩以為人情有善有惡在所養焉作養書一篇宓子賤漆雕開公孫尼子之徒亦論性情與世子相出入王充論衡儒家世子二十一篇漢書景子說宓子語似其弟子顔師古注景子三篇漢書王史氏七十子後學者顔師古注六國時人劉向别録王史氏二十一篇漢書李克子夏弟子為魏文侯相顔師古注李克七篇漢書芉嬰齊人七十子之後顔師古注芉子十八篇漢書公孫段傳易於孔門者公孫氏别有三人焉一公孫龍字子石一趙人名龍字子秉為堅白同異之辯者一鄭大夫公孫段字伯石孔子之後儒分為八有子張氏子思氏顔氏孟氏漆雕氏仲良氏公孫氏樂正氏之儒韓非子一陶潛曰顔氏傳詩為道為諷諫之儒孟氏傳書為道為疏通致逺之儒漆雕氏傳禮為道為恭儉荘敬之儒仲良氏傳樂為道以和隂陽為移風易俗之儒樂正氏傳春秋為道為屬辭比事之儒公孫氏傳易為道為潔靜精微之儒縣亶父子象孔子門人廣韻注檀索隠亶作豊家語無父字記弓有縣子瑣附著于下陳荘子齊陳恒名名伯死使人赴於魯魯人欲勿哭公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政于中國雖欲勿哭焉得而勿哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然則如之何而可縣子曰請哭諸異姓之廟于是與哭諸縣氏縣子瑣曰吾聞之古者不降上下各以其親言喪服上不降逺下不降卑滕伯文殷時滕君為孟虎齊衰其叔父也為孟皮齊衰其叔父也又曰綌衰繐裳非古也嵗旱穆公召縣子而問然曰天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子虐毋乃不可與然則吾欲暴巫而奚若曰天則不雨而望之愚婦人于以求之毋乃已疏乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎記檀弓别縣子瑣或即是縣亶父或是一人姑附見之公休哀孔子門人廣韻注公析哀孔子門人廣韻注公疑即孔子弟子晢哀盆成适孔子門人齊景公宿於路寢之宫夜分聞西方有男子哭者公悲之明日朝問于晏子晏子對曰西郭徙居布衣之士盆成适也父之孝子兄之順弟也今其母不幸而死祔柩未葬家貧身老子􅳼恐力不能合祔是以悲也公曰子為寡人弔之嬰往弔咎公不辱臨公使男子袒免女子髮笄開凶門而迎适晏子春秋學孫奭曰嘗欲于孟子誤按孟子時盆成括想别有一人孫奭所注葢指彼耳孟子孟子弟子附孟軻字子輿文選注子孔叢子作車鄒人也受業子思之門人孔叢子孟子車尚幼請見子思子思見之甚說其志禮敬甚崇客退子上曰白聞士無介不見女無媒不嫁孟孺子無介而見大人說而敬之白也未喻敢問子思曰然吾昔從夫子于郯遇程子于塗傾葢而語命子路将束帛贈焉以其道同於君子也今孟子車言稱堯舜性樂仁義世所希有非爾所及也孔叢子孟子問子思曰堯舜文武之道可力而致乎子思曰稱其言履其行夜思之晝行之如農之赴時商之趨利惡有不至者乎孔叢子子思謂孟子曰自大而不修其所以大不大矣自異而不修其所以異不異矣故君子髙其行人莫能階逺其志人莫能及子思子孟子問牧民之道何先子思子曰利之孟子曰君子之教民者亦仁義而已何必曰利子思子曰仁義者固所以利之也上不仁則不得其所不義則利為詐此為不利大矣風俗通亦以為受業于子思按孟子上距孔子百二十年史說為得道既通游事齊宣王宣王不能用荀子孟子三見宣王不言事門人曰曷為三遇齊王而不言事曰我先攻其邪心韓詩外傳孟子說齊宣王而不說淳于髠侍孟子曰今日說公之君公之君不說意者其未知善之為善乎髠曰夫子亦誠無善耳昔者匏巴鼔瑟潛魚出聴伯牙鼓琴六馬猶秣魚馬猶知善之為善而況君人者孟子曰夫電雷之震不能使聾者有聞日月之明不能使盲者有見公之君若此也髠曰不然揖封生高商而齊人好歌杞梁之妻哭而人稱詠夫聲無細而不聞行無隠而不形夫子苟賢居魯而魯何也孟子曰吞舟之魚不居潛澤度量之士不居汙世夫蓺冬至必彫吾亦時矣適梁梁惠王數敗于軍旅卑禮厚幣以招賢者鄒衍淳于髠孟子皆至梁梁惠王曰寡人不佞兵三折于外太子虜上将死國以空虚以羞先君宗廟社稷寡人甚醜之叟不逺千里辱幸至敝邑之廷将何以利吾國孟子曰君不可以言利君欲利則大夫欲利大夫欲利則庶人欲利上下争利國則危矣為人君仁義而已矣何以利為梁惠王謀欲攻趙孟子稱太王去邠此豈有意阿世俗苟合而已哉持方枘欲内圓鑿其能入乎此段舊在作孟子七篇下今易置之新論秦攻梁惠王謂孟子曰秦攻梁先生何以禦乎對曰昔太王居邠狄人攻之太王不欲傷其民乃去邠之岐今王奚不去梁乎惠王不說梁惠王不果所言則見以為迂逺而濶于事情風俗通孟子游于諸侯所言皆以為迂逺而濶于事情然終不屈道趨合嘗仕於齊位至卿後不能用孟子去齊絶糧於鄒薛困殆甚退與萬章之徒序詩書仲尼之意作孟子十一篇梁惠王復聘請之以為上卿鹽鐵論孟子守舊術不知世務困於梁宋文選注雖往來屯難不見任用終亦為周威王師仕齊梁為卿及為周威王師說皆異當是之時秦用商君富國强兵楚魏用吳起戰勝弱敵天下方務于合從連衡以攻伐為賢而孟子乃述唐虞三代之徳是以所如不合退而與萬章之徒序詩書述仲尼之意作孟子七篇史記儒家孟子十一篇漢書馬總意林孟子曰白羽白性輕白雪白性消白玉白性貞雖俱白其性不同也文選注孟子曰有人道我善者是吾賊也道吾惡者是吾師也法言孟子曰夫有意而不至者有矣未有無意而至者矣鹽鐵論孟子曰今之士大夫皆罪人也逢其意以順其惡又曰堯舜之道非逺人也人不思之耳漢書孟子曰紂貴為天子而死曽不如匹夫是紂先自絶久矣非死之日天去之也風俗通孟子曰堯舜不勝其美桀紂不勝其惡傳言失指圖景失形廣文選魯平公與齊宣王㑹于鳬繹山下樂克備道孟子于平公曰孟子私淑仲尼其徳輔世長民其道發政施仁君何為不見乎樂正克孟子弟子為魯臣趙岐注萬章孟子弟子趙岐注注索隠孟子之門人廣韻離婁之門人公孫丑孟子弟子趙岐注浩生不害浩生一作告孟子弟子趙岐注孟仲子孟子之從昆弟從學于孟子趙岐注陳臻孟子弟子趙岐注充虞孟子弟子趙岐注屋廬連孟子弟子趙岐注徐辟孟子弟子趙岐注陳代孟子弟子趙岐注彭更孟子弟子趙岐注公都子孟子弟子趙岐注咸丘蒙孟子弟子趙岐注高子齊人嘗學于孟子趙岐注桃應孟子弟子趙岐注滕更滕君之弟來學於孟子趙岐注論曰程子有言曰仲尼元氣也顔子春生孟子秋殺盡見又曰仲尼無迹顔子微有迹孟子其迹著可謂體聖賢之審者然振聾昭昧辟邪直枉天生孟子亦寓復於剥乎四時之氣備而後嵗功成孟子葢董其成者也尚史卷八十五
