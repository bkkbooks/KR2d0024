body:
  text: 尚史卷八十列傳五十八鑲白旗漢軍李鍇撰説客傳陳軫子應附陳軫者游説之士去楚之秦與張儀俱事秦惠王秦攻陘韓使人馳南陽之地馳反走示服也秦已馳馳進也韓避而秦進也又攻陘韓因割南陽之地秦受地又攻陘陳軫謂秦王曰國形不便故馳交不親故割今割矣而交不親馳矣而兵不止臣恐山東無以馳割事王者矣且王求百金于三川而不可得求千金于韓一旦而具今王攻韓是絶上交而固私府竊為王不取也張儀之相楚歸也田華之為軫説惠王曰臣恐王之如郭君夫晉獻公欲伐郭而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政舟之僑諫而不聽遂去因而伐郭遂破之又欲伐虞而憚宫之竒存荀息曰美男破老乃遺之美男教之惡宫之竒宫之竒諌而不聽遂亡因而伐虞遂取之今秦自以為王能害王者之國者楚也楚知横門君葢秦將之善用兵與陳軫之智故驕張儀以五國來必惡是二人願王勿聽也張儀果言軫王不聽張儀又謂惠王曰陳軫為王臣常以國情輸楚儀不能與從事願王逐之即復之楚願王殺之王曰軫安敢之楚也王召陳軫告之曰吾能聽子子欲何之請為子約車對曰臣願之楚王曰儀以子為之楚吾又自知子之楚子非楚且安之也軫曰臣出必故之楚以順王與儀之䇿而明臣之楚與否也楚人有兩妻者人誂其長者長者詈之誂其少者少者許之居無幾何有兩妻者死客謂誂者曰汝取長者乎少者乎取長者客曰長者詈汝少者和汝汝何為取長者曰居彼人之所則欲其許我也今為我妻則欲其為我詈人也今楚王明主而昭陽賢相也軫為人臣而常以國情輸楚楚王必不留臣昭陽將不與臣從事矣以此明臣之楚與否軫出張儀入問王曰陳軫果安之王曰夫軫天下之辯士也熟視寡人曰軫必之楚寡人遂無奈何也寡人因問曰子必之楚也則儀之言果信也軫曰非獨儀之言行道之人皆知之昔者子胥忠其君天下皆欲以為臣孝已愛其親天下皆欲以為子故賣僕妄不出里巷而取者良僕妾也出婦嫁于鄉里者善婦也臣不忠于王楚何以軫為忠忠且見棄軫不之楚而何之乎王以為然遂善待之秦終相張儀陳軫之楚張儀之去秦相魏也楚王欲逐之陳軫曰王何逐張儀曰不忠不信曰不忠王無以為臣不信王勿與為約且魏臣不忠不信于王何傷忠且信于王何益逐而聽則可若不聽是王今困也且使萬乘之國免其相是城下之事也張儀欲窮陳軫令魏王召而相之來將倍之軫之魏張儀惡之于魏王曰軫猶善楚為求地甚力左夾國䇿作左華謂軫曰儀善于魏王魏王甚信之公雖百説之猶不聽也公不如以儀之言為資而得復楚陳軫曰善因使人以儀之言聞于楚楚王喜欲復之軫之之魏也將行其子陳應止之曰物之湛者不可不察也湛謂其謀之深鄭彊自秦來曰應為智夫魏欲絶楚齊故重迎公郢中不善公者欲公之去也必勸王多公之車公至宋道稱疾而毋行使人謂齊王曰魏之所以迎我者欲絶齊楚也齊王曰子無東之魏而見寡人也請封子因以魯侯之車迎之秦伐魏陳軫合三晉而謂齊王曰古之王者之伐也欲以正天下立功名以為後世也今齊楚燕趙韓梁六國之遞甚也不足以立功名適足以彊秦而自弱非山東之上計也能危山東者强秦也不憂强秦遞相罷弱而兩歸其國于秦此臣所以為山東患也天下為秦相割秦曽不出力天下為秦相烹秦曽不出薪何秦之智山東之愚耶古之五帝三王五霸之伐也伐不道者今秦之伐天下不然必欲反之主必死辱民必死虜今韓梁之目未嘗乾而齊民獨不非齊親而韓梁疏也齊逺秦而韓梁近也今齊將近矣秦欲攻梁絳安邑得絳安邑以東下河必表裏河山而東攻齊舉齊屬之海南面而孤楚韓梁北向而孤燕趙齊無所出其計矣願王熟慮之今三晉已合矣復為兄弟約而出鋭師以戍梁絳安邑此萬世之計也齊非急以鋭師合三晉必有後憂三晉合秦不敢攻梁必南攻楚楚秦搆難三晉怒齊不與已也必東攻齊此臣之所謂齊必有大憂也不如急以兵合于三晉齊王許諾果以兵合于三晉陳軫復入楚秦伐宜陽楚王謂軫曰寡人聞韓朋巧士也習諸侯事殆能自免也公仲時守宜陽謂可免于危亡為其必免吾欲先據之以徳焉陳軫曰舍之王勿據也韓朋之智于此困矣今山澤之獸無黠于麋麋知獵者張網前而驅己也因還走而冒人至數獵者知其詐偽舉網而進之麋因得矣今諸侯明知此多詐偽舉網而進者必衆矣舍之王勿據也楚王聽之宜陽果㧞國策又曰楚杜赫説楚王以取趙王曰與之五大夫而令私行陳軫謂楚王曰赫不能得趙五大夫不可收也是賞無功也得趙而王無加焉是無善也王不如以十乘行之事成予之五大夫王曰善乃以十乘行之杜赫怒而不行陳軫謂王曰是不能得趙也楚絶齊齊舉兵伐楚陳軫謂楚王曰王不如以地東解于齊西講于秦王使陳軫之秦秦王謂軫曰子秦人也寡人與子故也寡人不佞不能親國事故子棄寡人事楚土今齊楚相伐史記作韓魏相攻或謂救之便或謂不便子獨不可以忠為子主計以其餘為寡人乎軫曰王聞呉人之遊楚者乎史記作越人莊舄楚王甚愛之病故使人問之曰誠病乎意有思乎左右曰臣知其思與不思誠思則將呉吟今軫將為王呉吟王不聞夫管與史記作館豎子之説乎有兩虎争人而鬬管莊子史記管作卞將刺之管與止之曰虎者戾蟲人者甘餌也今兩虎争人而鬬小者必死大者必傷子待傷虎而刺之是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名齊楚今戰戰必敗敗王起兵救之有救齊之利而無伐楚之害計聽知覆逆者唯王可也計者事之本聽者存亡之機故曰計有一二者難悖聽無失本末者難惑國䇿惠王曰善卒弗救史記此下有大國果傷小國亡秦興兵而伐大尅之之文按是時未有亡國説誤軫卒之年與其地史䇿皆不載淳于髠淳于髠齊人也博學强記學無所主其諌説慕晏嬰之為人也然而承意觀色為務長不満七尺滑稽多辯數使諸侯未嘗屈辱齊威王之時喜隠好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡在于旦暮左右莫敢諌淳于髠説之以隠曰國中有大鳥止王之庭三年不蜚不鳴王知此鳥何也王曰此鳥不飛則已一飛冲天不鳴則已一鳴驚人于是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯振驚皆還齊侵地威行三十六年威王八年楚大發兵加齊齊王使淳于髠之趙請救齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方來見道旁有穰田者操一豚蹄酒一盂而祝曰甌窶満篝汙邪満車五榖蕃熟穰穰満家臣見其所持者狹而所欲者奢故笑之于是王乃益齎黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乘楚聞之夜引兵而去説苑畧同説苑齊遣淳于髠到楚為人短小楚薄之謂曰齊無人邪而使子來子何長也對曰臣無長腰中七尺之劍欲斬無狀王王曰止吾戲子耳即與共飲謂髠曰吾有仇在呉國子能為報之乎對曰來見道旁郢民持一豆而上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而願多際輕而望重王今與半日之樂而委以呉王非其計也御覽引今本無威王大説置酒後宫召髠賜之酒問曰先生能飲幾何對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其説可得聞乎髠曰賜酒大王之前執法在旁御史在後髠恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠帣韝鞠􅎽帣收衣裒韝臂捍也鞠曲也􅎽與跽同小跪也侍酒于前時賜餘瀝奉觴上夀數起飲不過二斗徑醉矣若朋友交游久不相見卒然相覩歡然道故私情相語飲可五六斗徑醉矣若乃州閭之㑹男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁前有墮珥後有遺簪髠竊樂此飲可八斗而醉二參日暮酒䦨合尊促坐男女同席履舄交錯杯盤狼籍堂上燭滅主人留髠而送客羅𥜗襟解㣲聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諌焉齊王曰善乃罷長夜之飲以髠為諸侯主客宗室置酒髠嘗在側史記宣王時髠一日而見七人于王王曰子來寡人聞之千里而一士是比肩而立百世而一聖若隨踵而至也今子一朝而見七士則士不亦衆乎髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗于沮澤則累世不得一焉及之澤黍梁父之隂則郄車而載耳夫物各有疇今髠賢者之疇也王求士于髠若挹水于河而取火于燧也髠將復見之豈特七士也齊欲伐魏髠謂齊王曰韓子盧者天下之疾犬也東郭逡者海内之狡兎也韓子盧逐東郭逡還山者三騰山者五兎極于前犬廢于後犬兎俱罷各死其處田父見之無勞勌之苦而擅其功今齊魏久相持以頓其兵敝其衆臣恐强秦大楚承其後有田父之功齊王懼謝休將士後又欲伐魏魏使人謂髠曰齊欲伐魏能解魏患唯先生也敝邑有寳璧二雙文馬四駟請致之先生髠曰諾入説齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘敝名醜而實危為王弗取也王曰善乃不伐魏客謂齊王曰淳于髠言不伐魏者受魏之璧馬也王以謂髠曰聞先生受魏之璧馬有諸曰有之然則先生之為寡人計之何如髠曰伐魏之事不便魏雖刺髠于王何益若誠便魏雖封髠于王何損且夫王無伐與國之誹魏無見亡之危百姓無被兵之患髠有璧馬之寳于王何傷乎國䇿吕氏春秋齊王欲以淳于髠傅太子髠辭曰臣不肖不足以當此王擇國之長者而使之王曰子無辭也寡人豈責子之令太子必如寡人哉寡人固生而有之也子為寡人令太子如堯乎其如舜也凡説之行也道不智聽智從自非受是也今自以賢于堯舜彼且胡可以聞説哉史記齊王使淳于髠獻鵠于楚道飛其鵠徒掲空籠往見楚王曰齊王使臣來獻鵠過于水上不忍鵠之渇出而飲之去我飛亡吾欲刺腹絞頸而死恐人議王以鳥獸之故令士自殺也鵠毛物多相類者吾欲買而代之是不信而欺王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財倍鵠在也韓詩外傳作齊使而不名説苑作舍人毋擇新語曲突徙薪亦作淳于髠事客有見髠于梁惠王惠王屏左右獨坐而再見之終無言也惠王怪之以讓客曰子之稱淳于先生管嬰不及及見寡人寡人未有得也豈寡人不足為言邪何故哉客以謂髠髠曰固也吾前見王王志在驅逐後復見王王志在音聲吾是以黙然客具以報王王大駭曰嗟乎淳于先生誠聖人也前先生之來人有獻善馬者寡人未及視㑹先生至後先生之來人有獻謳者未及試亦㑹先生來寡人雖屏人然私心在彼有之後淳于髠見壹語連三日三夜無倦惠王欲以卿相位待之髠因謝去于是送以安車駕駟束帛加璧黄金百鎰終身不仕史記淮南子淳于髠以從説魏王魏王辯之約車十乘將使荆辭而行又以從未足也復以衡説其辭若然魏王乃止其行而疏其身公孫衍公孫衍是為犀首司馬彪曰魏官名韓之隂晉人也史記韓作魏按魏䇿蘇代謂魏王曰衍之為魏孰與其約韓鮑彪注隂晉時屬韓事魏襄王襄王二年徐州之役衍謂魏王曰何不陽與齊而隂結于楚二國恃王必戰齊戰勝楚而與乘之必取方城之外楚戰勝齊而與乘之是太子之讐報矣衍與張儀不善魏王將相張儀衍弗利故令人為韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川韓氏必亡且魏王所以貴張子者欲得韓地也則韓之南陽舉矣子盍少委焉以為衍功則秦魏之交可廢矣如此則魏必圖秦而棄儀收韓而相衍公叔以為然因委之衍以為功果相魏哀王時陳軫為秦使于齊過魏求見衍衍謝陳軫陳軫曰軫之所以來者事也公不見軫軫且行不得待異日矣衍乃見之陳軫曰公惡事乎何為飲食而無事公孫衍曰衍不肖不能得事陳軫曰請移天下之事于公衍曰奈何陳軫曰魏王使李從史記作田需以車百乘使于楚公可居其中而疑之公謂魏王曰臣與燕趙故矣數令人召臣曰無事必來今臣無事請謁而往王必無辭以止公公得行因言于庭曰臣急使燕趙衍謁魏王魏王許之諸侯客聞之皆使人告其王曰李從以車百乘使楚公孫衍以車三十乘使燕趙齊王聞之恐後天下得魏以事屬衍衍受齊事魏王止其行燕趙聞之亦以事屬衍楚王聞之曰李從約寡人今燕齊趙皆以事因公孫衍衍必欲寡人乃倍李從而以事屬衍魏王曰所以不使衍者以為不可今四國屬以事寡人亦以事因焉衍遂主天下之事齊王將見燕趙楚之相于衛約外魏魏王懼恐謀伐魏告衍衍曰王與臣百金臣請敗之王為約車載百金衍期齊王至之日先以車五十乘至衛間齊行人以百金先見齊王因乆坐從容談三國之相怨謂齊王曰王與公孫衍談是謀三國也不信齊王之遇遇事遂敗魏令衍請和于秦綦母恢教之曰無多割和成固有秦重不成後必莫能以魏合于秦者矣衍欲得齊魏之兵以伐趙魏王齊王不欲衍曰請國出五萬人不過五月而趙破田肹齊人曰夫輕用其兵者國危易用其計者身窮公今言破趙太易恐有後咎衍曰公之不慧也夫二君者固己不欲矣又言難以懼之是趙不伐而謀困也夫雖構兵結二君見其危安敢釋卒不我予乎田肹曰善勸兩君聽衍衍肹遂得齊魏之兵兵未出境兩君恐其戰敗也悉起兵從之大敗趙氏義渠君之魏衍謂義渠君西戎也曰道逺不得復過請謁事情中國無事于秦秦且燒􅌊君之國有事于秦秦且輕使重幣事君之國也居無幾何五國伐秦陳軫謂秦王曰義渠君蠻夷之賢君也不如賂之以撫其心秦王曰善因以文繡千匹好女百人遺義渠君義渠君致羣臣而謀曰此公孫衍之所謂也因起兵襲秦大敗秦人于李帛之下魏相田需衍為將與田需不善衍見魏王曰臣盡力竭智為王廣土取尊名田需從中敗君王又聽之是臣終無成功也需亡臣將侍需侍臣請亡王曰需寡人之股掌臣為子之不便殺之亡之毋謂天下何今為子外之令毋敢入子之事入子之事吾為子殺之亡之衍許諾于是東見田嬰與之約結召田文而相之魏身相于韓蘇代為田需説魏王曰請問文之為魏孰與其為齊王曰不如齊衍之為魏孰與其為韓王曰不如韓蘇代曰衍將右韓而左魏文將右齊而左魏二人者將用王之國中道而不可王且無所聞之矣王之國雖滲樂而從之可也王不如舍需于側以稽二人之所為二人者曰需非吾人也吾舉事而不利于魏需必挫我于王二人者必不敢有外心矣臣以為身利國便王曰善果厝需于側國策又曰公孫衍為將與田需不善季子為衍謂梁王曰不見夫服牛驂驥乎不可以日行百步今王以衍為可將故用之而聽相之計是服牛驂驥也牛馬俱死而不能成功王之國必傷矣願王察之國策史舉非犀首于王犀首欲窮之謂張儀曰請令王讓先生以國王為堯舜矣而先生弗受亦許由也衍因令王致萬戸邑于先生張儀説因令史舉數見犀首王聞之而弗任也史舉不辭而去國策田文田需周霄相善欲罪犀首犀首患之謂魏王曰今所患者齊也嬰子言行于齊王王欲得齊胡不召田文而相之彼必務以齊事王王曰善因召田文而相之犀首以倍田需周霄衍後入秦惠王死衍欲窮張儀李讐秦人謂衍曰不如召甘茂于魏召公孫顯于韓起樗里疾于國三人者皆張儀之讐也公用之則諸侯見張子之無秦矣甘茂果相秦秦武王愛衍與之間有所立因自謂之曰寡人且相子甘茂之吏道而聞之以告甘茂甘茂入見曰王得賢相敢再拜賀王曰寡人託國于子焉更得賢相對曰王且相公孫衍王曰子焉聞之對曰衍告臣王怒衍之泄也乃逐之衍復事魏昭王秦與魏戰于伊闕殺犀武魏令衍割地以講于秦國策史記張儀已卒之後犀首入相秦嘗佩五國相印為約長按相秦或即秦武王之所言佩五國印或即前陳軫之所謀史併而合之恐誤論曰辯士挾詐中人以危反覆無足多者陳軫有倫有脊舒而不廹而秦割秦烹之喻明切無以踰之若夫﨑嶇楚秦之間委蛇儀衍之㑹智亦足尚哉張丑張登張丑者齊人也張登者中山人也韓攻鄆魏地張丑謂韓公仲朋曰今公疾攻魏之鄆魏急則必以地合于齊楚故公不如勿攻也魏緩則必戰戰勝攻鄆而取之易矣戰不勝則魏且内之公仲朋曰諾張丑因謂齊楚曰韓已與魏矣以為不然盍觀公仲之攻也公仲不攻齊楚恐因講于魏而不告韓齊魏戰于馬陵齊大勝魏殺太子申覆十萬之軍惠施令惠王折節而朝齊楚王必怒必伐齊惠施乃入報于齊田嬰許諾張丑曰不可戰不勝魏而得朝禮與魏和而下齊此可以大勝也今戰勝魏覆十萬之軍禽太子申臣萬乘之魏而甲秦楚此其暴戾定矣且楚王之為人也好用兵而甚務名終為齊患者必楚也田嬰不聽遂内魏王與之朝齊趙氏醜之楚王怒自將伐齊趙應之大敗齊于徐州楚王既戰勝欲逐田嬰于齊嬰恐張丑謂楚王曰王戰勝于徐州也肹子不用也肹子有功于國百姓為之用嬰子不善而用申縛申縛者大臣弗與百姓弗為用故王勝之也今嬰子逐肹子必用復整其士卒以與王遇必不便于王也楚王因弗逐公孫衍立五王秦韓燕宋中山而中山後持持猶疑也齊謂趙魏曰寡人羞與中山並為王願與大國伐之以廢其王中山聞之大恐召張登而告之曰寡人且王齊謂趙魏曰羞與寡人並為王而欲伐寡人恐亡其國不在索王非子莫能吾救登曰君為臣多車重幣臣請見田嬰見嬰曰臣聞君欲廢中山之王將與趙魏伐之過矣以中山之小而三國伐之中山雖益廢王猶且聽也且中山恐必為趙魏廢其王而務附焉是君為趙魏驅羊也豈若中山廢其王而事齊哉田嬰曰奈何登曰君召中山與之遇而許之王中山必喜而絶趙魏趙魏怒而攻中山中山急必為君廢其王事齊是君廢其王而立其國賢于為趙魏驅羊也田嬰曰諾張丑曰不可臣聞之同欲者相憎同憂者相親今五國相與王也負海不與焉負海齊也此其欲皆在為王而憂在負海也今召中山與之遇而許之王是奪四國而益負海也致中山而塞四國四國寒心是君臨中山而失四國也且張登之為人也善以㣲計薦中山之君乆矣難信以為利田嬰不聽果召中山而許之王張登因謂趙魏曰齊欲伐河東魏何以知之齊羞與中山並為王甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果以中山王而親之中山絶齊而從趙魏國策又曰齊欲割平邑賂燕趙以攻中山張登為相藍諸君説齊及燕趙燕趙俱輔中山而使其王事遂定葢一事而異辭者也費緤者韓人也西周惡之張登謂費緤曰請令公子牟謂韓王曰費緤西周讐之東周寳之此其家萬金王何不以為三川之守是緤以三川與西周戒也必盡其家以事王西周惡之必効先王之器以止玉若是韓王必為之西周必解子之罪以止子之事矣張丑復事魏秦惠王卒張儀走之魏魏將迎之張丑諌勿内不得于王丑復諌曰王亦聞老妾事其主婦者乎子長色衰重嫁而已今臣之事王若老妾之事其主婦者魏王因不納張儀張丑為質于燕燕王欲殺之走且出境境吏得丑丑曰燕王將殺我者人言我有寳珠也王欲得之我已亡之而王不我信今子致我我且言子奪我珠而吞之王必刳子之腹矣夫欲得之君不可説以利吾要且死子腸亦且寸絶境吏恐而赦之國策馮忌馮忌不知何國人馮忌請見趙王孝成王行人見之忌接手俛首欲言而不敢王問其故對曰客有見人于服子者已而請其罪服子曰客有三罪望我而笑狎也談語而不稱師倍也交淺而言深亂也客曰不然夫望人而笑和也言而不稱師庸説也交淺而言深忠也昔者堯見舜于草茅之中桑隂移而受天下伊尹負鼎俎而干湯姓名未著而受三公使夫交淺者不可以言深則天下不傳而三公不得矣今外臣交淺而欲深談可乎王曰請奉教于是忌乃談曰王之逐廬陵君孝成母弟為燕也王曰吾所以重者無如燕秦也曰秦王以虞卿為言而王不逐也今燕一以廬陵君為言而王逐之是輕强秦而重弱燕也王曰吾非為燕也吾固將逐之然則王逐廬陵君又不為燕也行逐愛弟又兼無燕秦臣竊為大王不取也平原君謂忌曰吾欲北伐上黨出兵攻燕何如忌曰不可夫以秦將武安君公孫起乘七勝之威與馬服之子戰于長平之下大敗趙師以其餘兵圍邯鄲趙以亡敗之餘衆收破軍之敝守而秦罷于邯鄲之下而不可㧞然者攻難而守易也今趙非有七克之威而燕非有長平之禍欲以罷趙攻强燕是使弱趙為强秦之所以攻强燕為弱趙之所以守而强秦以休兵承趙之敝此强呉之所以亡而弱越之所以霸故臣未見燕之可攻也平原君曰善國䇿尚史卷八十
