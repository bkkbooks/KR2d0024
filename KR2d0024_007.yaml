body:
  text: 尚史卷七本紀六鑲白旗漢軍李鍇撰秦本紀始皇帝二世皇帝始皇帝者秦莊襄王子也莊襄王為秦質子於趙見吕不韋姬悅而取之生始皇以秦昭王四十八年正月生於邯鄲及生名為政姓趙氏年十三嵗莊襄王死政代立為秦王當是之時秦地已并巴蜀漢中越宛有郢置南郡矣北收上郡以東有河東太原上黨郡東至滎陽滅二周置三川郡吕不韋為相封十萬户號曰文信侯招致賔客遊士欲以并天下李斯為舍人蒙驁王齮麃公等為將軍王年少初即位委國事大臣晉陽反元年將軍蒙驁擊定之二年麃公將卒攻卷斬首三萬三年蒙驁攻韓取十三城齮死十月將軍蒙驁攻魏氏畼有詭嵗大飢四年拔畼有詭三月軍罷秦質子歸自趙趙大子出歸國十月蝗天下疫百姓內粟千石拜爵一級五年將軍驁攻魏定酸棗燕虛長平雍邱山陽城皆拔之取二十城初置東郡六年韓魏趙衛楚共擊秦取夀陵秦出兵五國兵罷拔韓迫東郡其君角率其支屬徙居野王阻其山以保魏之河內七年彗星先出東方見北方五月見西方將軍驁死以攻龍孤慶都還兵攻汲彗星復見西方十六日夏太后死莊襄王母八年弟長安君成蟜將軍擊趙反死屯留軍吏皆斬死遷其民於臨洮將軍壁死卒屯留蒲鶮反戮其尸謂成蟜反而死副將壁亦死其屯留蒲鶮三邑之反卒雖死而復戮其尸河魚大上輕車重馬東就食嫪毐封為長信侯豫之山陽地令毐居之宫室車馬衣服苑囿馳獵恣毐事無大小皆決於毐又以河西太原郡更為毐國九年彗星見或竟天攻魏垣蒲陽四月上宿雍已酉王冠帶劍長信侯毐作亂而覺矯王御璽及太后璽以發縣卒及衛卒官騎戎翟君公舍人將欲攻蘄年宫為亂王知之令相國昌平君昌文君發卒攻毐戰咸陽斬首數百皆拜爵及宦者皆在戰中亦拜爵一級毐等敗走即令國中有生得毐賜錢百萬殺之五十萬盡得毐等衛尉竭內史肆佐弋竭中大夫令齊等二十人皆梟首車裂以徇滅其宗及其舍人輕者為鬼薪及奪爵遷蜀四千餘家家房陵四月寒凍有死者楊端和攻衍氏魏邑彗星見西方又見北方從斗以南八十日十年相國吕不韋坐嫪毐免桓齮為將軍齊趙來置酒韓人鄭國來間秦鑿涇水為渠中作而覺大索逐客李斯上書説乃止逐客令李斯因説王請先取韓以恐他國於是使斯下韓而李斯用事十一年王翦桓齮楊端和攻鄴取九城王翦攻閼與僚陽皆并為一軍翦將十八日軍歸斗食以下什推二人從軍取鄴安陽桓齮將十二年秋大旱六月至八月乃雨十三年桓齮攻趙平陽殺趙將扈輒斬首十萬王之河南正月彗星見東方十月桓齮攻趙十四年攻趙軍於平陽取宜安破之殺其將軍桓齮定平陽武城韓非使秦秦用李斯謀留非非死雲陽韓王請為臣十五年大興兵一軍至鄴一軍至太原取狼孟地動攻番吾李牧擊破秦軍南距韓魏十六年九月發卒受地韓南陽假守騰初令男子書年魏獻地於秦秦置麗邑十七年內史騰攻韓得韓王安盡納其地以其地為郡命曰潁川地動華陽太后卒民大飢十八年大興兵攻趙王翦將上地下井陘端和將河內羌瘣伐趙端和圍邯鄲城十九年王翦羌瘣盡定取趙地東陽得趙王引兵欲攻燕屯中山秦王之邯鄲諸嘗與王生趙時母家有仇怨皆坑之秦王還從太原上郡歸始皇帝母太后崩趙公子嘉率其宗數百人之代自立為代王東與燕合兵軍上谷大飢二十年燕太子丹患秦兵至國恐使荆軻刺秦王秦王覺之體解軻以徇而使王翦辛勝攻燕燕代發兵擊秦軍秦軍破燕易水之西二十一年王賁攻薊乃益發卒詣王翦軍遂破燕太子丹軍取薊得太子丹之首燕王東收遼東而王之王翦謝病老歸新鄭反昌平君徙於郢大雪雪深二尺五寸二十二年王賁攻魏引河溝灌大梁大梁城壞其王請降盡取其地二十三年秦王復召王翦強起之使將擊荆取陳以南至平輿虜荆王秦王遊至郢陳荆將項燕立昌平君為荆王反秦於淮南二十四年王翦蒙武攻荆破荆軍昌平君死項燕遂自殺二十五年大興兵王賁將攻燕遼東得燕王喜還攻代虜代王嘉王翦遂定荆江南地降越君置會稽郡五月天下大酺二十六年齊王建與其相侯勝發兵守其西界不通秦秦使將軍王賁從燕南攻齊得齊王建秦初并天下令丞相御史曰異日韓王納地效璽請為藩臣已而倍約與趙魏合從畔秦故興兵誅之虜其王寡人以為善庶幾息兵革趙王使其相李牧來約盟故歸其質子已而倍盟反我太原故興兵誅之得其王趙公子嘉乃自立為代王故舉兵擊滅之魏王始約服入秦已而與韓趙謀襲秦秦兵吏誅遂破之荆王獻青陽以西已而畔約擊我南郡故發兵誅得其王遂定其荆地燕王昏亂其太子丹乃隂令荆軻為賊兵吏誅滅其國齊王用后勝計絶秦使欲為亂兵吏誅虜其王平齊地寡人以眇眇之身興兵誅暴亂賴宗廟之靈六王咸伏其辜天下大定今名號不更無以稱成功傳後世其議帝號丞相綰御史大夫劫廷尉斯等皆曰昔者五帝地方千里其外侯服夷服諸侯或朝或否天子不能制今陛下興義兵誅殘賊平定天下海內為郡縣法令由一統自上古以來未嘗有五帝所不及臣等謹與博士議曰古有天皇有地皇有泰皇泰皇最貴臣等昧死上尊號王為泰皇命為制令為詔天子自稱曰朕王曰去泰著皇采上古帝位號曰皇帝他如議制曰可追尊莊襄王為太上皇制曰聞太古有號毋諡中古有號死而以行為諡如此則子議父臣議君也甚無謂朕弗取焉自今已來除諡法朕為始皇帝後世以計數二世三世至於萬世傳之無窮始皇推終始五德之傳漢書齊人鄒子之徒論著終始五德之運以為周得火德秦代周德從所不勝方今水德之始改年始朝賀皆自十月朔衣服旄旌節旗皆上黑數以六為紀符法冠皆六寸而輿六尺六尺為步乘六馬更名河曰德水以為水德之始剛毅戾深事皆決於法刻削毋仁恩和義然後合五德之數於是急法久者不赦丞相綰等言諸侯初破燕齊荆地逺不為置王毋以填之請立諸子唯上幸許始皇下其議於羣臣羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如讐仇諸侯更相誅伐周天子弗能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣以公賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下以為三十六郡郡置守尉監更名民曰黔首大酺收天下兵聚之咸陽銷以為鍾鐻金人十二重各千石置廷宫中一法度衡石丈尺車同軌書同文字地東至海暨朝鮮西至臨洮羌中南至北嚮户北據河為塞並隂山至遼東徙天下豪富於咸陽十二萬户諸廟及章臺上林皆在渭南秦每破諸侯寫放其宫室作之咸陽北阪上南臨渭自雍門以東至涇渭殿屋復道周閣相屬所得諸侯美人鐘鼓以充入之三輔舊事始皇表河以為秦東門表汧以為秦西門表中外殿觀百四十五後宫列女萬餘人氣上衝於天二十七年始皇巡隴西北地出雞頭山過回中焉作信宫渭南已更命信宫為極廟象天極自極廟道通酈山作甘泉前殿築甬道自咸陽屬之是嵗賜爵一級治馳道二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生議刻石頌秦德其辭曰皇帝立國維初在昔嗣世稱王討伐亂逆威動四極武義直方戎臣奉詔經世不久滅六暴強二十有六年上薦髙號孝道顯明既獻泰成乃降専惠親巡逺方登於嶧山羣臣從者咸思攸長追念亂世分土建邦以開事理攻戰日作流血於野自泰古始世無萬數阤及五帝莫能禁止乃今皇帝一家天下兵不復起災害滅除黔首康定利澤長久羣臣誦略刻此樂石以著經紀史録諸銘獨遺此篇其文稍遜諸辭或子長故削之或後贋作今補入紀議封禪望祭山川之事乃遂上泰山立石封祠祀下風雨暴至休於樹下因封其樹為五大夫封禪書即帝位三年東巡郡縣於是徴從齊魯之儒生博士七十人至乎泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅秸言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自泰山陽至巔立石頌秦始皇帝德明其得封也從隂道下禪於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也始皇之上泰山中阪遇暴風雨休於大樹下諸儒生既絀不得與用於封事之禮聞始皇遇風雨則譏之禪梁父刻所立石其辭曰皇帝臨位作制明法臣下修飭二十有六年初并天下罔不賔服親巡逺方黎民登兹泰山周覽東極從臣思迹本原事業祇誦功德治道運行諸産得宜皆有法式大義休明垂於後世順承勿革皇帝躬聖既平天下不懈於治夙興夜寐建設長利専隆教誨訓經宣達逺近畢理咸承聖志貴賤分明男女禮順慎遵職事昭隔內外靡不清淨施於後嗣化及無窮遵奉遺詔永承重戒於是乃並勃海以東過黃腄窮成山登之罘立石頌秦德焉而去南登琅邪大樂之留三月乃徙黔首三萬户琅邪臺下復十二嵗作琅邪臺立石刻頌秦德明德意曰維二十六年皇帝作始端平法度萬物之紀以明人事合同父子聖智仁義顯白道理東撫東土以省卒士事已大畢乃臨於海皇帝之功勤勞本事上農除末黔首是富普天之下摶心揖志器械一量同書文字日月所照舟輿所載皆終其命莫不得意應時動事是維皇帝匡飭異俗陵水經地憂恤黔首朝夕不懈除疑定法咸知所辟方伯分職諸治經易舉錯必當莫不如畫皇帝之明臨察四方尊卑貴賤不踰次行姦邪不容皆務貞良細大盡力莫敢怠荒逺邇辟隱専務肅莊端直敦忠事業有常皇帝之德存定四極誅亂除害興利致福節事以時諸産繁殖黔首安寧不用兵革六親相保終無寇賊歡欣奉教盡如法式六合之內皇帝之土西涉流沙南盡北户東有東海北過大夏人迹所至無不臣者功蓋五帝澤及牛馬莫不受德各安其宇維秦王兼有天下立名為皇帝乃撫東土至於琅邪列侯武城侯王離列侯通武侯王賁倫侯建成侯趙亥倫侯昌武侯成倫侯武信侯馮毋擇丞相隗林丞相王綰卿李斯卿王戊五大夫趙嬰五大夫楊樛從與議於海上曰古之帝者地不過千里諸侯各守其封域或朝或否相侵暴亂殘伐不止猶刻金石以自為紀古之五帝三王知教不同法度不明假威鬼神以欺逺方實不稱名故不久長其身未歿諸侯倍叛法令不行今皇帝并一海內以為郡縣天下和平昭明宗廟體道行德尊號大成郡臣相與誦皇帝功德刻於金石以為表經既已齊人徐市等上書言海中有三神山名曰蓬萊方丈瀛洲仙人居之請得齋戒與童男女求之於是遣徐市發童男女數千人入海求仙人封禪書宋毋忌正伯僑充尚羡門子髙最後皆燕人為方仙道形解銷化依於鬼神之事自齊威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者傳在渤海中去人不逺未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云及始皇至海上方士言之始皇使童男女入海求之船交海中皆以風為解金樓子始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬并一寸椹十洲記拾遺記並荒誕不載始皇還過彭城齋戒禱祠欲出周鼎泗水使千人沒水求之弗得水經注周顯王時九鼎淪沒泗淵始皇時九鼎見於彭城始皇自以德合三代大喜使數千人沒水求之不得所謂鼎伏也亦曰系而行之未出龍齒齧其系故語曰稱樂太早絶鼎系乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不得渡上問博士曰湘君何神博士對曰聞之堯女舜之妻而葬此於是始皇大怒使荆徒三千人皆伐湘山樹赭其山上自南郡由武關歸二十九年始皇東遊至陽武博浪沙中為盜所驚求弗得乃令天下大索十日登之罘刻石其辭曰維二十九年時在中春陽和方起皇帝東遊巡登之罘臨照於海從臣嘉觀原念休烈追誦本始大聖作治建定法度顯著綱紀外教諸侯光施文惠明以義理六國回辟貪戾無厭虐殺不已皇帝哀衆遂發討師奮揚武德義誅信行威燀旁達莫不賔服烹滅強暴拔救黔首周定四極普施明法經緯天下永為儀則大矣哉宇縣之中承順聖意羣臣誦功請刻於石表垂於常式其東觀曰維二十九年皇帝春遊覽省逺方逮於海隅遂登之罘昭臨朝陽觀望廣麗從臣咸念原道至明聖法初興清理疆內外誅暴強武威旁暢振動四極禽滅六王闡并天下災害絶息永偃戎兵皇帝明德經理宇內視聽不怠作立大義昭設備器咸有章旗職臣遵分各知所行事無嫌疑黔首改化逺邇同度臨古絶尤常職既定嗣後循業長承聖治羣臣嘉德祗誦聖烈請刻之罘旋遂之琅邪道上黨入三十年無事三十一年十二月更名臘曰嘉平茅盈內記始皇三十一年九月庚子盈曽祖父蒙於華山乘雲駕龍白日升天先是其邑謡歌曰神仙得者茅初成駕龍上升入秦清時下玄洲戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謡歌欣然有尋仙之志因改臘曰嘉平賜黔首里六石米二羊始皇為微行咸陽與武士四人俱夜出逢盜蘭池見窘武士擊殺盜關中大索二十日米石千六百三十二年始皇之碣石使燕人盧生求羡門髙誓刻碣石門壞城郭決通隄防其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪庶心咸服惠論功勞賞及牛馬恩肥土域皇德奮威德并諸侯初一泰平墮壞城郭決通川防夷去險阻地勢既定黎庶無繇天下咸撫男樂其疇女修其業事各有序惠被諸産久並來田莫不安所羣臣誦烈請刻此石垂著儀矩因使韓終侯公石生求仙人不死之藥始皇巡北邉從上郡入燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地三十三年發諸嘗逋亡人贅壻賈人略取陸梁地為桂林象郡南海以適遣戌西北斥逐胸奴自榆中並河以東屬之隂山以為三十四縣城河上為塞又使蒙恬渡河取髙闕陶山北假中築亭障以逐戎人徙謫實之初縣禁不得祠明星出西方三十四年適治獄吏不直者築長城及南越地搜神記秦時築城於武周塞內以備胡城將成而崩者數焉有馬馳走周旋反覆父老異之因依馬迹以築城城乃不崩遂名馬邑水經注秦築長城死者相屬民歌曰生男慎勿舉生女哺用脯不見長城下尸骸相支拄淮南子秦皇挾録圖見其傳曰亡秦者胡也因發卒五十萬使蒙公揚武子將築修城西屬流沙北擊遼水東結朝鮮中國內郡挽車餉之又利越之犀角象齒翡翠珠璣乃使尉屠睢發卒五十萬為五軍塞鐔城之嶺一軍守九嶷之塞一軍處番禺之都一軍守南野之界一軍結餘干之水三年不解甲弛弩使監祿無以轉餉又以卒鑿渠而通糧道以與越人戰殺西嘔君譯吁宋而越人皆入叢薄中與禽獸處莫肯為秦虜相置桀駿以為將而夜攻秦人大破之殺尉屠睢伏尸流血數十萬乃發適戌以備之始皇置酒咸陽宫博士七十人前為夀僕射周青臣進頌曰他時秦地不過千里賴陛下神靈明聖平定海內放逐蠻夷日月所照莫不賔服以諸侯為郡縣人人自安樂無戰爭之患傳之萬世自上古不及陛下威德始皇悅博士齊人淳于越進曰臣聞殷周之王千餘嵗封子弟功臣自為枝輔今陛下有海內而子弟為匹夫卒有田常六卿之臣無輔拂何以相救哉事不師古而能長久者非所聞也今青臣又面諛以重陛下之過非忠臣始皇下其議丞相李斯曰五帝不相復三代不相襲各以治非其相反時變異也今陛下創大業建萬世之功固非愚儒所知且越言乃三代之事何足法也異時諸侯並爭厚招遊學今天下已定法令出一百姓當家則力農工士則學習法令辟禁今諸生不師今而學古以非當世惑亂黔首丞相臣斯昧死言古者天下散亂莫之能一是以諸侯並作語皆道古以害今飾虛言以亂實人善其所私學以非上之所建立今皇帝并有天下别黑白而定一尊私學乃相與非法教人聞令下則各以其學議之入則心非出則巷議夸主以為名異取以為髙率羣下以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏知見不舉者與同罪令下三十日不燒黔為城旦所不去者醫藥卜筮種樹之書若欲有學法令以吏為師制曰可三十五年除道道九原抵雲陽塹山堙谷直通之於是始皇以為咸陽人多先王之宫廷小吾聞周文王都豐武王都鎬豐鎬之間帝王之都也乃營作朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗三輔舊事阿房宫以磁石為門鑄銅人十二於宫前周馳為閣道自殿下直抵南山表南山之顛以為闕為復道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也阿房宫未成成欲更擇令名名之作宫阿房故天下謂之阿房宫徒刑者七十餘萬人乃分作阿房宫或作麗山發北山石椁乃寫蜀荆地材皆至關中計宫三百關外四百餘於是立石東海上朐界中以為秦東門因徙三萬家麗邑五萬家雲陽皆復不事十嵗新書始皇作臺榭宫室則天下豪富制屋宅者莫不倣之設房闥備廄庫繕雕琢刻畫之好博玄黃琦瑋之色三輔黃圖始皇作咸陽宫因北陵營殿端門四達以制紫宫象帝居引渭水灌都以象天漢橫橋南渡以法牽牛橋廣六尺南北二百八十步六十八間八百五十柱二百一十二梁橋之西北隄繳立石柱咸陽北至九嵕甘泉南至鄠杜東至河西至汧渭之交東西八百里南北四百里離宫别館相望聫屬木衣綈繡土被朱紫宫人不移樂不改懸窮年忘歸猶不能遍拾遺記始皇起雲明臺窮珍木搜巧工騰虛緣木揮斤空中子時起工午時已畢秦人謂之子午臺亦言於子午之地各起一臺盧生説始皇曰臣等求芝竒藥仙者常弗遇類物有害之者方中人主時為微行以辟惡鬼惡鬼辟真人至人主所居而人臣知之則害於神真人者入水不濡入火不爇陵雲氣與天地久長今上治天下未能恬淡願上所居宫毋令人知然後不死之藥殆可得也於是始皇曰吾慕真人自謂真人不稱朕乃令咸陽之旁二百里內宫觀二百七十復道甬道相連帷帳鍾鼓美人充之各案署不移徙行所幸有言其處者罪死始皇帝幸梁山宫從山上見丞相車騎衆弗善也中人或告丞相丞相損車騎始皇怒曰此中人泄吾語案問莫服當是時詔捕諸時在旁者皆殺之自是後莫知行之所在聽事羣臣受決事悉於咸陽宫侯生盧生相與謀曰始皇為人天性剛戾自用起諸侯并天下意得欲從以為自古莫及已専任獄吏獄吏得親幸博士雖七十人特備員弗用丞相諸大臣皆受成事倚辦於上上樂以刑殺為威天下畏罪持祿莫敢盡忠上不聞過而日驕下懾伏謾欺以取容秦法不得兼方不驗輒死然侯星氣者至三百人皆良士畏忌諱諛不敢端言其過天下之事無小大皆決於上上至以衡石量書日夜有呈不中呈不得休息貪於權勢至如此未可為求仙藥於是乃亡去始皇聞亡乃大怒曰吾前收天下書不中用者盡去之悉召文學方術士甚衆欲以興太平方士欲練以求竒藥今聞韓衆去不報徐市等費以巨萬計終不得藥徒姦利相告日聞盧生等吾尊賜之甚厚今乃誹謗我以重吾不德也諸生在咸陽者吾使人亷問或為訞言以亂黔首於是使御史悉案問諸生諸生傳相引告乃自除犯禁者四百六十餘人皆坑之咸陽使天下知之以懲後益發謫徙邉始皇長子扶蘇諫始皇怒使扶蘇北監蒙恬於上郡三十六年熒惑守心有墜星下東郡至地為石黔首或刻其石曰始皇帝死而地分始皇聞之遣御史逐問莫服盡取石旁居人誅之因燔銷其石始皇不樂使博士為仙真人詩及行所遊天下傳令樂人歌弦之秋使者從關東夜過華隂平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故因忽不見置其璧去使者奉璧具以聞始皇默然良久曰山鬼固不過知一嵗事也退言曰祖龍者人之先也使御府視璧乃二十八年行渡江所沉璧於是始皇卜之卦得遊徙吉遷北河榆中三萬家拜爵一級三十七年十月癸丑始皇出遊左丞相斯從右丞相去疾守少子胡亥愛慕請從上許之十一月行至雲夢望祀虞舜於九疑山浮江下觀籍柯渡海渚過丹陽至錢塘臨浙江水波惡乃西百二十里從狹中渡上會稽祭大禹望於南海而立石刻頌秦德其文曰皇帝休烈平一宇內德惠修長三十有七年親巡天下周覽逺方遂登會稽宣省習俗黔首齋莊羣臣頌功本原事迹追首髙明秦聖臨國始定刑名顯陳舊章初平法式審别職任以立恆常六王專倍貪戾慠猛率衆自強暴虐恣行負力而驕數動甲兵隂通間使以事合從行為辟方內飾詐謀外來侵邉遂起禍殃義威誅之殄熄暴悖亂賊滅亡聖德廣密六合之中被澤無疆皇帝并宇兼聼萬事逺近畢清運理羣物孝驗事實各載其名貴賤並通善否陳前靡有隱情飾省宣義有子而嫁倍死不貞防隔內外禁止淫泆男女潔誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得毋咸化亷清大治濯俗天下承風蒙被休經皆遵度軌和安敦勉莫不順令黔首修潔人樂同則嘉保太平後敬奉法常治無極輿舟不傾從臣頌烈請刻此石光垂休銘茅盈內記始皇遊會稽還於句曲良常山北埋白璧一雙深七尺李斯刻篆璧文云始皇聖德平章山河巡狩蒼川勒名素璧還過吳從江乘渡並海上北至琅邪方士徐市等入海求神藥數嵗不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚所苦故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚蛟龍為候今上禱祠備謹而有此惡神當除去而善神可致乃令入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至榮成山弗見至之罘見巨魚射殺一魚遂並海西至平原津而病始皇惡言死羣臣莫敢言死事上病益甚乃為璽書賜公子扶蘇曰與喪會咸陽而葬書已封在中車府令趙髙行符璽事所未授使者七月丙寅始皇崩於沙邱平臺論衡孔子遺讖曰不知何一男子自謂秦始皇上我之堂踞我之牀顛倒我衣裳至沙邱而亡後始皇至魯觀孔子之宅至沙邱而崩誣聖殊甚始皇亦未嘗至魯丞相斯為上崩在外恐諸公子及天下有變乃祕之不發喪棺載輼涼車中故幸宦者驂乘所至上食百官奏事如故宦者輒從輼涼車中可其奏事獨子胡亥趙髙及所幸宦者五六人知上死趙髙故嘗教胡亥書及獄律令法事胡亥私幸之髙乃與公子胡亥丞相斯隂謀破去始皇所封書賜公子扶蘇者而更詐為丞相斯受始皇遺詔沙邱立子胡亥為太子更為書賜公子扶蘇蒙恬數以罪賜死詳李斯傳行遂從井陘抵九原會暑上輼車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪太子胡亥襲位為二世皇帝九月葬始皇酈山始皇初即位穿治酈山及并天下天下徒送詣七十餘萬人穿三泉下銅而致棺宫觀百官竒器珍怪徙臧滿之令匠作機弩矢有所穿近者輒射之以水銀為百川江河大海機相灌輸上具天文下具地理以人魚膏為燭度不滅者久之二世曰先帝後宫非有子者出焉不宜皆令從死死者甚衆葬既已下或言工匠為機藏皆知之藏重即泄大事畢已藏閉中羡下外羡門盡閉工匠藏者無復出者樹草木以象山史記三秦記酈山陵周回跨隂盤縣界水背陵障使東西流運大石於渭北渚民怨之作甘泉之歌曰運石甘泉口渭水不敢流千人唱萬人謳金陵餘石大如塸關中記始皇陵在酈山泉本北流障使東西流有土無石取大石於渭北諸山水經注始皇厚葬建壙於麗山之戎一名藍田其隂多金其陽多玉蔡質漢儀李斯治驪山陵上書云臣所將𨽻徒七十二萬人治驪山者已深已極鑿之不入燒之不㸐扣之空空如下天狀帝報之曰鑿之不入燒之不然其旁行三百丈乃止皇覽墳髙五十餘丈周回五里餘二世皇帝元年年二十一趙髙為郎中令任用事二世下詔增始皇寢廟犧牲及山川百祀之禮令羣臣議尊始皇廟羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世世不軼毁今始皇為極廟四海之內皆獻貢職增犧牲禮咸備毋以加先王廟或在西雍或在咸陽天子儀當獨奉酌祠始皇廟自襄公已下軼毁所置凡七廟羣臣以禮進祠以尊始皇廟為帝者祖廟皇帝復自稱朕新書胡亥之為公子詔置酒饗羣臣召諸子賜食先罷胡亥下陛視羣臣陳杖履善者因行殘敗而去諸侯聞之莫不太息及二世即位皆知天下必棄之二世與趙髙謀曰朕年少初即位黔首未集附先帝巡行郡縣以示強威服海內今晏然不巡行即見弱毋以臣畜天下春二世東行郡縣李斯從到碣石並海內南至會稽而盡刻始皇所立刻石石旁著大臣從者名以章先帝成功盛德焉皇帝曰金石刻盡始皇帝所為也今襲號而金石刻辭不稱始皇帝其於久逺也如後嗣為之者不稱成功盛德丞相臣斯臣去疾御史大夫臣德昧死言臣請具刻詔書刻石因明白矣臣昧死請制曰可遂至遼東而還於是二世乃遵用趙髙申法令乃隂與趙髙謀曰大臣不服官吏尚強及諸公子必與我爭為之奈何髙曰臣固願言而未敢也先帝之大臣皆天下纍世名貴人也積功勞世以相傳久矣今髙素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服今上出不因此時案縣郡守尉有罪者誅之上以振威天下下以除去上平生所不可者今時不師文而決於武力願陛下遂從時無疑即羣臣不及謀明主收舉餘民賤者貴之貧者富之逺者近之則上下集而國安矣二世曰善乃行誅大臣及諸公子以罪過連逮少近官三郎無得立者而六公子戮死于杜公子將閭昆弟三人皆自殺宗室振恐羣臣諫者以為誹謗大吏持祿取容黔首振恐四月二世還至咸陽曰先帝為咸陽朝廷小故營阿房宫為室堂未就會上崩罷其作者復土酈山酈山事大畢今釋阿房宫弗就則是章先帝舉事過也復作阿房宫外撫四夷如始皇計盡徴其材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉菽粟芻藁皆令自齎糧食咸陽三百里內不得食其榖用法益刻深七月戍卒陳勝等反故荆地為張楚勝自立為楚王居陳遣諸將徇地山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數也謁者使東方來以反者聞二世二世怒下吏後使者至上問對曰羣盜郡守尉方逐捕今盡得不足憂上悅武臣自立為趙王魏咎為魏王田儋為齊王沛公起沛項梁舉兵會稽郡二年冬陳涉所遣周章等將西至戲兵數十萬二世大驚與羣臣謀曰奈何少府章邯曰盜已至衆強今發近縣不及矣酈山徒多請赦之授兵以擊之二世乃大赦天下使章邯將擊破周章軍而走遂殺章曹陽二世益遣長史司馬欣董翳佐章邯擊盜殺陳勝城父破項梁定陶滅魏咎臨濟楚地盜名將以死章邯乃北渡河擊趙王歇等於巨鹿趙髙説二世曰先帝臨制天下久故羣臣不敢為非進邪説今陛下富於春秋初即位奈何與公卿廷決事事即有誤示羣臣短也天子稱朕固不聞聲於是二世常居禁中與髙決諸事其後公卿希得朝見盜賊益多而關中卒發東擊盜者毋已右丞相去疾左丞相斯將軍馮劫進諫曰關中羣盜並起秦發兵誅擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦賦稅大也請且止阿房宫作者減省四邉戍轉二世曰吾聞之韓子曰堯舜采椽不刮茅茨不翦飯土塯啜土形雖監門之養不觳於此禹作龍門通大夏決河亭水放之海身自持築臿脛毋毛臣虜之勞不烈於此矣凡所為貴有天下者得肆意極欲主重明法下不敢為非以制御海內矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何于法朕尊萬乘毋其實吾欲造千乘之駕萬乘之屬充我號名且先帝起諸侯兼天下天下已定外攘四夷以安邉境作宫室以章得意而君觀先帝功業有緒今朕即位二年之間羣盜並起君不能禁又欲罷先帝之所為是上毋以報先帝次不為朕盡忠力何以在位下去疾斯劫吏案責他罪去疾劫曰將相不辱自殺斯卒囚就五刑三年章邯等將其卒圍巨鹿楚上將軍項羽將楚卒往救巨鹿冬趙髙為丞相竟案李斯殺之夏章邯等戰數却二世使人讓邯邯恐使長史欣請事趙髙弗見又復信欣恐亡去髙使人捕追不及欣見邯曰趙髙用事於中將軍有功亦誅無功亦誅項羽急擊秦軍虜王離邯等遂以兵降諸侯八月己亥趙髙欲為亂恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右左右或默或言馬以阿順趙髙或言鹿者髙因隂中諸言鹿者以法後羣臣皆畏髙髙前數言關東盜毋能為也及項羽虜秦將王離等巨鹿下而前章邯等軍數却上書請益助燕趙齊楚韓魏皆立為王自關以東大氐盡畔秦吏應諸侯諸侯咸率其衆西鄉沛公將數萬人已屠武關使人私於髙髙恐二世怒誅及其身乃謝病不朝見二世夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宫欲祠涇沉四白馬使使責讓髙以盜賊事髙懼乃隂與其壻咸陽令閻樂其弟趙成謀曰上不聽諫今事急欲歸禍於吾宗吾欲易置上更立公子嬰子嬰仁儉百姓皆載其言使郎中令為內應詐為有大賊令樂召吏發卒追劫樂毋置髙舍遣樂將吏卒千餘人至望夷宫殿門縛衛令僕射曰賊入此何不止衛令曰周廬設卒甚謹安得賊敢入宫樂遂斬衛令直將吏入行射郎宦者大驚或走或格格者輒死死者數十人郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬭旁有宦者一人侍不敢去二世入內謂曰公何不早告我乃至於此宦者曰臣不敢言故得全使臣早言皆已誅安得至今閻樂前即二世數曰足下驕恣誅殺無道天下共畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙髙趙髙乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便立二世之兄子公子嬰為秦王以黔首葬二世杜南宜春苑中令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀曰丞相髙殺二世望夷宫恐羣臣誅之乃詳以義立我我聞趙髙乃與楚約滅秦宗室而王關中今使我齋見廟此欲因廟中殺我我稱疾不行丞相必自來來則殺之髙使人請子嬰數輩子嬰不行髙果自往曰宗廟重事王奈何不行子嬰遂刺殺髙於齋宫三族髙家以徇咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上使人約降子嬰子嬰即係頸以組白馬素車奉天子璽符降軹道旁沛公遂入咸陽封宫室府庫還軍霸上居月餘諸侯兵至項籍為從長殺子嬰及秦諸公子宗族遂屠咸陽燒其宫室虜其子女收其珍寶貨財諸侯共分之秦竟滅矣史記贊曰秦德金虎負踞西鄉其帝天下也霆擊電爍沴氣旁行要非四時之正矣而學者繫之大統上承有周不亦惑乎乃若兼天下逮二世裁十有七年其毁井田廢封建墮典滅籍私器大物決三代之防使不可卒復者秦罪至深世乃以法制矩􅀢訓謬矣尚史卷七
