body:
  text: 尚史卷十九世家十二鑲白旗漢軍李鍇撰曹世家始武王十三年終敬王三十三年凡六百三十六年傳二十五世叔振鐸大伯脾仲君平宫伯侯孝伯雲夷伯喜幽伯彊曹叔振鐸者周武王弟也武王已克殷紂封叔振鐸於曹詩注在兖州陶邱之北雷夏河澤之野叔振鐸薨子大伯脾即位大伯脾薨子仲君平即位仲君平薨子宫伯侯即位宫伯侯薨子孝伯雲即位孝伯雲薨子夷伯喜即位夷伯喜元年周厲王之十六年也夷伯二十三年厲王奔於彘三十年夷伯薨弟幽伯疆即位幽伯九年弟蘇殺幽伯代之史記世家戴伯蘇惠伯兕石甫附繆公武戴伯蘇者幽伯之弟也戴伯元年周宣王已立三嵗三十年戴伯薨子惠伯兕即位年表作惠公伯雉注引孫檢曰曹惠伯或名雉或名弟或復名弟兕也惠伯二十五年周幽王為犬戎所殺因東徙益卑諸侯畔之三十六年惠伯薨子石甫即位其弟武殺之代立是為繆公三年薨桓公即位史記世家桓公三十五年入春秋桓公名終生孫檢曰一作終湦湦音生桓公三十五年魯隱公即位三十七年隱三年春三月平王崩桓王立五十五年桓十年春正月公薨夏五月葬公左傳諡曰桓在位五十五年莊公莊公名射姑桓公之世子也桓公五十四年桓九年公有疾使世子朝于魯魯賓之以上卿及享初獻樂奏而歎魯大夫施父曰曹太子其有憂乎非歎所也明年桓公薨世子即位是為莊公公四年桓十四年魯侯鄭伯㑹于曹我致餼五年桓十五年春三月桓王崩莊王立六年桓十六年魯宋蔡衛㑹于曹謀伐鄭二十年莊十二年莊王崩僖王立二十二年莊十四年我及齊陳伐宋取成而還二十五年莊十七年僖王崩惠王立三十一年莊二十三年冬十一月公薨明年春三月葬公左傳諡曰莊在位三十一年僖公僖公名夷莊公之子也莊公薨公即位公元年莊二十四年冬戎侵我羈出奔陳赤歸於我公羊曹羈曹大夫戎將侵曹曹羈諫曰戎衆以無義君請勿自敵也曹伯曰不可三諫不從遂去之注以曹羈為曹世子赤即僖公蓋為戎所納按僖公名夷不名赤羈為世子亦無據九年莊三十二年公薨史記世家諡曰僖昭公昭公名班僖公之子也僖公薨公即位公三年僖元年狄伐邢公及齊師宋師次于聶北救邢夏邢遷於夷儀我師及齊宋城邢秋八月公㑹諸侯齊魯宋鄭邾于柳六年僖四年公㑹諸侯齊魯宋陳衛鄭許侵蔡蔡潰遂伐楚次於陘夏楚屈完來盟於師盟於召陵冬我㑹諸侯之師齊魯宋衛鄭許侵陳七年僖五年公及諸侯齊魯宋陳衛鄭許㑹王世子于首止鄭伯逃歸不盟八年僖六年公㑹諸侯齊魯宋陳衛伐鄭圍新城楚圍許諸侯遂救許九年僖七年秋七月公薨冬葬公左傳諡曰昭在位九年共公共公名襄昭公之子也昭公九年僖七年薨公即位是年閏月惠王崩襄王懼大叔帶之難不發喪公元年僖八年公㑹王人諸侯齊魯宋衛許陳盟于洮謀王室也二年僖九年公㑹公諸侯齊魯宋衛鄭許于葵邱秋九月盟于葵邱六年僖十三年公㑹諸侯齊魯宋陳衛鄭許于鹹淮夷病杞且謀王室也八年僖十五年楚伐徐公㑹諸侯前諸侯盟于牡邱遂次于匡諸侯之大夫救徐秋七月及徐師伐厲以救徐厲楚與國冬宋伐我九年僖十六年公㑹諸侯齊魯宋陳衛鄭許邢于淮齊桓公卒五公子爭立十一年僖十八年公及宋衛邾伐齊納齊孝公十二年僖十九年我及宋邾盟于曹南曹與盟而不服不肯致地主禮秋宋人圍我十四年僖二十一年公及諸侯宋楚陳蔡鄭許㑹于盂楚執宋公以伐宋十六年僖二十三年晉公子重耳來十七年僖二十四年周大叔帶作亂王出居於鄭十八年僖二十五年王入於王城殺大叔帶二十一年僖二十八年晉侵我三月入之執公畀宋人遂敗楚師于城濮冬諸侯圍許公復歸于曹遂㑹諸侯圍許三十年文四年公如晉㑹正㑹受貢賦之政三十三年文七七公㑹諸侯宋衛陳鄭許晉大夫盟于扈三十四年文八年秋八月襄王崩頃王立三十五年文九年秋八月公薨冬葬公左傳諡曰共在位三十五年文公文公名夀共公之子也共公薨公即位公二年文十一年公如魯朝五年文十四年春頃王崩匡王立夏六月公㑹諸侯宋魯陳衛鄭許晉趙盾同盟于新城六年文十五年公如魯朝冬公㑹諸侯晉宋衛蔡陳鄭許盟于扈謀伐齊十二月齊侵魯遂伐我入其郛九年文十八年宋武氏之族作亂以我師伐宋十年宣元年楚鄭侵陳宋公㑹諸侯宋陳衛晉師于棐林伐鄭十一年宣二年冬十月匡王崩定王立十二年宣三年宋圍我報武氏之亂十六年宣七年公㑹諸侯晉魯宋衛鄭于黑壞周王叔桓公臨之以謀不睦十八年宣九年公及諸侯晉宋衛鄭㑹于扈十九年宣十年鄭及楚平我及晉宋衛伐鄭取成而還二十一年宣十二年及晉宋衛同盟于清邱二十三年宣十四年夏五月公薨秋九月葬左傳諡曰文在位二十三年宣公宣公名廬文公之子也文公薨公即位公三年文十七年公㑹諸侯晉魯衛邾同盟于斷道六年成二年公子首㑹晉魯衛之師及齊師戰于鞍齊師敗績冬十一月魯及楚平我及魯侯諸侯之大夫楚秦宋陳衛鄭齊邾薛鄫盟于蜀七年成三年公㑹諸侯晉魯宋衛伐鄭九年成五年冬十一月定王崩簡王立十二月公㑹諸侯晉魯齊宋衛成邾杞同盟于蟲牢十一年成七年公如魯朝秋楚伐鄭公㑹諸侯晉魯齊宋衛莒邾杞救鄭八月同盟于馬陵十三年成九年公㑹諸侯晉魯齊宋衛鄭莒齊同盟于蒲晉執鄭伯鄭人立太子髠頑十四年成十年公㑹諸侯晉魯齊宋衛伐鄭而歸鄭伯十七年成十年夏五月公㑹諸侯晉魯齊宋衛鄭邾滕伐秦公薨于師冬葬公左傳諡曰宣在位十七年成公成公名負芻宣公之庶子也宣公十七年成十三年公㑹伐秦薨于師國人使負芻守負芻殺太子而自立是為成公公三年成十五年公㑹諸侯晉魯衛鄭宋齊邾同盟于戚晉侯執公歸于京師諸侯將見公子欣時宣公庶子即子臧于王而立之欣時奔宋三年成十六年國人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子謂子臧是大泯曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之秋國人復請于晉公歸自京師四年成十七年夏公㑹周尹子單子諸侯晉魯齊宋衛邾伐鄭六月同盟于柯陵冬復㑹伐鄭宋魚石叛六年襄九年我㑹諸侯之大夫晉魯宋衛莒邾滕薛圍宋彭城彭城降晉夏晉伐鄭我及東諸侯之師齊魯邾杞次于鄫以待之秋九月簡王崩靈王立七年襄二年我㑹諸侯之大夫晉魯宋衛邾于戚謀鄭冬復㑹于戚遂城虎牢鄭人乃成十年襄五年公㑹諸侯晉魯宋陳衛鄭莒邾滕薛齊吳鄫于戚冬戌陳楚伐陳公㑹諸侯晉宋衛鄭齊救陳十二年襄七年楚圍陳公㑹諸侯晉魯宋陳衛莒邾于鄬以救陳十四年襄九年冬公㑹諸侯晉魯宋衛莒邾滕薛杞小邾齊伐鄭鄭成十一月同盟于戲十二月復㑹伐鄭十五年襄十年公㑹諸侯前諸候㑹吳于柤秋公㑹伐鄭戌鄭虎牢鄭及晉平楚救鄭鄭復從楚十六年襄十一年公㑹伐鄭秋七月同盟于亳城北九月復㑹伐鄭鄭成冬十二月㑹于蕭魚十九年襄十四年我㑹諸侯之大夫晉魯齊宋衛鄭莒邾滕薛杞小邾㑹吳于向夏㑹伐秦二十一年襄十六年春三月公㑹諸候晉魯宋衛鄭莒邾薛杞小邾于溴梁戊寅大夫盟二十二年襄十七年衛石買伐我二十三年襄十八年冬十月公㑹諸侯晉魯宋衛鄭莒邾滕薛杞小邾同圍齊公薨于師明年春正月葬公左傳諡曰成在位二十三年武公武公名滕成公之子也成公薨公即位公二年襄十二年公㑹諸侯晉魯齊宋衛鄭莒邾滕薛杞小邾盟于澶淵三年襄二十一年公如魯朝公㑹諸侯晉魯齊宋衛鄭莒邾于商任四年襄二十二年公㑹諸侯晉魯齊宋衛鄭莒邾薛杞􅘁邾于沙隨六年襄二十四年公㑹諸侯晉魯宋衛鄭莒邾滕薛杞小邾于夷儀七年襄二十五年公㑹諸侯前諸候于夷儀伐齊秋七月同盟于重邱八年襄二十六年衛寧喜弒殤公我㑹魯侯晉人鄭良霄宋人于澶淵以討衛九年襄二十七年宋向戍欲弭諸侯之兵夏我㑹諸侯之大夫晉楚魯宋齊秦鄭陳衛邾滕蔡許于宋秋七月盟于宋十年襄二十八年冬十一月靈王崩景王立經書十二月十一年襄二十九年我㑹諸侯之大夫晉魯齊宋衛鄭莒滕薛杞小邾城杞十二年襄三十年我㑹諸侯之大夫晉魯齊宋衛鄭莒邾滕薛杞小邾于澶淵宋災故十四年昭元年我㑹諸侯之大夫晉楚魯齊宋衛陳蔡鄭許于虢二十三年昭十年晉平公卒使如晉葬平公二十四年昭十一年楚圍宋秋我㑹諸侯之大夫晉魯齊宋衛鄭杞于厥憖謀救蔡二十六年昭十三年公㑹周劉子諸侯晉魯齊宋衛鄭莒邾滕薛杞小邾于平邱二十七年昭十四年春三月公薨秋葬公左傳諡曰武在位二十七年平公悼公平公名須武公之子也武公薨公即位公四年昭十八年春三月薨秋七月葬諡曰平在位四年平公薨子悼公午即位公三年昭二十一年宋華氏叛大夫翰胡㑹晉齊衛救宋四年昭二十三年夏四月景王崩悼王立王子朝作亂冬十月悼王崩敬王立王居于狄泉七年昭二十五年我㑹諸侯之大夫晉魯宋衛鄭邾滕薛小邾于黃父謀王室明年王入于成周王子朝出奔楚九年昭二十七年我㑹諸侯之大夫晉宋衛邾滕于扈戍周冬十月公薨明年春三月葬公左傳諡曰悼在位九年聲公隱公靖公聲公名野悼公之弟也悼公薨公即位公五年昭三十二年我㑹諸侯之大夫晉魯齊宋衛鄭莒薛杞小邾城成周左傳是年平公弟通弒之代立是為隱公史記世家隱公四年定四年公㑹周劉子諸侯晉宋蔡衛陳鄭許莒邾頓胡滕薛杞小邾齊于召陵侵楚夏五月盟于臯鼬是年聲公弟露弒之露自立是為靖公靖公四年定八年春三月公薨秋七月葬公左傳諡曰靖在位四年史記世家秋譙周云春秋無其事檢系本及春悼伯卒弟露立諡靖公實無聲公隱公公按此則城成周㑹召陵蓋皆靖時今姑從史記伯陽伯陽靖公之子也靖公薨伯陽即位伯陽四年定十二年衛伐我克郊五年定十三年衛伐我十年哀三年宋伐我十三年哀六年宋伐我十四年哀七年宋人圍我鄭救之侵宋十五年哀八年春宋公伐我將還禇師子肥宋大夫殿國人詬之子肥不行我師待之宋公聞之怒命反之遂滅我以伯陽歸左傳疆事見公孫傳贊曰曹與晉衛並封乃至微弱為諸侯之細德不足與抑隘于勢邪伯陽納疆邪說背盟奸宋國以不祀豈天也哉教猱升木固小人之態也滕世家始武王十三年終敬王三十五年凡六百三十九年其先世系莫考自滕侯至隱公傳九世滕侯滕子宣公昭公錯叔繡者文王之子也左傳富辰曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也初封侯國于滕滕小莫傳其系魯隱公七年書滕侯卒名諡不載十一年滕侯朝魯及薛爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之魯乃長滕侯魯桓公二年朝魯稱子杜預注蓋為時王所黜終春秋皆書子魯莊公十六年滕子及諸侯齊宋陳衛鄭許滑同盟于幽十九年宋人執滕子嬰齊嬰齊者是為滕宣公宣公薨昭公即位魯文公十二年公朝魯魯宣公九年秋八月昭公薨左傳文公文公者昭公子或昭公弟經不載魯宣公九年昭公薨公即位是年冬宋圍我我恃晉也文公元年宣十年宋伐我十四年成五年春頃王崩簡王立二十二年成十三年我㑹諸侯晉魯齊宋衛鄭曹邾伐秦二十五年成十六年夏四月公薨左傳諡曰文在位二十五年成公成公名原系未詳文公薨公即位公三年襄元年我㑹諸侯之大夫晉魯齊宋衛曹莒邾薛圍宋彭城