子叔姬而以其娣為夫人二月子叔姬卒二十四年文十四年春頃王崩匡王立三十年宣二年冬十月匡王崩定王立五十年成四年公如魯朝五十一年成五年夫人叔姬即子叔姬娣歸于魯冬十二月公㑹諸侯晉魯齊宋衛鄭曹邾同盟于蟲牢鄭服故十一月定王崩簡王立五十三年成七年楚伐鄭公㑹諸侯晉魯齊宋衛曹莒邾救鄭秋七月同盟於馬陵五十四年成八年夫人叔姬卒於魯五十五年成九年公如魯逆夫人叔姬之喪以歸公㑹諸侯晉魯齊宋衛鄭曹莒同盟於蒲六十四年成十八年晉悼公即位公如魯朝問晉故魯候以晉君語之公於是驟朝於晉而請為昏六十五年襄元年晉伐鄭我及東諸侯魯齊曹邾次于鄫以待晉師晉以鄫之師侵楚及陳秋九月簡王崩靈王立七十年襄六年春三月公薨秋葬公左傳諡曰桓在位七十年孝公孝公名丐桓公之子也桓公薨公即位公三年襄九年冬公㑹諸侯晉魯宋衛曹莒邾滕薛小邾齊伐鄭同盟于戲十二月復伐鄭四年襄十年公㑹諸侯前諸候㑹吳於柤秋公㑹諸侯前諸侯伐鄭五年襄十一年公復㑹伐鄭秋同盟於亳城北復㑹伐鄭鄭成㑹於蕭魚八年襄十四年我㑹諸侯之大夫晉魯齊宋衛鄭曹莒邾滕薛小邾㑹吳於向夏四月㑹伐秦十年襄十六年公㑹諸侯晉魯宋衛鄭曹莒邾薛小邾于溴梁大夫盟齊髙厚逃歸十二年襄十八年公㑹諸侯晉魯宋衛鄭曹莒邾滕薛小邾同圍齊明年諸侯盟於祝柯十四年襄二十年公㑹諸侯晉魯齊宋衛鄭曹莒邾滕薛小邾盟于澶淵齊成故十六年襄二十六年公㑹諸侯晉魯齊宋衛鄭曹莒邾薛小邾于沙隨十七年襄二十三年春三月公薨夏葬公左傳諡曰孝在位十七年文公文公名益姑孝公弟孝公薨公即位公元年襄二十四年公㑹諸侯晉魯宋衛鄭曹莒邾滕薛小邾于夷儀將以伐齊水不克二年襄二十五年復㑹於夷儀伐齊齊弒莊公以成秋八月諸侯同盟于重邱五年襄二十八年公如晉朝冬十二月靈王崩景王立六年襄二十九年晉合諸侯之大夫城杞使魯歸我田公如魯盟經書子傳賤之也杜預注用夷禮也林堯叟注來盟皆大夫杞伯親之故賤之七年襄三十年我及諸侯之大夫晉魯齊宋衛鄭曹莒邾滕薛小邾㑹于澶淵宋災故十四年昭六年春正月公薨夏葬公左傳諡曰文在位十四年平公平公名郁釐文公之弟也文公薨公即位公元年昭七年晉使魯歸我成成本杞田四年昭十年晉平公卒我如晉㑹葬五年昭十一年楚圍蔡我㑹諸侯之大夫晉魯齊宋衛鄭曹于厥憖謀救蔡七年昭十三年公㑹周劉子諸侯晉魯齊宋衛鄭曹莒邾滕薛小邾于平邱秋八月同盟于平邱十六年昭二十一年夏四月景王崩悼王立王子朝作亂冬悼王崩敬王立居於狄泉十八年昭二十四年秋八月公薨冬葬公左傳諡曰平在位十八年悼公悼公名成平公之子也平公薨公即位公二年昭二十六年公㑹諸侯齊魯莒邾盟于鄟陵謀納魯侯秋七月敬王入於成周王子朝奔楚八年昭三十二年我㑹諸侯之大夫晉魯齊宋衛鄭曹莒薛小邾于狄泉尋盟且城成周十二年定四年公㑹周劉子諸侯晉魯宋蔡衛陳鄭許曹莒邾頓胡滕薛小邾齊于召陵侵楚夏五月盟于臯鼬公薨于㑹秋七月葬公左傳諡曰悼在位十二年隱公僖公隱公名乞悼公之子也悼公十二年定四年悼公薨公即位秋七月弟過弒隱公自立經傳不載是為僖公公二年定六年周儋翩亂王處于姑蕕明年王入于成周十九年哀八年冬十二月公薨明年春二月葬公左傳諡曰僖在位十九年閔公哀公出公簡公閔公名維史記世家作湣公僖公之子也公十六年閔公弟閼路弒公代立是為哀公譙周古史考作懿公公立十年薨閔公子敕立是為出公公十二年薨子簡公春立立四年楚惠王之四十四年滅杞杞後陳亡三十四年史記簡公立十一年滅之誤當是四年史記世家贊曰履癸不道自絶夏祀及武王封杞間代而興地小國弱君臣無聞乃傳國且二十餘世美哉禹其勤德之酬乎逮至杞式微而句踐伯猶之陳系絶而田和王雖物無兩大抑聖不卒斬乎詩有之施于孫子本支百世薛世家始武王十三年終敬王三十五年凡六百三十八年奚仲至薛伯系年莫考自獻公至惠公傳三世奚仲仲虺薛侯薛伯薛皇祖奚仲也任姓夏時奚仲居薛為車正後遷于邳及夏末仲虺為湯左相復居薛至周受侯爵魯隱公十一年薛侯及滕侯如魯朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓我不可以後之魯請於薛乃長滕侯其名與諡經不書莊公三十一年書薛伯卒自此以下皆書伯或黜或貶未詳成公二年薛人及魯侯諸侯之大夫秦楚宋衛陳鄭齊曹邾鄫盟于蜀五年定王崩簡王立襄公元年宋魚石叛薛人㑹諸侯之大夫晉魯宋衛曹莒邾滕圍宋彭城秋簡王崩靈王立二年薛人㑹諸侯之大夫晉魯齊衛宋曹邾滕小邾于戚遂城虎牢以逼鄭五年薛伯㑹諸侯晉魯宋陳衛鄭曹莒邾滕齊吳鄫于戚九年薛伯㑹諸侯晉魯宋衛曹莒邾滕杞小邾齊伐鄭鄭成同盟於戲十二月復伐之次於隂口而還十年薛伯㑹諸侯前諸侯㑹吳于柤秋㑹伐鄭十一年薛伯㑹伐鄭同盟于亳秋九月再伐鄭鄭成㑹于蕭魚十四年我㑹諸侯之大夫晉魯齊宋衛鄭曹莒邾滕杞小邾㑹吳於向夏四月㑹伐秦十六年薛伯㑹諸侯晉魯宋衛鄭曹莒邾杞小邾于溴梁大夫盟十八年薛伯㑹諸侯前諸候圍齊明年盟於祝柯二十年薛伯㑹諸侯晉魯齊宋衛鄭曹莒邾滕杞小邾盟於澶淵齊成故二十二年薛伯㑹諸侯晉魯齊宋衛鄭曹莒邾杞小邾于沙隨二十四年薛伯㑹諸侯晉魯宋衛鄭曹莒邾滕杞小邾于夷儀將伐齊以上世系名諡無考左傳獻公獻公名穀薛自昭三十一年始書獻公穀卒獻公以上其系與名皆無考而獻公為某公子及即位年亦無考魯襄公二十五年公㑹諸侯晉魯宋衛鄭曹莒邾滕杞小邾于夷儀秋八月同盟於重邱二十八年靈王崩景王立二十九年我㑹城杞三十年我㑹諸侯之大夫前諸侯于澶淵宋災故昭公十一年我㑹葬晉平公十三年公㑹周劉子諸侯晉魯齊宋衛鄭曹莒邾滕杞小邾于平邱秋八月同盟於平邱二十二年景王崩敬王立二十五年我㑹諸侯之大夫晉魯宋衛鄭曹邾薛小邾于黃父三十一年夏四月丁巳公薨秋葬公左傳諡曰獻年無考以魯紀之襄公襄公名定獻公之子也元年魯昭公之三十二年也秋七月我之宰㑹諸侯之大夫晉魯齊宋衛鄭曹莒杞小邾于狄泉尋盟且謀城成周三年定元年㑹城成周薛嘗服役于宋至是宋仲幾不受功曰滕薛郳郳即小邾吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然言從踐土薛固為宋役薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷於邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也爭之力晉執宋仲幾五年定四年公㑹周劉子諸侯晉魯宋蔡衛陳鄭許曹莒邾頓胡滕杞小邾齊于召陵侵楚夏五月盟于臯鼬十三年定十二年春公薨夏葬公左傳諡曰襄在位十二年惠公惠公名夷又名寅系未詳襄公之薨也比立比為襄公子與弟亦未詳比元年定十三年夷弒比自立是為惠公公元年魯定公之十四年也十二年哀十年夏五月公薨秋葬公左傳諡曰惠在位十二年薛自惠公以後其傳世莫可知後滅于齊贊曰薛小久服屬宋及城成周乃爭舊職論夏官末矣許世家其先世系莫考自魯隱公十一年始見于經終哀公十五年凡二百三十二年傳八世莊公隱十一年見春秋穆公許姜姓大嶽神農之後蓋男爵也經于㑹盟皆書男知為男爵國微其世系史不載莫考其始封當桓王時為莊公亦莫知其立年隱十一年鄭魯齊伐許遂入許莊公奔衛齊以許讓魯魯不受乃與鄭鄭使許大夫百里奉公弟新臣即許叔居許東偏使其大夫公孫獲處許西偏莊公薨新臣入即位是為穆公穆公元年魯桓公十五年也是年桓王崩莊王立十六年莊十二年莊王崩僖王立二十年莊十六年公會諸侯齊魯宋陳衛鄭滑滕同盟于幽二十一年莊十七年僖王崩惠王立三十三年莊二十九年鄭人侵我四十二年僖四年公會諸侯齊魯宋陳衛鄭曹侵蔡蔡潰遂伐楚次于陘夏公薨于師秋八月葬公以侯禮左傳左傳凡諸侯薨于朝會加一等死王事加二等諡曰穆在位四十二年僖公僖公名業所出未詳穆公薨公即位公元年僖五年公及諸侯齊魯宋陳衛鄭曹會王世子于首止秋八月諸侯同盟于首止鄭伯逃歸不盟二年僖六年諸侯伐鄭秋楚圍我以救鄭諸侯遂救我冬蔡侯將公以見楚子于武城公面縳銜璧大夫衰絰士輿櫬楚子親釋其縳受其璧而祓之焚其櫬禮而命之使復其所三年僖七年閏月惠王崩襄王立懼王子帶之難不發喪明年公會王人諸侯齊魯宋衛曹陳盟于洮謀王室五年僖九年公會宰周公諸侯齊魯宋衛鄭曹于葵邱秋九月諸侯盟于葵邱六年僖十年公及齊侯伐北戎九年僖十三年公會諸侯齊魯宋陳衛鄭曹于鹹謀王室為戎難故秋諸侯戍周十一年僖十五年楚人伐徐公會諸侯前諸侯盟于牡邱遂次于匡諸侯之大夫救徐十二年僖十六年公㑹諸侯齊魯宋陳衛鄭邢曹于淮十七年僖二十一年公及楚宋陳蔡鄭會于楚執宋公以伐宋二十三年僖二十七年公及楚陳蔡鄭圍宋二十四年僖二十八年晉會諸侯救宋及楚人戰于城濮楚師敗績冬諸侯遂圍我二十九年僖三十三年晉陳鄭伐我三十四年文五年冬十月公薨明年春葬公左傳諡曰僖在位三十四年昭公昭公名錫我系未詳僖公薨公即位公二年文七年公會諸侯齊宋衛陳鄭曹晉大夫盟于扈三年文八年秋八月襄王崩頃王立四年文九年楚人伐鄭我會晉魯宋衛救鄭九年文十四年春頃王崩匡王立夏六月公會諸侯魯宋陳衛鄭曹晉趙盾同盟于新城十年文十五年公會諸侯晉宋衛蔡陳鄭曹盟于扈十五年宣二年冬十月匡王崩定王立二十五年宣十二年晉楚戰于邲晉師敗績公及鄭伯如楚三十年宣十七年春正月公薨夏葬公左傳諡曰昭在位三十年靈公靈公名寧系未詳昭公薨公即位公三年成二年晉伐齊楚救齊王卒盡行彭名御戎蔡侯為左公為右二君弱皆强冠之師侵衛遂侵魯魯請盟冬十一月公及楚大夫魯侯蔡侯諸侯之大夫秦宋陳衛鄭齊盟于蜀四年成三年我恃楚而不事鄭鄭伐我五年成四年鄭公孫申帥師疆我田我敗諸展陂冬鄭伐我取鉏任泠敦之田六年成五年公訴鄭于楚楚執鄭皇戍鄭請成于晉冬十一月定王崩簡王立十年成九年鄭復二于楚晉執鄭伯冬十一月鄭圍我示不急君也十五年成十四年鄭伐我敗焉鄭伯復伐我入我郛我平以公孫申之封即成四年公孫申所疆之田十六年成十五年公畏逼于鄭請遷于楚冬十一月楚遷我于葉二十年襄元年秋九月簡王崩靈王立二十二年襄三年冬晉伐我事楚不與諸侯會盟故三十五年襄十六年公請遷于晉諸侯遂遷我大夫不可諸侯伐我次于函氏晉及楚師戰于湛陂楚師敗績晉復伐我而還四十三年襄二十四年諸侯將伐齊公及楚蔡陳伐鄭以救齊四十五年襄二十六年公如楚請伐鄭曰師不興孤不歸矣秋八月薨于楚楚子曰不伐鄭何以求諸侯冬十月楚伐鄭十二月涉于汜而歸而後葬公左傳諡曰靈在位四十五年悼公太子止附悼公名買系未詳靈公薨公即位公元年襄二十七年宋弭諸侯之兵夏我會諸侯之大夫晉楚魯蔡衛陳鄭曹于宋秋七月盟于宋二年襄二十八年冬十二月靈王崩景王立公如楚會楚子卒明年公送葬至于西門之外六年昭元年我會諸侯之大夫晉楚魯齊宋衛陳蔡鄭曹于虢九年昭四年我及諸侯楚蔡陳鄭徐滕頓胡沈小邾宋淮夷會于申秋七月楚以諸侯伐吳執齊慶封殺之遂滅賴遷賴于鄢楚子欲遷我于賴使大夫城之而還十年昭五年我及諸侯楚蔡陳頓沈徐越伐吳十四年昭九年楚遷我于夷取州來淮北之田以益之伍舉授公田十五年昭十年秋九月我如晉會葬晉平公十六年昭十一年楚滅蔡遷我于荆十八年昭十三年楚平王即位復我于葉二十三年昭十八年楚王子勝曰許鄭仇敵也晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許葉在楚國方城外之蔽也土不可易國不可小許不可俘讎不可啓君其圖之冬楚遷我于白羽即析二十四年昭十九年夏公瘧五月戊辰飲大子止之藥薨大子奔晉榖梁止曰我與夫弒者不立乎君位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死又曰許世子不知嘗藥纍及許君也冬葬公左傳諡曰悼在位二十四年許男斯許男斯大子止之弟悼公之弒也大子止奔晉斯即位斯三年昭二十二年夏四月景王崩悼王立王子朝作亂冬悼王崩敬王立四年昭二十三年吳伐州來楚以我及諸侯之師奔命救州來吳敗我及諸侯之師于雞父七年昭二十六年冬十月敬王入于成周王子朝奔楚十七年定四年夏六月我遷于容城冬十一月吳破楚入郢十九年定六年春正月鄭滅我以斯歸左傳斯無諡在位十九年元公元公名成系未詳鄭之滅許也成即位是為元公公十年哀元年公及楚陳隨圍蔡二十二年哀十三年夏公薨秋葬公左傳諡曰元在位二十二年許後事不載莫知所終贊曰宋衛陳鄭之火也陳不救火許不弔災君子知陳許之先亡也及楚滅陳先二十年而鄭滅許許雖三遷庸能免乎不自樹德庇楚無濟也莒世家其先世莫考自魯隱公二年始見于經終哀公十四年凡二百四十一年傳九世莒子兹㔻公紀公大子僕附季他渠邱公莒己姓夷也爵為子其先世無傳漢志莒故國盈姓少昊後平王時見莒子莒子娶于向向小國名向姜不安莒而歸魯隱公二年莒人入向以姜氏還莒魯有怨紀既昏于魯使其大夫裂繻與莒子盟于密以平魯也紀姜姓國四年我伐杞取牟婁八年我及魯侯盟于浮來以成紀好也桓公十二年莒子會魯侯杞子盟于曲池十五年桓王崩莊王立莊公十年齊滅談談子來奔十二年莊王崩僖王立十七年僖王崩惠王立十九年魯大夫姜氏來二十年姜氏來二十七年大夫慶如魯逆叔姬莊公女閔公二年魯公子慶父弒閔公來奔魯以賂求慶父我歸之僖公元年我求賂于魯魯敗我于酈獲弟拏八年惠王崩襄王立二十五年衛人平我于魯冬十二月大夫慶會魯侯衛侯盟于洮二十六年莒子㑹衛寧速盟于向莒子者是為兹㔻公兹㔻公名期其立亦莫詳何時二十八年莒子會諸侯晉魯齊宋蔡鄭衛盟于踐土冬會于溫天王狩于河陽諸侯遂圍許文公七年徐伐我我如魯請盟魯公孫敖來涖盟八年襄王崩頃王立十四年頃王崩匡王立其後有紀公紀公名庶其生大子僕又生季他愛季他而黜僕且多行無禮于國十八年冬十月僕因國人以弒紀公以其寶玉奔魯季他即位季他元年魯宣公之元年也二年莊王崩定王立其後又有渠邱公渠邱公名朱季他之卒渠邱公之立皆莫詳其年莒郯相怨四年魯齊平我及郯我不肯魯伐我取向我恃晉而不事齊十三年齊伐我成公五年定王崩簡王立七年莒子會諸侯晉魯齊宋衛曹邾杞伐鄭秋八月同盟于馬陵八年魯公孫嬰齊來聘秋晉使巫臣如吳假道于我與渠邱公立于池上曰城已惡公曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然固多大國矣唯或思或縱也勇夫重閉况國乎九年公會諸侯晉魯齊宋衛鄭曹杞同盟于蒲冬楚伐我圍渠邱渠邱城惡衆潰奔莒楚入渠邱莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡莒潰楚遂入鄆莒别邑十四年春正月渠邱公薨左傳莒夷無諡以上皆莫詳其年以魯紀年云犁比公展輿附犁比公名密州字買朱鉏渠邱公薨犁比公即位元年魯成公十五年也宋魚石叛五年襄元年我會諸侯之大夫晉魯宋衛曹邾滕薛圍宋彭城秋九月簡王崩靈王立七年襄三年公會周單子諸侯晉魯宋衛鄭邾齊同盟于雞澤八年襄四年我及邾伐鄫九年襄五年公會諸侯晉魯宋陳衛鄭曹邾滕薛齊吳鄫于戚會吳且戍陳十年襄六年我滅鄫公羊莒女有為鄫夫人者蓋欲立其出也注世子巫者鄫前夫人之子與魯襄公俱為莒外孫時莒女嫁為鄫後夫人夫人無男有女還嫁之與莒有外孫鄫子愛後夫人而無子欲立其外孫榖梁莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也十一年襄七年楚圍陳公㑹諸侯晉魯宋陳衛曹邾于鄬以救之十二年襄八年我伐魯東鄙以疆鄫田十三年襄九年公會諸侯晉魯宋衛曹邾滕薛杞小邾齊伐鄭冬十一月同盟于戲十二月復伐鄭十四年襄十年公會諸侯前諸侯會吳于柤秋我伐魯東鄙是年復㑹伐鄭戍鄭虎牢十五年襄十一年夏復會伐鄭秋七月同盟于亳九月復悉師以伐鄭鄭成冬十二月會于蕭魚十六年襄十二年我伐魯東鄙圍台魯季孫宿入我鄆取鐘以為其君盤十八年襄十四年我會諸侯之大夫前諸侯會吳于向夏會伐秦衛人逐其君冬我會諸侯之大夫晉魯宋衛鄭邾于戚謀定衛二十年襄十六年公會諸侯晉魯宋衛鄭曹邾薛杞小邾于溴梁晉執公及邾子以歸侵魯故且曰通齊楚之使已而釋之釋莒子經傳不載二十二年襄十八年公會諸侯前諸侯同圍齊明年諸侯盟于祝柯二十四年襄二十年及魯平會魯盟于向夏公會諸侯晉魯齊宋衛鄭曹邾滕薛杞小邾盟于澶淵二十五年襄二十一年晉欒盈叛公㑹諸侯晉魯齊宋衛鄭曹邾于啇任錮欒氏也明年復會于沙隨二十七年襄二十三年齊侯伐晉還不入遂襲我門于且于莒邑傷股而退明日復戰獲其大夫杞殖我請成二十八年襄二十四年齊伐我侵介根莒邑秋八月公會諸侯晉魯宋衛鄭曹邾滕薛杞小邾于夷儀將伐齊楚伐鄭以救齊諸侯還救鄭二十九年襄二十五年夏五月公朝于齊齊崔杼弒莊公立其弟景公景公與其大夫及公盟公還自齊會諸侯前諸侯伐齊齊成秋七月同盟于重邱三十二年襄二十八年冬十二月靈王崩景王立三十三年襄二十九年我會城杞三十四年襄三十年我及諸侯之大夫晉魯齊宋衛鄭曹邾滕薛杞小邾會于澶淵宋災故犁比公生去疾及展輿既立展輿又廢之犁比公虐國人患之三十五年襄三十一年冬十一月展輿因國人以攻公弒之乃立左傳犁比公在位三十五年著邱公著邱公名去疾犁比公之子也展輿既弒犁比公自立羣公子召去疾于齊齊納去疾是為著邱公展輿奔吳著邱公元年昭元年春魯伐我取鄆因我亂疆鄆田著邱公立而不撫鄫莒邑四年昭四年鄫叛魯取鄫五年昭五年牟夷以牟婁及防兹奔魯牟婁防兹莒三邑秋七月我討魯不設備魯敗我于蚡泉十年昭十年魯伐我取郠晉平公卒秋九月會葬晉平公十三年昭十三年秋七月公會周劉子諸侯晉齊宋衛鄭曹邾滕薛杞小邾于平邱甲戍同盟于平邱我及邾人訴于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉辭魯盟執季孫意如以歸十四年昭十四年秋八月公薨左傳在位十四年郊公共公郊公者名任著邱公之子共公庚輿者著邱公之弟也著邱公十四年昭十四年薨郊公不戚國人弗順欲立庚輿郊公惡公子鐸而善于公子意恢大夫兹夫惡意恢而善于庚輿冬十二月兹夫殺意恢郊公奔齊公子鐸逆庚輿于齊齊送之有賂田庚輿即位是為共公共公二年昭十六年齊伐徐徐成二月我及徐子郯人會齊侯于蒲畏齊討也五年昭十九年齊師伐我入紀八年昭二十二年齊師伐我公將戰大夫苑羊牧之不可弗聼敗齊師于夀餘齊侯伐我公行成齊司馬竈來涖盟公如齊涖盟盟于稷門之外國人于是大惡公夏四月景王崩悼王立子朝作亂冬十一月悼王崩敬王立郊公元年昭二十三年秋七月共公奔魯齊人納郊公共公虐而好劒茍鑄劒必試諸人國人患之公又將叛齊故大夫烏存帥國人以逐之郊公四年昭二十六年公會齊魯邾杞盟于鄟陵秋九月敬王入于成周子朝奔楚十年昭三十二年我會諸侯之大夫晉魯齊宋衛鄭曹薛杞小邾于狄泉且城成周十四年定四年公會周劉子諸侯晉魯宋蔡衛陳鄭許曹邾頓胡滕薛杞􅘁邾齊于召陵侵楚夏五月盟于臯鼬三十九年哀十四年夏五月公薨左傳郊公在位三十九年共公在位八年郊公以後事不載莫知其所終贊曰莒邉齊故常屬齊然自魯文公以降所可紀載裁六七公而庶其黜長密州詘少遂至弒父若讐何其易也邾世家其先世莫考自魯隱公元年始見于經終哀公二十四年凡二百五十二年傳九世邾子克邾曹姓顓頊之後初為附庸莫詳其始封王沈魏書曹姓之先出于黃帝當髙陽氏陸終之子曰安是為曹姓周武王克殷封曹俠于邾顔真卿家廟碑顓頊之孫祝融融孫安為曹姓其裔邾武公名夷甫字顔其後數從齊桓尊周室平王命為子是為邾子克克字儀父亦莫詳其立年隱公元年邾子及魯侯盟于蔑鄭伐衛請師于我邾子使私于魯公子豫冬我及魯公子豫鄭人盟于翼邾地三年平王崩桓公立五年宋人取我田先是宋伐鄭我告于鄭曰請君釋憾于宋敝邑為道鄭人以王師會之伐宋入其郛七年魯伐我為宋故桓公七年魯伐我十五年桓王崩莊王立夏世子如魯朝經書人杜預注附庸之世子故降稱人十七年邾子及魯侯盟于趡魯也秋魯及宋衛伐我宋萬弒其君莊公十二年莊王崩僖王立十三年我及齊侯宋陳蔡會于北杏以平宋亂十五年我及宋齊伐郳十六年冬十二月邾子克薨左傳邾子瑣文公邾子名瑣系未詳克薨瑣即位元年魯莊公十七年也是年僖王崩惠王立十二年莊二十八年夏四月邾子瑣薨籧篨即位是為文公公六年閔二年魯慶父弒其君季友以公子申即僖公適我慶父奔莒乃入立之哀姜來奔齊人取而殺之七年僖元年楚伐鄭我會諸侯齊魯宋鄭曹于柳謀救鄭秋九月魯敗我師于偃我既送魯哀姜還因戍虗邱欲以侵魯既而齊歸哀姜之喪我懼乃歸魯要而敗之十三年僖七年閏月惠王崩襄王立二十四年僖十八年齊桓公卒宋公以我及曹衛伐齊納孝公二十五年僖十九年宋公曹人及我盟于曹南鄫子來會盟宋公使公用鄫子于次睢之社二十七年僖二十一年我滅須句風姓國伏羲之後魯僖公母成風須句之女須句子奔魯冬魯伐我二十八年僖二十二年魯伐我取須句反其君秋我以須句故出師魯不設備及我師戰于升陘魯師敗績獲魯侯胄縣諸魚門三十四年僖二十八年冬我會諸侯晉魯齊宋蔡鄭陳莒秦于溫天王狩于河陽三十九年僖三十三年魯伐我取訾婁我不設備秋復伐我魯既取須句我復滅之四十六年文七年魯伐我取須句先是公之子叛而歸魯遂置公之子以守之四十七年文公年秋八月襄王崩頃王立五十二年文十二年夏五月公薨左傳諡曰文在位五十二年定公定公名貜且文公元妃齊姜生貜且二妃晉姬生捷菑文公薨國人立貜且捷菑奔晉文公之薨也魯使弔焉不敬公元年文十四年我討魯伐其南鄙春魯伐我是年頃王崩匡王立夏晉會諸侯魯宋陳衛鄭許曹同盟于新城趙盾以諸侯之師八百乘納捷菑于我我辭曰齊出貜且長趙盾乃還公羊晉郤缺帥師革車八百乘以納捷菑于邾婁邾婁人言曰接菑晉出也貜且齊出也子以其指則捷菑也四貜且也六子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長郤缺曰非吾力不能納也義實不爾克也引師而去之六年宣元年公朝魯七年宣二年冬十月匡王崩定王立二十三年宣十八年我戕鄫子于鄫自虐其君曰弒自外曰戕二十五年成二年我及魯侯諸侯之大夫楚秦宋陳衛鄭齊曹薛鄫盟于蜀畏晉而竊與楚盟二十八年成五年冬十一月定王崩簡王立十二月公會諸侯晉魯齊宋衛鄭曹杞同盟于蟲牢鄭服也三十年成七年楚伐鄭公會諸侯晉魯齊宋衛曹莒杞救鄭秋同盟于馬陵三十一年成八年我會晉魯齊伐郯三十六年成十三年我會諸侯晉魯齊宋衛鄭曹滕伐秦曹負芻殺大子而自立三十八年成十五年我會諸侯晉魯衛鄭曹宋齊同盟于戚討曹負芻冬會吳于鍾離三十九年成十六年我會諸侯晉魯齊衛宋于沙隨謀伐鄭七月會周尹子諸侯伐鄭四十年成十七年會伐鄭夏六月同盟于柯陵冬復會伐鄭十二月公薨左傳定公之時有弒其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦殺其人壞其室汙其宫而豬焉蓋君踰月而後舉爵禮記檀弓諡曰定在位四十年宣公宣公名牼系未詳定公薨公即位公元年成十八年秋公如魯朝宋魚石以彭城叛冬公會諸候晉宋衛魯齊同盟于虛朾謀救宋二年襄元年我會諸侯之大夫晉魯宋衛曹莒滕薛圍宋彭城夏晉伐鄭我會魯齊曹杞次于鄫以待之遂侵楚焦夷及陳秋簡王崩靈王立公如魯朝三年襄二年晉會侵鄭秋我會諸侯之大夫晉魯宋衛曹于戚冬復于戚遂城虎牢以逼鄭鄭成四年襄三年公會周單子諸侯晉魯宋衛鄭莒齊同盟于雞澤大夫及陳袁僑盟五年襄四年我及莒伐鄫魯救鄫侵我敗之于狐駘六年襄五年公會諸晉魯宋陳衛鄭曹莒滕薛齊吳鄫于戚冬戍陳七年襄六年魯叔孫豹來聘且修平八年襄七年楚圍陳公會諸侯晉魯宋陳衛曹莒于鄬以救陳九年襄八年我會晉侯鄭伯魯齊宋衛于邢邱十年襄九年冬公會諸侯晉魯宋衛曹莒滕薛杞小邾齊伐鄭鄭成同盟于戲十二月復伐之十一年襄十年公會諸侯前諸侯會吳于柤秋會伐鄭戍鄭虎牢十二年襄十一年公會伐鄭同盟于亳秋九月悉師以復伐鄭鄭成冬十二月會于蕭魚十五年襄十四年我會諸侯之大夫晉魯齊宋衛鄭曹莒滕薛杞小邾會吳于向夏四月會伐秦衛人逐其君冬我會諸侯之大夫晉魯宋衛鄭莒于戚謀定衛十六年襄十五年我二于晉伐魯南鄙魯告于晉十七年襄十六年晉會諸侯于溴梁執公以歸十八年襄十七年春二月公薨左傳諡曰宣在位十八年悼公悼公名華系未詳宣公十八年襄十七年薨公即位冬我伐魯南鄙公元年襄十八年公會諸侯晉魯宋衛鄭曹莒滕薛杞小邾同圍齊二年襄十九年諸侯盟于祝柯晉執公以我伐魯故遂疆魯田取我田自漷水歸之魯三年襄二十年公會諸侯前諸侯盟于澶淵齊成故秋魯伐我報我之驟至也驟至猶言數侵也四年襄二十一年晉欒盈叛冬公會諸侯晉魯齊宋衛鄭曹莒于商任錮欒氏明年冬復會于沙隨齊背盟伐晉七年襄二十四年公會諸侯晉魯宋衛鄭曹莒滕薛杞小邾于夷儀將伐齊楚救齊伐鄭諸侯還救鄭八年襄二十五年復會于夷儀伐齊齊弒其君以成秋八月同盟于重邱十年襄二十七年宋弭諸侯之兵夏六月公會諸侯晉楚魯宋齊秦鄭陳衛滕蔡許曹于宋秋七月諸侯之大夫盟于宋西門之外十一年襄二十八年公如魯朝冬十一月靈王崩景王立十三年襄三十年我及諸侯之大夫晉魯齊宋鄭曹衛莒滕薛杞小邾會于澶淵宋災故十五年昭元年夏六月丁巳公薨秋葬公左傳諡曰悼在位十五年莊公莊公名穿系未詳悼公薨公即位公元年昭十年晉平公卒我如晉會葬十二年昭十三年秋公會周劉子諸侯晉魯齊宋衛鄭曹莒滕薛杞小邾于平邱八月同盟于平邱我訴魯于晉晉辭魯侯盟執季孫意如以歸十七年昭十八年我襲鄅入之盡俘以歸鄅子曰余無歸矣從帑于我公及鄅夫人而舍其女鄅夫人宋向戍之女也十八年昭十九年宋伐我圍蟲取之乃盡歸鄅俘夏我及郳徐會宋公同盟于蟲二十一年昭二十二年夏四月景王崩悼王立子朝作亂冬十月悼王崩敬王立二十二年昭二十三年我城翼還將自離姑邾邑從離姑則道徑魯武城魯武城人取我師我訴于晉晉執魯叔孫婼二十四年昭二十五年我㑹諸侯之大夫晉魯宋衛鄭曹滕薛􅘁邾于黃父謀王室魯人逐其君二十五年昭二十六年公會諸侯齊莒杞盟于鄟陵謀納魯侯秋九月敬王入于成周子朝奔楚二十六年昭二十七年我及諸侯之大夫晉宋衛曹滕會于扈戍周且納魯侯三十四年定三年春二月辛卯公薨公嘗與大夫夷射姑飲酒私出閽乞肉焉奪之杖以敲之及是公在門臺臨廷閽以瓶水沃廷公望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投于牀廢于爐炭爛遂薨公卞急而好潔故及是秋葬公先葬以車五乘殉五人左傳諡曰莊在位三十四年隱公桓公考公隱公名益系未詳莊公三十四年定三年薨公即位冬公及魯大夫盟于拔拔即郯公元年定四年春公會周劉子諸侯晉魯宋蔡衛陳鄭許曹莒頓胡滕薛杞小邾齊于召陵侵楚夏五月盟于臯鼬十一年定十四年魯侯大搜于比蒲公如魯會十二年定十五年公如魯朝十四年哀二年魯伐我將伐絞邾邑我愛其土賂以漷沂之田魯取漷東田及泝西田及公盟于句繹十八年哀六年魯伐我十九年哀七年魯伐我入之處公宫衆保于繹邾山在郊縣北師宵掠以公歸獻于亳社以其亡國與殷同囚諸負瑕負瑕故有繹負瑕魯邑故有繹民在大夫茅夷鴻請救于吳二十年哀八年吳伐魯齊又使如吳請伐魯魯乃歸公公又無道吳討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政是為桓公公二年哀十年春二月隱公奔魯齊甥也遂奔齊是年桓公會諸侯吳魯郯伐齊南鄙齊弒悼公乃還八年哀十六年孔子卒十年哀十八年敬王崩元王立十三年哀二十一年桓公及齊侯魯侯盟于顧齊地隱公後元年哀二十二年夏四月隱公自齊奔越曰吳為無道執父立子越人歸之桓公奔越後三年哀二十四年公又無道越人執之以歸而立公子何大子革之弟何亦無道左傳隱公在位二十年後在位三年卒諡曰隱公子何後事不可考隱公之曽孫為考公鄭康成禮記注考公之喪徐君使容居來弔舍昭二十年吳已滅徐此蓋滅而復興曰寡君使容居坐含進侯玉其使容居以含令不使賤者君行則親含時徐僭稱王自比天子有司曰諸侯之來辱敝邑者易則易于則于雜者未之有也易謂臣禮于謂君禮雜者容居以臣欲行君禮故有司拒之容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王徐先君僭號西討濟于河無所不用斯言也容居魯人也魯魯鈍也不敢忘其祖禮記檀弓贊曰邾魯鄰也然始終搆難迭尋干戈雖朝會時有而協比不終兩執于晉不恤齊言宿怨之深也逮至隱公囚繫三國而怙惡不悛又其性夫人且奕棋其君邾之為邾也難已小邾世家其先世莫考魯莊公五年始見于經終哀公十四年凡二百九年傳二世小邾子小邾穆公小邾亦曹姓顓頊之後邾之别封故曰小邾又名郳顔真卿家廟碑顓頊之孫祝融融孫安為曹姓其裔邾武公武公之子友别封郳為小邾子遂氏顔初為附庸屬齊或屬宋後爵為子國小其世系紀年皆不載所載者唯郳犁來小邾穆公犁來于莊公五年如魯朝十五年我叛宋宋齊邾伐我僖公七年小邾子如魯朝始封子小邾穆公當魯襄公時襄公二年我及諸侯之大夫㑹于戚遂城虎牢以逼鄭左傳襄元年會于鄫齊崔杼有不服晉之言故二年秋會于戚滕薛小邾皆不至晉荀罃曰罃將請于齊若不得請事將在齊是年冬復會于戚齊崔杼及滕薛小邾皆至七年公如魯朝九年冬公會諸侯晉魯宋衛曹莒邾滕薛杞齊伐鄭十二月同盟于戲十年公會諸侯前諸侯會吳于柤秋會伐鄭十一年夏會伐鄭同盟于亳九月復會伐鄭鄭成會于蕭魚十四年我會諸侯之大夫前諸侯會吳于向夏會伐秦十六年公會諸侯晉魯宋衛鄭曹莒邾滕薛杞于溴梁十八年公會諸侯前諸侯同圍齊十九年諸侯還自沂上盟于祝柯二十年公會諸侯晉魯齊宋衛鄭曹莒邾滕薛杞盟于澶淵二十二年公會諸侯前諸侯盟于沙隨二十四年公會諸侯晉魯宋衛鄭曹莒邾滕薛杞于夷儀將伐齊二十五年復會于夷儀伐齊齊成同盟于重邱二十九年會城杞三十年我及諸侯之大夫晉魯齊宋衛鄭曹莒邾滕薛杞㑹于澶淵宋災故魯昭公三年公如魯朝季孫宿欲卑之叔孫豹曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉宿從之十年會葬晉平公十三年公會周劉子諸侯前諸侯于平邱十七年公如魯朝魯侯與之燕季孫意如賦采菽公賦菁菁者莪叔孫豹曰不有以國其能久乎按傳自襄公二年至此皆為穆公事穆公居國最久故叔孫云然也穆公在位當有四五十年其立與薨皆未詳其後魯昭公十九年小邾及邾人徐人會宋公盟于蟲二十五年會黃父三十二年城成周魯定公四年會召陵魯哀公四年宋執小邾子杜預注邾子無道于其民十四年小邾射以句繹奔魯皆莫知其為某公事也小邾穆公子曰郳甲仕宋黨華向昭公二十年華向之亂甲出奔鄭左傳尚史卷十九
