body:
  text: 尚史卷三十五列傳十三鑲白旗漢軍李鍇撰齊諸臣傳高傒高莊子附高固宣子高無咎子弱附高厚高止子豎高酀附高偃高張昭子高傒者齊上卿高敬仲也杜注國子高子天子所命為守臣桓公十四年莊二十二年傒及魯人盟於防左傳二十六年閔二年魯有哀姜慶父之亂二君殺死謂子般與閔公國絶無嗣桓公使傒存之立僖公國語子左傳閔二年高來盟是也傒子曰高莊子名未詳高固者齊卿高宣子也惠公五年宣五年魯宣公如齊高固使齊侯止公請叔姬焉秋九月固往逆女冬反馬于魯禮逆女留其送馬三月廟見遣使反馬頃公五年宣十五年固㑹魯仲孫蔑于無婁七年宣十七年晉使郤克徴㑹于我郤克跛適頃公母觀之笑于房郤克怒公使固及晏弱蔡朝南郭偃㑹及斂盂固逃歸晉于是執三子尋緩之逸十年成二年晉及魯衛伐我從我師于莘六月至于靡筓之下固入晉師桀石以投人禽之而乘其車繫桑本焉曰欲勇者賈余餘勇明日戰於鞍我師敗績固卒諡曰宣子二無咎厚無咎嗣卿事靈公靈公六年成十五年無咎及諸侯之大夫㑹吳於鍾離七年成十六年晉楚戰於鄢陵無咎及國佐以兵㑹晉師初慶克通於聲孟子靈公母八年成十七年國佐相靈公㑹伐鄭無咎及鮑牽處守及還將至閉門而索客孟子訴之曰髙鮑將不納君秋七月刖鮑牽而逐無咎無咎奔莒其子弱以盧叛十二月盧降盧髙氏邑也無咎既逐厚嗣髙氏靈公十五年襄六年我滅萊遷萊于郳厚及崔杼定其田十七年襄八年厚及諸侯之大夫㑹於邢邱十九年襄十年㑹吳於柤厚相大子光先㑹諸侯於鍾離二十五年襄十六年晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類厚之詩不類荀偃怒使諸大夫盟厚厚逃歸二十六年襄十七年公伐魯圍桃厚圍臧紇于防魯師逆臧紇歸我師去之獲臧堅二十八年襄十九年公東遷大子光而立公子牙使厚及夙沙衛傅之公疾崔杼微逆光而立之五月靈公薨莊公即公子光即位夙沙衛以髙唐叛秋八月崔杼殺厚於灑藍而兼其室子髙止字子容為大夫事景公景公四年襄二十九年止㑹諸侯之大夫城杞秋九月公孫蠆公孫竈放止於北燕止好以事自為功且専故難及之止子豎以盧叛十月閭邱嬰圍盧豎曰茍使髙氏有後請致邑齊立傒之曾孫酀豎乃致盧而出奔晉晉人城綿而置旃左傳髙偃傒𤣥孫為大夫事景公景公十八年昭十二年偃帥師納北燕伯欵於陽偃卒子髙張是為髙昭子景公三十五年昭二十九年魯昭公處於鄆公使張唁之三十八年昭三十二年張㑹諸侯之大夫於狄泉尋盟且城成周明年張後期不從諸侯四十六年定八年張及國夏帥師伐魯西鄙五十八年哀五年公疾使張及國夏立子荼置羣公子於萊秋九月公卒子荼立羣公子出奔悼公元年哀六年陳乞鮑牧及諸大夫以甲入於公宫攻髙國張聞之與國夏乘如公戰於莊六軌之道敗國人追之國夏及張奔魯秋七月陳乞遂弒荼而立公子陽生張卒諡曰昭左傳國歸父莊子國佐武子國勝附國弱景子國夏惠子國書國懿伯貞孟成伯髙父國昭子國歸父者齊上卿國莊子也事昭公昭公二年僖二十九年歸父㑹王子虎及諸侯之大夫盟於翟泉六年僖三十三年歸父聘於魯自郊勞至於贈賄禮成而如之以敏臧孫辰曰國子為政齊猶有禮勸魯侯來朝卒諡曰莊子佐嗣佐是為國武子賓媚人也惠公十年宣十年公薨崔杼有寵於公佐及髙固畏其逼而逐之冬佐報聘於魯頃公十年成二年晉郤克㑹師伐我戰於鞍我師敗績晉師入自邱輿擊馬徑公使佐賂以紀甗玉磬與地不可則聽客之所為客謂晉也佐致賂晉人不可曰必以蕭同叔子同叔蕭君之字齊侯外祖父難斥言其母故逺言之為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也禹湯文武樹德而濟同欲焉五伯之霸也杜注夏伯昆吾商伯大彭豕韋周伯齊桓晉文一曰齊桓晉文宋襄秦穆楚莊勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是道子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好惟是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不惟命是聼晉人許之佐及晉師盟於爰婁靈公六年成十五年佐及諸侯同盟於戚七年成十六年秋佐㑹周尹子及諸侯伐鄭慶克通於聲孟子靈公母鮑牽以告佐佐召慶克而謂之克告夫人曰國子謫我夫人怒明年諸侯伐鄭佐相公以㑹髙無咎鮑牽處守孟子訴之曰髙鮑將不納君而立公子角頃公子國子知之遂刖鮑牽而逐髙無咎無咎奔莒其子髙弱以盧叛公使崔杼慶克帥師圍盧佐適從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛公與之盟於齊關而復之十二月盧降使佐子勝告難於晉待命於清九年成十八年為慶氏之難故公使士華免以戈殺佐于內宫之朝師逃於夫人之宫使清人殺國勝勝弟弱奔魯既而反弱使嗣國氏諡佐曰武弱是為國景子景公元年襄二十六年衛獻公伐孫氏復入於衛晉討衛執衛侯公為衛故如晉弱相使晏嬰私於羊舌肹曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何羊肹以告晉侯乃許歸衛侯七年昭元年弱㑹諸侯之大夫于虢十六年昭十年弱如晉葬平公十七年昭十一年弱㑹諸侯之大夫于厥憖左傳弱卒諡曰景國夏者佐之孫惠子也亦逮事景公景公四十二年定四年夏㑹王臣劉子及諸侯於召陵侵楚四十五年定七年夏帥師伐魯西鄙四十六年定八年夏及髙張再伐魯荀寅士吉射叛晉五十六年哀三年夏帥師圍戚救荀寅五十七年哀四年夏伐晉取邢任欒鄗逆畤隂人盂壺口㑹鮮虞納荀寅于柏人五十八年哀五年公疾使夏及髙張立子荼置羣公子於萊秋九月公薨子荼立明年陳乞鮑牧及諸大夫以甲攻髙國夏奔莒遂及髙張晏圉晏嬰子弦施即弦多奔魯陳乞遂殺子荼而立悼公左傳夏卒諡曰惠國書者亦齊卿悼公五年哀十年吳㑹魯伐我南鄙師于鄎我弒悼公赴于師吳師乃還明年我為鄎故書及髙無㔻帥師伐魯及清戰於郊魯右師奔左師入我軍五月魯㑹吳伐我克博至於嬴書將中軍髙無㔻將上軍宗樓字子陽將下軍以禦之戰于艾陵吳敗髙無㔻書敗吳胥門巢吳卒助之大敗我師獲書及公孫夏閭邱明陳書東郭書革車八百乘甲首三千以獻于魯魯公使大史固歸書之元置之新篋褽之以𤣥纁加組帶焉置書于其上曰天若不識不衷何以使下國左傳書子觀國氏又有懿伯懿伯生貞孟貞孟生成伯髙父所謂成子髙也世本成子髙寢疾慶遺入請曰子之病革矣如至乎大病則如之何子髙曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人乎哉我死則擇不食之地而葬我焉又曰葬也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉又有國昭子名系未詳蓋國書之後國昭子之母死問於子張曰葬及墓男子婦人安位子張曰司徒敬子之喪夫子孔子相男子西鄉婦人東鄉曰噫母曰我喪也斯沾斯盡也沾覘視也謂有事人盡視之爾専之賓為賓焉主為主焉婦人從男子皆西鄉記檀弓論曰髙國天子之命卿宜以禮幹國而徇欲比私易置適庶亂天紀墮姜業推挽之道顧若是與國佐顯責慶克不可謂智嚴其防速其罰內事隱正之可也墻茨不掃而手挼之宜其及也鮑叔牙鮑牽莊子鮑國文子鮑叔牙者姒姓之後鮑敬叔之子也為齊大夫傅公子小白管子齊襄公使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽往見之曰何故不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣不肖也是以使賤臣傅小白也賤臣知棄矣召忽曰子固辭無出吾權任子以死亡必免子鮑叔曰子如是何不免之有乎管仲曰不可持社稷宗廟者不讓事不廣閒將有國者未可知也子其出乎召忽曰不可吾三人者之于齊國也譬鼎之有足也去一焉則必不立矣吾觀小白必不為後矣管仲曰不然夫國人憎糾之母以及糾之身而憐小白之無母也諸兒長而賤事未可知也夫定齊國者非此二公子將無已也小白之為人無小智惕而有大慮非夷吾莫容小白天不幸降禍于齊糾雖得立事將不濟非子定社稷其將誰也召忽曰百嵗之後吾君卜世犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也況與我齊國之政也受君令而不改奉所立而不濟是吾義也管仲曰夷吾之為君臣也將承君命奉社稷以持宗廟豈死一糾哉鮑叔曰然則奈何管子曰子出奉令則可鮑叔乃出遂傳小白按管仲論小白與射鉤事不合姑附之初襄公立無常叔牙曰君使民慢亂將作矣奉小白出奔莒襄公十二年莊八年公孫無知弒襄公管夷吾召忽奉公子糾奔魯明年雍廩齊大夫殺無知魯伐我納子糾小白自莒先入遂立是為桓公左傳管子襄公薨公子糾踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲知召忽彊武雖國人召我我猶不得入也鮑叔曰管仲得行其知于國國何謂亂乎召忽疆武豈能獨圖我哉小白曰夫雖不得行其知豈且不有焉乎召忽雖不得衆其及豈不足以圖我哉鮑叔曰夫國之亂也智人不得作內事朋友不能相合摎而國乃可圖也乃命車駕鮑叔御小白乘而出於莒小白曰夫二人者奉君令吾不可以試也乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶之免也乃行至于邑郊鮑叔令車二十乘先十乘後乃告小白曰夫國之疑二三子莫忍老臣事之未濟也老臣是以塞道鮑叔乃誓曰事之濟也聽我令事之不濟也免公子者為上死者為下吾以五乘之實距路鮑叔乃為前驅遂入國逐公子糾管仲射小白中鉤與公子糾召忽遂走魯桓公踐位魯伐齊納公子糾而不能子糾踐位而後奔魯說亦異公使叔牙為宰辭曰臣君之庸臣也君加惠于臣使不凍餒則是君之賜也若必治國家者則非臣之所能也則管夷吾乎臣不若夷吾者五寬惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執枹鼓立于軍門使百姓加勇焉弗若也公曰管夷吾射寡人中鉤是以濵于死對曰夫為其君動也君若宥而反之夫猶是也使人請諸魯曰寡君有不令之臣在君之國欲以戮於羣臣故請之則豫我矣公使請諸魯如叔牙之言魯束縳以豫使者使者受而以退比至三釁三浴之公親逆之國語韓非子管仲鮑叔相謂曰君亂甚矣必失國齊之諸公子可輔者非公子糾則小白也與子人事一人焉先達者相收管仲從公子紏鮑叔從小白國人果殺君小白先入為君魯人拘管仲而效之鮑叔言而相之公嘗與管仲寧戚叔牙飲飲酣公謂叔牙曰盍不起為寡人夀乎叔牙奉杯而起曰使公毋忘如莒也使管子毋忘束縛在魯也使寧戚毋忘飯牛車下也公辟席再拜曰寡人與二大夫能無忘夫子之言社稷必不危矣管子寧尸子作戚叔牙既進管夷吾以身下之子孫世祿于齊有封邑十餘世常為名大夫天下不多管仲之賢而多叔牙之能知人也史記韓非子晉人伐邢桓公將救之鮑叔曰太蚤邢不亡晋不敝齊不重且夫持危之功不如存亡之德大君不如晚救之以敝晉齊實利邢亡而復存之名實美桓公乃弗救說苑桓公謂鮑叔曰寡人欲鑄大鍾昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行公曰昔者吾圍談三年得而不自與者仁也北伐孤竹剗令支而反者武也為葵邱之㑹以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不讓非仁也背太公之言而侵魯非義也壇場之上詘於一劎非武也姪婦不離懷袵非文也凡為不善遍於物不自知者無天禍必有人害天處甚髙其聽甚下除君過言天且聞之公曰寡人有過乎子不幸教幾有大罪以辱社稷按救邢鑄鍾說皆野鮑牽者叔牙曾孫鮑莊子也慶克通於聲孟子靈公母與婦人蒙衣乘輦而入於閎牽見之以告國佐佐召慶克而謂之慶克告孟子孟子怒靈公八年成十七年國佐相公㑹諸侯牽及髙無咎處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角頃公子國子知之秋七月刖鮑牽而逐髙無咎仲尼曰鮑莊子之知不如葵葵猶能衛其足卒諡曰莊鮑國者牽之弟文子也初為魯施孝叔臣相施氏忠鮑牽既刖召于魯而立之景公十六年昭十年欒施髙彊皆耆酒有告陳無宇曰子旗子良即欒髙將攻陳鮑亦告鮑氏陳鮑方睦遂伐欒髙氏三戰皆敗之欒施髙彊奔魯陳鮑分其室四十七年定九年魯陽虎以陽關叛魯伐之虎來奔請師以伐魯曰三加必取之公將許之國諫曰臣嘗為𨽻于施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵于季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富于季氏而大于魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎公乃執陽虎左傳國卒諡曰文國之孫牧見逆臣傳管夷吾召忽管修附管仲夷吾者管莊仲之子姬姓之後穎上人也及召忽並傅公子糾襄公十二年莊八年無知之亂作鮑叔牙奉公子小白奔莒管夷吾召忽奉公子糾奔魯左傳桓公元年莊九年雍廩齊大夫史作雍林以為地名誤殺無知公子糾與小白皆歸爭先入夷吾扞弓射小白中鉤小白僵夷吾以為小白死告公子紏曰安之小白已死矣鮑叔因疾驅先入小白立是為桓公吕氏春秋史記髙國陰召小白于莒魯亦發兵送公子紏而使管仲别將兵遮莒道射中小白帶鉤小白佯死以誤管仲已而載溫車中馳行亦有髙國內應故得先入夏師及魯師戰於乾時魯師敗績鮑叔帥師請于魯曰子紏親也請君討之管召讐也請受而甘心焉魯殺子紏于生竇召忽死之管子桓公問于鮑叔曰將何以定社稷鮑叔曰得管仲與召忽者社稷定矣亟召則可得不亟不可得也齊使至魯魯乃束縛管仲與召忽管仲謂召忽曰子懼乎召忽曰何懼吾不蚤死將胥有所定也今既定矣令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也子為生臣忽為死臣忽也知得萬乘之政而死公子紏可謂有死臣矣子生而霸諸侯公子紏可謂有生臣矣死者成行生者成名名不兩立行不虛至子其勉之行入齊境自刎而死君子曰召忽之死也賢其生也管仲之生也賢其死也夷吾請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治于髙傒使相可也公從之左傳吕氏春秋管子得于魯魯束縛而檻之使役人載而送之齊其驅歌而引管子恐魯之止而殺己也欲速之齊謂役人曰我為汝唱汝為我和其所唱適宜走役人不倦而取道甚速韓非子管仲束縛自魯之齊道而饑渴過猗烏封人而乞食焉封人跪而食之甚敬因竊謂仲曰適幸及齊不死而用齊將何報我曰如子之言我且言之用能之使勞之論我何以報子封人怨之立夷吾為仲父既任政謂公曰昔者聖王之治天下也參其國而伍其鄙國郊以內鄙郊以外謂三分國都以為三軍五分其鄙以為五屬也定民之居成居之事陵為之終以為葬也而慎用其六柄焉生殺貧富貴賤也于是使四民勿雜處以成民事制國為二十一鄉以定民居作隱令寄政以為三軍立五屬五正以為五鄙公曰吾欲從事於諸侯其可乎夷吾對曰未可國未安公曰安國若何對曰修舊法擇其善者而業用之遂物民與無財而敬百姓公曰諾國既安矣公曰其可乎對曰未可鄰國未親公曰親鄰國若何對曰審吾疆場而反其侵地正其封疆無受其資重為皮幣以驟聘眺于諸侯以安四鄰為遊士八十人多其資幣以號召賢士以監其所好擇其淫亂者而先征之說苑桓公使管仲治國對曰賤不能臨貴以為上卿而國不治公曰何故對曰貧不能使富賜之齊國市租一年而國不治公曰何故對曰疏不能制親立以為仲父齊國大安而遂霸天下孔子曰管仲之賢不得此三權者亦不能使其君南面而霸矣說苑桓公謂管仲曰吾欲舉事于國昭然如日月無愚夫愚婦皆曰善可乎仲曰可然非聖人之道曰何也對曰夫短綆不可以汲深井知鮮不可以與聖人之言慧士可與辦物智士可與辨無方聖人可與辨神明夫聖人之所為非衆人之所及也民知十已則尚與之爭百已則疵其過干已則誆而不信是故民不可稍而掌也可并而牧也不可暴而殺也可麾而致也衆不可户說也可舉而示也說苑桓公問於管仲曰吾欲使爵腐於酒肉腐於俎得無害霸乎對曰此極非其貴者耳然亦無害於霸也曰何如而害霸對曰不知賢害霸知而不用害霸用而不任害霸任而不信害霸信而復使小人參之害霸公曰善說苑管子曰權不兩錯政不二門故曰脛大於股者難以步指大于臂者難以把本大末小不能相使也韓非子桓公問管仲曰治國最奚患對曰患社鼠公曰何哉曰君亦見夫為社者乎樹木而塗之鼠穿其間堀穴託其中燻之焚木灌之塗陀此社鼠之所以不得也今人君之左右出則為勢重而收利於民入則比周而蔽惡於君內間主之情以告外外內為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社鼠也即位數年甲兵大足四鄰大親萊莒徐夷吳越一戰帥服三十一國國語桓公五年莊十三年公與魯㑹於柯既盟曹沫執匕首劫公公許盡歸魯侵地既而怒欲倍其約夷吾曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是乃遂割魯侵地史記魯莊公感其德為之城小榖小榖夷吾之私邑也在莊二十二年二十五年閔元年狄人伐邢夷吾言于公曰戎狄豺狼不可厭也諸夏親䁥不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書公救邢公與蔡姬乘舟於囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之三十年僖四年公以諸侯之師侵蔡蔡潰遂伐楚楚問師故夷吾對曰昔召康公命我先君太公曰五侯九伯汝實征之以夾輔周室賜我先君履東至於海西至於河南至於穆陵北至於無棣爾貢苞茅不入王祭不共無以縮酒寡人是徴昭王南征而不復寡人是問管子桓公與宋夫人飲船中夫人蕩船而懼公公怒出之宋受而嫁之蔡侯公欲伐宋管仲曰不可臣聞內政不修外舉事不濟不聽伐宋諸侯救宋大敗齊師桓公將伐魯曰魯與寡人近其救宋也疾寡人且誅焉管仲曰不可臣聞有土之君不勤于兵不忌于辱不輔其過則社稷安否則危不聽戰於長勺魯大敗之按春秋莊十年經曰公敗齊師于長勺夏六月齊師宋師次于郎公敗宋師于乘邱無齊伐宋之文又蕩船者蔡女非宋女齊伐蔡非伐宋也且長勺之戰在伐蔡前二十八年又不因蔡女而伐魯也韓非子蔡女為桓公妻公與之乘舟夫人蕩舟公懼禁之不止怒而出之且復召之因更嫁之公怒將伐蔡仲父諫曰寢息之戲不足以伐人國功業不可冀也公不聽仲父曰必不得已楚之菁茅不貢于天子三年矣君不如為天子伐楚楚服因襲蔡曰余為天子伐楚而蔡不以兵聽從此義于名而利于實也三十三年僖七年鄭未服故公㑹諸侯盟于寧母以謀鄭夷吾言于公曰臣聞之招㩦以禮懷逺以德德禮不易無人不懷於是修禮于諸侯諸侯官受方物諸侯官司各于齊受其方所當貢天子之物鄭伯使大子華聽命于㑹言于公曰泄氏孔氏子人氏三族鄭大夫三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉公將許之夷吾曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也㑹而列姦何以示後嗣夫諸侯之㑹其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為大子而求介于大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也公辭焉冬鄭伯請盟左傳三十五年僖九年㑹諸侯于葵邱王使宰孔賜文武胙且曰無下拜公欲許之夷吾曰不可乃下拜受賜史記管子葵邱之㑹天子使宰孔致胙且有後命曰毋下拜公召管仲而謀對曰為君不君為臣不臣亂之本也王子帶召揚拒泉臯伊雒之戎同伐京師三十八年僖十二年公使夷吾平戎于王王以上卿之禮饗之夷吾辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命夷吾卒受下卿之禮而還左傳桓公既霸諸侯于是公曰余乘車之㑹三兵車之㑹六九合諸侯一匡天下北至於孤竹山戎濊貊秦夏西至流沙西虞南至吳越巴牂牱􅀈不庾雕題黑齒荆夷之國莫違寡人而中國卑我昔三代之受命者其異于此乎夷吾對曰夫鳯凰鸞鳥不降而鷹隼鴟梟豐庶神不格守龜不兆握粟而筮者屢中時雨甘露不降飄風暴雨數臻五榖不蕃六蓄不育而蓬蒿藜蘿並興昔人之受命者龍龜假河出圖洛出書地出乘黃今三祥未有見者雖曰受命無乃失諸侯乎公懼管子史記桓公㑹諸侯於葵邱而欲封禪管仲曰古封泰山禪梁父者七十二家而夷吾所記者十有二焉皆受命然後得封禪公曰寡人兵車之㑹三乘車之㑹六九合諸侯一匡天下諸侯莫違三代受命何以異乎管仲睹桓公不可窮以辭因說之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯凰麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止四十三年僖十七年夷吾卒左傳諡曰敬夷吾病桓公問曰羣臣誰可相者夷吾曰知臣莫若君公曰易牙如何對曰殺子以適君非人情不可公曰開方如何對曰倍親以適君非人情難近公曰豎刁如何對曰自宫以適君非人情難親夷吾死而桓公不用夷吾言卒近用三子三子専權管子公問曰二三大夫其猶能以國寧乎對曰鮑叔好直而不能以國詘賔胥無好善而不能以國詘寧戚能事而不能以足息孫在善言而不能以信默臣聞之消息盈虛與百姓詘信然後能以國寧勿已者隰朋其可乎夷吾之相齊乎以區區之齊在海濵通貨積財富國强兵與俗同好惡其為政也善因禍而為福轉敗而為功連五家之兵設輕重九府魚鹽之利以贍貧窮祿賢能齊人皆說桓公以霸而夷吾亦富擬公室有三歸反坫齊人不以為侈也史記說苑桓公之時霖雨十旬桓公欲伐漅陵其城之值雨也未合管仲隰朋以卒徒造于門桓公曰徒衆何以為管仲對曰臣聞之雨則有事夫漅陵不能雨臣請攻之公曰善遂興師伐之既至天卒間外士在內矣桓公曰其有聖人乎乃還旗而去之說苑桓公之平陵見有年老而自養者問其故對曰有子九人家貧無以妻之使傭而未返也公取外御者五人妻之管仲入見曰公之施惠不亦小矣待所見而施惠焉齊之有妻者少矣公曰若何曰令國丈夫三十而室女子十五而嫁韓非子略同說苑孟簡子相梁并衛有罪而走齊管仲迎而問之曰吾子相梁并衛之時門下使者幾何人矣曰三千餘人管仲曰今與幾何人來曰與三人俱仲曰是何也曰其一人父死無以葬我為葬之一人母死無以葬我亦葬之一人兄有獄我為出之是以得三人來管仲上車曰嗟兹乎我窮必矣吾不能以春風風人不能以夏雨雨人吾窮必矣說苑桓公謂管仲曰吾國羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之君食桂之漿衣練紫之衣狐白之裘此羣臣之所奢大也詩曰不躬不親庶民不信君欲禁之胡不是親乎公曰善于是更置練帛之衣大白之冠朝一年而齊國儉韓非子略同吕氏春秋管仲觴桓公日暮矣公樂之而徴燭管仲曰臣卜其晝未卜其夜公不說曰寡人與仲父為樂將幾之請夜之管仲曰夫厚於味者薄於德沉於樂者反於憂壯而怠則失時老而懈則無名臣將為君勉之何沉於酒也韓詩外傳桓公置酒令諸大夫曰後者飲一經程管仲後當飲一經程飲半而棄半公曰何也管仲曰臣聞之酒入口者舌出舌出者棄身與其棄身不寧棄酒乎外傳桓公問于管仲曰王者何貴曰貴天公仰而視天管仲曰非莽蒼之天也王者以百姓為天百姓與之即安輔之即彊非之即危倍之即亡韓非子桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也胡不雪之以政公曰善發倉囷賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎韓非子人有設桓公隱者曰一難二難三難何也公不能對以告管仲管仲對曰一難也近優而逺士二難也去其國而數之海三難也君老而晚置太子桓公曰善論衡桓公負婦人而朝諸侯管仲告諸侯曰吾君背有疽不得婦人瘡不衰愈諸侯信管仲故無畔者貫之盟在僖十二年夷吾曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟夷吾死楚伐江滅黃桓公不能救榖梁夷吾嘗遇盜取二人焉上以為公臣曰其所與遊辟也可人也夷吾死桓公使為之服宦於大夫者之為之服也自夷吾始也禮記所著有管子其後有管修者仕楚為賢大夫白公作亂殺之左傳世本莊仲山産敬仲夷吾夷吾産武子鳴鳴産桓子啓方啓方産成子孺孺産莊子盧盧産悼子其夷其夷産襄子武武産景子耐步耐步産闕凡十代世譜同論曰嗟乎召忽之死召忽正也方仲之束縛就囚時期必得桓而成伯不集不且為召忽之羞乎委身事讎二者且將以仲為口實也隰朋隰鉏附隰朋者齊大夫事桓公聰明捷給公令為東國管子韓非子桓公問置吏于管仲管仲曰登降肅讓以明禮待賓臣不如隰朋請立以為大行吕氏春秋同桓公三十五年僖九年朋帥師㑹秦師納晉惠公明年朋㑹周公忌父王子黨周大夫立之王子帶召戎伐京師秦晉伐戎以救周三十八年僖十二年公使管夷吾平戎於周使朋平戎于晉左傳管夷吾寢疾公往問之曰仲父若不諱政將安移之夷吾未對公曰鮑叔何如對曰鮑叔君子也千乘之國不以其道豫之不受也雖然不可以為政其人好善而惡惡已甚見一惡終身不忘公曰然則孰可對曰隰朋可朋之為人好上識而下問居其家不忘公門居公門不忘其家事君不二其心亦不忘其身勿己者朋其可乎朋之為人動必量力舉必量技言終喟然歎曰天之生朋以為夷吾舌也身死舌焉得生哉夷吾卒後十月朋亦卒管子吕氏春秋管仲曰隰朋之為人也上志而下求醜不若黃帝而哀不已若者其於國也有不聞也其于物也有不知也其於人也有不見也勿已則隰朋可也夫相大官也不欲小察不欲小智故曰大匠不斫大庖不豆大勇不鬭大兵不冦韓非子公之伐孤竹也管仲隰朋從春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仭有水乃掘地遂得水管子桓公春月觀於野曰何物可比于君子之德乎朋對曰夫粟內甲以處中有卷城外有兵刃未敢自恃自命曰粟此其可比於君子之德乎管仲對曰苗始其少也眴眴乎何其孺子也至其壯也莊莊乎何其士也至其成也由由乎兹免何其君子也天下得之則安不得則危故命之曰禾此其可比于君子之德矣朋曾孫鉏莊公六年襄二十五年晉伐我崔杼弒公使鉏請成晉許之左傳尚史卷三十五
