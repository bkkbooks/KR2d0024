body:
  text: 尚史卷十八世家十一鑲白旗漢軍李鍇撰陳世家始武王十三年終敬王四十一年凡六百四十四年傳十三世胡公申公相公孝公慎公幽公僖公武公夷公平公胡公滿者虞帝舜之後也昔舜為庶人時堯妻之二女居于潙汭其後因為氏姓姓媯氏舜已崩傳禹天下而舜子商均為封國即虞國夏后之時或失或續夏代封虞思虞遂至于周武王克殷紂乃復求舜後得媯滿封之于陳以奉帝舜祀是為胡公詩注武王時帝舜之胄有虞閼父為周陶正武王頼其利器用與其神明之後以元女大姬妻其子滿而封之于陳都于宛邱之側與黄帝帝堯之後共為三恪胡公薨子申公犀即位申公薨弟相公臯羊即位相公薨立申公子突是為孝公孝公薨子慎公圉戎即位慎公當周厲王時慎公薨子幽公寜即位幽公元年周厲王二十六年也世家幽公十二年厲王奔彘溯而推之元年當在二十六年十一年厲王奔于彘二十三年幽公薨子僖公孝即位僖公四年周宣王立三十五年僖公薨按丗家幽公十二年厲王奔彘二十三年幽公卒又云僖公六年宣王即位三十六年僖公卒竊以奔彘之年考之幽公二十三年當共和十一年下距宣王即位裁四年所云僖公六年誤當在四年又按僖公卒于宣王三十二年實在位三十五年而云三十六年亦誤子武公靈即位武公十五年薨子夷公説即位是嵗周幽王立夷公三年薨弟平公燮即位平公七年幽王為犬戎所殺周東徙二十三年平公薨史記丗家文公桓公二十三年入春秋大子免附文公名圉平公之子也文公元年周平公十七年也文公十年薨長子桓公鮑即位桓公二十三年魯隠公初即位二十六年隠四年衛州吁弑其君請伐鄭以除公子馮夏公及宋公蔡人衛人伐鄭秋諸侯復伐鄭衛州吁來九月執而殺之鄭請成于我公不許公子佗諫不許二十八年隠六年鄭侵我大獲二十九年隠七年我及鄭平佗如鄭涖盟鄭良佐來涖盟妻鄭公子忽三十年隠八年鄭公子忽來逆女三十八年桓五年春正月甲戌己丑公薨傳公疾病公子佗殺大子免國人分散故再赴杜預注甲戌前年十二月二十一日己丑此年正月六日陳亂故再赴赴雖日異而皆以正月起文故但書正月慎疑審事故從赴兩書按甲戌當書公子佗作亂事己丑公薨闕文耳非再赴也公疾病公子佗殺大子免而代之夏葬公左傳諡曰桓在位三十八年厲公厲公名躍桓公之子蔡女之所生也史世家以公子佗為厲公以躍為桓公長子利公誤桓公三十八年桓五年薨公子佗殺大子免而自立是年秋我及蔡衛從王伐鄭厲公元年桓六年秋蔡人殺公子佗立躍是為厲公公羊陳佗淫乎蔡蔡人殺之榖梁陳侯憙獵淫于蔡與蔡人爭禽蔡人不知其是陳君而殺之六年桓十一年公及宋公魯柔蔡叔盟于折七年桓十二年秋八月公薨左傳諡曰厲在位七年莊公莊公名林桓公之子也史世家桓公中子厲公薨公即位公二年桓十四年宋人以我及諸侯齊蔡衛伐鄭三年桓十五年桓王崩莊王立冬公㑹諸侯宋魯衛于袲宋地伐鄭鄭祭仲逐厲公將納之弗克而還四年桓十六年公㑹諸侯宋魯衛蔡伐鄭七年莊元年冬十月公薨明年春二月葬公左傳諡曰莊在位七年宣公宣公名杵白莊公之子也莊公薨公即位公三年莊四年夏公及齊侯鄭伯遇于垂四年莊五年我會諸侯魯齊宋蔡伐衛納惠公十一年莊十二年莊王崩僖王立十二年莊十三年齊侯㑹我及宋人蔡人邾人于北杏宋弑閔公㑹以平宋亂十三年莊十四年我及齊人曹人伐宋宋背北杏㑹故十四年莊十五年齊侯㑹公及諸侯宋衛鄭于鄄齊始霸十五年莊十六年齊侯㑹公及諸侯宋衛鄭許滑滕魯同盟于幽十六年莊十七年僖王崩惠王立十八年莊十九年我及齊人宋人伐魯西鄙二十一年莊二十二年殺大子御冦公子完與顓孫奔齊二十四年莊二十五年公使女叔如魯聘二十六年莊二十七年齊侯㑹公及諸侯魯宋鄭同盟于幽三十六年僖三年齊侯㑹公及諸侯魯宋衛鄭許曹侵蔡蔡潰遂伐楚次于陘楚屈完及諸侯盟于召陵轅濤塗誤軍道齊執轅濤塗秋及江人黄人伐我冬諸侯之師齊魯宋衛鄭許曹侵我我成歸轅濤塗三十八年僖五年夏公及諸侯齊魯宋衛鄭許曹㑹王世子于首止秋八月盟于首止鄭伯逃歸不盟三十九年僖六年公㑹諸侯齊魯宋衛曹伐鄭圍新城楚圍許以救鄭諸侯救許乃還四十年僖七年世子欵㑹齊侯魯公鄭世子華于寗母謀鄭故四十年僖七年閏月惠王崩襄王立四十一年僖八年世子欵㑹王人諸侯齊魯宋衛許曹盟于洮謀王室大叔帶之難四十五年僖十二年冬十二月公薨明年夏四月葬公左傳諡曰宣在位四十五年穆公穆公名欵宣公之子也宣公薨公即位公元年僖十三年公㑹諸侯齊魯宋衛鄭許曹于鹹淮夷病杞且謀王室也三年僖十五年公㑹諸侯前諸侯盟于牡邱遂次于匡及諸侯之大夫救徐四年僖十六年公㑹諸侯齊魯宋衛鄭許邢曹于淮淮夷病鄫故七年僖十九年公請修好于諸侯以無忘齊桓之徳冬盟于齊九年僖二十一年公及諸侯宋楚蔡鄭許曹㑹于盂楚執宋公以伐宋冬㑹于薄以釋之十一年僖二十三年楚伐我以我貳于宋故取焦夷城頓而還十三年僖二十五年楚圍我納頓子于頓十五年僖二十七年公及楚子諸侯蔡鄭許圍宋冬十二月盟于宋十六年僖二十八年晉救楚及楚師戰于城濮先犯陳蔡陳蔡奔楚師敗績晉㑹諸侯齊魯宋蔡鄭衛莒盟于踐土公如㑹夏六月公薨左傳諡曰穆在位十六年共公共公名朔穆公之子也穆公十六年僖二十八年薨公即位冬公㑹諸侯晉魯齊宋蔡鄭莒邾秦于温天王狩于河陽諸侯遂圍許公元年僖二十九年轅濤塗㑹周王子虎魯侯及諸侯之大夫晉宋齊秦盟于翟泉謀伐鄭五年僖三十三年我及晉人鄭人伐許楚侵我及蔡我及蔡成遂伐鄭六年文元年晉伐衛取戚衛使告于我公曰更伐之我辭之衛伐晉七年文二年公㑹諸侯宋鄭及晉士穀盟于垂隴公為衛請成于晉冬轅選及諸侯之大夫晉宋鄭伐秦八年文三年我㑹諸侯之師晉魯宋衛鄭伐沈沈潰沈服楚故衛侯來拜晉成十一年文六年魯季孫行父來聘十二年文七年公㑹諸侯魯齊宋衛鄭許曹晉趙盾盟于扈十三年文八年秋八月襄王崩頃王立十四年文九年楚侵我克壺邱服晉故秋楚公子朱自東夷伐我我敗之獲公子茷我懼及楚平十五年文十年公及鄭伯㑹楚子于息遂及蔡侯次于厥貉十八年文十三年夏五月公薨左傳諡曰共在位十八年靈公靈公名平國共公之子也共公薨公即位公元年文十四年春頃王崩匡王立夏六月公㑹諸侯宋魯衛鄭許曹晉趙盾同盟于新城二年文十五年公㑹諸侯晉宋衛蔡鄭許曹盟于扈謀伐齊齊賂晉侯故不克而還四年文十七年宋弑昭公公孫寜及諸侯之大夫晉衛鄭伐宋立文公而還初共公之薨也楚人不禮焉公遂盟于晉六年宣元年楚子侵我遂侵宋晉救陳宋公及諸侯宋衛曹㑹晉師于棐林以伐鄭七年宣二年我及諸侯之師晉宋衛侵鄭冬十月匡王崩定王立十年宣五年楚伐鄭我及楚平晉救鄭伐我十一年宣六年晉衛侵我十三年宣八年我及晉平楚師伐我取成而還十四年宣九年諸侯㑹于扈公不㑹晉以諸侯之師伐我晉侯卒乃還公與孔寜儀行父通于夏姬洩冶諫冬孔寜儀行父殺洩冶十五年宣十年夏五月公飲酒于夏氏徵舒弑之史記徵舒自立為陳侯誤成公二年宣十二年葬公左傳謚曰靈在位十五年成公成公名午靈公之子也靈公遇弑公即位公元年宣十一年公及楚子鄭伯盟于辰陵冬楚伐我入之殺夏徵舒公奔晉楚因縣陳既而復封陳二年宣十二年宋伐我衛人救之十年成二年公孫寜及楚公子嬰齊及諸侯魯蔡許諸侯之大夫秦宋衛鄭曹邾薛鄫齊盟于蜀十三年成五年冬十一月定王崩簡王立十七年成九年晉討鄭伯貳于楚執諸銅鞮楚侵我以救鄭二十四年成十六年晉侯㑹周尹武公及諸侯伐鄭知罃以諸侯之師侵我至于鳴鹿陳邑遂侵蔡二十七年襄元年晉㑹東諸侯魯齊曹邾杞之師侵楚及我秋九月簡王崩靈王立二十九年襄三年晉㑹單頃公及諸侯魯宋衛鄭莒邾齊同盟于雞澤公使袁僑如㑹求成秋袁僑及諸侯之大夫盟楚侵我三十年襄四年春三月公薨秋七月葬公左傳謚曰成在位三十年哀公哀公名溺成公之子也成公三十年襄四年薨公即位是年楚師在繁陽將伐我聞喪乃止我猶不聽命夏楚侵我又使頓間我而侵伐之冬我圍頓公元年襄五年公㑹諸侯晉魯宋衛鄭曹莒楚滕薛齊吳鄫于戚冬諸侯戍我楚伐我十一月諸侯㑹于城棣以救之三年襄七年楚圍我公㑹諸侯晉魯宋衛曹莒邾于鄬以救我楚執我公子黄哀公弟公逃歸十三年襄十七年宋伐我十六年襄二十年蔡公子燮欲以蔡之晉蔡人殺之大夫慶虎慶寅愬公子黄于楚曰與蔡燮同謀楚人以為討黄出奔楚十九年襄二十三年公如楚公子黄愬二慶于楚楚圍我我殺慶虎慶寅楚人納公子黄二十年襄二十四年諸侯將伐齊公及楚子蔡侯許男伐鄭以救齊我復討慶氏之黨鍼宜咎鍼子八世孫出奔楚初陳㑹楚伐鄭也當陳隧者井堙木刋鄭人怨之二十一年襄二十五年鄭伐我入之公奔墓使司馬桓子賂以宗器公免免音問喪服擁社抱社主示服使其衆男女别而纍以待于朝鄭袚社致地而還冬鄭復伐我我及鄭㔻二十二年哀二十六年公及楚子蔡侯伐鄭二十三年襄二十七年宋合晉楚以弭諸侯之兵春孔奐㑹諸侯之大夫晉楚蔡衛鄭許曹于宋秋孔奐及諸侯之大夫盟于宋二十四年襄二十八年公朝于晉宋之盟故冬十二月公如楚楚子卒十二月靈王崩景王立二十五年襄二十九年夏四月葬楚康王公送葬至于西門之外二十八年昭元年公子招公母弟㑹諸侯之大夫晉楚魯齊宋衛蔡鄭許曹于虢三十一年昭四年公㑹諸侯楚蔡鄭許徐滕頓胡沈小邾宋淮夷于申秋楚子以諸侯伐吳圍朱方克之執齊慶封殺之遂滅頼三十二年昭五年公㑹諸侯楚蔡許頓沈徐越伐吳三十五年昭八年公有廢疾公子招公子過過亦公弟殺世子偃師而立公子留夏四月公縊大夫千徵師赴于楚楚人執而殺之公子留奔鄭秋七月公子招殺公子過九月楚圍我冬十月滅我殺孔奐葬公左傳諡曰哀在位三十五年惠公惠公名吳悼大子偃師之子也楚靈王滅陳蔡不羮陳蔡不羮因楚公子棄疾入楚靈王自縊及平王即位封陳蔡吳復歸于陳是為惠公陳以魯昭公八年滅十三年復封凡五年而國復公六年昭十八年夏五月災陳滅之後一年災至是又災不救火十年昭二十二年夏四月景王崩悼王立王子朝作亂冬十月悼王崩敬王立十一年昭二十三年吳伐州來楚以我師及諸侯之師救州來吳敗諸侯之師于雞父獲大夫夏齧十四年昭二十六年冬十月敬王入于成周王子朝奔楚二十四年定四年春二月公薨夏六月葬公左傳謚曰惠在位二十四年懐公懐公名柳惠公之子也惠公二十四年定四年薨公即位春三月公㑹周文公諸侯晋魯宋蔡衛鄭許曹莒邾頓胡滕薛杞小邾齊于召陵侵楚冬吳入楚召公公不聽四年定八年秋七月公薨九月葬公左傳諡曰懐在位四年閔公閔公名越懐公之子也懐公薨公即位公六年定十四年頓子欲事晉而絶我好公孫佗人及楚師滅頓八年哀公元年公㑹楚子隨侯許男圍蔡秋八月吳侵我吳召懐公不至故修舊怨也十三年哀六年吳伐我楚救我師于城父十六年哀九年楚人伐我我即吳故十七年哀十年楚伐我吳救我十八年哀十一年司徒袁頗出奔鄭二十年哀十三年楚伐我冬盗殺夏區夫二十一年哀十四年宗豎出奔楚冬宗豎自楚復入國人殺之袁買出奔楚二十三年哀十六年孔子卒二十四年哀十七年秋七月楚滅我左傳吕氏春秋陳有惡人焉曰敦洽讐糜雄顙廣顔色如浹頳垂眼臨鼻長肘而盭陳侯見而説之外使治其國内使制其身楚合諸侯陳侯病使敦洽讐糜往謝焉楚王怪其名而見之客有進狀有惡其名言有惡其狀楚王怒合大夫而告之曰陳不知其不可使是不知也知而使之是侮也侮且不知不可不攻也興師伐陳三月然後喪諡曰閔在位二十四年陳絶不祀贊曰齊桓之世陳方内𨽻穆共以還楚難興焉然卒不自振及靈而顛微楚亂胡公之系不其斬而雖然綴疣仰息延喘數世卒之䕃楚而斃于楚善泅者多水死信夫至陳祀滅而田齊興為大國者且累世是又聖后之餘烈也夫蔡世家始武王十三年終定王二十二年凡六百七十六年傳二十五世蔡叔度蔡叔度者周文王子而武王母弟也武王已克殷紂平天下封功臣昆弟于是封管叔鮮于管封叔度于蔡二人相紂子武庚禄父治殷遺民武王崩成王少周公旦専王室管叔鮮蔡叔度疑周公為不利于成王乃挾武庚以作亂周公旦承成王命伐誅武庚殺叔鮮而放叔度遷之與車十乘徒七十人叔度卒復封其子胡是為蔡仲史記世家蔡仲蔡伯荒宫侯厲侯武侯夷侯釐侯共侯戴侯蔡仲名胡蔡叔之子也蔡仲克庸祇徳周公以為卿士叔卒乃命諸王邦之蔡王若曰小子胡惟爾率徳改行克慎厥猷肆子命爾侯于東土往即乃封敬哉爾尚葢前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命皇天無親惟徳是輔民心無常惟惠之懐為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則予一人汝嘉王曰嗚呼小子胡汝往哉無荒棄朕命尚書蔡仲薨蔡伯荒即位蔡伯荒薨子宫侯即位宫侯薨子厲侯即位厲侯薨子武侯即位武侯之時周厲王失國奔彘共和行政諸侯多叛周按周武王至共和凡二百八十一年而蔡仲至武侯裁五世恐有脱漏武侯薨子夷侯即位夷侯十一年周宣王立二十八年夷侯薨子釐侯所事即位釐侯三十九年周幽王為犬戎所殺周室卑而東徙四十八年釐侯薨子共侯興即位共侯二年薨子戴侯即位戴侯十年薨子宣侯即位史記世家宣侯二十八年入春秋宣侯名考父史記世家作措父戴侯之子也侯二十八年魯隠公即位三十年隠三年平王崩桓王立三十一年隠四年我㑹諸侯伐鄭衛州吁請于宋將除宋公子馮故秋復伐鄭三十五年隠八年夏六月侯薨八月葬公經于宣侯葬書公左傳諡曰宣在位三十五年桓侯桓侯名封人宣侯之子也宣侯薨侯即位二年隠十年鄭以王命伐宋我及衛郕不㑹王命秋宋衛入鄭而以伐戴召我我怒從伐戴八月鄭圍戴克之取我及宋衛三師五年桓二年侯及鄭伯㑹于鄧始懼楚也八年桓五年我及衛人陳人從王伐鄭鄭敗王師陳佗殺陳桓公大子而自立九年桓六年我殺陳佗立厲公躍躍我出也十七年桓十四年宋以我師及諸侯伐鄭十八年桓十五年桓王崩莊王立十九年桓十六年侯㑹魯侯宋公衛侯于曹謀伐鄭夏及諸侯伐鄭二十年桓十七年夏六月侯薨秋八月葬侯蔡本侯爵經于宣公卒書侯于葬書公葢僣稱公也桓侯之葬經仍書侯杜預注曰稱侯葢謬誤今遵經書左傳諡曰桓在位二十年哀侯哀侯字季名獻舞桓侯之弟也桓侯無子桓侯薨蔡人召獻舞于陳而立之是為哀侯侯六年莊五年我㑹諸侯伐衛納衛侯朔侯娶于陳息侯亦娶焉十一年莊十年息媯將歸過我侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之楚從之秋敗我師于莘以哀侯歸十三年莊十二年莊王崩僖王立十四年莊十三年我及齊侯㑹于北杏宋萬弑君㑹以平之侯為莘故繩息媯以語楚子楚子滅息以息媯歸生堵敖及成王焉迄于是未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言秋楚子伐我入之十八年莊十七年僖王崩惠王立二十年莊十九年周王子頽作亂惠王奔鄭左傳是年侯死于楚留九嵗凡立二十年薨史記世家諡曰哀經傳不載哀侯卒年穆侯穆侯名肹哀侯之子也哀侯留楚死國人立子肹是為穆侯侯十九年僖四年齊侯以諸侯之師侵我我潰遂伐楚二十一年僖六年楚圍許穆侯將許男以見楚子于武城二十二年僖七年惠王崩襄王立二十九年僖十四年冬侯薨左傳諡曰穆在位二十九年莊侯莊侯名甲午穆侯之子也穆侯薨侯即位侯五年僖十九年陳侯請修好于諸侯以無忘齊桓之徳冬及諸侯陳楚鄭齊盟于齊七年僖二十一年侯及諸侯宋楚陳鄭許曹㑹于盂楚執宋公以伐宋冬㑹于薄釋宋公十年僖二十四年周王子帶作亂襄王出居于鄭明年晉納王殺子帶十三年僖二十七年侯及楚陳鄭許圍宋十四年僖二十八年晉救宋先犯陳蔡陳蔡奔遂敗楚師于城濮夏五月侯㑹周王子虎及諸侯晉魯齊宋鄭衛莒盟于踐土冬侯㑹諸侯晉魯齊宋鄭陳莒邾秦于温天王狩于河陽遂㑹諸侯圍許十五年僖二十九年我㑹周王子虎及魯侯諸侯之大夫晋宋齊陳秦盟于翟泉十九年僖三十三年楚侵我我成晉侵我楚救之晉師歸二十七年文八年襄王崩頃王立二十九年文十年侯及楚子次于厥貉三十三年文十四年頃王崩匡王立夏晉及諸侯盟于新城我不與三十四年文十五年晉伐我入之以城下之盟而還冬侯及諸侯晋宋衛陳鄭許曹盟于扈侯薨經傳不載左傳諡曰莊在位三十四年文侯文侯名申莊侯之子也莊侯薨侯即位侯五年宣二年匡王崩定王立侯欲事晉曰先君與于踐土之盟晉不可棄且兄弟也畏楚不能行二十年宣十七年春二月侯薨夏葬公經書公左傳諡曰文在位二十年景侯景侯名固文侯之子也文侯薨侯即位侯三年成二年晉伐齊楚侵魯衛以救齊侯為左許靈公為右二君弱皆強冠之侵衛遂侵魯魯及諸侯之大夫盟于蜀經不書蔡許乘楚車也謂之失位六年成五年定王崩簡王立七年成六年楚伐鄭晉救之楚師還晉師遂侵我楚以申息之師救我晉師還九年成八年晉欒書侵我遂侵楚二十年襄元年簡王崩靈王立二十七年襄八年鄭侵我獲我公子燮楚伐鄭鄭及楚平晉于是三伐鄭鄭及晉平三十九年襄二十年公子燮欲以蔡之晉國人殺之四十三年襄二十四年諸侯將伐齊楚㑹侯及陳許伐鄭以救齊四十五年襄二十六年楚㑹侯及陳伐鄭涉于汎而歸四十六年襄二十七年宋弭諸侯之兵公孫歸生㑹于宋秋及諸侯之大夫晉楚魯衛陳鄭許曹盟于宋四十七年襄二十八年侯朝于晉宋之盟故侯歸自晉入于鄭鄭享之不敬鄭公孫僑曰蔡侯其不免乎冬十二月靈王崩景王立侯為大子般娶于楚通焉四十九年襄三十年夏四月大子般弑侯冬十月葬公左傳諡曰景在位四十九年靈侯靈侯名般景侯大子也般弑景侯自立是為靈侯侯二年昭元年公孫歸生㑹諸侯之大夫晉楚魯齊宋衛陳鄭許曹于虢尋宋盟五年昭四年侯如楚㑹諸侯楚陳鄭許徐滕頓胡沈小邾宋淮夷于申楚以諸侯伐吳圍朱方克之遂以諸侯滅頼六年昭五年侯㑹諸侯楚陳許頓沈徐越伐吳十二年昭十一年楚子在申召侯侯將往大夫曰王貪而無信唯蔡于感感同憾今幣重而言甘誘我也不如無往侯不可三月楚子伏甲而饗侯于申醉而執之夏四月殺之刑其士七十人公子棄疾帥師圍我晉為我請于楚弗許冬十一月遂滅我用隠大子于岡山使棄疾為蔡公蔡申絶楚平公元年昭十三年復蔡冬十月乃葬公左傳諡曰靈在位十二年平侯平侯名廬隠大子之子靈侯之孫也史記世家作景侯少子靈侯之弟楚平王即位復封蔡廬歸于蔡是為平侯侯元年魯昭公十三年也三年昭十五年我逐大夫朝吳八年昭十十年冬十一月侯薨明年三月葬公左傳諡曰平在位八年悼侯大子朱附悼侯名東國隠大子之子也平侯大子曰朱朱為大子也失位位在卑不以適子位而以長幼齒及平侯薨朱即位楚大夫費無極取貨于東國而謂國人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡國人懼出朱立東國是為悼侯榖梁蔡侯東出奔楚東者東國也何為謂之東也王父誘而殺焉父執而用焉奔而又奔之謂東史記世家平侯立而殺隠大子故平侯卒而隠大子之子東國攻平侯子而代立按朱出奔而後東國立非東國出奔榖梁誤隠大子楚用之于岡山非平侯殺之史記亦誤侯二年昭二十二年夏四月景王崩王子朝作亂悼王居于皇秋王入于王城冬十月悼王崩敬王立居于狄泉周立王子朝是年六月侯薨于楚左傳諡曰悼在位三年昭侯昭侯名申文侯名申昭侯之高祖不容同名或誤悼侯之弟也悼侯薨侯即位侯元年昭二十三年吳伐州來我及諸侯之師楚頓胡沈陳許奔命救州來吳敗諸侯之師于雞父三年昭二十六年冬十月敬王入于成周王子朝奔楚十二年定三年侯為兩佩與兩裘以如楚獻一佩一裘于楚子楚子佩之以享侯侯亦服其一囊瓦欲之弗與三年止之唐侯如楚有兩肅爽馬囊瓦欲之弗與亦三年止之既而唐獻馬囊瓦歸唐侯蔡人聞之固請而獻佩于瓦瓦朝見侯之徒命有司曰蔡君之乆也官不共也明日禮不畢將死侯歸及漢執玉而沈曰余所有濟漢而南者有若大川侯歸如晉以子元與大夫之子為質焉而請伐楚十三年定四年侯㑹周劉子諸侯晉宋衛陳鄭許曹莒邾頓胡滕薛杞小邾齊于召陵謀伐楚晉荀寅求貨于我弗得乃辭侯不伐楚夏五月侯及諸侯盟于臯鼬將盟將長我于衛衛有辭乃長衛侯沈不㑹于召陵公孫姓帥師滅沈以沈子嘉歸殺之秋楚圍我吳伯嚭為大宰以謀楚侯因之以其子乾與其大夫之子為質子吳冬及吳子唐侯伐楚敗之于柏舉五戰入郢十四年定五年魯歸粟于我十五年定六年周儋翩亂王處于姑蕕明年王入于王城二十五年哀元年楚子圍我報栢舉也我降國人男女以辨楚使我疆于江汝之間我于是乎請遷于吳二十六年哀二年吳洩庸來納聘而稍納師師畢入衆知之侯告大夫殺公子駟以説哭而遷墓冬遷于州來二十七年哀三年放大夫公孫獵于吳公子駟之黨也二十八年哀四年春二月侯將如吳諸大夫恐其又遷也承音懲楚言也公孫翩逐而射之入于家人而薨大夫文之鍇殺翩史記世家作賊利公孫辰出奔吳夏殺公孫姓公孫霍冬十二月葬公左傳諡曰昭在位二十八年成侯成侯名朔昭侯之子也昭侯遇弑侯即位侯十二年哀十六年孔子卒十四年哀十八年敬王崩元王立十九年哀二十三年侯薨左傳諡曰成在位十九年聲侯元侯侯齊聲侯名産成侯之子也成侯薨侯即位侯三年元王崩定王立十五年侯薨子元侯即位元侯六年薨子侯齊即位侯齊四年楚惠王滅我侯齊亡蔡遂絶祀史記世家贊曰蔡仲率徳改行幹蠱用譽卒享蔡國傳世二十餘雖不克嫓美晉衛亦云徳之次也顧其竟邊楚舍兄弟而即蠻夷形格勢禁有不得不然者雖然桓侯㑹鄧懼楚之始及哀侯猶與北杏之㑹乃緣息啟釁遂寄命于楚屬國焉者累其世不復與盟中國傳曰惡之易也如火之燎于原不可鄉邇其猶可撲滅者其蔡哀侯乎君子固憾之矣逮至昭侯奮迅速飛東即晉而南即吳臯鼬之㑹栢舉之捷屈蠖求信然而一絶于楚一遷于吳虎噬于前狼顧在後蔡之立國難矣哉尚史卷十八
