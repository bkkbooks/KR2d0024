body:
  text: 尚史卷六十二列傳四十鑲白旗漢軍李鍇撰陳諸臣傳轅濤塗轅選轅僑轅頗轅買轅咺附宗豎轅濤塗字宣仲為大夫事宣公宣公三十七年僖四年齊侯以諸侯之師侵蔡蔡潰遂伐楚及楚盟于召陵師退濤塗謂鄭申侯曰師出于陳鄭之間國必甚病若出于東方觀兵于東夷郯莒徐夷也循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出于東方而遇敵懼不可用也若出于陳鄭之間共其資糧扉屨其可也齊說與之虎牢執濤塗而伐陳冬復㑹諸侯之師侵陳陳成歸濤塗濤塗怨鄭申侯之反已于召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請于諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪宣公薨事穆公穆公薨事共公共公元年僖二十九年濤塗㑹周王子虎諸侯之大夫盟于翟泉尋踐土之盟且謀伐鄭濤塗之後轅選亦事共公共公七年文二年選㑹晉宋鄭伐秦取汪及彭衙而還濤塗四世孫曰轅僑僑事成公成公二十九年襄三年晉㑹諸侯同盟于雞澤公患楚侵欲于我使僑如㑹求成秋僑及諸侯之大夫盟閔公時有轅頗轅買頗為司徒頗賦封田以嫁公女有餘以為已大器國人逐之頗出奔鄭道渴其族轅咺進稻醴粱糗腵脯焉頗喜曰何給也對曰器成而具曰何不吾諫對曰懼先行閔公二十一年哀十四年轅買出奔楚有宗豎者亦陳人也出奔楚自楚復入于陳陳人殺之故買出奔楚左傳論曰濤塗徇小利說諸侯致令身執國討罪也乃申侯賣友旋復及之悖入悖出天之道乎陳針子針宜咎陳針子者陳大夫也事桓公桓公三十年隱八年鄭公子忽來逆婦媯夏四月以媯氏歸針子送女先配而後祖禮逆婦必先告祖廟而後行鄭忽先逆婦而後告廟故云針子曰是不為夫婦誣其祖矣非禮也何以能育針子八世孫曰針宜咎黨慶虎慶寅哀公二十年襄二十四年國人討慶氏之黨宜咎出奔楚為楚針尹左傳賈獲袁克賈獲者為大夫事哀公哀公二十一年襄二十五年鄭伐我入之公扶其大子偃師奔墓遇司馬桓子名不載曰載余司馬桓子曰將巡城遇獲獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免公使司馬桓子賂以宗器公免免音問喪服擁社抱社主示服使其男女别其纍以待于朝鄭師乃還袁克者嬖人之貴者也亦事哀公哀公三十五年昭八年公縊死而楚滅我克殺馬毁玉以葬楚人將殺之克請置馬玉不用既又請私私于幄加絰于顙而逃芉尹蓋芉尹蓋者為大夫事閔公閔公二十二年哀十五年楚伐吳公使公孫貞子名未載及蓋弔焉及良吳地而貞子卒蓋將以尸入聘禮賓死未將命則既斂于棺造于朝介將命吳子使太宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸以重寡君之憂敢辭上介蓋對曰寡君聞楚為不道荐伐吳國滅厥民人寡君使蓋備使弔君之下吏無祿使人逢天之戚大命隕隊絶世于良廢日共積一日遷次今君命逆使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如事生禮也于是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也其何以為諸侯主先民有言曰無穢虐士虐士死者備使奉尸將命茍我寡君之命達于君所雖隕于深淵則天命也非君與涉人之過也吳人內之左傳論曰禮者經文緯武之具也針子賈獲芉尹蓋執守大經雖變弗渝可謂知禮矣袁克綢繆故君義不事楚國亡無二其亦事君盡禮者與泄冶泄冶者為大夫事靈公靈公與公孫寧儀行父通于夏姬皆衷衵服近身衣以戲于朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶左傳穀梁泄冶入諫曰使國人聞之猶可使仁人聞之則不可君愧于泄冶而殺之新書靈公殺泄冶而鄧元去陳以族徙逢滑太宰嚭逢滑者陳大夫嚭陳太宰也吳之入楚也懷公新立吳使召公公朝國人而問焉曰欲與楚者右欲與吳者左國人從田無田從黨不知所與故徙新居田在西者居右在東者居左無田者隨黨而立逢滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝于兵暴骨如莽而未見德焉天其或者正訓楚也禍之適吳其何日之有公從之左傳懷公薨閔公即位閔公八年哀元年吳夫差克越乃修舊怨秋八月侵我斬祀殺厲師還出竟太宰嚭使于師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎禮記論曰泄冶直諫淫亂之朝以殺身左氏引孔子之言以斷之曰詩云民之多辟毋自立辟其泄冶之謂乎嗟乎此非聖人之言也信然則龍逢比干申徒狄之無貴于前聞矣宣淫専殺者豫之諫而死之是誅春秋顧若是戾乎陳自哀公叛晉以𨽻楚者勢使然也及改合于吳則一二傳而國亡水不生魚而魚賴水以生勢之謂也然則逢滑之議其為碩畫乎抑之詩曰逺猷辰告嗚乎猷之不逺臧且敗也慶虎慶寅慶樂附慶虎慶寅者並執政大夫也事哀公哀公三年襄七年楚圍我晉㑹諸侯于鄬以救我國人患楚虎與寅謂楚人曰吾使公子黃哀公弟往而執之楚人從之二慶使告公于㑹曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖公逃歸十六年襄二十年蔡公子燮欲以蔡之晉蔡人殺之慶虎慶寅畏公子黃之逼訴楚曰黃與蔡司馬即公子燮同謀楚人以為討公子黃出奔楚十九年襄二十三年公如楚公子黃訴二慶于楚楚人召之使慶樂慶氏族往殺之慶氏以陳叛楚屈建從公圍陳陳人城板隊而殺人役人相命各殺其長築板墜地慶氏殺之役人遂反也遂殺虎寅左傳陳諸公子傳大子免大子御冦公子完顓孫附大子偃師公子留附公子勝大子免桓公大子也桓公三十八年桓五年公疾病弟他殺大子免而代之大子御冦者宣公大子也宣公二十一年莊二十一年國人殺大子御冦公子完與顓孫奔齊完顓孫並御冦黨齊使完為工正完字敬仲厲公之子也見齊傳大子偃師者哀公大子也哀公元妃鄭姬生偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過招過並哀公弟哀公有廢疾三十五年昭八年公子招公子過殺大子偃師而立公子留公遂縊使大夫干徵師赴于楚且告有立君公子勝訴之于楚楚人執干徵師而殺之公子留奔鄭左傳偃師諡曰悼公子招公子過見亂臣傳陳亂臣傳公子他公子他字五父文公之子也事桓公桓公二十七年隱五年鄭請成于我公不許他諫曰親仁善鄰國之寶也君其許鄭公曰宋衛實難鄭何能為遂不許明年鄭侵我大獲二十九年隱七年我及鄭平他如鄭涖盟冬十二月及鄭伯盟歃如忘鄭泄駕曰五父必不免不賴盟矣三十八年桓五年公疾病他殺大子免而代之厲公元年桓六年蔡人殺他立厲公厲公蔡出也左傳公孫寧儀行父公孫寧儀行父者並為大夫事靈公靈公四年文十七年宋弒昭公公孫寧及諸侯伐宋靈公與公孫寧儀行父通于夏姬大夫泄冶諫十四年宣九年寧行父殺泄冶十五年宣十年夏徵舒弒靈公寧行父奔楚明年楚入陳殺夏徵舒納寧行父于陳成公十年成二年公孫寧及魯侯諸侯之大夫盟于蜀公孫寧是為孔寧左傳公子招公子過孔奐附公子招哀公母弟公子過亦哀公弟也招為哀公司徒哀公二十八年昭元年招㑹諸侯之大夫于虢三十五年昭八年公有廢疾招過殺大子偃師而立公子留公縊招歸罪于過而殺之冬十月楚滅陳執招放之于越殺孔奐孔奐者陳大夫招之黨也左傳陳逆臣傳夏徵舒夏齧附夏徵舒字南御叔之子母曰夏姬鄭穆公之女也徵舒祖子夏名少西是為少西氏徵舒為大夫事靈公御叔死夏姬通于靈公及公孫寧儀行父左傳國人賦株林澤陂以譏之詩序靈公十五年宣十年公與寧行父飲酒于夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廄射而殺之十六年宣十一年楚伐陳謂陳人無動將討于少西氏遂入陳殺徵舒轘諸栗門以夏姬與連尹襄老襄老死其子黑要蒸焉後巫臣聘之以奔晉徵舒𤣥孫曰夏齧壯而頑頓事惠公為大夫惠公十一年昭二十三年吳伐楚州來我師及諸侯之師奔命救州來吳敗之于雞父獲齧左傳論曰毋過亂門陳之末世亂其甚乎徵舒弒逆楚幾縣陳招過為難遂乃滅之杜預謂孔儀能定亡君之嗣靈公成喪賊討國復功足補過於戲義利紊而豫奪乖君子且然乎蔡諸臣傳公子燮公子履公子燮莊侯之子公子履其母弟也燮為司馬事景侯景侯二十七年襄八年鄭侵我獲燮夏五月諸侯㑹于邢邱鄭獻燮于㑹既而歸之歸蔡事不載初文侯欲事晉不果而卒逮至景侯楚使蔡無常燮求從先君以利蔡蔡人殺之履出奔楚左傳公子朝公子歸生朝吳公子朝者蔡大師也其子公孫歸生歸生字子家又曰聲子為大夫事景侯子朝與楚伍參友故歸生與參之子伍舉亦相善伍舉娶于王子牟景侯四十五年襄二十六年子牟亡伍舉奔鄭將遂奔晉歸生將如晉遇之于鄭郊班荆相與食而言復故歸生曰子行也吾必復子及宋向戍將平晉楚歸生通使于晉還如楚令尹屈建與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之屈建曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僣不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死于四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉見文十四年晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桑隧獲申麗而還見成六年八年鄭于是乎不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與夫人不善是也雍子事無考雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇于靡角之谷晉將遁矣雍子發命于軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰見成十八年晉降彭城而歸諸宋以魚石歸見襄元年楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳于晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳于是伐巢取駕克棘入州來楚罷于奔命見成七年至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗見宣四年以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆楚子重子辛皆出穆王故曰二穆吾乃四萃于其王族必大敗之晉人從之楚師大敗見成十六年王夷師熸子反死之鄭叛吳興楚失諸侯則苗賁皇之為也屈建曰是皆然矣歸生曰今又有甚于此椒舉娶于申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患屈建懼言諸王益其爵祿而復之歸生使椒鳴逆之說苑蘧伯玉為公子晳說楚王而復之四十六年襄二十七年宋向戍弭諸侯之兵歸生㑹諸侯之大夫于宋秋七月盟于宋景侯薨事靈侯靈侯二年昭元年歸生㑹諸侯之大夫于虢尋宋之盟也歸生子曰朝吳楚靈王之滅蔡也使公子棄疾為蔡公楚觀從者在蔡事吳曰今不封蔡蔡不封矣我請試之召公子干公子黑肱入襲蔡徇于蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之觀從曰失賊成軍謂二子已去蔡公既成軍而殺余何益乃釋之吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上上謂蔡公何適而可衆曰與之乃奉蔡公召二子盟于鄧以入楚靈王死平王即位復封蔡處吳于蔡費無極害吳欲去之謂之曰王唯信子故處子于蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及于難平侯三年昭十五年蔡人逐吳吳出奔鄭左傳論曰燮規事晉而死左氏以為不從民欲未足以服燮也民不可與圖始而可與樂成仰息于楚烏在其成也然蔡之事楚自哀至昭幾二百年不馴以漸而欲一旦幡然易之震俗惑衆不難弒君何有于燮宜其死也歸生說楚卒復椒舉友道備矣然其言實藥楚非僅為舉游說也楚卒不悛而使伍員伯嚭攘臂內向我有材而人用之楚之不亡幸爾世子有靈侯子世子有是為隱大子靈侯大子平侯廬之父也靈侯十二年昭十一年楚滅我用世子有于岡山左傳平侯即位諡曰隱故曰隱大子公子元公子乾昭侯子公子元公子乾並昭侯之子也昭侯如楚三年止之及歸遂如晉以元為質而請伐楚晉辭復以乾為質于吳及吳伐楚敗楚于柏舉遂入郢左傳公子駟公孫獵公子駟公孫獵並蔡大夫昭侯二十五年哀元年蔡逼楚請遷于吳中悔明年吳使來納聘而稍納師師畢入昭侯殺駟以說遂遷于州來而放獵于吳獵駟之黨也左傳蔡逆臣傳公孫翩公孫辰公孫姓公孫霍文之鍇附公孫翩公孫辰公孫姓音生公孫霍並蔡大夫事昭侯昭侯二十六年哀二年吳既遷蔡于州來二十八年哀四年昭侯又將如吳諸大夫恐其又遷也承音懲蓋楚言也公孫翩逐而射之入于家人而薨翩以兩矢門之大夫文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺翩遂公孫辰而殺公孫姓公孫霍辰出奔吳公孫姓或作公孫生生嘗帥師滅沈公孫霍又曰公孫盱左傳曹諸臣傳僖負羈僖負羈曹大夫也事共公晉公子重耳之來也共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志于諸侯得志于諸侯而誅無禮曹其首也子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧已而公子入立是為文公共公二十一年僖二十八年晉伐我入之數之以其不用僖負羈而乘軒者三百人且曰獻狀令無入僖負羈之宫魏犨顛頡爇僖負羈氏文公舍魏犨殺顛頡以徇于師左傳侯獳侯獳者共公之豎也共公二十一年僖二十八年晉將伐曹假道于衛衛人弗許遂侵曹伐衛衛人出衛侯春三月晉入曹執公既而私許復曹衛衛侯復而公未反冬晉文公有疾獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何文公說遂復公左傳公子欣時子臧公孫㑹附公子欣時公羊欣作喜字子臧宣公庶子宣公十七年成十三年公薨于師國人傳欣時逆喪成公遂殺大子而自立宣公既葬欣時將亡國人皆將從之成公乃懼告罪且請焉欣時乃反而致其邑公羊曹伯廬卒于師公子喜時見公子負芻之當主也逡巡而退成公二年成十五年晉侯討我執成公歸于京師諸侯將見欣時于王而立之欣時辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋三年成十六年國人請成公于晉晉侯謂子臧反吾歸而君欣時反成公歸欣時盡歸其邑與卿而不出公羊公子喜時者仁人也內平其國而侍之外治諸京師而免之其後曰公孫㑹悼公二年昭二十年㑹自夢出奔宋左傳公孫彊公孫彊者曹鄙人也好弋初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及伯陽即位好田弋彊獲白雁獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政夢者之子乃行彊言霸說于伯陽從之乃背晉而奸宋宋人伐之晉人不救築五邑于其郊曰黍邱揖邱大城鍾䢴遂滅曹執伯陽及彊以歸殺之左傳論曰子臧同氣負芻乃順逆性成攘讓異節何殊絶也承天子因諸侯順國人而君曹雖達節可也侯獳知權君子與之若夫共公玩賔負羈不聞有鄭詹之諫二以私之準諸臣節有未盡乎莒諸臣傳苑羊牧之烏存附苑羊牧之莒大夫也事共公共公八年昭二十二年齊北郭啓帥師伐我公將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗許敗齊師于夀餘莒地齊侯伐我公行成遂如齊涖盟國人于是大惡公明年大夫烏存帥國人以逐之公將出聞烏存執殳而立于道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弒君成名遂奔魯左傳論曰莒國小又居夷微矣乃籌敵扞難有若牧之誰謂部婁無松柏乎材無不具惟大匠顧耳莒叛臣傳牟夷牟夷莒大夫也事著邱公著邱公五年昭五年夏牟夷以牟婁及防兹奔魯莒三邑三叛人之一也秋我討魯不設備魯敗我于蚡泉左傳莒亂臣傳公子鐸蒲餘侯兹夫公子意恢公子鐸公子意恢並莒羣公子蒲餘侯兹夫莒大夫也著邱公十四年昭十四年秋公薨子郊公即位郊公惡公子鐸而善于意恢兹夫惡意恢而善于著邱公之弟庚輿即共公公子鐸因兹夫而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月兹夫殺意恢郊公奔齊公子鐸逆庚輿于齊齊隰黨公子鉏送之左傳亂按杜預注意恢與君為黨故書名惡之說非是郊公父死不戚誠有之未見其亂且出子立弟逐君専殺鐸與兹夫為亂耳意恢何罪乎經書意恢名遂坐以惡未為得也莒逆臣傳大子僕展輿務婁滅瞀胡公子明附大子僕者紀公庶其之子也紀公生僕又生季他愛季他而黜僕且多行無禮于其國僕因國人以弒紀公以其寶玉奔魯展輿者犂比公之子也犂比公生去疾即著邱公及展輿既立展輿又廢之犂比公虐國人患之犂比公三十五年襄三十一年展輿因國人以攻公弒之乃自立而奪羣公子秩明年羣公子召去疾于齊齊納去疾展輿奔吳是年春魯伐我取鄆因我亂彊鄆田于是務婁瞀胡及公子滅明以大厖與常儀靡奔齊大厖常儀靡莒二邑二子皆展輿之黨也左傳莒列女傳紀嫠婦紀嫠婦莒人也共公殺其夫也為嫠比老託于紀障莒邑紡焉以度而去之以所紡纑度城之髙及齊師伐我共公奔紀障齊使孫書伐之師至嫠婦投纑于外或獻諸孫書書使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟公懼啓西門而出齊師入紀左傳論曰民猶水水所以載舟亦以覆舟是故民雖弱衆可畏也若紀障者匹婦而可以亡城衆猶未也慎之哉邾諸臣傳公子叔術鮑廣父附梁買子臧氏母公子叔術者邾顔公之弟或曰羣公子也何休注當顔公時邾女有為魯夫人者生孝公公羊云邾婁女為魯夫人未知其為武公與懿公與孝公幼注云不知孝公者邾婁外孫邪妾子邪按後文天子誅顔而立叔術反孝公于魯則孝公為魯武公子邾婁之外孫明甚又疏云叔術犯王命殺魯大夫其罪少功有餘若然則鮑廣父梁買子為魯大夫二臣為魯大夫則孝公之為魯孝公愈明甚矣孝公幼顔公淫九公子于宫中因以納賊臧氏之母養公者也養公者必以其子入養聞有賊以其子易公抱公以逃賊至湊公寢而弒之臣有鮑廣父梁買子者聞有賊趨而至臧氏之母曰公不死也在是吾以吾子易公矣于是負孝公之周訴天子天子為之誅顔公而立叔術反孝公于魯顔夫人者嫗盈女也國色也其言曰有能為我殺殺顔者吾為其妻叔術為之殺殺顔者而以為妻有子焉謂之盱夏父者其所為有于顔者也注為顔公夫人時所為顔公生也盱幼而皆愛之食必坐二子于其側而食之有珍怪之食盱必先取足焉夏父曰以來言以彼物來人未足而盱有餘人夏父自謂叔術覺焉知少爭食長必爭國曰嘻此誠爾國也夫起而致國于夏父夏父受而中分之叔術曰不可三分之叔術曰不可四分之叔術曰不可五分之然後受之公羊傳三見昭三十年公孫鉏徐鉏邱弱茅地羊羅附公孫鉏徐鉏邱弱茅地並邾大夫事莊公莊公二十二年昭二十三年春正月我城翼翼邾邑還將自離姑亦邾邑從離姑則道徑魯武城公孫鉏曰魯將御我欲自武城還循山而南徐鉏邱弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊我師過之乃推而蹶之遂取我師獲鉏弱地莊公時又有羊羅者鄅妘姓國禹之後人藉稻我襲之鄅人將閉門羊羅攝其首焉斬門者首也遂入鄅左傳茅夷鴻茅夷鴻者邾大夫茅成子也茅采邑成子其諡也隱公十八年哀七年秋魯伐我及范門邾郭門猶聞鐘聲邾不設備也大夫諫不聽夷鴻請告于吳不許曰魯擊柝聞于邾吳二千里不三月不至何及于我且國內豈不足夷鴻以茅叛魯師入以公歸囚諸負瑕夷鴻以束帛乘韋自請救于吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟于鄫衍鄫盟經不書秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之吳子從之明年伐魯魯乃歸公左傳論曰叔術讓國公羊賢之論者遂以犯王命妻嫂殺魯大夫為罪不足而功有餘何其乖也夫顔公禽獸行天子誅之以立叔術則國安得讓大夫安得殺殺人以濟淫讓國以干命賢者固若是乎茅成子竭蹶亂君亡國之際而卒復之幾與楚包胥爭烈矣公孫鉏乃亦有謀信乎國無小也邾叛臣傳庶其黑肱庶其黑肱並邾大夫悼公四年襄二十一年庶其以漆閭邱奔魯莊公三十年昭三十年黑肱以濫奔魯是為三叛人之二也左傳尚史卷六十二
